 exp:{pt:{tech:"A AWS CLI (Command Line Interface) permite interagir com todos os servicos AWS via terminal usando comandos e scripts. Ideal para automacao e operacoes em lote.",simple:"AWS CLI e como controlar a AWS pelo terminal em vez do site. Permite automatizar tudo com scripts — como programar o computador para fazer tarefas repetitivas sozinho."},
      en:{tech:"The AWS CLI (Command Line Interface) lets you interact with all AWS services via terminal using commands and scripts. Ideal for automation and batch operations.",simple:"AWS CLI is like controlling AWS through the terminal instead of the website. It lets you automate everything with scripts — like programming your computer to do repetitive tasks on its own."}}},
{en:"Which connectivity options build hybrid cloud architectures? (Choose TWO)",
 pt:"Quais opcoes de conectividade constroem arquiteturas de nuvem hibrida? (Escolha DUAS)",
 o:{en:["AWS Artifact","AWS Cloud9","AWS Direct Connect","AWS CloudTrail","AWS VPN"],pt:["AWS Artifact","AWS Cloud9","AWS Direct Connect","AWS CloudTrail","AWS VPN"]},a:[2,4],multi:true,
 exp:{pt:{tech:"Direct Connect (conexao fisica dedicada) e VPN (tunel criptografado pela internet) sao as duas formas de conectar seu datacenter on-premises a AWS, criando uma arquitetura hibrida.",simple:"Para ligar sua empresa a AWS voce tem duas opcoes: uma estrada privada (Direct Connect) ou um tunel secreto pela estrada publica (VPN). As duas criam a ponte entre on-premises e nuvem."},
      en:{tech:"Direct Connect (dedicated physical connection) and VPN (encrypted tunnel over internet) are the two ways to connect your on-premises datacenter to AWS, creating a hybrid architecture.",simple:"To connect your company to AWS you have two options: a private road (Direct Connect) or a secret tunnel through the public road (VPN). Both create the bridge between on-premises and cloud."}}},
{en:"Which MySQL-compatible relational database has automatic capacity scaling?",
 pt:"Qual banco de dados relacional compativel com MySQL tem escalabilidade automatica de capacidade?",
 o:{en:["Amazon Neptune","Amazon Aurora","Amazon RDS for SQL Server","Amazon RDS for PostgreSQL"],pt:["Amazon Neptune","Amazon Aurora","Amazon RDS for SQL Server","Amazon RDS for PostgreSQL"]},a:[1],
 exp:{pt:{tech:"O Amazon Aurora e compativel com MySQL e PostgreSQL, com armazenamento que escala automaticamente de 10GB ate 128TB. Oferece ate 5x a performance do MySQL padrao.",simple:"Aurora e como um MySQL turbinado que cresce sozinho. Enquanto o RDS normal precisa que voce aumente o disco manualmente, o Aurora faz isso automaticamente conforme seus dados crescem."},
      en:{tech:"Amazon Aurora is compatible with MySQL and PostgreSQL, with storage that auto-scales from 10GB to 128TB. It offers up to 5x the performance of standard MySQL.",simple:"Aurora is like a turbocharged MySQL that grows on its own. While regular RDS needs you to manually increase disk, Aurora does it automatically as your data grows."}}},
{en:"Which is the AWS data warehouse service for high-performance queries on large datasets?",
 pt:"Qual e o servico de data warehouse da AWS para consultas de alta performance em grandes conjuntos de dados?",
 o:{en:["Amazon Redshift","Amazon Kinesis","Amazon DynamoDB","Amazon RDS"],pt:["Amazon Redshift","Amazon Kinesis","Amazon DynamoDB","Amazon RDS"]},a:[0],
 exp:{pt:{tech:"O Amazon Redshift e o servico de data warehouse da AWS, otimizado para analise de dados em escala de petabytes com armazenamento colunar e processamento paralelo massivo (MPP).",simple:"Redshift e como um superbanco de dados feito para perguntas dificeis sobre MUITOS dados. Enquanto bancos normais sao bons para operacoes do dia-a-dia, o Redshift e feito para relatorios e analises pesadas."},
      en:{tech:"Amazon Redshift is AWS's data warehouse service, optimized for petabyte-scale data analysis with columnar storage and massively parallel processing (MPP).",simple:"Redshift is like a super-database made for hard questions about LOTS of data. While regular databases are good for day-to-day operations, Redshift is built for heavy reports and analysis."}}},
{en:"How are Linux-based Amazon EC2 instances billed?",
 pt:"Como as instancias Amazon EC2 baseadas em Linux sao cobradas?",
 o:{en:["One-second increments, minimum one minute","One-hour increments, minimum one day","One-minute increments, minimum one hour","One-day increments, minimum one month"],
    pt:["Incrementos de um segundo, minimo de um minuto","Incrementos de uma hora, minimo de um dia","Incrementos de um minuto, minimo de uma hora","Incrementos de um dia, minimo de um mes"]},a:[0],
 exp:{pt:{tech:"Instancias EC2 Linux sao cobradas por segundo com minimo de 60 segundos. Instancias Windows sao cobradas por hora. Isso foi uma mudanca importante em 2017.",simple:"E como um estacionamento que cobra por segundo (minimo 1 minuto). Se voce ficar 61 segundos, paga 61 segundos. Antes era por hora cheia, agora e bem mais justo."},
      en:{tech:"EC2 Linux instances are billed per second with a 60-second minimum. Windows instances are billed per hour. This was an important change in 2017.",simple:"It's like a parking lot that charges per second (minimum 1 minute). If you stay 61 seconds, you pay for 61 seconds. It used to be per full hour, now it's much fairer."}}},
{en:"In AWS Organizations, what restricts services and actions allowed per account?",
 pt:"No AWS Organizations, o que restringe servicos e acoes permitidos por conta?",
 o:{en:["IAM Principals","AWS Service Control Policies","IAM policies","AWS Fargate"],pt:["IAM Principals","AWS Service Control Policies (SCPs)","IAM policies","AWS Fargate"]},a:[1],
 exp:{pt:{tech:"SCPs (Service Control Policies) definem o limite maximo de permissoes para contas em uma organizacao. Mesmo que uma IAM policy permita algo, o SCP pode bloquear. SCPs nao concedem permissoes, apenas restringem.",simple:"SCP e como as regras do condominio. Mesmo que voce tenha a chave do seu apartamento (IAM policy), se o condominio proibir pets, voce nao pode ter. O SCP define o que NINGUEM na conta pode fazer."},
      en:{tech:"SCPs (Service Control Policies) define the maximum permissions boundary for accounts in an organization. Even if an IAM policy allows something, the SCP can block it. SCPs don't grant permissions, only restrict.",simple:"SCP is like the condo rules. Even if you have your apartment key (IAM policy), if the condo forbids pets, you can't have one. The SCP defines what NOBODY in the account can do."}}},
{en:"What is the minimum AWS support level providing 24x7 access to technical engineers?",
 pt:"Qual e o nivel minimo de suporte AWS que fornece acesso 24x7 a engenheiros tecnicos?",
 o:{en:["Enterprise Support","Developer Support","Basic Support","Business Support"],pt:["Enterprise Support","Developer Support","Basic Support","Business Support"]},a:[3],
 exp:{pt:{tech:"Business Support e o nivel minimo com acesso 24x7 a engenheiros por telefone, chat e email. Developer oferece suporte so em horario comercial por email. Basic nao tem suporte tecnico.",simple:"Basic = sem suporte tecnico. Developer = suporte por email em horario comercial. Business = suporte 24h por telefone (o minimo para 'sempre ter alguem'). Enterprise = tudo isso + um gerente dedicado (TAM)."},
      en:{tech:"Business Support is the minimum level with 24x7 access to engineers via phone, chat, and email. Developer offers support only during business hours via email. Basic has no technical support.",simple:"Basic = no tech support. Developer = email support during business hours. Business = 24h phone support (minimum for 'always having someone'). Enterprise = all that + a dedicated manager (TAM)."}}},
{en:"Which of the following is NOT correct regarding Amazon EC2 On-demand instances?",
 pt:"Qual das seguintes afirmacoes NAO esta correta sobre instancias EC2 On-Demand?",
 o:{en:["You have to pay a start-up fee when launching a new instance","The on-demand instances follow the AWS pay-as-you-go pricing model","No longer-term commitments or upfront payments are needed","You are charged per second based on an hourly rate"],
    pt:["Voce precisa pagar uma taxa inicial ao lancar uma nova instancia","As instancias on-demand seguem o modelo de precificacao pay-as-you-go","Nao sao necessarios compromissos de longo prazo ou pagamentos antecipados","Voce e cobrado por segundo com base em uma taxa por hora"]},a:[0],
 exp:{pt:{tech:"EC2 On-Demand nao tem taxa inicial (start-up fee). Voce paga apenas pelo tempo de uso, sem compromissos. Esse e justamente o diferencial do modelo pay-as-you-go.",simple:"On-Demand e como luz eletrica — nao tem taxa de instalacao, voce so paga pelo que consome. Nao existe 'entrada' pra comecar a usar."},
      en:{tech:"EC2 On-Demand has no start-up fee. You pay only for usage time, with no commitments. That's exactly the point of the pay-as-you-go model.",simple:"On-Demand is like electricity — no installation fee, you just pay for what you consume. There's no 'entry fee' to start using it."}}},
{en:"Which is a best-practice when designing solutions on AWS?",
 pt:"Qual e uma melhor pratica ao projetar solucoes na AWS?",
 o:{en:["Invest heavily in architecting your environment as it is hard to change later","Use reservations to reduce costs when testing your production environment","Automate wherever possible to make architectural experimentation easier","Provision large compute capacity to handle any spikes in load"],
    pt:["Investir pesado na arquitetura pois e dificil mudar depois","Usar reservas para reduzir custos ao testar seu ambiente de producao","Automatizar sempre que possivel para facilitar a experimentacao de arquitetura","Provisionar grande capacidade computacional para lidar com picos de carga"]},a:[2],
 exp:{pt:{tech:"A AWS incentiva automacao (IaC com CloudFormation/Terraform) para facilitar experimentacao, replicacao e iteracao rapida de arquiteturas. Diferente de on-premises, e facil mudar na nuvem.",simple:"Na nuvem, mudar e barato e rapido. Automatizar e como ter uma receita de bolo — se quiser experimentar outro sabor, e so ajustar a receita e assar de novo."},
      en:{tech:"AWS encourages automation (IaC with CloudFormation/Terraform) to enable experimentation, replication, and fast architecture iteration. Unlike on-premises, changing in the cloud is easy.",simple:"In the cloud, changing is cheap and fast. Automating is like having a cake recipe — if you want to try another flavor, just tweak the recipe and bake again."}}},
{en:"According to the AWS Acceptable Use Policy, which statement is true regarding penetration testing of EC2 instances?",
 pt:"De acordo com a Politica de Uso Aceitavel da AWS, qual afirmacao e verdadeira sobre testes de penetracao em instancias EC2?",
 o:{en:["Penetration testing is not allowed in AWS","Penetration testing is performed automatically by AWS","Penetration testing can be performed by the customer on their own instances without prior authorization","Customers are only allowed to test services managed by AWS"],
    pt:["Testes de penetracao nao sao permitidos na AWS","Testes de penetracao sao realizados automaticamente pela AWS","Testes de penetracao podem ser realizados pelo cliente em suas proprias instancias sem autorizacao previa","Clientes so podem testar servicos gerenciados pela AWS"]},a:[2],
 exp:{pt:{tech:"Desde 2019, a AWS permite testes de penetracao em 8 servicos (incluindo EC2) sem necessidade de aprovacao previa. Antes era necessario solicitar permissao.",simple:"A AWS deixa voce testar a seguranca das suas proprias instancias livremente — como um dono de loja que contrata alguem pra tentar invadir e testar as trancas."},
      en:{tech:"Since 2019, AWS allows penetration testing on 8 services (including EC2) without prior approval. Previously, permission was required.",simple:"AWS lets you freely test the security of your own instances — like a store owner hiring someone to try to break in and test the locks."}}},
{en:"Which of the following design principles helps achieve high availability?",
 pt:"Quais dos seguintes principios de design ajudam a alcancar alta disponibilidade? (Escolha DOIS)",
 o:{en:["Multi-factor authentication","Availability Zones","Elastic Load Balancing","Penetration testing","Vertical Scaling"],
    pt:["Autenticacao multi-fator","Zonas de Disponibilidade","Elastic Load Balancing","Testes de penetracao","Escalabilidade Vertical"]},a:[1,2],multi:true,
 exp:{pt:{tech:"AZs fornecem redundancia geografica dentro de uma regiao. ELB distribui trafego entre instancias saudaveis em multiplas AZs. Juntos, garantem que a falha de um componente nao derrube o sistema.",simple:"AZs sao como ter filiais em bairros diferentes — se uma fechar, as outras continuam. O Load Balancer e o atendente que direciona clientes para a filial aberta mais proxima."},
      en:{tech:"AZs provide geographic redundancy within a region. ELB distributes traffic across healthy instances in multiple AZs. Together, they ensure a single component failure doesn't bring down the system.",simple:"AZs are like having branches in different neighborhoods — if one closes, the others continue. The Load Balancer is the attendant who directs customers to the nearest open branch."}}},
{en:"A company has moved to AWS recently. Which services will help ensure proper security settings? (Choose TWO)",
 pt:"Uma empresa migrou recentemente para a AWS. Quais servicos ajudam a garantir configuracoes de seguranca adequadas? (Escolha DOIS)",
 o:{en:["AWS Trusted Advisor","Amazon Inspector","Amazon SNS","Amazon CloudWatch","Concierge Support Team"],
    pt:["AWS Trusted Advisor","Amazon Inspector","Amazon SNS","Amazon CloudWatch","Concierge Support Team"]},a:[0,1],multi:true,
 exp:{pt:{tech:"Trusted Advisor verifica boas praticas em seguranca, custo, performance e tolerancia a falhas. Inspector faz varreduras automatizadas de vulnerabilidades em EC2. Juntos cobrem recomendacoes e deteccao.",simple:"Trusted Advisor e como um consultor que revisa sua casa e diz 'essa porta esta sem tranca'. Inspector e o detetive que testa se as trancas realmente funcionam."},
      en:{tech:"Trusted Advisor checks best practices for security, cost, performance, and fault tolerance. Inspector runs automated vulnerability scans on EC2. Together they cover recommendations and detection.",simple:"Trusted Advisor is like a consultant who reviews your house and says 'this door has no lock'. Inspector is the detective who tests whether the locks actually work."}}},
{en:"What is the AWS serverless service that allows you to run applications without administrative burden?",
 pt:"Qual e o servico serverless da AWS que permite executar aplicacoes sem carga administrativa?",
 o:{en:["Amazon LightSail","AWS Lambda","Amazon RDS","Amazon EC2"],
    pt:["Amazon LightSail","AWS Lambda","Amazon RDS","Amazon EC2"]},a:[1],
 exp:{pt:{tech:"O AWS Lambda e um servico de computacao serverless que executa codigo em resposta a eventos. Voce nao gerencia servidores — so sobe o codigo e define os gatilhos.",simple:"Lambda e como contratar um freelancer por tarefa — ele aparece, faz o trabalho e vai embora. Voce nao precisa dar mesa, cadeira nem escritorio (servidor)."},
      en:{tech:"AWS Lambda is a serverless compute service that runs code in response to events. You don't manage servers — just upload code and define triggers.",simple:"Lambda is like hiring a freelancer per task — they show up, do the work, and leave. You don't need to provide a desk, chair, or office (server)."}}},
{en:"Three EC2 instances crashed but no customers were affected. What did the architect build?",
 pt:"Tres instancias EC2 falharam mas nenhum cliente foi afetado. O que o arquiteto construiu?",
 o:{en:["An elastic system","A fault tolerant system","An encrypted system","A scalable system"],
    pt:["Um sistema elastico","Um sistema tolerante a falhas","Um sistema criptografado","Um sistema escalavel"]},a:[1],
 exp:{pt:{tech:"Tolerancia a falhas (fault tolerance) significa que o sistema continua operando normalmente mesmo quando componentes falham. Diferente de alta disponibilidade, que minimiza o tempo de inatividade.",simple:"Tolerancia a falhas e como um aviao com 4 motores que continua voando mesmo se 2 falharem. Os passageiros (clientes) nem percebem o problema."},
      en:{tech:"Fault tolerance means the system continues operating normally even when components fail. Different from high availability, which minimizes downtime.",simple:"Fault tolerance is like a plane with 4 engines that keeps flying even if 2 fail. The passengers (customers) don't even notice the problem."}}},
{en:"What is the benefit of consolidated billing in AWS Organizations?",
 pt:"Qual e o beneficio do faturamento consolidado no AWS Organizations?",
 o:{en:["AWS services cost half the original price","The feature is just for organizational purposes","Each account gets volume discounts","Each account gets five times the free-tier capacity"],
    pt:["Os servicos AWS custam metade do preco original","O recurso e apenas para fins organizacionais","Cada conta recebe descontos por volume","Cada conta recebe cinco vezes a capacidade do free tier"]},a:[2],
 exp:{pt:{tech:"O faturamento consolidado agrega o uso de todas as contas da organizacao, permitindo que atinjam os limites de desconto por volume mais rapidamente. O uso combinado beneficia todas as contas.",simple:"E como uma familia que junta as compras num unico cartao do supermercado — quanto mais compram juntos, mais pontos (descontos por volume) acumulam."},
      en:{tech:"Consolidated billing aggregates usage from all organization accounts, allowing them to reach volume discount tiers faster. Combined usage benefits all accounts.",simple:"It's like a family pooling purchases on a single supermarket card — the more they buy together, the more points (volume discounts) they accumulate."}}},
{en:"Which service can store and reliably deliver messages across distributed systems?",
 pt:"Qual servico pode armazenar e entregar mensagens de forma confiavel entre sistemas distribuidos?",
 o:{en:["Amazon Simple Queue Service","AWS Storage Gateway","Amazon Simple Email Service","Amazon Simple Storage Service"],
    pt:["Amazon Simple Queue Service","AWS Storage Gateway","Amazon Simple Email Service","Amazon Simple Storage Service"]},a:[0],
 exp:{pt:{tech:"O Amazon SQS (Simple Queue Service) permite desacoplar e escalar microsservicos atraves de filas de mensagens. As mensagens sao armazenadas redundantemente ate serem consumidas.",simple:"SQS e como um mural de recados entre equipes — uma equipe deixa a mensagem, a outra pega quando estiver pronta. O mural guarda tudo ate alguem ler."},
      en:{tech:"Amazon SQS (Simple Queue Service) lets you decouple and scale microservices through message queues. Messages are stored redundantly until consumed.",simple:"SQS is like a bulletin board between teams — one team posts the message, the other picks it up when ready. The board keeps everything until someone reads it."}}},
{en:"A company migrating a database to Amazon RDS should minimize costs by:",
 pt:"Uma empresa migrando um banco de dados para o Amazon RDS deve minimizar custos com:",
 o:{en:["Right-sizing before and after migration","Using Multi-Region Active-Passive architecture","Combining On-demand Capacity Reservations with Savings Plans","Using Multi-Region Active-Active architecture"],
    pt:["Dimensionamento correto antes e depois da migracao","Usar arquitetura Multi-Region Active-Passive","Combinar Reservas de Capacidade On-demand com Savings Plans","Usar arquitetura Multi-Region Active-Active"]},a:[0],
 exp:{pt:{tech:"Right-sizing significa escolher o tipo e tamanho de instancia adequados a carga real. Provisionar mais do que necessario gera desperdicio. Monitorar e ajustar apos a migracao e essencial.",simple:"Right-sizing e como comprar roupas do tamanho certo — nem grande demais (desperdicio) nem pequena demais (nao serve). Medir antes e depois garante o melhor custo."},
      en:{tech:"Right-sizing means choosing the instance type and size appropriate for actual workload. Over-provisioning wastes money. Monitoring and adjusting after migration is essential.",simple:"Right-sizing is like buying clothes that fit — not too big (waste) or too small (won't work). Measuring before and after ensures the best cost."}}},
{en:"Which Amazon RDS features improve database availability? (Choose TWO)",
 pt:"Quais recursos do Amazon RDS melhoram a disponibilidade do banco de dados? (Escolha DOIS)",
 o:{en:["AWS Regions","Multi-AZ Deployment","Automatic patching","Read Replicas","Edge Locations"],
    pt:["AWS Regions","Implantacao Multi-AZ","Patching automatico","Read Replicas","Edge Locations"]},a:[1,3],multi:true,
 exp:{pt:{tech:"Multi-AZ cria uma replica sincrona em outra AZ para failover automatico. Read Replicas criam copias assincrona para leitura, distribuindo carga e servindo como backup de disponibilidade.",simple:"Multi-AZ e como ter um substituto de plantao — se o titular cair, o reserva assume na hora. Read Replicas sao como assistentes que ajudam a responder perguntas (leituras), tirando peso do principal."},
      en:{tech:"Multi-AZ creates a synchronous replica in another AZ for automatic failover. Read Replicas create asynchronous copies for reading, distributing load and serving as availability backup.",simple:"Multi-AZ is like having a backup on standby — if the starter goes down, the backup takes over immediately. Read Replicas are like assistants who help answer questions (reads), taking load off the main one."}}},
{en:"To reduce latency for Asian users of an application hosted in Northern California, what should you do?",
 pt:"Para reduzir a latencia de usuarios asiaticos de uma aplicacao hospedada no Norte da California, o que voce deve fazer?",
 o:{en:["Replicate resources across multiple AZs in same region","Migrate to an Asian hosting provider","Recreate website content","Create a CDN using CloudFront for edge caching"],
    pt:["Replicar recursos em multiplas AZs na mesma regiao","Migrar para um provedor de hospedagem asiatico","Recriar o conteudo do site","Criar um CDN usando CloudFront para cache de borda"]},a:[3],
 exp:{pt:{tech:"O CloudFront armazena conteudo em Edge Locations proximas aos usuarios asiaticos, reduzindo latencia sem precisar mover a aplicacao. E a solucao mais simples e eficiente.",simple:"Em vez de fazer todos os clientes asiaticos irem ate a California buscar o conteudo, o CloudFront coloca copias em 'lojinhas' perto deles na Asia."},
      en:{tech:"CloudFront caches content at Edge Locations near Asian users, reducing latency without moving the application. It's the simplest and most efficient solution.",simple:"Instead of making all Asian customers go to California to get content, CloudFront puts copies in 'shops' near them in Asia."}}},
{en:"What should be considered during TCO analysis comparing AWS versus on-premises costs?",
 pt:"O que deve ser considerado na analise de TCO comparando custos AWS versus on-premises?",
 o:{en:["Application development","Market research","Business analysis","Physical hardware"],
    pt:["Desenvolvimento de aplicacoes","Pesquisa de mercado","Analise de negocios","Hardware fisico"]},a:[3],
 exp:{pt:{tech:"O TCO (Total Cost of Ownership) on-premises inclui custos de hardware fisico, energia, refrigeracao, espaco fisico, pessoal de manutencao — custos eliminados ou reduzidos na nuvem.",simple:"Quando compara preco de casa propria vs aluguel, voce nao ve so a prestacao — conta IPTU, manutencao, condominio. TCO e a mesma logica: o hardware fisico e o 'custo oculto' do on-premises."},
      en:{tech:"On-premises TCO (Total Cost of Ownership) includes physical hardware costs, power, cooling, physical space, maintenance staff — costs eliminated or reduced in the cloud.",simple:"When comparing owning vs renting a home, you don't just look at the mortgage — you count taxes, maintenance, HOA. TCO is the same logic: physical hardware is the 'hidden cost' of on-premises."}}},
{en:"Which connectivity option uses IPSec for encrypted on-premises to AWS connection?",
 pt:"Qual opcao de conectividade usa IPSec para conexao criptografada entre on-premises e AWS?",
 o:{en:["Internet Gateway","AWS IQ","AWS Direct Connect","AWS Site-to-Site VPN"],
    pt:["Internet Gateway","AWS IQ","AWS Direct Connect","AWS Site-to-Site VPN"]},a:[3],
 exp:{pt:{tech:"O AWS Site-to-Site VPN cria um tunel IPSec criptografado entre seu datacenter e a VPC da AWS pela internet publica. Direct Connect e uma conexao fisica dedicada (nao usa IPSec nativamente).",simple:"VPN e como enviar uma carta numa caixa trancada (criptografia IPSec) pelo correio normal (internet). Direct Connect e ter um mensageiro privado que so entrega pra voce."},
      en:{tech:"AWS Site-to-Site VPN creates an IPSec encrypted tunnel between your datacenter and AWS VPC over the public internet. Direct Connect is a dedicated physical connection (doesn't natively use IPSec).",simple:"VPN is like sending a letter in a locked box (IPSec encryption) through regular mail (internet). Direct Connect is having a private courier who delivers only to you."}}},
{en:"Which services can be used to control network traffic in AWS? (Choose TWO)",
 pt:"Quais servicos podem ser usados para controlar trafego de rede na AWS? (Escolha DOIS)",
 o:{en:["Network Access Control Lists","Key Pairs","Access Keys","IAM Policies","Security Groups"],
    pt:["Listas de Controle de Acesso de Rede","Key Pairs","Chaves de Acesso","Politicas IAM","Security Groups"]},a:[0,4],multi:true,
 exp:{pt:{tech:"Network ACLs operam no nivel da sub-rede (stateless). Security Groups operam no nivel da instancia (stateful). Ambos controlam trafego de rede de entrada e saida na VPC.",simple:"Security Groups sao as regras do porteiro do apartamento. Network ACLs sao as regras do porteiro do predio. Juntos, controlam quem entra e sai na rede."},
      en:{tech:"Network ACLs operate at the subnet level (stateless). Security Groups operate at the instance level (stateful). Both control inbound and outbound network traffic in the VPC.",simple:"Security Groups are the apartment doorman's rules. Network ACLs are the building doorman's rules. Together, they control who enters and exits the network."}}},
{en:"Which AWS service provides the current status of all AWS Services in all Regions?",
 pt:"Qual servico AWS mostra o status atual de todos os servicos AWS em todas as Regioes?",
 o:{en:["AWS Service Health Dashboard","AWS Management Console","Amazon CloudWatch","AWS Personal Health Dashboard"],
    pt:["AWS Service Health Dashboard","AWS Management Console","Amazon CloudWatch","AWS Personal Health Dashboard"]},a:[0],
 exp:{pt:{tech:"O AWS Service Health Dashboard mostra o status de todos os servicos em todas as regioes publicamente. O Personal Health Dashboard mostra eventos que afetam especificamente sua conta.",simple:"Service Health Dashboard e como o painel de status do metro — mostra quais linhas estao funcionando. Personal Health Dashboard e o app que avisa SO VOCE que sua linha especifica esta com atraso."},
      en:{tech:"The AWS Service Health Dashboard shows the status of all services across all regions publicly. The Personal Health Dashboard shows events specifically affecting your account.",simple:"Service Health Dashboard is like the subway status board — shows which lines are running. Personal Health Dashboard is the app that notifies ONLY YOU that your specific line is delayed."}}},
{en:"Which AWS service enables you to make calls to AWS services from different programming languages?",
 pt:"Qual servico AWS permite fazer chamadas a servicos AWS a partir de diferentes linguagens de programacao?",
 o:{en:["AWS Software Development Kit","AWS Command Line Interface","AWS CodeDeploy","AWS Management Console"],
    pt:["AWS Software Development Kit","AWS Command Line Interface","AWS CodeDeploy","AWS Management Console"]},a:[0],
 exp:{pt:{tech:"O AWS SDK (Software Development Kit) fornece bibliotecas para interagir com servicos AWS em diversas linguagens como Python (boto3), JavaScript, Java, Go, .NET, etc.",simple:"O SDK e como um 'kit de ferramentas' para cada linguagem de programacao — em vez de montar as chamadas HTTP do zero, voce usa funcoes prontas tipo aws.s3.upload()."},
      en:{tech:"The AWS SDK (Software Development Kit) provides libraries to interact with AWS services in various languages like Python (boto3), JavaScript, Java, Go, .NET, etc.",simple:"The SDK is like a 'toolkit' for each programming language — instead of building HTTP calls from scratch, you use ready-made functions like aws.s3.upload()."}}},
{en:"Which AWS service can be used for registering new domain names?",
 pt:"Qual servico AWS pode ser usado para registrar novos nomes de dominio?",
 o:{en:["Amazon Personalize","Amazon Route 53","AWS KMS","AWS Config"],
    pt:["Amazon Personalize","Amazon Route 53","AWS KMS","AWS Config"]},a:[1],
 exp:{pt:{tech:"O Amazon Route 53 alem de ser um servico DNS, tambem permite registrar e gerenciar nomes de dominio diretamente pela AWS, sem precisar de um registrador externo.",simple:"Route 53 e a 'lista telefonica' da AWS que tambem vende 'numeros de telefone' (dominios). Voce pode comprar seu .com e configurar pra onde ele aponta, tudo no mesmo lugar."},
      en:{tech:"Amazon Route 53 besides being a DNS service, also lets you register and manage domain names directly through AWS, without needing an external registrar.",simple:"Route 53 is AWS's 'phone book' that also sells 'phone numbers' (domains). You can buy your .com and configure where it points, all in one place."}}},
{en:"Which AWS automation tools help deploy applications faster? (Choose TWO)",
 pt:"Quais ferramentas de automacao AWS ajudam a implantar aplicacoes mais rapido? (Escolha DOIS)",
 o:{en:["AWS CloudFormation","AWS Migration Hub","AWS IAM","AWS Elastic Beanstalk","Amazon Macie"],
    pt:["AWS CloudFormation","AWS Migration Hub","AWS IAM","AWS Elastic Beanstalk","Amazon Macie"]},a:[0,3],multi:true,
 exp:{pt:{tech:"CloudFormation permite definir infraestrutura como codigo (IaC) em templates YAML/JSON. Elastic Beanstalk automatiza deploy, scaling e monitoramento de aplicacoes. Ambos aceleram implantacoes.",simple:"CloudFormation e como um projeto de engenharia que constroi a infra inteira com um clique. Beanstalk e como um 'deploy automatico' — voce sobe o codigo e ele faz todo o resto."},
      en:{tech:"CloudFormation lets you define infrastructure as code (IaC) in YAML/JSON templates. Elastic Beanstalk automates deployment, scaling, and monitoring. Both speed up deployments.",simple:"CloudFormation is like an engineering blueprint that builds the entire infra with one click. Beanstalk is like 'auto-deploy' — you upload code and it does everything else."}}},
{en:"Which AWS service provides cost-optimization recommendations?",
 pt:"Qual servico AWS fornece recomendacoes de otimizacao de custos?",
 o:{en:["AWS Trusted Advisor","AWS Pricing Calculator","Amazon QuickSight","AWS X-Ray"],
    pt:["AWS Trusted Advisor","AWS Pricing Calculator","Amazon QuickSight","AWS X-Ray"]},a:[0],
 exp:{pt:{tech:"O AWS Trusted Advisor analisa seu ambiente e oferece recomendacoes em 5 categorias: custo, performance, seguranca, tolerancia a falhas e limites de servico.",simple:"Trusted Advisor e como um consultor financeiro pro sua conta AWS — ele olha tudo e diz 'voce ta pagando demais aqui, pode economizar ali, e tem risco de seguranca acola'."},
      en:{tech:"AWS Trusted Advisor analyzes your environment and offers recommendations in 5 categories: cost, performance, security, fault tolerance, and service limits.",simple:"Trusted Advisor is like a financial consultant for your AWS account — it looks at everything and says 'you're overpaying here, can save there, and have a security risk over there'."}}},
{en:"Which service simplifies connection management among hundreds of VPCs across multiple regions?",
 pt:"Qual servico simplifica o gerenciamento de conexoes entre centenas de VPCs em multiplas regioes?",
 o:{en:["VPC Peering","AWS Transit Gateway","Amazon Connect","Security Groups"],
    pt:["VPC Peering","AWS Transit Gateway","Amazon Connect","Security Groups"]},a:[1],
 exp:{pt:{tech:"O AWS Transit Gateway atua como um hub central para conectar multiplas VPCs e redes on-premises. Sem ele, seria necessario criar conexoes ponto-a-ponto (peering) entre cada par de VPCs.",simple:"Transit Gateway e como um aeroporto hub — em vez de ter voos diretos entre todas as cidades (VPC Peering para cada par), todo mundo conecta pelo hub central."},
      en:{tech:"AWS Transit Gateway acts as a central hub to connect multiple VPCs and on-premises networks. Without it, you'd need point-to-point connections (peering) between each VPC pair.",simple:"Transit Gateway is like a hub airport — instead of direct flights between every city (VPC Peering for each pair), everyone connects through the central hub."}}},
{en:"Why does every AWS Region contain multiple Availability Zones?",
 pt:"Por que toda Regiao AWS contem multiplas Zonas de Disponibilidade?",
 o:{en:["Build resilient and highly available architectures","Results in lower total cost than a single AZ","Allows data replication and global reach","Increases storage capacity in the region"],
    pt:["Construir arquiteturas resilientes e altamente disponiveis","Resulta em custo total menor que uma unica AZ","Permite replicacao de dados e alcance global","Aumenta a capacidade de armazenamento na regiao"]},a:[0],
 exp:{pt:{tech:"Multiplas AZs dentro de uma Regiao permitem implantar recursos de forma redundante. Se uma AZ falhar, as outras continuam operando, garantindo alta disponibilidade sem sair da regiao.",simple:"E como ter geradores de backup em predios diferentes — se faltar luz num predio (AZ), os outros continuam funcionando. A regiao nunca fica no escuro."},
      en:{tech:"Multiple AZs within a Region allow deploying resources redundantly. If one AZ fails, others continue operating, ensuring high availability without leaving the region.",simple:"It's like having backup generators in different buildings — if one building (AZ) loses power, the others keep running. The region never goes dark."}}},
{en:"Which of the following procedures will help reduce your Amazon S3 costs?",
 pt:"Qual dos seguintes procedimentos ajudara a reduzir seus custos do Amazon S3?",
 o:{en:["Use Import/Export to move old files to Glacier","Use the right combination of storage classes based on use cases","Pick the right Availability Zone for your S3 bucket","Move all S3 data to EBS"],
    pt:["Usar Import/Export para mover arquivos antigos para o Glacier","Usar a combinacao certa de classes de armazenamento baseado nos casos de uso","Escolher a Zona de Disponibilidade certa para seu bucket S3","Mover todos os dados do S3 para o EBS"]},a:[1],
 exp:{pt:{tech:"S3 tem varias classes (Standard, IA, Glacier, Deep Archive) com precos diferentes. Usar a classe certa para cada padrao de acesso otimiza custos. S3 Lifecycle policies podem automatizar a transicao.",simple:"E como ter armarios com precos diferentes: o da frente (Standard) e caro mas rapido, o do fundo (Glacier) e barato mas demora pra pegar. Guardar tudo no armario caro e desperdicio."},
      en:{tech:"S3 has multiple classes (Standard, IA, Glacier, Deep Archive) with different prices. Using the right class for each access pattern optimizes costs. S3 Lifecycle policies can automate transitions.",simple:"It's like having cabinets with different prices: the front one (Standard) is expensive but fast, the back one (Glacier) is cheap but slow to access. Keeping everything in the expensive cabinet is wasteful."}}},
{en:"What does the AWS Well-Architected Framework's Reliability pillar focus on?",
 pt:"No que o pilar de Confiabilidade do AWS Well-Architected Framework se concentra?",
 o:{en:["Protecting data and systems from unauthorized access","Recovering from failures and meeting demand","Reducing costs through right-sizing","Monitoring and improving operational processes"],
    pt:["Proteger dados e sistemas contra acesso nao autorizado","Recuperar-se de falhas e atender a demanda","Reduzir custos atraves do dimensionamento correto","Monitorar e melhorar processos operacionais"]},a:[1],
 exp:{pt:{tech:"O pilar Reliability foca na capacidade do sistema de se recuperar de falhas, escalar dinamicamente e mitigar disruptcoes. Inclui design para falha, backups e testes de recuperacao.",simple:"Confiabilidade e como um hospital: tem que funcionar 24h, ter plano pra emergencias, e se algo quebrar, voltar ao normal o mais rapido possivel. Nunca pode parar."},
      en:{tech:"The Reliability pillar focuses on the system's ability to recover from failures, dynamically scale, and mitigate disruptions. It includes design for failure, backups, and recovery testing.",simple:"Reliability is like a hospital: it must run 24/7, have plans for emergencies, and if something breaks, get back to normal as fast as possible. It can never stop."}}},
{en:"Which of the following AWS services provides managed relational database with automated backups?",
 pt:"Qual dos seguintes servicos AWS fornece banco de dados relacional gerenciado com backups automatizados?",
 o:{en:["A MySQL database installed on an EC2 instance","Amazon Aurora","Amazon DynamoDB","Amazon Neptune"],
    pt:["Um banco MySQL instalado numa instancia EC2","Amazon Aurora","Amazon DynamoDB","Amazon Neptune"]},a:[1],
 exp:{pt:{tech:"O Amazon Aurora e um banco relacional gerenciado compativel com MySQL/PostgreSQL que inclui backups automatizados, replicacao Multi-AZ e recuperacao point-in-time. EC2 com MySQL e nao-gerenciado.",simple:"Aurora e como contratar um DBA 24h que faz backups, monitora e conserta tudo sozinho. MySQL no EC2 e como instalar o banco e ter que cuidar de tudo voce mesmo."},
      en:{tech:"Amazon Aurora is a managed relational database compatible with MySQL/PostgreSQL that includes automated backups, Multi-AZ replication, and point-in-time recovery. EC2 with MySQL is unmanaged.",simple:"Aurora is like hiring a 24/7 DBA who handles backups, monitoring, and fixes everything automatically. MySQL on EC2 is like installing the database and having to manage everything yourself."}}},
{en:"Which AWS service helps you manage infrastructure as code?",
 pt:"Qual servico AWS ajuda a gerenciar infraestrutura como codigo?",
 o:{en:["AWS CloudFormation","AWS Config","Amazon SES","Amazon EMR"],
    pt:["AWS CloudFormation","AWS Config","Amazon SES","Amazon EMR"]},a:[0],
 exp:{pt:{tech:"O AWS CloudFormation permite definir e provisionar toda a infraestrutura AWS usando templates JSON ou YAML. Voce versiona, replica e destrói ambientes inteiros com um comando.",simple:"CloudFormation e como uma planta de engenharia digital — em vez de construir tijolo por tijolo (criando recursos manualmente), voce entrega a planta e a AWS constroi tudo automaticamente."},
      en:{tech:"AWS CloudFormation lets you define and provision all AWS infrastructure using JSON or YAML templates. You version, replicate, and destroy entire environments with one command.",simple:"CloudFormation is like a digital engineering blueprint — instead of building brick by brick (creating resources manually), you hand over the blueprint and AWS builds everything automatically."}}},
{en:"Under the shared responsibility model, what is the responsibility of AWS?",
 pt:"No modelo de responsabilidade compartilhada, o que e responsabilidade da AWS?",
 o:{en:["Client-side encryption","Configuring infrastructure devices","Server-side encryption","Filtering traffic with Security Groups"],
    pt:["Criptografia do lado do cliente","Configurar dispositivos de infraestrutura","Criptografia do lado do servidor","Filtrar trafego com Security Groups"]},a:[1],
 exp:{pt:{tech:"A AWS e responsavel por configurar e manter os dispositivos de infraestrutura fisica (switches, roteadores, firewalls de rede). O cliente configura Security Groups, criptografia e seus dados.",simple:"A AWS cuida do 'encanamento e eletrica do predio' (infraestrutura fisica). Voce cuida das trancas do seu apartamento (Security Groups) e do conteudo das suas gavetas (criptografia dos dados)."},
      en:{tech:"AWS is responsible for configuring and maintaining physical infrastructure devices (switches, routers, network firewalls). The customer configures Security Groups, encryption, and their data.",simple:"AWS takes care of the 'plumbing and electrical of the building' (physical infrastructure). You take care of your apartment's locks (Security Groups) and the contents of your drawers (data encryption)."}}},
{en:"What does AWS Health Dashboard provide? (Choose TWO)",
 pt:"O que o AWS Health Dashboard fornece? (Escolha DOIS)",
 o:{en:["Detailed troubleshooting guidance for AWS events","Health checks for Auto Scaling instances","Recommendations for Cost Optimization","Dashboard detailing application vulnerabilities","Personalized view of AWS service health"],
    pt:["Orientacao detalhada para solucao de problemas de eventos AWS","Verificacoes de saude para instancias Auto Scaling","Recomendacoes de Otimizacao de Custos","Dashboard detalhando vulnerabilidades de aplicacoes","Visao personalizada da saude dos servicos AWS"]},a:[0,4],multi:true,
 exp:{pt:{tech:"O AWS Health Dashboard oferece uma visao personalizada de eventos que afetam sua conta e orientacoes de troubleshooting. Diferente do Service Health Dashboard (publico), ele e especifico para voce.",simple:"Health Dashboard e como o app do plano de saude que mostra alertas personalizados sobre SEUS exames. Nao e um boletim geral — e especifico pra sua conta, com dicas de como resolver cada problema."},
      en:{tech:"AWS Health Dashboard provides a personalized view of events affecting your account and troubleshooting guidance. Unlike the Service Health Dashboard (public), it's specific to you.",simple:"Health Dashboard is like a health plan app that shows personalized alerts about YOUR checkups. It's not a general bulletin — it's specific to your account, with tips on how to fix each issue."}}},
{en:"Which AWS service monitors performance of EC2 instances for troubleshooting?",
 pt:"Qual servico AWS monitora a performance de instancias EC2 para troubleshooting?",
 o:{en:["AWS Lambda","AWS Config","Amazon CloudWatch","AWS CloudTrail"],
    pt:["AWS Lambda","AWS Config","Amazon CloudWatch","AWS CloudTrail"]},a:[2],
 exp:{pt:{tech:"O Amazon CloudWatch coleta metricas (CPU, rede, disco), logs e eventos de recursos AWS. Permite criar alarmes, dashboards e acionar acoes automaticas baseadas em thresholds.",simple:"CloudWatch e como o painel de instrumentos do carro — mostra velocidade (CPU), nivel de combustivel (memoria), temperatura (performance). Se algo sai do normal, acende a luz de alerta."},
      en:{tech:"Amazon CloudWatch collects metrics (CPU, network, disk), logs, and events from AWS resources. It lets you create alarms, dashboards, and trigger automated actions based on thresholds.",simple:"CloudWatch is like a car's dashboard — shows speed (CPU), fuel level (memory), temperature (performance). If something goes abnormal, the warning light turns on."}}},
{en:"What are TWO examples of AWS shared controls?",
 pt:"Quais sao DOIS exemplos de controles compartilhados da AWS? (Escolha DOIS)",
 o:{en:["Patch Management","IAM Management","VPC Management","Configuration Management","Data Center operations"],
    pt:["Gerenciamento de Patches","Gerenciamento IAM","Gerenciamento de VPC","Gerenciamento de Configuracao","Operacoes de Data Center"]},a:[0,3],multi:true,
 exp:{pt:{tech:"Controles compartilhados sao responsabilidades que tanto a AWS quanto o cliente gerenciam, mas em diferentes contextos. Patch Management: AWS atualiza infraestrutura, cliente atualiza SO/apps. Configuration Management: ambos gerenciam configs em suas respectivas camadas.",simple:"Patch e Config Management sao como limpeza de um shopping: o shopping limpa as areas comuns (AWS), voce limpa sua loja (cliente). Ambos fazem a mesma atividade, mas cada um no seu espaco."},
      en:{tech:"Shared controls are responsibilities both AWS and the customer manage, but in different contexts. Patch Management: AWS patches infrastructure, customer patches OS/apps. Configuration Management: both manage configs in their respective layers.",simple:"Patch and Config Management are like cleaning a mall: the mall cleans common areas (AWS), you clean your store (customer). Both do the same activity, but each in their own space."}}},
,
{en:"Which of the following is NOT correct regarding Amazon EC2 On-demand instances?",pt:"Qual das alternativas a seguir NAO esta correta sobre instancias EC2 On-Demand?",o:{en:["You have to pay a start-up fee when launching a new instance","The on-demand instances follow the AWS pay-as-you-go pricing model","No longer-term commitments or upfront payments are needed","You are charged per second based on an hourly rate"],pt:["Voce precisa pagar uma taxa inicial ao lancar uma nova instancia","As instancias on-demand seguem o modelo de precificacao pay-as-you-go da AWS","Nao sao necessarios compromissos de longo prazo ou pagamentos antecipados","Voce e cobrado por segundo com base em uma taxa por hora"]},a:[0],exp:{pt:{tech:"EC2 On-Demand nao cobra taxa inicial. Voce paga apenas pelo uso sem compromissos.",simple:"On-Demand e como luz eletrica — sem taxa de instalacao, paga so o que consome."},en:{tech:"EC2 On-Demand instances have no start-up fees. You pay only for compute time with no long-term commitments.",simple:"On-Demand is like your electricity bill — no installation fee, you just pay for what you use."}}},
{en:"Which AWS service provides up to 5x the performance of standard MySQL?",pt:"Qual servico da AWS oferece ate 5x a performance do MySQL padrao?",o:{en:["Amazon Aurora","Amazon Redshift","Amazon DynamoDB","Amazon Neptune"],pt:["Amazon Aurora","Amazon Redshift","Amazon DynamoDB","Amazon Neptune"]},a:[0],exp:{pt:{tech:"Amazon Aurora oferece ate 5x a performance do MySQL padrao e 3x do PostgreSQL, com armazenamento auto-escalavel.",simple:"Aurora e um MySQL turbinado — faz a mesma coisa, so que 5x mais rapido e cresce sozinho."},en:{tech:"Amazon Aurora delivers up to 5x the throughput of standard MySQL and 3x of PostgreSQL with auto-scaling storage.",simple:"Aurora is like a supercharged MySQL engine — same interface, but 5x faster and it grows on its own."}}},
{en:"To transfer 60 petabytes of data to Amazon S3, which service should you use?",pt:"Para transferir 60 petabytes de dados para o Amazon S3, qual servico voce deve usar?",o:{en:["AWS Snowball","S3 Transfer Acceleration","AWS Snowmobile","Amazon VPC"],pt:["AWS Snowball","S3 Transfer Acceleration","AWS Snowmobile","Amazon VPC"]},a:[2],exp:{pt:{tech:"AWS Snowmobile e um caminhao com container de dados para transferencias em escala de exabytes. Snowball suporta ate petabytes.",simple:"Snowball e uma mala de dados. Snowmobile e um caminhao inteiro. Para 60 petabytes, voce precisa do caminhao."},en:{tech:"AWS Snowmobile is a 45-foot shipping container truck for exabyte-scale transfers. Snowball handles up to petabytes.",simple:"Snowball is a suitcase for data. Snowmobile is an entire truck. For 60 petabytes, you need the truck."}}},
{en:"Which AWS support plan includes a Concierge Support Team?",pt:"Qual plano de suporte da AWS inclui o time de Concierge?",o:{en:["Premium Support","Business Support","Enterprise Support","Standard Support"],pt:["Premium Support","Business Support","Enterprise Support","Standard Support"]},a:[2],exp:{pt:{tech:"O Concierge Support Team e exclusivo do plano Enterprise e ajuda com questoes de faturamento e conta.",simple:"Concierge e como um mordomo pessoal para sua conta AWS — so disponivel no plano mais premium (Enterprise)."},en:{tech:"The Concierge Support Team is exclusive to the Enterprise plan and assists with billing and account inquiries.",simple:"The Concierge team is like a personal butler for your AWS account — only available on the top-tier Enterprise plan."}}},
{en:"Which AWS service tracks API call history for resource changes?",pt:"Qual servico da AWS rastreia o historico de chamadas de API para alteracoes em recursos?",o:{en:["AWS Config","Amazon CloudWatch","AWS CloudTrail","AWS CloudFormation"],pt:["AWS Config","Amazon CloudWatch","AWS CloudTrail","AWS CloudFormation"]},a:[2],exp:{pt:{tech:"AWS CloudTrail registra todas as chamadas de API feitas na conta, incluindo quem fez, quando e de onde.",simple:"CloudTrail e como uma camera de seguranca que grava tudo que acontece na sua conta AWS — quem mexeu e quando."},en:{tech:"AWS CloudTrail records all API calls made in your account, including who made them, when, and from where.",simple:"CloudTrail is like a security camera that records everything happening in your AWS account — who did what and when."}}},
{en:"What are the benefits of AWS-managed services? (Choose TWO)",pt:"Quais sao os beneficios dos servicos gerenciados pela AWS? (Escolha DUAS)",o:{en:["Complete control over virtual infrastructure","Deliver new solutions faster","Lower operational complexity","Eliminate encryption needs","Control all patching activities"],pt:["Controle total sobre a infraestrutura virtual","Entregar novas solucoes mais rapido","Menor complexidade operacional","Eliminar a necessidade de criptografia","Controlar todas as atividades de patching"]},a:[1,2],multi:true,exp:{pt:{tech:"Servicos gerenciados reduzem a complexidade operacional e aceleram a entrega, pois a AWS cuida da infraestrutura subjacente.",simple:"Servico gerenciado e como morar em apartamento com condominio — alguem cuida da manutencao e voce foca no que importa."},en:{tech:"Managed services reduce operational complexity and speed up delivery since AWS handles the underlying infrastructure.",simple:"Managed services are like living in a serviced apartment — someone else handles maintenance so you focus on what matters."}}},
{en:"Which of the following are valid Amazon S3 use cases? (Choose TWO)",pt:"Quais dos seguintes sao casos de uso validos do Amazon S3? (Escolha DUAS)",o:{en:["Hosting static websites","Hosting sites requiring sustained high CPU utilization","Cost-effective database and log storage","Media store for Amazon CloudFront","Processing data streams at any scale"],pt:["Hospedagem de sites estaticos","Hospedagem de sites que exigem alta utilizacao continua de CPU","Armazenamento economico de banco de dados e logs","Armazenamento de midia para o Amazon CloudFront","Processamento de fluxos de dados em qualquer escala"]},a:[0,3],multi:true,exp:{pt:{tech:"S3 e ideal para hospedagem de sites estaticos e como origem de conteudo para o CloudFront (CDN da AWS).",simple:"S3 e como um armario gigante na nuvem — otimo para guardar arquivos e servir sites simples, mas nao roda programas."},en:{tech:"S3 is ideal for static website hosting and as a content origin for CloudFront (AWS CDN).",simple:"S3 is like a giant cloud storage locker — great for storing files and serving simple websites, but it does not run programs."}}},
{en:"What is the best practice for managing AWS access keys?",pt:"Qual e a melhor pratica para gerenciar chaves de acesso da AWS?",o:{en:["Delete all access keys and use only passwords","Share keys only with trusted people","Rotate access keys regularly","Save access keys in application code"],pt:["Deletar todas as chaves de acesso e usar apenas senhas","Compartilhar chaves apenas com pessoas confiaveis","Rotacionar as chaves de acesso regularmente","Salvar as chaves de acesso no codigo da aplicacao"]},a:[2],exp:{pt:{tech:"A AWS recomenda rotacionar chaves de acesso regularmente para minimizar o risco de comprometimento.",simple:"Trocar as chaves regularmente e como trocar a senha do Wi-Fi de tempos em tempos — evita que alguem use sem voce saber."},en:{tech:"AWS recommends rotating access keys regularly to minimize the risk of compromised credentials.",simple:"Rotating keys regularly is like changing your Wi-Fi password periodically — it prevents unauthorized use."}}},
{en:"What benefit does programmatic API access to AWS provide?",pt:"Qual beneficio o acesso programatico via API oferece na AWS?",o:{en:["Improves resource performance","Reduces provisioning time","Reduces developer count needed","Enables programmatic management of resources"],pt:["Melhora a performance dos recursos","Reduz o tempo de provisionamento","Reduz o numero de desenvolvedores necessarios","Permite o gerenciamento programatico dos recursos"]},a:[3],exp:{pt:{tech:"O acesso via API permite automatizar e gerenciar recursos AWS por meio de codigo, CLI ou SDKs.",simple:"API e como um controle remoto para a AWS — em vez de clicar em botoes, voce manda comandos por codigo."},en:{tech:"API access allows you to automate and manage AWS resources through code, CLI, or SDKs.",simple:"The API is like a remote control for AWS — instead of clicking buttons, you send commands through code."}}},
{en:"Which AWS service is best suited for a database with high read/write activity?",pt:"Qual servico da AWS e mais adequado para um banco de dados com alta atividade de leitura/escrita?",o:{en:["AWS Storage Gateway","Amazon S3","Amazon EBS","Amazon Glacier"],pt:["AWS Storage Gateway","Amazon S3","Amazon EBS","Amazon Glacier"]},a:[2],exp:{pt:{tech:"Amazon EBS fornece armazenamento em bloco de alta performance para instancias EC2, ideal para bancos de dados com alto I/O.",simple:"EBS e como um SSD conectado direto ao seu servidor — rapido o suficiente para bancos de dados que leem e escrevem o tempo todo."},en:{tech:"Amazon EBS provides high-performance block storage for EC2 instances, ideal for databases with high I/O demands.",simple:"EBS is like an SSD directly attached to your server — fast enough for databases that read and write constantly."}}},
{en:"After migrating from EC2 to Lambda, which responsibilities does AWS assume? (Choose TWO)",pt:"Ao migrar do EC2 para o Lambda, quais responsabilidades passam para a AWS? (Escolha DUAS)",o:{en:["Application management","Capacity management","Access control","Operating system maintenance","Data management"],pt:["Gerenciamento da aplicacao","Gerenciamento de capacidade","Controle de acesso","Manutencao do sistema operacional","Gerenciamento de dados"]},a:[1,3],multi:true,exp:{pt:{tech:"Com Lambda (serverless), a AWS gerencia capacidade e sistema operacional. O cliente cuida da aplicacao, acesso e dados.",simple:"Lambda e como um taxi — voce nao se preocupa com gasolina nem manutencao do carro, so diz pra onde quer ir."},en:{tech:"With Lambda (serverless), AWS manages capacity and OS maintenance. The customer handles application, access, and data.",simple:"Lambda is like a taxi — you do not worry about fuel or car maintenance, you just say where you want to go."}}},
{en:"What does the Elastic Load Balancer do to improve application reliability?",pt:"O que o Elastic Load Balancer faz para melhorar a confiabilidade da aplicacao?",o:{en:["Distributing traffic across S3 buckets","Replicating data to multiple Availability Zones","Creating database Read Replicas","Ensuring only healthy targets receive traffic"],pt:["Distribuir trafego entre buckets do S3","Replicar dados para multiplas Zonas de Disponibilidade","Criar Replicas de Leitura do banco de dados","Garantir que apenas alvos saudaveis recebam trafego"]},a:[3],exp:{pt:{tech:"O ELB faz health checks nos alvos e roteia trafego apenas para instancias saudaveis, melhorando a disponibilidade.",simple:"ELB e como um garcom esperto — so manda clientes para mesas que estao funcionando, nunca para as quebradas."},en:{tech:"ELB performs health checks on targets and routes traffic only to healthy instances, improving availability.",simple:"ELB is like a smart host at a restaurant — it only seats guests at tables that are working, never at broken ones."}}},
{en:"Which EC2 pricing option ensures hardware is not shared with other customers?",pt:"Qual opcao de precificacao do EC2 garante que o hardware nao seja compartilhado com outros clientes?",o:{en:["On-demand instances","Spot instances","Dedicated instances","Reserved instances"],pt:["Instancias On-Demand","Instancias Spot","Instancias Dedicadas","Instancias Reservadas"]},a:[2],exp:{pt:{tech:"Dedicated Instances rodam em hardware fisicamente isolado, dedicado a um unico cliente AWS.",simple:"Dedicated Instance e como alugar uma casa inteira em vez de um quarto em hotel — o espaco e so seu."},en:{tech:"Dedicated Instances run on physically isolated hardware dedicated to a single AWS customer.",simple:"A Dedicated Instance is like renting an entire house instead of a hotel room — the space is exclusively yours."}}},
{en:"Which is the most cost-effective storage option for archiving data for 5 years?",pt:"Qual e a opcao de armazenamento mais economica para arquivar dados por 5 anos?",o:{en:["Amazon S3 Glacier","Amazon EFS","Amazon S3 Standard","Amazon EBS"],pt:["Amazon S3 Glacier","Amazon EFS","Amazon S3 Standard","Amazon EBS"]},a:[0],exp:{pt:{tech:"S3 Glacier oferece armazenamento de custo muito baixo para dados de arquivo com acesso raro, ideal para retencao de longo prazo.",simple:"Glacier e como um deposito barato para guardar caixas que voce quase nunca abre — perfeito para arquivos de anos."},en:{tech:"S3 Glacier provides very low-cost storage for archival data with infrequent access, ideal for long-term retention.",simple:"Glacier is like a cheap storage unit for boxes you rarely open — perfect for years-old archives."}}},
{en:"Which AWS service is used for managing user permissions?",pt:"Qual servico da AWS e usado para gerenciar permissoes de usuarios?",o:{en:["Security Groups","Amazon ECS","AWS IAM","AWS Support"],pt:["Security Groups","Amazon ECS","AWS IAM","AWS Support"]},a:[2],exp:{pt:{tech:"AWS IAM (Identity and Access Management) permite criar e gerenciar usuarios, grupos e permissoes de acesso aos recursos.",simple:"IAM e como o seguranca do predio — decide quem entra, onde pode ir e o que pode fazer."},en:{tech:"AWS IAM (Identity and Access Management) lets you create and manage users, groups, and access permissions to resources.",simple:"IAM is like the building security guard — it decides who gets in, where they can go, and what they can do."}}},
{en:"Which design principle helps minimize the impact of outages?",pt:"Qual principio de design ajuda a minimizar o impacto de interrupcoes?",o:{en:["Least Privilege","Pilot Light","Fault Tolerance","Multi-threading"],pt:["Menor Privilegio","Pilot Light","Tolerancia a Falhas","Multi-threading"]},a:[2],exp:{pt:{tech:"Fault Tolerance garante que o sistema continue operando mesmo quando componentes falham, usando redundancia.",simple:"Tolerancia a falhas e como ter um gerador em casa — se a luz cai, tudo continua funcionando."},en:{tech:"Fault Tolerance ensures the system continues operating even when components fail, through redundancy.",simple:"Fault Tolerance is like having a backup generator at home — if the power goes out, everything keeps running."}}},
{en:"Which Reserved Instance payment option provides the largest discount?",pt:"Qual opcao de pagamento de Instancia Reservada oferece o maior desconto?",o:{en:["All up-front","All options provide the same discount","Partial up-front","No up-front"],pt:["Tudo antecipado","Todas as opcoes oferecem o mesmo desconto","Parcialmente antecipado","Sem pagamento antecipado"]},a:[0],exp:{pt:{tech:"O pagamento All Upfront de Reserved Instances oferece o maior desconto (ate 72%) comparado a Partial ou No Upfront.",simple:"Pagar tudo de uma vez e como comprar a vista — quanto mais voce paga adiantado, maior o desconto."},en:{tech:"All Upfront payment for Reserved Instances offers the highest discount (up to 72%) compared to Partial or No Upfront.",simple:"Paying everything upfront is like buying in cash — the more you pay in advance, the bigger your discount."}}},
{en:"Which of the following are AWS data protection features? (Choose TWO)",pt:"Quais das alternativas a seguir sao recursos de protecao de dados da AWS? (Escolha DUAS)",o:{en:["Access control","Physical MFA devices","Data encryption","Unlimited storage","Load balancing"],pt:["Controle de acesso","Dispositivos MFA fisicos","Criptografia de dados","Armazenamento ilimitado","Balanceamento de carga"]},a:[0,2],multi:true,exp:{pt:{tech:"Controle de acesso (IAM) e criptografia (em repouso e em transito) sao os principais mecanismos de protecao de dados na AWS.",simple:"Proteger dados e como proteger uma casa — voce tranca a porta (controle de acesso) e guarda coisas no cofre (criptografia)."},en:{tech:"Access control (IAM) and encryption (at rest and in transit) are the primary data protection mechanisms in AWS.",simple:"Protecting data is like protecting a house — you lock the door (access control) and keep valuables in a safe (encryption)."}}},
{en:"Which IAM entity should be used to grant temporary access to AWS resources?",pt:"Qual entidade do IAM deve ser usada para conceder acesso temporario aos recursos da AWS?",o:{en:["IAM Users","Key Pair","IAM Roles","IAM Groups"],pt:["Usuarios IAM","Par de Chaves","Funcoes IAM (Roles)","Grupos IAM"]},a:[2],exp:{pt:{tech:"IAM Roles fornecem credenciais temporarias que sao rotacionadas automaticamente, ideais para acesso temporario.",simple:"IAM Role e como um cracha de visitante — da acesso temporario e expira automaticamente."},en:{tech:"IAM Roles provide temporary credentials that are automatically rotated, ideal for granting temporary access.",simple:"An IAM Role is like a visitor badge — it grants temporary access and expires automatically."}}},
{en:"Which AWS service distributes incoming traffic across multiple EC2 instances?",pt:"Qual servico da AWS distribui o trafego de entrada entre varias instancias EC2?",o:{en:["AWS Global Accelerator","AWS Application Load Balancer","Amazon CloudFront","Transit VPC"],pt:["AWS Global Accelerator","AWS Application Load Balancer","Amazon CloudFront","Transit VPC"]},a:[1],exp:{pt:{tech:"O Application Load Balancer (ALB) opera na camada 7 e distribui trafego HTTP/HTTPS entre instancias EC2.",simple:"ALB e como um recepcionista que distribui clientes entre varios atendentes para ninguem ficar sobrecarregado."},en:{tech:"The Application Load Balancer (ALB) operates at layer 7 and distributes HTTP/HTTPS traffic across EC2 instances.",simple:"ALB is like a receptionist distributing customers among multiple service agents so no one gets overwhelmed."}}},
{en:"Which option helps secure an AWS account from unauthorized access?",pt:"Qual opcao ajuda a proteger uma conta AWS contra acesso nao autorizado?",o:{en:["Restrict all SDK and CLI API calls","Share IAM accounts organized by department","Require MFA for all IAM User access","Set up two different login passwords"],pt:["Restringir todas as chamadas de API do SDK e CLI","Compartilhar contas IAM organizadas por departamento","Exigir MFA para todo acesso de usuarios IAM","Configurar duas senhas de login diferentes"]},a:[2],exp:{pt:{tech:"MFA adiciona uma camada extra de seguranca exigindo um segundo fator alem da senha para autenticacao.",simple:"MFA e como ter duas fechaduras na porta — mesmo que alguem descubra sua senha, precisa do segundo codigo."},en:{tech:"MFA adds an extra security layer by requiring a second factor beyond the password for authentication.",simple:"MFA is like having two locks on your door — even if someone discovers your password, they need the second code."}}},
{en:"Which AWS service offers volume-based discounts as usage increases?",pt:"Qual servico da AWS oferece descontos baseados em volume conforme o uso aumenta?",o:{en:["Amazon VPC","Amazon S3","Amazon Lightsail","AWS Cost Explorer"],pt:["Amazon VPC","Amazon S3","Amazon Lightsail","AWS Cost Explorer"]},a:[1],exp:{pt:{tech:"O Amazon S3 usa precificacao em camadas — quanto mais dados voce armazena, menor o custo por GB.",simple:"S3 e como comprar no atacado — quanto mais voce guarda, mais barato fica o preco por unidade."},en:{tech:"Amazon S3 uses tiered pricing — the more data you store, the lower the cost per GB.",simple:"S3 is like buying wholesale — the more you store, the cheaper the price per unit."}}},
{en:"Which factors should be considered when choosing an AWS Region for deployment? (Choose TWO)",pt:"Quais fatores devem ser considerados ao escolher uma Regiao AWS para implantacao? (Escolha DUAS)",o:{en:["The security level of the region","Data sovereignty and compliance requirements","Cost of services in the region","Number of available VPCs","Geographic proximity to users"],pt:["O nivel de seguranca da regiao","Requisitos de soberania de dados e conformidade","Custo dos servicos na regiao","Numero de VPCs disponiveis","Proximidade geografica dos usuarios"]},a:[1,2],multi:true,exp:{pt:{tech:"A escolha de regiao deve considerar conformidade com leis de dados locais e custo, que varia entre regioes.",simple:"Escolher uma regiao AWS e como escolher onde abrir uma loja — voce pensa nas leis locais e no custo do aluguel."},en:{tech:"Region selection should consider compliance with local data laws and cost, which varies between regions.",simple:"Choosing an AWS Region is like choosing where to open a store — you think about local laws and rental costs."}}},
{en:"Which AWS service provides in-memory caching to improve MySQL database performance?",pt:"Qual servico da AWS fornece cache em memoria para melhorar a performance de bancos MySQL?",o:{en:["Amazon EFS","Amazon Neptune","Amazon ElastiCache","Amazon DAX"],pt:["Amazon EFS","Amazon Neptune","Amazon ElastiCache","Amazon DAX"]},a:[2],exp:{pt:{tech:"Amazon ElastiCache suporta Redis e Memcached para cache em memoria, reduzindo a carga em bancos relacionais como MySQL.",simple:"ElastiCache e como uma mesa de apoio perto de voce com as coisas que voce mais usa — evita ir ate o armario toda hora."},en:{tech:"Amazon ElastiCache supports Redis and Memcached for in-memory caching, reducing load on relational databases like MySQL.",simple:"ElastiCache is like a side table with your most-used items — it saves you from going to the cabinet every time."}}},
{en:"Which are the customer responsibilities for security IN the cloud? (Choose TWO)",pt:"Quais sao as responsabilidades do cliente pela seguranca NA nuvem? (Escolha DUAS)",o:{en:["Building the application schema","Replacing faulty physical hardware","Creating the hypervisor","Patch management of underlying infrastructure","File system encryption"],pt:["Construir o esquema da aplicacao","Substituir hardware fisico com defeito","Criar o hypervisor","Gerenciamento de patches da infraestrutura subjacente","Criptografia do sistema de arquivos"]},a:[0,4],multi:true,exp:{pt:{tech:"No modelo de responsabilidade compartilhada, o cliente cuida dos dados, aplicacao, criptografia e configuracao de acesso.",simple:"Seguranca na nuvem e como alugar um escritorio — o predio cuida das paredes, mas voce tranca sua sala e protege seus documentos."},en:{tech:"In the shared responsibility model, the customer handles data, application, encryption, and access configuration.",simple:"Cloud security is like renting an office — the building maintains the walls, but you lock your room and protect your documents."}}},
{en:"Which AWS service enables quick deployment of .NET applications?",pt:"Qual servico da AWS permite implantar aplicacoes .NET rapidamente?",o:{en:["Amazon SNS","AWS Elastic Beanstalk","AWS Systems Manager","AWS Trusted Advisor"],pt:["Amazon SNS","AWS Elastic Beanstalk","AWS Systems Manager","AWS Trusted Advisor"]},a:[1],exp:{pt:{tech:"Elastic Beanstalk faz deploy automatico de aplicacoes .NET, Java, Node.js e outras, gerenciando a infraestrutura.",simple:"Beanstalk e como um garcom automatico — voce entrega o prato pronto (codigo) e ele serve na mesa (infraestrutura) sozinho."},en:{tech:"Elastic Beanstalk automatically deploys .NET, Java, Node.js and other applications, managing the underlying infrastructure.",simple:"Beanstalk is like an automatic waiter — you hand over the dish (code) and it serves it at the table (infrastructure) by itself."}}},
{en:"Which AWS service extends on-premises storage to the AWS Cloud?",pt:"Qual servico da AWS estende o armazenamento local para a nuvem AWS?",o:{en:["AWS Data Pipeline","AWS Storage Gateway","Amazon Aurora","Amazon EFS"],pt:["AWS Data Pipeline","AWS Storage Gateway","Amazon Aurora","Amazon EFS"]},a:[1],exp:{pt:{tech:"AWS Storage Gateway conecta ambientes on-premises ao armazenamento em nuvem da AWS de forma transparente.",simple:"Storage Gateway e como uma ponte entre seu armario em casa e um deposito na nuvem — voce usa os dois como se fossem um so."},en:{tech:"AWS Storage Gateway seamlessly connects on-premises environments to AWS cloud storage.",simple:"Storage Gateway is like a bridge between your home closet and a cloud warehouse — you use both as if they were one."}}},
{en:"Which AWS service provides access logs and records for auditing purposes?",pt:"Qual servico da AWS fornece logs de acesso e registros para fins de auditoria?",o:{en:["AWS CloudTrail","Amazon CloudFront","AWS CloudFormation","Amazon CloudWatch"],pt:["AWS CloudTrail","Amazon CloudFront","AWS CloudFormation","Amazon CloudWatch"]},a:[0],exp:{pt:{tech:"AWS CloudTrail registra todas as acoes realizadas na conta AWS, essencial para auditorias e investigacoes de seguranca.",simple:"CloudTrail e como o livro de registro de um porteiro — anota quem entrou, o que fez e quando saiu."},en:{tech:"AWS CloudTrail records all actions performed in the AWS account, essential for audits and security investigations.",simple:"CloudTrail is like a doorman logbook — it writes down who entered, what they did, and when they left."}}},
{en:"What is the best practice for building highly available applications on AWS?",pt:"Qual e a melhor pratica para construir aplicacoes de alta disponibilidade na AWS?",o:{en:["Deploy to at least two Availability Zones","Use Elastic Load Balancing across multiple Regions","Deploy code on two servers in the same Availability Zone","Rewrite the application code to handle all requests"],pt:["Implantar em pelo menos duas Zonas de Disponibilidade","Usar Elastic Load Balancing entre multiplas Regioes","Implantar codigo em dois servidores na mesma Zona de Disponibilidade","Reescrever o codigo da aplicacao para lidar com todas as requisicoes"]},a:[0],exp:{pt:{tech:"Implantar em pelo menos duas AZs garante que a aplicacao continue disponivel mesmo se uma AZ falhar.",simple:"Usar duas AZs e como ter dois geradores — se um falha, o outro assume e ninguem fica no escuro."},en:{tech:"Deploying to at least two AZs ensures the application remains available even if one AZ fails.",simple:"Using two AZs is like having two generators — if one fails, the other takes over and nobody loses power."}}},
{en:"Which factors should be considered in a Total Cost of Ownership (TCO) analysis? (Choose TWO)",pt:"Quais fatores devem ser considerados em uma analise de Custo Total de Propriedade (TCO)? (Escolha DUAS)",o:{en:["Labor costs and IT overhead","Cooling and power consumption","Amazon EBS computing power","Software architecture design","Software compatibility testing"],pt:["Custos de mao de obra e overhead de TI","Custos de refrigeracao e consumo de energia","Poder computacional do Amazon EBS","Design de arquitetura de software","Testes de compatibilidade de software"]},a:[0,1],multi:true,exp:{pt:{tech:"TCO inclui custos de mao de obra, energia, refrigeracao, espaco fisico e hardware — custos que a nuvem elimina ou reduz.",simple:"TCO e como calcular o custo real de ter um carro — nao e so a gasolina, tem seguro, manutencao, estacionamento..."},en:{tech:"TCO includes labor, power, cooling, physical space, and hardware costs — costs that the cloud eliminates or reduces.",simple:"TCO is like calculating the real cost of owning a car — it is not just gas, there is insurance, maintenance, parking..."}}},
{en:"Which support plan is required for a response time of less than 15 minutes for critical issues?",pt:"Qual plano de suporte e necessario para um tempo de resposta inferior a 15 minutos em problemas criticos?",o:{en:["AWS Basic Support","AWS Developer Support","AWS Business Support","AWS Enterprise Support"],pt:["AWS Basic Support","AWS Developer Support","AWS Business Support","AWS Enterprise Support"]},a:[3],exp:{pt:{tech:"O plano Enterprise oferece tempo de resposta inferior a 15 minutos para casos criticos de negocio.",simple:"Enterprise e como ter um medico de plantao 24h — para emergencias graves, o atendimento e quase imediato."},en:{tech:"The Enterprise plan offers a response time of less than 15 minutes for business-critical cases.",simple:"Enterprise is like having a doctor on call 24/7 — for critical emergencies, the response is almost immediate."}}},
{en:"Which of the following are serverless AWS offerings? (Choose TWO)",pt:"Quais das alternativas a seguir sao ofertas serverless da AWS? (Escolha DUAS)",o:{en:["Amazon EC2","AWS Lambda","Amazon DynamoDB","Amazon EMR","Amazon RDS"],pt:["Amazon EC2","AWS Lambda","Amazon DynamoDB","Amazon EMR","Amazon RDS"]},a:[1,2],multi:true,exp:{pt:{tech:"Lambda e DynamoDB sao serverless — nao exigem gerenciamento de servidores. EC2, EMR e RDS exigem.",simple:"Serverless e como pedir comida por delivery — voce nao precisa ter cozinha. Lambda e DynamoDB funcionam assim."},en:{tech:"Lambda and DynamoDB are serverless — they require no server management. EC2, EMR, and RDS require it.",simple:"Serverless is like ordering food delivery — you do not need a kitchen. Lambda and DynamoDB work this way."}}},
{en:"Which of the following is NOT correct regarding Amazon EC2 On-demand instances?",pt:"Qual das alternativas a seguir NAO esta correta sobre instancias EC2 On-Demand?",o:{en:["You have to pay a start-up fee when launching a new instance","The on-demand instances follow the AWS pay-as-you-go pricing model","No longer-term commitments or upfront payments are needed","You are charged per second based on an hourly rate"],pt:["Voce precisa pagar uma taxa inicial ao lancar uma nova instancia","As instancias on-demand seguem o modelo de precificacao pay-as-you-go da AWS","Nao sao necessarios compromissos de longo prazo ou pagamentos antecipados","Voce e cobrado por segundo com base em uma taxa por hora"]},a:[0],exp:{pt:{tech:"EC2 On-Demand nao cobra taxa inicial. Voce paga apenas pelo uso sem compromissos.",simple:"On-Demand e como luz eletrica — sem taxa de instalacao, paga so o que consome."},en:{tech:"EC2 On-Demand instances have no start-up fees. You pay only for compute time with no long-term commitments.",simple:"On-Demand is like your electricity bill — no installation fee, you just pay for what you use."}}},
{en:"Which AWS service provides up to 5x the performance of standard MySQL?",pt:"Qual servico da AWS oferece ate 5x a performance do MySQL padrao?",o:{en:["Amazon Aurora","Amazon Redshift","Amazon DynamoDB","Amazon Neptune"],pt:["Amazon Aurora","Amazon Redshift","Amazon DynamoDB","Amazon Neptune"]},a:[0],exp:{pt:{tech:"Amazon Aurora oferece ate 5x a performance do MySQL padrao e 3x do PostgreSQL, com armazenamento auto-escalavel.",simple:"Aurora e um MySQL turbinado — faz a mesma coisa, so que 5x mais rapido e cresce sozinho."},en:{tech:"Amazon Aurora delivers up to 5x the throughput of standard MySQL and 3x of PostgreSQL with auto-scaling storage.",simple:"Aurora is like a supercharged MySQL engine — same interface, but 5x faster and it grows on its own."}}},
{en:"To transfer 60 petabytes of data to Amazon S3, which service should you use?",pt:"Para transferir 60 petabytes de dados para o Amazon S3, qual servico voce deve usar?",o:{en:["AWS Snowball","S3 Transfer Acceleration","AWS Snowmobile","Amazon VPC"],pt:["AWS Snowball","S3 Transfer Acceleration","AWS Snowmobile","Amazon VPC"]},a:[2],exp:{pt:{tech:"AWS Snowmobile e um caminhao com container de dados para transferencias em escala de exabytes. Snowball suporta ate petabytes.",simple:"Snowball e uma mala de dados. Snowmobile e um caminhao inteiro. Para 60 petabytes, voce precisa do caminhao."},en:{tech:"AWS Snowmobile is a 45-foot shipping container truck for exabyte-scale transfers. Snowball handles up to petabytes.",simple:"Snowball is a suitcase for data. Snowmobile is an entire truck. For 60 petabytes, you need the truck."}}},
{en:"Which AWS support plan includes a Concierge Support Team?",pt:"Qual plano de suporte da AWS inclui o time de Concierge?",o:{en:["Premium Support","Business Support","Enterprise Support","Standard Support"],pt:["Premium Support","Business Support","Enterprise Support","Standard Support"]},a:[2],exp:{pt:{tech:"O Concierge Support Team e exclusivo do plano Enterprise e ajuda com questoes de faturamento e conta.",simple:"Concierge e como um mordomo pessoal para sua conta AWS — so disponivel no plano mais premium (Enterprise)."},en:{tech:"The Concierge Support Team is exclusive to the Enterprise plan and assists with billing and account inquiries.",simple:"The Concierge team is like a personal butler for your AWS account — only available on the top-tier Enterprise plan."}}},
{en:"Which AWS service tracks API call history for resource changes?",pt:"Qual servico da AWS rastreia o historico de chamadas de API para alteracoes em recursos?",o:{en:["AWS Config","Amazon CloudWatch","AWS CloudTrail","AWS CloudFormation"],pt:["AWS Config","Amazon CloudWatch","AWS CloudTrail","AWS CloudFormation"]},a:[2],exp:{pt:{tech:"AWS CloudTrail registra todas as chamadas de API feitas na conta, incluindo quem fez, quando e de onde.",simple:"CloudTrail e como uma camera de seguranca que grava tudo que acontece na sua conta AWS — quem mexeu e quando."},en:{tech:"AWS CloudTrail records all API calls made in your account, including who made them, when, and from where.",simple:"CloudTrail is like a security camera that records everything happening in your AWS account — who did what and when."}}},
{en:"What are the benefits of AWS-managed services? (Choose TWO)",pt:"Quais sao os beneficios dos servicos gerenciados pela AWS? (Escolha DUAS)",o:{en:["Complete control over virtual infrastructure","Deliver new solutions faster","Lower operational complexity","Eliminate encryption needs","Control all patching activities"],pt:["Controle total sobre a infraestrutura virtual","Entregar novas solucoes mais rapido","Menor complexidade operacional","Eliminar a necessidade de criptografia","Controlar todas as atividades de patching"]},a:[1,2],multi:true,exp:{pt:{tech:"Servicos gerenciados reduzem a complexidade operacional e aceleram a entrega, pois a AWS cuida da infraestrutura subjacente.",simple:"Servico gerenciado e como morar em apartamento com condominio — alguem cuida da manutencao e voce foca no que importa."},en:{tech:"Managed services reduce operational complexity and speed up delivery since AWS handles the underlying infrastructure.",simple:"Managed services are like living in a serviced apartment — someone else handles maintenance so you focus on what matters."}}},
