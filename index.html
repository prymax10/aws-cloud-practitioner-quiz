{en:"What are the benefits of Amazon DynamoDB? (Choose TWO)",pt:"Quais sao os beneficios do Amazon DynamoDB? (Escolha DUAS)",o:{en:["Automatically scales throughput capacity","Provides resizable instance types","Supports both relational and non-relational data models","Delivers single-digit millisecond latency","Supports CouchDB and MongoDB engines"],pt:["Escala automaticamente a capacidade de throughput","Fornece tipos de instancia redimensionaveis","Suporta modelos de dados relacionais e nao relacionais","Entrega latencia de milissegundos de um digito","Suporta engines CouchDB e MongoDB"]},a:[0,3],multi:true,exp:{pt:{tech:"DynamoDB escala automaticamente o throughput e oferece latencia consistente abaixo de 10ms em qualquer escala.",simple:"O DynamoDB e um banco de dados NoSQL que ajusta automaticamente sua capacidade conforme a demanda e entrega respostas em milissegundos.",avoid:"Nao use o DynamoDB para consultas SQL complexas com muitos joins — ele e otimizado para acesso por chave. Para consultas relacionais complexas, use RDS ou Aurora."},en:{tech:"DynamoDB automatically scales throughput and delivers consistent sub-10ms latency at any scale.",simple:"DynamoDB is a NoSQL database that automatically adjusts its capacity based on demand and delivers responses in single-digit milliseconds.",avoid:"Do not use DynamoDB for complex SQL queries with many joins — it is optimized for key-based access. For complex relational queries, use RDS or Aurora."}}},
{en:"A company wants to ensure that their cloud architecture can automatically recover from component failures without manual intervention. Which pillar of the AWS Well-Architected Framework is MOST relevant?",pt:"Uma empresa quer garantir que sua arquitetura em nuvem possa se recuperar automaticamente de falhas em componentes sem intervenção manual. Qual pilar do AWS Well-Architected Framework é MAIS relevante?",o:{en:["Reliability","Performance Efficiency","Operational Excellence","Security"],pt:["Confiabilidade","Eficiência de Performance","Excelência Operacional","Segurança"]},a:[0],exp:{pt:{tech:"O pilar de Confiabilidade foca na capacidade de um sistema se recuperar de falhas de infraestrutura ou serviço, adquirir dinamicamente recursos computacionais para atender a demanda e mitigar interrupções.",simple:"O pilar de Confiabilidade (Reliability) trata da capacidade de um sistema se recuperar automaticamente de falhas e continuar funcionando sem intervencao humana.",avoid:"Nao confunda Confiabilidade com Resiliencia Operacional — o pilar de Reliability foca em recuperacao automatica de falhas, nao em monitoramento ou melhoria de processos."},en:{tech:"The Reliability pillar focuses on the ability of a system to recover from infrastructure or service disruptions, dynamically acquire computing resources to meet demand, and mitigate disruptions such as misconfigurations or transient network issues.",simple:"The Reliability pillar addresses the ability of a system to automatically recover from failures and continue operating without human intervention.",avoid:"Do not confuse Reliability with Operational Resilience — the Reliability pillar focuses on automatic failure recovery, not on monitoring or process improvement."}}},
{en:"Which AWS pricing model provides the LARGEST discount in exchange for a commitment to a consistent amount of compute usage measured in dollars per hour?",pt:"Qual modelo de preços da AWS oferece o MAIOR desconto em troca de um compromisso com uma quantidade consistente de uso de computação medida em dólares por hora?",o:{en:["Savings Plans","Reserved Instances","Spot Instances","On-Demand Instances"],pt:["Savings Plans","Instâncias Reservadas","Instâncias Spot","Instâncias Sob Demanda"]},a:[0],exp:{pt:{tech:"Savings Plans oferecem preços reduzidos em troca de um compromisso de uso consistente (medido em USD/hora) por um período de 1 ou 3 anos, cobrindo EC2, Lambda e Fargate.",simple:"Savings Plans oferecem os maiores descontos em troca de um compromisso de gasto fixo por hora em computacao, por 1 ou 3 anos.",avoid:"Nao use Savings Plans para cargas de trabalho imprevisiveis ou temporarias — o compromisso e por 1 ou 3 anos. Para cargas variaveis, On-Demand ou Spot sao mais adequados."},en:{tech:"Savings Plans offer reduced pricing in exchange for a commitment to a consistent amount of usage (measured in USD/hour) for a 1 or 3 year term, covering EC2, Lambda, and Fargate.",simple:"Savings Plans offer the largest discounts in exchange for a commitment to a fixed hourly compute spend for 1 or 3 years.",avoid:"Do not use Savings Plans for unpredictable or temporary workloads — the commitment is for 1 or 3 years. For variable workloads, On-Demand or Spot are more appropriate."}}},
{en:"A startup needs to deploy a simple web application quickly without managing individual infrastructure components like load balancers and auto scaling groups. Which AWS service is BEST suited?",pt:"Uma startup precisa implantar uma aplicação web simples rapidamente sem gerenciar componentes individuais de infraestrutura como balanceadores de carga e grupos de auto scaling. Qual serviço AWS é MAIS adequado?",o:{en:["Amazon Lightsail","Amazon EC2","AWS Lambda","Amazon EKS"],pt:["Amazon Lightsail","Amazon EC2","AWS Lambda","Amazon EKS"]},a:[0],exp:{pt:{tech:"O Amazon Lightsail oferece servidores virtuais, armazenamento, bancos de dados e redes a um preço mensal previsível e baixo, ideal para aplicações simples e projetos iniciais.",simple:"O Lightsail e um servico simplificado que oferece servidores, armazenamento e rede em pacotes prontos, ideal para implantar aplicacoes web simples rapidamente.",avoid:"Nao use o Lightsail para aplicacoes que precisam de escalabilidade avancada ou configuracoes personalizadas — para isso use EC2 com Auto Scaling e Load Balancers."},en:{tech:"Amazon Lightsail offers virtual servers, storage, databases, and networking at a low, predictable monthly price, ideal for simple applications and starter projects.",simple:"Lightsail is a simplified service that offers servers, storage, and networking in ready-made bundles, ideal for deploying simple web applications quickly.",avoid:"Do not use Lightsail for applications that need advanced scalability or custom configurations — use EC2 with Auto Scaling and Load Balancers for that."}}},
{en:"Which component of AWS global infrastructure is specifically designed to cache content closer to end users for low-latency delivery?",pt:"Qual componente da infraestrutura global da AWS é projetado especificamente para armazenar conteúdo em cache mais perto dos usuários finais para entrega com baixa latência?",o:{en:["Edge Locations","Availability Zones","AWS Regions","AWS Local Zones"],pt:["Locais de Borda","Zonas de Disponibilidade","Regiões AWS","Zonas Locais AWS"]},a:[0],exp:{pt:{tech:"Edge Locations são pontos de presença (PoPs) usados pelo Amazon CloudFront e outros serviços para armazenar em cache cópias de conteúdo próximo aos usuários, reduzindo a latência.",simple:"Edge Locations sao pontos de presenca da AWS espalhados pelo mundo que armazenam copias de conteudo proximo dos usuarios para entrega mais rapida.",avoid:"Nao confunda Edge Locations com Availability Zones ou Regioes — elas nao hospedam servicos completos, apenas cache de conteudo e servicos de borda como CloudFront."},en:{tech:"Edge Locations are points of presence (PoPs) used by Amazon CloudFront and other services to cache copies of content closer to end users, reducing latency.",simple:"Edge Locations are AWS points of presence spread around the world that store copies of content close to users for faster delivery.",avoid:"Do not confuse Edge Locations with Availability Zones or Regions — they do not host full services, only content cache and edge services like CloudFront."}}},
{en:"A security team needs to automatically discover and protect sensitive data such as personally identifiable information (PII) stored in Amazon S3. Which service should they use?",pt:"Uma equipe de segurança precisa descobrir e proteger automaticamente dados sensíveis como informações de identificação pessoal (PII) armazenados no Amazon S3. Qual serviço devem usar?",o:{en:["Amazon Macie","Amazon GuardDuty","AWS Security Hub","Amazon Detective"],pt:["Amazon Macie","Amazon GuardDuty","AWS Security Hub","Amazon Detective"]},a:[0],exp:{pt:{tech:"O Amazon Macie usa machine learning e correspondência de padrões para descobrir e proteger dados sensíveis armazenados no Amazon S3, incluindo PII e dados financeiros.",simple:"O Macie usa aprendizado de maquina para encontrar e classificar automaticamente dados sensiveis, como informacoes pessoais, armazenados no Amazon S3.",avoid:"Nao use o Macie para proteger dados em outros servicos alem do S3 — ele e projetado especificamente para S3. Para monitorar ameacas gerais, use o GuardDuty."},en:{tech:"Amazon Macie uses machine learning and pattern matching to discover and protect sensitive data stored in Amazon S3, including PII and financial data.",simple:"Macie uses machine learning to automatically discover and classify sensitive data, such as personal information, stored in Amazon S3.",avoid:"Do not use Macie to protect data in services other than S3 — it is designed specifically for S3. For monitoring general threats, use GuardDuty."}}},
{en:"Which TWO statements accurately describe AWS Lambda? (Choose TWO)",pt:"Quais DUAS afirmações descrevem corretamente o AWS Lambda? (Escolha DUAS)",o:{en:["You are charged based on the number of requests and the duration of code execution","Lambda automatically scales to handle incoming requests without manual configuration","Lambda requires you to provision and manage the underlying servers","Lambda functions can run indefinitely without any time restrictions"],pt:["Você é cobrado com base no número de solicitações e na duração da execução do código","O Lambda escala automaticamente para lidar com solicitações recebidas sem configuração manual","O Lambda exige que você provisione e gerencie os servidores subjacentes","As funções Lambda podem ser executadas indefinidamente sem restrições de tempo"]},a:[0,1],multi:true,exp:{pt:{tech:"O AWS Lambda é um serviço serverless que executa código em resposta a eventos. A cobrança é por número de invocações e tempo de execução (em incrementos de 1ms). Ele escala automaticamente e tem um limite máximo de execução de 15 minutos.",simple:"O Lambda cobra com base no numero de requisicoes e na duracao da execucao do codigo, e escala automaticamente para atender a demanda sem configuracao manual.",avoid:"Nao use Lambda para processos que rodam continuamente ou por mais de 15 minutos — ele tem limite de tempo de execucao. Para cargas de longa duracao, use EC2 ou Fargate."},en:{tech:"AWS Lambda is a serverless service that runs code in response to events. You are charged per number of invocations and execution duration (in 1ms increments). It scales automatically and has a maximum execution timeout of 15 minutes.",simple:"Lambda charges based on the number of requests and code execution duration, and it automatically scales to handle demand without manual configuration.",avoid:"Do not use Lambda for processes that run continuously or for more than 15 minutes — it has an execution time limit. For long-running workloads, use EC2 or Fargate."}}},
{en:"A company stores log files that are rarely accessed but must be retrievable within 12 hours when needed. Which S3 storage class is the MOST cost-effective?",pt:"Uma empresa armazena arquivos de log raramente acessados mas que devem ser recuperáveis dentro de 12 horas quando necessário. Qual classe de armazenamento S3 é a MAIS econômica?",o:{en:["S3 Glacier Deep Archive","S3 Glacier Flexible Retrieval","S3 Standard-Infrequent Access","S3 One Zone-Infrequent Access"],pt:["S3 Glacier Deep Archive","S3 Glacier Flexible Retrieval","S3 Standard-Acesso Infrequente","S3 One Zone-Acesso Infrequente"]},a:[0],exp:{pt:{tech:"O S3 Glacier Deep Archive é a classe de armazenamento mais barata da AWS, projetada para retenção de longo prazo de dados acessados raramente, com tempo de recuperação padrão de até 12 horas.",simple:"O S3 Glacier Deep Archive e a classe de armazenamento mais barata do S3, projetada para dados raramente acessados que podem levar ate 12 horas para serem recuperados.",avoid:"Nao use o Glacier Deep Archive para dados que precisam de acesso rapido — a recuperacao pode demorar horas. Para acesso ocasional com recuperacao rapida, use S3 Standard-IA."},en:{tech:"S3 Glacier Deep Archive is the lowest-cost AWS storage class, designed for long-term retention of data that is rarely accessed, with a default retrieval time of up to 12 hours.",simple:"S3 Glacier Deep Archive is the cheapest S3 storage class, designed for rarely accessed data that can take up to 12 hours to retrieve.",avoid:"Do not use Glacier Deep Archive for data that needs quick access — retrieval can take hours. For occasional access with fast retrieval, use S3 Standard-IA."}}},
{en:"Which database service is fully managed by AWS and is compatible with both MySQL and PostgreSQL while offering up to five times the throughput of standard MySQL?",pt:"Qual serviço de banco de dados é totalmente gerenciado pela AWS e é compatível com MySQL e PostgreSQL, oferecendo até cinco vezes o throughput do MySQL padrão?",o:{en:["Amazon Aurora","Amazon RDS","Amazon Redshift","Amazon DynamoDB"],pt:["Amazon Aurora","Amazon RDS","Amazon Redshift","Amazon DynamoDB"]},a:[0],exp:{pt:{tech:"O Amazon Aurora é um banco de dados relacional compatível com MySQL e PostgreSQL, projetado para a nuvem, que combina a performance de bancos de dados comerciais com a simplicidade e economia de bancos open source.",simple:"O Aurora e um banco de dados relacional gerenciado pela AWS, compativel com MySQL e PostgreSQL, que oferece ate cinco vezes mais desempenho que o MySQL padrao.",avoid:"Nao use o Aurora para bancos NoSQL ou grafos — ele e relacional. Para NoSQL use DynamoDB, para grafos use Neptune. Tambem nao escolha Aurora se precisar de compatibilidade com SQL Server ou Oracle."},en:{tech:"Amazon Aurora is a MySQL and PostgreSQL-compatible relational database built for the cloud, combining the performance of commercial databases with the simplicity and cost-effectiveness of open-source databases.",simple:"Aurora is a fully managed relational database compatible with MySQL and PostgreSQL that offers up to five times the throughput of standard MySQL.",avoid:"Do not use Aurora for NoSQL or graph databases — it is relational. For NoSQL use DynamoDB, for graphs use Neptune. Also do not choose Aurora if you need SQL Server or Oracle compatibility."}}},
{en:"A company needs to connect their on-premises data center to AWS with a dedicated, private network connection that does not traverse the public internet. Which service should they use?",pt:"Uma empresa precisa conectar seu data center local à AWS com uma conexão de rede dedicada e privada que não passe pela internet pública. Qual serviço devem usar?",o:{en:["AWS Direct Connect","AWS Site-to-Site VPN","AWS Transit Gateway","Amazon VPC Peering"],pt:["AWS Direct Connect","AWS VPN Site-to-Site","AWS Transit Gateway","Peering Amazon VPC"]},a:[0],exp:{pt:{tech:"O AWS Direct Connect estabelece uma conexão de rede dedicada entre as instalações do cliente e a AWS, proporcionando largura de banda consistente e latência reduzida sem passar pela internet pública.",simple:"O Direct Connect cria uma conexao de rede dedicada e privada entre seu data center local e a AWS, sem passar pela internet publica.",avoid:"Nao use Direct Connect se voce precisa de conectividade rapida e barata — a instalacao leva semanas e tem custo mensal fixo. Para conexao imediata, use VPN Site-to-Site."},en:{tech:"AWS Direct Connect establishes a dedicated network connection between customer premises and AWS, providing consistent bandwidth and reduced latency without traversing the public internet.",simple:"Direct Connect creates a dedicated, private network connection between your on-premises data center and AWS, without traversing the public internet.",avoid:"Do not use Direct Connect if you need quick and cheap connectivity — setup takes weeks and has a fixed monthly cost. For immediate connection, use Site-to-Site VPN."}}},
{en:"Which AWS service provides a centralized dashboard to check if your AWS account follows best practices across cost optimization, security, fault tolerance, performance, and service limits?",pt:"Qual serviço AWS fornece um painel centralizado para verificar se sua conta AWS segue as melhores práticas em otimização de custos, segurança, tolerância a falhas, performance e limites de serviço?",o:{en:["AWS Trusted Advisor","Amazon CloudWatch","AWS Config","AWS CloudTrail"],pt:["AWS Trusted Advisor","Amazon CloudWatch","AWS Config","AWS CloudTrail"]},a:[0],exp:{pt:{tech:"O AWS Trusted Advisor inspeciona seu ambiente AWS e faz recomendações em cinco categorias: otimização de custos, performance, segurança, tolerância a falhas e limites de serviço.",simple:"O Trusted Advisor analisa sua conta AWS e mostra recomendacoes em cinco areas: custo, seguranca, tolerancia a falhas, desempenho e limites de servico.",avoid:"Nao confunda o Trusted Advisor com monitoramento em tempo real — ele fornece recomendacoes pontuais, nao alertas continuos. Para monitoramento ativo, use CloudWatch."},en:{tech:"AWS Trusted Advisor inspects your AWS environment and makes recommendations across five categories: cost optimization, performance, security, fault tolerance, and service limits.",simple:"Trusted Advisor analyzes your AWS account and shows recommendations across five areas: cost, security, fault tolerance, performance, and service limits.",avoid:"Do not confuse Trusted Advisor with real-time monitoring — it provides point-in-time recommendations, not continuous alerts. For active monitoring, use CloudWatch."}}},
{en:"A company wants to migrate a 50 TB database from an on-premises Oracle server to Amazon Aurora PostgreSQL. Which AWS service is designed specifically for this type of migration?",pt:"Uma empresa deseja migrar um banco de dados de 50 TB de um servidor Oracle local para o Amazon Aurora PostgreSQL. Qual serviço AWS é projetado especificamente para esse tipo de migração?",o:{en:["AWS Database Migration Service (DMS)","AWS Server Migration Service (SMS)","AWS Snowball","AWS Migration Hub"],pt:["AWS Database Migration Service (DMS)","AWS Server Migration Service (SMS)","AWS Snowball","AWS Migration Hub"]},a:[0],exp:{pt:{tech:"O AWS DMS suporta migrações homogêneas e heterogêneas de banco de dados, incluindo de Oracle para Aurora PostgreSQL, com conversão de schema via AWS Schema Conversion Tool.",simple:"O DMS e um servico que migra bancos de dados para a AWS com minimo tempo de inatividade, suportando migracoes entre diferentes motores de banco de dados.",avoid:"Nao use o DMS para migrar arquivos ou dados nao estruturados — ele e especifico para bancos de dados. Para migrar arquivos, use o DataSync ou Snowball."},en:{tech:"AWS DMS supports both homogeneous and heterogeneous database migrations, including Oracle to Aurora PostgreSQL, with schema conversion using the AWS Schema Conversion Tool.",simple:"DMS is a service that migrates databases to AWS with minimal downtime, supporting migrations between different database engines.",avoid:"Do not use DMS for migrating files or unstructured data — it is specific to databases. For file migration, use DataSync or Snowball."}}},
{en:"Which AWS AI service can analyze images and videos to detect objects, people, text, scenes, and activities?",pt:"Qual serviço de IA da AWS pode analisar imagens e vídeos para detectar objetos, pessoas, texto, cenas e atividades?",o:{en:["Amazon Rekognition","Amazon Comprehend","Amazon SageMaker","Amazon Translate"],pt:["Amazon Rekognition","Amazon Comprehend","Amazon SageMaker","Amazon Translate"]},a:[0],exp:{pt:{tech:"O Amazon Rekognition é um serviço de visão computacional que usa deep learning para analisar imagens e vídeos, identificando objetos, pessoas, texto, cenas e atividades sem necessidade de expertise em ML.",simple:"O Rekognition e um servico de inteligencia artificial que analisa imagens e videos para identificar objetos, pessoas, textos, cenas e atividades.",avoid:"Nao use o Rekognition para analisar textos escritos em documentos — para OCR de documentos estruturados, use o Textract. O Rekognition e focado em reconhecimento visual."},en:{tech:"Amazon Rekognition is a computer vision service that uses deep learning to analyze images and videos, identifying objects, people, text, scenes, and activities without requiring ML expertise.",simple:"Rekognition is an AI service that analyzes images and videos to identify objects, people, text, scenes, and activities.",avoid:"Do not use Rekognition for analyzing text in documents — for OCR of structured documents, use Textract. Rekognition is focused on visual recognition."}}},
{en:"Which AWS service automates the software release process by orchestrating build, test, and deploy phases across multiple stages?",pt:"Qual serviço AWS automatiza o processo de lançamento de software orquestrando as fases de build, teste e deploy em múltiplos estágios?",o:{en:["AWS CodePipeline","AWS CodeBuild","AWS CodeDeploy","AWS CodeCommit"],pt:["AWS CodePipeline","AWS CodeBuild","AWS CodeDeploy","AWS CodeCommit"]},a:[0],exp:{pt:{tech:"O AWS CodePipeline é um serviço de entrega contínua totalmente gerenciado que automatiza os pipelines de release, orquestrando etapas de build, teste e deploy.",simple:"O CodePipeline e um servico que automatiza o processo de lancamento de software, orquestrando as etapas de construcao, teste e implantacao em sequencia.",avoid:"Nao use o CodePipeline apenas para compilar codigo — para isso existe o CodeBuild isoladamente. O CodePipeline e o orquestrador que conecta varias etapas do processo de entrega."},en:{tech:"AWS CodePipeline is a fully managed continuous delivery service that automates release pipelines, orchestrating build, test, and deploy stages.",simple:"CodePipeline is a service that automates the software release process by orchestrating the build, test, and deploy stages in sequence.",avoid:"Do not use CodePipeline just for building code — use CodeBuild alone for that. CodePipeline is the orchestrator that connects multiple stages of the delivery process."}}},
{en:"Which AWS support plan provides access to a Technical Account Manager (TAM)?",pt:"Qual plano de suporte AWS fornece acesso a um Technical Account Manager (TAM)?",o:{en:["Enterprise","Business","Developer","Basic"],pt:["Enterprise","Business","Developer","Básico"]},a:[0],exp:{pt:{tech:"O plano Enterprise é o único que inclui um Technical Account Manager (TAM) dedicado, que fornece orientação proativa, revisões arquiteturais e coordenação de casos de suporte.",simple:"O plano Enterprise e o unico plano de suporte AWS que inclui um Technical Account Manager (TAM) dedicado para orientar sua conta de forma proativa.",avoid:"Nao escolha o plano Enterprise so pelo TAM se voce nao tem cargas de trabalho criticas — e o plano mais caro. Para suporte 24/7 sem TAM, o plano Business pode ser suficiente."},en:{tech:"The Enterprise plan is the only one that includes a dedicated Technical Account Manager (TAM), who provides proactive guidance, architectural reviews, and support case coordination.",simple:"The Enterprise plan is the only AWS support plan that includes a dedicated Technical Account Manager (TAM) to proactively guide your account.",avoid:"Do not choose the Enterprise plan just for the TAM if you do not have critical workloads — it is the most expensive plan. For 24/7 support without a TAM, the Business plan may suffice."}}},
{en:"Which pillar of the AWS Well-Architected Framework focuses on running workloads effectively while gaining insight into operations through monitoring and continuously improving processes?",pt:"Qual pilar do AWS Well-Architected Framework foca em executar cargas de trabalho de forma eficaz enquanto obtém insights sobre operações por meio de monitoramento e melhora contínua de processos?",o:{en:["Operational Excellence","Reliability","Performance Efficiency","Sustainability"],pt:["Excelência Operacional","Confiabilidade","Eficiência de Performance","Sustentabilidade"]},a:[0],exp:{pt:{tech:"O pilar de Excelência Operacional inclui a capacidade de executar e monitorar sistemas para entregar valor de negócio e melhorar continuamente processos e procedimentos de suporte.",simple:"O pilar de Excelencia Operacional foca em executar cargas de trabalho de forma eficaz, monitorar operacoes e melhorar processos continuamente.",avoid:"Nao confunda Excelencia Operacional com Confiabilidade — Operational Excellence trata de monitoramento e melhoria de processos, enquanto Reliability trata de recuperacao automatica de falhas."},en:{tech:"The Operational Excellence pillar includes the ability to run and monitor systems to deliver business value and continually improve supporting processes and procedures.",simple:"The Operational Excellence pillar focuses on running workloads effectively, monitoring operations, and continuously improving processes.",avoid:"Do not confuse Operational Excellence with Reliability — Operational Excellence deals with monitoring and process improvement, while Reliability deals with automatic failure recovery."}}},
{en:"A company notices their monthly AWS bill is higher than expected. Which TWO actions can help reduce costs? (Choose TWO)",pt:"Uma empresa percebe que sua fatura mensal da AWS está mais alta do que o esperado. Quais DUAS ações podem ajudar a reduzir custos? (Escolha DUAS)",o:{en:["Right-size underutilized EC2 instances based on usage patterns","Purchase Reserved Instances or Savings Plans for steady-state workloads","Increase the number of Availability Zones used to three in every Region","Migrate all workloads from Lambda to EC2 for better pricing"],pt:["Redimensionar instâncias EC2 subutilizadas com base nos padrões de uso","Comprar Instâncias Reservadas ou Savings Plans para cargas de trabalho constantes","Aumentar o número de Zonas de Disponibilidade para três em cada Região","Migrar todas as cargas de trabalho do Lambda para EC2 para melhor preço"]},a:[0,1],multi:true,exp:{pt:{tech:"Right-sizing elimina desperdício ao ajustar recursos ao uso real, e compromissos de longo prazo como Reserved Instances ou Savings Plans oferecem descontos de até 72% comparado a On-Demand.",simple:"Ajustar instancias EC2 subutilizadas para tamanhos menores (right-sizing) e comprar Reserved Instances ou Savings Plans para cargas estaveis sao duas formas eficazes de reduzir custos.",avoid:"Nao faca right-sizing sem analisar os padroes de uso reais — reduzir demais pode causar problemas de desempenho. Tambem nao compre reservas para cargas de trabalho temporarias."},en:{tech:"Right-sizing eliminates waste by matching resources to actual usage, and long-term commitments like Reserved Instances or Savings Plans offer discounts of up to 72% compared to On-Demand.",simple:"Right-sizing underutilized EC2 instances to smaller sizes and purchasing Reserved Instances or Savings Plans for steady workloads are two effective ways to reduce costs.",avoid:"Do not right-size without analyzing actual usage patterns — reducing too much can cause performance issues. Also do not purchase reservations for temporary workloads."}}},
{en:"What is the MINIMUM number of Availability Zones in any AWS Region?",pt:"Qual é o número MÍNIMO de Zonas de Disponibilidade em qualquer Região AWS?",o:{en:["2","1","3","4"],pt:["2","1","3","4"]},a:[2],exp:{pt:{tech:"Cada Região AWS consiste em no mínimo 3 Zonas de Disponibilidade isoladas e fisicamente separadas dentro de uma área geográfica, proporcionando alta disponibilidade e tolerância a falhas.",simple:"Toda Regiao AWS tem no minimo 3 Availability Zones, que sao locais fisicamente separados dentro da mesma regiao para garantir alta disponibilidade.",avoid:"Nao confunda Availability Zones com Regioes — uma Regiao contem multiplas AZs. Tambem nao assuma que usar apenas uma AZ e suficiente para alta disponibilidade."},en:{tech:"Each AWS Region consists of a minimum of 3 isolated and physically separate Availability Zones within a geographic area, providing high availability and fault tolerance.",simple:"Every AWS Region has at least 3 Availability Zones, which are physically separate locations within the same region to ensure high availability.",avoid:"Do not confuse Availability Zones with Regions — a Region contains multiple AZs. Also do not assume that using only one AZ is sufficient for high availability."}}},
{en:"Which AWS service continuously monitors for malicious activity and unauthorized behavior by analyzing VPC Flow Logs, CloudTrail logs, and DNS logs?",pt:"Qual serviço AWS monitora continuamente atividades maliciosas e comportamento não autorizado analisando VPC Flow Logs, logs do CloudTrail e logs de DNS?",o:{en:["Amazon GuardDuty","Amazon Macie","AWS Config","Amazon Inspector"],pt:["Amazon GuardDuty","Amazon Macie","AWS Config","Amazon Inspector"]},a:[0],exp:{pt:{tech:"O Amazon GuardDuty é um serviço de detecção de ameaças que monitora continuamente atividades maliciosas e comportamentos anômalos usando machine learning, análise de anomalias e inteligência de ameaças integrada.",simple:"O GuardDuty monitora continuamente sua conta AWS analisando logs de VPC Flow, CloudTrail e DNS para detectar atividades maliciosas ou comportamentos nao autorizados.",avoid:"Nao use o GuardDuty para corrigir problemas — ele apenas detecta e alerta. Para investigar a causa raiz de um incidente, use o Amazon Detective."},en:{tech:"Amazon GuardDuty is a threat detection service that continuously monitors for malicious activity and anomalous behavior using machine learning, anomaly detection, and integrated threat intelligence.",simple:"GuardDuty continuously monitors your AWS account by analyzing VPC Flow Logs, CloudTrail logs, and DNS logs to detect malicious activity or unauthorized behavior.",avoid:"Do not use GuardDuty to fix problems — it only detects and alerts. To investigate the root cause of an incident, use Amazon Detective."}}},
{en:"A developer needs to run containers on AWS without managing the underlying EC2 instances or server clusters. Which service should they use?",pt:"Um desenvolvedor precisa executar containers na AWS sem gerenciar as instâncias EC2 subjacentes ou clusters de servidores. Qual serviço deve usar?",o:{en:["AWS Fargate","Amazon ECS","Amazon EKS","Amazon EC2"],pt:["AWS Fargate","Amazon ECS","Amazon EKS","Amazon EC2"]},a:[0],exp:{pt:{tech:"O AWS Fargate é um mecanismo de computação serverless para containers que funciona com Amazon ECS e Amazon EKS, eliminando a necessidade de provisionar e gerenciar servidores.",simple:"O Fargate executa conteineres sem que voce precise gerenciar servidores ou instancias EC2 — voce define o conteiner e o Fargate cuida da infraestrutura.",avoid:"Nao use Fargate se voce precisa de controle total sobre o sistema operacional ou hardware das instancias — nesse caso, use ECS com instancias EC2 gerenciadas por voce."},en:{tech:"AWS Fargate is a serverless compute engine for containers that works with Amazon ECS and Amazon EKS, removing the need to provision and manage servers.",simple:"Fargate runs containers without you needing to manage servers or EC2 instances — you define the container and Fargate handles the infrastructure.",avoid:"Do not use Fargate if you need full control over the operating system or instance hardware — in that case, use ECS with self-managed EC2 instances."}}},
{en:"Which EBS volume type is designed for throughput-intensive workloads such as big data processing, data warehouses, and log processing?",pt:"Qual tipo de volume EBS é projetado para cargas de trabalho intensivas em throughput, como processamento de big data, data warehouses e processamento de logs?",o:{en:["Throughput Optimized HDD (st1)","General Purpose SSD (gp3)","Provisioned IOPS SSD (io2)","Cold HDD (sc1)"],pt:["HDD Otimizado para Throughput (st1)","SSD de Propósito Geral (gp3)","SSD de IOPS Provisionado (io2)","HDD Frio (sc1)"]},a:[0],exp:{pt:{tech:"Volumes st1 são projetados para cargas de trabalho de dados grandes e sequenciais que requerem alto throughput a baixo custo, como processamento de big data, ETL e data warehouses.",simple:"O Throughput Optimized HDD (st1) e um tipo de volume EBS projetado para cargas que processam grandes volumes de dados sequencialmente, com custo baixo.",avoid:"Nao use st1 para cargas que precisam de baixa latencia ou muitas operacoes aleatorias por segundo — para isso use volumes SSD como gp3 ou io2."},en:{tech:"st1 volumes are designed for large, sequential data workloads that require high throughput at low cost, such as big data processing, ETL, and data warehouses.",simple:"Throughput Optimized HDD (st1) is an EBS volume type designed for workloads that process large volumes of data sequentially at low cost.",avoid:"Do not use st1 for workloads that need low latency or many random operations per second — use SSD volumes like gp3 or io2 for that."}}},
{en:"Which AWS service provides a fully managed file system that is compatible with the Windows Server Message Block (SMB) protocol?",pt:"Qual serviço AWS fornece um sistema de arquivos totalmente gerenciado compatível com o protocolo Windows Server Message Block (SMB)?",o:{en:["Amazon FSx for Windows File Server","Amazon EFS","Amazon S3","AWS Storage Gateway"],pt:["Amazon FSx for Windows File Server","Amazon EFS","Amazon S3","AWS Storage Gateway"]},a:[0],exp:{pt:{tech:"O Amazon FSx for Windows File Server oferece um sistema de arquivos nativo do Windows totalmente gerenciado, com suporte a SMB, Active Directory, NTFS e DFS, ideal para workloads Windows.",simple:"O FSx for Windows File Server e um sistema de arquivos totalmente gerenciado que funciona com o protocolo SMB, compativel nativamente com ambientes Windows.",avoid:"Nao use FSx for Windows para ambientes Linux — para Linux, use o EFS que suporta o protocolo NFS. O FSx for Windows e especifico para o protocolo SMB."},en:{tech:"Amazon FSx for Windows File Server provides a fully managed native Windows file system with SMB, Active Directory, NTFS, and DFS support, ideal for Windows workloads.",simple:"FSx for Windows File Server is a fully managed file system that works with the SMB protocol, natively compatible with Windows environments.",avoid:"Do not use FSx for Windows for Linux environments — for Linux, use EFS which supports the NFS protocol. FSx for Windows is specific to the SMB protocol."}}},
{en:"A company needs a managed graph database to store and query highly connected datasets such as social networks and recommendation engines. Which service should they choose?",pt:"Uma empresa precisa de um banco de dados de grafos gerenciado para armazenar e consultar conjuntos de dados altamente conectados, como redes sociais e mecanismos de recomendação. Qual serviço devem escolher?",o:{en:["Amazon Neptune","Amazon DynamoDB","Amazon Redshift","Amazon ElastiCache"],pt:["Amazon Neptune","Amazon DynamoDB","Amazon Redshift","Amazon ElastiCache"]},a:[0],exp:{pt:{tech:"O Amazon Neptune é um serviço de banco de dados de grafos totalmente gerenciado que suporta Property Graph e RDF, otimizado para armazenar bilhões de relacionamentos e consultá-los com latência de milissegundos.",simple:"O Neptune e um banco de dados de grafos gerenciado, projetado para armazenar e consultar dados altamente conectados, como redes sociais e sistemas de recomendacao.",avoid:"Nao use o Neptune para dados tabulares simples ou consultas relacionais tradicionais — para isso use RDS ou Aurora. O Neptune e ideal apenas quando os relacionamentos entre dados sao o foco principal."},en:{tech:"Amazon Neptune is a fully managed graph database service supporting Property Graph and RDF, optimized for storing billions of relationships and querying them with millisecond latency.",simple:"Neptune is a managed graph database designed to store and query highly connected data, such as social networks and recommendation engines.",avoid:"Do not use Neptune for simple tabular data or traditional relational queries — use RDS or Aurora for that. Neptune is ideal only when relationships between data are the primary focus."}}},
{en:"Which AWS networking component allows resources in a private subnet to access the internet for software updates while preventing inbound connections from the internet?",pt:"Qual componente de rede AWS permite que recursos em uma sub-rede privada acessem a internet para atualizações de software enquanto impede conexões de entrada da internet?",o:{en:["NAT Gateway","Internet Gateway","Network ACL","Security Group"],pt:["NAT Gateway","Internet Gateway","Network ACL","Security Group"]},a:[0],exp:{pt:{tech:"Um NAT Gateway permite que instâncias em sub-redes privadas iniciem conexões de saída para a internet enquanto impede que a internet inicie conexões de entrada com essas instâncias.",simple:"O NAT Gateway permite que recursos em uma sub-rede privada acessem a internet para atualizacoes, mas impede que conexoes da internet cheguem ate eles.",avoid:"Nao confunda NAT Gateway com Internet Gateway — o Internet Gateway permite trafego bidirecional para sub-redes publicas. Tambem nao esqueca que o NAT Gateway tem custo por hora e por dados processados."},en:{tech:"A NAT Gateway allows instances in private subnets to initiate outbound connections to the internet while preventing the internet from initiating inbound connections to those instances.",simple:"A NAT Gateway allows resources in a private subnet to access the internet for updates while preventing inbound connections from the internet from reaching them.",avoid:"Do not confuse NAT Gateway with Internet Gateway — the Internet Gateway allows bidirectional traffic for public subnets. Also remember that NAT Gateway has hourly and data processing costs."}}},
{en:"Which AWS service records API calls made to your account, providing an audit trail for governance, compliance, and operational troubleshooting?",pt:"Qual serviço AWS registra chamadas de API feitas em sua conta, fornecendo uma trilha de auditoria para governança, conformidade e solução de problemas operacionais?",o:{en:["AWS CloudTrail","Amazon CloudWatch","AWS Config","AWS Systems Manager"],pt:["AWS CloudTrail","Amazon CloudWatch","AWS Config","AWS Systems Manager"]},a:[0],exp:{pt:{tech:"O AWS CloudTrail registra as chamadas de API feitas na conta AWS, incluindo quem fez a chamada, qual serviço foi usado, que ação foi executada e quando aconteceu.",simple:"O CloudTrail registra todas as chamadas de API feitas na sua conta AWS, criando um historico completo de quem fez o que e quando, para auditoria e conformidade.",avoid:"Nao confunda CloudTrail com CloudWatch — o CloudTrail registra acoes e chamadas de API, enquanto o CloudWatch monitora metricas de desempenho e logs de aplicacao."},en:{tech:"AWS CloudTrail records API calls made to the AWS account, including who made the call, which service was used, what action was taken, and when it happened.",simple:"CloudTrail records all API calls made in your AWS account, creating a complete history of who did what and when, for auditing and compliance.",avoid:"Do not confuse CloudTrail with CloudWatch — CloudTrail records actions and API calls, while CloudWatch monitors performance metrics and application logs."}}},
{en:"A company wants to ensure that their cloud architecture can automatically recover from component failures without human intervention. Which pillar of the AWS Well-Architected Framework PRIMARILY addresses this requirement?",pt:"Uma empresa deseja garantir que sua arquitetura em nuvem possa se recuperar automaticamente de falhas em componentes sem intervenção humana. Qual pilar do AWS Well-Architected Framework aborda PRINCIPALMENTE esse requisito?",o:{en:["Reliability","Operational Excellence","Performance Efficiency","Security"],pt:["Confiabilidade","Excelência Operacional","Eficiência de Performance","Segurança"]},a:[0],exp:{pt:{tech:"O pilar de Confiabilidade do Well-Architected Framework foca na capacidade de um sistema se recuperar de falhas de infraestrutura ou serviço, adquirir recursos computacionais dinamicamente e mitigar interrupções.",simple:"O pilar de Confiabilidade (Reliability) garante que sistemas se recuperem automaticamente de falhas de componentes sem intervencao humana.",avoid:"Nao confunda Reliability com Performance Efficiency — Reliability foca em recuperacao automatica e continuidade, nao em otimizacao de recursos computacionais."},en:{tech:"The Reliability pillar of the Well-Architected Framework focuses on the ability of a system to recover from infrastructure or service disruptions, dynamically acquire computing resources, and mitigate disruptions.",simple:"The Reliability pillar ensures that systems automatically recover from component failures without human intervention.",avoid:"Do not confuse Reliability with Performance Efficiency — Reliability focuses on automatic recovery and continuity, not on optimizing computational resources."}}},
{en:"Which AWS pricing model would be MOST cost-effective for a batch processing workload that can be interrupted and resumed, and has flexible start and end times?",pt:"Qual modelo de preços da AWS seria MAIS econômico para uma carga de trabalho de processamento em lote que pode ser interrompida e retomada, com horários flexíveis de início e término?",o:{en:["Spot Instances","On-Demand Instances","Reserved Instances","Dedicated Hosts"],pt:["Instâncias Spot","Instâncias Sob Demanda","Instâncias Reservadas","Hosts Dedicados"]},a:[0],exp:{pt:{tech:"Spot Instances permitem aproveitar capacidade ociosa do EC2 com descontos de até 90% em relação ao preço sob demanda. São ideais para cargas de trabalho tolerantes a interrupções.",simple:"Spot Instances oferecem descontos de ate 90% para cargas de trabalho que podem ser interrompidas, usando capacidade computacional ociosa da AWS.",avoid:"Nao use Spot Instances para aplicacoes que nao podem ser interrompidas, como bancos de dados de producao. A AWS pode reclamar a instancia com 2 minutos de aviso."},en:{tech:"Spot Instances let you take advantage of unused EC2 capacity at discounts of up to 90% compared to On-Demand pricing. They are ideal for fault-tolerant and flexible workloads.",simple:"Spot Instances offer discounts of up to 90% for workloads that can be interrupted, using idle AWS compute capacity.",avoid:"Do not use Spot Instances for applications that cannot be interrupted, such as production databases. AWS can reclaim the instance with 2 minutes notice."}}},
{en:"A company has workloads in us-east-1 and wants to ensure high availability by deploying resources across multiple isolated locations within that Region. What are these isolated locations called?",pt:"Uma empresa tem cargas de trabalho em us-east-1 e deseja garantir alta disponibilidade implantando recursos em várias localizações isoladas dentro dessa Região. Como são chamadas essas localizações isoladas?",o:{en:["Availability Zones","Edge Locations","Local Zones","Wavelength Zones"],pt:["Zonas de Disponibilidade","Locais de Borda","Zonas Locais","Zonas Wavelength"]},a:[0],exp:{pt:{tech:"Zonas de Disponibilidade (AZs) são locais isolados dentro de uma Região AWS, cada uma com energia, refrigeração e rede independentes, conectadas por links de baixa latência.",simple:"Availability Zones sao locais isolados dentro de uma Regiao AWS, cada um com infraestrutura independente de energia, rede e refrigeracao.",avoid:"Nao use apenas uma Availability Zone para cargas criticas — se essa AZ tiver problemas, seu sistema inteiro fica fora do ar. Sempre distribua recursos em pelo menos duas AZs."},en:{tech:"Availability Zones (AZs) are isolated locations within an AWS Region, each with independent power, cooling, and networking, connected through low-latency links.",simple:"Availability Zones are isolated locations within an AWS Region, each with independent power, networking, and cooling infrastructure.",avoid:"Do not use only one Availability Zone for critical workloads — if that AZ has issues, your entire system goes down. Always distribute resources across at least two AZs."}}},
{en:"Which AWS service uses machine learning to automatically discover, classify, and protect sensitive data such as personally identifiable information (PII) stored in Amazon S3?",pt:"Qual serviço da AWS usa aprendizado de máquina para descobrir, classificar e proteger automaticamente dados sensíveis como informações de identificação pessoal (PII) armazenados no Amazon S3?",o:{en:["Amazon Macie","Amazon GuardDuty","AWS Security Hub","Amazon Detective"],pt:["Amazon Macie","Amazon GuardDuty","AWS Security Hub","Amazon Detective"]},a:[0],exp:{pt:{tech:"O Amazon Macie utiliza machine learning e correspondência de padrões para descobrir e proteger dados sensíveis no S3, como números de CPF, cartões de crédito e outras PII.",simple:"O Macie usa aprendizado de maquina para descobrir, classificar e proteger automaticamente dados sensiveis como informacoes pessoais armazenadas no S3.",avoid:"Nao dependa do Macie para proteger dados fora do S3 — ele funciona exclusivamente com buckets S3. Para seguranca geral da conta, combine com GuardDuty e Security Hub."},en:{tech:"Amazon Macie uses machine learning and pattern matching to discover and protect sensitive data in S3, such as social security numbers, credit card numbers, and other PII.",simple:"Macie uses machine learning to automatically discover, classify, and protect sensitive data such as personally identifiable information stored in S3.",avoid:"Do not rely on Macie to protect data outside S3 — it works exclusively with S3 buckets. For overall account security, combine it with GuardDuty and Security Hub."}}},
{en:"Which TWO statements are TRUE about AWS Lambda? (Choose TWO)",pt:"Quais DUAS afirmações são VERDADEIRAS sobre o AWS Lambda? (Escolha DUAS)",o:{en:["You pay only for the compute time your code actually consumes","Lambda automatically manages the underlying server infrastructure","You must pre-provision a fixed number of Lambda instances before use","Lambda functions can only be triggered by API Gateway"],pt:["Você paga apenas pelo tempo de computação que seu código realmente consome","O Lambda gerencia automaticamente a infraestrutura de servidores subjacente","Você deve provisionar previamente um número fixo de instâncias Lambda antes do uso","Funções Lambda só podem ser acionadas pelo API Gateway"]},a:[0,1],multi:true,exp:{pt:{tech:"O AWS Lambda é um serviço serverless que executa código em resposta a eventos. Não requer provisionamento de servidores, escala automaticamente e cobra apenas pelo tempo de execução em milissegundos.",simple:"O Lambda cobra apenas pelo tempo de computacao que seu codigo realmente consome e gerencia automaticamente toda a infraestrutura de servidores.",avoid:"Nao use Lambda para aplicacoes que precisam de estado persistente entre execucoes ou que rodam por mais de 15 minutos — ele e projetado para funcoes curtas e sem estado."},en:{tech:"AWS Lambda is a serverless service that runs code in response to events. It requires no server provisioning, scales automatically, and charges only for execution time in milliseconds.",simple:"Lambda charges only for the compute time your code actually consumes and automatically manages all server infrastructure.",avoid:"Do not use Lambda for applications that need persistent state between executions or that run longer than 15 minutes — it is designed for short, stateless functions."}}},
{en:"A startup wants to deploy a simple web application quickly without managing individual infrastructure components like load balancers and auto scaling groups. Which AWS compute service is BEST suited for this use case?",pt:"Uma startup deseja implantar uma aplicação web simples rapidamente sem gerenciar componentes individuais de infraestrutura como balanceadores de carga e grupos de auto scaling. Qual serviço de computação da AWS é MAIS adequado para esse caso de uso?",o:{en:["Amazon Lightsail","Amazon EC2","Amazon EKS","AWS Fargate"],pt:["Amazon Lightsail","Amazon EC2","Amazon EKS","AWS Fargate"]},a:[0],exp:{pt:{tech:"O Amazon Lightsail oferece servidores virtuais, armazenamento, bancos de dados e rede em pacotes simplificados com preço fixo mensal previsível, ideal para aplicações simples e pequenas empresas.",simple:"O Lightsail oferece pacotes prontos com servidor, armazenamento e rede por um preco fixo mensal, ideal para implantar aplicacoes web simples rapidamente.",avoid:"Nao use o Lightsail para aplicacoes empresariais complexas que precisam de auto scaling, multiplas zonas de disponibilidade ou integracao avancada com outros servicos AWS."},en:{tech:"Amazon Lightsail provides virtual servers, storage, databases, and networking in simplified bundles with predictable monthly pricing, ideal for simple applications and small businesses.",simple:"Lightsail offers ready-made bundles with server, storage, and networking at a fixed monthly price, ideal for quickly deploying simple web applications.",avoid:"Do not use Lightsail for complex enterprise applications that need auto scaling, multiple availability zones, or advanced integration with other AWS services."}}},
{en:"Which Amazon S3 storage class is designed for data that is accessed once or twice per quarter and requires retrieval times within 12 hours at the lowest storage cost?",pt:"Qual classe de armazenamento do Amazon S3 é projetada para dados acessados uma ou duas vezes por trimestre e que requer tempos de recuperação de até 12 horas com o menor custo de armazenamento?",o:{en:["S3 Glacier Deep Archive","S3 Glacier Flexible Retrieval","S3 Standard-Infrequent Access","S3 One Zone-Infrequent Access"],pt:["S3 Glacier Deep Archive","S3 Glacier Flexible Retrieval","S3 Standard-Acesso Infrequente","S3 One Zone-Acesso Infrequente"]},a:[0],exp:{pt:{tech:"O S3 Glacier Deep Archive é a classe de armazenamento mais barata do S3, projetada para retenção de longo prazo de dados acessados raramente, com tempo de recuperação padrão de até 12 horas.",simple:"O S3 Glacier Deep Archive e a classe de armazenamento mais barata do S3, para dados acessados uma ou duas vezes por trimestre com tempo de recuperacao de ate 12 horas.",avoid:"Nao use Glacier Deep Archive para dados que precisam estar disponiveis em minutos — o tempo de recuperacao e de horas. Para recuperacao mais rapida, use Glacier Flexible Retrieval ou S3 Standard-IA."},en:{tech:"S3 Glacier Deep Archive is the lowest-cost S3 storage class, designed for long-term retention of data accessed rarely, with a default retrieval time of up to 12 hours.",simple:"S3 Glacier Deep Archive is the cheapest S3 storage class, for data accessed once or twice per quarter with retrieval times of up to 12 hours.",avoid:"Do not use Glacier Deep Archive for data that needs to be available in minutes — retrieval takes hours. For faster retrieval, use Glacier Flexible Retrieval or S3 Standard-IA."}}},
{en:"Which EBS volume type provides the highest performance for mission-critical, low-latency transactional workloads such as a large relational database?",pt:"Qual tipo de volume EBS oferece a maior performance para cargas de trabalho transacionais de baixa latência e missão crítica, como um grande banco de dados relacional?",o:{en:["Provisioned IOPS SSD (io2 Block Express)","General Purpose SSD (gp3)","Throughput Optimized HDD (st1)","Cold HDD (sc1)"],pt:["SSD IOPS Provisionado (io2 Block Express)","SSD Uso Geral (gp3)","HDD Throughput Otimizado (st1)","HDD Frio (sc1)"]},a:[0],exp:{pt:{tech:"Volumes io2 Block Express oferecem até 256.000 IOPS e 4.000 MB/s de throughput com latência sub-milissegundo, sendo o tipo de volume EBS de maior performance para cargas transacionais intensivas.",simple:"O Provisioned IOPS SSD (io2 Block Express) e o tipo de volume EBS de maior desempenho, projetado para cargas criticas que exigem baixa latencia e muitas operacoes por segundo.",avoid:"Nao use io2 Block Express para cargas de trabalho com pouca exigencia de IOPS — o custo e muito alto. Para uso geral, gp3 oferece bom desempenho a um preco menor."},en:{tech:"io2 Block Express volumes provide up to 256,000 IOPS and 4,000 MB/s throughput with sub-millisecond latency, making them the highest-performance EBS volume type for intensive transactional workloads.",simple:"Provisioned IOPS SSD (io2 Block Express) is the highest-performance EBS volume type, designed for mission-critical workloads requiring low latency and high IOPS.",avoid:"Do not use io2 Block Express for workloads with low IOPS requirements — the cost is very high. For general use, gp3 offers good performance at a lower price."}}},
{en:"A company needs a fully managed file system that is compatible with the Windows Server Message Block (SMB) protocol. Which AWS service should they use?",pt:"Uma empresa precisa de um sistema de arquivos totalmente gerenciado compatível com o protocolo Windows Server Message Block (SMB). Qual serviço da AWS deve ser utilizado?",o:{en:["Amazon FSx for Windows File Server","Amazon EFS","Amazon S3","AWS Storage Gateway"],pt:["Amazon FSx for Windows File Server","Amazon EFS","Amazon S3","AWS Storage Gateway"]},a:[0],exp:{pt:{tech:"O Amazon FSx for Windows File Server fornece um sistema de arquivos nativo do Windows totalmente gerenciado, com suporte completo ao protocolo SMB, integração com Active Directory e recursos NTFS.",simple:"O FSx for Windows File Server e um sistema de arquivos gerenciado pela AWS que suporta o protocolo SMB, permitindo acesso nativo de maquinas Windows.",avoid:"Nao escolha FSx for Windows se seu ambiente e Linux — use EFS com NFS. Tambem nao confunda com FSx for Lustre, que e para computacao de alta performance."},en:{tech:"Amazon FSx for Windows File Server provides a fully managed native Windows file system with full SMB protocol support, Active Directory integration, and NTFS features.",simple:"FSx for Windows File Server is an AWS-managed file system that supports the SMB protocol, enabling native access from Windows machines.",avoid:"Do not choose FSx for Windows if your environment is Linux — use EFS with NFS. Also do not confuse it with FSx for Lustre, which is for high-performance computing."}}},
{en:"Which AWS database service is a graph database designed for applications that need to work with highly connected datasets, such as social networks or fraud detection?",pt:"Qual serviço de banco de dados da AWS é um banco de dados de grafos projetado para aplicações que precisam trabalhar com conjuntos de dados altamente conectados, como redes sociais ou detecção de fraudes?",o:{en:["Amazon Neptune","Amazon DynamoDB","Amazon Redshift","Amazon ElastiCache"],pt:["Amazon Neptune","Amazon DynamoDB","Amazon Redshift","Amazon ElastiCache"]},a:[0],exp:{pt:{tech:"O Amazon Neptune é um serviço de banco de dados de grafos totalmente gerenciado que suporta modelos Property Graph e RDF, otimizado para armazenar e consultar bilhões de relacionamentos.",simple:"O Neptune e um banco de dados de grafos gerenciado para aplicacoes que trabalham com conjuntos de dados altamente conectados, como redes sociais e deteccao de fraudes.",avoid:"Nao use o Neptune para armazenamento de dados simples em tabelas — ele e otimizado para consultas de relacionamentos. Para dados tabulares, use DynamoDB ou RDS."},en:{tech:"Amazon Neptune is a fully managed graph database service supporting Property Graph and RDF models, optimized for storing and querying billions of relationships.",simple:"Neptune is a managed graph database for applications that work with highly connected datasets, such as social networks and fraud detection.",avoid:"Do not use Neptune for simple tabular data storage — it is optimized for relationship queries. For tabular data, use DynamoDB or RDS."}}},
{en:"Which TWO features are included in the AWS Business Support plan but NOT in the Developer Support plan? (Choose TWO)",pt:"Quais DOIS recursos estão incluídos no plano AWS Business Support mas NÃO no plano Developer Support? (Escolha DOIS)",o:{en:["24/7 phone access to Cloud Support Engineers","AWS Trusted Advisor full set of checks","Access to a Technical Account Manager","Concierge Support Team access"],pt:["Acesso telefônico 24/7 a Engenheiros de Suporte Cloud","Conjunto completo de verificações do AWS Trusted Advisor","Acesso a um Technical Account Manager","Acesso à Equipe de Suporte Concierge"]},a:[0,1],multi:true,exp:{pt:{tech:"O plano Business Support inclui suporte telefônico 24/7, todas as verificações do Trusted Advisor, e tempos de resposta mais rápidos. TAM e Concierge são exclusivos do plano Enterprise.",simple:"O plano Business inclui acesso telefonico 24/7 a engenheiros de suporte e o conjunto completo de verificacoes do Trusted Advisor, recursos nao disponiveis no plano Developer.",avoid:"Nao confunda o plano Business com o Enterprise — o Business nao inclui TAM dedicado. Tambem nao escolha o Business se voce so precisa de suporte por e-mail em horario comercial, pois o Developer seria suficiente."},en:{tech:"The Business Support plan includes 24/7 phone support, all Trusted Advisor checks, and faster response times. TAM and Concierge are exclusive to the Enterprise plan.",simple:"The Business plan includes 24/7 phone access to support engineers and the full set of Trusted Advisor checks, features not available in the Developer plan.",avoid:"Do not confuse the Business plan with Enterprise — Business does not include a dedicated TAM. Also do not choose Business if you only need email support during business hours, as the Developer plan would suffice."}}},
{en:"A company wants to centrally view and manage compliance status across multiple AWS accounts. Which service provides a unified security and compliance dashboard?",pt:"Uma empresa deseja visualizar e gerenciar centralmente o status de conformidade em várias contas AWS. Qual serviço fornece um painel unificado de segurança e conformidade?",o:{en:["AWS Security Hub","Amazon GuardDuty","AWS CloudTrail","Amazon Inspector"],pt:["AWS Security Hub","Amazon GuardDuty","AWS CloudTrail","Amazon Inspector"]},a:[0],exp:{pt:{tech:"O AWS Security Hub fornece uma visão abrangente do estado de segurança na AWS, agregando alertas de diversos serviços como GuardDuty, Inspector e Macie, e verificando conformidade com padrões do setor.",simple:"O Security Hub centraliza e organiza alertas de seguranca de varios servicos AWS em um unico painel, facilitando a gestao de conformidade em multiplas contas.",avoid:"Nao use o Security Hub como substituto para servicos individuais de seguranca — ele agrega informacoes, mas voce ainda precisa do GuardDuty, Macie e Inspector habilitados para gerar os dados."},en:{tech:"AWS Security Hub provides a comprehensive view of the security state across AWS, aggregating alerts from multiple services like GuardDuty, Inspector, and Macie, and checking compliance against industry standards.",simple:"Security Hub centralizes and organizes security alerts from multiple AWS services into a single dashboard, making compliance management across multiple accounts easier.",avoid:"Do not use Security Hub as a replacement for individual security services — it aggregates information, but you still need GuardDuty, Macie, and Inspector enabled to generate the data."}}},
{en:"Which AWS service automatically investigates security findings by analyzing log data from sources like VPC Flow Logs, CloudTrail, and GuardDuty to identify the root cause of potential security issues?",pt:"Qual serviço da AWS investiga automaticamente descobertas de segurança analisando dados de log de fontes como VPC Flow Logs, CloudTrail e GuardDuty para identificar a causa raiz de potenciais problemas de segurança?",o:{en:["Amazon Detective","Amazon Macie","AWS Config","AWS Shield"],pt:["Amazon Detective","Amazon Macie","AWS Config","AWS Shield"]},a:[0],exp:{pt:{tech:"O Amazon Detective coleta e analisa automaticamente dados de log para criar visualizações interativas que ajudam a analisar, investigar e identificar rapidamente a causa raiz de problemas de segurança.",simple:"O Amazon Detective analisa automaticamente dados de logs do VPC Flow, CloudTrail e GuardDuty para investigar a causa raiz de problemas de seguranca.",avoid:"Nao confunda o Detective com o GuardDuty — o GuardDuty detecta ameacas, enquanto o Detective investiga e correlaciona dados para encontrar a causa raiz apos a deteccao."},en:{tech:"Amazon Detective automatically collects and analyzes log data to create interactive visualizations that help analyze, investigate, and quickly identify the root cause of security issues.",simple:"Amazon Detective automatically analyzes log data from VPC Flow Logs, CloudTrail, and GuardDuty to investigate the root cause of security issues.",avoid:"Do not confuse Detective with GuardDuty — GuardDuty detects threats, while Detective investigates and correlates data to find the root cause after detection."}}},
{en:"A company wants to run containerized applications without managing the underlying EC2 instances or cluster infrastructure. Which AWS service should they choose?",pt:"Uma empresa deseja executar aplicações em contêineres sem gerenciar as instâncias EC2 subjacentes ou a infraestrutura do cluster. Qual serviço da AWS deve ser escolhido?",o:{en:["AWS Fargate","Amazon EC2","Amazon ECS with EC2 launch type","Amazon Lightsail"],pt:["AWS Fargate","Amazon EC2","Amazon ECS com tipo de lançamento EC2","Amazon Lightsail"]},a:[0],exp:{pt:{tech:"O AWS Fargate é um mecanismo de computação serverless para contêineres que funciona com Amazon ECS e EKS, eliminando a necessidade de provisionar e gerenciar servidores.",simple:"O Fargate permite rodar aplicacoes em conteineres sem gerenciar instancias EC2 ou infraestrutura de cluster — voce define o conteiner e o Fargate faz o resto.",avoid:"Nao use Fargate se voce precisa de instancias GPU ou configuracoes especificas de sistema operacional — nesse caso, use ECS com EC2. O Fargate tambem pode custar mais para cargas estaveis de longa duracao."},en:{tech:"AWS Fargate is a serverless compute engine for containers that works with Amazon ECS and EKS, eliminating the need to provision and manage servers.",simple:"Fargate lets you run containerized applications without managing EC2 instances or cluster infrastructure — you define the container and Fargate does the rest.",avoid:"Do not use Fargate if you need GPU instances or specific OS configurations — in that case, use ECS with EC2. Fargate can also cost more for steady, long-running workloads."}}},
{en:"Which S3 feature automatically moves objects between storage classes based on access patterns to optimize costs?",pt:"Qual recurso do S3 move automaticamente objetos entre classes de armazenamento com base nos padrões de acesso para otimizar custos?",o:{en:["S3 Intelligent-Tiering","S3 Lifecycle Policies","S3 Replication","S3 Versioning"],pt:["S3 Intelligent-Tiering","Políticas de Ciclo de Vida do S3","Replicação do S3","Versionamento do S3"]},a:[0],exp:{pt:{tech:"O S3 Intelligent-Tiering monitora automaticamente os padrões de acesso e move objetos entre camadas de acesso frequente e infrequente sem taxas de recuperação ou impacto na performance.",simple:"O S3 Intelligent-Tiering move automaticamente seus objetos entre classes de armazenamento com base nos padroes de acesso, otimizando custos sem intervencao manual.",avoid:"Nao use Intelligent-Tiering para objetos menores que 128 KB — eles nao sao movidos entre camadas e voce paga uma taxa de monitoramento sem beneficio. Para dados com padrao de acesso conhecido, escolha a classe diretamente."},en:{tech:"S3 Intelligent-Tiering automatically monitors access patterns and moves objects between frequent and infrequent access tiers without retrieval fees or performance impact.",simple:"S3 Intelligent-Tiering automatically moves your objects between storage classes based on access patterns, optimizing costs without manual intervention.",avoid:"Do not use Intelligent-Tiering for objects smaller than 128 KB — they are not moved between tiers and you pay a monitoring fee with no benefit. For data with a known access pattern, choose the class directly."}}},
{en:"What is the MINIMUM number of Availability Zones in any AWS Region?",pt:"Qual é o número MÍNIMO de Zonas de Disponibilidade em qualquer Região da AWS?",o:{en:["3","1","2","4"],pt:["3","1","2","4"]},a:[0],exp:{pt:{tech:"Toda Região AWS possui no mínimo 3 Zonas de Disponibilidade fisicamente separadas e isoladas, conectadas por rede de alta largura de banda e baixa latência.",simple:"Toda Regiao AWS possui no minimo 3 Availability Zones, garantindo que sempre haja locais isolados suficientes para alta disponibilidade.",avoid:"Nao assuma que todas as Regioes tem o mesmo numero de AZs — o minimo e 3, mas algumas tem mais. Tambem nao confunda AZs com Edge Locations, que servem para cache de conteudo."},en:{tech:"Every AWS Region has a minimum of 3 physically separate and isolated Availability Zones, connected by high-bandwidth, low-latency networking.",simple:"Every AWS Region has at least 3 Availability Zones, ensuring there are always enough isolated locations for high availability.",avoid:"Do not assume all Regions have the same number of AZs — the minimum is 3, but some have more. Also do not confuse AZs with Edge Locations, which are for content caching."}}},
{en:"Which AWS service enables hybrid cloud storage by providing an on-premises gateway that connects to AWS cloud storage services?",pt:"Qual serviço da AWS permite armazenamento em nuvem híbrida fornecendo um gateway local que se conecta aos serviços de armazenamento em nuvem da AWS?",o:{en:["AWS Storage Gateway","AWS Direct Connect","Amazon S3 Transfer Acceleration","AWS DataSync"],pt:["AWS Storage Gateway","AWS Direct Connect","Amazon S3 Transfer Acceleration","AWS DataSync"]},a:[0],exp:{pt:{tech:"O AWS Storage Gateway é um serviço de armazenamento híbrido que oferece acesso local a armazenamento virtualmente ilimitado na nuvem, com cache local para dados acessados frequentemente.",simple:"O Storage Gateway e um servico que conecta seu ambiente local a armazenamento na nuvem AWS, permitindo uma integracao hibrida entre on-premises e a nuvem.",avoid:"Nao use o Storage Gateway se todos os seus dados ja estao na AWS — ele e projetado para cenarios hibridos. Para armazenamento 100% em nuvem, use S3 ou EFS diretamente."},en:{tech:"AWS Storage Gateway is a hybrid storage service that provides on-premises access to virtually unlimited cloud storage, with local caching for frequently accessed data.",simple:"Storage Gateway is a service that connects your on-premises environment to AWS cloud storage, enabling hybrid integration between on-premises and the cloud.",avoid:"Do not use Storage Gateway if all your data is already in AWS — it is designed for hybrid scenarios. For 100% cloud storage, use S3 or EFS directly."}}},
{en:"A company wants to migrate a 50 TB database from on-premises to AWS with minimal downtime. The database must remain operational during migration. Which AWS service is BEST suited for this?",pt:"Uma empresa deseja migrar um banco de dados de 50 TB do local para a AWS com tempo de inatividade mínimo. O banco de dados deve permanecer operacional durante a migração. Qual serviço da AWS é MAIS adequado para isso?",o:{en:["AWS Database Migration Service (DMS)","AWS Snowball Edge","AWS Application Migration Service","AWS Transfer Family"],pt:["AWS Database Migration Service (DMS)","AWS Snowball Edge","AWS Application Migration Service","AWS Transfer Family"]},a:[0],exp:{pt:{tech:"O AWS DMS suporta migrações contínuas com replicação de dados em tempo real (CDC - Change Data Capture), permitindo que o banco de dados de origem permaneça totalmente operacional durante a migração.",simple:"O DMS migra bancos de dados para a AWS com tempo de inatividade minimo, mantendo o banco de origem em funcionamento durante a transferencia dos dados.",avoid:"Nao use o DMS para migrar arquivos ou objetos — ele e exclusivo para bancos de dados. Tambem nao espere que ele otimize o schema do destino automaticamente, voce precisa planejar isso."},en:{tech:"AWS DMS supports continuous migrations with real-time data replication (CDC - Change Data Capture), allowing the source database to remain fully operational during migration.",simple:"DMS migrates databases to AWS with minimal downtime, keeping the source database operational during data transfer.",avoid:"Do not use DMS for migrating files or objects — it is exclusive to databases. Also do not expect it to automatically optimize the destination schema — you need to plan that."}}},
{en:"Which AWS service provides recommendations to help reduce costs, improve performance, enhance security, and increase fault tolerance across your AWS resources?",pt:"Qual serviço da AWS fornece recomendações para ajudar a reduzir custos, melhorar performance, aprimorar segurança e aumentar a tolerância a falhas nos seus recursos AWS?",o:{en:["AWS Trusted Advisor","AWS Config","Amazon CloudWatch","AWS CloudFormation"],pt:["AWS Trusted Advisor","AWS Config","Amazon CloudWatch","AWS CloudFormation"]},a:[0],exp:{pt:{tech:"O AWS Trusted Advisor inspeciona seu ambiente AWS e faz recomendações em cinco categorias: otimização de custos, performance, segurança, tolerância a falhas e limites de serviço.",simple:"O Trusted Advisor verifica sua conta AWS e oferece recomendacoes para reduzir custos, melhorar desempenho, aumentar seguranca e melhorar tolerancia a falhas.",avoid:"Nao dependa apenas do Trusted Advisor para seguranca — ele da recomendacoes gerais, mas nao substitui ferramentas especializadas como GuardDuty ou Inspector para deteccao de ameacas."},en:{tech:"AWS Trusted Advisor inspects your AWS environment and makes recommendations across five categories: cost optimization, performance, security, fault tolerance, and service limits.",simple:"Trusted Advisor checks your AWS account and offers recommendations to reduce costs, improve performance, enhance security, and increase fault tolerance.",avoid:"Do not rely solely on Trusted Advisor for security — it provides general recommendations but does not replace specialized tools like GuardDuty or Inspector for threat detection."}}},
{en:"Which pillar of the AWS Well-Architected Framework focuses on the ability to run workloads effectively, gain insight into operations, and continuously improve processes?",pt:"Qual pilar do AWS Well-Architected Framework foca na capacidade de executar cargas de trabalho de forma eficaz, obter visibilidade das operações e melhorar processos continuamente?",o:{en:["Operational Excellence","Reliability","Performance Efficiency","Sustainability"],pt:["Excelência Operacional","Confiabilidade","Eficiência de Performance","Sustentabilidade"]},a:[0],exp:{pt:{tech:"O pilar de Excelência Operacional inclui a capacidade de dar suporte ao desenvolvimento, executar cargas de trabalho eficientemente, obter insights operacionais e melhorar processos continuamente.",simple:"O pilar Excelencia Operacional foca em executar cargas de trabalho de forma eficaz, obter visibilidade sobre operacoes e melhorar processos continuamente.",avoid:"Nao confunda Excelencia Operacional com otimizacao de custos ou desempenho — este pilar trata de processos operacionais, monitoramento e melhoria continua, nao de eficiencia de recursos."},en:{tech:"The Operational Excellence pillar includes the ability to support development, run workloads efficiently, gain operational insights, and continuously improve processes.",simple:"The Operational Excellence pillar focuses on running workloads effectively, gaining insight into operations, and continuously improving processes.",avoid:"Do not confuse Operational Excellence with cost or performance optimization — this pillar addresses operational processes, monitoring, and continuous improvement, not resource efficiency."}}},
{en:"A company has 80 TB of data on-premises that needs to be transferred to S3 within one week, but their internet connection is only 1 Gbps. Which AWS service should they use?",pt:"Uma empresa tem 80 TB de dados locais que precisam ser transferidos para o S3 em uma semana, mas sua conexão de internet é de apenas 1 Gbps. Qual serviço da AWS deve ser utilizado?",o:{en:["AWS Snowball Edge","AWS Direct Connect","Amazon S3 Transfer Acceleration","AWS DataSync"],pt:["AWS Snowball Edge","AWS Direct Connect","Amazon S3 Transfer Acceleration","AWS DataSync"]},a:[0],exp:{pt:{tech:"O AWS Snowball Edge é um dispositivo físico com capacidade de 80 TB que permite transferir grandes volumes de dados para a AWS sem depender da largura de banda da rede. Com 1 Gbps, transferir 80 TB levaria mais de 7 dias.",simple:"O Snowball Edge e um dispositivo fisico que a AWS envia para voce copiar grandes volumes de dados e devolver, muito mais rapido do que transferir pela internet.",avoid:"Nao use o Snowball para transferencias pequenas que cabem na sua largura de banda — o tempo de envio e devolucao do dispositivo pode ser maior do que uma transferencia direta pela rede."},en:{tech:"AWS Snowball Edge is a physical device with 80 TB capacity that allows transferring large volumes of data to AWS without relying on network bandwidth. At 1 Gbps, transferring 80 TB would take over 7 days.",simple:"Snowball Edge is a physical device that AWS ships to you so you can copy large volumes of data and send it back, much faster than transferring over the internet.",avoid:"Do not use Snowball for small transfers that fit within your bandwidth — the time to ship and return the device may be longer than a direct network transfer."}}},
{en:"Which TWO services can be used to establish a private, dedicated network connection from an on-premises data center to AWS? (Choose TWO)",pt:"Quais DOIS serviços podem ser usados para estabelecer uma conexão de rede privada e dedicada de um data center local para a AWS? (Escolha DOIS)",o:{en:["AWS Direct Connect","AWS Site-to-Site VPN","Amazon CloudFront","AWS Global Accelerator"],pt:["AWS Direct Connect","AWS VPN Site-to-Site","Amazon CloudFront","AWS Global Accelerator"]},a:[0,1],multi:true,exp:{pt:{tech:"O AWS Direct Connect fornece uma conexão física dedicada, enquanto o Site-to-Site VPN cria um túnel criptografado pela internet. Ambos conectam redes on-premises à AWS de forma privada.",simple:"Direct Connect cria uma conexao de rede dedicada e privada, enquanto VPN Site-to-Site cria um tunel criptografado pela internet publica. Ambos conectam seu data center a AWS de forma privada.",avoid:"Nao use apenas VPN se voce precisa de alta largura de banda e baixa latencia consistente — a VPN depende da internet publica. Tambem nao use Direct Connect se precisa de conectividade imediata, pois a instalacao demora semanas."},en:{tech:"AWS Direct Connect provides a dedicated physical connection, while Site-to-Site VPN creates an encrypted tunnel over the internet. Both connect on-premises networks to AWS privately.",simple:"Direct Connect creates a dedicated private network connection, while Site-to-Site VPN creates an encrypted tunnel over the public internet. Both connect your data center to AWS privately.",avoid:"Do not use only VPN if you need high bandwidth and consistent low latency — VPN depends on the public internet. Also do not use Direct Connect if you need immediate connectivity, as setup takes weeks."}}},
{en:"Which AWS service provides a content delivery network (CDN) that caches content at edge locations to reduce latency for end users?",pt:"Qual serviço da AWS fornece uma rede de entrega de conteúdo (CDN) que armazena conteúdo em cache nos locais de borda para reduzir a latência para os usuários finais?",o:{en:["Amazon CloudFront","AWS Global Accelerator","Amazon Route 53","Elastic Load Balancing"],pt:["Amazon CloudFront","AWS Global Accelerator","Amazon Route 53","Elastic Load Balancing"]},a:[0],exp:{pt:{tech:"O Amazon CloudFront é um serviço de CDN que distribui conteúdo por uma rede global de pontos de presença (edge locations), reduzindo a latência ao servir dados do local mais próximo do usuário.",simple:"O CloudFront e uma rede de distribuicao de conteudo (CDN) que armazena copias do seu conteudo em edge locations ao redor do mundo para reduzir a latencia.",avoid:"Nao use o CloudFront para conteudo que muda a cada requisicao e nao pode ser cacheado — ele e mais eficaz para conteudo estatico ou com TTL definido. Para APIs dinamicas, avalie se o cache realmente beneficia seu caso."},en:{tech:"Amazon CloudFront is a CDN service that distributes content through a global network of edge locations, reducing latency by serving data from the location closest to the user.",simple:"CloudFront is a content delivery network (CDN) that caches copies of your content at edge locations around the world to reduce latency.",avoid:"Do not use CloudFront for content that changes every request and cannot be cached — it is most effective for static content or content with defined TTL. For dynamic APIs, evaluate whether caching actually benefits your use case."}}},
{en:"A company wants to record all API calls made in their AWS account for auditing and compliance. Which service should they enable?",pt:"Uma empresa deseja registrar todas as chamadas de API feitas em sua conta AWS para auditoria e conformidade. Qual serviço deve ser habilitado?",o:{en:["AWS CloudTrail","Amazon CloudWatch","AWS Config","AWS Systems Manager"],pt:["AWS CloudTrail","Amazon CloudWatch","AWS Config","AWS Systems Manager"]},a:[0],exp:{pt:{tech:"O AWS CloudTrail registra chamadas de API para sua conta AWS, incluindo quem fez a chamada, de qual endereço IP, quando foi feita e quais parâmetros foram usados.",simple:"O CloudTrail registra todas as chamadas de API na sua conta AWS, criando um rastro de auditoria para conformidade e investigacao de incidentes.",avoid:"Nao desative o CloudTrail pensando em economizar — o registro de eventos de gerenciamento e gratuito e essencial para seguranca. Tambem nao confunda com CloudWatch, que monitora metricas e logs de aplicacao."},en:{tech:"AWS CloudTrail records API calls for your AWS account, including who made the call, from which IP address, when it was made, and what parameters were used.",simple:"CloudTrail records all API calls in your AWS account, creating an audit trail for compliance and incident investigation.",avoid:"Do not disable CloudTrail thinking you will save money — management event logging is free and essential for security. Also do not confuse it with CloudWatch, which monitors metrics and application logs."}}},
