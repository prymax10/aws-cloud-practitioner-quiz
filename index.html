{en:"Which TWO statements accurately describe Amazon S3? (Choose TWO)",pt:"Quais DUAS afirmações descrevem corretamente o Amazon S3? (Escolha DUAS)",o:{en:["It provides 99.999999999% (11 nines) durability for objects","It stores data as objects in buckets","It is a block storage service attached to EC2 instances","It requires you to specify a fixed storage size at creation"],pt:["Fornece 99,999999999% (11 noves) de durabilidade para objetos","Armazena dados como objetos em buckets","É um serviço de armazenamento de bloco anexado a instâncias EC2","Exige que você especifique um tamanho fixo de armazenamento na criação"]},a:[0,1],multi:true,exp:{pt:{tech:"O Amazon S3 é um serviço de armazenamento de objetos que oferece 11 noves de durabilidade, escalabilidade virtualmente ilimitada, e organiza dados em buckets sem necessidade de definir capacidade fixa.",simple:"É como um guarda-volumes mágico que nunca perde nada (11 noves de durabilidade) e onde você pode guardar quantas caixas quiser sem reservar espaço antes — ele cresce automaticamente conforme você precisa."},en:{tech:"Amazon S3 is an object storage service that offers 11 nines of durability, virtually unlimited scalability, and organizes data in buckets without needing to define fixed capacity.",simple:"It is like a magical storage locker that never loses anything (11 nines of durability) and where you can store as many boxes as you want without reserving space beforehand — it grows automatically as you need."}}},
{en:"Which AWS service automates code deployments to Amazon EC2 instances, on-premises servers, Lambda functions, or Amazon ECS services?",pt:"Qual serviço da AWS automatiza implantações de código em instâncias Amazon EC2, servidores locais, funções Lambda ou serviços Amazon ECS?",o:{en:["AWS CodeDeploy","AWS CodeBuild","AWS CodePipeline","AWS CloudFormation"],pt:["AWS CodeDeploy","AWS CodeBuild","AWS CodePipeline","AWS CloudFormation"]},a:[0],exp:{pt:{tech:"O AWS CodeDeploy é um serviço de implantação totalmente gerenciado que automatiza deploys de software para diversos destinos, com suporte a estratégias como rolling updates, blue/green e canary.",simple:"É como um carteiro automático que entrega a nova versão do seu software para todos os servidores corretos — ele sabe onde entregar, faz isso de forma organizada (um por um ou todos de uma vez) e confirma que tudo chegou bem."},en:{tech:"AWS CodeDeploy is a fully managed deployment service that automates software deployments to various targets, supporting strategies like rolling updates, blue/green, and canary.",simple:"It is like an automated mailman who delivers the new version of your software to all the correct servers — it knows where to deliver, does it in an organized way (one by one or all at once), and confirms everything arrived safely."}}},
{en:"A company wants to run Amazon RDS in a configuration that provides automatic failover to a standby instance in a different Availability Zone. What should they enable?",pt:"Uma empresa deseja executar o Amazon RDS em uma configuração que forneça failover automático para uma instância em espera em uma Zona de Disponibilidade diferente. O que deve ser habilitado?",o:{en:["Multi-AZ deployment","Read Replicas","Reserved Instances","Provisioned IOPS"],pt:["Implantação Multi-AZ","Réplicas de Leitura","Instâncias Reservadas","IOPS Provisionado"]},a:[0],exp:{pt:{tech:"A implantação Multi-AZ do RDS mantém uma réplica síncrona em standby em outra AZ. Em caso de falha, o RDS executa failover automático para a instância standby em 60-120 segundos.",simple:"É como ter um jogador reserva aquecido no banco — se o titular se machuca (falha), o reserva entra em campo imediatamente sem parar o jogo. Ele está sempre pronto porque vem acompanhando tudo em tempo real."},en:{tech:"RDS Multi-AZ deployment maintains a synchronous standby replica in another AZ. In case of failure, RDS performs automatic failover to the standby instance within 60-120 seconds.",simple:"It is like having a warmed-up substitute player on the bench — if the starter gets injured (failure), the substitute enters the field immediately without stopping the game. They are always ready because they have been following everything in real time."}}},
{en:"Which AWS cost management tool sends alerts when your actual or forecasted costs exceed a defined threshold?",pt:"Qual ferramenta de gerenciamento de custos da AWS envia alertas quando seus custos reais ou previstos excedem um limite definido?",o:{en:["AWS Budgets","AWS Cost Explorer","AWS Pricing Calculator","AWS Cost and Usage Report"],pt:["AWS Budgets","AWS Cost Explorer","AWS Calculadora de Preços","AWS Relatório de Custo e Uso"]},a:[0],exp:{pt:{tech:"O AWS Budgets permite definir orçamentos personalizados para custos, uso e reservas, com alertas configuráveis por e-mail ou SNS quando os limites são atingidos ou previstos para serem ultrapassados.",simple:"É como configurar um alerta no seu app bancário para te avisar quando seus gastos do mês passarem de um valor — você define o limite e recebe uma notificação antes de estourar o orçamento."},en:{tech:"AWS Budgets lets you set custom budgets for costs, usage, and reservations, with configurable alerts via email or SNS when thresholds are reached or forecasted to be exceeded.",simple:"It is like setting an alert in your banking app to notify you when your monthly spending exceeds a certain amount — you define the limit and receive a notification before blowing the budget."}}},
{en:"Which AWS service uses natural language processing to extract insights and relationships from unstructured text, such as sentiment analysis and entity recognition?",pt:"Qual serviço da AWS usa processamento de linguagem natural para extrair insights e relacionamentos de texto não estruturado, como análise de sentimento e reconhecimento de entidades?",o:{en:["Amazon Comprehend","Amazon Lex","Amazon Translate","Amazon Textract"],pt:["Amazon Comprehend","Amazon Lex","Amazon Translate","Amazon Textract"]},a:[0],exp:{pt:{tech:"O Amazon Comprehend utiliza NLP e ML para descobrir insights em texto, incluindo detecção de idioma, extração de entidades, análise de sentimentos, modelagem de tópicos e classificação personalizada de documentos.",simple:"É como ter um leitor super inteligente que lê milhares de avaliações de clientes e te diz: 70% estão felizes, 20% reclamam do preço, e as marcas mais mencionadas são X e Y — tudo automaticamente."},en:{tech:"Amazon Comprehend uses NLP and ML to uncover insights from text, including language detection, entity extraction, sentiment analysis, topic modeling, and custom document classification.",simple:"It is like having a super-smart reader who reads thousands of customer reviews and tells you: 70% are happy, 20% complain about the price, and the most mentioned brands are X and Y — all automatically."}}},
{en:"Which pillar of the AWS Well-Architected Framework focuses on avoiding unnecessary costs and understanding where money is being spent?",pt:"Qual pilar do AWS Well-Architected Framework foca em evitar custos desnecessários e entender onde o dinheiro está sendo gasto?",o:{en:["Cost Optimization","Performance Efficiency","Operational Excellence","Sustainability"],pt:["Otimização de Custos","Eficiência de Performance","Excelência Operacional","Sustentabilidade"]},a:[0],exp:{pt:{tech:"O pilar de Otimização de Custos inclui compreensão dos gastos, seleção dos recursos mais econômicos, análise ao longo do tempo, escalabilidade para atender demanda sem gastar excessivamente e uso de modelos de preço adequados.",simple:"É como gerenciar o orçamento doméstico — saber quanto gasta com cada conta, cancelar assinaturas que não usa, trocar marcas caras por equivalentes mais baratas e evitar desperdício de comida."},en:{tech:"The Cost Optimization pillar includes understanding spending, selecting the most cost-effective resources, analyzing over time, scaling to meet demand without overspending, and using appropriate pricing models.",simple:"It is like managing the household budget — knowing how much you spend on each bill, canceling subscriptions you do not use, swapping expensive brands for cheaper equivalents, and avoiding food waste."}}},
{en:"Which AWS service provides a private, hosted Git repository that can be used to store and manage source code?",pt:"Qual serviço da AWS fornece um repositório Git privado e hospedado que pode ser usado para armazenar e gerenciar código-fonte?",o:{en:["AWS CodeCommit","AWS CodeBuild","AWS CodePipeline","AWS Cloud9"],pt:["AWS CodeCommit","AWS CodeBuild","AWS CodePipeline","AWS Cloud9"]},a:[0],exp:{pt:{tech:"O AWS CodeCommit é um serviço de controle de código-fonte totalmente gerenciado e seguro que hospeda repositórios Git privados, sem necessidade de gerenciar seu próprio sistema de controle de versão.",simple:"É como ter um cofre digital seguro da AWS para guardar todo o código da sua equipe — todo mundo com permissão pode acessar, fazer alterações e manter o histórico de tudo que foi mudado."},en:{tech:"AWS CodeCommit is a fully managed, secure source control service that hosts private Git repositories, without the need to manage your own version control system.",simple:"It is like having a secure digital vault from AWS to store all your team code — everyone with permission can access it, make changes, and keep a history of everything that was modified."}}},
{en:"Which TWO services help protect against Distributed Denial of Service (DDoS) attacks on AWS? (Choose TWO)",pt:"Quais DOIS serviços ajudam a proteger contra ataques de Negação de Serviço Distribuída (DDoS) na AWS? (Escolha DOIS)",o:{en:["AWS Shield","AWS WAF","Amazon Macie","AWS Config"],pt:["AWS Shield","AWS WAF","Amazon Macie","AWS Config"]},a:[0,1],multi:true,exp:{pt:{tech:"O AWS Shield fornece proteção contra DDoS (Standard incluso automaticamente, Advanced com mitigação avançada). O AWS WAF complementa filtrando tráfego malicioso na camada de aplicação, bloqueando padrões de ataque.",simple:"É como ter duas camadas de proteção num evento — o Shield é o muro e o portão que bloqueiam a multidão invasora, enquanto o WAF é a equipe de segurança na entrada que verifica cada pessoa individualmente e barra as suspeitas."},en:{tech:"AWS Shield provides DDoS protection (Standard is included automatically, Advanced offers advanced mitigation). AWS WAF complements it by filtering malicious traffic at the application layer, blocking attack patterns.",simple:"It is like having two layers of protection at an event — Shield is the wall and gate that block the invading crowd, while WAF is the security team at the entrance that checks each individual person and blocks suspicious ones."}}},
{en:"A company needs to deliver a static website with very low latency to users worldwide. Which combination of AWS services is MOST appropriate?",pt:"Uma empresa precisa entregar um site estático com latência muito baixa para usuários no mundo todo. Qual combinação de serviços da AWS é MAIS apropriada?",o:{en:["Amazon S3 + Amazon CloudFront","Amazon EC2 + Elastic Load Balancing","AWS Lambda + API Gateway","Amazon RDS + ElastiCache"],pt:["Amazon S3 + Amazon CloudFront","Amazon EC2 + Elastic Load Balancing","AWS Lambda + API Gateway","Amazon RDS + ElastiCache"]},a:[0],exp:{pt:{tech:"O S3 hospeda o conteúdo estático com alta durabilidade e o CloudFront distribui esse conteúdo por edge locations globais, reduzindo latência ao servir do ponto mais próximo do usuário.",simple:"É como uma rede de bibliotecas comunitárias (CloudFront) que tem cópias do mesmo livro (S3) espalhadas por toda a cidade — em vez de todo mundo ir até a biblioteca central, cada pessoa pega o livro na filial mais perto de casa."},en:{tech:"S3 hosts the static content with high durability and CloudFront distributes that content through global edge locations, reducing latency by serving from the point closest to the user.",simple:"It is like a network of community libraries (CloudFront) that have copies of the same book (S3) spread across the city — instead of everyone going to the central library, each person picks up the book at the branch closest to home."}}},
{en:"What is the response time for a production system down case under the AWS Enterprise Support plan?",pt:"Qual é o tempo de resposta para um caso de sistema de produção indisponível no plano AWS Enterprise Support?",o:{en:["Less than 15 minutes","Less than 1 hour","Less than 4 hours","Less than 24 hours"],pt:["Menos de 15 minutos","Menos de 1 hora","Menos de 4 horas","Menos de 24 horas"]},a:[0],exp:{pt:{tech:"O plano Enterprise Support oferece tempo de resposta inferior a 15 minutos para casos críticos de negócio (sistema de produção indisponível), com acesso a Senior Cloud Support Engineers 24/7.",simple:"É como ter um médico de emergência exclusivo — quando algo realmente grave acontece (seu sistema para), você recebe atendimento em menos de 15 minutos, o tempo mais rápido disponível entre todos os planos."},en:{tech:"The Enterprise Support plan offers less than 15 minutes response time for business-critical cases (production system down), with access to Senior Cloud Support Engineers 24/7.",simple:"It is like having an exclusive emergency doctor — when something really serious happens (your system goes down), you get attention in less than 15 minutes, the fastest time available across all plans."}}},
{en:"Which Amazon EFS feature makes it different from Amazon EBS in terms of access?",pt:"Qual recurso do Amazon EFS o diferencia do Amazon EBS em termos de acesso?",o:{en:["EFS can be mounted by multiple EC2 instances simultaneously across Availability Zones","EFS provides block-level storage optimized for single instance attachment","EFS stores objects with metadata and unique identifiers","EFS is available only within a single Availability Zone"],pt:["O EFS pode ser montado por várias instâncias EC2 simultaneamente em diferentes Zonas de Disponibilidade","O EFS fornece armazenamento em nível de bloco otimizado para anexo a uma única instância","O EFS armazena objetos com metadados e identificadores únicos","O EFS está disponível apenas em uma única Zona de Disponibilidade"]},a:[0],exp:{pt:{tech:"O Amazon EFS é um sistema de arquivos NFS elástico totalmente gerenciado que pode ser montado simultaneamente por milhares de instâncias EC2 em múltiplas AZs, diferente do EBS que é vinculado a uma única instância/AZ.",simple:"É como a diferença entre um HD externo (EBS) e uma pasta compartilhada na rede da empresa (EFS) — o HD externo só pode ser plugado em um computador por vez, enquanto a pasta compartilhada pode ser acessada por todos os computadores ao mesmo tempo."},en:{tech:"Amazon EFS is a fully managed elastic NFS file system that can be simultaneously mounted by thousands of EC2 instances across multiple AZs, unlike EBS which is tied to a single instance/AZ.",simple:"It is like the difference between an external hard drive (EBS) and a shared network folder (EFS) — the external hard drive can only be plugged into one computer at a time, while the shared folder can be accessed by all computers simultaneously."}}},
{en:"Which AWS service translates text between languages in real time and can be integrated into applications for multilingual support?",pt:"Qual serviço da AWS traduz texto entre idiomas em tempo real e pode ser integrado a aplicações para suporte multilíngue?",o:{en:["Amazon Translate","Amazon Comprehend","Amazon Polly","Amazon Transcribe"],pt:["Amazon Translate","Amazon Comprehend","Amazon Polly","Amazon Transcribe"]},a:[0],exp:{pt:{tech:"O Amazon Translate é um serviço de tradução automática neural que oferece tradução de texto rápida e de alta qualidade entre idiomas suportados, com integração via API.",simple:"É como ter um tradutor profissional disponível 24 horas que traduz qualquer texto instantaneamente — seu site pode automaticamente aparecer em português para brasileiros e em inglês para americanos."},en:{tech:"Amazon Translate is a neural machine translation service that provides fast, high-quality text translation between supported languages, with API integration.",simple:"It is like having a professional translator available 24 hours who translates any text instantly — your website can automatically appear in Portuguese for Brazilians and in English for Americans."}}},
{en:"Which AWS service improves the performance and availability of applications by routing user traffic through the AWS global network to the optimal endpoint based on health, geography, and routing policies?",pt:"Qual serviço da AWS melhora a performance e disponibilidade de aplicações roteando o tráfego dos usuários pela rede global da AWS para o endpoint ideal com base em saúde, geografia e políticas de roteamento?",o:{en:["AWS Global Accelerator","Amazon CloudFront","Amazon Route 53","Elastic Load Balancing"],pt:["AWS Global Accelerator","Amazon CloudFront","Amazon Route 53","Elastic Load Balancing"]},a:[0],exp:{pt:{tech:"O AWS Global Accelerator usa a rede global da AWS para direcionar o tráfego ao endpoint mais saudável e próximo, fornecendo endereços IP anycast estáticos e failover automático entre Regiões.",simple:"É como um GPS inteligente que conhece todas as rotas privadas (rede AWS) e sempre escolhe o caminho mais rápido e livre de trânsito para você chegar ao destino, desviando automaticamente se uma estrada estiver bloqueada."},en:{tech:"AWS Global Accelerator uses the AWS global network to direct traffic to the healthiest and closest endpoint, providing static anycast IP addresses and automatic failover between Regions.",simple:"It is like a smart GPS that knows all the private routes (AWS network) and always chooses the fastest, traffic-free path for you to reach your destination, automatically rerouting if a road is blocked."}}},
{en:"Which TWO actions are responsibilities of AWS under the Shared Responsibility Model? (Choose TWO)",pt:"Quais DUAS ações são responsabilidades da AWS no Modelo de Responsabilidade Compartilhada? (Escolha DUAS)",o:{en:["Managing the physical security of data centers","Maintaining the hardware infrastructure that runs AWS services","Configuring security groups and NACLs for customer VPCs","Encrypting customer data at rest"],pt:["Gerenciar a segurança física dos data centers","Manter a infraestrutura de hardware que executa os serviços AWS","Configurar security groups e NACLs para VPCs dos clientes","Criptografar dados dos clientes em repouso"]},a:[0,1],multi:true,exp:{pt:{tech:"No Modelo de Responsabilidade Compartilhada, a AWS é responsável pela segurança DA nuvem (infraestrutura física, hardware, rede, virtualização), enquanto o cliente é responsável pela segurança NA nuvem (dados, configurações, identidade).",simple:"É como alugar um espaço num prédio comercial — o proprietário (AWS) cuida da estrutura do prédio, segurança da portaria e manutenção elétrica. Você (cliente) cuida de trancar sua sala, proteger seus documentos e decidir quem pode entrar."},en:{tech:"In the Shared Responsibility Model, AWS is responsible for security OF the cloud (physical infrastructure, hardware, networking, virtualization), while the customer is responsible for security IN the cloud (data, configurations, identity).",simple:"It is like renting space in a commercial building — the landlord (AWS) takes care of the building structure, lobby security, and electrical maintenance. You (customer) take care of locking your office, protecting your documents, and deciding who can enter."}}},
{en:"A data analytics team needs a data warehouse that can handle complex queries across structured data from multiple sources. Which AWS service is purpose-built for this?",pt:"Uma equipe de análise de dados precisa de um data warehouse que possa lidar com consultas complexas em dados estruturados de várias fontes. Qual serviço da AWS é projetado especificamente para isso?",o:{en:["Amazon Redshift","Amazon RDS","Amazon DynamoDB","Amazon ElastiCache"],pt:["Amazon Redshift","Amazon RDS","Amazon DynamoDB","Amazon ElastiCache"]},a:[0],exp:{pt:{tech:"O Amazon Redshift é um data warehouse totalmente gerenciado em escala de petabytes que usa armazenamento colunar e processamento massivamente paralelo para consultas analíticas complexas com alta performance.",simple:"É como ter uma mega-biblioteca organizada por assuntos (colunar) com uma equipe de centenas de pesquisadores (MPP) que podem buscar informações ao mesmo tempo — perfeita para responder perguntas complexas que envolvem milhões de registros."},en:{tech:"Amazon Redshift is a fully managed petabyte-scale data warehouse that uses columnar storage and massively parallel processing for complex analytical queries with high performance.",simple:"It is like having a mega-library organized by topics (columnar) with a team of hundreds of researchers (MPP) who can search for information at the same time — perfect for answering complex questions involving millions of records."}}},
{en:"Which EC2 purchasing option provides a significant discount (up to 72%) in exchange for a commitment to a consistent amount of compute usage for a 1 or 3 year term?",pt:"Qual opção de compra do EC2 oferece um desconto significativo (até 72%) em troca de um compromisso com uma quantidade consistente de uso de computação por um período de 1 ou 3 anos?",o:{en:["Savings Plans","Spot Instances","On-Demand Instances","Dedicated Instances"],pt:["Savings Plans","Instâncias Spot","Instâncias Sob Demanda","Instâncias Dedicadas"]},a:[0],exp:{pt:{tech:"Os Savings Plans oferecem preços reduzidos em troca de um compromisso de uso consistente (em USD/hora) por 1 ou 3 anos, aplicáveis a EC2, Lambda e Fargate com flexibilidade de instância e região.",simple:"É como assinar um plano anual de academia — você se compromete a pagar por 1 ou 3 anos, mas a mensalidade fica bem mais barata do que pagar avulso a cada mês."},en:{tech:"Savings Plans offer reduced pricing in exchange for a commitment to consistent usage (in USD/hour) for 1 or 3 years, applicable to EC2, Lambda, and Fargate with instance and Region flexibility.",simple:"It is like signing an annual gym membership — you commit to paying for 1 or 3 years, but the monthly fee is much cheaper than paying per visit each month."}}},
{en:"What is the purpose of an Internet Gateway in a VPC?",pt:"Qual é o propósito de um Internet Gateway em uma VPC?",o:{en:["To allow communication between the VPC and the internet","To provide DNS resolution within the VPC","To encrypt all traffic leaving the VPC","To connect two VPCs together privately"],pt:["Permitir a comunicação entre a VPC e a internet","Fornecer resolução de DNS dentro da VPC","Criptografar todo o tráfego que sai da VPC","Conectar duas VPCs de forma privada"]},a:[0],exp:{pt:{tech:"Um Internet Gateway é um componente de VPC horizontalmente escalável e altamente disponível que permite comunicação bidirecional entre instâncias na VPC e a internet.",simple:"É como a porta principal de uma casa — sem ela, ninguém dentro da casa consegue sair para a rua e ninguém de fora consegue entrar. O Internet Gateway é essa porta que conecta seu mundo privado (VPC) ao mundo externo (internet)."},en:{tech:"An Internet Gateway is a horizontally scaled, highly available VPC component that enables bidirectional communication between instances in the VPC and the internet.",simple:"It is like the front door of a house — without it, nobody inside the house can go out to the street and nobody from outside can come in. The Internet Gateway is that door connecting your private world (VPC) to the outside world (internet)."}}},
{en:"Which AWS service can create an inventory of on-premises servers to help plan a migration, including server specifications, performance data, and running processes?",pt:"Qual serviço da AWS pode criar um inventário de servidores locais para ajudar a planejar uma migração, incluindo especificações de servidor, dados de performance e processos em execução?",o:{en:["AWS Application Discovery Service","AWS Migration Hub","AWS DMS","AWS Server Migration Service"],pt:["AWS Application Discovery Service","AWS Migration Hub","AWS DMS","AWS Server Migration Service"]},a:[0],exp:{pt:{tech:"O AWS Application Discovery Service coleta informações sobre servidores on-premises, incluindo configuração, uso de CPU/memória/disco, dependências de rede e processos em execução, para planejamento de migração.",simple:"É como contratar um perito para fazer uma vistoria completa antes de mudar de casa — ele documenta todos os móveis, mede os espaços, anota o que depende do que, para que a mudança seja planejada sem surpresas."},en:{tech:"AWS Application Discovery Service collects information about on-premises servers, including configuration, CPU/memory/disk usage, network dependencies, and running processes, for migration planning.",simple:"It is like hiring an inspector to do a complete survey before moving houses — they document all the furniture, measure the spaces, note what depends on what, so the move is planned without surprises."}}},
{en:"A company runs a web application that experiences 10x traffic spikes during holiday seasons. Which EC2 feature automatically adds or removes instances based on demand?",pt:"Uma empresa executa uma aplicação web que experimenta picos de tráfego 10x durante temporadas de férias. Qual recurso do EC2 adiciona ou remove instâncias automaticamente com base na demanda?",o:{en:["Auto Scaling","Elastic Load Balancing","Reserved Instances","Placement Groups"],pt:["Auto Scaling","Elastic Load Balancing","Instâncias Reservadas","Grupos de Posicionamento"]},a:[0],exp:{pt:{tech:"O Amazon EC2 Auto Scaling ajusta automaticamente o número de instâncias EC2 com base em condições definidas (métricas do CloudWatch, horários programados), mantendo performance e otimizando custos.",simple:"É como um restaurante que contrata mais cozinheiros no Natal quando a demanda explode e dispensa o excedente em janeiro — você sempre tem a quantidade certa de funcionários para a demanda atual, sem desperdício."},en:{tech:"Amazon EC2 Auto Scaling automatically adjusts the number of EC2 instances based on defined conditions (CloudWatch metrics, scheduled times), maintaining performance and optimizing costs.",simple:"It is like a restaurant that hires more cooks during Christmas when demand explodes and lets go of the extra ones in January — you always have the right number of staff for the current demand, without waste."}}},
{en:"Which AWS service provides a fully managed message queuing service that enables decoupling of microservices and distributed systems?",pt:"Qual serviço da AWS fornece um serviço de filas de mensagens totalmente gerenciado que permite o desacoplamento de microsserviços e sistemas distribuídos?",o:{en:["Amazon SQS","Amazon SNS","Amazon EventBridge","AWS Step Functions"],pt:["Amazon SQS","Amazon SNS","Amazon EventBridge","AWS Step Functions"]},a:[0],exp:{pt:{tech:"O Amazon SQS (Simple Queue Service) é um serviço de filas de mensagens totalmente gerenciado que permite desacoplar e escalar microsserviços, sistemas distribuídos e aplicações serverless.",simple:"É como a prateleira de pedidos numa cozinha de restaurante — o garçom coloca o pedido na prateleira e o cozinheiro pega quando estiver disponível. Nenhum dos dois precisa esperar pelo outro, trabalhando cada um no seu ritmo."},en:{tech:"Amazon SQS (Simple Queue Service) is a fully managed message queuing service that enables decoupling and scaling of microservices, distributed systems, and serverless applications.",simple:"It is like the order shelf in a restaurant kitchen — the waiter places the order on the shelf and the cook picks it up when available. Neither has to wait for the other, each working at their own pace."}}},
{en:"Which TWO are valid use cases for Amazon CloudWatch? (Choose TWO)",pt:"Quais DOIS são casos de uso válidos para o Amazon CloudWatch? (Escolha DOIS)",o:{en:["Monitoring CPU utilization of EC2 instances and triggering alarms","Creating dashboards to visualize operational metrics in real time","Recording all API calls made to AWS services","Automatically remediating non-compliant resource configurations"],pt:["Monitorar utilização de CPU de instâncias EC2 e disparar alarmes","Criar painéis para visualizar métricas operacionais em tempo real","Registrar todas as chamadas de API feitas aos serviços AWS","Remediar automaticamente configurações de recursos não conformes"]},a:[0,1],multi:true,exp:{pt:{tech:"O Amazon CloudWatch coleta e monitora métricas, logs e eventos, permite criar alarmes com ações automáticas e dashboards personalizados para visualização em tempo real do estado operacional.",simple:"É como o painel de instrumentos do seu carro — mostra a velocidade (CPU), nível de combustível (memória), temperatura do motor (métricas) e acende luzes de alerta (alarmes) quando algo precisa de atenção."},en:{tech:"Amazon CloudWatch collects and monitors metrics, logs, and events, allows creating alarms with automatic actions and custom dashboards for real-time visualization of operational state.",simple:"It is like the dashboard of your car — it shows speed (CPU), fuel level (memory), engine temperature (metrics), and turns on warning lights (alarms) when something needs attention."}}},
{en:"In the context of VPC networking, what is the purpose of a subnet?",pt:"No contexto de redes VPC, qual é o propósito de uma sub-rede?",o:{en:["To partition a VPC IP address range into smaller segments for organizing resources","To connect the VPC to the internet","To provide DNS resolution for VPC resources","To encrypt network traffic between instances"],pt:["Particionar o intervalo de endereços IP de uma VPC em segmentos menores para organizar recursos","Conectar a VPC à internet","Fornecer resolução de DNS para recursos da VPC","Criptografar o tráfego de rede entre instâncias"]},a:[0],exp:{pt:{tech:"Uma sub-rede é um segmento de faixa de endereços IP dentro de uma VPC, associada a uma única AZ. Sub-redes podem ser públicas (com rota para Internet Gateway) ou privadas.",simple:"É como dividir um grande terreno em lotes menores — cada lote (sub-rede) tem seu próprio endereço e regras. Alguns lotes ficam na frente com acesso à rua (público), outros ficam no fundo, mais protegidos (privado)."},en:{tech:"A subnet is a segment of IP address range within a VPC, associated with a single AZ. Subnets can be public (with route to Internet Gateway) or private.",simple:"It is like dividing a large plot of land into smaller lots — each lot (subnet) has its own address and rules. Some lots face the street with public access (public), others are at the back, more protected (private)."}}},
{en:"A retail company wants to analyze historical spending patterns and forecast future AWS costs for the next 12 months. Which tool should they use?",pt:"Uma empresa de varejo deseja analisar padrões de gastos históricos e prever custos futuros da AWS para os próximos 12 meses. Qual ferramenta deve ser utilizada?",o:{en:["AWS Cost Explorer","AWS Budgets","AWS Pricing Calculator","AWS Billing Dashboard"],pt:["AWS Cost Explorer","AWS Budgets","AWS Calculadora de Preços","AWS Painel de Faturamento"]},a:[0],exp:{pt:{tech:"O AWS Cost Explorer fornece visualização e análise de custos e uso ao longo do tempo, com recursos de filtragem, agrupamento e previsão de gastos futuros por até 12 meses.",simple:"É como um extrato bancário inteligente que não só mostra o que você já gastou, mas também analisa seus hábitos e prevê quanto você vai gastar nos próximos meses — ajudando a se planejar financeiramente."},en:{tech:"AWS Cost Explorer provides cost and usage visualization and analysis over time, with filtering, grouping, and future spending forecasting capabilities for up to 12 months.",simple:"It is like a smart bank statement that not only shows what you already spent, but also analyzes your habits and predicts how much you will spend in the coming months — helping you plan financially."}}},
{en:"Which AWS service provides a set of physical devices that can transfer data into and out of AWS by shipping the device, useful when network transfer would take too long?",pt:"Qual serviço da AWS fornece um conjunto de dispositivos físicos que podem transferir dados para dentro e fora da AWS enviando o dispositivo, útil quando a transferência por rede demoraria muito?",o:{en:["AWS Snow Family","AWS DataSync","AWS Transfer Family","AWS Direct Connect"],pt:["AWS Snow Family","AWS DataSync","AWS Transfer Family","AWS Direct Connect"]},a:[0],exp:{pt:{tech:"A AWS Snow Family (Snowcone, Snowball Edge, Snowmobile) oferece dispositivos físicos para migração de dados offline em escala, desde 8 TB (Snowcone) até 100 PB (Snowmobile).",simple:"É como enviar seus pertences por um caminhão de mudança em vez de tentar passar tudo pela janela de um prédio — quando você tem muita coisa pra mover, o transporte físico é muito mais rápido e prático do que pela rede."},en:{tech:"The AWS Snow Family (Snowcone, Snowball Edge, Snowmobile) provides physical devices for offline data migration at scale, from 8 TB (Snowcone) to 100 PB (Snowmobile).",simple:"It is like shipping your belongings via a moving truck instead of trying to pass everything through a building window — when you have a lot to move, physical transport is much faster and more practical than over the network."}}},
{en:"Which feature of the AWS Free Tier allows new customers to run a t2.micro or t3.micro EC2 instance for free for 12 months?",pt:"Qual recurso do AWS Free Tier permite que novos clientes executem uma instância EC2 t2.micro ou t3.micro gratuitamente por 12 meses?",o:{en:["12-Month Free Tier","Always Free","Short-Term Trial","Free Usage Credits"],pt:["Free Tier de 12 Meses","Sempre Gratuito","Teste de Curto Prazo","Créditos de Uso Gratuito"]},a:[0],exp:{pt:{tech:"O AWS Free Tier oferece três tipos de ofertas: 12-Month Free (expira 12 meses após criação da conta), Always Free (não expira), e Short-Term Trials (período limitado por serviço). A instância t2/t3.micro é parte do 12-Month Free.",simple:"É como um teste grátis de 1 ano de um serviço de streaming — você pode usar sem pagar durante 12 meses, mas depois disso começa a ser cobrado normalmente."},en:{tech:"The AWS Free Tier offers three types of offers: 12-Month Free (expires 12 months after account creation), Always Free (does not expire), and Short-Term Trials (limited period per service). The t2/t3.micro instance is part of 12-Month Free.",simple:"It is like a 1-year free trial of a streaming service — you can use it without paying for 12 months, but after that you start being charged normally."}}},
{en:"Which AWS service acts as a managed Apache Kafka service for building real-time streaming data pipelines and applications?",pt:"Qual serviço da AWS atua como um serviço gerenciado do Apache Kafka para construir pipelines e aplicações de dados de streaming em tempo real?",o:{en:["Amazon MSK","Amazon Kinesis Data Streams","Amazon SQS","Amazon EventBridge"],pt:["Amazon MSK","Amazon Kinesis Data Streams","Amazon SQS","Amazon EventBridge"]},a:[0],exp:{pt:{tech:"O Amazon MSK (Managed Streaming for Apache Kafka) é um serviço totalmente gerenciado que facilita a construção e execução de aplicações que usam Apache Kafka para processar dados de streaming.",simple:"É como ter uma esteira transportadora industrial (Kafka) profissional já montada e com manutenção incluída — você só coloca os produtos (dados) na esteira e eles fluem em tempo real para onde precisam ir."},en:{tech:"Amazon MSK (Managed Streaming for Apache Kafka) is a fully managed service that makes it easy to build and run applications that use Apache Kafka to process streaming data.",simple:"It is like having a professional industrial conveyor belt (Kafka) already assembled with maintenance included — you just place the products (data) on the belt and they flow in real time to where they need to go."}}},
{en:"A company needs a VPC that can route traffic between itself and another VPC without going through the public internet. Which feature enables this direct private connection?",pt:"Uma empresa precisa de uma VPC que possa rotear tráfego entre ela mesma e outra VPC sem passar pela internet pública. Qual recurso permite essa conexão privada direta?",o:{en:["VPC Peering","Internet Gateway","NAT Gateway","AWS Transit Gateway"],pt:["VPC Peering","Internet Gateway","NAT Gateway","AWS Transit Gateway"]},a:[0],exp:{pt:{tech:"O VPC Peering cria uma conexão de rede privada entre duas VPCs usando endereços IP privados, como se estivessem na mesma rede. O tráfego permanece na rede da AWS e não atravessa a internet pública.",simple:"É como construir uma passarela coberta entre dois prédios vizinhos — as pessoas podem ir de um prédio ao outro diretamente, sem precisar descer até a rua (internet pública)."},en:{tech:"VPC Peering creates a private network connection between two VPCs using private IP addresses, as if they were on the same network. Traffic stays on the AWS network and does not cross the public internet.",simple:"It is like building a covered walkway between two neighboring buildings — people can go from one building to the other directly, without needing to go down to the street (public internet)."}}},
{en:"Which AWS service provides managed Memcached or Redis clusters for caching frequently accessed data to improve application performance?",pt:"Qual serviço da AWS fornece clusters gerenciados de Memcached ou Redis para armazenar em cache dados acessados frequentemente e melhorar a performance da aplicação?",o:{en:["Amazon ElastiCache","Amazon DynamoDB Accelerator","Amazon Redshift","Amazon RDS Proxy"],pt:["Amazon ElastiCache","Amazon DynamoDB Accelerator","Amazon Redshift","Amazon RDS Proxy"]},a:[0],exp:{pt:{tech:"O Amazon ElastiCache é um serviço totalmente gerenciado de cache em memória compatível com Redis e Memcached, oferecendo latência de sub-milissegundo para casos de uso como caching de sessão e consultas frequentes.",simple:"É como ter uma geladeira (cache) na cozinha do restaurante para os ingredientes mais usados — pegar algo da geladeira (ElastiCache) é instantâneo, enquanto ir até o depósito (banco de dados) demora muito mais."},en:{tech:"Amazon ElastiCache is a fully managed in-memory caching service compatible with Redis and Memcached, offering sub-millisecond latency for use cases like session caching and frequent queries.",simple:"It is like having a fridge (cache) in the restaurant kitchen for the most-used ingredients — grabbing something from the fridge (ElastiCache) is instant, while going to the warehouse (database) takes much longer."}}},
{en:"What is the MAIN difference between a public subnet and a private subnet in a VPC?",pt:"Qual é a PRINCIPAL diferença entre uma sub-rede pública e uma sub-rede privada em uma VPC?",o:{en:["A public subnet has a route to an Internet Gateway while a private subnet does not","A public subnet allows more EC2 instances than a private subnet","A public subnet uses IPv4 while a private subnet uses IPv6","A public subnet is in one AZ while a private subnet spans multiple AZs"],pt:["Uma sub-rede pública tem uma rota para um Internet Gateway enquanto uma privada não tem","Uma sub-rede pública permite mais instâncias EC2 que uma privada","Uma sub-rede pública usa IPv4 enquanto uma privada usa IPv6","Uma sub-rede pública está em uma AZ enquanto uma privada abrange várias AZs"]},a:[0],exp:{pt:{tech:"A distinção entre sub-rede pública e privada é determinada pela tabela de rotas: sub-redes públicas possuem rota para um Internet Gateway, enquanto sub-redes privadas não possuem essa rota direta.",simple:"É como a diferença entre uma loja na rua (pública) e um escritório nos fundos (privado) — a loja tem porta para a calçada (Internet Gateway) e qualquer um pode entrar, enquanto o escritório só é acessível por dentro do prédio."},en:{tech:"The distinction between public and private subnets is determined by the route table: public subnets have a route to an Internet Gateway, while private subnets do not have that direct route.",simple:"It is like the difference between a street-facing shop (public) and a back office (private) — the shop has a door to the sidewalk (Internet Gateway) and anyone can enter, while the office is only accessible from inside the building."}}},
{en:"Which TWO statements about Amazon RDS are correct? (Choose TWO)",pt:"Quais DUAS afirmações sobre o Amazon RDS estão corretas? (Escolha DUAS)",o:{en:["RDS supports multiple database engines including MySQL, PostgreSQL, and Oracle","RDS handles routine database tasks like patching and backups automatically","RDS only supports the Amazon Aurora engine","RDS provides direct access to the underlying operating system of the database instance"],pt:["O RDS suporta vários mecanismos de banco de dados incluindo MySQL, PostgreSQL e Oracle","O RDS lida automaticamente com tarefas rotineiras do banco de dados como patches e backups","O RDS suporta apenas o mecanismo Amazon Aurora","O RDS fornece acesso direto ao sistema operacional subjacente da instância de banco de dados"]},a:[0,1],multi:true,exp:{pt:{tech:"O Amazon RDS é um serviço gerenciado que suporta seis engines (Aurora, MySQL, PostgreSQL, MariaDB, Oracle, SQL Server), automatizando provisionamento de hardware, patches, backups e recuperação.",simple:"É como ter um mecânico que cuida do seu carro e aceita trabalhar com várias marcas (MySQL, PostgreSQL, Oracle) — ele faz a manutenção, troca óleo e faz revisões automaticamente, sem você precisar abrir o capô."},en:{tech:"Amazon RDS is a managed service supporting six engines (Aurora, MySQL, PostgreSQL, MariaDB, Oracle, SQL Server), automating hardware provisioning, patching, backups, and recovery.",simple:"It is like having a mechanic who takes care of your car and works with multiple brands (MySQL, PostgreSQL, Oracle) — they do maintenance, oil changes, and inspections automatically, without you needing to open the hood."}}},
{en:"A company wants to enforce that all S3 buckets across their organization have encryption enabled. Which service allows them to create rules that automatically evaluate resource configurations?",pt:"Uma empresa deseja garantir que todos os buckets S3 em sua organização tenham criptografia habilitada. Qual serviço permite criar regras que avaliam automaticamente configurações de recursos?",o:{en:["AWS Config","AWS CloudTrail","Amazon CloudWatch","AWS Organizations"],pt:["AWS Config","AWS CloudTrail","Amazon CloudWatch","AWS Organizations"]},a:[0],exp:{pt:{tech:"O AWS Config permite criar regras gerenciadas e personalizadas que avaliam continuamente as configurações de recursos AWS. A regra s3-bucket-server-side-encryption-enabled verifica se a criptografia está habilitada em buckets S3.",simple:"É como um inspetor de segurança automático que verifica todos os dias se todas as portas da empresa estão trancadas — se encontrar alguma aberta (sem criptografia), te avisa imediatamente."},en:{tech:"AWS Config allows creating managed and custom rules that continuously evaluate AWS resource configurations. The s3-bucket-server-side-encryption-enabled rule checks if encryption is enabled on S3 buckets.",simple:"It is like an automated security inspector who checks every day if all the company doors are locked — if they find one open (no encryption), they notify you immediately."}}},
{en:"Which type of Edge Location resource does Amazon CloudFront use to cache larger files closer to regional viewers when the edge location cache is full?",pt:"Qual tipo de recurso de Edge Location o Amazon CloudFront usa para armazenar em cache arquivos maiores mais perto dos visualizadores regionais quando o cache do edge location está cheio?",o:{en:["Regional Edge Cache","Local Zone","Availability Zone","Wavelength Zone"],pt:["Cache de Borda Regional","Zona Local","Zona de Disponibilidade","Zona Wavelength"]},a:[0],exp:{pt:{tech:"Regional Edge Caches ficam entre o servidor de origem e os Edge Locations globais do CloudFront. Possuem caches maiores e retêm conteúdo por mais tempo, reduzindo a necessidade de buscar no servidor de origem.",simple:"É como um depósito regional entre a fábrica (origem) e as lojas do bairro (edge locations) — quando uma loja não tem mais espaço para guardar um produto, o depósito regional ainda tem, evitando que o pedido vá até a fábrica distante."},en:{tech:"Regional Edge Caches sit between the origin server and the global CloudFront Edge Locations. They have larger caches and retain content longer, reducing the need to fetch from the origin server.",simple:"It is like a regional warehouse between the factory (origin) and the neighborhood stores (edge locations) — when a store runs out of space for a product, the regional warehouse still has it, avoiding a trip all the way back to the distant factory."}}},
{en:"Which TWO are characteristics of the AWS Basic Support plan that is available to ALL AWS customers? (Choose TWO)",pt:"Quais DUAS são características do plano AWS Basic Support disponível para TODOS os clientes AWS? (Escolha DUAS)",o:{en:["Access to AWS documentation, whitepapers, and support forums","Access to the 7 core Trusted Advisor checks","24/7 phone access to Cloud Support Engineers","Access to AWS Infrastructure Event Management"],pt:["Acesso a documentação AWS, whitepapers e fóruns de suporte","Acesso às 7 verificações principais do Trusted Advisor","Acesso telefônico 24/7 a Engenheiros de Suporte Cloud","Acesso ao AWS Infrastructure Event Management"]},a:[0,1],multi:true,exp:{pt:{tech:"O plano Basic Support, incluído gratuitamente para todas as contas AWS, oferece acesso a documentação, whitepapers, fóruns, Personal Health Dashboard e 7 verificações principais do Trusted Advisor.",simple:"É como o plano básico gratuito de um condomínio — você tem acesso ao manual do morador (documentação), quadro de avisos (fóruns), e inspeções básicas de segurança (7 checks do Trusted Advisor), mas sem suporte dedicado."},en:{tech:"The Basic Support plan, included free for all AWS accounts, provides access to documentation, whitepapers, forums, Personal Health Dashboard, and 7 core Trusted Advisor checks.",simple:"It is like the free basic plan of a condo — you get access to the resident manual (documentation), bulletin board (forums), and basic safety inspections (7 Trusted Advisor checks), but no dedicated support."}}},
{en:"A media company needs to store video files that will be accessed frequently for the first 30 days, then rarely after that. Which S3 feature can automatically transition objects to a cheaper storage class after 30 days?",pt:"Uma empresa de mídia precisa armazenar arquivos de vídeo que serão acessados frequentemente nos primeiros 30 dias e raramente depois disso. Qual recurso do S3 pode transicionar automaticamente objetos para uma classe de armazenamento mais barata após 30 dias?",o:{en:["S3 Lifecycle Policies","S3 Intelligent-Tiering","S3 Versioning","S3 Object Lock"],pt:["Políticas de Ciclo de Vida do S3","S3 Intelligent-Tiering","Versionamento do S3","S3 Object Lock"]},a:[0],exp:{pt:{tech:"As Políticas de Ciclo de Vida do S3 permitem definir regras para transicionar objetos automaticamente entre classes de armazenamento ou excluí-los após um período específico, baseado na idade do objeto.",simple:"É como ter uma regra automática no seu armário — roupas que você não usou nos últimos 30 dias vão para a mala de armazenamento (classe mais barata), e roupas de 1 ano atrás vão para doação (exclusão). Tudo sem você precisar lembrar."},en:{tech:"S3 Lifecycle Policies let you define rules to automatically transition objects between storage classes or delete them after a specific period, based on the object age.",simple:"It is like having an automatic rule for your closet — clothes you have not worn in the last 30 days go to the storage suitcase (cheaper class), and clothes from 1 year ago go to donation (deletion). All without you needing to remember."}}},
{en:"How can you secure sensitive data in Amazon S3? (Choose TWO)",
 pt:"Como voce pode proteger dados sensiveis no Amazon S3? (Escolha DOIS)",
 o:{en:["Delete encryption keys after encrypting","With AWS no need to worry about encryption","Enable S3 Encryption","Encrypt data prior to uploading","Delete all IAM users with S3 access"],
    pt:["Excluir chaves de criptografia apos criptografar","Com a AWS nao e preciso se preocupar com criptografia","Habilitar a criptografia do S3","Criptografar os dados antes de fazer upload","Excluir todos os usuarios IAM com acesso ao S3"]},a:[2,3],multi:true,
 exp:{pt:{tech:"A seguranca de dados no S3 pode ser alcancada com criptografia server-side (SSE) habilitada no bucket e criptografia client-side antes do upload. Ambas as abordagens protegem dados em repouso.",simple:"E como trancar seus objetos de valor: voce pode trancar o armario onde guarda (criptografia do S3) e tambem colocar cada item dentro de um cofre antes de guardar (criptografar antes do upload). As duas protecoes juntas dao mais seguranca."},
      en:{tech:"S3 data security can be achieved with server-side encryption (SSE) enabled on the bucket and client-side encryption before uploading. Both approaches protect data at rest.",simple:"It is like locking your valuables: you can lock the cabinet where you store them (S3 encryption) and also put each item inside a safe before storing (encrypt before upload). Both protections together give more security."}}},
{en:"Which service helps developers compile and test code?",
 pt:"Qual servico ajuda desenvolvedores a compilar e testar codigo?",
 o:{en:["AWS CodeDeploy","AWS CodeCommit","CloudEndure","AWS CodeBuild"],
    pt:["AWS CodeDeploy","AWS CodeCommit","CloudEndure","AWS CodeBuild"]},a:[3],
 exp:{pt:{tech:"AWS CodeBuild e um servico totalmente gerenciado de integracao continua que compila codigo-fonte, executa testes e produz pacotes de software prontos para implantacao.",simple:"CodeBuild e como uma fabrica automatizada: voce entrega a materia-prima (codigo) e ela monta, testa e embala o produto final (software) sem voce precisar manter a maquinaria."},
      en:{tech:"AWS CodeBuild is a fully managed continuous integration service that compiles source code, runs tests, and produces software packages ready for deployment.",simple:"CodeBuild is like an automated factory: you deliver the raw material (code) and it assembles, tests, and packages the final product (software) without you maintaining the machinery."}}},
{en:"What affects S3 storage charges? (Choose TWO)",
 pt:"O que afeta os custos de armazenamento do S3? (Escolha DOIS)",
 o:{en:["Using default encryption","Number of EBS volumes","Storage class used","Creating and deleting buckets","Total size of objects stored"],
    pt:["Usar criptografia padrao","Numero de volumes EBS","Classe de armazenamento utilizada","Criar e excluir buckets","Tamanho total dos objetos armazenados"]},a:[2,4],multi:true,
 exp:{pt:{tech:"Os custos do S3 dependem principalmente da classe de armazenamento escolhida (Standard, IA, Glacier, etc.) e do volume total de dados armazenados. Criar buckets ou usar criptografia padrao nao gera custos adicionais.",simple:"E como alugar um deposito: voce paga pelo tamanho do espaco que usa (volume de dados) e pelo tipo de deposito (classe) — um climatizado (Standard) custa mais que um simples (Glacier)."},
      en:{tech:"S3 costs depend primarily on the storage class chosen (Standard, IA, Glacier, etc.) and the total volume of data stored. Creating buckets or using default encryption does not incur additional costs.",simple:"It is like renting a storage unit: you pay for the size of space you use (data volume) and the type of unit (class) — a climate-controlled one (Standard) costs more than a basic one (Glacier)."}}},
{en:"What does CloudFront provide? (Choose TWO)",
 pt:"O que o CloudFront oferece? (Escolha DOIS)",
 o:{en:["Tracks user activity and API usage","Increases application availability by caching content at edge locations","Enables faster disaster recovery","Stores archived data at reduced cost","Delivers content to end users with low latency"],
    pt:["Rastreia atividades de usuarios e uso de APIs","Aumenta a disponibilidade do aplicativo armazenando conteudo em cache nos edge locations","Permite recuperacao de desastres mais rapida","Armazena dados arquivados com custo reduzido","Entrega conteudo aos usuarios finais com baixa latencia"]},a:[1,4],multi:true,
 exp:{pt:{tech:"Amazon CloudFront e uma CDN (Content Delivery Network) que distribui conteudo por edge locations ao redor do mundo, reduzindo latencia e aumentando disponibilidade atraves de cache geograficamente distribuido.",simple:"CloudFront e como uma rede de lanchonetes espalhadas pela cidade: em vez de todo mundo ir ate a cozinha central (servidor de origem), cada bairro tem uma filial (edge location) que serve a comida mais rapido."},
      en:{tech:"Amazon CloudFront is a CDN (Content Delivery Network) that distributes content through edge locations around the world, reducing latency and increasing availability through geographically distributed caching.",simple:"CloudFront is like a chain of restaurants spread across a city: instead of everyone going to the central kitchen (origin server), each neighborhood has a branch (edge location) that serves food faster."}}},
{en:"Which service gives access to AWS auditor-issued reports and compliance certifications?",
 pt:"Qual servico da acesso a relatorios e certificacoes de conformidade emitidos por auditores da AWS?",
 o:{en:["AWS Artifact","AWS Config","Amazon CloudWatch","AWS CloudTrail"],
    pt:["AWS Artifact","AWS Config","Amazon CloudWatch","AWS CloudTrail"]},a:[0],
 exp:{pt:{tech:"AWS Artifact e um portal de autoatendimento para acessar relatorios de conformidade da AWS (SOC, PCI, ISO) e gerenciar acordos como o BAA (Business Associate Addendum).",simple:"Artifact e como o arquivo de documentos oficiais de uma empresa: quando um auditor pede certificados e relatorios de conformidade, voce vai la e baixa o que precisa."},
      en:{tech:"AWS Artifact is a self-service portal for accessing AWS compliance reports (SOC, PCI, ISO) and managing agreements like the BAA (Business Associate Addendum).",simple:"Artifact is like a company filing cabinet for official documents: when an auditor asks for compliance certificates and reports, you go there and download what you need."}}},
{en:"Which service collects metrics from running EC2 instances?",
 pt:"Qual servico coleta metricas de instancias EC2 em execucao?",
 o:{en:["Amazon Inspector","Amazon CloudWatch","AWS CloudFormation","AWS CloudTrail"],
    pt:["Amazon Inspector","Amazon CloudWatch","AWS CloudFormation","AWS CloudTrail"]},a:[1],
 exp:{pt:{tech:"Amazon CloudWatch coleta e monitora metricas como CPU, rede e disco de instancias EC2 e outros recursos AWS. Permite criar alarmes e dashboards para observabilidade.",simple:"CloudWatch e como o painel de instrumentos do carro: mostra a velocidade (CPU), nivel de combustivel (memoria) e temperatura (desempenho). Se algo sair do normal, o alerta acende."},
      en:{tech:"Amazon CloudWatch collects and monitors metrics such as CPU, network, and disk from EC2 instances and other AWS resources. It allows creating alarms and dashboards for observability.",simple:"CloudWatch is like a car dashboard: it shows speed (CPU), fuel level (memory), and temperature (performance). If something goes abnormal, the warning light turns on."}}},
{en:"Which compute resources are serverless? (Choose TWO)",
 pt:"Quais recursos de computacao sao serverless? (Escolha DOIS)",
 o:{en:["Amazon EC2","AWS Fargate","AWS Lambda","Amazon ECS","Amazon EMR"],
    pt:["Amazon EC2","AWS Fargate","AWS Lambda","Amazon ECS","Amazon EMR"]},a:[1,2],multi:true,
 exp:{pt:{tech:"AWS Lambda e AWS Fargate sao servicos serverless. Lambda executa codigo em resposta a eventos sem gerenciar servidores. Fargate executa containers sem gerenciar a infraestrutura subjacente de EC2.",simple:"Serverless e como pedir comida por delivery: voce nao precisa ter cozinha (servidor). Lambda e como pedir um prato por vez (funcoes). Fargate e como pedir uma marmita completa (container) — nos dois casos, alguem cozinha pra voce."},
      en:{tech:"AWS Lambda and AWS Fargate are serverless services. Lambda runs code in response to events without managing servers. Fargate runs containers without managing the underlying EC2 infrastructure.",simple:"Serverless is like ordering food delivery: you do not need a kitchen (server). Lambda is like ordering one dish at a time (functions). Fargate is like ordering a full meal box (container) — in both cases, someone else cooks for you."}}},
{en:"For compliance, a government agency needs hardware dedicated only to them. Which EC2 option should they use?",
 pt:"Para conformidade, uma agencia governamental precisa de hardware dedicado exclusivamente a ela. Qual opcao EC2 deve usar?",
 o:{en:["EC2 Dedicated Hosts","EC2 Reserved Instances","EC2 Spot Instances","EC2 On-Demand Instances"],
    pt:["EC2 Dedicated Hosts","EC2 Reserved Instances","EC2 Spot Instances","EC2 On-Demand Instances"]},a:[0],
 exp:{pt:{tech:"EC2 Dedicated Hosts fornecem servidores fisicos dedicados exclusivamente para seu uso, permitindo visibilidade de sockets e cores fisicos. Ideal para requisitos de conformidade e licenciamento por servidor.",simple:"Dedicated Host e como alugar uma casa inteira so pra voce, em vez de um quarto em hotel compartilhado. Ninguem mais usa aquele hardware — e todo seu, exigencia de quem precisa de isolamento total."},
      en:{tech:"EC2 Dedicated Hosts provide physical servers exclusively dedicated to your use, giving visibility into physical sockets and cores. Ideal for compliance requirements and per-server licensing.",simple:"A Dedicated Host is like renting an entire house just for yourself, instead of a room in a shared hotel. Nobody else uses that hardware — it is all yours, required by those who need total isolation."}}},
{en:"Which service is needed for a financial application that requires ACID transactions?",
 pt:"Qual servico e necessario para uma aplicacao financeira que requer transacoes ACID?",
 o:{en:["Amazon Redshift","Amazon RDS","AWS CloudHSM","AWS DMS"],
    pt:["Amazon Redshift","Amazon RDS","AWS CloudHSM","AWS DMS"]},a:[1],
 exp:{pt:{tech:"Amazon RDS e um servico de banco de dados relacional gerenciado que suporta transacoes ACID (Atomicidade, Consistencia, Isolamento, Durabilidade), essenciais para aplicacoes financeiras.",simple:"ACID e como uma transferencia bancaria perfeita: ou o dinheiro sai de uma conta E entra na outra (atomicidade), ou nada acontece. RDS garante essas regras rigidas que bancos e financeiras precisam."},
      en:{tech:"Amazon RDS is a managed relational database service that supports ACID transactions (Atomicity, Consistency, Isolation, Durability), essential for financial applications.",simple:"ACID is like a perfect bank transfer: either the money leaves one account AND enters the other (atomicity), or nothing happens. RDS guarantees these strict rules that banks and financial apps need."}}},
{en:"What assigns permissions directly to an IAM user?",
 pt:"O que atribui permissoes diretamente a um usuario IAM?",
 o:{en:["IAM Identity","IAM Group","IAM Role","IAM Policy"],
    pt:["IAM Identity","IAM Group","IAM Role","IAM Policy"]},a:[3],
 exp:{pt:{tech:"IAM Policies sao documentos JSON que definem permissoes (allow/deny) para acoes em recursos AWS. Podem ser anexadas diretamente a usuarios, grupos ou roles.",simple:"Uma IAM Policy e como um cracha de acesso que diz exatamente quais portas voce pode abrir e quais salas pode entrar. Voce anexa o cracha (policy) na pessoa (usuario) pra ela ter as permissoes."},
      en:{tech:"IAM Policies are JSON documents that define permissions (allow/deny) for actions on AWS resources. They can be attached directly to users, groups, or roles.",simple:"An IAM Policy is like an access badge that says exactly which doors you can open and which rooms you can enter. You attach the badge (policy) to the person (user) to grant permissions."}}},
{en:"What makes AWS most economical for variable compute demand?",
 pt:"O que torna a AWS mais economica para demanda de computacao variavel?",
 o:{en:["Launch powerful EC2 instances for spikes","Pay upfront for discounts","Launch and terminate EC2 instances based on demand","Choose cheaper EC2 instance types"],
    pt:["Lancar instancias EC2 poderosas para picos","Pagar antecipadamente por descontos","Lancar e encerrar instancias EC2 com base na demanda","Escolher tipos de instancia EC2 mais baratas"]},a:[2],
 exp:{pt:{tech:"O modelo pay-as-you-go da AWS permite lancar instancias quando a demanda aumenta e encerra-las quando diminui, pagando apenas pelo que usa. Isso elimina o custo de capacidade ociosa.",simple:"E como usar taxi em vez de ter carro proprio: voce so paga quando precisa de transporte. Se um dia nao sai de casa, nao gasta nada. Comprar um carro potente (instancia grande) ou pagar adiantado nao resolve demanda que sobe e desce."},
      en:{tech:"AWS pay-as-you-go model allows launching instances when demand increases and terminating them when it decreases, paying only for what you use. This eliminates idle capacity costs.",simple:"It is like using a taxi instead of owning a car: you only pay when you need transportation. If you stay home one day, you spend nothing. Buying a powerful car (large instance) or paying upfront does not solve fluctuating demand."}}},
{en:"Which database engine is NOT supported by Amazon RDS?",
 pt:"Qual engine de banco de dados NAO e suportada pelo Amazon RDS?",
 o:{en:["PostgreSQL","Oracle","Microsoft SQL Server","Teradata"],
    pt:["PostgreSQL","Oracle","Microsoft SQL Server","Teradata"]},a:[3],
 exp:{pt:{tech:"Amazon RDS suporta seis engines: Amazon Aurora, PostgreSQL, MySQL, MariaDB, Oracle e Microsoft SQL Server. Teradata nao e uma opcao disponivel no RDS.",simple:"RDS e como um estacionamento que aceita carros de seis marcas especificas. Teradata seria uma marca que nao tem vaga la — voce precisaria de outro estacionamento (EC2 ou EMR) pra ela."},
      en:{tech:"Amazon RDS supports six engines: Amazon Aurora, PostgreSQL, MySQL, MariaDB, Oracle, and Microsoft SQL Server. Teradata is not an available option in RDS.",simple:"RDS is like a parking lot that accepts cars from six specific brands. Teradata would be a brand that has no spot there — you would need another lot (EC2 or EMR) for it."}}},
{en:"Which service can migrate on-premise databases to AWS?",
 pt:"Qual servico pode migrar bancos de dados on-premise para a AWS?",
 o:{en:["AWS DMS","S3 Transfer Acceleration","AWS Directory Service","AWS Transit Gateway"],
    pt:["AWS DMS","S3 Transfer Acceleration","AWS Directory Service","AWS Transit Gateway"]},a:[0],
 exp:{pt:{tech:"AWS Database Migration Service (DMS) facilita a migracao de bancos de dados para a AWS com tempo minimo de inatividade. Suporta migracoes homogeneas e heterogeneas entre diferentes engines.",simple:"DMS e como uma empresa de mudancas especializada em bancos de dados: ela empacota seus dados no local antigo e transporta tudo pro novo endereco na AWS, sem voce precisar fechar o negocio durante a mudanca."},
      en:{tech:"AWS Database Migration Service (DMS) facilitates database migration to AWS with minimal downtime. It supports homogeneous and heterogeneous migrations between different engines.",simple:"DMS is like a moving company specialized in databases: it packs your data at the old location and transports everything to the new address on AWS, without you needing to shut down during the move."}}},
{en:"What is the easiest way to launch a WordPress website on AWS?",
 pt:"Qual e a maneira mais facil de lancar um site WordPress na AWS?",
 o:{en:["Run on Amazon Lightsail","Install on EC2 manually","Use S3 static web hosting","Host on AWS CDK"],
    pt:["Executar no Amazon Lightsail","Instalar manualmente no EC2","Usar hospedagem estatica do S3","Hospedar no AWS CDK"]},a:[0],
 exp:{pt:{tech:"Amazon Lightsail oferece servidores virtuais, armazenamento e rede com preco fixo e previsivel. Possui blueprints prontos para WordPress, tornando o lancamento extremamente simples.",simple:"Lightsail e como uma hospedagem de site tradicional, so que dentro da AWS: voce clica, escolhe WordPress, e em minutos esta no ar. Sem precisar configurar rede, firewall e servidor do zero como faria no EC2."},
      en:{tech:"Amazon Lightsail offers virtual servers, storage, and networking at a fixed, predictable price. It has ready-made blueprints for WordPress, making deployment extremely simple.",simple:"Lightsail is like traditional web hosting, but inside AWS: you click, choose WordPress, and in minutes it is live. No need to configure networking, firewall, and server from scratch like you would on EC2."}}},
{en:"Which services can manage encryption keys? (Choose TWO)",
 pt:"Quais servicos podem gerenciar chaves de criptografia? (Escolha DOIS)",
 o:{en:["AWS KMS","AWS Certificate Manager","AWS CodeDeploy","AWS CodeCommit","AWS CloudHSM"],
    pt:["AWS KMS","AWS Certificate Manager","AWS CodeDeploy","AWS CodeCommit","AWS CloudHSM"]},a:[0,4],multi:true,
 exp:{pt:{tech:"AWS KMS (Key Management Service) gerencia chaves de criptografia via software com integracao nativa aos servicos AWS. CloudHSM fornece modulos de seguranca de hardware (HSM) dedicados para controle total das chaves.",simple:"KMS e como um chaveiro digital gerenciado pela AWS — pratico e integrado. CloudHSM e como ter seu proprio cofre-forte fisico onde so voce tem a combinacao. Os dois guardam chaves, mas com niveis diferentes de controle."},
      en:{tech:"AWS KMS (Key Management Service) manages encryption keys via software with native integration to AWS services. CloudHSM provides dedicated hardware security modules (HSM) for full key control.",simple:"KMS is like a digital key manager run by AWS — practical and integrated. CloudHSM is like having your own physical vault where only you know the combination. Both store keys, but with different levels of control."}}},
{en:"Which service allows you to install custom relational database software?",
 pt:"Qual servico permite instalar software de banco de dados relacional personalizado?",
 o:{en:["Amazon EC2","Amazon Cognito","Amazon RDS","Amazon Inspector"],
    pt:["Amazon EC2","Amazon Cognito","Amazon RDS","Amazon Inspector"]},a:[0],
 exp:{pt:{tech:"Amazon EC2 fornece controle total sobre o sistema operacional, permitindo instalar e configurar qualquer software de banco de dados. RDS e gerenciado e nao permite instalacao de software customizado.",simple:"EC2 e como alugar um terreno e construir sua propria casa do jeito que quiser. RDS e como morar num condominio — e mais facil, mas voce nao pode mudar a estrutura. Se precisa de algo customizado, EC2 e o caminho."},
      en:{tech:"Amazon EC2 provides full control over the operating system, allowing you to install and configure any database software. RDS is managed and does not allow custom software installation.",simple:"EC2 is like renting land and building your own house however you want. RDS is like living in a condo — easier, but you cannot change the structure. If you need something custom, EC2 is the way."}}},
{en:"Which service dynamically adjusts resources based on unpredictable load?",
 pt:"Qual servico ajusta dinamicamente os recursos com base em carga imprevisivel?",
 o:{en:["Auto Scaling","Elastic Load Balancing","Amazon Route 53","Amazon ECS"],
    pt:["Auto Scaling","Elastic Load Balancing","Amazon Route 53","Amazon ECS"]},a:[0],
 exp:{pt:{tech:"AWS Auto Scaling monitora aplicacoes e ajusta automaticamente a capacidade para manter desempenho estavel e previsivel ao menor custo possivel. Funciona com EC2, ECS, DynamoDB e Aurora.",simple:"Auto Scaling e como um restaurante que contrata garcons extras automaticamente quando lota e dispensa quando esvazia. Voce nunca paga por garcons parados nem deixa clientes sem atendimento."},
      en:{tech:"AWS Auto Scaling monitors applications and automatically adjusts capacity to maintain steady, predictable performance at the lowest possible cost. Works with EC2, ECS, DynamoDB, and Aurora.",simple:"Auto Scaling is like a restaurant that automatically hires extra waiters when it gets crowded and lets them go when it empties out. You never pay for idle waiters or leave customers unserved."}}},
{en:"What are key design principles for the public cloud? (Choose TWO)",
 pt:"Quais sao principios-chave de design para a nuvem publica? (Escolha DOIS)",
 o:{en:["Always reserve capacity","Loose coupling instead of tight coupling","Prefer servers over managed services","Disposable resources instead of fixed servers","Always use multi-AZ instead of multi-region"],
    pt:["Sempre reservar capacidade","Acoplamento fraco em vez de acoplamento forte","Preferir servidores a servicos gerenciados","Recursos descartaveis em vez de servidores fixos","Sempre usar multi-AZ em vez de multi-region"]},a:[1,3],multi:true,
 exp:{pt:{tech:"Loose coupling reduz dependencias entre componentes, permitindo que falhas sejam isoladas. Recursos descartaveis (disposable resources) significam tratar servidores como temporarios, facilmente substituiveis via automacao.",simple:"Acoplamento fraco e como blocos de LEGO: se uma peca quebra, voce troca so ela. Recursos descartaveis e como usar copos descartaveis: em vez de lavar e consertar, voce joga fora e pega um novo. Na nuvem, servidores sao descartaveis."},
      en:{tech:"Loose coupling reduces dependencies between components, allowing failures to be isolated. Disposable resources means treating servers as temporary, easily replaceable through automation.",simple:"Loose coupling is like LEGO blocks: if one piece breaks, you replace just that one. Disposable resources is like using paper cups: instead of washing and repairing, you throw away and grab a new one. In the cloud, servers are disposable."}}},
{en:"Where can you get a list of all IAM users with their credential status?",
 pt:"Onde voce pode obter uma lista de todos os usuarios IAM com o status de suas credenciais?",
 o:{en:["AWS CloudTrail Trails","IAM Credential Report","AWS Artifact reports","AWS Cost and Usage Report"],
    pt:["AWS CloudTrail Trails","IAM Credential Report","AWS Artifact reports","AWS Cost and Usage Report"]},a:[1],
 exp:{pt:{tech:"O IAM Credential Report e um relatorio que lista todos os usuarios IAM da conta e o status de suas credenciais, incluindo senhas, chaves de acesso e MFA. Pode ser gerado pelo console ou CLI.",simple:"O Credential Report e como a lista de chamada de uma escola: mostra todos os alunos (usuarios) e se cada um tem carteirinha (senha), chave do armario (access key) e se esta com tudo em dia (MFA ativo)."},
      en:{tech:"The IAM Credential Report lists all IAM users in the account and their credential status, including passwords, access keys, and MFA. It can be generated via the console or CLI.",simple:"The Credential Report is like a school roll call: it shows all students (users) and whether each one has an ID card (password), locker key (access key), and if everything is up to date (MFA enabled)."}}},
{en:"Which service lets you generate and use your own encryption keys in AWS?",
 pt:"Qual servico permite gerar e usar suas proprias chaves de criptografia na AWS?",
 o:{en:["AWS Shield","AWS Certificate Manager","AWS CloudHSM","AWS WAF"],
    pt:["AWS Shield","AWS Certificate Manager","AWS CloudHSM","AWS WAF"]},a:[2],
 exp:{pt:{tech:"AWS CloudHSM fornece modulos de seguranca de hardware (HSM) dedicados dentro da nuvem AWS, permitindo gerar, armazenar e gerenciar suas proprias chaves criptograficas com controle exclusivo.",simple:"CloudHSM e como ter seu proprio cofre-forte pessoal dentro do banco (AWS): so voce tem a chave e a combinacao. Diferente do KMS onde o banco tambem tem acesso ao cofre."},
      en:{tech:"AWS CloudHSM provides dedicated hardware security modules (HSM) within the AWS cloud, allowing you to generate, store, and manage your own cryptographic keys with exclusive control.",simple:"CloudHSM is like having your own personal safe inside the bank (AWS): only you have the key and the combination. Unlike KMS where the bank also has access to the safe."}}},
{en:"What provides the highest redundancy and fault tolerance for a global application?",
 pt:"O que proporciona a maior redundancia e tolerancia a falhas para uma aplicacao global?",
 o:{en:["No need to architect for these in AWS","Deploy in a single Availability Zone","Deploy in multiple AZs in a single region","Deploy in multiple AZs across multiple regions"],
    pt:["Nao e necessario arquitetar para isso na AWS","Implantar em uma unica Zona de Disponibilidade","Implantar em multiplas AZs em uma unica regiao","Implantar em multiplas AZs em multiplas regioes"]},a:[3],
 exp:{pt:{tech:"Implantar em multiplas AZs em multiplas Regioes oferece o maior nivel de redundancia e tolerancia a falhas, protegendo contra falhas de datacenter (AZs) e desastres regionais (Regioes).",simple:"E como guardar copias dos seus documentos em cidades diferentes E em predios diferentes dentro de cada cidade. Se uma cidade inteira tiver problema, as outras continuam funcionando."},
      en:{tech:"Deploying across multiple AZs in multiple Regions provides the highest level of redundancy and fault tolerance, protecting against datacenter failures (AZs) and regional disasters (Regions).",simple:"It is like keeping copies of your documents in different cities AND in different buildings within each city. If an entire city has a problem, the others keep working."}}},
{en:"Which AWS services automatically replicate data across Availability Zones? (Choose TWO)",
 pt:"Quais servicos AWS replicam dados automaticamente entre Zonas de Disponibilidade? (Escolha DOIS)",
 o:{en:["Instance Store","Amazon S3","Amazon DynamoDB","Amazon Route 53","AWS VPN"],
    pt:["Instance Store","Amazon S3","Amazon DynamoDB","Amazon Route 53","AWS VPN"]},a:[1,2],multi:true,
 exp:{pt:{tech:"Amazon S3 armazena objetos automaticamente em no minimo 3 AZs (exceto One Zone-IA). DynamoDB replica dados automaticamente em 3 AZs dentro de uma regiao para alta disponibilidade e durabilidade.",simple:"S3 e DynamoDB sao como bancos que guardam copias dos seus documentos em 3 cofres diferentes automaticamente. Se um cofre pegar fogo, os outros dois ainda tem tudo. Instance Store e como um bloco de notas — quando o computador desliga, perde tudo."},
      en:{tech:"Amazon S3 stores objects automatically across at least 3 AZs (except One Zone-IA). DynamoDB automatically replicates data across 3 AZs within a region for high availability and durability.",simple:"S3 and DynamoDB are like banks that keep copies of your documents in 3 different vaults automatically. If one vault catches fire, the other two still have everything. Instance Store is like a notepad — when the computer shuts down, everything is lost."}}},
{en:"How can you protect S3 data from accidental deletion?",
 pt:"Como voce pode proteger dados no S3 contra exclusao acidental?",
 o:{en:["Enable S3 Versioning","Configure Bucket Policies","Configure Lifecycle Policies","Disable Cross-Region Replication"],
    pt:["Habilitar o versionamento do S3","Configurar Bucket Policies","Configurar Lifecycle Policies","Desabilitar a replicacao entre regioes"]},a:[0],
 exp:{pt:{tech:"S3 Versioning mantem multiplas versoes de um objeto no mesmo bucket. Se um objeto for excluido ou sobrescrito acidentalmente, versoes anteriores podem ser restauradas.",simple:"Versionamento e como o historico de versoes do Google Docs: se voce apagar um paragrafo sem querer, pode voltar a uma versao anterior. Cada mudanca fica salva e voce recupera quando precisar."},
      en:{tech:"S3 Versioning keeps multiple versions of an object in the same bucket. If an object is accidentally deleted or overwritten, previous versions can be restored.",simple:"Versioning is like Google Docs version history: if you accidentally delete a paragraph, you can go back to a previous version. Every change is saved and you can recover it when needed."}}},
{en:"What is AWS responsible for in the shared responsibility model?",
 pt:"Pelo que a AWS e responsavel no modelo de responsabilidade compartilhada?",
 o:{en:["Securing regions and edge locations","Performing client-side auditing tasks","Monitoring AWS resources usage by the customer","Securing customer access to AWS resources"],
    pt:["Proteger regioes e edge locations","Realizar tarefas de auditoria do lado do cliente","Monitorar o uso de recursos AWS pelo cliente","Proteger o acesso do cliente aos recursos AWS"]},a:[0],
 exp:{pt:{tech:"No modelo de responsabilidade compartilhada, a AWS e responsavel pela seguranca DA nuvem: infraestrutura fisica, hardware, rede, datacenters, regioes e edge locations. O cliente e responsavel pela seguranca NA nuvem.",simple:"A AWS cuida do predio (infraestrutura fisica, regioes, edge locations). Voce cuida do que esta dentro do seu apartamento (dados, acesso, configuracoes). Auditoria e monitoramento do uso sao responsabilidades suas."},
      en:{tech:"In the shared responsibility model, AWS is responsible for security OF the cloud: physical infrastructure, hardware, networking, datacenters, regions, and edge locations. The customer is responsible for security IN the cloud.",simple:"AWS takes care of the building (physical infrastructure, regions, edge locations). You take care of what is inside your apartment (data, access, configurations). Auditing and usage monitoring are your responsibilities."}}},
{en:"Who is responsible for scaling DynamoDB?",
 pt:"Quem e responsavel por escalar o DynamoDB?",
 o:{en:["Your security team","Your development team","AWS","Your DevOps team"],
    pt:["Sua equipe de seguranca","Sua equipe de desenvolvimento","AWS","Sua equipe de DevOps"]},a:[2],
 exp:{pt:{tech:"DynamoDB e um servico totalmente gerenciado. A AWS cuida da escalabilidade, disponibilidade, patches e manutencao da infraestrutura. O cliente configura a capacidade desejada, mas a AWS executa o escalonamento.",simple:"DynamoDB e como um buffet livre: o restaurante (AWS) cuida de manter a comida sempre abastecida. Voce so escolhe o que comer (configurar tabelas e dados). Se mais gente chegar, o restaurante coloca mais comida automaticamente."},
      en:{tech:"DynamoDB is a fully managed service. AWS handles scalability, availability, patching, and infrastructure maintenance. The customer configures desired capacity, but AWS executes the scaling.",simple:"DynamoDB is like an all-you-can-eat buffet: the restaurant (AWS) takes care of keeping the food stocked. You just choose what to eat (configure tables and data). If more people arrive, the restaurant adds more food automatically."}}},
{en:"What are benefits of AWS Organizations? (Choose TWO)",
 pt:"Quais sao beneficios do AWS Organizations? (Escolha DOIS)",
 o:{en:["Control access to AWS services","Help design a cloud adoption path","Manage payment methods for each account","Help customers achieve desired business outcomes","Consolidate billing across multiple accounts"],
    pt:["Controlar acesso a servicos AWS","Ajudar a projetar um caminho de adocao da nuvem","Gerenciar metodos de pagamento para cada conta","Ajudar clientes a alcancar resultados de negocios desejados","Consolidar faturamento entre multiplas contas"]},a:[0,4],multi:true,
 exp:{pt:{tech:"AWS Organizations permite gerenciamento centralizado de multiplas contas AWS. SCPs (Service Control Policies) controlam acesso a servicos. Consolidated Billing unifica o faturamento e pode gerar descontos por volume.",simple:"Organizations e como uma holding empresarial: uma empresa mae gerencia varias filiais. Ela pode definir regras para todas (controle de acesso) e receber uma unica fatura consolidada com desconto por volume."},
