{en:"Which TWO are characteristics of the AWS Basic Support plan that is available to ALL AWS customers? (Choose TWO)",pt:"Quais DUAS são características do plano AWS Basic Support disponível para TODOS os clientes AWS? (Escolha DUAS)",o:{en:["Access to AWS documentation, whitepapers, and support forums","Access to the 7 core Trusted Advisor checks","24/7 phone access to Cloud Support Engineers","Access to AWS Infrastructure Event Management"],pt:["Acesso a documentação AWS, whitepapers e fóruns de suporte","Acesso às 7 verificações principais do Trusted Advisor","Acesso telefônico 24/7 a Engenheiros de Suporte Cloud","Acesso ao AWS Infrastructure Event Management"]},a:[0,1],multi:true,t:"Trusted Advisor",exp:{pt:{tech:"O plano Basic Support, incluído gratuitamente para todas as contas AWS, oferece acesso a documentação, whitepapers, fóruns, Personal Health Dashboard e 7 verificações principais do Trusted Advisor.",simple:"O plano Basic Support e gratuito para todos os clientes AWS e inclui acesso a documentacao, whitepapers, foruns de suporte e 7 verificacoes basicas do Trusted Advisor. Nao inclui suporte tecnico por chat ou telefone.",avoid:"Nunca subestime o Basic Support por ser gratuito, mas tambem nunca dependa dele para producao. Para workloads criticas, faca upgrade para Business ou Enterprise."},en:{tech:"The Basic Support plan, included free for all AWS accounts, provides access to documentation, whitepapers, forums, Personal Health Dashboard, and 7 core Trusted Advisor checks.",simple:"The Basic Support plan is free for all AWS customers and includes access to documentation, whitepapers, support forums, and 7 core Trusted Advisor checks. It does not include technical support via chat or phone.",avoid:"Never underestimate Basic Support for being free, but also never depend on it for production. For critical workloads, upgrade to Business or Enterprise."}}},
{en:"A media company needs to store video files that will be accessed frequently for the first 30 days, then rarely after that. Which S3 feature can automatically transition objects to a cheaper storage class after 30 days?",pt:"Uma empresa de mídia precisa armazenar arquivos de vídeo que serão acessados frequentemente nos primeiros 30 dias e raramente depois disso. Qual recurso do S3 pode transicionar automaticamente objetos para uma classe de armazenamento mais barata após 30 dias?",o:{en:["S3 Lifecycle Policies","S3 Intelligent-Tiering","S3 Versioning","S3 Object Lock"],pt:["Políticas de Ciclo de Vida do S3","S3 Intelligent-Tiering","Versionamento do S3","S3 Object Lock"]},a:[0],t:"S3 Storage Classes",exp:{pt:{tech:"As Políticas de Ciclo de Vida do S3 permitem definir regras para transicionar objetos automaticamente entre classes de armazenamento ou excluí-los após um período específico, baseado na idade do objeto.",simple:"O S3 Lifecycle Policies permite criar regras automaticas que movem objetos para classes de armazenamento mais baratas apos um periodo definido, ou os excluem automaticamente. Por exemplo, mover videos para Glacier apos 30 dias sem acesso.",avoid:"Nunca pague por S3 Standard para dados que raramente sao acessados. Configure Lifecycle Policies para mover dados automaticamente para classes mais baratas."},en:{tech:"S3 Lifecycle Policies let you define rules to automatically transition objects between storage classes or delete them after a specific period, based on the object age.",simple:"S3 Lifecycle Policies let you create automatic rules that move objects to cheaper storage classes after a defined period, or delete them automatically. For example, moving videos to Glacier after 30 days without access.",avoid:"Never pay for S3 Standard for data that is rarely accessed. Configure Lifecycle Policies to automatically move data to cheaper storage classes."}}},
{en:"How can you secure sensitive data in Amazon S3? (Choose TWO)",pt:"Como voce pode proteger dados sensiveis no Amazon S3? (Escolha DOIS)",o:{en:["Delete encryption keys after encrypting","With AWS no need to worry about encryption","Enable S3 Encryption","Encrypt data prior to uploading","Delete all IAM users with S3 access"],pt:["Excluir chaves de criptografia apos criptografar","Com a AWS nao e preciso se preocupar com criptografia","Habilitar a criptografia do S3","Criptografar os dados antes de fazer upload","Excluir todos os usuarios IAM com acesso ao S3"]},a:[2,3],multi:true,t:"S3 General",exp:{pt:{tech:"A seguranca de dados no S3 pode ser alcancada com criptografia server-side (SSE) habilitada no bucket e criptografia client-side antes do upload. Ambas as abordagens protegem dados em repouso.",simple:"Voce pode proteger dados no S3 de duas formas: ativando a criptografia do S3 (que criptografa os dados quando sao armazenados) e criptografando os dados antes de enviar ao S3 (client-side encryption). Usar as duas formas juntas aumenta a protecao.",avoid:"Nunca armazene dados sensiveis no S3 sem criptografia. Habilite SSE-S3 ou SSE-KMS como padrao no bucket e use HTTPS para todas as transferencias."},en:{tech:"S3 data security can be achieved with server-side encryption (SSE) enabled on the bucket and client-side encryption before uploading. Both approaches protect data at rest.",simple:"You can protect data in S3 in two ways: enabling S3 encryption (which encrypts data when stored) and encrypting data before sending it to S3 (client-side encryption). Using both together increases protection.",avoid:"Never store sensitive data in S3 without encryption. Enable SSE-S3 or SSE-KMS as default on the bucket and use HTTPS for all transfers."}}},
{en:"Which service helps developers compile and test code?",pt:"Qual servico ajuda desenvolvedores a compilar e testar codigo?",o:{en:["AWS CodeDeploy","AWS CodeCommit","CloudEndure","AWS CodeBuild"],pt:["AWS CodeDeploy","AWS CodeCommit","CloudEndure","AWS CodeBuild"]},a:[3],t:"Developer Tools",exp:{pt:{tech:"AWS CodeBuild e um servico totalmente gerenciado de integracao continua que compila codigo-fonte, executa testes e produz pacotes de software prontos para implantacao.",simple:"O AWS CodeBuild compila codigo-fonte, executa testes automatizados e gera artefatos de software prontos para deploy. E um servico totalmente gerenciado, entao voce nao precisa provisionar ou manter servidores de build.",avoid:"Nunca armazene credenciais em buildspecs ou variaveis de ambiente em texto plano no CodeBuild. Use Secrets Manager ou Parameter Store para segredos."},en:{tech:"AWS CodeBuild is a fully managed continuous integration service that compiles source code, runs tests, and produces software packages ready for deployment.",simple:"AWS CodeBuild compiles source code, runs automated tests, and produces deployment-ready software artifacts. It is a fully managed service, so you do not need to provision or maintain build servers.",avoid:"Never store credentials in buildspecs or plaintext environment variables in CodeBuild. Use Secrets Manager or Parameter Store for secrets."}}},
{en:"What affects S3 storage charges? (Choose TWO)",pt:"O que afeta os custos de armazenamento do S3? (Escolha DOIS)",o:{en:["Using default encryption","Number of EBS volumes","Storage class used","Creating and deleting buckets","Total size of objects stored"],pt:["Usar criptografia padrao","Numero de volumes EBS","Classe de armazenamento utilizada","Criar e excluir buckets","Tamanho total dos objetos armazenados"]},a:[2,4],multi:true,t:"S3 Storage Classes",exp:{pt:{tech:"Os custos do S3 dependem principalmente da classe de armazenamento escolhida (Standard, IA, Glacier, etc.) e do volume total de dados armazenados. Criar buckets ou usar criptografia padrao nao gera custos adicionais.",simple:"O custo de armazenamento no S3 depende de dois fatores principais: o tamanho total dos objetos armazenados e a classe de armazenamento escolhida. Classes como S3 Standard custam mais por GB do que classes como S3 Glacier.",avoid:"Nunca ignore as classes de armazenamento do S3 ao planejar custos. Escolher a classe errada pode significar pagar ate 10x mais do que o necessario."},en:{tech:"S3 costs depend primarily on the storage class chosen (Standard, IA, Glacier, etc.) and the total volume of data stored. Creating buckets or using default encryption does not incur additional costs.",simple:"S3 storage costs depend on two main factors: the total size of stored objects and the storage class chosen. Classes like S3 Standard cost more per GB than classes like S3 Glacier.",avoid:"Never ignore S3 storage classes when planning costs. Choosing the wrong class can mean paying up to 10x more than necessary."}}},
{en:"What does CloudFront provide? (Choose TWO)",pt:"O que o CloudFront oferece? (Escolha DOIS)",o:{en:["Tracks user activity and API usage","Increases application availability by caching content at edge locations","Enables faster disaster recovery","Stores archived data at reduced cost","Delivers content to end users with low latency"],pt:["Rastreia atividades de usuarios e uso de APIs","Aumenta a disponibilidade do aplicativo armazenando conteudo em cache nos edge locations","Permite recuperacao de desastres mais rapida","Armazena dados arquivados com custo reduzido","Entrega conteudo aos usuarios finais com baixa latencia"]},a:[1,4],multi:true,t:"CloudFront",exp:{pt:{tech:"Amazon CloudFront e uma CDN (Content Delivery Network) que distribui conteudo por edge locations ao redor do mundo, reduzindo latencia e aumentando disponibilidade atraves de cache geograficamente distribuido.",simple:"O Amazon CloudFront aumenta a disponibilidade da aplicacao ao manter copias do conteudo em edge locations espalhadas pelo mundo e entrega esse conteudo com baixa latencia a partir do ponto mais proximo do usuario. Isso reduz a carga no servidor de origem.",avoid:"Nunca sirva conteudo dinamico sensivel via CloudFront sem configurar signed URLs ou signed cookies. Sem restricao, qualquer pessoa pode acessar o conteudo cacheado."},en:{tech:"Amazon CloudFront is a CDN (Content Delivery Network) that distributes content through edge locations around the world, reducing latency and increasing availability through geographically distributed caching.",simple:"Amazon CloudFront increases application availability by caching content at edge locations spread worldwide and delivers that content with low latency from the point closest to the user. This reduces load on the origin server.",avoid:"Never serve sensitive dynamic content via CloudFront without configuring signed URLs or signed cookies. Without restriction, anyone can access cached content."}}},
{en:"Which service gives access to AWS auditor-issued reports and compliance certifications?",pt:"Qual servico da acesso a relatorios e certificacoes de conformidade emitidos por auditores da AWS?",o:{en:["AWS Artifact","AWS Config","Amazon CloudWatch","AWS CloudTrail"],pt:["AWS Artifact","AWS Config","Amazon CloudWatch","AWS CloudTrail"]},a:[0],t:"CloudTrail",exp:{pt:{tech:"AWS Artifact e um portal de autoatendimento para acessar relatorios de conformidade da AWS (SOC, PCI, ISO) e gerenciar acordos como o BAA (Business Associate Addendum).",simple:"O AWS Artifact e um portal onde voce baixa relatorios de auditoria e certificacoes de conformidade da AWS, como SOC e ISO. Esses documentos comprovam que a AWS atende padroes de seguranca e regulatorios exigidos por auditores.",avoid:"Nunca baixe relatorios do Artifact sem revisar o escopo e a aplicabilidade ao seu caso de uso. Certificacoes AWS cobrem a infraestrutura, nao a sua aplicacao."},en:{tech:"AWS Artifact is a self-service portal for accessing AWS compliance reports (SOC, PCI, ISO) and managing agreements like the BAA (Business Associate Addendum).",simple:"AWS Artifact is a portal where you download AWS audit reports and compliance certifications, such as SOC and ISO. These documents prove that AWS meets security and regulatory standards required by auditors.",avoid:"Never download Artifact reports without reviewing the scope and applicability to your use case. AWS certifications cover infrastructure, not your application."}}},
{en:"Which service collects metrics from running EC2 instances?",pt:"Qual servico coleta metricas de instancias EC2 em execucao?",o:{en:["Amazon Inspector","Amazon CloudWatch","AWS CloudFormation","AWS CloudTrail"],pt:["Amazon Inspector","Amazon CloudWatch","AWS CloudFormation","AWS CloudTrail"]},a:[1],t:"EC2 General",exp:{pt:{tech:"Amazon CloudWatch coleta e monitora metricas como CPU, rede e disco de instancias EC2 e outros recursos AWS. Permite criar alarmes e dashboards para observabilidade.",simple:"O Amazon CloudWatch coleta metricas como uso de CPU, disco e rede de instancias EC2 e outros recursos AWS automaticamente. Voce pode visualizar essas metricas, criar alarmes e acionar acoes quando limites sao atingidos.",avoid:"Nunca confie apenas em metricas padrao do CloudWatch. Instale o CloudWatch Agent para coletar metricas de memoria e disco que nao vem por padrao."},en:{tech:"Amazon CloudWatch collects and monitors metrics such as CPU, network, and disk from EC2 instances and other AWS resources. It allows creating alarms and dashboards for observability.",simple:"Amazon CloudWatch collects metrics like CPU, disk, and network usage from EC2 instances and other AWS resources automatically. You can visualize these metrics, create alarms, and trigger actions when thresholds are reached.",avoid:"Never rely only on default CloudWatch metrics. Install the CloudWatch Agent to collect memory and disk metrics that are not included by default."}}},
{en:"Which compute resources are serverless? (Choose TWO)",pt:"Quais recursos de computacao sao serverless? (Escolha DOIS)",o:{en:["Amazon EC2","AWS Fargate","AWS Lambda","Amazon ECS","Amazon EMR"],pt:["Amazon EC2","AWS Fargate","AWS Lambda","Amazon ECS","Amazon EMR"]},a:[1,2],multi:true,t:"EC2 General",exp:{pt:{tech:"AWS Lambda e AWS Fargate sao servicos serverless. Lambda executa codigo em resposta a eventos sem gerenciar servidores. Fargate executa containers sem gerenciar a infraestrutura subjacente de EC2.",simple:"O AWS Lambda executa codigo sem voce provisionar servidores, cobrando apenas pelo tempo de execucao. O AWS Fargate executa containers sem gerenciar servidores, escalando automaticamente. Ambos sao serverless — voce nao gerencia a infraestrutura.",avoid:"Nunca rode funcoes serverless sem definir limites de concorrencia e timeouts. Lambda e Fargate sem limites podem escalar custos de forma imprevisivel."},en:{tech:"AWS Lambda and AWS Fargate are serverless services. Lambda runs code in response to events without managing servers. Fargate runs containers without managing the underlying EC2 infrastructure.",simple:"AWS Lambda runs code without you provisioning servers, charging only for execution time. AWS Fargate runs containers without managing servers, scaling automatically. Both are serverless — you do not manage the infrastructure.",avoid:"Never run serverless functions without setting concurrency limits and timeouts. Lambda and Fargate without limits can scale costs unpredictably."}}},
{en:"For compliance, a government agency needs hardware dedicated only to them. Which EC2 option should they use?",pt:"Para conformidade, uma agencia governamental precisa de hardware dedicado exclusivamente a ela. Qual opcao EC2 deve usar?",o:{en:["EC2 Dedicated Hosts","EC2 Reserved Instances","EC2 Spot Instances","EC2 On-Demand Instances"],pt:["EC2 Dedicated Hosts","EC2 Reserved Instances","EC2 Spot Instances","EC2 On-Demand Instances"]},a:[0],t:"EC2 Pricing",exp:{pt:{tech:"EC2 Dedicated Hosts fornecem servidores fisicos dedicados exclusivamente para seu uso, permitindo visibilidade de sockets e cores fisicos. Ideal para requisitos de conformidade e licenciamento por servidor.",simple:"O EC2 Dedicated Hosts fornece servidores fisicos inteiramente dedicados a sua conta, sem compartilhar hardware com outros clientes AWS. Isso atende requisitos de conformidade e licenciamento que exigem isolamento total de hardware.",avoid:"Nunca use Dedicated Hosts sem necessidade real de compliance ou licenciamento. O custo e significativamente maior que instancias compartilhadas ou dedicadas."},en:{tech:"EC2 Dedicated Hosts provide physical servers exclusively dedicated to your use, giving visibility into physical sockets and cores. Ideal for compliance requirements and per-server licensing.",simple:"EC2 Dedicated Hosts provide physical servers entirely dedicated to your account, without sharing hardware with other AWS customers. This meets compliance and licensing requirements that demand total hardware isolation.",avoid:"Never use Dedicated Hosts without a real compliance or licensing need. The cost is significantly higher than shared or dedicated instances."}}},
{en:"Which service is needed for a financial application that requires ACID transactions?",pt:"Qual servico e necessario para uma aplicacao financeira que requer transacoes ACID?",o:{en:["Amazon Redshift","Amazon RDS","AWS CloudHSM","AWS DMS"],pt:["Amazon Redshift","Amazon RDS","AWS CloudHSM","AWS DMS"]},a:[1],t:"RDS",exp:{pt:{tech:"Amazon RDS e um servico de banco de dados relacional gerenciado que suporta transacoes ACID (Atomicidade, Consistencia, Isolamento, Durabilidade), essenciais para aplicacoes financeiras.",simple:"O Amazon RDS oferece bancos de dados relacionais gerenciados que garantem transacoes ACID (Atomicidade, Consistencia, Isolamento, Durabilidade), essenciais para aplicacoes financeiras. Ele assegura que operacoes como transferencias de dinheiro sejam completas ou totalmente revertidas.",avoid:"Nunca rode aplicacoes que exigem ACID em bancos NoSQL como DynamoDB. Use RDS ou Aurora para garantir integridade transacional."},en:{tech:"Amazon RDS is a managed relational database service that supports ACID transactions (Atomicity, Consistency, Isolation, Durability), essential for financial applications.",simple:"Amazon RDS offers managed relational databases that guarantee ACID transactions (Atomicity, Consistency, Isolation, Durability), essential for financial applications. It ensures operations like money transfers are either completed fully or rolled back entirely.",avoid:"Never run applications requiring ACID on NoSQL databases like DynamoDB. Use RDS or Aurora to ensure transactional integrity."}}},
{en:"What assigns permissions directly to an IAM user?",pt:"O que atribui permissoes diretamente a um usuario IAM?",o:{en:["IAM Identity","IAM Group","IAM Role","IAM Policy"],pt:["IAM Identity","IAM Group","IAM Role","IAM Policy"]},a:[3],t:"IAM",exp:{pt:{tech:"IAM Policies sao documentos JSON que definem permissoes (allow/deny) para acoes em recursos AWS. Podem ser anexadas diretamente a usuarios, grupos ou roles.",simple:"Uma IAM Policy e um documento JSON que define permissoes especificas — quais acoes sao permitidas ou negadas em quais recursos AWS. Voce anexa a policy diretamente a um usuario, grupo ou role para conceder essas permissoes.",avoid:"Nunca atribua politicas IAM diretamente a usuarios individuais. Use grupos IAM para gerenciar permissoes e aplique o principio de menor privilegio."},en:{tech:"IAM Policies are JSON documents that define permissions (allow/deny) for actions on AWS resources. They can be attached directly to users, groups, or roles.",simple:"An IAM Policy is a JSON document that defines specific permissions — which actions are allowed or denied on which AWS resources. You attach the policy directly to a user, group, or role to grant those permissions.",avoid:"Never attach IAM policies directly to individual users. Use IAM groups to manage permissions and apply the principle of least privilege."}}},
{en:"What makes AWS most economical for variable compute demand?",pt:"O que torna a AWS mais economica para demanda de computacao variavel?",o:{en:["Launch powerful EC2 instances for spikes","Pay upfront for discounts","Launch and terminate EC2 instances based on demand","Choose cheaper EC2 instance types"],pt:["Lancar instancias EC2 poderosas para picos","Pagar antecipadamente por descontos","Lancar e encerrar instancias EC2 com base na demanda","Escolher tipos de instancia EC2 mais baratas"]},a:[2],t:"EC2 Pricing",exp:{pt:{tech:"O modelo pay-as-you-go da AWS permite lancar instancias quando a demanda aumenta e encerra-las quando diminui, pagando apenas pelo que usa. Isso elimina o custo de capacidade ociosa.",simple:"O AWS permite criar e encerrar instancias EC2 conforme a demanda aumenta ou diminui, assim voce so paga pelo que realmente usa. Isso e ideal para cargas de trabalho variaveis e imprevisiveis.",avoid:"Nunca deixe instancias EC2 rodando 24/7 para workloads que so precisam rodar algumas horas por dia. Use Auto Scaling ou agendamento para reduzir custos."},en:{tech:"AWS pay-as-you-go model allows launching instances when demand increases and terminating them when it decreases, paying only for what you use. This eliminates idle capacity costs.",simple:"AWS lets you launch and terminate EC2 instances as demand rises or falls, so you only pay for what you actually use. This is ideal for variable and unpredictable workloads.",avoid:"Never leave EC2 instances running 24/7 for workloads that only need to run a few hours per day. Use Auto Scaling or scheduling to reduce costs."}}},
{en:"Which database engine is NOT supported by Amazon RDS?",pt:"Qual engine de banco de dados NAO e suportada pelo Amazon RDS?",o:{en:["PostgreSQL","Oracle","Microsoft SQL Server","Teradata"],pt:["PostgreSQL","Oracle","Microsoft SQL Server","Teradata"]},a:[3],t:"RDS",exp:{pt:{tech:"Amazon RDS suporta seis engines: Amazon Aurora, PostgreSQL, MySQL, MariaDB, Oracle e Microsoft SQL Server. Teradata nao e uma opcao disponivel no RDS.",simple:"O Amazon RDS suporta MySQL, PostgreSQL, MariaDB, Oracle, SQL Server e Amazon Aurora. O Teradata nao e um dos motores suportados pelo RDS.",avoid:"Nunca assuma que qualquer banco relacional roda no RDS. Verifique os engines suportados antes de planejar migracoes."},en:{tech:"Amazon RDS supports six engines: Amazon Aurora, PostgreSQL, MySQL, MariaDB, Oracle, and Microsoft SQL Server. Teradata is not an available option in RDS.",simple:"Amazon RDS supports MySQL, PostgreSQL, MariaDB, Oracle, SQL Server, and Amazon Aurora. Teradata is not one of the engines supported by RDS.",avoid:"Never assume any relational database runs on RDS. Check supported engines before planning migrations."}}},
{en:"Which service can migrate on-premise databases to AWS?",pt:"Qual servico pode migrar bancos de dados on-premise para a AWS?",o:{en:["AWS DMS","S3 Transfer Acceleration","AWS Directory Service","AWS Transit Gateway"],pt:["AWS DMS","S3 Transfer Acceleration","AWS Directory Service","AWS Transit Gateway"]},a:[0],t:"S3 General",exp:{pt:{tech:"AWS Database Migration Service (DMS) facilita a migracao de bancos de dados para a AWS com tempo minimo de inatividade. Suporta migracoes homogeneas e heterogeneas entre diferentes engines.",simple:"O AWS DMS (Database Migration Service) permite migrar bancos de dados de ambientes on-premise para a AWS. Ele suporta migracoes homogeneas e heterogeneas com minimo tempo de inatividade.",avoid:"Nunca migre bancos de dados sem testar a replicacao em ambiente de staging primeiro. Evite migracoes sem plano de rollback."},en:{tech:"AWS Database Migration Service (DMS) facilitates database migration to AWS with minimal downtime. It supports homogeneous and heterogeneous migrations between different engines.",simple:"AWS DMS (Database Migration Service) lets you migrate databases from on-premise environments to AWS. It supports homogeneous and heterogeneous migrations with minimal downtime.",avoid:"Never migrate databases without testing replication in a staging environment first. Avoid migrations without a rollback plan."}}},
{en:"What is the easiest way to launch a WordPress website on AWS?",pt:"Qual e a maneira mais facil de lancar um site WordPress na AWS?",o:{en:["Run on Amazon Lightsail","Install on EC2 manually","Use S3 static web hosting","Host on AWS CDK"],pt:["Executar no Amazon Lightsail","Instalar manualmente no EC2","Usar hospedagem estatica do S3","Hospedar no AWS CDK"]},a:[0],t:"S3 General",exp:{pt:{tech:"Amazon Lightsail oferece servidores virtuais, armazenamento e rede com preco fixo e previsivel. Possui blueprints prontos para WordPress, tornando o lancamento extremamente simples.",simple:"O Amazon Lightsail oferece um ambiente simplificado para lancar sites WordPress com configuracao minima. Ele inclui servidor, armazenamento, rede e IP fixo por um preco mensal previsivel.",avoid:"Nunca provisione infraestrutura complexa para sites simples quando servicos gerenciados como Lightsail resolvem. Evite over-engineering."},en:{tech:"Amazon Lightsail offers virtual servers, storage, and networking at a fixed, predictable price. It has ready-made blueprints for WordPress, making deployment extremely simple.",simple:"Amazon Lightsail offers a simplified environment to launch WordPress sites with minimal configuration. It includes server, storage, networking, and a fixed IP for a predictable monthly price.",avoid:"Never provision complex infrastructure for simple sites when managed services like Lightsail suffice. Avoid over-engineering."}}},
{en:"Which services can manage encryption keys? (Choose TWO)",pt:"Quais servicos podem gerenciar chaves de criptografia? (Escolha DOIS)",o:{en:["AWS KMS","AWS Certificate Manager","AWS CodeDeploy","AWS CodeCommit","AWS CloudHSM"],pt:["AWS KMS","AWS Certificate Manager","AWS CodeDeploy","AWS CodeCommit","AWS CloudHSM"]},a:[0,4],multi:true,t:"KMS & Encryption",exp:{pt:{tech:"AWS KMS (Key Management Service) gerencia chaves de criptografia via software com integracao nativa aos servicos AWS. CloudHSM fornece modulos de seguranca de hardware (HSM) dedicados para controle total das chaves.",simple:"O AWS KMS gerencia chaves de criptografia de forma integrada com outros servicos AWS. O AWS CloudHSM fornece modulos de hardware dedicados onde voce tem controle exclusivo sobre as chaves.",avoid:"Nunca armazene chaves de criptografia em texto plano no codigo ou em variaveis de ambiente. Use KMS ou CloudHSM para gerenciar chaves."},en:{tech:"AWS KMS (Key Management Service) manages encryption keys via software with native integration to AWS services. CloudHSM provides dedicated hardware security modules (HSM) for full key control.",simple:"AWS KMS manages encryption keys integrated with other AWS services. AWS CloudHSM provides dedicated hardware modules where you have exclusive control over the keys.",avoid:"Never store encryption keys in plain text in code or environment variables. Use KMS or CloudHSM for key management."}}},
{en:"Which service allows you to install custom relational database software?",pt:"Qual servico permite instalar software de banco de dados relacional personalizado?",o:{en:["Amazon EC2","Amazon Cognito","Amazon RDS","Amazon Inspector"],pt:["Amazon EC2","Amazon Cognito","Amazon RDS","Amazon Inspector"]},a:[0],t:"EC2 General",exp:{pt:{tech:"Amazon EC2 fornece controle total sobre o sistema operacional, permitindo instalar e configurar qualquer software de banco de dados. RDS e gerenciado e nao permite instalacao de software customizado.",simple:"O Amazon EC2 fornece maquinas virtuais onde voce tem controle total do sistema operacional. Isso permite instalar qualquer software de banco de dados relacional, incluindo opcoes nao suportadas pelo RDS.",avoid:"Nunca instale bancos de dados em EC2 sem configurar backups automatizados e patches de seguranca. Voce e responsavel por tudo no EC2."},en:{tech:"Amazon EC2 provides full control over the operating system, allowing you to install and configure any database software. RDS is managed and does not allow custom software installation.",simple:"Amazon EC2 provides virtual machines where you have full control of the operating system. This lets you install any relational database software, including options not supported by RDS.",avoid:"Never install databases on EC2 without configuring automated backups and security patches. You are responsible for everything on EC2."}}},
{en:"Which service dynamically adjusts resources based on unpredictable load?",pt:"Qual servico ajusta dinamicamente os recursos com base em carga imprevisivel?",o:{en:["Auto Scaling","Elastic Load Balancing","Amazon Route 53","Amazon ECS"],pt:["Auto Scaling","Elastic Load Balancing","Amazon Route 53","Amazon ECS"]},a:[0],t:"ECS",exp:{pt:{tech:"AWS Auto Scaling monitora aplicacoes e ajusta automaticamente a capacidade para manter desempenho estavel e previsivel ao menor custo possivel. Funciona com EC2, ECS, DynamoDB e Aurora.",simple:"O Auto Scaling monitora a carga das instancias e adiciona ou remove instancias automaticamente conforme a demanda muda. Isso garante performance durante picos e economia quando a demanda cai.",avoid:"Nunca dimensione recursos manualmente para cargas imprevisiveis. Configure Auto Scaling com metricas adequadas e limites de custo."},en:{tech:"AWS Auto Scaling monitors applications and automatically adjusts capacity to maintain steady, predictable performance at the lowest possible cost. Works with EC2, ECS, DynamoDB, and Aurora.",simple:"Auto Scaling monitors instance load and automatically adds or removes instances as demand changes. This ensures performance during peaks and savings when demand drops.",avoid:"Never size resources manually for unpredictable workloads. Configure Auto Scaling with proper metrics and cost limits."}}},
{en:"What are key design principles for the public cloud? (Choose TWO)",pt:"Quais sao principios-chave de design para a nuvem publica? (Escolha DOIS)",o:{en:["Always reserve capacity","Loose coupling instead of tight coupling","Prefer servers over managed services","Disposable resources instead of fixed servers","Always use multi-AZ instead of multi-region"],pt:["Sempre reservar capacidade","Acoplamento fraco em vez de acoplamento forte","Preferir servidores a servicos gerenciados","Recursos descartaveis em vez de servidores fixos","Sempre usar multi-AZ em vez de multi-region"]},a:[1,3],multi:true,t:"RDS",exp:{pt:{tech:"Loose coupling reduz dependencias entre componentes, permitindo que falhas sejam isoladas. Recursos descartaveis (disposable resources) significam tratar servidores como temporarios, facilmente substituiveis via automacao.",simple:"Acoplamento fraco significa que os componentes se comunicam por interfaces bem definidas e podem ser alterados independentemente. Recursos descartaveis significa tratar servidores como temporarios, substituindo-os em vez de consertar.",avoid:"Nunca projete componentes fortemente acoplados na nuvem. Evite tratar servidores como permanentes, trate-os como descartaveis."},en:{tech:"Loose coupling reduces dependencies between components, allowing failures to be isolated. Disposable resources means treating servers as temporary, easily replaceable through automation.",simple:"Loose coupling means components communicate through well-defined interfaces and can be changed independently. Disposable resources means treating servers as temporary, replacing them instead of repairing.",avoid:"Never design tightly coupled components in the cloud. Avoid treating servers as permanent, treat them as disposable."}}},
{en:"Where can you get a list of all IAM users with their credential status?",pt:"Onde voce pode obter uma lista de todos os usuarios IAM com o status de suas credenciais?",o:{en:["AWS CloudTrail Trails","IAM Credential Report","AWS Artifact reports","AWS Cost and Usage Report"],pt:["AWS CloudTrail Trails","IAM Credential Report","AWS Artifact reports","AWS Cost and Usage Report"]},a:[1],t:"IAM",exp:{pt:{tech:"O IAM Credential Report e um relatorio que lista todos os usuarios IAM da conta e o status de suas credenciais, incluindo senhas, chaves de acesso e MFA. Pode ser gerado pelo console ou CLI.",simple:"O IAM Credential Report gera um arquivo CSV listando todos os usuarios IAM da conta e o status de suas credenciais, incluindo senhas, access keys e MFA. E gerado diretamente no console IAM.",avoid:"Nunca ignore o IAM Credential Report. Audite regularmente usuarios com credenciais antigas ou sem MFA ativado."},en:{tech:"The IAM Credential Report lists all IAM users in the account and their credential status, including passwords, access keys, and MFA. It can be generated via the console or CLI.",simple:"The IAM Credential Report generates a CSV file listing all IAM users in the account and the status of their credentials, including passwords, access keys, and MFA. It is generated directly in the IAM console.",avoid:"Never ignore the IAM Credential Report. Regularly audit users with old credentials or without MFA enabled."}}},
{en:"Which service lets you generate and use your own encryption keys in AWS?",pt:"Qual servico permite gerar e usar suas proprias chaves de criptografia na AWS?",o:{en:["AWS Shield","AWS Certificate Manager","AWS CloudHSM","AWS WAF"],pt:["AWS Shield","AWS Certificate Manager","AWS CloudHSM","AWS WAF"]},a:[2],t:"KMS & Encryption",exp:{pt:{tech:"AWS CloudHSM fornece modulos de seguranca de hardware (HSM) dedicados dentro da nuvem AWS, permitindo gerar, armazenar e gerenciar suas proprias chaves criptograficas com controle exclusivo.",simple:"O AWS CloudHSM fornece modulos de seguranca de hardware dedicados na nuvem AWS onde voce gera, armazena e gerencia suas proprias chaves de criptografia. A AWS nao tem acesso as suas chaves no CloudHSM.",avoid:"Nunca use chaves de criptografia compartilhadas entre ambientes. Use CloudHSM quando precisar de controle total sobre o hardware de chaves."},en:{tech:"AWS CloudHSM provides dedicated hardware security modules (HSM) within the AWS cloud, allowing you to generate, store, and manage your own cryptographic keys with exclusive control.",simple:"AWS CloudHSM provides dedicated hardware security modules in the AWS cloud where you generate, store, and manage your own encryption keys. AWS does not have access to your keys in CloudHSM.",avoid:"Never share encryption keys across environments. Use CloudHSM when you need full control over key hardware."}}},
{en:"What provides the highest redundancy and fault tolerance for a global application?",pt:"O que proporciona a maior redundancia e tolerancia a falhas para uma aplicacao global?",o:{en:["No need to architect for these in AWS","Deploy in a single Availability Zone","Deploy in multiple AZs in a single region","Deploy in multiple AZs across multiple regions"],pt:["Nao e necessario arquitetar para isso na AWS","Implantar em uma unica Zona de Disponibilidade","Implantar em multiplas AZs em uma unica regiao","Implantar em multiplas AZs em multiplas regioes"]},a:[3],t:"Global Infrastructure",exp:{pt:{tech:"Implantar em multiplas AZs em multiplas Regioes oferece o maior nivel de redundancia e tolerancia a falhas, protegendo contra falhas de datacenter (AZs) e desastres regionais (Regioes).",simple:"Implantar em multiplas AZs dentro de multiplas regioes oferece o maior nivel de redundancia. Se uma regiao inteira ficar indisponivel, a aplicacao continua funcionando em outra regiao.",avoid:"Nunca dependa de uma unica regiao ou AZ para aplicacoes globais. Distribua em multiplas AZs e regioes para tolerancia a falhas real."},en:{tech:"Deploying across multiple AZs in multiple Regions provides the highest level of redundancy and fault tolerance, protecting against datacenter failures (AZs) and regional disasters (Regions).",simple:"Deploying across multiple AZs within multiple regions provides the highest level of redundancy. If an entire region becomes unavailable, the application continues running in another region.",avoid:"Never rely on a single region or AZ for global applications. Distribute across multiple AZs and regions for real fault tolerance."}}},
{en:"Which AWS services automatically replicate data across Availability Zones? (Choose TWO)",pt:"Quais servicos AWS replicam dados automaticamente entre Zonas de Disponibilidade? (Escolha DOIS)",o:{en:["Instance Store","Amazon S3","Amazon DynamoDB","Amazon Route 53","AWS VPN"],pt:["Instance Store","Amazon S3","Amazon DynamoDB","Amazon Route 53","AWS VPN"]},a:[1,2],multi:true,t:"S3 General",exp:{pt:{tech:"Amazon S3 armazena objetos automaticamente em no minimo 3 AZs (exceto One Zone-IA). DynamoDB replica dados automaticamente em 3 AZs dentro de uma regiao para alta disponibilidade e durabilidade.",simple:"O Amazon S3 e o Amazon DynamoDB replicam dados automaticamente em pelo menos tres Availability Zones dentro de uma regiao. Isso garante alta durabilidade e disponibilidade sem configuracao adicional.",avoid:"Nunca assuma que todos os servicos replicam automaticamente entre AZs. Verifique a documentacao de cada servico sobre replicacao."},en:{tech:"Amazon S3 stores objects automatically across at least 3 AZs (except One Zone-IA). DynamoDB automatically replicates data across 3 AZs within a region for high availability and durability.",simple:"Amazon S3 and Amazon DynamoDB automatically replicate data across at least three Availability Zones within a region. This ensures high durability and availability without additional configuration.",avoid:"Never assume all services automatically replicate across AZs. Check each service documentation for replication behavior."}}},
{en:"How can you protect S3 data from accidental deletion?",pt:"Como voce pode proteger dados no S3 contra exclusao acidental?",o:{en:["Enable S3 Versioning","Configure Bucket Policies","Configure Lifecycle Policies","Disable Cross-Region Replication"],pt:["Habilitar o versionamento do S3","Configurar Bucket Policies","Configurar Lifecycle Policies","Desabilitar a replicacao entre regioes"]},a:[0],t:"S3 General",exp:{pt:{tech:"S3 Versioning mantem multiplas versoes de um objeto no mesmo bucket. Se um objeto for excluido ou sobrescrito acidentalmente, versoes anteriores podem ser restauradas.",simple:"O S3 Versioning mantem multiplas versoes de cada objeto no bucket. Se um arquivo for apagado ou sobrescrito acidentalmente, voce pode recuperar a versao anterior.",avoid:"Nunca confie apenas em permissoes para proteger dados S3. Ative versionamento e MFA Delete para proteger contra exclusoes acidentais."},en:{tech:"S3 Versioning keeps multiple versions of an object in the same bucket. If an object is accidentally deleted or overwritten, previous versions can be restored.",simple:"S3 Versioning keeps multiple versions of each object in the bucket. If a file is accidentally deleted or overwritten, you can recover the previous version.",avoid:"Never rely only on permissions to protect S3 data. Enable versioning and MFA Delete to protect against accidental deletions."}}},
{en:"What is AWS responsible for in the shared responsibility model?",pt:"Pelo que a AWS e responsavel no modelo de responsabilidade compartilhada?",o:{en:["Securing regions and edge locations","Performing client-side auditing tasks","Monitoring AWS resources usage by the customer","Securing customer access to AWS resources"],pt:["Proteger regioes e edge locations","Realizar tarefas de auditoria do lado do cliente","Monitorar o uso de recursos AWS pelo cliente","Proteger o acesso do cliente aos recursos AWS"]},a:[0],t:"CloudFront",exp:{pt:{tech:"No modelo de responsabilidade compartilhada, a AWS e responsavel pela seguranca DA nuvem: infraestrutura fisica, hardware, rede, datacenters, regioes e edge locations. O cliente e responsavel pela seguranca NA nuvem.",simple:"A AWS e responsavel por proteger a infraestrutura fisica, incluindo regioes, Availability Zones e edge locations. Isso inclui hardware, rede, energia e seguranca fisica dos datacenters.",avoid:"Nunca confunda responsabilidades do modelo compartilhado. A AWS cuida da infraestrutura fisica, voce cuida dos seus dados e configuracoes."},en:{tech:"In the shared responsibility model, AWS is responsible for security OF the cloud: physical infrastructure, hardware, networking, datacenters, regions, and edge locations. The customer is responsible for security IN the cloud.",simple:"AWS is responsible for protecting the physical infrastructure, including regions, Availability Zones, and edge locations. This includes hardware, networking, power, and physical security of datacenters.",avoid:"Never confuse shared responsibility model roles. AWS handles physical infrastructure, you handle your data and configurations."}}},
{en:"Who is responsible for scaling DynamoDB?",pt:"Quem e responsavel por escalar o DynamoDB?",o:{en:["Your security team","Your development team","AWS","Your DevOps team"],pt:["Sua equipe de seguranca","Sua equipe de desenvolvimento","AWS","Sua equipe de DevOps"]},a:[2],t:"DynamoDB",exp:{pt:{tech:"DynamoDB e um servico totalmente gerenciado. A AWS cuida da escalabilidade, disponibilidade, patches e manutencao da infraestrutura. O cliente configura a capacidade desejada, mas a AWS executa o escalonamento.",simple:"O DynamoDB e um servico totalmente gerenciado, e a AWS e responsavel por escalar a capacidade automaticamente. O cliente nao precisa provisionar ou gerenciar servidores para o DynamoDB.",avoid:"Nunca tente gerenciar manualmente o escalonamento do DynamoDB sem entender o modo on-demand. A AWS gerencia a capacidade automaticamente."},en:{tech:"DynamoDB is a fully managed service. AWS handles scalability, availability, patching, and infrastructure maintenance. The customer configures desired capacity, but AWS executes the scaling.",simple:"DynamoDB is a fully managed service, and AWS is responsible for scaling capacity automatically. The customer does not need to provision or manage servers for DynamoDB.",avoid:"Never try to manually manage DynamoDB scaling without understanding on-demand mode. AWS manages capacity automatically."}}},
{en:"What are benefits of AWS Organizations? (Choose TWO)",pt:"Quais sao beneficios do AWS Organizations? (Escolha DOIS)",o:{en:["Control access to AWS services","Help design a cloud adoption path","Manage payment methods for each account","Help customers achieve desired business outcomes","Consolidate billing across multiple accounts"],pt:["Controlar acesso a servicos AWS","Ajudar a projetar um caminho de adocao da nuvem","Gerenciar metodos de pagamento para cada conta","Ajudar clientes a alcancar resultados de negocios desejados","Consolidar faturamento entre multiplas contas"]},a:[0,4],multi:true,t:"Cost Management",exp:{pt:{tech:"AWS Organizations permite gerenciamento centralizado de multiplas contas AWS. SCPs (Service Control Policies) controlam acesso a servicos. Consolidated Billing unifica o faturamento e pode gerar descontos por volume.",simple:"O AWS Organizations permite controlar o acesso a servicos AWS usando politicas (SCPs) em multiplas contas. Tambem oferece faturamento consolidado, unificando os custos de todas as contas em uma unica fatura.",avoid:"Nunca gerencie multiplas contas AWS sem Organizations. Sem controle centralizado, voce perde visibilidade de custos e seguranca."},en:{tech:"AWS Organizations enables centralized management of multiple AWS accounts. SCPs (Service Control Policies) control access to services. Consolidated Billing unifies billing and can generate volume discounts.",simple:"AWS Organizations lets you control access to AWS services using policies (SCPs) across multiple accounts. It also offers consolidated billing, unifying costs from all accounts into a single invoice.",avoid:"Never manage multiple AWS accounts without Organizations. Without centralized control, you lose cost and security visibility."}}},
{en:"Which service can you use to build a data warehouse in the cloud?",pt:"Qual servico voce pode usar para construir um data warehouse na nuvem?",o:{en:["AWS Shield","Amazon Redshift","Amazon RDS","Amazon Comprehend"],pt:["AWS Shield","Amazon Redshift","Amazon RDS","Amazon Comprehend"]},a:[1],t:"RDS",exp:{pt:{tech:"Amazon Redshift e o servico de data warehouse da AWS, otimizado para analise de dados em escala de petabytes com armazenamento colunar e processamento massivamente paralelo (MPP).",simple:"O Amazon Redshift e um servico de data warehouse projetado para consultas analiticas em grandes volumes de dados. Ele usa armazenamento colunar e processamento paralelo para executar consultas complexas rapidamente.",avoid:"Nunca use bancos OLTP para cargas analiticas pesadas. Use Redshift para data warehousing e consultas analiticas complexas."},en:{tech:"Amazon Redshift is AWS data warehouse service, optimized for petabyte-scale data analysis with columnar storage and massively parallel processing (MPP).",simple:"Amazon Redshift is a data warehouse service designed for analytical queries on large volumes of data. It uses columnar storage and parallel processing to run complex queries quickly.",avoid:"Never use OLTP databases for heavy analytical workloads. Use Redshift for data warehousing and complex analytical queries."}}},
{en:"Which AWS service allows you to buy third-party software?",pt:"Qual servico AWS permite comprar software de terceiros?",o:{en:["AWS Application Discovery Service","Amazon DevPay","AWS Marketplace","Resource Groups"],pt:["AWS Application Discovery Service","Amazon DevPay","AWS Marketplace","Resource Groups"]},a:[2],t:"Migration",exp:{pt:{tech:"AWS Marketplace e uma loja digital que permite encontrar, comprar, implantar e gerenciar software de terceiros e servicos que rodam na AWS, com faturamento integrado a conta AWS.",simple:"O AWS Marketplace e uma loja digital onde voce pode encontrar, comprar e implantar software de terceiros diretamente na sua conta AWS. A cobranca e integrada a fatura da AWS.",avoid:"Nunca instale software de terceiros manualmente quando esta disponivel no Marketplace. Evite configuracoes nao padronizadas e sem licenca."},en:{tech:"AWS Marketplace is a digital store that lets you find, buy, deploy, and manage third-party software and services that run on AWS, with billing integrated into your AWS account.",simple:"AWS Marketplace is a digital store where you can find, buy, and deploy third-party software directly in your AWS account. Billing is integrated into your AWS invoice.",avoid:"Never install third-party software manually when available on Marketplace. Avoid non-standard and unlicensed configurations."}}},
{en:"Which service can route end users to the nearest AWS Region for low latency?",pt:"Qual servico pode direcionar usuarios finais para a Regiao AWS mais proxima para baixa latencia?",o:{en:["Amazon Cognito","AWS Systems Manager","AWS Cloud9","Amazon Route 53"],pt:["Amazon Cognito","AWS Systems Manager","AWS Cloud9","Amazon Route 53"]},a:[3],t:"Route 53",exp:{pt:{tech:"Amazon Route 53 e um servico de DNS que suporta roteamento baseado em latencia, direcionando usuarios para a Regiao AWS com menor tempo de resposta. Tambem suporta roteamento geolocalizado e failover.",simple:"O Amazon Route 53 e um servico de DNS que pode rotear usuarios para a regiao AWS mais proxima usando politicas de roteamento baseadas em latencia ou geolocalizacao. Isso reduz o tempo de resposta para usuarios globais.",avoid:"Nunca use IPs fixos para rotear usuarios globais. Use Route 53 com roteamento baseado em latencia para direcionar ao endpoint mais proximo."},en:{tech:"Amazon Route 53 is a DNS service that supports latency-based routing, directing users to the AWS Region with the lowest response time. It also supports geolocation routing and failover.",simple:"Amazon Route 53 is a DNS service that can route users to the nearest AWS Region using latency-based or geolocation routing policies. This reduces response time for global users.",avoid:"Never use fixed IPs to route global users. Use Route 53 with latency-based routing to direct to the nearest endpoint."}}},
{en:"Which feature allows users to sign in with existing corporate credentials?",pt:"Qual recurso permite que usuarios facam login com credenciais corporativas existentes?",o:{en:["Federation","Access keys","IAM Permissions","WAF rules"],pt:["Federacao","Chaves de acesso","Permissoes IAM","Regras do WAF"]},a:[0],t:"IAM",exp:{pt:{tech:"A Federacao (Federation) permite que usuarios se autentiquem na AWS usando credenciais de um provedor de identidade externo (como Active Directory corporativo), sem criar usuarios IAM separados.",simple:"A federacao permite que usuarios facam login na AWS usando credenciais corporativas existentes de um provedor de identidade externo (como Active Directory). Isso elimina a necessidade de criar usuarios IAM separados para cada pessoa.",avoid:"Nunca crie usuarios IAM separados para funcionarios que ja tem credenciais corporativas. Use federacao para single sign-on."},en:{tech:"Federation allows users to authenticate to AWS using credentials from an external identity provider (like corporate Active Directory), without creating separate IAM users.",simple:"Federation allows users to sign in to AWS using existing corporate credentials from an external identity provider (such as Active Directory). This eliminates the need to create separate IAM users for each person.",avoid:"Never create separate IAM users for employees who already have corporate credentials. Use federation for single sign-on."}}},
{en:"What is the main benefit of security groups on an RDS instance?",pt:"Qual e o principal beneficio dos security groups em uma instancia RDS?",o:{en:["Manages user access and encryption keys","Controls what IP ranges can connect to the database","Deploys SSL/TLS certificates for the database","Distributes incoming traffic across replicas"],pt:["Gerencia acesso de usuarios e chaves de criptografia","Controla quais faixas de IP podem se conectar ao banco de dados","Implanta certificados SSL/TLS para o banco de dados","Distribui trafego de entrada entre replicas"]},a:[1],t:"Load Balancing",exp:{pt:{tech:"Security Groups atuam como firewalls virtuais que controlam o trafego de entrada e saida com base em regras de IP, porta e protocolo. Em RDS, eles definem quais enderecos IP podem acessar o banco.",simple:"Os Security Groups controlam quais faixas de IP podem se conectar a uma instancia RDS. Eles funcionam como um firewall que permite ou bloqueia trafego de entrada com base em regras definidas pelo usuario.",avoid:"Nunca deixe Security Groups de RDS abertos para 0.0.0.0/0. Restrinja acesso apenas aos IPs e subnets que realmente precisam conectar."},en:{tech:"Security Groups act as virtual firewalls that control inbound and outbound traffic based on IP, port, and protocol rules. In RDS, they define which IP addresses can access the database.",simple:"Security Groups control which IP ranges can connect to an RDS instance. They work as a firewall that allows or blocks inbound traffic based on user-defined rules.",avoid:"Never leave RDS Security Groups open to 0.0.0.0/0. Restrict access only to IPs and subnets that actually need to connect."}}},
{en:"Which ECS launch type gives you visibility and control over the underlying servers?",pt:"Qual tipo de lancamento do ECS da visibilidade e controle sobre os servidores subjacentes?",o:{en:["EC2 launch type","Fargate launch type","Lightsail launch type","Lambda launch type"],pt:["Tipo de lancamento EC2","Tipo de lancamento Fargate","Tipo de lancamento Lightsail","Tipo de lancamento Lambda"]},a:[0],t:"EC2 General",exp:{pt:{tech:"O tipo de lancamento EC2 no ECS permite gerenciar diretamente as instancias EC2 que hospedam seus containers, dando controle total sobre a infraestrutura. Fargate e a alternativa serverless sem gerenciamento de servidores.",simple:"O ECS com EC2 launch type permite que voce veja e gerencie as instancias EC2 subjacentes onde seus containers rodam. Voce tem controle sobre o tipo de instancia, sistema operacional e configuracoes de rede.",avoid:"Nunca use o launch type EC2 no ECS se nao precisa de controle sobre os servidores. Use Fargate para reduzir overhead operacional."},en:{tech:"The EC2 launch type in ECS lets you directly manage the EC2 instances hosting your containers, giving full control over the infrastructure. Fargate is the serverless alternative without server management.",simple:"ECS with EC2 launch type lets you see and manage the underlying EC2 instances where your containers run. You have control over instance type, operating system, and networking configurations.",avoid:"Never use the EC2 launch type in ECS if you do not need server control. Use Fargate to reduce operational overhead."}}},
{en:"Multiple standalone AWS accounts want to decrease their charges. What should they do?",pt:"Varias contas AWS independentes querem reduzir seus custos. O que devem fazer?",o:{en:["Remove all unnecessary accounts","Add accounts to an AWS Organization with Consolidated Billing","Track charges individually per member account","Enable tiered-pricing on each account"],pt:["Remover todas as contas desnecessarias","Adicionar contas a uma Organizacao AWS com Faturamento Consolidado","Rastrear cobrancos individualmente por conta membro","Habilitar precos por camada em cada conta"]},a:[1],t:"Cost Management",exp:{pt:{tech:"AWS Organizations com Consolidated Billing unifica o faturamento de multiplas contas, permitindo descontos por volume combinado. Quanto maior o uso agregado, maiores os descontos em servicos como S3 e EC2.",simple:"Adicionar contas independentes a uma AWS Organization com Consolidated Billing unifica o faturamento e permite descontos por volume de uso agregado. Quanto maior o uso total, maiores os descontos aplicados.",avoid:"Nunca mantenha contas AWS isoladas pagando individualmente. Use Consolidated Billing no Organizations para descontos por volume."},en:{tech:"AWS Organizations with Consolidated Billing unifies billing across multiple accounts, enabling volume discounts on combined usage. The greater the aggregate usage, the larger the discounts on services like S3 and EC2.",simple:"Adding standalone accounts to an AWS Organization with Consolidated Billing unifies invoicing and enables volume discounts based on aggregated usage. The larger the total usage, the bigger the discounts applied.",avoid:"Never keep isolated AWS accounts paying individually. Use Consolidated Billing in Organizations for volume discounts."}}},
{en:"What two parts should you check for a VPC security audit on EC2?",pt:"Quais duas partes voce deve verificar em uma auditoria de seguranca de VPC em EC2?",o:{en:["Network ACLs and Traffic Manager","Network ACLs and Subnets","Security Groups and Internet Gateways","Security Groups and Network ACLs"],pt:["Network ACLs e Traffic Manager","Network ACLs e Sub-redes","Security Groups e Internet Gateways","Security Groups e Network ACLs"]},a:[3],t:"EC2 General",exp:{pt:{tech:"Security Groups (nivel de instancia, stateful) e Network ACLs (nivel de sub-rede, stateless) sao as duas camadas de seguranca de rede na VPC. Auditar ambos garante cobertura completa do trafego.",simple:"Para auditoria de seguranca de VPC em instancias EC2, voce deve verificar os Security Groups (que protegem instancias individuais) e os Network ACLs (que protegem sub-redes inteiras). Juntos, eles formam duas camadas de protecao.",avoid:"Nunca audite apenas Security Groups sem verificar Network ACLs. Ambos controlam trafego e devem ser revisados juntos."},en:{tech:"Security Groups (instance level, stateful) and Network ACLs (subnet level, stateless) are the two layers of network security in a VPC. Auditing both ensures complete traffic coverage.",simple:"For a VPC security audit on EC2 instances, you should check Security Groups (which protect individual instances) and Network ACLs (which protect entire subnets). Together, they form two layers of protection.",avoid:"Never audit only Security Groups without checking Network ACLs. Both control traffic and must be reviewed together."}}},
{en:"What does the Business support plan provide? (Choose TWO)",pt:"O que o plano de suporte Business oferece? (Escolha DOIS)",o:{en:["Full set of Trusted Advisor checks","Support Concierge","Less than 15 minute response time for critical issues","AWS Support API access","Proactive Technical Account Manager"],pt:["Conjunto completo de verificacoes do Trusted Advisor","Support Concierge","Tempo de resposta inferior a 15 minutos para problemas criticos","Acesso a API do AWS Support","Technical Account Manager proativo"]},a:[0,3],multi:true,t:"Trusted Advisor",exp:{pt:{tech:"O plano Business inclui o conjunto completo de verificacoes do Trusted Advisor e acesso a AWS Support API para automacao. Concierge e TAM sao exclusivos do Enterprise. Resposta menor que 15 min e do Enterprise.",simple:"O plano Business inclui todas as verificacoes do Trusted Advisor e acesso a AWS Support API para automacao de tickets de suporte. Isso permite monitoramento completo e integracao programatica com o suporte.",avoid:"Nunca fique no plano Basic se precisa de verificacoes completas do Trusted Advisor. O plano Business desbloqueia todas as verificacoes."},en:{tech:"The Business plan includes the full set of Trusted Advisor checks and AWS Support API access for automation. Concierge and TAM are Enterprise-only. Sub-15 minute response is Enterprise-only.",simple:"The Business plan includes all Trusted Advisor checks and access to the AWS Support API for support ticket automation. This enables comprehensive monitoring and programmatic integration with support.",avoid:"Never stay on the Basic plan if you need full Trusted Advisor checks. The Business plan unlocks all checks."}}},
{en:"Which service automates deployment and scaling of web applications?",pt:"Qual servico automatiza a implantacao e o escalonamento de aplicacoes web?",o:{en:["Amazon S3","AWS Elastic Beanstalk","AWS CodeCommit","Amazon EFS"],pt:["Amazon S3","AWS Elastic Beanstalk","AWS CodeCommit","Amazon EFS"]},a:[1],t:"S3 General",exp:{pt:{tech:"AWS Elastic Beanstalk e um servico PaaS que automatiza implantacao, escalonamento, balanceamento de carga e monitoramento. Voce faz upload do codigo e ele provisiona a infraestrutura automaticamente.",simple:"O AWS Elastic Beanstalk automatiza o deploy, escalamento e gerenciamento de aplicacoes web. Voce sobe o codigo e ele configura servidores, balanceadores, auto scaling e monitoramento automaticamente.",avoid:"Nunca configure manualmente servidores web quando Elastic Beanstalk pode automatizar deploy e escalonamento. Evite trabalho repetitivo."},en:{tech:"AWS Elastic Beanstalk is a PaaS service that automates deployment, scaling, load balancing, and monitoring. You upload your code and it provisions the infrastructure automatically.",simple:"AWS Elastic Beanstalk automates the deployment, scaling, and management of web applications. You upload your code and it configures servers, load balancers, auto scaling, and monitoring automatically.",avoid:"Never manually configure web servers when Elastic Beanstalk can automate deploy and scaling. Avoid repetitive work."}}},
{en:"What is true about AWS security responsibility?",pt:"O que e verdadeiro sobre a responsabilidade de seguranca da AWS?",o:{en:["AWS manages everything for EC2 operating systems","Customers are responsible for patching databases running on EC2","Server-side encryption is always AWS responsibility","AWS is responsible for application-level security"],pt:["A AWS gerencia tudo para sistemas operacionais EC2","Clientes sao responsaveis por atualizar bancos de dados rodando em EC2","Criptografia server-side e sempre responsabilidade da AWS","A AWS e responsavel pela seguranca em nivel de aplicacao"]},a:[1],t:"EC2 General",exp:{pt:{tech:"Em EC2 (IaaS), o cliente e responsavel por gerenciar o SO, aplicativos e bancos de dados instalados, incluindo patches e atualizacoes. A AWS cuida apenas do hardware e da infraestrutura subjacente.",simple:"Quando voce instala um banco de dados em uma instancia EC2, voce e responsavel por aplicar patches e atualizacoes nesse banco. A AWS so cuida da infraestrutura fisica e do hipervisor.",avoid:"Nunca esqueca que patches de SO e banco em EC2 sao sua responsabilidade. A AWS nao aplica patches em instancias que voce gerencia."},en:{tech:"In EC2 (IaaS), the customer is responsible for managing the OS, applications, and databases installed, including patches and updates. AWS only takes care of the hardware and underlying infrastructure.",simple:"When you install a database on an EC2 instance, you are responsible for applying patches and updates to that database. AWS only takes care of the physical infrastructure and hypervisor.",avoid:"Never forget that OS and database patches on EC2 are your responsibility. AWS does not patch instances you manage."}}},
{en:"Which service provides the EASIEST way to set up and manage multiple AWS accounts?",pt:"Qual servico oferece a maneira MAIS FACIL de configurar e gerenciar multiplas contas AWS?",o:{en:["AWS Control Tower","Amazon Macie","AWS Systems Manager Patch Manager","AWS Security Hub"],pt:["AWS Control Tower","Amazon Macie","AWS Systems Manager Patch Manager","AWS Security Hub"]},a:[0],t:"Macie",exp:{pt:{tech:"AWS Control Tower automatiza a configuracao de um ambiente multi-account seguro seguindo as melhores praticas da AWS. Configura landing zones, guardrails e fornece um dashboard centralizado.",simple:"O AWS Control Tower configura e governa um ambiente multi-conta AWS seguindo boas praticas. Ele cria contas padronizadas, aplica guardrails de seguranca e fornece um dashboard centralizado.",avoid:"Nunca configure multiplas contas manualmente sem guardrails. Use Control Tower para aplicar politicas de seguranca desde o inicio."},en:{tech:"AWS Control Tower automates the setup of a secure multi-account environment following AWS best practices. It sets up landing zones, guardrails, and provides a centralized dashboard.",simple:"AWS Control Tower sets up and governs a multi-account AWS environment following best practices. It creates standardized accounts, applies security guardrails, and provides a centralized dashboard.",avoid:"Never configure multiple accounts manually without guardrails. Use Control Tower to apply security policies from the start."}}},
{en:"How can you track EC2 CPU usage above 60%?",pt:"Como voce pode monitorar o uso de CPU do EC2 acima de 60%?",o:{en:["Use Amazon CloudFront","Set a threshold in AWS Config","Use Amazon CloudWatch Alarms","Use Amazon SNS"],pt:["Usar o Amazon CloudFront","Definir um limite no AWS Config","Usar alarmes do Amazon CloudWatch","Usar o Amazon SNS"]},a:[2],t:"EC2 General",exp:{pt:{tech:"Amazon CloudWatch Alarms monitoram metricas e disparam acoes quando um limite e ultrapassado. Voce pode configurar um alarme para CPU acima de 60% que envia notificacao via SNS ou executa acoes automaticas.",simple:"O Amazon CloudWatch Alarms permite definir limites para metricas como uso de CPU e disparar alertas quando esses limites sao ultrapassados. Voce pode configurar acoes automaticas ou notificacoes via SNS.",avoid:"Nunca ignore metricas de CPU sem configurar alarmes. Use CloudWatch Alarms para ser notificado antes que problemas afetem usuarios."},en:{tech:"Amazon CloudWatch Alarms monitor metrics and trigger actions when a threshold is breached. You can set an alarm for CPU above 60% that sends notifications via SNS or executes automated actions.",simple:"Amazon CloudWatch Alarms lets you set thresholds for metrics like CPU usage and trigger alerts when those thresholds are exceeded. You can configure automatic actions or notifications via SNS.",avoid:"Never ignore CPU metrics without configuring alarms. Use CloudWatch Alarms to be notified before issues affect users."}}},
{en:"What is the recommended storage for an often-changing database running on EC2?",pt:"Qual e o armazenamento recomendado para um banco de dados com alteracoes frequentes rodando em EC2?",o:{en:["Amazon EBS","Amazon RDS","Cannot run a database on EC2","Amazon DynamoDB"],pt:["Amazon EBS","Amazon RDS","Nao e possivel rodar banco de dados no EC2","Amazon DynamoDB"]},a:[0],t:"EBS",exp:{pt:{tech:"Amazon EBS (Elastic Block Store) fornece armazenamento em bloco persistente de baixa latencia para EC2, ideal para bancos de dados com muitas operacoes de leitura/escrita. EBS persiste independentemente da instancia.",simple:"O Amazon EBS (Elastic Block Store) fornece armazenamento em bloco persistente para instancias EC2. Os dados permanecem salvos mesmo quando a instancia e parada, sendo ideal para bancos de dados com gravacoes frequentes.",avoid:"Nunca use armazenamento efemero para dados de banco em EC2. Use EBS para persistencia e configure snapshots automaticos."},en:{tech:"Amazon EBS (Elastic Block Store) provides persistent, low-latency block storage for EC2, ideal for databases with heavy read/write operations. EBS persists independently of the instance.",simple:"Amazon EBS (Elastic Block Store) provides persistent block storage for EC2 instances. Data remains saved even when the instance is stopped, making it ideal for databases with frequent writes.",avoid:"Never use ephemeral storage for database data on EC2. Use EBS for persistence and configure automatic snapshots."}}},
{en:"What factors determine AWS Lambda charges? (Choose TWO)",pt:"Quais fatores determinam os custos do AWS Lambda? (Escolha DOIS)",o:{en:["Storage consumed by Lambda","Number of requests","Number of attached volumes","Placement groups used","Compute time consumed"],pt:["Armazenamento consumido pelo Lambda","Numero de requisicoes","Numero de volumes anexados","Grupos de posicionamento utilizados","Tempo de computacao consumido"]},a:[1,4],multi:true,t:"Lambda",exp:{pt:{tech:"Lambda cobra com base no numero de requisicoes (invocacoes) e no tempo de computacao (medido em ms, multiplicado pela memoria alocada em GB). O free tier inclui 1 milhao de requisicoes e 400.000 GB-segundos por mes.",simple:"O AWS Lambda cobra com base no numero de requisicoes recebidas e no tempo de computacao consumido (em milissegundos). Se a funcao nao for invocada, nao ha cobranca.",avoid:"Nunca deixe funcoes Lambda rodando sem limites de timeout e memoria. Custos podem disparar com execucoes longas ou mal otimizadas."},en:{tech:"Lambda charges based on the number of requests (invocations) and compute time (measured in ms, multiplied by allocated memory in GB). The free tier includes 1 million requests and 400,000 GB-seconds per month.",simple:"AWS Lambda charges based on the number of requests received and the compute time consumed (in milliseconds). If the function is not invoked, there is no charge.",avoid:"Never leave Lambda functions running without timeout and memory limits. Costs can spike with long or poorly optimized executions."}}},
{en:"What does Amazon GuardDuty do?",pt:"O que o Amazon GuardDuty faz?",o:{en:["Notifies you about abuse events in your account","Continuously monitors and detects threats in your account","Identifies root cause of security issues","Checks security groups for unrestricted access"],pt:["Notifica sobre eventos de abuso na sua conta","Monitora continuamente e detecta ameacas na sua conta","Identifica a causa raiz de problemas de seguranca","Verifica security groups com acesso irrestrito"]},a:[1],t:"VPC & Networking",exp:{pt:{tech:"Amazon GuardDuty e um servico de deteccao de ameacas que monitora continuamente atividades maliciosas usando machine learning, analise de anomalias e inteligencia de ameacas integrada em logs do CloudTrail, VPC Flow Logs e DNS.",simple:"O Amazon GuardDuty monitora continuamente sua conta AWS em busca de atividades maliciosas e comportamentos nao autorizados. Ele analisa logs de VPC Flow, CloudTrail e DNS para detectar ameacas automaticamente.",avoid:"Nunca ignore alertas do GuardDuty. Cada finding representa uma ameaca potencial que deve ser investigada e remediada imediatamente."},en:{tech:"Amazon GuardDuty is a threat detection service that continuously monitors for malicious activity using machine learning, anomaly analysis, and integrated threat intelligence across CloudTrail logs, VPC Flow Logs, and DNS.",simple:"Amazon GuardDuty continuously monitors your AWS account for malicious activity and unauthorized behavior. It analyzes VPC Flow Logs, CloudTrail, and DNS logs to detect threats automatically.",avoid:"Never ignore GuardDuty alerts. Each finding represents a potential threat that must be investigated and remediated immediately."}}},
{en:"Which database service is best for applications requiring joins and complex transactions?",pt:"Qual servico de banco de dados e melhor para aplicacoes que requerem joins e transacoes complexas?",o:{en:["Amazon RDS","AWS Outposts","Amazon DocumentDB","Amazon DynamoDB"],pt:["Amazon RDS","AWS Outposts","Amazon DocumentDB","Amazon DynamoDB"]},a:[0],t:"RDS",exp:{pt:{tech:"Amazon RDS e um servico de banco de dados relacional que suporta SQL, joins, foreign keys e transacoes ACID. DynamoDB e NoSQL (key-value) e DocumentDB e NoSQL (documentos) — ambos nao suportam joins nativamente.",simple:"O Amazon RDS e um servico de banco de dados relacional gerenciado que suporta SQL, joins e transacoes complexas. Ele e ideal para aplicacoes que precisam de integridade referencial e consultas estruturadas.",avoid:"Nunca use bancos NoSQL para cargas que exigem joins complexos e transacoes ACID. Use RDS para workloads relacionais."},en:{tech:"Amazon RDS is a relational database service that supports SQL, joins, foreign keys, and ACID transactions. DynamoDB is NoSQL (key-value) and DocumentDB is NoSQL (document) — both do not natively support joins.",simple:"Amazon RDS is a managed relational database service that supports SQL, joins, and complex transactions. It is ideal for applications that need referential integrity and structured queries.",avoid:"Never use NoSQL databases for workloads requiring complex joins and ACID transactions. Use RDS for relational workloads."}}},
{en:"What makes categorizing AWS resources easier?",pt:"O que facilita a categorizacao de recursos AWS?",o:{en:["Amazon CloudWatch","AWS Service Catalog","AWS Directory Service","AWS Tagging"],pt:["Amazon CloudWatch","AWS Service Catalog","AWS Directory Service","AWS Tagging"]},a:[3],t:"CloudWatch",exp:{pt:{tech:"Tags AWS sao pares chave-valor que voce atribui a recursos para organizacao, controle de custos, seguranca e automacao. Permitem filtrar e agrupar recursos por ambiente, equipe, projeto, etc.",simple:"As AWS Tags sao pares de chave-valor que voce atribui aos recursos para organiza-los e categoriza-los. Elas facilitam o gerenciamento de custos, a aplicacao de politicas e a busca por recursos.",avoid:"Nunca crie recursos AWS sem tags padronizadas. Sem tags, voce perde controle de custos, ownership e automacao."},en:{tech:"AWS Tags are key-value pairs you assign to resources for organization, cost control, security, and automation. They allow filtering and grouping resources by environment, team, project, etc.",simple:"AWS Tags are key-value pairs you assign to resources to organize and categorize them. They make cost management, policy enforcement, and resource searching easier.",avoid:"Never create AWS resources without standardized tags. Without tags, you lose cost control, ownership tracking, and automation."}}},
{en:"What should you consider about Amazon Glacier?",pt:"O que voce deve considerar sobre o Amazon Glacier?",o:{en:["It only accepts compressed format data","It is only for frequently accessed data","It does not provide immediate data retrieval","You can attach it to EC2 to store data"],pt:["So aceita dados em formato compactado","E apenas para dados acessados frequentemente","Nao oferece recuperacao imediata de dados","Voce pode anexa-lo ao EC2 para armazenar dados"]},a:[2],t:"S3 Storage Classes",exp:{pt:{tech:"Amazon S3 Glacier e projetado para arquivamento de longo prazo com custo muito baixo. A recuperacao de dados pode levar de minutos a horas dependendo do tier (Expedited, Standard, Bulk). Nao oferece acesso instantaneo como o S3 Standard.",simple:"O Amazon Glacier (agora S3 Glacier) e um servico de armazenamento de baixo custo para dados acessados raramente. A recuperacao de dados pode levar de minutos a horas dependendo da opcao escolhida.",avoid:"Nunca use Glacier esperando acesso imediato aos dados. Planeje tempo de recuperacao que pode levar horas dependendo da classe."},en:{tech:"Amazon S3 Glacier is designed for long-term archival with very low cost. Data retrieval can take minutes to hours depending on the tier (Expedited, Standard, Bulk). It does not offer instant access like S3 Standard.",simple:"Amazon Glacier (now S3 Glacier) is a low-cost storage service for rarely accessed data. Data retrieval can take from minutes to hours depending on the chosen option.",avoid:"Never use Glacier expecting immediate data access. Plan for retrieval time that can take hours depending on the class."}}},
{en:"Which service is best for running thousands of batch jobs?",pt:"Qual servico e melhor para executar milhares de jobs em lote?",o:{en:["Amazon EC2","AWS Batch","Lambda@Edge","AWS Fargate"],pt:["Amazon EC2","AWS Batch","Lambda@Edge","AWS Fargate"]},a:[1],t:"EC2 General",exp:{pt:{tech:"AWS Batch planeja, agenda e executa workloads de computacao em lote de forma eficiente. Ele provisiona automaticamente a quantidade ideal de recursos computacionais com base no volume e nos requisitos dos jobs.",simple:"O AWS Batch planeja, agenda e executa cargas de trabalho em lote em escala. Ele provisiona automaticamente a quantidade ideal de recursos computacionais com base no volume e nos requisitos dos jobs enviados.",avoid:"Nunca execute jobs batch massivos em EC2 gerenciado manualmente. Use AWS Batch para orquestrar e escalar automaticamente."},en:{tech:"AWS Batch plans, schedules, and runs batch computing workloads efficiently. It automatically provisions the optimal amount of compute resources based on the volume and requirements of the jobs.",simple:"AWS Batch plans, schedules, and runs batch workloads at scale. It automatically provisions the optimal amount of compute resources based on the volume and requirements of submitted jobs.",avoid:"Never run massive batch jobs on manually managed EC2. Use AWS Batch to orchestrate and scale automatically."}}},
{en:"How can you increase fault tolerance in AWS?",pt:"Como voce pode aumentar a tolerancia a falhas na AWS?",o:{en:["Deploy across multiple EC2 instances","Deploy across multiple Availability Zones","Host everything on one powerful instance","Deploy across multiple subnets"],pt:["Implantar em multiplas instancias EC2","Implantar em multiplas Zonas de Disponibilidade","Hospedar tudo em uma instancia poderosa","Implantar em multiplas sub-redes"]},a:[1],t:"EC2 General",exp:{pt:{tech:"Implantar em multiplas AZs garante que se um datacenter inteiro falhar, as AZs restantes continuam operando. Multiplas instancias na mesma AZ ou sub-redes diferentes na mesma AZ nao protegem contra falha de AZ.",simple:"Implantar instancias em multiplas Availability Zones garante que, se uma AZ ficar indisponivel, as instancias nas outras AZs continuem operando. Isso aumenta a tolerancia a falhas da aplicacao.",avoid:"Nunca coloque todos os recursos em uma unica AZ. Distribua em multiplas AZs para garantir disponibilidade durante falhas."},en:{tech:"Deploying across multiple AZs ensures that if an entire datacenter fails, the remaining AZs continue operating. Multiple instances in the same AZ or different subnets in the same AZ do not protect against AZ failure.",simple:"Deploying instances across multiple Availability Zones ensures that if one AZ becomes unavailable, instances in other AZs continue operating. This increases the application fault tolerance.",avoid:"Never place all resources in a single AZ. Distribute across multiple AZs to ensure availability during failures."}}},
{en:"Which AWS support plans offer 24/7 phone access? (Choose TWO)",pt:"Quais planos de suporte AWS oferecem acesso telefonico 24/7? (Escolha DOIS)",o:{en:["Developer","Premium","Enterprise","Standard","Business"],pt:["Developer","Premium","Enterprise","Standard","Business"]},a:[2,4],multi:true,t:"Support Plans",exp:{pt:{tech:"Os planos Business e Enterprise oferecem acesso 24/7 por telefone, chat e email para todas as questoes. O plano Developer oferece apenas email em horario comercial. Basic e Standard nao tem suporte tecnico direto.",simple:"Os planos Enterprise e Business oferecem acesso telefonico ao suporte AWS 24 horas por dia, 7 dias por semana. Os planos Developer e Basic nao incluem suporte por telefone.",avoid:"Nunca fique sem suporte telefonico 24/7 em ambientes de producao criticos. Planos Enterprise e Business oferecem esse acesso."},en:{tech:"Business and Enterprise plans offer 24/7 access via phone, chat, and email for all issues. Developer plan offers email only during business hours. Basic and Standard do not include direct technical support.",simple:"The Enterprise and Business plans offer 24/7 phone access to AWS support. The Developer and Basic plans do not include phone support.",avoid:"Never go without 24/7 phone support for critical production environments. Enterprise and Business plans offer this access."}}},
{en:"What is the benefit of Loose Coupling?",pt:"Qual e o beneficio do Acoplamento Fraco (Loose Coupling)?",o:{en:["Eliminates the need for change management","Allows Cross-Region Replication","Reduces Privileged Access","Individual components can be modified without affecting others"],pt:["Elimina a necessidade de gerenciamento de mudancas","Permite replicacao entre regioes","Reduz acesso privilegiado","Componentes individuais podem ser modificados sem afetar os outros"]},a:[3],t:"Global Infrastructure",exp:{pt:{tech:"Loose Coupling significa que componentes de um sistema sao independentes entre si, comunicando-se por interfaces bem definidas. Mudancas em um componente nao afetam os demais, aumentando resiliencia e facilidade de manutencao.",simple:"Acoplamento fraco permite que componentes individuais sejam modificados, atualizados ou substituidos sem afetar os outros componentes do sistema. Isso torna o sistema mais flexivel e facil de manter.",avoid:"Nunca crie dependencias diretas entre servicos. Use filas ou eventos para desacoplamento, permitindo mudancas independentes."},en:{tech:"Loose Coupling means system components are independent of each other, communicating through well-defined interfaces. Changes to one component do not affect others, increasing resilience and maintainability.",simple:"Loose coupling allows individual components to be modified, updated, or replaced without affecting other components in the system. This makes the system more flexible and easier to maintain.",avoid:"Never create direct dependencies between services. Use queues or events for decoupling, allowing independent changes."}}},
