{en:"What is the best practice for building highly available applications on AWS?",pt:"Qual e a melhor pratica para construir aplicacoes de alta disponibilidade na AWS?",o:{en:["Deploy to at least two Availability Zones","Use Elastic Load Balancing across multiple Regions","Deploy code on two servers in the same Availability Zone","Rewrite the application code to handle all requests"],pt:["Implantar em pelo menos duas Zonas de Disponibilidade","Usar Elastic Load Balancing entre multiplas Regioes","Implantar codigo em dois servidores na mesma Zona de Disponibilidade","Reescrever o codigo da aplicacao para lidar com todas as requisicoes"]},a:[0],t:"Global Infrastructure",exp:{pt:{tech:"Implantar em pelo menos duas AZs garante que a aplicacao continue disponivel mesmo se uma AZ falhar.",simple:"A pratica recomendada e implantar sua aplicacao em pelo menos duas Availability Zones para garantir alta disponibilidade. Se uma AZ ficar indisponivel, a outra continua atendendo os usuarios sem interrupcao.",avoid:"Nunca implante recursos em uma unica AZ para workloads de producao. Sempre distribua em pelo menos duas AZs e teste failover regularmente."},en:{tech:"Deploying to at least two AZs ensures the application remains available even if one AZ fails.",simple:"The best practice is to deploy your application in at least two Availability Zones to ensure high availability. If one AZ becomes unavailable, the other continues serving users without interruption.",avoid:"Never deploy resources in a single AZ for production workloads. Always distribute across at least two AZs and test failover regularly."}}},
{en:"Which factors should be considered in a Total Cost of Ownership (TCO) analysis? (Choose TWO)",pt:"Quais fatores devem ser considerados em uma analise de Custo Total de Propriedade (TCO)? (Escolha DUAS)",o:{en:["Labor costs and IT overhead","Cooling and power consumption","Amazon EBS computing power","Software architecture design","Software compatibility testing"],pt:["Custos de mao de obra e overhead de TI","Custos de refrigeracao e consumo de energia","Poder computacional do Amazon EBS","Design de arquitetura de software","Testes de compatibilidade de software"]},a:[0,1],multi:true,t:"EBS",exp:{pt:{tech:"TCO inclui custos de mao de obra, energia, refrigeracao, espaco fisico e hardware — custos que a nuvem elimina ou reduz.",simple:"Uma analise de TCO deve incluir custos de mao de obra e overhead de TI (equipe, treinamento, gerenciamento) e custos de refrigeracao e consumo de energia dos servidores. Esses custos ocultos muitas vezes sao esquecidos ao comparar nuvem com on-premises.",avoid:"Nunca ignore custos de pessoal, energia e refrigeracao ao comparar cloud com on-premises. Uma analise TCO incompleta leva a decisoes financeiras erradas."},en:{tech:"TCO includes labor, power, cooling, physical space, and hardware costs — costs that the cloud eliminates or reduces.",simple:"A TCO analysis should include labor costs and IT overhead (staff, training, management) and cooling and power consumption costs for servers. These hidden costs are often overlooked when comparing cloud versus on-premises.",avoid:"Never ignore personnel, power, and cooling costs when comparing cloud to on-premises. An incomplete TCO analysis leads to wrong financial decisions."}}},
{en:"Which support plan is required for a response time of less than 15 minutes for critical issues?",pt:"Qual plano de suporte e necessario para um tempo de resposta inferior a 15 minutos em problemas criticos?",o:{en:["AWS Basic Support","AWS Developer Support","AWS Business Support","AWS Enterprise Support"],pt:["AWS Basic Support","AWS Developer Support","AWS Business Support","AWS Enterprise Support"]},a:[3],t:"Support Plans",exp:{pt:{tech:"O plano Enterprise oferece tempo de resposta inferior a 15 minutos para casos criticos de negocio.",simple:"O plano Enterprise Support garante tempo de resposta inferior a 15 minutos para problemas criticos que afetam a producao. E o unico plano que oferece esse nivel de urgencia no atendimento.",avoid:"Nunca opere cargas criticas de producao sem Enterprise Support ativo. Sem ele, tempos de resposta para falhas criticas podem exceder horas."},en:{tech:"The Enterprise plan offers a response time of less than 15 minutes for business-critical cases.",simple:"Enterprise Support guarantees a response time of less than 15 minutes for critical production issues. It is the only plan that offers this level of urgency in support.",avoid:"Never run critical production workloads without active Enterprise Support. Without it, response times for critical failures can exceed hours."}}},
{en:"Which of the following are serverless AWS offerings? (Choose TWO)",pt:"Quais das alternativas a seguir sao ofertas serverless da AWS? (Escolha DUAS)",o:{en:["Amazon EC2","AWS Lambda","Amazon DynamoDB","Amazon EMR","Amazon RDS"],pt:["Amazon EC2","AWS Lambda","Amazon DynamoDB","Amazon EMR","Amazon RDS"]},a:[1,2],multi:true,t:"EC2 General",exp:{pt:{tech:"Lambda e DynamoDB sao serverless — nao exigem gerenciamento de servidores. EC2, EMR e RDS exigem.",simple:"AWS Lambda executa funcoes de codigo sob demanda sem provisionar servidores, e Amazon DynamoDB e um banco de dados NoSQL totalmente gerenciado. Ambos eliminam a necessidade de gerenciar infraestrutura de servidor.",avoid:"Nunca crie funcoes Lambda monoliticas com multiplas responsabilidades. Mantenha funcoes pequenas, com timeout adequado e permissoes minimas."},en:{tech:"Lambda and DynamoDB are serverless — they require no server management. EC2, EMR, and RDS require it.",simple:"AWS Lambda executes code functions on demand without provisioning servers, and Amazon DynamoDB is a fully managed NoSQL database. Both eliminate the need to manage server infrastructure.",avoid:"Never create monolithic Lambda functions with multiple responsibilities. Keep functions small, with appropriate timeout and minimal permissions."}}},
{en:"Which AWS service is used to deploy SSL/TLS certificates?",pt:"Qual servico da AWS e usado para implantar certificados SSL/TLS?",o:{en:["Amazon GuardDuty","AWS Certificate Manager (ACM)","Amazon Detective","AWS WAF"],pt:["Amazon GuardDuty","AWS Certificate Manager (ACM)","Amazon Detective","AWS WAF"]},a:[1],t:"WAF & Shield",exp:{pt:{tech:"O AWS ACM provisiona, gerencia e implanta certificados SSL/TLS publicos e privados gratuitamente para servicos AWS.",simple:"AWS Certificate Manager (ACM) permite provisionar, gerenciar e implantar certificados SSL/TLS de forma gratuita para servicos integrados da AWS. Ele tambem renova automaticamente os certificados antes que expirem.",avoid:"Nunca gerencie certificados SSL/TLS manualmente quando ACM pode renovar automaticamente. Nunca deixe certificados expirarem em producao."},en:{tech:"AWS ACM provisions, manages, and deploys public and private SSL/TLS certificates for free on AWS services.",simple:"AWS Certificate Manager (ACM) lets you provision, manage, and deploy SSL/TLS certificates for free on integrated AWS services. It also automatically renews certificates before they expire.",avoid:"Never manage SSL/TLS certificates manually when ACM can auto-renew. Never let certificates expire in production."}}},
{en:"Which EC2 pricing option is most cost-effective for continuous and predictable compute capacity?",pt:"Qual opcao de precificacao do EC2 e mais economica para capacidade computacional continua e previsivel?",o:{en:["On-demand Instances","Dedicated Hosts","Spot Instances","Reserved Instances"],pt:["Instancias On-Demand","Dedicated Hosts","Instancias Spot","Instancias Reservadas"]},a:[3],t:"EC2 Pricing",exp:{pt:{tech:"Reserved Instances oferecem ate 72% de desconto em troca de compromisso de 1 ou 3 anos, ideal para cargas previsiveis.",simple:"Reserved Instances oferecem descontos significativos (ate 72%) em troca de um compromisso de 1 ou 3 anos de uso continuo. Sao ideais para cargas de trabalho estaveis e previsiveis que rodam 24/7.",avoid:"Nunca compre Reserved Instances para workloads variaveis ou experimentais. Analise pelo menos 3 meses de uso antes de se comprometer com reservas."},en:{tech:"Reserved Instances offer up to 72% discount in exchange for a 1 or 3-year commitment, ideal for predictable workloads.",simple:"Reserved Instances offer significant discounts (up to 72%) in exchange for a 1 or 3-year commitment of continuous use. They are ideal for stable, predictable workloads that run 24/7.",avoid:"Never purchase Reserved Instances for variable or experimental workloads. Analyze at least 3 months of usage before committing to reservations."}}},
{en:"What is the best practice for granting permissions to applications running on EC2?",pt:"Qual e a melhor pratica para conceder permissoes a aplicacoes rodando no EC2?",o:{en:["Generate new key pairs for each delegation","Store AWS credentials directly in application code","Use temporary security credentials through IAM Roles","Applications running on EC2 do not need permissions"],pt:["Gerar novos pares de chaves para cada delegacao","Armazenar credenciais AWS diretamente no codigo da aplicacao","Usar credenciais temporarias atraves de IAM Roles","Aplicacoes no EC2 nao precisam de permissoes"]},a:[2],t:"EC2 General",exp:{pt:{tech:"IAM Roles fornecem credenciais temporarias rotacionadas automaticamente, eliminando a necessidade de chaves fixas no codigo.",simple:"A pratica recomendada e usar IAM Roles para conceder credenciais temporarias a aplicacoes rodando em EC2, em vez de armazenar chaves de acesso no codigo ou no servidor. As credenciais sao rotacionadas automaticamente pela AWS.",avoid:"Nunca use access keys de longo prazo para aplicacoes em EC2. Sempre atribua IAM Roles as instancias para credenciais temporarias automaticas."},en:{tech:"IAM Roles provide temporary credentials that are automatically rotated, eliminating the need for hardcoded keys.",simple:"The best practice is to use IAM Roles to grant temporary credentials to applications running on EC2, instead of storing access keys in the code or on the server. The credentials are automatically rotated by AWS.",avoid:"Never use long-term access keys for applications on EC2. Always assign IAM Roles to instances for automatic temporary credentials."}}},
{en:"Which AWS service is used for decoupling monolithic applications?",pt:"Qual servico da AWS e usado para desacoplar aplicacoes monoliticas?",o:{en:["Amazon SQS","Virtual Private Gateway","AWS Artifact","Amazon CloudFront"],pt:["Amazon SQS","Virtual Private Gateway","AWS Artifact","Amazon CloudFront"]},a:[0],t:"CloudFront",exp:{pt:{tech:"Amazon SQS e um servico de filas que permite desacoplar componentes de aplicacoes, processando mensagens de forma assincrona.",simple:"Amazon SQS (Simple Queue Service) e um servico de filas de mensagens que permite que componentes de uma aplicacao se comuniquem de forma assincrona. Ele desacopla os componentes para que cada um funcione independentemente no seu proprio ritmo.",avoid:"Nunca construa comunicacao sincrona rigida entre microsservicos. Use SQS ou SNS para desacoplar componentes e absorver picos de carga."},en:{tech:"Amazon SQS is a queue service that decouples application components, processing messages asynchronously.",simple:"Amazon SQS (Simple Queue Service) is a message queue service that allows application components to communicate asynchronously. It decouples components so each one operates independently at its own pace.",avoid:"Never build rigid synchronous communication between microservices. Use SQS or SNS to decouple components and absorb load spikes."}}},
{en:"Which AWS service offers an NFS-compatible file system?",pt:"Qual servico da AWS oferece um sistema de arquivos compativel com NFS?",o:{en:["Amazon EFS","Amazon S3","Amazon EBS","AWS Storage Gateway"],pt:["Amazon EFS","Amazon S3","Amazon EBS","AWS Storage Gateway"]},a:[0],t:"S3 General",exp:{pt:{tech:"Amazon EFS (Elastic File System) fornece um sistema de arquivos NFS elastico e escalavel para uso com EC2.",simple:"Amazon EFS (Elastic File System) e um sistema de arquivos compativel com NFS que pode ser montado simultaneamente em varias instancias EC2. O armazenamento cresce e diminui automaticamente conforme voce adiciona ou remove arquivos.",avoid:"Nunca use EFS sem configurar politicas de ciclo de vida para mover arquivos inativos para Infrequent Access. Monitore throughput para evitar custos excessivos."},en:{tech:"Amazon EFS (Elastic File System) provides an elastic, scalable NFS file system for use with EC2 instances.",simple:"Amazon EFS (Elastic File System) is an NFS-compatible file system that can be mounted simultaneously on multiple EC2 instances. Storage grows and shrinks automatically as you add or remove files.",avoid:"Never use EFS without configuring lifecycle policies to move inactive files to Infrequent Access. Monitor throughput to avoid excessive costs."}}},
{en:"What is the benefit of low-latency connections between Availability Zones?",pt:"Qual e o beneficio de conexoes de baixa latencia entre Zonas de Disponibilidade?",o:{en:["Create a private connection to a data center","Achieve high availability globally","Automate the provisioning of new resources","Enable synchronous data replication across AZs"],pt:["Criar uma conexao privada com um data center","Obter alta disponibilidade global","Automatizar o provisionamento de novos recursos","Permitir replicacao sincrona de dados entre AZs"]},a:[3],t:"Global Infrastructure",exp:{pt:{tech:"Conexoes de baixa latencia entre AZs permitem replicacao sincrona, garantindo consistencia de dados em tempo real.",simple:"Conexoes de baixa latencia entre Availability Zones permitem que os dados sejam replicados de forma sincrona entre AZs, mantendo copias identicas e atualizadas em tempo real. Isso garante que, se uma AZ falhar, a outra ja tem todos os dados.",avoid:"Nunca dependa de replicacao assincrona para dados que exigem consistencia imediata. Use a baixa latencia entre AZs para replicacao sincrona quando necessario."},en:{tech:"Low-latency connections between AZs enable synchronous replication, ensuring real-time data consistency.",simple:"Low-latency connections between Availability Zones enable synchronous data replication across AZs, keeping identical and up-to-date copies in real time. This ensures that if one AZ fails, the other already has all the data.",avoid:"Never rely on asynchronous replication for data requiring immediate consistency. Use low latency between AZs for synchronous replication when needed."}}},
{en:"Which tool should you use to estimate the costs of Amazon S3 and CloudFront?",pt:"Qual ferramenta voce deve usar para estimar os custos do Amazon S3 e CloudFront?",o:{en:["AWS Cost Explorer","AWS Pricing Calculator","AWS Budgets","AWS Cost and Usage Report"],pt:["AWS Cost Explorer","AWS Pricing Calculator","AWS Budgets","AWS Cost and Usage Report"]},a:[1],t:"S3 General",exp:{pt:{tech:"O AWS Pricing Calculator permite estimar custos antes de usar os servicos, com base em configuracoes e uso previsto.",simple:"AWS Pricing Calculator e uma ferramenta gratuita que permite estimar o custo mensal de servicos AWS como S3 e CloudFront antes de comecar a usa-los. Voce configura os parametros de uso e recebe uma estimativa detalhada.",avoid:"Nunca lance recursos sem estimar custos previamente. Use o AWS Pricing Calculator antes de provisionar para evitar surpresas na fatura."},en:{tech:"AWS Pricing Calculator lets you estimate costs before using services, based on configurations and expected usage.",simple:"AWS Pricing Calculator is a free tool that lets you estimate the monthly cost of AWS services like S3 and CloudFront before you start using them. You configure usage parameters and receive a detailed estimate.",avoid:"Never launch resources without estimating costs beforehand. Use AWS Pricing Calculator before provisioning to avoid billing surprises."}}},
{en:"What is the practice of minimizing dependencies between application components called?",pt:"Qual e a pratica de minimizar dependencias entre componentes de uma aplicacao?",o:{en:["Elastic coupling","Loosely coupling","Scalable coupling","Tightly coupling"],pt:["Acoplamento elastico","Acoplamento fraco","Acoplamento escalavel","Acoplamento forte"]},a:[1],t:"General",exp:{pt:{tech:"Loosely coupling reduz dependencias entre componentes, permitindo que cada um funcione, escale e falhe independentemente.",simple:"Acoplamento fraco (loosely coupling) e a pratica de minimizar as dependencias entre componentes de uma aplicacao, para que cada parte funcione e possa ser atualizada independentemente. Isso torna o sistema mais resiliente e facil de manter.",avoid:"Nunca crie dependencias rigidas entre componentes de aplicacao. Use filas, eventos e APIs bem definidas para manter o acoplamento fraco."},en:{tech:"Loose coupling reduces dependencies between components, allowing each to function, scale, and fail independently.",simple:"Loosely coupling is the practice of minimizing dependencies between application components so that each part operates and can be updated independently. This makes the system more resilient and easier to maintain.",avoid:"Never create tight dependencies between application components. Use queues, events, and well-defined APIs to maintain loose coupling."}}},
{en:"Which statement is true about Availability Zones and Edge Locations?",pt:"Qual afirmacao e verdadeira sobre Zonas de Disponibilidade e Edge Locations?",o:{en:["Edge locations are located in separate Availability Zones worldwide","An Availability Zone exists within an edge location","An Availability Zone is a geographic location with multiple edge locations","An AZ is an isolated location within a Region and edge locations deliver content in multiple cities worldwide"],pt:["Edge locations ficam em Zonas de Disponibilidade separadas pelo mundo","Uma Zona de Disponibilidade existe dentro de uma edge location","Uma Zona de Disponibilidade e uma localizacao geografica com multiplas edge locations","Uma AZ e um local isolado dentro de uma Regiao e edge locations entregam conteudo em multiplas cidades no mundo"]},a:[3],t:"CloudFront",exp:{pt:{tech:"AZs sao data centers isolados dentro de Regioes. Edge Locations sao pontos de presenca do CloudFront espalhados globalmente.",simple:"Availability Zones sao locais fisicos isolados dentro de uma Regiao AWS, cada um com energia e rede independentes. Edge Locations sao pontos de presenca espalhados por cidades ao redor do mundo que entregam conteudo com baixa latencia via CloudFront.",avoid:"Nunca confunda AZs com Edge Locations. AZs sao para computacao e armazenamento resilientes; Edge Locations sao para cache de conteudo proximo ao usuario."},en:{tech:"AZs are isolated data centers within Regions. Edge Locations are CloudFront points of presence spread globally.",simple:"Availability Zones are isolated physical locations within an AWS Region, each with independent power and networking. Edge Locations are points of presence spread across cities worldwide that deliver content with low latency via CloudFront.",avoid:"Never confuse AZs with Edge Locations. AZs are for resilient compute and storage; Edge Locations are for caching content close to the user."}}},
{en:"Which features are included in the AWS Business Support Plan? (Choose TWO)",pt:"Quais recursos estao incluidos no plano AWS Business Support? (Escolha DUAS)",o:{en:["24x7 access to customer service","Access to Cloud Support Engineers via email only during business hours","Infrastructure Event Management for an additional fee","24x7 access to a Technical Account Manager","Only partial Trusted Advisor checks"],pt:["Acesso 24x7 ao servico ao cliente","Acesso a engenheiros de suporte por e-mail apenas em horario comercial","Infrastructure Event Management por uma taxa adicional","Acesso 24x7 a um Technical Account Manager","Apenas verificacoes parciais do Trusted Advisor"]},a:[0,2],multi:true,t:"Trusted Advisor",exp:{pt:{tech:"O plano Business inclui suporte 24x7 e Infrastructure Event Management (por taxa extra). TAM e exclusivo do Enterprise.",simple:"O plano Business Support inclui acesso ao suporte ao cliente 24 horas por dia, 7 dias por semana, e oferece Infrastructure Event Management por uma taxa adicional para eventos importantes. E um nivel intermediario entre Developer e Enterprise.",avoid:"Nunca assuma que o Business Support inclui tudo do Enterprise. Verifique limites do plano antes de depender de recursos como TAM ou resposta em 15 minutos."},en:{tech:"The Business plan includes 24x7 support and Infrastructure Event Management (for an extra fee). TAM is Enterprise-only.",simple:"The Business Support plan includes 24x7 access to customer service and offers Infrastructure Event Management for an additional fee for major events. It is an intermediate tier between Developer and Enterprise.",avoid:"Never assume Business Support includes everything from Enterprise. Check plan limits before relying on features like TAM or 15-minute response."}}},
{en:"Which AWS service authenticates users using Amazon, Apple, Facebook, or Google identities?",pt:"Qual servico da AWS autentica usuarios usando identidades da Amazon, Apple, Facebook ou Google?",o:{en:["Amazon GuardDuty","Amazon Personalize","Amazon Cognito","AWS IAM"],pt:["Amazon GuardDuty","Amazon Personalize","Amazon Cognito","AWS IAM"]},a:[2],t:"IAM",exp:{pt:{tech:"Amazon Cognito fornece autenticacao, autorizacao e gerenciamento de usuarios com suporte a login social (federation).",simple:"Amazon Cognito permite que usuarios facam login na sua aplicacao usando identidades de provedores externos como Google, Facebook, Apple ou Amazon. Ele gerencia autenticacao, autorizacao e sincronizacao de dados de usuario.",avoid:"Nunca armazene credenciais de provedores de identidade no codigo da aplicacao. Use Cognito para federacao e configure MFA para camadas adicionais de seguranca."},en:{tech:"Amazon Cognito provides authentication, authorization, and user management with social login support (federation).",simple:"Amazon Cognito allows users to sign in to your application using identities from external providers like Google, Facebook, Apple, or Amazon. It manages authentication, authorization, and user data synchronization.",avoid:"Never store identity provider credentials in application code. Use Cognito for federation and configure MFA for additional security layers."}}},
{en:"What are the advantages of AWS cloud computing? (Choose TWO)",pt:"Quais sao as vantagens da computacao em nuvem da AWS? (Escolha DUAS)",o:{en:["Eliminates the need to monitor applications","AWS manages all compliance requirements","Provides custom hardware for specific applications","Eliminates the need to guess infrastructure capacity","Trade capital expenses for variable operational expenses"],pt:["Elimina a necessidade de monitorar aplicacoes","A AWS gerencia todos os requisitos de conformidade","Fornece hardware personalizado para aplicacoes especificas","Elimina a necessidade de adivinhar a capacidade da infraestrutura","Trocar despesas de capital por despesas operacionais variaveis"]},a:[3,4],multi:true,t:"Compliance",exp:{pt:{tech:"A nuvem elimina adivinhacao de capacidade e permite trocar CAPEX por OPEX, pagando conforme o uso.",simple:"A computacao em nuvem elimina a necessidade de adivinhar a capacidade de infraestrutura, permitindo escalar para cima ou para baixo conforme a demanda. Tambem substitui grandes investimentos de capital iniciais por pagamentos variaveis baseados no uso.",avoid:"Nunca dimensione infraestrutura para picos permanentes. Aproveite a elasticidade da nuvem com auto scaling e pague apenas pelo que usar."},en:{tech:"The cloud eliminates capacity guessing and lets you trade CAPEX for OPEX, paying as you go.",simple:"Cloud computing eliminates the need to guess infrastructure capacity, allowing you to scale up or down based on demand. It also replaces large upfront capital investments with variable payments based on usage.",avoid:"Never size infrastructure for permanent peaks. Leverage cloud elasticity with auto scaling and pay only for what you use."}}},
{en:"Which AWS service performs health checks on Amazon EC2 instances?",pt:"Qual servico da AWS realiza verificacoes de integridade em instancias Amazon EC2?",o:{en:["AWS CloudFormation","Amazon Route 53","Amazon Chime","Amazon Aurora"],pt:["AWS CloudFormation","Amazon Route 53","Amazon Chime","Amazon Aurora"]},a:[1],t:"EC2 General",exp:{pt:{tech:"Amazon Route 53 realiza health checks em endpoints e roteia trafego apenas para recursos saudaveis.",simple:"Amazon Route 53 pode realizar verificacoes de saude (health checks) em instancias EC2 e outros endpoints, monitorando se estao respondendo corretamente. Se um endpoint falhar, o Route 53 redireciona o trafego DNS para recursos saudaveis.",avoid:"Nunca configure health checks com intervalos muito longos ou thresholds muito altos. Health checks lentos atrasam a deteccao de falhas e afetam a disponibilidade."},en:{tech:"Amazon Route 53 performs health checks on endpoints and routes traffic only to healthy resources.",simple:"Amazon Route 53 can perform health checks on EC2 instances and other endpoints, monitoring whether they are responding correctly. If an endpoint fails, Route 53 redirects DNS traffic to healthy resources.",avoid:"Never configure health checks with overly long intervals or high thresholds. Slow health checks delay failure detection and affect availability."}}},
{en:"Which AWS service provides facial recognition capabilities to automate photo tagging?",pt:"Qual servico da AWS oferece reconhecimento facial para automatizar a marcacao de fotos?",o:{en:["Amazon Comprehend","AWS IAM","Amazon Polly","Amazon Rekognition"],pt:["Amazon Comprehend","AWS IAM","Amazon Polly","Amazon Rekognition"]},a:[3],t:"IAM",exp:{pt:{tech:"Amazon Rekognition usa deep learning para analise de imagens e videos, incluindo deteccao e reconhecimento facial.",simple:"Amazon Rekognition e um servico de inteligencia artificial que analisa imagens e videos para identificar rostos, objetos, textos e cenas. Ele pode ser usado para automatizar a marcacao de fotos com reconhecimento facial.",avoid:"Nunca processe dados biometricos sem considerar regulamentacoes de privacidade como LGPD e GDPR. Armazene resultados de reconhecimento com criptografia e controle de acesso restrito."},en:{tech:"Amazon Rekognition uses deep learning for image and video analysis, including facial detection and recognition.",simple:"Amazon Rekognition is an artificial intelligence service that analyzes images and videos to identify faces, objects, text, and scenes. It can be used to automate photo tagging with facial recognition.",avoid:"Never process biometric data without considering privacy regulations like LGPD and GDPR. Store recognition results with encryption and restricted access control."}}},
{en:"Which of the following are examples of AWS-managed databases? (Choose TWO)",pt:"Quais das alternativas a seguir sao exemplos de bancos de dados gerenciados pela AWS? (Escolha DUAS)",o:{en:["Amazon Neptune","Amazon CloudSearch","Microsoft SQL Server on Amazon EC2","MySQL on Amazon EC2","Amazon RDS for MySQL"],pt:["Amazon Neptune","Amazon CloudSearch","Microsoft SQL Server no Amazon EC2","MySQL no Amazon EC2","Amazon RDS para MySQL"]},a:[0,4],multi:true,t:"EC2 General",exp:{pt:{tech:"Neptune e RDS for MySQL sao gerenciados pela AWS. Bancos instalados manualmente no EC2 sao responsabilidade do cliente.",simple:"Amazon Neptune e um banco de dados de grafos gerenciado, e Amazon RDS for MySQL e um banco de dados relacional gerenciado. Ambos sao exemplos de bancos de dados onde a AWS cuida de patches, backups e manutencao automaticamente.",avoid:"Nunca use bancos gerenciados sem habilitar backups automaticos e criptografia. Configure Multi-AZ para producao e restrinja acesso via security groups dedicados."},en:{tech:"Neptune and RDS for MySQL are AWS-managed. Databases manually installed on EC2 are the customer responsibility.",simple:"Amazon Neptune is a managed graph database, and Amazon RDS for MySQL is a managed relational database. Both are examples of databases where AWS handles patches, backups, and maintenance automatically.",avoid:"Never use managed databases without enabling automatic backups and encryption. Configure Multi-AZ for production and restrict access via dedicated security groups."}}},
{en:"Which EC2 option is best for periodic large-scale image and video processing at minimal cost?",pt:"Qual opcao do EC2 e melhor para processamento periodico de imagens e videos em larga escala com custo minimo?",o:{en:["EC2 On-Demand Instances","EC2 Reserved Instances with No Upfront payment","EC2 Spot Instances","EC2 Reserved Instances with All Upfront payment"],pt:["Instancias EC2 On-Demand","Instancias EC2 Reservadas sem pagamento antecipado","Instancias EC2 Spot","Instancias EC2 Reservadas com pagamento total antecipado"]},a:[2],t:"EC2 Pricing",exp:{pt:{tech:"Spot Instances oferecem ate 90% de desconto e sao ideais para cargas tolerantes a interrupcao, como processamento em lote.",simple:"EC2 Spot Instances permitem usar capacidade de computacao nao utilizada da AWS com descontos de ate 90%. Sao ideais para processamento de imagens e videos em larga escala que pode ser interrompido e retomado, pois a AWS pode recuperar a instancia a qualquer momento.",avoid:"Nunca execute workloads criticos com prazo rigido em Spot Instances. Use Spot apenas para cargas tolerantes a interrupcao e implemente tratamento de interrupcao gracioso."},en:{tech:"Spot Instances offer up to 90% discount and are ideal for fault-tolerant workloads like batch processing.",simple:"EC2 Spot Instances let you use unused AWS compute capacity at discounts of up to 90%. They are ideal for large-scale image and video processing that can be interrupted and resumed, as AWS can reclaim the instance at any time.",avoid:"Never run critical workloads with strict deadlines on Spot Instances. Use Spot only for interruption-tolerant loads and implement graceful interruption handling."}}},
{en:"Who has the authority to grant full administrative access to all AWS resources in an account?",pt:"Quem tem autoridade para conceder acesso administrativo total a todos os recursos AWS em uma conta?",o:{en:["The AWS account owner (root user)","The AWS Technical Account Manager","The AWS security team","AWS cloud support engineers"],pt:["O proprietario da conta AWS (usuario root)","O Technical Account Manager da AWS","A equipe de seguranca da AWS","Os engenheiros de suporte em nuvem da AWS"]},a:[0],t:"Support Plans",exp:{pt:{tech:"O usuario root tem acesso irrestrito a todos os recursos e configuracoes da conta AWS.",simple:"O usuario root (dono da conta AWS) e a unica entidade com autoridade total para conceder acesso administrativo completo a todos os recursos da conta. Ele tem permissoes que nao podem ser restringidas por politicas IAM.",avoid:"Nunca use a conta root para tarefas do dia a dia. Crie usuarios IAM com permissoes especificas, ative MFA na root e guarde as credenciais em local seguro."},en:{tech:"The root user has unrestricted access to all resources and settings in the AWS account.",simple:"The root user (AWS account owner) is the only entity with full authority to grant complete administrative access to all resources in the account. It has permissions that cannot be restricted by IAM policies.",avoid:"Never use the root account for daily tasks. Create IAM users with specific permissions, enable MFA on root, and store credentials in a secure location."}}},
{en:"Which AWS service is used to migrate on-premises workloads to AWS?",pt:"Qual servico da AWS e usado para migrar cargas de trabalho on-premises para a AWS?",o:{en:["AWS File Transfer Acceleration","AWS Server Migration Service","AWS Database Migration Service","AWS Application Discovery Service"],pt:["AWS File Transfer Acceleration","AWS Server Migration Service","AWS Database Migration Service","AWS Application Discovery Service"]},a:[1],t:"Migration",exp:{pt:{tech:"AWS SMS automatiza a migracao de servidores on-premises para a AWS, criando AMIs replicadas incrementalmente.",simple:"AWS Server Migration Service (SMS) facilita a migracao de servidores on-premises para a AWS, automatizando a replicacao de volumes de servidores para a nuvem. Ele permite migrar cargas de trabalho com minimo tempo de inatividade.",avoid:"Nunca migre workloads sem um plano de rollback testado. Valide a migracao em ambiente de staging antes de mover cargas de producao."},en:{tech:"AWS SMS automates the migration of on-premises servers to AWS, creating incrementally replicated AMIs.",simple:"AWS Server Migration Service (SMS) facilitates the migration of on-premises servers to AWS by automating the replication of server volumes to the cloud. It allows migrating workloads with minimal downtime.",avoid:"Never migrate workloads without a tested rollback plan. Validate the migration in a staging environment before moving production loads."}}},
{en:"What does AWS Cost Explorer provide?",pt:"O que o AWS Cost Explorer fornece?",o:{en:["Cost comparisons between on-premises and cloud","Cost estimates based on expected usage","Consolidated billing across multiple accounts","Cost forecasts for up to 12 months"],pt:["Comparacoes de custo entre on-premises e nuvem","Estimativas de custo baseadas no uso esperado","Faturamento consolidado entre multiplas contas","Previsoes de custo para ate 12 meses"]},a:[3],t:"Cost Management",exp:{pt:{tech:"O Cost Explorer fornece visualizacoes de custos e uso, alem de previsoes de gastos para ate 12 meses.",simple:"AWS Cost Explorer fornece previsoes de custo para ate 12 meses com base no seu historico de uso. Ele permite visualizar e analisar seus gastos ao longo do tempo e identificar tendencias para planejar o orcamento.",avoid:"Nunca ignore os relatorios do Cost Explorer. Configure alertas de budget e revise custos semanalmente para identificar anomalias antes que se tornem problemas."},en:{tech:"Cost Explorer provides cost and usage visualizations, plus spending forecasts for up to 12 months.",simple:"AWS Cost Explorer provides cost forecasts for up to 12 months based on your usage history. It lets you visualize and analyze your spending over time and identify trends for budget planning.",avoid:"Never ignore Cost Explorer reports. Configure budget alerts and review costs weekly to identify anomalies before they become problems."}}},
{en:"Which Amazon RDS feature provides automatic failover for database availability?",pt:"Qual recurso do Amazon RDS oferece failover automatico para disponibilidade do banco de dados?",o:{en:["RDS Single-AZ deployment","RDS Write Replica","RDS Snapshots","RDS Multi-AZ deployment"],pt:["Implantacao RDS Single-AZ","RDS Write Replica","RDS Snapshots","Implantacao RDS Multi-AZ"]},a:[3],t:"RDS",exp:{pt:{tech:"RDS Multi-AZ mantem uma replica sincrona em outra AZ e faz failover automatico em caso de falha.",simple:"O Multi-AZ deployment do Amazon RDS cria automaticamente uma replica do banco de dados em outra Availability Zone. Se o banco principal falhar, o failover para a replica acontece automaticamente sem intervencao manual.",avoid:"Nunca use RDS Single-AZ para bancos de producao. Sempre habilite Multi-AZ para failover automatico e teste o failover periodicamente."},en:{tech:"RDS Multi-AZ maintains a synchronous replica in another AZ and performs automatic failover in case of failure.",simple:"Amazon RDS Multi-AZ deployment automatically creates a database replica in another Availability Zone. If the primary database fails, failover to the replica happens automatically without manual intervention.",avoid:"Never use RDS Single-AZ for production databases. Always enable Multi-AZ for automatic failover and test failover periodically."}}},
{en:"What is the best way to reduce charges for EC2 On-Demand instances that are not currently in use?",pt:"Qual e a melhor maneira de reduzir cobrancas de instancias EC2 On-Demand que nao estao em uso?",o:{en:["Delete all associated EBS volumes","You cannot minimize On-Demand charges","Terminate the instances completely","Stop the instances and restart when needed"],pt:["Deletar todos os volumes EBS associados","Nao e possivel minimizar cobrancas On-Demand","Encerrar as instancias completamente","Parar as instancias e reiniciar quando necessario"]},a:[3],t:"EBS",exp:{pt:{tech:"Instancias EC2 paradas nao geram cobranca de computacao (apenas EBS). Terminar exclui a instancia permanentemente.",simple:"A melhor forma de reduzir custos de instancias EC2 On-Demand que nao estao em uso e para-las (stop) e reinicia-las quando necessario. Instancias paradas nao cobram por computacao, apenas pelo armazenamento EBS associado.",avoid:"Nunca pague por instancias que nao estao em uso. Pare instancias fora do horario de trabalho e use automacao com Lambda ou Instance Scheduler para controlar o ciclo de vida."},en:{tech:"Stopped EC2 instances do not incur compute charges (only EBS storage). Terminating permanently deletes the instance.",simple:"The best way to reduce charges for unused EC2 On-Demand instances is to stop them and restart when needed. Stopped instances do not charge for compute, only for the associated EBS storage.",avoid:"Never pay for instances that are not in use. Stop instances outside business hours and use automation with Lambda or Instance Scheduler to control the lifecycle."}}},
{en:"Which strategy best protects the AWS root account?",pt:"Qual estrategia melhor protege a conta root da AWS?",o:{en:["Delete root user access keys if they are not needed","Apply MFA to the root account and use it for all daily tasks","Access the root account only from a mobile phone","Share the root password only with trusted persons"],pt:["Deletar as chaves de acesso do usuario root se nao forem necessarias","Aplicar MFA na conta root e usa-la para todas as tarefas diarias","Acessar a conta root apenas pelo celular","Compartilhar a senha root apenas com pessoas confiaveis"]},a:[0],t:"IAM",exp:{pt:{tech:"A AWS recomenda deletar chaves de acesso do root e usar IAM users para tarefas diarias, minimizando riscos.",simple:"A melhor pratica para proteger a conta root e deletar as chaves de acesso do root se elas nao sao necessarias, eliminando a possibilidade de acesso programatico com privilegios totais. Isso reduz drasticamente o risco de comprometimento da conta.",avoid:"Nunca mantenha access keys ativas na conta root. Delete as chaves root imediatamente e habilite MFA com dispositivo fisico dedicado."},en:{tech:"AWS recommends deleting root access keys and using IAM users for daily tasks, minimizing security risks.",simple:"The best practice for protecting the root account is to delete root access keys if they are not needed, eliminating the possibility of programmatic access with full privileges. This drastically reduces the risk of account compromise.",avoid:"Never keep access keys active on the root account. Delete root keys immediately and enable MFA with a dedicated physical device."}}},
{en:"Which AWS service provides a cloud-based contact center?",pt:"Qual servico da AWS fornece um contact center baseado na nuvem?",o:{en:["Amazon Lightsail","Amazon Connect","AWS Direct Connect","AWS Elastic Beanstalk"],pt:["Amazon Lightsail","Amazon Connect","AWS Direct Connect","AWS Elastic Beanstalk"]},a:[1],t:"Lightsail",exp:{pt:{tech:"Amazon Connect e um servico de contact center em nuvem que permite configurar atendimento ao cliente de forma facil e escalavel.",simple:"Amazon Connect e um servico de central de atendimento (contact center) baseado na nuvem que permite criar e gerenciar operacoes de suporte ao cliente sem hardware fisico. Ele suporta voz e chat e pode ser configurado rapidamente.",avoid:"Nunca exponha dados de clientes em ambientes de contact center sem criptografia. Use Amazon Connect com integracao KMS e restrinja acesso aos registros de chamadas."},en:{tech:"Amazon Connect is a cloud contact center service that lets you set up customer service easily and at scale.",simple:"Amazon Connect is a cloud-based contact center service that lets you create and manage customer support operations without physical hardware. It supports voice and chat and can be set up quickly.",avoid:"Never expose customer data in contact center environments without encryption. Use Amazon Connect with KMS integration and restrict access to call records."}}},
{en:"What does Economies of Scale mean in the context of AWS?",pt:"O que significa Economia de Escala no contexto da AWS?",o:{en:["You save more money when you consume more resources","As more time passes you pay more for resources","AWS will continuously lower costs as it grows and gains efficiencies","The ability to pay as you go for resources"],pt:["Voce economiza mais dinheiro quando consome mais recursos","Conforme mais tempo passa voce paga mais pelos recursos","A AWS reduzira continuamente os custos conforme cresce e ganha eficiencia","A capacidade de pagar conforme o uso pelos recursos"]},a:[2],t:"Pricing Models",exp:{pt:{tech:"Economia de escala permite que a AWS reduza precos continuamente conforme sua infraestrutura cresce e se torna mais eficiente.",simple:"Economia de escala significa que a AWS, por operar em escala massiva, consegue custos menores e repassa essas reducoes continuamente para os clientes. Conforme a AWS cresce, os precos dos servicos tendem a diminuir.",avoid:"Nunca assuma que precos da AWS sao fixos. Acompanhe reducoes de preco e novas opcoes de instancia que podem reduzir seus custos sem alteracao de arquitetura."},en:{tech:"Economies of scale allow AWS to continuously reduce prices as its infrastructure grows and becomes more efficient.",simple:"Economies of scale means that AWS, by operating at massive scale, achieves lower costs and continuously passes those savings on to customers. As AWS grows, service prices tend to decrease.",avoid:"Never assume AWS prices are fixed. Track price reductions and new instance options that can reduce your costs without architecture changes."}}},
{en:"What does the AWS Pay-As-You-Go pricing model do?",pt:"O que o modelo de precificacao Pay-As-You-Go da AWS faz?",o:{en:["Replace low upfront expenses with large variable payments","Replace low upfront expenses with large fixed payments","Replace large upfront expenses with low fixed payments","Replace large capital expenses with low variable payments"],pt:["Substituir despesas iniciais baixas por grandes pagamentos variaveis","Substituir despesas iniciais baixas por grandes pagamentos fixos","Substituir grandes despesas iniciais por baixos pagamentos fixos","Substituir grandes despesas de capital por baixos pagamentos variaveis"]},a:[3],t:"Pricing Models",exp:{pt:{tech:"O modelo Pay-As-You-Go converte CAPEX (investimento inicial alto) em OPEX (pagamentos variaveis conforme o uso).",simple:"O modelo Pay-As-You-Go permite que voce substitua grandes investimentos iniciais em infraestrutura por pagamentos variaveis e menores baseados no uso real. Voce paga apenas pelos recursos que consome, sem compromisso de longo prazo.",avoid:"Nunca provisione capacidade fixa em excesso para cobrir picos eventuais. Use auto scaling e modelo pay-as-you-go para alinhar custos com demanda real."},en:{tech:"The Pay-As-You-Go model converts CAPEX (high upfront investment) into OPEX (variable payments based on usage).",simple:"The Pay-As-You-Go model lets you replace large upfront infrastructure investments with smaller, variable payments based on actual usage. You pay only for the resources you consume, with no long-term commitment.",avoid:"Never provision excess fixed capacity to cover occasional peaks. Use auto scaling and pay-as-you-go model to align costs with actual demand."}}},
{en:"Which S3 storage class is best for popular e-commerce static assets with stable access patterns?",pt:"Qual classe de armazenamento do S3 e melhor para ativos estaticos populares de e-commerce com padrao de acesso estavel?",o:{en:["S3 Standard-Infrequent Access","S3 Intelligent-Tiering","S3 Glacier Deep Archive","S3 Standard"],pt:["S3 Standard-Infrequent Access","S3 Intelligent-Tiering","S3 Glacier Deep Archive","S3 Standard"]},a:[3],t:"S3 Storage Classes",exp:{pt:{tech:"S3 Standard oferece alta durabilidade, disponibilidade e baixa latencia para dados acessados com frequencia.",simple:"S3 Standard e a classe de armazenamento padrao projetada para dados acessados com frequencia e que precisam de alta disponibilidade e baixa latencia. E ideal para ativos estaticos de e-commerce que sao acessados constantemente pelos usuarios.",avoid:"Nunca use S3 Glacier ou Infrequent Access para conteudo acessado frequentemente. O custo de recuperacao pode superar a economia no armazenamento."},en:{tech:"S3 Standard offers high durability, availability, and low latency for frequently accessed data.",simple:"S3 Standard is the default storage class designed for frequently accessed data that needs high availability and low latency. It is ideal for e-commerce static assets that are constantly accessed by users.",avoid:"Never use S3 Glacier or Infrequent Access for frequently accessed content. Retrieval costs can exceed storage savings."}}},
{en:"Where should you create a backup for geographical disaster protection?",pt:"Onde voce deve criar um backup para protecao contra desastres geograficos?",o:{en:["In another Edge Location","In another Region","In another VPC","In another Availability Zone"],pt:["Em outra Edge Location","Em outra Regiao","Em outra VPC","Em outra Zona de Disponibilidade"]},a:[1],t:"CloudFront",exp:{pt:{tech:"Backups em outra Regiao protegem contra desastres que afetem uma regiao inteira, como terremotos ou furacoes.",simple:"Para protecao contra desastres geograficos, o backup deve ser criado em outra Regiao AWS, que e uma area geografica fisicamente separada. Isso garante que, mesmo se uma regiao inteira ficar indisponivel, seus dados estejam seguros em outro local.",avoid:"Nunca mantenha backups apenas na mesma regiao dos recursos originais. Replique backups criticos para outra regiao para protecao contra desastres regionais."},en:{tech:"Backups in another Region protect against disasters that affect an entire region, like earthquakes or hurricanes.",simple:"For geographical disaster protection, backups should be created in another AWS Region, which is a physically separate geographic area. This ensures that even if an entire region becomes unavailable, your data is safe in another location.",avoid:"Never keep backups only in the same region as the original resources. Replicate critical backups to another region for regional disaster protection."}}},
{en:"What are the key benefits of AWS CloudFormation? (Choose TWO)",pt:"Quais sao os principais beneficios do AWS CloudFormation? (Escolha DUAS)",o:{en:["Deploy applications without worrying about infrastructure","Automatically applies advanced IAM features","Automates infrastructure provisioning and updating in a safe manner","Model your entire infrastructure in a text file","Compiles and builds application code"],pt:["Implantar aplicacoes sem se preocupar com infraestrutura","Aplicar automaticamente recursos avancados do IAM","Automatizar o provisionamento e atualizacao de infraestrutura de forma segura","Modelar toda a infraestrutura em um arquivo de texto","Compilar e construir codigo de aplicacao"]},a:[2,3],multi:true,t:"IAM",exp:{pt:{tech:"CloudFormation permite modelar infraestrutura como codigo (IaC) em templates e automatizar provisionamento com rollback seguro.",simple:"AWS CloudFormation permite automatizar a criacao e atualizacao de infraestrutura de forma segura e repetivel, e permite modelar toda a infraestrutura em um arquivo de texto (template). Isso garante que ambientes sejam identicos toda vez que sao criados.",avoid:"Nunca crie infraestrutura manualmente pelo console em producao. Use CloudFormation ou Terraform para garantir infraestrutura reproduzivel e versionada."},en:{tech:"CloudFormation lets you model infrastructure as code (IaC) in templates and automate provisioning with safe rollback.",simple:"AWS CloudFormation lets you automate infrastructure provisioning and updating in a safe, repeatable way, and allows you to model your entire infrastructure in a text file (template). This ensures environments are identical every time they are created.",avoid:"Never create infrastructure manually through the console in production. Use CloudFormation or Terraform to ensure reproducible and versioned infrastructure."}}},
{en:"Which deployment model connects cloud and non-cloud (on-premises) resources?",pt:"Qual modelo de implantacao conecta recursos na nuvem e fora da nuvem (on-premises)?",o:{en:["On-premises deployment","Mixed deployment","Hybrid deployment","Cloud deployment"],pt:["Implantacao on-premises","Implantacao mista","Implantacao hibrida","Implantacao na nuvem"]},a:[2],t:"General",exp:{pt:{tech:"O modelo hibrido combina infraestrutura on-premises com recursos na nuvem, conectados por VPN ou Direct Connect.",simple:"O modelo de implantacao hibrido conecta recursos na nuvem AWS com recursos on-premises (fora da nuvem), permitindo que ambos trabalhem juntos como uma unica infraestrutura. E util para empresas que nao podem ou nao querem migrar tudo de uma vez.",avoid:"Nunca deixe a conexao entre on-premises e cloud sem criptografia e redundancia. Use VPN ou Direct Connect com failover configurado para ambientes hibridos."},en:{tech:"The hybrid model combines on-premises infrastructure with cloud resources, connected via VPN or Direct Connect.",simple:"The hybrid deployment model connects AWS cloud resources with on-premises (non-cloud) resources, allowing both to work together as a single infrastructure. It is useful for companies that cannot or do not want to migrate everything at once.",avoid:"Never leave the connection between on-premises and cloud without encryption and redundancy. Use VPN or Direct Connect with configured failover for hybrid environments."}}},
{en:"What are the benefits of a tagging strategy in AWS? (Choose TWO)",pt:"Quais sao os beneficios de uma estrategia de tagging na AWS? (Escolha DUAS)",o:{en:["Identify resources created by specific projects","Identify software solutions on resources","Track API calls in the account","Identify and recover deleted resources","Track and manage spending across tagged resources"],pt:["Identificar recursos criados por projetos especificos","Identificar solucoes de software nos recursos","Rastrear chamadas de API na conta","Identificar e recuperar recursos deletados","Rastrear e gerenciar gastos entre recursos com tags"]},a:[0,4],multi:true,t:"General",exp:{pt:{tech:"Tags permitem categorizar recursos por projeto, equipe ou ambiente, facilitando o rastreamento de custos e organizacao.",simple:"Tags sao rotulos que voce coloca nos recursos da AWS para identificar a qual projeto pertencem e acompanhar quanto cada grupo esta gastando.",avoid:"Nunca deixe recursos sem tags organizacionais. Implemente uma politica de tagging obrigatoria com AWS Organizations SCPs para controle de custos e governanca."},en:{tech:"Tags let you categorize resources by project, team, or environment, making cost tracking and organization easier.",simple:"Tags are labels you attach to AWS resources to identify which project they belong to and track how much each group is spending.",avoid:"Never leave resources without organizational tags. Implement a mandatory tagging policy with AWS Organizations SCPs for cost control and governance."}}},
{en:"Which AWS service is used for encryption key management?",pt:"Qual servico da AWS e usado para gerenciamento de chaves de criptografia?",o:{en:["AWS KMS","AWS Service Control Policies","Multi-Factor Authentication","Amazon Macie"],pt:["AWS KMS","AWS Service Control Policies","Autenticacao Multi-Fator","Amazon Macie"]},a:[0],t:"KMS & Encryption",exp:{pt:{tech:"AWS KMS (Key Management Service) permite criar, gerenciar e controlar chaves de criptografia usadas para proteger dados.",simple:"O KMS e um servico que cria, armazena e controla chaves de criptografia usadas para proteger seus dados na AWS.",avoid:"Nunca armazene chaves de criptografia em texto plano no codigo ou em variaveis de ambiente. Use KMS com politicas de acesso restritas e habilite rotacao automatica de chaves."},en:{tech:"AWS KMS (Key Management Service) lets you create, manage, and control encryption keys used to protect data.",simple:"KMS is a service that creates, stores, and controls encryption keys used to protect your data in AWS.",avoid:"Never store encryption keys in plaintext in code or environment variables. Use KMS with strict access policies and enable automatic key rotation."}}},
{en:"Which AWS service provides SOC and PCI compliance reports?",pt:"Qual servico da AWS fornece relatorios de conformidade SOC e PCI?",o:{en:["AWS Well-Architected Tool","AWS Artifact","AWS Glue","Amazon Chime"],pt:["AWS Well-Architected Tool","AWS Artifact","AWS Glue","Amazon Chime"]},a:[1],t:"Well-Architected",exp:{pt:{tech:"AWS Artifact fornece acesso sob demanda a relatorios de conformidade e seguranca da AWS, como SOC e PCI DSS.",simple:"O Artifact e um portal onde voce baixa relatorios de conformidade da AWS, como SOC e PCI, para auditorias e requisitos regulatorios.",avoid:"Nunca ignore relatorios de conformidade ao passar por auditorias. Baixe os relatorios do Artifact regularmente e mantenha evidencias atualizadas para SOC e PCI."},en:{tech:"AWS Artifact provides on-demand access to AWS compliance and security reports such as SOC and PCI DSS.",simple:"Artifact is a portal where you download AWS compliance reports, such as SOC and PCI, for audits and regulatory requirements.",avoid:"Never ignore compliance reports during audits. Download Artifact reports regularly and keep up-to-date evidence for SOC and PCI."}}},
{en:"Which of the following is NOT a customer responsibility in the AWS Shared Responsibility Model? (Choose TWO)",pt:"Quais das alternativas a seguir NAO sao responsabilidade do cliente no Modelo de Responsabilidade Compartilhada? (Escolha DUAS)",o:{en:["Running penetration tests on their applications","Reserving capacity for their workloads","Data center physical operations","Auditing and compliance of their applications","Physical infrastructure security"],pt:["Executar testes de penetracao em suas aplicacoes","Reservar capacidade para suas cargas de trabalho","Operacoes fisicas do data center","Auditoria e conformidade de suas aplicacoes","Seguranca da infraestrutura fisica"]},a:[2,4],multi:true,t:"Shared Responsibility",exp:{pt:{tech:"Operacoes fisicas de data center e seguranca da infraestrutura fisica sao responsabilidades da AWS, nao do cliente.",simple:"Operacoes fisicas do data center e seguranca da infraestrutura fisica sao responsabilidades da AWS, nao do cliente. A AWS cuida de todo o hardware e das instalacoes.",avoid:"Nunca tente gerenciar a seguranca fisica dos data centers da AWS por conta propria. Foque nas suas responsabilidades: criptografia de dados, controle de acesso e configuracao de rede."},en:{tech:"Physical data center operations and infrastructure security are AWS responsibilities, not the customer.",simple:"Physical data center operations and physical infrastructure security are AWS responsibilities, not the customer. AWS manages all hardware and facilities.",avoid:"Never try to manage AWS data center physical security yourself. Focus on your responsibilities: data encryption, access control, and network configuration."}}},
{en:"Which AWS service can send SMS promotions to users in over 200 countries?",pt:"Qual servico da AWS pode enviar promocoes por SMS para usuarios em mais de 200 paises?",o:{en:["Amazon SES","Amazon S3","Amazon SNS","Amazon SQS"],pt:["Amazon SES","Amazon S3","Amazon SNS","Amazon SQS"]},a:[2],t:"S3 General",exp:{pt:{tech:"Amazon SNS (Simple Notification Service) suporta envio de SMS para mais de 200 paises, alem de push e e-mail.",simple:"O SNS e um servico de mensagens que pode enviar SMS para usuarios em mais de 200 paises, alem de e-mails e notificacoes push.",avoid:"Nunca envie SMS sem consentimento explicito dos usuarios. Sempre configure limites de gastos no SNS para evitar custos inesperados com envio em massa."},en:{tech:"Amazon SNS (Simple Notification Service) supports SMS delivery to over 200 countries, plus push and email notifications.",simple:"SNS is a messaging service that can send SMS to users in over 200 countries, as well as emails and push notifications.",avoid:"Never send SMS without explicit user consent. Always configure spending limits in SNS to avoid unexpected costs from mass sending."}}},
{en:"Which of the following is a benefit of Amazon EC2 that helps reduce compute costs?",pt:"Qual das alternativas a seguir e um beneficio do Amazon EC2 que ajuda a reduzir custos de computacao?",o:{en:["Low monthly maintenance fees","Low-cost resource tagging","Per-second billing for On-Demand instances","Low start-up fees for all instance types"],pt:["Baixas taxas mensais de manutencao","Tagging de recursos de baixo custo","Cobranca por segundo para instancias On-Demand","Baixas taxas iniciais para todos os tipos de instancia"]},a:[2],t:"EC2 Pricing",exp:{pt:{tech:"A cobranca por segundo do EC2 On-Demand garante que voce pague apenas pelo tempo real de uso, sem desperdicio.",simple:"A cobranca por segundo significa que voce paga apenas pelo tempo exato que usa uma instancia EC2 On-Demand, sem precisar pagar por uma hora inteira.",avoid:"Nunca deixe instancias EC2 ociosas rodando sem monitoramento. Use metricas do CloudWatch para identificar instancias subutilizadas e desligue o que nao esta em uso."},en:{tech:"EC2 On-Demand per-second billing ensures you pay only for actual usage time, eliminating waste.",simple:"Per-second billing means you pay only for the exact time you use an On-Demand EC2 instance, without needing to pay for a full hour.",avoid:"Never leave idle EC2 instances running without monitoring. Use CloudWatch metrics to identify underutilized instances and shut down what is not in use."}}},
{en:"Which AWS group helps customers achieve desired business outcomes through AWS adoption?",pt:"Qual grupo da AWS ajuda clientes a alcancar resultados de negocios desejados por meio da adocao da AWS?",o:{en:["AWS Security Team","AWS Professional Services","AWS Trusted Advisor","AWS Concierge Support"],pt:["Equipe de Seguranca da AWS","AWS Professional Services","AWS Trusted Advisor","AWS Concierge Support"]},a:[1],t:"Trusted Advisor",exp:{pt:{tech:"AWS Professional Services e uma equipe global de especialistas que ajuda empresas a migrar e adotar a AWS com sucesso.",simple:"O AWS Professional Services e uma equipe de especialistas da AWS que ajuda empresas a planejar e executar a adocao da nuvem para alcancar resultados de negocio.",avoid:"Nunca inicie uma migracao para AWS sem um plano estruturado. Envolva o AWS Professional Services ou um parceiro certificado para evitar erros caros."},en:{tech:"AWS Professional Services is a global team of experts that helps organizations migrate to and adopt AWS successfully.",simple:"AWS Professional Services is a team of AWS experts that helps companies plan and execute cloud adoption to achieve business outcomes.",avoid:"Never start an AWS migration without a structured plan. Engage AWS Professional Services or a certified partner to avoid costly mistakes."}}},
{en:"What are the benefits of Amazon DynamoDB? (Choose TWO)",pt:"Quais sao os beneficios do Amazon DynamoDB? (Escolha DUAS)",o:{en:["Automatically scales throughput capacity","Provides resizable instance types","Supports both relational and non-relational data models","Delivers single-digit millisecond latency","Supports CouchDB and MongoDB engines"],pt:["Escala automaticamente a capacidade de throughput","Fornece tipos de instancia redimensionaveis","Suporta modelos de dados relacionais e nao relacionais","Entrega latencia de milissegundos de um digito","Suporta engines CouchDB e MongoDB"]},a:[0,3],multi:true,t:"DynamoDB",exp:{pt:{tech:"DynamoDB escala automaticamente o throughput e oferece latencia consistente abaixo de 10ms em qualquer escala.",simple:"O DynamoDB e um banco de dados NoSQL que ajusta automaticamente sua capacidade conforme a demanda e entrega respostas em milissegundos.",avoid:"Nunca use DynamoDB sem configurar alarmes para consumo de capacidade. Monitore metricas de throttling e configure auto scaling para evitar erros de leitura e escrita."},en:{tech:"DynamoDB automatically scales throughput and delivers consistent sub-10ms latency at any scale.",simple:"DynamoDB is a NoSQL database that automatically adjusts its capacity based on demand and delivers responses in single-digit milliseconds.",avoid:"Never use DynamoDB without setting alarms for capacity consumption. Monitor throttling metrics and configure auto scaling to avoid read and write errors."}}},
{en:"A company wants to ensure that their cloud architecture can automatically recover from component failures without manual intervention. Which pillar of the AWS Well-Architected Framework is MOST relevant?",pt:"Uma empresa quer garantir que sua arquitetura em nuvem possa se recuperar automaticamente de falhas em componentes sem intervenção manual. Qual pilar do AWS Well-Architected Framework é MAIS relevante?",o:{en:["Reliability","Performance Efficiency","Operational Excellence","Security"],pt:["Confiabilidade","Eficiência de Performance","Excelência Operacional","Segurança"]},a:[0],t:"Well-Architected",exp:{pt:{tech:"O pilar de Confiabilidade foca na capacidade de um sistema se recuperar de falhas de infraestrutura ou serviço, adquirir dinamicamente recursos computacionais para atender a demanda e mitigar interrupções.",simple:"O pilar de Confiabilidade (Reliability) trata da capacidade de um sistema se recuperar automaticamente de falhas e continuar funcionando sem intervencao humana.",avoid:"Nunca dependa de um unico componente sem redundancia. Projete para falhas usando multi-AZ, health checks automaticos e mecanismos de failover."},en:{tech:"The Reliability pillar focuses on the ability of a system to recover from infrastructure or service disruptions, dynamically acquire computing resources to meet demand, and mitigate disruptions such as misconfigurations or transient network issues.",simple:"The Reliability pillar addresses the ability of a system to automatically recover from failures and continue operating without human intervention.",avoid:"Never depend on a single component without redundancy. Design for failure using multi-AZ, automatic health checks, and failover mechanisms."}}},
{en:"Which AWS pricing model provides the LARGEST discount in exchange for a commitment to a consistent amount of compute usage measured in dollars per hour?",pt:"Qual modelo de preços da AWS oferece o MAIOR desconto em troca de um compromisso com uma quantidade consistente de uso de computação medida em dólares por hora?",o:{en:["Savings Plans","Reserved Instances","Spot Instances","On-Demand Instances"],pt:["Savings Plans","Instâncias Reservadas","Instâncias Spot","Instâncias Sob Demanda"]},a:[0],t:"EC2 Pricing",exp:{pt:{tech:"Savings Plans oferecem preços reduzidos em troca de um compromisso de uso consistente (medido em USD/hora) por um período de 1 ou 3 anos, cobrindo EC2, Lambda e Fargate.",simple:"Savings Plans oferecem os maiores descontos em troca de um compromisso de gasto fixo por hora em computacao, por 1 ou 3 anos.",avoid:"Nunca pague sob demanda para workloads previsiveis e estaveis. Analise o uso historico e comprometa-se com Savings Plans para economizar ate 72% nos custos de computacao."},en:{tech:"Savings Plans offer reduced pricing in exchange for a commitment to a consistent amount of usage (measured in USD/hour) for a 1 or 3 year term, covering EC2, Lambda, and Fargate.",simple:"Savings Plans offer the largest discounts in exchange for a commitment to a fixed hourly compute spend for 1 or 3 years.",avoid:"Never pay on-demand for predictable and stable workloads. Analyze historical usage and commit to Savings Plans to save up to 72% on compute costs."}}},
{en:"A startup needs to deploy a simple web application quickly without managing individual infrastructure components like load balancers and auto scaling groups. Which AWS service is BEST suited?",pt:"Uma startup precisa implantar uma aplicação web simples rapidamente sem gerenciar componentes individuais de infraestrutura como balanceadores de carga e grupos de auto scaling. Qual serviço AWS é MAIS adequado?",o:{en:["Amazon Lightsail","Amazon EC2","AWS Lambda","Amazon EKS"],pt:["Amazon Lightsail","Amazon EC2","AWS Lambda","Amazon EKS"]},a:[0],t:"EC2 General",exp:{pt:{tech:"O Amazon Lightsail oferece servidores virtuais, armazenamento, bancos de dados e redes a um preço mensal previsível e baixo, ideal para aplicações simples e projetos iniciais.",simple:"O Lightsail e um servico simplificado que oferece servidores, armazenamento e rede em pacotes prontos, ideal para implantar aplicacoes web simples rapidamente.",avoid:"Nunca use Lightsail para workloads que exigem controle granular de infraestrutura. Avalie limites de escala antes de escolher para evitar migracoes futuras."},en:{tech:"Amazon Lightsail offers virtual servers, storage, databases, and networking at a low, predictable monthly price, ideal for simple applications and starter projects.",simple:"Lightsail is a simplified service that offers servers, storage, and networking in ready-made bundles, ideal for deploying simple web applications quickly.",avoid:"Never use Lightsail for workloads that require granular infrastructure control. Evaluate scale limits before choosing to avoid future migrations."}}},
{en:"Which component of AWS global infrastructure is specifically designed to cache content closer to end users for low-latency delivery?",pt:"Qual componente da infraestrutura global da AWS é projetado especificamente para armazenar conteúdo em cache mais perto dos usuários finais para entrega com baixa latência?",o:{en:["Edge Locations","Availability Zones","AWS Regions","AWS Local Zones"],pt:["Locais de Borda","Zonas de Disponibilidade","Regiões AWS","Zonas Locais AWS"]},a:[0],t:"CloudFront",exp:{pt:{tech:"Edge Locations são pontos de presença (PoPs) usados pelo Amazon CloudFront e outros serviços para armazenar em cache cópias de conteúdo próximo aos usuários, reduzindo a latência.",simple:"Edge Locations sao pontos de presenca da AWS espalhados pelo mundo que armazenam copias de conteudo proximo dos usuarios para entrega mais rapida.",avoid:"Nunca ignore a configuracao de cache em edge locations. Defina TTLs adequados e invalide o cache quando o conteudo mudar para evitar servir dados desatualizados."},en:{tech:"Edge Locations are points of presence (PoPs) used by Amazon CloudFront and other services to cache copies of content closer to end users, reducing latency.",simple:"Edge Locations are AWS points of presence spread around the world that store copies of content close to users for faster delivery.",avoid:"Never ignore cache configuration at edge locations. Set appropriate TTLs and invalidate cache when content changes to avoid serving stale data."}}},
{en:"A security team needs to automatically discover and protect sensitive data such as personally identifiable information (PII) stored in Amazon S3. Which service should they use?",pt:"Uma equipe de segurança precisa descobrir e proteger automaticamente dados sensíveis como informações de identificação pessoal (PII) armazenados no Amazon S3. Qual serviço devem usar?",o:{en:["Amazon Macie","Amazon GuardDuty","AWS Security Hub","Amazon Detective"],pt:["Amazon Macie","Amazon GuardDuty","AWS Security Hub","Amazon Detective"]},a:[0],t:"S3 General",exp:{pt:{tech:"O Amazon Macie usa machine learning e correspondência de padrões para descobrir e proteger dados sensíveis armazenados no Amazon S3, incluindo PII e dados financeiros.",simple:"O Macie usa aprendizado de maquina para encontrar e classificar automaticamente dados sensiveis, como informacoes pessoais, armazenados no Amazon S3.",avoid:"Nunca deixe dados sensiveis em S3 sem classificacao automatica. Habilite o Macie para detectar PII e dados financeiros expostos antes que se tornem um incidente."},en:{tech:"Amazon Macie uses machine learning and pattern matching to discover and protect sensitive data stored in Amazon S3, including PII and financial data.",simple:"Macie uses machine learning to automatically discover and classify sensitive data, such as personal information, stored in Amazon S3.",avoid:"Never leave sensitive data in S3 without automatic classification. Enable Macie to detect exposed PII and financial data before it becomes an incident."}}},
{en:"Which TWO statements accurately describe AWS Lambda? (Choose TWO)",pt:"Quais DUAS afirmações descrevem corretamente o AWS Lambda? (Escolha DUAS)",o:{en:["You are charged based on the number of requests and the duration of code execution","Lambda automatically scales to handle incoming requests without manual configuration","Lambda requires you to provision and manage the underlying servers","Lambda functions can run indefinitely without any time restrictions"],pt:["Você é cobrado com base no número de solicitações e na duração da execução do código","O Lambda escala automaticamente para lidar com solicitações recebidas sem configuração manual","O Lambda exige que você provisione e gerencie os servidores subjacentes","As funções Lambda podem ser executadas indefinidamente sem restrições de tempo"]},a:[0,1],multi:true,t:"Lambda",exp:{pt:{tech:"O AWS Lambda é um serviço serverless que executa código em resposta a eventos. A cobrança é por número de invocações e tempo de execução (em incrementos de 1ms). Ele escala automaticamente e tem um limite máximo de execução de 15 minutos.",simple:"O Lambda cobra com base no numero de requisicoes e na duracao da execucao do codigo, e escala automaticamente para atender a demanda sem configuracao manual.",avoid:"Nunca configure funcoes Lambda sem limites de concorrencia e timeout adequados. Sem limites, uma funcao pode escalar descontroladamente e gerar custos altissimos."},en:{tech:"AWS Lambda is a serverless service that runs code in response to events. You are charged per number of invocations and execution duration (in 1ms increments). It scales automatically and has a maximum execution timeout of 15 minutes.",simple:"Lambda charges based on the number of requests and code execution duration, and it automatically scales to handle demand without manual configuration.",avoid:"Never configure Lambda functions without proper concurrency limits and timeouts. Without limits, a function can scale uncontrollably and generate very high costs."}}},
{en:"A company stores log files that are rarely accessed but must be retrievable within 12 hours when needed. Which S3 storage class is the MOST cost-effective?",pt:"Uma empresa armazena arquivos de log raramente acessados mas que devem ser recuperáveis dentro de 12 horas quando necessário. Qual classe de armazenamento S3 é a MAIS econômica?",o:{en:["S3 Glacier Deep Archive","S3 Glacier Flexible Retrieval","S3 Standard-Infrequent Access","S3 One Zone-Infrequent Access"],pt:["S3 Glacier Deep Archive","S3 Glacier Flexible Retrieval","S3 Standard-Acesso Infrequente","S3 One Zone-Acesso Infrequente"]},a:[0],t:"S3 Storage Classes",exp:{pt:{tech:"O S3 Glacier Deep Archive é a classe de armazenamento mais barata da AWS, projetada para retenção de longo prazo de dados acessados raramente, com tempo de recuperação padrão de até 12 horas.",simple:"O S3 Glacier Deep Archive e a classe de armazenamento mais barata do S3, projetada para dados raramente acessados que podem levar ate 12 horas para serem recuperados.",avoid:"Nunca armazene logs no S3 Standard se raramente sao acessados. Use lifecycle policies para mover automaticamente para Glacier Deep Archive e reduzir custos de armazenamento."},en:{tech:"S3 Glacier Deep Archive is the lowest-cost AWS storage class, designed for long-term retention of data that is rarely accessed, with a default retrieval time of up to 12 hours.",simple:"S3 Glacier Deep Archive is the cheapest S3 storage class, designed for rarely accessed data that can take up to 12 hours to retrieve.",avoid:"Never store logs in S3 Standard if they are rarely accessed. Use lifecycle policies to automatically move to Glacier Deep Archive and reduce storage costs."}}},
{en:"Which database service is fully managed by AWS and is compatible with both MySQL and PostgreSQL while offering up to five times the throughput of standard MySQL?",pt:"Qual serviço de banco de dados é totalmente gerenciado pela AWS e é compatível com MySQL e PostgreSQL, oferecendo até cinco vezes o throughput do MySQL padrão?",o:{en:["Amazon Aurora","Amazon RDS","Amazon Redshift","Amazon DynamoDB"],pt:["Amazon Aurora","Amazon RDS","Amazon Redshift","Amazon DynamoDB"]},a:[0],t:"RDS",exp:{pt:{tech:"O Amazon Aurora é um banco de dados relacional compatível com MySQL e PostgreSQL, projetado para a nuvem, que combina a performance de bancos de dados comerciais com a simplicidade e economia de bancos open source.",simple:"O Aurora e um banco de dados relacional gerenciado pela AWS, compativel com MySQL e PostgreSQL, que oferece ate cinco vezes mais desempenho que o MySQL padrao.",avoid:"Nunca ignore a configuracao de replicas de leitura no Aurora para workloads de alta demanda. Use endpoints de leitura separados para distribuir a carga e evitar gargalos."},en:{tech:"Amazon Aurora is a MySQL and PostgreSQL-compatible relational database built for the cloud, combining the performance of commercial databases with the simplicity and cost-effectiveness of open-source databases.",simple:"Aurora is a fully managed relational database compatible with MySQL and PostgreSQL that offers up to five times the throughput of standard MySQL.",avoid:"Never ignore read replica configuration in Aurora for high-demand workloads. Use separate read endpoints to distribute load and avoid bottlenecks."}}},
{en:"A company needs to connect their on-premises data center to AWS with a dedicated, private network connection that does not traverse the public internet. Which service should they use?",pt:"Uma empresa precisa conectar seu data center local à AWS com uma conexão de rede dedicada e privada que não passe pela internet pública. Qual serviço devem usar?",o:{en:["AWS Direct Connect","AWS Site-to-Site VPN","AWS Transit Gateway","Amazon VPC Peering"],pt:["AWS Direct Connect","AWS VPN Site-to-Site","AWS Transit Gateway","Peering Amazon VPC"]},a:[0],t:"Transit Gateway",exp:{pt:{tech:"O AWS Direct Connect estabelece uma conexão de rede dedicada entre as instalações do cliente e a AWS, proporcionando largura de banda consistente e latência reduzida sem passar pela internet pública.",simple:"O Direct Connect cria uma conexao de rede dedicada e privada entre seu data center local e a AWS, sem passar pela internet publica.",avoid:"Nunca transmita dados sensiveis pela internet publica quando Direct Connect esta disponivel. Configure conexoes redundantes em locais diferentes para alta disponibilidade."},en:{tech:"AWS Direct Connect establishes a dedicated network connection between customer premises and AWS, providing consistent bandwidth and reduced latency without traversing the public internet.",simple:"Direct Connect creates a dedicated, private network connection between your on-premises data center and AWS, without traversing the public internet.",avoid:"Never transmit sensitive data over the public internet when Direct Connect is available. Configure redundant connections at different locations for high availability."}}},
{en:"Which AWS service provides a centralized dashboard to check if your AWS account follows best practices across cost optimization, security, fault tolerance, performance, and service limits?",pt:"Qual serviço AWS fornece um painel centralizado para verificar se sua conta AWS segue as melhores práticas em otimização de custos, segurança, tolerância a falhas, performance e limites de serviço?",o:{en:["AWS Trusted Advisor","Amazon CloudWatch","AWS Config","AWS CloudTrail"],pt:["AWS Trusted Advisor","Amazon CloudWatch","AWS Config","AWS CloudTrail"]},a:[0],t:"CloudTrail",exp:{pt:{tech:"O AWS Trusted Advisor inspeciona seu ambiente AWS e faz recomendações em cinco categorias: otimização de custos, performance, segurança, tolerância a falhas e limites de serviço.",simple:"O Trusted Advisor analisa sua conta AWS e mostra recomendacoes em cinco areas: custo, seguranca, tolerancia a falhas, desempenho e limites de servico.",avoid:"Nunca ignore as recomendacoes do Trusted Advisor, especialmente as de seguranca. Revise regularmente os alertas de security groups abertos e chaves IAM expostas."},en:{tech:"AWS Trusted Advisor inspects your AWS environment and makes recommendations across five categories: cost optimization, performance, security, fault tolerance, and service limits.",simple:"Trusted Advisor analyzes your AWS account and shows recommendations across five areas: cost, security, fault tolerance, performance, and service limits.",avoid:"Never ignore Trusted Advisor recommendations, especially security ones. Regularly review alerts for open security groups and exposed IAM keys."}}},
{en:"A company wants to migrate a 50 TB database from an on-premises Oracle server to Amazon Aurora PostgreSQL. Which AWS service is designed specifically for this type of migration?",pt:"Uma empresa deseja migrar um banco de dados de 50 TB de um servidor Oracle local para o Amazon Aurora PostgreSQL. Qual serviço AWS é projetado especificamente para esse tipo de migração?",o:{en:["AWS Database Migration Service (DMS)","AWS Server Migration Service (SMS)","AWS Snowball","AWS Migration Hub"],pt:["AWS Database Migration Service (DMS)","AWS Server Migration Service (SMS)","AWS Snowball","AWS Migration Hub"]},a:[0],t:"Snow Family",exp:{pt:{tech:"O AWS DMS suporta migrações homogêneas e heterogêneas de banco de dados, incluindo de Oracle para Aurora PostgreSQL, com conversão de schema via AWS Schema Conversion Tool.",simple:"O DMS e um servico que migra bancos de dados para a AWS com minimo tempo de inatividade, suportando migracoes entre diferentes motores de banco de dados.",avoid:"Nunca migre bancos de dados sem testar a migracao completa em ambiente de staging primeiro. Use DMS com validacao de dados para garantir consistencia apos a migracao."},en:{tech:"AWS DMS supports both homogeneous and heterogeneous database migrations, including Oracle to Aurora PostgreSQL, with schema conversion using the AWS Schema Conversion Tool.",simple:"DMS is a service that migrates databases to AWS with minimal downtime, supporting migrations between different database engines.",avoid:"Never migrate databases without testing the full migration in a staging environment first. Use DMS with data validation to ensure consistency after migration."}}},
