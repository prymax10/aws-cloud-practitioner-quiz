{en:"Which AWS AI service can analyze images and videos to detect objects, people, text, scenes, and activities?",pt:"Qual serviço de IA da AWS pode analisar imagens e vídeos para detectar objetos, pessoas, texto, cenas e atividades?",o:{en:["Amazon Rekognition","Amazon Comprehend","Amazon SageMaker","Amazon Translate"],pt:["Amazon Rekognition","Amazon Comprehend","Amazon SageMaker","Amazon Translate"]},a:[0],t:"AI & ML Services",exp:{pt:{tech:"O Amazon Rekognition é um serviço de visão computacional que usa deep learning para analisar imagens e vídeos, identificando objetos, pessoas, texto, cenas e atividades sem necessidade de expertise em ML.",simple:"O Rekognition e um servico de inteligencia artificial que analisa imagens e videos para identificar objetos, pessoas, textos, cenas e atividades.",avoid:"Nunca processe imagens ou videos com dados biometricos sem considerar regulamentacoes de privacidade como LGPD e GDPR. Limite o armazenamento de dados faciais ao minimo necessario."},en:{tech:"Amazon Rekognition is a computer vision service that uses deep learning to analyze images and videos, identifying objects, people, text, scenes, and activities without requiring ML expertise.",simple:"Rekognition is an AI service that analyzes images and videos to identify objects, people, text, scenes, and activities.",avoid:"Never process images or videos with biometric data without considering privacy regulations like LGPD and GDPR. Limit facial data storage to the minimum necessary."}}},
{en:"Which AWS service automates the software release process by orchestrating build, test, and deploy phases across multiple stages?",pt:"Qual serviço AWS automatiza o processo de lançamento de software orquestrando as fases de build, teste e deploy em múltiplos estágios?",o:{en:["AWS CodePipeline","AWS CodeBuild","AWS CodeDeploy","AWS CodeCommit"],pt:["AWS CodePipeline","AWS CodeBuild","AWS CodeDeploy","AWS CodeCommit"]},a:[0],t:"Developer Tools",exp:{pt:{tech:"O AWS CodePipeline é um serviço de entrega contínua totalmente gerenciado que automatiza os pipelines de release, orquestrando etapas de build, teste e deploy.",simple:"O CodePipeline e um servico que automatiza o processo de lancamento de software, orquestrando as etapas de construcao, teste e implantacao em sequencia.",avoid:"Nunca faca deploy direto em producao sem pipeline de CI/CD. Use CodePipeline com etapas de teste automatizado e aprovacao manual antes do deploy."},en:{tech:"AWS CodePipeline is a fully managed continuous delivery service that automates release pipelines, orchestrating build, test, and deploy stages.",simple:"CodePipeline is a service that automates the software release process by orchestrating the build, test, and deploy stages in sequence.",avoid:"Never deploy directly to production without a CI/CD pipeline. Use CodePipeline with automated test stages and manual approval before deployment."}}},
{en:"Which AWS support plan provides access to a Technical Account Manager (TAM)?",pt:"Qual plano de suporte AWS fornece acesso a um Technical Account Manager (TAM)?",o:{en:["Enterprise","Business","Developer","Basic"],pt:["Enterprise","Business","Developer","Básico"]},a:[0],t:"Support Plans",exp:{pt:{tech:"O plano Enterprise é o único que inclui um Technical Account Manager (TAM) dedicado, que fornece orientação proativa, revisões arquiteturais e coordenação de casos de suporte.",simple:"O plano Enterprise e o unico plano de suporte AWS que inclui um Technical Account Manager (TAM) dedicado para orientar sua conta de forma proativa.",avoid:"Nunca opere workloads criticas em producao sem plano Enterprise Support. Sem um TAM, voce perde orientacao proativa e revisao arquitetural que previnem incidentes."},en:{tech:"The Enterprise plan is the only one that includes a dedicated Technical Account Manager (TAM), who provides proactive guidance, architectural reviews, and support case coordination.",simple:"The Enterprise plan is the only AWS support plan that includes a dedicated Technical Account Manager (TAM) to proactively guide your account.",avoid:"Never operate critical production workloads without an Enterprise Support plan. Without a TAM, you lose proactive guidance and architectural reviews that prevent incidents."}}},
{en:"Which pillar of the AWS Well-Architected Framework focuses on running workloads effectively while gaining insight into operations through monitoring and continuously improving processes?",pt:"Qual pilar do AWS Well-Architected Framework foca em executar cargas de trabalho de forma eficaz enquanto obtém insights sobre operações por meio de monitoramento e melhora contínua de processos?",o:{en:["Operational Excellence","Reliability","Performance Efficiency","Sustainability"],pt:["Excelência Operacional","Confiabilidade","Eficiência de Performance","Sustentabilidade"]},a:[0],t:"CloudWatch",exp:{pt:{tech:"O pilar de Excelência Operacional inclui a capacidade de executar e monitorar sistemas para entregar valor de negócio e melhorar continuamente processos e procedimentos de suporte.",simple:"O pilar de Excelencia Operacional foca em executar cargas de trabalho de forma eficaz, monitorar operacoes e melhorar processos continuamente.",avoid:"Nunca opere sem runbooks documentados e metricas de monitoramento. Defina alarmes, dashboards e procedimentos de resposta a incidentes antes de ir para producao."},en:{tech:"The Operational Excellence pillar includes the ability to run and monitor systems to deliver business value and continually improve supporting processes and procedures.",simple:"The Operational Excellence pillar focuses on running workloads effectively, monitoring operations, and continuously improving processes.",avoid:"Never operate without documented runbooks and monitoring metrics. Define alarms, dashboards, and incident response procedures before going to production."}}},
{en:"A company notices their monthly AWS bill is higher than expected. Which TWO actions can help reduce costs? (Choose TWO)",pt:"Uma empresa percebe que sua fatura mensal da AWS está mais alta do que o esperado. Quais DUAS ações podem ajudar a reduzir custos? (Escolha DUAS)",o:{en:["Right-size underutilized EC2 instances based on usage patterns","Purchase Reserved Instances or Savings Plans for steady-state workloads","Increase the number of Availability Zones used to three in every Region","Migrate all workloads from Lambda to EC2 for better pricing"],pt:["Redimensionar instâncias EC2 subutilizadas com base nos padrões de uso","Comprar Instâncias Reservadas ou Savings Plans para cargas de trabalho constantes","Aumentar o número de Zonas de Disponibilidade para três em cada Região","Migrar todas as cargas de trabalho do Lambda para EC2 para melhor preço"]},a:[0,1],multi:true,t:"EC2 Pricing",exp:{pt:{tech:"Right-sizing elimina desperdício ao ajustar recursos ao uso real, e compromissos de longo prazo como Reserved Instances ou Savings Plans oferecem descontos de até 72% comparado a On-Demand.",simple:"Ajustar instancias EC2 subutilizadas para tamanhos menores (right-sizing) e comprar Reserved Instances ou Savings Plans para cargas estaveis sao duas formas eficazes de reduzir custos.",avoid:"Nunca ignore instancias EC2 superdimensionadas ou Reserved Instances nao utilizadas. Revise mensalmente o Cost Explorer e o Trusted Advisor para identificar desperdicio."},en:{tech:"Right-sizing eliminates waste by matching resources to actual usage, and long-term commitments like Reserved Instances or Savings Plans offer discounts of up to 72% compared to On-Demand.",simple:"Right-sizing underutilized EC2 instances to smaller sizes and purchasing Reserved Instances or Savings Plans for steady workloads are two effective ways to reduce costs.",avoid:"Never ignore oversized EC2 instances or unused Reserved Instances. Review Cost Explorer and Trusted Advisor monthly to identify waste."}}},
{en:"What is the MINIMUM number of Availability Zones in any AWS Region?",pt:"Qual é o número MÍNIMO de Zonas de Disponibilidade em qualquer Região AWS?",o:{en:["2","1","3","4"],pt:["2","1","3","4"]},a:[2],t:"Global Infrastructure",exp:{pt:{tech:"Cada Região AWS consiste em no mínimo 3 Zonas de Disponibilidade isoladas e fisicamente separadas dentro de uma área geográfica, proporcionando alta disponibilidade e tolerância a falhas.",simple:"Toda Regiao AWS tem no minimo 3 Availability Zones, que sao locais fisicamente separados dentro da mesma regiao para garantir alta disponibilidade.",avoid:"Nunca implante recursos em uma unica Availability Zone para workloads de producao. Distribua em pelo menos duas AZs para garantir alta disponibilidade."},en:{tech:"Each AWS Region consists of a minimum of 3 isolated and physically separate Availability Zones within a geographic area, providing high availability and fault tolerance.",simple:"Every AWS Region has at least 3 Availability Zones, which are physically separate locations within the same region to ensure high availability.",avoid:"Never deploy resources in a single Availability Zone for production workloads. Distribute across at least two AZs to ensure high availability."}}},
{en:"Which AWS service continuously monitors for malicious activity and unauthorized behavior by analyzing VPC Flow Logs, CloudTrail logs, and DNS logs?",pt:"Qual serviço AWS monitora continuamente atividades maliciosas e comportamento não autorizado analisando VPC Flow Logs, logs do CloudTrail e logs de DNS?",o:{en:["Amazon GuardDuty","Amazon Macie","AWS Config","Amazon Inspector"],pt:["Amazon GuardDuty","Amazon Macie","AWS Config","Amazon Inspector"]},a:[0],t:"Route 53",exp:{pt:{tech:"O Amazon GuardDuty é um serviço de detecção de ameaças que monitora continuamente atividades maliciosas e comportamentos anômalos usando machine learning, análise de anomalias e inteligência de ameaças integrada.",simple:"O GuardDuty monitora continuamente sua conta AWS analisando logs de VPC Flow, CloudTrail e DNS para detectar atividades maliciosas ou comportamentos nao autorizados.",avoid:"Nunca desative o GuardDuty para economizar custos. O custo de nao detectar uma intrusao e muito maior. Integre alertas com SNS ou Security Hub para resposta rapida."},en:{tech:"Amazon GuardDuty is a threat detection service that continuously monitors for malicious activity and anomalous behavior using machine learning, anomaly detection, and integrated threat intelligence.",simple:"GuardDuty continuously monitors your AWS account by analyzing VPC Flow Logs, CloudTrail logs, and DNS logs to detect malicious activity or unauthorized behavior.",avoid:"Never disable GuardDuty to save costs. The cost of not detecting an intrusion is much higher. Integrate alerts with SNS or Security Hub for rapid response."}}},
{en:"A developer needs to run containers on AWS without managing the underlying EC2 instances or server clusters. Which service should they use?",pt:"Um desenvolvedor precisa executar containers na AWS sem gerenciar as instâncias EC2 subjacentes ou clusters de servidores. Qual serviço deve usar?",o:{en:["AWS Fargate","Amazon ECS","Amazon EKS","Amazon EC2"],pt:["AWS Fargate","Amazon ECS","Amazon EKS","Amazon EC2"]},a:[0],t:"EC2 General",exp:{pt:{tech:"O AWS Fargate é um mecanismo de computação serverless para containers que funciona com Amazon ECS e Amazon EKS, eliminando a necessidade de provisionar e gerenciar servidores.",simple:"O Fargate executa conteineres sem que voce precise gerenciar servidores ou instancias EC2 — voce define o conteiner e o Fargate cuida da infraestrutura.",avoid:"Nunca rode containers no Fargate sem definir limites de CPU e memoria adequados. Sem limites corretos, voce tera custos excessivos ou falhas por falta de recursos."},en:{tech:"AWS Fargate is a serverless compute engine for containers that works with Amazon ECS and Amazon EKS, removing the need to provision and manage servers.",simple:"Fargate runs containers without you needing to manage servers or EC2 instances — you define the container and Fargate handles the infrastructure.",avoid:"Never run containers on Fargate without setting proper CPU and memory limits. Without correct limits, you will have excessive costs or failures from resource starvation."}}},
{en:"Which EBS volume type is designed for throughput-intensive workloads such as big data processing, data warehouses, and log processing?",pt:"Qual tipo de volume EBS é projetado para cargas de trabalho intensivas em throughput, como processamento de big data, data warehouses e processamento de logs?",o:{en:["Throughput Optimized HDD (st1)","General Purpose SSD (gp3)","Provisioned IOPS SSD (io2)","Cold HDD (sc1)"],pt:["HDD Otimizado para Throughput (st1)","SSD de Propósito Geral (gp3)","SSD de IOPS Provisionado (io2)","HDD Frio (sc1)"]},a:[0],t:"EBS",exp:{pt:{tech:"Volumes st1 são projetados para cargas de trabalho de dados grandes e sequenciais que requerem alto throughput a baixo custo, como processamento de big data, ETL e data warehouses.",simple:"O Throughput Optimized HDD (st1) e um tipo de volume EBS projetado para cargas que processam grandes volumes de dados sequencialmente, com custo baixo.",avoid:"Nunca use volumes HDD para workloads que exigem baixa latencia. Throughput Optimized HDD e para grandes volumes de dados sequenciais, nao para IOPS transacionais."},en:{tech:"st1 volumes are designed for large, sequential data workloads that require high throughput at low cost, such as big data processing, ETL, and data warehouses.",simple:"Throughput Optimized HDD (st1) is an EBS volume type designed for workloads that process large volumes of data sequentially at low cost.",avoid:"Never use HDD volumes for workloads requiring low latency. Throughput Optimized HDD is for large sequential data volumes, not for transactional IOPS."}}},
{en:"Which AWS service provides a fully managed file system that is compatible with the Windows Server Message Block (SMB) protocol?",pt:"Qual serviço AWS fornece um sistema de arquivos totalmente gerenciado compatível com o protocolo Windows Server Message Block (SMB)?",o:{en:["Amazon FSx for Windows File Server","Amazon EFS","Amazon S3","AWS Storage Gateway"],pt:["Amazon FSx for Windows File Server","Amazon EFS","Amazon S3","AWS Storage Gateway"]},a:[0],t:"S3 General",exp:{pt:{tech:"O Amazon FSx for Windows File Server oferece um sistema de arquivos nativo do Windows totalmente gerenciado, com suporte a SMB, Active Directory, NTFS e DFS, ideal para workloads Windows.",simple:"O FSx for Windows File Server e um sistema de arquivos totalmente gerenciado que funciona com o protocolo SMB, compativel nativamente com ambientes Windows.",avoid:"Nunca exponha compartilhamentos FSx diretamente para a internet. Use security groups restritos e VPN ou Direct Connect para acesso seguro ao file system Windows."},en:{tech:"Amazon FSx for Windows File Server provides a fully managed native Windows file system with SMB, Active Directory, NTFS, and DFS support, ideal for Windows workloads.",simple:"FSx for Windows File Server is a fully managed file system that works with the SMB protocol, natively compatible with Windows environments.",avoid:"Never expose FSx shares directly to the internet. Use restricted security groups and VPN or Direct Connect for secure access to the Windows file system."}}},
{en:"A company needs a managed graph database to store and query highly connected datasets such as social networks and recommendation engines. Which service should they choose?",pt:"Uma empresa precisa de um banco de dados de grafos gerenciado para armazenar e consultar conjuntos de dados altamente conectados, como redes sociais e mecanismos de recomendação. Qual serviço devem escolher?",o:{en:["Amazon Neptune","Amazon DynamoDB","Amazon Redshift","Amazon ElastiCache"],pt:["Amazon Neptune","Amazon DynamoDB","Amazon Redshift","Amazon ElastiCache"]},a:[0],t:"RDS",exp:{pt:{tech:"O Amazon Neptune é um serviço de banco de dados de grafos totalmente gerenciado que suporta Property Graph e RDF, otimizado para armazenar bilhões de relacionamentos e consultá-los com latência de milissegundos.",simple:"O Neptune e um banco de dados de grafos gerenciado, projetado para armazenar e consultar dados altamente conectados, como redes sociais e sistemas de recomendacao.",avoid:"Nunca use bancos relacionais para modelar dados altamente conectados como grafos sociais. Neptune e otimizado para travessias de grafos que seriam extremamente lentas em SQL."},en:{tech:"Amazon Neptune is a fully managed graph database service supporting Property Graph and RDF, optimized for storing billions of relationships and querying them with millisecond latency.",simple:"Neptune is a managed graph database designed to store and query highly connected data, such as social networks and recommendation engines.",avoid:"Never use relational databases to model highly connected data like social graphs. Neptune is optimized for graph traversals that would be extremely slow in SQL."}}},
{en:"Which AWS networking component allows resources in a private subnet to access the internet for software updates while preventing inbound connections from the internet?",pt:"Qual componente de rede AWS permite que recursos em uma sub-rede privada acessem a internet para atualizações de software enquanto impede conexões de entrada da internet?",o:{en:["NAT Gateway","Internet Gateway","Network ACL","Security Group"],pt:["NAT Gateway","Internet Gateway","Network ACL","Security Group"]},a:[0],t:"VPC & Networking",exp:{pt:{tech:"Um NAT Gateway permite que instâncias em sub-redes privadas iniciem conexões de saída para a internet enquanto impede que a internet inicie conexões de entrada com essas instâncias.",simple:"O NAT Gateway permite que recursos em uma sub-rede privada acessem a internet para atualizacoes, mas impede que conexoes da internet cheguem ate eles.",avoid:"Nunca use NAT Gateway sem monitorar custos de transferencia de dados. Configure alarmes no CloudWatch para evitar surpresas na fatura mensal."},en:{tech:"A NAT Gateway allows instances in private subnets to initiate outbound connections to the internet while preventing the internet from initiating inbound connections to those instances.",simple:"A NAT Gateway allows resources in a private subnet to access the internet for updates while preventing inbound connections from the internet from reaching them.",avoid:"Never use NAT Gateway without monitoring data transfer costs. Set up CloudWatch alarms to avoid surprises on the monthly bill."}}},
{en:"Which AWS service records API calls made to your account, providing an audit trail for governance, compliance, and operational troubleshooting?",pt:"Qual serviço AWS registra chamadas de API feitas em sua conta, fornecendo uma trilha de auditoria para governança, conformidade e solução de problemas operacionais?",o:{en:["AWS CloudTrail","Amazon CloudWatch","AWS Config","AWS Systems Manager"],pt:["AWS CloudTrail","Amazon CloudWatch","AWS Config","AWS Systems Manager"]},a:[0],t:"CloudTrail",exp:{pt:{tech:"O AWS CloudTrail registra as chamadas de API feitas na conta AWS, incluindo quem fez a chamada, qual serviço foi usado, que ação foi executada e quando aconteceu.",simple:"O CloudTrail registra todas as chamadas de API feitas na sua conta AWS, criando um historico completo de quem fez o que e quando, para auditoria e conformidade.",avoid:"Nunca desative o CloudTrail em nenhuma conta ou regiao. Mantenha trails multi-regiao habilitados e armazene logs em bucket S3 com versionamento e MFA Delete."},en:{tech:"AWS CloudTrail records API calls made to the AWS account, including who made the call, which service was used, what action was taken, and when it happened.",simple:"CloudTrail records all API calls made in your AWS account, creating a complete history of who did what and when, for auditing and compliance.",avoid:"Never disable CloudTrail in any account or region. Keep multi-region trails enabled and store logs in an S3 bucket with versioning and MFA Delete."}}},
{en:"A company wants to ensure that their cloud architecture can automatically recover from component failures without human intervention. Which pillar of the AWS Well-Architected Framework PRIMARILY addresses this requirement?",pt:"Uma empresa deseja garantir que sua arquitetura em nuvem possa se recuperar automaticamente de falhas em componentes sem intervenção humana. Qual pilar do AWS Well-Architected Framework aborda PRINCIPALMENTE esse requisito?",o:{en:["Reliability","Operational Excellence","Performance Efficiency","Security"],pt:["Confiabilidade","Excelência Operacional","Eficiência de Performance","Segurança"]},a:[0],t:"Well-Architected",exp:{pt:{tech:"O pilar de Confiabilidade do Well-Architected Framework foca na capacidade de um sistema se recuperar de falhas de infraestrutura ou serviço, adquirir recursos computacionais dinamicamente e mitigar interrupções.",simple:"O pilar de Confiabilidade (Reliability) garante que sistemas se recuperem automaticamente de falhas de componentes sem intervencao humana.",avoid:"Nunca projete arquiteturas que dependam de intervencao humana para se recuperar de falhas. Implemente auto scaling, health checks e failover automatico em todas as camadas."},en:{tech:"The Reliability pillar of the Well-Architected Framework focuses on the ability of a system to recover from infrastructure or service disruptions, dynamically acquire computing resources, and mitigate disruptions.",simple:"The Reliability pillar ensures that systems automatically recover from component failures without human intervention.",avoid:"Never design architectures that depend on human intervention to recover from failures. Implement auto scaling, health checks, and automatic failover at all layers."}}},
{en:"Which AWS pricing model would be MOST cost-effective for a batch processing workload that can be interrupted and resumed, and has flexible start and end times?",pt:"Qual modelo de preços da AWS seria MAIS econômico para uma carga de trabalho de processamento em lote que pode ser interrompida e retomada, com horários flexíveis de início e término?",o:{en:["Spot Instances","On-Demand Instances","Reserved Instances","Dedicated Hosts"],pt:["Instâncias Spot","Instâncias Sob Demanda","Instâncias Reservadas","Hosts Dedicados"]},a:[0],t:"EC2 Pricing",exp:{pt:{tech:"Spot Instances permitem aproveitar capacidade ociosa do EC2 com descontos de até 90% em relação ao preço sob demanda. São ideais para cargas de trabalho tolerantes a interrupções.",simple:"Spot Instances oferecem descontos de ate 90% para cargas de trabalho que podem ser interrompidas, usando capacidade computacional ociosa da AWS.",avoid:"Nunca use Spot Instances para workloads que nao toleram interrupcao. Sempre implemente tratamento de interrupcao e use diversificacao de tipos de instancia."},en:{tech:"Spot Instances let you take advantage of unused EC2 capacity at discounts of up to 90% compared to On-Demand pricing. They are ideal for fault-tolerant and flexible workloads.",simple:"Spot Instances offer discounts of up to 90% for workloads that can be interrupted, using idle AWS compute capacity.",avoid:"Never use Spot Instances for workloads that cannot tolerate interruption. Always implement interruption handling and use instance type diversification."}}},
{en:"A company has workloads in us-east-1 and wants to ensure high availability by deploying resources across multiple isolated locations within that Region. What are these isolated locations called?",pt:"Uma empresa tem cargas de trabalho em us-east-1 e deseja garantir alta disponibilidade implantando recursos em várias localizações isoladas dentro dessa Região. Como são chamadas essas localizações isoladas?",o:{en:["Availability Zones","Edge Locations","Local Zones","Wavelength Zones"],pt:["Zonas de Disponibilidade","Locais de Borda","Zonas Locais","Zonas Wavelength"]},a:[0],t:"CloudFront",exp:{pt:{tech:"Zonas de Disponibilidade (AZs) são locais isolados dentro de uma Região AWS, cada uma com energia, refrigeração e rede independentes, conectadas por links de baixa latência.",simple:"Availability Zones sao locais isolados dentro de uma Regiao AWS, cada um com infraestrutura independente de energia, rede e refrigeracao.",avoid:"Nunca implante todos os recursos em uma unica Availability Zone. Distribua entre multiplas AZs para tolerancia a falhas e continuidade de servico."},en:{tech:"Availability Zones (AZs) are isolated locations within an AWS Region, each with independent power, cooling, and networking, connected through low-latency links.",simple:"Availability Zones are isolated locations within an AWS Region, each with independent power, networking, and cooling infrastructure.",avoid:"Never deploy all resources in a single Availability Zone. Distribute across multiple AZs for fault tolerance and service continuity."}}},
{en:"Which AWS service uses machine learning to automatically discover, classify, and protect sensitive data such as personally identifiable information (PII) stored in Amazon S3?",pt:"Qual serviço da AWS usa aprendizado de máquina para descobrir, classificar e proteger automaticamente dados sensíveis como informações de identificação pessoal (PII) armazenados no Amazon S3?",o:{en:["Amazon Macie","Amazon GuardDuty","AWS Security Hub","Amazon Detective"],pt:["Amazon Macie","Amazon GuardDuty","AWS Security Hub","Amazon Detective"]},a:[0],t:"S3 General",exp:{pt:{tech:"O Amazon Macie utiliza machine learning e correspondência de padrões para descobrir e proteger dados sensíveis no S3, como números de CPF, cartões de crédito e outras PII.",simple:"O Macie usa aprendizado de maquina para descobrir, classificar e proteger automaticamente dados sensiveis como informacoes pessoais armazenadas no S3.",avoid:"Nunca deixe buckets S3 com dados sensiveis sem monitoramento continuo. Habilite Macie para detectar PII automaticamente e configure alertas para achados criticos."},en:{tech:"Amazon Macie uses machine learning and pattern matching to discover and protect sensitive data in S3, such as social security numbers, credit card numbers, and other PII.",simple:"Macie uses machine learning to automatically discover, classify, and protect sensitive data such as personally identifiable information stored in S3.",avoid:"Never leave S3 buckets with sensitive data without continuous monitoring. Enable Macie to automatically detect PII and configure alerts for critical findings."}}},
{en:"Which TWO statements are TRUE about AWS Lambda? (Choose TWO)",pt:"Quais DUAS afirmações são VERDADEIRAS sobre o AWS Lambda? (Escolha DUAS)",o:{en:["You pay only for the compute time your code actually consumes","Lambda automatically manages the underlying server infrastructure","You must pre-provision a fixed number of Lambda instances before use","Lambda functions can only be triggered by API Gateway"],pt:["Você paga apenas pelo tempo de computação que seu código realmente consome","O Lambda gerencia automaticamente a infraestrutura de servidores subjacente","Você deve provisionar previamente um número fixo de instâncias Lambda antes do uso","Funções Lambda só podem ser acionadas pelo API Gateway"]},a:[0,1],multi:true,t:"Lambda",exp:{pt:{tech:"O AWS Lambda é um serviço serverless que executa código em resposta a eventos. Não requer provisionamento de servidores, escala automaticamente e cobra apenas pelo tempo de execução em milissegundos.",simple:"O Lambda cobra apenas pelo tempo de computacao que seu codigo realmente consome e gerencia automaticamente toda a infraestrutura de servidores.",avoid:"Nunca deixe funcoes Lambda rodando com permissoes excessivas. Aplique o principio do menor privilegio nas roles IAM associadas a cada funcao."},en:{tech:"AWS Lambda is a serverless service that runs code in response to events. It requires no server provisioning, scales automatically, and charges only for execution time in milliseconds.",simple:"Lambda charges only for the compute time your code actually consumes and automatically manages all server infrastructure.",avoid:"Never leave Lambda functions running with excessive permissions. Apply the principle of least privilege to the IAM roles associated with each function."}}},
{en:"A startup wants to deploy a simple web application quickly without managing individual infrastructure components like load balancers and auto scaling groups. Which AWS compute service is BEST suited for this use case?",pt:"Uma startup deseja implantar uma aplicação web simples rapidamente sem gerenciar componentes individuais de infraestrutura como balanceadores de carga e grupos de auto scaling. Qual serviço de computação da AWS é MAIS adequado para esse caso de uso?",o:{en:["Amazon Lightsail","Amazon EC2","Amazon EKS","AWS Fargate"],pt:["Amazon Lightsail","Amazon EC2","Amazon EKS","AWS Fargate"]},a:[0],t:"EC2 General",exp:{pt:{tech:"O Amazon Lightsail oferece servidores virtuais, armazenamento, bancos de dados e rede em pacotes simplificados com preço fixo mensal previsível, ideal para aplicações simples e pequenas empresas.",simple:"O Lightsail oferece pacotes prontos com servidor, armazenamento e rede por um preco fixo mensal, ideal para implantar aplicacoes web simples rapidamente.",avoid:"Nunca escolha Lightsail sem avaliar os limites de escalabilidade. Para aplicacoes que crescem rapido, considere migrar para EC2 ou ECS desde o inicio."},en:{tech:"Amazon Lightsail provides virtual servers, storage, databases, and networking in simplified bundles with predictable monthly pricing, ideal for simple applications and small businesses.",simple:"Lightsail offers ready-made bundles with server, storage, and networking at a fixed monthly price, ideal for quickly deploying simple web applications.",avoid:"Never choose Lightsail without evaluating scalability limits. For fast-growing applications, consider migrating to EC2 or ECS from the start."}}},
{en:"Which Amazon S3 storage class is designed for data that is accessed once or twice per quarter and requires retrieval times within 12 hours at the lowest storage cost?",pt:"Qual classe de armazenamento do Amazon S3 é projetada para dados acessados uma ou duas vezes por trimestre e que requer tempos de recuperação de até 12 horas com o menor custo de armazenamento?",o:{en:["S3 Glacier Deep Archive","S3 Glacier Flexible Retrieval","S3 Standard-Infrequent Access","S3 One Zone-Infrequent Access"],pt:["S3 Glacier Deep Archive","S3 Glacier Flexible Retrieval","S3 Standard-Acesso Infrequente","S3 One Zone-Acesso Infrequente"]},a:[0],t:"S3 Storage Classes",exp:{pt:{tech:"O S3 Glacier Deep Archive é a classe de armazenamento mais barata do S3, projetada para retenção de longo prazo de dados acessados raramente, com tempo de recuperação padrão de até 12 horas.",simple:"O S3 Glacier Deep Archive e a classe de armazenamento mais barata do S3, para dados acessados uma ou duas vezes por trimestre com tempo de recuperacao de ate 12 horas.",avoid:"Nunca use Glacier Deep Archive para dados que precisam de acesso rapido. O tempo de restauracao pode ser de ate 12 horas, inadequado para recuperacao urgente."},en:{tech:"S3 Glacier Deep Archive is the lowest-cost S3 storage class, designed for long-term retention of data accessed rarely, with a default retrieval time of up to 12 hours.",simple:"S3 Glacier Deep Archive is the cheapest S3 storage class, for data accessed once or twice per quarter with retrieval times of up to 12 hours.",avoid:"Never use Glacier Deep Archive for data that needs quick access. Restoration time can be up to 12 hours, inadequate for urgent recovery."}}},
{en:"Which EBS volume type provides the highest performance for mission-critical, low-latency transactional workloads such as a large relational database?",pt:"Qual tipo de volume EBS oferece a maior performance para cargas de trabalho transacionais de baixa latência e missão crítica, como um grande banco de dados relacional?",o:{en:["Provisioned IOPS SSD (io2 Block Express)","General Purpose SSD (gp3)","Throughput Optimized HDD (st1)","Cold HDD (sc1)"],pt:["SSD IOPS Provisionado (io2 Block Express)","SSD Uso Geral (gp3)","HDD Throughput Otimizado (st1)","HDD Frio (sc1)"]},a:[0],t:"EBS",exp:{pt:{tech:"Volumes io2 Block Express oferecem até 256.000 IOPS e 4.000 MB/s de throughput com latência sub-milissegundo, sendo o tipo de volume EBS de maior performance para cargas transacionais intensivas.",simple:"O Provisioned IOPS SSD (io2 Block Express) e o tipo de volume EBS de maior desempenho, projetado para cargas criticas que exigem baixa latencia e muitas operacoes por segundo.",avoid:"Nunca use volumes gp2/gp3 para bancos de dados transacionais com alta demanda de IOPS. Provisione io2 Block Express e monitore metricas de latencia e throughput."},en:{tech:"io2 Block Express volumes provide up to 256,000 IOPS and 4,000 MB/s throughput with sub-millisecond latency, making them the highest-performance EBS volume type for intensive transactional workloads.",simple:"Provisioned IOPS SSD (io2 Block Express) is the highest-performance EBS volume type, designed for mission-critical workloads requiring low latency and high IOPS.",avoid:"Never use gp2/gp3 volumes for transactional databases with high IOPS demand. Provision io2 Block Express and monitor latency and throughput metrics."}}},
{en:"A company needs a fully managed file system that is compatible with the Windows Server Message Block (SMB) protocol. Which AWS service should they use?",pt:"Uma empresa precisa de um sistema de arquivos totalmente gerenciado compatível com o protocolo Windows Server Message Block (SMB). Qual serviço da AWS deve ser utilizado?",o:{en:["Amazon FSx for Windows File Server","Amazon EFS","Amazon S3","AWS Storage Gateway"],pt:["Amazon FSx for Windows File Server","Amazon EFS","Amazon S3","AWS Storage Gateway"]},a:[0],t:"S3 General",exp:{pt:{tech:"O Amazon FSx for Windows File Server fornece um sistema de arquivos nativo do Windows totalmente gerenciado, com suporte completo ao protocolo SMB, integração com Active Directory e recursos NTFS.",simple:"O FSx for Windows File Server e um sistema de arquivos gerenciado pela AWS que suporta o protocolo SMB, permitindo acesso nativo de maquinas Windows.",avoid:"Nunca configure FSx for Windows sem integrar ao Active Directory para controle de acesso. Mantenha backups automaticos habilitados e restrinja acesso por security groups."},en:{tech:"Amazon FSx for Windows File Server provides a fully managed native Windows file system with full SMB protocol support, Active Directory integration, and NTFS features.",simple:"FSx for Windows File Server is an AWS-managed file system that supports the SMB protocol, enabling native access from Windows machines.",avoid:"Never configure FSx for Windows without integrating with Active Directory for access control. Keep automatic backups enabled and restrict access by security groups."}}},
{en:"Which AWS database service is a graph database designed for applications that need to work with highly connected datasets, such as social networks or fraud detection?",pt:"Qual serviço de banco de dados da AWS é um banco de dados de grafos projetado para aplicações que precisam trabalhar com conjuntos de dados altamente conectados, como redes sociais ou detecção de fraudes?",o:{en:["Amazon Neptune","Amazon DynamoDB","Amazon Redshift","Amazon ElastiCache"],pt:["Amazon Neptune","Amazon DynamoDB","Amazon Redshift","Amazon ElastiCache"]},a:[0],t:"DynamoDB",exp:{pt:{tech:"O Amazon Neptune é um serviço de banco de dados de grafos totalmente gerenciado que suporta modelos Property Graph e RDF, otimizado para armazenar e consultar bilhões de relacionamentos.",simple:"O Neptune e um banco de dados de grafos gerenciado para aplicacoes que trabalham com conjuntos de dados altamente conectados, como redes sociais e deteccao de fraudes.",avoid:"Nunca tente modelar relacionamentos complexos de grafos em bancos relacionais ou NoSQL. Use Neptune para queries de travessia que envolvem multiplos niveis de conexao."},en:{tech:"Amazon Neptune is a fully managed graph database service supporting Property Graph and RDF models, optimized for storing and querying billions of relationships.",simple:"Neptune is a managed graph database for applications that work with highly connected datasets, such as social networks and fraud detection.",avoid:"Never try to model complex graph relationships in relational or NoSQL databases. Use Neptune for traversal queries involving multiple levels of connections."}}},
{en:"Which TWO features are included in the AWS Business Support plan but NOT in the Developer Support plan? (Choose TWO)",pt:"Quais DOIS recursos estão incluídos no plano AWS Business Support mas NÃO no plano Developer Support? (Escolha DOIS)",o:{en:["24/7 phone access to Cloud Support Engineers","AWS Trusted Advisor full set of checks","Access to a Technical Account Manager","Concierge Support Team access"],pt:["Acesso telefônico 24/7 a Engenheiros de Suporte Cloud","Conjunto completo de verificações do AWS Trusted Advisor","Acesso a um Technical Account Manager","Acesso à Equipe de Suporte Concierge"]},a:[0,1],multi:true,t:"Trusted Advisor",exp:{pt:{tech:"O plano Business Support inclui suporte telefônico 24/7, todas as verificações do Trusted Advisor, e tempos de resposta mais rápidos. TAM e Concierge são exclusivos do plano Enterprise.",simple:"O plano Business inclui acesso telefonico 24/7 a engenheiros de suporte e o conjunto completo de verificacoes do Trusted Advisor, recursos nao disponiveis no plano Developer.",avoid:"Nunca opere workloads de producao com suporte Developer. Business Support oferece acesso 24/7 por telefone e checks completos do Trusted Advisor que sao essenciais."},en:{tech:"The Business Support plan includes 24/7 phone support, all Trusted Advisor checks, and faster response times. TAM and Concierge are exclusive to the Enterprise plan.",simple:"The Business plan includes 24/7 phone access to support engineers and the full set of Trusted Advisor checks, features not available in the Developer plan.",avoid:"Never operate production workloads with Developer support. Business Support offers 24/7 phone access and full Trusted Advisor checks that are essential."}}},
{en:"A company wants to centrally view and manage compliance status across multiple AWS accounts. Which service provides a unified security and compliance dashboard?",pt:"Uma empresa deseja visualizar e gerenciar centralmente o status de conformidade em várias contas AWS. Qual serviço fornece um painel unificado de segurança e conformidade?",o:{en:["AWS Security Hub","Amazon GuardDuty","AWS CloudTrail","Amazon Inspector"],pt:["AWS Security Hub","Amazon GuardDuty","AWS CloudTrail","Amazon Inspector"]},a:[0],t:"GuardDuty",exp:{pt:{tech:"O AWS Security Hub fornece uma visão abrangente do estado de segurança na AWS, agregando alertas de diversos serviços como GuardDuty, Inspector e Macie, e verificando conformidade com padrões do setor.",simple:"O Security Hub centraliza e organiza alertas de seguranca de varios servicos AWS em um unico painel, facilitando a gestao de conformidade em multiplas contas.",avoid:"Nunca gerencie conformidade conta por conta manualmente. Use Security Hub com AWS Organizations para visibilidade centralizada e remediacao automatica."},en:{tech:"AWS Security Hub provides a comprehensive view of the security state across AWS, aggregating alerts from multiple services like GuardDuty, Inspector, and Macie, and checking compliance against industry standards.",simple:"Security Hub centralizes and organizes security alerts from multiple AWS services into a single dashboard, making compliance management across multiple accounts easier.",avoid:"Never manage compliance account by account manually. Use Security Hub with AWS Organizations for centralized visibility and automatic remediation."}}},
{en:"Which AWS service automatically investigates security findings by analyzing log data from sources like VPC Flow Logs, CloudTrail, and GuardDuty to identify the root cause of potential security issues?",pt:"Qual serviço da AWS investiga automaticamente descobertas de segurança analisando dados de log de fontes como VPC Flow Logs, CloudTrail e GuardDuty para identificar a causa raiz de potenciais problemas de segurança?",o:{en:["Amazon Detective","Amazon Macie","AWS Config","AWS Shield"],pt:["Amazon Detective","Amazon Macie","AWS Config","AWS Shield"]},a:[0],t:"VPC & Networking",exp:{pt:{tech:"O Amazon Detective coleta e analisa automaticamente dados de log para criar visualizações interativas que ajudam a analisar, investigar e identificar rapidamente a causa raiz de problemas de segurança.",simple:"O Amazon Detective analisa automaticamente dados de logs do VPC Flow, CloudTrail e GuardDuty para investigar a causa raiz de problemas de seguranca.",avoid:"Nunca ignore findings do Detective apos investigacao. Integre com Security Hub e GuardDuty para criar um fluxo completo de deteccao, investigacao e resposta."},en:{tech:"Amazon Detective automatically collects and analyzes log data to create interactive visualizations that help analyze, investigate, and quickly identify the root cause of security issues.",simple:"Amazon Detective automatically analyzes log data from VPC Flow Logs, CloudTrail, and GuardDuty to investigate the root cause of security issues.",avoid:"Never ignore Detective findings after investigation. Integrate with Security Hub and GuardDuty to create a complete detection, investigation, and response flow."}}},
{en:"A company wants to run containerized applications without managing the underlying EC2 instances or cluster infrastructure. Which AWS service should they choose?",pt:"Uma empresa deseja executar aplicações em contêineres sem gerenciar as instâncias EC2 subjacentes ou a infraestrutura do cluster. Qual serviço da AWS deve ser escolhido?",o:{en:["AWS Fargate","Amazon EC2","Amazon ECS with EC2 launch type","Amazon Lightsail"],pt:["AWS Fargate","Amazon EC2","Amazon ECS com tipo de lançamento EC2","Amazon Lightsail"]},a:[0],t:"EC2 General",exp:{pt:{tech:"O AWS Fargate é um mecanismo de computação serverless para contêineres que funciona com Amazon ECS e EKS, eliminando a necessidade de provisionar e gerenciar servidores.",simple:"O Fargate permite rodar aplicacoes em conteineres sem gerenciar instancias EC2 ou infraestrutura de cluster — voce define o conteiner e o Fargate faz o resto.",avoid:"Nunca rode containers em Fargate sem definir task roles IAM com permissoes minimas. Evite usar a execution role para acesso a recursos de aplicacao."},en:{tech:"AWS Fargate is a serverless compute engine for containers that works with Amazon ECS and EKS, eliminating the need to provision and manage servers.",simple:"Fargate lets you run containerized applications without managing EC2 instances or cluster infrastructure — you define the container and Fargate does the rest.",avoid:"Never run containers on Fargate without defining task IAM roles with minimum permissions. Avoid using the execution role for application resource access."}}},
{en:"Which S3 feature automatically moves objects between storage classes based on access patterns to optimize costs?",pt:"Qual recurso do S3 move automaticamente objetos entre classes de armazenamento com base nos padrões de acesso para otimizar custos?",o:{en:["S3 Intelligent-Tiering","S3 Lifecycle Policies","S3 Replication","S3 Versioning"],pt:["S3 Intelligent-Tiering","Políticas de Ciclo de Vida do S3","Replicação do S3","Versionamento do S3"]},a:[0],t:"S3 Storage Classes",exp:{pt:{tech:"O S3 Intelligent-Tiering monitora automaticamente os padrões de acesso e move objetos entre camadas de acesso frequente e infrequente sem taxas de recuperação ou impacto na performance.",simple:"O S3 Intelligent-Tiering move automaticamente seus objetos entre classes de armazenamento com base nos padroes de acesso, otimizando custos sem intervencao manual.",avoid:"Nunca gerencie transicoes de storage class manualmente. Configure S3 Intelligent-Tiering ou lifecycle policies para otimizar custos automaticamente."},en:{tech:"S3 Intelligent-Tiering automatically monitors access patterns and moves objects between frequent and infrequent access tiers without retrieval fees or performance impact.",simple:"S3 Intelligent-Tiering automatically moves your objects between storage classes based on access patterns, optimizing costs without manual intervention.",avoid:"Never manage storage class transitions manually. Configure S3 Intelligent-Tiering or lifecycle policies to optimize costs automatically."}}},
{en:"What is the MINIMUM number of Availability Zones in any AWS Region?",pt:"Qual é o número MÍNIMO de Zonas de Disponibilidade em qualquer Região da AWS?",o:{en:["3","1","2","4"],pt:["3","1","2","4"]},a:[0],t:"Global Infrastructure",exp:{pt:{tech:"Toda Região AWS possui no mínimo 3 Zonas de Disponibilidade fisicamente separadas e isoladas, conectadas por rede de alta largura de banda e baixa latência.",simple:"Toda Regiao AWS possui no minimo 3 Availability Zones, garantindo que sempre haja locais isolados suficientes para alta disponibilidade.",avoid:"Nunca assuma que uma regiao tem mais ou menos AZs sem verificar. Sempre valide a disponibilidade de AZs ao planejar arquiteturas multi-AZ."},en:{tech:"Every AWS Region has a minimum of 3 physically separate and isolated Availability Zones, connected by high-bandwidth, low-latency networking.",simple:"Every AWS Region has at least 3 Availability Zones, ensuring there are always enough isolated locations for high availability.",avoid:"Never assume a region has more or fewer AZs without checking. Always validate AZ availability when planning multi-AZ architectures."}}},
{en:"Which AWS service enables hybrid cloud storage by providing an on-premises gateway that connects to AWS cloud storage services?",pt:"Qual serviço da AWS permite armazenamento em nuvem híbrida fornecendo um gateway local que se conecta aos serviços de armazenamento em nuvem da AWS?",o:{en:["AWS Storage Gateway","AWS Direct Connect","Amazon S3 Transfer Acceleration","AWS DataSync"],pt:["AWS Storage Gateway","AWS Direct Connect","Amazon S3 Transfer Acceleration","AWS DataSync"]},a:[0],t:"S3 General",exp:{pt:{tech:"O AWS Storage Gateway é um serviço de armazenamento híbrido que oferece acesso local a armazenamento virtualmente ilimitado na nuvem, com cache local para dados acessados frequentemente.",simple:"O Storage Gateway e um servico que conecta seu ambiente local a armazenamento na nuvem AWS, permitindo uma integracao hibrida entre on-premises e a nuvem.",avoid:"Nunca use Storage Gateway sem configurar monitoramento de cache local. Se o cache local encher, o desempenho degrada significativamente para operacoes de leitura."},en:{tech:"AWS Storage Gateway is a hybrid storage service that provides on-premises access to virtually unlimited cloud storage, with local caching for frequently accessed data.",simple:"Storage Gateway is a service that connects your on-premises environment to AWS cloud storage, enabling hybrid integration between on-premises and the cloud.",avoid:"Never use Storage Gateway without configuring local cache monitoring. If the local cache fills up, performance degrades significantly for read operations."}}},
{en:"A company wants to migrate a 50 TB database from on-premises to AWS with minimal downtime. The database must remain operational during migration. Which AWS service is BEST suited for this?",pt:"Uma empresa deseja migrar um banco de dados de 50 TB do local para a AWS com tempo de inatividade mínimo. O banco de dados deve permanecer operacional durante a migração. Qual serviço da AWS é MAIS adequado para isso?",o:{en:["AWS Database Migration Service (DMS)","AWS Snowball Edge","AWS Application Migration Service","AWS Transfer Family"],pt:["AWS Database Migration Service (DMS)","AWS Snowball Edge","AWS Application Migration Service","AWS Transfer Family"]},a:[0],t:"Snow Family",exp:{pt:{tech:"O AWS DMS suporta migrações contínuas com replicação de dados em tempo real (CDC - Change Data Capture), permitindo que o banco de dados de origem permaneça totalmente operacional durante a migração.",simple:"O DMS migra bancos de dados para a AWS com tempo de inatividade minimo, mantendo o banco de origem em funcionamento durante a transferencia dos dados.",avoid:"Nunca migre bancos de producao sem configurar replicacao continua no DMS. Teste a migracao completa em staging e valide a integridade dos dados antes do cutover."},en:{tech:"AWS DMS supports continuous migrations with real-time data replication (CDC - Change Data Capture), allowing the source database to remain fully operational during migration.",simple:"DMS migrates databases to AWS with minimal downtime, keeping the source database operational during data transfer.",avoid:"Never migrate production databases without configuring continuous replication in DMS. Test the full migration in staging and validate data integrity before cutover."}}},
{en:"Which AWS service provides recommendations to help reduce costs, improve performance, enhance security, and increase fault tolerance across your AWS resources?",pt:"Qual serviço da AWS fornece recomendações para ajudar a reduzir custos, melhorar performance, aprimorar segurança e aumentar a tolerância a falhas nos seus recursos AWS?",o:{en:["AWS Trusted Advisor","AWS Config","Amazon CloudWatch","AWS CloudFormation"],pt:["AWS Trusted Advisor","AWS Config","Amazon CloudWatch","AWS CloudFormation"]},a:[0],t:"CloudWatch",exp:{pt:{tech:"O AWS Trusted Advisor inspeciona seu ambiente AWS e faz recomendações em cinco categorias: otimização de custos, performance, segurança, tolerância a falhas e limites de serviço.",simple:"O Trusted Advisor verifica sua conta AWS e oferece recomendacoes para reduzir custos, melhorar desempenho, aumentar seguranca e melhorar tolerancia a falhas.",avoid:"Nunca ignore alertas vermelhos do Trusted Advisor. Priorize recomendacoes de seguranca como security groups abertos e buckets S3 publicos."},en:{tech:"AWS Trusted Advisor inspects your AWS environment and makes recommendations across five categories: cost optimization, performance, security, fault tolerance, and service limits.",simple:"Trusted Advisor checks your AWS account and offers recommendations to reduce costs, improve performance, enhance security, and increase fault tolerance.",avoid:"Never ignore red alerts from Trusted Advisor. Prioritize security recommendations like open security groups and public S3 buckets."}}},
{en:"Which pillar of the AWS Well-Architected Framework focuses on the ability to run workloads effectively, gain insight into operations, and continuously improve processes?",pt:"Qual pilar do AWS Well-Architected Framework foca na capacidade de executar cargas de trabalho de forma eficaz, obter visibilidade das operações e melhorar processos continuamente?",o:{en:["Operational Excellence","Reliability","Performance Efficiency","Sustainability"],pt:["Excelência Operacional","Confiabilidade","Eficiência de Performance","Sustentabilidade"]},a:[0],t:"Well-Architected",exp:{pt:{tech:"O pilar de Excelência Operacional inclui a capacidade de dar suporte ao desenvolvimento, executar cargas de trabalho eficientemente, obter insights operacionais e melhorar processos continuamente.",simple:"O pilar Excelencia Operacional foca em executar cargas de trabalho de forma eficaz, obter visibilidade sobre operacoes e melhorar processos continuamente.",avoid:"Nunca va para producao sem mecanismos de observabilidade. Defina metricas, logs centralizados e alarmes automaticos para detectar problemas antes dos usuarios."},en:{tech:"The Operational Excellence pillar includes the ability to support development, run workloads efficiently, gain operational insights, and continuously improve processes.",simple:"The Operational Excellence pillar focuses on running workloads effectively, gaining insight into operations, and continuously improving processes.",avoid:"Never go to production without observability mechanisms. Define metrics, centralized logs, and automatic alarms to detect problems before users do."}}},
{en:"A company has 80 TB of data on-premises that needs to be transferred to S3 within one week, but their internet connection is only 1 Gbps. Which AWS service should they use?",pt:"Uma empresa tem 80 TB de dados locais que precisam ser transferidos para o S3 em uma semana, mas sua conexão de internet é de apenas 1 Gbps. Qual serviço da AWS deve ser utilizado?",o:{en:["AWS Snowball Edge","AWS Direct Connect","Amazon S3 Transfer Acceleration","AWS DataSync"],pt:["AWS Snowball Edge","AWS Direct Connect","Amazon S3 Transfer Acceleration","AWS DataSync"]},a:[0],t:"Snow Family",exp:{pt:{tech:"O AWS Snowball Edge é um dispositivo físico com capacidade de 80 TB que permite transferir grandes volumes de dados para a AWS sem depender da largura de banda da rede. Com 1 Gbps, transferir 80 TB levaria mais de 7 dias.",simple:"O Snowball Edge e um dispositivo fisico que a AWS envia para voce copiar grandes volumes de dados e devolver, muito mais rapido do que transferir pela internet.",avoid:"Nunca tente transferir dezenas de terabytes pela internet quando o tempo e limitado. Use Snowball Edge para transferencias fisicas que seriam inviaveis pela rede."},en:{tech:"AWS Snowball Edge is a physical device with 80 TB capacity that allows transferring large volumes of data to AWS without relying on network bandwidth. At 1 Gbps, transferring 80 TB would take over 7 days.",simple:"Snowball Edge is a physical device that AWS ships to you so you can copy large volumes of data and send it back, much faster than transferring over the internet.",avoid:"Never try to transfer tens of terabytes over the internet when time is limited. Use Snowball Edge for physical transfers that would be unfeasible over the network."}}},
{en:"Which TWO services can be used to establish a private, dedicated network connection from an on-premises data center to AWS? (Choose TWO)",pt:"Quais DOIS serviços podem ser usados para estabelecer uma conexão de rede privada e dedicada de um data center local para a AWS? (Escolha DOIS)",o:{en:["AWS Direct Connect","AWS Site-to-Site VPN","Amazon CloudFront","AWS Global Accelerator"],pt:["AWS Direct Connect","AWS VPN Site-to-Site","Amazon CloudFront","AWS Global Accelerator"]},a:[0,1],multi:true,t:"CloudFront",exp:{pt:{tech:"O AWS Direct Connect fornece uma conexão física dedicada, enquanto o Site-to-Site VPN cria um túnel criptografado pela internet. Ambos conectam redes on-premises à AWS de forma privada.",simple:"Direct Connect cria uma conexao de rede dedicada e privada, enquanto VPN Site-to-Site cria um tunel criptografado pela internet publica. Ambos conectam seu data center a AWS de forma privada.",avoid:"Nunca dependa de uma unica forma de conectividade com AWS. Combine Direct Connect com Site-to-Site VPN como failover para garantir resiliencia na conexao."},en:{tech:"AWS Direct Connect provides a dedicated physical connection, while Site-to-Site VPN creates an encrypted tunnel over the internet. Both connect on-premises networks to AWS privately.",simple:"Direct Connect creates a dedicated private network connection, while Site-to-Site VPN creates an encrypted tunnel over the public internet. Both connect your data center to AWS privately.",avoid:"Never depend on a single form of connectivity with AWS. Combine Direct Connect with Site-to-Site VPN as failover to ensure connection resilience."}}},
{en:"Which AWS service provides a content delivery network (CDN) that caches content at edge locations to reduce latency for end users?",pt:"Qual serviço da AWS fornece uma rede de entrega de conteúdo (CDN) que armazena conteúdo em cache nos locais de borda para reduzir a latência para os usuários finais?",o:{en:["Amazon CloudFront","AWS Global Accelerator","Amazon Route 53","Elastic Load Balancing"],pt:["Amazon CloudFront","AWS Global Accelerator","Amazon Route 53","Elastic Load Balancing"]},a:[0],t:"CloudFront",exp:{pt:{tech:"O Amazon CloudFront é um serviço de CDN que distribui conteúdo por uma rede global de pontos de presença (edge locations), reduzindo a latência ao servir dados do local mais próximo do usuário.",simple:"O CloudFront e uma rede de distribuicao de conteudo (CDN) que armazena copias do seu conteudo em edge locations ao redor do mundo para reduzir a latencia.",avoid:"Nunca sirva conteudo estatico diretamente do servidor de origem sem CDN. Use CloudFront para reduzir latencia, custos de transferencia e carga no origin."},en:{tech:"Amazon CloudFront is a CDN service that distributes content through a global network of edge locations, reducing latency by serving data from the location closest to the user.",simple:"CloudFront is a content delivery network (CDN) that caches copies of your content at edge locations around the world to reduce latency.",avoid:"Never serve static content directly from the origin server without a CDN. Use CloudFront to reduce latency, transfer costs, and load on the origin."}}},
{en:"A company wants to record all API calls made in their AWS account for auditing and compliance. Which service should they enable?",pt:"Uma empresa deseja registrar todas as chamadas de API feitas em sua conta AWS para auditoria e conformidade. Qual serviço deve ser habilitado?",o:{en:["AWS CloudTrail","Amazon CloudWatch","AWS Config","AWS Systems Manager"],pt:["AWS CloudTrail","Amazon CloudWatch","AWS Config","AWS Systems Manager"]},a:[0],t:"CloudTrail",exp:{pt:{tech:"O AWS CloudTrail registra chamadas de API para sua conta AWS, incluindo quem fez a chamada, de qual endereço IP, quando foi feita e quais parâmetros foram usados.",simple:"O CloudTrail registra todas as chamadas de API na sua conta AWS, criando um rastro de auditoria para conformidade e investigacao de incidentes.",avoid:"Nunca permita que logs do CloudTrail sejam modificados ou deletados. Habilite log file validation, use bucket policies restritivas e ative MFA Delete."},en:{tech:"AWS CloudTrail records API calls for your AWS account, including who made the call, from which IP address, when it was made, and what parameters were used.",simple:"CloudTrail records all API calls in your AWS account, creating an audit trail for compliance and incident investigation.",avoid:"Never allow CloudTrail logs to be modified or deleted. Enable log file validation, use restrictive bucket policies, and activate MFA Delete."}}},
{en:"Which AWS service can synthesize natural-sounding human speech from text in multiple languages?",pt:"Qual serviço da AWS pode sintetizar fala humana com som natural a partir de texto em vários idiomas?",o:{en:["Amazon Polly","Amazon Lex","Amazon Transcribe","Amazon Translate"],pt:["Amazon Polly","Amazon Lex","Amazon Transcribe","Amazon Translate"]},a:[0],t:"AI & ML Services",exp:{pt:{tech:"O Amazon Polly é um serviço de text-to-speech que usa tecnologias avançadas de deep learning para converter texto em fala realista, suportando dezenas de idiomas e vozes.",simple:"O Polly e um servico que converte texto em fala com voz natural em varios idiomas, permitindo criar audio a partir de qualquer texto.",avoid:"Nunca use servicos de IA da AWS sem revisar dados enviados quanto a informacoes sensiveis. Configure opt-out para que seus dados nao sejam usados para treinar modelos."},en:{tech:"Amazon Polly is a text-to-speech service that uses advanced deep learning technologies to convert text into lifelike speech, supporting dozens of languages and voices.",simple:"Polly is a service that converts text to natural-sounding speech in multiple languages, allowing you to create audio from any text.",avoid:"Never use AWS AI services without reviewing submitted data for sensitive information. Configure opt-out so your data is not used to train models."}}},
{en:"What does the Sustainability pillar of the AWS Well-Architected Framework PRIMARILY focus on?",pt:"No que o pilar de Sustentabilidade do AWS Well-Architected Framework foca PRINCIPALMENTE?",o:{en:["Minimizing the environmental impact of running cloud workloads","Ensuring long-term financial sustainability of cloud spending","Maintaining system uptime for sustainable business operations","Building architectures that sustain high traffic loads"],pt:["Minimizar o impacto ambiental da execução de cargas de trabalho em nuvem","Garantir a sustentabilidade financeira de longo prazo dos gastos com nuvem","Manter o tempo de atividade do sistema para operações de negócios sustentáveis","Construir arquiteturas que sustentem altas cargas de tráfego"]},a:[0],t:"Well-Architected",exp:{pt:{tech:"O pilar de Sustentabilidade foca em minimizar os impactos ambientais da execução de cargas de trabalho na nuvem, incluindo dimensionamento eficiente de recursos, maximização da utilização e adoção de hardware eficiente.",simple:"O pilar de Sustentabilidade foca em minimizar o impacto ambiental das cargas de trabalho na nuvem, usando recursos de forma eficiente para reduzir a pegada de carbono.",avoid:"Nunca ignore o impacto ambiental dos seus workloads. Escolha regioes com energia renovavel, dimensione recursos corretamente e desligue ambientes nao produtivos."},en:{tech:"The Sustainability pillar focuses on minimizing environmental impacts of running cloud workloads, including efficient resource sizing, maximizing utilization, and adopting efficient hardware.",simple:"The Sustainability pillar focuses on minimizing the environmental impact of cloud workloads by using resources efficiently to reduce the carbon footprint.",avoid:"Never ignore the environmental impact of your workloads. Choose regions with renewable energy, right-size resources, and shut down non-production environments."}}},
{en:"Which Amazon Aurora feature allows you to create up to 15 read replicas that share the same underlying storage volume, providing high availability and read scaling?",pt:"Qual recurso do Amazon Aurora permite criar até 15 réplicas de leitura que compartilham o mesmo volume de armazenamento subjacente, proporcionando alta disponibilidade e escalabilidade de leitura?",o:{en:["Aurora Replicas","Aurora Multi-Master","Aurora Global Database","Aurora Serverless"],pt:["Réplicas Aurora","Aurora Multi-Master","Aurora Global Database","Aurora Serverless"]},a:[0],t:"RDS",exp:{pt:{tech:"As Aurora Replicas compartilham o mesmo cluster de armazenamento distribuído do Aurora, oferecendo réplicas de leitura com lag de replicação tipicamente abaixo de 10 ms e failover automático.",simple:"Aurora Replicas sao copias de leitura que compartilham o mesmo volume de armazenamento do Aurora principal, permitindo ate 15 replicas para alta disponibilidade e escalabilidade de leitura.",avoid:"Nunca dependa de uma unica replica para alta disponibilidade do Aurora. Configure pelo menos duas Aurora Replicas em AZs diferentes para failover automatico."},en:{tech:"Aurora Replicas share the same Aurora distributed storage cluster, offering read replicas with replication lag typically below 10 ms and automatic failover.",simple:"Aurora Replicas are read copies that share the same storage volume as the primary Aurora instance, allowing up to 15 replicas for high availability and read scaling.",avoid:"Never depend on a single replica for Aurora high availability. Configure at least two Aurora Replicas in different AZs for automatic failover."}}},
{en:"A team needs to automate the building, testing, and deployment of their application code every time a change is pushed to the repository. Which AWS service provides a fully managed continuous integration and continuous delivery pipeline?",pt:"Uma equipe precisa automatizar a construção, teste e implantação do código de sua aplicação toda vez que uma alteração é enviada ao repositório. Qual serviço da AWS fornece um pipeline de integração contínua e entrega contínua totalmente gerenciado?",o:{en:["AWS CodePipeline","AWS CodeBuild","AWS CodeDeploy","AWS CodeCommit"],pt:["AWS CodePipeline","AWS CodeBuild","AWS CodeDeploy","AWS CodeCommit"]},a:[0],t:"Developer Tools",exp:{pt:{tech:"O AWS CodePipeline é um serviço de entrega contínua totalmente gerenciado que orquestra as etapas de build, teste e deploy, integrando-se com CodeCommit, CodeBuild, CodeDeploy e ferramentas de terceiros.",simple:"O CodePipeline automatiza o fluxo completo de construcao, teste e implantacao de codigo a cada mudanca enviada ao repositorio, criando uma pipeline de entrega continua.",avoid:"Nunca faca deploy sem testes automatizados no pipeline. Configure stages de teste e aprovacao manual no CodePipeline antes de qualquer deploy em producao."},en:{tech:"AWS CodePipeline is a fully managed continuous delivery service that orchestrates build, test, and deploy stages, integrating with CodeCommit, CodeBuild, CodeDeploy, and third-party tools.",simple:"CodePipeline automates the full flow of building, testing, and deploying code every time a change is pushed to the repository, creating a continuous delivery pipeline.",avoid:"Never deploy without automated tests in the pipeline. Configure test stages and manual approval in CodePipeline before any production deployment."}}},
{en:"Which VPC component allows resources in a private subnet to access the internet for software updates while preventing inbound connections from the internet?",pt:"Qual componente de VPC permite que recursos em uma sub-rede privada acessem a internet para atualizações de software enquanto impede conexões de entrada da internet?",o:{en:["NAT Gateway","Internet Gateway","Security Group","Network ACL"],pt:["NAT Gateway","Internet Gateway","Security Group","Network ACL"]},a:[0],t:"VPC & Networking",exp:{pt:{tech:"O NAT Gateway permite que instâncias em sub-redes privadas iniciem conexões de saída para a internet enquanto bloqueia tráfego de entrada não solicitado, fornecendo tradução de endereços de rede.",simple:"O NAT Gateway permite que recursos em sub-redes privadas acessem a internet para atualizacoes de software, enquanto bloqueia conexoes vindas da internet.",avoid:"Nunca crie NAT Gateways sem monitorar o trafego de saida. Custos de data transfer pelo NAT Gateway podem crescer rapidamente sem visibilidade adequada."},en:{tech:"NAT Gateway enables instances in private subnets to initiate outbound connections to the internet while blocking unsolicited inbound traffic, providing network address translation.",simple:"A NAT Gateway allows resources in private subnets to access the internet for software updates while blocking inbound connections from the internet.",avoid:"Never create NAT Gateways without monitoring outbound traffic. Data transfer costs through NAT Gateway can grow quickly without adequate visibility."}}},
{en:"Which AWS service allows you to build conversational interfaces (chatbots) using voice and text powered by the same deep learning technologies as Alexa?",pt:"Qual serviço da AWS permite construir interfaces conversacionais (chatbots) usando voz e texto com as mesmas tecnologias de deep learning da Alexa?",o:{en:["Amazon Lex","Amazon Polly","Amazon Comprehend","Amazon Transcribe"],pt:["Amazon Lex","Amazon Polly","Amazon Comprehend","Amazon Transcribe"]},a:[0],t:"AI & ML Services",exp:{pt:{tech:"O Amazon Lex fornece reconhecimento automático de fala (ASR) e compreensão de linguagem natural (NLU) para criar chatbots sofisticados com interfaces de conversa por voz e texto.",simple:"O Lex e um servico para construir interfaces de conversa (chatbots) por voz e texto, usando a mesma tecnologia de deep learning da Alexa.",avoid:"Nunca implante chatbots sem testes extensivos de intencoes e respostas. Valide cenarios de fallback para evitar experiencias frustrantes ao usuario."},en:{tech:"Amazon Lex provides automatic speech recognition (ASR) and natural language understanding (NLU) to build sophisticated chatbots with voice and text conversational interfaces.",simple:"Lex is a service for building conversational interfaces (chatbots) using voice and text, powered by the same deep learning technology as Alexa.",avoid:"Never deploy chatbots without extensive intent and response testing. Validate fallback scenarios to avoid frustrating user experiences."}}},
{en:"Which AWS service would you use to connect multiple VPCs and on-premises networks through a central hub, simplifying network architecture?",pt:"Qual serviço da AWS você usaria para conectar várias VPCs e redes locais por meio de um hub central, simplificando a arquitetura de rede?",o:{en:["AWS Transit Gateway","VPC Peering","AWS Direct Connect","Amazon Route 53"],pt:["AWS Transit Gateway","VPC Peering","AWS Direct Connect","Amazon Route 53"]},a:[0],t:"Route 53",exp:{pt:{tech:"O AWS Transit Gateway atua como um hub de rede regional que conecta VPCs e redes on-premises de forma centralizada, eliminando a complexidade de conexões ponto-a-ponto entre redes.",simple:"O Transit Gateway funciona como um hub central que conecta multiplas VPCs e redes on-premises, simplificando a arquitetura de rede ao eliminar conexoes ponto-a-ponto.",avoid:"Nunca conecte VPCs usando peering individual quando a topologia e complexa. Use Transit Gateway para simplificar o roteamento e reduzir a complexidade operacional."},en:{tech:"AWS Transit Gateway acts as a regional network hub that centrally connects VPCs and on-premises networks, eliminating the complexity of point-to-point connections between networks.",simple:"Transit Gateway works as a central hub that connects multiple VPCs and on-premises networks, simplifying network architecture by eliminating point-to-point connections.",avoid:"Never connect VPCs using individual peering when the topology is complex. Use Transit Gateway to simplify routing and reduce operational complexity."}}},
{en:"A company wants to track whether their AWS resources comply with internal policies, such as ensuring all EBS volumes are encrypted. Which service should they use?",pt:"Uma empresa deseja rastrear se seus recursos AWS estão em conformidade com políticas internas, como garantir que todos os volumes EBS estejam criptografados. Qual serviço deve ser utilizado?",o:{en:["AWS Config","AWS CloudTrail","Amazon CloudWatch","AWS Trusted Advisor"],pt:["AWS Config","AWS CloudTrail","Amazon CloudWatch","AWS Trusted Advisor"]},a:[0],t:"EBS",exp:{pt:{tech:"O AWS Config avalia continuamente as configurações dos recursos AWS em relação a regras definidas, registra o histórico de configurações e notifica sobre alterações ou não conformidades.",simple:"O AWS Config monitora continuamente as configuracoes dos seus recursos AWS e verifica se eles seguem regras que voce definiu, como exigir criptografia em volumes EBS. Ele registra mudancas e sinaliza recursos fora de conformidade.",avoid:"Nunca confie apenas em verificacoes manuais de conformidade. Use AWS Config com regras automatizadas para detectar desvios de politica em tempo real."},en:{tech:"AWS Config continuously evaluates AWS resource configurations against defined rules, records configuration history, and notifies about changes or non-compliance.",simple:"AWS Config continuously monitors your AWS resource configurations and checks if they follow rules you defined, such as requiring encryption on EBS volumes. It records changes and flags non-compliant resources.",avoid:"Never rely solely on manual compliance checks. Use AWS Config with automated rules to detect policy deviations in real time."}}},
{en:"Which pricing tool allows you to estimate the cost of your AWS architecture BEFORE deploying any resources?",pt:"Qual ferramenta de preços permite estimar o custo da sua arquitetura AWS ANTES de implantar qualquer recurso?",o:{en:["AWS Pricing Calculator","AWS Cost Explorer","AWS Budgets","AWS Cost and Usage Report"],pt:["AWS Calculadora de Preços","AWS Cost Explorer","AWS Budgets","AWS Relatório de Custo e Uso"]},a:[0],t:"Cost Management",exp:{pt:{tech:"O AWS Pricing Calculator é uma ferramenta gratuita baseada na web que permite modelar soluções AWS e estimar custos mensais antes de provisionar qualquer recurso.",simple:"O AWS Pricing Calculator permite que voce monte uma estimativa de custos da sua arquitetura AWS antes de criar qualquer recurso. Voce seleciona os servicos, configura as quantidades e ve o custo mensal estimado.",avoid:"Nunca comece a construir infraestrutura sem estimar custos antes. Use o AWS Pricing Calculator para evitar surpresas na fatura."},en:{tech:"The AWS Pricing Calculator is a free web-based tool that lets you model AWS solutions and estimate monthly costs before provisioning any resources.",simple:"AWS Pricing Calculator lets you build a cost estimate for your AWS architecture before creating any resources. You select services, configure quantities, and see the estimated monthly cost.",avoid:"Never start building infrastructure without estimating costs first. Use AWS Pricing Calculator to avoid billing surprises."}}},
{en:"Which TWO characteristics describe Amazon DynamoDB? (Choose TWO)",pt:"Quais DUAS características descrevem o Amazon DynamoDB? (Escolha DUAS)",o:{en:["It is a fully managed NoSQL database service","It provides single-digit millisecond performance at any scale","It uses SQL as its primary query language","It requires you to choose an Availability Zone for placement"],pt:["É um serviço de banco de dados NoSQL totalmente gerenciado","Oferece performance de milissegundos de um dígito em qualquer escala","Usa SQL como linguagem de consulta principal","Exige que você escolha uma Zona de Disponibilidade para posicionamento"]},a:[0,1],multi:true,t:"DynamoDB",exp:{pt:{tech:"O DynamoDB é um banco de dados NoSQL de chave-valor e documentos totalmente gerenciado, com performance consistente de milissegundos de um dígito, escalabilidade automática e replicação multi-AZ integrada.",simple:"O DynamoDB e um banco de dados NoSQL totalmente gerenciado pela AWS, sem necessidade de administrar servidores ou infraestrutura. Ele entrega tempos de resposta de milissegundos de um digito, independentemente da quantidade de dados armazenados.",avoid:"Nunca use DynamoDB sem definir limites de capacidade ou alarmes de custo. Sem controle, a cobranca sob demanda pode escalar rapidamente."},en:{tech:"DynamoDB is a fully managed key-value and document NoSQL database with consistent single-digit millisecond performance, automatic scaling, and built-in multi-AZ replication.",simple:"DynamoDB is a NoSQL database fully managed by AWS, with no need to administer servers or infrastructure. It delivers single-digit millisecond response times regardless of the amount of data stored.",avoid:"Never use DynamoDB without setting capacity limits or cost alarms. Without controls, on-demand billing can escalate quickly."}}},
{en:"Which AWS service provides managed Kubernetes clusters, allowing you to run containerized applications using the Kubernetes orchestration system?",pt:"Qual serviço da AWS fornece clusters Kubernetes gerenciados, permitindo executar aplicações em contêineres usando o sistema de orquestração Kubernetes?",o:{en:["Amazon EKS","Amazon ECS","AWS Fargate","AWS Elastic Beanstalk"],pt:["Amazon EKS","Amazon ECS","AWS Fargate","AWS Elastic Beanstalk"]},a:[0],t:"Fargate",exp:{pt:{tech:"O Amazon EKS (Elastic Kubernetes Service) é um serviço gerenciado que executa o plano de controle Kubernetes em alta disponibilidade, eliminando a necessidade de instalar e operar sua própria infraestrutura Kubernetes.",simple:"O Amazon EKS e um servico gerenciado que roda clusters Kubernetes na AWS sem voce precisar instalar ou manter o plano de controle do Kubernetes. Voce implanta seus containers e o EKS cuida da infraestrutura do Kubernetes.",avoid:"Nunca rode clusters EKS sem configurar RBAC e limitar permissoes dos pods. Evite usar a role de admin do cluster para workloads de aplicacao."},en:{tech:"Amazon EKS (Elastic Kubernetes Service) is a managed service that runs the Kubernetes control plane in high availability, eliminating the need to install and operate your own Kubernetes infrastructure.",simple:"Amazon EKS is a managed service that runs Kubernetes clusters on AWS without you needing to install or maintain the Kubernetes control plane. You deploy your containers and EKS handles the Kubernetes infrastructure.",avoid:"Never run EKS clusters without configuring RBAC and limiting pod permissions. Avoid using the cluster admin role for application workloads."}}},
{en:"Which service enables you to centrally manage patching, configuration, and run commands across a fleet of EC2 instances and on-premises servers?",pt:"Qual serviço permite gerenciar centralmente patches, configuração e executar comandos em uma frota de instâncias EC2 e servidores locais?",o:{en:["AWS Systems Manager","AWS Config","AWS CloudFormation","Amazon CloudWatch"],pt:["AWS Systems Manager","AWS Config","AWS CloudFormation","Amazon CloudWatch"]},a:[0],t:"EC2 General",exp:{pt:{tech:"O AWS Systems Manager fornece uma interface unificada para gerenciar recursos AWS e on-premises, incluindo Patch Manager, Run Command, Parameter Store e Session Manager.",simple:"O AWS Systems Manager permite gerenciar servidores EC2 e on-premises de um unico lugar — aplicar patches, executar comandos remotos e configurar sistemas em larga escala. Tudo sem precisar de SSH direto nas maquinas.",avoid:"Nunca gerencie instancias EC2 manualmente quando o Systems Manager pode automatizar patches e comandos. Evite acesso SSH direto quando o Session Manager esta disponivel."},en:{tech:"AWS Systems Manager provides a unified interface for managing AWS and on-premises resources, including Patch Manager, Run Command, Parameter Store, and Session Manager.",simple:"AWS Systems Manager lets you manage EC2 and on-premises servers from a single place — apply patches, run remote commands, and configure systems at scale. All without needing direct SSH into the machines.",avoid:"Never manage EC2 instances manually when Systems Manager can automate patches and commands. Avoid direct SSH access when Session Manager is available."}}},
{en:"What is an AWS Local Zone designed to provide?",pt:"Para que uma AWS Local Zone foi projetada?",o:{en:["Ultra-low latency compute and storage closer to end users in specific metropolitan areas","A secondary backup region for disaster recovery","Additional Availability Zones within an existing Region","Edge caching for static content delivery"],pt:["Computação e armazenamento com latência ultrabaixa mais perto dos usuários finais em áreas metropolitanas específicas","Uma região secundária de backup para recuperação de desastres","Zonas de Disponibilidade adicionais dentro de uma Região existente","Cache de borda para entrega de conteúdo estático"]},a:[0],t:"CloudFront",exp:{pt:{tech:"As AWS Local Zones colocam computação, armazenamento e serviços selecionados mais perto de grandes centros populacionais, permitindo latência de milissegundos de um dígito para aplicações sensíveis à latência.",simple:"Uma AWS Local Zone e uma extensao de uma regiao AWS posicionada perto de grandes centros urbanos, oferecendo computacao e armazenamento com latencia ultra-baixa para usuarios finais naquela area. Ela fica fisicamente mais perto dos usuarios do que a regiao principal.",avoid:"Nunca assuma que Local Zones tem os mesmos servicos e precos de uma regiao completa. Verifique disponibilidade de servicos antes de arquitetar."},en:{tech:"AWS Local Zones place compute, storage, and select services closer to large population centers, enabling single-digit millisecond latency for latency-sensitive applications.",simple:"An AWS Local Zone is an extension of an AWS Region placed near large metropolitan areas, offering compute and storage with ultra-low latency for end users in that area. It is physically closer to users than the main Region.",avoid:"Never assume Local Zones have the same services and pricing as a full region. Check service availability before architecting."}}},
