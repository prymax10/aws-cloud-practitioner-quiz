{en:"Which services are change management tools for auditing resource changes? (Choose TWO)",pt:"Quais servicos sao ferramentas de gerenciamento de mudancas para auditar alteracoes de recursos? (Escolha DOIS)",o:{en:["AWS CloudTrail","Amazon Comprehend","AWS Transit Gateway","AWS X-Ray","AWS Config"],pt:["AWS CloudTrail","Amazon Comprehend","AWS Transit Gateway","AWS X-Ray","AWS Config"]},a:[0,4],multi:true,t:"Transit Gateway",exp:{pt:{tech:"CloudTrail registra chamadas de API (quem fez o que). AWS Config registra o estado e mudancas de configuracao dos recursos ao longo do tempo. Juntos, oferecem auditoria completa.",simple:"O AWS CloudTrail registra acoes de usuarios e chamadas de API. O AWS Config registra o estado e as mudancas na configuracao dos recursos ao longo do tempo. Juntos, eles fornecem uma visao completa de auditoria.",avoid:"Nunca faca alteracoes em recursos de producao sem auditoria. Use CloudTrail para rastrear quem fez o que e Config para registrar o estado dos recursos ao longo do tempo."},en:{tech:"CloudTrail records API calls (who did what). AWS Config records resource configuration state and changes over time. Together, they provide complete auditing.",simple:"AWS CloudTrail records user actions and API calls. AWS Config records the state and configuration changes of resources over time. Together, they provide a complete audit view.",avoid:"Never make changes to production resources without auditing. Use CloudTrail to track who did what and Config to record resource state over time."}}},
{en:"Which service allows you to run containerized applications on a cluster of EC2 instances?",pt:"Qual servico permite executar aplicacoes em conteineres em um cluster de instancias EC2?",o:{en:["Amazon ECS","AWS Data Pipeline","AWS Cloud9","AWS Personal Health Dashboard"],pt:["Amazon ECS","AWS Data Pipeline","AWS Cloud9","AWS Personal Health Dashboard"]},a:[0],t:"EC2 General",exp:{pt:{tech:"O Amazon ECS (Elastic Container Service) e o servico de orquestracao de conteineres da AWS que gerencia a execucao de conteineres Docker em clusters de instancias EC2 ou Fargate.",simple:"O Amazon ECS e um servico de orquestracao de conteineres que gerencia a execucao de conteineres Docker em um cluster de instancias EC2. Ele cuida do posicionamento, escala e monitoramento dos conteineres.",avoid:"Nunca rode containers sem limites de CPU e memoria definidos. Sempre configure health checks e use imagens de container minimas e escaneadas."},en:{tech:"Amazon ECS (Elastic Container Service) is AWS's container orchestration service that manages Docker container execution on clusters of EC2 instances or Fargate.",simple:"Amazon ECS is a container orchestration service that manages running Docker containers on a cluster of EC2 instances. It handles container placement, scaling, and monitoring.",avoid:"Never run containers without defined CPU and memory limits. Always configure health checks and use minimal, scanned container images."}}},
{en:"Which AWS feature takes advantage of CloudFront's edge locations to transfer files to S3 faster?",pt:"Qual recurso AWS aproveita os edge locations do CloudFront para transferir arquivos para o S3 mais rapido?",o:{en:["S3 Transfer Acceleration","AWS WAF","AWS Snowmobile","AWS Snowball"],pt:["S3 Transfer Acceleration","AWS WAF","AWS Snowmobile","AWS Snowball"]},a:[0],t:"Snow Family",exp:{pt:{tech:"O S3 Transfer Acceleration usa os Edge Locations do CloudFront como pontos de entrada otimizados, roteando dados pela rede interna da AWS (mais rapida) ate o bucket S3 de destino.",simple:"O S3 Transfer Acceleration usa as Edge Locations do CloudFront para acelerar uploads para o S3. Os dados sao enviados para a Edge Location mais proxima e depois transferidos pela rede interna otimizada da AWS.",avoid:"Nunca faca upload de arquivos grandes para S3 sem usar Transfer Acceleration ou multipart upload. Isso reduz tempo e melhora a confiabilidade da transferencia."},en:{tech:"S3 Transfer Acceleration uses CloudFront Edge Locations as optimized entry points, routing data through AWS's internal network (faster) to the destination S3 bucket.",simple:"S3 Transfer Acceleration uses CloudFront Edge Locations to speed up uploads to S3. Data is sent to the nearest Edge Location and then transferred over the optimized AWS internal network.",avoid:"Never upload large files to S3 without using Transfer Acceleration or multipart upload. This reduces time and improves transfer reliability."}}},
{en:"Which AWS security feature filters incoming traffic for an EC2 instance?",pt:"Qual recurso de seguranca AWS filtra o trafego de entrada para uma instancia EC2?",o:{en:["AWS X-Ray","Network ACL","Security Groups","VPC Flow logs"],pt:["AWS X-Ray","Network ACL","Security Groups","VPC Flow logs"]},a:[2],t:"EC2 General",exp:{pt:{tech:"Security Groups atuam como firewalls virtuais no nivel da instancia EC2, controlando trafego de entrada e saida. Sao stateful (se permite entrada, a resposta sai automaticamente). Network ACL e no nivel da sub-rede.",simple:"Security Groups funcionam como um firewall virtual para instancias EC2, controlando o trafego de entrada e saida. Por padrao, todo trafego de entrada e bloqueado e todo trafego de saida e permitido.",avoid:"Nunca deixe Security Groups com portas abertas para 0.0.0.0/0 desnecessariamente. Sempre restrinja o acesso ao minimo necessario por IP e porta."},en:{tech:"Security Groups act as virtual firewalls at the EC2 instance level, controlling inbound and outbound traffic. They're stateful (if inbound is allowed, the response goes out automatically). Network ACL is at the subnet level.",simple:"Security Groups act as a virtual firewall for EC2 instances, controlling inbound and outbound traffic. By default, all inbound traffic is blocked and all outbound traffic is allowed.",avoid:"Never leave Security Groups with ports open to 0.0.0.0/0 unnecessarily. Always restrict access to the minimum necessary by IP and port."}}},
{en:"Where can you store files in AWS? (Choose TWO)",pt:"Onde voce pode armazenar arquivos na AWS? (Escolha DOIS)",o:{en:["Amazon EFS","Amazon SNS","Amazon EBS","Amazon ECS","Amazon EMR"],pt:["Amazon EFS","Amazon SNS","Amazon EBS","Amazon ECS","Amazon EMR"]},a:[0,2],multi:true,t:"EBS",exp:{pt:{tech:"EFS (Elastic File System) e armazenamento de arquivos compartilhado. EBS (Elastic Block Store) e armazenamento em bloco para EC2. SNS e notificacoes, ECS e conteineres, EMR e processamento de big data.",simple:"O Amazon EFS e um sistema de arquivos compartilhado que pode ser montado por multiplas instancias EC2 simultaneamente. O Amazon EBS e um disco de armazenamento em bloco que se conecta a uma unica instancia EC2.",avoid:"Nunca armazene dados persistentes apenas no armazenamento efemero de EC2. Use EBS para dados de instancia e EFS para armazenamento compartilhado entre instancias."},en:{tech:"EFS (Elastic File System) is shared file storage. EBS (Elastic Block Store) is block storage for EC2. SNS is notifications, ECS is containers, EMR is big data processing.",simple:"Amazon EFS is a shared file system that can be mounted by multiple EC2 instances simultaneously. Amazon EBS is a block storage disk that attaches to a single EC2 instance.",avoid:"Never store persistent data only on EC2 ephemeral storage. Use EBS for instance data and EFS for shared storage between instances."}}},
{en:"Which describes the payment model for committing to EC2 usage over 1 or 3-year terms?",pt:"Qual descreve o modelo de pagamento ao se comprometer com o uso de EC2 por 1 ou 3 anos?",o:{en:["Pay less as AWS grows","Pay as you go","Pay less by using more","Save when you reserve"],pt:["Pague menos conforme a AWS cresce","Pague conforme o uso","Pague menos usando mais","Economize ao reservar"]},a:[3],t:"EC2 General",exp:{pt:{tech:"'Save when you reserve' e o principio de precificacao para Reserved Instances e Savings Plans. Ao se comprometer por 1 ou 3 anos, voce recebe descontos significativos sobre On-Demand.",simple:"Reservar capacidade por 1 ou 3 anos garante desconto significativo em troca do compromisso de uso. Quanto maior o pagamento antecipado e o prazo, maior o desconto.",avoid:"Nunca compre Reserved Instances sem analisar o uso historico. Use Cost Explorer para identificar padroes de uso antes de se comprometer com 1 ou 3 anos."},en:{tech:"'Save when you reserve' is the pricing principle for Reserved Instances and Savings Plans. By committing for 1 or 3 years, you get significant discounts over On-Demand.",simple:"Reserving capacity for 1 or 3 years gives significant discounts in exchange for a usage commitment. The higher the upfront payment and the longer the term, the bigger the discount.",avoid:"Never purchase Reserved Instances without analyzing historical usage. Use Cost Explorer to identify usage patterns before committing to 1 or 3 years."}}},
{en:"What is the primary storage service used by Amazon RDS?",pt:"Qual e o servico de armazenamento principal usado pelo Amazon RDS?",o:{en:["Amazon Glacier","Amazon EBS","Amazon EFS","Amazon S3"],pt:["Amazon Glacier","Amazon EBS","Amazon EFS","Amazon S3"]},a:[1],t:"S3 Storage Classes",exp:{pt:{tech:"O Amazon RDS usa volumes EBS (Elastic Block Store) como armazenamento primario para bancos de dados. EBS fornece armazenamento persistente em bloco otimizado para I/O de banco de dados.",simple:"O Amazon EBS e o armazenamento primario usado pelo Amazon RDS para guardar dados do banco. Ele fornece armazenamento em bloco persistente e de alta performance conectado as instancias de banco de dados.",avoid:"Nunca use RDS sem backups automaticos e Multi-AZ para producao. Sempre configure retention de backups adequada e teste restauracoes periodicamente."},en:{tech:"Amazon RDS uses EBS (Elastic Block Store) volumes as primary storage for databases. EBS provides persistent block storage optimized for database I/O.",simple:"Amazon EBS is the primary storage used by Amazon RDS to store database data. It provides persistent, high-performance block storage attached to database instances.",avoid:"Never use RDS without automated backups and Multi-AZ for production. Always configure adequate backup retention and test restores periodically."}}},
{en:"For troubleshooting performance in microservices, which AWS service should be used?",pt:"Para resolver problemas de performance em microsservicos, qual servico AWS deve ser usado?",o:{en:["AWS CodePipeline","AWS X-Ray","Amazon Inspector","AWS CloudTrail"],pt:["AWS CodePipeline","AWS X-Ray","Amazon Inspector","AWS CloudTrail"]},a:[1],t:"Inspector",exp:{pt:{tech:"O AWS X-Ray permite rastrear requisicoes atraves de microsservicos, identificando gargalos de performance e erros. Ele cria um 'mapa de servicos' visual mostrando como os componentes se comunicam.",simple:"O AWS X-Ray ajuda a rastrear requisicoes que passam por multiplos servicos em uma arquitetura de microsservicos. Ele mostra onde estao os gargalos de performance e erros em cada etapa.",avoid:"Nunca tente debugar microsservicos apenas com logs. Use X-Ray para rastreamento distribuido e identifique gargalos de performance entre servicos."},en:{tech:"AWS X-Ray lets you trace requests across microservices, identifying performance bottlenecks and errors. It creates a visual 'service map' showing how components communicate.",simple:"AWS X-Ray helps trace requests that pass through multiple services in a microservices architecture. It shows where performance bottlenecks and errors are at each step.",avoid:"Never try to debug microservices with logs alone. Use X-Ray for distributed tracing and identify performance bottlenecks between services."}}},
{en:"Which AWS services have native Multi-AZ fault tolerance? (Choose TWO)",pt:"Quais servicos AWS tem tolerancia a falhas Multi-AZ nativa? (Escolha DOIS)",o:{en:["Amazon Redshift","AWS Snowball","Amazon S3","Amazon EBS","Amazon DynamoDB"],pt:["Amazon Redshift","AWS Snowball","Amazon S3","Amazon EBS","Amazon DynamoDB"]},a:[2,4],multi:true,t:"Snow Family",exp:{pt:{tech:"S3 e DynamoDB sao projetados nativamente para armazenar dados em multiplas AZs automaticamente. EBS e limitado a uma unica AZ. Redshift precisa de configuracao manual para Multi-AZ.",simple:"O Amazon S3 e o Amazon DynamoDB replicam dados automaticamente em multiplas Zonas de Disponibilidade dentro de uma Regiao. Voce nao precisa configurar nada para ter essa redundancia.",avoid:"Nunca assuma que todos os servicos AWS sao Multi-AZ por padrao. Verifique a documentacao de cada servico e configure redundancia explicitamente quando necessario."},en:{tech:"S3 and DynamoDB are natively designed to store data across multiple AZs automatically. EBS is limited to a single AZ. Redshift needs manual Multi-AZ configuration.",simple:"Amazon S3 and Amazon DynamoDB automatically replicate data across multiple Availability Zones within a Region. You do not need to configure anything to have this redundancy.",avoid:"Never assume all AWS services are Multi-AZ by default. Check each service documentation and configure redundancy explicitly when needed."}}},
{en:"Using Amazon EC2 falls under which cloud computing model?",pt:"Usar o Amazon EC2 se enquadra em qual modelo de computacao em nuvem?",o:{en:["IaaS & SaaS","IaaS","SaaS","PaaS"],pt:["IaaS e SaaS","IaaS","SaaS","PaaS"]},a:[1],t:"EC2 General",exp:{pt:{tech:"O EC2 e Infrastructure as a Service (IaaS) — voce gerencia o SO, aplicacoes e dados. A AWS fornece a infraestrutura (servidores virtuais, rede, armazenamento).",simple:"O EC2 e um servico de Infrastructure as a Service (IaaS) porque a AWS fornece a maquina virtual e voce e responsavel por instalar e configurar o sistema operacional e aplicacoes. Voce tem controle total sobre a instancia.",avoid:"Nunca use IaaS sem automatizar o provisionamento e configuracao. Use ferramentas de IaC para gerenciar instancias EC2 de forma reproduzivel."},en:{tech:"EC2 is Infrastructure as a Service (IaaS) — you manage the OS, applications, and data. AWS provides the infrastructure (virtual servers, network, storage).",simple:"EC2 is an Infrastructure as a Service (IaaS) offering because AWS provides the virtual machine and you are responsible for installing and configuring the operating system and applications. You have full control over the instance.",avoid:"Never use IaaS without automating provisioning and configuration. Use IaC tools to manage EC2 instances in a reproducible way."}}},
{en:"What does Amazon Elastic Beanstalk provide?",pt:"O que o Amazon Elastic Beanstalk fornece?",o:{en:["PaaS solution to automate application deployment","Compute engine for Amazon ECS","Scalable file storage","NoSQL database service"],pt:["Solucao PaaS para automatizar a implantacao de aplicacoes","Motor de computacao para Amazon ECS","Armazenamento de arquivos escalavel","Servico de banco de dados NoSQL"]},a:[0],t:"ECS",exp:{pt:{tech:"O Elastic Beanstalk e um servico PaaS que automatiza a implantacao: voce sobe o codigo e ele cuida de provisionamento, balanceamento de carga, auto scaling e monitoramento.",simple:"O Amazon Elastic Beanstalk e um servico PaaS que implanta e gerencia aplicacoes automaticamente. Voce faz upload do codigo e ele provisiona servidores, balanceamento de carga, escala e monitoramento.",avoid:"Nunca use Elastic Beanstalk sem entender as configuracoes padrao de rede e seguranca. Sempre revise Security Groups e variaveis de ambiente criadas automaticamente."},en:{tech:"Elastic Beanstalk is a PaaS service that automates deployment: you upload your code and it handles provisioning, load balancing, auto scaling, and monitoring.",simple:"Amazon Elastic Beanstalk is a PaaS service that deploys and manages applications automatically. You upload your code and it provisions servers, load balancing, scaling, and monitoring.",avoid:"Never use Elastic Beanstalk without understanding default network and security configurations. Always review auto-created Security Groups and environment variables."}}},
{en:"Which AWS service performs automated vulnerability assessments of EC2 instances?",pt:"Qual servico AWS realiza avaliacoes automatizadas de vulnerabilidades em instancias EC2?",o:{en:["Amazon Kinesis","Security groups","Amazon Inspector","AWS Network ACLs"],pt:["Amazon Kinesis","Security groups","Amazon Inspector","AWS Network ACLs"]},a:[2],t:"EC2 General",exp:{pt:{tech:"O Amazon Inspector analisa automaticamente instancias EC2 e imagens de conteiner em busca de vulnerabilidades de software e exposicoes de rede nao intencionais.",simple:"O Amazon Inspector analisa automaticamente instancias EC2 em busca de vulnerabilidades de seguranca e desvios de boas praticas. Ele gera relatorios com as descobertas e nivel de severidade.",avoid:"Nunca ignore os findings do Amazon Inspector. Priorize e corrija vulnerabilidades criticas rapidamente e automatize scans regulares."},en:{tech:"Amazon Inspector automatically analyzes EC2 instances and container images for software vulnerabilities and unintended network exposures.",simple:"Amazon Inspector automatically scans EC2 instances for security vulnerabilities and deviations from best practices. It generates reports with findings and severity levels.",avoid:"Never ignore Amazon Inspector findings. Prioritize and fix critical vulnerabilities quickly and automate regular scans."}}},
{en:"Which Savings Plans compute services are available? (Choose TWO)",pt:"Quais servicos de computacao estao disponiveis nos Savings Plans? (Escolha DOIS)",o:{en:["AWS Batch","AWS Outposts","Amazon Lightsail","Amazon EC2","AWS Lambda"],pt:["AWS Batch","AWS Outposts","Amazon Lightsail","Amazon EC2","AWS Lambda"]},a:[3,4],multi:true,t:"EC2 Pricing",exp:{pt:{tech:"Compute Savings Plans aplicam-se a EC2, Lambda e Fargate. Batch usa EC2 por baixo mas nao e um servico coberto diretamente. Lightsail tem seu proprio modelo de precificacao.",simple:"Os Savings Plans cobrem servicos de computacao EC2 e Lambda. Ao se comprometer com um valor de uso por hora durante 1 ou 3 anos, voce recebe descontos significativos nesses servicos.",avoid:"Nunca pague preco On-Demand para workloads estaveis e previsiveis. Avalie Savings Plans para EC2 e Lambda para economizar ate 72% nos custos."},en:{tech:"Compute Savings Plans apply to EC2, Lambda, and Fargate. Batch uses EC2 underneath but isn't a directly covered service. Lightsail has its own pricing model.",simple:"Savings Plans cover EC2 and Lambda compute services. By committing to an hourly usage amount for 1 or 3 years, you receive significant discounts on these services.",avoid:"Never pay On-Demand pricing for stable and predictable workloads. Evaluate Savings Plans for EC2 and Lambda to save up to 72% on costs."}}},
{en:"What is the recommended best practice for protecting workloads from natural disasters?",pt:"Qual e a melhor pratica recomendada para proteger cargas de trabalho contra desastres naturais?",o:{en:["Replicate across Edge Locations with CloudFront failover","Deploy across multiple AZs in same region","Create point-in-time backups in another subnet","Deploy to another AWS Region with Active-Active strategy"],pt:["Replicar entre Edge Locations com failover do CloudFront","Implantar em multiplas AZs na mesma regiao","Criar backups point-in-time em outra sub-rede","Implantar em outra Regiao AWS com estrategia Active-Active"]},a:[3],t:"CloudFront",exp:{pt:{tech:"Desastres naturais podem afetar uma regiao inteira. Somente Multi-Region (outra regiao geografica) protege contra isso. Multi-AZ protege contra falha de datacenter, nao de regiao.",simple:"Para proteger contra desastres naturais, implante sua aplicacao em outra Regiao AWS com estrategia Active-Active. Isso garante que se uma regiao inteira ficar indisponivel, a outra continua atendendo.",avoid:"Nunca confie em uma unica regiao para disaster recovery. Implemente estrategia multi-Region com replicacao de dados e testes regulares de failover."},en:{tech:"Natural disasters can affect an entire region. Only Multi-Region (another geographic region) protects against that. Multi-AZ protects against datacenter failure, not regional failure.",simple:"To protect against natural disasters, deploy your application to another AWS Region with an Active-Active strategy. This ensures that if an entire region becomes unavailable, the other continues serving.",avoid:"Never rely on a single region for disaster recovery. Implement a multi-Region strategy with data replication and regular failover testing."}}},
{en:"Which AWS tool enables script-based management of all AWS services?",pt:"Qual ferramenta AWS permite o gerenciamento baseado em scripts de todos os servicos AWS?",o:{en:["AWS Console","AWS Service Catalog","AWS OpsWorks","AWS CLI"],pt:["AWS Console","AWS Service Catalog","AWS OpsWorks","AWS CLI"]},a:[3],t:"General",exp:{pt:{tech:"A AWS CLI (Command Line Interface) permite interagir com todos os servicos AWS via terminal usando comandos e scripts. Ideal para automacao e operacoes em lote.",simple:"A AWS CLI e uma ferramenta de linha de comando que permite gerenciar todos os servicos AWS pelo terminal. Voce pode automatizar tarefas criando scripts que executam comandos da AWS.",avoid:"Nunca execute comandos AWS CLI sem configurar credenciais seguras. Use perfis nomeados, session tokens e nunca armazene credenciais em texto plano em scripts."},en:{tech:"The AWS CLI (Command Line Interface) lets you interact with all AWS services via terminal using commands and scripts. Ideal for automation and batch operations.",simple:"The AWS CLI is a command-line tool that lets you manage all AWS services through the terminal. You can automate tasks by creating scripts that execute AWS commands.",avoid:"Never execute AWS CLI commands without configuring secure credentials. Use named profiles, session tokens, and never store credentials in plain text in scripts."}}},
{en:"Which connectivity options build hybrid cloud architectures? (Choose TWO)",pt:"Quais opcoes de conectividade constroem arquiteturas de nuvem hibrida? (Escolha DUAS)",o:{en:["AWS Artifact","AWS Cloud9","AWS Direct Connect","AWS CloudTrail","AWS VPN"],pt:["AWS Artifact","AWS Cloud9","AWS Direct Connect","AWS CloudTrail","AWS VPN"]},a:[2,4],multi:true,t:"Direct Connect",exp:{pt:{tech:"Direct Connect (conexao fisica dedicada) e VPN (tunel criptografado pela internet) sao as duas formas de conectar seu datacenter on-premises a AWS, criando uma arquitetura hibrida.",simple:"O AWS Direct Connect cria uma conexao fisica privada entre seu datacenter e a AWS. O AWS VPN cria um tunel criptografado pela internet publica. Ambos conectam sua infraestrutura local a nuvem (nuvem hibrida).",avoid:"Nunca dependa de uma unica conexao hibrida. Sempre tenha redundancia com VPN como backup do Direct Connect ou vice-versa para garantir disponibilidade."},en:{tech:"Direct Connect (dedicated physical connection) and VPN (encrypted tunnel over internet) are the two ways to connect your on-premises datacenter to AWS, creating a hybrid architecture.",simple:"AWS Direct Connect creates a private physical connection between your datacenter and AWS. AWS VPN creates an encrypted tunnel over the public internet. Both connect your on-premises infrastructure to the cloud (hybrid cloud).",avoid:"Never depend on a single hybrid connection. Always have redundancy with VPN as backup for Direct Connect or vice-versa to ensure availability."}}},
{en:"Which MySQL-compatible relational database has automatic capacity scaling?",pt:"Qual banco de dados relacional compativel com MySQL tem escalabilidade automatica de capacidade?",o:{en:["Amazon Neptune","Amazon Aurora","Amazon RDS for SQL Server","Amazon RDS for PostgreSQL"],pt:["Amazon Neptune","Amazon Aurora","Amazon RDS for SQL Server","Amazon RDS for PostgreSQL"]},a:[1],t:"RDS",exp:{pt:{tech:"O Amazon Aurora e compativel com MySQL e PostgreSQL, com armazenamento que escala automaticamente de 10GB ate 128TB. Oferece ate 5x a performance do MySQL padrao.",simple:"O Amazon Aurora e um banco de dados relacional compativel com MySQL e PostgreSQL que escala a capacidade de armazenamento automaticamente. Ele oferece performance ate cinco vezes maior que o MySQL padrao.",avoid:"Nunca use Aurora sem configurar replicas de leitura para alta disponibilidade. Sempre monitore o auto-scaling de capacidade e configure alarmes para custos."},en:{tech:"Amazon Aurora is compatible with MySQL and PostgreSQL, with storage that auto-scales from 10GB to 128TB. It offers up to 5x the performance of standard MySQL.",simple:"Amazon Aurora is a relational database compatible with MySQL and PostgreSQL that scales storage capacity automatically. It offers performance up to five times greater than standard MySQL.",avoid:"Never use Aurora without configuring read replicas for high availability. Always monitor capacity auto-scaling and configure cost alarms."}}},
{en:"Which is the AWS data warehouse service for high-performance queries on large datasets?",pt:"Qual e o servico de data warehouse da AWS para consultas de alta performance em grandes conjuntos de dados?",o:{en:["Amazon Redshift","Amazon Kinesis","Amazon DynamoDB","Amazon RDS"],pt:["Amazon Redshift","Amazon Kinesis","Amazon DynamoDB","Amazon RDS"]},a:[0],t:"RDS",exp:{pt:{tech:"O Amazon Redshift e o servico de data warehouse da AWS, otimizado para analise de dados em escala de petabytes com armazenamento colunar e processamento paralelo massivo (MPP).",simple:"O Amazon Redshift e um servico de data warehouse otimizado para consultas analiticas em grandes volumes de dados. Ele processa petabytes de dados para gerar relatorios e analises de negocio.",avoid:"Nunca execute queries pesadas diretamente em bancos de producao. Use Redshift para analytics e separe cargas OLTP de OLAP para proteger a performance."},en:{tech:"Amazon Redshift is AWS's data warehouse service, optimized for petabyte-scale data analysis with columnar storage and massively parallel processing (MPP).",simple:"Amazon Redshift is a data warehouse service optimized for analytical queries on large data volumes. It processes petabytes of data to generate business reports and analytics.",avoid:"Never run heavy queries directly on production databases. Use Redshift for analytics and separate OLTP from OLAP workloads to protect performance."}}},
{en:"How are Linux-based Amazon EC2 instances billed?",pt:"Como as instancias Amazon EC2 baseadas em Linux sao cobradas?",o:{en:["One-second increments, minimum one minute","One-hour increments, minimum one day","One-minute increments, minimum one hour","One-day increments, minimum one month"],pt:["Incrementos de um segundo, minimo de um minuto","Incrementos de uma hora, minimo de um dia","Incrementos de um minuto, minimo de uma hora","Incrementos de um dia, minimo de um mes"]},a:[0],t:"EC2 General",exp:{pt:{tech:"Instancias EC2 Linux sao cobradas por segundo com minimo de 60 segundos. Instancias Windows sao cobradas por hora. Isso foi uma mudanca importante em 2017.",simple:"Instancias EC2 baseadas em Linux sao cobradas por segundo, com cobranca minima de um minuto. Isso significa que voce paga apenas pelo tempo exato de uso apos o primeiro minuto.",avoid:"Nunca esqueca que EC2 Linux cobra por segundo. Otimize o tempo de execucao de workloads batch e desligue instancias imediatamente apos o uso."},en:{tech:"EC2 Linux instances are billed per second with a 60-second minimum. Windows instances are billed per hour. This was an important change in 2017.",simple:"Linux-based EC2 instances are billed per second, with a minimum charge of one minute. This means you pay only for the exact time used after the first minute.",avoid:"Never forget that EC2 Linux charges per second. Optimize batch workload execution time and shut down instances immediately after use."}}},
{en:"In AWS Organizations, what restricts services and actions allowed per account?",pt:"No AWS Organizations, o que restringe servicos e acoes permitidos por conta?",o:{en:["IAM Principals","AWS Service Control Policies","IAM policies","AWS Fargate"],pt:["IAM Principals","AWS Service Control Policies (SCPs)","IAM policies","AWS Fargate"]},a:[1],t:"Fargate",exp:{pt:{tech:"SCPs (Service Control Policies) definem o limite maximo de permissoes para contas em uma organizacao. Mesmo que uma IAM policy permita algo, o SCP pode bloquear. SCPs nao concedem permissoes, apenas restringem.",simple:"SCP (Service Control Policies) sao regras que definem o limite maximo de permissoes para todas as contas dentro de uma organizacao AWS. Mesmo que um usuario tenha permissoes via IAM, o SCP pode bloquear essa acao na conta inteira.",avoid:"Nunca crie SCPs sem testar em contas de sandbox primeiro. Politicas restritivas demais podem bloquear servicos criticos e causar incidentes."},en:{tech:"SCPs (Service Control Policies) define the maximum permissions boundary for accounts in an organization. Even if an IAM policy allows something, the SCP can block it. SCPs don't grant permissions, only restrict.",simple:"SCP (Service Control Policies) set the maximum permission boundaries for all accounts in an AWS Organization. Even if a user has IAM permissions, the SCP can block that action across the entire account.",avoid:"Never create SCPs without testing in sandbox accounts first. Overly restrictive policies can block critical services and cause incidents."}}},
{en:"What is the minimum AWS support level providing 24x7 access to technical engineers?",pt:"Qual e o nivel minimo de suporte AWS que fornece acesso 24x7 a engenheiros tecnicos?",o:{en:["Enterprise Support","Developer Support","Basic Support","Business Support"],pt:["Enterprise Support","Developer Support","Basic Support","Business Support"]},a:[3],t:"Support Plans",exp:{pt:{tech:"Business Support e o nivel minimo com acesso 24x7 a engenheiros por telefone, chat e email. Developer oferece suporte so em horario comercial por email. Basic nao tem suporte tecnico.",simple:"Business Support e o nivel minimo de suporte AWS que oferece acesso 24 horas por dia, 7 dias por semana, a engenheiros tecnicos por telefone, chat e email.",avoid:"Nunca opere workloads criticos sem um plano de suporte adequado. Sem Business Support ou superior, voce nao tera acesso 24x7 a engenheiros para incidentes graves."},en:{tech:"Business Support is the minimum level with 24x7 access to engineers via phone, chat, and email. Developer offers support only during business hours via email. Basic has no technical support.",simple:"Business Support is the minimum AWS support tier that provides 24/7 access to technical engineers via phone, chat, and email.",avoid:"Never run critical workloads without an adequate support plan. Without Business Support or higher, you will not have 24x7 access to engineers for serious incidents."}}},
{en:"Which of the following is NOT correct regarding Amazon EC2 On-demand instances?",pt:"Qual das seguintes afirmacoes NAO esta correta sobre instancias EC2 On-Demand?",o:{en:["You have to pay a start-up fee when launching a new instance","The on-demand instances follow the AWS pay-as-you-go pricing model","No longer-term commitments or upfront payments are needed","You are charged per second based on an hourly rate"],pt:["Voce precisa pagar uma taxa inicial ao lancar uma nova instancia","As instancias on-demand seguem o modelo de precificacao pay-as-you-go","Nao sao necessarios compromissos de longo prazo ou pagamentos antecipados","Voce e cobrado por segundo com base em uma taxa por hora"]},a:[0],t:"EC2 Pricing",exp:{pt:{tech:"EC2 On-Demand nao tem taxa inicial (start-up fee). Voce paga apenas pelo tempo de uso, sem compromissos. Esse e justamente o diferencial do modelo pay-as-you-go.",simple:"Instancias EC2 On-Demand nao tem taxa de inicializacao ou compromisso minimo. Voce paga somente pelo tempo de uso, sem custos antecipados.",avoid:"Nunca assuma que EC2 On-Demand tem taxas ocultas de inicializacao. Entenda o modelo de cobranca por segundo ou hora para evitar surpresas na fatura."},en:{tech:"EC2 On-Demand has no start-up fee. You pay only for usage time, with no commitments. That's exactly the point of the pay-as-you-go model.",simple:"EC2 On-Demand instances have no start-up fee or minimum commitment. You only pay for the time you use them, with no upfront costs.",avoid:"Never assume EC2 On-Demand has hidden startup fees. Understand the per-second or per-hour billing model to avoid billing surprises."}}},
{en:"Which is a best-practice when designing solutions on AWS?",pt:"Qual e uma melhor pratica ao projetar solucoes na AWS?",o:{en:["Invest heavily in architecting your environment as it is hard to change later","Use reservations to reduce costs when testing your production environment","Automate wherever possible to make architectural experimentation easier","Provision large compute capacity to handle any spikes in load"],pt:["Investir pesado na arquitetura pois e dificil mudar depois","Usar reservas para reduzir custos ao testar seu ambiente de producao","Automatizar sempre que possivel para facilitar a experimentacao de arquitetura","Provisionar grande capacidade computacional para lidar com picos de carga"]},a:[2],t:"General",exp:{pt:{tech:"A AWS incentiva automacao (IaC com CloudFormation/Terraform) para facilitar experimentacao, replicacao e iteracao rapida de arquiteturas. Diferente de on-premises, e facil mudar na nuvem.",simple:"Automatizar processos na AWS permite testar diferentes arquiteturas rapidamente e com baixo custo, facilitando a experimentacao e a melhoria continua.",avoid:"Nunca faca mudancas manuais repetitivas na infraestrutura. Automatize com IaC para garantir reprodutibilidade e reduzir erro humano."},en:{tech:"AWS encourages automation (IaC with CloudFormation/Terraform) to enable experimentation, replication, and fast architecture iteration. Unlike on-premises, changing in the cloud is easy.",simple:"Automating processes on AWS allows you to test different architectures quickly and at low cost, making experimentation and continuous improvement easier.",avoid:"Never make repetitive manual infrastructure changes. Automate with IaC to ensure reproducibility and reduce human error."}}},
{en:"According to the AWS Acceptable Use Policy, which statement is true regarding penetration testing of EC2 instances?",pt:"De acordo com a Politica de Uso Aceitavel da AWS, qual afirmacao e verdadeira sobre testes de penetracao em instancias EC2?",o:{en:["Penetration testing is not allowed in AWS","Penetration testing is performed automatically by AWS","Penetration testing can be performed by the customer on their own instances without prior authorization","Customers are only allowed to test services managed by AWS"],pt:["Testes de penetracao nao sao permitidos na AWS","Testes de penetracao sao realizados automaticamente pela AWS","Testes de penetracao podem ser realizados pelo cliente em suas proprias instancias sem autorizacao previa","Clientes so podem testar servicos gerenciados pela AWS"]},a:[2],t:"EC2 General",exp:{pt:{tech:"Desde 2019, a AWS permite testes de penetracao em 8 servicos (incluindo EC2) sem necessidade de aprovacao previa. Antes era necessario solicitar permissao.",simple:"A AWS permite que clientes realizem testes de penetracao em suas proprias instancias EC2 sem precisar de autorizacao previa.",avoid:"Nunca realize testes de penetracao em recursos AWS que nao sao seus. Teste apenas suas proprias instancias e siga a politica de uso aceitavel da AWS."},en:{tech:"Since 2019, AWS allows penetration testing on 8 services (including EC2) without prior approval. Previously, permission was required.",simple:"AWS allows customers to perform penetration testing on their own EC2 instances without needing prior authorization.",avoid:"Never perform penetration testing on AWS resources you do not own. Only test your own instances and follow the AWS acceptable use policy."}}},
{en:"Which of the following design principles helps achieve high availability?",pt:"Quais dos seguintes principios de design ajudam a alcancar alta disponibilidade? (Escolha DOIS)",o:{en:["Multi-factor authentication","Availability Zones","Elastic Load Balancing","Penetration testing","Vertical Scaling"],pt:["Autenticacao multi-fator","Zonas de Disponibilidade","Elastic Load Balancing","Testes de penetracao","Escalabilidade Vertical"]},a:[1,2],multi:true,t:"Auto Scaling",exp:{pt:{tech:"AZs fornecem redundancia geografica dentro de uma regiao. ELB distribui trafego entre instancias saudaveis em multiplas AZs. Juntos, garantem que a falha de um componente nao derrube o sistema.",simple:"Usar multiplas Availability Zones com Elastic Load Balancing distribui o trafego entre zonas diferentes, garantindo que a aplicacao continue funcionando mesmo se uma zona falhar.",avoid:"Nunca implante aplicacoes em uma unica Availability Zone. Distribua recursos em pelo menos duas AZs e use balanceadores de carga para alta disponibilidade."},en:{tech:"AZs provide geographic redundancy within a region. ELB distributes traffic across healthy instances in multiple AZs. Together, they ensure a single component failure doesn't bring down the system.",simple:"Using multiple Availability Zones with Elastic Load Balancing distributes traffic across different zones, ensuring the application keeps running even if one zone fails.",avoid:"Never deploy applications in a single Availability Zone. Distribute resources across at least two AZs and use load balancers for high availability."}}},
{en:"A company has moved to AWS recently. Which services will help ensure proper security settings? (Choose TWO)",pt:"Uma empresa migrou recentemente para a AWS. Quais servicos ajudam a garantir configuracoes de seguranca adequadas? (Escolha DOIS)",o:{en:["AWS Trusted Advisor","Amazon Inspector","Amazon SNS","Amazon CloudWatch","Concierge Support Team"],pt:["AWS Trusted Advisor","Amazon Inspector","Amazon SNS","Amazon CloudWatch","Concierge Support Team"]},a:[0,1],multi:true,t:"Inspector",exp:{pt:{tech:"Trusted Advisor verifica boas praticas em seguranca, custo, performance e tolerancia a falhas. Inspector faz varreduras automatizadas de vulnerabilidades em EC2. Juntos cobrem recomendacoes e deteccao.",simple:"Trusted Advisor analisa sua conta AWS e faz recomendacoes de seguranca, custo e performance. Amazon Inspector avalia vulnerabilidades de seguranca em suas instancias EC2 e aplicacoes.",avoid:"Nunca ignore as recomendacoes do Trusted Advisor e do Inspector. Configure alertas automaticos para findings de seguranca e aja rapidamente sobre vulnerabilidades."},en:{tech:"Trusted Advisor checks best practices for security, cost, performance, and fault tolerance. Inspector runs automated vulnerability scans on EC2. Together they cover recommendations and detection.",simple:"Trusted Advisor analyzes your AWS account and makes recommendations on security, cost, and performance. Amazon Inspector assesses security vulnerabilities in your EC2 instances and applications.",avoid:"Never ignore Trusted Advisor and Inspector recommendations. Set up automated alerts for security findings and act quickly on vulnerabilities."}}},
{en:"What is the AWS serverless service that allows you to run applications without administrative burden?",pt:"Qual e o servico serverless da AWS que permite executar aplicacoes sem carga administrativa?",o:{en:["Amazon LightSail","AWS Lambda","Amazon RDS","Amazon EC2"],pt:["Amazon LightSail","AWS Lambda","Amazon RDS","Amazon EC2"]},a:[1],t:"EC2 General",exp:{pt:{tech:"O AWS Lambda e um servico de computacao serverless que executa codigo em resposta a eventos. Voce nao gerencia servidores — so sobe o codigo e define os gatilhos.",simple:"AWS Lambda executa codigo em resposta a eventos sem que voce precise provisionar ou gerenciar servidores. Voce paga apenas pelo tempo de execucao do codigo.",avoid:"Nunca coloque segredos ou credenciais diretamente no codigo de funcoes Lambda. Use variaveis de ambiente criptografadas ou AWS Secrets Manager."},en:{tech:"AWS Lambda is a serverless compute service that runs code in response to events. You don't manage servers — just upload code and define triggers.",simple:"AWS Lambda runs code in response to events without you needing to provision or manage servers. You pay only for the code execution time.",avoid:"Never put secrets or credentials directly in Lambda function code. Use encrypted environment variables or AWS Secrets Manager."}}},
{en:"Three EC2 instances crashed but no customers were affected. What did the architect build?",pt:"Tres instancias EC2 falharam mas nenhum cliente foi afetado. O que o arquiteto construiu?",o:{en:["An elastic system","A fault tolerant system","An encrypted system","A scalable system"],pt:["Um sistema elastico","Um sistema tolerante a falhas","Um sistema criptografado","Um sistema escalavel"]},a:[1],t:"EC2 General",exp:{pt:{tech:"Tolerancia a falhas (fault tolerance) significa que o sistema continua operando normalmente mesmo quando componentes falham. Diferente de alta disponibilidade, que minimiza o tempo de inatividade.",simple:"Um sistema tolerante a falhas continua funcionando normalmente mesmo quando componentes falham, sem impacto para os usuarios finais.",avoid:"Nunca confie em uma unica instancia para cargas criticas. Projete sistemas tolerantes a falhas com redundancia automatica para que falhas nao afetem usuarios."},en:{tech:"Fault tolerance means the system continues operating normally even when components fail. Different from high availability, which minimizes downtime.",simple:"A fault-tolerant system continues operating normally even when components fail, with no impact on end users.",avoid:"Never rely on a single instance for critical workloads. Design fault-tolerant systems with automatic redundancy so failures do not affect users."}}},
{en:"What is the benefit of consolidated billing in AWS Organizations?",pt:"Qual e o beneficio do faturamento consolidado no AWS Organizations?",o:{en:["AWS services cost half the original price","The feature is just for organizational purposes","Each account gets volume discounts","Each account gets five times the free-tier capacity"],pt:["Os servicos AWS custam metade do preco original","O recurso e apenas para fins organizacionais","Cada conta recebe descontos por volume","Cada conta recebe cinco vezes a capacidade do free tier"]},a:[2],t:"Cost Management",exp:{pt:{tech:"O faturamento consolidado agrega o uso de todas as contas da organizacao, permitindo que atinjam os limites de desconto por volume mais rapidamente. O uso combinado beneficia todas as contas.",simple:"Com faturamento consolidado no AWS Organizations, o uso de todas as contas e somado, permitindo que cada conta se beneficie de descontos por volume.",avoid:"Nunca mantenha contas AWS isoladas fora do Organizations. Use faturamento consolidado para obter descontos por volume e visibilidade centralizada de custos."},en:{tech:"Consolidated billing aggregates usage from all organization accounts, allowing them to reach volume discount tiers faster. Combined usage benefits all accounts.",simple:"With consolidated billing in AWS Organizations, usage from all accounts is combined, allowing each account to benefit from volume discounts.",avoid:"Never keep AWS accounts isolated outside Organizations. Use consolidated billing to get volume discounts and centralized cost visibility."}}},
{en:"Which service can store and reliably deliver messages across distributed systems?",pt:"Qual servico pode armazenar e entregar mensagens de forma confiavel entre sistemas distribuidos?",o:{en:["Amazon Simple Queue Service","AWS Storage Gateway","Amazon Simple Email Service","Amazon Simple Storage Service"],pt:["Amazon Simple Queue Service","AWS Storage Gateway","Amazon Simple Email Service","Amazon Simple Storage Service"]},a:[0],t:"Storage Gateway",exp:{pt:{tech:"O Amazon SQS (Simple Queue Service) permite desacoplar e escalar microsservicos atraves de filas de mensagens. As mensagens sao armazenadas redundantemente ate serem consumidas.",simple:"Amazon SQS e um servico de filas de mensagens que armazena mensagens de forma confiavel ate que o sistema destinatario esteja pronto para processa-las.",avoid:"Nunca processe mensagens sem configurar Dead Letter Queues no SQS. Mensagens nao processadas podem ser perdidas permanentemente sem DLQ."},en:{tech:"Amazon SQS (Simple Queue Service) lets you decouple and scale microservices through message queues. Messages are stored redundantly until consumed.",simple:"Amazon SQS is a message queuing service that reliably stores messages until the receiving system is ready to process them.",avoid:"Never process messages without configuring Dead Letter Queues in SQS. Unprocessed messages can be permanently lost without a DLQ."}}},
{en:"A company migrating a database to Amazon RDS should minimize costs by:",pt:"Uma empresa migrando um banco de dados para o Amazon RDS deve minimizar custos com:",o:{en:["Right-sizing before and after migration","Using Multi-Region Active-Passive architecture","Combining On-demand Capacity Reservations with Savings Plans","Using Multi-Region Active-Active architecture"],pt:["Dimensionamento correto antes e depois da migracao","Usar arquitetura Multi-Region Active-Passive","Combinar Reservas de Capacidade On-demand com Savings Plans","Usar arquitetura Multi-Region Active-Active"]},a:[0],t:"EC2 Pricing",exp:{pt:{tech:"Right-sizing significa escolher o tipo e tamanho de instancia adequados a carga real. Provisionar mais do que necessario gera desperdicio. Monitorar e ajustar apos a migracao e essencial.",simple:"Right-sizing significa escolher o tipo e tamanho de instancia adequados para a carga de trabalho real, tanto antes quanto depois da migracao, evitando pagar por recursos desnecessarios.",avoid:"Nunca migre bancos de dados para RDS sem analisar o dimensionamento correto. Instancias superdimensionadas geram custos desnecessarios."},en:{tech:"Right-sizing means choosing the instance type and size appropriate for actual workload. Over-provisioning wastes money. Monitoring and adjusting after migration is essential.",simple:"Right-sizing means choosing the appropriate instance type and size for the actual workload, both before and after migration, avoiding paying for unnecessary resources.",avoid:"Never migrate databases to RDS without analyzing proper sizing. Oversized instances generate unnecessary costs."}}},
{en:"Which Amazon RDS features improve database availability? (Choose TWO)",pt:"Quais recursos do Amazon RDS melhoram a disponibilidade do banco de dados? (Escolha DOIS)",o:{en:["AWS Regions","Multi-AZ Deployment","Automatic patching","Read Replicas","Edge Locations"],pt:["AWS Regions","Implantacao Multi-AZ","Patching automatico","Read Replicas","Edge Locations"]},a:[1,3],multi:true,t:"RDS",exp:{pt:{tech:"Multi-AZ cria uma replica sincrona em outra AZ para failover automatico. Read Replicas criam copias assincrona para leitura, distribuindo carga e servindo como backup de disponibilidade.",simple:"Multi-AZ Deployment cria uma copia do banco em outra zona de disponibilidade para failover automatico. Read Replicas criam copias somente leitura para distribuir a carga de consultas.",avoid:"Nunca opere bancos RDS de producao sem Multi-AZ habilitado. Sem Multi-AZ, uma falha na AZ primaria causa indisponibilidade total do banco."},en:{tech:"Multi-AZ creates a synchronous replica in another AZ for automatic failover. Read Replicas create asynchronous copies for reading, distributing load and serving as availability backup.",simple:"Multi-AZ Deployment creates a database copy in another availability zone for automatic failover. Read Replicas create read-only copies to distribute query load.",avoid:"Never run production RDS databases without Multi-AZ enabled. Without Multi-AZ, a primary AZ failure causes total database unavailability."}}},
{en:"To reduce latency for Asian users of an application hosted in Northern California, what should you do?",pt:"Para reduzir a latencia de usuarios asiaticos de uma aplicacao hospedada no Norte da California, o que voce deve fazer?",o:{en:["Replicate resources across multiple AZs in same region","Migrate to an Asian hosting provider","Recreate website content","Create a CDN using CloudFront for edge caching"],pt:["Replicar recursos em multiplas AZs na mesma regiao","Migrar para um provedor de hospedagem asiatico","Recriar o conteudo do site","Criar um CDN usando CloudFront para cache de borda"]},a:[3],t:"CloudFront",exp:{pt:{tech:"O CloudFront armazena conteudo em Edge Locations proximas aos usuarios asiaticos, reduzindo latencia sem precisar mover a aplicacao. E a solucao mais simples e eficiente.",simple:"CloudFront e uma CDN que armazena copias do conteudo em pontos de presenca ao redor do mundo, entregando dados a partir do local mais proximo ao usuario para reduzir a latencia.",avoid:"Nunca sirva conteudo estatico diretamente de servidores de origem para usuarios distantes. Use CloudFront para reduzir latencia com cache em pontos de borda."},en:{tech:"CloudFront caches content at Edge Locations near Asian users, reducing latency without moving the application. It's the simplest and most efficient solution.",simple:"CloudFront is a CDN that caches copies of content at edge locations around the world, delivering data from the location closest to the user to reduce latency.",avoid:"Never serve static content directly from origin servers to distant users. Use CloudFront to reduce latency with edge caching."}}},
{en:"What should be considered during TCO analysis comparing AWS versus on-premises costs?",pt:"O que deve ser considerado na analise de TCO comparando custos AWS versus on-premises?",o:{en:["Application development","Market research","Business analysis","Physical hardware"],pt:["Desenvolvimento de aplicacoes","Pesquisa de mercado","Analise de negocios","Hardware fisico"]},a:[3],t:"Pricing Models",exp:{pt:{tech:"O TCO (Total Cost of Ownership) on-premises inclui custos de hardware fisico, energia, refrigeracao, espaco fisico, pessoal de manutencao — custos eliminados ou reduzidos na nuvem.",simple:"Na analise de TCO, voce deve incluir o custo de hardware fisico do ambiente on-premises, pois esse e um custo significativo que nao existe na nuvem.",avoid:"Nunca compare custos AWS apenas com o preco de servidores. Inclua custos de data center, energia, refrigeracao, pessoal e manutencao na analise TCO."},en:{tech:"On-premises TCO (Total Cost of Ownership) includes physical hardware costs, power, cooling, physical space, maintenance staff — costs eliminated or reduced in the cloud.",simple:"In a TCO analysis, you must include the cost of physical hardware in the on-premises environment, as this is a significant cost that does not exist in the cloud.",avoid:"Never compare AWS costs only with server prices. Include data center, power, cooling, staffing, and maintenance costs in the TCO analysis."}}},
{en:"Which connectivity option uses IPSec for encrypted on-premises to AWS connection?",pt:"Qual opcao de conectividade usa IPSec para conexao criptografada entre on-premises e AWS?",o:{en:["Internet Gateway","AWS IQ","AWS Direct Connect","AWS Site-to-Site VPN"],pt:["Internet Gateway","AWS IQ","AWS Direct Connect","AWS Site-to-Site VPN"]},a:[3],t:"VPC & Networking",exp:{pt:{tech:"O AWS Site-to-Site VPN cria um tunel IPSec criptografado entre seu datacenter e a VPC da AWS pela internet publica. Direct Connect e uma conexao fisica dedicada (nao usa IPSec nativamente).",simple:"AWS Site-to-Site VPN cria uma conexao criptografada com IPSec entre sua rede local e a AWS usando a internet publica.",avoid:"Nunca deixe tuneis VPN Site-to-Site sem monitoramento. Configure alarmes para verificar o status do tunel e tenha redundancia com dois tuneis ativos."},en:{tech:"AWS Site-to-Site VPN creates an IPSec encrypted tunnel between your datacenter and AWS VPC over the public internet. Direct Connect is a dedicated physical connection (doesn't natively use IPSec).",simple:"AWS Site-to-Site VPN creates an IPSec-encrypted connection between your on-premises network and AWS using the public internet.",avoid:"Never leave Site-to-Site VPN tunnels unmonitored. Set up alarms to check tunnel status and ensure redundancy with two active tunnels."}}},
{en:"Which services can be used to control network traffic in AWS? (Choose TWO)",pt:"Quais servicos podem ser usados para controlar trafego de rede na AWS? (Escolha DOIS)",o:{en:["Network Access Control Lists","Key Pairs","Access Keys","IAM Policies","Security Groups"],pt:["Listas de Controle de Acesso de Rede","Key Pairs","Chaves de Acesso","Politicas IAM","Security Groups"]},a:[0,4],multi:true,t:"VPC & Networking",exp:{pt:{tech:"Network ACLs operam no nivel da sub-rede (stateless). Security Groups operam no nivel da instancia (stateful). Ambos controlam trafego de rede de entrada e saida na VPC.",simple:"Security Groups controlam o trafego no nivel da instancia, enquanto Network ACLs controlam o trafego no nivel da sub-rede. Ambos filtram conexoes de entrada e saida na rede AWS.",avoid:"Nunca configure Security Groups ou NACLs permitindo todo o trafego de entrada. Aplique o principio de menor privilegio em todas as regras de rede."},en:{tech:"Network ACLs operate at the subnet level (stateless). Security Groups operate at the instance level (stateful). Both control inbound and outbound network traffic in the VPC.",simple:"Security Groups control traffic at the instance level, while Network ACLs control traffic at the subnet level. Both filter inbound and outbound connections in the AWS network.",avoid:"Never configure Security Groups or NACLs allowing all inbound traffic. Apply the principle of least privilege to all network rules."}}},
{en:"Which AWS service provides the current status of all AWS Services in all Regions?",pt:"Qual servico AWS mostra o status atual de todos os servicos AWS em todas as Regioes?",o:{en:["AWS Service Health Dashboard","AWS Management Console","Amazon CloudWatch","AWS Personal Health Dashboard"],pt:["AWS Service Health Dashboard","AWS Management Console","Amazon CloudWatch","AWS Personal Health Dashboard"]},a:[0],t:"CloudWatch",exp:{pt:{tech:"O AWS Service Health Dashboard mostra o status de todos os servicos em todas as regioes publicamente. O Personal Health Dashboard mostra eventos que afetam especificamente sua conta.",simple:"O AWS Service Health Dashboard mostra o status atual de todos os servicos AWS em todas as regioes, de forma publica e em tempo real.",avoid:"Nunca ignore alertas do AWS Service Health Dashboard. Configure notificacoes automaticas para eventos que afetem seus servicos e regioes."},en:{tech:"The AWS Service Health Dashboard shows the status of all services across all regions publicly. The Personal Health Dashboard shows events specifically affecting your account.",simple:"The AWS Service Health Dashboard shows the current status of all AWS services across all regions, publicly and in real time.",avoid:"Never ignore AWS Service Health Dashboard alerts. Set up automatic notifications for events affecting your services and regions."}}},
{en:"Which AWS service enables you to make calls to AWS services from different programming languages?",pt:"Qual servico AWS permite fazer chamadas a servicos AWS a partir de diferentes linguagens de programacao?",o:{en:["AWS Software Development Kit","AWS Command Line Interface","AWS CodeDeploy","AWS Management Console"],pt:["AWS Software Development Kit","AWS Command Line Interface","AWS CodeDeploy","AWS Management Console"]},a:[0],t:"Developer Tools",exp:{pt:{tech:"O AWS SDK (Software Development Kit) fornece bibliotecas para interagir com servicos AWS em diversas linguagens como Python (boto3), JavaScript, Java, Go, .NET, etc.",simple:"O AWS SDK fornece bibliotecas para diversas linguagens de programacao, permitindo que voce interaja com servicos AWS diretamente pelo codigo da sua aplicacao.",avoid:"Nunca inclua credenciais AWS diretamente no codigo da aplicacao ao usar o SDK. Use IAM Roles, variaveis de ambiente ou profiles configurados."},en:{tech:"The AWS SDK (Software Development Kit) provides libraries to interact with AWS services in various languages like Python (boto3), JavaScript, Java, Go, .NET, etc.",simple:"The AWS SDK provides libraries for multiple programming languages, allowing you to interact with AWS services directly from your application code.",avoid:"Never include AWS credentials directly in application code when using the SDK. Use IAM Roles, environment variables, or configured profiles."}}},
{en:"Which AWS service can be used for registering new domain names?",pt:"Qual servico AWS pode ser usado para registrar novos nomes de dominio?",o:{en:["Amazon Personalize","Amazon Route 53","AWS KMS","AWS Config"],pt:["Amazon Personalize","Amazon Route 53","AWS KMS","AWS Config"]},a:[1],t:"Route 53",exp:{pt:{tech:"O Amazon Route 53 alem de ser um servico DNS, tambem permite registrar e gerenciar nomes de dominio diretamente pela AWS, sem precisar de um registrador externo.",simple:"Amazon Route 53 e o servico de DNS da AWS que tambem permite registrar e gerenciar nomes de dominio diretamente.",avoid:"Nunca registre dominios sem configurar DNSSEC e protecao contra transferencia. Ative o auto-renew para evitar perda acidental do dominio."},en:{tech:"Amazon Route 53 besides being a DNS service, also lets you register and manage domain names directly through AWS, without needing an external registrar.",simple:"Amazon Route 53 is the AWS DNS service that also allows you to register and manage domain names directly.",avoid:"Never register domains without configuring DNSSEC and transfer protection. Enable auto-renew to prevent accidental domain loss."}}},
{en:"Which AWS automation tools help deploy applications faster? (Choose TWO)",pt:"Quais ferramentas de automacao AWS ajudam a implantar aplicacoes mais rapido? (Escolha DOIS)",o:{en:["AWS CloudFormation","AWS Migration Hub","AWS IAM","AWS Elastic Beanstalk","Amazon Macie"],pt:["AWS CloudFormation","AWS Migration Hub","AWS IAM","AWS Elastic Beanstalk","Amazon Macie"]},a:[0,3],multi:true,t:"Elastic Beanstalk",exp:{pt:{tech:"CloudFormation permite definir infraestrutura como codigo (IaC) em templates YAML/JSON. Elastic Beanstalk automatiza deploy, scaling e monitoramento de aplicacoes. Ambos aceleram implantacoes.",simple:"CloudFormation define infraestrutura como codigo usando templates, criando recursos automaticamente. Elastic Beanstalk faz deploy de aplicacoes automaticamente, provisionando a infraestrutura necessaria.",avoid:"Nunca faca deploys manuais em producao. Use CloudFormation ou Elastic Beanstalk para garantir deploys reprodutiveis e com possibilidade de rollback."},en:{tech:"CloudFormation lets you define infrastructure as code (IaC) in YAML/JSON templates. Elastic Beanstalk automates deployment, scaling, and monitoring. Both speed up deployments.",simple:"CloudFormation defines infrastructure as code using templates, creating resources automatically. Elastic Beanstalk deploys applications automatically, provisioning the necessary infrastructure.",avoid:"Never do manual deployments to production. Use CloudFormation or Elastic Beanstalk to ensure reproducible deployments with rollback capability."}}},
{en:"Which AWS service provides cost-optimization recommendations?",pt:"Qual servico AWS fornece recomendacoes de otimizacao de custos?",o:{en:["AWS Trusted Advisor","AWS Pricing Calculator","Amazon QuickSight","AWS X-Ray"],pt:["AWS Trusted Advisor","AWS Pricing Calculator","Amazon QuickSight","AWS X-Ray"]},a:[0],t:"Trusted Advisor",exp:{pt:{tech:"O AWS Trusted Advisor analisa seu ambiente e oferece recomendacoes em 5 categorias: custo, performance, seguranca, tolerancia a falhas e limites de servico.",simple:"AWS Trusted Advisor analisa sua conta e oferece recomendacoes para otimizar custos, melhorar performance, aumentar seguranca e melhorar tolerancia a falhas.",avoid:"Nunca ignore recomendacoes de custo do Trusted Advisor. Revise regularmente para eliminar recursos ociosos e redimensionar instancias subutilizadas."},en:{tech:"AWS Trusted Advisor analyzes your environment and offers recommendations in 5 categories: cost, performance, security, fault tolerance, and service limits.",simple:"AWS Trusted Advisor analyzes your account and provides recommendations to optimize costs, improve performance, enhance security, and improve fault tolerance.",avoid:"Never ignore Trusted Advisor cost recommendations. Review regularly to eliminate idle resources and right-size underutilized instances."}}},
{en:"Which service simplifies connection management among hundreds of VPCs across multiple regions?",pt:"Qual servico simplifica o gerenciamento de conexoes entre centenas de VPCs em multiplas regioes?",o:{en:["VPC Peering","AWS Transit Gateway","Amazon Connect","Security Groups"],pt:["VPC Peering","AWS Transit Gateway","Amazon Connect","Security Groups"]},a:[1],t:"Transit Gateway",exp:{pt:{tech:"O AWS Transit Gateway atua como um hub central para conectar multiplas VPCs e redes on-premises. Sem ele, seria necessario criar conexoes ponto-a-ponto (peering) entre cada par de VPCs.",simple:"AWS Transit Gateway funciona como um ponto central de conexao que interliga centenas de VPCs e redes on-premises, simplificando a gestao de rede em larga escala.",avoid:"Nunca gerencie conectividade entre muitas VPCs com peerings individuais. Use Transit Gateway para simplificar topologia e reduzir complexidade operacional."},en:{tech:"AWS Transit Gateway acts as a central hub to connect multiple VPCs and on-premises networks. Without it, you'd need point-to-point connections (peering) between each VPC pair.",simple:"AWS Transit Gateway works as a central connection point that interconnects hundreds of VPCs and on-premises networks, simplifying network management at scale.",avoid:"Never manage connectivity between many VPCs with individual peerings. Use Transit Gateway to simplify topology and reduce operational complexity."}}},
{en:"Why does every AWS Region contain multiple Availability Zones?",pt:"Por que toda Regiao AWS contem multiplas Zonas de Disponibilidade?",o:{en:["Build resilient and highly available architectures","Results in lower total cost than a single AZ","Allows data replication and global reach","Increases storage capacity in the region"],pt:["Construir arquiteturas resilientes e altamente disponiveis","Resulta em custo total menor que uma unica AZ","Permite replicacao de dados e alcance global","Aumenta a capacidade de armazenamento na regiao"]},a:[0],t:"Pricing Models",exp:{pt:{tech:"Multiplas AZs dentro de uma Regiao permitem implantar recursos de forma redundante. Se uma AZ falhar, as outras continuam operando, garantindo alta disponibilidade sem sair da regiao.",simple:"Cada regiao AWS tem multiplas Availability Zones (datacenters fisicamente separados) para que voce possa construir aplicacoes resilientes que continuam funcionando mesmo se uma zona falhar.",avoid:"Nunca use apenas uma AZ achando que ela e suficiente. Cada regiao tem multiplas AZs justamente para que voce distribua recursos e tenha resiliencia."},en:{tech:"Multiple AZs within a Region allow deploying resources redundantly. If one AZ fails, others continue operating, ensuring high availability without leaving the region.",simple:"Each AWS Region has multiple Availability Zones (physically separated data centers) so you can build resilient applications that keep running even if one zone fails.",avoid:"Never use just one AZ thinking it is sufficient. Each region has multiple AZs precisely so you can distribute resources and have resilience."}}},
{en:"Which of the following procedures will help reduce your Amazon S3 costs?",pt:"Qual dos seguintes procedimentos ajudara a reduzir seus custos do Amazon S3?",o:{en:["Use Import/Export to move old files to Glacier","Use the right combination of storage classes based on use cases","Pick the right Availability Zone for your S3 bucket","Move all S3 data to EBS"],pt:["Usar Import/Export para mover arquivos antigos para o Glacier","Usar a combinacao certa de classes de armazenamento baseado nos casos de uso","Escolher a Zona de Disponibilidade certa para seu bucket S3","Mover todos os dados do S3 para o EBS"]},a:[1],t:"S3 Storage Classes",exp:{pt:{tech:"S3 tem varias classes (Standard, IA, Glacier, Deep Archive) com precos diferentes. Usar a classe certa para cada padrao de acesso otimiza custos. S3 Lifecycle policies podem automatizar a transicao.",simple:"Usar as classes de armazenamento corretas do S3 para cada tipo de dado reduz custos. Dados acessados raramente devem ficar em classes mais baratas, e dados frequentes em classes de acesso rapido.",avoid:"Nunca armazene todos os dados no S3 Standard sem avaliar o padrao de acesso. Use lifecycle policies para mover dados antigos para classes mais baratas."},en:{tech:"S3 has multiple classes (Standard, IA, Glacier, Deep Archive) with different prices. Using the right class for each access pattern optimizes costs. S3 Lifecycle policies can automate transitions.",simple:"Using the right S3 storage classes for each type of data reduces costs. Rarely accessed data should be in cheaper classes, and frequently accessed data in fast-access classes.",avoid:"Never store all data in S3 Standard without evaluating access patterns. Use lifecycle policies to move old data to cheaper storage classes."}}},
{en:"What does the AWS Well-Architected Framework's Reliability pillar focus on?",pt:"No que o pilar de Confiabilidade do AWS Well-Architected Framework se concentra?",o:{en:["Protecting data and systems from unauthorized access","Recovering from failures and meeting demand","Reducing costs through right-sizing","Monitoring and improving operational processes"],pt:["Proteger dados e sistemas contra acesso nao autorizado","Recuperar-se de falhas e atender a demanda","Reduzir custos atraves do dimensionamento correto","Monitorar e melhorar processos operacionais"]},a:[1],t:"CloudWatch",exp:{pt:{tech:"O pilar Reliability foca na capacidade do sistema de se recuperar de falhas, escalar dinamicamente e mitigar disruptcoes. Inclui design para falha, backups e testes de recuperacao.",simple:"O pilar de Confiabilidade do Well-Architected Framework foca na capacidade do sistema de se recuperar de falhas e atender a demanda de forma consistente.",avoid:"Nunca ignore testes de recuperacao de desastres. Valide regularmente backups e procedimentos de failover para garantir que a recuperacao funcione quando necessario."},en:{tech:"The Reliability pillar focuses on the system's ability to recover from failures, dynamically scale, and mitigate disruptions. It includes design for failure, backups, and recovery testing.",simple:"The Reliability pillar of the Well-Architected Framework focuses on the system ability to recover from failures and meet demand consistently.",avoid:"Never skip disaster recovery testing. Regularly validate backups and failover procedures to ensure recovery works when needed."}}},
{en:"Which of the following AWS services provides managed relational database with automated backups?",pt:"Qual dos seguintes servicos AWS fornece banco de dados relacional gerenciado com backups automatizados?",o:{en:["A MySQL database installed on an EC2 instance","Amazon Aurora","Amazon DynamoDB","Amazon Neptune"],pt:["Um banco MySQL instalado numa instancia EC2","Amazon Aurora","Amazon DynamoDB","Amazon Neptune"]},a:[1],t:"EC2 General",exp:{pt:{tech:"O Amazon Aurora e um banco relacional gerenciado compativel com MySQL/PostgreSQL que inclui backups automatizados, replicacao Multi-AZ e recuperacao point-in-time. EC2 com MySQL e nao-gerenciado.",simple:"Amazon Aurora e um banco de dados relacional gerenciado pela AWS com backups automaticos, compativel com MySQL e PostgreSQL, oferecendo alta disponibilidade sem esforco manual.",avoid:"Nunca opere Aurora de producao sem backups automaticos e replicas. Configure retention de backups adequada e monitore a saude das replicas."},en:{tech:"Amazon Aurora is a managed relational database compatible with MySQL/PostgreSQL that includes automated backups, Multi-AZ replication, and point-in-time recovery. EC2 with MySQL is unmanaged.",simple:"Amazon Aurora is a managed relational database by AWS with automated backups, compatible with MySQL and PostgreSQL, offering high availability without manual effort.",avoid:"Never run production Aurora without automated backups and replicas. Configure adequate backup retention and monitor replica health."}}},
{en:"Which AWS service helps you manage infrastructure as code?",pt:"Qual servico AWS ajuda a gerenciar infraestrutura como codigo?",o:{en:["AWS CloudFormation","AWS Config","Amazon SES","Amazon EMR"],pt:["AWS CloudFormation","AWS Config","Amazon SES","Amazon EMR"]},a:[0],t:"AWS Config",exp:{pt:{tech:"O AWS CloudFormation permite definir e provisionar toda a infraestrutura AWS usando templates JSON ou YAML. Voce versiona, replica e destrói ambientes inteiros com um comando.",simple:"AWS CloudFormation permite criar e gerenciar recursos AWS usando arquivos de template (YAML ou JSON), tratando infraestrutura como codigo versionavel e repetivel.",avoid:"Nunca faca mudancas manuais em infraestrutura que ja e gerenciada por CloudFormation. Alteracoes fora do template causam drift e problemas futuros."},en:{tech:"AWS CloudFormation lets you define and provision all AWS infrastructure using JSON or YAML templates. You version, replicate, and destroy entire environments with one command.",simple:"AWS CloudFormation lets you create and manage AWS resources using template files (YAML or JSON), treating infrastructure as versionable and repeatable code.",avoid:"Never make manual changes to infrastructure already managed by CloudFormation. Changes outside the template cause drift and future problems."}}},
{en:"Under the shared responsibility model, what is the responsibility of AWS?",pt:"No modelo de responsabilidade compartilhada, o que e responsabilidade da AWS?",o:{en:["Client-side encryption","Configuring infrastructure devices","Server-side encryption","Filtering traffic with Security Groups"],pt:["Criptografia do lado do cliente","Configurar dispositivos de infraestrutura","Criptografia do lado do servidor","Filtrar trafego com Security Groups"]},a:[1],t:"VPC & Networking",exp:{pt:{tech:"A AWS e responsavel por configurar e manter os dispositivos de infraestrutura fisica (switches, roteadores, firewalls de rede). O cliente configura Security Groups, criptografia e seus dados.",simple:"A AWS e responsavel por configurar e manter os dispositivos de infraestrutura fisica, como servidores, rede e datacenters. O cliente nao precisa se preocupar com essa camada.",avoid:"Nunca tente acessar ou modificar a infraestrutura fisica da AWS. Seguranca fisica e responsabilidade exclusiva da AWS no modelo de responsabilidade compartilhada."},en:{tech:"AWS is responsible for configuring and maintaining physical infrastructure devices (switches, routers, network firewalls). The customer configures Security Groups, encryption, and their data.",simple:"AWS is responsible for configuring and maintaining physical infrastructure devices such as servers, networking, and data centers. The customer does not need to worry about this layer.",avoid:"Never try to access or modify AWS physical infrastructure. Physical security is the sole responsibility of AWS under the shared responsibility model."}}},
{en:"What does AWS Health Dashboard provide? (Choose TWO)",pt:"O que o AWS Health Dashboard fornece? (Escolha DOIS)",o:{en:["Detailed troubleshooting guidance for AWS events","Health checks for Auto Scaling instances","Recommendations for Cost Optimization","Dashboard detailing application vulnerabilities","Personalized view of AWS service health"],pt:["Orientacao detalhada para solucao de problemas de eventos AWS","Verificacoes de saude para instancias Auto Scaling","Recomendacoes de Otimizacao de Custos","Dashboard detalhando vulnerabilidades de aplicacoes","Visao personalizada da saude dos servicos AWS"]},a:[0,4],multi:true,t:"Auto Scaling",exp:{pt:{tech:"O AWS Health Dashboard oferece uma visao personalizada de eventos que afetam sua conta e orientacoes de troubleshooting. Diferente do Service Health Dashboard (publico), ele e especifico para voce.",simple:"O AWS Health Dashboard oferece orientacoes detalhadas para resolver problemas de servicos AWS e uma visao personalizada da saude dos servicos que voce usa.",avoid:"Nunca ignore eventos personalizados do AWS Health Dashboard. Configure EventBridge para acionar alertas automaticos quando houver eventos que afetem suas contas."},en:{tech:"AWS Health Dashboard provides a personalized view of events affecting your account and troubleshooting guidance. Unlike the Service Health Dashboard (public), it's specific to you.",simple:"The AWS Health Dashboard provides detailed troubleshooting guidance for AWS service events and a personalized view of the health of services you use.",avoid:"Never ignore personalized AWS Health Dashboard events. Configure EventBridge to trigger automatic alerts when there are events affecting your accounts."}}},
{en:"Which AWS service monitors performance of EC2 instances for troubleshooting?",pt:"Qual servico AWS monitora a performance de instancias EC2 para troubleshooting?",o:{en:["AWS Lambda","AWS Config","Amazon CloudWatch","AWS CloudTrail"],pt:["AWS Lambda","AWS Config","Amazon CloudWatch","AWS CloudTrail"]},a:[2],t:"EC2 General",exp:{pt:{tech:"O Amazon CloudWatch coleta metricas (CPU, rede, disco), logs e eventos de recursos AWS. Permite criar alarmes, dashboards e acionar acoes automaticas baseadas em thresholds.",simple:"Amazon CloudWatch coleta metricas de performance das instancias EC2 (como uso de CPU, rede e disco) e permite criar alarmes para monitoramento e troubleshooting.",avoid:"Nunca opere instancias EC2 sem metricas e alarmes do CloudWatch. Configure alertas para CPU, memoria e disco para detectar problemas antes que afetem usuarios."},en:{tech:"Amazon CloudWatch collects metrics (CPU, network, disk), logs, and events from AWS resources. It lets you create alarms, dashboards, and trigger automated actions based on thresholds.",simple:"Amazon CloudWatch collects performance metrics from EC2 instances (such as CPU, network, and disk usage) and lets you create alarms for monitoring and troubleshooting.",avoid:"Never operate EC2 instances without CloudWatch metrics and alarms. Set up alerts for CPU, memory, and disk to detect problems before they affect users."}}},
{en:"What are TWO examples of AWS shared controls?",pt:"Quais sao DOIS exemplos de controles compartilhados da AWS? (Escolha DOIS)",o:{en:["Patch Management","IAM Management","VPC Management","Configuration Management","Data Center operations"],pt:["Gerenciamento de Patches","Gerenciamento IAM","Gerenciamento de VPC","Gerenciamento de Configuracao","Operacoes de Data Center"]},a:[0,3],multi:true,t:"VPC & Networking",exp:{pt:{tech:"Controles compartilhados sao responsabilidades que tanto a AWS quanto o cliente gerenciam, mas em diferentes contextos. Patch Management: AWS atualiza infraestrutura, cliente atualiza SO/apps. Configuration Management: ambos gerenciam configs em suas respectivas camadas.",simple:"Patch Management e Configuration Management sao controles compartilhados onde a AWS gerencia a infraestrutura base e o cliente gerencia seus proprios sistemas operacionais e aplicacoes.",avoid:"Nunca ignore patch management e configuration management nos seus recursos. Mantenha sistemas atualizados e configuracoes consistentes entre ambientes."},en:{tech:"Shared controls are responsibilities both AWS and the customer manage, but in different contexts. Patch Management: AWS patches infrastructure, customer patches OS/apps. Configuration Management: both manage configs in their respective layers.",simple:"Patch Management and Configuration Management are shared controls where AWS manages the base infrastructure and the customer manages their own operating systems and applications.",avoid:"Never ignore patch management and configuration management on your resources. Keep systems updated and configurations consistent across environments."}}},
{en:"Which of the following is NOT correct regarding Amazon EC2 On-demand instances?",pt:"Qual das alternativas a seguir NAO esta correta sobre instancias EC2 On-Demand?",o:{en:["You have to pay a start-up fee when launching a new instance","The on-demand instances follow the AWS pay-as-you-go pricing model","No longer-term commitments or upfront payments are needed","You are charged per second based on an hourly rate"],pt:["Voce precisa pagar uma taxa inicial ao lancar uma nova instancia","As instancias on-demand seguem o modelo de precificacao pay-as-you-go da AWS","Nao sao necessarios compromissos de longo prazo ou pagamentos antecipados","Voce e cobrado por segundo com base em uma taxa por hora"]},a:[0],t:"EC2 Pricing",exp:{pt:{tech:"EC2 On-Demand nao cobra taxa inicial. Voce paga apenas pelo uso sem compromissos.",simple:"Instancias EC2 On-Demand nao cobram taxa de inicializacao. Voce paga somente pelo tempo de computacao usado, sem compromissos antecipados ou taxas extras para comecar.",avoid:"Nunca assuma custos ocultos no EC2 On-Demand sem verificar a documentacao. Leia o modelo de precos atual para evitar erros no planejamento financeiro."},en:{tech:"EC2 On-Demand instances have no start-up fees. You pay only for compute time with no long-term commitments.",simple:"EC2 On-Demand instances do not charge a start-up fee. You pay only for the compute time used, with no upfront commitments or extra fees to begin.",avoid:"Never assume hidden costs in EC2 On-Demand without checking documentation. Read the current pricing model to avoid errors in financial planning."}}},
{en:"Which AWS service provides up to 5x the performance of standard MySQL?",pt:"Qual servico da AWS oferece ate 5x a performance do MySQL padrao?",o:{en:["Amazon Aurora","Amazon Redshift","Amazon DynamoDB","Amazon Neptune"],pt:["Amazon Aurora","Amazon Redshift","Amazon DynamoDB","Amazon Neptune"]},a:[0],t:"Aurora",exp:{pt:{tech:"Amazon Aurora oferece ate 5x a performance do MySQL padrao e 3x do PostgreSQL, com armazenamento auto-escalavel.",simple:"Amazon Aurora e um banco de dados relacional gerenciado pela AWS que oferece ate 5 vezes a performance do MySQL padrao, com compatibilidade total e escalabilidade automatica.",avoid:"Nunca use MySQL padrao quando Aurora esta disponivel e atende seus requisitos. Aurora oferece ate 5x mais performance com compatibilidade MySQL."},en:{tech:"Amazon Aurora delivers up to 5x the throughput of standard MySQL and 3x of PostgreSQL with auto-scaling storage.",simple:"Amazon Aurora is a managed relational database by AWS that delivers up to 5 times the performance of standard MySQL, with full compatibility and automatic scaling.",avoid:"Never use standard MySQL when Aurora is available and meets your requirements. Aurora offers up to 5x more performance with MySQL compatibility."}}},
