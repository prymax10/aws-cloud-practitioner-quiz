{en:"A company wants an automated tool to identify underutilized EC2 instances, security groups with unrestricted access, and S3 buckets with public read access in their AWS account. Which AWS service provides these automated checks?",pt:"Uma empresa quer uma ferramenta automatizada para identificar instancias EC2 subutilizadas, grupos de seguranca com acesso irrestrito e buckets S3 com leitura publica em sua conta AWS. Qual servico AWS fornece essas verificacoes automatizadas?",o:{en:["AWS Well-Architected Tool","AWS Config","AWS Trusted Advisor","AWS Inspector"],pt:["AWS Well-Architected Tool","AWS Config","AWS Trusted Advisor","AWS Inspector"]},a:[2],t:"Well-Architected Tool vs Trusted Advisor",exp:{pt:{tech:"AWS Trusted Advisor fornece verificacoes automatizadas em cinco categorias: Cost Optimization, Performance, Security, Fault Tolerance e Service Limits. Detecta configuracoes de risco como portas abertas, MFA desabilitado e recursos subutilizados.",simple:"Trusted Advisor e o consultor automatico da AWS — verifica sua conta constantemente e alerta sobre problemas de seguranca, custo e performance sem voce precisar perguntar nada.",avoid:"Nao use Well-Architected Tool para verificacoes automatizadas — ele e baseado em questionarios manuais, nao em analise automatica da sua conta."},en:{tech:"AWS Trusted Advisor provides automated checks across five categories: Cost Optimization, Performance, Security, Fault Tolerance, and Service Limits. It detects risky configurations such as open ports, disabled MFA, and underutilized resources.",simple:"Trusted Advisor is AWS automatic advisor — it constantly checks your account and alerts about security, cost, and performance issues without you having to ask anything.",avoid:"Do not use Well-Architected Tool for automated checks — it is based on manual questionnaires, not automated analysis of your account."}}},
{en:"A company with an Enterprise Support plan needs help understanding their AWS bill and optimizing their account structure across multiple AWS accounts. Which AWS support resource is specifically designed for this?",pt:"Uma empresa com plano Enterprise Support precisa de ajuda para entender sua fatura AWS e otimizar a estrutura de conta em multiplas contas AWS. Qual recurso de suporte AWS e especificamente projetado para isso?",o:{en:["Technical Account Manager (TAM)","AWS Concierge Support","AWS Trusted Advisor","AWS Personal Health Dashboard"],pt:["Technical Account Manager (TAM)","AWS Concierge Support","AWS Trusted Advisor","AWS Personal Health Dashboard"]},a:[1],t:"Concierge vs TAM",exp:{pt:{tech:"AWS Concierge Support e um recurso do plano Enterprise focado em billing e gerenciamento de contas. Ajuda a entender faturas complexas, consolidacao de contas Organizations e otimizacao de custos administrativos.",simple:"Concierge = especialista em cobranca e conta. TAM = especialista tecnico que ajuda a arquitetar e operar melhor. Se a pergunta e sobre fatura, e Concierge.",avoid:"Nao use TAM para perguntas sobre fatura — o TAM e orientado tecnicamente e nao e o especialista correto para questoes de billing e estrutura de conta."},en:{tech:"AWS Concierge Support is an Enterprise plan resource focused on billing and account management. It helps understand complex invoices, Organizations account consolidation, and administrative cost optimization.",simple:"Concierge = billing and account specialist. TAM = technical specialist who helps architect and operate better. If the question is about invoices, it is Concierge.",avoid:"Do not use TAM for billing questions — the TAM is technically oriented and is not the right specialist for billing and account structure issues."}}},
{en:"A company has an Enterprise Support plan and wants a dedicated AWS expert who will proactively review their architecture, guide them on AWS best practices, and be their primary technical point of contact for complex issues. Which resource provides this?",pt:"Uma empresa com plano Enterprise Support quer um especialista AWS dedicado que revisara proativamente sua arquitetura, a orientara sobre melhores praticas AWS e sera seu principal ponto de contato tecnico para problemas complexos. Qual recurso fornece isso?",o:{en:["AWS Concierge Support","Technical Account Manager (TAM)","AWS Professional Services","AWS Solutions Architect"],pt:["AWS Concierge Support","Technical Account Manager (TAM)","AWS Professional Services","AWS Solutions Architect"]},a:[1],t:"Concierge vs TAM",exp:{pt:{tech:"O Technical Account Manager (TAM) e um especialista tecnico dedicado disponivel nos planos Enterprise e Enterprise On-Ramp. Fornece orientacao proativa, revisoes de arquitetura, suporte em lancamentos e acesso prioritario ao suporte tecnico.",simple:"TAM = seu consultor tecnico dedicado na AWS. Concierge = seu especialista de conta/fatura dedicado na AWS. Ambos sao Enterprise, mas para coisas diferentes.",avoid:"Nao confunda TAM com AWS Professional Services — Professional Services e uma equipe de consultoria paga separadamente, nao inclusa no plano de suporte."},en:{tech:"The Technical Account Manager (TAM) is a dedicated technical expert available on Enterprise and Enterprise On-Ramp plans. Provides proactive guidance, architecture reviews, launch support, and priority access to technical support.",simple:"TAM = your dedicated technical consultant at AWS. Concierge = your dedicated account/billing specialist at AWS. Both are Enterprise, but for different things.",avoid:"Do not confuse TAM with AWS Professional Services — Professional Services is a separately paid consulting team, not included in the support plan."}}},
{en:"A security administrator needs to add a second layer of authentication for AWS Console access. They want to use a physical hardware device that generates time-based one-time passwords. Which MFA option should they configure?",pt:"Um administrador de seguranca precisa adicionar uma segunda camada de autenticacao para acesso ao Console AWS. Eles querem usar um dispositivo de hardware fisico que gera senhas de uso unico baseadas em tempo. Qual opcao de MFA deve ser configurada?",o:{en:["Virtual MFA device (authenticator app)","Hardware TOTP token","SMS text message MFA","U2F security key"],pt:["Dispositivo MFA virtual (app autenticador)","Token TOTP de hardware","MFA por mensagem de texto SMS","Chave de seguranca U2F"]},a:[1],t:"MFA Types",exp:{pt:{tech:"Hardware TOTP tokens (como RSA SecurID ou Gemalto) sao dispositivos fisicos que geram codigos OTP de 6 digitos baseados em tempo, similar ao Google Authenticator mas em hardware dedicado. Sao aprovados para compliance que exige hardware fisico.",simple:"Hardware token = dispositivo fisico separado que gera codigos. Virtual MFA = app no celular que gera codigos. A diferenca e o fator fisico dedicado.",avoid:"Nao use SMS MFA para contas privilegiadas — SMS e vulneravel a SIM swapping e interceptacao. Use sempre TOTP ou U2F para contas criticas."},en:{tech:"Hardware TOTP tokens (such as RSA SecurID or Gemalto) are physical devices that generate time-based 6-digit OTP codes, similar to Google Authenticator but in dedicated hardware. They are approved for compliance requiring physical hardware.",simple:"Hardware token = separate physical device that generates codes. Virtual MFA = app on your phone that generates codes. The difference is the dedicated physical factor.",avoid:"Do not use SMS MFA for privileged accounts — SMS is vulnerable to SIM swapping and interception. Always use TOTP or U2F for critical accounts."}}},
{en:"A company wants to use the strongest available MFA for their AWS root account. They prefer a standard that is resistant to phishing attacks because authentication is cryptographically bound to the specific website. Which MFA type should they use?",pt:"Uma empresa quer usar o MFA mais forte disponivel para sua conta root AWS. Eles preferem um padrao que seja resistente a ataques de phishing porque a autenticacao e criptograficamente vinculada ao site especifico. Qual tipo de MFA deve usar?",o:{en:["Virtual MFA (Google Authenticator)","SMS text message","Hardware TOTP token","FIDO security key (U2F/WebAuthn)"],pt:["MFA virtual (Google Authenticator)","Mensagem de texto SMS","Token TOTP de hardware","Chave de seguranca FIDO (U2F/WebAuthn)"]},a:[3],t:"MFA Types",exp:{pt:{tech:"Chaves de seguranca FIDO2/WebAuthn (YubiKey, por exemplo) usam criptografia de chave publica vinculada a origem do site. Sao imunes a phishing porque a assinatura criptografica e valida apenas para o dominio legítimo — um site falso nao consegue autenticar.",simple:"FIDO/U2F e o mais seguro porque o dispositivo verifica se o site e genuino antes de autenticar. Um site de phishing falso nao consegue enganar a chave.",avoid:"Nao use SMS MFA como substituto de seguranca forte — SMS nao tem protecao contra phishing e pode ser interceptado via SS7 ou SIM swap."},en:{tech:"FIDO2/WebAuthn security keys (e.g., YubiKey) use public-key cryptography bound to the site origin. They are immune to phishing because the cryptographic signature is only valid for the legitimate domain — a fake phishing site cannot authenticate.",simple:"FIDO/U2F is the most secure because the device verifies the site is genuine before authenticating. A fake phishing site cannot fool the key.",avoid:"Do not use SMS MFA as a substitute for strong security — SMS has no phishing protection and can be intercepted via SS7 or SIM swap."}}},
{en:"A company stores large datasets on-premises that are 50TB in size and need to be migrated to Amazon S3. Their internet connection is 100 Mbps and is shared with production traffic. Which AWS service provides the fastest migration path?",pt:"Uma empresa armazena grandes conjuntos de dados localmente com 50TB de tamanho que precisam ser migrados para o Amazon S3. A conexao de internet deles e de 100 Mbps e e compartilhada com trafego de producao. Qual servico AWS fornece o caminho de migracao mais rapido?",o:{en:["AWS DataSync over the internet","AWS Snowball Edge","AWS Direct Connect","AWS Storage Gateway"],pt:["AWS DataSync pela internet","AWS Snowball Edge","AWS Direct Connect","AWS Storage Gateway"]},a:[1],t:"Data Migration",exp:{pt:{tech:"AWS Snowball Edge e um dispositivo fisico que a AWS envia para voce. Voce carrega os dados localmente (sem usar internet) e devolve o dispositivo. Para 50TB em 100 Mbps compartilhado, a transferencia via internet levaria mais de 45 dias. Snowball completa em dias.",simple:"Snowball e mais rapido que a internet para grandes volumes de dados. A AWS manda um HD externo gigante, voce copia e devolve pelo correio.",avoid:"Nao subestime quanto tempo uma transferencia via internet leva para dados grandes — 50TB em 100 Mbps leva semanas, sem contar a competicao com trafego de producao."},en:{tech:"AWS Snowball Edge is a physical device AWS ships to you. You load data locally (without using internet) and return the device. For 50TB on a shared 100 Mbps connection, internet transfer would take over 45 days. Snowball completes in days.",simple:"Snowball is faster than the internet for large data volumes. AWS ships you a giant external hard drive, you copy the data and ship it back.",avoid:"Do not underestimate how long an internet transfer takes for large data — 50TB at 100 Mbps takes weeks, not counting competition with production traffic."}}},
{en:"A company wants to ensure their AWS architecture aligns with the Reliability pillar of the AWS Well-Architected Framework. Which design pattern best supports reliability?",pt:"Uma empresa quer garantir que sua arquitetura AWS esteja alinhada com o pilar de Confiabilidade do AWS Well-Architected Framework. Qual padrao de design melhor suporta a confiabilidade?",o:{en:["Deploy all components in a single Availability Zone","Design for single points of failure","Implement multi-AZ deployments with automated failover","Use only On-Demand instances without Auto Scaling"],pt:["Implantar todos os componentes em uma unica Zona de Disponibilidade","Projetar com pontos unicos de falha","Implementar implantacoes multi-AZ com failover automatico","Usar apenas instancias On-Demand sem Auto Scaling"]},a:[2],t:"Well-Architected Framework",exp:{pt:{tech:"O pilar de Confiabilidade do Well-Architected Framework enfatiza eliminar single points of failure, usar redundancia multi-AZ, implementar health checks e failover automatico, e testar recuperacao de falhas regularmente.",simple:"Confiabilidade = o sistema sobrevive a falhas. Multi-AZ garante que se uma AZ cair, outra continua operando.",avoid:"Nao projete sistemas criticos em uma unica AZ — uma AZ e um datacenter fisico e pode ter problemas de energia, rede ou hardware."},en:{tech:"The Well-Architected Reliability pillar emphasizes eliminating single points of failure, using multi-AZ redundancy, implementing health checks and automatic failover, and regularly testing failure recovery.",simple:"Reliability = the system survives failures. Multi-AZ ensures that if one AZ fails, another continues operating.",avoid:"Do not design critical systems in a single AZ — an AZ is a physical datacenter and can have power, network, or hardware issues."}}},
{en:"A company needs to provide temporary AWS access to a third-party auditor who needs to review specific resources. The access should be limited in duration and follow the principle of least privilege. Which approach is correct?",pt:"Uma empresa precisa fornecer acesso temporario AWS a um auditor terceirizado que precisa revisar recursos especificos. O acesso deve ser limitado em duracao e seguir o principio do menor privilegio. Qual abordagem e correta?",o:{en:["Create a permanent IAM user with the required permissions","Share the root account credentials temporarily","Create an IAM role with the required permissions and allow the auditor to assume it","Give the auditor access to AWS Organizations"],pt:["Criar um usuario IAM permanente com as permissoes necessarias","Compartilhar as credenciais da conta root temporariamente","Criar uma role IAM com as permissoes necessarias e permitir que o auditor a assuma","Dar ao auditor acesso ao AWS Organizations"]},a:[2],t:"IAM",exp:{pt:{tech:"IAM Roles com STS AssumeRole permitem acesso temporario com credenciais de curta duracao (minutos a horas). O auditor assume a role usando sua propria identidade AWS, sem necessidade de credenciais permanentes na sua conta.",simple:"Use roles, nao usuarios permanentes, para acesso de terceiros. Roles expiram automaticamente e nao deixam credenciais permanentes na sua conta.",avoid:"Nunca compartilhe credenciais root ou crie usuarios IAM permanentes para acesso externo — use sempre roles com tempo de expiracao."},en:{tech:"IAM Roles with STS AssumeRole allow temporary access with short-lived credentials (minutes to hours). The auditor assumes the role using their own AWS identity, without needing permanent credentials in your account.",simple:"Use roles, not permanent users, for third-party access. Roles expire automatically and do not leave permanent credentials in your account.",avoid:"Never share root credentials or create permanent IAM users for external access — always use roles with expiration time."}}},
{en:"A company wants to reduce costs by purchasing AWS compute capacity in advance for a 1-year term. They want flexibility to change the instance type within the same instance family. Which Reserved Instance type provides this flexibility?",pt:"Uma empresa quer reduzir custos comprando capacidade de computacao AWS com antecedencia por um prazo de 1 ano. Eles querem flexibilidade para mudar o tipo de instancia dentro da mesma familia de instancias. Qual tipo de Reserved Instance fornece essa flexibilidade?",o:{en:["Standard Reserved Instances","Convertible Reserved Instances","Scheduled Reserved Instances","Dedicated Reserved Instances"],pt:["Standard Reserved Instances","Convertible Reserved Instances","Scheduled Reserved Instances","Dedicated Reserved Instances"]},a:[1],t:"EC2 Pricing Models",exp:{pt:{tech:"Convertible Reserved Instances permitem trocar os atributos da reserva (familia de instancia, sistema operacional, tenancy) durante o prazo. Oferecem desconto menor (~54%) vs Standard (~72%), mas dao flexibilidade para acompanhar evolucao dos workloads.",simple:"Convertible = posso mudar de instancia durante o contrato, mas pago um pouco mais. Standard = compromisso fixo, desconto maximo.",avoid:"Nao use Convertible se voce tem certeza sobre o tipo de instancia — voce paga mais por uma flexibilidade que nao vai usar."},en:{tech:"Convertible Reserved Instances allow exchanging reservation attributes (instance family, OS, tenancy) during the term. They offer a lower discount (~54%) vs Standard (~72%) but provide flexibility to follow workload evolution.",simple:"Convertible = I can change instance type during the contract, but I pay a bit more. Standard = fixed commitment, maximum discount.",avoid:"Do not use Convertible if you are certain about the instance type — you pay more for flexibility you will not use."}}},
{en:"A company runs a web application and wants to protect it from SQL injection, cross-site scripting (XSS), and other common web exploits. Which AWS service should they implement?",pt:"Uma empresa executa uma aplicacao web e quer protege-la contra SQL injection, cross-site scripting (XSS) e outros exploits comuns. Qual servico AWS deve implementar?",o:{en:["AWS Shield","Amazon Inspector","AWS WAF","AWS GuardDuty"],pt:["AWS Shield","Amazon Inspector","AWS WAF","AWS GuardDuty"]},a:[2],t:"Security Services",exp:{pt:{tech:"AWS WAF (Web Application Firewall) filtra requisicoes HTTP/HTTPS baseado em regras que identificam padroes de SQL injection, XSS, e outros ataques OWASP Top 10. Opera na camada 7 (aplicacao) e integra com CloudFront, ALB, API Gateway.",simple:"WAF = firewall para aplicacoes web. Bloqueia ataques no nivel HTTP antes de chegarem ao seu codigo.",avoid:"Nao confunda WAF com Shield — Shield protege contra DDoS volumetrico (camada 3/4), WAF protege contra ataques de aplicacao (camada 7)."},en:{tech:"AWS WAF (Web Application Firewall) filters HTTP/HTTPS requests based on rules that identify SQL injection, XSS, and other OWASP Top 10 attack patterns. It operates at layer 7 (application) and integrates with CloudFront, ALB, API Gateway.",simple:"WAF = firewall for web applications. It blocks attacks at the HTTP level before they reach your code.",avoid:"Do not confuse WAF with Shield — Shield protects against volumetric DDoS (layers 3/4), WAF protects against application attacks (layer 7)."}}},
{en:"A company wants to protect their AWS infrastructure from DDoS attacks. They need automatic protection without any configuration. Which AWS service provides this by default for all AWS customers at no additional charge?",pt:"Uma empresa quer proteger sua infraestrutura AWS contra ataques DDoS. Eles precisam de protecao automatica sem configuracao. Qual servico AWS fornece isso por padrao para todos os clientes AWS sem custo adicional?",o:{en:["AWS Shield Advanced","AWS WAF","AWS Shield Standard","Amazon GuardDuty"],pt:["AWS Shield Advanced","AWS WAF","AWS Shield Standard","Amazon GuardDuty"]},a:[2],t:"Security Services",exp:{pt:{tech:"AWS Shield Standard e automaticamente habilitado para todos os clientes AWS sem custo. Fornece protecao contra ataques DDoS mais comuns e frequentes nas camadas 3 e 4 (SYN floods, UDP floods, reflection attacks).",simple:"Shield Standard = protecao DDoS basica gratuita e automatica para todos. Shield Advanced = protecao avancada paga com suporte do DDoS Response Team.",avoid:"Nao confunda Shield com WAF — Shield e para DDoS (volumetrico, rede), WAF e para ataques de aplicacao web (SQL injection, XSS)."},en:{tech:"AWS Shield Standard is automatically enabled for all AWS customers at no cost. It provides protection against the most common and frequent DDoS attacks at layers 3 and 4 (SYN floods, UDP floods, reflection attacks).",simple:"Shield Standard = free and automatic basic DDoS protection for everyone. Shield Advanced = paid advanced protection with DDoS Response Team support.",avoid:"Do not confuse Shield with WAF — Shield is for DDoS (volumetric, network), WAF is for web application attacks (SQL injection, XSS)."}}},
{en:"A company wants to detect unusual activity in their AWS account such as unauthorized API calls, compromised instances communicating with known malware command-and-control servers, and unusual data exfiltration patterns. Which AWS service provides this threat detection?",pt:"Uma empresa quer detectar atividades incomuns em sua conta AWS como chamadas de API nao autorizadas, instancias comprometidas comunicando-se com servidores C2 de malware conhecidos e padroes incomuns de exfiltracao de dados. Qual servico AWS fornece essa deteccao de ameacas?",o:{en:["AWS Config","AWS CloudTrail","Amazon GuardDuty","AWS Inspector"],pt:["AWS Config","AWS CloudTrail","Amazon GuardDuty","AWS Inspector"]},a:[2],t:"Security Services",exp:{pt:{tech:"Amazon GuardDuty e um servico de deteccao de ameacas que usa machine learning e threat intelligence (incluindo feeds da CrowdStrike e Proofpoint) para analisar logs do CloudTrail, VPC Flow Logs e DNS logs. Detecta comportamentos anomalos e indicadores de comprometimento.",simple:"GuardDuty = detetive de seguranca automatico. Ele analisa o que esta acontecendo na sua conta e alerta quando detecta algo suspeito.",avoid:"Nao confunda GuardDuty com Inspector — Inspector verifica vulnerabilidades em EC2 e containers, GuardDuty detecta comportamentos suspeitos em runtime."},en:{tech:"Amazon GuardDuty is a threat detection service that uses machine learning and threat intelligence (including CrowdStrike and Proofpoint feeds) to analyze CloudTrail logs, VPC Flow Logs, and DNS logs. It detects anomalous behaviors and indicators of compromise.",simple:"GuardDuty = automatic security detective. It analyzes what is happening in your account and alerts when it detects something suspicious.",avoid:"Do not confuse GuardDuty with Inspector — Inspector checks for vulnerabilities in EC2 and containers, GuardDuty detects suspicious behaviors at runtime."}}},
{en:"A company is planning to move to AWS and wants to understand the shared responsibility model. They are deploying an application on Amazon EC2. Which of the following is the CUSTOMER responsibility?",pt:"Uma empresa esta planejando migrar para AWS e quer entender o modelo de responsabilidade compartilhada. Eles estao implantando uma aplicacao no Amazon EC2. Qual das seguintes e responsabilidade do CLIENTE?",o:{en:["Physical security of the data center","Hypervisor patching","Guest operating system patching and updates","Network infrastructure maintenance"],pt:["Seguranca fisica do datacenter","Patching do hypervisor","Patching e atualizacoes do sistema operacional guest","Manutencao da infraestrutura de rede"]},a:[2],t:"Shared Responsibility Model",exp:{pt:{tech:"No modelo de responsabilidade compartilhada para EC2 (IaaS): AWS e responsavel pela seguranca DO cloud (hardware fisico, rede, hypervisor). O cliente e responsavel pela seguranca NA cloud (SO guest, patches, configuracao, dados, IAM, firewall de aplicacao).",simple:"AWS cuida do hardware e da virtualizacao. Voce cuida do que roda dentro da VM — sistema operacional, aplicacao, dados.",avoid:"Nao assuma que a AWS patcha o sistema operacional das suas instancias EC2 — para EC2, o SO guest e inteiramente sua responsabilidade."},en:{tech:"In the shared responsibility model for EC2 (IaaS): AWS is responsible for security OF the cloud (physical hardware, network, hypervisor). The customer is responsible for security IN the cloud (guest OS, patches, configuration, data, IAM, application firewall).",simple:"AWS takes care of the hardware and virtualization. You take care of what runs inside the VM — operating system, application, data.",avoid:"Do not assume AWS patches the operating system of your EC2 instances — for EC2, the guest OS is entirely your responsibility."}}},
{en:"A company uses Amazon RDS (managed service). Which of the following is the CUSTOMER responsibility under the shared responsibility model?",pt:"Uma empresa usa Amazon RDS (servico gerenciado). Qual das seguintes e responsabilidade do CLIENTE sob o modelo de responsabilidade compartilhada?",o:{en:["Database engine patching","Physical security of RDS hardware","Network infrastructure for RDS","Managing database user permissions and data encryption"],pt:["Patching do mecanismo de banco de dados","Seguranca fisica do hardware RDS","Infraestrutura de rede para RDS","Gerenciar permissoes de usuario do banco de dados e criptografia de dados"]},a:[3],t:"Shared Responsibility Model",exp:{pt:{tech:"Para servicos gerenciados como RDS, a AWS assume mais responsabilidades: patching do SO e do mecanismo de BD, hardware fisico, rede. O cliente ainda e responsavel por: configuracao de acesso ao banco, usuarios e senhas, criptografia dos dados, backup policy (quando aplicavel) e network security (Security Groups).",simple:"Quanto mais gerenciado o servico, mais a AWS cuida. Mas voce sempre e responsavel pelos seus dados e por quem tem acesso a eles.",avoid:"Nao assuma que servicos gerenciados transferem toda a responsabilidade para a AWS — voce sempre controla dados, acesso e configuracao de seguranca de aplicacao."},en:{tech:"For managed services like RDS, AWS assumes more responsibilities: OS and DB engine patching, physical hardware, networking. The customer is still responsible for: database access configuration, users and passwords, data encryption, backup policy (where applicable), and network security (Security Groups).",simple:"The more managed the service, the more AWS handles. But you are always responsible for your data and who has access to it.",avoid:"Do not assume managed services transfer all responsibility to AWS — you always control data, access, and application security configuration."}}},
{en:"A company wants to run a serverless application that automatically scales from zero to millions of requests without managing any servers. Which AWS service should they use for the compute layer?",pt:"Uma empresa quer executar uma aplicacao serverless que escala automaticamente de zero a milhoes de requisicoes sem gerenciar nenhum servidor. Qual servico AWS deve usar para a camada de computacao?",o:{en:["Amazon EC2 with Auto Scaling","Amazon ECS on Fargate","AWS Lambda","Amazon EKS"],pt:["Amazon EC2 com Auto Scaling","Amazon ECS no Fargate","AWS Lambda","Amazon EKS"]},a:[2],t:"Lambda vs EC2",exp:{pt:{tech:"AWS Lambda executa codigo em resposta a eventos sem provisionamento de servidores. Escala automaticamente, cobrado por requisicao e duracao (ms). Ideal para funcoes de curta duracao (max 15 minutos), APIs, processamento de eventos.",simple:"Lambda = voce escreve a funcao, a AWS faz tudo mais. Nao ha servidor para gerenciar, nao ha escala para configurar.",avoid:"Nao use Lambda para workloads de longa duracao (acima de 15 minutos) ou que requerem estado persistente entre invocacoes — use EC2 ou containers para isso."},en:{tech:"AWS Lambda runs code in response to events without server provisioning. It scales automatically, billed per request and duration (ms). Ideal for short-duration functions (max 15 minutes), APIs, and event processing.",simple:"Lambda = you write the function, AWS does everything else. No server to manage, no scaling to configure.",avoid:"Do not use Lambda for long-running workloads (above 15 minutes) or those requiring persistent state between invocations — use EC2 or containers for that."}}},
{en:"A company needs to store session data for a web application. The data must be retrieved in microseconds, the dataset is small (under 10GB), and the data does not need to persist after the application restarts. Which AWS service is most appropriate?",pt:"Uma empresa precisa armazenar dados de sessao para uma aplicacao web. Os dados devem ser recuperados em microssegundos, o conjunto de dados e pequeno (menos de 10GB) e os dados nao precisam persistir apos o reinicio da aplicacao. Qual servico AWS e mais adequado?",o:{en:["Amazon RDS","Amazon DynamoDB","Amazon ElastiCache (Redis/Memcached)","Amazon S3"],pt:["Amazon RDS","Amazon DynamoDB","Amazon ElastiCache (Redis/Memcached)","Amazon S3"]},a:[2],t:"Caching",exp:{pt:{tech:"Amazon ElastiCache oferece cache em memoria com latencia de microssegundos. Redis e Memcached sao ideais para sessoes de usuario, resultados de queries frequentes e dados de curta duracao que precisam de acesso ultra-rapido.",simple:"ElastiCache e RAM na nuvem — extremamente rapido mas volatil. Ideal para dados que voce pode recriar se perder.",avoid:"Nao use RDS ou DynamoDB para dados de sessao de alta frequencia — eles tem latencia de milissegundos, nao microssegundos, e sao mais caros para esse padrao de acesso."},en:{tech:"Amazon ElastiCache provides in-memory caching with microsecond latency. Redis and Memcached are ideal for user sessions, frequent query results, and short-lived data that needs ultra-fast access.",simple:"ElastiCache is RAM in the cloud — extremely fast but volatile. Ideal for data you can recreate if lost.",avoid:"Do not use RDS or DynamoDB for high-frequency session data — they have millisecond latency, not microseconds, and are more expensive for this access pattern."}}},
{en:"A company is running an e-commerce application and expects a massive traffic spike during Black Friday — 10x normal load for 24 hours. After that, traffic returns to normal. Which AWS feature ensures the application can handle this spike automatically?",pt:"Uma empresa executa uma aplicacao de e-commerce e espera um pico massivo de trafego na Black Friday — 10x a carga normal por 24 horas. Apos isso, o trafego volta ao normal. Qual recurso AWS garante que a aplicacao possa lidar com esse pico automaticamente?",o:{en:["EC2 Reserved Instances","EC2 Auto Scaling with Application Load Balancer","EC2 Dedicated Hosts","AWS Direct Connect"],pt:["EC2 Reserved Instances","EC2 Auto Scaling com Application Load Balancer","EC2 Dedicated Hosts","AWS Direct Connect"]},a:[1],t:"Scalability",exp:{pt:{tech:"EC2 Auto Scaling monitora metricas (CPU, rede, custom) e adiciona/remove instancias automaticamente conforme a demanda. Integrado com ALB distribui trafego entre instancias. E o padrao para elasticidade na AWS.",simple:"Auto Scaling = a AWS adiciona mais servidores quando o trafego sobe e remove quando cai. Voce paga apenas quando os servidores existem.",avoid:"Nao use apenas Reserved Instances para picos — Reserved garante capacidade mas nao escala automaticamente. Combine Reserved para base com Auto Scaling para elasticidade."},en:{tech:"EC2 Auto Scaling monitors metrics (CPU, network, custom) and automatically adds/removes instances based on demand. Integrated with ALB, it distributes traffic across instances. This is the standard pattern for elasticity on AWS.",simple:"Auto Scaling = AWS adds more servers when traffic goes up and removes them when it drops. You only pay when the servers exist.",avoid:"Do not use only Reserved Instances for spikes — Reserved guarantees capacity but does not scale automatically. Combine Reserved for baseline with Auto Scaling for elasticity."}}},
{en:"A company wants to host a static website (HTML, CSS, JavaScript) with global availability and the lowest possible operational overhead. Which combination of AWS services achieves this?",pt:"Uma empresa quer hospedar um site estatico (HTML, CSS, JavaScript) com disponibilidade global e o menor overhead operacional possivel. Qual combinacao de servicos AWS alcanca isso?",o:{en:["EC2 + Application Load Balancer","S3 static website hosting + CloudFront","Elastic Beanstalk + RDS","ECS + Fargate"],pt:["EC2 + Application Load Balancer","Hospedagem de site estatico S3 + CloudFront","Elastic Beanstalk + RDS","ECS + Fargate"]},a:[1],t:"S3 Static Website",exp:{pt:{tech:"S3 pode hospedar sites estaticos diretamente com URL publica. CloudFront distribui o conteudo globalmente via edge locations, adiciona HTTPS com certificado SSL/TLS gratuito via ACM, e cache para latencia minima. Zero servidores para gerenciar.",simple:"S3 + CloudFront = site estatico global sem servidor. Voce guarda os arquivos no S3 e CloudFront entrega para o mundo inteiro pelo ponto mais proximo.",avoid:"Nao use EC2 para sites puramente estaticos — voce pagaria por servidor ocioso e teria overhead de manutencao de SO para conteudo que nao precisa de servidor."},en:{tech:"S3 can host static websites directly with a public URL. CloudFront distributes content globally via edge locations, adds HTTPS with a free SSL/TLS certificate via ACM, and caching for minimal latency. Zero servers to manage.",simple:"S3 + CloudFront = global static website without a server. You store files in S3 and CloudFront delivers them worldwide from the nearest edge point.",avoid:"Do not use EC2 for purely static websites — you would pay for idle server time and have OS maintenance overhead for content that does not need a server."}}},
{en:"A company uses multiple AWS accounts managed through AWS Organizations. They want to apply a policy that prevents any account in a specific organizational unit from creating resources outside the us-east-1 region. Which feature should they use?",pt:"Uma empresa usa multiplas contas AWS gerenciadas pelo AWS Organizations. Eles querem aplicar uma politica que impeca qualquer conta em uma unidade organizacional especifica de criar recursos fora da regiao us-east-1. Qual recurso deve usar?",o:{en:["IAM Permission Boundaries","AWS Config Rules","Service Control Policies (SCPs)","AWS Trusted Advisor"],pt:["IAM Permission Boundaries","AWS Config Rules","Service Control Policies (SCPs)","AWS Trusted Advisor"]},a:[2],t:"AWS Organizations",exp:{pt:{tech:"Service Control Policies (SCPs) sao politicas de Organizations que estabelecem guardrails de permissao maxima para contas ou OUs. Nem o root user da conta-membro pode contornar um SCP. Ideal para governance centralizada.",simple:"SCPs sao os limites que o CEO define — nem o admin da conta filho pode ultrapassar. IAM policies definem o que o usuario pode fazer; SCPs definem o maximo que qualquer usuario pode fazer.",avoid:"Nao use IAM policies para restricoes multi-conta — IAM e por conta individual. SCPs operam no nivel de Organizations e afetam todas as contas na OU."},en:{tech:"Service Control Policies (SCPs) are Organizations policies that establish maximum permission guardrails for accounts or OUs. Not even the member account root user can bypass an SCP. Ideal for centralized governance.",simple:"SCPs are the limits the CEO defines — not even the child account admin can exceed them. IAM policies define what a user can do; SCPs define the maximum any user can do.",avoid:"Do not use IAM policies for multi-account restrictions — IAM is per individual account. SCPs operate at the Organizations level and affect all accounts in the OU."}}},
{en:"A company wants to grant an EC2 instance permission to write logs to an S3 bucket without embedding any AWS credentials in the application code. What is the correct approach?",pt:"Uma empresa quer conceder a uma instancia EC2 permissao para gravar logs em um bucket S3 sem incorporar credenciais AWS no codigo da aplicacao. Qual e a abordagem correta?",o:{en:["Store AWS access keys as environment variables on the EC2 instance","Create an IAM user and put the credentials in the application configuration file","Attach an IAM role to the EC2 instance with the required S3 permissions","Use the root account credentials in the application"],pt:["Armazenar chaves de acesso AWS como variaveis de ambiente na instancia EC2","Criar um usuario IAM e colocar as credenciais no arquivo de configuracao da aplicacao","Anexar uma role IAM a instancia EC2 com as permissoes S3 necessarias","Usar as credenciais da conta root na aplicacao"]},a:[2],t:"IAM",exp:{pt:{tech:"Roles IAM anexadas a instancias EC2 fornecem credenciais temporarias automaticamente via Instance Metadata Service (IMDS). A aplicacao usa o AWS SDK que busca credenciais automaticamente sem nenhuma credencial estatica no codigo.",simple:"Role na instancia = credenciais automaticas e temporarias. Nao ha senha para vazar porque nao existe senha — as credenciais expiram e se renovam automaticamente.",avoid:"Nunca coloque chaves de acesso AWS em codigo, variaveis de ambiente de instancia ou arquivos de configuracao — use sempre roles para servicos AWS se comunicarem entre si."},en:{tech:"IAM roles attached to EC2 instances provide temporary credentials automatically via the Instance Metadata Service (IMDS). The application uses the AWS SDK which fetches credentials automatically with no static credentials in code.",simple:"Role on the instance = automatic and temporary credentials. There is no password to leak because no password exists — credentials expire and renew automatically.",avoid:"Never put AWS access keys in code, instance environment variables, or configuration files — always use roles for AWS services to communicate with each other."}}},
{en:"A company needs a NoSQL database that can handle millions of requests per second with single-digit millisecond latency, and the data model consists of key-value pairs and documents. Which AWS service should they use?",pt:"Uma empresa precisa de um banco de dados NoSQL que possa lidar com milhoes de requisicoes por segundo com latencia de milissegundos de um digito, e o modelo de dados consiste em pares chave-valor e documentos. Qual servico AWS deve usar?",o:{en:["Amazon RDS with read replicas","Amazon Aurora","Amazon DynamoDB","Amazon Redshift"],pt:["Amazon RDS com read replicas","Amazon Aurora","Amazon DynamoDB","Amazon Redshift"]},a:[2],t:"Databases",exp:{pt:{tech:"Amazon DynamoDB e um banco de dados NoSQL totalmente gerenciado, serverless, com latencia de milissegundos de um digito em qualquer escala. Suporta modelos key-value e document, escala para qualquer throughput sem downtime.",simple:"DynamoDB = NoSQL da AWS. Super rapido, escala automaticamente, voce nao gerencia nada. Para chave-valor e documentos em altissima escala.",avoid:"Nao use DynamoDB para queries complexas com JOINs ou transacoes multi-tabela complexas — para isso, use RDS ou Aurora."},en:{tech:"Amazon DynamoDB is a fully managed, serverless NoSQL database with single-digit millisecond latency at any scale. It supports key-value and document models and scales to any throughput without downtime.",simple:"DynamoDB = AWS NoSQL. Super fast, scales automatically, you manage nothing. For key-value and documents at very high scale.",avoid:"Do not use DynamoDB for complex queries with JOINs or complex multi-table transactions — use RDS or Aurora for that."}}},
{en:"A company needs to run data processing jobs that take up to 8 hours to complete. Which AWS service is MOST appropriate WITHOUT managing servers?",pt:"Uma empresa precisa executar jobs de processamento de dados que levam ate 8 horas para concluir. Qual servico AWS e MAIS adequado SEM gerenciar servidores?",o:{en:["AWS Lambda","AWS Batch","Amazon EC2 with Auto Scaling","AWS Glue"],pt:["AWS Lambda","AWS Batch","Amazon EC2 com Auto Scaling","AWS Glue"]},a:[1],t:"Compute",exp:{pt:{tech:"AWS Batch executa jobs em containers gerenciados sem necessidade de provisionar ou administrar servidores. Lambda tem limite de 15 minutos de execucao, tornando-o inadequado para jobs longos.","simple":"Para jobs que duram horas, use AWS Batch. Lambda e limitado a 15 minutos.",avoid:"Nunca use Lambda para processamento longo. O limite de 15 min e rigido e nao pode ser configurado."},en:{tech:"AWS Batch runs containerized jobs on managed infrastructure without server administration. Lambda has a hard 15-minute execution limit making it unsuitable for long-running jobs.","simple":"For jobs lasting hours, use AWS Batch. Lambda is limited to 15 minutes.",avoid:"Never use Lambda for long-running processing. The 15-min limit is hard and cannot be configured."}}},
{en:"A developer needs PROGRAMMATIC ACCESS to AWS services from a local machine. Which credential type should be created?",pt:"Um desenvolvedor precisa de ACESSO PROGRAMATICO aos servicos AWS a partir de uma maquina local. Qual tipo de credencial deve ser criada?",o:{en:["IAM user with console password","IAM access key ID and secret access key","AWS root account credentials","Temporary session token only"],pt:["Usuario IAM com senha do console","Chave de acesso IAM e chave de acesso secreta","Credenciais da conta root AWS","Token de sessao temporario somente"]},a:[1],t:"IAM",exp:{pt:{tech:"Acesso programatico via CLI, SDK ou API requer um par de chaves de acesso (Access Key ID + Secret Access Key) vinculado a um usuario IAM. Senhas sao usadas apenas para o console web.","simple":"Para usar AWS CLI ou SDK em codigo, voce precisa de uma Access Key, nao de uma senha.","avoid":"Nunca use credenciais root para acesso programatico. Crie usuarios IAM dedicados com permissoes minimas."},en:{tech:"Programmatic access via CLI, SDK, or API requires an access key pair (Access Key ID + Secret Access Key) tied to an IAM user. Passwords are only used for the web console.","simple":"To use AWS CLI or SDK in code, you need an Access Key, not a password.","avoid":"Never use root credentials for programmatic access. Create dedicated IAM users with least-privilege permissions."}}},
{en:"An application running on EC2 needs to access S3 WITHOUT storing long-term credentials. Which solution provides TEMPORARY CREDENTIALS?",pt:"Uma aplicacao rodando em EC2 precisa acessar o S3 SEM armazenar credenciais de longo prazo. Qual solucao fornece CREDENCIAIS TEMPORARIAS?",o:{en:["Create an IAM user and embed access keys in the application code","Attach an IAM Role to the EC2 instance","Store credentials in AWS Secrets Manager","Use the root account access keys"],pt:["Criar um usuario IAM e incorporar chaves de acesso no codigo","Anexar uma IAM Role a instancia EC2","Armazenar credenciais no AWS Secrets Manager","Usar as chaves de acesso da conta root"]},a:[1],t:"IAM",exp:{pt:{tech:"IAM Roles anexadas a instancias EC2 fornecem credenciais temporarias rotacionadas automaticamente pelo AWS STS. A aplicacao acessa as credenciais via Instance Metadata Service sem necessidade de armazenar secrets.","simple":"Roles em EC2 dao credenciais temporarias automaticas. Voce nunca precisa guardar chave nenhuma no codigo.","avoid":"Nunca coloque Access Keys no codigo-fonte ou variaveis de ambiente fixas. Use sempre IAM Roles para workloads em AWS."},en:{tech:"IAM Roles attached to EC2 instances provide temporary credentials automatically rotated by AWS STS. The application retrieves credentials via the Instance Metadata Service with no stored secrets.","simple":"Roles on EC2 provide automatic temporary credentials. You never need to store any key in the code.","avoid":"Never embed Access Keys in source code or fixed environment variables. Always use IAM Roles for AWS workloads."}}},
{en:"A company wants to CENTRALLY MANAGE MULTIPLE AWS ACCOUNTS and apply security guardrails across all of them. Which service should be used?",pt:"Uma empresa quer GERENCIAR CENTRALMENTE MULTIPLAS CONTAS AWS e aplicar guardrails de seguranca em todas elas. Qual servico deve ser usado?",o:{en:["AWS IAM with cross-account roles","AWS Organizations with Service Control Policies","AWS Control Tower only","Amazon Cognito"],pt:["AWS IAM com roles entre contas","AWS Organizations com Service Control Policies","Somente AWS Control Tower","Amazon Cognito"]},a:[1],t:"Organizations",exp:{pt:{tech:"AWS Organizations permite agrupar contas em OUs e aplicar SCPs (Service Control Policies) que funcionam como teto de permissoes — restringem o que as contas PODEM fazer independentemente de suas politicas IAM locais.","simple":"Organizations + SCPs controlam o que contas inteiras podem ou nao fazer, como uma regra que ninguem pode quebrar.","avoid":"SCPs nao concedem permissoes, apenas restringem. Uma SCP permissiva nao substitui politicas IAM granulares."},en:{tech:"AWS Organizations allows grouping accounts into OUs and applying SCPs (Service Control Policies) that act as permission ceilings — restricting what accounts CAN do regardless of their local IAM policies.","simple":"Organizations + SCPs control what entire accounts can or cannot do, like a rule no one can break.","avoid":"SCPs do not grant permissions, they only restrict. A permissive SCP does not replace granular IAM policies."}}},
{en:"An operations team needs to prove COMPLIANCE WITH PCI DSS regulations to auditors. Which AWS service provides the official compliance reports?",pt:"Uma equipe de operacoes precisa comprovar CONFORMIDADE COM regulamentos PCI DSS para auditores. Qual servico AWS fornece os relatorios oficiais de conformidade?",o:{en:["AWS Security Hub","AWS Artifact","AWS Config","AWS Trusted Advisor"],pt:["AWS Security Hub","AWS Artifact","AWS Config","AWS Trusted Advisor"]},a:[1],t:"Compliance",exp:{pt:{tech:"AWS Artifact e o portal de self-service para acessar relatorios de conformidade AWS (SOC 1/2/3, PCI DSS, ISO 27001, etc.) e acordos como o BAA. Nao e um scanner de seguranca — e um repositorio de documentos de auditoria.","simple":"AWS Artifact e onde voce baixa os documentos que provam que a AWS passou nas auditorias. E um cofre de PDFs de conformidade.","avoid":"Nao confunda AWS Artifact (documentos de compliance da AWS) com AWS Config (conformidade dos seus recursos). Sao servicos completamente distintos."},en:{tech:"AWS Artifact is the self-service portal for accessing AWS compliance reports (SOC 1/2/3, PCI DSS, ISO 27001, etc.) and agreements like the BAA. It is not a security scanner — it is an audit document repository.","simple":"AWS Artifact is where you download documents proving AWS passed audits. It is a compliance PDF vault.","avoid":"Do not confuse AWS Artifact (AWS compliance documents) with AWS Config (your resource compliance). They are completely different services."}}},
{en:"A security team wants a CENTRALIZED SECURITY DASHBOARD that aggregates findings from GuardDuty, Inspector, and Macie. Which service should they use?",pt:"Uma equipe de seguranca quer um PAINEL DE SEGURANCA CENTRALIZADO que agregue findings do GuardDuty, Inspector e Macie. Qual servico deve ser usado?",o:{en:["Amazon Detective","AWS Security Hub","AWS CloudTrail","Amazon CloudWatch"],pt:["Amazon Detective","AWS Security Hub","AWS CloudTrail","Amazon CloudWatch"]},a:[1],t:"SecurityHub",exp:{pt:{tech:"AWS Security Hub agrega, normaliza e prioriza findings de multiplos servicos de seguranca AWS (GuardDuty, Inspector, Macie, Firewall Manager) e ferramentas de terceiros em um painel unificado com pontuacao de postura de seguranca.","simple":"Security Hub e a central que junta alertas de varios servicos de seguranca num so lugar para voce ver tudo de uma vez.","avoid":"Nao confunda Security Hub (dashboard unificado) com Amazon Detective (investigacao de causa raiz de um finding especifico)."},en:{tech:"AWS Security Hub aggregates, normalizes, and prioritizes findings from multiple AWS security services (GuardDuty, Inspector, Macie, Firewall Manager) and third-party tools into a unified dashboard with security posture scoring.","simple":"Security Hub is the hub that combines alerts from various security services in one place so you see everything at once.","avoid":"Do not confuse Security Hub (unified dashboard) with Amazon Detective (root cause investigation of a specific finding)."}}},
{en:"After GuardDuty generates a security finding, a team needs to investigate the ROOT CAUSE and visualize related activity over time. Which service should be used?",pt:"Apos o GuardDuty gerar um finding de seguranca, uma equipe precisa investigar a CAUSA RAIZ e visualizar atividades relacionadas ao longo do tempo. Qual servico deve ser usado?",o:{en:["AWS Security Hub","Amazon Macie","Amazon Detective","AWS CloudTrail"],pt:["AWS Security Hub","Amazon Macie","Amazon Detective","AWS CloudTrail"]},a:[2],t:"Detective",exp:{pt:{tech:"Amazon Detective usa machine learning e analise de grafos para correlacionar automaticamente eventos de CloudTrail, VPC Flow Logs e GuardDuty, permitindo investigar a causa raiz de incidentes de seguranca com visualizacoes de relacionamentos.","simple":"Detective e o detetive que conecta os pontos — ele mostra quem fez o que, quando, e como os eventos estao relacionados.","avoid":"Detective e para investigacao pos-finding. GuardDuty detecta, Security Hub centraliza, Detective investiga. Use cada um no momento certo."},en:{tech:"Amazon Detective uses machine learning and graph analysis to automatically correlate events from CloudTrail, VPC Flow Logs, and GuardDuty, enabling root cause investigation of security incidents with relationship visualizations.","simple":"Detective is the investigator that connects the dots — it shows who did what, when, and how events are related.","avoid":"Detective is for post-finding investigation. GuardDuty detects, Security Hub centralizes, Detective investigates. Use each at the right moment."}}},
{en:"A company stores customer documents in S3 and needs to automatically detect PII (Personally Identifiable Information) to COMPLY WITH REGULATIONS. Which service should be used?",pt:"Uma empresa armazena documentos de clientes no S3 e precisa detectar automaticamente PII (Informacoes de Identificacao Pessoal) para CUMPRIR REGULAMENTOS. Qual servico deve ser usado?",o:{en:["Amazon Rekognition","Amazon Comprehend","Amazon Macie","Amazon Textract"],pt:["Amazon Rekognition","Amazon Comprehend","Amazon Macie","Amazon Textract"]},a:[2],t:"Macie",exp:{pt:{tech:"Amazon Macie usa machine learning para descobrir, classificar e proteger dados sensiveis no S3, especificamente projetado para detectar PII como numeros de CPF, cartao de credito, enderecos de email e dados de saude.","simple":"Macie fica de olho nos seus buckets S3 e avisa quando encontra dados pessoais que nao deveriam estar expostos.","avoid":"Nao use Comprehend para PII em S3 — Comprehend analisa texto avulso via API. Macie e o servico dedicado para escanear buckets S3 em busca de dados sensiveis."},en:{tech:"Amazon Macie uses machine learning to discover, classify, and protect sensitive data in S3, specifically designed to detect PII such as SSNs, credit card numbers, email addresses, and health data.","simple":"Macie watches your S3 buckets and alerts when it finds personal data that should not be exposed.","avoid":"Do not use Comprehend for PII in S3 — Comprehend analyzes standalone text via API. Macie is the dedicated service for scanning S3 buckets for sensitive data."}}},
{en:"A company wants to set up a MULTI-ACCOUNT AWS ENVIRONMENT with automated governance and guardrails using AWS best practices WITH LEAST OPERATIONAL OVERHEAD. Which service should be used?",pt:"Uma empresa quer configurar um AMBIENTE AWS MULTI-CONTA com governanca automatizada e guardrails usando melhores praticas AWS COM MENOR OVERHEAD OPERACIONAL. Qual servico deve ser usado?",o:{en:["Manually configure AWS Organizations and SCPs","AWS Control Tower","AWS Config with multi-account aggregator","AWS CloudFormation StackSets"],pt:["Configurar manualmente AWS Organizations e SCPs","AWS Control Tower","AWS Config com agregador multi-conta","AWS CloudFormation StackSets"]},a:[1],t:"ControlTower",exp:{pt:{tech:"AWS Control Tower automatiza a configuracao de um landing zone multi-conta com Organizations, SCPs, AWS Config, CloudTrail, e Account Factory pre-configurados seguindo o AWS Well-Architected Framework.","simple":"Control Tower monta toda a estrutura multi-conta para voce automaticamente. E como um assistente que configura tudo seguindo as melhores praticas.","avoid":"Configurar Organizations + SCPs manualmente e possivel, mas trabalhoso e propenso a erros. Control Tower e o caminho recomendado para novos ambientes multi-conta."},en:{tech:"AWS Control Tower automates the setup of a multi-account landing zone with Organizations, SCPs, AWS Config, CloudTrail, and Account Factory pre-configured following the AWS Well-Architected Framework.","simple":"Control Tower assembles the entire multi-account structure for you automatically. It is like an assistant that sets everything up following best practices.","avoid":"Configuring Organizations + SCPs manually is possible but labor-intensive and error-prone. Control Tower is the recommended path for new multi-account environments."}}},
{en:"An architect needs to deploy a web application WITHOUT MANAGING SERVERS and with MINIMUM OPERATIONAL OVERHEAD. The application receives unpredictable traffic. Which option is MOST appropriate?",pt:"Um arquiteto precisa implantar uma aplicacao web SEM GERENCIAR SERVIDORES e com MINIMO OVERHEAD OPERACIONAL. A aplicacao recebe trafego imprevisivel. Qual opcao e MAIS adequada?",o:{en:["Amazon EC2 with Auto Scaling Group","AWS Elastic Beanstalk","AWS Lambda with Amazon API Gateway","Amazon Lightsail"],pt:["Amazon EC2 com Auto Scaling Group","AWS Elastic Beanstalk","AWS Lambda com Amazon API Gateway","Amazon Lightsail"]},a:[2],t:"Serverless",exp:{pt:{tech:"Lambda + API Gateway e totalmente serverless — sem servidores para provisionar, sem ociosidade paga, escala automaticamente de zero a milhares de requisicoes por segundo. Beanstalk ainda gerencia EC2 por baixo dos panos.","simple":"Lambda e API Gateway sao serverless de verdade. Voce so paga quando seu codigo roda e a escala e automatica.","avoid":"Beanstalk simplifica o deploy mas ainda usa EC2 — voce paga pela instancia mesmo sem trafego. Lambda so cobra por execucao."},en:{tech:"Lambda + API Gateway is fully serverless — no servers to provision, no idle charges, scales automatically from zero to thousands of requests per second. Beanstalk still manages EC2 instances underneath.","simple":"Lambda and API Gateway are truly serverless. You only pay when your code runs and scaling is automatic.","avoid":"Beanstalk simplifies deployment but still uses EC2 — you pay for the instance even with no traffic. Lambda only charges per execution."}}},
{en:"A startup wants to deploy a simple WordPress website with a fixed monthly price and WITHOUT managing complex infrastructure. Which service is MOST appropriate?",pt:"Uma startup quer implantar um site WordPress simples com preco mensal fixo e SEM gerenciar infraestrutura complexa. Qual servico e MAIS adequado?",o:{en:["Amazon EC2 t3.micro with manual setup","Amazon Lightsail","AWS Elastic Beanstalk","Amazon ECS with Fargate"],pt:["Amazon EC2 t3.micro com configuracao manual","Amazon Lightsail","AWS Elastic Beanstalk","Amazon ECS com Fargate"]},a:[1],t:"Lightsail",exp:{pt:{tech:"Amazon Lightsail e um servico VPS simplificado com precos fixos mensais, blueprints pre-configurados (WordPress, LAMP, Node.js), storage, transferencia de dados e IP estatico inclusos. Projetado para workloads simples sem necessidade de configurar VPC, IAM complexo ou Auto Scaling.","simple":"Lightsail e como uma hospedagem gerenciada dentro da AWS. Preco fixo, configuracao simples, ideal para sites e apps pequenos.","avoid":"Lightsail nao e adequado para workloads enterprise ou com requisitos de escala. Para apps com picos de trafego, prefira EC2 com Auto Scaling ou solucoes serverless."},en:{tech:"Amazon Lightsail is a simplified VPS service with fixed monthly pricing, pre-configured blueprints (WordPress, LAMP, Node.js), storage, data transfer, and static IP included. Designed for simple workloads without needing to configure VPC, complex IAM, or Auto Scaling.","simple":"Lightsail is like managed hosting inside AWS. Fixed price, simple setup, ideal for small websites and apps.","avoid":"Lightsail is not suitable for enterprise workloads or scaling requirements. For apps with traffic spikes, prefer EC2 with Auto Scaling or serverless solutions."}}},
{en:"A media company needs GLOBALLY DISTRIBUTED content delivery with LOW LATENCY for static and dynamic content. Which service should be used?",pt:"Uma empresa de midia precisa de entrega de conteudo GLOBALMENTE DISTRIBUIDA com BAIXA LATENCIA para conteudo estatico e dinamico. Qual servico deve ser usado?",o:{en:["Amazon S3 Transfer Acceleration","Amazon CloudFront","AWS Global Accelerator","Amazon Route 53"],pt:["Amazon S3 Transfer Acceleration","Amazon CloudFront","AWS Global Accelerator","Amazon Route 53"]},a:[1],t:"CloudFront",exp:{pt:{tech:"Amazon CloudFront e uma CDN (Content Delivery Network) com mais de 450 pontos de presenca globalmente. Armazena cache de conteudo estatico e otimiza rotas para conteudo dinamico, reduzindo latencia para usuarios em qualquer regiao.","simple":"CloudFront coloca copias do seu conteudo em servidores espalhados pelo mundo para que usuarios baixem do servidor mais proximo.","avoid":"S3 Transfer Acceleration acelera uploads para S3, nao downloads para usuarios finais. Global Accelerator otimiza rota de rede TCP/UDP mas nao faz cache de conteudo."},en:{tech:"Amazon CloudFront is a CDN (Content Delivery Network) with over 450 global Points of Presence. It caches static content and optimizes routes for dynamic content, reducing latency for users in any region.","simple":"CloudFront places copies of your content on servers spread worldwide so users download from the nearest server.","avoid":"S3 Transfer Acceleration speeds up uploads to S3, not downloads for end users. Global Accelerator optimizes TCP/UDP network routing but does not cache content."}}},
{en:"A company needs to transfer 80 TB of data to AWS. The internet connection would take weeks. Which service provides the MOST cost-effective OFFLINE data transfer?",pt:"Uma empresa precisa transferir 80 TB de dados para a AWS. A conexao de internet levaria semanas. Qual servico fornece a transferencia de dados OFFLINE mais economica?",o:{en:["AWS Direct Connect","AWS DataSync","AWS Snowball Edge","AWS Storage Gateway"],pt:["AWS Direct Connect","AWS DataSync","AWS Snowball Edge","AWS Storage Gateway"]},a:[2],t:"SnowFamily",exp:{pt:{tech:"AWS Snowball Edge e um dispositivo fisico enviado pela AWS para voce carregar localmente e devolver para ingestao em massa. Para 80 TB, e muito mais rapido e barato do que transferir pela internet ou instalar Direct Connect.","simple":"Snowball e um HD externo gigante que a AWS manda para voce. Voce copia os dados, devolve fisicamente e a AWS carrega na nuvem.","avoid":"Direct Connect e para conectividade de rede dedicada continua, nao para migracao unica de grandes volumes. DataSync e para transferencias online continuas."},en:{tech:"AWS Snowball Edge is a physical device shipped by AWS for local loading and return for bulk ingestion. For 80 TB, it is much faster and cheaper than transferring over the internet or installing Direct Connect.","simple":"Snowball is a giant external hard drive AWS ships to you. You copy the data, physically return it, and AWS loads it into the cloud.","avoid":"Direct Connect is for continuous dedicated network connectivity, not one-time bulk migration. DataSync is for ongoing online transfers."}}},
{en:"A company has on-premises servers and needs to continuously sync files to S3 WITH MINIMUM OPERATIONAL OVERHEAD over the internet. Which service should be used?",pt:"Uma empresa tem servidores on-premises e precisa sincronizar arquivos continuamente para o S3 COM MINIMO OVERHEAD OPERACIONAL pela internet. Qual servico deve ser usado?",o:{en:["AWS Snowball Edge","AWS Storage Gateway","AWS DataSync","AWS Direct Connect"],pt:["AWS Snowball Edge","AWS Storage Gateway","AWS DataSync","AWS Direct Connect"]},a:[2],t:"DataSync",exp:{pt:{tech:"AWS DataSync e um servico gerenciado de transferencia de dados online que automatiza e acelera a movimentacao de dados entre on-premises e AWS (S3, EFS, FSx) com agendamento, verificacao de integridade e criptografia integrados.","simple":"DataSync e um agente que voce instala on-premises e que fica sincronizando dados automaticamente com a AWS pela internet.","avoid":"Storage Gateway e para integrar storage AWS como um sistema de arquivos local (NFS/SMB), nao especificamente para migracao ou sync em lote. DataSync e a escolha para transferencias agendadas e em lote."},en:{tech:"AWS DataSync is a managed online data transfer service that automates and accelerates data movement between on-premises and AWS (S3, EFS, FSx) with built-in scheduling, integrity verification, and encryption.","simple":"DataSync is an agent you install on-premises that automatically syncs data to AWS over the internet.","avoid":"Storage Gateway is for integrating AWS storage as a local file system (NFS/SMB), not specifically for migration or batch sync. DataSync is the choice for scheduled and batch transfers."}}},
{en:"A gaming company needs ULTRA-LOW LATENCY for players in the Los Angeles metropolitan area. The application runs in AWS us-west-2. Which service provides MINIMUM LATENCY for that specific metro area?",pt:"Uma empresa de games precisa de LATENCIA ULTRA-BAIXA para jogadores na area metropolitana de Los Angeles. A aplicacao roda em AWS us-west-2. Qual servico fornece MINIMA LATENCIA para aquela area metropolitana especifica?",o:{en:["Amazon CloudFront with edge locations","AWS Local Zones","AWS Wavelength","Amazon Route 53 latency routing"],pt:["Amazon CloudFront com edge locations","AWS Local Zones","AWS Wavelength","Amazon Route 53 com roteamento por latencia"]},a:[1],t:"LocalZones",exp:{pt:{tech:"AWS Local Zones sao extensoes de regioes AWS colocadas em areas metropolitanas especificas (LA, Dallas, Miami, etc.) que permitem rodar servicos como EC2, ECS e RDS com latencia de um digito de milissegundos para usuarios locais.","simple":"Local Zones sao mini-AWS instaladas em cidades especificas para aplicacoes que precisam estar fisicamente perto dos usuarios.","avoid":"CloudFront serve conteudo em cache, nao compute. Wavelength e para redes 5G de operadoras. Local Zones sao para compute de baixa latencia em metros especificos."},en:{tech:"AWS Local Zones are extensions of AWS regions placed in specific metropolitan areas (LA, Dallas, Miami, etc.) that allow running services like EC2, ECS, and RDS with single-digit millisecond latency for local users.","simple":"Local Zones are mini-AWS installations in specific cities for applications that need to be physically close to users.","avoid":"CloudFront serves cached content, not compute. Wavelength is for carrier 5G networks. Local Zones are for low-latency compute in specific metros."}}},
{en:"A company needs to analyze images uploaded by users to automatically detect INAPPROPRIATE CONTENT. Which AWS service should be used?",pt:"Uma empresa precisa analisar imagens enviadas por usuarios para detectar automaticamente CONTEUDO INAPROPRIADO. Qual servico AWS deve ser usado?",o:{en:["Amazon Textract","Amazon Comprehend","Amazon Rekognition","Amazon Polly"],pt:["Amazon Textract","Amazon Comprehend","Amazon Rekognition","Amazon Polly"]},a:[2],t:"AIServices",exp:{pt:{tech:"Amazon Rekognition e o servico de visao computacional da AWS que detecta objetos, cenas, rostos, celebridades, texto em imagens/videos e conteudo moderado (explicito, violento, etc.) usando modelos de deep learning pre-treinados.","simple":"Rekognition enxerga imagens e videos. Para analisar fotos ou detectar conteudo impróprio em imagens, use Rekognition.","avoid":"Textract extrai texto de documentos. Comprehend analisa sentimento e entidades em texto. Rekognition e o unico para analise visual de imagens e videos."},en:{tech:"Amazon Rekognition is the AWS computer vision service that detects objects, scenes, faces, celebrities, text in images/videos, and moderated content (explicit, violent, etc.) using pre-trained deep learning models.","simple":"Rekognition sees images and videos. To analyze photos or detect inappropriate content in images, use Rekognition.","avoid":"Textract extracts text from documents. Comprehend analyzes sentiment and entities in text. Rekognition is the only one for visual analysis of images and videos."}}},
{en:"A company needs to extract text and data from SCANNED PDF DOCUMENTS and forms to automate document processing. Which service should be used?",pt:"Uma empresa precisa extrair texto e dados de DOCUMENTOS PDF DIGITALIZADOS e formularios para automatizar o processamento. Qual servico deve ser usado?",o:{en:["Amazon Rekognition","Amazon Comprehend","Amazon Textract","Amazon Transcribe"],pt:["Amazon Rekognition","Amazon Comprehend","Amazon Textract","Amazon Transcribe"]},a:[2],t:"AIServices",exp:{pt:{tech:"Amazon Textract usa OCR avancado com ML para extrair texto, tabelas, formularios e dados estruturados de documentos escaneados. Vai alem do OCR simples ao identificar relacionamentos entre campos em formularios.","simple":"Textract le documentos escaneados e formularios, extraindo os dados de forma estruturada — como se digitalizasse um formulario em papel automaticamente.","avoid":"Rekognition pode detectar texto em imagens simples mas nao e otimizado para documentos estruturados. Para PDFs e formularios, sempre use Textract."},en:{tech:"Amazon Textract uses advanced ML-powered OCR to extract text, tables, forms, and structured data from scanned documents. It goes beyond simple OCR by identifying relationships between fields in forms.","simple":"Textract reads scanned documents and forms, extracting data in a structured way — like automatically digitizing a paper form.","avoid":"Rekognition can detect text in simple images but is not optimized for structured documents. For PDFs and forms, always use Textract."}}},
{en:"A company wants to analyze customer feedback text to determine SENTIMENT and extract KEY PHRASES automatically. Which service should be used?",pt:"Uma empresa quer analisar texto de feedback de clientes para determinar SENTIMENTO e extrair FRASES-CHAVE automaticamente. Qual servico deve ser usado?",o:{en:["Amazon Rekognition","Amazon Comprehend","Amazon Lex","Amazon Polly"],pt:["Amazon Rekognition","Amazon Comprehend","Amazon Lex","Amazon Polly"]},a:[1],t:"AIServices",exp:{pt:{tech:"Amazon Comprehend e o servico de NLP (Natural Language Processing) da AWS que detecta sentimento (positivo, negativo, neutro, misto), entidades, frases-chave, linguagem e topicos em texto nao estruturado.","simple":"Comprehend lê texto e entende o que esta sendo dito — se e positivo ou negativo, quais sao os temas principais e quais entidades sao mencionadas.","avoid":"Lex e para criar chatbots conversacionais com intencoes e slots. Comprehend e para analisar texto existente. Sao casos de uso completamente diferentes."},en:{tech:"Amazon Comprehend is the AWS NLP (Natural Language Processing) service that detects sentiment (positive, negative, neutral, mixed), entities, key phrases, language, and topics in unstructured text.","simple":"Comprehend reads text and understands what is being said — whether it is positive or negative, what the main themes are, and which entities are mentioned.","avoid":"Lex is for building conversational chatbots with intents and slots. Comprehend is for analyzing existing text. They are completely different use cases."}}},
{en:"A company wants to convert TEXT TO SPEECH to generate audio content for their application. Which service should be used?",pt:"Uma empresa quer converter TEXTO EM VOZ para gerar conteudo de audio para sua aplicacao. Qual servico deve ser usado?",o:{en:["Amazon Transcribe","Amazon Lex","Amazon Polly","Amazon Comprehend"],pt:["Amazon Transcribe","Amazon Lex","Amazon Polly","Amazon Comprehend"]},a:[2],t:"AIServices",exp:{pt:{tech:"Amazon Polly e o servico TTS (Text-to-Speech) da AWS que converte texto em fala natural usando vozes neurais. Suporta multiplos idiomas, vozes masculinas e femininas e formatos de audio como MP3 e OGG.","simple":"Polly converte texto escrito em audio falado. E o servico que da voz a textos.","avoid":"Transcribe faz o INVERSO — converte fala em texto (speech-to-text). Polly e text-to-speech. Nao confunda os dois."},en:{tech:"Amazon Polly is the AWS TTS (Text-to-Speech) service that converts text into natural-sounding speech using neural voices. It supports multiple languages, male and female voices, and audio formats like MP3 and OGG.","simple":"Polly converts written text to spoken audio. It is the service that gives voice to texts.","avoid":"Transcribe does the INVERSE — converts speech to text (speech-to-text). Polly is text-to-speech. Do not confuse the two."}}},
{en:"A developer wants to build a CONVERSATIONAL CHATBOT with natural language understanding for a customer service application. Which service should be used?",pt:"Um desenvolvedor quer construir um CHATBOT CONVERSACIONAL com entendimento de linguagem natural para um aplicativo de atendimento ao cliente. Qual servico deve ser usado?",o:{en:["Amazon Comprehend","Amazon Polly","Amazon Lex","Amazon Transcribe"],pt:["Amazon Comprehend","Amazon Polly","Amazon Lex","Amazon Transcribe"]},a:[2],t:"AIServices",exp:{pt:{tech:"Amazon Lex e o servico de criacao de interfaces conversacionais (chatbots e voice bots) usando a mesma tecnologia do Alexa. Fornece ASR (Automatic Speech Recognition) e NLU (Natural Language Understanding) com gestao de intencoes e slots.","simple":"Lex e o motor por tras do Alexa. Use-o para criar chatbots que entendem o que o usuario quer dizer e respondem de forma inteligente.","avoid":"Comprehend analisa texto passivo. Lex e para dialogo interativo com intencoes, slots e gerenciamento de conversas. Para chatbot, sempre Lex."},en:{tech:"Amazon Lex is the service for building conversational interfaces (chatbots and voice bots) using the same technology as Alexa. It provides ASR (Automatic Speech Recognition) and NLU (Natural Language Understanding) with intent and slot management.","simple":"Lex is the engine behind Alexa. Use it to build chatbots that understand what the user wants and respond intelligently.","avoid":"Comprehend analyzes passive text. Lex is for interactive dialogue with intents, slots, and conversation management. For chatbots, always Lex."}}},
{en:"A company needs to provision COMPLETE AWS INFRASTRUCTURE (VPCs, subnets, EC2, RDS) using code with FULL CONTROL over every resource. Which service provides this?",pt:"Uma empresa precisa provisionar INFRAESTRUTURA AWS COMPLETA (VPCs, subnets, EC2, RDS) usando codigo com CONTROLE TOTAL sobre cada recurso. Qual servico fornece isso?",o:{en:["AWS Elastic Beanstalk","AWS CloudFormation","AWS OpsWorks","AWS Lightsail"],pt:["AWS Elastic Beanstalk","AWS CloudFormation","AWS OpsWorks","AWS Lightsail"]},a:[1],t:"IaC",exp:{pt:{tech:"AWS CloudFormation e o servico de IaC (Infrastructure as Code) nativo da AWS que permite definir e provisionar qualquer recurso AWS via templates JSON ou YAML, com controle total sobre parametros, dependencias, pilhas aninhadas e rollback automatico.","simple":"CloudFormation e o IaC da AWS. Voce descreve tudo que quer criar num arquivo e ele cria, atualiza e deleta os recursos automaticamente.","avoid":"Beanstalk e PaaS — ele gerencia a infraestrutura por voce mas limita o controle. Se precisar de controle total sobre cada recurso, use CloudFormation."},en:{tech:"AWS CloudFormation is the native AWS IaC (Infrastructure as Code) service that allows defining and provisioning any AWS resource via JSON or YAML templates, with full control over parameters, dependencies, nested stacks, and automatic rollback.","simple":"CloudFormation is AWS IaC. You describe everything you want to create in a file and it automatically creates, updates, and deletes resources.","avoid":"Beanstalk is PaaS — it manages infrastructure for you but limits control. If you need full control over every resource, use CloudFormation."}}},
{en:"A developer wants to deploy a web application WITHOUT worrying about infrastructure. The service should handle scaling, load balancing, and monitoring automatically. Which service is MOST appropriate?",pt:"Um desenvolvedor quer implantar uma aplicacao web SEM se preocupar com infraestrutura. O servico deve tratar escala, load balancing e monitoramento automaticamente. Qual servico e MAIS adequado?",o:{en:["AWS CloudFormation","Amazon EC2 with manual setup","AWS Elastic Beanstalk","AWS Lambda"],pt:["AWS CloudFormation","Amazon EC2 com configuracao manual","AWS Elastic Beanstalk","AWS Lambda"]},a:[2],t:"Beanstalk",exp:{pt:{tech:"AWS Elastic Beanstalk e uma plataforma PaaS que gerencia automaticamente provisionamento de EC2, load balancer, Auto Scaling, monitoramento CloudWatch e atualizacoes de plataforma. O desenvolvedor apenas faz upload do codigo.","simple":"Beanstalk e o PaaS da AWS. Voce so envia o codigo (zip, Docker, etc.) e ele cuida de toda a infraestrutura por baixo.","avoid":"Lambda e melhor para funcoes event-driven sem estado. Beanstalk e melhor para aplicacoes web tradicionais (Rails, Django, Node.js) que precisam de um servidor persistente."},en:{tech:"AWS Elastic Beanstalk is a PaaS platform that automatically manages EC2 provisioning, load balancer, Auto Scaling, CloudWatch monitoring, and platform updates. The developer only uploads the code.","simple":"Beanstalk is the AWS PaaS. You just upload the code (zip, Docker, etc.) and it handles all the infrastructure underneath.","avoid":"Lambda is better for stateless event-driven functions. Beanstalk is better for traditional web applications (Rails, Django, Node.js) that need a persistent server."}}},
{en:"A company is reviewing the Trusted Advisor recommendations. Which of the following is NOT one of the FIVE Trusted Advisor check categories?",pt:"Uma empresa esta revisando as recomendacoes do Trusted Advisor. Qual das seguintes NAO e uma das CINCO categorias de verificacao do Trusted Advisor?",o:{en:["Cost Optimization","Security","Disaster Recovery","Service Limits"],pt:["Otimizacao de Custos","Seguranca","Recuperacao de Desastres","Limites de Servico"]},a:[2],t:"TrustedAdvisor",exp:{pt:{tech:"As cinco categorias do AWS Trusted Advisor sao: Cost Optimization, Security, Performance, Fault Tolerance e Service Limits. Disaster Recovery nao e uma categoria separada — a resiliencia e coberta em Fault Tolerance.","simple":"Trusted Advisor tem 5 categorias: Custo, Seguranca, Performance, Tolerancia a Falhas e Limites de Servico. Nao existe categoria de Disaster Recovery.","avoid":"Nao confunda Fault Tolerance (categoria do Trusted Advisor) com Disaster Recovery (estrategia de arquitetura). Sao conceitos diferentes."},en:{tech:"The five AWS Trusted Advisor categories are: Cost Optimization, Security, Performance, Fault Tolerance, and Service Limits. Disaster Recovery is not a separate category — resilience is covered under Fault Tolerance.","simple":"Trusted Advisor has 5 categories: Cost, Security, Performance, Fault Tolerance, and Service Limits. There is no Disaster Recovery category.","avoid":"Do not confuse Fault Tolerance (Trusted Advisor category) with Disaster Recovery (architecture strategy). They are different concepts."}}},
{en:"An organization wants to ensure that accounts in a specific OU can NEVER create resources in regions outside of us-east-1 and us-west-2. Which AWS feature enforces this restriction?",pt:"Uma organizacao quer garantir que contas em uma OU especifica NUNCA POSSAM criar recursos em regioes fora de us-east-1 e us-west-2. Qual funcionalidade AWS aplica essa restricao?",o:{en:["IAM Permission Boundaries","AWS Config Rules","Service Control Policies (SCPs) in AWS Organizations","AWS CloudTrail"],pt:["IAM Permission Boundaries","AWS Config Rules","Service Control Policies (SCPs) no AWS Organizations","AWS CloudTrail"]},a:[2],t:"Organizations",exp:{pt:{tech:"SCPs (Service Control Policies) no AWS Organizations funcionam como teto de permissoes para contas e OUs. Uma SCP deny em todas as regioes exceto as permitidas bloqueia a criacao de recursos, independentemente das politicas IAM locais das contas.","simple":"SCP e uma regra que vem de cima e nenhuma conta pode quebrar. Se a SCP proibe uma regiao, ninguem naquela OU consegue criar recursos la.","avoid":"SCPs nao concedem permissoes — apenas restringem. Permission Boundaries limitam usuarios/roles individuais, nao contas inteiras. Para restricao a nivel de conta/OU, use SCPs."},en:{tech:"SCPs (Service Control Policies) in AWS Organizations act as permission ceilings for accounts and OUs. A deny SCP on all regions except the allowed ones blocks resource creation regardless of the accounts local IAM policies.","simple":"SCP is a rule from above that no account can break. If the SCP prohibits a region, no one in that OU can create resources there.","avoid":"SCPs do not grant permissions — they only restrict. Permission Boundaries limit individual users/roles, not entire accounts. For account/OU-level restriction, use SCPs."}}},
{en:"A company needs to migrate a MySQL database to AWS with MINIMUM DOWNTIME. The source database must remain operational during migration. Which service should be used?",pt:"Uma empresa precisa migrar um banco de dados MySQL para a AWS com DOWNTIME MINIMO. O banco de dados de origem deve permanecer operacional durante a migracao. Qual servico deve ser usado?",o:{en:["AWS Snowball Edge","AWS Database Migration Service (DMS) with CDC","AWS DataSync","Manual mysqldump and restore"],pt:["AWS Snowball Edge","AWS Database Migration Service (DMS) com CDC","AWS DataSync","mysqldump manual e restauracao"]},a:[1],t:"Migration",exp:{pt:{tech:"AWS DMS com CDC (Change Data Capture) replica os dados inicialmente e depois sincroniza continuamente as mudancas do banco origem para o destino em tempo real. O banco de origem fica online durante todo o processo e o cutover e realizado com downtime minimo (segundos a minutos).","simple":"DMS com CDC e como uma copia ao vivo do banco — ele transfere os dados e continua copiando as mudancas em tempo real. Na hora de trocar, o downtime e minimo.","avoid":"mysqldump exige parar o banco para garantir consistencia ou aceitar dados potencialmente inconsistentes. Para producao com SLA, sempre use DMS com CDC."},en:{tech:"AWS DMS with CDC (Change Data Capture) replicates data initially and then continuously syncs changes from the source to the destination in real time. The source database stays online throughout and cutover is done with minimal downtime (seconds to minutes).","simple":"DMS with CDC is like a live copy of the database — it transfers the data and keeps copying changes in real time. At switchover, downtime is minimal.","avoid":"mysqldump requires stopping the database to guarantee consistency or accepting potentially inconsistent data. For production with SLA, always use DMS with CDC."}}},
