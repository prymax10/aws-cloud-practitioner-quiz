      en:{tech:"AWS Organizations enables centralized management of multiple AWS accounts. SCPs (Service Control Policies) control access to services. Consolidated Billing unifies billing and can generate volume discounts.",simple:"Organizations is like a corporate holding: a parent company manages several subsidiaries. It can set rules for all of them (access control) and receive a single consolidated invoice with volume discounts."}}},
{en:"Which service can you use to build a data warehouse in the cloud?",
 pt:"Qual servico voce pode usar para construir um data warehouse na nuvem?",
 o:{en:["AWS Shield","Amazon Redshift","Amazon RDS","Amazon Comprehend"],
    pt:["AWS Shield","Amazon Redshift","Amazon RDS","Amazon Comprehend"]},a:[1],
 exp:{pt:{tech:"Amazon Redshift e o servico de data warehouse da AWS, otimizado para analise de dados em escala de petabytes com armazenamento colunar e processamento massivamente paralelo (MPP).",simple:"Redshift e como um super-banco de dados feito para perguntas dificeis sobre MUITOS dados. Enquanto bancos normais (RDS) sao bons para o dia a dia, o Redshift e construido para relatorios pesados e analises gigantes."},
      en:{tech:"Amazon Redshift is AWS data warehouse service, optimized for petabyte-scale data analysis with columnar storage and massively parallel processing (MPP).",simple:"Redshift is like a super-database built for hard questions about LOTS of data. While regular databases (RDS) are good for daily operations, Redshift is built for heavy reports and massive analysis."}}},
{en:"Which AWS service allows you to buy third-party software?",
 pt:"Qual servico AWS permite comprar software de terceiros?",
 o:{en:["AWS Application Discovery Service","Amazon DevPay","AWS Marketplace","Resource Groups"],
    pt:["AWS Application Discovery Service","Amazon DevPay","AWS Marketplace","Resource Groups"]},a:[2],
 exp:{pt:{tech:"AWS Marketplace e uma loja digital que permite encontrar, comprar, implantar e gerenciar software de terceiros e servicos que rodam na AWS, com faturamento integrado a conta AWS.",simple:"O Marketplace e como uma loja de aplicativos (app store) da AWS: voce procura o software que precisa, compra e instala diretamente na sua conta. A cobranca vem junto na fatura da AWS."},
      en:{tech:"AWS Marketplace is a digital store that lets you find, buy, deploy, and manage third-party software and services that run on AWS, with billing integrated into your AWS account.",simple:"The Marketplace is like an app store for AWS: you search for the software you need, buy it, and install it directly in your account. The charge comes with your AWS bill."}}},
{en:"Which service can route end users to the nearest AWS Region for low latency?",
 pt:"Qual servico pode direcionar usuarios finais para a Regiao AWS mais proxima para baixa latencia?",
 o:{en:["Amazon Cognito","AWS Systems Manager","AWS Cloud9","Amazon Route 53"],
    pt:["Amazon Cognito","AWS Systems Manager","AWS Cloud9","Amazon Route 53"]},a:[3],
 exp:{pt:{tech:"Amazon Route 53 e um servico de DNS que suporta roteamento baseado em latencia, direcionando usuarios para a Regiao AWS com menor tempo de resposta. Tambem suporta roteamento geolocalizado e failover.",simple:"Route 53 e como um GPS inteligente para a internet: ele descobre onde o usuario esta e aponta para o servidor mais proximo e rapido, como um GPS que sempre escolhe o caminho com menos transito."},
      en:{tech:"Amazon Route 53 is a DNS service that supports latency-based routing, directing users to the AWS Region with the lowest response time. It also supports geolocation routing and failover.",simple:"Route 53 is like a smart GPS for the internet: it figures out where the user is and points them to the nearest and fastest server, like a GPS that always chooses the path with least traffic."}}},
{en:"Which feature allows users to sign in with existing corporate credentials?",
 pt:"Qual recurso permite que usuarios facam login com credenciais corporativas existentes?",
 o:{en:["Federation","Access keys","IAM Permissions","WAF rules"],
    pt:["Federacao","Chaves de acesso","Permissoes IAM","Regras do WAF"]},a:[0],
 exp:{pt:{tech:"A Federacao (Federation) permite que usuarios se autentiquem na AWS usando credenciais de um provedor de identidade externo (como Active Directory corporativo), sem criar usuarios IAM separados.",simple:"Federacao e como usar seu cracha da empresa para entrar em predios parceiros: voce nao precisa de um cracha novo para cada predio — o seu cracha corporativo e reconhecido e aceito."},
      en:{tech:"Federation allows users to authenticate to AWS using credentials from an external identity provider (like corporate Active Directory), without creating separate IAM users.",simple:"Federation is like using your company badge to enter partner buildings: you do not need a new badge for each building — your corporate badge is recognized and accepted."}}},
{en:"What is the main benefit of security groups on an RDS instance?",
 pt:"Qual e o principal beneficio dos security groups em uma instancia RDS?",
 o:{en:["Manages user access and encryption keys","Controls what IP ranges can connect to the database","Deploys SSL/TLS certificates for the database","Distributes incoming traffic across replicas"],
    pt:["Gerencia acesso de usuarios e chaves de criptografia","Controla quais faixas de IP podem se conectar ao banco de dados","Implanta certificados SSL/TLS para o banco de dados","Distribui trafego de entrada entre replicas"]},a:[1],
 exp:{pt:{tech:"Security Groups atuam como firewalls virtuais que controlam o trafego de entrada e saida com base em regras de IP, porta e protocolo. Em RDS, eles definem quais enderecos IP podem acessar o banco.",simple:"Security Groups sao como a lista de convidados de uma festa: so quem esta na lista (faixas de IP permitidas) consegue entrar. Quem nao esta na lista e barrado na porta."},
      en:{tech:"Security Groups act as virtual firewalls that control inbound and outbound traffic based on IP, port, and protocol rules. In RDS, they define which IP addresses can access the database.",simple:"Security Groups are like a guest list at a party: only those on the list (allowed IP ranges) can get in. Anyone not on the list is stopped at the door."}}},
{en:"Which ECS launch type gives you visibility and control over the underlying servers?",
 pt:"Qual tipo de lancamento do ECS da visibilidade e controle sobre os servidores subjacentes?",
 o:{en:["EC2 launch type","Fargate launch type","Lightsail launch type","Lambda launch type"],
    pt:["Tipo de lancamento EC2","Tipo de lancamento Fargate","Tipo de lancamento Lightsail","Tipo de lancamento Lambda"]},a:[0],
 exp:{pt:{tech:"O tipo de lancamento EC2 no ECS permite gerenciar diretamente as instancias EC2 que hospedam seus containers, dando controle total sobre a infraestrutura. Fargate e a alternativa serverless sem gerenciamento de servidores.",simple:"EC2 launch type e como ter sua propria cozinha: voce controla tudo, desde o fogao ate a geladeira. Fargate e como um servico de cozinha compartilhada onde voce so entrega a receita (container) e alguem cozinha pra voce."},
      en:{tech:"The EC2 launch type in ECS lets you directly manage the EC2 instances hosting your containers, giving full control over the infrastructure. Fargate is the serverless alternative without server management.",simple:"EC2 launch type is like having your own kitchen: you control everything from the stove to the fridge. Fargate is like a shared kitchen service where you just hand over the recipe (container) and someone cooks for you."}}},
{en:"Multiple standalone AWS accounts want to decrease their charges. What should they do?",
 pt:"Varias contas AWS independentes querem reduzir seus custos. O que devem fazer?",
 o:{en:["Remove all unnecessary accounts","Add accounts to an AWS Organization with Consolidated Billing","Track charges individually per member account","Enable tiered-pricing on each account"],
    pt:["Remover todas as contas desnecessarias","Adicionar contas a uma Organizacao AWS com Faturamento Consolidado","Rastrear cobrancos individualmente por conta membro","Habilitar precos por camada em cada conta"]},a:[1],
 exp:{pt:{tech:"AWS Organizations com Consolidated Billing unifica o faturamento de multiplas contas, permitindo descontos por volume combinado. Quanto maior o uso agregado, maiores os descontos em servicos como S3 e EC2.",simple:"E como um grupo de amigos que compra no atacado junto: cada um individualmente pagaria preco cheio, mas comprando em grupo (consolidated billing), todos ganham desconto pelo volume total."},
      en:{tech:"AWS Organizations with Consolidated Billing unifies billing across multiple accounts, enabling volume discounts on combined usage. The greater the aggregate usage, the larger the discounts on services like S3 and EC2.",simple:"It is like a group of friends buying wholesale together: individually each would pay full price, but buying as a group (consolidated billing), everyone gets a discount for the total volume."}}},
{en:"What two parts should you check for a VPC security audit on EC2?",
 pt:"Quais duas partes voce deve verificar em uma auditoria de seguranca de VPC em EC2?",
 o:{en:["Network ACLs and Traffic Manager","Network ACLs and Subnets","Security Groups and Internet Gateways","Security Groups and Network ACLs"],
    pt:["Network ACLs e Traffic Manager","Network ACLs e Sub-redes","Security Groups e Internet Gateways","Security Groups e Network ACLs"]},a:[3],
 exp:{pt:{tech:"Security Groups (nivel de instancia, stateful) e Network ACLs (nivel de sub-rede, stateless) sao as duas camadas de seguranca de rede na VPC. Auditar ambos garante cobertura completa do trafego.",simple:"E como a seguranca de um condominio com duas barreiras: Security Groups sao a tranca da porta do apartamento (protege cada instancia). Network ACLs sao a portaria do predio (protege a sub-rede inteira). Auditar os dois garante seguranca completa."},
      en:{tech:"Security Groups (instance level, stateful) and Network ACLs (subnet level, stateless) are the two layers of network security in a VPC. Auditing both ensures complete traffic coverage.",simple:"It is like the security of a building with two barriers: Security Groups are the apartment door lock (protects each instance). Network ACLs are the building lobby security (protects the entire subnet). Auditing both ensures complete security."}}},
{en:"What does the Business support plan provide? (Choose TWO)",
 pt:"O que o plano de suporte Business oferece? (Escolha DOIS)",
 o:{en:["Full set of Trusted Advisor checks","Support Concierge","Less than 15 minute response time for critical issues","AWS Support API access","Proactive Technical Account Manager"],
    pt:["Conjunto completo de verificacoes do Trusted Advisor","Support Concierge","Tempo de resposta inferior a 15 minutos para problemas criticos","Acesso a API do AWS Support","Technical Account Manager proativo"]},a:[0,3],multi:true,
 exp:{pt:{tech:"O plano Business inclui o conjunto completo de verificacoes do Trusted Advisor e acesso a AWS Support API para automacao. Concierge e TAM sao exclusivos do Enterprise. Resposta menor que 15 min e do Enterprise.",simple:"O plano Business e como ter um plano de saude completo: exames preventivos ilimitados (Trusted Advisor) e consultas por telefone/app (Support API). Mas medico pessoal exclusivo (TAM) e concierge so no plano VIP (Enterprise)."},
      en:{tech:"The Business plan includes the full set of Trusted Advisor checks and AWS Support API access for automation. Concierge and TAM are Enterprise-only. Sub-15 minute response is Enterprise-only.",simple:"The Business plan is like a comprehensive health plan: unlimited preventive checkups (Trusted Advisor) and phone/app consultations (Support API). But a dedicated personal doctor (TAM) and concierge are only in the VIP plan (Enterprise)."}}},
{en:"Which service automates deployment and scaling of web applications?",
 pt:"Qual servico automatiza a implantacao e o escalonamento de aplicacoes web?",
 o:{en:["Amazon S3","AWS Elastic Beanstalk","AWS CodeCommit","Amazon EFS"],
    pt:["Amazon S3","AWS Elastic Beanstalk","AWS CodeCommit","Amazon EFS"]},a:[1],
 exp:{pt:{tech:"AWS Elastic Beanstalk e um servico PaaS que automatiza implantacao, escalonamento, balanceamento de carga e monitoramento. Voce faz upload do codigo e ele provisiona a infraestrutura automaticamente.",simple:"Elastic Beanstalk e como um manobrista de hotel: voce entrega o carro (codigo) e ele estaciona, manobra e cuida de tudo. Voce nao precisa se preocupar com a vaga (infraestrutura) — so com o destino (aplicacao)."},
      en:{tech:"AWS Elastic Beanstalk is a PaaS service that automates deployment, scaling, load balancing, and monitoring. You upload your code and it provisions the infrastructure automatically.",simple:"Elastic Beanstalk is like a hotel valet: you hand over the car (code) and they park, maneuver, and take care of everything. You do not worry about the parking spot (infrastructure) — just the destination (application)."}}},
{en:"What is true about AWS security responsibility?",
 pt:"O que e verdadeiro sobre a responsabilidade de seguranca da AWS?",
 o:{en:["AWS manages everything for EC2 operating systems","Customers are responsible for patching databases running on EC2","Server-side encryption is always AWS responsibility","AWS is responsible for application-level security"],
    pt:["A AWS gerencia tudo para sistemas operacionais EC2","Clientes sao responsaveis por atualizar bancos de dados rodando em EC2","Criptografia server-side e sempre responsabilidade da AWS","A AWS e responsavel pela seguranca em nivel de aplicacao"]},a:[1],
 exp:{pt:{tech:"Em EC2 (IaaS), o cliente e responsavel por gerenciar o SO, aplicativos e bancos de dados instalados, incluindo patches e atualizacoes. A AWS cuida apenas do hardware e da infraestrutura subjacente.",simple:"EC2 e como alugar um apartamento vazio: o proprietario (AWS) cuida da estrutura do predio, mas a manutencao interna e sua. Se voce instalar um banco de dados, a responsabilidade de manter atualizado e toda sua."},
      en:{tech:"In EC2 (IaaS), the customer is responsible for managing the OS, applications, and databases installed, including patches and updates. AWS only takes care of the hardware and underlying infrastructure.",simple:"EC2 is like renting an empty apartment: the landlord (AWS) takes care of the building structure, but internal maintenance is yours. If you install a database, keeping it updated is entirely your responsibility."}}},
{en:"Which service provides the EASIEST way to set up and manage multiple AWS accounts?",
 pt:"Qual servico oferece a maneira MAIS FACIL de configurar e gerenciar multiplas contas AWS?",
 o:{en:["AWS Control Tower","Amazon Macie","AWS Systems Manager Patch Manager","AWS Security Hub"],
    pt:["AWS Control Tower","Amazon Macie","AWS Systems Manager Patch Manager","AWS Security Hub"]},a:[0],
 exp:{pt:{tech:"AWS Control Tower automatiza a configuracao de um ambiente multi-account seguro seguindo as melhores praticas da AWS. Configura landing zones, guardrails e fornece um dashboard centralizado.",simple:"Control Tower e como um construtor de condominios que entrega tudo pronto: regras do condominio (guardrails), apartamentos padronizados (contas) e um porteiro (dashboard). Voce nao precisa configurar cada conta manualmente."},
      en:{tech:"AWS Control Tower automates the setup of a secure multi-account environment following AWS best practices. It sets up landing zones, guardrails, and provides a centralized dashboard.",simple:"Control Tower is like a condo builder that delivers everything ready: condo rules (guardrails), standardized apartments (accounts), and a doorman (dashboard). You do not need to configure each account manually."}}},
{en:"How can you track EC2 CPU usage above 60%?",
 pt:"Como voce pode monitorar o uso de CPU do EC2 acima de 60%?",
 o:{en:["Use Amazon CloudFront","Set a threshold in AWS Config","Use Amazon CloudWatch Alarms","Use Amazon SNS"],
    pt:["Usar o Amazon CloudFront","Definir um limite no AWS Config","Usar alarmes do Amazon CloudWatch","Usar o Amazon SNS"]},a:[2],
 exp:{pt:{tech:"Amazon CloudWatch Alarms monitoram metricas e disparam acoes quando um limite e ultrapassado. Voce pode configurar um alarme para CPU acima de 60% que envia notificacao via SNS ou executa acoes automaticas.",simple:"CloudWatch Alarms e como o alarme de temperatura do motor do carro: voce define o limite (60% de CPU) e quando ultrapassa, o alerta dispara. SNS e o meio de notificacao, mas o alarme em si e do CloudWatch."},
      en:{tech:"Amazon CloudWatch Alarms monitor metrics and trigger actions when a threshold is breached. You can set an alarm for CPU above 60% that sends notifications via SNS or executes automated actions.",simple:"CloudWatch Alarms is like the engine temperature warning in a car: you set the limit (60% CPU) and when it exceeds, the alert fires. SNS is the notification method, but the alarm itself belongs to CloudWatch."}}},
{en:"What is the recommended storage for an often-changing database running on EC2?",
 pt:"Qual e o armazenamento recomendado para um banco de dados com alteracoes frequentes rodando em EC2?",
 o:{en:["Amazon EBS","Amazon RDS","Cannot run a database on EC2","Amazon DynamoDB"],
    pt:["Amazon EBS","Amazon RDS","Nao e possivel rodar banco de dados no EC2","Amazon DynamoDB"]},a:[0],
 exp:{pt:{tech:"Amazon EBS (Elastic Block Store) fornece armazenamento em bloco persistente de baixa latencia para EC2, ideal para bancos de dados com muitas operacoes de leitura/escrita. EBS persiste independentemente da instancia.",simple:"EBS e como o HD externo do seu computador: rapido, persistente e ideal para dados que mudam o tempo todo. Diferente do Instance Store que e como a RAM — perde tudo quando desliga."},
      en:{tech:"Amazon EBS (Elastic Block Store) provides persistent, low-latency block storage for EC2, ideal for databases with heavy read/write operations. EBS persists independently of the instance.",simple:"EBS is like an external hard drive for your computer: fast, persistent, and ideal for data that changes all the time. Unlike Instance Store which is like RAM — loses everything when powered off."}}},
{en:"What factors determine AWS Lambda charges? (Choose TWO)",
 pt:"Quais fatores determinam os custos do AWS Lambda? (Escolha DOIS)",
 o:{en:["Storage consumed by Lambda","Number of requests","Number of attached volumes","Placement groups used","Compute time consumed"],
    pt:["Armazenamento consumido pelo Lambda","Numero de requisicoes","Numero de volumes anexados","Grupos de posicionamento utilizados","Tempo de computacao consumido"]},a:[1,4],multi:true,
 exp:{pt:{tech:"Lambda cobra com base no numero de requisicoes (invocacoes) e no tempo de computacao (medido em ms, multiplicado pela memoria alocada em GB). O free tier inclui 1 milhao de requisicoes e 400.000 GB-segundos por mes.",simple:"Lambda cobra como um telefone pre-pago: voce paga por cada ligacao feita (requisicao) e pela duracao de cada ligacao (tempo de computacao). Se nao ligar, nao paga nada."},
      en:{tech:"Lambda charges based on the number of requests (invocations) and compute time (measured in ms, multiplied by allocated memory in GB). The free tier includes 1 million requests and 400,000 GB-seconds per month.",simple:"Lambda charges like a prepaid phone: you pay for each call made (request) and the duration of each call (compute time). If you do not call, you do not pay."}}},
{en:"What does Amazon GuardDuty do?",
 pt:"O que o Amazon GuardDuty faz?",
 o:{en:["Notifies you about abuse events in your account","Continuously monitors and detects threats in your account","Identifies root cause of security issues","Checks security groups for unrestricted access"],
    pt:["Notifica sobre eventos de abuso na sua conta","Monitora continuamente e detecta ameacas na sua conta","Identifica a causa raiz de problemas de seguranca","Verifica security groups com acesso irrestrito"]},a:[1],
 exp:{pt:{tech:"Amazon GuardDuty e um servico de deteccao de ameacas que monitora continuamente atividades maliciosas usando machine learning, analise de anomalias e inteligencia de ameacas integrada em logs do CloudTrail, VPC Flow Logs e DNS.",simple:"GuardDuty e como um guarda de seguranca com cameras inteligentes: ele fica de olho 24h, detecta comportamentos suspeitos automaticamente e te avisa quando algo estranho acontece."},
      en:{tech:"Amazon GuardDuty is a threat detection service that continuously monitors for malicious activity using machine learning, anomaly analysis, and integrated threat intelligence across CloudTrail logs, VPC Flow Logs, and DNS.",simple:"GuardDuty is like a security guard with smart cameras: it watches 24/7, automatically detects suspicious behavior, and alerts you when something strange happens."}}},
{en:"Which database service is best for applications requiring joins and complex transactions?",
 pt:"Qual servico de banco de dados e melhor para aplicacoes que requerem joins e transacoes complexas?",
 o:{en:["Amazon RDS","AWS Outposts","Amazon DocumentDB","Amazon DynamoDB"],
    pt:["Amazon RDS","AWS Outposts","Amazon DocumentDB","Amazon DynamoDB"]},a:[0],
 exp:{pt:{tech:"Amazon RDS e um servico de banco de dados relacional que suporta SQL, joins, foreign keys e transacoes ACID. DynamoDB e NoSQL (key-value) e DocumentDB e NoSQL (documentos) — ambos nao suportam joins nativamente.",simple:"RDS e como uma planilha organizada com colunas e formulas que conectam dados de varias abas (joins). DynamoDB e como pastas individuais — rapidas de acessar, mas nao conectam informacoes entre si facilmente."},
      en:{tech:"Amazon RDS is a relational database service that supports SQL, joins, foreign keys, and ACID transactions. DynamoDB is NoSQL (key-value) and DocumentDB is NoSQL (document) — both do not natively support joins.",simple:"RDS is like an organized spreadsheet with columns and formulas connecting data across tabs (joins). DynamoDB is like individual folders — fast to access, but they do not easily connect information between each other."}}},
{en:"What makes categorizing AWS resources easier?",
 pt:"O que facilita a categorizacao de recursos AWS?",
 o:{en:["Amazon CloudWatch","AWS Service Catalog","AWS Directory Service","AWS Tagging"],
    pt:["Amazon CloudWatch","AWS Service Catalog","AWS Directory Service","AWS Tagging"]},a:[3],
 exp:{pt:{tech:"Tags AWS sao pares chave-valor que voce atribui a recursos para organizacao, controle de custos, seguranca e automacao. Permitem filtrar e agrupar recursos por ambiente, equipe, projeto, etc.",simple:"Tags sao como etiquetas que voce cola nas caixas durante uma mudanca: 'cozinha', 'quarto', 'fragil'. Elas ajudam a organizar, encontrar e agrupar seus recursos sem bagunca."},
      en:{tech:"AWS Tags are key-value pairs you assign to resources for organization, cost control, security, and automation. They allow filtering and grouping resources by environment, team, project, etc.",simple:"Tags are like labels you stick on boxes during a move: 'kitchen', 'bedroom', 'fragile'. They help organize, find, and group your resources without mess."}}},
{en:"What should you consider about Amazon Glacier?",
 pt:"O que voce deve considerar sobre o Amazon Glacier?",
 o:{en:["It only accepts compressed format data","It is only for frequently accessed data","It does not provide immediate data retrieval","You can attach it to EC2 to store data"],
    pt:["So aceita dados em formato compactado","E apenas para dados acessados frequentemente","Nao oferece recuperacao imediata de dados","Voce pode anexa-lo ao EC2 para armazenar dados"]},a:[2],
 exp:{pt:{tech:"Amazon S3 Glacier e projetado para arquivamento de longo prazo com custo muito baixo. A recuperacao de dados pode levar de minutos a horas dependendo do tier (Expedited, Standard, Bulk). Nao oferece acesso instantaneo como o S3 Standard.",simple:"Glacier e como um deposito de guarda-moveis: barato para guardar coisas que voce raramente precisa, mas quando quer pegar algo de volta, precisa esperar. Nao e como uma gaveta na sua mesa que voce abre na hora."},
      en:{tech:"Amazon S3 Glacier is designed for long-term archival with very low cost. Data retrieval can take minutes to hours depending on the tier (Expedited, Standard, Bulk). It does not offer instant access like S3 Standard.",simple:"Glacier is like a storage unit facility: cheap for keeping things you rarely need, but when you want to retrieve something, you have to wait. It is not like a desk drawer you open instantly."}}},
{en:"Which service is best for running thousands of batch jobs?",
 pt:"Qual servico e melhor para executar milhares de jobs em lote?",
 o:{en:["Amazon EC2","AWS Batch","Lambda@Edge","AWS Fargate"],
    pt:["Amazon EC2","AWS Batch","Lambda@Edge","AWS Fargate"]},a:[1],
 exp:{pt:{tech:"AWS Batch planeja, agenda e executa workloads de computacao em lote de forma eficiente. Ele provisiona automaticamente a quantidade ideal de recursos computacionais com base no volume e nos requisitos dos jobs.",simple:"AWS Batch e como um gerente de fabrica que organiza a producao: ele recebe todos os pedidos (jobs), decide quantas maquinas ligar, distribui o trabalho e garante que tudo seja feito eficientemente."},
      en:{tech:"AWS Batch plans, schedules, and runs batch computing workloads efficiently. It automatically provisions the optimal amount of compute resources based on the volume and requirements of the jobs.",simple:"AWS Batch is like a factory manager who organizes production: they receive all orders (jobs), decide how many machines to turn on, distribute the work, and ensure everything gets done efficiently."}}},
{en:"How can you increase fault tolerance in AWS?",
 pt:"Como voce pode aumentar a tolerancia a falhas na AWS?",
 o:{en:["Deploy across multiple EC2 instances","Deploy across multiple Availability Zones","Host everything on one powerful instance","Deploy across multiple subnets"],
    pt:["Implantar em multiplas instancias EC2","Implantar em multiplas Zonas de Disponibilidade","Hospedar tudo em uma instancia poderosa","Implantar em multiplas sub-redes"]},a:[1],
 exp:{pt:{tech:"Implantar em multiplas AZs garante que se um datacenter inteiro falhar, as AZs restantes continuam operando. Multiplas instancias na mesma AZ ou sub-redes diferentes na mesma AZ nao protegem contra falha de AZ.",simple:"E como ter filiais em bairros diferentes da cidade: se um bairro ficar sem energia, as outras filiais continuam funcionando. Ter muitos funcionarios no mesmo predio (mesma AZ) nao ajuda se o predio inteiro ficar sem luz."},
      en:{tech:"Deploying across multiple AZs ensures that if an entire datacenter fails, the remaining AZs continue operating. Multiple instances in the same AZ or different subnets in the same AZ do not protect against AZ failure.",simple:"It is like having branches in different neighborhoods: if one neighborhood loses power, the other branches keep working. Having many employees in the same building (same AZ) does not help if the whole building loses power."}}},
{en:"Which AWS support plans offer 24/7 phone access? (Choose TWO)",
 pt:"Quais planos de suporte AWS oferecem acesso telefonico 24/7? (Escolha DOIS)",
 o:{en:["Developer","Premium","Enterprise","Standard","Business"],
    pt:["Developer","Premium","Enterprise","Standard","Business"]},a:[2,4],multi:true,
 exp:{pt:{tech:"Os planos Business e Enterprise oferecem acesso 24/7 por telefone, chat e email para todas as questoes. O plano Developer oferece apenas email em horario comercial. Basic e Standard nao tem suporte tecnico direto.",simple:"E como planos de assistencia automotiva: no plano basico (Developer) voce so manda email. Nos planos Business e Enterprise, voce pode ligar a qualquer hora do dia ou da noite — 24 horas, 7 dias por semana."},
      en:{tech:"Business and Enterprise plans offer 24/7 access via phone, chat, and email for all issues. Developer plan offers email only during business hours. Basic and Standard do not include direct technical support.",simple:"It is like roadside assistance plans: on the basic plan (Developer) you can only email. On Business and Enterprise plans, you can call anytime day or night — 24 hours, 7 days a week."}}},
{en:"What is the benefit of Loose Coupling?",
 pt:"Qual e o beneficio do Acoplamento Fraco (Loose Coupling)?",
 o:{en:["Eliminates the need for change management","Allows Cross-Region Replication","Reduces Privileged Access","Individual components can be modified without affecting others"],
    pt:["Elimina a necessidade de gerenciamento de mudancas","Permite replicacao entre regioes","Reduz acesso privilegiado","Componentes individuais podem ser modificados sem afetar os outros"]},a:[3],
 exp:{pt:{tech:"Loose Coupling significa que componentes de um sistema sao independentes entre si, comunicando-se por interfaces bem definidas. Mudancas em um componente nao afetam os demais, aumentando resiliencia e facilidade de manutencao.",simple:"E como blocos de LEGO: se voce quer trocar uma peca azul por uma vermelha, basta encaixar a nova no lugar. Nao precisa desmontar a construcao inteira. Cada bloco funciona independentemente."},
      en:{tech:"Loose Coupling means system components are independent of each other, communicating through well-defined interfaces. Changes to one component do not affect others, increasing resilience and maintainability.",simple:"It is like LEGO blocks: if you want to swap a blue piece for a red one, you just snap the new one in place. You do not need to dismantle the entire build. Each block works independently."}}},
{en:"Which service provides high throughput to multiple compute nodes?",
 pt:"Qual servico fornece alta vazao para multiplos nos de computacao?",
 o:{en:["Amazon EBS","AWS Storage Gateway","Amazon EFS","Amazon S3"],
    pt:["Amazon EBS","AWS Storage Gateway","Amazon EFS","Amazon S3"]},a:[2],
 exp:{pt:{tech:"Amazon EFS (Elastic File System) e um sistema de arquivos NFS elastico que pode ser montado simultaneamente por milhares de instancias EC2, fornecendo acesso compartilhado com alta vazao e baixa latencia.",simple:"EFS e como uma pasta compartilhada na rede do escritorio: todos os computadores (instancias) acessam os mesmos arquivos ao mesmo tempo. EBS e como um HD externo — so pode estar conectado a um computador por vez."},
      en:{tech:"Amazon EFS (Elastic File System) is an elastic NFS file system that can be mounted simultaneously by thousands of EC2 instances, providing shared access with high throughput and low latency.",simple:"EFS is like a shared folder on the office network: all computers (instances) access the same files at the same time. EBS is like an external hard drive — it can only be connected to one computer at a time."}}},
{en:"EBS volumes being replicated within an AZ provides what?",
 pt:"A replicacao de volumes EBS dentro de uma AZ fornece o que?",
 o:{en:["Elasticity","Durability","Traceability","Accessibility"],
    pt:["Elasticidade","Durabilidade","Rastreabilidade","Acessibilidade"]},a:[1],
 exp:{pt:{tech:"EBS replica automaticamente dados dentro da mesma AZ para proteger contra falha de hardware individual, garantindo durabilidade dos dados. Isso significa que os dados persistem mesmo se um disco fisico falhar.",simple:"Durabilidade e como fazer backup automatico no mesmo cofre: se uma gaveta (disco) quebrar, seus documentos ainda estao seguros em outra gaveta. Os dados sobrevivem a falhas de hardware."},
      en:{tech:"EBS automatically replicates data within the same AZ to protect against individual hardware failure, ensuring data durability. This means data persists even if a physical disk fails.",simple:"Durability is like automatic backup within the same vault: if one drawer (disk) breaks, your documents are still safe in another drawer. The data survives hardware failures."}}},
{en:"Which service integrates with AWS Shield and WAF for DDoS protection?",
 pt:"Qual servico se integra com o AWS Shield e WAF para protecao contra DDoS?",
 o:{en:["Amazon EFS","AWS Secrets Manager","AWS Systems Manager","Amazon CloudFront"],
    pt:["Amazon EFS","AWS Secrets Manager","AWS Systems Manager","Amazon CloudFront"]},a:[3],
 exp:{pt:{tech:"Amazon CloudFront se integra nativamente com AWS Shield (protecao DDoS) e AWS WAF (firewall de aplicacao web). O trafego e filtrado nos edge locations antes de chegar a origem, mitigando ataques na borda da rede.",simple:"CloudFront com Shield e WAF e como ter segurancos (Shield) e detectores de metal (WAF) na entrada de cada filial (edge location). Os ataques sao barrados antes mesmo de chegar ao predio principal."},
      en:{tech:"Amazon CloudFront natively integrates with AWS Shield (DDoS protection) and AWS WAF (web application firewall). Traffic is filtered at edge locations before reaching the origin, mitigating attacks at the network edge.",simple:"CloudFront with Shield and WAF is like having bouncers (Shield) and metal detectors (WAF) at the entrance of each branch (edge location). Attacks are stopped before even reaching the main building."}}},
{en:"Which service is used for encrypting EBS volumes?",
 pt:"Qual servico e usado para criptografar volumes EBS?",
 o:{en:["AWS WAF","AWS KMS","Amazon Macie","Amazon GuardDuty"],
    pt:["AWS WAF","AWS KMS","Amazon Macie","Amazon GuardDuty"]},a:[1],
 exp:{pt:{tech:"AWS KMS (Key Management Service) gerencia as chaves de criptografia usadas pelo EBS. Ao habilitar a criptografia do EBS, o KMS cria e gerencia as chaves mestras que protegem os dados em repouso.",simple:"KMS e o chaveiro mestre que guarda as chaves do seu cofre (EBS). Quando voce pede pra criptografar o volume, o KMS fornece a chave e cuida de toda a parte de seguranca."},
      en:{tech:"AWS KMS (Key Management Service) manages the encryption keys used by EBS. When you enable EBS encryption, KMS creates and manages the master keys that protect data at rest.",simple:"KMS is the master keychain that holds the keys to your safe (EBS). When you ask to encrypt the volume, KMS provides the key and handles all the security."}}},
{en:"What is an advantage of Amazon RDS?",
 pt:"Qual e uma vantagem do Amazon RDS?",
 o:{en:["Simplifies relational database administration tasks","Provides 11 nines of reliability","Automatically scales databases without limits","Enables dynamic CPU and RAM adjustment without downtime"],
    pt:["Simplifica tarefas de administracao de banco de dados relacional","Fornece 11 noves de confiabilidade","Escala bancos de dados automaticamente sem limites","Permite ajuste dinamico de CPU e RAM sem tempo de inatividade"]},a:[0],
 exp:{pt:{tech:"Amazon RDS gerencia tarefas operacionais como provisionamento, patches, backups, recuperacao, deteccao de falhas e reparos. Isso reduz significativamente a carga administrativa sobre equipes de DBA.",simple:"RDS e como morar num apartamento com servico incluso: limpeza (backups), manutencao (patches) e reparos (recuperacao) sao feitos pela administracao. Voce so precisa se preocupar com seus moveis (dados e esquema)."},
      en:{tech:"Amazon RDS manages operational tasks like provisioning, patching, backups, recovery, failure detection, and repair. This significantly reduces the administrative burden on DBA teams.",simple:"RDS is like living in a serviced apartment: cleaning (backups), maintenance (patches), and repairs (recovery) are handled by management. You only need to worry about your furniture (data and schema)."}}},
{en:"Which service can run a customer-managed relational database?",

 exp:{pt:{tech:"Amazon EC2 permite instalar e gerenciar qualquer software de banco de dados relacional (MySQL, PostgreSQL, Oracle, etc.) com controle total sobre configuracao, tuning e versao.",simple:"EC2 e como alugar um espaco vazio e montar sua propria oficina: voce escolhe as ferramentas (banco de dados), organiza como quiser e faz a manutencao. Total liberdade, total responsabilidade."},
      en:{tech:"Amazon EC2 allows you to install and manage any relational database software (MySQL, PostgreSQL, Oracle, etc.) with full control over configuration, tuning, and version.",simple:"EC2 is like renting an empty space and setting up your own workshop: you choose the tools (database), organize as you wish, and handle maintenance. Total freedom, total responsibility."}}},
{en:"You need to launch two EC2 instances for high availability. What action should you take?",
 pt:"Voce precisa lancar duas instancias EC2 para alta disponibilidade. Que acao deve tomar?",
 o:{en:["Launch across multiple AZs in a single Region","Launch as Reserved Instances in the same AZ","Launch in multiple Regions in the same AZ","Launch as Spot Instances in different AZs"],

 exp:{pt:{tech:"Para alta disponibilidade, as instancias devem estar em AZs diferentes dentro da mesma Regiao. Isso protege contra falha de um datacenter inteiro. Spot Instances podem ser interrompidas e nao sao adequadas para HA.",simple:"E como abrir duas lojas em bairros diferentes: se um bairro alagar, a outra loja continua aberta. Colocar as duas no mesmo bairro (mesma AZ) nao protege contra problemas do bairro inteiro."},
      en:{tech:"For high availability, instances should be in different AZs within the same Region. This protects against failure of an entire datacenter. Spot Instances can be interrupted and are not suitable for HA.",simple:"It is like opening two stores in different neighborhoods: if one neighborhood floods, the other store stays open. Putting both in the same neighborhood (same AZ) does not protect against area-wide problems."}}},

      en:{tech:"IAM Policies define who can access which S3 resources and what actions they can perform (GetObject, PutObject, etc.). Bucket Policies also control access, but IAM Policies are specific per user/group/role.",simple:"IAM Policies are like personalized badges that say exactly which room (bucket) each person can enter and what they can do inside (read, write, delete)."}}},
{en:"What is an AWS responsibility in the shared model for security?",

{en:"What is the low-cost option for hosting static websites?",

      en:{tech:"Amazon S3 supports static website hosting (HTML, CSS, JS) directly from the bucket, with no web server needed. With CloudFront in front, it offers low-cost global distribution with high performance.",simple:"S3 for static websites is like a digital bulletin board: you post your pages (HTML, CSS, JS) and anyone can see them. No need for an employee (server) attending each visitor."}}},
{en:"Which are AWS Well-Architected Framework pillars? (Choose TWO)",

 exp:{pt:{tech:"Os 6 pilares do Well-Architected Framework sao: Excelencia Operacional, Seguranca, Confiabilidade, Eficiencia de Performance, Otimizacao de Custos e Sustentabilidade. Multi-AZ, criptografia e alta disponibilidade sao praticas, nao pilares.",simple:"Os pilares sao como as colunas de um predio: Seguranca, Eficiencia de Performance, Confiabilidade, Excelencia Operacional, Otimizacao de Custos e Sustentabilidade. Multi-AZ e criptografia sao tijolos usados nas colunas, nao as colunas em si."},
      en:{tech:"The 6 pillars of the Well-Architected Framework are: Operational Excellence, Security, Reliability, Performance Efficiency, Cost Optimization, and Sustainability. Multi-AZ, encryption, and high availability are practices, not pillars.",simple:"The pillars are like the columns of a building: Security, Performance Efficiency, Reliability, Operational Excellence, Cost Optimization, and Sustainability. Multi-AZ and encryption are bricks used in the columns, not the columns themselves."}}},

{en:"When re-architecting a monolith application, which design principles apply? (Choose TWO)",

 exp:{pt:{tech:"Ao migrar de monolito para microsservicos, loose coupling garante que componentes sejam independentes e design for scalability garante que o sistema escale horizontalmente conforme a demanda.",simple:"Desmembrar um monolito e como transformar um restaurante unico em uma praca de alimentacao: cada quiosque (microsservico) e independente (loose coupling) e pode abrir mais unidades quando a demanda cresce (scalability)."},

{en:"What is the correct relationship between regions, Availability Zones, and edge locations?",

let activeQ = [];
let userAnswers = [];

function shuffle(arr){
  const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;
}

function pickQuestions(){
  activeQ=shuffle(Q).slice(0,65);
  userAnswers=new Array(65).fill(null);
  lockedQuestions=new Set();
  studyCorrect=0;studyAnswered=0;
}

function setLang(l){
  lang=l;
  document.getElementById('btn-pt').classList.toggle('active',l==='pt');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  document.getElementById('btn-study').textContent=ui[l].modeStudy;
  document.getElementById('btn-exam').textContent=ui[l].modeExam;
  updateStartScreen();
  if(document.getElementById('quiz-section').style.display!=='none'){
    renderQuiz();updateProgress();
    document.getElementById('btn-submit').textContent=ui[lang].submit;
    if(mode==='study') updateStudyScore();
  }
}

function setMode(m){
  if(document.getElementById('quiz-section').style.display!=='none') return;
  mode=m;
  document.getElementById('btn-study').classList.toggle('active',m==='study');
  document.getElementById('btn-exam').classList.toggle('active',m==='exam');
  updateStartScreen();
}

function newQuiz(){
  document.getElementById('results-section').style.display='none';
  document.getElementById('quiz-section').style.display='none';
  document.getElementById('start-screen').style.display='block';
  updateStartScreen();
}

function updateStartScreen(){
  const t=ui[lang];
  document.getElementById('header-sub').textContent=t.sub();
  document.getElementById('start-title').textContent=mode==='study'?t.startStudy:t.startExam;
  document.getElementById('start-desc').textContent=mode==='study'?t.descStudy:t.descExam;
  document.getElementById('btn-start').textContent=t.btnStart;
}

function startQuiz(){
  document.getElementById('start-screen').style.display='none';
  document.getElementById('quiz-section').style.display='block';
  document.getElementById('results-section').style.display='none';
  pickQuestions();
  if(mode==='exam'){
    document.getElementById('timer-bar').style.display='block';
    document.getElementById('study-score').style.display='none';
    timeLeft=3600;updateTimerDisplay();
    timerInterval=setInterval(()=>{timeLeft--;updateTimerDisplay();if(timeLeft<=0){clearInterval(timerInterval);submitQuiz();}},1000);
  } else {
    document.getElementById('timer-bar').style.display='none';
    document.getElementById('study-score').style.display='block';
    updateStudyScore();
  }
  renderQuiz();updateProgress();
  document.getElementById('btn-submit').textContent=ui[lang].submit;
}

function updateTimerDisplay(){
  const m=Math.floor(timeLeft/60),s=timeLeft%60;
  const el=document.getElementById('timer');
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.classList.toggle('warn',timeLeft<=300);
}

function updateStudyScore(){
  document.getElementById('ss-text').innerHTML=ui[lang].studyScore(studyCorrect,studyAnswered);
}

function renderQuiz(){
  const c=document.getElementById('questions-container');c.innerHTML='';
  const L=['A','B','C','D','E'];
  activeQ.forEach((q,i)=>{
    const isMulti=q.multi||false;const needed=q.a.length;
    const qText=q[lang];const opts=q.o[lang];
    let note=isMulti?`<div class="q-note">${ui[lang].choose(needed)}</div>`:'';
    let optHtml='';
    opts.forEach((opt,j)=>{
      const sel=userAnswers[i]&&userAnswers[i].includes(j)?'selected':'';
      const locked=lockedQuestions.has(i)?'locked':'';
      let reveal='';
      if(mode==='study'&&lockedQuestions.has(i)){
        if(q.a.includes(j)) reveal='correct-reveal';
        else if(userAnswers[i]&&userAnswers[i].includes(j)) reveal='wrong-reveal';
      }
      optHtml+=`<div class="option ${isMulti?'multi':''} ${sel} ${locked} ${reveal}" onclick="selectOption(${i},${j},${isMulti})" id="opt-${i}-${j}">
        <div class="check"></div><span class="letter">${L[j]}.</span><span class="text">${opt}</span></div>`;
    });
    const answered=userAnswers[i]&&userAnswers[i].length>0?'answered':'';
    let studyClass='';
    if(mode==='study'&&lockedQuestions.has(i)){
      const ca=[...q.a].sort();const ua=[...(userAnswers[i]||[])].sort();
      const ok=ua.length===ca.length&&ua.every((v,j)=>v===ca[j]);
      studyClass=ok?'study-right':'study-wrong';
    }
    let confirmBtn='';
    if(mode==='study'&&isMulti&&!lockedQuestions.has(i)){
      confirmBtn=`<button class="btn-confirm" id="confirm-${i}" onclick="confirmMulti(${i})">${ui[lang].confirmMulti}</button>`;
    }
    let expHtml='';
    if(mode==='study'&&lockedQuestions.has(i)){
      const ca=[...q.a].sort();const ua=[...(userAnswers[i]||[])].sort();
      const ok=ua.length===ca.length&&ua.every((v,j)=>v===ca[j]);
      const badge=ok?`<div class="study-badge right">${ui[lang].rightBadge}</div>`:`<div class="study-badge wrong">${ui[lang].wrongBadge}</div>`;
      const exp=q.exp[lang];
      expHtml=`${badge}<div class="explanation show">
        <div class="exp-label" style="color:#60a5fa">&#128218; ${ui[lang].techLabel}</div>
        <div class="exp-tech">${exp.tech}</div>
        <div class="exp-label" style="color:#a78bfa">&#128161; ${ui[lang].simpleLabel}</div>
        <div class="exp-simple">${exp.simple}</div></div>`;
    }
    c.innerHTML+=`<div class="question-card ${answered} ${studyClass}" id="card-${i}">
      <div class="q-number">${ui[lang].qOf(i+1)}</div>
      <div class="q-text">${qText}</div>${note}
      <div class="options">${optHtml}</div>${confirmBtn}${expHtml}</div>`;
  });
}

function selectOption(qi,oi,multi){
  if(lockedQuestions.has(qi)) return;
  if(multi){
    if(!Array.isArray(userAnswers[qi])) userAnswers[qi]=[];
    const idx=userAnswers[qi].indexOf(oi);
    if(idx>-1){userAnswers[qi].splice(idx,1);document.getElementById(`opt-${qi}-${oi}`).classList.remove('selected');}
    else{userAnswers[qi].push(oi);document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');}
    if(userAnswers[qi].length===0) userAnswers[qi]=null;
    const btn=document.getElementById(`confirm-${qi}`);
    if(btn) btn.style.display=userAnswers[qi]&&userAnswers[qi].length>0?'block':'none';
  } else {
    activeQ[qi].o[lang].forEach((_,j)=>{document.getElementById(`opt-${qi}-${j}`).classList.remove('selected');});
    userAnswers[qi]=[oi];
    document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
    if(mode==='study') checkStudyAnswer(qi);
  }
  const card=document.getElementById(`card-${qi}`);
  if(userAnswers[qi]&&userAnswers[qi].length>0) card.classList.add('answered');
  else card.classList.remove('answered');
  updateProgress();
}

function confirmMulti(qi){
  if(mode==='study') checkStudyAnswer(qi);
}

function checkStudyAnswer(qi){
  if(lockedQuestions.has(qi)) return;
  lockedQuestions.add(qi);studyAnswered++;
  const ca=[...activeQ[qi].a].sort();const ua=[...(userAnswers[qi]||[])].sort();
  const ok=ua.length===ca.length&&ua.every((v,j)=>v===ca[j]);
  if(ok) studyCorrect++;
  updateStudyScore();
  renderQuiz();updateProgress();
  const card=document.getElementById(`card-${qi}`);
  if(card) card.scrollIntoView({behavior:'smooth',block:'center'});
}

function updateProgress(){
  const answered=mode==='study'?studyAnswered:userAnswers.filter(a=>a!==null&&a.length>0).length;
  document.getElementById('progress-text').textContent=ui[lang].progress(answered);
  document.getElementById('progress-fill').style.width=`${(answered/65)*100}%`;
}

function submitQuiz(){
  if(timerInterval) clearInterval(timerInterval);
  const answered=userAnswers.filter(a=>a!==null&&a.length>0).length;
  if(mode==='exam'&&answered<65&&timeLeft>0){
    if(!confirm(ui[lang].confirmMsg(answered))) return;
  }
  let correct=0,wrong=0,unanswered=0;
  const L=['A','B','C','D','E'];
  const rc=document.getElementById('review-container');rc.innerHTML='';
  activeQ.forEach((q,i)=>{
    const ua=userAnswers[i];const ca=[...q.a].sort();let ok=false;
    if(ua&&ua.length>0){const s=[...ua].sort();ok=s.length===ca.length&&s.every((v,j)=>v===ca[j]);if(ok)correct++;else wrong++;}
    else unanswered++;
    const status=!ua||ua.length===0?'wrong':(ok?'right':'wrong');
    const t=ui[lang];
    const tag=!ua||ua.length===0?t.tagNone:(ok?t.tagRight:t.tagWrong);
    const yours=ua&&ua.length>0?ua.map(x=>L[x]).join(', '):'\u2014';
    const corr=ca.map(x=>L[x]).join(', ');
    const exp=q.exp[lang];
    const expBlock=ok?'':`<div class="explanation show" style="margin-top:12px">
      <div class="exp-label" style="color:#60a5fa">&#128218; ${t.techLabel}</div>
      <div class="exp-tech">${exp.tech}</div>
      <div class="exp-label" style="color:#a78bfa">&#128161; ${t.simpleLabel}</div>
      <div class="exp-simple">${exp.simple}</div></div>`;
    rc.innerHTML+=`<div class="review-card ${status}">
      <div class="q-head"><span style="color:#94a3b8;font-size:.85rem">${t.qOf(i+1)}</span><span class="tag ${status}">${tag}</span></div>
      <div class="q-text">${q[lang]}</div>
      <div class="answer-line"><span class="label-ans">${t.yourAns}</span><span class="${ok?'val-correct':'val-wrong'}">${yours}</span></div>
      <div class="answer-line"><span class="label-ans">${t.correctAns}</span><span class="val-correct">${corr}</span></div>
      ${expBlock}</div>`;
  });
  const pct=Math.round((correct/65)*100);const passed=pct>=70;const t=ui[lang];
  document.getElementById('score-pct').textContent=`${pct}%`;
  document.getElementById('score-pct').className=`score ${passed?'pass':'fail'}`;
  document.getElementById('score-label').textContent=t.of65(correct);
  document.getElementById('verdict').textContent=passed?t.pass:t.fail;
  document.getElementById('verdict').className=`verdict ${passed?'pass':'fail'}`;
  document.getElementById('res-correct').textContent=t.correct(correct);
  document.getElementById('res-wrong').textContent=t.wrong(wrong);
  document.getElementById('res-unanswered').textContent=unanswered>0?t.unanswered(unanswered):'';
  document.getElementById('review-title').textContent=t.reviewTitle;
  document.getElementById('btn-top').textContent=t.backTop;
  document.getElementById('btn-new').textContent=t.newQuiz;
  document.getElementById('quiz-section').style.display='none';
  document.getElementById('results-section').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

updateStartScreen();
</script>
</body>
</html>
