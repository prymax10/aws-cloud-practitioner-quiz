{en:"A company notices their monthly AWS bill is higher than expected. Which TWO actions can help reduce costs? (Choose TWO)",pt:"Uma empresa percebe que sua fatura mensal da AWS está mais alta do que o esperado. Quais DUAS ações podem ajudar a reduzir custos? (Escolha DUAS)",o:{en:["Right-size underutilized EC2 instances based on usage patterns","Purchase Reserved Instances or Savings Plans for steady-state workloads","Increase the number of Availability Zones used to three in every Region","Migrate all workloads from Lambda to EC2 for better pricing"],pt:["Redimensionar instâncias EC2 subutilizadas com base nos padrões de uso","Comprar Instâncias Reservadas ou Savings Plans para cargas de trabalho constantes","Aumentar o número de Zonas de Disponibilidade para três em cada Região","Migrar todas as cargas de trabalho do Lambda para EC2 para melhor preço"]},a:[0,1],multi:true,exp:{pt:{tech:"Right-sizing elimina desperdício ao ajustar recursos ao uso real, e compromissos de longo prazo como Reserved Instances ou Savings Plans oferecem descontos de até 72% comparado a On-Demand.",simple:"É como trocar um carro grande que gasta muita gasolina por um menor que atende suas necessidades (right-sizing), e comprar um passe anual de estacionamento em vez de pagar por dia (reserva)."},en:{tech:"Right-sizing eliminates waste by matching resources to actual usage, and long-term commitments like Reserved Instances or Savings Plans offer discounts of up to 72% compared to On-Demand.",simple:"It is like trading a big car that uses too much gas for a smaller one that meets your needs (right-sizing), and buying an annual parking pass instead of paying daily (reservation)."}}},
{en:"What is the MINIMUM number of Availability Zones in any AWS Region?",pt:"Qual é o número MÍNIMO de Zonas de Disponibilidade em qualquer Região AWS?",o:{en:["2","1","3","4"],pt:["2","1","3","4"]},a:[2],exp:{pt:{tech:"Cada Região AWS consiste em no mínimo 3 Zonas de Disponibilidade isoladas e fisicamente separadas dentro de uma área geográfica, proporcionando alta disponibilidade e tolerância a falhas.",simple:"É como uma rede de hospitais em uma cidade — cada cidade (Região) tem pelo menos 3 hospitais (AZs) independentes, assim se um tiver problemas, os outros continuam funcionando."},en:{tech:"Each AWS Region consists of a minimum of 3 isolated and physically separate Availability Zones within a geographic area, providing high availability and fault tolerance.",simple:"It is like a network of hospitals in a city — each city (Region) has at least 3 independent hospitals (AZs), so if one has problems, the others keep operating."}}},
{en:"Which AWS service continuously monitors for malicious activity and unauthorized behavior by analyzing VPC Flow Logs, CloudTrail logs, and DNS logs?",pt:"Qual serviço AWS monitora continuamente atividades maliciosas e comportamento não autorizado analisando VPC Flow Logs, logs do CloudTrail e logs de DNS?",o:{en:["Amazon GuardDuty","Amazon Macie","AWS Config","Amazon Inspector"],pt:["Amazon GuardDuty","Amazon Macie","AWS Config","Amazon Inspector"]},a:[0],exp:{pt:{tech:"O Amazon GuardDuty é um serviço de detecção de ameaças que monitora continuamente atividades maliciosas e comportamentos anômalos usando machine learning, análise de anomalias e inteligência de ameaças integrada.",simple:"É como um sistema de câmeras inteligentes na sua casa que não só grava, mas analisa os movimentos e te avisa se algo parecer suspeito — como alguém tentando abrir a porta às 3 da manhã."},en:{tech:"Amazon GuardDuty is a threat detection service that continuously monitors for malicious activity and anomalous behavior using machine learning, anomaly detection, and integrated threat intelligence.",simple:"It is like a smart camera system in your house that not only records but analyzes movements and alerts you if something looks suspicious — like someone trying to open the door at 3 AM."}}},
{en:"A developer needs to run containers on AWS without managing the underlying EC2 instances or server clusters. Which service should they use?",pt:"Um desenvolvedor precisa executar containers na AWS sem gerenciar as instâncias EC2 subjacentes ou clusters de servidores. Qual serviço deve usar?",o:{en:["AWS Fargate","Amazon ECS","Amazon EKS","Amazon EC2"],pt:["AWS Fargate","Amazon ECS","Amazon EKS","Amazon EC2"]},a:[0],exp:{pt:{tech:"O AWS Fargate é um mecanismo de computação serverless para containers que funciona com Amazon ECS e Amazon EKS, eliminando a necessidade de provisionar e gerenciar servidores.",simple:"É como pedir comida por delivery — você recebe o prato pronto sem precisar se preocupar com a cozinha, os ingredientes ou a limpeza. Você só define o que quer e o Fargate cuida do resto."},en:{tech:"AWS Fargate is a serverless compute engine for containers that works with Amazon ECS and Amazon EKS, removing the need to provision and manage servers.",simple:"It is like ordering food delivery — you get the dish ready without worrying about the kitchen, ingredients, or cleanup. You just define what you want and Fargate handles the rest."}}},
{en:"Which EBS volume type is designed for throughput-intensive workloads such as big data processing, data warehouses, and log processing?",pt:"Qual tipo de volume EBS é projetado para cargas de trabalho intensivas em throughput, como processamento de big data, data warehouses e processamento de logs?",o:{en:["Throughput Optimized HDD (st1)","General Purpose SSD (gp3)","Provisioned IOPS SSD (io2)","Cold HDD (sc1)"],pt:["HDD Otimizado para Throughput (st1)","SSD de Propósito Geral (gp3)","SSD de IOPS Provisionado (io2)","HDD Frio (sc1)"]},a:[0],exp:{pt:{tech:"Volumes st1 são projetados para cargas de trabalho de dados grandes e sequenciais que requerem alto throughput a baixo custo, como processamento de big data, ETL e data warehouses.",simple:"É como uma esteira de fábrica bem larga — ela não é a mais rápida para pegar um item específico, mas consegue transportar grandes volumes de material de forma contínua e barata."},en:{tech:"st1 volumes are designed for large, sequential data workloads that require high throughput at low cost, such as big data processing, ETL, and data warehouses.",simple:"It is like a wide factory conveyor belt — it is not the fastest at picking up a specific item, but it can transport large volumes of material continuously and cheaply."}}},
{en:"Which AWS service provides a fully managed file system that is compatible with the Windows Server Message Block (SMB) protocol?",pt:"Qual serviço AWS fornece um sistema de arquivos totalmente gerenciado compatível com o protocolo Windows Server Message Block (SMB)?",o:{en:["Amazon FSx for Windows File Server","Amazon EFS","Amazon S3","AWS Storage Gateway"],pt:["Amazon FSx for Windows File Server","Amazon EFS","Amazon S3","AWS Storage Gateway"]},a:[0],exp:{pt:{tech:"O Amazon FSx for Windows File Server oferece um sistema de arquivos nativo do Windows totalmente gerenciado, com suporte a SMB, Active Directory, NTFS e DFS, ideal para workloads Windows.",simple:"É como alugar um armário compartilhado no escritório que funciona perfeitamente com os computadores Windows de toda a equipe — todos acessam as mesmas pastas de forma transparente."},en:{tech:"Amazon FSx for Windows File Server provides a fully managed native Windows file system with SMB, Active Directory, NTFS, and DFS support, ideal for Windows workloads.",simple:"It is like renting a shared office filing cabinet that works seamlessly with the entire team Windows computers — everyone accesses the same folders transparently."}}},
{en:"A company needs a managed graph database to store and query highly connected datasets such as social networks and recommendation engines. Which service should they choose?",pt:"Uma empresa precisa de um banco de dados de grafos gerenciado para armazenar e consultar conjuntos de dados altamente conectados, como redes sociais e mecanismos de recomendação. Qual serviço devem escolher?",o:{en:["Amazon Neptune","Amazon DynamoDB","Amazon Redshift","Amazon ElastiCache"],pt:["Amazon Neptune","Amazon DynamoDB","Amazon Redshift","Amazon ElastiCache"]},a:[0],exp:{pt:{tech:"O Amazon Neptune é um serviço de banco de dados de grafos totalmente gerenciado que suporta Property Graph e RDF, otimizado para armazenar bilhões de relacionamentos e consultá-los com latência de milissegundos.",simple:"É como um mapa de amizades — em vez de guardar uma lista simples de pessoas, ele guarda quem conhece quem, permitindo perguntar coisas como: quais amigos em comum João e Maria têm?"},en:{tech:"Amazon Neptune is a fully managed graph database service supporting Property Graph and RDF, optimized for storing billions of relationships and querying them with millisecond latency.",simple:"It is like a friendship map — instead of keeping a simple list of people, it stores who knows whom, allowing you to ask things like: what mutual friends do John and Mary have?"}}},
{en:"Which AWS networking component allows resources in a private subnet to access the internet for software updates while preventing inbound connections from the internet?",pt:"Qual componente de rede AWS permite que recursos em uma sub-rede privada acessem a internet para atualizações de software enquanto impede conexões de entrada da internet?",o:{en:["NAT Gateway","Internet Gateway","Network ACL","Security Group"],pt:["NAT Gateway","Internet Gateway","Network ACL","Security Group"]},a:[0],exp:{pt:{tech:"Um NAT Gateway permite que instâncias em sub-redes privadas iniciem conexões de saída para a internet enquanto impede que a internet inicie conexões de entrada com essas instâncias.",simple:"É como uma portaria de condomínio — os moradores podem sair livremente para a rua, mas pessoas de fora não conseguem entrar sem serem convidadas."},en:{tech:"A NAT Gateway allows instances in private subnets to initiate outbound connections to the internet while preventing the internet from initiating inbound connections to those instances.",simple:"It is like a building concierge — residents can freely go out to the street, but people from outside cannot enter without being invited."}}},
{en:"Which AWS service records API calls made to your account, providing an audit trail for governance, compliance, and operational troubleshooting?",pt:"Qual serviço AWS registra chamadas de API feitas em sua conta, fornecendo uma trilha de auditoria para governança, conformidade e solução de problemas operacionais?",o:{en:["AWS CloudTrail","Amazon CloudWatch","AWS Config","AWS Systems Manager"],pt:["AWS CloudTrail","Amazon CloudWatch","AWS Config","AWS Systems Manager"]},a:[0],exp:{pt:{tech:"O AWS CloudTrail registra as chamadas de API feitas na conta AWS, incluindo quem fez a chamada, qual serviço foi usado, que ação foi executada e quando aconteceu.",simple:"É como o livro de registro de entrada e saída de um prédio comercial — anota quem entrou, em qual andar foi, o que fez e a que horas, permitindo investigar qualquer incidente."},en:{tech:"AWS CloudTrail records API calls made to the AWS account, including who made the call, which service was used, what action was taken, and when it happened.",simple:"It is like the sign-in logbook at an office building — it records who entered, which floor they visited, what they did, and at what time, allowing you to investigate any incident."}}},
{en:"A company wants to ensure that their cloud architecture can automatically recover from component failures without human intervention. Which pillar of the AWS Well-Architected Framework PRIMARILY addresses this requirement?",pt:"Uma empresa deseja garantir que sua arquitetura em nuvem possa se recuperar automaticamente de falhas em componentes sem intervenção humana. Qual pilar do AWS Well-Architected Framework aborda PRINCIPALMENTE esse requisito?",o:{en:["Reliability","Operational Excellence","Performance Efficiency","Security"],pt:["Confiabilidade","Excelência Operacional","Eficiência de Performance","Segurança"]},a:[0],exp:{pt:{tech:"O pilar de Confiabilidade do Well-Architected Framework foca na capacidade de um sistema se recuperar de falhas de infraestrutura ou serviço, adquirir recursos computacionais dinamicamente e mitigar interrupções.",simple:"É como um restaurante que tem um gerador de energia reserva — quando a luz acaba, o gerador liga sozinho sem precisar que alguém vá apertar um botão."},en:{tech:"The Reliability pillar of the Well-Architected Framework focuses on the ability of a system to recover from infrastructure or service disruptions, dynamically acquire computing resources, and mitigate disruptions.",simple:"It is like a restaurant that has a backup power generator — when the electricity goes out, the generator kicks in automatically without anyone needing to flip a switch."}}},
{en:"Which AWS pricing model would be MOST cost-effective for a batch processing workload that can be interrupted and resumed, and has flexible start and end times?",pt:"Qual modelo de preços da AWS seria MAIS econômico para uma carga de trabalho de processamento em lote que pode ser interrompida e retomada, com horários flexíveis de início e término?",o:{en:["Spot Instances","On-Demand Instances","Reserved Instances","Dedicated Hosts"],pt:["Instâncias Spot","Instâncias Sob Demanda","Instâncias Reservadas","Hosts Dedicados"]},a:[0],exp:{pt:{tech:"Spot Instances permitem aproveitar capacidade ociosa do EC2 com descontos de até 90% em relação ao preço sob demanda. São ideais para cargas de trabalho tolerantes a interrupções.",simple:"É como comprar passagens de última hora com desconto enorme — você aceita que o voo pode ser cancelado, mas paga muito menos. Se sua viagem é flexível, vale muito a pena."},en:{tech:"Spot Instances let you take advantage of unused EC2 capacity at discounts of up to 90% compared to On-Demand pricing. They are ideal for fault-tolerant and flexible workloads.",simple:"It is like buying last-minute flight tickets at a huge discount — you accept the flight might get canceled, but you pay much less. If your trip is flexible, it is totally worth it."}}},
{en:"A company has workloads in us-east-1 and wants to ensure high availability by deploying resources across multiple isolated locations within that Region. What are these isolated locations called?",pt:"Uma empresa tem cargas de trabalho em us-east-1 e deseja garantir alta disponibilidade implantando recursos em várias localizações isoladas dentro dessa Região. Como são chamadas essas localizações isoladas?",o:{en:["Availability Zones","Edge Locations","Local Zones","Wavelength Zones"],pt:["Zonas de Disponibilidade","Locais de Borda","Zonas Locais","Zonas Wavelength"]},a:[0],exp:{pt:{tech:"Zonas de Disponibilidade (AZs) são locais isolados dentro de uma Região AWS, cada uma com energia, refrigeração e rede independentes, conectadas por links de baixa latência.",simple:"É como um shopping que tem vários prédios separados — se um prédio pegar fogo, os outros continuam funcionando normalmente porque cada um tem sua própria estrutura elétrica e hidráulica."},en:{tech:"Availability Zones (AZs) are isolated locations within an AWS Region, each with independent power, cooling, and networking, connected through low-latency links.",simple:"It is like a shopping complex with several separate buildings — if one building catches fire, the others keep running normally because each has its own electrical and plumbing systems."}}},
{en:"Which AWS service uses machine learning to automatically discover, classify, and protect sensitive data such as personally identifiable information (PII) stored in Amazon S3?",pt:"Qual serviço da AWS usa aprendizado de máquina para descobrir, classificar e proteger automaticamente dados sensíveis como informações de identificação pessoal (PII) armazenados no Amazon S3?",o:{en:["Amazon Macie","Amazon GuardDuty","AWS Security Hub","Amazon Detective"],pt:["Amazon Macie","Amazon GuardDuty","AWS Security Hub","Amazon Detective"]},a:[0],exp:{pt:{tech:"O Amazon Macie utiliza machine learning e correspondência de padrões para descobrir e proteger dados sensíveis no S3, como números de CPF, cartões de crédito e outras PII.",simple:"É como ter um detetive particular que vasculha todos os seus arquivos guardados e marca com uma etiqueta vermelha tudo que contém informações pessoais — como documentos com CPF ou número de cartão de crédito."},en:{tech:"Amazon Macie uses machine learning and pattern matching to discover and protect sensitive data in S3, such as social security numbers, credit card numbers, and other PII.",simple:"It is like having a private detective who searches through all your stored files and puts a red tag on everything containing personal information — like documents with social security or credit card numbers."}}},
{en:"Which TWO statements are TRUE about AWS Lambda? (Choose TWO)",pt:"Quais DUAS afirmações são VERDADEIRAS sobre o AWS Lambda? (Escolha DUAS)",o:{en:["You pay only for the compute time your code actually consumes","Lambda automatically manages the underlying server infrastructure","You must pre-provision a fixed number of Lambda instances before use","Lambda functions can only be triggered by API Gateway"],pt:["Você paga apenas pelo tempo de computação que seu código realmente consome","O Lambda gerencia automaticamente a infraestrutura de servidores subjacente","Você deve provisionar previamente um número fixo de instâncias Lambda antes do uso","Funções Lambda só podem ser acionadas pelo API Gateway"]},a:[0,1],multi:true,exp:{pt:{tech:"O AWS Lambda é um serviço serverless que executa código em resposta a eventos. Não requer provisionamento de servidores, escala automaticamente e cobra apenas pelo tempo de execução em milissegundos.",simple:"É como contratar um encanador que só cobra pelas horas que realmente trabalhou na sua casa — você não paga salário fixo, não precisa dar ferramentas pra ele, e ele aparece automaticamente quando tem um cano pra consertar."},en:{tech:"AWS Lambda is a serverless service that runs code in response to events. It requires no server provisioning, scales automatically, and charges only for execution time in milliseconds.",simple:"It is like hiring a plumber who only charges for the hours actually worked at your house — you do not pay a fixed salary, you do not need to provide tools, and they show up automatically when there is a pipe to fix."}}},
{en:"A startup wants to deploy a simple web application quickly without managing individual infrastructure components like load balancers and auto scaling groups. Which AWS compute service is BEST suited for this use case?",pt:"Uma startup deseja implantar uma aplicação web simples rapidamente sem gerenciar componentes individuais de infraestrutura como balanceadores de carga e grupos de auto scaling. Qual serviço de computação da AWS é MAIS adequado para esse caso de uso?",o:{en:["Amazon Lightsail","Amazon EC2","Amazon EKS","AWS Fargate"],pt:["Amazon Lightsail","Amazon EC2","Amazon EKS","AWS Fargate"]},a:[0],exp:{pt:{tech:"O Amazon Lightsail oferece servidores virtuais, armazenamento, bancos de dados e rede em pacotes simplificados com preço fixo mensal previsível, ideal para aplicações simples e pequenas empresas.",simple:"É como alugar um apartamento mobiliado — tudo já vem pronto (cama, sofá, geladeira) e você só precisa entrar e usar. Com o EC2, seria como alugar um apartamento vazio e ter que comprar tudo separado."},en:{tech:"Amazon Lightsail provides virtual servers, storage, databases, and networking in simplified bundles with predictable monthly pricing, ideal for simple applications and small businesses.",simple:"It is like renting a furnished apartment — everything is already set up (bed, couch, fridge) and you just need to move in. With EC2, it would be like renting an empty apartment and having to buy everything separately."}}},
{en:"Which Amazon S3 storage class is designed for data that is accessed once or twice per quarter and requires retrieval times within 12 hours at the lowest storage cost?",pt:"Qual classe de armazenamento do Amazon S3 é projetada para dados acessados uma ou duas vezes por trimestre e que requer tempos de recuperação de até 12 horas com o menor custo de armazenamento?",o:{en:["S3 Glacier Deep Archive","S3 Glacier Flexible Retrieval","S3 Standard-Infrequent Access","S3 One Zone-Infrequent Access"],pt:["S3 Glacier Deep Archive","S3 Glacier Flexible Retrieval","S3 Standard-Acesso Infrequente","S3 One Zone-Acesso Infrequente"]},a:[0],exp:{pt:{tech:"O S3 Glacier Deep Archive é a classe de armazenamento mais barata do S3, projetada para retenção de longo prazo de dados acessados raramente, com tempo de recuperação padrão de até 12 horas.",simple:"É como guardar caixas de documentos antigos em um depósito no interior — é o aluguel mais barato possível, mas quando você precisa de algo, demora um bom tempo até chegar até você."},en:{tech:"S3 Glacier Deep Archive is the lowest-cost S3 storage class, designed for long-term retention of data accessed rarely, with a default retrieval time of up to 12 hours.",simple:"It is like storing boxes of old documents in a warehouse out in the countryside — it is the cheapest rent possible, but when you need something, it takes a while to get it to you."}}},
{en:"Which EBS volume type provides the highest performance for mission-critical, low-latency transactional workloads such as a large relational database?",pt:"Qual tipo de volume EBS oferece a maior performance para cargas de trabalho transacionais de baixa latência e missão crítica, como um grande banco de dados relacional?",o:{en:["Provisioned IOPS SSD (io2 Block Express)","General Purpose SSD (gp3)","Throughput Optimized HDD (st1)","Cold HDD (sc1)"],pt:["SSD IOPS Provisionado (io2 Block Express)","SSD Uso Geral (gp3)","HDD Throughput Otimizado (st1)","HDD Frio (sc1)"]},a:[0],exp:{pt:{tech:"Volumes io2 Block Express oferecem até 256.000 IOPS e 4.000 MB/s de throughput com latência sub-milissegundo, sendo o tipo de volume EBS de maior performance para cargas transacionais intensivas.",simple:"É como ter uma pista exclusiva de Fórmula 1 para seu carro — máxima velocidade, sem trânsito, sem obstáculos. Os outros tipos seriam estradas normais com diferentes limites de velocidade."},en:{tech:"io2 Block Express volumes provide up to 256,000 IOPS and 4,000 MB/s throughput with sub-millisecond latency, making them the highest-performance EBS volume type for intensive transactional workloads.",simple:"It is like having an exclusive Formula 1 track for your car — maximum speed, no traffic, no obstacles. The other types would be regular roads with different speed limits."}}},
{en:"A company needs a fully managed file system that is compatible with the Windows Server Message Block (SMB) protocol. Which AWS service should they use?",pt:"Uma empresa precisa de um sistema de arquivos totalmente gerenciado compatível com o protocolo Windows Server Message Block (SMB). Qual serviço da AWS deve ser utilizado?",o:{en:["Amazon FSx for Windows File Server","Amazon EFS","Amazon S3","AWS Storage Gateway"],pt:["Amazon FSx for Windows File Server","Amazon EFS","Amazon S3","AWS Storage Gateway"]},a:[0],exp:{pt:{tech:"O Amazon FSx for Windows File Server fornece um sistema de arquivos nativo do Windows totalmente gerenciado, com suporte completo ao protocolo SMB, integração com Active Directory e recursos NTFS.",simple:"É como ter um armário compartilhado no escritório que todo mundo com Windows consegue acessar naturalmente — sem precisar de adaptadores ou gambiarras. O EFS seria o equivalente para quem usa Linux."},en:{tech:"Amazon FSx for Windows File Server provides a fully managed native Windows file system with full SMB protocol support, Active Directory integration, and NTFS features.",simple:"It is like having a shared office cabinet that everyone with Windows can access naturally — no adapters or workarounds needed. EFS would be the equivalent for Linux users."}}},
{en:"Which AWS database service is a graph database designed for applications that need to work with highly connected datasets, such as social networks or fraud detection?",pt:"Qual serviço de banco de dados da AWS é um banco de dados de grafos projetado para aplicações que precisam trabalhar com conjuntos de dados altamente conectados, como redes sociais ou detecção de fraudes?",o:{en:["Amazon Neptune","Amazon DynamoDB","Amazon Redshift","Amazon ElastiCache"],pt:["Amazon Neptune","Amazon DynamoDB","Amazon Redshift","Amazon ElastiCache"]},a:[0],exp:{pt:{tech:"O Amazon Neptune é um serviço de banco de dados de grafos totalmente gerenciado que suporta modelos Property Graph e RDF, otimizado para armazenar e consultar bilhões de relacionamentos.",simple:"É como um mapa de amizades — em vez de guardar dados em tabelas como numa planilha, o Neptune guarda quem conhece quem, quem comprou o que, formando uma teia de conexões. Ideal para descobrir padrões como fraudes."},en:{tech:"Amazon Neptune is a fully managed graph database service supporting Property Graph and RDF models, optimized for storing and querying billions of relationships.",simple:"It is like a friendship map — instead of storing data in tables like a spreadsheet, Neptune stores who knows whom, who bought what, forming a web of connections. Ideal for discovering patterns like fraud."}}},
{en:"Which TWO features are included in the AWS Business Support plan but NOT in the Developer Support plan? (Choose TWO)",pt:"Quais DOIS recursos estão incluídos no plano AWS Business Support mas NÃO no plano Developer Support? (Escolha DOIS)",o:{en:["24/7 phone access to Cloud Support Engineers","AWS Trusted Advisor full set of checks","Access to a Technical Account Manager","Concierge Support Team access"],pt:["Acesso telefônico 24/7 a Engenheiros de Suporte Cloud","Conjunto completo de verificações do AWS Trusted Advisor","Acesso a um Technical Account Manager","Acesso à Equipe de Suporte Concierge"]},a:[0,1],multi:true,exp:{pt:{tech:"O plano Business Support inclui suporte telefônico 24/7, todas as verificações do Trusted Advisor, e tempos de resposta mais rápidos. TAM e Concierge são exclusivos do plano Enterprise.",simple:"É como a diferença entre um plano de saúde básico e um intermediário — no intermediário (Business) você pode ligar pro médico a qualquer hora e tem check-ups completos. Mas ter um médico pessoal dedicado (TAM) só vem no plano premium (Enterprise)."},en:{tech:"The Business Support plan includes 24/7 phone support, all Trusted Advisor checks, and faster response times. TAM and Concierge are exclusive to the Enterprise plan.",simple:"It is like the difference between a basic and mid-tier health plan — with the mid-tier (Business) you can call the doctor anytime and get full check-ups. But having a dedicated personal doctor (TAM) only comes with the premium plan (Enterprise)."}}},
{en:"A company wants to centrally view and manage compliance status across multiple AWS accounts. Which service provides a unified security and compliance dashboard?",pt:"Uma empresa deseja visualizar e gerenciar centralmente o status de conformidade em várias contas AWS. Qual serviço fornece um painel unificado de segurança e conformidade?",o:{en:["AWS Security Hub","Amazon GuardDuty","AWS CloudTrail","Amazon Inspector"],pt:["AWS Security Hub","Amazon GuardDuty","AWS CloudTrail","Amazon Inspector"]},a:[0],exp:{pt:{tech:"O AWS Security Hub fornece uma visão abrangente do estado de segurança na AWS, agregando alertas de diversos serviços como GuardDuty, Inspector e Macie, e verificando conformidade com padrões do setor.",simple:"É como o painel de controle de um prédio que mostra o status de todos os apartamentos — câmeras, alarmes, detectores de fumaça — tudo num lugar só, em vez de ter que checar andar por andar."},en:{tech:"AWS Security Hub provides a comprehensive view of the security state across AWS, aggregating alerts from multiple services like GuardDuty, Inspector, and Macie, and checking compliance against industry standards.",simple:"It is like the control panel of a building that shows the status of all apartments — cameras, alarms, smoke detectors — all in one place, instead of having to check floor by floor."}}},
{en:"Which AWS service automatically investigates security findings by analyzing log data from sources like VPC Flow Logs, CloudTrail, and GuardDuty to identify the root cause of potential security issues?",pt:"Qual serviço da AWS investiga automaticamente descobertas de segurança analisando dados de log de fontes como VPC Flow Logs, CloudTrail e GuardDuty para identificar a causa raiz de potenciais problemas de segurança?",o:{en:["Amazon Detective","Amazon Macie","AWS Config","AWS Shield"],pt:["Amazon Detective","Amazon Macie","AWS Config","AWS Shield"]},a:[0],exp:{pt:{tech:"O Amazon Detective coleta e analisa automaticamente dados de log para criar visualizações interativas que ajudam a analisar, investigar e identificar rapidamente a causa raiz de problemas de segurança.",simple:"É como um detetive de verdade que junta todas as pistas (pegadas, impressões digitais, câmeras) para montar a linha do tempo de um crime e descobrir quem fez o que e quando."},en:{tech:"Amazon Detective automatically collects and analyzes log data to create interactive visualizations that help analyze, investigate, and quickly identify the root cause of security issues.",simple:"It is like a real detective who gathers all the clues (footprints, fingerprints, camera footage) to build a timeline of a crime and figure out who did what and when."}}},
{en:"A company wants to run containerized applications without managing the underlying EC2 instances or cluster infrastructure. Which AWS service should they choose?",pt:"Uma empresa deseja executar aplicações em contêineres sem gerenciar as instâncias EC2 subjacentes ou a infraestrutura do cluster. Qual serviço da AWS deve ser escolhido?",o:{en:["AWS Fargate","Amazon EC2","Amazon ECS with EC2 launch type","Amazon Lightsail"],pt:["AWS Fargate","Amazon EC2","Amazon ECS com tipo de lançamento EC2","Amazon Lightsail"]},a:[0],exp:{pt:{tech:"O AWS Fargate é um mecanismo de computação serverless para contêineres que funciona com Amazon ECS e EKS, eliminando a necessidade de provisionar e gerenciar servidores.",simple:"É como pedir comida por delivery em vez de cozinhar — você diz o que quer (seu contêiner) e alguém cuida da cozinha inteira (servidores). Com ECS no EC2, você ainda teria que montar e limpar a cozinha."},en:{tech:"AWS Fargate is a serverless compute engine for containers that works with Amazon ECS and EKS, eliminating the need to provision and manage servers.",simple:"It is like ordering food delivery instead of cooking — you say what you want (your container) and someone handles the entire kitchen (servers). With ECS on EC2, you would still have to set up and clean the kitchen."}}},
{en:"Which S3 feature automatically moves objects between storage classes based on access patterns to optimize costs?",pt:"Qual recurso do S3 move automaticamente objetos entre classes de armazenamento com base nos padrões de acesso para otimizar custos?",o:{en:["S3 Intelligent-Tiering","S3 Lifecycle Policies","S3 Replication","S3 Versioning"],pt:["S3 Intelligent-Tiering","Políticas de Ciclo de Vida do S3","Replicação do S3","Versionamento do S3"]},a:[0],exp:{pt:{tech:"O S3 Intelligent-Tiering monitora automaticamente os padrões de acesso e move objetos entre camadas de acesso frequente e infrequente sem taxas de recuperação ou impacto na performance.",simple:"É como um armário inteligente que automaticamente coloca as roupas que você usa todo dia na frente e as que não usa há meses lá no fundo — sem você precisar fazer nada."},en:{tech:"S3 Intelligent-Tiering automatically monitors access patterns and moves objects between frequent and infrequent access tiers without retrieval fees or performance impact.",simple:"It is like a smart closet that automatically puts the clothes you wear daily at the front and the ones you have not worn in months at the back — without you needing to do anything."}}},
{en:"What is the MINIMUM number of Availability Zones in any AWS Region?",pt:"Qual é o número MÍNIMO de Zonas de Disponibilidade em qualquer Região da AWS?",o:{en:["3","1","2","4"],pt:["3","1","2","4"]},a:[0],exp:{pt:{tech:"Toda Região AWS possui no mínimo 3 Zonas de Disponibilidade fisicamente separadas e isoladas, conectadas por rede de alta largura de banda e baixa latência.",simple:"É como uma regra de um condomínio que exige no mínimo 3 saídas de emergência — garante que mesmo se duas falharem, ainda existe uma terceira opção."},en:{tech:"Every AWS Region has a minimum of 3 physically separate and isolated Availability Zones, connected by high-bandwidth, low-latency networking.",simple:"It is like a building code that requires at least 3 emergency exits — it ensures that even if two fail, there is still a third option."}}},
{en:"Which AWS service enables hybrid cloud storage by providing an on-premises gateway that connects to AWS cloud storage services?",pt:"Qual serviço da AWS permite armazenamento em nuvem híbrida fornecendo um gateway local que se conecta aos serviços de armazenamento em nuvem da AWS?",o:{en:["AWS Storage Gateway","AWS Direct Connect","Amazon S3 Transfer Acceleration","AWS DataSync"],pt:["AWS Storage Gateway","AWS Direct Connect","Amazon S3 Transfer Acceleration","AWS DataSync"]},a:[0],exp:{pt:{tech:"O AWS Storage Gateway é um serviço de armazenamento híbrido que oferece acesso local a armazenamento virtualmente ilimitado na nuvem, com cache local para dados acessados frequentemente.",simple:"É como ter uma porta mágica no seu escritório que conecta diretamente a um depósito gigante — os arquivos mais usados ficam no escritório para acesso rápido, mas tudo está guardado com segurança no depósito."},en:{tech:"AWS Storage Gateway is a hybrid storage service that provides on-premises access to virtually unlimited cloud storage, with local caching for frequently accessed data.",simple:"It is like having a magic door in your office that connects directly to a giant warehouse — frequently used files stay in the office for quick access, but everything is safely stored in the warehouse."}}},
{en:"A company wants to migrate a 50 TB database from on-premises to AWS with minimal downtime. The database must remain operational during migration. Which AWS service is BEST suited for this?",pt:"Uma empresa deseja migrar um banco de dados de 50 TB do local para a AWS com tempo de inatividade mínimo. O banco de dados deve permanecer operacional durante a migração. Qual serviço da AWS é MAIS adequado para isso?",o:{en:["AWS Database Migration Service (DMS)","AWS Snowball Edge","AWS Application Migration Service","AWS Transfer Family"],pt:["AWS Database Migration Service (DMS)","AWS Snowball Edge","AWS Application Migration Service","AWS Transfer Family"]},a:[0],exp:{pt:{tech:"O AWS DMS suporta migrações contínuas com replicação de dados em tempo real (CDC - Change Data Capture), permitindo que o banco de dados de origem permaneça totalmente operacional durante a migração.",simple:"É como fazer a mudança de uma loja sem fechar as portas — enquanto os funcionários continuam atendendo clientes, uma equipe vai transferindo tudo para o novo endereço aos poucos, sem interromper o negócio."},en:{tech:"AWS DMS supports continuous migrations with real-time data replication (CDC - Change Data Capture), allowing the source database to remain fully operational during migration.",simple:"It is like moving a store without closing the doors — while employees keep serving customers, a crew gradually transfers everything to the new location without interrupting the business."}}},
{en:"Which AWS service provides recommendations to help reduce costs, improve performance, enhance security, and increase fault tolerance across your AWS resources?",pt:"Qual serviço da AWS fornece recomendações para ajudar a reduzir custos, melhorar performance, aprimorar segurança e aumentar a tolerância a falhas nos seus recursos AWS?",o:{en:["AWS Trusted Advisor","AWS Config","Amazon CloudWatch","AWS CloudFormation"],pt:["AWS Trusted Advisor","AWS Config","Amazon CloudWatch","AWS CloudFormation"]},a:[0],exp:{pt:{tech:"O AWS Trusted Advisor inspeciona seu ambiente AWS e faz recomendações em cinco categorias: otimização de custos, performance, segurança, tolerância a falhas e limites de serviço.",simple:"É como ter um consultor financeiro e de segurança para sua casa — ele analisa tudo e diz: sua conta de luz está alta (custo), essa fechadura é fraca (segurança), seu encanamento pode melhorar (performance)."},en:{tech:"AWS Trusted Advisor inspects your AWS environment and makes recommendations across five categories: cost optimization, performance, security, fault tolerance, and service limits.",simple:"It is like having a financial and security consultant for your house — they analyze everything and say: your electricity bill is too high (cost), this lock is weak (security), your plumbing could be better (performance)."}}},
{en:"Which pillar of the AWS Well-Architected Framework focuses on the ability to run workloads effectively, gain insight into operations, and continuously improve processes?",pt:"Qual pilar do AWS Well-Architected Framework foca na capacidade de executar cargas de trabalho de forma eficaz, obter visibilidade das operações e melhorar processos continuamente?",o:{en:["Operational Excellence","Reliability","Performance Efficiency","Sustainability"],pt:["Excelência Operacional","Confiabilidade","Eficiência de Performance","Sustentabilidade"]},a:[0],exp:{pt:{tech:"O pilar de Excelência Operacional inclui a capacidade de dar suporte ao desenvolvimento, executar cargas de trabalho eficientemente, obter insights operacionais e melhorar processos continuamente.",simple:"É como um restaurante que não apenas serve boa comida, mas também monitora a satisfação dos clientes, treina funcionários regularmente e ajusta o cardápio com base no feedback — sempre buscando melhorar."},en:{tech:"The Operational Excellence pillar includes the ability to support development, run workloads efficiently, gain operational insights, and continuously improve processes.",simple:"It is like a restaurant that not only serves good food, but also monitors customer satisfaction, regularly trains staff, and adjusts the menu based on feedback — always seeking to improve."}}},
{en:"A company has 80 TB of data on-premises that needs to be transferred to S3 within one week, but their internet connection is only 1 Gbps. Which AWS service should they use?",pt:"Uma empresa tem 80 TB de dados locais que precisam ser transferidos para o S3 em uma semana, mas sua conexão de internet é de apenas 1 Gbps. Qual serviço da AWS deve ser utilizado?",o:{en:["AWS Snowball Edge","AWS Direct Connect","Amazon S3 Transfer Acceleration","AWS DataSync"],pt:["AWS Snowball Edge","AWS Direct Connect","Amazon S3 Transfer Acceleration","AWS DataSync"]},a:[0],exp:{pt:{tech:"O AWS Snowball Edge é um dispositivo físico com capacidade de 80 TB que permite transferir grandes volumes de dados para a AWS sem depender da largura de banda da rede. Com 1 Gbps, transferir 80 TB levaria mais de 7 dias.",simple:"É como precisar mudar todos os móveis de uma casa para outra cidade — em vez de mandar tudo pelo correio em caixinhas (internet), a AWS manda um caminhão de mudança (Snowball) que você enche e devolve."},en:{tech:"AWS Snowball Edge is a physical device with 80 TB capacity that allows transferring large volumes of data to AWS without relying on network bandwidth. At 1 Gbps, transferring 80 TB would take over 7 days.",simple:"It is like needing to move all furniture from one house to another city — instead of mailing everything in small boxes (internet), AWS sends a moving truck (Snowball) that you fill up and send back."}}},
{en:"Which TWO services can be used to establish a private, dedicated network connection from an on-premises data center to AWS? (Choose TWO)",pt:"Quais DOIS serviços podem ser usados para estabelecer uma conexão de rede privada e dedicada de um data center local para a AWS? (Escolha DOIS)",o:{en:["AWS Direct Connect","AWS Site-to-Site VPN","Amazon CloudFront","AWS Global Accelerator"],pt:["AWS Direct Connect","AWS VPN Site-to-Site","Amazon CloudFront","AWS Global Accelerator"]},a:[0,1],multi:true,exp:{pt:{tech:"O AWS Direct Connect fornece uma conexão física dedicada, enquanto o Site-to-Site VPN cria um túnel criptografado pela internet. Ambos conectam redes on-premises à AWS de forma privada.",simple:"É como ter duas formas de chegar ao trabalho com segurança — uma estrada particular construída só pra você (Direct Connect), ou um túnel blindado dentro da estrada pública (VPN). Ambas te protegem, mas a primeira é mais rápida e consistente."},en:{tech:"AWS Direct Connect provides a dedicated physical connection, while Site-to-Site VPN creates an encrypted tunnel over the internet. Both connect on-premises networks to AWS privately.",simple:"It is like having two ways to get to work safely — a private road built just for you (Direct Connect), or an armored tunnel within the public road (VPN). Both protect you, but the first is faster and more consistent."}}},
{en:"Which AWS service provides a content delivery network (CDN) that caches content at edge locations to reduce latency for end users?",pt:"Qual serviço da AWS fornece uma rede de entrega de conteúdo (CDN) que armazena conteúdo em cache nos locais de borda para reduzir a latência para os usuários finais?",o:{en:["Amazon CloudFront","AWS Global Accelerator","Amazon Route 53","Elastic Load Balancing"],pt:["Amazon CloudFront","AWS Global Accelerator","Amazon Route 53","Elastic Load Balancing"]},a:[0],exp:{pt:{tech:"O Amazon CloudFront é um serviço de CDN que distribui conteúdo por uma rede global de pontos de presença (edge locations), reduzindo a latência ao servir dados do local mais próximo do usuário.",simple:"É como uma rede de franquias de pizzaria — em vez de todas as pizzas saírem de uma única cozinha central, cada bairro tem uma filial que já tem as pizzas mais pedidas prontas, entregando muito mais rápido."},en:{tech:"Amazon CloudFront is a CDN service that distributes content through a global network of edge locations, reducing latency by serving data from the location closest to the user.",simple:"It is like a pizza franchise network — instead of all pizzas coming from a single central kitchen, each neighborhood has a branch that already has the most popular pizzas ready, delivering much faster."}}},
{en:"A company wants to record all API calls made in their AWS account for auditing and compliance. Which service should they enable?",pt:"Uma empresa deseja registrar todas as chamadas de API feitas em sua conta AWS para auditoria e conformidade. Qual serviço deve ser habilitado?",o:{en:["AWS CloudTrail","Amazon CloudWatch","AWS Config","AWS Systems Manager"],pt:["AWS CloudTrail","Amazon CloudWatch","AWS Config","AWS Systems Manager"]},a:[0],exp:{pt:{tech:"O AWS CloudTrail registra chamadas de API para sua conta AWS, incluindo quem fez a chamada, de qual endereço IP, quando foi feita e quais parâmetros foram usados.",simple:"É como as câmeras de segurança de um banco que gravam quem entrou, o que fez, a que horas e por qual porta — um registro completo de tudo que acontece para poder investigar depois se necessário."},en:{tech:"AWS CloudTrail records API calls for your AWS account, including who made the call, from which IP address, when it was made, and what parameters were used.",simple:"It is like the security cameras in a bank that record who entered, what they did, at what time, and through which door — a complete record of everything that happens so you can investigate later if needed."}}},
{en:"Which AWS service can synthesize natural-sounding human speech from text in multiple languages?",pt:"Qual serviço da AWS pode sintetizar fala humana com som natural a partir de texto em vários idiomas?",o:{en:["Amazon Polly","Amazon Lex","Amazon Transcribe","Amazon Translate"],pt:["Amazon Polly","Amazon Lex","Amazon Transcribe","Amazon Translate"]},a:[0],exp:{pt:{tech:"O Amazon Polly é um serviço de text-to-speech que usa tecnologias avançadas de deep learning para converter texto em fala realista, suportando dezenas de idiomas e vozes.",simple:"É como ter um locutor de rádio virtual que lê qualquer texto que você escrever, com voz natural e em vários idiomas — como um audiobook sendo criado na hora."},en:{tech:"Amazon Polly is a text-to-speech service that uses advanced deep learning technologies to convert text into lifelike speech, supporting dozens of languages and voices.",simple:"It is like having a virtual radio announcer who reads any text you write, with a natural voice in multiple languages — like an audiobook being created on the fly."}}},
{en:"What does the Sustainability pillar of the AWS Well-Architected Framework PRIMARILY focus on?",pt:"No que o pilar de Sustentabilidade do AWS Well-Architected Framework foca PRINCIPALMENTE?",o:{en:["Minimizing the environmental impact of running cloud workloads","Ensuring long-term financial sustainability of cloud spending","Maintaining system uptime for sustainable business operations","Building architectures that sustain high traffic loads"],pt:["Minimizar o impacto ambiental da execução de cargas de trabalho em nuvem","Garantir a sustentabilidade financeira de longo prazo dos gastos com nuvem","Manter o tempo de atividade do sistema para operações de negócios sustentáveis","Construir arquiteturas que sustentem altas cargas de tráfego"]},a:[0],exp:{pt:{tech:"O pilar de Sustentabilidade foca em minimizar os impactos ambientais da execução de cargas de trabalho na nuvem, incluindo dimensionamento eficiente de recursos, maximização da utilização e adoção de hardware eficiente.",simple:"É como otimizar o consumo de energia da sua casa — apagar luzes desnecessárias, usar eletrodomésticos eficientes e evitar desperdício. Na nuvem, significa usar apenas os recursos que realmente precisa para reduzir a pegada de carbono."},en:{tech:"The Sustainability pillar focuses on minimizing environmental impacts of running cloud workloads, including efficient resource sizing, maximizing utilization, and adopting efficient hardware.",simple:"It is like optimizing your home energy consumption — turning off unnecessary lights, using efficient appliances, and avoiding waste. In the cloud, it means using only the resources you truly need to reduce the carbon footprint."}}},
{en:"Which Amazon Aurora feature allows you to create up to 15 read replicas that share the same underlying storage volume, providing high availability and read scaling?",pt:"Qual recurso do Amazon Aurora permite criar até 15 réplicas de leitura que compartilham o mesmo volume de armazenamento subjacente, proporcionando alta disponibilidade e escalabilidade de leitura?",o:{en:["Aurora Replicas","Aurora Multi-Master","Aurora Global Database","Aurora Serverless"],pt:["Réplicas Aurora","Aurora Multi-Master","Aurora Global Database","Aurora Serverless"]},a:[0],exp:{pt:{tech:"As Aurora Replicas compartilham o mesmo cluster de armazenamento distribuído do Aurora, oferecendo réplicas de leitura com lag de replicação tipicamente abaixo de 10 ms e failover automático.",simple:"É como ter até 15 caixas de atendimento em um banco que consultam o mesmo sistema central — todos veem os mesmos dados atualizados, atendem mais clientes ao mesmo tempo, e se um caixa sair, os outros continuam funcionando."},en:{tech:"Aurora Replicas share the same Aurora distributed storage cluster, offering read replicas with replication lag typically below 10 ms and automatic failover.",simple:"It is like having up to 15 bank teller windows that all access the same central system — they all see the same updated data, serve more customers at once, and if one teller leaves, the others keep working."}}},
{en:"A team needs to automate the building, testing, and deployment of their application code every time a change is pushed to the repository. Which AWS service provides a fully managed continuous integration and continuous delivery pipeline?",pt:"Uma equipe precisa automatizar a construção, teste e implantação do código de sua aplicação toda vez que uma alteração é enviada ao repositório. Qual serviço da AWS fornece um pipeline de integração contínua e entrega contínua totalmente gerenciado?",o:{en:["AWS CodePipeline","AWS CodeBuild","AWS CodeDeploy","AWS CodeCommit"],pt:["AWS CodePipeline","AWS CodeBuild","AWS CodeDeploy","AWS CodeCommit"]},a:[0],exp:{pt:{tech:"O AWS CodePipeline é um serviço de entrega contínua totalmente gerenciado que orquestra as etapas de build, teste e deploy, integrando-se com CodeCommit, CodeBuild, CodeDeploy e ferramentas de terceiros.",simple:"É como uma esteira de fábrica automática — cada estação (construção, teste, entrega) faz sua parte em sequência. Quando alguém coloca uma peça nova no início da esteira, ela automaticamente passa por todas as etapas até chegar ao produto final."},en:{tech:"AWS CodePipeline is a fully managed continuous delivery service that orchestrates build, test, and deploy stages, integrating with CodeCommit, CodeBuild, CodeDeploy, and third-party tools.",simple:"It is like an automatic factory assembly line — each station (build, test, delivery) does its part in sequence. When someone places a new piece at the start of the line, it automatically goes through all stages until it becomes the final product."}}},
{en:"Which VPC component allows resources in a private subnet to access the internet for software updates while preventing inbound connections from the internet?",pt:"Qual componente de VPC permite que recursos em uma sub-rede privada acessem a internet para atualizações de software enquanto impede conexões de entrada da internet?",o:{en:["NAT Gateway","Internet Gateway","Security Group","Network ACL"],pt:["NAT Gateway","Internet Gateway","Security Group","Network ACL"]},a:[0],exp:{pt:{tech:"O NAT Gateway permite que instâncias em sub-redes privadas iniciem conexões de saída para a internet enquanto bloqueia tráfego de entrada não solicitado, fornecendo tradução de endereços de rede.",simple:"É como uma portaria de condomínio onde os moradores podem sair quando quiserem (atualizações), mas ninguém de fora consegue entrar sem ser convidado — a portaria só abre de dentro pra fora."},en:{tech:"NAT Gateway enables instances in private subnets to initiate outbound connections to the internet while blocking unsolicited inbound traffic, providing network address translation.",simple:"It is like a building reception desk where residents can leave whenever they want (updates), but no one from outside can get in without being invited — the door only opens from inside out."}}},
{en:"Which AWS service allows you to build conversational interfaces (chatbots) using voice and text powered by the same deep learning technologies as Alexa?",pt:"Qual serviço da AWS permite construir interfaces conversacionais (chatbots) usando voz e texto com as mesmas tecnologias de deep learning da Alexa?",o:{en:["Amazon Lex","Amazon Polly","Amazon Comprehend","Amazon Transcribe"],pt:["Amazon Lex","Amazon Polly","Amazon Comprehend","Amazon Transcribe"]},a:[0],exp:{pt:{tech:"O Amazon Lex fornece reconhecimento automático de fala (ASR) e compreensão de linguagem natural (NLU) para criar chatbots sofisticados com interfaces de conversa por voz e texto.",simple:"É como construir um atendente virtual para seu negócio — ele entende o que o cliente fala ou digita e responde de forma inteligente, igual quando você conversa com a Alexa."},en:{tech:"Amazon Lex provides automatic speech recognition (ASR) and natural language understanding (NLU) to build sophisticated chatbots with voice and text conversational interfaces.",simple:"It is like building a virtual attendant for your business — it understands what the customer says or types and responds intelligently, just like when you talk to Alexa."}}},
{en:"Which AWS service would you use to connect multiple VPCs and on-premises networks through a central hub, simplifying network architecture?",pt:"Qual serviço da AWS você usaria para conectar várias VPCs e redes locais por meio de um hub central, simplificando a arquitetura de rede?",o:{en:["AWS Transit Gateway","VPC Peering","AWS Direct Connect","Amazon Route 53"],pt:["AWS Transit Gateway","VPC Peering","AWS Direct Connect","Amazon Route 53"]},a:[0],exp:{pt:{tech:"O AWS Transit Gateway atua como um hub de rede regional que conecta VPCs e redes on-premises de forma centralizada, eliminando a complexidade de conexões ponto-a-ponto entre redes.",simple:"É como um aeroporto hub — em vez de ter voos diretos entre todas as cidades (conexões ponto-a-ponto entre VPCs), todas as cidades voam para o hub central e de lá conectam para qualquer outro destino. Muito mais simples de gerenciar."},en:{tech:"AWS Transit Gateway acts as a regional network hub that centrally connects VPCs and on-premises networks, eliminating the complexity of point-to-point connections between networks.",simple:"It is like a hub airport — instead of having direct flights between all cities (point-to-point connections between VPCs), all cities fly to the central hub and from there connect to any other destination. Much simpler to manage."}}},
{en:"A company wants to track whether their AWS resources comply with internal policies, such as ensuring all EBS volumes are encrypted. Which service should they use?",pt:"Uma empresa deseja rastrear se seus recursos AWS estão em conformidade com políticas internas, como garantir que todos os volumes EBS estejam criptografados. Qual serviço deve ser utilizado?",o:{en:["AWS Config","AWS CloudTrail","Amazon CloudWatch","AWS Trusted Advisor"],pt:["AWS Config","AWS CloudTrail","Amazon CloudWatch","AWS Trusted Advisor"]},a:[0],exp:{pt:{tech:"O AWS Config avalia continuamente as configurações dos recursos AWS em relação a regras definidas, registra o histórico de configurações e notifica sobre alterações ou não conformidades.",simple:"É como um fiscal de obras que verifica se sua casa está dentro das normas — ele confere se todas as tomadas têm aterramento (EBS criptografado), se as saídas de emergência existem, e te avisa quando algo foge da regra."},en:{tech:"AWS Config continuously evaluates AWS resource configurations against defined rules, records configuration history, and notifies about changes or non-compliance.",simple:"It is like a building inspector who checks if your house meets code — they verify all outlets are grounded (EBS encrypted), emergency exits exist, and alert you when something is out of compliance."}}},
{en:"Which pricing tool allows you to estimate the cost of your AWS architecture BEFORE deploying any resources?",pt:"Qual ferramenta de preços permite estimar o custo da sua arquitetura AWS ANTES de implantar qualquer recurso?",o:{en:["AWS Pricing Calculator","AWS Cost Explorer","AWS Budgets","AWS Cost and Usage Report"],pt:["AWS Calculadora de Preços","AWS Cost Explorer","AWS Budgets","AWS Relatório de Custo e Uso"]},a:[0],exp:{pt:{tech:"O AWS Pricing Calculator é uma ferramenta gratuita baseada na web que permite modelar soluções AWS e estimar custos mensais antes de provisionar qualquer recurso.",simple:"É como fazer um orçamento com um arquiteto antes de construir a casa — você descreve o que quer (quantos quartos, que materiais) e recebe uma estimativa de quanto vai custar, antes de gastar um centavo."},en:{tech:"The AWS Pricing Calculator is a free web-based tool that lets you model AWS solutions and estimate monthly costs before provisioning any resources.",simple:"It is like getting a quote from an architect before building a house — you describe what you want (how many rooms, what materials) and receive an estimate of how much it will cost, before spending a penny."}}},
{en:"Which TWO characteristics describe Amazon DynamoDB? (Choose TWO)",pt:"Quais DUAS características descrevem o Amazon DynamoDB? (Escolha DUAS)",o:{en:["It is a fully managed NoSQL database service","It provides single-digit millisecond performance at any scale","It uses SQL as its primary query language","It requires you to choose an Availability Zone for placement"],pt:["É um serviço de banco de dados NoSQL totalmente gerenciado","Oferece performance de milissegundos de um dígito em qualquer escala","Usa SQL como linguagem de consulta principal","Exige que você escolha uma Zona de Disponibilidade para posicionamento"]},a:[0,1],multi:true,exp:{pt:{tech:"O DynamoDB é um banco de dados NoSQL de chave-valor e documentos totalmente gerenciado, com performance consistente de milissegundos de um dígito, escalabilidade automática e replicação multi-AZ integrada.",simple:"É como um fichário super rápido onde você encontra qualquer ficha em menos de um segundo, não importa se tem 100 ou 100 milhões de fichas. E alguém cuida de toda a organização pra você."},en:{tech:"DynamoDB is a fully managed key-value and document NoSQL database with consistent single-digit millisecond performance, automatic scaling, and built-in multi-AZ replication.",simple:"It is like a super-fast filing cabinet where you find any card in less than a second, whether it has 100 or 100 million cards. And someone takes care of all the organization for you."}}},
{en:"Which AWS service provides managed Kubernetes clusters, allowing you to run containerized applications using the Kubernetes orchestration system?",pt:"Qual serviço da AWS fornece clusters Kubernetes gerenciados, permitindo executar aplicações em contêineres usando o sistema de orquestração Kubernetes?",o:{en:["Amazon EKS","Amazon ECS","AWS Fargate","AWS Elastic Beanstalk"],pt:["Amazon EKS","Amazon ECS","AWS Fargate","AWS Elastic Beanstalk"]},a:[0],exp:{pt:{tech:"O Amazon EKS (Elastic Kubernetes Service) é um serviço gerenciado que executa o plano de controle Kubernetes em alta disponibilidade, eliminando a necessidade de instalar e operar sua própria infraestrutura Kubernetes.",simple:"É como alugar uma cozinha industrial já equipada para seu restaurante — você traz suas receitas (contêineres) e a cozinha (Kubernetes) já está montada e funcionando. Sem o EKS, você teria que construir a cozinha do zero."},en:{tech:"Amazon EKS (Elastic Kubernetes Service) is a managed service that runs the Kubernetes control plane in high availability, eliminating the need to install and operate your own Kubernetes infrastructure.",simple:"It is like renting an already-equipped industrial kitchen for your restaurant — you bring your recipes (containers) and the kitchen (Kubernetes) is already set up and running. Without EKS, you would have to build the kitchen from scratch."}}},
{en:"Which service enables you to centrally manage patching, configuration, and run commands across a fleet of EC2 instances and on-premises servers?",pt:"Qual serviço permite gerenciar centralmente patches, configuração e executar comandos em uma frota de instâncias EC2 e servidores locais?",o:{en:["AWS Systems Manager","AWS Config","AWS CloudFormation","Amazon CloudWatch"],pt:["AWS Systems Manager","AWS Config","AWS CloudFormation","Amazon CloudWatch"]},a:[0],exp:{pt:{tech:"O AWS Systems Manager fornece uma interface unificada para gerenciar recursos AWS e on-premises, incluindo Patch Manager, Run Command, Parameter Store e Session Manager.",simple:"É como ter um controle remoto universal para todos os aparelhos da sua casa — de um lugar só, você atualiza a TV (patches), configura o ar-condicionado (configuração) e dá comandos para a Alexa (run commands)."},en:{tech:"AWS Systems Manager provides a unified interface for managing AWS and on-premises resources, including Patch Manager, Run Command, Parameter Store, and Session Manager.",simple:"It is like having a universal remote control for all appliances in your house — from one place, you update the TV (patches), configure the AC (configuration), and give commands to Alexa (run commands)."}}},
{en:"What is an AWS Local Zone designed to provide?",pt:"Para que uma AWS Local Zone foi projetada?",o:{en:["Ultra-low latency compute and storage closer to end users in specific metropolitan areas","A secondary backup region for disaster recovery","Additional Availability Zones within an existing Region","Edge caching for static content delivery"],pt:["Computação e armazenamento com latência ultrabaixa mais perto dos usuários finais em áreas metropolitanas específicas","Uma região secundária de backup para recuperação de desastres","Zonas de Disponibilidade adicionais dentro de uma Região existente","Cache de borda para entrega de conteúdo estático"]},a:[0],exp:{pt:{tech:"As AWS Local Zones colocam computação, armazenamento e serviços selecionados mais perto de grandes centros populacionais, permitindo latência de milissegundos de um dígito para aplicações sensíveis à latência.",simple:"É como abrir uma filial da sua empresa no centro da cidade em vez de ficar só na sede do subúrbio — seus clientes urbanos são atendidos muito mais rápido porque a filial está pertinho deles."},en:{tech:"AWS Local Zones place compute, storage, and select services closer to large population centers, enabling single-digit millisecond latency for latency-sensitive applications.",simple:"It is like opening a branch office downtown instead of staying only at the suburban headquarters — your urban customers are served much faster because the branch is right near them."}}},
{en:"Which Amazon Redshift feature makes it a suitable choice for running complex analytical queries across petabytes of structured data?",pt:"Qual característica do Amazon Redshift o torna uma escolha adequada para executar consultas analíticas complexas em petabytes de dados estruturados?",o:{en:["Columnar storage with massively parallel processing (MPP)","In-memory key-value caching","Graph-based relationship traversal","Document-based flexible schema"],pt:["Armazenamento colunar com processamento massivamente paralelo (MPP)","Cache de chave-valor em memória","Travessia de relacionamentos baseada em grafos","Esquema flexível baseado em documentos"]},a:[0],exp:{pt:{tech:"O Amazon Redshift utiliza armazenamento colunar e MPP para distribuir e paralelizar consultas em múltiplos nós, otimizando a performance de consultas analíticas complexas em grandes volumes de dados.",simple:"É como ter uma equipe de 100 pessoas pesquisando informações em uma biblioteca gigante ao mesmo tempo — cada pessoa cuida de uma seção diferente (paralelo), e os livros estão organizados por assunto em colunas (colunar), tornando a busca muito mais rápida."},en:{tech:"Amazon Redshift uses columnar storage and MPP to distribute and parallelize queries across multiple nodes, optimizing performance of complex analytical queries on large data volumes.",simple:"It is like having a team of 100 people searching for information in a giant library at the same time — each person handles a different section (parallel), and the books are organized by topic in columns (columnar), making the search much faster."}}},
{en:"Which service can extract text and data from scanned documents, forms, and tables using machine learning?",pt:"Qual serviço pode extrair texto e dados de documentos digitalizados, formulários e tabelas usando aprendizado de máquina?",o:{en:["Amazon Textract","Amazon Rekognition","Amazon Comprehend","Amazon Translate"],pt:["Amazon Textract","Amazon Rekognition","Amazon Comprehend","Amazon Translate"]},a:[0],exp:{pt:{tech:"O Amazon Textract usa ML para extrair automaticamente texto impresso, manuscrito e dados estruturados de documentos digitalizados, indo além do OCR simples ao entender a estrutura de formulários e tabelas.",simple:"É como ter um assistente que pega uma pilha de formulários em papel, lê tudo automaticamente e organiza os dados em uma planilha — nome aqui, CPF ali, endereço acolá — sem você precisar digitar nada."},en:{tech:"Amazon Textract uses ML to automatically extract printed text, handwriting, and structured data from scanned documents, going beyond simple OCR by understanding form and table structure.",simple:"It is like having an assistant who takes a stack of paper forms, reads everything automatically, and organizes the data into a spreadsheet — name here, ID there, address over there — without you needing to type anything."}}},
{en:"A company wants to protect their web application from common exploits like SQL injection and cross-site scripting. Which AWS service should they use?",pt:"Uma empresa deseja proteger sua aplicação web contra exploits comuns como injeção de SQL e cross-site scripting. Qual serviço da AWS deve ser utilizado?",o:{en:["AWS WAF","AWS Shield","Amazon GuardDuty","AWS Firewall Manager"],pt:["AWS WAF","AWS Shield","Amazon GuardDuty","AWS Firewall Manager"]},a:[0],exp:{pt:{tech:"O AWS WAF (Web Application Firewall) permite criar regras personalizadas para filtrar tráfego web malicioso, protegendo contra ataques comuns como SQL injection, XSS e outros exploits da camada de aplicação.",simple:"É como ter um segurança na porta do restaurante que verifica cada cliente — se alguém tentar entrar com objetos proibidos (código malicioso), o segurança barra na entrada antes que cause qualquer problema."},en:{tech:"AWS WAF (Web Application Firewall) lets you create custom rules to filter malicious web traffic, protecting against common attacks like SQL injection, XSS, and other application-layer exploits.",simple:"It is like having a bouncer at the restaurant door who checks each customer — if someone tries to enter with prohibited items (malicious code), the bouncer blocks them at the entrance before they cause any problems."}}},
{en:"Which AWS service provides intelligent threat detection by continuously monitoring for malicious activity and unauthorized behavior across your AWS accounts?",pt:"Qual serviço da AWS fornece detecção inteligente de ameaças monitorando continuamente atividades maliciosas e comportamento não autorizado em suas contas AWS?",o:{en:["Amazon GuardDuty","AWS WAF","Amazon Inspector","AWS CloudTrail"],pt:["Amazon GuardDuty","AWS WAF","Amazon Inspector","AWS CloudTrail"]},a:[0],exp:{pt:{tech:"O Amazon GuardDuty é um serviço de detecção de ameaças que analisa continuamente dados de fontes como CloudTrail, VPC Flow Logs e DNS logs usando ML e inteligência de ameaças para identificar atividades suspeitas.",simple:"É como ter um cão de guarda treinado que patrulha sua casa 24 horas — ele conhece quem mora ali e, se detectar alguém estranho se comportando de forma suspeita, late imediatamente para te alertar."},en:{tech:"Amazon GuardDuty is a threat detection service that continuously analyzes data from sources like CloudTrail, VPC Flow Logs, and DNS logs using ML and threat intelligence to identify suspicious activities.",simple:"It is like having a trained guard dog that patrols your house 24 hours — it knows who lives there and, if it detects someone unfamiliar behaving suspiciously, it barks immediately to alert you."}}},
{en:"Which TWO are benefits of using Amazon ElastiCache in front of a relational database? (Choose TWO)",pt:"Quais DOIS são benefícios de usar o Amazon ElastiCache na frente de um banco de dados relacional? (Escolha DUAS)",o:{en:["Reduced read latency for frequently accessed data","Decreased load on the primary database","Automatic schema migration of the underlying database","Built-in relational query optimization"],pt:["Latência de leitura reduzida para dados acessados frequentemente","Diminuição da carga no banco de dados primário","Migração automática de schema do banco de dados subjacente","Otimização de consultas relacionais integrada"]},a:[0,1],multi:true,exp:{pt:{tech:"O ElastiCache (Redis ou Memcached) armazena dados em memória, oferecendo tempos de resposta de microssegundos. Ao cachear consultas frequentes, reduz a latência de leitura e diminui significativamente a carga no banco de dados primário.",simple:"É como manter os ingredientes mais usados na bancada da cozinha em vez de ir até a despensa toda vez — pegar o sal da bancada (cache) é muito mais rápido do que ir ao fundo da despensa (banco de dados), e você desgasta menos o caminho até lá."},en:{tech:"ElastiCache (Redis or Memcached) stores data in memory, delivering microsecond response times. By caching frequent queries, it reduces read latency and significantly decreases load on the primary database.",simple:"It is like keeping the most-used ingredients on the kitchen counter instead of going to the pantry every time — grabbing salt from the counter (cache) is much faster than going to the back of the pantry (database), and you wear out the path less."}}},
{en:"Which pillar of the AWS Well-Architected Framework emphasizes protecting information, systems, and assets through risk assessments and mitigation strategies?",pt:"Qual pilar do AWS Well-Architected Framework enfatiza a proteção de informações, sistemas e ativos por meio de avaliações de risco e estratégias de mitigação?",o:{en:["Security","Reliability","Operational Excellence","Cost Optimization"],pt:["Segurança","Confiabilidade","Excelência Operacional","Otimização de Custos"]},a:[0],exp:{pt:{tech:"O pilar de Segurança foca em proteger dados, sistemas e ativos usando controles de identidade, detecção de eventos de segurança, proteção de infraestrutura e classificação de dados.",simple:"É como o sistema de segurança completo de uma casa — trancas nas portas, câmeras, alarme, cofre para objetos valiosos e verificação de quem entra e sai. Cada camada adiciona mais proteção."},en:{tech:"The Security pillar focuses on protecting data, systems, and assets using identity controls, security event detection, infrastructure protection, and data classification.",simple:"It is like the complete security system of a house — locks on doors, cameras, alarms, a safe for valuables, and verification of who enters and exits. Each layer adds more protection."}}},
{en:"A company wants to use a managed service to build, train, and deploy machine learning models at scale. Which AWS service is designed for this purpose?",pt:"Uma empresa deseja usar um serviço gerenciado para construir, treinar e implantar modelos de aprendizado de máquina em escala. Qual serviço da AWS foi projetado para esse propósito?",o:{en:["Amazon SageMaker","Amazon Rekognition","Amazon Comprehend","AWS Lambda"],pt:["Amazon SageMaker","Amazon Rekognition","Amazon Comprehend","AWS Lambda"]},a:[0],exp:{pt:{tech:"O Amazon SageMaker é uma plataforma totalmente gerenciada que oferece ferramentas para cada etapa do fluxo de trabalho de ML: preparação de dados, construção, treinamento e implantação de modelos em ambiente de produção.",simple:"É como uma oficina completa para construir carros — tem área de design (preparar dados), linha de montagem (treinar o modelo), pista de testes (validar) e showroom (implantar). Tudo num lugar só, sem precisar montar nada do zero."},en:{tech:"Amazon SageMaker is a fully managed platform that provides tools for every step of the ML workflow: data preparation, building, training, and deploying models to production.",simple:"It is like a complete car workshop — it has a design area (prepare data), assembly line (train the model), test track (validate), and showroom (deploy). All in one place, without needing to build anything from scratch."}}},
{en:"Which AWS service would be MOST appropriate for identifying objects, people, and scenes in images and videos?",pt:"Qual serviço da AWS seria MAIS apropriado para identificar objetos, pessoas e cenas em imagens e vídeos?",o:{en:["Amazon Rekognition","Amazon Textract","Amazon Polly","Amazon Translate"],pt:["Amazon Rekognition","Amazon Textract","Amazon Polly","Amazon Translate"]},a:[0],exp:{pt:{tech:"O Amazon Rekognition usa deep learning para análise de imagem e vídeo, oferecendo detecção de objetos, reconhecimento facial, análise de sentimentos faciais, detecção de texto em imagens e moderação de conteúdo.",simple:"É como ter um assistente com visão sobre-humana que olha para qualquer foto ou vídeo e te diz exatamente o que está ali — quantas pessoas, se estão felizes, que objetos aparecem, se tem texto escrito em algum lugar."},en:{tech:"Amazon Rekognition uses deep learning for image and video analysis, offering object detection, facial recognition, facial sentiment analysis, text detection in images, and content moderation.",simple:"It is like having an assistant with superhuman vision who looks at any photo or video and tells you exactly what is there — how many people, if they are happy, what objects appear, if there is text written somewhere."}}},
{en:"Which AWS Support plan provides access to a Technical Account Manager (TAM)?",pt:"Qual plano de suporte da AWS fornece acesso a um Technical Account Manager (TAM)?",o:{en:["Enterprise","Business","Developer","Basic"],pt:["Enterprise","Business","Developer","Basic"]},a:[0],exp:{pt:{tech:"O plano Enterprise Support inclui um TAM designado que serve como ponto de contato principal, fornecendo orientação proativa, revisões de arquitetura e assistência na otimização do ambiente AWS.",simple:"É como ter um médico particular — no plano básico de saúde você vai ao pronto-socorro (Basic), no intermediário tem consultas agendadas (Business), mas só no plano premium (Enterprise) você tem um médico dedicado que conhece todo seu histórico e te acompanha de perto."},en:{tech:"The Enterprise Support plan includes a designated TAM who serves as the primary point of contact, providing proactive guidance, architecture reviews, and assistance in optimizing the AWS environment.",simple:"It is like having a personal doctor — with the basic health plan you go to the ER (Basic), the mid-tier has scheduled appointments (Business), but only the premium plan (Enterprise) gives you a dedicated doctor who knows your full history and follows up closely."}}},
{en:"Which AWS service enables you to compile and test source code, produce deployment-ready software packages, and does NOT manage the overall pipeline orchestration?",pt:"Qual serviço da AWS permite compilar e testar código-fonte, produzir pacotes de software prontos para implantação, e NÃO gerencia a orquestração geral do pipeline?",o:{en:["AWS CodeBuild","AWS CodePipeline","AWS CodeDeploy","AWS CodeCommit"],pt:["AWS CodeBuild","AWS CodePipeline","AWS CodeDeploy","AWS CodeCommit"]},a:[0],exp:{pt:{tech:"O AWS CodeBuild é um serviço de integração contínua totalmente gerenciado que compila código-fonte, executa testes e produz pacotes de software. Ele é apenas uma etapa dentro de um pipeline, não o orquestrador.",simple:"É como a estação de pintura numa fábrica de carros — ela faz muito bem o seu trabalho específico (compilar e testar), mas não decide a ordem das etapas da produção inteira. Quem decide a ordem é o CodePipeline (o gerente da fábrica)."},en:{tech:"AWS CodeBuild is a fully managed continuous integration service that compiles source code, runs tests, and produces software packages. It is just one stage within a pipeline, not the orchestrator.",simple:"It is like the painting station in a car factory — it does its specific job very well (compile and test), but it does not decide the order of the entire production process. The one deciding the order is CodePipeline (the factory manager)."}}},
{en:"A company has unpredictable database traffic that varies significantly throughout the day, sometimes dropping to zero. Which Aurora feature would automatically scale capacity up and down based on demand?",pt:"Uma empresa tem tráfego de banco de dados imprevisível que varia significativamente ao longo do dia, às vezes caindo a zero. Qual recurso do Aurora escalaria automaticamente a capacidade para cima e para baixo com base na demanda?",o:{en:["Aurora Serverless","Aurora Replicas","Aurora Global Database","Aurora Multi-Master"],pt:["Aurora Serverless","Réplicas Aurora","Aurora Global Database","Aurora Multi-Master"]},a:[0],exp:{pt:{tech:"O Aurora Serverless ajusta automaticamente a capacidade computacional com base na carga da aplicação, podendo escalar até zero quando não há tráfego, cobrando apenas pela capacidade consumida por segundo.",simple:"É como um restaurante que contrata garçons temporários conforme a demanda — lotou, mais garçons aparecem. Esvaziou, eles vão embora. Se não vier ninguém, nenhum garçom fica e você não paga nada."},en:{tech:"Aurora Serverless automatically adjusts compute capacity based on application load, and can scale down to zero when there is no traffic, charging only for capacity consumed per second.",simple:"It is like a restaurant that hires temporary waiters based on demand — packed, more waiters show up. Empty, they leave. If nobody comes, no waiters stay and you pay nothing."}}},
{en:"Which pillar of the AWS Well-Architected Framework focuses on selecting the right resource types and sizes based on workload requirements to achieve optimal performance?",pt:"Qual pilar do AWS Well-Architected Framework foca em selecionar os tipos e tamanhos corretos de recursos com base nos requisitos da carga de trabalho para alcançar performance ideal?",o:{en:["Performance Efficiency","Cost Optimization","Reliability","Operational Excellence"],pt:["Eficiência de Performance","Otimização de Custos","Confiabilidade","Excelência Operacional"]},a:[0],exp:{pt:{tech:"O pilar de Eficiência de Performance abrange a seleção adequada de tipos e tamanhos de recursos, monitoramento de performance e tomada de decisões informadas para manter a eficiência conforme as demandas evoluem.",simple:"É como escolher o veículo certo para cada situação — uma moto para entregas rápidas, um caminhão para cargas pesadas, um carro econômico para o dia a dia. Usar o recurso certo para cada tarefa garante a melhor performance."},en:{tech:"The Performance Efficiency pillar covers the proper selection of resource types and sizes, performance monitoring, and making informed decisions to maintain efficiency as demands evolve.",simple:"It is like choosing the right vehicle for each situation — a motorcycle for quick deliveries, a truck for heavy loads, an economy car for daily use. Using the right resource for each task ensures the best performance."}}},
{en:"Which AWS service provides a centralized dashboard to track the progress of application migrations from on-premises to AWS?",pt:"Qual serviço da AWS fornece um painel centralizado para acompanhar o progresso das migrações de aplicações do local para a AWS?",o:{en:["AWS Migration Hub","AWS Application Discovery Service","AWS DMS","AWS Snow Family"],pt:["AWS Migration Hub","AWS Application Discovery Service","AWS DMS","AWS Snow Family"]},a:[0],exp:{pt:{tech:"O AWS Migration Hub fornece um local único para rastrear o progresso de migrações de aplicações em várias soluções de migração AWS e de parceiros.",simple:"É como ter um painel de rastreamento de encomendas — você vê onde cada pacote (aplicação) está no processo de mudança: preparado, em trânsito, entregue. Tudo num lugar só, mesmo usando diferentes transportadoras."},en:{tech:"AWS Migration Hub provides a single place to track the progress of application migrations across multiple AWS and partner migration solutions.",simple:"It is like having a package tracking dashboard — you see where each package (application) is in the moving process: prepared, in transit, delivered. All in one place, even when using different carriers."}}},
