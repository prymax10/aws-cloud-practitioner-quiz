{en:"Which Amazon Redshift feature makes it a suitable choice for running complex analytical queries across petabytes of structured data?",pt:"Qual característica do Amazon Redshift o torna uma escolha adequada para executar consultas analíticas complexas em petabytes de dados estruturados?",o:{en:["Columnar storage with massively parallel processing (MPP)","In-memory key-value caching","Graph-based relationship traversal","Document-based flexible schema"],pt:["Armazenamento colunar com processamento massivamente paralelo (MPP)","Cache de chave-valor em memória","Travessia de relacionamentos baseada em grafos","Esquema flexível baseado em documentos"]},a:[0],t:"Redshift",exp:{pt:{tech:"O Amazon Redshift utiliza armazenamento colunar e MPP para distribuir e paralelizar consultas em múltiplos nós, otimizando a performance de consultas analíticas complexas em grandes volumes de dados.",simple:"O Amazon Redshift usa armazenamento colunar, que organiza dados por coluna em vez de por linha, e processamento massivamente paralelo (MPP), que distribui consultas entre muitos nos ao mesmo tempo. Isso permite executar queries analiticas complexas em petabytes de dados de forma rapida.",avoid:"Nunca carregue dados no Redshift sem definir sort keys e distribution keys adequadas. Consultas mal otimizadas em petabytes resultam em custos e lentidao enormes."},en:{tech:"Amazon Redshift uses columnar storage and MPP to distribute and parallelize queries across multiple nodes, optimizing performance of complex analytical queries on large data volumes.",simple:"Amazon Redshift uses columnar storage, which organizes data by column instead of by row, and massively parallel processing (MPP), which distributes queries across many nodes simultaneously. This allows running complex analytical queries across petabytes of data quickly.",avoid:"Never load data into Redshift without defining proper sort keys and distribution keys. Poorly optimized queries on petabytes result in massive costs and slowness."}}},
{en:"Which service can extract text and data from scanned documents, forms, and tables using machine learning?",pt:"Qual serviço pode extrair texto e dados de documentos digitalizados, formulários e tabelas usando aprendizado de máquina?",o:{en:["Amazon Textract","Amazon Rekognition","Amazon Comprehend","Amazon Translate"],pt:["Amazon Textract","Amazon Rekognition","Amazon Comprehend","Amazon Translate"]},a:[0],t:"AI & ML Services",exp:{pt:{tech:"O Amazon Textract usa ML para extrair automaticamente texto impresso, manuscrito e dados estruturados de documentos digitalizados, indo além do OCR simples ao entender a estrutura de formulários e tabelas.",simple:"O Amazon Textract usa machine learning para extrair texto, dados de formularios e tabelas de documentos escaneados ou imagens automaticamente. Ele identifica campos e valores sem precisar de configuracao manual de templates.",avoid:"Nunca envie documentos sensiveis para servicos de ML sem validar as politicas de dados e criptografia. Sempre sanitize dados antes de processar."},en:{tech:"Amazon Textract uses ML to automatically extract printed text, handwriting, and structured data from scanned documents, going beyond simple OCR by understanding form and table structure.",simple:"Amazon Textract uses machine learning to automatically extract text, form data, and tables from scanned documents or images. It identifies fields and values without needing manual template configuration.",avoid:"Never send sensitive documents to ML services without validating data policies and encryption. Always sanitize data before processing."}}},
{en:"A company wants to protect their web application from common exploits like SQL injection and cross-site scripting. Which AWS service should they use?",pt:"Uma empresa deseja proteger sua aplicação web contra exploits comuns como injeção de SQL e cross-site scripting. Qual serviço da AWS deve ser utilizado?",o:{en:["AWS WAF","AWS Shield","Amazon GuardDuty","AWS Firewall Manager"],pt:["AWS WAF","AWS Shield","Amazon GuardDuty","AWS Firewall Manager"]},a:[0],t:"WAF & Shield",exp:{pt:{tech:"O AWS WAF (Web Application Firewall) permite criar regras personalizadas para filtrar tráfego web malicioso, protegendo contra ataques comuns como SQL injection, XSS e outros exploits da camada de aplicação.",simple:"O AWS WAF e um firewall de aplicacao web que filtra requisicoes HTTP/HTTPS com base em regras que voce define, bloqueando ataques como SQL injection e cross-site scripting antes que cheguem a sua aplicacao. Voce pode criar regras personalizadas ou usar regras gerenciadas.",avoid:"Nunca deixe uma aplicacao web exposta sem WAF. Configure regras contra SQL injection e XSS como requisito minimo antes de ir para producao."},en:{tech:"AWS WAF (Web Application Firewall) lets you create custom rules to filter malicious web traffic, protecting against common attacks like SQL injection, XSS, and other application-layer exploits.",simple:"AWS WAF is a web application firewall that filters HTTP/HTTPS requests based on rules you define, blocking attacks like SQL injection and cross-site scripting before they reach your application. You can create custom rules or use managed rules.",avoid:"Never leave a web application exposed without WAF. Configure rules against SQL injection and XSS as a minimum requirement before going to production."}}},
{en:"Which AWS service provides intelligent threat detection by continuously monitoring for malicious activity and unauthorized behavior across your AWS accounts?",pt:"Qual serviço da AWS fornece detecção inteligente de ameaças monitorando continuamente atividades maliciosas e comportamento não autorizado em suas contas AWS?",o:{en:["Amazon GuardDuty","AWS WAF","Amazon Inspector","AWS CloudTrail"],pt:["Amazon GuardDuty","AWS WAF","Amazon Inspector","AWS CloudTrail"]},a:[0],t:"WAF & Shield",exp:{pt:{tech:"O Amazon GuardDuty é um serviço de detecção de ameaças que analisa continuamente dados de fontes como CloudTrail, VPC Flow Logs e DNS logs usando ML e inteligência de ameaças para identificar atividades suspeitas.",simple:"O Amazon GuardDuty analisa continuamente logs de AWS (CloudTrail, VPC Flow Logs, DNS) usando machine learning para detectar atividades maliciosas ou comportamentos nao autorizados nas suas contas. Ele gera alertas automaticamente quando encontra ameacas.",avoid:"Nunca ignore os findings do GuardDuty. Configure alertas automaticos e processos de resposta a incidentes para cada severidade."},en:{tech:"Amazon GuardDuty is a threat detection service that continuously analyzes data from sources like CloudTrail, VPC Flow Logs, and DNS logs using ML and threat intelligence to identify suspicious activities.",simple:"Amazon GuardDuty continuously analyzes AWS logs (CloudTrail, VPC Flow Logs, DNS) using machine learning to detect malicious activity or unauthorized behavior in your accounts. It automatically generates alerts when threats are found.",avoid:"Never ignore GuardDuty findings. Configure automatic alerts and incident response processes for each severity level."}}},
{en:"Which TWO are benefits of using Amazon ElastiCache in front of a relational database? (Choose TWO)",pt:"Quais DOIS são benefícios de usar o Amazon ElastiCache na frente de um banco de dados relacional? (Escolha DUAS)",o:{en:["Reduced read latency for frequently accessed data","Decreased load on the primary database","Automatic schema migration of the underlying database","Built-in relational query optimization"],pt:["Latência de leitura reduzida para dados acessados frequentemente","Diminuição da carga no banco de dados primário","Migração automática de schema do banco de dados subjacente","Otimização de consultas relacionais integrada"]},a:[0,1],multi:true,t:"ElastiCache",exp:{pt:{tech:"O ElastiCache (Redis ou Memcached) armazena dados em memória, oferecendo tempos de resposta de microssegundos. Ao cachear consultas frequentes, reduz a latência de leitura e diminui significativamente a carga no banco de dados primário.",simple:"O Amazon ElastiCache armazena dados acessados com frequencia em memoria, permitindo que leituras repetidas sejam muito mais rapidas do que consultar o banco de dados. Isso reduz a carga no banco principal porque muitas requisicoes sao atendidas pelo cache sem precisar acessar o banco.",avoid:"Nunca use cache sem definir politicas de expiracao (TTL). Dados obsoletos no cache podem causar inconsistencias graves na aplicacao."},en:{tech:"ElastiCache (Redis or Memcached) stores data in memory, delivering microsecond response times. By caching frequent queries, it reduces read latency and significantly decreases load on the primary database.",simple:"Amazon ElastiCache stores frequently accessed data in memory, making repeated reads much faster than querying the database. This reduces load on the primary database because many requests are served by the cache without needing to access the database.",avoid:"Never use cache without defining expiration policies (TTL). Stale cached data can cause serious application inconsistencies."}}},
{en:"Which pillar of the AWS Well-Architected Framework emphasizes protecting information, systems, and assets through risk assessments and mitigation strategies?",pt:"Qual pilar do AWS Well-Architected Framework enfatiza a proteção de informações, sistemas e ativos por meio de avaliações de risco e estratégias de mitigação?",o:{en:["Security","Reliability","Operational Excellence","Cost Optimization"],pt:["Segurança","Confiabilidade","Excelência Operacional","Otimização de Custos"]},a:[0],t:"Well-Architected",exp:{pt:{tech:"O pilar de Segurança foca em proteger dados, sistemas e ativos usando controles de identidade, detecção de eventos de segurança, proteção de infraestrutura e classificação de dados.",simple:"O pilar de Seguranca do Well-Architected Framework foca em proteger dados, sistemas e ativos atraves de controle de acesso, criptografia, deteccao de ameacas e resposta a incidentes. Ele orienta como implementar protecao em camadas nos seus recursos AWS.",avoid:"Nunca trate seguranca como algo opcional ou para depois. Implemente o pilar de seguranca desde o inicio do projeto, nao como remediacao."},en:{tech:"The Security pillar focuses on protecting data, systems, and assets using identity controls, security event detection, infrastructure protection, and data classification.",simple:"The Security pillar of the Well-Architected Framework focuses on protecting data, systems, and assets through access control, encryption, threat detection, and incident response. It guides how to implement layered protection on your AWS resources.",avoid:"Never treat security as optional or something for later. Implement the security pillar from the start of the project, not as remediation."}}},
{en:"A company wants to use a managed service to build, train, and deploy machine learning models at scale. Which AWS service is designed for this purpose?",pt:"Uma empresa deseja usar um serviço gerenciado para construir, treinar e implantar modelos de aprendizado de máquina em escala. Qual serviço da AWS foi projetado para esse propósito?",o:{en:["Amazon SageMaker","Amazon Rekognition","Amazon Comprehend","AWS Lambda"],pt:["Amazon SageMaker","Amazon Rekognition","Amazon Comprehend","AWS Lambda"]},a:[0],t:"Lambda",exp:{pt:{tech:"O Amazon SageMaker é uma plataforma totalmente gerenciada que oferece ferramentas para cada etapa do fluxo de trabalho de ML: preparação de dados, construção, treinamento e implantação de modelos em ambiente de produção.",simple:"O Amazon SageMaker e uma plataforma completa para machine learning que permite preparar dados, treinar modelos, avaliar resultados e implantar modelos em producao, tudo em um unico servico gerenciado. Ele suporta frameworks populares como TensorFlow e PyTorch.",avoid:"Nunca treine modelos de ML com dados sem governanca. Garanta que os dados de treino sao limpos, nao enviesados e que o acesso ao SageMaker e controlado por IAM."},en:{tech:"Amazon SageMaker is a fully managed platform that provides tools for every step of the ML workflow: data preparation, building, training, and deploying models to production.",simple:"Amazon SageMaker is a complete machine learning platform that lets you prepare data, train models, evaluate results, and deploy models to production, all in a single managed service. It supports popular frameworks like TensorFlow and PyTorch.",avoid:"Never train ML models with ungoverned data. Ensure training data is clean, unbiased, and that SageMaker access is controlled by IAM."}}},
{en:"Which AWS service would be MOST appropriate for identifying objects, people, and scenes in images and videos?",pt:"Qual serviço da AWS seria MAIS apropriado para identificar objetos, pessoas e cenas em imagens e vídeos?",o:{en:["Amazon Rekognition","Amazon Textract","Amazon Polly","Amazon Translate"],pt:["Amazon Rekognition","Amazon Textract","Amazon Polly","Amazon Translate"]},a:[0],t:"AI & ML Services",exp:{pt:{tech:"O Amazon Rekognition usa deep learning para análise de imagem e vídeo, oferecendo detecção de objetos, reconhecimento facial, análise de sentimentos faciais, detecção de texto em imagens e moderação de conteúdo.",simple:"O Amazon Rekognition usa machine learning para identificar objetos, pessoas, cenas, texto e atividades em imagens e videos automaticamente. Voce envia a imagem ou video e recebe os resultados da analise sem precisar treinar modelos.",avoid:"Nunca use Rekognition em dados de usuarios sem consentimento explicito e conformidade com leis de privacidade (LGPD/GDPR). Dados biometricos exigem protecao especial."},en:{tech:"Amazon Rekognition uses deep learning for image and video analysis, offering object detection, facial recognition, facial sentiment analysis, text detection in images, and content moderation.",simple:"Amazon Rekognition uses machine learning to automatically identify objects, people, scenes, text, and activities in images and videos. You send the image or video and receive analysis results without needing to train models.",avoid:"Never use Rekognition on user data without explicit consent and compliance with privacy laws (LGPD/GDPR). Biometric data requires special protection."}}},
{en:"Which AWS Support plan provides access to a Technical Account Manager (TAM)?",pt:"Qual plano de suporte da AWS fornece acesso a um Technical Account Manager (TAM)?",o:{en:["Enterprise","Business","Developer","Basic"],pt:["Enterprise","Business","Developer","Basic"]},a:[0],t:"Support Plans",exp:{pt:{tech:"O plano Enterprise Support inclui um TAM designado que serve como ponto de contato principal, fornecendo orientação proativa, revisões de arquitetura e assistência na otimização do ambiente AWS.",simple:"O plano Enterprise e o unico plano de suporte AWS que inclui um Technical Account Manager (TAM), uma pessoa dedicada que conhece sua conta e ajuda a otimizar o uso da AWS. Nenhum dos outros planos (Basic, Developer, Business) oferece TAM.",avoid:"Nunca opere workloads criticas em producao sem um plano Enterprise Support. O custo do downtime sem TAM e muito maior que o custo do plano."},en:{tech:"The Enterprise Support plan includes a designated TAM who serves as the primary point of contact, providing proactive guidance, architecture reviews, and assistance in optimizing the AWS environment.",simple:"The Enterprise plan is the only AWS support plan that includes a Technical Account Manager (TAM), a dedicated person who knows your account and helps optimize your AWS usage. None of the other plans (Basic, Developer, Business) offer a TAM.",avoid:"Never operate critical production workloads without an Enterprise Support plan. The cost of downtime without a TAM is far greater than the plan cost."}}},
{en:"Which AWS service enables you to compile and test source code, produce deployment-ready software packages, and does NOT manage the overall pipeline orchestration?",pt:"Qual serviço da AWS permite compilar e testar código-fonte, produzir pacotes de software prontos para implantação, e NÃO gerencia a orquestração geral do pipeline?",o:{en:["AWS CodeBuild","AWS CodePipeline","AWS CodeDeploy","AWS CodeCommit"],pt:["AWS CodeBuild","AWS CodePipeline","AWS CodeDeploy","AWS CodeCommit"]},a:[0],t:"Developer Tools",exp:{pt:{tech:"O AWS CodeBuild é um serviço de integração contínua totalmente gerenciado que compila código-fonte, executa testes e produz pacotes de software. Ele é apenas uma etapa dentro de um pipeline, não o orquestrador.",simple:"O AWS CodeBuild e um servico que compila codigo-fonte, executa testes e gera pacotes prontos para deploy, tudo de forma gerenciada sem voce precisar manter servidores de build. Ele executa tarefas de build, mas nao orquestra o pipeline completo de CI/CD.",avoid:"Nunca armazene credenciais ou segredos nos scripts de build do CodeBuild. Use o AWS Secrets Manager ou Parameter Store para injetar segredos no build."},en:{tech:"AWS CodeBuild is a fully managed continuous integration service that compiles source code, runs tests, and produces software packages. It is just one stage within a pipeline, not the orchestrator.",simple:"AWS CodeBuild is a service that compiles source code, runs tests, and produces deployment-ready packages, all managed without you needing to maintain build servers. It executes build tasks but does not orchestrate the full CI/CD pipeline.",avoid:"Never store credentials or secrets in CodeBuild build scripts. Use AWS Secrets Manager or Parameter Store to inject secrets into the build."}}},
{en:"A company has unpredictable database traffic that varies significantly throughout the day, sometimes dropping to zero. Which Aurora feature would automatically scale capacity up and down based on demand?",pt:"Uma empresa tem tráfego de banco de dados imprevisível que varia significativamente ao longo do dia, às vezes caindo a zero. Qual recurso do Aurora escalaria automaticamente a capacidade para cima e para baixo com base na demanda?",o:{en:["Aurora Serverless","Aurora Replicas","Aurora Global Database","Aurora Multi-Master"],pt:["Aurora Serverless","Réplicas Aurora","Aurora Global Database","Aurora Multi-Master"]},a:[0],t:"EC2 Pricing",exp:{pt:{tech:"O Aurora Serverless ajusta automaticamente a capacidade computacional com base na carga da aplicação, podendo escalar até zero quando não há tráfego, cobrando apenas pela capacidade consumida por segundo.",simple:"O Aurora Serverless ajusta automaticamente a capacidade do banco de dados conforme a demanda, escalando para mais quando o trafego aumenta e reduzindo ate zero quando nao ha atividade. Voce paga apenas pela capacidade consumida, sem precisar provisionar instancias.",avoid:"Nunca use instancias provisionadas fixas para workloads com trafego imprevisivel. Aurora Serverless evita pagar por capacidade ociosa."},en:{tech:"Aurora Serverless automatically adjusts compute capacity based on application load, and can scale down to zero when there is no traffic, charging only for capacity consumed per second.",simple:"Aurora Serverless automatically adjusts database capacity based on demand, scaling up when traffic increases and scaling down to zero when there is no activity. You pay only for the capacity consumed, without needing to provision instances.",avoid:"Never use fixed provisioned instances for workloads with unpredictable traffic. Aurora Serverless avoids paying for idle capacity."}}},
{en:"Which pillar of the AWS Well-Architected Framework focuses on selecting the right resource types and sizes based on workload requirements to achieve optimal performance?",pt:"Qual pilar do AWS Well-Architected Framework foca em selecionar os tipos e tamanhos corretos de recursos com base nos requisitos da carga de trabalho para alcançar performance ideal?",o:{en:["Performance Efficiency","Cost Optimization","Reliability","Operational Excellence"],pt:["Eficiência de Performance","Otimização de Custos","Confiabilidade","Excelência Operacional"]},a:[0],t:"Well-Architected",exp:{pt:{tech:"O pilar de Eficiência de Performance abrange a seleção adequada de tipos e tamanhos de recursos, monitoramento de performance e tomada de decisões informadas para manter a eficiência conforme as demandas evoluem.",simple:"O pilar de Eficiencia de Performance do Well-Architected Framework foca em usar os tipos e tamanhos corretos de recursos para cada carga de trabalho, garantindo o melhor desempenho possivel. Ele orienta sobre como selecionar, monitorar e ajustar recursos conforme a demanda muda.",avoid:"Nunca escolha tipos de instancia sem fazer benchmarks para seu workload especifico. O tipo mais caro nem sempre e o mais eficiente para sua carga."},en:{tech:"The Performance Efficiency pillar covers the proper selection of resource types and sizes, performance monitoring, and making informed decisions to maintain efficiency as demands evolve.",simple:"The Performance Efficiency pillar of the Well-Architected Framework focuses on using the right resource types and sizes for each workload, ensuring the best possible performance. It guides how to select, monitor, and adjust resources as demand changes.",avoid:"Never choose instance types without benchmarking for your specific workload. The most expensive type is not always the most efficient for your load."}}},
{en:"Which AWS service provides a centralized dashboard to track the progress of application migrations from on-premises to AWS?",pt:"Qual serviço da AWS fornece um painel centralizado para acompanhar o progresso das migrações de aplicações do local para a AWS?",o:{en:["AWS Migration Hub","AWS Application Discovery Service","AWS DMS","AWS Snow Family"],pt:["AWS Migration Hub","AWS Application Discovery Service","AWS DMS","AWS Snow Family"]},a:[0],t:"Snow Family",exp:{pt:{tech:"O AWS Migration Hub fornece um local único para rastrear o progresso de migrações de aplicações em várias soluções de migração AWS e de parceiros.",simple:"O AWS Migration Hub oferece um painel centralizado onde voce acompanha o progresso de todas as migracoes de aplicacoes para a AWS. Ele integra informacoes de varias ferramentas de migracao em um unico lugar.",avoid:"Nunca inicie uma migracao sem um plano centralizado e visibilidade do progresso. Use o Migration Hub para evitar migracoes parciais ou esquecidas."},en:{tech:"AWS Migration Hub provides a single place to track the progress of application migrations across multiple AWS and partner migration solutions.",simple:"AWS Migration Hub provides a centralized dashboard where you track the progress of all application migrations to AWS. It integrates information from multiple migration tools into a single place.",avoid:"Never start a migration without a centralized plan and progress visibility. Use Migration Hub to avoid partial or forgotten migrations."}}},
{en:"Which TWO statements accurately describe Amazon S3? (Choose TWO)",pt:"Quais DUAS afirmações descrevem corretamente o Amazon S3? (Escolha DUAS)",o:{en:["It provides 99.999999999% (11 nines) durability for objects","It stores data as objects in buckets","It is a block storage service attached to EC2 instances","It requires you to specify a fixed storage size at creation"],pt:["Fornece 99,999999999% (11 noves) de durabilidade para objetos","Armazena dados como objetos em buckets","É um serviço de armazenamento de bloco anexado a instâncias EC2","Exige que você especifique um tamanho fixo de armazenamento na criação"]},a:[0,1],multi:true,t:"S3 General",exp:{pt:{tech:"O Amazon S3 é um serviço de armazenamento de objetos que oferece 11 noves de durabilidade, escalabilidade virtualmente ilimitada, e organiza dados em buckets sem necessidade de definir capacidade fixa.",simple:"O Amazon S3 armazena dados como objetos dentro de buckets, sem limite de quantidade ou tamanho total. Ele oferece 99.999999999% (11 noves) de durabilidade, o que significa que a chance de perder um arquivo e praticamente zero.",avoid:"Nunca deixe buckets S3 publicos sem necessidade. Sempre habilite criptografia e versionamento para dados sensiveis e configure politicas de acesso restritivas."},en:{tech:"Amazon S3 is an object storage service that offers 11 nines of durability, virtually unlimited scalability, and organizes data in buckets without needing to define fixed capacity.",simple:"Amazon S3 stores data as objects inside buckets, with no limit on quantity or total size. It offers 99.999999999% (11 nines) durability, meaning the chance of losing a file is practically zero.",avoid:"Never leave S3 buckets public without necessity. Always enable encryption and versioning for sensitive data and configure restrictive access policies."}}},
{en:"Which AWS service automates code deployments to Amazon EC2 instances, on-premises servers, Lambda functions, or Amazon ECS services?",pt:"Qual serviço da AWS automatiza implantações de código em instâncias Amazon EC2, servidores locais, funções Lambda ou serviços Amazon ECS?",o:{en:["AWS CodeDeploy","AWS CodeBuild","AWS CodePipeline","AWS CloudFormation"],pt:["AWS CodeDeploy","AWS CodeBuild","AWS CodePipeline","AWS CloudFormation"]},a:[0],t:"EC2 General",exp:{pt:{tech:"O AWS CodeDeploy é um serviço de implantação totalmente gerenciado que automatiza deploys de software para diversos destinos, com suporte a estratégias como rolling updates, blue/green e canary.",simple:"O AWS CodeDeploy automatiza a implantacao de codigo em instancias EC2, servidores on-premises, funcoes Lambda e servicos ECS. Ele gerencia o processo de deploy com estrategias como rolling, blue/green ou all-at-once.",avoid:"Nunca faca deploys direto em producao sem estrategia de rollback. Use CodeDeploy com blue/green ou canary deployments para minimizar impacto de falhas."},en:{tech:"AWS CodeDeploy is a fully managed deployment service that automates software deployments to various targets, supporting strategies like rolling updates, blue/green, and canary.",simple:"AWS CodeDeploy automates code deployment to EC2 instances, on-premises servers, Lambda functions, and ECS services. It manages the deployment process with strategies like rolling, blue/green, or all-at-once.",avoid:"Never deploy directly to production without a rollback strategy. Use CodeDeploy with blue/green or canary deployments to minimize failure impact."}}},
{en:"A company wants to run Amazon RDS in a configuration that provides automatic failover to a standby instance in a different Availability Zone. What should they enable?",pt:"Uma empresa deseja executar o Amazon RDS em uma configuração que forneça failover automático para uma instância em espera em uma Zona de Disponibilidade diferente. O que deve ser habilitado?",o:{en:["Multi-AZ deployment","Read Replicas","Reserved Instances","Provisioned IOPS"],pt:["Implantação Multi-AZ","Réplicas de Leitura","Instâncias Reservadas","IOPS Provisionado"]},a:[0],t:"EC2 Pricing",exp:{pt:{tech:"A implantação Multi-AZ do RDS mantém uma réplica síncrona em standby em outra AZ. Em caso de falha, o RDS executa failover automático para a instância standby em 60-120 segundos.",simple:"O Multi-AZ deployment do RDS cria uma copia do banco de dados em outra Availability Zone que se mantem sincronizada automaticamente. Se o banco principal falhar, o RDS faz failover automatico para a copia sem intervencao manual.",avoid:"Nunca rode banco de dados de producao sem Multi-AZ habilitado. Uma unica AZ e um ponto unico de falha que pode derrubar toda a aplicacao."},en:{tech:"RDS Multi-AZ deployment maintains a synchronous standby replica in another AZ. In case of failure, RDS performs automatic failover to the standby instance within 60-120 seconds.",simple:"RDS Multi-AZ deployment creates a copy of the database in another Availability Zone that stays automatically synchronized. If the primary database fails, RDS performs automatic failover to the copy without manual intervention.",avoid:"Never run a production database without Multi-AZ enabled. A single AZ is a single point of failure that can take down the entire application."}}},
{en:"Which AWS cost management tool sends alerts when your actual or forecasted costs exceed a defined threshold?",pt:"Qual ferramenta de gerenciamento de custos da AWS envia alertas quando seus custos reais ou previstos excedem um limite definido?",o:{en:["AWS Budgets","AWS Cost Explorer","AWS Pricing Calculator","AWS Cost and Usage Report"],pt:["AWS Budgets","AWS Cost Explorer","AWS Calculadora de Preços","AWS Relatório de Custo e Uso"]},a:[0],t:"Cost Management",exp:{pt:{tech:"O AWS Budgets permite definir orçamentos personalizados para custos, uso e reservas, com alertas configuráveis por e-mail ou SNS quando os limites são atingidos ou previstos para serem ultrapassados.",simple:"O AWS Budgets permite definir limites de gastos e envia alertas por email ou SNS quando seus custos reais ou previstos ultrapassam o valor definido. Voce pode criar orcamentos por servico, conta ou tags.",avoid:"Nunca confie apenas no faturamento mensal para controlar custos. Configure alertas no AWS Budgets para custos reais e previstos antes de estourar o orcamento."},en:{tech:"AWS Budgets lets you set custom budgets for costs, usage, and reservations, with configurable alerts via email or SNS when thresholds are reached or forecasted to be exceeded.",simple:"AWS Budgets lets you set spending limits and sends alerts via email or SNS when your actual or forecasted costs exceed the defined threshold. You can create budgets by service, account, or tags.",avoid:"Never rely solely on monthly billing to control costs. Configure alerts in AWS Budgets for actual and forecasted costs before exceeding the budget."}}},
{en:"Which AWS service uses natural language processing to extract insights and relationships from unstructured text, such as sentiment analysis and entity recognition?",pt:"Qual serviço da AWS usa processamento de linguagem natural para extrair insights e relacionamentos de texto não estruturado, como análise de sentimento e reconhecimento de entidades?",o:{en:["Amazon Comprehend","Amazon Lex","Amazon Translate","Amazon Textract"],pt:["Amazon Comprehend","Amazon Lex","Amazon Translate","Amazon Textract"]},a:[0],t:"AI & ML Services",exp:{pt:{tech:"O Amazon Comprehend utiliza NLP e ML para descobrir insights em texto, incluindo detecção de idioma, extração de entidades, análise de sentimentos, modelagem de tópicos e classificação personalizada de documentos.",simple:"O Amazon Comprehend usa processamento de linguagem natural para analisar textos e extrair informacoes como sentimento (positivo, negativo, neutro), entidades (nomes, lugares, datas) e topicos principais. Tudo automaticamente, sem precisar treinar modelos.",avoid:"Nunca processe dados de texto de usuarios com PII sem anonimizacao previa. Use Comprehend com politicas de dados que garantam conformidade com privacidade."},en:{tech:"Amazon Comprehend uses NLP and ML to uncover insights from text, including language detection, entity extraction, sentiment analysis, topic modeling, and custom document classification.",simple:"Amazon Comprehend uses natural language processing to analyze text and extract information like sentiment (positive, negative, neutral), entities (names, places, dates), and key topics. All automatically, without needing to train models.",avoid:"Never process user text data containing PII without prior anonymization. Use Comprehend with data policies that ensure privacy compliance."}}},
{en:"Which pillar of the AWS Well-Architected Framework focuses on avoiding unnecessary costs and understanding where money is being spent?",pt:"Qual pilar do AWS Well-Architected Framework foca em evitar custos desnecessários e entender onde o dinheiro está sendo gasto?",o:{en:["Cost Optimization","Performance Efficiency","Operational Excellence","Sustainability"],pt:["Otimização de Custos","Eficiência de Performance","Excelência Operacional","Sustentabilidade"]},a:[0],t:"Well-Architected",exp:{pt:{tech:"O pilar de Otimização de Custos inclui compreensão dos gastos, seleção dos recursos mais econômicos, análise ao longo do tempo, escalabilidade para atender demanda sem gastar excessivamente e uso de modelos de preço adequados.",simple:"O pilar de Otimizacao de Custos do Well-Architected Framework foca em evitar gastos desnecessarios e entender onde o dinheiro esta sendo gasto. Ele orienta praticas como escolher o modelo de precos certo, eliminar recursos ociosos e dimensionar corretamente.",avoid:"Nunca deixe recursos ociosos rodando sem monitoramento de custos. Implemente tags de custo e revisoes regulares para identificar desperdicio."},en:{tech:"The Cost Optimization pillar includes understanding spending, selecting the most cost-effective resources, analyzing over time, scaling to meet demand without overspending, and using appropriate pricing models.",simple:"The Cost Optimization pillar of the Well-Architected Framework focuses on avoiding unnecessary spending and understanding where money is being spent. It guides practices like choosing the right pricing model, eliminating idle resources, and right-sizing.",avoid:"Never leave idle resources running without cost monitoring. Implement cost tags and regular reviews to identify waste."}}},
{en:"Which AWS service provides a private, hosted Git repository that can be used to store and manage source code?",pt:"Qual serviço da AWS fornece um repositório Git privado e hospedado que pode ser usado para armazenar e gerenciar código-fonte?",o:{en:["AWS CodeCommit","AWS CodeBuild","AWS CodePipeline","AWS Cloud9"],pt:["AWS CodeCommit","AWS CodeBuild","AWS CodePipeline","AWS Cloud9"]},a:[0],t:"Developer Tools",exp:{pt:{tech:"O AWS CodeCommit é um serviço de controle de código-fonte totalmente gerenciado e seguro que hospeda repositórios Git privados, sem necessidade de gerenciar seu próprio sistema de controle de versão.",simple:"O AWS CodeCommit e um repositorio Git privado e gerenciado pela AWS onde voce armazena codigo-fonte com controle de versao. Ele funciona como qualquer repositorio Git, com suporte a branches, pull requests e historico de alteracoes.",avoid:"Nunca armazene segredos ou credenciais em repositorios de codigo, mesmo privados. Use git-secrets ou pre-commit hooks para prevenir commits acidentais."},en:{tech:"AWS CodeCommit is a fully managed, secure source control service that hosts private Git repositories, without the need to manage your own version control system.",simple:"AWS CodeCommit is a private, managed Git repository from AWS where you store source code with version control. It works like any Git repository, with support for branches, pull requests, and change history.",avoid:"Never store secrets or credentials in code repositories, even private ones. Use git-secrets or pre-commit hooks to prevent accidental commits."}}},
{en:"Which TWO services help protect against Distributed Denial of Service (DDoS) attacks on AWS? (Choose TWO)",pt:"Quais DOIS serviços ajudam a proteger contra ataques de Negação de Serviço Distribuída (DDoS) na AWS? (Escolha DOIS)",o:{en:["AWS Shield","AWS WAF","Amazon Macie","AWS Config"],pt:["AWS Shield","AWS WAF","Amazon Macie","AWS Config"]},a:[0,1],multi:true,t:"WAF & Shield",exp:{pt:{tech:"O AWS Shield fornece proteção contra DDoS (Standard incluso automaticamente, Advanced com mitigação avançada). O AWS WAF complementa filtrando tráfego malicioso na camada de aplicação, bloqueando padrões de ataque.",simple:"O AWS Shield protege contra ataques DDoS volumetricos absorvendo trafego malicioso em larga escala, enquanto o AWS WAF inspeciona requisicoes individuais e bloqueia padroes maliciosos como SQL injection. Juntos, eles oferecem protecao em camadas contra diferentes tipos de ataque.",avoid:"Nunca dependa apenas do Shield Standard para aplicacoes criticas. Combine Shield Advanced com WAF e configure rate limiting para protecao DDoS robusta."},en:{tech:"AWS Shield provides DDoS protection (Standard is included automatically, Advanced offers advanced mitigation). AWS WAF complements it by filtering malicious traffic at the application layer, blocking attack patterns.",simple:"AWS Shield protects against volumetric DDoS attacks by absorbing large-scale malicious traffic, while AWS WAF inspects individual requests and blocks malicious patterns like SQL injection. Together, they provide layered protection against different types of attacks.",avoid:"Never rely solely on Shield Standard for critical applications. Combine Shield Advanced with WAF and configure rate limiting for robust DDoS protection."}}},
{en:"A company needs to deliver a static website with very low latency to users worldwide. Which combination of AWS services is MOST appropriate?",pt:"Uma empresa precisa entregar um site estático com latência muito baixa para usuários no mundo todo. Qual combinação de serviços da AWS é MAIS apropriada?",o:{en:["Amazon S3 + Amazon CloudFront","Amazon EC2 + Elastic Load Balancing","AWS Lambda + API Gateway","Amazon RDS + ElastiCache"],pt:["Amazon S3 + Amazon CloudFront","Amazon EC2 + Elastic Load Balancing","AWS Lambda + API Gateway","Amazon RDS + ElastiCache"]},a:[0],t:"S3 General",exp:{pt:{tech:"O S3 hospeda o conteúdo estático com alta durabilidade e o CloudFront distribui esse conteúdo por edge locations globais, reduzindo latência ao servir do ponto mais próximo do usuário.",simple:"O Amazon S3 armazena os arquivos do site estatico e o Amazon CloudFront distribui esses arquivos por servidores em todo o mundo, entregando o conteudo a partir do local mais proximo do usuario. Essa combinacao garante baixa latencia global sem precisar de servidores web.",avoid:"Nunca sirva conteudo estatico diretamente do S3 sem CloudFront. Alem de latencia alta, voce perde protecao DDoS e controle de cache."},en:{tech:"S3 hosts the static content with high durability and CloudFront distributes that content through global edge locations, reducing latency by serving from the point closest to the user.",simple:"Amazon S3 stores the static website files and Amazon CloudFront distributes those files across servers worldwide, delivering content from the location closest to the user. This combination ensures low global latency without needing web servers.",avoid:"Never serve static content directly from S3 without CloudFront. Besides high latency, you lose DDoS protection and cache control."}}},
{en:"What is the response time for a production system down case under the AWS Enterprise Support plan?",pt:"Qual é o tempo de resposta para um caso de sistema de produção indisponível no plano AWS Enterprise Support?",o:{en:["Less than 15 minutes","Less than 1 hour","Less than 4 hours","Less than 24 hours"],pt:["Menos de 15 minutos","Menos de 1 hora","Menos de 4 horas","Menos de 24 horas"]},a:[0],t:"Support Plans",exp:{pt:{tech:"O plano Enterprise Support oferece tempo de resposta inferior a 15 minutos para casos críticos de negócio (sistema de produção indisponível), com acesso a Senior Cloud Support Engineers 24/7.",simple:"No plano Enterprise, quando um sistema em producao fica fora do ar, a AWS responde em menos de 15 minutos. Esse e o tempo de resposta mais rapido disponivel entre todos os planos de suporte.",avoid:"Nunca espere um incidente critico para descobrir o tempo de resposta do seu plano de suporte. Valide seus SLAs e processos de escalonamento antes de precisar deles."},en:{tech:"The Enterprise Support plan offers less than 15 minutes response time for business-critical cases (production system down), with access to Senior Cloud Support Engineers 24/7.",simple:"Under the Enterprise plan, when a production system goes down, AWS responds in less than 15 minutes. This is the fastest response time available across all support plans.",avoid:"Never wait for a critical incident to discover your support plan response time. Validate your SLAs and escalation processes before you need them."}}},
{en:"Which Amazon EFS feature makes it different from Amazon EBS in terms of access?",pt:"Qual recurso do Amazon EFS o diferencia do Amazon EBS em termos de acesso?",o:{en:["EFS can be mounted by multiple EC2 instances simultaneously across Availability Zones","EFS provides block-level storage optimized for single instance attachment","EFS stores objects with metadata and unique identifiers","EFS is available only within a single Availability Zone"],pt:["O EFS pode ser montado por várias instâncias EC2 simultaneamente em diferentes Zonas de Disponibilidade","O EFS fornece armazenamento em nível de bloco otimizado para anexo a uma única instância","O EFS armazena objetos com metadados e identificadores únicos","O EFS está disponível apenas em uma única Zona de Disponibilidade"]},a:[0],t:"EBS",exp:{pt:{tech:"O Amazon EFS é um sistema de arquivos NFS elástico totalmente gerenciado que pode ser montado simultaneamente por milhares de instâncias EC2 em múltiplas AZs, diferente do EBS que é vinculado a uma única instância/AZ.",simple:"O Amazon EFS pode ser montado por varias instancias EC2 ao mesmo tempo, inclusive em diferentes Availability Zones, permitindo compartilhamento de arquivos entre servidores. O EBS, por outro lado, so pode ser conectado a uma instancia por vez.",avoid:"Nunca use EBS quando multiplas instancias precisam acessar o mesmo sistema de arquivos simultaneamente. EBS e single-attach; use EFS para acesso compartilhado."},en:{tech:"Amazon EFS is a fully managed elastic NFS file system that can be simultaneously mounted by thousands of EC2 instances across multiple AZs, unlike EBS which is tied to a single instance/AZ.",simple:"Amazon EFS can be mounted by multiple EC2 instances simultaneously, even across different Availability Zones, allowing file sharing between servers. EBS, on the other hand, can only be attached to one instance at a time.",avoid:"Never use EBS when multiple instances need to access the same file system simultaneously. EBS is single-attach; use EFS for shared access."}}},
{en:"Which AWS service translates text between languages in real time and can be integrated into applications for multilingual support?",pt:"Qual serviço da AWS traduz texto entre idiomas em tempo real e pode ser integrado a aplicações para suporte multilíngue?",o:{en:["Amazon Translate","Amazon Comprehend","Amazon Polly","Amazon Transcribe"],pt:["Amazon Translate","Amazon Comprehend","Amazon Polly","Amazon Transcribe"]},a:[0],t:"AI & ML Services",exp:{pt:{tech:"O Amazon Translate é um serviço de tradução automática neural que oferece tradução de texto rápida e de alta qualidade entre idiomas suportados, com integração via API.",simple:"O Amazon Translate converte texto de um idioma para outro em tempo real usando machine learning. Voce pode integra-lo em aplicacoes para oferecer suporte multilingue automaticamente.",avoid:"Nunca exponha textos traduzidos sem revisao humana em contextos criticos (juridico, medico). Traducao automatica pode introduzir erros de significado."},en:{tech:"Amazon Translate is a neural machine translation service that provides fast, high-quality text translation between supported languages, with API integration.",simple:"Amazon Translate converts text from one language to another in real time using machine learning. You can integrate it into applications to provide multilingual support automatically.",avoid:"Never expose machine-translated text without human review in critical contexts (legal, medical). Automatic translation can introduce meaning errors."}}},
{en:"Which AWS service improves the performance and availability of applications by routing user traffic through the AWS global network to the optimal endpoint based on health, geography, and routing policies?",pt:"Qual serviço da AWS melhora a performance e disponibilidade de aplicações roteando o tráfego dos usuários pela rede global da AWS para o endpoint ideal com base em saúde, geografia e políticas de roteamento?",o:{en:["AWS Global Accelerator","Amazon CloudFront","Amazon Route 53","Elastic Load Balancing"],pt:["AWS Global Accelerator","Amazon CloudFront","Amazon Route 53","Elastic Load Balancing"]},a:[0],t:"CloudFront",exp:{pt:{tech:"O AWS Global Accelerator usa a rede global da AWS para direcionar o tráfego ao endpoint mais saudável e próximo, fornecendo endereços IP anycast estáticos e failover automático entre Regiões.",simple:"O AWS Global Accelerator direciona o trafego dos usuarios para a rede global da AWS o mais rapido possivel, encontrando o caminho mais eficiente ate o endpoint da sua aplicacao. Ele melhora a disponibilidade e performance roteando trafego com base em saude, geografia e politicas.",avoid:"Nunca dependa apenas de DNS para failover global. Global Accelerator fornece IPs anycast estaticos e failover mais rapido que mudancas de DNS."},en:{tech:"AWS Global Accelerator uses the AWS global network to direct traffic to the healthiest and closest endpoint, providing static anycast IP addresses and automatic failover between Regions.",simple:"AWS Global Accelerator directs user traffic onto the AWS global network as quickly as possible, finding the most efficient path to your application endpoint. It improves availability and performance by routing traffic based on health, geography, and policies.",avoid:"Never rely solely on DNS for global failover. Global Accelerator provides static anycast IPs and faster failover than DNS changes."}}},
{en:"Which TWO actions are responsibilities of AWS under the Shared Responsibility Model? (Choose TWO)",pt:"Quais DUAS ações são responsabilidades da AWS no Modelo de Responsabilidade Compartilhada? (Escolha DUAS)",o:{en:["Managing the physical security of data centers","Maintaining the hardware infrastructure that runs AWS services","Configuring security groups and NACLs for customer VPCs","Encrypting customer data at rest"],pt:["Gerenciar a segurança física dos data centers","Manter a infraestrutura de hardware que executa os serviços AWS","Configurar security groups e NACLs para VPCs dos clientes","Criptografar dados dos clientes em repouso"]},a:[0,1],multi:true,t:"VPC & Networking",exp:{pt:{tech:"No Modelo de Responsabilidade Compartilhada, a AWS é responsável pela segurança DA nuvem (infraestrutura física, hardware, rede, virtualização), enquanto o cliente é responsável pela segurança NA nuvem (dados, configurações, identidade).",simple:"A AWS e responsavel pela seguranca fisica dos data centers (controle de acesso, vigilancia, protecao ambiental) e pela manutencao de todo o hardware que roda os servicos AWS. O cliente nao precisa se preocupar com servidores fisicos, rede ou refrigeracao.",avoid:"Nunca confunda responsabilidades no modelo compartilhado. A AWS protege A nuvem; voce protege O QUE ESTA na nuvem. Configuracao errada e responsabilidade sua."},en:{tech:"In the Shared Responsibility Model, AWS is responsible for security OF the cloud (physical infrastructure, hardware, networking, virtualization), while the customer is responsible for security IN the cloud (data, configurations, identity).",simple:"AWS is responsible for the physical security of data centers (access control, surveillance, environmental protection) and for maintaining all hardware that runs AWS services. The customer does not need to worry about physical servers, networking, or cooling.",avoid:"Never confuse responsibilities in the shared model. AWS protects THE cloud; you protect WHAT IS IN the cloud. Misconfiguration is your responsibility."}}},
{en:"A data analytics team needs a data warehouse that can handle complex queries across structured data from multiple sources. Which AWS service is purpose-built for this?",pt:"Uma equipe de análise de dados precisa de um data warehouse que possa lidar com consultas complexas em dados estruturados de várias fontes. Qual serviço da AWS é projetado especificamente para isso?",o:{en:["Amazon Redshift","Amazon RDS","Amazon DynamoDB","Amazon ElastiCache"],pt:["Amazon Redshift","Amazon RDS","Amazon DynamoDB","Amazon ElastiCache"]},a:[0],t:"RDS",exp:{pt:{tech:"O Amazon Redshift é um data warehouse totalmente gerenciado em escala de petabytes que usa armazenamento colunar e processamento massivamente paralelo para consultas analíticas complexas com alta performance.",simple:"O Amazon Redshift e um data warehouse otimizado para consultas analiticas complexas em grandes volumes de dados estruturados vindos de multiplas fontes. Ele processa petabytes de dados usando armazenamento colunar e processamento paralelo.",avoid:"Nunca use Redshift para workloads OLTP transacionais. Redshift e otimizado para analytics (OLAP); para transacoes, use RDS ou Aurora."},en:{tech:"Amazon Redshift is a fully managed petabyte-scale data warehouse that uses columnar storage and massively parallel processing for complex analytical queries with high performance.",simple:"Amazon Redshift is a data warehouse optimized for complex analytical queries on large volumes of structured data from multiple sources. It processes petabytes of data using columnar storage and parallel processing.",avoid:"Never use Redshift for transactional OLTP workloads. Redshift is optimized for analytics (OLAP); for transactions, use RDS or Aurora."}}},
{en:"Which EC2 purchasing option provides a significant discount (up to 72%) in exchange for a commitment to a consistent amount of compute usage for a 1 or 3 year term?",pt:"Qual opção de compra do EC2 oferece um desconto significativo (até 72%) em troca de um compromisso com uma quantidade consistente de uso de computação por um período de 1 ou 3 anos?",o:{en:["Savings Plans","Spot Instances","On-Demand Instances","Dedicated Instances"],pt:["Savings Plans","Instâncias Spot","Instâncias Sob Demanda","Instâncias Dedicadas"]},a:[0],t:"EC2 Pricing",exp:{pt:{tech:"Os Savings Plans oferecem preços reduzidos em troca de um compromisso de uso consistente (em USD/hora) por 1 ou 3 anos, aplicáveis a EC2, Lambda e Fargate com flexibilidade de instância e região.",simple:"O Savings Plans oferece descontos de ate 72% em troca de um compromisso de uso consistente de computacao por 1 ou 3 anos. Voce se compromete com um valor por hora de uso, e qualquer uso dentro desse compromisso recebe o preco com desconto.",avoid:"Nunca compre Savings Plans sem analisar o historico de uso por pelo menos 30 dias. Comprometimento errado resulta em pagar por capacidade nao utilizada."},en:{tech:"Savings Plans offer reduced pricing in exchange for a commitment to consistent usage (in USD/hour) for 1 or 3 years, applicable to EC2, Lambda, and Fargate with instance and Region flexibility.",simple:"Savings Plans offer discounts of up to 72% in exchange for a commitment to consistent compute usage for 1 or 3 years. You commit to a per-hour usage amount, and any usage within that commitment receives the discounted price.",avoid:"Never purchase Savings Plans without analyzing usage history for at least 30 days. Wrong commitment results in paying for unused capacity."}}},
{en:"What is the purpose of an Internet Gateway in a VPC?",pt:"Qual é o propósito de um Internet Gateway em uma VPC?",o:{en:["To allow communication between the VPC and the internet","To provide DNS resolution within the VPC","To encrypt all traffic leaving the VPC","To connect two VPCs together privately"],pt:["Permitir a comunicação entre a VPC e a internet","Fornecer resolução de DNS dentro da VPC","Criptografar todo o tráfego que sai da VPC","Conectar duas VPCs de forma privada"]},a:[0],t:"Route 53",exp:{pt:{tech:"Um Internet Gateway é um componente de VPC horizontalmente escalável e altamente disponível que permite comunicação bidirecional entre instâncias na VPC e a internet.",simple:"O Internet Gateway permite que recursos dentro de uma VPC se comuniquem com a internet e vice-versa. Sem ele, instancias em subnets publicas nao conseguem enviar nem receber trafego da internet.",avoid:"Nunca associe um Internet Gateway a subnets que devem ser privadas. Controle o roteamento com tabelas de rotas e use NAT Gateway para trafego de saida de subnets privadas."},en:{tech:"An Internet Gateway is a horizontally scaled, highly available VPC component that enables bidirectional communication between instances in the VPC and the internet.",simple:"An Internet Gateway allows resources inside a VPC to communicate with the internet and vice versa. Without it, instances in public subnets cannot send or receive internet traffic.",avoid:"Never attach an Internet Gateway to subnets that should be private. Control routing with route tables and use NAT Gateway for outbound traffic from private subnets."}}},
{en:"Which AWS service can create an inventory of on-premises servers to help plan a migration, including server specifications, performance data, and running processes?",pt:"Qual serviço da AWS pode criar um inventário de servidores locais para ajudar a planejar uma migração, incluindo especificações de servidor, dados de performance e processos em execução?",o:{en:["AWS Application Discovery Service","AWS Migration Hub","AWS DMS","AWS Server Migration Service"],pt:["AWS Application Discovery Service","AWS Migration Hub","AWS DMS","AWS Server Migration Service"]},a:[0],t:"Migration",exp:{pt:{tech:"O AWS Application Discovery Service coleta informações sobre servidores on-premises, incluindo configuração, uso de CPU/memória/disco, dependências de rede e processos em execução, para planejamento de migração.",simple:"O AWS Application Discovery Service coleta informacoes detalhadas sobre servidores on-premises, incluindo especificacoes de hardware, dados de performance e processos em execucao. Esses dados ajudam a planejar a migracao para a AWS sem surpresas.",avoid:"Nunca inicie uma migracao sem inventario completo do ambiente on-premises. Servidores nao catalogados resultam em migracoes incompletas e falhas."},en:{tech:"AWS Application Discovery Service collects information about on-premises servers, including configuration, CPU/memory/disk usage, network dependencies, and running processes, for migration planning.",simple:"AWS Application Discovery Service collects detailed information about on-premises servers, including hardware specifications, performance data, and running processes. This data helps plan the migration to AWS without surprises.",avoid:"Never start a migration without a complete inventory of the on-premises environment. Uncatalogued servers result in incomplete migrations and failures."}}},
{en:"A company runs a web application that experiences 10x traffic spikes during holiday seasons. Which EC2 feature automatically adds or removes instances based on demand?",pt:"Uma empresa executa uma aplicação web que experimenta picos de tráfego 10x durante temporadas de férias. Qual recurso do EC2 adiciona ou remove instâncias automaticamente com base na demanda?",o:{en:["Auto Scaling","Elastic Load Balancing","Reserved Instances","Placement Groups"],pt:["Auto Scaling","Elastic Load Balancing","Instâncias Reservadas","Grupos de Posicionamento"]},a:[0],t:"EC2 Pricing",exp:{pt:{tech:"O Amazon EC2 Auto Scaling ajusta automaticamente o número de instâncias EC2 com base em condições definidas (métricas do CloudWatch, horários programados), mantendo performance e otimizando custos.",simple:"O Auto Scaling monitora a demanda da sua aplicacao e automaticamente adiciona mais instancias EC2 quando o trafego aumenta e remove quando diminui. Isso garante que voce tenha capacidade suficiente sem pagar por recursos ociosos.",avoid:"Nunca configure Auto Scaling sem definir limites maximos de instancias. Sem limites, um pico de trafego pode gerar custos descontrolados."},en:{tech:"Amazon EC2 Auto Scaling automatically adjusts the number of EC2 instances based on defined conditions (CloudWatch metrics, scheduled times), maintaining performance and optimizing costs.",simple:"Auto Scaling monitors your application demand and automatically adds more EC2 instances when traffic increases and removes them when it decreases. This ensures you have enough capacity without paying for idle resources.",avoid:"Never configure Auto Scaling without setting maximum instance limits. Without limits, a traffic spike can generate uncontrolled costs."}}},
{en:"Which AWS service provides a fully managed message queuing service that enables decoupling of microservices and distributed systems?",pt:"Qual serviço da AWS fornece um serviço de filas de mensagens totalmente gerenciado que permite o desacoplamento de microsserviços e sistemas distribuídos?",o:{en:["Amazon SQS","Amazon SNS","Amazon EventBridge","AWS Step Functions"],pt:["Amazon SQS","Amazon SNS","Amazon EventBridge","AWS Step Functions"]},a:[0],t:"SQS",exp:{pt:{tech:"O Amazon SQS (Simple Queue Service) é um serviço de filas de mensagens totalmente gerenciado que permite desacoplar e escalar microsserviços, sistemas distribuídos e aplicações serverless.",simple:"O Amazon SQS e um servico de filas de mensagens que permite que componentes de um sistema se comuniquem de forma assincrona, sem um precisar esperar a resposta do outro. As mensagens ficam na fila ate serem processadas pelo componente receptor.",avoid:"Nunca processe mensagens SQS sem configurar Dead Letter Queues. Mensagens que falham repetidamente devem ser isoladas para analise, nao descartadas."},en:{tech:"Amazon SQS (Simple Queue Service) is a fully managed message queuing service that enables decoupling and scaling of microservices, distributed systems, and serverless applications.",simple:"Amazon SQS is a message queue service that allows system components to communicate asynchronously, without one needing to wait for the other to respond. Messages stay in the queue until processed by the receiving component.",avoid:"Never process SQS messages without configuring Dead Letter Queues. Messages that fail repeatedly should be isolated for analysis, not discarded."}}},
{en:"Which TWO are valid use cases for Amazon CloudWatch? (Choose TWO)",pt:"Quais DOIS são casos de uso válidos para o Amazon CloudWatch? (Escolha DOIS)",o:{en:["Monitoring CPU utilization of EC2 instances and triggering alarms","Creating dashboards to visualize operational metrics in real time","Recording all API calls made to AWS services","Automatically remediating non-compliant resource configurations"],pt:["Monitorar utilização de CPU de instâncias EC2 e disparar alarmes","Criar painéis para visualizar métricas operacionais em tempo real","Registrar todas as chamadas de API feitas aos serviços AWS","Remediar automaticamente configurações de recursos não conformes"]},a:[0,1],multi:true,t:"EC2 General",exp:{pt:{tech:"O Amazon CloudWatch coleta e monitora métricas, logs e eventos, permite criar alarmes com ações automáticas e dashboards personalizados para visualização em tempo real do estado operacional.",simple:"O Amazon CloudWatch coleta metricas de recursos AWS como uso de CPU de instancias EC2 e permite criar alarmes que disparam acoes quando limites sao ultrapassados. Voce tambem pode criar dashboards para visualizar essas metricas em tempo real.",avoid:"Nunca opere sem alarmes no CloudWatch para metricas criticas como CPU, memoria e disco. Monitoramento reativo so detecta problemas quando o usuario ja foi impactado."},en:{tech:"Amazon CloudWatch collects and monitors metrics, logs, and events, allows creating alarms with automatic actions and custom dashboards for real-time visualization of operational state.",simple:"Amazon CloudWatch collects metrics from AWS resources like EC2 instance CPU usage and lets you create alarms that trigger actions when thresholds are exceeded. You can also create dashboards to visualize these metrics in real time.",avoid:"Never operate without CloudWatch alarms for critical metrics like CPU, memory, and disk. Reactive monitoring only detects problems when the user is already impacted."}}},
{en:"In the context of VPC networking, what is the purpose of a subnet?",pt:"No contexto de redes VPC, qual é o propósito de uma sub-rede?",o:{en:["To partition a VPC IP address range into smaller segments for organizing resources","To connect the VPC to the internet","To provide DNS resolution for VPC resources","To encrypt network traffic between instances"],pt:["Particionar o intervalo de endereços IP de uma VPC em segmentos menores para organizar recursos","Conectar a VPC à internet","Fornecer resolução de DNS para recursos da VPC","Criptografar o tráfego de rede entre instâncias"]},a:[0],t:"Route 53",exp:{pt:{tech:"Uma sub-rede é um segmento de faixa de endereços IP dentro de uma VPC, associada a uma única AZ. Sub-redes podem ser públicas (com rota para Internet Gateway) ou privadas.",simple:"Uma subnet divide o intervalo de enderecos IP de uma VPC em segmentos menores para organizar recursos. Voce pode ter subnets publicas (com acesso a internet) e privadas (sem acesso direto) para separar diferentes tipos de recursos.",avoid:"Nunca coloque todos os recursos em uma unica subnet. Separe subnets publicas e privadas e use Network ACLs alem de Security Groups para defesa em camadas."},en:{tech:"A subnet is a segment of IP address range within a VPC, associated with a single AZ. Subnets can be public (with route to Internet Gateway) or private.",simple:"A subnet divides a VPC IP address range into smaller segments to organize resources. You can have public subnets (with internet access) and private subnets (without direct access) to separate different types of resources.",avoid:"Never place all resources in a single subnet. Separate public and private subnets and use Network ACLs in addition to Security Groups for layered defense."}}},
{en:"A retail company wants to analyze historical spending patterns and forecast future AWS costs for the next 12 months. Which tool should they use?",pt:"Uma empresa de varejo deseja analisar padrões de gastos históricos e prever custos futuros da AWS para os próximos 12 meses. Qual ferramenta deve ser utilizada?",o:{en:["AWS Cost Explorer","AWS Budgets","AWS Pricing Calculator","AWS Billing Dashboard"],pt:["AWS Cost Explorer","AWS Budgets","AWS Calculadora de Preços","AWS Painel de Faturamento"]},a:[0],t:"Cost Management",exp:{pt:{tech:"O AWS Cost Explorer fornece visualização e análise de custos e uso ao longo do tempo, com recursos de filtragem, agrupamento e previsão de gastos futuros por até 12 meses.",simple:"O AWS Cost Explorer mostra graficos e relatorios dos seus gastos AWS ao longo do tempo e pode projetar custos futuros para os proximos 12 meses com base nos padroes historicos. Ele ajuda a identificar tendencias e encontrar oportunidades de economia.",avoid:"Nunca ignore tendencias de custo no Cost Explorer. Revisoes mensais previnem surpresas e ajudam a identificar recursos subutilizados antes que virem desperdicio."},en:{tech:"AWS Cost Explorer provides cost and usage visualization and analysis over time, with filtering, grouping, and future spending forecasting capabilities for up to 12 months.",simple:"AWS Cost Explorer shows charts and reports of your AWS spending over time and can forecast future costs for the next 12 months based on historical patterns. It helps identify trends and find savings opportunities.",avoid:"Never ignore cost trends in Cost Explorer. Monthly reviews prevent surprises and help identify underutilized resources before they become waste."}}},
{en:"Which AWS service provides a set of physical devices that can transfer data into and out of AWS by shipping the device, useful when network transfer would take too long?",pt:"Qual serviço da AWS fornece um conjunto de dispositivos físicos que podem transferir dados para dentro e fora da AWS enviando o dispositivo, útil quando a transferência por rede demoraria muito?",o:{en:["AWS Snow Family","AWS DataSync","AWS Transfer Family","AWS Direct Connect"],pt:["AWS Snow Family","AWS DataSync","AWS Transfer Family","AWS Direct Connect"]},a:[0],t:"Snow Family",exp:{pt:{tech:"A AWS Snow Family (Snowcone, Snowball Edge, Snowmobile) oferece dispositivos físicos para migração de dados offline em escala, desde 8 TB (Snowcone) até 100 PB (Snowmobile).",simple:"O AWS Snow Family e um conjunto de dispositivos fisicos que a AWS envia ate voce para transferir grandes volumes de dados. Voce copia os dados no dispositivo e o envia de volta para a AWS, util quando transferir pela rede seria muito lento ou inviavel.",avoid:"Nunca transfira dados sensiveis via Snow Family sem habilitar criptografia no dispositivo. Sempre use KMS e valide a chain of custody do dispositivo fisico."},en:{tech:"The AWS Snow Family (Snowcone, Snowball Edge, Snowmobile) provides physical devices for offline data migration at scale, from 8 TB (Snowcone) to 100 PB (Snowmobile).",simple:"The AWS Snow Family is a set of physical devices that AWS ships to you for transferring large volumes of data. You copy data onto the device and ship it back to AWS, useful when transferring over the network would be too slow or impractical.",avoid:"Never transfer sensitive data via Snow Family without enabling encryption on the device. Always use KMS and validate the physical device chain of custody."}}},
{en:"Which feature of the AWS Free Tier allows new customers to run a t2.micro or t3.micro EC2 instance for free for 12 months?",pt:"Qual recurso do AWS Free Tier permite que novos clientes executem uma instância EC2 t2.micro ou t3.micro gratuitamente por 12 meses?",o:{en:["12-Month Free Tier","Always Free","Short-Term Trial","Free Usage Credits"],pt:["Free Tier de 12 Meses","Sempre Gratuito","Teste de Curto Prazo","Créditos de Uso Gratuito"]},a:[0],t:"EC2 General",exp:{pt:{tech:"O AWS Free Tier oferece três tipos de ofertas: 12-Month Free (expira 12 meses após criação da conta), Always Free (não expira), e Short-Term Trials (período limitado por serviço). A instância t2/t3.micro é parte do 12-Month Free.",simple:"O 12-Month Free Tier da AWS permite que novos clientes usem certos recursos gratuitamente por 12 meses apos criar a conta, incluindo uma instancia t2.micro ou t3.micro EC2. Apos os 12 meses, o uso passa a ser cobrado normalmente.",avoid:"Nunca esqueca que o Free Tier tem limites de uso e expira apos 12 meses. Configure alertas de billing desde o primeiro dia para evitar cobrancas inesperadas."},en:{tech:"The AWS Free Tier offers three types of offers: 12-Month Free (expires 12 months after account creation), Always Free (does not expire), and Short-Term Trials (limited period per service). The t2/t3.micro instance is part of 12-Month Free.",simple:"The AWS 12-Month Free Tier allows new customers to use certain resources for free for 12 months after creating the account, including a t2.micro or t3.micro EC2 instance. After 12 months, usage is charged at standard rates.",avoid:"Never forget that the Free Tier has usage limits and expires after 12 months. Set up billing alerts from day one to avoid unexpected charges."}}},
{en:"Which AWS service acts as a managed Apache Kafka service for building real-time streaming data pipelines and applications?",pt:"Qual serviço da AWS atua como um serviço gerenciado do Apache Kafka para construir pipelines e aplicações de dados de streaming em tempo real?",o:{en:["Amazon MSK","Amazon Kinesis Data Streams","Amazon SQS","Amazon EventBridge"],pt:["Amazon MSK","Amazon Kinesis Data Streams","Amazon SQS","Amazon EventBridge"]},a:[0],t:"SQS",exp:{pt:{tech:"O Amazon MSK (Managed Streaming for Apache Kafka) é um serviço totalmente gerenciado que facilita a construção e execução de aplicações que usam Apache Kafka para processar dados de streaming.",simple:"O Amazon MSK e um servico gerenciado que roda Apache Kafka na AWS sem voce precisar instalar, configurar ou manter a infraestrutura do Kafka. Voce cria o cluster e o MSK cuida de patches, monitoramento e escalabilidade.",avoid:"Nunca rode MSK sem configurar autenticacao (IAM ou SASL) e criptografia em transito. Kafka sem seguranca expoe todo o streaming de dados."},en:{tech:"Amazon MSK (Managed Streaming for Apache Kafka) is a fully managed service that makes it easy to build and run applications that use Apache Kafka to process streaming data.",simple:"Amazon MSK is a managed service that runs Apache Kafka on AWS without you needing to install, configure, or maintain the Kafka infrastructure. You create the cluster and MSK handles patches, monitoring, and scalability.",avoid:"Never run MSK without configuring authentication (IAM or SASL) and encryption in transit. Kafka without security exposes all data streaming."}}},
{en:"A company needs a VPC that can route traffic between itself and another VPC without going through the public internet. Which feature enables this direct private connection?",pt:"Uma empresa precisa de uma VPC que possa rotear tráfego entre ela mesma e outra VPC sem passar pela internet pública. Qual recurso permite essa conexão privada direta?",o:{en:["VPC Peering","Internet Gateway","NAT Gateway","AWS Transit Gateway"],pt:["VPC Peering","Internet Gateway","NAT Gateway","AWS Transit Gateway"]},a:[0],t:"Transit Gateway",exp:{pt:{tech:"O VPC Peering cria uma conexão de rede privada entre duas VPCs usando endereços IP privados, como se estivessem na mesma rede. O tráfego permanece na rede da AWS e não atravessa a internet pública.",simple:"O VPC Peering cria uma conexao de rede privada entre duas VPCs, permitindo que recursos em ambas se comuniquem usando enderecos IP privados sem passar pela internet publica. O trafego permanece dentro da rede AWS.",avoid:"Nunca crie VPC Peering sem revisar as tabelas de rotas de ambas as VPCs. Rotas mal configuradas podem expor subnets privadas entre contas."},en:{tech:"VPC Peering creates a private network connection between two VPCs using private IP addresses, as if they were on the same network. Traffic stays on the AWS network and does not cross the public internet.",simple:"VPC Peering creates a private network connection between two VPCs, allowing resources in both to communicate using private IP addresses without going through the public internet. Traffic stays within the AWS network.",avoid:"Never create VPC Peering without reviewing the route tables of both VPCs. Misconfigured routes can expose private subnets between accounts."}}},
{en:"Which AWS service provides managed Memcached or Redis clusters for caching frequently accessed data to improve application performance?",pt:"Qual serviço da AWS fornece clusters gerenciados de Memcached ou Redis para armazenar em cache dados acessados frequentemente e melhorar a performance da aplicação?",o:{en:["Amazon ElastiCache","Amazon DynamoDB Accelerator","Amazon Redshift","Amazon RDS Proxy"],pt:["Amazon ElastiCache","Amazon DynamoDB Accelerator","Amazon Redshift","Amazon RDS Proxy"]},a:[0],t:"RDS",exp:{pt:{tech:"O Amazon ElastiCache é um serviço totalmente gerenciado de cache em memória compatível com Redis e Memcached, oferecendo latência de sub-milissegundo para casos de uso como caching de sessão e consultas frequentes.",simple:"O Amazon ElastiCache fornece clusters gerenciados de Memcached ou Redis que armazenam dados em memoria para acesso ultra-rapido. Ele e usado para fazer cache de dados frequentemente acessados e reduzir a carga em bancos de dados.",avoid:"Nunca use ElastiCache sem configurar autenticacao e criptografia em transito. Redis/Memcached sem AUTH expoe dados em cache a qualquer cliente na rede."},en:{tech:"Amazon ElastiCache is a fully managed in-memory caching service compatible with Redis and Memcached, offering sub-millisecond latency for use cases like session caching and frequent queries.",simple:"Amazon ElastiCache provides managed Memcached or Redis clusters that store data in memory for ultra-fast access. It is used to cache frequently accessed data and reduce load on databases.",avoid:"Never use ElastiCache without configuring authentication and encryption in transit. Redis/Memcached without AUTH exposes cached data to any client on the network."}}},
{en:"What is the MAIN difference between a public subnet and a private subnet in a VPC?",pt:"Qual é a PRINCIPAL diferença entre uma sub-rede pública e uma sub-rede privada em uma VPC?",o:{en:["A public subnet has a route to an Internet Gateway while a private subnet does not","A public subnet allows more EC2 instances than a private subnet","A public subnet uses IPv4 while a private subnet uses IPv6","A public subnet is in one AZ while a private subnet spans multiple AZs"],pt:["Uma sub-rede pública tem uma rota para um Internet Gateway enquanto uma privada não tem","Uma sub-rede pública permite mais instâncias EC2 que uma privada","Uma sub-rede pública usa IPv4 enquanto uma privada usa IPv6","Uma sub-rede pública está em uma AZ enquanto uma privada abrange várias AZs"]},a:[0],t:"EC2 General",exp:{pt:{tech:"A distinção entre sub-rede pública e privada é determinada pela tabela de rotas: sub-redes públicas possuem rota para um Internet Gateway, enquanto sub-redes privadas não possuem essa rota direta.",simple:"Uma subnet publica tem uma rota configurada para um Internet Gateway, permitindo que recursos nela recebam e enviem trafego da internet. Uma subnet privada nao tem essa rota, entao seus recursos nao sao acessiveis diretamente pela internet.",avoid:"Nunca coloque recursos que nao precisam de acesso a internet em subnets publicas. Isso aumenta a superficie de ataque desnecessariamente."},en:{tech:"The distinction between public and private subnets is determined by the route table: public subnets have a route to an Internet Gateway, while private subnets do not have that direct route.",simple:"A public subnet has a route configured to an Internet Gateway, allowing resources in it to receive and send internet traffic. A private subnet does not have this route, so its resources are not directly accessible from the internet.",avoid:"Never place resources that do not need internet access in public subnets. This unnecessarily increases the attack surface."}}},
{en:"Which TWO statements about Amazon RDS are correct? (Choose TWO)",pt:"Quais DUAS afirmações sobre o Amazon RDS estão corretas? (Escolha DUAS)",o:{en:["RDS supports multiple database engines including MySQL, PostgreSQL, and Oracle","RDS handles routine database tasks like patching and backups automatically","RDS only supports the Amazon Aurora engine","RDS provides direct access to the underlying operating system of the database instance"],pt:["O RDS suporta vários mecanismos de banco de dados incluindo MySQL, PostgreSQL e Oracle","O RDS lida automaticamente com tarefas rotineiras do banco de dados como patches e backups","O RDS suporta apenas o mecanismo Amazon Aurora","O RDS fornece acesso direto ao sistema operacional subjacente da instância de banco de dados"]},a:[0,1],multi:true,t:"RDS",exp:{pt:{tech:"O Amazon RDS é um serviço gerenciado que suporta seis engines (Aurora, MySQL, PostgreSQL, MariaDB, Oracle, SQL Server), automatizando provisionamento de hardware, patches, backups e recuperação.",simple:"O Amazon RDS suporta varios motores de banco de dados como MySQL, PostgreSQL e Oracle, e gerencia automaticamente tarefas rotineiras como aplicacao de patches, backups e recuperacao. Voce foca nos dados e na aplicacao, nao na administracao do banco.",avoid:"Nunca rode RDS em producao sem backups automaticos e Multi-AZ. Sempre teste o processo de restore periodicamente para validar que os backups funcionam."},en:{tech:"Amazon RDS is a managed service supporting six engines (Aurora, MySQL, PostgreSQL, MariaDB, Oracle, SQL Server), automating hardware provisioning, patching, backups, and recovery.",simple:"Amazon RDS supports multiple database engines like MySQL, PostgreSQL, and Oracle, and automatically manages routine tasks like patching, backups, and recovery. You focus on data and the application, not on database administration.",avoid:"Never run RDS in production without automatic backups and Multi-AZ. Always test the restore process periodically to validate that backups work."}}},
{en:"A company wants to enforce that all S3 buckets across their organization have encryption enabled. Which service allows them to create rules that automatically evaluate resource configurations?",pt:"Uma empresa deseja garantir que todos os buckets S3 em sua organização tenham criptografia habilitada. Qual serviço permite criar regras que avaliam automaticamente configurações de recursos?",o:{en:["AWS Config","AWS CloudTrail","Amazon CloudWatch","AWS Organizations"],pt:["AWS Config","AWS CloudTrail","Amazon CloudWatch","AWS Organizations"]},a:[0],t:"S3 General",exp:{pt:{tech:"O AWS Config permite criar regras gerenciadas e personalizadas que avaliam continuamente as configurações de recursos AWS. A regra s3-bucket-server-side-encryption-enabled verifica se a criptografia está habilitada em buckets S3.",simple:"O AWS Config permite criar regras que avaliam automaticamente se as configuracoes dos seus recursos AWS estao em conformidade com suas politicas, como verificar se todos os buckets S3 tem criptografia ativada. Ele monitora continuamente e sinaliza violacoes.",avoid:"Nunca confie apenas em revisoes manuais para compliance. Use AWS Config com regras automaticas para detectar e remediar desvios de configuracao continuamente."},en:{tech:"AWS Config allows creating managed and custom rules that continuously evaluate AWS resource configurations. The s3-bucket-server-side-encryption-enabled rule checks if encryption is enabled on S3 buckets.",simple:"AWS Config lets you create rules that automatically evaluate whether your AWS resource configurations comply with your policies, such as checking if all S3 buckets have encryption enabled. It continuously monitors and flags violations.",avoid:"Never rely solely on manual reviews for compliance. Use AWS Config with automatic rules to continuously detect and remediate configuration drift."}}},
{en:"Which type of Edge Location resource does Amazon CloudFront use to cache larger files closer to regional viewers when the edge location cache is full?",pt:"Qual tipo de recurso de Edge Location o Amazon CloudFront usa para armazenar em cache arquivos maiores mais perto dos visualizadores regionais quando o cache do edge location está cheio?",o:{en:["Regional Edge Cache","Local Zone","Availability Zone","Wavelength Zone"],pt:["Cache de Borda Regional","Zona Local","Zona de Disponibilidade","Zona Wavelength"]},a:[0],t:"CloudFront",exp:{pt:{tech:"Regional Edge Caches ficam entre o servidor de origem e os Edge Locations globais do CloudFront. Possuem caches maiores e retêm conteúdo por mais tempo, reduzindo a necessidade de buscar no servidor de origem.",simple:"O Regional Edge Cache e uma camada intermediaria do CloudFront entre o servidor de origem e as edge locations. Quando uma edge location nao tem espaco para um arquivo em cache, o Regional Edge Cache ainda pode ter o arquivo armazenado, evitando buscar no servidor de origem.",avoid:"Nunca ignore a invalidacao de cache do CloudFront apos atualizar conteudo. Usuarios podem receber versoes antigas por horas se o cache nao for limpo."},en:{tech:"Regional Edge Caches sit between the origin server and the global CloudFront Edge Locations. They have larger caches and retain content longer, reducing the need to fetch from the origin server.",simple:"The Regional Edge Cache is an intermediate CloudFront layer between the origin server and edge locations. When an edge location does not have space for a cached file, the Regional Edge Cache may still have the file stored, avoiding a fetch from the origin server.",avoid:"Never ignore CloudFront cache invalidation after updating content. Users may receive old versions for hours if the cache is not cleared."}}},
