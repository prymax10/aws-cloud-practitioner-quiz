{en:"Which AWS service can synthesize natural-sounding human speech from text in multiple languages?",pt:"Qual serviço da AWS pode sintetizar fala humana com som natural a partir de texto em vários idiomas?",o:{en:["Amazon Polly","Amazon Lex","Amazon Transcribe","Amazon Translate"],pt:["Amazon Polly","Amazon Lex","Amazon Transcribe","Amazon Translate"]},a:[0],exp:{pt:{tech:"O Amazon Polly é um serviço de text-to-speech que usa tecnologias avançadas de deep learning para converter texto em fala realista, suportando dezenas de idiomas e vozes.",simple:"O Polly e um servico que converte texto em fala com voz natural em varios idiomas, permitindo criar audio a partir de qualquer texto.",avoid:"Nao use o Polly para transcrever audio em texto — para isso use o Amazon Transcribe. O Polly faz o caminho inverso: converte texto em fala."},en:{tech:"Amazon Polly is a text-to-speech service that uses advanced deep learning technologies to convert text into lifelike speech, supporting dozens of languages and voices.",simple:"Polly is a service that converts text to natural-sounding speech in multiple languages, allowing you to create audio from any text.",avoid:"Do not use Polly to transcribe audio to text — use Amazon Transcribe for that. Polly does the reverse: it converts text to speech."}}},
{en:"What does the Sustainability pillar of the AWS Well-Architected Framework PRIMARILY focus on?",pt:"No que o pilar de Sustentabilidade do AWS Well-Architected Framework foca PRINCIPALMENTE?",o:{en:["Minimizing the environmental impact of running cloud workloads","Ensuring long-term financial sustainability of cloud spending","Maintaining system uptime for sustainable business operations","Building architectures that sustain high traffic loads"],pt:["Minimizar o impacto ambiental da execução de cargas de trabalho em nuvem","Garantir a sustentabilidade financeira de longo prazo dos gastos com nuvem","Manter o tempo de atividade do sistema para operações de negócios sustentáveis","Construir arquiteturas que sustentem altas cargas de tráfego"]},a:[0],exp:{pt:{tech:"O pilar de Sustentabilidade foca em minimizar os impactos ambientais da execução de cargas de trabalho na nuvem, incluindo dimensionamento eficiente de recursos, maximização da utilização e adoção de hardware eficiente.",simple:"O pilar de Sustentabilidade foca em minimizar o impacto ambiental das cargas de trabalho na nuvem, usando recursos de forma eficiente para reduzir a pegada de carbono.",avoid:"Nao confunda Sustentabilidade com otimizacao de custos — embora ambos incentivem o uso eficiente de recursos, o pilar de Sustentabilidade foca especificamente no impacto ambiental, nao no financeiro."},en:{tech:"The Sustainability pillar focuses on minimizing environmental impacts of running cloud workloads, including efficient resource sizing, maximizing utilization, and adopting efficient hardware.",simple:"The Sustainability pillar focuses on minimizing the environmental impact of cloud workloads by using resources efficiently to reduce the carbon footprint.",avoid:"Do not confuse Sustainability with cost optimization — although both encourage efficient resource use, the Sustainability pillar focuses specifically on environmental impact, not financial."}}},
{en:"Which Amazon Aurora feature allows you to create up to 15 read replicas that share the same underlying storage volume, providing high availability and read scaling?",pt:"Qual recurso do Amazon Aurora permite criar até 15 réplicas de leitura que compartilham o mesmo volume de armazenamento subjacente, proporcionando alta disponibilidade e escalabilidade de leitura?",o:{en:["Aurora Replicas","Aurora Multi-Master","Aurora Global Database","Aurora Serverless"],pt:["Réplicas Aurora","Aurora Multi-Master","Aurora Global Database","Aurora Serverless"]},a:[0],exp:{pt:{tech:"As Aurora Replicas compartilham o mesmo cluster de armazenamento distribuído do Aurora, oferecendo réplicas de leitura com lag de replicação tipicamente abaixo de 10 ms e failover automático.",simple:"Aurora Replicas sao copias de leitura que compartilham o mesmo volume de armazenamento do Aurora principal, permitindo ate 15 replicas para alta disponibilidade e escalabilidade de leitura.",avoid:"Nao confunda Aurora Replicas com replicas de leitura do RDS padrao — as Aurora Replicas compartilham o armazenamento e fazem failover automatico, enquanto as do RDS replicam dados de forma assincrona."},en:{tech:"Aurora Replicas share the same Aurora distributed storage cluster, offering read replicas with replication lag typically below 10 ms and automatic failover.",simple:"Aurora Replicas are read copies that share the same storage volume as the primary Aurora instance, allowing up to 15 replicas for high availability and read scaling.",avoid:"Do not confuse Aurora Replicas with standard RDS read replicas — Aurora Replicas share storage and provide automatic failover, while RDS replicas replicate data asynchronously."}}},
{en:"A team needs to automate the building, testing, and deployment of their application code every time a change is pushed to the repository. Which AWS service provides a fully managed continuous integration and continuous delivery pipeline?",pt:"Uma equipe precisa automatizar a construção, teste e implantação do código de sua aplicação toda vez que uma alteração é enviada ao repositório. Qual serviço da AWS fornece um pipeline de integração contínua e entrega contínua totalmente gerenciado?",o:{en:["AWS CodePipeline","AWS CodeBuild","AWS CodeDeploy","AWS CodeCommit"],pt:["AWS CodePipeline","AWS CodeBuild","AWS CodeDeploy","AWS CodeCommit"]},a:[0],exp:{pt:{tech:"O AWS CodePipeline é um serviço de entrega contínua totalmente gerenciado que orquestra as etapas de build, teste e deploy, integrando-se com CodeCommit, CodeBuild, CodeDeploy e ferramentas de terceiros.",simple:"O CodePipeline automatiza o fluxo completo de construcao, teste e implantacao de codigo a cada mudanca enviada ao repositorio, criando uma pipeline de entrega continua.",avoid:"Nao use o CodePipeline se voce so precisa compilar codigo — use CodeBuild isoladamente. O CodePipeline e um orquestrador de multiplas etapas, nao uma ferramenta de build."},en:{tech:"AWS CodePipeline is a fully managed continuous delivery service that orchestrates build, test, and deploy stages, integrating with CodeCommit, CodeBuild, CodeDeploy, and third-party tools.",simple:"CodePipeline automates the full flow of building, testing, and deploying code every time a change is pushed to the repository, creating a continuous delivery pipeline.",avoid:"Do not use CodePipeline if you only need to build code — use CodeBuild alone. CodePipeline is a multi-stage orchestrator, not a build tool."}}},
{en:"Which VPC component allows resources in a private subnet to access the internet for software updates while preventing inbound connections from the internet?",pt:"Qual componente de VPC permite que recursos em uma sub-rede privada acessem a internet para atualizações de software enquanto impede conexões de entrada da internet?",o:{en:["NAT Gateway","Internet Gateway","Security Group","Network ACL"],pt:["NAT Gateway","Internet Gateway","Security Group","Network ACL"]},a:[0],exp:{pt:{tech:"O NAT Gateway permite que instâncias em sub-redes privadas iniciem conexões de saída para a internet enquanto bloqueia tráfego de entrada não solicitado, fornecendo tradução de endereços de rede.",simple:"O NAT Gateway permite que recursos em sub-redes privadas acessem a internet para atualizacoes de software, enquanto bloqueia conexoes vindas da internet.",avoid:"Nao confunda NAT Gateway com Internet Gateway — o Internet Gateway permite conexoes bidirecionais em sub-redes publicas. Tambem considere que NAT Gateways geram custos por hora e por GB transferido."},en:{tech:"NAT Gateway enables instances in private subnets to initiate outbound connections to the internet while blocking unsolicited inbound traffic, providing network address translation.",simple:"A NAT Gateway allows resources in private subnets to access the internet for software updates while blocking inbound connections from the internet.",avoid:"Do not confuse NAT Gateway with Internet Gateway — Internet Gateway allows bidirectional connections in public subnets. Also consider that NAT Gateways incur hourly and per-GB transfer costs."}}},
{en:"Which AWS service allows you to build conversational interfaces (chatbots) using voice and text powered by the same deep learning technologies as Alexa?",pt:"Qual serviço da AWS permite construir interfaces conversacionais (chatbots) usando voz e texto com as mesmas tecnologias de deep learning da Alexa?",o:{en:["Amazon Lex","Amazon Polly","Amazon Comprehend","Amazon Transcribe"],pt:["Amazon Lex","Amazon Polly","Amazon Comprehend","Amazon Transcribe"]},a:[0],exp:{pt:{tech:"O Amazon Lex fornece reconhecimento automático de fala (ASR) e compreensão de linguagem natural (NLU) para criar chatbots sofisticados com interfaces de conversa por voz e texto.",simple:"O Lex e um servico para construir interfaces de conversa (chatbots) por voz e texto, usando a mesma tecnologia de deep learning da Alexa.",avoid:"Nao use o Lex para processar linguagem natural em textos longos ou fazer analise de sentimento — para isso use o Amazon Comprehend. O Lex e projetado para dialogos interativos."},en:{tech:"Amazon Lex provides automatic speech recognition (ASR) and natural language understanding (NLU) to build sophisticated chatbots with voice and text conversational interfaces.",simple:"Lex is a service for building conversational interfaces (chatbots) using voice and text, powered by the same deep learning technology as Alexa.",avoid:"Do not use Lex for processing natural language in long texts or performing sentiment analysis — use Amazon Comprehend for that. Lex is designed for interactive dialogues."}}},
{en:"Which AWS service would you use to connect multiple VPCs and on-premises networks through a central hub, simplifying network architecture?",pt:"Qual serviço da AWS você usaria para conectar várias VPCs e redes locais por meio de um hub central, simplificando a arquitetura de rede?",o:{en:["AWS Transit Gateway","VPC Peering","AWS Direct Connect","Amazon Route 53"],pt:["AWS Transit Gateway","VPC Peering","AWS Direct Connect","Amazon Route 53"]},a:[0],exp:{pt:{tech:"O AWS Transit Gateway atua como um hub de rede regional que conecta VPCs e redes on-premises de forma centralizada, eliminando a complexidade de conexões ponto-a-ponto entre redes.",simple:"O Transit Gateway funciona como um hub central que conecta multiplas VPCs e redes on-premises, simplificando a arquitetura de rede ao eliminar conexoes ponto-a-ponto.",avoid:"Nao use Transit Gateway se voce tem apenas duas VPCs para conectar — o VPC Peering e mais simples e barato para conexoes diretas entre poucas redes."},en:{tech:"AWS Transit Gateway acts as a regional network hub that centrally connects VPCs and on-premises networks, eliminating the complexity of point-to-point connections between networks.",simple:"Transit Gateway works as a central hub that connects multiple VPCs and on-premises networks, simplifying network architecture by eliminating point-to-point connections.",avoid:"Do not use Transit Gateway if you only have two VPCs to connect — VPC Peering is simpler and cheaper for direct connections between a few networks."}}},
{en:"A company wants to track whether their AWS resources comply with internal policies, such as ensuring all EBS volumes are encrypted. Which service should they use?",pt:"Uma empresa deseja rastrear se seus recursos AWS estão em conformidade com políticas internas, como garantir que todos os volumes EBS estejam criptografados. Qual serviço deve ser utilizado?",o:{en:["AWS Config","AWS CloudTrail","Amazon CloudWatch","AWS Trusted Advisor"],pt:["AWS Config","AWS CloudTrail","Amazon CloudWatch","AWS Trusted Advisor"]},a:[0],exp:{pt:{tech:"O AWS Config avalia continuamente as configurações dos recursos AWS em relação a regras definidas, registra o histórico de configurações e notifica sobre alterações ou não conformidades.",simple:"O AWS Config monitora continuamente as configuracoes dos seus recursos AWS e verifica se eles seguem regras que voce definiu, como exigir criptografia em volumes EBS. Ele registra mudancas e sinaliza recursos fora de conformidade.",avoid:"Nao use o Config para bloquear acoes em tempo real — ele apenas detecta e reporta violacoes, nao impede que recursos sejam criados errados. Para prevenir a criacao de recursos fora de conformidade, use SCPs ou IAM policies."},en:{tech:"AWS Config continuously evaluates AWS resource configurations against defined rules, records configuration history, and notifies about changes or non-compliance.",simple:"AWS Config continuously monitors your AWS resource configurations and checks if they follow rules you defined, such as requiring encryption on EBS volumes. It records changes and flags non-compliant resources.",avoid:"Do not use Config to block actions in real time — it only detects and reports violations, it does not prevent non-compliant resources from being created. To prevent non-compliant resource creation, use SCPs or IAM policies."}}},
{en:"Which pricing tool allows you to estimate the cost of your AWS architecture BEFORE deploying any resources?",pt:"Qual ferramenta de preços permite estimar o custo da sua arquitetura AWS ANTES de implantar qualquer recurso?",o:{en:["AWS Pricing Calculator","AWS Cost Explorer","AWS Budgets","AWS Cost and Usage Report"],pt:["AWS Calculadora de Preços","AWS Cost Explorer","AWS Budgets","AWS Relatório de Custo e Uso"]},a:[0],exp:{pt:{tech:"O AWS Pricing Calculator é uma ferramenta gratuita baseada na web que permite modelar soluções AWS e estimar custos mensais antes de provisionar qualquer recurso.",simple:"O AWS Pricing Calculator permite que voce monte uma estimativa de custos da sua arquitetura AWS antes de criar qualquer recurso. Voce seleciona os servicos, configura as quantidades e ve o custo mensal estimado.",avoid:"Nao confunda com o Cost Explorer, que analisa custos ja gastos. O Pricing Calculator nao acompanha gastos reais — ele serve apenas para estimativas antes do deploy."},en:{tech:"The AWS Pricing Calculator is a free web-based tool that lets you model AWS solutions and estimate monthly costs before provisioning any resources.",simple:"AWS Pricing Calculator lets you build a cost estimate for your AWS architecture before creating any resources. You select services, configure quantities, and see the estimated monthly cost.",avoid:"Do not confuse it with Cost Explorer, which analyzes costs already incurred. The Pricing Calculator does not track actual spending — it is only for estimates before deployment."}}},
{en:"Which TWO characteristics describe Amazon DynamoDB? (Choose TWO)",pt:"Quais DUAS características descrevem o Amazon DynamoDB? (Escolha DUAS)",o:{en:["It is a fully managed NoSQL database service","It provides single-digit millisecond performance at any scale","It uses SQL as its primary query language","It requires you to choose an Availability Zone for placement"],pt:["É um serviço de banco de dados NoSQL totalmente gerenciado","Oferece performance de milissegundos de um dígito em qualquer escala","Usa SQL como linguagem de consulta principal","Exige que você escolha uma Zona de Disponibilidade para posicionamento"]},a:[0,1],multi:true,exp:{pt:{tech:"O DynamoDB é um banco de dados NoSQL de chave-valor e documentos totalmente gerenciado, com performance consistente de milissegundos de um dígito, escalabilidade automática e replicação multi-AZ integrada.",simple:"O DynamoDB e um banco de dados NoSQL totalmente gerenciado pela AWS, sem necessidade de administrar servidores ou infraestrutura. Ele entrega tempos de resposta de milissegundos de um digito, independentemente da quantidade de dados armazenados.",avoid:"Nao use DynamoDB para consultas SQL complexas com joins entre varias tabelas — ele nao e um banco relacional. Se voce precisa de transacoes ACID complexas ou queries SQL tradicionais, considere o Amazon RDS."},en:{tech:"DynamoDB is a fully managed key-value and document NoSQL database with consistent single-digit millisecond performance, automatic scaling, and built-in multi-AZ replication.",simple:"DynamoDB is a NoSQL database fully managed by AWS, with no need to administer servers or infrastructure. It delivers single-digit millisecond response times regardless of the amount of data stored.",avoid:"Do not use DynamoDB for complex SQL queries with joins across multiple tables — it is not a relational database. If you need complex ACID transactions or traditional SQL queries, consider Amazon RDS."}}},
{en:"Which AWS service provides managed Kubernetes clusters, allowing you to run containerized applications using the Kubernetes orchestration system?",pt:"Qual serviço da AWS fornece clusters Kubernetes gerenciados, permitindo executar aplicações em contêineres usando o sistema de orquestração Kubernetes?",o:{en:["Amazon EKS","Amazon ECS","AWS Fargate","AWS Elastic Beanstalk"],pt:["Amazon EKS","Amazon ECS","AWS Fargate","AWS Elastic Beanstalk"]},a:[0],exp:{pt:{tech:"O Amazon EKS (Elastic Kubernetes Service) é um serviço gerenciado que executa o plano de controle Kubernetes em alta disponibilidade, eliminando a necessidade de instalar e operar sua própria infraestrutura Kubernetes.",simple:"O Amazon EKS e um servico gerenciado que roda clusters Kubernetes na AWS sem voce precisar instalar ou manter o plano de controle do Kubernetes. Voce implanta seus containers e o EKS cuida da infraestrutura do Kubernetes.",avoid:"Nao use o EKS se voce nao precisa de Kubernetes especificamente — para containers mais simples, o ECS ou Fargate podem ser mais faceis de configurar. EKS adiciona complexidade que so vale a pena se voce ja usa Kubernetes."},en:{tech:"Amazon EKS (Elastic Kubernetes Service) is a managed service that runs the Kubernetes control plane in high availability, eliminating the need to install and operate your own Kubernetes infrastructure.",simple:"Amazon EKS is a managed service that runs Kubernetes clusters on AWS without you needing to install or maintain the Kubernetes control plane. You deploy your containers and EKS handles the Kubernetes infrastructure.",avoid:"Do not use EKS if you do not specifically need Kubernetes — for simpler container workloads, ECS or Fargate may be easier to set up. EKS adds complexity that is only worth it if you already use Kubernetes."}}},
{en:"Which service enables you to centrally manage patching, configuration, and run commands across a fleet of EC2 instances and on-premises servers?",pt:"Qual serviço permite gerenciar centralmente patches, configuração e executar comandos em uma frota de instâncias EC2 e servidores locais?",o:{en:["AWS Systems Manager","AWS Config","AWS CloudFormation","Amazon CloudWatch"],pt:["AWS Systems Manager","AWS Config","AWS CloudFormation","Amazon CloudWatch"]},a:[0],exp:{pt:{tech:"O AWS Systems Manager fornece uma interface unificada para gerenciar recursos AWS e on-premises, incluindo Patch Manager, Run Command, Parameter Store e Session Manager.",simple:"O AWS Systems Manager permite gerenciar servidores EC2 e on-premises de um unico lugar — aplicar patches, executar comandos remotos e configurar sistemas em larga escala. Tudo sem precisar de SSH direto nas maquinas.",avoid:"Nao confunda o Systems Manager com ferramentas de monitoramento como o CloudWatch. O Systems Manager executa acoes nos servidores (patching, comandos), enquanto o CloudWatch coleta metricas e gera alarmes."},en:{tech:"AWS Systems Manager provides a unified interface for managing AWS and on-premises resources, including Patch Manager, Run Command, Parameter Store, and Session Manager.",simple:"AWS Systems Manager lets you manage EC2 and on-premises servers from a single place — apply patches, run remote commands, and configure systems at scale. All without needing direct SSH into the machines.",avoid:"Do not confuse Systems Manager with monitoring tools like CloudWatch. Systems Manager executes actions on servers (patching, commands), while CloudWatch collects metrics and generates alarms."}}},
{en:"What is an AWS Local Zone designed to provide?",pt:"Para que uma AWS Local Zone foi projetada?",o:{en:["Ultra-low latency compute and storage closer to end users in specific metropolitan areas","A secondary backup region for disaster recovery","Additional Availability Zones within an existing Region","Edge caching for static content delivery"],pt:["Computação e armazenamento com latência ultrabaixa mais perto dos usuários finais em áreas metropolitanas específicas","Uma região secundária de backup para recuperação de desastres","Zonas de Disponibilidade adicionais dentro de uma Região existente","Cache de borda para entrega de conteúdo estático"]},a:[0],exp:{pt:{tech:"As AWS Local Zones colocam computação, armazenamento e serviços selecionados mais perto de grandes centros populacionais, permitindo latência de milissegundos de um dígito para aplicações sensíveis à latência.",simple:"Uma AWS Local Zone e uma extensao de uma regiao AWS posicionada perto de grandes centros urbanos, oferecendo computacao e armazenamento com latencia ultra-baixa para usuarios finais naquela area. Ela fica fisicamente mais perto dos usuarios do que a regiao principal.",avoid:"Nao use Local Zones para cargas de trabalho que nao exigem baixa latencia — os recursos em Local Zones podem ter custo maior e menos servicos disponiveis. Use regioes padrao quando a latencia nao e critica."},en:{tech:"AWS Local Zones place compute, storage, and select services closer to large population centers, enabling single-digit millisecond latency for latency-sensitive applications.",simple:"An AWS Local Zone is an extension of an AWS Region placed near large metropolitan areas, offering compute and storage with ultra-low latency for end users in that area. It is physically closer to users than the main Region.",avoid:"Do not use Local Zones for workloads that do not require low latency — resources in Local Zones may have higher costs and fewer available services. Use standard Regions when latency is not critical."}}},
{en:"Which Amazon Redshift feature makes it a suitable choice for running complex analytical queries across petabytes of structured data?",pt:"Qual característica do Amazon Redshift o torna uma escolha adequada para executar consultas analíticas complexas em petabytes de dados estruturados?",o:{en:["Columnar storage with massively parallel processing (MPP)","In-memory key-value caching","Graph-based relationship traversal","Document-based flexible schema"],pt:["Armazenamento colunar com processamento massivamente paralelo (MPP)","Cache de chave-valor em memória","Travessia de relacionamentos baseada em grafos","Esquema flexível baseado em documentos"]},a:[0],exp:{pt:{tech:"O Amazon Redshift utiliza armazenamento colunar e MPP para distribuir e paralelizar consultas em múltiplos nós, otimizando a performance de consultas analíticas complexas em grandes volumes de dados.",simple:"O Amazon Redshift usa armazenamento colunar, que organiza dados por coluna em vez de por linha, e processamento massivamente paralelo (MPP), que distribui consultas entre muitos nos ao mesmo tempo. Isso permite executar queries analiticas complexas em petabytes de dados de forma rapida.",avoid:"Nao use Redshift para cargas transacionais do dia a dia (OLTP) com muitas escritas pequenas — ele e otimizado para leitura analitica (OLAP). Para operacoes transacionais, use RDS ou DynamoDB."},en:{tech:"Amazon Redshift uses columnar storage and MPP to distribute and parallelize queries across multiple nodes, optimizing performance of complex analytical queries on large data volumes.",simple:"Amazon Redshift uses columnar storage, which organizes data by column instead of by row, and massively parallel processing (MPP), which distributes queries across many nodes simultaneously. This allows running complex analytical queries across petabytes of data quickly.",avoid:"Do not use Redshift for day-to-day transactional workloads (OLTP) with many small writes — it is optimized for analytical reads (OLAP). For transactional operations, use RDS or DynamoDB."}}},
{en:"Which service can extract text and data from scanned documents, forms, and tables using machine learning?",pt:"Qual serviço pode extrair texto e dados de documentos digitalizados, formulários e tabelas usando aprendizado de máquina?",o:{en:["Amazon Textract","Amazon Rekognition","Amazon Comprehend","Amazon Translate"],pt:["Amazon Textract","Amazon Rekognition","Amazon Comprehend","Amazon Translate"]},a:[0],exp:{pt:{tech:"O Amazon Textract usa ML para extrair automaticamente texto impresso, manuscrito e dados estruturados de documentos digitalizados, indo além do OCR simples ao entender a estrutura de formulários e tabelas.",simple:"O Amazon Textract usa machine learning para extrair texto, dados de formularios e tabelas de documentos escaneados ou imagens automaticamente. Ele identifica campos e valores sem precisar de configuracao manual de templates.",avoid:"Nao use Textract para analisar o significado do texto extraido — ele apenas extrai os dados. Para entender sentimento ou entidades no texto, use o Amazon Comprehend apos a extracao."},en:{tech:"Amazon Textract uses ML to automatically extract printed text, handwriting, and structured data from scanned documents, going beyond simple OCR by understanding form and table structure.",simple:"Amazon Textract uses machine learning to automatically extract text, form data, and tables from scanned documents or images. It identifies fields and values without needing manual template configuration.",avoid:"Do not use Textract to analyze the meaning of extracted text — it only extracts the data. To understand sentiment or entities in the text, use Amazon Comprehend after extraction."}}},
{en:"A company wants to protect their web application from common exploits like SQL injection and cross-site scripting. Which AWS service should they use?",pt:"Uma empresa deseja proteger sua aplicação web contra exploits comuns como injeção de SQL e cross-site scripting. Qual serviço da AWS deve ser utilizado?",o:{en:["AWS WAF","AWS Shield","Amazon GuardDuty","AWS Firewall Manager"],pt:["AWS WAF","AWS Shield","Amazon GuardDuty","AWS Firewall Manager"]},a:[0],exp:{pt:{tech:"O AWS WAF (Web Application Firewall) permite criar regras personalizadas para filtrar tráfego web malicioso, protegendo contra ataques comuns como SQL injection, XSS e outros exploits da camada de aplicação.",simple:"O AWS WAF e um firewall de aplicacao web que filtra requisicoes HTTP/HTTPS com base em regras que voce define, bloqueando ataques como SQL injection e cross-site scripting antes que cheguem a sua aplicacao. Voce pode criar regras personalizadas ou usar regras gerenciadas.",avoid:"Nao confunda o WAF com o Shield — o WAF inspeciona o conteudo das requisicoes, enquanto o Shield protege contra ataques DDoS volumetricos. Para protecao completa, use os dois juntos."},en:{tech:"AWS WAF (Web Application Firewall) lets you create custom rules to filter malicious web traffic, protecting against common attacks like SQL injection, XSS, and other application-layer exploits.",simple:"AWS WAF is a web application firewall that filters HTTP/HTTPS requests based on rules you define, blocking attacks like SQL injection and cross-site scripting before they reach your application. You can create custom rules or use managed rules.",avoid:"Do not confuse WAF with Shield — WAF inspects request content, while Shield protects against volumetric DDoS attacks. For complete protection, use both together."}}},
{en:"Which AWS service provides intelligent threat detection by continuously monitoring for malicious activity and unauthorized behavior across your AWS accounts?",pt:"Qual serviço da AWS fornece detecção inteligente de ameaças monitorando continuamente atividades maliciosas e comportamento não autorizado em suas contas AWS?",o:{en:["Amazon GuardDuty","AWS WAF","Amazon Inspector","AWS CloudTrail"],pt:["Amazon GuardDuty","AWS WAF","Amazon Inspector","AWS CloudTrail"]},a:[0],exp:{pt:{tech:"O Amazon GuardDuty é um serviço de detecção de ameaças que analisa continuamente dados de fontes como CloudTrail, VPC Flow Logs e DNS logs usando ML e inteligência de ameaças para identificar atividades suspeitas.",simple:"O Amazon GuardDuty analisa continuamente logs de AWS (CloudTrail, VPC Flow Logs, DNS) usando machine learning para detectar atividades maliciosas ou comportamentos nao autorizados nas suas contas. Ele gera alertas automaticamente quando encontra ameacas.",avoid:"Nao use GuardDuty para bloquear ameacas — ele apenas detecta e alerta. Para tomar acoes automaticas baseadas nos alertas, voce precisa integra-lo com outros servicos como Lambda ou Security Hub."},en:{tech:"Amazon GuardDuty is a threat detection service that continuously analyzes data from sources like CloudTrail, VPC Flow Logs, and DNS logs using ML and threat intelligence to identify suspicious activities.",simple:"Amazon GuardDuty continuously analyzes AWS logs (CloudTrail, VPC Flow Logs, DNS) using machine learning to detect malicious activity or unauthorized behavior in your accounts. It automatically generates alerts when threats are found.",avoid:"Do not use GuardDuty to block threats — it only detects and alerts. To take automatic actions based on alerts, you need to integrate it with other services like Lambda or Security Hub."}}},
{en:"Which TWO are benefits of using Amazon ElastiCache in front of a relational database? (Choose TWO)",pt:"Quais DOIS são benefícios de usar o Amazon ElastiCache na frente de um banco de dados relacional? (Escolha DUAS)",o:{en:["Reduced read latency for frequently accessed data","Decreased load on the primary database","Automatic schema migration of the underlying database","Built-in relational query optimization"],pt:["Latência de leitura reduzida para dados acessados frequentemente","Diminuição da carga no banco de dados primário","Migração automática de schema do banco de dados subjacente","Otimização de consultas relacionais integrada"]},a:[0,1],multi:true,exp:{pt:{tech:"O ElastiCache (Redis ou Memcached) armazena dados em memória, oferecendo tempos de resposta de microssegundos. Ao cachear consultas frequentes, reduz a latência de leitura e diminui significativamente a carga no banco de dados primário.",simple:"O Amazon ElastiCache armazena dados acessados com frequencia em memoria, permitindo que leituras repetidas sejam muito mais rapidas do que consultar o banco de dados. Isso reduz a carga no banco principal porque muitas requisicoes sao atendidas pelo cache sem precisar acessar o banco.",avoid:"Nao use ElastiCache para dados que mudam com muita frequencia e precisam estar sempre atualizados — o cache pode servir dados desatualizados. Tambem nao substitui o banco de dados, pois dados no cache sao temporarios."},en:{tech:"ElastiCache (Redis or Memcached) stores data in memory, delivering microsecond response times. By caching frequent queries, it reduces read latency and significantly decreases load on the primary database.",simple:"Amazon ElastiCache stores frequently accessed data in memory, making repeated reads much faster than querying the database. This reduces load on the primary database because many requests are served by the cache without needing to access the database.",avoid:"Do not use ElastiCache for data that changes very frequently and must always be up to date — the cache may serve stale data. It also does not replace the database, as cached data is temporary."}}},
{en:"Which pillar of the AWS Well-Architected Framework emphasizes protecting information, systems, and assets through risk assessments and mitigation strategies?",pt:"Qual pilar do AWS Well-Architected Framework enfatiza a proteção de informações, sistemas e ativos por meio de avaliações de risco e estratégias de mitigação?",o:{en:["Security","Reliability","Operational Excellence","Cost Optimization"],pt:["Segurança","Confiabilidade","Excelência Operacional","Otimização de Custos"]},a:[0],exp:{pt:{tech:"O pilar de Segurança foca em proteger dados, sistemas e ativos usando controles de identidade, detecção de eventos de segurança, proteção de infraestrutura e classificação de dados.",simple:"O pilar de Seguranca do Well-Architected Framework foca em proteger dados, sistemas e ativos atraves de controle de acesso, criptografia, deteccao de ameacas e resposta a incidentes. Ele orienta como implementar protecao em camadas nos seus recursos AWS.",avoid:"Nao confunda seguranca com conformidade (compliance) — seguranca e sobre proteger seus recursos, enquanto conformidade e sobre atender normas regulatorias. O pilar de Seguranca nao cobre otimizacao de custos ou performance."},en:{tech:"The Security pillar focuses on protecting data, systems, and assets using identity controls, security event detection, infrastructure protection, and data classification.",simple:"The Security pillar of the Well-Architected Framework focuses on protecting data, systems, and assets through access control, encryption, threat detection, and incident response. It guides how to implement layered protection on your AWS resources.",avoid:"Do not confuse security with compliance — security is about protecting your resources, while compliance is about meeting regulatory standards. The Security pillar does not cover cost optimization or performance."}}},
{en:"A company wants to use a managed service to build, train, and deploy machine learning models at scale. Which AWS service is designed for this purpose?",pt:"Uma empresa deseja usar um serviço gerenciado para construir, treinar e implantar modelos de aprendizado de máquina em escala. Qual serviço da AWS foi projetado para esse propósito?",o:{en:["Amazon SageMaker","Amazon Rekognition","Amazon Comprehend","AWS Lambda"],pt:["Amazon SageMaker","Amazon Rekognition","Amazon Comprehend","AWS Lambda"]},a:[0],exp:{pt:{tech:"O Amazon SageMaker é uma plataforma totalmente gerenciada que oferece ferramentas para cada etapa do fluxo de trabalho de ML: preparação de dados, construção, treinamento e implantação de modelos em ambiente de produção.",simple:"O Amazon SageMaker e uma plataforma completa para machine learning que permite preparar dados, treinar modelos, avaliar resultados e implantar modelos em producao, tudo em um unico servico gerenciado. Ele suporta frameworks populares como TensorFlow e PyTorch.",avoid:"Nao use SageMaker se voce precisa apenas de uma funcionalidade especifica de ML como reconhecimento de imagem ou traducao — servicos como Rekognition ou Translate sao mais simples para esses casos. SageMaker e para quem precisa construir modelos customizados."},en:{tech:"Amazon SageMaker is a fully managed platform that provides tools for every step of the ML workflow: data preparation, building, training, and deploying models to production.",simple:"Amazon SageMaker is a complete machine learning platform that lets you prepare data, train models, evaluate results, and deploy models to production, all in a single managed service. It supports popular frameworks like TensorFlow and PyTorch.",avoid:"Do not use SageMaker if you only need a specific ML capability like image recognition or translation — services like Rekognition or Translate are simpler for those cases. SageMaker is for those who need to build custom models."}}},
{en:"Which AWS service would be MOST appropriate for identifying objects, people, and scenes in images and videos?",pt:"Qual serviço da AWS seria MAIS apropriado para identificar objetos, pessoas e cenas em imagens e vídeos?",o:{en:["Amazon Rekognition","Amazon Textract","Amazon Polly","Amazon Translate"],pt:["Amazon Rekognition","Amazon Textract","Amazon Polly","Amazon Translate"]},a:[0],exp:{pt:{tech:"O Amazon Rekognition usa deep learning para análise de imagem e vídeo, oferecendo detecção de objetos, reconhecimento facial, análise de sentimentos faciais, detecção de texto em imagens e moderação de conteúdo.",simple:"O Amazon Rekognition usa machine learning para identificar objetos, pessoas, cenas, texto e atividades em imagens e videos automaticamente. Voce envia a imagem ou video e recebe os resultados da analise sem precisar treinar modelos.",avoid:"Nao use Rekognition para extrair texto de documentos estruturados como formularios — para isso use Textract. Rekognition e otimizado para analise visual, nao para extracao de dados de documentos."},en:{tech:"Amazon Rekognition uses deep learning for image and video analysis, offering object detection, facial recognition, facial sentiment analysis, text detection in images, and content moderation.",simple:"Amazon Rekognition uses machine learning to automatically identify objects, people, scenes, text, and activities in images and videos. You send the image or video and receive analysis results without needing to train models.",avoid:"Do not use Rekognition to extract text from structured documents like forms — for that use Textract. Rekognition is optimized for visual analysis, not for document data extraction."}}},
{en:"Which AWS Support plan provides access to a Technical Account Manager (TAM)?",pt:"Qual plano de suporte da AWS fornece acesso a um Technical Account Manager (TAM)?",o:{en:["Enterprise","Business","Developer","Basic"],pt:["Enterprise","Business","Developer","Basic"]},a:[0],exp:{pt:{tech:"O plano Enterprise Support inclui um TAM designado que serve como ponto de contato principal, fornecendo orientação proativa, revisões de arquitetura e assistência na otimização do ambiente AWS.",simple:"O plano Enterprise e o unico plano de suporte AWS que inclui um Technical Account Manager (TAM), uma pessoa dedicada que conhece sua conta e ajuda a otimizar o uso da AWS. Nenhum dos outros planos (Basic, Developer, Business) oferece TAM.",avoid:"Nao escolha Enterprise so por causa do TAM se sua empresa e pequena — o plano custa no minimo 15 mil dolares por mes. Avalie se o plano Business atende suas necessidades antes de investir no Enterprise."},en:{tech:"The Enterprise Support plan includes a designated TAM who serves as the primary point of contact, providing proactive guidance, architecture reviews, and assistance in optimizing the AWS environment.",simple:"The Enterprise plan is the only AWS support plan that includes a Technical Account Manager (TAM), a dedicated person who knows your account and helps optimize your AWS usage. None of the other plans (Basic, Developer, Business) offer a TAM.",avoid:"Do not choose Enterprise just for the TAM if your company is small — the plan costs at least 15 thousand dollars per month. Evaluate if the Business plan meets your needs before investing in Enterprise."}}},
{en:"Which AWS service enables you to compile and test source code, produce deployment-ready software packages, and does NOT manage the overall pipeline orchestration?",pt:"Qual serviço da AWS permite compilar e testar código-fonte, produzir pacotes de software prontos para implantação, e NÃO gerencia a orquestração geral do pipeline?",o:{en:["AWS CodeBuild","AWS CodePipeline","AWS CodeDeploy","AWS CodeCommit"],pt:["AWS CodeBuild","AWS CodePipeline","AWS CodeDeploy","AWS CodeCommit"]},a:[0],exp:{pt:{tech:"O AWS CodeBuild é um serviço de integração contínua totalmente gerenciado que compila código-fonte, executa testes e produz pacotes de software. Ele é apenas uma etapa dentro de um pipeline, não o orquestrador.",simple:"O AWS CodeBuild e um servico que compila codigo-fonte, executa testes e gera pacotes prontos para deploy, tudo de forma gerenciada sem voce precisar manter servidores de build. Ele executa tarefas de build, mas nao orquestra o pipeline completo de CI/CD.",avoid:"Nao use CodeBuild para orquestrar o pipeline inteiro de deploy — ele so faz build e teste. Para orquestracao, use o CodePipeline, que coordena CodeBuild, CodeDeploy e outros passos em sequencia."},en:{tech:"AWS CodeBuild is a fully managed continuous integration service that compiles source code, runs tests, and produces software packages. It is just one stage within a pipeline, not the orchestrator.",simple:"AWS CodeBuild is a service that compiles source code, runs tests, and produces deployment-ready packages, all managed without you needing to maintain build servers. It executes build tasks but does not orchestrate the full CI/CD pipeline.",avoid:"Do not use CodeBuild to orchestrate the entire deployment pipeline — it only handles build and test. For orchestration, use CodePipeline, which coordinates CodeBuild, CodeDeploy, and other steps in sequence."}}},
{en:"A company has unpredictable database traffic that varies significantly throughout the day, sometimes dropping to zero. Which Aurora feature would automatically scale capacity up and down based on demand?",pt:"Uma empresa tem tráfego de banco de dados imprevisível que varia significativamente ao longo do dia, às vezes caindo a zero. Qual recurso do Aurora escalaria automaticamente a capacidade para cima e para baixo com base na demanda?",o:{en:["Aurora Serverless","Aurora Replicas","Aurora Global Database","Aurora Multi-Master"],pt:["Aurora Serverless","Réplicas Aurora","Aurora Global Database","Aurora Multi-Master"]},a:[0],exp:{pt:{tech:"O Aurora Serverless ajusta automaticamente a capacidade computacional com base na carga da aplicação, podendo escalar até zero quando não há tráfego, cobrando apenas pela capacidade consumida por segundo.",simple:"O Aurora Serverless ajusta automaticamente a capacidade do banco de dados conforme a demanda, escalando para mais quando o trafego aumenta e reduzindo ate zero quando nao ha atividade. Voce paga apenas pela capacidade consumida, sem precisar provisionar instancias.",avoid:"Nao use Aurora Serverless para cargas de trabalho com trafego constante e previsivel — nesse caso, instancias provisionadas do Aurora sao mais economicas. O Serverless e ideal para trafego irregular ou imprevisivel."},en:{tech:"Aurora Serverless automatically adjusts compute capacity based on application load, and can scale down to zero when there is no traffic, charging only for capacity consumed per second.",simple:"Aurora Serverless automatically adjusts database capacity based on demand, scaling up when traffic increases and scaling down to zero when there is no activity. You pay only for the capacity consumed, without needing to provision instances.",avoid:"Do not use Aurora Serverless for workloads with constant and predictable traffic — in that case, provisioned Aurora instances are more cost-effective. Serverless is ideal for irregular or unpredictable traffic."}}},
{en:"Which pillar of the AWS Well-Architected Framework focuses on selecting the right resource types and sizes based on workload requirements to achieve optimal performance?",pt:"Qual pilar do AWS Well-Architected Framework foca em selecionar os tipos e tamanhos corretos de recursos com base nos requisitos da carga de trabalho para alcançar performance ideal?",o:{en:["Performance Efficiency","Cost Optimization","Reliability","Operational Excellence"],pt:["Eficiência de Performance","Otimização de Custos","Confiabilidade","Excelência Operacional"]},a:[0],exp:{pt:{tech:"O pilar de Eficiência de Performance abrange a seleção adequada de tipos e tamanhos de recursos, monitoramento de performance e tomada de decisões informadas para manter a eficiência conforme as demandas evoluem.",simple:"O pilar de Eficiencia de Performance do Well-Architected Framework foca em usar os tipos e tamanhos corretos de recursos para cada carga de trabalho, garantindo o melhor desempenho possivel. Ele orienta sobre como selecionar, monitorar e ajustar recursos conforme a demanda muda.",avoid:"Nao confunda eficiencia de performance com otimizacao de custos — performance foca em usar o recurso certo para a tarefa, enquanto custos foca em gastar menos. Escolher o recurso mais barato nem sempre da a melhor performance."},en:{tech:"The Performance Efficiency pillar covers the proper selection of resource types and sizes, performance monitoring, and making informed decisions to maintain efficiency as demands evolve.",simple:"The Performance Efficiency pillar of the Well-Architected Framework focuses on using the right resource types and sizes for each workload, ensuring the best possible performance. It guides how to select, monitor, and adjust resources as demand changes.",avoid:"Do not confuse performance efficiency with cost optimization — performance focuses on using the right resource for the task, while cost focuses on spending less. Choosing the cheapest resource does not always give the best performance."}}},
{en:"Which AWS service provides a centralized dashboard to track the progress of application migrations from on-premises to AWS?",pt:"Qual serviço da AWS fornece um painel centralizado para acompanhar o progresso das migrações de aplicações do local para a AWS?",o:{en:["AWS Migration Hub","AWS Application Discovery Service","AWS DMS","AWS Snow Family"],pt:["AWS Migration Hub","AWS Application Discovery Service","AWS DMS","AWS Snow Family"]},a:[0],exp:{pt:{tech:"O AWS Migration Hub fornece um local único para rastrear o progresso de migrações de aplicações em várias soluções de migração AWS e de parceiros.",simple:"O AWS Migration Hub oferece um painel centralizado onde voce acompanha o progresso de todas as migracoes de aplicacoes para a AWS. Ele integra informacoes de varias ferramentas de migracao em um unico lugar.",avoid:"Nao use Migration Hub para executar a migracao em si — ele apenas rastreia o progresso. As migracoes sao executadas por ferramentas como o Application Migration Service ou o Database Migration Service."},en:{tech:"AWS Migration Hub provides a single place to track the progress of application migrations across multiple AWS and partner migration solutions.",simple:"AWS Migration Hub provides a centralized dashboard where you track the progress of all application migrations to AWS. It integrates information from multiple migration tools into a single place.",avoid:"Do not use Migration Hub to execute the migration itself — it only tracks progress. Migrations are executed by tools like Application Migration Service or Database Migration Service."}}},
{en:"Which TWO statements accurately describe Amazon S3? (Choose TWO)",pt:"Quais DUAS afirmações descrevem corretamente o Amazon S3? (Escolha DUAS)",o:{en:["It provides 99.999999999% (11 nines) durability for objects","It stores data as objects in buckets","It is a block storage service attached to EC2 instances","It requires you to specify a fixed storage size at creation"],pt:["Fornece 99,999999999% (11 noves) de durabilidade para objetos","Armazena dados como objetos em buckets","É um serviço de armazenamento de bloco anexado a instâncias EC2","Exige que você especifique um tamanho fixo de armazenamento na criação"]},a:[0,1],multi:true,exp:{pt:{tech:"O Amazon S3 é um serviço de armazenamento de objetos que oferece 11 noves de durabilidade, escalabilidade virtualmente ilimitada, e organiza dados em buckets sem necessidade de definir capacidade fixa.",simple:"O Amazon S3 armazena dados como objetos dentro de buckets, sem limite de quantidade ou tamanho total. Ele oferece 99.999999999% (11 noves) de durabilidade, o que significa que a chance de perder um arquivo e praticamente zero.",avoid:"Nao use S3 como sistema de arquivos para um sistema operacional — ele e armazenamento de objetos, nao armazenamento em bloco. Para montar um volume em uma instancia EC2, use EBS ou EFS."},en:{tech:"Amazon S3 is an object storage service that offers 11 nines of durability, virtually unlimited scalability, and organizes data in buckets without needing to define fixed capacity.",simple:"Amazon S3 stores data as objects inside buckets, with no limit on quantity or total size. It offers 99.999999999% (11 nines) durability, meaning the chance of losing a file is practically zero.",avoid:"Do not use S3 as a file system for an operating system — it is object storage, not block storage. To mount a volume on an EC2 instance, use EBS or EFS."}}},
{en:"Which AWS service automates code deployments to Amazon EC2 instances, on-premises servers, Lambda functions, or Amazon ECS services?",pt:"Qual serviço da AWS automatiza implantações de código em instâncias Amazon EC2, servidores locais, funções Lambda ou serviços Amazon ECS?",o:{en:["AWS CodeDeploy","AWS CodeBuild","AWS CodePipeline","AWS CloudFormation"],pt:["AWS CodeDeploy","AWS CodeBuild","AWS CodePipeline","AWS CloudFormation"]},a:[0],exp:{pt:{tech:"O AWS CodeDeploy é um serviço de implantação totalmente gerenciado que automatiza deploys de software para diversos destinos, com suporte a estratégias como rolling updates, blue/green e canary.",simple:"O AWS CodeDeploy automatiza a implantacao de codigo em instancias EC2, servidores on-premises, funcoes Lambda e servicos ECS. Ele gerencia o processo de deploy com estrategias como rolling, blue/green ou all-at-once.",avoid:"Nao confunda CodeDeploy com CodeBuild — o CodeBuild compila e testa o codigo, enquanto o CodeDeploy distribui o pacote ja pronto nos servidores. Eles fazem partes diferentes do pipeline."},en:{tech:"AWS CodeDeploy is a fully managed deployment service that automates software deployments to various targets, supporting strategies like rolling updates, blue/green, and canary.",simple:"AWS CodeDeploy automates code deployment to EC2 instances, on-premises servers, Lambda functions, and ECS services. It manages the deployment process with strategies like rolling, blue/green, or all-at-once.",avoid:"Do not confuse CodeDeploy with CodeBuild — CodeBuild compiles and tests the code, while CodeDeploy distributes the ready package to servers. They handle different parts of the pipeline."}}},
{en:"A company wants to run Amazon RDS in a configuration that provides automatic failover to a standby instance in a different Availability Zone. What should they enable?",pt:"Uma empresa deseja executar o Amazon RDS em uma configuração que forneça failover automático para uma instância em espera em uma Zona de Disponibilidade diferente. O que deve ser habilitado?",o:{en:["Multi-AZ deployment","Read Replicas","Reserved Instances","Provisioned IOPS"],pt:["Implantação Multi-AZ","Réplicas de Leitura","Instâncias Reservadas","IOPS Provisionado"]},a:[0],exp:{pt:{tech:"A implantação Multi-AZ do RDS mantém uma réplica síncrona em standby em outra AZ. Em caso de falha, o RDS executa failover automático para a instância standby em 60-120 segundos.",simple:"O Multi-AZ deployment do RDS cria uma copia do banco de dados em outra Availability Zone que se mantem sincronizada automaticamente. Se o banco principal falhar, o RDS faz failover automatico para a copia sem intervencao manual.",avoid:"Nao confunda Multi-AZ com Read Replicas — Multi-AZ e para alta disponibilidade e failover automatico, nao para distribuir leituras. Se voce quer melhorar performance de leitura, use Read Replicas."},en:{tech:"RDS Multi-AZ deployment maintains a synchronous standby replica in another AZ. In case of failure, RDS performs automatic failover to the standby instance within 60-120 seconds.",simple:"RDS Multi-AZ deployment creates a copy of the database in another Availability Zone that stays automatically synchronized. If the primary database fails, RDS performs automatic failover to the copy without manual intervention.",avoid:"Do not confuse Multi-AZ with Read Replicas — Multi-AZ is for high availability and automatic failover, not for distributing reads. If you want to improve read performance, use Read Replicas."}}},
{en:"Which AWS cost management tool sends alerts when your actual or forecasted costs exceed a defined threshold?",pt:"Qual ferramenta de gerenciamento de custos da AWS envia alertas quando seus custos reais ou previstos excedem um limite definido?",o:{en:["AWS Budgets","AWS Cost Explorer","AWS Pricing Calculator","AWS Cost and Usage Report"],pt:["AWS Budgets","AWS Cost Explorer","AWS Calculadora de Preços","AWS Relatório de Custo e Uso"]},a:[0],exp:{pt:{tech:"O AWS Budgets permite definir orçamentos personalizados para custos, uso e reservas, com alertas configuráveis por e-mail ou SNS quando os limites são atingidos ou previstos para serem ultrapassados.",simple:"O AWS Budgets permite definir limites de gastos e envia alertas por email ou SNS quando seus custos reais ou previstos ultrapassam o valor definido. Voce pode criar orcamentos por servico, conta ou tags.",avoid:"Nao confunda Budgets com Cost Explorer — Budgets envia alertas sobre limites, enquanto Cost Explorer analisa e visualiza gastos historicos. Budgets tambem nao bloqueia gastos automaticamente, apenas avisa."},en:{tech:"AWS Budgets lets you set custom budgets for costs, usage, and reservations, with configurable alerts via email or SNS when thresholds are reached or forecasted to be exceeded.",simple:"AWS Budgets lets you set spending limits and sends alerts via email or SNS when your actual or forecasted costs exceed the defined threshold. You can create budgets by service, account, or tags.",avoid:"Do not confuse Budgets with Cost Explorer — Budgets sends alerts about thresholds, while Cost Explorer analyzes and visualizes historical spending. Budgets also does not automatically block spending, it only notifies."}}},
{en:"Which AWS service uses natural language processing to extract insights and relationships from unstructured text, such as sentiment analysis and entity recognition?",pt:"Qual serviço da AWS usa processamento de linguagem natural para extrair insights e relacionamentos de texto não estruturado, como análise de sentimento e reconhecimento de entidades?",o:{en:["Amazon Comprehend","Amazon Lex","Amazon Translate","Amazon Textract"],pt:["Amazon Comprehend","Amazon Lex","Amazon Translate","Amazon Textract"]},a:[0],exp:{pt:{tech:"O Amazon Comprehend utiliza NLP e ML para descobrir insights em texto, incluindo detecção de idioma, extração de entidades, análise de sentimentos, modelagem de tópicos e classificação personalizada de documentos.",simple:"O Amazon Comprehend usa processamento de linguagem natural para analisar textos e extrair informacoes como sentimento (positivo, negativo, neutro), entidades (nomes, lugares, datas) e topicos principais. Tudo automaticamente, sem precisar treinar modelos.",avoid:"Nao use Comprehend para traduzir textos — ele analisa o conteudo, mas nao traduz. Para traducao, use o Amazon Translate. Tambem nao use para extrair texto de imagens, que e tarefa do Textract."},en:{tech:"Amazon Comprehend uses NLP and ML to uncover insights from text, including language detection, entity extraction, sentiment analysis, topic modeling, and custom document classification.",simple:"Amazon Comprehend uses natural language processing to analyze text and extract information like sentiment (positive, negative, neutral), entities (names, places, dates), and key topics. All automatically, without needing to train models.",avoid:"Do not use Comprehend to translate text — it analyzes content but does not translate. For translation, use Amazon Translate. Also do not use it to extract text from images, which is a task for Textract."}}},
{en:"Which pillar of the AWS Well-Architected Framework focuses on avoiding unnecessary costs and understanding where money is being spent?",pt:"Qual pilar do AWS Well-Architected Framework foca em evitar custos desnecessários e entender onde o dinheiro está sendo gasto?",o:{en:["Cost Optimization","Performance Efficiency","Operational Excellence","Sustainability"],pt:["Otimização de Custos","Eficiência de Performance","Excelência Operacional","Sustentabilidade"]},a:[0],exp:{pt:{tech:"O pilar de Otimização de Custos inclui compreensão dos gastos, seleção dos recursos mais econômicos, análise ao longo do tempo, escalabilidade para atender demanda sem gastar excessivamente e uso de modelos de preço adequados.",simple:"O pilar de Otimizacao de Custos do Well-Architected Framework foca em evitar gastos desnecessarios e entender onde o dinheiro esta sendo gasto. Ele orienta praticas como escolher o modelo de precos certo, eliminar recursos ociosos e dimensionar corretamente.",avoid:"Nao confunda otimizacao de custos com cortar custos a qualquer preco — o objetivo e gastar de forma eficiente, nao necessariamente gastar menos. Reduzir custos prejudicando performance ou confiabilidade nao e otimizacao."},en:{tech:"The Cost Optimization pillar includes understanding spending, selecting the most cost-effective resources, analyzing over time, scaling to meet demand without overspending, and using appropriate pricing models.",simple:"The Cost Optimization pillar of the Well-Architected Framework focuses on avoiding unnecessary spending and understanding where money is being spent. It guides practices like choosing the right pricing model, eliminating idle resources, and right-sizing.",avoid:"Do not confuse cost optimization with cutting costs at any price — the goal is to spend efficiently, not necessarily to spend less. Reducing costs while hurting performance or reliability is not optimization."}}},
{en:"Which AWS service provides a private, hosted Git repository that can be used to store and manage source code?",pt:"Qual serviço da AWS fornece um repositório Git privado e hospedado que pode ser usado para armazenar e gerenciar código-fonte?",o:{en:["AWS CodeCommit","AWS CodeBuild","AWS CodePipeline","AWS Cloud9"],pt:["AWS CodeCommit","AWS CodeBuild","AWS CodePipeline","AWS Cloud9"]},a:[0],exp:{pt:{tech:"O AWS CodeCommit é um serviço de controle de código-fonte totalmente gerenciado e seguro que hospeda repositórios Git privados, sem necessidade de gerenciar seu próprio sistema de controle de versão.",simple:"O AWS CodeCommit e um repositorio Git privado e gerenciado pela AWS onde voce armazena codigo-fonte com controle de versao. Ele funciona como qualquer repositorio Git, com suporte a branches, pull requests e historico de alteracoes.",avoid:"Nao use CodeCommit se sua equipe ja usa GitHub ou GitLab e esta satisfeita — migrar sem necessidade so adiciona complexidade. O CodeCommit tem menos recursos de colaboracao comparado ao GitHub."},en:{tech:"AWS CodeCommit is a fully managed, secure source control service that hosts private Git repositories, without the need to manage your own version control system.",simple:"AWS CodeCommit is a private, managed Git repository from AWS where you store source code with version control. It works like any Git repository, with support for branches, pull requests, and change history.",avoid:"Do not use CodeCommit if your team already uses GitHub or GitLab and is satisfied — migrating without necessity only adds complexity. CodeCommit has fewer collaboration features compared to GitHub."}}},
{en:"Which TWO services help protect against Distributed Denial of Service (DDoS) attacks on AWS? (Choose TWO)",pt:"Quais DOIS serviços ajudam a proteger contra ataques de Negação de Serviço Distribuída (DDoS) na AWS? (Escolha DOIS)",o:{en:["AWS Shield","AWS WAF","Amazon Macie","AWS Config"],pt:["AWS Shield","AWS WAF","Amazon Macie","AWS Config"]},a:[0,1],multi:true,exp:{pt:{tech:"O AWS Shield fornece proteção contra DDoS (Standard incluso automaticamente, Advanced com mitigação avançada). O AWS WAF complementa filtrando tráfego malicioso na camada de aplicação, bloqueando padrões de ataque.",simple:"O AWS Shield protege contra ataques DDoS volumetricos absorvendo trafego malicioso em larga escala, enquanto o AWS WAF inspeciona requisicoes individuais e bloqueia padroes maliciosos como SQL injection. Juntos, eles oferecem protecao em camadas contra diferentes tipos de ataque.",avoid:"Nao ache que o Shield Standard (gratuito) cobre tudo — ele protege apenas contra ataques DDoS comuns nas camadas 3 e 4. Para protecao avancada com suporte 24/7 e mitigacao na camada 7, voce precisa do Shield Advanced (pago)."},en:{tech:"AWS Shield provides DDoS protection (Standard is included automatically, Advanced offers advanced mitigation). AWS WAF complements it by filtering malicious traffic at the application layer, blocking attack patterns.",simple:"AWS Shield protects against volumetric DDoS attacks by absorbing large-scale malicious traffic, while AWS WAF inspects individual requests and blocks malicious patterns like SQL injection. Together, they provide layered protection against different types of attacks.",avoid:"Do not assume Shield Standard (free) covers everything — it only protects against common DDoS attacks at layers 3 and 4. For advanced protection with 24/7 support and layer 7 mitigation, you need Shield Advanced (paid)."}}},
{en:"A company needs to deliver a static website with very low latency to users worldwide. Which combination of AWS services is MOST appropriate?",pt:"Uma empresa precisa entregar um site estático com latência muito baixa para usuários no mundo todo. Qual combinação de serviços da AWS é MAIS apropriada?",o:{en:["Amazon S3 + Amazon CloudFront","Amazon EC2 + Elastic Load Balancing","AWS Lambda + API Gateway","Amazon RDS + ElastiCache"],pt:["Amazon S3 + Amazon CloudFront","Amazon EC2 + Elastic Load Balancing","AWS Lambda + API Gateway","Amazon RDS + ElastiCache"]},a:[0],exp:{pt:{tech:"O S3 hospeda o conteúdo estático com alta durabilidade e o CloudFront distribui esse conteúdo por edge locations globais, reduzindo latência ao servir do ponto mais próximo do usuário.",simple:"O Amazon S3 armazena os arquivos do site estatico e o Amazon CloudFront distribui esses arquivos por servidores em todo o mundo, entregando o conteudo a partir do local mais proximo do usuario. Essa combinacao garante baixa latencia global sem precisar de servidores web.",avoid:"Nao use essa combinacao para sites dinamicos que processam dados no servidor — S3 serve apenas arquivos estaticos. Para aplicacoes dinamicas, voce precisa de EC2, Lambda ou containers alem do CloudFront."},en:{tech:"S3 hosts the static content with high durability and CloudFront distributes that content through global edge locations, reducing latency by serving from the point closest to the user.",simple:"Amazon S3 stores the static website files and Amazon CloudFront distributes those files across servers worldwide, delivering content from the location closest to the user. This combination ensures low global latency without needing web servers.",avoid:"Do not use this combination for dynamic sites that process data on the server — S3 serves only static files. For dynamic applications, you need EC2, Lambda, or containers in addition to CloudFront."}}},
{en:"What is the response time for a production system down case under the AWS Enterprise Support plan?",pt:"Qual é o tempo de resposta para um caso de sistema de produção indisponível no plano AWS Enterprise Support?",o:{en:["Less than 15 minutes","Less than 1 hour","Less than 4 hours","Less than 24 hours"],pt:["Menos de 15 minutos","Menos de 1 hora","Menos de 4 horas","Menos de 24 horas"]},a:[0],exp:{pt:{tech:"O plano Enterprise Support oferece tempo de resposta inferior a 15 minutos para casos críticos de negócio (sistema de produção indisponível), com acesso a Senior Cloud Support Engineers 24/7.",simple:"No plano Enterprise, quando um sistema em producao fica fora do ar, a AWS responde em menos de 15 minutos. Esse e o tempo de resposta mais rapido disponivel entre todos os planos de suporte.",avoid:"Nao confunda tempo de resposta com tempo de resolucao — a AWS responde em 15 minutos, mas resolver o problema pode levar mais tempo. Tambem nao confunda com o plano Business, que tem tempo de resposta de 1 hora para casos criticos."},en:{tech:"The Enterprise Support plan offers less than 15 minutes response time for business-critical cases (production system down), with access to Senior Cloud Support Engineers 24/7.",simple:"Under the Enterprise plan, when a production system goes down, AWS responds in less than 15 minutes. This is the fastest response time available across all support plans.",avoid:"Do not confuse response time with resolution time — AWS responds in 15 minutes, but resolving the issue may take longer. Also do not confuse it with the Business plan, which has a 1-hour response time for critical cases."}}},
{en:"Which Amazon EFS feature makes it different from Amazon EBS in terms of access?",pt:"Qual recurso do Amazon EFS o diferencia do Amazon EBS em termos de acesso?",o:{en:["EFS can be mounted by multiple EC2 instances simultaneously across Availability Zones","EFS provides block-level storage optimized for single instance attachment","EFS stores objects with metadata and unique identifiers","EFS is available only within a single Availability Zone"],pt:["O EFS pode ser montado por várias instâncias EC2 simultaneamente em diferentes Zonas de Disponibilidade","O EFS fornece armazenamento em nível de bloco otimizado para anexo a uma única instância","O EFS armazena objetos com metadados e identificadores únicos","O EFS está disponível apenas em uma única Zona de Disponibilidade"]},a:[0],exp:{pt:{tech:"O Amazon EFS é um sistema de arquivos NFS elástico totalmente gerenciado que pode ser montado simultaneamente por milhares de instâncias EC2 em múltiplas AZs, diferente do EBS que é vinculado a uma única instância/AZ.",simple:"O Amazon EFS pode ser montado por varias instancias EC2 ao mesmo tempo, inclusive em diferentes Availability Zones, permitindo compartilhamento de arquivos entre servidores. O EBS, por outro lado, so pode ser conectado a uma instancia por vez.",avoid:"Nao use EFS quando voce precisa de armazenamento de alta performance para um unico servidor — EBS geralmente e mais rapido e mais barato para esse caso. EFS e ideal quando multiplos servidores precisam acessar os mesmos arquivos."},en:{tech:"Amazon EFS is a fully managed elastic NFS file system that can be simultaneously mounted by thousands of EC2 instances across multiple AZs, unlike EBS which is tied to a single instance/AZ.",simple:"Amazon EFS can be mounted by multiple EC2 instances simultaneously, even across different Availability Zones, allowing file sharing between servers. EBS, on the other hand, can only be attached to one instance at a time.",avoid:"Do not use EFS when you need high-performance storage for a single server — EBS is generally faster and cheaper for that case. EFS is ideal when multiple servers need to access the same files."}}},
{en:"Which AWS service translates text between languages in real time and can be integrated into applications for multilingual support?",pt:"Qual serviço da AWS traduz texto entre idiomas em tempo real e pode ser integrado a aplicações para suporte multilíngue?",o:{en:["Amazon Translate","Amazon Comprehend","Amazon Polly","Amazon Transcribe"],pt:["Amazon Translate","Amazon Comprehend","Amazon Polly","Amazon Transcribe"]},a:[0],exp:{pt:{tech:"O Amazon Translate é um serviço de tradução automática neural que oferece tradução de texto rápida e de alta qualidade entre idiomas suportados, com integração via API.",simple:"O Amazon Translate converte texto de um idioma para outro em tempo real usando machine learning. Voce pode integra-lo em aplicacoes para oferecer suporte multilingue automaticamente.",avoid:"Nao use Translate para traducoes que exigem precisao juridica ou medica perfeita sem revisao humana — traducao automatica pode cometer erros em contextos especializados. Tambem nao confunda com Transcribe, que converte fala em texto."},en:{tech:"Amazon Translate is a neural machine translation service that provides fast, high-quality text translation between supported languages, with API integration.",simple:"Amazon Translate converts text from one language to another in real time using machine learning. You can integrate it into applications to provide multilingual support automatically.",avoid:"Do not use Translate for translations requiring perfect legal or medical accuracy without human review — automatic translation can make errors in specialized contexts. Also do not confuse it with Transcribe, which converts speech to text."}}},
{en:"Which AWS service improves the performance and availability of applications by routing user traffic through the AWS global network to the optimal endpoint based on health, geography, and routing policies?",pt:"Qual serviço da AWS melhora a performance e disponibilidade de aplicações roteando o tráfego dos usuários pela rede global da AWS para o endpoint ideal com base em saúde, geografia e políticas de roteamento?",o:{en:["AWS Global Accelerator","Amazon CloudFront","Amazon Route 53","Elastic Load Balancing"],pt:["AWS Global Accelerator","Amazon CloudFront","Amazon Route 53","Elastic Load Balancing"]},a:[0],exp:{pt:{tech:"O AWS Global Accelerator usa a rede global da AWS para direcionar o tráfego ao endpoint mais saudável e próximo, fornecendo endereços IP anycast estáticos e failover automático entre Regiões.",simple:"O AWS Global Accelerator direciona o trafego dos usuarios para a rede global da AWS o mais rapido possivel, encontrando o caminho mais eficiente ate o endpoint da sua aplicacao. Ele melhora a disponibilidade e performance roteando trafego com base em saude, geografia e politicas.",avoid:"Nao confunda Global Accelerator com CloudFront — CloudFront faz cache de conteudo em edge locations, enquanto Global Accelerator roteia trafego pela rede AWS sem fazer cache. Use CloudFront para conteudo estatico e Global Accelerator para aplicacoes TCP/UDP dinamicas."},en:{tech:"AWS Global Accelerator uses the AWS global network to direct traffic to the healthiest and closest endpoint, providing static anycast IP addresses and automatic failover between Regions.",simple:"AWS Global Accelerator directs user traffic onto the AWS global network as quickly as possible, finding the most efficient path to your application endpoint. It improves availability and performance by routing traffic based on health, geography, and policies.",avoid:"Do not confuse Global Accelerator with CloudFront — CloudFront caches content at edge locations, while Global Accelerator routes traffic through the AWS network without caching. Use CloudFront for static content and Global Accelerator for dynamic TCP/UDP applications."}}},
{en:"Which TWO actions are responsibilities of AWS under the Shared Responsibility Model? (Choose TWO)",pt:"Quais DUAS ações são responsabilidades da AWS no Modelo de Responsabilidade Compartilhada? (Escolha DUAS)",o:{en:["Managing the physical security of data centers","Maintaining the hardware infrastructure that runs AWS services","Configuring security groups and NACLs for customer VPCs","Encrypting customer data at rest"],pt:["Gerenciar a segurança física dos data centers","Manter a infraestrutura de hardware que executa os serviços AWS","Configurar security groups e NACLs para VPCs dos clientes","Criptografar dados dos clientes em repouso"]},a:[0,1],multi:true,exp:{pt:{tech:"No Modelo de Responsabilidade Compartilhada, a AWS é responsável pela segurança DA nuvem (infraestrutura física, hardware, rede, virtualização), enquanto o cliente é responsável pela segurança NA nuvem (dados, configurações, identidade).",simple:"A AWS e responsavel pela seguranca fisica dos data centers (controle de acesso, vigilancia, protecao ambiental) e pela manutencao de todo o hardware que roda os servicos AWS. O cliente nao precisa se preocupar com servidores fisicos, rede ou refrigeracao.",avoid:"Nao confunda responsabilidades da AWS com as do cliente — a AWS cuida da infraestrutura fisica, mas voce e responsavel por configurar seguranca dos seus dados, como permissoes IAM e criptografia. Seguranca fisica e da AWS, seguranca logica e sua."},en:{tech:"In the Shared Responsibility Model, AWS is responsible for security OF the cloud (physical infrastructure, hardware, networking, virtualization), while the customer is responsible for security IN the cloud (data, configurations, identity).",simple:"AWS is responsible for the physical security of data centers (access control, surveillance, environmental protection) and for maintaining all hardware that runs AWS services. The customer does not need to worry about physical servers, networking, or cooling.",avoid:"Do not confuse AWS responsibilities with customer responsibilities — AWS handles physical infrastructure, but you are responsible for configuring security of your data, like IAM permissions and encryption. Physical security is on AWS, logical security is on you."}}},
{en:"A data analytics team needs a data warehouse that can handle complex queries across structured data from multiple sources. Which AWS service is purpose-built for this?",pt:"Uma equipe de análise de dados precisa de um data warehouse que possa lidar com consultas complexas em dados estruturados de várias fontes. Qual serviço da AWS é projetado especificamente para isso?",o:{en:["Amazon Redshift","Amazon RDS","Amazon DynamoDB","Amazon ElastiCache"],pt:["Amazon Redshift","Amazon RDS","Amazon DynamoDB","Amazon ElastiCache"]},a:[0],exp:{pt:{tech:"O Amazon Redshift é um data warehouse totalmente gerenciado em escala de petabytes que usa armazenamento colunar e processamento massivamente paralelo para consultas analíticas complexas com alta performance.",simple:"O Amazon Redshift e um data warehouse otimizado para consultas analiticas complexas em grandes volumes de dados estruturados vindos de multiplas fontes. Ele processa petabytes de dados usando armazenamento colunar e processamento paralelo.",avoid:"Nao use Redshift para armazenar dados nao estruturados ou para operacoes transacionais simples — ele e projetado para analise de dados em larga escala (OLAP). Para dados nao estruturados, considere S3 com Athena."},en:{tech:"Amazon Redshift is a fully managed petabyte-scale data warehouse that uses columnar storage and massively parallel processing for complex analytical queries with high performance.",simple:"Amazon Redshift is a data warehouse optimized for complex analytical queries on large volumes of structured data from multiple sources. It processes petabytes of data using columnar storage and parallel processing.",avoid:"Do not use Redshift for storing unstructured data or for simple transactional operations — it is designed for large-scale data analysis (OLAP). For unstructured data, consider S3 with Athena."}}},
{en:"Which EC2 purchasing option provides a significant discount (up to 72%) in exchange for a commitment to a consistent amount of compute usage for a 1 or 3 year term?",pt:"Qual opção de compra do EC2 oferece um desconto significativo (até 72%) em troca de um compromisso com uma quantidade consistente de uso de computação por um período de 1 ou 3 anos?",o:{en:["Savings Plans","Spot Instances","On-Demand Instances","Dedicated Instances"],pt:["Savings Plans","Instâncias Spot","Instâncias Sob Demanda","Instâncias Dedicadas"]},a:[0],exp:{pt:{tech:"Os Savings Plans oferecem preços reduzidos em troca de um compromisso de uso consistente (em USD/hora) por 1 ou 3 anos, aplicáveis a EC2, Lambda e Fargate com flexibilidade de instância e região.",simple:"O Savings Plans oferece descontos de ate 72% em troca de um compromisso de uso consistente de computacao por 1 ou 3 anos. Voce se compromete com um valor por hora de uso, e qualquer uso dentro desse compromisso recebe o preco com desconto.",avoid:"Nao use Savings Plans para cargas de trabalho temporarias ou imprevisíveis — se voce nao usar a capacidade comprometida, ainda assim paga por ela. Para cargas esporadicas, On-Demand ou Spot Instances sao mais adequados."},en:{tech:"Savings Plans offer reduced pricing in exchange for a commitment to consistent usage (in USD/hour) for 1 or 3 years, applicable to EC2, Lambda, and Fargate with instance and Region flexibility.",simple:"Savings Plans offer discounts of up to 72% in exchange for a commitment to consistent compute usage for 1 or 3 years. You commit to a per-hour usage amount, and any usage within that commitment receives the discounted price.",avoid:"Do not use Savings Plans for temporary or unpredictable workloads — if you do not use the committed capacity, you still pay for it. For sporadic workloads, On-Demand or Spot Instances are more suitable."}}},
{en:"What is the purpose of an Internet Gateway in a VPC?",pt:"Qual é o propósito de um Internet Gateway em uma VPC?",o:{en:["To allow communication between the VPC and the internet","To provide DNS resolution within the VPC","To encrypt all traffic leaving the VPC","To connect two VPCs together privately"],pt:["Permitir a comunicação entre a VPC e a internet","Fornecer resolução de DNS dentro da VPC","Criptografar todo o tráfego que sai da VPC","Conectar duas VPCs de forma privada"]},a:[0],exp:{pt:{tech:"Um Internet Gateway é um componente de VPC horizontalmente escalável e altamente disponível que permite comunicação bidirecional entre instâncias na VPC e a internet.",simple:"O Internet Gateway permite que recursos dentro de uma VPC se comuniquem com a internet e vice-versa. Sem ele, instancias em subnets publicas nao conseguem enviar nem receber trafego da internet.",avoid:"Nao associe um Internet Gateway a subnets privadas que nao devem ter acesso direto a internet — para que recursos privados acessem a internet sem serem acessiveis de fora, use um NAT Gateway em vez do Internet Gateway."},en:{tech:"An Internet Gateway is a horizontally scaled, highly available VPC component that enables bidirectional communication between instances in the VPC and the internet.",simple:"An Internet Gateway allows resources inside a VPC to communicate with the internet and vice versa. Without it, instances in public subnets cannot send or receive internet traffic.",avoid:"Do not associate an Internet Gateway with private subnets that should not have direct internet access — for private resources to access the internet without being accessible from outside, use a NAT Gateway instead of the Internet Gateway."}}},
{en:"Which AWS service can create an inventory of on-premises servers to help plan a migration, including server specifications, performance data, and running processes?",pt:"Qual serviço da AWS pode criar um inventário de servidores locais para ajudar a planejar uma migração, incluindo especificações de servidor, dados de performance e processos em execução?",o:{en:["AWS Application Discovery Service","AWS Migration Hub","AWS DMS","AWS Server Migration Service"],pt:["AWS Application Discovery Service","AWS Migration Hub","AWS DMS","AWS Server Migration Service"]},a:[0],exp:{pt:{tech:"O AWS Application Discovery Service coleta informações sobre servidores on-premises, incluindo configuração, uso de CPU/memória/disco, dependências de rede e processos em execução, para planejamento de migração.",simple:"O AWS Application Discovery Service coleta informacoes detalhadas sobre servidores on-premises, incluindo especificacoes de hardware, dados de performance e processos em execucao. Esses dados ajudam a planejar a migracao para a AWS sem surpresas.",avoid:"Nao use o Discovery Service para executar a migracao — ele apenas coleta dados para planejamento. Para migrar as maquinas de fato, use o AWS Application Migration Service ou outras ferramentas de migracao."},en:{tech:"AWS Application Discovery Service collects information about on-premises servers, including configuration, CPU/memory/disk usage, network dependencies, and running processes, for migration planning.",simple:"AWS Application Discovery Service collects detailed information about on-premises servers, including hardware specifications, performance data, and running processes. This data helps plan the migration to AWS without surprises.",avoid:"Do not use the Discovery Service to execute the migration — it only collects data for planning. To actually migrate the machines, use AWS Application Migration Service or other migration tools."}}},
