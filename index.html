{en:"What does AWS Health Dashboard provide? (Choose TWO)",pt:"O que o AWS Health Dashboard fornece? (Escolha DOIS)",o:{en:["Detailed troubleshooting guidance for AWS events","Health checks for Auto Scaling instances","Recommendations for Cost Optimization","Dashboard detailing application vulnerabilities","Personalized view of AWS service health"],pt:["Orientacao detalhada para solucao de problemas de eventos AWS","Verificacoes de saude para instancias Auto Scaling","Recomendacoes de Otimizacao de Custos","Dashboard detalhando vulnerabilidades de aplicacoes","Visao personalizada da saude dos servicos AWS"]},a:[0,4],multi:true,exp:{pt:{tech:"O AWS Health Dashboard oferece uma visao personalizada de eventos que afetam sua conta e orientacoes de troubleshooting. Diferente do Service Health Dashboard (publico), ele e especifico para voce.",simple:"O AWS Health Dashboard oferece orientacoes detalhadas para resolver problemas de servicos AWS e uma visao personalizada da saude dos servicos que voce usa.",avoid:"Nao confunda o Health Dashboard com o Service Health Dashboard publico. O erro comum e nao configurar alertas personalizados, perdendo notificacoes importantes sobre eventos que afetam seus recursos."},en:{tech:"AWS Health Dashboard provides a personalized view of events affecting your account and troubleshooting guidance. Unlike the Service Health Dashboard (public), it's specific to you.",simple:"The AWS Health Dashboard provides detailed troubleshooting guidance for AWS service events and a personalized view of the health of services you use.",avoid:"Do not confuse the Health Dashboard with the public Service Health Dashboard. The common mistake is not setting up personalized alerts, missing important notifications about events affecting your resources."}}},
{en:"Which AWS service monitors performance of EC2 instances for troubleshooting?",pt:"Qual servico AWS monitora a performance de instancias EC2 para troubleshooting?",o:{en:["AWS Lambda","AWS Config","Amazon CloudWatch","AWS CloudTrail"],pt:["AWS Lambda","AWS Config","Amazon CloudWatch","AWS CloudTrail"]},a:[2],exp:{pt:{tech:"O Amazon CloudWatch coleta metricas (CPU, rede, disco), logs e eventos de recursos AWS. Permite criar alarmes, dashboards e acionar acoes automaticas baseadas em thresholds.",simple:"Amazon CloudWatch coleta metricas de performance das instancias EC2 (como uso de CPU, rede e disco) e permite criar alarmes para monitoramento e troubleshooting.",avoid:"Nao confunda CloudWatch com CloudTrail — CloudWatch monitora performance e metricas, CloudTrail registra chamadas de API. O erro comum e nao criar alarmes, usando o CloudWatch apenas para visualizacao manual."},en:{tech:"Amazon CloudWatch collects metrics (CPU, network, disk), logs, and events from AWS resources. It lets you create alarms, dashboards, and trigger automated actions based on thresholds.",simple:"Amazon CloudWatch collects performance metrics from EC2 instances (such as CPU, network, and disk usage) and lets you create alarms for monitoring and troubleshooting.",avoid:"Do not confuse CloudWatch with CloudTrail — CloudWatch monitors performance and metrics, CloudTrail records API calls. The common mistake is not creating alarms, using CloudWatch only for manual viewing."}}},
{en:"What are TWO examples of AWS shared controls?",pt:"Quais sao DOIS exemplos de controles compartilhados da AWS? (Escolha DOIS)",o:{en:["Patch Management","IAM Management","VPC Management","Configuration Management","Data Center operations"],pt:["Gerenciamento de Patches","Gerenciamento IAM","Gerenciamento de VPC","Gerenciamento de Configuracao","Operacoes de Data Center"]},a:[0,3],multi:true,exp:{pt:{tech:"Controles compartilhados sao responsabilidades que tanto a AWS quanto o cliente gerenciam, mas em diferentes contextos. Patch Management: AWS atualiza infraestrutura, cliente atualiza SO/apps. Configuration Management: ambos gerenciam configs em suas respectivas camadas.",simple:"Patch Management e Configuration Management sao controles compartilhados onde a AWS gerencia a infraestrutura base e o cliente gerencia seus proprios sistemas operacionais e aplicacoes.",avoid:"Nao assuma que a AWS aplica patches em tudo — ela cuida do hardware e servicos gerenciados, mas voce e responsavel por atualizar o SO e software das suas instancias EC2. O erro e achar que patches sao totalmente automaticos."},en:{tech:"Shared controls are responsibilities both AWS and the customer manage, but in different contexts. Patch Management: AWS patches infrastructure, customer patches OS/apps. Configuration Management: both manage configs in their respective layers.",simple:"Patch Management and Configuration Management are shared controls where AWS manages the base infrastructure and the customer manages their own operating systems and applications.",avoid:"Do not assume AWS patches everything — it handles hardware and managed services, but you are responsible for updating the OS and software on your EC2 instances. The mistake is thinking patches are fully automatic."}}},
{en:"Which of the following is NOT correct regarding Amazon EC2 On-demand instances?",pt:"Qual das alternativas a seguir NAO esta correta sobre instancias EC2 On-Demand?",o:{en:["You have to pay a start-up fee when launching a new instance","The on-demand instances follow the AWS pay-as-you-go pricing model","No longer-term commitments or upfront payments are needed","You are charged per second based on an hourly rate"],pt:["Voce precisa pagar uma taxa inicial ao lancar uma nova instancia","As instancias on-demand seguem o modelo de precificacao pay-as-you-go da AWS","Nao sao necessarios compromissos de longo prazo ou pagamentos antecipados","Voce e cobrado por segundo com base em uma taxa por hora"]},a:[0],exp:{pt:{tech:"EC2 On-Demand nao cobra taxa inicial. Voce paga apenas pelo uso sem compromissos.",simple:"Instancias EC2 On-Demand nao cobram taxa de inicializacao. Voce paga somente pelo tempo de computacao usado, sem compromissos antecipados ou taxas extras para comecar.",avoid:"Nao escolha On-Demand para workloads estaveis e previsiveis de longo prazo — Reserved Instances oferecem descontos significativos nesses casos. O erro e nao avaliar o padrao de uso antes de escolher o modelo de precificacao."},en:{tech:"EC2 On-Demand instances have no start-up fees. You pay only for compute time with no long-term commitments.",simple:"EC2 On-Demand instances do not charge a start-up fee. You pay only for the compute time used, with no upfront commitments or extra fees to begin.",avoid:"Do not choose On-Demand for stable, predictable long-term workloads — Reserved Instances offer significant discounts in those cases. The mistake is not evaluating usage patterns before choosing the pricing model."}}},
{en:"Which AWS service provides up to 5x the performance of standard MySQL?",pt:"Qual servico da AWS oferece ate 5x a performance do MySQL padrao?",o:{en:["Amazon Aurora","Amazon Redshift","Amazon DynamoDB","Amazon Neptune"],pt:["Amazon Aurora","Amazon Redshift","Amazon DynamoDB","Amazon Neptune"]},a:[0],exp:{pt:{tech:"Amazon Aurora oferece ate 5x a performance do MySQL padrao e 3x do PostgreSQL, com armazenamento auto-escalavel.",simple:"Amazon Aurora e um banco de dados relacional gerenciado pela AWS que oferece ate 5 vezes a performance do MySQL padrao, com compatibilidade total e escalabilidade automatica.",avoid:"Nao use Aurora se voce precisa de um banco NoSQL ou se a carga de trabalho e tao pequena que o custo adicional do Aurora nao se justifica. O erro e migrar para Aurora sem medir se a performance atual ja e suficiente."},en:{tech:"Amazon Aurora delivers up to 5x the throughput of standard MySQL and 3x of PostgreSQL with auto-scaling storage.",simple:"Amazon Aurora is a managed relational database by AWS that delivers up to 5 times the performance of standard MySQL, with full compatibility and automatic scaling.",avoid:"Do not use Aurora if you need a NoSQL database or if the workload is small enough that the additional cost of Aurora is not justified. The mistake is migrating to Aurora without measuring whether current performance is already sufficient."}}},
{en:"To transfer 60 petabytes of data to Amazon S3, which service should you use?",pt:"Para transferir 60 petabytes de dados para o Amazon S3, qual servico voce deve usar?",o:{en:["AWS Snowball","S3 Transfer Acceleration","AWS Snowmobile","Amazon VPC"],pt:["AWS Snowball","S3 Transfer Acceleration","AWS Snowmobile","Amazon VPC"]},a:[2],exp:{pt:{tech:"AWS Snowmobile e um caminhao com container de dados para transferencias em escala de exabytes. Snowball suporta ate petabytes.",simple:"AWS Snowmobile e um caminhao com container de armazenamento que transporta ate 100 petabytes de dados fisicamente ate a AWS, ideal para migracoes em escala massiva.",avoid:"Nao use Snowmobile para volumes menores que 10 petabytes — Snowball Edge e mais pratico e barato nesses casos. O erro e subestimar o tempo de logistica e planejamento que o Snowmobile exige."},en:{tech:"AWS Snowmobile is a 45-foot shipping container truck for exabyte-scale transfers. Snowball handles up to petabytes.",simple:"AWS Snowmobile is a truck with a storage container that physically transports up to 100 petabytes of data to AWS, ideal for massive-scale migrations.",avoid:"Do not use Snowmobile for volumes under 10 petabytes — Snowball Edge is more practical and cheaper in those cases. The mistake is underestimating the logistics and planning time that Snowmobile requires."}}},
{en:"Which AWS support plan includes a Concierge Support Team?",pt:"Qual plano de suporte da AWS inclui o time de Concierge?",o:{en:["Premium Support","Business Support","Enterprise Support","Standard Support"],pt:["Premium Support","Business Support","Enterprise Support","Standard Support"]},a:[2],exp:{pt:{tech:"O Concierge Support Team e exclusivo do plano Enterprise e ajuda com questoes de faturamento e conta.",simple:"O plano Enterprise Support e o unico que inclui o Concierge Support Team, uma equipe dedicada que ajuda com questoes de conta e faturamento.",avoid:"Nao espere ter acesso ao Concierge nos planos Basic, Developer ou Business — ele e exclusivo do Enterprise. O erro comum e contratar Business achando que tera suporte dedicado de conta."},en:{tech:"The Concierge Support Team is exclusive to the Enterprise plan and assists with billing and account inquiries.",simple:"The Enterprise Support plan is the only one that includes the Concierge Support Team, a dedicated team that helps with account and billing questions.",avoid:"Do not expect Concierge access on Basic, Developer, or Business plans — it is exclusive to Enterprise. The common mistake is purchasing Business thinking you will get dedicated account support."}}},
{en:"Which AWS service tracks API call history for resource changes?",pt:"Qual servico da AWS rastreia o historico de chamadas de API para alteracoes em recursos?",o:{en:["AWS Config","Amazon CloudWatch","AWS CloudTrail","AWS CloudFormation"],pt:["AWS Config","Amazon CloudWatch","AWS CloudTrail","AWS CloudFormation"]},a:[2],exp:{pt:{tech:"AWS CloudTrail registra todas as chamadas de API feitas na conta, incluindo quem fez, quando e de onde.",simple:"AWS CloudTrail registra todas as chamadas de API feitas na sua conta AWS, incluindo quem fez a acao, quando e quais recursos foram afetados.",avoid:"Nao confunda CloudTrail com CloudWatch — CloudTrail registra acoes e alteracoes (quem fez o que), CloudWatch monitora metricas de performance. O erro e nao ativar CloudTrail em todas as regioes, deixando acoes sem registro."},en:{tech:"AWS CloudTrail records all API calls made in your account, including who made them, when, and from where.",simple:"AWS CloudTrail records all API calls made in your AWS account, including who performed the action, when, and which resources were affected.",avoid:"Do not confuse CloudTrail with CloudWatch — CloudTrail records actions and changes (who did what), CloudWatch monitors performance metrics. The mistake is not enabling CloudTrail in all regions, leaving actions unrecorded."}}},
{en:"What are the benefits of AWS-managed services? (Choose TWO)",pt:"Quais sao os beneficios dos servicos gerenciados pela AWS? (Escolha DUAS)",o:{en:["Complete control over virtual infrastructure","Deliver new solutions faster","Lower operational complexity","Eliminate encryption needs","Control all patching activities"],pt:["Controle total sobre a infraestrutura virtual","Entregar novas solucoes mais rapido","Menor complexidade operacional","Eliminar a necessidade de criptografia","Controlar todas as atividades de patching"]},a:[1,2],multi:true,exp:{pt:{tech:"Servicos gerenciados reduzem a complexidade operacional e aceleram a entrega, pois a AWS cuida da infraestrutura subjacente.",simple:"Servicos gerenciados pela AWS eliminam a necessidade de manter infraestrutura, permitindo entregar solucoes mais rapido e com menor complexidade operacional.",avoid:"Nao use servicos gerenciados quando voce precisa de controle total sobre a configuracao do sistema operacional ou software. O erro e adotar servicos gerenciados sem entender as limitacoes de customizacao que eles impoe."},en:{tech:"Managed services reduce operational complexity and speed up delivery since AWS handles the underlying infrastructure.",simple:"AWS managed services eliminate the need to maintain infrastructure, allowing you to deliver solutions faster and with lower operational complexity.",avoid:"Do not use managed services when you need full control over OS or software configuration. The mistake is adopting managed services without understanding the customization limitations they impose."}}},
{en:"Which of the following are valid Amazon S3 use cases? (Choose TWO)",pt:"Quais dos seguintes sao casos de uso validos do Amazon S3? (Escolha DUAS)",o:{en:["Hosting static websites","Hosting sites requiring sustained high CPU utilization","Cost-effective database and log storage","Media store for Amazon CloudFront","Processing data streams at any scale"],pt:["Hospedagem de sites estaticos","Hospedagem de sites que exigem alta utilizacao continua de CPU","Armazenamento economico de banco de dados e logs","Armazenamento de midia para o Amazon CloudFront","Processamento de fluxos de dados em qualquer escala"]},a:[0,3],multi:true,exp:{pt:{tech:"S3 e ideal para hospedagem de sites estaticos e como origem de conteudo para o CloudFront (CDN da AWS).",simple:"O Amazon S3 pode hospedar sites estaticos (HTML, CSS, JS) e servir como armazenamento de midia para distribuicao via CloudFront.",avoid:"Nao use S3 para hospedar aplicacoes dinamicas que precisam de processamento no servidor — S3 serve apenas arquivos estaticos. O erro comum e tentar rodar codigo backend no S3."},en:{tech:"S3 is ideal for static website hosting and as a content origin for CloudFront (AWS CDN).",simple:"Amazon S3 can host static websites (HTML, CSS, JS) and serve as media storage for distribution via CloudFront.",avoid:"Do not use S3 to host dynamic applications that need server-side processing — S3 only serves static files. The common mistake is trying to run backend code on S3."}}},
{en:"What is the best practice for managing AWS access keys?",pt:"Qual e a melhor pratica para gerenciar chaves de acesso da AWS?",o:{en:["Delete all access keys and use only passwords","Share keys only with trusted people","Rotate access keys regularly","Save access keys in application code"],pt:["Deletar todas as chaves de acesso e usar apenas senhas","Compartilhar chaves apenas com pessoas confiaveis","Rotacionar as chaves de acesso regularmente","Salvar as chaves de acesso no codigo da aplicacao"]},a:[2],exp:{pt:{tech:"A AWS recomenda rotacionar chaves de acesso regularmente para minimizar o risco de comprometimento.",simple:"Rotacionar access keys regularmente garante que chaves antigas ou possivelmente comprometidas sejam substituidas, reduzindo o risco de acesso nao autorizado.",avoid:"Nao compartilhe access keys entre usuarios ou as coloque diretamente no codigo-fonte. O erro comum e criar uma unica chave e nunca trocar, aumentando a janela de exposicao em caso de vazamento."},en:{tech:"AWS recommends rotating access keys regularly to minimize the risk of compromised credentials.",simple:"Rotating access keys regularly ensures that old or potentially compromised keys are replaced, reducing the risk of unauthorized access.",avoid:"Do not share access keys between users or place them directly in source code. The common mistake is creating a single key and never rotating it, increasing the exposure window in case of a leak."}}},
{en:"What benefit does programmatic API access to AWS provide?",pt:"Qual beneficio o acesso programatico via API oferece na AWS?",o:{en:["Improves resource performance","Reduces provisioning time","Reduces developer count needed","Enables programmatic management of resources"],pt:["Melhora a performance dos recursos","Reduz o tempo de provisionamento","Reduz o numero de desenvolvedores necessarios","Permite o gerenciamento programatico dos recursos"]},a:[3],exp:{pt:{tech:"O acesso via API permite automatizar e gerenciar recursos AWS por meio de codigo, CLI ou SDKs.",simple:"O acesso programatico via API permite criar, modificar e excluir recursos AWS usando codigo, possibilitando automacao completa da gestao de infraestrutura.",avoid:"Nao use acesso programatico sem proteger as credenciais adequadamente. O erro comum e usar access keys de longa duracao no codigo em vez de IAM Roles, o que cria riscos de seguranca."},en:{tech:"API access allows you to automate and manage AWS resources through code, CLI, or SDKs.",simple:"Programmatic API access allows you to create, modify, and delete AWS resources using code, enabling full automation of infrastructure management.",avoid:"Do not use programmatic access without properly protecting credentials. The common mistake is using long-lived access keys in code instead of IAM Roles, which creates security risks."}}},
{en:"Which AWS service is best suited for a database with high read/write activity?",pt:"Qual servico da AWS e mais adequado para um banco de dados com alta atividade de leitura/escrita?",o:{en:["AWS Storage Gateway","Amazon S3","Amazon EBS","Amazon Glacier"],pt:["AWS Storage Gateway","Amazon S3","Amazon EBS","Amazon Glacier"]},a:[2],exp:{pt:{tech:"Amazon EBS fornece armazenamento em bloco de alta performance para instancias EC2, ideal para bancos de dados com alto I/O.",simple:"Amazon EBS fornece volumes de armazenamento em bloco persistentes e de alta performance para instancias EC2, sendo ideal para bancos de dados com alta atividade de leitura e escrita.",avoid:"Nao use EBS para armazenar arquivos que precisam ser acessados por multiplas instancias simultaneamente — para isso, use EFS. O erro comum e confundir EBS (bloco) com S3 (objetos) para armazenamento de banco de dados."},en:{tech:"Amazon EBS provides high-performance block storage for EC2 instances, ideal for databases with high I/O demands.",simple:"Amazon EBS provides persistent, high-performance block storage volumes for EC2 instances, making it ideal for databases with high read/write activity.",avoid:"Do not use EBS for storing files that need to be accessed by multiple instances simultaneously — use EFS for that. The common mistake is confusing EBS (block) with S3 (objects) for database storage."}}},
{en:"After migrating from EC2 to Lambda, which responsibilities does AWS assume? (Choose TWO)",pt:"Ao migrar do EC2 para o Lambda, quais responsabilidades passam para a AWS? (Escolha DUAS)",o:{en:["Application management","Capacity management","Access control","Operating system maintenance","Data management"],pt:["Gerenciamento da aplicacao","Gerenciamento de capacidade","Controle de acesso","Manutencao do sistema operacional","Gerenciamento de dados"]},a:[1,3],multi:true,exp:{pt:{tech:"Com Lambda (serverless), a AWS gerencia capacidade e sistema operacional. O cliente cuida da aplicacao, acesso e dados.",simple:"Ao migrar de EC2 para Lambda, a AWS assume o gerenciamento de capacidade (escalar recursos) e a manutencao do sistema operacional, liberando o cliente dessas tarefas.",avoid:"Nao assuma que Lambda elimina todas as responsabilidades — voce ainda e responsavel pelo codigo, permissoes IAM e configuracao de seguranca. O erro e achar que serverless significa zero responsabilidade."},en:{tech:"With Lambda (serverless), AWS manages capacity and OS maintenance. The customer handles application, access, and data.",simple:"When migrating from EC2 to Lambda, AWS takes over capacity management (scaling resources) and operating system maintenance, freeing the customer from those tasks.",avoid:"Do not assume Lambda eliminates all responsibilities — you are still responsible for code, IAM permissions, and security configuration. The mistake is thinking serverless means zero responsibility."}}},
{en:"What does the Elastic Load Balancer do to improve application reliability?",pt:"O que o Elastic Load Balancer faz para melhorar a confiabilidade da aplicacao?",o:{en:["Distributing traffic across S3 buckets","Replicating data to multiple Availability Zones","Creating database Read Replicas","Ensuring only healthy targets receive traffic"],pt:["Distribuir trafego entre buckets do S3","Replicar dados para multiplas Zonas de Disponibilidade","Criar Replicas de Leitura do banco de dados","Garantir que apenas alvos saudaveis recebam trafego"]},a:[3],exp:{pt:{tech:"O ELB faz health checks nos alvos e roteia trafego apenas para instancias saudaveis, melhorando a disponibilidade.",simple:"O Elastic Load Balancer verifica constantemente a saude das instancias e direciona o trafego apenas para instancias saudaveis, melhorando a confiabilidade da aplicacao.",avoid:"Nao confie no ELB sem configurar health checks adequados — se o health check nao verificar o endpoint correto, instancias com problemas podem continuar recebendo trafego. O erro e usar o health check padrao sem personalizar."},en:{tech:"ELB performs health checks on targets and routes traffic only to healthy instances, improving availability.",simple:"The Elastic Load Balancer constantly checks instance health and routes traffic only to healthy instances, improving application reliability.",avoid:"Do not rely on ELB without configuring proper health checks — if the health check does not verify the correct endpoint, unhealthy instances may keep receiving traffic. The mistake is using the default health check without customizing it."}}},
{en:"Which EC2 pricing option ensures hardware is not shared with other customers?",pt:"Qual opcao de precificacao do EC2 garante que o hardware nao seja compartilhado com outros clientes?",o:{en:["On-demand instances","Spot instances","Dedicated instances","Reserved instances"],pt:["Instancias On-Demand","Instancias Spot","Instancias Dedicadas","Instancias Reservadas"]},a:[2],exp:{pt:{tech:"Dedicated Instances rodam em hardware fisicamente isolado, dedicado a um unico cliente AWS.",simple:"Dedicated Instances garantem que o hardware fisico do servidor seja usado exclusivamente pela sua conta, sem compartilhamento com outros clientes AWS.",avoid:"Nao escolha Dedicated Instances sem necessidade real de isolamento de hardware — elas custam mais que instancias compartilhadas. O erro comum e confundir Dedicated Instances com Dedicated Hosts, que oferecem controle sobre o posicionamento no servidor fisico."},en:{tech:"Dedicated Instances run on physically isolated hardware dedicated to a single AWS customer.",simple:"Dedicated Instances ensure that the physical server hardware is used exclusively by your account, with no sharing with other AWS customers.",avoid:"Do not choose Dedicated Instances without a real need for hardware isolation — they cost more than shared instances. The common mistake is confusing Dedicated Instances with Dedicated Hosts, which offer control over physical server placement."}}},
{en:"Which is the most cost-effective storage option for archiving data for 5 years?",pt:"Qual e a opcao de armazenamento mais economica para arquivar dados por 5 anos?",o:{en:["Amazon S3 Glacier","Amazon EFS","Amazon S3 Standard","Amazon EBS"],pt:["Amazon S3 Glacier","Amazon EFS","Amazon S3 Standard","Amazon EBS"]},a:[0],exp:{pt:{tech:"S3 Glacier oferece armazenamento de custo muito baixo para dados de arquivo com acesso raro, ideal para retencao de longo prazo.",simple:"Amazon S3 Glacier oferece o armazenamento mais barato da AWS para dados que precisam ser guardados por longos periodos e sao acessados raramente.",avoid:"Nao use Glacier para dados que voce precisa acessar rapidamente — a recuperacao pode levar de minutos a horas. O erro comum e nao considerar os custos de recuperacao ao calcular a economia total."},en:{tech:"S3 Glacier provides very low-cost storage for archival data with infrequent access, ideal for long-term retention.",simple:"Amazon S3 Glacier offers the cheapest AWS storage for data that needs to be kept for long periods and is rarely accessed.",avoid:"Do not use Glacier for data you need to access quickly — retrieval can take minutes to hours. The common mistake is not considering retrieval costs when calculating total savings."}}},
{en:"Which AWS service is used for managing user permissions?",pt:"Qual servico da AWS e usado para gerenciar permissoes de usuarios?",o:{en:["Security Groups","Amazon ECS","AWS IAM","AWS Support"],pt:["Security Groups","Amazon ECS","AWS IAM","AWS Support"]},a:[2],exp:{pt:{tech:"AWS IAM (Identity and Access Management) permite criar e gerenciar usuarios, grupos e permissoes de acesso aos recursos.",simple:"AWS IAM e o servico que gerencia usuarios, grupos e permissoes, controlando quem pode acessar quais recursos na sua conta AWS.",avoid:"Nao use o usuario root para tarefas do dia a dia — crie usuarios IAM com permissoes minimas necessarias. O erro comum e dar permissoes amplas demais (como AdministratorAccess) para todos os usuarios."},en:{tech:"AWS IAM (Identity and Access Management) lets you create and manage users, groups, and access permissions to resources.",simple:"AWS IAM is the service that manages users, groups, and permissions, controlling who can access which resources in your AWS account.",avoid:"Do not use the root user for daily tasks — create IAM users with minimum necessary permissions. The common mistake is giving overly broad permissions (like AdministratorAccess) to all users."}}},
{en:"Which design principle helps minimize the impact of outages?",pt:"Qual principio de design ajuda a minimizar o impacto de interrupcoes?",o:{en:["Least Privilege","Pilot Light","Fault Tolerance","Multi-threading"],pt:["Menor Privilegio","Pilot Light","Tolerancia a Falhas","Multi-threading"]},a:[2],exp:{pt:{tech:"Fault Tolerance garante que o sistema continue operando mesmo quando componentes falham, usando redundancia.",simple:"Tolerancia a falhas e a capacidade de um sistema continuar operando sem interrupcao quando um ou mais componentes falham.",avoid:"Nao confunda tolerancia a falhas com backup — ter backup ajuda na recuperacao, mas tolerancia a falhas impede que a interrupcao aconteca. O erro e projetar apenas para recuperacao sem redundancia ativa."},en:{tech:"Fault Tolerance ensures the system continues operating even when components fail, through redundancy.",simple:"Fault Tolerance is the ability of a system to continue operating without interruption when one or more components fail.",avoid:"Do not confuse fault tolerance with backup — having a backup helps with recovery, but fault tolerance prevents the interruption from happening. The mistake is designing only for recovery without active redundancy."}}},
{en:"Which Reserved Instance payment option provides the largest discount?",pt:"Qual opcao de pagamento de Instancia Reservada oferece o maior desconto?",o:{en:["All up-front","All options provide the same discount","Partial up-front","No up-front"],pt:["Tudo antecipado","Todas as opcoes oferecem o mesmo desconto","Parcialmente antecipado","Sem pagamento antecipado"]},a:[0],exp:{pt:{tech:"O pagamento All Upfront de Reserved Instances oferece o maior desconto (ate 72%) comparado a Partial ou No Upfront.",simple:"Pagar a Reserved Instance integralmente antecipado (All Upfront) oferece o maior desconto porque voce assume o compromisso financeiro total no inicio do contrato.",avoid:"Nao escolha All Upfront se voce nao tem certeza sobre a demanda futura — se os requisitos mudarem, voce ja pagou por algo que pode nao usar. O erro e priorizar desconto maximo sem avaliar flexibilidade."},en:{tech:"All Upfront payment for Reserved Instances offers the highest discount (up to 72%) compared to Partial or No Upfront.",simple:"Paying the Reserved Instance entirely upfront (All Upfront) offers the largest discount because you commit the full financial amount at the start of the contract.",avoid:"Do not choose All Upfront if you are unsure about future demand — if requirements change, you have already paid for something you may not use. The mistake is prioritizing maximum discount without evaluating flexibility."}}},
{en:"Which of the following are AWS data protection features? (Choose TWO)",pt:"Quais das alternativas a seguir sao recursos de protecao de dados da AWS? (Escolha DUAS)",o:{en:["Access control","Physical MFA devices","Data encryption","Unlimited storage","Load balancing"],pt:["Controle de acesso","Dispositivos MFA fisicos","Criptografia de dados","Armazenamento ilimitado","Balanceamento de carga"]},a:[0,2],multi:true,exp:{pt:{tech:"Controle de acesso (IAM) e criptografia (em repouso e em transito) sao os principais mecanismos de protecao de dados na AWS.",simple:"Controle de acesso define quem pode ver e modificar os dados, e criptografia transforma os dados em formato ilegivel para quem nao tem a chave de decriptacao.",avoid:"Nao use apenas um dos dois — controle de acesso sem criptografia deixa dados expostos se alguem acessar o armazenamento diretamente. O erro e achar que criptografia sozinha substitui controle de acesso adequado."},en:{tech:"Access control (IAM) and encryption (at rest and in transit) are the primary data protection mechanisms in AWS.",simple:"Access control defines who can view and modify data, and encryption transforms data into an unreadable format for anyone without the decryption key.",avoid:"Do not use only one of the two — access control without encryption leaves data exposed if someone accesses the storage directly. The mistake is thinking encryption alone replaces proper access control."}}},
{en:"Which IAM entity should be used to grant temporary access to AWS resources?",pt:"Qual entidade do IAM deve ser usada para conceder acesso temporario aos recursos da AWS?",o:{en:["IAM Users","Key Pair","IAM Roles","IAM Groups"],pt:["Usuarios IAM","Par de Chaves","Funcoes IAM (Roles)","Grupos IAM"]},a:[2],exp:{pt:{tech:"IAM Roles fornecem credenciais temporarias que sao rotacionadas automaticamente, ideais para acesso temporario.",simple:"IAM Roles fornecem credenciais temporarias e sao usadas para conceder acesso a servicos AWS ou usuarios federados sem precisar de senhas ou access keys permanentes.",avoid:"Nao crie IAM Users com access keys de longa duracao quando um IAM Role resolve o mesmo problema com mais seguranca. O erro comum e usar IAM Users para servicos (como EC2) em vez de atribuir Roles."},en:{tech:"IAM Roles provide temporary credentials that are automatically rotated, ideal for granting temporary access.",simple:"IAM Roles provide temporary credentials and are used to grant access to AWS services or federated users without needing permanent passwords or access keys.",avoid:"Do not create IAM Users with long-lived access keys when an IAM Role solves the same problem more securely. The common mistake is using IAM Users for services (like EC2) instead of assigning Roles."}}},
{en:"Which AWS service distributes incoming traffic across multiple EC2 instances?",pt:"Qual servico da AWS distribui o trafego de entrada entre varias instancias EC2?",o:{en:["AWS Global Accelerator","AWS Application Load Balancer","Amazon CloudFront","Transit VPC"],pt:["AWS Global Accelerator","AWS Application Load Balancer","Amazon CloudFront","Transit VPC"]},a:[1],exp:{pt:{tech:"O Application Load Balancer (ALB) opera na camada 7 e distribui trafego HTTP/HTTPS entre instancias EC2.",simple:"O Application Load Balancer distribui o trafego de entrada entre multiplas instancias EC2, garantindo que nenhuma fique sobrecarregada e que a aplicacao tenha alta disponibilidade.",avoid:"Nao use ALB para trafego que nao e HTTP/HTTPS — para protocolos TCP ou UDP, use o Network Load Balancer. O erro comum e usar ALB para todos os tipos de trafego sem considerar o protocolo."},en:{tech:"The Application Load Balancer (ALB) operates at layer 7 and distributes HTTP/HTTPS traffic across EC2 instances.",simple:"The Application Load Balancer distributes incoming traffic across multiple EC2 instances, ensuring none gets overloaded and the application has high availability.",avoid:"Do not use ALB for non-HTTP/HTTPS traffic — for TCP or UDP protocols, use the Network Load Balancer. The common mistake is using ALB for all traffic types without considering the protocol."}}},
{en:"Which option helps secure an AWS account from unauthorized access?",pt:"Qual opcao ajuda a proteger uma conta AWS contra acesso nao autorizado?",o:{en:["Restrict all SDK and CLI API calls","Share IAM accounts organized by department","Require MFA for all IAM User access","Set up two different login passwords"],pt:["Restringir todas as chamadas de API do SDK e CLI","Compartilhar contas IAM organizadas por departamento","Exigir MFA para todo acesso de usuarios IAM","Configurar duas senhas de login diferentes"]},a:[2],exp:{pt:{tech:"MFA adiciona uma camada extra de seguranca exigindo um segundo fator alem da senha para autenticacao.",simple:"Exigir MFA para todos os usuarios IAM adiciona uma segunda camada de verificacao alem da senha, bloqueando acesso mesmo que a senha seja comprometida.",avoid:"Nao ative MFA apenas para o usuario root e ignore os demais. O erro comum e achar que senhas fortes sao suficientes sem MFA, deixando contas vulneraveis a ataques de phishing e vazamentos de credenciais."},en:{tech:"MFA adds an extra security layer by requiring a second factor beyond the password for authentication.",simple:"Requiring MFA for all IAM users adds a second verification layer beyond the password, blocking access even if the password is compromised.",avoid:"Do not enable MFA only for the root user and ignore the rest. The common mistake is thinking strong passwords are enough without MFA, leaving accounts vulnerable to phishing attacks and credential leaks."}}},
{en:"Which AWS service offers volume-based discounts as usage increases?",pt:"Qual servico da AWS oferece descontos baseados em volume conforme o uso aumenta?",o:{en:["Amazon VPC","Amazon S3","Amazon Lightsail","AWS Cost Explorer"],pt:["Amazon VPC","Amazon S3","Amazon Lightsail","AWS Cost Explorer"]},a:[1],exp:{pt:{tech:"O Amazon S3 usa precificacao em camadas — quanto mais dados voce armazena, menor o custo por GB.",simple:"O Amazon S3 oferece precos que diminuem conforme o volume de armazenamento aumenta — quanto mais dados voce armazena, menor o custo por gigabyte.",avoid:"Nao assuma que todo servico AWS tem desconto por volume automatico. O erro comum e armazenar dados desnecessarios no S3 achando que o volume maior sempre significa economia — dados inuteis so geram custo."},en:{tech:"Amazon S3 uses tiered pricing — the more data you store, the lower the cost per GB.",simple:"Amazon S3 offers pricing that decreases as storage volume increases — the more data you store, the lower the cost per gigabyte.",avoid:"Do not assume every AWS service has automatic volume discounts. The common mistake is storing unnecessary data on S3 thinking more volume always means savings — useless data only generates cost."}}},
{en:"Which factors should be considered when choosing an AWS Region for deployment? (Choose TWO)",pt:"Quais fatores devem ser considerados ao escolher uma Regiao AWS para implantacao? (Escolha DUAS)",o:{en:["The security level of the region","Data sovereignty and compliance requirements","Cost of services in the region","Number of available VPCs","Geographic proximity to users"],pt:["O nivel de seguranca da regiao","Requisitos de soberania de dados e conformidade","Custo dos servicos na regiao","Numero de VPCs disponiveis","Proximidade geografica dos usuarios"]},a:[1,2],multi:true,exp:{pt:{tech:"A escolha de regiao deve considerar conformidade com leis de dados locais e custo, que varia entre regioes.",simple:"Ao escolher uma regiao AWS, considere as leis de soberania de dados do pais (onde os dados devem ficar) e o custo dos servicos, que varia entre regioes.",avoid:"Nao escolha a regiao apenas pela proximidade geografica — custos e regulamentacoes podem ser mais importantes. O erro e ignorar requisitos legais de residencia de dados ao selecionar a regiao."},en:{tech:"Region selection should consider compliance with local data laws and cost, which varies between regions.",simple:"When choosing an AWS Region, consider the data sovereignty laws of the country (where data must reside) and the cost of services, which varies between regions.",avoid:"Do not choose the region based solely on geographic proximity — costs and regulations may be more important. The mistake is ignoring legal data residency requirements when selecting the region."}}},
{en:"Which AWS service provides in-memory caching to improve MySQL database performance?",pt:"Qual servico da AWS fornece cache em memoria para melhorar a performance de bancos MySQL?",o:{en:["Amazon EFS","Amazon Neptune","Amazon ElastiCache","Amazon DAX"],pt:["Amazon EFS","Amazon Neptune","Amazon ElastiCache","Amazon DAX"]},a:[2],exp:{pt:{tech:"Amazon ElastiCache suporta Redis e Memcached para cache em memoria, reduzindo a carga em bancos relacionais como MySQL.",simple:"Amazon ElastiCache armazena dados acessados com frequencia na memoria RAM, reduzindo o numero de consultas ao banco de dados MySQL e melhorando significativamente a performance.",avoid:"Nao use ElastiCache para dados que mudam constantemente sem uma estrategia de invalidacao de cache. O erro comum e cachear tudo sem definir TTL, servindo dados desatualizados para os usuarios."},en:{tech:"Amazon ElastiCache supports Redis and Memcached for in-memory caching, reducing load on relational databases like MySQL.",simple:"Amazon ElastiCache stores frequently accessed data in RAM, reducing the number of queries to the MySQL database and significantly improving performance.",avoid:"Do not use ElastiCache for data that changes constantly without a cache invalidation strategy. The common mistake is caching everything without setting TTL, serving stale data to users."}}},
{en:"Which are the customer responsibilities for security IN the cloud? (Choose TWO)",pt:"Quais sao as responsabilidades do cliente pela seguranca NA nuvem? (Escolha DUAS)",o:{en:["Building the application schema","Replacing faulty physical hardware","Creating the hypervisor","Patch management of underlying infrastructure","File system encryption"],pt:["Construir o esquema da aplicacao","Substituir hardware fisico com defeito","Criar o hypervisor","Gerenciamento de patches da infraestrutura subjacente","Criptografia do sistema de arquivos"]},a:[0,4],multi:true,exp:{pt:{tech:"No modelo de responsabilidade compartilhada, o cliente cuida dos dados, aplicacao, criptografia e configuracao de acesso.",simple:"O cliente e responsavel por definir o esquema da aplicacao (estrutura dos dados) e configurar a criptografia dos sistemas de arquivos nos servicos AWS.",avoid:"Nao assuma que a AWS configura a criptografia automaticamente em todos os servicos — em muitos casos, voce precisa habilitar e gerenciar. O erro e deixar dados sem criptografia por achar que a AWS ja protege tudo."},en:{tech:"In the shared responsibility model, the customer handles data, application, encryption, and access configuration.",simple:"The customer is responsible for defining the application schema (data structure) and configuring file system encryption on AWS services.",avoid:"Do not assume AWS configures encryption automatically on all services — in many cases, you need to enable and manage it. The mistake is leaving data unencrypted assuming AWS already protects everything."}}},
{en:"Which AWS service enables quick deployment of .NET applications?",pt:"Qual servico da AWS permite implantar aplicacoes .NET rapidamente?",o:{en:["Amazon SNS","AWS Elastic Beanstalk","AWS Systems Manager","AWS Trusted Advisor"],pt:["Amazon SNS","AWS Elastic Beanstalk","AWS Systems Manager","AWS Trusted Advisor"]},a:[1],exp:{pt:{tech:"Elastic Beanstalk faz deploy automatico de aplicacoes .NET, Java, Node.js e outras, gerenciando a infraestrutura.",simple:"AWS Elastic Beanstalk permite fazer deploy de aplicacoes .NET (e outras linguagens) rapidamente, cuidando automaticamente do provisionamento de servidores, balanceamento de carga e escalabilidade.",avoid:"Nao use Beanstalk quando voce precisa de controle total sobre a infraestrutura ou configuracoes muito especificas de servidor. O erro e usar Beanstalk para arquiteturas complexas que exigem customizacao profunda."},en:{tech:"Elastic Beanstalk automatically deploys .NET, Java, Node.js and other applications, managing the underlying infrastructure.",simple:"AWS Elastic Beanstalk enables quick deployment of .NET applications (and other languages), automatically handling server provisioning, load balancing, and scaling.",avoid:"Do not use Beanstalk when you need full control over infrastructure or very specific server configurations. The mistake is using Beanstalk for complex architectures that require deep customization."}}},
{en:"Which AWS service extends on-premises storage to the AWS Cloud?",pt:"Qual servico da AWS estende o armazenamento local para a nuvem AWS?",o:{en:["AWS Data Pipeline","AWS Storage Gateway","Amazon Aurora","Amazon EFS"],pt:["AWS Data Pipeline","AWS Storage Gateway","Amazon Aurora","Amazon EFS"]},a:[1],exp:{pt:{tech:"AWS Storage Gateway conecta ambientes on-premises ao armazenamento em nuvem da AWS de forma transparente.",simple:"AWS Storage Gateway conecta seu ambiente on-premises ao armazenamento na nuvem AWS, permitindo que aplicacoes locais usem o armazenamento da nuvem de forma transparente.",avoid:"Nao use Storage Gateway quando todos os seus dados ja estao na nuvem — ele e projetado para ambientes hibridos. O erro comum e confundir Storage Gateway com um servico de migracao como o AWS DMS."},en:{tech:"AWS Storage Gateway seamlessly connects on-premises environments to AWS cloud storage.",simple:"AWS Storage Gateway connects your on-premises environment to AWS cloud storage, allowing local applications to use cloud storage transparently.",avoid:"Do not use Storage Gateway when all your data is already in the cloud — it is designed for hybrid environments. The common mistake is confusing Storage Gateway with a migration service like AWS DMS."}}},
{en:"Which AWS service provides access logs and records for auditing purposes?",pt:"Qual servico da AWS fornece logs de acesso e registros para fins de auditoria?",o:{en:["AWS CloudTrail","Amazon CloudFront","AWS CloudFormation","Amazon CloudWatch"],pt:["AWS CloudTrail","Amazon CloudFront","AWS CloudFormation","Amazon CloudWatch"]},a:[0],exp:{pt:{tech:"AWS CloudTrail registra todas as acoes realizadas na conta AWS, essencial para auditorias e investigacoes de seguranca.",simple:"AWS CloudTrail fornece logs detalhados de todas as acoes realizadas na conta AWS, servindo como registro de auditoria para seguranca e conformidade.",avoid:"Nao desative CloudTrail em nenhuma regiao — acoes nao registradas criam pontos cegos de seguranca. O erro comum e nao armazenar os logs em um bucket S3 separado e protegido contra exclusao."},en:{tech:"AWS CloudTrail records all actions performed in the AWS account, essential for audits and security investigations.",simple:"AWS CloudTrail provides detailed logs of all actions performed on the AWS account, serving as an audit trail for security and compliance.",avoid:"Do not disable CloudTrail in any region — unrecorded actions create security blind spots. The common mistake is not storing logs in a separate S3 bucket protected against deletion."}}},
{en:"What is the best practice for building highly available applications on AWS?",pt:"Qual e a melhor pratica para construir aplicacoes de alta disponibilidade na AWS?",o:{en:["Deploy to at least two Availability Zones","Use Elastic Load Balancing across multiple Regions","Deploy code on two servers in the same Availability Zone","Rewrite the application code to handle all requests"],pt:["Implantar em pelo menos duas Zonas de Disponibilidade","Usar Elastic Load Balancing entre multiplas Regioes","Implantar codigo em dois servidores na mesma Zona de Disponibilidade","Reescrever o codigo da aplicacao para lidar com todas as requisicoes"]},a:[0],exp:{pt:{tech:"Implantar em pelo menos duas AZs garante que a aplicacao continue disponivel mesmo se uma AZ falhar.",simple:"Distribuir recursos em pelo menos duas Availability Zones garante que a aplicacao continue funcionando mesmo se uma zona inteira ficar indisponivel.",avoid:"Nao use apenas uma AZ e dependa de backups para recuperacao — isso causa downtime. O erro comum e implantar em duas AZs mas colocar o banco de dados em apenas uma, criando um ponto unico de falha."},en:{tech:"Deploying to at least two AZs ensures the application remains available even if one AZ fails.",simple:"Deploying resources across at least two Availability Zones ensures the application keeps running even if an entire zone becomes unavailable.",avoid:"Do not use only one AZ and rely on backups for recovery — this causes downtime. The common mistake is deploying in two AZs but placing the database in only one, creating a single point of failure."}}},
{en:"Which factors should be considered in a Total Cost of Ownership (TCO) analysis? (Choose TWO)",pt:"Quais fatores devem ser considerados em uma analise de Custo Total de Propriedade (TCO)? (Escolha DUAS)",o:{en:["Labor costs and IT overhead","Cooling and power consumption","Amazon EBS computing power","Software architecture design","Software compatibility testing"],pt:["Custos de mao de obra e overhead de TI","Custos de refrigeracao e consumo de energia","Poder computacional do Amazon EBS","Design de arquitetura de software","Testes de compatibilidade de software"]},a:[0,1],multi:true,exp:{pt:{tech:"TCO inclui custos de mao de obra, energia, refrigeracao, espaco fisico e hardware — custos que a nuvem elimina ou reduz.",simple:"Na analise de TCO, inclua custos de mao de obra da equipe de TI e custos de energia e refrigeracao do datacenter, que sao significativos no ambiente on-premises.",avoid:"Nao compare apenas o custo de servidores fisicos com instancias na nuvem. O erro comum e esquecer que on-premises exige equipe para manter, energia para funcionar e refrigeracao para nao superaquecer, o que aumenta muito o custo real."},en:{tech:"TCO includes labor, power, cooling, physical space, and hardware costs — costs that the cloud eliminates or reduces.",simple:"In a TCO analysis, include IT staff labor costs and data center power and cooling costs, which are significant in the on-premises environment.",avoid:"Do not compare only the cost of physical servers with cloud instances. The common mistake is forgetting that on-premises requires staff to maintain, power to run, and cooling to prevent overheating, which greatly increases the real cost."}}},
{en:"Which support plan is required for a response time of less than 15 minutes for critical issues?",pt:"Qual plano de suporte e necessario para um tempo de resposta inferior a 15 minutos em problemas criticos?",o:{en:["AWS Basic Support","AWS Developer Support","AWS Business Support","AWS Enterprise Support"],pt:["AWS Basic Support","AWS Developer Support","AWS Business Support","AWS Enterprise Support"]},a:[3],exp:{pt:{tech:"O plano Enterprise oferece tempo de resposta inferior a 15 minutos para casos criticos de negocio.",simple:"O plano Enterprise Support garante tempo de resposta inferior a 15 minutos para problemas criticos que afetam a producao. E o plano com o nivel mais alto de suporte tecnico da AWS.",avoid:"Nao escolha Enterprise Support se sua empresa e pequena e nao tem aplicacoes criticas em producao. O custo e alto e so vale a pena se voce realmente precisa de resposta ultra-rapida."},en:{tech:"The Enterprise plan offers a response time of less than 15 minutes for business-critical cases.",simple:"Enterprise Support guarantees a response time of less than 15 minutes for critical production issues. It is the highest level of technical support AWS offers.",avoid:"Do not choose Enterprise Support if your company is small and has no critical production applications. The cost is high and only worth it if you truly need ultra-fast response times."}}},
{en:"Which of the following are serverless AWS offerings? (Choose TWO)",pt:"Quais das alternativas a seguir sao ofertas serverless da AWS? (Escolha DUAS)",o:{en:["Amazon EC2","AWS Lambda","Amazon DynamoDB","Amazon EMR","Amazon RDS"],pt:["Amazon EC2","AWS Lambda","Amazon DynamoDB","Amazon EMR","Amazon RDS"]},a:[1,2],multi:true,exp:{pt:{tech:"Lambda e DynamoDB sao serverless — nao exigem gerenciamento de servidores. EC2, EMR e RDS exigem.",simple:"AWS Lambda executa codigo sem voce precisar gerenciar servidores, e Amazon DynamoDB e um banco de dados que tambem nao exige gerenciamento de infraestrutura. Ambos sao serverless porque a AWS cuida de toda a infraestrutura por voce.",avoid:"Nao confunda serverless com gratuito — voce ainda paga pelo uso. Tambem nao use Lambda para processos que rodam continuamente por horas, pois ele tem limite de tempo de execucao."},en:{tech:"Lambda and DynamoDB are serverless — they require no server management. EC2, EMR, and RDS require it.",simple:"AWS Lambda runs code without you managing servers, and Amazon DynamoDB is a database that also requires no infrastructure management. Both are serverless because AWS handles all the infrastructure for you.",avoid:"Do not confuse serverless with free — you still pay for usage. Also do not use Lambda for processes that run continuously for hours, as it has an execution time limit."}}},
{en:"Which of the following is NOT correct regarding Amazon EC2 On-demand instances?",pt:"Qual das alternativas a seguir NAO esta correta sobre instancias EC2 On-Demand?",o:{en:["You have to pay a start-up fee when launching a new instance","The on-demand instances follow the AWS pay-as-you-go pricing model","No longer-term commitments or upfront payments are needed","You are charged per second based on an hourly rate"],pt:["Voce precisa pagar uma taxa inicial ao lancar uma nova instancia","As instancias on-demand seguem o modelo de precificacao pay-as-you-go da AWS","Nao sao necessarios compromissos de longo prazo ou pagamentos antecipados","Voce e cobrado por segundo com base em uma taxa por hora"]},a:[0],exp:{pt:{tech:"EC2 On-Demand nao cobra taxa inicial. Voce paga apenas pelo uso sem compromissos.",simple:"Instancias EC2 On-Demand nao cobram taxa inicial para comecar a usar. Voce paga apenas pelo tempo de computacao consumido, sem compromisso de longo prazo.",avoid:"Nao use On-Demand para cargas de trabalho previsíveis e continuas — Reserved Instances sao mais baratas nesses casos. Tambem nao deixe instancias On-Demand ligadas sem uso, pois voce continua pagando."},en:{tech:"EC2 On-Demand instances have no start-up fees. You pay only for compute time with no long-term commitments.",simple:"EC2 On-Demand instances do not charge a startup fee to begin using them. You pay only for the compute time consumed, with no long-term commitment.",avoid:"Do not use On-Demand for predictable, continuous workloads — Reserved Instances are cheaper in those cases. Also do not leave On-Demand instances running idle, as you keep paying for them."}}},
{en:"Which AWS service provides up to 5x the performance of standard MySQL?",pt:"Qual servico da AWS oferece ate 5x a performance do MySQL padrao?",o:{en:["Amazon Aurora","Amazon Redshift","Amazon DynamoDB","Amazon Neptune"],pt:["Amazon Aurora","Amazon Redshift","Amazon DynamoDB","Amazon Neptune"]},a:[0],exp:{pt:{tech:"Amazon Aurora oferece ate 5x a performance do MySQL padrao e 3x do PostgreSQL, com armazenamento auto-escalavel.",simple:"Amazon Aurora e um banco de dados relacional gerenciado pela AWS, compativel com MySQL e PostgreSQL, que oferece desempenho ate 5 vezes superior ao MySQL padrao. Ele tambem escala automaticamente o armazenamento conforme necessario.",avoid:"Nao use Aurora se voce precisa de um banco NoSQL ou se quer controle total sobre a configuracao do servidor de banco de dados. Tambem nao e necessario se sua aplicacao e muito pequena e um RDS MySQL simples ja atende."},en:{tech:"Amazon Aurora delivers up to 5x the throughput of standard MySQL and 3x of PostgreSQL with auto-scaling storage.",simple:"Amazon Aurora is an AWS-managed relational database compatible with MySQL and PostgreSQL that delivers up to 5x the performance of standard MySQL. It also automatically scales storage as needed.",avoid:"Do not use Aurora if you need a NoSQL database or want full control over the database server configuration. It is also unnecessary if your application is very small and a simple RDS MySQL already meets your needs."}}},
{en:"To transfer 60 petabytes of data to Amazon S3, which service should you use?",pt:"Para transferir 60 petabytes de dados para o Amazon S3, qual servico voce deve usar?",o:{en:["AWS Snowball","S3 Transfer Acceleration","AWS Snowmobile","Amazon VPC"],pt:["AWS Snowball","S3 Transfer Acceleration","AWS Snowmobile","Amazon VPC"]},a:[2],exp:{pt:{tech:"AWS Snowmobile e um caminhao com container de dados para transferencias em escala de exabytes. Snowball suporta ate petabytes.",simple:"AWS Snowmobile e um servico de transferencia de dados em escala de exabytes que usa um caminhao com container para mover volumes massivos de dados para a AWS. Para 60 petabytes, o Snowmobile e a opcao indicada porque o Snowball suporta volumes menores.",avoid:"Nao use Snowmobile para transferencias de poucos terabytes — o Snowball ou mesmo a transferencia pela internet sao mais praticos nesses casos. Snowmobile so faz sentido para dezenas de petabytes ou mais."},en:{tech:"AWS Snowmobile is a 45-foot shipping container truck for exabyte-scale transfers. Snowball handles up to petabytes.",simple:"AWS Snowmobile is an exabyte-scale data transfer service that uses a truck with a shipping container to move massive data volumes to AWS. For 60 petabytes, Snowmobile is the recommended option because Snowball handles smaller volumes.",avoid:"Do not use Snowmobile for transfers of just a few terabytes — Snowball or even internet transfer are more practical in those cases. Snowmobile only makes sense for tens of petabytes or more."}}},
{en:"Which AWS support plan includes a Concierge Support Team?",pt:"Qual plano de suporte da AWS inclui o time de Concierge?",o:{en:["Premium Support","Business Support","Enterprise Support","Standard Support"],pt:["Premium Support","Business Support","Enterprise Support","Standard Support"]},a:[2],exp:{pt:{tech:"O Concierge Support Team e exclusivo do plano Enterprise e ajuda com questoes de faturamento e conta.",simple:"O Concierge Support Team e uma equipe dedicada que ajuda com questoes de conta e faturamento da AWS. Esse time esta disponivel exclusivamente no plano Enterprise Support.",avoid:"Nao espere ter acesso ao Concierge no plano Business ou inferior — ele e exclusivo do Enterprise. Tambem nao confunda o Concierge com suporte tecnico; ele foca em conta e faturamento."},en:{tech:"The Concierge Support Team is exclusive to the Enterprise plan and assists with billing and account inquiries.",simple:"The Concierge Support Team is a dedicated team that helps with AWS account and billing questions. This team is available exclusively on the Enterprise Support plan.",avoid:"Do not expect Concierge access on the Business plan or lower — it is exclusive to Enterprise. Also do not confuse the Concierge with technical support; it focuses on account and billing matters."}}},
{en:"Which AWS service tracks API call history for resource changes?",pt:"Qual servico da AWS rastreia o historico de chamadas de API para alteracoes em recursos?",o:{en:["AWS Config","Amazon CloudWatch","AWS CloudTrail","AWS CloudFormation"],pt:["AWS Config","Amazon CloudWatch","AWS CloudTrail","AWS CloudFormation"]},a:[2],exp:{pt:{tech:"AWS CloudTrail registra todas as chamadas de API feitas na conta, incluindo quem fez, quando e de onde.",simple:"AWS CloudTrail registra todas as chamadas de API feitas na sua conta AWS, incluindo quem fez a acao, quando e o que foi alterado. E essencial para auditoria e rastreamento de mudancas.",avoid:"Nao confunda CloudTrail com CloudWatch — CloudTrail registra acoes e chamadas de API, enquanto CloudWatch monitora metricas e performance. CloudTrail nao serve para monitorar uso de CPU ou memoria."},en:{tech:"AWS CloudTrail records all API calls made in your account, including who made them, when, and from where.",simple:"AWS CloudTrail records all API calls made in your AWS account, including who performed the action, when, and what was changed. It is essential for auditing and tracking changes.",avoid:"Do not confuse CloudTrail with CloudWatch — CloudTrail records actions and API calls, while CloudWatch monitors metrics and performance. CloudTrail is not for monitoring CPU or memory usage."}}},
{en:"What are the benefits of AWS-managed services? (Choose TWO)",pt:"Quais sao os beneficios dos servicos gerenciados pela AWS? (Escolha DUAS)",o:{en:["Complete control over virtual infrastructure","Deliver new solutions faster","Lower operational complexity","Eliminate encryption needs","Control all patching activities"],pt:["Controle total sobre a infraestrutura virtual","Entregar novas solucoes mais rapido","Menor complexidade operacional","Eliminar a necessidade de criptografia","Controlar todas as atividades de patching"]},a:[1,2],multi:true,exp:{pt:{tech:"Servicos gerenciados reduzem a complexidade operacional e aceleram a entrega, pois a AWS cuida da infraestrutura subjacente.",simple:"Servicos gerenciados pela AWS reduzem a complexidade operacional porque a AWS cuida de tarefas como atualizacoes, backups e patches. Isso permite que sua equipe entregue novas solucoes mais rapidamente.",avoid:"Nao assuma que servicos gerenciados eliminam toda responsabilidade — voce ainda precisa configurar corretamente e gerenciar seus dados e permissoes. Tambem nao sao ideais quando voce precisa de personalizacao extrema do sistema operacional."},en:{tech:"Managed services reduce operational complexity and speed up delivery since AWS handles the underlying infrastructure.",simple:"AWS-managed services reduce operational complexity because AWS handles tasks like updates, backups, and patches. This allows your team to deliver new solutions faster.",avoid:"Do not assume managed services eliminate all responsibility — you still need to configure correctly and manage your data and permissions. They are also not ideal when you need extreme OS-level customization."}}},
{en:"Which of the following are valid Amazon S3 use cases? (Choose TWO)",pt:"Quais dos seguintes sao casos de uso validos do Amazon S3? (Escolha DUAS)",o:{en:["Hosting static websites","Hosting sites requiring sustained high CPU utilization","Cost-effective database and log storage","Media store for Amazon CloudFront","Processing data streams at any scale"],pt:["Hospedagem de sites estaticos","Hospedagem de sites que exigem alta utilizacao continua de CPU","Armazenamento economico de banco de dados e logs","Armazenamento de midia para o Amazon CloudFront","Processamento de fluxos de dados em qualquer escala"]},a:[0,3],multi:true,exp:{pt:{tech:"S3 e ideal para hospedagem de sites estaticos e como origem de conteudo para o CloudFront (CDN da AWS).",simple:"Amazon S3 pode hospedar sites estaticos (HTML, CSS, JS) e servir como armazenamento de midia para distribuicao via Amazon CloudFront. Ele armazena e entrega arquivos, mas nao executa codigo no servidor.",avoid:"Nao use S3 para hospedar aplicacoes dinamicas que precisam de processamento no servidor. Tambem nao confunda S3 com um banco de dados — ele armazena objetos (arquivos), nao registros estruturados."},en:{tech:"S3 is ideal for static website hosting and as a content origin for CloudFront (AWS CDN).",simple:"Amazon S3 can host static websites (HTML, CSS, JS) and serve as media storage for distribution via Amazon CloudFront. It stores and delivers files but does not execute server-side code.",avoid:"Do not use S3 to host dynamic applications that need server-side processing. Also do not confuse S3 with a database — it stores objects (files), not structured records."}}},
{en:"What is the best practice for managing AWS access keys?",pt:"Qual e a melhor pratica para gerenciar chaves de acesso da AWS?",o:{en:["Delete all access keys and use only passwords","Share keys only with trusted people","Rotate access keys regularly","Save access keys in application code"],pt:["Deletar todas as chaves de acesso e usar apenas senhas","Compartilhar chaves apenas com pessoas confiaveis","Rotacionar as chaves de acesso regularmente","Salvar as chaves de acesso no codigo da aplicacao"]},a:[2],exp:{pt:{tech:"A AWS recomenda rotacionar chaves de acesso regularmente para minimizar o risco de comprometimento.",simple:"A pratica recomendada e trocar (rotacionar) as chaves de acesso AWS regularmente para reduzir o risco de acesso nao autorizado. Se uma chave vazar, o impacto e limitado porque ela sera substituida em breve.",avoid:"Nao compartilhe chaves de acesso entre usuarios ou aplicacoes. Tambem nao mantenha chaves antigas ativas indefinidamente — chaves que nunca sao rotacionadas sao um risco de seguranca."},en:{tech:"AWS recommends rotating access keys regularly to minimize the risk of compromised credentials.",simple:"The best practice is to rotate AWS access keys regularly to reduce the risk of unauthorized access. If a key leaks, the impact is limited because it will be replaced soon.",avoid:"Do not share access keys between users or applications. Also do not keep old keys active indefinitely — keys that are never rotated are a security risk."}}},
{en:"What benefit does programmatic API access to AWS provide?",pt:"Qual beneficio o acesso programatico via API oferece na AWS?",o:{en:["Improves resource performance","Reduces provisioning time","Reduces developer count needed","Enables programmatic management of resources"],pt:["Melhora a performance dos recursos","Reduz o tempo de provisionamento","Reduz o numero de desenvolvedores necessarios","Permite o gerenciamento programatico dos recursos"]},a:[3],exp:{pt:{tech:"O acesso via API permite automatizar e gerenciar recursos AWS por meio de codigo, CLI ou SDKs.",simple:"O acesso programatico via API permite que voce gerencie recursos AWS usando codigo, scripts ou ferramentas de automacao em vez do console web. Isso possibilita automatizar tarefas repetitivas e integrar a AWS com outros sistemas.",avoid:"Nao use acesso programatico sem proteger adequadamente suas credenciais — chaves de API expostas em codigo publico sao uma das maiores causas de incidentes de seguranca. Tambem nao ignore o uso de IAM Roles quando possivel."},en:{tech:"API access allows you to automate and manage AWS resources through code, CLI, or SDKs.",simple:"Programmatic API access lets you manage AWS resources using code, scripts, or automation tools instead of the web console. This enables automating repetitive tasks and integrating AWS with other systems.",avoid:"Do not use programmatic access without properly securing your credentials — API keys exposed in public code are one of the biggest causes of security incidents. Also do not ignore using IAM Roles when possible."}}},
{en:"Which AWS service is best suited for a database with high read/write activity?",pt:"Qual servico da AWS e mais adequado para um banco de dados com alta atividade de leitura/escrita?",o:{en:["AWS Storage Gateway","Amazon S3","Amazon EBS","Amazon Glacier"],pt:["AWS Storage Gateway","Amazon S3","Amazon EBS","Amazon Glacier"]},a:[2],exp:{pt:{tech:"Amazon EBS fornece armazenamento em bloco de alta performance para instancias EC2, ideal para bancos de dados com alto I/O.",simple:"Amazon EBS (Elastic Block Store) fornece armazenamento em bloco persistente e de alta performance para instancias EC2. E ideal para bancos de dados com muita leitura e escrita porque oferece baixa latencia e IOPS consistente.",avoid:"Nao confunda EBS com S3 — EBS e armazenamento em bloco anexado a instancias EC2, enquanto S3 e armazenamento de objetos. Nao use EBS para compartilhar arquivos entre multiplas instancias simultaneamente — para isso, use EFS."},en:{tech:"Amazon EBS provides high-performance block storage for EC2 instances, ideal for databases with high I/O demands.",simple:"Amazon EBS (Elastic Block Store) provides persistent, high-performance block storage for EC2 instances. It is ideal for databases with heavy read and write activity because it offers low latency and consistent IOPS.",avoid:"Do not confuse EBS with S3 — EBS is block storage attached to EC2 instances, while S3 is object storage. Do not use EBS to share files across multiple instances simultaneously — for that, use EFS."}}},
{en:"After migrating from EC2 to Lambda, which responsibilities does AWS assume? (Choose TWO)",pt:"Ao migrar do EC2 para o Lambda, quais responsabilidades passam para a AWS? (Escolha DUAS)",o:{en:["Application management","Capacity management","Access control","Operating system maintenance","Data management"],pt:["Gerenciamento da aplicacao","Gerenciamento de capacidade","Controle de acesso","Manutencao do sistema operacional","Gerenciamento de dados"]},a:[1,3],multi:true,exp:{pt:{tech:"Com Lambda (serverless), a AWS gerencia capacidade e sistema operacional. O cliente cuida da aplicacao, acesso e dados.",simple:"Ao migrar de EC2 para Lambda, a AWS assume a responsabilidade pelo gerenciamento de capacidade (escalar recursos) e pela manutencao do sistema operacional. Voce nao precisa mais se preocupar com dimensionamento de servidores ou aplicar patches no SO.",avoid:"Nao assuma que Lambda elimina toda responsabilidade — voce ainda cuida do codigo da aplicacao, permissoes e configuracao de seguranca. Tambem nao migre para Lambda se sua aplicacao precisa de sessoes de longa duracao."},en:{tech:"With Lambda (serverless), AWS manages capacity and OS maintenance. The customer handles application, access, and data.",simple:"When migrating from EC2 to Lambda, AWS assumes responsibility for capacity management (scaling resources) and operating system maintenance. You no longer need to worry about server sizing or applying OS patches.",avoid:"Do not assume Lambda eliminates all responsibility — you still handle application code, permissions, and security configuration. Also do not migrate to Lambda if your application requires long-running sessions."}}},
{en:"What does the Elastic Load Balancer do to improve application reliability?",pt:"O que o Elastic Load Balancer faz para melhorar a confiabilidade da aplicacao?",o:{en:["Distributing traffic across S3 buckets","Replicating data to multiple Availability Zones","Creating database Read Replicas","Ensuring only healthy targets receive traffic"],pt:["Distribuir trafego entre buckets do S3","Replicar dados para multiplas Zonas de Disponibilidade","Criar Replicas de Leitura do banco de dados","Garantir que apenas alvos saudaveis recebam trafego"]},a:[3],exp:{pt:{tech:"O ELB faz health checks nos alvos e roteia trafego apenas para instancias saudaveis, melhorando a disponibilidade.",simple:"O Elastic Load Balancer verifica continuamente a saude das instancias de destino e envia trafego apenas para as que estao funcionando corretamente. Isso melhora a confiabilidade porque usuarios nunca sao direcionados a instancias com falha.",avoid:"Nao confunda ELB com Auto Scaling — o ELB distribui trafego, enquanto o Auto Scaling ajusta a quantidade de instancias. Tambem nao use ELB se voce tem apenas uma instancia sem necessidade de alta disponibilidade."},en:{tech:"ELB performs health checks on targets and routes traffic only to healthy instances, improving availability.",simple:"The Elastic Load Balancer continuously checks the health of target instances and sends traffic only to those that are working correctly. This improves reliability because users are never directed to failing instances.",avoid:"Do not confuse ELB with Auto Scaling — ELB distributes traffic, while Auto Scaling adjusts the number of instances. Also do not use ELB if you have only one instance with no high availability requirement."}}},
{en:"Which EC2 pricing option ensures hardware is not shared with other customers?",pt:"Qual opcao de precificacao do EC2 garante que o hardware nao seja compartilhado com outros clientes?",o:{en:["On-demand instances","Spot instances","Dedicated instances","Reserved instances"],pt:["Instancias On-Demand","Instancias Spot","Instancias Dedicadas","Instancias Reservadas"]},a:[2],exp:{pt:{tech:"Dedicated Instances rodam em hardware fisicamente isolado, dedicado a um unico cliente AWS.",simple:"Dedicated Instances rodam em hardware fisico que nao e compartilhado com outros clientes AWS. Isso garante isolamento a nivel de hardware para atender requisitos de conformidade ou licenciamento.",avoid:"Nao escolha Dedicated Instances apenas por performance — elas nao sao necessariamente mais rapidas que instancias compartilhadas. Use somente quando regulamentacoes ou licencas de software exigem isolamento de hardware."},en:{tech:"Dedicated Instances run on physically isolated hardware dedicated to a single AWS customer.",simple:"Dedicated Instances run on physical hardware that is not shared with other AWS customers. This ensures hardware-level isolation to meet compliance or licensing requirements.",avoid:"Do not choose Dedicated Instances just for performance — they are not necessarily faster than shared instances. Use them only when regulations or software licenses require hardware isolation."}}},
{en:"Which is the most cost-effective storage option for archiving data for 5 years?",pt:"Qual e a opcao de armazenamento mais economica para arquivar dados por 5 anos?",o:{en:["Amazon S3 Glacier","Amazon EFS","Amazon S3 Standard","Amazon EBS"],pt:["Amazon S3 Glacier","Amazon EFS","Amazon S3 Standard","Amazon EBS"]},a:[0],exp:{pt:{tech:"S3 Glacier oferece armazenamento de custo muito baixo para dados de arquivo com acesso raro, ideal para retencao de longo prazo.",simple:"Amazon S3 Glacier e uma classe de armazenamento de custo muito baixo projetada para dados que raramente sao acessados e podem ser arquivados por longos periodos. E ideal para retencao de dados por anos a um custo minimo.",avoid:"Nao use Glacier para dados que precisam ser acessados rapidamente — a recuperacao pode levar de minutos a horas. Tambem nao use para armazenamento de uso frequente, pois os custos de recuperacao seriam altos."},en:{tech:"S3 Glacier provides very low-cost storage for archival data with infrequent access, ideal for long-term retention.",simple:"Amazon S3 Glacier is a very low-cost storage class designed for data that is rarely accessed and can be archived for long periods. It is ideal for data retention over years at minimal cost.",avoid:"Do not use Glacier for data that needs to be accessed quickly — retrieval can take from minutes to hours. Also do not use it for frequently accessed storage, as retrieval costs would be high."}}},
{en:"Which AWS service is used for managing user permissions?",pt:"Qual servico da AWS e usado para gerenciar permissoes de usuarios?",o:{en:["Security Groups","Amazon ECS","AWS IAM","AWS Support"],pt:["Security Groups","Amazon ECS","AWS IAM","AWS Support"]},a:[2],exp:{pt:{tech:"AWS IAM (Identity and Access Management) permite criar e gerenciar usuarios, grupos e permissoes de acesso aos recursos.",simple:"AWS IAM (Identity and Access Management) e o servico que controla quem pode acessar sua conta AWS e o que cada usuario ou servico pode fazer. Voce cria usuarios, grupos e politicas de permissao pelo IAM.",avoid:"Nao de permissoes amplas demais — sempre siga o principio do menor privilegio, dando apenas o acesso necessario. Tambem nao use o usuario root para tarefas do dia a dia; crie usuarios IAM separados."},en:{tech:"AWS IAM (Identity and Access Management) lets you create and manage users, groups, and access permissions to resources.",simple:"AWS IAM (Identity and Access Management) is the service that controls who can access your AWS account and what each user or service can do. You create users, groups, and permission policies through IAM.",avoid:"Do not grant overly broad permissions — always follow the principle of least privilege, giving only the necessary access. Also do not use the root user for daily tasks; create separate IAM users instead."}}},
{en:"Which design principle helps minimize the impact of outages?",pt:"Qual principio de design ajuda a minimizar o impacto de interrupcoes?",o:{en:["Least Privilege","Pilot Light","Fault Tolerance","Multi-threading"],pt:["Menor Privilegio","Pilot Light","Tolerancia a Falhas","Multi-threading"]},a:[2],exp:{pt:{tech:"Fault Tolerance garante que o sistema continue operando mesmo quando componentes falham, usando redundancia.",simple:"Tolerancia a falhas e a capacidade de um sistema continuar funcionando mesmo quando um componente falha. Na AWS, isso e alcancado usando redundancia em multiplas Availability Zones e recursos de failover automatico.",avoid:"Nao confunda tolerancia a falhas com alta disponibilidade — tolerancia a falhas significa zero interrupcao durante uma falha, enquanto alta disponibilidade minimiza o tempo de inatividade. Nao ignore testes de falha; projete e teste cenarios de desastre regularmente."},en:{tech:"Fault Tolerance ensures the system continues operating even when components fail, through redundancy.",simple:"Fault tolerance is the ability of a system to continue operating even when a component fails. On AWS, this is achieved using redundancy across multiple Availability Zones and automatic failover features.",avoid:"Do not confuse fault tolerance with high availability — fault tolerance means zero disruption during a failure, while high availability minimizes downtime. Do not ignore failure testing; design and test disaster scenarios regularly."}}},
{en:"Which Reserved Instance payment option provides the largest discount?",pt:"Qual opcao de pagamento de Instancia Reservada oferece o maior desconto?",o:{en:["All up-front","All options provide the same discount","Partial up-front","No up-front"],pt:["Tudo antecipado","Todas as opcoes oferecem o mesmo desconto","Parcialmente antecipado","Sem pagamento antecipado"]},a:[0],exp:{pt:{tech:"O pagamento All Upfront de Reserved Instances oferece o maior desconto (ate 72%) comparado a Partial ou No Upfront.",simple:"A opcao de pagamento total antecipado (All Upfront) para Reserved Instances oferece o maior desconto porque voce paga o valor total no inicio do periodo. Quanto mais voce paga adiantado, maior a reducao no custo.",avoid:"Nao escolha All Upfront se voce nao tem certeza de que usara a instancia pelo periodo completo — o dinheiro pago nao e reembolsavel. Tambem nao use Reserved Instances para cargas de trabalho imprevisiveis ou temporarias."},en:{tech:"All Upfront payment for Reserved Instances offers the highest discount (up to 72%) compared to Partial or No Upfront.",simple:"The All Upfront payment option for Reserved Instances offers the largest discount because you pay the full amount at the start of the term. The more you pay in advance, the greater the cost reduction.",avoid:"Do not choose All Upfront if you are not sure you will use the instance for the full term — the money paid is non-refundable. Also do not use Reserved Instances for unpredictable or temporary workloads."}}},
{en:"Which of the following are AWS data protection features? (Choose TWO)",pt:"Quais das alternativas a seguir sao recursos de protecao de dados da AWS? (Escolha DUAS)",o:{en:["Access control","Physical MFA devices","Data encryption","Unlimited storage","Load balancing"],pt:["Controle de acesso","Dispositivos MFA fisicos","Criptografia de dados","Armazenamento ilimitado","Balanceamento de carga"]},a:[0,2],multi:true,exp:{pt:{tech:"Controle de acesso (IAM) e criptografia (em repouso e em transito) sao os principais mecanismos de protecao de dados na AWS.",simple:"Controle de acesso restringe quem pode ver ou modificar seus dados, e criptografia transforma os dados em formato ilegivel para quem nao tem a chave de decodificacao. Juntos, esses recursos protegem dados em repouso e em transito na AWS.",avoid:"Nao confie apenas em um metodo de protecao — use controle de acesso E criptografia juntos. Tambem nao esqueca de criptografar dados em transito (entre servicos), nao apenas em repouso."},en:{tech:"Access control (IAM) and encryption (at rest and in transit) are the primary data protection mechanisms in AWS.",simple:"Access control restricts who can view or modify your data, and encryption transforms data into an unreadable format for anyone without the decryption key. Together, these features protect data at rest and in transit on AWS.",avoid:"Do not rely on just one protection method — use access control AND encryption together. Also do not forget to encrypt data in transit (between services), not just at rest."}}},
{en:"Which IAM entity should be used to grant temporary access to AWS resources?",pt:"Qual entidade do IAM deve ser usada para conceder acesso temporario aos recursos da AWS?",o:{en:["IAM Users","Key Pair","IAM Roles","IAM Groups"],pt:["Usuarios IAM","Par de Chaves","Funcoes IAM (Roles)","Grupos IAM"]},a:[2],exp:{pt:{tech:"IAM Roles fornecem credenciais temporarias que sao rotacionadas automaticamente, ideais para acesso temporario.",simple:"IAM Roles fornecem credenciais temporarias que expiram automaticamente, sem necessidade de armazenar senhas ou chaves de acesso. Sao ideais para conceder acesso a servicos AWS, aplicacoes ou usuarios federados.",avoid:"Nao use usuarios IAM com chaves de acesso permanentes quando voce pode usar Roles com credenciais temporarias. Tambem nao confunda Roles com Groups — Groups organizam usuarios, Roles concedem acesso temporario."},en:{tech:"IAM Roles provide temporary credentials that are automatically rotated, ideal for granting temporary access.",simple:"IAM Roles provide temporary credentials that expire automatically, without needing to store passwords or access keys. They are ideal for granting access to AWS services, applications, or federated users.",avoid:"Do not use IAM users with permanent access keys when you can use Roles with temporary credentials. Also do not confuse Roles with Groups — Groups organize users, Roles grant temporary access."}}},
