{en:"Which of the following are valid Amazon S3 use cases? (Choose TWO)",pt:"Quais dos seguintes sao casos de uso validos do Amazon S3? (Escolha DUAS)",o:{en:["Hosting static websites","Hosting sites requiring sustained high CPU utilization","Cost-effective database and log storage","Media store for Amazon CloudFront","Processing data streams at any scale"],pt:["Hospedagem de sites estaticos","Hospedagem de sites que exigem alta utilizacao continua de CPU","Armazenamento economico de banco de dados e logs","Armazenamento de midia para o Amazon CloudFront","Processamento de fluxos de dados em qualquer escala"]},a:[0,3],multi:true,exp:{pt:{tech:"S3 e ideal para hospedagem de sites estaticos e como origem de conteudo para o CloudFront (CDN da AWS).",simple:"S3 e como um armario gigante na nuvem — otimo para guardar arquivos e servir sites simples, mas nao roda programas."},en:{tech:"S3 is ideal for static website hosting and as a content origin for CloudFront (AWS CDN).",simple:"S3 is like a giant cloud storage locker — great for storing files and serving simple websites, but it does not run programs."}}},
{en:"What is the best practice for managing AWS access keys?",pt:"Qual e a melhor pratica para gerenciar chaves de acesso da AWS?",o:{en:["Delete all access keys and use only passwords","Share keys only with trusted people","Rotate access keys regularly","Save access keys in application code"],pt:["Deletar todas as chaves de acesso e usar apenas senhas","Compartilhar chaves apenas com pessoas confiaveis","Rotacionar as chaves de acesso regularmente","Salvar as chaves de acesso no codigo da aplicacao"]},a:[2],exp:{pt:{tech:"A AWS recomenda rotacionar chaves de acesso regularmente para minimizar o risco de comprometimento.",simple:"Trocar as chaves regularmente e como trocar a senha do Wi-Fi de tempos em tempos — evita que alguem use sem voce saber."},en:{tech:"AWS recommends rotating access keys regularly to minimize the risk of compromised credentials.",simple:"Rotating keys regularly is like changing your Wi-Fi password periodically — it prevents unauthorized use."}}},
{en:"What benefit does programmatic API access to AWS provide?",pt:"Qual beneficio o acesso programatico via API oferece na AWS?",o:{en:["Improves resource performance","Reduces provisioning time","Reduces developer count needed","Enables programmatic management of resources"],pt:["Melhora a performance dos recursos","Reduz o tempo de provisionamento","Reduz o numero de desenvolvedores necessarios","Permite o gerenciamento programatico dos recursos"]},a:[3],exp:{pt:{tech:"O acesso via API permite automatizar e gerenciar recursos AWS por meio de codigo, CLI ou SDKs.",simple:"API e como um controle remoto para a AWS — em vez de clicar em botoes, voce manda comandos por codigo."},en:{tech:"API access allows you to automate and manage AWS resources through code, CLI, or SDKs.",simple:"The API is like a remote control for AWS — instead of clicking buttons, you send commands through code."}}},
{en:"Which AWS service is best suited for a database with high read/write activity?",pt:"Qual servico da AWS e mais adequado para um banco de dados com alta atividade de leitura/escrita?",o:{en:["AWS Storage Gateway","Amazon S3","Amazon EBS","Amazon Glacier"],pt:["AWS Storage Gateway","Amazon S3","Amazon EBS","Amazon Glacier"]},a:[2],exp:{pt:{tech:"Amazon EBS fornece armazenamento em bloco de alta performance para instancias EC2, ideal para bancos de dados com alto I/O.",simple:"EBS e como um SSD conectado direto ao seu servidor — rapido o suficiente para bancos de dados que leem e escrevem o tempo todo."},en:{tech:"Amazon EBS provides high-performance block storage for EC2 instances, ideal for databases with high I/O demands.",simple:"EBS is like an SSD directly attached to your server — fast enough for databases that read and write constantly."}}},
{en:"After migrating from EC2 to Lambda, which responsibilities does AWS assume? (Choose TWO)",pt:"Ao migrar do EC2 para o Lambda, quais responsabilidades passam para a AWS? (Escolha DUAS)",o:{en:["Application management","Capacity management","Access control","Operating system maintenance","Data management"],pt:["Gerenciamento da aplicacao","Gerenciamento de capacidade","Controle de acesso","Manutencao do sistema operacional","Gerenciamento de dados"]},a:[1,3],multi:true,exp:{pt:{tech:"Com Lambda (serverless), a AWS gerencia capacidade e sistema operacional. O cliente cuida da aplicacao, acesso e dados.",simple:"Lambda e como um taxi — voce nao se preocupa com gasolina nem manutencao do carro, so diz pra onde quer ir."},en:{tech:"With Lambda (serverless), AWS manages capacity and OS maintenance. The customer handles application, access, and data.",simple:"Lambda is like a taxi — you do not worry about fuel or car maintenance, you just say where you want to go."}}},
{en:"What does the Elastic Load Balancer do to improve application reliability?",pt:"O que o Elastic Load Balancer faz para melhorar a confiabilidade da aplicacao?",o:{en:["Distributing traffic across S3 buckets","Replicating data to multiple Availability Zones","Creating database Read Replicas","Ensuring only healthy targets receive traffic"],pt:["Distribuir trafego entre buckets do S3","Replicar dados para multiplas Zonas de Disponibilidade","Criar Replicas de Leitura do banco de dados","Garantir que apenas alvos saudaveis recebam trafego"]},a:[3],exp:{pt:{tech:"O ELB faz health checks nos alvos e roteia trafego apenas para instancias saudaveis, melhorando a disponibilidade.",simple:"ELB e como um garcom esperto — so manda clientes para mesas que estao funcionando, nunca para as quebradas."},en:{tech:"ELB performs health checks on targets and routes traffic only to healthy instances, improving availability.",simple:"ELB is like a smart host at a restaurant — it only seats guests at tables that are working, never at broken ones."}}},
{en:"Which EC2 pricing option ensures hardware is not shared with other customers?",pt:"Qual opcao de precificacao do EC2 garante que o hardware nao seja compartilhado com outros clientes?",o:{en:["On-demand instances","Spot instances","Dedicated instances","Reserved instances"],pt:["Instancias On-Demand","Instancias Spot","Instancias Dedicadas","Instancias Reservadas"]},a:[2],exp:{pt:{tech:"Dedicated Instances rodam em hardware fisicamente isolado, dedicado a um unico cliente AWS.",simple:"Dedicated Instance e como alugar uma casa inteira em vez de um quarto em hotel — o espaco e so seu."},en:{tech:"Dedicated Instances run on physically isolated hardware dedicated to a single AWS customer.",simple:"A Dedicated Instance is like renting an entire house instead of a hotel room — the space is exclusively yours."}}},
{en:"Which is the most cost-effective storage option for archiving data for 5 years?",pt:"Qual e a opcao de armazenamento mais economica para arquivar dados por 5 anos?",o:{en:["Amazon S3 Glacier","Amazon EFS","Amazon S3 Standard","Amazon EBS"],pt:["Amazon S3 Glacier","Amazon EFS","Amazon S3 Standard","Amazon EBS"]},a:[0],exp:{pt:{tech:"S3 Glacier oferece armazenamento de custo muito baixo para dados de arquivo com acesso raro, ideal para retencao de longo prazo.",simple:"Glacier e como um deposito barato para guardar caixas que voce quase nunca abre — perfeito para arquivos de anos."},en:{tech:"S3 Glacier provides very low-cost storage for archival data with infrequent access, ideal for long-term retention.",simple:"Glacier is like a cheap storage unit for boxes you rarely open — perfect for years-old archives."}}},
{en:"Which AWS service is used for managing user permissions?",pt:"Qual servico da AWS e usado para gerenciar permissoes de usuarios?",o:{en:["Security Groups","Amazon ECS","AWS IAM","AWS Support"],pt:["Security Groups","Amazon ECS","AWS IAM","AWS Support"]},a:[2],exp:{pt:{tech:"AWS IAM (Identity and Access Management) permite criar e gerenciar usuarios, grupos e permissoes de acesso aos recursos.",simple:"IAM e como o seguranca do predio — decide quem entra, onde pode ir e o que pode fazer."},en:{tech:"AWS IAM (Identity and Access Management) lets you create and manage users, groups, and access permissions to resources.",simple:"IAM is like the building security guard — it decides who gets in, where they can go, and what they can do."}}},
{en:"Which design principle helps minimize the impact of outages?",pt:"Qual principio de design ajuda a minimizar o impacto de interrupcoes?",o:{en:["Least Privilege","Pilot Light","Fault Tolerance","Multi-threading"],pt:["Menor Privilegio","Pilot Light","Tolerancia a Falhas","Multi-threading"]},a:[2],exp:{pt:{tech:"Fault Tolerance garante que o sistema continue operando mesmo quando componentes falham, usando redundancia.",simple:"Tolerancia a falhas e como ter um gerador em casa — se a luz cai, tudo continua funcionando."},en:{tech:"Fault Tolerance ensures the system continues operating even when components fail, through redundancy.",simple:"Fault Tolerance is like having a backup generator at home — if the power goes out, everything keeps running."}}},
{en:"Which Reserved Instance payment option provides the largest discount?",pt:"Qual opcao de pagamento de Instancia Reservada oferece o maior desconto?",o:{en:["All up-front","All options provide the same discount","Partial up-front","No up-front"],pt:["Tudo antecipado","Todas as opcoes oferecem o mesmo desconto","Parcialmente antecipado","Sem pagamento antecipado"]},a:[0],exp:{pt:{tech:"O pagamento All Upfront de Reserved Instances oferece o maior desconto (ate 72%) comparado a Partial ou No Upfront.",simple:"Pagar tudo de uma vez e como comprar a vista — quanto mais voce paga adiantado, maior o desconto."},en:{tech:"All Upfront payment for Reserved Instances offers the highest discount (up to 72%) compared to Partial or No Upfront.",simple:"Paying everything upfront is like buying in cash — the more you pay in advance, the bigger your discount."}}},
{en:"Which of the following are AWS data protection features? (Choose TWO)",pt:"Quais das alternativas a seguir sao recursos de protecao de dados da AWS? (Escolha DUAS)",o:{en:["Access control","Physical MFA devices","Data encryption","Unlimited storage","Load balancing"],pt:["Controle de acesso","Dispositivos MFA fisicos","Criptografia de dados","Armazenamento ilimitado","Balanceamento de carga"]},a:[0,2],multi:true,exp:{pt:{tech:"Controle de acesso (IAM) e criptografia (em repouso e em transito) sao os principais mecanismos de protecao de dados na AWS.",simple:"Proteger dados e como proteger uma casa — voce tranca a porta (controle de acesso) e guarda coisas no cofre (criptografia)."},en:{tech:"Access control (IAM) and encryption (at rest and in transit) are the primary data protection mechanisms in AWS.",simple:"Protecting data is like protecting a house — you lock the door (access control) and keep valuables in a safe (encryption)."}}},
{en:"Which IAM entity should be used to grant temporary access to AWS resources?",pt:"Qual entidade do IAM deve ser usada para conceder acesso temporario aos recursos da AWS?",o:{en:["IAM Users","Key Pair","IAM Roles","IAM Groups"],pt:["Usuarios IAM","Par de Chaves","Funcoes IAM (Roles)","Grupos IAM"]},a:[2],exp:{pt:{tech:"IAM Roles fornecem credenciais temporarias que sao rotacionadas automaticamente, ideais para acesso temporario.",simple:"IAM Role e como um cracha de visitante — da acesso temporario e expira automaticamente."},en:{tech:"IAM Roles provide temporary credentials that are automatically rotated, ideal for granting temporary access.",simple:"An IAM Role is like a visitor badge — it grants temporary access and expires automatically."}}},
{en:"Which AWS service distributes incoming traffic across multiple EC2 instances?",pt:"Qual servico da AWS distribui o trafego de entrada entre varias instancias EC2?",o:{en:["AWS Global Accelerator","AWS Application Load Balancer","Amazon CloudFront","Transit VPC"],pt:["AWS Global Accelerator","AWS Application Load Balancer","Amazon CloudFront","Transit VPC"]},a:[1],exp:{pt:{tech:"O Application Load Balancer (ALB) opera na camada 7 e distribui trafego HTTP/HTTPS entre instancias EC2.",simple:"ALB e como um recepcionista que distribui clientes entre varios atendentes para ninguem ficar sobrecarregado."},en:{tech:"The Application Load Balancer (ALB) operates at layer 7 and distributes HTTP/HTTPS traffic across EC2 instances.",simple:"ALB is like a receptionist distributing customers among multiple service agents so no one gets overwhelmed."}}},
{en:"Which option helps secure an AWS account from unauthorized access?",pt:"Qual opcao ajuda a proteger uma conta AWS contra acesso nao autorizado?",o:{en:["Restrict all SDK and CLI API calls","Share IAM accounts organized by department","Require MFA for all IAM User access","Set up two different login passwords"],pt:["Restringir todas as chamadas de API do SDK e CLI","Compartilhar contas IAM organizadas por departamento","Exigir MFA para todo acesso de usuarios IAM","Configurar duas senhas de login diferentes"]},a:[2],exp:{pt:{tech:"MFA adiciona uma camada extra de seguranca exigindo um segundo fator alem da senha para autenticacao.",simple:"MFA e como ter duas fechaduras na porta — mesmo que alguem descubra sua senha, precisa do segundo codigo."},en:{tech:"MFA adds an extra security layer by requiring a second factor beyond the password for authentication.",simple:"MFA is like having two locks on your door — even if someone discovers your password, they need the second code."}}},
{en:"Which AWS service offers volume-based discounts as usage increases?",pt:"Qual servico da AWS oferece descontos baseados em volume conforme o uso aumenta?",o:{en:["Amazon VPC","Amazon S3","Amazon Lightsail","AWS Cost Explorer"],pt:["Amazon VPC","Amazon S3","Amazon Lightsail","AWS Cost Explorer"]},a:[1],exp:{pt:{tech:"O Amazon S3 usa precificacao em camadas — quanto mais dados voce armazena, menor o custo por GB.",simple:"S3 e como comprar no atacado — quanto mais voce guarda, mais barato fica o preco por unidade."},en:{tech:"Amazon S3 uses tiered pricing — the more data you store, the lower the cost per GB.",simple:"S3 is like buying wholesale — the more you store, the cheaper the price per unit."}}},
{en:"Which factors should be considered when choosing an AWS Region for deployment? (Choose TWO)",pt:"Quais fatores devem ser considerados ao escolher uma Regiao AWS para implantacao? (Escolha DUAS)",o:{en:["The security level of the region","Data sovereignty and compliance requirements","Cost of services in the region","Number of available VPCs","Geographic proximity to users"],pt:["O nivel de seguranca da regiao","Requisitos de soberania de dados e conformidade","Custo dos servicos na regiao","Numero de VPCs disponiveis","Proximidade geografica dos usuarios"]},a:[1,2],multi:true,exp:{pt:{tech:"A escolha de regiao deve considerar conformidade com leis de dados locais e custo, que varia entre regioes.",simple:"Escolher uma regiao AWS e como escolher onde abrir uma loja — voce pensa nas leis locais e no custo do aluguel."},en:{tech:"Region selection should consider compliance with local data laws and cost, which varies between regions.",simple:"Choosing an AWS Region is like choosing where to open a store — you think about local laws and rental costs."}}},
{en:"Which AWS service provides in-memory caching to improve MySQL database performance?",pt:"Qual servico da AWS fornece cache em memoria para melhorar a performance de bancos MySQL?",o:{en:["Amazon EFS","Amazon Neptune","Amazon ElastiCache","Amazon DAX"],pt:["Amazon EFS","Amazon Neptune","Amazon ElastiCache","Amazon DAX"]},a:[2],exp:{pt:{tech:"Amazon ElastiCache suporta Redis e Memcached para cache em memoria, reduzindo a carga em bancos relacionais como MySQL.",simple:"ElastiCache e como uma mesa de apoio perto de voce com as coisas que voce mais usa — evita ir ate o armario toda hora."},en:{tech:"Amazon ElastiCache supports Redis and Memcached for in-memory caching, reducing load on relational databases like MySQL.",simple:"ElastiCache is like a side table with your most-used items — it saves you from going to the cabinet every time."}}},
{en:"Which are the customer responsibilities for security IN the cloud? (Choose TWO)",pt:"Quais sao as responsabilidades do cliente pela seguranca NA nuvem? (Escolha DUAS)",o:{en:["Building the application schema","Replacing faulty physical hardware","Creating the hypervisor","Patch management of underlying infrastructure","File system encryption"],pt:["Construir o esquema da aplicacao","Substituir hardware fisico com defeito","Criar o hypervisor","Gerenciamento de patches da infraestrutura subjacente","Criptografia do sistema de arquivos"]},a:[0,4],multi:true,exp:{pt:{tech:"No modelo de responsabilidade compartilhada, o cliente cuida dos dados, aplicacao, criptografia e configuracao de acesso.",simple:"Seguranca na nuvem e como alugar um escritorio — o predio cuida das paredes, mas voce tranca sua sala e protege seus documentos."},en:{tech:"In the shared responsibility model, the customer handles data, application, encryption, and access configuration.",simple:"Cloud security is like renting an office — the building maintains the walls, but you lock your room and protect your documents."}}},
{en:"Which AWS service enables quick deployment of .NET applications?",pt:"Qual servico da AWS permite implantar aplicacoes .NET rapidamente?",o:{en:["Amazon SNS","AWS Elastic Beanstalk","AWS Systems Manager","AWS Trusted Advisor"],pt:["Amazon SNS","AWS Elastic Beanstalk","AWS Systems Manager","AWS Trusted Advisor"]},a:[1],exp:{pt:{tech:"Elastic Beanstalk faz deploy automatico de aplicacoes .NET, Java, Node.js e outras, gerenciando a infraestrutura.",simple:"Beanstalk e como um garcom automatico — voce entrega o prato pronto (codigo) e ele serve na mesa (infraestrutura) sozinho."},en:{tech:"Elastic Beanstalk automatically deploys .NET, Java, Node.js and other applications, managing the underlying infrastructure.",simple:"Beanstalk is like an automatic waiter — you hand over the dish (code) and it serves it at the table (infrastructure) by itself."}}},
{en:"Which AWS service extends on-premises storage to the AWS Cloud?",pt:"Qual servico da AWS estende o armazenamento local para a nuvem AWS?",o:{en:["AWS Data Pipeline","AWS Storage Gateway","Amazon Aurora","Amazon EFS"],pt:["AWS Data Pipeline","AWS Storage Gateway","Amazon Aurora","Amazon EFS"]},a:[1],exp:{pt:{tech:"AWS Storage Gateway conecta ambientes on-premises ao armazenamento em nuvem da AWS de forma transparente.",simple:"Storage Gateway e como uma ponte entre seu armario em casa e um deposito na nuvem — voce usa os dois como se fossem um so."},en:{tech:"AWS Storage Gateway seamlessly connects on-premises environments to AWS cloud storage.",simple:"Storage Gateway is like a bridge between your home closet and a cloud warehouse — you use both as if they were one."}}},
{en:"Which AWS service provides access logs and records for auditing purposes?",pt:"Qual servico da AWS fornece logs de acesso e registros para fins de auditoria?",o:{en:["AWS CloudTrail","Amazon CloudFront","AWS CloudFormation","Amazon CloudWatch"],pt:["AWS CloudTrail","Amazon CloudFront","AWS CloudFormation","Amazon CloudWatch"]},a:[0],exp:{pt:{tech:"AWS CloudTrail registra todas as acoes realizadas na conta AWS, essencial para auditorias e investigacoes de seguranca.",simple:"CloudTrail e como o livro de registro de um porteiro — anota quem entrou, o que fez e quando saiu."},en:{tech:"AWS CloudTrail records all actions performed in the AWS account, essential for audits and security investigations.",simple:"CloudTrail is like a doorman logbook — it writes down who entered, what they did, and when they left."}}},
{en:"What is the best practice for building highly available applications on AWS?",pt:"Qual e a melhor pratica para construir aplicacoes de alta disponibilidade na AWS?",o:{en:["Deploy to at least two Availability Zones","Use Elastic Load Balancing across multiple Regions","Deploy code on two servers in the same Availability Zone","Rewrite the application code to handle all requests"],pt:["Implantar em pelo menos duas Zonas de Disponibilidade","Usar Elastic Load Balancing entre multiplas Regioes","Implantar codigo em dois servidores na mesma Zona de Disponibilidade","Reescrever o codigo da aplicacao para lidar com todas as requisicoes"]},a:[0],exp:{pt:{tech:"Implantar em pelo menos duas AZs garante que a aplicacao continue disponivel mesmo se uma AZ falhar.",simple:"Usar duas AZs e como ter dois geradores — se um falha, o outro assume e ninguem fica no escuro."},en:{tech:"Deploying to at least two AZs ensures the application remains available even if one AZ fails.",simple:"Using two AZs is like having two generators — if one fails, the other takes over and nobody loses power."}}},
{en:"Which factors should be considered in a Total Cost of Ownership (TCO) analysis? (Choose TWO)",pt:"Quais fatores devem ser considerados em uma analise de Custo Total de Propriedade (TCO)? (Escolha DUAS)",o:{en:["Labor costs and IT overhead","Cooling and power consumption","Amazon EBS computing power","Software architecture design","Software compatibility testing"],pt:["Custos de mao de obra e overhead de TI","Custos de refrigeracao e consumo de energia","Poder computacional do Amazon EBS","Design de arquitetura de software","Testes de compatibilidade de software"]},a:[0,1],multi:true,exp:{pt:{tech:"TCO inclui custos de mao de obra, energia, refrigeracao, espaco fisico e hardware — custos que a nuvem elimina ou reduz.",simple:"TCO e como calcular o custo real de ter um carro — nao e so a gasolina, tem seguro, manutencao, estacionamento..."},en:{tech:"TCO includes labor, power, cooling, physical space, and hardware costs — costs that the cloud eliminates or reduces.",simple:"TCO is like calculating the real cost of owning a car — it is not just gas, there is insurance, maintenance, parking..."}}},
{en:"Which support plan is required for a response time of less than 15 minutes for critical issues?",pt:"Qual plano de suporte e necessario para um tempo de resposta inferior a 15 minutos em problemas criticos?",o:{en:["AWS Basic Support","AWS Developer Support","AWS Business Support","AWS Enterprise Support"],pt:["AWS Basic Support","AWS Developer Support","AWS Business Support","AWS Enterprise Support"]},a:[3],exp:{pt:{tech:"O plano Enterprise oferece tempo de resposta inferior a 15 minutos para casos criticos de negocio.",simple:"Enterprise e como ter um medico de plantao 24h — para emergencias graves, o atendimento e quase imediato."},en:{tech:"The Enterprise plan offers a response time of less than 15 minutes for business-critical cases.",simple:"Enterprise is like having a doctor on call 24/7 — for critical emergencies, the response is almost immediate."}}},
{en:"Which of the following are serverless AWS offerings? (Choose TWO)",pt:"Quais das alternativas a seguir sao ofertas serverless da AWS? (Escolha DUAS)",o:{en:["Amazon EC2","AWS Lambda","Amazon DynamoDB","Amazon EMR","Amazon RDS"],pt:["Amazon EC2","AWS Lambda","Amazon DynamoDB","Amazon EMR","Amazon RDS"]},a:[1,2],multi:true,exp:{pt:{tech:"Lambda e DynamoDB sao serverless — nao exigem gerenciamento de servidores. EC2, EMR e RDS exigem.",simple:"Serverless e como pedir comida por delivery — voce nao precisa ter cozinha. Lambda e DynamoDB funcionam assim."},en:{tech:"Lambda and DynamoDB are serverless — they require no server management. EC2, EMR, and RDS require it.",simple:"Serverless is like ordering food delivery — you do not need a kitchen. Lambda and DynamoDB work this way."}}},
{en:"Which AWS service is used to deploy SSL/TLS certificates?",pt:"Qual servico da AWS e usado para implantar certificados SSL/TLS?",o:{en:["Amazon GuardDuty","AWS Certificate Manager (ACM)","Amazon Detective","AWS WAF"],pt:["Amazon GuardDuty","AWS Certificate Manager (ACM)","Amazon Detective","AWS WAF"]},a:[1],exp:{pt:{tech:"O AWS ACM provisiona, gerencia e implanta certificados SSL/TLS publicos e privados gratuitamente para servicos AWS.",simple:"ACM e como um cartorio digital — emite e renova seus certificados de seguranca automaticamente e de graca."},en:{tech:"AWS ACM provisions, manages, and deploys public and private SSL/TLS certificates for free on AWS services.",simple:"ACM is like a digital notary — it issues and renews your security certificates automatically and for free."}}},
{en:"Which EC2 pricing option is most cost-effective for continuous and predictable compute capacity?",pt:"Qual opcao de precificacao do EC2 e mais economica para capacidade computacional continua e previsivel?",o:{en:["On-demand Instances","Dedicated Hosts","Spot Instances","Reserved Instances"],pt:["Instancias On-Demand","Dedicated Hosts","Instancias Spot","Instancias Reservadas"]},a:[3],exp:{pt:{tech:"Reserved Instances oferecem ate 72% de desconto em troca de compromisso de 1 ou 3 anos, ideal para cargas previsiveis.",simple:"Reserved Instance e como assinar um plano anual de academia — sai muito mais barato do que pagar a diaria todo dia."},en:{tech:"Reserved Instances offer up to 72% discount in exchange for a 1 or 3-year commitment, ideal for predictable workloads.",simple:"A Reserved Instance is like signing an annual gym membership — much cheaper than paying the daily rate every day."}}},
{en:"What is the best practice for granting permissions to applications running on EC2?",pt:"Qual e a melhor pratica para conceder permissoes a aplicacoes rodando no EC2?",o:{en:["Generate new key pairs for each delegation","Store AWS credentials directly in application code","Use temporary security credentials through IAM Roles","Applications running on EC2 do not need permissions"],pt:["Gerar novos pares de chaves para cada delegacao","Armazenar credenciais AWS diretamente no codigo da aplicacao","Usar credenciais temporarias atraves de IAM Roles","Aplicacoes no EC2 nao precisam de permissoes"]},a:[2],exp:{pt:{tech:"IAM Roles fornecem credenciais temporarias rotacionadas automaticamente, eliminando a necessidade de chaves fixas no codigo.",simple:"IAM Role e como um cracha temporario — a aplicacao recebe acesso sem precisar guardar senha nenhuma."},en:{tech:"IAM Roles provide temporary credentials that are automatically rotated, eliminating the need for hardcoded keys.",simple:"An IAM Role is like a temporary badge — the application gets access without needing to store any password."}}},
{en:"Which AWS service is used for decoupling monolithic applications?",pt:"Qual servico da AWS e usado para desacoplar aplicacoes monoliticas?",o:{en:["Amazon SQS","Virtual Private Gateway","AWS Artifact","Amazon CloudFront"],pt:["Amazon SQS","Virtual Private Gateway","AWS Artifact","Amazon CloudFront"]},a:[0],exp:{pt:{tech:"Amazon SQS e um servico de filas que permite desacoplar componentes de aplicacoes, processando mensagens de forma assincrona.",simple:"SQS e como uma caixa de correio entre departamentos — cada um trabalha no seu ritmo sem precisar esperar o outro."},en:{tech:"Amazon SQS is a queue service that decouples application components, processing messages asynchronously.",simple:"SQS is like a mailbox between departments — each one works at its own pace without waiting for the other."}}},
{en:"Which AWS service offers an NFS-compatible file system?",pt:"Qual servico da AWS oferece um sistema de arquivos compativel com NFS?",o:{en:["Amazon EFS","Amazon S3","Amazon EBS","AWS Storage Gateway"],pt:["Amazon EFS","Amazon S3","Amazon EBS","AWS Storage Gateway"]},a:[0],exp:{pt:{tech:"Amazon EFS (Elastic File System) fornece um sistema de arquivos NFS elastico e escalavel para uso com EC2.",simple:"EFS e como uma pasta compartilhada na rede — varios computadores podem acessar os mesmos arquivos ao mesmo tempo."},en:{tech:"Amazon EFS (Elastic File System) provides an elastic, scalable NFS file system for use with EC2 instances.",simple:"EFS is like a shared network folder — multiple computers can access the same files at the same time."}}},
{en:"What is the benefit of low-latency connections between Availability Zones?",pt:"Qual e o beneficio de conexoes de baixa latencia entre Zonas de Disponibilidade?",o:{en:["Create a private connection to a data center","Achieve high availability globally","Automate the provisioning of new resources","Enable synchronous data replication across AZs"],pt:["Criar uma conexao privada com um data center","Obter alta disponibilidade global","Automatizar o provisionamento de novos recursos","Permitir replicacao sincrona de dados entre AZs"]},a:[3],exp:{pt:{tech:"Conexoes de baixa latencia entre AZs permitem replicacao sincrona, garantindo consistencia de dados em tempo real.",simple:"Baixa latencia entre AZs e como ter dois escritorios no mesmo predio — a comunicacao e tao rapida que ambos ficam sempre sincronizados."},en:{tech:"Low-latency connections between AZs enable synchronous replication, ensuring real-time data consistency.",simple:"Low latency between AZs is like having two offices in the same building — communication is so fast they always stay in sync."}}},
{en:"Which tool should you use to estimate the costs of Amazon S3 and CloudFront?",pt:"Qual ferramenta voce deve usar para estimar os custos do Amazon S3 e CloudFront?",o:{en:["AWS Cost Explorer","AWS Pricing Calculator","AWS Budgets","AWS Cost and Usage Report"],pt:["AWS Cost Explorer","AWS Pricing Calculator","AWS Budgets","AWS Cost and Usage Report"]},a:[1],exp:{pt:{tech:"O AWS Pricing Calculator permite estimar custos antes de usar os servicos, com base em configuracoes e uso previsto.",simple:"Pricing Calculator e como um simulador de financiamento — voce monta o cenario e ve quanto vai custar antes de comprar."},en:{tech:"AWS Pricing Calculator lets you estimate costs before using services, based on configurations and expected usage.",simple:"Pricing Calculator is like a loan simulator — you set up the scenario and see how much it will cost before buying."}}},
{en:"What is the practice of minimizing dependencies between application components called?",pt:"Qual e a pratica de minimizar dependencias entre componentes de uma aplicacao?",o:{en:["Elastic coupling","Loosely coupling","Scalable coupling","Tightly coupling"],pt:["Acoplamento elastico","Acoplamento fraco","Acoplamento escalavel","Acoplamento forte"]},a:[1],exp:{pt:{tech:"Loosely coupling reduz dependencias entre componentes, permitindo que cada um funcione, escale e falhe independentemente.",simple:"Acoplamento fraco e como blocos de LEGO — cada peca funciona sozinha e voce pode trocar uma sem quebrar o resto."},en:{tech:"Loose coupling reduces dependencies between components, allowing each to function, scale, and fail independently.",simple:"Loose coupling is like LEGO blocks — each piece works on its own and you can swap one without breaking the rest."}}},
{en:"Which statement is true about Availability Zones and Edge Locations?",pt:"Qual afirmacao e verdadeira sobre Zonas de Disponibilidade e Edge Locations?",o:{en:["Edge locations are located in separate Availability Zones worldwide","An Availability Zone exists within an edge location","An Availability Zone is a geographic location with multiple edge locations","An AZ is an isolated location within a Region and edge locations deliver content in multiple cities worldwide"],pt:["Edge locations ficam em Zonas de Disponibilidade separadas pelo mundo","Uma Zona de Disponibilidade existe dentro de uma edge location","Uma Zona de Disponibilidade e uma localizacao geografica com multiplas edge locations","Uma AZ e um local isolado dentro de uma Regiao e edge locations entregam conteudo em multiplas cidades no mundo"]},a:[3],exp:{pt:{tech:"AZs sao data centers isolados dentro de Regioes. Edge Locations sao pontos de presenca do CloudFront espalhados globalmente.",simple:"AZs sao como filiais do banco numa cidade. Edge Locations sao como caixas eletronicos espalhados pelo mundo todo."},en:{tech:"AZs are isolated data centers within Regions. Edge Locations are CloudFront points of presence spread globally.",simple:"AZs are like bank branches in a city. Edge Locations are like ATMs scattered around the world."}}},
{en:"Which features are included in the AWS Business Support Plan? (Choose TWO)",pt:"Quais recursos estao incluidos no plano AWS Business Support? (Escolha DUAS)",o:{en:["24x7 access to customer service","Access to Cloud Support Engineers via email only during business hours","Infrastructure Event Management for an additional fee","24x7 access to a Technical Account Manager","Only partial Trusted Advisor checks"],pt:["Acesso 24x7 ao servico ao cliente","Acesso a engenheiros de suporte por e-mail apenas em horario comercial","Infrastructure Event Management por uma taxa adicional","Acesso 24x7 a um Technical Account Manager","Apenas verificacoes parciais do Trusted Advisor"]},a:[0,2],multi:true,exp:{pt:{tech:"O plano Business inclui suporte 24x7 e Infrastructure Event Management (por taxa extra). TAM e exclusivo do Enterprise.",simple:"Business Support e como ter um seguro completo — suporte 24h e ajuda extra em eventos importantes (com taxa adicional)."},en:{tech:"The Business plan includes 24x7 support and Infrastructure Event Management (for an extra fee). TAM is Enterprise-only.",simple:"Business Support is like full insurance — 24/7 support and extra help for major events (at an additional charge)."}}},
{en:"Which AWS service authenticates users using Amazon, Apple, Facebook, or Google identities?",pt:"Qual servico da AWS autentica usuarios usando identidades da Amazon, Apple, Facebook ou Google?",o:{en:["Amazon GuardDuty","Amazon Personalize","Amazon Cognito","AWS IAM"],pt:["Amazon GuardDuty","Amazon Personalize","Amazon Cognito","AWS IAM"]},a:[2],exp:{pt:{tech:"Amazon Cognito fornece autenticacao, autorizacao e gerenciamento de usuarios com suporte a login social (federation).",simple:"Cognito e como um porteiro que aceita diferentes crachas — voce pode entrar com seu login do Google, Facebook ou Apple."},en:{tech:"Amazon Cognito provides authentication, authorization, and user management with social login support (federation).",simple:"Cognito is like a doorman that accepts different badges — you can enter with your Google, Facebook, or Apple login."}}},
{en:"What are the advantages of AWS cloud computing? (Choose TWO)",pt:"Quais sao as vantagens da computacao em nuvem da AWS? (Escolha DUAS)",o:{en:["Eliminates the need to monitor applications","AWS manages all compliance requirements","Provides custom hardware for specific applications","Eliminates the need to guess infrastructure capacity","Trade capital expenses for variable operational expenses"],pt:["Elimina a necessidade de monitorar aplicacoes","A AWS gerencia todos os requisitos de conformidade","Fornece hardware personalizado para aplicacoes especificas","Elimina a necessidade de adivinhar a capacidade da infraestrutura","Trocar despesas de capital por despesas operacionais variaveis"]},a:[3,4],multi:true,exp:{pt:{tech:"A nuvem elimina adivinhacao de capacidade e permite trocar CAPEX por OPEX, pagando conforme o uso.",simple:"Nuvem e como trocar de casa propria para aluguel — sem investimento inicial e voce ajusta o tamanho conforme a necessidade."},en:{tech:"The cloud eliminates capacity guessing and lets you trade CAPEX for OPEX, paying as you go.",simple:"Cloud is like switching from owning to renting — no upfront investment and you adjust the size as needed."}}},
{en:"Which AWS service performs health checks on Amazon EC2 instances?",pt:"Qual servico da AWS realiza verificacoes de integridade em instancias Amazon EC2?",o:{en:["AWS CloudFormation","Amazon Route 53","Amazon Chime","Amazon Aurora"],pt:["AWS CloudFormation","Amazon Route 53","Amazon Chime","Amazon Aurora"]},a:[1],exp:{pt:{tech:"Amazon Route 53 realiza health checks em endpoints e roteia trafego apenas para recursos saudaveis.",simple:"Route 53 e como um GPS inteligente — verifica se o caminho esta livre antes de te mandar para la."},en:{tech:"Amazon Route 53 performs health checks on endpoints and routes traffic only to healthy resources.",simple:"Route 53 is like a smart GPS — it checks if the road is clear before sending you that way."}}},
{en:"Which AWS service provides facial recognition capabilities to automate photo tagging?",pt:"Qual servico da AWS oferece reconhecimento facial para automatizar a marcacao de fotos?",o:{en:["Amazon Comprehend","AWS IAM","Amazon Polly","Amazon Rekognition"],pt:["Amazon Comprehend","AWS IAM","Amazon Polly","Amazon Rekognition"]},a:[3],exp:{pt:{tech:"Amazon Rekognition usa deep learning para analise de imagens e videos, incluindo deteccao e reconhecimento facial.",simple:"Rekognition e como aquele amigo que reconhece todo mundo em fotos — so que e uma IA que faz isso automaticamente."},en:{tech:"Amazon Rekognition uses deep learning for image and video analysis, including facial detection and recognition.",simple:"Rekognition is like that friend who recognizes everyone in photos — except it is an AI that does it automatically."}}},
{en:"Which of the following are examples of AWS-managed databases? (Choose TWO)",pt:"Quais das alternativas a seguir sao exemplos de bancos de dados gerenciados pela AWS? (Escolha DUAS)",o:{en:["Amazon Neptune","Amazon CloudSearch","Microsoft SQL Server on Amazon EC2","MySQL on Amazon EC2","Amazon RDS for MySQL"],pt:["Amazon Neptune","Amazon CloudSearch","Microsoft SQL Server no Amazon EC2","MySQL no Amazon EC2","Amazon RDS para MySQL"]},a:[0,4],multi:true,exp:{pt:{tech:"Neptune e RDS for MySQL sao gerenciados pela AWS. Bancos instalados manualmente no EC2 sao responsabilidade do cliente.",simple:"Gerenciado pela AWS e como comer em restaurante — eles cozinham. No EC2 e como cozinhar em casa — voce faz tudo."},en:{tech:"Neptune and RDS for MySQL are AWS-managed. Databases manually installed on EC2 are the customer responsibility.",simple:"AWS-managed is like eating at a restaurant — they cook. On EC2 is like cooking at home — you do everything."}}},
{en:"Which EC2 option is best for periodic large-scale image and video processing at minimal cost?",pt:"Qual opcao do EC2 e melhor para processamento periodico de imagens e videos em larga escala com custo minimo?",o:{en:["EC2 On-Demand Instances","EC2 Reserved Instances with No Upfront payment","EC2 Spot Instances","EC2 Reserved Instances with All Upfront payment"],pt:["Instancias EC2 On-Demand","Instancias EC2 Reservadas sem pagamento antecipado","Instancias EC2 Spot","Instancias EC2 Reservadas com pagamento total antecipado"]},a:[2],exp:{pt:{tech:"Spot Instances oferecem ate 90% de desconto e sao ideais para cargas tolerantes a interrupcao, como processamento em lote.",simple:"Spot e como passagem de ultima hora — super barata, mas podem cancelar seu voo. Perfeita para trabalhos que podem ser refeitos."},en:{tech:"Spot Instances offer up to 90% discount and are ideal for fault-tolerant workloads like batch processing.",simple:"Spot is like a last-minute flight ticket — super cheap, but they might cancel your flight. Perfect for jobs that can be redone."}}},
{en:"Who has the authority to grant full administrative access to all AWS resources in an account?",pt:"Quem tem autoridade para conceder acesso administrativo total a todos os recursos AWS em uma conta?",o:{en:["The AWS account owner (root user)","The AWS Technical Account Manager","The AWS security team","AWS cloud support engineers"],pt:["O proprietario da conta AWS (usuario root)","O Technical Account Manager da AWS","A equipe de seguranca da AWS","Os engenheiros de suporte em nuvem da AWS"]},a:[0],exp:{pt:{tech:"O usuario root tem acesso irrestrito a todos os recursos e configuracoes da conta AWS.",simple:"O usuario root e como o dono do predio — tem a chave mestra que abre todas as portas."},en:{tech:"The root user has unrestricted access to all resources and settings in the AWS account.",simple:"The root user is like the building owner — they have the master key that opens every door."}}},
{en:"Which AWS service is used to migrate on-premises workloads to AWS?",pt:"Qual servico da AWS e usado para migrar cargas de trabalho on-premises para a AWS?",o:{en:["AWS File Transfer Acceleration","AWS Server Migration Service","AWS Database Migration Service","AWS Application Discovery Service"],pt:["AWS File Transfer Acceleration","AWS Server Migration Service","AWS Database Migration Service","AWS Application Discovery Service"]},a:[1],exp:{pt:{tech:"AWS SMS automatiza a migracao de servidores on-premises para a AWS, criando AMIs replicadas incrementalmente.",simple:"SMS e como uma empresa de mudanca para servidores — empacota tudo no local antigo e monta igualzinho na nuvem."},en:{tech:"AWS SMS automates the migration of on-premises servers to AWS, creating incrementally replicated AMIs.",simple:"SMS is like a moving company for servers — it packs everything at the old place and sets it up identically in the cloud."}}},
{en:"What does AWS Cost Explorer provide?",pt:"O que o AWS Cost Explorer fornece?",o:{en:["Cost comparisons between on-premises and cloud","Cost estimates based on expected usage","Consolidated billing across multiple accounts","Cost forecasts for up to 12 months"],pt:["Comparacoes de custo entre on-premises e nuvem","Estimativas de custo baseadas no uso esperado","Faturamento consolidado entre multiplas contas","Previsoes de custo para ate 12 meses"]},a:[3],exp:{pt:{tech:"O Cost Explorer fornece visualizacoes de custos e uso, alem de previsoes de gastos para ate 12 meses.",simple:"Cost Explorer e como um extrato bancario inteligente — mostra o que voce gastou e preve quanto vai gastar nos proximos meses."},en:{tech:"Cost Explorer provides cost and usage visualizations, plus spending forecasts for up to 12 months.",simple:"Cost Explorer is like a smart bank statement — it shows what you spent and predicts how much you will spend in the coming months."}}},
{en:"Which Amazon RDS feature provides automatic failover for database availability?",pt:"Qual recurso do Amazon RDS oferece failover automatico para disponibilidade do banco de dados?",o:{en:["RDS Single-AZ deployment","RDS Write Replica","RDS Snapshots","RDS Multi-AZ deployment"],pt:["Implantacao RDS Single-AZ","RDS Write Replica","RDS Snapshots","Implantacao RDS Multi-AZ"]},a:[3],exp:{pt:{tech:"RDS Multi-AZ mantem uma replica sincrona em outra AZ e faz failover automatico em caso de falha.",simple:"Multi-AZ e como ter um hospital reserva — se o principal fica indisponivel, o outro assume automaticamente."},en:{tech:"RDS Multi-AZ maintains a synchronous replica in another AZ and performs automatic failover in case of failure.",simple:"Multi-AZ is like having a backup hospital — if the main one goes down, the other takes over automatically."}}},
{en:"What is the best way to reduce charges for EC2 On-Demand instances that are not currently in use?",pt:"Qual e a melhor maneira de reduzir cobrancas de instancias EC2 On-Demand que nao estao em uso?",o:{en:["Delete all associated EBS volumes","You cannot minimize On-Demand charges","Terminate the instances completely","Stop the instances and restart when needed"],pt:["Deletar todos os volumes EBS associados","Nao e possivel minimizar cobrancas On-Demand","Encerrar as instancias completamente","Parar as instancias e reiniciar quando necessario"]},a:[3],exp:{pt:{tech:"Instancias EC2 paradas nao geram cobranca de computacao (apenas EBS). Terminar exclui a instancia permanentemente.",simple:"Parar uma instancia e como desligar a luz ao sair — voce para de gastar mas pode ligar de novo quando voltar."},en:{tech:"Stopped EC2 instances do not incur compute charges (only EBS storage). Terminating permanently deletes the instance.",simple:"Stopping an instance is like turning off the lights when you leave — you stop spending but can turn them on when you return."}}},
{en:"Which strategy best protects the AWS root account?",pt:"Qual estrategia melhor protege a conta root da AWS?",o:{en:["Delete root user access keys if they are not needed","Apply MFA to the root account and use it for all daily tasks","Access the root account only from a mobile phone","Share the root password only with trusted persons"],pt:["Deletar as chaves de acesso do usuario root se nao forem necessarias","Aplicar MFA na conta root e usa-la para todas as tarefas diarias","Acessar a conta root apenas pelo celular","Compartilhar a senha root apenas com pessoas confiaveis"]},a:[0],exp:{pt:{tech:"A AWS recomenda deletar chaves de acesso do root e usar IAM users para tarefas diarias, minimizando riscos.",simple:"Deletar as chaves do root e como trancar o cofre principal e usar apenas chaves menores no dia a dia."},en:{tech:"AWS recommends deleting root access keys and using IAM users for daily tasks, minimizing security risks.",simple:"Deleting root keys is like locking the main vault and only using smaller keys for day-to-day operations."}}},
{en:"Which AWS service provides a cloud-based contact center?",pt:"Qual servico da AWS fornece um contact center baseado na nuvem?",o:{en:["Amazon Lightsail","Amazon Connect","AWS Direct Connect","AWS Elastic Beanstalk"],pt:["Amazon Lightsail","Amazon Connect","AWS Direct Connect","AWS Elastic Beanstalk"]},a:[1],exp:{pt:{tech:"Amazon Connect e um servico de contact center em nuvem que permite configurar atendimento ao cliente de forma facil e escalavel.",simple:"Amazon Connect e como montar um call center virtual — sem telefones fisicos, tudo na nuvem e pronto para usar."},en:{tech:"Amazon Connect is a cloud contact center service that lets you set up customer service easily and at scale.",simple:"Amazon Connect is like setting up a virtual call center — no physical phones, everything in the cloud and ready to use."}}},
{en:"What does Economies of Scale mean in the context of AWS?",pt:"O que significa Economia de Escala no contexto da AWS?",o:{en:["You save more money when you consume more resources","As more time passes you pay more for resources","AWS will continuously lower costs as it grows and gains efficiencies","The ability to pay as you go for resources"],pt:["Voce economiza mais dinheiro quando consome mais recursos","Conforme mais tempo passa voce paga mais pelos recursos","A AWS reduzira continuamente os custos conforme cresce e ganha eficiencia","A capacidade de pagar conforme o uso pelos recursos"]},a:[2],exp:{pt:{tech:"Economia de escala permite que a AWS reduza precos continuamente conforme sua infraestrutura cresce e se torna mais eficiente.",simple:"Economia de escala e como atacado — a AWS compra tao em grande quantidade que consegue baixar o preco para todo mundo."},en:{tech:"Economies of scale allow AWS to continuously reduce prices as its infrastructure grows and becomes more efficient.",simple:"Economies of scale is like wholesale buying — AWS purchases so much that it can lower prices for everyone."}}},
{en:"What does the AWS Pay-As-You-Go pricing model do?",pt:"O que o modelo de precificacao Pay-As-You-Go da AWS faz?",o:{en:["Replace low upfront expenses with large variable payments","Replace low upfront expenses with large fixed payments","Replace large upfront expenses with low fixed payments","Replace large capital expenses with low variable payments"],pt:["Substituir despesas iniciais baixas por grandes pagamentos variaveis","Substituir despesas iniciais baixas por grandes pagamentos fixos","Substituir grandes despesas iniciais por baixos pagamentos fixos","Substituir grandes despesas de capital por baixos pagamentos variaveis"]},a:[3],exp:{pt:{tech:"O modelo Pay-As-You-Go converte CAPEX (investimento inicial alto) em OPEX (pagamentos variaveis conforme o uso).",simple:"Pay-As-You-Go e como trocar a compra de um carro por um servico de taxi — sem investimento grande, paga so quando usa."},en:{tech:"The Pay-As-You-Go model converts CAPEX (high upfront investment) into OPEX (variable payments based on usage).",simple:"Pay-As-You-Go is like switching from buying a car to using a taxi service — no big investment, you pay only when you ride."}}},
{en:"Which S3 storage class is best for popular e-commerce static assets with stable access patterns?",pt:"Qual classe de armazenamento do S3 e melhor para ativos estaticos populares de e-commerce com padrao de acesso estavel?",o:{en:["S3 Standard-Infrequent Access","S3 Intelligent-Tiering","S3 Glacier Deep Archive","S3 Standard"],pt:["S3 Standard-Infrequent Access","S3 Intelligent-Tiering","S3 Glacier Deep Archive","S3 Standard"]},a:[3],exp:{pt:{tech:"S3 Standard oferece alta durabilidade, disponibilidade e baixa latencia para dados acessados com frequencia.",simple:"S3 Standard e como a prateleira da frente da loja — para produtos populares que as pessoas pegam o tempo todo."},en:{tech:"S3 Standard offers high durability, availability, and low latency for frequently accessed data.",simple:"S3 Standard is like the front shelf in a store — for popular products that people grab all the time."}}},
{en:"Where should you create a backup for geographical disaster protection?",pt:"Onde voce deve criar um backup para protecao contra desastres geograficos?",o:{en:["In another Edge Location","In another Region","In another VPC","In another Availability Zone"],pt:["Em outra Edge Location","Em outra Regiao","Em outra VPC","Em outra Zona de Disponibilidade"]},a:[1],exp:{pt:{tech:"Backups em outra Regiao protegem contra desastres que afetem uma regiao inteira, como terremotos ou furacoes.",simple:"Guardar backup em outra Regiao e como ter uma copia dos documentos na casa de um parente em outra cidade — seguro contra desastres locais."},en:{tech:"Backups in another Region protect against disasters that affect an entire region, like earthquakes or hurricanes.",simple:"Storing backups in another Region is like keeping document copies at a relative house in another city — safe from local disasters."}}},
{en:"What are the key benefits of AWS CloudFormation? (Choose TWO)",pt:"Quais sao os principais beneficios do AWS CloudFormation? (Escolha DUAS)",o:{en:["Deploy applications without worrying about infrastructure","Automatically applies advanced IAM features","Automates infrastructure provisioning and updating in a safe manner","Model your entire infrastructure in a text file","Compiles and builds application code"],pt:["Implantar aplicacoes sem se preocupar com infraestrutura","Aplicar automaticamente recursos avancados do IAM","Automatizar o provisionamento e atualizacao de infraestrutura de forma segura","Modelar toda a infraestrutura em um arquivo de texto","Compilar e construir codigo de aplicacao"]},a:[2,3],multi:true,exp:{pt:{tech:"CloudFormation permite modelar infraestrutura como codigo (IaC) em templates e automatizar provisionamento com rollback seguro.",simple:"CloudFormation e como uma planta de construcao — voce descreve tudo no papel e a AWS constroi exatamente igual toda vez."},en:{tech:"CloudFormation lets you model infrastructure as code (IaC) in templates and automate provisioning with safe rollback.",simple:"CloudFormation is like a construction blueprint — you describe everything on paper and AWS builds it exactly the same every time."}}},
{en:"Which deployment model connects cloud and non-cloud (on-premises) resources?",pt:"Qual modelo de implantacao conecta recursos na nuvem e fora da nuvem (on-premises)?",o:{en:["On-premises deployment","Mixed deployment","Hybrid deployment","Cloud deployment"],pt:["Implantacao on-premises","Implantacao mista","Implantacao hibrida","Implantacao na nuvem"]},a:[2],exp:{pt:{tech:"O modelo hibrido combina infraestrutura on-premises com recursos na nuvem, conectados por VPN ou Direct Connect.",simple:"Hibrido e como trabalhar metade em casa e metade no escritorio — voce usa os dois ambientes conectados."},en:{tech:"The hybrid model combines on-premises infrastructure with cloud resources, connected via VPN or Direct Connect.",simple:"Hybrid is like working half at home and half at the office — you use both environments connected together."}}},
{en:"What are the benefits of a tagging strategy in AWS? (Choose TWO)",pt:"Quais sao os beneficios de uma estrategia de tagging na AWS? (Escolha DUAS)",o:{en:["Identify resources created by specific projects","Identify software solutions on resources","Track API calls in the account","Identify and recover deleted resources","Track and manage spending across tagged resources"],pt:["Identificar recursos criados por projetos especificos","Identificar solucoes de software nos recursos","Rastrear chamadas de API na conta","Identificar e recuperar recursos deletados","Rastrear e gerenciar gastos entre recursos com tags"]},a:[0,4],multi:true,exp:{pt:{tech:"Tags permitem categorizar recursos por projeto, equipe ou ambiente, facilitando o rastreamento de custos e organizacao.",simple:"Tags sao como etiquetas em caixas de mudanca — ajudam a saber o que e de quem e quanto cada grupo esta gastando."},en:{tech:"Tags let you categorize resources by project, team, or environment, making cost tracking and organization easier.",simple:"Tags are like labels on moving boxes — they help you know what belongs to whom and how much each group is spending."}}},
{en:"Which AWS service is used for encryption key management?",pt:"Qual servico da AWS e usado para gerenciamento de chaves de criptografia?",o:{en:["AWS KMS","AWS Service Control Policies","Multi-Factor Authentication","Amazon Macie"],pt:["AWS KMS","AWS Service Control Policies","Autenticacao Multi-Fator","Amazon Macie"]},a:[0],exp:{pt:{tech:"AWS KMS (Key Management Service) permite criar, gerenciar e controlar chaves de criptografia usadas para proteger dados.",simple:"KMS e como um chaveiro digital seguro — guarda e gerencia todas as chaves que trancam seus dados."},en:{tech:"AWS KMS (Key Management Service) lets you create, manage, and control encryption keys used to protect data.",simple:"KMS is like a secure digital keychain — it stores and manages all the keys that lock your data."}}},
{en:"Which AWS service provides SOC and PCI compliance reports?",pt:"Qual servico da AWS fornece relatorios de conformidade SOC e PCI?",o:{en:["AWS Well-Architected Tool","AWS Artifact","AWS Glue","Amazon Chime"],pt:["AWS Well-Architected Tool","AWS Artifact","AWS Glue","Amazon Chime"]},a:[1],exp:{pt:{tech:"AWS Artifact fornece acesso sob demanda a relatorios de conformidade e seguranca da AWS, como SOC e PCI DSS.",simple:"Artifact e como um cartorio de documentos da AWS — voce vai la e pega os certificados de conformidade quando precisa."},en:{tech:"AWS Artifact provides on-demand access to AWS compliance and security reports such as SOC and PCI DSS.",simple:"Artifact is like a document office for AWS — you go there and pick up compliance certificates when you need them."}}},
{en:"Which of the following is NOT a customer responsibility in the AWS Shared Responsibility Model? (Choose TWO)",pt:"Quais das alternativas a seguir NAO sao responsabilidade do cliente no Modelo de Responsabilidade Compartilhada? (Escolha DUAS)",o:{en:["Running penetration tests on their applications","Reserving capacity for their workloads","Data center physical operations","Auditing and compliance of their applications","Physical infrastructure security"],pt:["Executar testes de penetracao em suas aplicacoes","Reservar capacidade para suas cargas de trabalho","Operacoes fisicas do data center","Auditoria e conformidade de suas aplicacoes","Seguranca da infraestrutura fisica"]},a:[2,4],multi:true,exp:{pt:{tech:"Operacoes fisicas de data center e seguranca da infraestrutura fisica sao responsabilidades da AWS, nao do cliente.",simple:"Data center e infraestrutura fisica sao como o predio do condominio — responsabilidade do administrador (AWS), nao do morador."},en:{tech:"Physical data center operations and infrastructure security are AWS responsibilities, not the customer.",simple:"Data centers and physical infrastructure are like the condo building — the building manager (AWS) responsibility, not the tenant."}}},
{en:"Which AWS service can send SMS promotions to users in over 200 countries?",pt:"Qual servico da AWS pode enviar promocoes por SMS para usuarios em mais de 200 paises?",o:{en:["Amazon SES","Amazon S3","Amazon SNS","Amazon SQS"],pt:["Amazon SES","Amazon S3","Amazon SNS","Amazon SQS"]},a:[2],exp:{pt:{tech:"Amazon SNS (Simple Notification Service) suporta envio de SMS para mais de 200 paises, alem de push e e-mail.",simple:"SNS e como um megafone digital — manda mensagens para milhoes de pessoas por SMS, e-mail ou notificacao push."},en:{tech:"Amazon SNS (Simple Notification Service) supports SMS delivery to over 200 countries, plus push and email notifications.",simple:"SNS is like a digital megaphone — it sends messages to millions of people via SMS, email, or push notifications."}}},
{en:"Which of the following is a benefit of Amazon EC2 that helps reduce compute costs?",pt:"Qual das alternativas a seguir e um beneficio do Amazon EC2 que ajuda a reduzir custos de computacao?",o:{en:["Low monthly maintenance fees","Low-cost resource tagging","Per-second billing for On-Demand instances","Low start-up fees for all instance types"],pt:["Baixas taxas mensais de manutencao","Tagging de recursos de baixo custo","Cobranca por segundo para instancias On-Demand","Baixas taxas iniciais para todos os tipos de instancia"]},a:[2],exp:{pt:{tech:"A cobranca por segundo do EC2 On-Demand garante que voce pague apenas pelo tempo real de uso, sem desperdicio.",simple:"Cobranca por segundo e como pagar estacionamento por minuto — voce nao paga a hora inteira se ficou so 5 minutos."},en:{tech:"EC2 On-Demand per-second billing ensures you pay only for actual usage time, eliminating waste.",simple:"Per-second billing is like paying for parking by the minute — you do not pay for the full hour if you stayed only 5 minutes."}}},
{en:"Which AWS group helps customers achieve desired business outcomes through AWS adoption?",pt:"Qual grupo da AWS ajuda clientes a alcancar resultados de negocios desejados por meio da adocao da AWS?",o:{en:["AWS Security Team","AWS Professional Services","AWS Trusted Advisor","AWS Concierge Support"],pt:["Equipe de Seguranca da AWS","AWS Professional Services","AWS Trusted Advisor","AWS Concierge Support"]},a:[1],exp:{pt:{tech:"AWS Professional Services e uma equipe global de especialistas que ajuda empresas a migrar e adotar a AWS com sucesso.",simple:"Professional Services e como contratar um consultor especializado — ajuda sua empresa a usar a AWS da melhor forma possivel."},en:{tech:"AWS Professional Services is a global team of experts that helps organizations migrate to and adopt AWS successfully.",simple:"Professional Services is like hiring a specialized consultant — they help your company use AWS in the best possible way."}}},
{en:"What are the benefits of Amazon DynamoDB? (Choose TWO)",pt:"Quais sao os beneficios do Amazon DynamoDB? (Escolha DUAS)",o:{en:["Automatically scales throughput capacity","Provides resizable instance types","Supports both relational and non-relational data models","Delivers single-digit millisecond latency","Supports CouchDB and MongoDB engines"],pt:["Escala automaticamente a capacidade de throughput","Fornece tipos de instancia redimensionaveis","Suporta modelos de dados relacionais e nao relacionais","Entrega latencia de milissegundos de um digito","Suporta engines CouchDB e MongoDB"]},a:[0,3],multi:true,exp:{pt:{tech:"DynamoDB escala automaticamente o throughput e oferece latencia consistente abaixo de 10ms em qualquer escala.",simple:"DynamoDB e como um garcom que nunca fica lento — nao importa quantos clientes cheguem, o atendimento continua rapido."},en:{tech:"DynamoDB automatically scales throughput and delivers consistent sub-10ms latency at any scale.",simple:"DynamoDB is like a waiter that never slows down — no matter how many customers arrive, the service stays fast."}}},
{en:"A company wants to ensure that their cloud architecture can automatically recover from component failures without manual intervention. Which pillar of the AWS Well-Architected Framework is MOST relevant?",pt:"Uma empresa quer garantir que sua arquitetura em nuvem possa se recuperar automaticamente de falhas em componentes sem intervenção manual. Qual pilar do AWS Well-Architected Framework é MAIS relevante?",o:{en:["Reliability","Performance Efficiency","Operational Excellence","Security"],pt:["Confiabilidade","Eficiência de Performance","Excelência Operacional","Segurança"]},a:[0],exp:{pt:{tech:"O pilar de Confiabilidade foca na capacidade de um sistema se recuperar de falhas de infraestrutura ou serviço, adquirir dinamicamente recursos computacionais para atender a demanda e mitigar interrupções.",simple:"É como um restaurante que tem geradores de energia reserva — se a luz acaba, o gerador liga sozinho e os clientes nem percebem que houve um problema."},en:{tech:"The Reliability pillar focuses on the ability of a system to recover from infrastructure or service disruptions, dynamically acquire computing resources to meet demand, and mitigate disruptions such as misconfigurations or transient network issues.",simple:"It is like a restaurant that has backup power generators — if the electricity goes out, the generator kicks in automatically and customers never notice there was a problem."}}},
{en:"Which AWS pricing model provides the LARGEST discount in exchange for a commitment to a consistent amount of compute usage measured in dollars per hour?",pt:"Qual modelo de preços da AWS oferece o MAIOR desconto em troca de um compromisso com uma quantidade consistente de uso de computação medida em dólares por hora?",o:{en:["Savings Plans","Reserved Instances","Spot Instances","On-Demand Instances"],pt:["Savings Plans","Instâncias Reservadas","Instâncias Spot","Instâncias Sob Demanda"]},a:[0],exp:{pt:{tech:"Savings Plans oferecem preços reduzidos em troca de um compromisso de uso consistente (medido em USD/hora) por um período de 1 ou 3 anos, cobrindo EC2, Lambda e Fargate.",simple:"É como assinar um plano mensal de academia — você se compromete a pagar um valor fixo por mês e ganha um preço muito menor do que pagar por cada visita avulsa."},en:{tech:"Savings Plans offer reduced pricing in exchange for a commitment to a consistent amount of usage (measured in USD/hour) for a 1 or 3 year term, covering EC2, Lambda, and Fargate.",simple:"It is like signing a monthly gym membership — you commit to paying a fixed amount per month and get a much lower price than paying per individual visit."}}},
{en:"A startup needs to deploy a simple web application quickly without managing individual infrastructure components like load balancers and auto scaling groups. Which AWS service is BEST suited?",pt:"Uma startup precisa implantar uma aplicação web simples rapidamente sem gerenciar componentes individuais de infraestrutura como balanceadores de carga e grupos de auto scaling. Qual serviço AWS é MAIS adequado?",o:{en:["Amazon Lightsail","Amazon EC2","AWS Lambda","Amazon EKS"],pt:["Amazon Lightsail","Amazon EC2","AWS Lambda","Amazon EKS"]},a:[0],exp:{pt:{tech:"O Amazon Lightsail oferece servidores virtuais, armazenamento, bancos de dados e redes a um preço mensal previsível e baixo, ideal para aplicações simples e projetos iniciais.",simple:"É como alugar um apartamento mobiliado — tudo já vem pronto (cama, sofá, geladeira) e você só precisa se mudar, sem precisar comprar cada móvel separadamente."},en:{tech:"Amazon Lightsail offers virtual servers, storage, databases, and networking at a low, predictable monthly price, ideal for simple applications and starter projects.",simple:"It is like renting a furnished apartment — everything comes ready (bed, couch, fridge) and you just move in without needing to buy each piece of furniture separately."}}},
{en:"Which component of AWS global infrastructure is specifically designed to cache content closer to end users for low-latency delivery?",pt:"Qual componente da infraestrutura global da AWS é projetado especificamente para armazenar conteúdo em cache mais perto dos usuários finais para entrega com baixa latência?",o:{en:["Edge Locations","Availability Zones","AWS Regions","AWS Local Zones"],pt:["Locais de Borda","Zonas de Disponibilidade","Regiões AWS","Zonas Locais AWS"]},a:[0],exp:{pt:{tech:"Edge Locations são pontos de presença (PoPs) usados pelo Amazon CloudFront e outros serviços para armazenar em cache cópias de conteúdo próximo aos usuários, reduzindo a latência.",simple:"É como uma rede de quiosques de uma padaria famosa espalhados pela cidade — em vez de ir até a matriz, você compra o pão fresquinho no quiosque mais perto de casa."},en:{tech:"Edge Locations are points of presence (PoPs) used by Amazon CloudFront and other services to cache copies of content closer to end users, reducing latency.",simple:"It is like a chain of kiosks from a famous bakery spread across the city — instead of going to the main store, you buy fresh bread at the kiosk closest to your home."}}},
{en:"A security team needs to automatically discover and protect sensitive data such as personally identifiable information (PII) stored in Amazon S3. Which service should they use?",pt:"Uma equipe de segurança precisa descobrir e proteger automaticamente dados sensíveis como informações de identificação pessoal (PII) armazenados no Amazon S3. Qual serviço devem usar?",o:{en:["Amazon Macie","Amazon GuardDuty","AWS Security Hub","Amazon Detective"],pt:["Amazon Macie","Amazon GuardDuty","AWS Security Hub","Amazon Detective"]},a:[0],exp:{pt:{tech:"O Amazon Macie usa machine learning e correspondência de padrões para descobrir e proteger dados sensíveis armazenados no Amazon S3, incluindo PII e dados financeiros.",simple:"É como um detetive especializado em encontrar documentos confidenciais esquecidos — ele vasculha seus arquivos e avisa: esse aqui tem CPF, esse tem número de cartão, proteja-os!"},en:{tech:"Amazon Macie uses machine learning and pattern matching to discover and protect sensitive data stored in Amazon S3, including PII and financial data.",simple:"It is like a detective specialized in finding forgotten confidential documents — they search through your files and warn you: this one has social security numbers, this one has card numbers, protect them!"}}},
{en:"Which TWO statements accurately describe AWS Lambda? (Choose TWO)",pt:"Quais DUAS afirmações descrevem corretamente o AWS Lambda? (Escolha DUAS)",o:{en:["You are charged based on the number of requests and the duration of code execution","Lambda automatically scales to handle incoming requests without manual configuration","Lambda requires you to provision and manage the underlying servers","Lambda functions can run indefinitely without any time restrictions"],pt:["Você é cobrado com base no número de solicitações e na duração da execução do código","O Lambda escala automaticamente para lidar com solicitações recebidas sem configuração manual","O Lambda exige que você provisione e gerencie os servidores subjacentes","As funções Lambda podem ser executadas indefinidamente sem restrições de tempo"]},a:[0,1],multi:true,exp:{pt:{tech:"O AWS Lambda é um serviço serverless que executa código em resposta a eventos. A cobrança é por número de invocações e tempo de execução (em incrementos de 1ms). Ele escala automaticamente e tem um limite máximo de execução de 15 minutos.",simple:"É como um táxi — você paga pela corrida (duração) e por cada vez que chama um (solicitação). O táxi aparece sozinho quando você precisa, mas não pode fazer uma viagem infinita."},en:{tech:"AWS Lambda is a serverless service that runs code in response to events. You are charged per number of invocations and execution duration (in 1ms increments). It scales automatically and has a maximum execution timeout of 15 minutes.",simple:"It is like a taxi — you pay for the ride (duration) and for each time you call one (request). The taxi shows up on its own when you need it, but it cannot go on an infinite trip."}}},
{en:"A company stores log files that are rarely accessed but must be retrievable within 12 hours when needed. Which S3 storage class is the MOST cost-effective?",pt:"Uma empresa armazena arquivos de log raramente acessados mas que devem ser recuperáveis dentro de 12 horas quando necessário. Qual classe de armazenamento S3 é a MAIS econômica?",o:{en:["S3 Glacier Deep Archive","S3 Glacier Flexible Retrieval","S3 Standard-Infrequent Access","S3 One Zone-Infrequent Access"],pt:["S3 Glacier Deep Archive","S3 Glacier Flexible Retrieval","S3 Standard-Acesso Infrequente","S3 One Zone-Acesso Infrequente"]},a:[0],exp:{pt:{tech:"O S3 Glacier Deep Archive é a classe de armazenamento mais barata da AWS, projetada para retenção de longo prazo de dados acessados raramente, com tempo de recuperação padrão de até 12 horas.",simple:"É como guardar caixas em um depósito bem longe da cidade — o aluguel é muito barato, mas quando você precisa de algo, demora um pouco para trazerem até você."},en:{tech:"S3 Glacier Deep Archive is the lowest-cost AWS storage class, designed for long-term retention of data that is rarely accessed, with a default retrieval time of up to 12 hours.",simple:"It is like storing boxes in a warehouse far from the city — the rent is very cheap, but when you need something, it takes a while for them to bring it to you."}}},
{en:"Which database service is fully managed by AWS and is compatible with both MySQL and PostgreSQL while offering up to five times the throughput of standard MySQL?",pt:"Qual serviço de banco de dados é totalmente gerenciado pela AWS e é compatível com MySQL e PostgreSQL, oferecendo até cinco vezes o throughput do MySQL padrão?",o:{en:["Amazon Aurora","Amazon RDS","Amazon Redshift","Amazon DynamoDB"],pt:["Amazon Aurora","Amazon RDS","Amazon Redshift","Amazon DynamoDB"]},a:[0],exp:{pt:{tech:"O Amazon Aurora é um banco de dados relacional compatível com MySQL e PostgreSQL, projetado para a nuvem, que combina a performance de bancos de dados comerciais com a simplicidade e economia de bancos open source.",simple:"É como um carro esportivo que usa o mesmo combustível (MySQL/PostgreSQL) que um carro comum, mas rende cinco vezes mais quilômetros por litro graças ao motor otimizado."},en:{tech:"Amazon Aurora is a MySQL and PostgreSQL-compatible relational database built for the cloud, combining the performance of commercial databases with the simplicity and cost-effectiveness of open-source databases.",simple:"It is like a sports car that uses the same fuel (MySQL/PostgreSQL) as a regular car, but gets five times more miles per gallon thanks to the optimized engine."}}},
{en:"A company needs to connect their on-premises data center to AWS with a dedicated, private network connection that does not traverse the public internet. Which service should they use?",pt:"Uma empresa precisa conectar seu data center local à AWS com uma conexão de rede dedicada e privada que não passe pela internet pública. Qual serviço devem usar?",o:{en:["AWS Direct Connect","AWS Site-to-Site VPN","AWS Transit Gateway","Amazon VPC Peering"],pt:["AWS Direct Connect","AWS VPN Site-to-Site","AWS Transit Gateway","Peering Amazon VPC"]},a:[0],exp:{pt:{tech:"O AWS Direct Connect estabelece uma conexão de rede dedicada entre as instalações do cliente e a AWS, proporcionando largura de banda consistente e latência reduzida sem passar pela internet pública.",simple:"É como construir uma estrada privada entre sua casa e o trabalho — em vez de pegar o trânsito na via pública, você tem um caminho exclusivo, mais rápido e previsível."},en:{tech:"AWS Direct Connect establishes a dedicated network connection between customer premises and AWS, providing consistent bandwidth and reduced latency without traversing the public internet.",simple:"It is like building a private road between your home and work — instead of dealing with traffic on public roads, you have an exclusive, faster, and more predictable path."}}},
{en:"Which AWS service provides a centralized dashboard to check if your AWS account follows best practices across cost optimization, security, fault tolerance, performance, and service limits?",pt:"Qual serviço AWS fornece um painel centralizado para verificar se sua conta AWS segue as melhores práticas em otimização de custos, segurança, tolerância a falhas, performance e limites de serviço?",o:{en:["AWS Trusted Advisor","Amazon CloudWatch","AWS Config","AWS CloudTrail"],pt:["AWS Trusted Advisor","Amazon CloudWatch","AWS Config","AWS CloudTrail"]},a:[0],exp:{pt:{tech:"O AWS Trusted Advisor inspeciona seu ambiente AWS e faz recomendações em cinco categorias: otimização de custos, performance, segurança, tolerância a falhas e limites de serviço.",simple:"É como um consultor pessoal da sua casa que verifica se você está gastando demais na conta de luz, se as fechaduras estão seguras, se o encanamento aguenta e se tudo funciona bem."},en:{tech:"AWS Trusted Advisor inspects your AWS environment and makes recommendations across five categories: cost optimization, performance, security, fault tolerance, and service limits.",simple:"It is like a personal home consultant who checks if you are overspending on electricity, if your locks are secure, if the plumbing can handle the load, and if everything runs smoothly."}}},
{en:"A company wants to migrate a 50 TB database from an on-premises Oracle server to Amazon Aurora PostgreSQL. Which AWS service is designed specifically for this type of migration?",pt:"Uma empresa deseja migrar um banco de dados de 50 TB de um servidor Oracle local para o Amazon Aurora PostgreSQL. Qual serviço AWS é projetado especificamente para esse tipo de migração?",o:{en:["AWS Database Migration Service (DMS)","AWS Server Migration Service (SMS)","AWS Snowball","AWS Migration Hub"],pt:["AWS Database Migration Service (DMS)","AWS Server Migration Service (SMS)","AWS Snowball","AWS Migration Hub"]},a:[0],exp:{pt:{tech:"O AWS DMS suporta migrações homogêneas e heterogêneas de banco de dados, incluindo de Oracle para Aurora PostgreSQL, com conversão de schema via AWS Schema Conversion Tool.",simple:"É como uma empresa de mudança especializada em transporte de pianos — eles sabem exatamente como desmontá-lo em um lugar e remontá-lo em outro, mesmo que o novo local tenha formato diferente."},en:{tech:"AWS DMS supports both homogeneous and heterogeneous database migrations, including Oracle to Aurora PostgreSQL, with schema conversion using the AWS Schema Conversion Tool.",simple:"It is like a moving company that specializes in transporting pianos — they know exactly how to disassemble it in one place and reassemble it in another, even if the new location has a different layout."}}},
{en:"Which AWS AI service can analyze images and videos to detect objects, people, text, scenes, and activities?",pt:"Qual serviço de IA da AWS pode analisar imagens e vídeos para detectar objetos, pessoas, texto, cenas e atividades?",o:{en:["Amazon Rekognition","Amazon Comprehend","Amazon SageMaker","Amazon Translate"],pt:["Amazon Rekognition","Amazon Comprehend","Amazon SageMaker","Amazon Translate"]},a:[0],exp:{pt:{tech:"O Amazon Rekognition é um serviço de visão computacional que usa deep learning para analisar imagens e vídeos, identificando objetos, pessoas, texto, cenas e atividades sem necessidade de expertise em ML.",simple:"É como contratar um observador superatento que examina fotos e vídeos e te conta tudo que vê — pessoas, carros, textos escritos em placas, expressões faciais e até atividades."},en:{tech:"Amazon Rekognition is a computer vision service that uses deep learning to analyze images and videos, identifying objects, people, text, scenes, and activities without requiring ML expertise.",simple:"It is like hiring a super attentive observer who examines photos and videos and tells you everything they see — people, cars, text on signs, facial expressions, and even activities."}}},
{en:"Which AWS service automates the software release process by orchestrating build, test, and deploy phases across multiple stages?",pt:"Qual serviço AWS automatiza o processo de lançamento de software orquestrando as fases de build, teste e deploy em múltiplos estágios?",o:{en:["AWS CodePipeline","AWS CodeBuild","AWS CodeDeploy","AWS CodeCommit"],pt:["AWS CodePipeline","AWS CodeBuild","AWS CodeDeploy","AWS CodeCommit"]},a:[0],exp:{pt:{tech:"O AWS CodePipeline é um serviço de entrega contínua totalmente gerenciado que automatiza os pipelines de release, orquestrando etapas de build, teste e deploy.",simple:"É como uma linha de montagem em uma fábrica — cada estação faz sua parte (montar, testar, embalar) e o produto passa automaticamente de uma estação para outra até ficar pronto."},en:{tech:"AWS CodePipeline is a fully managed continuous delivery service that automates release pipelines, orchestrating build, test, and deploy stages.",simple:"It is like an assembly line in a factory — each station does its part (build, test, package) and the product automatically moves from one station to the next until it is ready."}}},
{en:"Which AWS support plan provides access to a Technical Account Manager (TAM)?",pt:"Qual plano de suporte AWS fornece acesso a um Technical Account Manager (TAM)?",o:{en:["Enterprise","Business","Developer","Basic"],pt:["Enterprise","Business","Developer","Básico"]},a:[0],exp:{pt:{tech:"O plano Enterprise é o único que inclui um Technical Account Manager (TAM) dedicado, que fornece orientação proativa, revisões arquiteturais e coordenação de casos de suporte.",simple:"É como ter um gerente pessoal no banco — enquanto nos planos mais baratos você fala com qualquer atendente, no plano premium você tem alguém que conhece sua conta e te orienta proativamente."},en:{tech:"The Enterprise plan is the only one that includes a dedicated Technical Account Manager (TAM), who provides proactive guidance, architectural reviews, and support case coordination.",simple:"It is like having a personal manager at the bank — while on cheaper plans you talk to any available agent, on the premium plan you have someone who knows your account and proactively guides you."}}},
{en:"Which pillar of the AWS Well-Architected Framework focuses on running workloads effectively while gaining insight into operations through monitoring and continuously improving processes?",pt:"Qual pilar do AWS Well-Architected Framework foca em executar cargas de trabalho de forma eficaz enquanto obtém insights sobre operações por meio de monitoramento e melhora contínua de processos?",o:{en:["Operational Excellence","Reliability","Performance Efficiency","Sustainability"],pt:["Excelência Operacional","Confiabilidade","Eficiência de Performance","Sustentabilidade"]},a:[0],exp:{pt:{tech:"O pilar de Excelência Operacional inclui a capacidade de executar e monitorar sistemas para entregar valor de negócio e melhorar continuamente processos e procedimentos de suporte.",simple:"É como um restaurante que não só serve comida boa, mas também monitora o tempo de espera, ouve feedback dos clientes e melhora seus processos toda semana."},en:{tech:"The Operational Excellence pillar includes the ability to run and monitor systems to deliver business value and continually improve supporting processes and procedures.",simple:"It is like a restaurant that not only serves good food but also monitors wait times, listens to customer feedback, and improves its processes every week."}}},
