{en:"A company needs an S3 storage class for data that is accessed IMMEDIATELY when needed but only a few times per year. Which option is MOST cost-effective?",pt:"Uma empresa precisa de uma classe de armazenamento S3 para dados acessados IMEDIATAMENTE quando necessario, mas apenas algumas vezes por ano. Qual opcao e MAIS economica?",o:{en:["S3 Standard","S3 Standard-Infrequent Access (S3 Standard-IA)","S3 Glacier Instant Retrieval","S3 Glacier Flexible Retrieval"],pt:["S3 Standard","S3 Standard-Infrequent Access (S3 Standard-IA)","S3 Glacier Instant Retrieval","S3 Glacier Flexible Retrieval"]},a:[1],t:"S3StorageClasses",exp:{pt:{tech:"S3 Standard-IA e projetado para dados acessados com pouca frequencia mas que precisam de acesso imediato quando solicitados. Tem custo de armazenamento menor que S3 Standard mas cobra uma taxa por recuperacao de dados.","simple":"S3 Standard-IA custa menos para guardar dados que voce raramente acessa, mas quando precisar, entrega na hora.","avoid":"S3 Glacier Flexible tem latencia de horas para recuperacao — nao atende o requisito de acesso imediato. Para dados raramente acessados mas de acesso imediato quando necessario, use S3 Standard-IA ou S3 Glacier Instant Retrieval."},en:{tech:"S3 Standard-IA is designed for infrequently accessed data that requires immediate access when requested. It has lower storage cost than S3 Standard but charges a per-retrieval fee.","simple":"S3 Standard-IA costs less to store data you rarely access, but when you need it, it delivers immediately.","avoid":"S3 Glacier Flexible has hours of retrieval latency — it does not meet the immediate access requirement. For rarely accessed but immediately available data, use S3 Standard-IA or S3 Glacier Instant Retrieval."}}},
{en:"A company wants HIGHEST AVAILABILITY for an RDS database with automatic failover in case of an infrastructure failure. Which option should be configured?",pt:"Uma empresa quer MAXIMA DISPONIBILIDADE para um banco de dados RDS com failover automatico em caso de falha de infraestrutura. Qual opcao deve ser configurada?",o:{en:["RDS Read Replica in the same AZ","RDS Multi-AZ deployment","RDS with automated backups enabled","RDS in a single AZ with larger instance type"],pt:["RDS Read Replica na mesma AZ","RDS Multi-AZ deployment","RDS com backups automatizados habilitados","RDS em uma AZ unica com tipo de instancia maior"]},a:[1],t:"RDSHighAvailability",exp:{pt:{tech:"RDS Multi-AZ mantem uma replica sincrona em outra Availability Zone. Em caso de falha da instancia primaria, o AWS realiza failover automatico para a replica standby com downtime de 60-120 segundos, sem intervencao manual.","simple":"Multi-AZ e ter uma copia identica do banco em outro datacenter. Se o principal cair, o backup assume automaticamente.","avoid":"Read Replicas sao para performance (leitura), nao para alta disponibilidade com failover automatico. Para failover automatico, use Multi-AZ."},en:{tech:"RDS Multi-AZ maintains a synchronous replica in another Availability Zone. In case of primary instance failure, AWS performs automatic failover to the standby replica with 60-120 seconds of downtime, no manual intervention.","simple":"Multi-AZ is having an identical copy of the database in another datacenter. If the primary goes down, the backup takes over automatically.","avoid":"Read Replicas are for performance (reads), not for high availability with automatic failover. For automatic failover, use Multi-AZ."}}},
{en:"A solutions architect needs to design an architecture with HIGHEST AVAILABILITY that can survive an ENTIRE AWS REGION failure. Which approach should be used?",pt:"Um arquiteto de solucoes precisa projetar uma arquitetura com MAXIMA DISPONIBILIDADE que possa sobreviver a uma falha de REGIAO AWS inteira. Qual abordagem deve ser usada?",o:{en:["Deploy in multiple Availability Zones within a single region","Deploy in multiple regions with Route 53 health checks","Use Reserved Instances for cost savings","Enable Multi-AZ on all databases"],pt:["Implantar em multiplas Availability Zones em uma unica regiao","Implantar em multiplas regioes com Route 53 health checks","Usar Reserved Instances para economia de custos","Habilitar Multi-AZ em todos os bancos de dados"]},a:[1],t:"MultiRegion",exp:{pt:{tech:"Para sobreviver a uma falha de regiao inteira, e necessario arquitetura multi-regiao com DNS failover via Route 53 health checks. Multi-AZ protege contra falhas de AZ mas todas as AZs sao dentro de uma mesma regiao geografica.","simple":"Multi-AZ protege contra um datacenter cair. Multi-regiao protege contra uma cidade ou pais inteiro ter problemas. Para maxima disponibilidade, precisa de ambos.","avoid":"Multi-AZ nao protege contra falha de regiao. Todas as AZs de uma regiao compartilham a mesma infraestrutura de backbone regional. Para RPO/RTO minimos em caso de falha regional, use multi-regiao."},en:{tech:"To survive an entire region failure, multi-region architecture with DNS failover via Route 53 health checks is required. Multi-AZ protects against AZ failures but all AZs are within the same geographic region.","simple":"Multi-AZ protects against one datacenter going down. Multi-region protects against an entire city or country having problems. For maximum availability, you need both.","avoid":"Multi-AZ does not protect against region failure. All AZs in a region share the same regional backbone infrastructure. For minimum RPO/RTO in case of regional failure, use multi-region."}}},
{en:"A company needs to store objects that will NOT be accessed for at least 7 years and must be IMMEDIATELY AVAILABLE when needed for legal review. Which S3 storage class is MOST cost-effective?",pt:"Uma empresa precisa armazenar objetos que NAO serao acessados por pelo menos 7 anos e devem ser IMEDIATAMENTE DISPONIVEIS quando necessarios para revisao legal. Qual classe de armazenamento S3 e MAIS economica?",o:{en:["S3 Standard","S3 Glacier Flexible Retrieval","S3 Glacier Instant Retrieval","S3 One Zone-IA"],pt:["S3 Standard","S3 Glacier Flexible Retrieval","S3 Glacier Instant Retrieval","S3 One Zone-IA"]},a:[2],t:"S3StorageClasses",exp:{pt:{tech:"S3 Glacier Instant Retrieval e projetado para dados de longo prazo raramente acessados que exigem recuperacao em milissegundos quando necessarios. Tem o menor custo de armazenamento entre as opcoes com acesso imediato.","simple":"Glacier Instant Retrieval arquiva dados baratos por anos mas entrega na hora quando precisa. E o melhor dos dois mundos para dados raramente acessados.","avoid":"S3 Glacier Flexible e mais barato de armazenar mas tem latencia de minutos a horas. Se o requisito e acesso IMEDIATO, use Glacier Instant Retrieval, nao Flexible."},en:{tech:"S3 Glacier Instant Retrieval is designed for long-term rarely accessed data that requires millisecond retrieval when needed. It has the lowest storage cost among options with immediate access.","simple":"Glacier Instant Retrieval archives data cheaply for years but delivers immediately when needed. It is the best of both worlds for rarely accessed data.","avoid":"S3 Glacier Flexible is cheaper to store but has minutes to hours of latency. If the requirement is IMMEDIATE access, use Glacier Instant Retrieval, not Flexible."}}},
{en:"A company wants to run containers WITHOUT managing the underlying EC2 instances. Which compute option provides this capability?",pt:"Uma empresa quer rodar containers SEM gerenciar as instancias EC2 subjacentes. Qual opcao de computacao fornece essa capacidade?",o:{en:["Amazon ECS with EC2 launch type","Amazon EKS with self-managed nodes","AWS Fargate","Amazon EC2 with Docker installed"],pt:["Amazon ECS com tipo de lancamento EC2","Amazon EKS com nos auto-gerenciados","AWS Fargate","Amazon EC2 com Docker instalado"]},a:[2],t:"Containers",exp:{pt:{tech:"AWS Fargate e o modo serverless de execucao de containers para ECS e EKS. A AWS gerencia completamente o provisionamento, escalabilidade e manutencao da infraestrutura de compute. Voce define apenas CPU, memoria e a imagem do container.","simple":"Fargate e containers serverless. Voce manda rodar o container e a AWS cuida de tudo por baixo — voce nao ve nem gerencia nenhum servidor.","avoid":"ECS com EC2 launch type exige gerenciar as instancias EC2 (patching, scaling, etc.). Para nao gerenciar servidores com containers, use Fargate."},en:{tech:"AWS Fargate is the serverless compute mode for running containers on ECS and EKS. AWS completely manages provisioning, scaling, and maintenance of the compute infrastructure. You only define CPU, memory, and the container image.","simple":"Fargate is serverless containers. You tell it to run the container and AWS handles everything underneath — you never see or manage any servers.","avoid":"ECS with EC2 launch type requires managing EC2 instances (patching, scaling, etc.). To avoid managing servers with containers, use Fargate."}}},
{en:"A company needs a NoSQL database that can handle millions of requests per second WITH LEAST OPERATIONAL OVERHEAD and WITHOUT managing servers. Which service should be used?",pt:"Uma empresa precisa de um banco de dados NoSQL que possa lidar com milhoes de requisicoes por segundo COM MENOR OVERHEAD OPERACIONAL e SEM gerenciar servidores. Qual servico deve ser usado?",o:{en:["Amazon RDS with read replicas","MongoDB on EC2","Amazon DynamoDB","Amazon Aurora Serverless"],pt:["Amazon RDS com read replicas","MongoDB no EC2","Amazon DynamoDB","Amazon Aurora Serverless"]},a:[2],t:"Database",exp:{pt:{tech:"Amazon DynamoDB e um banco de dados NoSQL totalmente gerenciado, serverless, que escala automaticamente para lidar com qualquer volume de trafego. Sem provisionamento de servidores, sem patches, sem gerenciamento de cluster — AWS cuida de tudo.","simple":"DynamoDB e um banco de dados que a AWS gerencia completamente. Voce so cria tabelas e usa — nao existe servidor para administrar.","avoid":"MongoDB no EC2 exige gerenciar o servidor inteiro. Aurora Serverless e relacional (SQL). Para NoSQL sem servidor, DynamoDB e a resposta certa."},en:{tech:"Amazon DynamoDB is a fully managed, serverless NoSQL database that automatically scales to handle any traffic volume. No server provisioning, no patches, no cluster management — AWS handles everything.","simple":"DynamoDB is a database that AWS manages completely. You just create tables and use them — there is no server to administer.","avoid":"MongoDB on EC2 requires managing the entire server. Aurora Serverless is relational (SQL). For serverless NoSQL, DynamoDB is the right answer."}}},
{en:"A company wants to review security recommendations and check if MFA is enabled for the ROOT ACCOUNT. Which service provides this check WITH NO ADDITIONAL COST on the Basic plan?",pt:"Uma empresa quer revisar recomendacoes de seguranca e verificar se MFA esta habilitado para a CONTA ROOT. Qual servico fornece essa verificacao SEM CUSTO ADICIONAL no plano Basic?",o:{en:["Amazon Inspector","AWS Security Hub","AWS Trusted Advisor","AWS Config"],pt:["Amazon Inspector","AWS Security Hub","AWS Trusted Advisor","AWS Config"]},a:[2],t:"TrustedAdvisor",exp:{pt:{tech:"AWS Trusted Advisor no plano Basic/Developer oferece gratuitamente as verificacoes principais de seguranca, incluindo MFA na conta root, permissoes de bucket S3 publico, portas de seguranca abertas e uso de IAM. Planos superiores desbloqueiam mais verificacoes.","simple":"Trusted Advisor e como um consultor gratuito da AWS que verifica coisas basicas de seguranca, como se o MFA esta ligado na conta root.","avoid":"Inspector e para vulnerabilidades em EC2/containers. Config e para conformidade de recursos. Trusted Advisor e o servico de recomendacoes gerais incluindo seguranca basica gratuita."},en:{tech:"AWS Trusted Advisor on the Basic/Developer plan provides core security checks for free, including MFA on the root account, public S3 bucket permissions, open security group ports, and IAM usage. Higher plans unlock more checks.","simple":"Trusted Advisor is like a free AWS consultant that checks basic security things, like whether MFA is enabled on the root account.","avoid":"Inspector is for EC2/container vulnerabilities. Config is for resource compliance. Trusted Advisor is the general recommendations service including free basic security."}}},
{en:"A company needs to track ALL API CALLS made in their AWS account for security AUDIT purposes. Which service should be enabled?",pt:"Uma empresa precisa rastrear TODAS AS CHAMADAS DE API feitas em sua conta AWS para fins de AUDITORIA de seguranca. Qual servico deve ser habilitado?",o:{en:["Amazon CloudWatch Logs","AWS Config","AWS CloudTrail","Amazon GuardDuty"],pt:["Amazon CloudWatch Logs","AWS Config","AWS CloudTrail","Amazon GuardDuty"]},a:[2],t:"CloudTrail",exp:{pt:{tech:"AWS CloudTrail registra todas as chamadas de API feitas na conta AWS (console, CLI, SDK) incluindo quem fez a chamada, quando, de qual IP, quais parametros foram usados e qual foi a resposta. E o servico fundamental para auditoria e investigacao forense.","simple":"CloudTrail e como uma camera de seguranca que filma tudo que acontece na sua conta AWS — quem fez o que, quando e de onde.","avoid":"CloudWatch monitora metricas e logs de aplicacoes. Config rastreia mudancas de configuracao de recursos. CloudTrail e especificamente para auditoria de chamadas de API e acoes de usuarios."},en:{tech:"AWS CloudTrail records all API calls made in the AWS account (console, CLI, SDK) including who made the call, when, from which IP, what parameters were used, and what the response was. It is the foundational service for auditing and forensic investigation.","simple":"CloudTrail is like a security camera that records everything that happens in your AWS account — who did what, when, and from where.","avoid":"CloudWatch monitors metrics and application logs. Config tracks resource configuration changes. CloudTrail is specifically for API call auditing and user action tracking."}}},
{en:"A company needs to ensure their AWS resources CONTINUOUSLY COMPLY WITH internal policies, such as ensuring all S3 buckets have encryption enabled. Which service should be used?",pt:"Uma empresa precisa garantir que seus recursos AWS CONTINUAMENTE CUMPRAM politicas internas, como garantir que todos os buckets S3 tenham criptografia habilitada. Qual servico deve ser usado?",o:{en:["AWS CloudTrail","AWS Trusted Advisor","AWS Config","Amazon Inspector"],pt:["AWS CloudTrail","AWS Trusted Advisor","AWS Config","Amazon Inspector"]},a:[2],t:"Config",exp:{pt:{tech:"AWS Config avalia continuamente as configuracoes dos recursos AWS em relacao as regras de conformidade desejadas. Quando um recurso nao esta em conformidade (como um bucket S3 sem criptografia), Config alerta e pode acionar remediacao automatica via SSM Automation.","simple":"Config fica monitorando seus recursos e avisa quando algum nao esta seguindo as regras que voce definiu.","avoid":"CloudTrail registra quem fez mudancas. Config avalia se os recursos estao em conformidade. Trusted Advisor da recomendacoes gerais. Para conformidade continua e automatizada de recursos, use Config."},en:{tech:"AWS Config continuously evaluates AWS resource configurations against desired compliance rules. When a resource is non-compliant (such as an S3 bucket without encryption), Config alerts and can trigger automatic remediation via SSM Automation.","simple":"Config keeps monitoring your resources and notifies you when any is not following the rules you defined.","avoid":"CloudTrail records who made changes. Config evaluates whether resources are compliant. Trusted Advisor gives general recommendations. For continuous automated resource compliance, use Config."}}},
{en:"A company wants MOST cost-effective pricing for an EC2 workload that runs continuously 24/7 for the next 3 years with a predictable instance type. Which pricing model should be used?",pt:"Uma empresa quer o PRECO MAIS ECONOMICO para uma carga de trabalho EC2 que roda continuamente 24/7 pelos proximos 3 anos com tipo de instancia previsivel. Qual modelo de precificacao deve ser usado?",o:{en:["On-Demand Instances","Spot Instances","Reserved Instances (3-year, all upfront)","Savings Plans"],pt:["Instancias On-Demand","Instancias Spot","Reserved Instances (3 anos, pagamento total antecipado)","Savings Plans"]},a:[2],t:"Pricing",exp:{pt:{tech:"Reserved Instances com pagamento total antecipado (All Upfront) por 3 anos oferecem ate 72% de desconto em relacao ao On-Demand. Para workloads estaveis e previsivies de longo prazo, este e o modelo mais economico.","simple":"Reservar por 3 anos pagando tudo adiantado e como comprar passagens de aviao com antecedencia — voce paga menos porque se compromete com antecedencia.","avoid":"Spot Instances sao mais baratas mas podem ser interrompidas a qualquer momento com 2 minutos de aviso — inadequadas para workloads 24/7 criticos."},en:{tech:"Reserved Instances with All Upfront payment for 3 years offer up to 72% discount compared to On-Demand. For stable, predictable long-term workloads, this is the most cost-effective model.","simple":"Reserving for 3 years and paying everything upfront is like buying airline tickets in advance — you pay less because you commit early.","avoid":"Spot Instances are cheaper but can be interrupted at any moment with 2 minutes notice — inadequate for critical 24/7 workloads."}}},
{en:"A company has unpredictable batch workloads that can tolerate interruptions and wants the MOST cost-effective compute option. Which EC2 pricing model should be used?",pt:"Uma empresa tem cargas de trabalho batch imprevisiveis que podem tolerar interrupcoes e quer a opcao de computacao MAIS ECONOMICA. Qual modelo de precificacao EC2 deve ser usado?",o:{en:["On-Demand Instances","Reserved Instances","Spot Instances","Dedicated Hosts"],pt:["Instancias On-Demand","Reserved Instances","Instancias Spot","Dedicated Hosts"]},a:[2],t:"Pricing",exp:{pt:{tech:"EC2 Spot Instances usam capacidade ociosa da AWS e podem oferecer ate 90% de desconto em relacao ao On-Demand. Sao ideais para workloads tolerantes a falhas como processamento batch, renderizacao e analise de dados que podem ser reiniciados se interrompidos.","simple":"Spot Instances sao como comprar passagem de ultimo minuto — muito mais barato, mas pode cancelar se a AWS precisar da capacidade de volta.","avoid":"Nunca use Spot para workloads criticos sem estado nao persistido. Implemente checkpointing para que jobs batch possam ser retomados apos interrupcao."},en:{tech:"EC2 Spot Instances use spare AWS capacity and can offer up to 90% discount compared to On-Demand. They are ideal for fault-tolerant workloads like batch processing, rendering, and data analytics that can be restarted if interrupted.","simple":"Spot Instances are like buying last-minute tickets — much cheaper, but they can cancel if AWS needs the capacity back.","avoid":"Never use Spot for critical workloads without persisted state. Implement checkpointing so batch jobs can resume after interruption."}}},
{en:"A company needs to implement a shared file system that can be accessed SIMULTANEOUSLY by multiple EC2 Linux instances WITHOUT managing servers. Which service should be used?",pt:"Uma empresa precisa implementar um sistema de arquivos compartilhado que pode ser acessado SIMULTANEAMENTE por multiplas instancias EC2 Linux SEM gerenciar servidores. Qual servico deve ser usado?",o:{en:["Amazon S3","Amazon EBS Multi-Attach","Amazon EFS (Elastic File System)","Amazon FSx for Windows"],pt:["Amazon S3","Amazon EBS Multi-Attach","Amazon EFS (Elastic File System)","Amazon FSx for Windows"]},a:[2],t:"Storage",exp:{pt:{tech:"Amazon EFS e um sistema de arquivos NFS totalmente gerenciado que escala automaticamente e pode ser montado por milhares de instancias EC2 Linux simultaneamente. Nao ha provisionamento de capacidade — voce paga pelo que usa.","simple":"EFS e como um pendrive gigante na rede que multiplas maquinas Linux podem usar ao mesmo tempo. A AWS gerencia tudo.","avoid":"EBS so pode ser montado em uma instancia por vez (exceto Multi-Attach em casos especificos). S3 nao e um sistema de arquivos POSIX — nao suporta operacoes de arquivo tradicionais. Para compartilhamento NFS entre EC2 Linux, use EFS."},en:{tech:"Amazon EFS is a fully managed NFS file system that scales automatically and can be mounted by thousands of EC2 Linux instances simultaneously. There is no capacity provisioning — you pay for what you use.","simple":"EFS is like a giant network drive that multiple Linux machines can use at the same time. AWS manages everything.","avoid":"EBS can only be mounted on one instance at a time (except Multi-Attach in specific cases). S3 is not a POSIX file system — it does not support traditional file operations. For NFS sharing between EC2 Linux, use EFS."}}},
{en:"A solutions architect needs to choose a content delivery approach for a web application. Static assets are stored in S3 and MUST BE IMMEDIATELY AVAILABLE globally. Which configuration is correct?",pt:"Um arquiteto de solucoes precisa escolher uma abordagem de entrega de conteudo para uma aplicacao web. Assets estaticos estao no S3 e DEVEM ESTAR IMEDIATAMENTE DISPONIVEIS globalmente. Qual configuracao e correta?",o:{en:["S3 Glacier for all assets with CloudFront","S3 Standard with CloudFront distribution","S3 Standard-IA with Route 53","S3 Intelligent-Tiering only"],pt:["S3 Glacier para todos os assets com CloudFront","S3 Standard com distribuicao CloudFront","S3 Standard-IA com Route 53","S3 Intelligent-Tiering somente"]},a:[1],t:"CloudFront",exp:{pt:{tech:"S3 Standard garante disponibilidade imediata de objetos (99.99%). CloudFront distribui o conteudo globalmente via rede de edge locations. S3 Glacier tem latencia de recuperacao de minutos a horas — incompativel com requisito de acesso imediato para website.","simple":"Para site rapido no mundo todo: arquivos no S3 Standard (disponivel na hora) + CloudFront (distribui pelo mundo).","avoid":"Nunca use S3 Glacier para assets de website. A latencia de recuperacao tornaria o site inutilizavel. Para conteudo de site, use sempre S3 Standard ou S3 Standard-IA."},en:{tech:"S3 Standard guarantees immediate object availability (99.99% availability). CloudFront distributes content globally via edge location network. S3 Glacier has retrieval latency of minutes to hours — incompatible with immediate access requirement for websites.","simple":"For a fast global website: files on S3 Standard (immediately available) + CloudFront (distributes worldwide).","avoid":"Never use S3 Glacier for website assets. Retrieval latency would make the site unusable. For website content, always use S3 Standard or S3 Standard-IA."}}},
{en:"A company wants to use AWS services but needs to understand which security responsibilities belong to AWS and which belong to the customer. Which AWS concept defines these boundaries?",pt:"Uma empresa quer usar servicos AWS mas precisa entender quais responsabilidades de seguranca sao da AWS e quais sao do cliente. Qual conceito AWS define esses limites?",o:{en:["AWS Well-Architected Framework","AWS Shared Responsibility Model","AWS Acceptable Use Policy","AWS Service Level Agreement"],pt:["AWS Well-Architected Framework","Modelo de Responsabilidade Compartilhada AWS","Politica de Uso Aceitavel AWS","Acordo de Nivel de Servico AWS"]},a:[1],t:"SharedResponsibility",exp:{pt:{tech:"O Shared Responsibility Model define que a AWS e responsavel pela seguranca DA nuvem (infraestrutura fisica, hardware, software de virtualizacao, redes) e o cliente e responsavel pela seguranca NA nuvem (dados, IAM, configuracao de OS, criptografia de dados, configuracao de rede).","simple":"A AWS cuida do datacenter e dos servidores fisicos. Voce cuida de quem acessa seus dados e como eles estao configurados.","avoid":"A divisao muda por tipo de servico: em EC2 o cliente gerencia o OS; em Lambda ou RDS gerenciado, a AWS assume mais responsabilidades. Sempre verifique o nivel de gerenciamento do servico."},en:{tech:"The Shared Responsibility Model defines that AWS is responsible for security OF the cloud (physical infrastructure, hardware, virtualization software, networks) and the customer is responsible for security IN the cloud (data, IAM, OS configuration, data encryption, network configuration).","simple":"AWS takes care of the datacenter and physical servers. You take care of who accesses your data and how it is configured.","avoid":"The division changes by service type: in EC2 the customer manages the OS; in Lambda or managed RDS, AWS assumes more responsibilities. Always check the service management level."}}},
{en:"A company needs to route users to the NEAREST healthy application endpoint to ensure MINIMUM LATENCY and HIGH AVAILABILITY globally. Which service should be used?",pt:"Uma empresa precisa rotear usuarios para o endpoint de aplicacao saudavel MAIS PROXIMO para garantir MINIMA LATENCIA e ALTA DISPONIBILIDADE globalmente. Qual servico deve ser usado?",o:{en:["Amazon CloudFront","AWS Global Accelerator","Amazon Route 53 with latency-based routing","Elastic Load Balancer"],pt:["Amazon CloudFront","AWS Global Accelerator","Amazon Route 53 com roteamento baseado em latencia","Elastic Load Balancer"]},a:[2],t:"GlobalInfrastructure",exp:{pt:{tech:"AWS Global Accelerator usa a rede backbone global da AWS para rotear trafego TCP/UDP para o endpoint saudavel mais proximo com failover automatico em menos de 30 segundos. Fornece IPs anycast estaticos e melhora performance de rede em media 60% comparado a internet publica.","simple":"Global Accelerator e como uma estrada expressa privada da AWS. Em vez de usar a internet publica com seus desvios, seu trafego vai pela rede interna da AWS — mais rapido e mais confiavel.","avoid":"CloudFront e CDN para conteudo HTTP com cache. Global Accelerator e para qualquer trafego TCP/UDP com roteamento inteligente de rede. Para aplicacoes nao-HTTP ou que precisam de IPs fixos globais, use Global Accelerator."},en:{tech:"AWS Global Accelerator uses the AWS global backbone network to route TCP/UDP traffic to the nearest healthy endpoint with automatic failover in less than 30 seconds. It provides static anycast IPs and improves network performance by an average of 60% compared to public internet.","simple":"Global Accelerator is like an AWS private expressway. Instead of using the public internet with its detours, your traffic goes through the AWS internal network — faster and more reliable.","avoid":"CloudFront is CDN for HTTP content with caching. Global Accelerator is for any TCP/UDP traffic with intelligent network routing. For non-HTTP applications or those needing fixed global IPs, use Global Accelerator."}}},
{en:"A company needs to access compliance reports such as SOC 2 and ISO 27001 to COMPLY WITH REGULATIONS required by their clients. Where can these reports be downloaded?",pt:"Uma empresa precisa acessar relatorios de conformidade como SOC 2 e ISO 27001 para CUMPRIR REGULAMENTOS exigidos por seus clientes. Onde esses relatorios podem ser baixados?",o:{en:["AWS Security Hub dashboard","AWS Trusted Advisor","AWS Artifact","AWS Config compliance reports"],pt:["Painel do AWS Security Hub","AWS Trusted Advisor","AWS Artifact","Relatorios de conformidade do AWS Config"]},a:[2],t:"Compliance",exp:{pt:{tech:"AWS Artifact e o portal de self-service onde clientes AWS podem acessar e baixar relatorios de auditoria e conformidade de terceiros (SOC 1, SOC 2, SOC 3, PCI DSS, ISO 27001, ISO 27017, ISO 27018, FedRAMP) e assinar acordos como o BAA (Business Associate Agreement) para HIPAA.","simple":"AWS Artifact e a biblioteca de documentos de conformidade da AWS. E onde voce vai quando um cliente ou auditor pede prova de que a AWS esta certificada.","avoid":"AWS Artifact fornece documentos de conformidade DA AWS (certificacoes da propria AWS). Para conformidade DOS SEUS recursos, use AWS Config. Para achados de seguranca dos seus recursos, use Security Hub."},en:{tech:"AWS Artifact is the self-service portal where AWS customers can access and download third-party audit and compliance reports (SOC 1, SOC 2, SOC 3, PCI DSS, ISO 27001, ISO 27017, ISO 27018, FedRAMP) and sign agreements like the BAA (Business Associate Agreement) for HIPAA.","simple":"AWS Artifact is the AWS compliance document library. It is where you go when a customer or auditor asks for proof that AWS is certified.","avoid":"AWS Artifact provides compliance documents OF AWS (AWS own certifications). For compliance OF YOUR resources, use AWS Config. For security findings on your resources, use Security Hub."}}},
{en:"A company needs to connect their on-premises data center to AWS with a DEDICATED, PRIVATE connection that provides CONSISTENT NETWORK PERFORMANCE. Which service should be used?",pt:"Uma empresa precisa conectar seu datacenter on-premises a AWS com uma conexao DEDICADA E PRIVADA que fornece PERFORMANCE DE REDE CONSISTENTE. Qual servico deve ser usado?",o:{en:["AWS Site-to-Site VPN","AWS Direct Connect","AWS Transit Gateway","Amazon VPC Peering"],pt:["AWS Site-to-Site VPN","AWS Direct Connect","AWS Transit Gateway","Amazon VPC Peering"]},a:[1],t:"Networking",exp:{pt:{tech:"AWS Direct Connect estabelece uma conexao de rede dedicada e privada entre o datacenter on-premises e a AWS, bypassing a internet publica. Fornece largura de banda consistente, latencia previsivel e menor custo de transferencia de dados em comparacao com VPN.","simple":"Direct Connect e como um cabo direto entre seu datacenter e a AWS — privado, dedicado e sem compartilhar a internet com mais ninguem.","avoid":"VPN usa a internet publica com criptografia — performance varia conforme congestionamento. Direct Connect e para quando voce precisa de largura de banda e latencia consistentes e previsíveis."},en:{tech:"AWS Direct Connect establishes a dedicated, private network connection between the on-premises datacenter and AWS, bypassing the public internet. It provides consistent bandwidth, predictable latency, and lower data transfer costs compared to VPN.","simple":"Direct Connect is like a direct cable between your datacenter and AWS — private, dedicated, and not sharing the internet with anyone else.","avoid":"VPN uses the public internet with encryption — performance varies with congestion. Direct Connect is for when you need consistent and predictable bandwidth and latency."}}},
{en:"A company running workloads on EC2 wants to reduce costs. They have a flexible start and end time for processing jobs and want the MOST cost-effective option. Which TWO options should be considered?",pt:"Uma empresa rodando workloads em EC2 quer reduzir custos. Eles tem horario de inicio e fim flexiveis para jobs de processamento e querem a opcao MAIS ECONOMICA. Quais DUAS opcoes devem ser consideradas?",o:{en:["On-Demand Instances","Spot Instances","Reserved Instances","Savings Plans with Spot"],pt:["Instancias On-Demand","Instancias Spot","Reserved Instances","Savings Plans com Spot"]},a:[1,3],t:"Pricing",multi:true,exp:{pt:{tech:"Spot Instances oferecem ate 90% de desconto para capacidade ociosa com possibilidade de interrupcao. Savings Plans fornecem desconto de ate 66% em relacao a On-Demand em troca de compromisso de uso ($/hora) com flexibilidade de tipo de instancia e regiao, podendo ser combinados com Spot.","simple":"Para jobs flexiveis e economicos: Spot (mais barato, pode ser interrompido) e Savings Plans (desconto garantido com flexibilidade). Os dois juntos maximizam economia.","avoid":"Reserved Instances requerem compromisso de tipo de instancia especifico. Para workloads com horario flexivel, a combinacao Spot + Savings Plans e mais eficiente."},en:{tech:"Spot Instances offer up to 90% discount for spare capacity with possible interruption. Savings Plans provide up to 66% discount compared to On-Demand in exchange for usage commitment ($/hour) with instance type and region flexibility, and can be combined with Spot.","simple":"For flexible, cost-effective jobs: Spot (cheapest, can be interrupted) and Savings Plans (guaranteed discount with flexibility). Both together maximize savings.","avoid":"Reserved Instances require commitment to a specific instance type. For workloads with flexible schedules, the Spot + Savings Plans combination is more efficient."}}},
{en:"A company wants to CENTRALLY MANAGE billing and consolidate costs across 12 AWS accounts with a single payment method. Which feature should be used?",pt:"Uma empresa quer GERENCIAR CENTRALMENTE o faturamento e consolidar custos em 12 contas AWS com um unico metodo de pagamento. Qual funcionalidade deve ser usada?",o:{en:["AWS Cost Explorer per account","Consolidated Billing in AWS Organizations","AWS Budgets with multi-account support","AWS Cost and Usage Report"],pt:["AWS Cost Explorer por conta","Faturamento Consolidado no AWS Organizations","AWS Budgets com suporte multi-conta","AWS Cost and Usage Report"]},a:[1],t:"Billing",exp:{pt:{tech:"O Consolidated Billing do AWS Organizations combina o uso de todas as contas-membro em uma unica fatura da conta de gerenciamento. Alem de simplificar o pagamento, permite acumular uso para atingir tier de desconto por volume e compartilhar Reserved Instances e Savings Plans entre contas.","simple":"Consolidated Billing junta todas as faturas num so lugar e voce paga uma vez. Ainda tem bonus: o uso combinado pode dar desconto maior.","avoid":"Consolidated Billing nao restringe o que as contas podem gastar — para isso use AWS Budgets com alertas ou SCPs. Consolidated Billing e apenas para agregacao de faturamento."},en:{tech:"AWS Organizations Consolidated Billing combines usage from all member accounts into a single management account invoice. Besides simplifying payment, it allows accumulating usage to reach volume discount tiers and sharing Reserved Instances and Savings Plans across accounts.","simple":"Consolidated Billing puts all invoices in one place and you pay once. Bonus: combined usage can unlock bigger discounts.","avoid":"Consolidated Billing does not restrict what accounts can spend — for that use AWS Budgets with alerts or SCPs. Consolidated Billing is only for billing aggregation."}}},
{en:"A company wants to automatically DETECT THREATS and SUSPICIOUS ACTIVITY in their AWS account by analyzing CloudTrail, VPC Flow Logs, and DNS logs. Which service should be enabled?",pt:"Uma empresa quer DETECTAR AMEACAS e ATIVIDADES SUSPEITAS automaticamente em sua conta AWS analisando CloudTrail, VPC Flow Logs e logs DNS. Qual servico deve ser habilitado?",o:{en:["AWS Config","AWS Security Hub","Amazon GuardDuty","Amazon Macie"],pt:["AWS Config","AWS Security Hub","Amazon GuardDuty","Amazon Macie"]},a:[2],t:"ThreatDetection",exp:{pt:{tech:"Amazon GuardDuty e um servico de deteccao de ameacas que usa ML e threat intelligence para analisar automaticamente CloudTrail, VPC Flow Logs e logs DNS em busca de comportamentos suspeitos como comunicacao com IPs maliciosos, tentativas de movimentacao lateral e atividade de mineracao de criptomoeda.","simple":"GuardDuty fica monitorando logs da AWS e usa inteligencia artificial para detectar quando algo suspeito esta acontecendo na sua conta.","avoid":"Security Hub centraliza findings de varios servicos incluindo GuardDuty, mas nao detecta ameacas por si so. GuardDuty e o detector; Security Hub e o painel centralizador."},en:{tech:"Amazon GuardDuty is a threat detection service that uses ML and threat intelligence to automatically analyze CloudTrail, VPC Flow Logs, and DNS logs for suspicious behaviors like communication with malicious IPs, lateral movement attempts, and cryptocurrency mining activity.","simple":"GuardDuty monitors AWS logs and uses artificial intelligence to detect when something suspicious is happening in your account.","avoid":"Security Hub centralizes findings from multiple services including GuardDuty, but does not detect threats on its own. GuardDuty is the detector; Security Hub is the centralizing dashboard."}}},
{en:"A company needs to transfer on-premises file shares (NFS and SMB) to AWS while keeping legacy applications accessing the data WITHOUT code changes. Which service acts as a bridge?",pt:"Uma empresa precisa transferir compartilhamentos de arquivos on-premises (NFS e SMB) para AWS mantendo aplicacoes legadas acessando os dados SEM alteracoes de codigo. Qual servico age como ponte?",o:{en:["AWS DataSync","AWS Snowball Edge","AWS Storage Gateway","AWS Direct Connect"],pt:["AWS DataSync","AWS Snowball Edge","AWS Storage Gateway","AWS Direct Connect"]},a:[2],t:"HybridStorage",exp:{pt:{tech:"AWS Storage Gateway e um servico hibrido que permite aplicacoes on-premises acessarem storage AWS (S3, FSx, EBS) via protocolos padrao NFS, SMB e iSCSI. O gateway armazena dados ativamente usados localmente e move dados frios para a nuvem automaticamente.","simple":"Storage Gateway e uma ponte entre seu datacenter e a AWS. Seus sistemas legados usam NFS/SMB como sempre, mas os dados ficam na nuvem por baixo dos panos.","avoid":"DataSync e para migrar ou sincronizar dados. Storage Gateway e para acesso continuo hibrido. Se a aplicacao precisa continuar usando NFS/SMB sem mudancas, use Storage Gateway."},en:{tech:"AWS Storage Gateway is a hybrid service that allows on-premises applications to access AWS storage (S3, FSx, EBS) via standard NFS, SMB, and iSCSI protocols. The gateway caches actively used data locally and automatically moves cold data to the cloud.","simple":"Storage Gateway is a bridge between your datacenter and AWS. Your legacy systems use NFS/SMB as always, but the data lives in the cloud underneath.","avoid":"DataSync is for migrating or syncing data. Storage Gateway is for continuous hybrid access. If the application needs to keep using NFS/SMB without changes, use Storage Gateway."}}},
{en:"A company wants to launch a customer-facing application that collects PERSONALLY IDENTIFIABLE INFORMATION and must COMPLY WITH GDPR. Which TWO AWS tools help demonstrate compliance?",pt:"Uma empresa quer lancar uma aplicacao que coleta INFORMACOES DE IDENTIFICACAO PESSOAL e deve CUMPRIR com GDPR. Quais DUAS ferramentas AWS ajudam a demonstrar conformidade?",o:{en:["Amazon Macie","AWS Artifact","Amazon Rekognition","AWS Trusted Advisor"],pt:["Amazon Macie","AWS Artifact","Amazon Rekognition","AWS Trusted Advisor"]},a:[0,1],t:"Compliance",multi:true,exp:{pt:{tech:"Amazon Macie detecta e classifica automaticamente PII nos buckets S3, essencial para GDPR (saber onde dados pessoais estao armazenados). AWS Artifact fornece os documentos de certificacao GDPR e ISO 27001 da AWS para apresentar a auditores e demonstrar que a infraestrutura base esta em conformidade.","simple":"Macie encontra onde seus dados pessoais estao no S3. Artifact fornece os certificados que provam que a AWS cumpre o GDPR. Juntos, eles cobrem o que voce precisa mostrar ao auditor.","avoid":"GDPR e uma responsabilidade compartilhada. AWS fornece a infraestrutura conformante (Artifact) e ferramentas para voce ser conformante (Macie). A configuracao correta dos seus sistemas e sua responsabilidade."},en:{tech:"Amazon Macie automatically detects and classifies PII in S3 buckets, essential for GDPR (knowing where personal data is stored). AWS Artifact provides AWS GDPR and ISO 27001 certification documents to present to auditors and demonstrate that the base infrastructure is compliant.","simple":"Macie finds where your personal data is in S3. Artifact provides certificates proving AWS complies with GDPR. Together, they cover what you need to show the auditor.","avoid":"GDPR is a shared responsibility. AWS provides the compliant infrastructure (Artifact) and tools for you to be compliant (Macie). Correct configuration of your systems is your responsibility."}}},
{en:"A company wants to track all API calls made to their AWS account for compliance and forensic purposes. Which service should they use?",pt:"Uma empresa quer rastrear todas as chamadas de API feitas em sua conta AWS para fins de conformidade e forense. Qual serviço deve ser usado?",o:{en:["AWS CloudWatch","AWS CloudTrail","AWS Config","AWS Inspector"],pt:["AWS CloudWatch","AWS CloudTrail","AWS Config","AWS Inspector"]},a:[1],t:"CloudTrail",exp:{pt:{tech:"CloudTrail registra toda atividade de API (quem fez o que, quando, de onde) na conta AWS. CloudWatch monitora métricas e logs operacionais. Config rastreia mudanças de configuração de recursos. Inspector analisa vulnerabilidades em EC2.",simple:"CloudTrail é o serviço de auditoria de chamadas de API. CloudWatch é monitoramento de desempenho.",avoid:"Nunca confunda auditoria de API (CloudTrail) com monitoramento de métricas (CloudWatch). São propósitos completamente diferentes."},en:{tech:"CloudTrail records all API activity (who did what, when, from where) in the AWS account. CloudWatch monitors operational metrics and logs. Config tracks resource configuration changes. Inspector analyzes vulnerabilities on EC2.",simple:"CloudTrail is the API audit service. CloudWatch is performance monitoring.",avoid:"Never confuse API auditing (CloudTrail) with metrics monitoring (CloudWatch). They serve completely different purposes."}}},
{en:"A team is receiving alerts when CPU utilization on their EC2 instances exceeds 80%. Which AWS service is responsible for sending these alerts?",pt:"Uma equipe está recebendo alertas quando a utilização de CPU nas instâncias EC2 excede 80%. Qual serviço AWS é responsável por enviar esses alertas?",o:{en:["AWS CloudTrail","AWS Config","AWS CloudWatch","AWS Trusted Advisor"],pt:["AWS CloudTrail","AWS Config","AWS CloudWatch","AWS Trusted Advisor"]},a:[2],t:"CloudWatch",exp:{pt:{tech:"CloudWatch Alarms monitoram métricas como CPU, memória e rede e disparam notificações via SNS quando os limites configurados são atingidos. CloudTrail é para auditoria de API, não métricas de desempenho.",simple:"CloudWatch é o serviço que monitora métricas e envia alertas baseados em limites.",avoid:"Não configure CloudTrail esperando receber alertas de desempenho. CloudTrail grava eventos de API, não métricas de recursos."},en:{tech:"CloudWatch Alarms monitor metrics such as CPU, memory, and network and trigger notifications via SNS when configured thresholds are reached. CloudTrail is for API auditing, not performance metrics.",simple:"CloudWatch is the service that monitors metrics and sends threshold-based alerts.",avoid:"Do not configure CloudTrail expecting performance alerts. CloudTrail records API events, not resource metrics."}}},
{en:"A security team needs to detect threats such as compromised credentials and unusual API calls across their entire AWS account. Which service provides this capability?",pt:"Uma equipe de segurança precisa detectar ameaças como credenciais comprometidas e chamadas de API incomuns em toda a conta AWS. Qual serviço oferece essa capacidade?",o:{en:["Amazon Inspector","AWS Shield","Amazon GuardDuty","AWS CloudTrail"],pt:["Amazon Inspector","AWS Shield","Amazon GuardDuty","AWS CloudTrail"]},a:[2],t:"GuardDuty",exp:{pt:{tech:"GuardDuty é um serviço de detecção de ameaças que analisa continuamente logs do CloudTrail, VPC Flow Logs e DNS para identificar comportamentos maliciosos em toda a conta. Inspector foca em vulnerabilidades de software em instâncias EC2.",simple:"GuardDuty monitora ameaças na conta inteira. Inspector verifica vulnerabilidades em EC2 específicas.",avoid:"Nunca dependa apenas do CloudTrail para detectar ameaças: ele registra chamadas, mas não analisa padrões maliciosos automaticamente."},en:{tech:"GuardDuty is a threat detection service that continuously analyzes CloudTrail logs, VPC Flow Logs, and DNS to identify malicious behavior across the account. Inspector focuses on software vulnerabilities on EC2 instances.",simple:"GuardDuty monitors threats account-wide. Inspector checks vulnerabilities on specific EC2 instances.",avoid:"Never rely solely on CloudTrail to detect threats: it records calls, but does not automatically analyze malicious patterns."}}},
{en:"A developer needs to scan EC2 instances for software vulnerabilities and unintended network exposure. Which AWS service is MOST appropriate?",pt:"Um desenvolvedor precisa verificar instâncias EC2 em busca de vulnerabilidades de software e exposição de rede não intencional. Qual serviço AWS é o MAIS adequado?",o:{en:["Amazon GuardDuty","Amazon Inspector","AWS Shield","AWS WAF"],pt:["Amazon GuardDuty","Amazon Inspector","AWS Shield","AWS WAF"]},a:[1],t:"Inspector",exp:{pt:{tech:"Amazon Inspector realiza avaliações automatizadas de segurança em instâncias EC2, verificando vulnerabilidades de software (CVEs), configurações inseguras e exposição de rede. GuardDuty faz detecção de ameaças na conta inteira, não escaneamento de vulnerabilidades.",simple:"Inspector escaneia vulnerabilidades em EC2. GuardDuty detecta ameaças comportamentais na conta.",avoid:"Instalar o agente Inspector em instâncias de produção sem testar antes pode impactar desempenho. Teste em ambiente não produtivo primeiro."},en:{tech:"Amazon Inspector performs automated security assessments on EC2 instances, checking for software vulnerabilities (CVEs), insecure configurations, and network exposure. GuardDuty does account-wide threat detection, not vulnerability scanning.",simple:"Inspector scans EC2 for vulnerabilities. GuardDuty detects behavioral threats account-wide.",avoid:"Installing the Inspector agent on production instances without prior testing may impact performance. Test in a non-production environment first."}}},
{en:"A company requires dedicated hardware for their encryption keys to meet strict compliance requirements and wants full control over the HSM. Which AWS service should they choose?",pt:"Uma empresa precisa de hardware dedicado para suas chaves de criptografia para atender a requisitos rígidos de conformidade e quer controle total sobre o HSM. Qual serviço AWS deve ser escolhido?",o:{en:["AWS KMS with customer managed keys","AWS CloudHSM","AWS Secrets Manager","AWS Certificate Manager"],pt:["AWS KMS com chaves gerenciadas pelo cliente","AWS CloudHSM","AWS Secrets Manager","AWS Certificate Manager"]},a:[1],t:"KMS & Encryption",exp:{pt:{tech:"CloudHSM fornece hardware dedicado e exclusivo ao cliente, com controle total das chaves. KMS usa hardware compartilhado (multi-tenant) gerenciado pela AWS. Para conformidades como FIPS 140-2 Level 3 que exigem HSM dedicado, CloudHSM é obrigatório.",simple:"CloudHSM = hardware exclusivo seu. KMS = hardware compartilhado gerenciado pela AWS.",avoid:"CloudHSM é significativamente mais caro que KMS. Use somente quando conformidade exige hardware dedicado, não apenas por preferência."},en:{tech:"CloudHSM provides dedicated hardware exclusively for the customer, with full key control. KMS uses shared (multi-tenant) hardware managed by AWS. For compliance standards like FIPS 140-2 Level 3 requiring dedicated HSM, CloudHSM is mandatory.",simple:"CloudHSM = hardware exclusively yours. KMS = shared hardware managed by AWS.",avoid:"CloudHSM is significantly more expensive than KMS. Use only when compliance requires dedicated hardware, not just by preference."}}},
{en:"A company uses AWS KMS to encrypt their S3 data. According to the Shared Responsibility Model, who is responsible for managing the KMS key rotation policy?",pt:"Uma empresa usa AWS KMS para criptografar dados no S3. De acordo com o Modelo de Responsabilidade Compartilhada, quem é responsável por gerenciar a política de rotação de chaves do KMS?",o:{en:["AWS is responsible because KMS is a managed service","The customer is responsible for configuring key rotation","Both AWS and customer share equal responsibility","AWS handles rotation automatically without customer involvement"],pt:["A AWS é responsável porque KMS é um serviço gerenciado","O cliente é responsável por configurar a rotação de chaves","AWS e cliente compartilham responsabilidade igual","A AWS gerencia a rotação automaticamente sem envolvimento do cliente"]},a:[1],t:"Shared Responsibility",exp:{pt:{tech:"No Modelo de Responsabilidade Compartilhada, o cliente é responsável por configurar e gerenciar suas chaves KMS, incluindo políticas de rotação, políticas de acesso e uso das chaves. A AWS gerencia a infraestrutura subjacente do KMS.",simple:"KMS é gerenciado pela AWS em termos de infraestrutura, mas o cliente controla as políticas e configurações das chaves.",avoid:"Não assuma que porque é um serviço gerenciado a AWS cuida de tudo. Configuração de segurança das chaves é sempre responsabilidade do cliente."},en:{tech:"Under the Shared Responsibility Model, the customer is responsible for configuring and managing their KMS keys, including rotation policies, access policies, and key usage. AWS manages the underlying KMS infrastructure.",simple:"KMS infrastructure is managed by AWS, but the customer controls key policies and configurations.",avoid:"Do not assume that because it is a managed service AWS handles everything. Key security configuration is always the customer's responsibility."}}},
{en:"A company runs a MySQL database on an EC2 instance. According to the Shared Responsibility Model, who is responsible for patching the database engine?",pt:"Uma empresa executa um banco de dados MySQL em uma instância EC2. De acordo com o Modelo de Responsabilidade Compartilhada, quem é responsável por aplicar patches no mecanismo de banco de dados?",o:{en:["AWS, because EC2 is a managed compute service","The customer, because the database runs on an EC2 instance they manage","AWS for the database, customer for the operating system","Neither — AWS handles all patches automatically"],pt:["A AWS, porque EC2 é um serviço de computação gerenciado","O cliente, porque o banco de dados roda em uma instância EC2 que eles gerenciam","A AWS para o banco de dados, o cliente para o sistema operacional","Nenhum — a AWS gerencia todos os patches automaticamente"]},a:[1],t:"Shared Responsibility",exp:{pt:{tech:"No EC2, o cliente é responsável pelo sistema operacional, patches, aplicações e dados. Diferente do RDS, onde a AWS gerencia o mecanismo do banco de dados. No EC2, o banco de dados é uma aplicação instalada pelo cliente.",simple:"EC2 = você cuida de tudo acima do hypervisor. RDS = AWS cuida do mecanismo do banco.",avoid:"Nunca execute bancos de dados em produção no EC2 sem um plano de patching automatizado. Considere migrar para RDS para reduzir carga operacional."},en:{tech:"With EC2, the customer is responsible for the operating system, patches, applications, and data. Unlike RDS, where AWS manages the database engine. On EC2, the database is an application installed by the customer.",simple:"EC2 = you manage everything above the hypervisor. RDS = AWS manages the database engine.",avoid:"Never run production databases on EC2 without an automated patching plan. Consider migrating to RDS to reduce operational overhead."}}},
{en:"A company migrated from EC2-hosted MySQL to Amazon RDS MySQL. According to the Shared Responsibility Model, what responsibility did they transfer to AWS?",pt:"Uma empresa migrou de MySQL hospedado em EC2 para Amazon RDS MySQL. De acordo com o Modelo de Responsabilidade Compartilhada, qual responsabilidade eles transferiram para a AWS?",o:{en:["Encrypting data at rest","Patching the database engine","Managing IAM access to the database","Creating and testing database backups"],pt:["Criptografar dados em repouso","Aplicar patches no mecanismo do banco de dados","Gerenciar acesso IAM ao banco de dados","Criar e testar backups do banco de dados"]},a:[1],t:"Shared Responsibility",exp:{pt:{tech:"Com RDS, a AWS assume a responsabilidade de patching do mecanismo do banco de dados, do sistema operacional subjacente e da infraestrutura. O cliente ainda gerencia criptografia (configuração), IAM, backups (habilitar/testar) e dados.",simple:"RDS transfere o patching do banco para a AWS. Configurações de segurança e dados continuam sendo do cliente.",avoid:"Habilitar backups automáticos no RDS não substitui testar a restauração. Valide o processo de recuperação regularmente."},en:{tech:"With RDS, AWS takes responsibility for patching the database engine, the underlying operating system, and infrastructure. The customer still manages encryption (configuration), IAM, backups (enabling/testing), and data.",simple:"RDS transfers database patching to AWS. Security settings and data remain the customer's responsibility.",avoid:"Enabling automatic backups in RDS does not replace testing restoration. Regularly validate your recovery process."}}},
{en:"A company needs a Support Plan that includes access to a Technical Account Manager (TAM). What is the MINIMUM support plan required?",pt:"Uma empresa precisa de um plano de suporte que inclua acesso a um Technical Account Manager (TAM). Qual é o plano de suporte MÍNIMO necessário?",o:{en:["Basic","Developer","Business","Enterprise"],pt:["Basic","Developer","Business","Enterprise"]},a:[3],t:"Support Plans",exp:{pt:{tech:"O Technical Account Manager (TAM) está disponível apenas nos planos Enterprise On-Ramp e Enterprise. O plano Business inclui acesso a engenheiros de suporte via API e suporte 24/7, mas não inclui TAM.",simple:"TAM é exclusivo do plano Enterprise (e Enterprise On-Ramp). Business não tem TAM.",avoid:"Não confunda o suporte de engenheiros de nuvem (Business) com o TAM dedicado (Enterprise). São níveis de engajamento completamente diferentes."},en:{tech:"The Technical Account Manager (TAM) is available only on Enterprise On-Ramp and Enterprise plans. The Business plan includes access to support engineers via API and 24/7 support, but does not include a TAM.",simple:"TAM is exclusive to Enterprise (and Enterprise On-Ramp) plans. Business does not have a TAM.",avoid:"Do not confuse cloud support engineer access (Business) with a dedicated TAM (Enterprise). These are completely different engagement levels."}}},
{en:"A startup on the Developer Support Plan reports that their production system is down. What is the maximum initial response time they should expect?",pt:"Uma startup no plano Developer Support reporta que seu sistema de produção está fora do ar. Qual é o tempo máximo de resposta inicial que eles devem esperar?",o:{en:["15 minutes","1 hour","12 hours","24 hours"],pt:["15 minutos","1 hora","12 horas","24 horas"]},a:[2],t:"Support Plans",exp:{pt:{tech:"No plano Developer, o SLA para casos de sistema de produção fora do ar (severity: production system impaired) é de 12 horas. Para casos críticos de negócios (business-critical down), apenas Business e Enterprise oferecem respostas em 1 hora ou menos.",simple:"Developer: 12h para produção impactada. Business: 1h. Enterprise: 15min para crítico.",avoid:"Não use o plano Developer para workloads de produção críticos. O SLA de 12h pode causar perda significativa de receita em incidentes sérios."},en:{tech:"On the Developer plan, the SLA for production system impaired cases is 12 hours. For business-critical system down cases, only Business and Enterprise offer responses in 1 hour or less.",simple:"Developer: 12h for production impaired. Business: 1h. Enterprise: 15min for critical.",avoid:"Do not use the Developer plan for critical production workloads. The 12h SLA can cause significant revenue loss during serious incidents."}}},
{en:"Which AWS Support Plan provides access to the Concierge Support Team for billing and account inquiries?",pt:"Qual plano de suporte AWS fornece acesso ao Concierge Support Team para consultas de faturamento e conta?",o:{en:["Business","Developer","Enterprise","Basic"],pt:["Business","Developer","Enterprise","Basic"]},a:[2],t:"Support Plans",exp:{pt:{tech:"O Concierge Support Team, que ajuda com questões de faturamento e gerenciamento de conta, está disponível apenas nos planos Enterprise On-Ramp e Enterprise. O plano Business oferece acesso 24/7 a engenheiros de suporte, mas não ao Concierge.",simple:"Concierge é exclusivo do Enterprise. Business tem suporte técnico 24/7 mas não Concierge.",avoid:"Não escale questões de faturamento para o suporte técnico geral. O Concierge Team é o canal correto para otimização de custos e questões de conta no nível Enterprise."},en:{tech:"The Concierge Support Team, which assists with billing and account management issues, is available only on Enterprise On-Ramp and Enterprise plans. The Business plan offers 24/7 access to support engineers, but not Concierge.",simple:"Concierge is Enterprise-exclusive. Business has 24/7 technical support but no Concierge.",avoid:"Do not escalate billing questions to general technical support. The Concierge Team is the correct channel for cost optimization and account issues at Enterprise level."}}},
{en:"A company wants to receive the FULL set of Trusted Advisor checks, including those related to security and cost optimization. What is the MINIMUM Support Plan required?",pt:"Uma empresa quer receber o conjunto COMPLETO de verificações do Trusted Advisor, incluindo as relacionadas a segurança e otimização de custos. Qual é o plano de suporte MÍNIMO necessário?",o:{en:["Basic","Developer","Business","Enterprise"],pt:["Basic","Developer","Business","Enterprise"]},a:[2],t:"Support Plans",exp:{pt:{tech:"O Trusted Advisor completo (todas as verificações nas 5 categorias: custo, desempenho, segurança, tolerância a falhas e limites de serviço) requer plano Business ou superior. Basic e Developer têm acesso a apenas 7 verificações principais.",simple:"Trusted Advisor completo = Business ou superior. Free/Developer = apenas 7 checks básicos.",avoid:"Não assuma que verificações gratuitas do Trusted Advisor cobrem segurança completa. Elas são limitadas. Use AWS Security Hub para uma postura de segurança mais abrangente."},en:{tech:"Full Trusted Advisor (all checks across 5 categories: cost, performance, security, fault tolerance, and service limits) requires Business plan or higher. Basic and Developer have access to only 7 core checks.",simple:"Full Trusted Advisor = Business or higher. Free/Developer = only 7 basic checks.",avoid:"Do not assume free Trusted Advisor checks provide complete security coverage. They are limited. Use AWS Security Hub for a more comprehensive security posture."}}},
{en:"An organization is planning a cloud migration and wants to align their organizational capabilities with a structured framework. They want to evaluate their Business, People, and Governance perspectives. Which AWS framework are they using?",pt:"Uma organização está planejando uma migração para a nuvem e quer alinhar suas capacidades organizacionais com um framework estruturado. Eles querem avaliar as perspectivas de Business, People e Governance. Qual framework AWS estão usando?",o:{en:["AWS Well-Architected Framework","AWS Cloud Adoption Framework (CAF)","AWS Migration Acceleration Program","AWS Trusted Advisor"],pt:["AWS Well-Architected Framework","AWS Cloud Adoption Framework (CAF)","AWS Migration Acceleration Program","AWS Trusted Advisor"]},a:[1],t:"CAF",exp:{pt:{tech:"O AWS Cloud Adoption Framework (CAF) organiza orientações em 6 perspectivas: Business, People, Governance, Platform, Security e Operations. O Well-Architected Framework usa 6 pilares técnicos para avaliar arquiteturas de workload.",simple:"CAF = perspectivas organizacionais para migração. Well-Architected = pilares técnicos de arquitetura.",avoid:"Não use o Well-Architected Framework para avaliar prontidão organizacional para migração. O CAF é o framework correto para alinhar pessoas, processos e tecnologia."},en:{tech:"The AWS Cloud Adoption Framework (CAF) organizes guidance into 6 perspectives: Business, People, Governance, Platform, Security, and Operations. The Well-Architected Framework uses 6 technical pillars to evaluate workload architectures.",simple:"CAF = organizational perspectives for migration. Well-Architected = technical architecture pillars.",avoid:"Do not use the Well-Architected Framework to assess organizational migration readiness. CAF is the correct framework for aligning people, processes, and technology."}}},
{en:"Which of the following is NOT one of the six perspectives of the AWS Cloud Adoption Framework (CAF)?",pt:"Qual das seguintes alternativas NÃO é uma das seis perspectivas do AWS Cloud Adoption Framework (CAF)?",o:{en:["People","Governance","Infrastructure","Security"],pt:["People","Governance","Infrastructure","Security"]},a:[2],t:"CAF",exp:{pt:{tech:"As 6 perspectivas do CAF são: Business, People, Governance, Platform, Security e Operations. Infrastructure não é uma perspectiva do CAF. A perspectiva de Platform abrange questões de infraestrutura como provisionamento e automação.",simple:"CAF: Business, People, Governance, Platform, Security, Operations. Lembre que é Platform, não Infrastructure.",avoid:"Memorize as 6 perspectivas do CAF corretamente. O exame frequentemente usa Infrastructure como distrator tentador no lugar de Platform."},en:{tech:"The 6 CAF perspectives are: Business, People, Governance, Platform, Security, and Operations. Infrastructure is not a CAF perspective. The Platform perspective covers infrastructure topics such as provisioning and automation.",simple:"CAF: Business, People, Governance, Platform, Security, Operations. Remember it is Platform, not Infrastructure.",avoid:"Memorize the 6 CAF perspectives correctly. The exam frequently uses Infrastructure as a tempting distractor in place of Platform."}}},
{en:"A company wants to evaluate their workload against AWS best practices for operational excellence and cost optimization. Which AWS framework should they use?",pt:"Uma empresa quer avaliar seu workload em relação às melhores práticas da AWS para excelência operacional e otimização de custos. Qual framework AWS deve ser usado?",o:{en:["AWS Cloud Adoption Framework","AWS Migration Hub","AWS Well-Architected Framework","AWS Trusted Advisor"],pt:["AWS Cloud Adoption Framework","AWS Migration Hub","AWS AWS Well-Architected Framework","AWS Trusted Advisor"]},a:[2],t:"Well-Architected",exp:{pt:{tech:"O AWS Well-Architected Framework avalia arquiteturas de workload usando 6 pilares: Operational Excellence, Security, Reliability, Performance Efficiency, Cost Optimization e Sustainability. O CAF avalia prontidão organizacional para migração.",simple:"Well-Architected = avaliação técnica de arquitetura. CAF = prontidão organizacional para migração.",avoid:"Use a ferramenta AWS Well-Architected Tool no console para conduzir revisões formais de arquitetura. Não dependa apenas do documento do framework."},en:{tech:"The AWS Well-Architected Framework evaluates workload architectures using 6 pillars: Operational Excellence, Security, Reliability, Performance Efficiency, Cost Optimization, and Sustainability. CAF evaluates organizational readiness for migration.",simple:"Well-Architected = technical architecture evaluation. CAF = organizational migration readiness.",avoid:"Use the AWS Well-Architected Tool in the console to conduct formal architecture reviews. Do not rely solely on the framework document."}}},
{en:"Which pillar of the AWS Well-Architected Framework focuses on minimizing the environmental impact of running cloud workloads?",pt:"Qual pilar do AWS Well-Architected Framework foca em minimizar o impacto ambiental da execução de workloads na nuvem?",o:{en:["Cost Optimization","Operational Excellence","Performance Efficiency","Sustainability"],pt:["Otimização de Custos","Excelência Operacional","Eficiência de Performance","Sustentabilidade"]},a:[3],t:"Well-Architected",exp:{pt:{tech:"Sustainability é o sexto pilar do Well-Architected Framework, adicionado em 2021. Foca em minimizar o impacto ambiental de workloads na nuvem, incluindo eficiência energética e redução de recursos desnecessários. Performance Efficiency foca em eficiência técnica, não ambiental.",simple:"Sustainability é o 6o pilar, focado em impacto ambiental. Performance Efficiency foca em uso eficiente de recursos de TI.",avoid:"Materiais antigos do exame mencionam apenas 5 pilares. Certifique-se de estudar o 6o pilar (Sustainability) para o CLF-C02 atual."},en:{tech:"Sustainability is the sixth pillar of the Well-Architected Framework, added in 2021. It focuses on minimizing the environmental impact of cloud workloads, including energy efficiency and reducing unnecessary resources. Performance Efficiency focuses on technical efficiency, not environmental impact.",simple:"Sustainability is the 6th pillar, focused on environmental impact. Performance Efficiency focuses on efficient use of IT resources.",avoid:"Older exam materials mention only 5 pillars. Make sure to study the 6th pillar (Sustainability) for the current CLF-C02 exam."}}},
{en:"A company needs to set spending alerts that notify them when their projected monthly AWS spend is expected to exceed $5,000. Which service should they use?",pt:"Uma empresa precisa configurar alertas de gastos que notifiquem quando a previsão de gastos mensais na AWS deve exceder US$ 5.000. Qual serviço deve ser usado?",o:{en:["AWS Cost Explorer","AWS Budgets","AWS Pricing Calculator","AWS Cost and Usage Report"],pt:["AWS Cost Explorer","AWS Budgets","AWS Calculadora de Preços","AWS Cost and Usage Report"]},a:[1],t:"Cost Management",exp:{pt:{tech:"AWS Budgets permite definir orçamentos e receber alertas via SNS/email quando custos reais ou projetados excedem limites. Cost Explorer é para analisar e visualizar custos históricos, não para configurar alertas proativos.",simple:"Budgets = alertas e limites de gasto. Cost Explorer = análise e visualização de custos.",avoid:"Configure alertas de Budget desde o início da conta, especialmente em ambientes de desenvolvimento. Recursos esquecidos podem gerar cobranças inesperadas."},en:{tech:"AWS Budgets lets you define budgets and receive alerts via SNS/email when actual or projected costs exceed thresholds. Cost Explorer is for analyzing and visualizing historical costs, not for setting proactive alerts.",simple:"Budgets = spending alerts and limits. Cost Explorer = cost analysis and visualization.",avoid:"Set up Budget alerts from the beginning of the account, especially in development environments. Forgotten resources can generate unexpected charges."}}},
{en:"A FinOps team wants to analyze spending trends over the past 12 months, identify the top services by cost, and forecast spending for the next 3 months. Which AWS service is BEST suited for this?",pt:"Uma equipe de FinOps quer analisar tendências de gastos nos últimos 12 meses, identificar os principais serviços por custo e prever gastos para os próximos 3 meses. Qual serviço AWS é o MAIS adequado para isso?",o:{en:["AWS Budgets","AWS Cost Explorer","AWS Trusted Advisor","AWS Pricing Calculator"],pt:["AWS Budgets","AWS Cost Explorer","AWS Trusted Advisor","AWS Calculadora de Preços"]},a:[1],t:"Cost Management",exp:{pt:{tech:"Cost Explorer fornece visualizações interativas de custos históricos, análise de tendências, filtragem por serviço/tag/conta e previsão de gastos futuros baseada em ML. Budgets é para alertas proativos, não para análise histórica.",simple:"Cost Explorer = análise histórica e previsão de custos. Budgets = alertas quando limites são atingidos.",avoid:"Não use AWS Pricing Calculator para analisar custos reais. Ele é para estimar custos de arquiteturas futuras, não para analisar o que você já gastou."},en:{tech:"Cost Explorer provides interactive visualizations of historical costs, trend analysis, filtering by service/tag/account, and ML-based future spending forecasts. Budgets is for proactive alerts, not historical analysis.",simple:"Cost Explorer = historical analysis and cost forecasting. Budgets = alerts when thresholds are hit.",avoid:"Do not use the AWS Pricing Calculator to analyze actual costs. It is for estimating costs of future architectures, not for analyzing what you have already spent."}}},
{en:"A company needs shared file storage that can be accessed simultaneously by multiple EC2 instances across different Availability Zones. Which storage service is MOST appropriate?",pt:"Uma empresa precisa de armazenamento de arquivos compartilhado que possa ser acessado simultaneamente por múltiplas instâncias EC2 em diferentes Zonas de Disponibilidade. Qual serviço de armazenamento é o MAIS adequado?",o:{en:["Amazon EBS","Amazon S3","Amazon EFS","AWS Storage Gateway"],pt:["Amazon EBS","Amazon S3","Amazon EFS","AWS Storage Gateway"]},a:[2],t:"EFS",exp:{pt:{tech:"EFS (Elastic File System) é um sistema de arquivos NFS gerenciado que pode ser montado em múltiplas instâncias EC2 simultaneamente, incluindo instâncias em diferentes AZs. EBS é um volume de bloco vinculado a uma única instância em uma única AZ (exceto Multi-Attach em casos específicos).",simple:"EFS = arquivo compartilhado entre múltiplas instâncias e AZs. EBS = disco de bloco de uma única instância.",avoid:"EFS tem custo por GB mais alto que EBS e S3. Avalie se o compartilhamento simultâneo é realmente necessário antes de escolher EFS."},en:{tech:"EFS (Elastic File System) is a managed NFS file system that can be mounted on multiple EC2 instances simultaneously, including instances in different AZs. EBS is a block volume tied to a single instance in a single AZ (except Multi-Attach in specific cases).",simple:"EFS = shared file access across multiple instances and AZs. EBS = single-instance block disk.",avoid:"EFS has a higher per-GB cost than EBS and S3. Evaluate whether simultaneous sharing is truly needed before choosing EFS."}}},
{en:"A developer needs additional block storage to attach to a single EC2 instance for a database that requires consistent, low-latency I/O. Which service should they use?",pt:"Um desenvolvedor precisa de armazenamento de bloco adicional para anexar a uma única instância EC2 para um banco de dados que requer I/O consistente e de baixa latência. Qual serviço deve ser usado?",o:{en:["Amazon EFS","Amazon S3","Amazon EBS","Amazon FSx"],pt:["Amazon EFS","Amazon S3","Amazon EBS","Amazon FSx"]},a:[2],t:"EBS",exp:{pt:{tech:"EBS (Elastic Block Store) fornece volumes de armazenamento de bloco persistentes de alta performance com baixa latência, projetados para uso com uma única instância EC2. EFS é um sistema de arquivos compartilhado, não ideal para databases de alta performance.",simple:"EBS = disco de alto desempenho para uma instância. EFS = arquivos compartilhados entre várias instâncias.",avoid:"Volumes EBS ficam em uma única AZ. Se a instância EC2 estiver em outra AZ, o volume não pode ser diretamente anexado. Planeje sua topologia de AZ com antecedência."},en:{tech:"EBS (Elastic Block Store) provides high-performance, low-latency persistent block storage volumes designed for use with a single EC2 instance. EFS is a shared file system, not ideal for high-performance databases.",simple:"EBS = high-performance disk for one instance. EFS = shared files across multiple instances.",avoid:"EBS volumes exist in a single AZ. If the EC2 instance is in another AZ, the volume cannot be directly attached. Plan your AZ topology in advance."}}},
{en:"A company runs a batch processing workload that can tolerate interruptions. They want the MOST cost-effective EC2 pricing option. What should they choose?",pt:"Uma empresa executa um workload de processamento em lote que pode tolerar interrupções. Eles querem a opção de preços EC2 MAIS econômica. O que devem escolher?",o:{en:["On-Demand Instances","Reserved Instances (1 year)","Spot Instances","Dedicated Hosts"],pt:["Instâncias On-Demand","Instâncias Reservadas (1 ano)","Instâncias Spot","Dedicated Hosts"]},a:[2],t:"EC2 Pricing",exp:{pt:{tech:"Spot Instances oferecem descontos de até 90% comparado com On-Demand, aproveitando capacidade EC2 não utilizada. São ideais para workloads fault-tolerant que podem ser interrompidos, como processamento em lote, renderização e análise de dados.",simple:"Spot = mais barato para workloads que toleram interrupção. Reserved = mais barato para uso contínuo previsível.",avoid:"Nunca use Spot Instances para workloads que não suportam interrupção abrupta, como bancos de dados de produção sem replicação ou aplicações stateful."},en:{tech:"Spot Instances offer discounts of up to 90% compared to On-Demand, leveraging unused EC2 capacity. They are ideal for fault-tolerant workloads that can be interrupted, such as batch processing, rendering, and data analysis.",simple:"Spot = cheapest for workloads that tolerate interruption. Reserved = cheapest for predictable continuous use.",avoid:"Never use Spot Instances for workloads that cannot tolerate abrupt interruption, such as production databases without replication or stateful applications."}}},
{en:"A company has a web application with consistent, steady-state traffic and plans to run it for 3 years. What EC2 pricing model provides the MOST savings?",pt:"Uma empresa tem uma aplicação web com tráfego consistente e estável e planeja executá-la por 3 anos. Qual modelo de preços EC2 oferece as MAIORES economias?",o:{en:["On-Demand Instances","Spot Instances","Reserved Instances (3-year, all upfront)","Savings Plans (3-year, compute)"],pt:["Instâncias On-Demand","Instâncias Spot","Instâncias Reservadas (3 anos, all upfront)","Savings Plans (3 anos, compute)"]},a:[2],t:"EC2 Pricing",exp:{pt:{tech:"Reserved Instances com pagamento all upfront por 3 anos oferecem os maiores descontos (até 72% vs On-Demand). Savings Plans oferecem flexibilidade maior mas desconto ligeiramente menor. Spot não é adequado para workloads steady-state que precisam estar sempre disponíveis.",simple:"Reserved 3 anos all upfront = máximo desconto para uso contínuo e previsível.",avoid:"Reserved Instances standard não podem ser modificadas facilmente. Se houver chance de mudar de tipo de instância, considere Convertible RIs ou Savings Plans."},en:{tech:"Reserved Instances with all upfront payment for 3 years offer the greatest discounts (up to 72% vs On-Demand). Savings Plans offer more flexibility but slightly lower discount. Spot is not suitable for steady-state workloads that need to always be available.",simple:"Reserved 3-year all upfront = maximum discount for continuous, predictable use.",avoid:"Standard Reserved Instances cannot be easily modified. If there is a chance of changing instance types, consider Convertible RIs or Savings Plans."}}},
{en:"A company is transitioning workloads across multiple AWS services including EC2, Lambda, and Fargate. They want commitment-based discounts without being locked to specific instance types. Which pricing model is MOST appropriate?",pt:"Uma empresa está fazendo a transição de workloads entre múltiplos serviços AWS incluindo EC2, Lambda e Fargate. Eles querem descontos baseados em compromisso sem ficarem presos a tipos específicos de instância. Qual modelo de preços é o MAIS adequado?",o:{en:["Standard Reserved Instances","Convertible Reserved Instances","AWS Savings Plans","Spot Instances"],pt:["Instâncias Reservadas Standard","Instâncias Reservadas Conversíveis","AWS Savings Plans","Instâncias Spot"]},a:[2],t:"EC2 Pricing",exp:{pt:{tech:"Savings Plans oferecem descontos de até 66% em troca de compromisso com um valor de gasto por hora por 1 ou 3 anos, mas sem amarrar a tipo de instância, região (para Compute Savings Plans) ou serviço específico. Cobrem EC2, Lambda e Fargate.",simple:"Savings Plans = desconto flexível sem amarrar instância específica. Reserved = desconto maior mas amarrado ao tipo.",avoid:"Savings Plans e Reserved Instances podem coexistir, mas podem criar cobranças sobrepostas se mal planejados. Use Cost Explorer para verificar o que já está coberto antes de comprar."},en:{tech:"Savings Plans offer discounts of up to 66% in exchange for a commitment to a specific hourly spend for 1 or 3 years, without being tied to an instance type, region (for Compute Savings Plans), or specific service. They cover EC2, Lambda, and Fargate.",simple:"Savings Plans = flexible discount without locking to a specific instance. Reserved = higher discount but tied to a type.",avoid:"Savings Plans and Reserved Instances can coexist, but they can create overlapping charges if poorly planned. Use Cost Explorer to check what is already covered before purchasing."}}},
{en:"An application needs to send the same notification message to multiple different subscribers simultaneously, including email, SMS, and an SQS queue. Which AWS service should be used?",pt:"Uma aplicação precisa enviar a mesma mensagem de notificação para múltiplos assinantes diferentes simultaneamente, incluindo email, SMS e uma fila SQS. Qual serviço AWS deve ser usado?",o:{en:["Amazon SQS","Amazon SNS","Amazon EventBridge","Amazon MQ"],pt:["Amazon SQS","Amazon SNS","Amazon EventBridge","Amazon MQ"]},a:[1],t:"SNS",exp:{pt:{tech:"SNS (Simple Notification Service) é um serviço pub/sub que envia mensagens para múltiplos assinantes simultaneamente (fan-out). Suporta endpoints como email, SMS, HTTP, Lambda e SQS. SQS é uma fila para desacoplar componentes com um consumidor por vez.",simple:"SNS = um para muitos (notificações). SQS = fila de processamento com um consumidor.",avoid:"Nunca publique informações sensíveis (como tokens ou senhas) via SNS para endpoints de email, pois o conteúdo não é criptografado por padrão nesses destinos."},en:{tech:"SNS (Simple Notification Service) is a pub/sub service that sends messages to multiple subscribers simultaneously (fan-out). It supports endpoints like email, SMS, HTTP, Lambda, and SQS. SQS is a queue for decoupling components with one consumer at a time.",simple:"SNS = one to many (notifications). SQS = processing queue with one consumer.",avoid:"Never publish sensitive information (such as tokens or passwords) via SNS to email endpoints, as content is not encrypted by default at those destinations."}}},
{en:"A microservices application needs to ensure that if one service goes down, messages are not lost and can be processed later when the service recovers. Which AWS service provides this capability?",pt:"Uma aplicação de microsserviços precisa garantir que, se um serviço ficar fora do ar, as mensagens não sejam perdidas e possam ser processadas mais tarde quando o serviço se recuperar. Qual serviço AWS oferece essa capacidade?",o:{en:["Amazon SNS","Amazon SQS","AWS Step Functions","Amazon Kinesis"],pt:["Amazon SNS","Amazon SQS","AWS Step Functions","Amazon Kinesis"]},a:[1],t:"SQS",exp:{pt:{tech:"SQS é uma fila de mensagens durável que armazena mensagens até que um consumidor as processe. As mensagens ficam na fila por até 14 dias, garantindo durabilidade mesmo se o consumidor ficar offline. SNS não armazena mensagens se não houver assinante ativo.",simple:"SQS = fila durável que preserva mensagens mesmo se o consumidor estiver indisponível. SNS = entrega imediata sem armazenamento.",avoid:"Configure uma Dead Letter Queue (DLQ) no SQS para capturar mensagens que falharam repetidamente. Sem DLQ, mensagens com erros podem se perder silenciosamente."},en:{tech:"SQS is a durable message queue that stores messages until a consumer processes them. Messages stay in the queue for up to 14 days, ensuring durability even if the consumer goes offline. SNS does not store messages if there is no active subscriber.",simple:"SQS = durable queue that preserves messages even if the consumer is unavailable. SNS = immediate delivery without storage.",avoid:"Configure a Dead Letter Queue (DLQ) on SQS to capture messages that repeatedly failed. Without a DLQ, messages with errors can be silently lost."}}},
