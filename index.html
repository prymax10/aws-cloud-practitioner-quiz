{en:"Which service provides high throughput to multiple compute nodes?",pt:"Qual servico fornece alta vazao para multiplos nos de computacao?",o:{en:["Amazon EBS","AWS Storage Gateway","Amazon EFS","Amazon S3"],pt:["Amazon EBS","AWS Storage Gateway","Amazon EFS","Amazon S3"]},a:[2],t:"S3 General",exp:{pt:{tech:"Amazon EFS (Elastic File System) e um sistema de arquivos NFS elastico que pode ser montado simultaneamente por milhares de instancias EC2, fornecendo acesso compartilhado com alta vazao e baixa latencia.",simple:"O Amazon EFS (Elastic File System) fornece um sistema de arquivos compartilhado que pode ser montado simultaneamente por multiplas instancias EC2. Ele oferece alto throughput e escala automaticamente conforme os dados crescem.",avoid:"Nunca use EBS quando multiplas instancias precisam acessar os mesmos arquivos simultaneamente. Use EFS para acesso compartilhado."},en:{tech:"Amazon EFS (Elastic File System) is an elastic NFS file system that can be mounted simultaneously by thousands of EC2 instances, providing shared access with high throughput and low latency.",simple:"Amazon EFS (Elastic File System) provides a shared file system that can be mounted simultaneously by multiple EC2 instances. It offers high throughput and scales automatically as data grows.",avoid:"Never use EBS when multiple instances need to access the same files simultaneously. Use EFS for shared access."}}},
{en:"EBS volumes being replicated within an AZ provides what?",pt:"A replicacao de volumes EBS dentro de uma AZ fornece o que?",o:{en:["Elasticity","Durability","Traceability","Accessibility"],pt:["Elasticidade","Durabilidade","Rastreabilidade","Acessibilidade"]},a:[1],t:"EBS",exp:{pt:{tech:"EBS replica automaticamente dados dentro da mesma AZ para proteger contra falha de hardware individual, garantindo durabilidade dos dados. Isso significa que os dados persistem mesmo se um disco fisico falhar.",simple:"A replicacao de volumes EBS dentro de uma AZ garante durabilidade, ou seja, os dados sobrevivem a falhas de hardware de um unico disco. A AWS replica automaticamente o volume dentro da mesma AZ.",avoid:"Nunca confunda replicacao dentro da AZ com backup. EBS replica para durabilidade, mas snapshots sao necessarios para recuperacao de desastres."},en:{tech:"EBS automatically replicates data within the same AZ to protect against individual hardware failure, ensuring data durability. This means data persists even if a physical disk fails.",simple:"EBS volume replication within an AZ provides durability, meaning data survives single disk hardware failures. AWS automatically replicates the volume within the same AZ.",avoid:"Never confuse replication within an AZ with backup. EBS replicates for durability, but snapshots are needed for disaster recovery."}}},
{en:"Which service integrates with AWS Shield and WAF for DDoS protection?",pt:"Qual servico se integra com o AWS Shield e WAF para protecao contra DDoS?",o:{en:["Amazon EFS","AWS Secrets Manager","AWS Systems Manager","Amazon CloudFront"],pt:["Amazon EFS","AWS Secrets Manager","AWS Systems Manager","Amazon CloudFront"]},a:[3],t:"EFS",exp:{pt:{tech:"Amazon CloudFront se integra nativamente com AWS Shield (protecao DDoS) e AWS WAF (firewall de aplicacao web). O trafego e filtrado nos edge locations antes de chegar a origem, mitigando ataques na borda da rede.",simple:"O Amazon CloudFront se integra nativamente com AWS Shield e AWS WAF para fornecer protecao contra ataques DDoS nos edge locations. O trafego malicioso e filtrado antes de chegar a sua origem.",avoid:"Nunca exponha origens diretamente sem CloudFront na frente. Use CloudFront com Shield e WAF para protecao contra DDoS."},en:{tech:"Amazon CloudFront natively integrates with AWS Shield (DDoS protection) and AWS WAF (web application firewall). Traffic is filtered at edge locations before reaching the origin, mitigating attacks at the network edge.",simple:"Amazon CloudFront natively integrates with AWS Shield and AWS WAF to provide DDoS protection at edge locations. Malicious traffic is filtered before reaching your origin.",avoid:"Never expose origins directly without CloudFront in front. Use CloudFront with Shield and WAF for DDoS protection."}}},
{en:"Which service is used for encrypting EBS volumes?",pt:"Qual servico e usado para criptografar volumes EBS?",o:{en:["AWS WAF","AWS KMS","Amazon Macie","Amazon GuardDuty"],pt:["AWS WAF","AWS KMS","Amazon Macie","Amazon GuardDuty"]},a:[1],t:"EBS",exp:{pt:{tech:"AWS KMS (Key Management Service) gerencia as chaves de criptografia usadas pelo EBS. Ao habilitar a criptografia do EBS, o KMS cria e gerencia as chaves mestras que protegem os dados em repouso.",simple:"O AWS KMS (Key Management Service) e usado para criar e gerenciar chaves de criptografia que protegem volumes EBS. A integracao e nativa e voce pode ativar criptografia com poucos cliques.",avoid:"Nunca gerencie chaves de criptografia manualmente para EBS. Use KMS com rotacao automatica para simplificar e fortalecer a seguranca."},en:{tech:"AWS KMS (Key Management Service) manages the encryption keys used by EBS. When you enable EBS encryption, KMS creates and manages the master keys that protect data at rest.",simple:"AWS KMS (Key Management Service) is used to create and manage encryption keys that protect EBS volumes. The integration is native and you can enable encryption with a few clicks.",avoid:"Never manage encryption keys manually for EBS. Use KMS with automatic rotation to simplify and strengthen security."}}},
{en:"What is an advantage of Amazon RDS?",pt:"Qual e uma vantagem do Amazon RDS?",o:{en:["Simplifies relational database administration tasks","Provides 11 nines of reliability","Automatically scales databases without limits","Enables dynamic CPU and RAM adjustment without downtime"],pt:["Simplifica tarefas de administracao de banco de dados relacional","Fornece 11 noves de confiabilidade","Escala bancos de dados automaticamente sem limites","Permite ajuste dinamico de CPU e RAM sem tempo de inatividade"]},a:[0],t:"RDS",exp:{pt:{tech:"Amazon RDS gerencia tarefas operacionais como provisionamento, patches, backups, recuperacao, deteccao de falhas e reparos. Isso reduz significativamente a carga administrativa sobre equipes de DBA.",simple:"O Amazon RDS simplifica tarefas de administracao de bancos de dados relacionais, incluindo backups automaticos, aplicacao de patches, recuperacao e replicacao. Voce foca nos dados e na aplicacao, nao na infraestrutura do banco.",avoid:"Nunca gaste tempo gerenciando patches, backups e replicacao manualmente quando RDS automatiza tudo isso. Evite overhead operacional desnecessario."},en:{tech:"Amazon RDS manages operational tasks like provisioning, patching, backups, recovery, failure detection, and repair. This significantly reduces the administrative burden on DBA teams.",simple:"Amazon RDS simplifies relational database administration tasks, including automated backups, patching, recovery, and replication. You focus on data and application, not on database infrastructure.",avoid:"Never spend time managing patches, backups, and replication manually when RDS automates all of that. Avoid unnecessary operational overhead."}}},
{en:"Which service can run a customer-managed relational database?",pt:"Qual servico pode executar um banco de dados relacional gerenciado pelo cliente?",o:{en:["Amazon EC2","Amazon Route 53","Amazon ElastiCache","Amazon DynamoDB"],pt:["Amazon EC2","Amazon Route 53","Amazon ElastiCache","Amazon DynamoDB"]},a:[0],t:"EC2 General",exp:{pt:{tech:"Amazon EC2 permite instalar e gerenciar qualquer software de banco de dados relacional (MySQL, PostgreSQL, Oracle, etc.) com controle total sobre configuracao, tuning e versao.",simple:"O Amazon EC2 permite executar bancos de dados relacionais gerenciados inteiramente por voce. Voce escolhe o software, a versao, e cuida de toda a configuracao, manutencao e atualizacoes.",avoid:"Nunca instale bancos em EC2 sem planejar alta disponibilidade, backups e patches. Toda a responsabilidade operacional e sua."},en:{tech:"Amazon EC2 allows you to install and manage any relational database software (MySQL, PostgreSQL, Oracle, etc.) with full control over configuration, tuning, and version.",simple:"Amazon EC2 lets you run relational databases fully managed by you. You choose the software, the version, and handle all configuration, maintenance, and updates.",avoid:"Never install databases on EC2 without planning high availability, backups, and patches. All operational responsibility is yours."}}},
{en:"You need to launch two EC2 instances for high availability. What action should you take?",pt:"Voce precisa lancar duas instancias EC2 para alta disponibilidade. Que acao deve tomar?",o:{en:["Launch across multiple AZs in a single Region","Launch as Reserved Instances in the same AZ","Launch in multiple Regions in the same AZ","Launch as Spot Instances in different AZs"],pt:["Lancar em multiplas AZs em uma unica Regiao","Lancar como Reserved Instances na mesma AZ","Lancar em multiplas Regioes na mesma AZ","Lancar como Spot Instances em diferentes AZs"]},a:[0],t:"EC2 Pricing",exp:{pt:{tech:"Para alta disponibilidade, as instancias devem estar em AZs diferentes dentro da mesma Regiao. Isso protege contra falha de um datacenter inteiro. Spot Instances podem ser interrompidas e nao sao adequadas para HA.",simple:"Lance as duas instancias EC2 em Availability Zones diferentes dentro da mesma regiao. Se uma AZ tiver problemas, a instancia na outra AZ continua funcionando, garantindo alta disponibilidade.",avoid:"Nunca lance instancias para alta disponibilidade na mesma AZ. Distribua em AZs diferentes dentro da mesma regiao."},en:{tech:"For high availability, instances should be in different AZs within the same Region. This protects against failure of an entire datacenter. Spot Instances can be interrupted and are not suitable for HA.",simple:"Launch both EC2 instances in different Availability Zones within the same region. If one AZ has issues, the instance in the other AZ continues running, ensuring high availability.",avoid:"Never launch instances for high availability in the same AZ. Distribute across different AZs within the same region."}}},
{en:"What limits S3 bucket access to specific users?",pt:"O que limita o acesso ao bucket S3 a usuarios especificos?",o:{en:["Public and private key-pair","Amazon Inspector","IAM policies","Security Groups"],pt:["Par de chaves publica e privada","Amazon Inspector","IAM policies","Security Groups"]},a:[2],t:"S3 General",exp:{pt:{tech:"IAM Policies definem quem pode acessar quais recursos S3 e quais acoes podem realizar (GetObject, PutObject, etc.). Bucket Policies tambem controlam acesso, mas IAM Policies sao especificas por usuario/grupo/role.",simple:"As IAM Policies definem permissoes que controlam quem pode acessar quais buckets S3 e quais acoes podem realizar (leitura, escrita, exclusao). Elas sao atribuidas a usuarios, grupos ou roles.",avoid:"Nunca conceda acesso publico a buckets S3 sem necessidade comprovada. Use IAM policies para restringir acesso a usuarios especificos."},en:{tech:"IAM Policies define who can access which S3 resources and what actions they can perform (GetObject, PutObject, etc.). Bucket Policies also control access, but IAM Policies are specific per user/group/role.",simple:"IAM Policies define permissions that control who can access which S3 buckets and what actions they can perform (read, write, delete). They are assigned to users, groups, or roles.",avoid:"Never grant public access to S3 buckets without proven need. Use IAM policies to restrict access to specific users."}}},
{en:"What is an AWS responsibility in the shared model for security?",pt:"O que e uma responsabilidade da AWS no modelo compartilhado de seguranca?",o:{en:["Granting access to resources","Encrypting data in transit","Updating EC2 host firmware","Updating operating systems on EC2"],pt:["Conceder acesso aos recursos","Criptografar dados em transito","Atualizar o firmware do host EC2","Atualizar sistemas operacionais no EC2"]},a:[2],t:"EC2 General",exp:{pt:{tech:"A AWS e responsavel pela seguranca DA nuvem, incluindo firmware do host fisico, hipervisor e infraestrutura de rede. O cliente e responsavel por atualizar o SO das instancias EC2 e criptografar seus dados.",simple:"A AWS e responsavel por atualizar o firmware dos hosts EC2, incluindo hardware, hipervisor e infraestrutura de rede. Isso faz parte da responsabilidade de seguranca da AWS no modelo compartilhado.",avoid:"Nunca tente aplicar patches no firmware de hosts EC2, isso e responsabilidade da AWS. Foque nas suas responsabilidades no modelo compartilhado."},en:{tech:"AWS is responsible for security OF the cloud, including physical host firmware, hypervisor, and network infrastructure. The customer is responsible for updating the OS on EC2 instances and encrypting their data.",simple:"AWS is responsible for updating EC2 host firmware, including hardware, hypervisor, and network infrastructure. This is part of AWS security responsibility in the shared model.",avoid:"Never try to patch EC2 host firmware, that is AWS responsibility. Focus on your responsibilities in the shared model."}}},
{en:"What is the low-cost option for hosting static websites?",pt:"Qual e a opcao de baixo custo para hospedagem de sites estaticos?",o:{en:["Amazon Glacier","Amazon DynamoDB","Amazon EFS","Amazon S3"],pt:["Amazon Glacier","Amazon DynamoDB","Amazon EFS","Amazon S3"]},a:[3],t:"S3 Storage Classes",exp:{pt:{tech:"Amazon S3 suporta hospedagem de sites estaticos (HTML, CSS, JS) diretamente do bucket, sem necessidade de servidor web. Com CloudFront na frente, oferece distribuicao global de baixo custo e alta performance.",simple:"O Amazon S3 pode hospedar sites estaticos (HTML, CSS, JavaScript) com baixo custo e alta disponibilidade. Nao e necessario provisionar ou gerenciar servidores para servir o conteudo.",avoid:"Nunca hospede sites estaticos em EC2 quando S3 com CloudFront e mais barato e escalavel. Evite custos desnecessarios."},en:{tech:"Amazon S3 supports static website hosting (HTML, CSS, JS) directly from the bucket, with no web server needed. With CloudFront in front, it offers low-cost global distribution with high performance.",simple:"Amazon S3 can host static websites (HTML, CSS, JavaScript) at low cost and high availability. No need to provision or manage servers to serve the content.",avoid:"Never host static sites on EC2 when S3 with CloudFront is cheaper and more scalable. Avoid unnecessary costs."}}},
{en:"Which are AWS Well-Architected Framework pillars? (Choose TWO)",pt:"Quais sao pilares do AWS Well-Architected Framework? (Escolha DOIS)",o:{en:["Multiple Availability Zones","Performance Efficiency","Security","Encryption usage","High Availability"],pt:["Multiplas Zonas de Disponibilidade","Eficiencia de Performance","Seguranca","Uso de criptografia","Alta Disponibilidade"]},a:[1,2],multi:true,t:"KMS & Encryption",exp:{pt:{tech:"Os 6 pilares do Well-Architected Framework sao: Excelencia Operacional, Seguranca, Confiabilidade, Eficiencia de Performance, Otimizacao de Custos e Sustentabilidade. Multi-AZ, criptografia e alta disponibilidade sao praticas, nao pilares.",simple:"Performance Efficiency e Security sao dois dos seis pilares do AWS Well-Architected Framework. Os pilares guiam decisoes de arquitetura para construir sistemas seguros, eficientes e confiaveis na AWS.",avoid:"Nunca ignore os pilares do Well-Architected Framework ao projetar solucoes. Revise regularmente contra todos os pilares."},en:{tech:"The 6 pillars of the Well-Architected Framework are: Operational Excellence, Security, Reliability, Performance Efficiency, Cost Optimization, and Sustainability. Multi-AZ, encryption, and high availability are practices, not pillars.",simple:"Performance Efficiency and Security are two of the six pillars of the AWS Well-Architected Framework. The pillars guide architecture decisions to build secure, efficient, and reliable systems on AWS.",avoid:"Never ignore the Well-Architected Framework pillars when designing solutions. Review regularly against all pillars."}}},
{en:"Which service identifies security groups with unrestricted access?",pt:"Qual servico identifica security groups com acesso irrestrito?",o:{en:["AWS Trusted Advisor","Amazon Inspector","Amazon CloudWatch","AWS CloudTrail"],pt:["AWS Trusted Advisor","Amazon Inspector","Amazon CloudWatch","AWS CloudTrail"]},a:[0],t:"VPC & Networking",exp:{pt:{tech:"AWS Trusted Advisor verifica security groups para portas com acesso irrestrito (0.0.0.0/0) como parte das verificacoes de seguranca. Fornece recomendacoes para restringir acesso e melhorar a postura de seguranca.",simple:"O AWS Trusted Advisor analisa sua conta e identifica security groups com acesso irrestrito (portas abertas para qualquer IP). Ele fornece recomendacoes para corrigir essas vulnerabilidades.",avoid:"Nunca deixe Security Groups com acesso irrestrito sem revisar. Use Trusted Advisor para identificar e corrigir essas vulnerabilidades."},en:{tech:"AWS Trusted Advisor checks security groups for ports with unrestricted access (0.0.0.0/0) as part of security checks. It provides recommendations to restrict access and improve security posture.",simple:"AWS Trusted Advisor scans your account and identifies security groups with unrestricted access (ports open to any IP). It provides recommendations to fix these vulnerabilities.",avoid:"Never leave Security Groups with unrestricted access without review. Use Trusted Advisor to identify and fix these vulnerabilities."}}},
{en:"When re-architecting a monolith application, which design principles apply? (Choose TWO)",pt:"Ao rearquitetar uma aplicacao monolitica, quais principios de design se aplicam? (Escolha DOIS)",o:{en:["Use manual monitoring and testing","Implement fixed server architecture","Implement loose coupling","Rely on individual components to detect failures","Design for scalability"],pt:["Usar monitoramento e testes manuais","Implementar arquitetura de servidor fixo","Implementar acoplamento fraco","Confiar em componentes individuais para detectar falhas","Projetar para escalabilidade"]},a:[2,4],multi:true,t:"CloudWatch",exp:{pt:{tech:"Ao migrar de monolito para microsservicos, loose coupling garante que componentes sejam independentes e design for scalability garante que o sistema escale horizontalmente conforme a demanda.",simple:"Acoplamento fraco permite que cada componente funcione independentemente, facilitando manutencao e atualizacoes. Projetar para escalabilidade garante que o sistema possa crescer conforme a demanda aumenta.",avoid:"Nunca re-arquitete monolitos sem aplicar loose coupling e design para escalabilidade. Caso contrario, voce cria outro monolito distribuido."},en:{tech:"When migrating from monolith to microservices, loose coupling ensures components are independent, and design for scalability ensures the system scales horizontally based on demand.",simple:"Loose coupling allows each component to function independently, making maintenance and updates easier. Designing for scalability ensures the system can grow as demand increases.",avoid:"Never re-architect monoliths without applying loose coupling and design for scalability. Otherwise you create another distributed monolith."}}},
{en:"Which service automatically adds or removes EC2 instances based on demand?",pt:"Qual servico adiciona ou remove instancias EC2 automaticamente com base na demanda?",o:{en:["Elastic Load Balancer","Amazon EC2 Auto Scaling","Amazon Route 53","Amazon CloudFront"],pt:["Elastic Load Balancer","Amazon EC2 Auto Scaling","Amazon Route 53","Amazon CloudFront"]},a:[1],t:"EC2 Pricing",exp:{pt:{tech:"Amazon EC2 Auto Scaling monitora a carga das instancias e automaticamente adiciona (scale out) ou remove (scale in) instancias EC2 de acordo com politicas definidas, mantendo performance e otimizando custos.",simple:"O Amazon EC2 Auto Scaling monitora a demanda e adiciona ou remove instancias EC2 automaticamente. Voce define politicas de escalamento baseadas em metricas como uso de CPU ou numero de requisicoes.",avoid:"Nunca configure Auto Scaling sem definir limites maximos de instancias. Sem limites, custos podem escalar descontroladamente."},en:{tech:"Amazon EC2 Auto Scaling monitors instance load and automatically adds (scale out) or removes (scale in) EC2 instances according to defined policies, maintaining performance and optimizing costs.",simple:"Amazon EC2 Auto Scaling monitors demand and automatically adds or removes EC2 instances. You define scaling policies based on metrics like CPU usage or number of requests.",avoid:"Never configure Auto Scaling without setting maximum instance limits. Without limits, costs can scale uncontrollably."}}},
{en:"What is the minimum support plan that includes free Infrastructure Event Management?",pt:"Qual e o plano de suporte minimo que inclui Infrastructure Event Management gratuito?",o:{en:["Enterprise","Business","Developer","Basic"],pt:["Enterprise","Business","Developer","Basic"]},a:[0],t:"Support Plans",exp:{pt:{tech:"Infrastructure Event Management (IEM) e incluido gratuitamente apenas no plano Enterprise. No plano Business, esta disponivel por um custo adicional. Developer e Basic nao oferecem esse recurso.",simple:"O plano Enterprise e o unico que inclui Infrastructure Event Management (IEM) gratuito. O IEM oferece suporte planejado da AWS durante eventos criticos como lancamentos de produtos ou picos de trafego.",avoid:"Nunca dependa de suporte basico para eventos criticos de infraestrutura. Infrastructure Event Management gratuito so esta disponivel no Enterprise."},en:{tech:"Infrastructure Event Management (IEM) is included for free only in the Enterprise plan. In the Business plan, it is available for an additional cost. Developer and Basic do not offer this feature.",simple:"The Enterprise plan is the only one that includes free Infrastructure Event Management (IEM). IEM provides planned AWS support during critical events like product launches or traffic spikes.",avoid:"Never rely on basic support for critical infrastructure events. Free Infrastructure Event Management is only available on Enterprise."}}},
{en:"Which service can query S3 data with standard SQL?",pt:"Qual servico pode consultar dados no S3 com SQL padrao?",o:{en:["AWS Glue","AWS Data Pipeline","Amazon CloudSearch","Amazon Athena"],pt:["AWS Glue","AWS Data Pipeline","Amazon CloudSearch","Amazon Athena"]},a:[3],t:"S3 General",exp:{pt:{tech:"Amazon Athena e um servico de consulta interativo e serverless que permite analisar dados diretamente no S3 usando SQL padrao. Nao requer infraestrutura — voce paga apenas pelas consultas executadas.",simple:"O Amazon Athena permite executar consultas SQL diretamente nos dados armazenados no S3, sem precisar carregar os dados em um banco de dados separado. Voce paga apenas pelas consultas executadas.",avoid:"Nunca mova dados do S3 para um banco so para fazer queries SQL. Use Athena para consultar diretamente no S3 sem movimentacao."},en:{tech:"Amazon Athena is an interactive, serverless query service that lets you analyze data directly in S3 using standard SQL. No infrastructure required — you pay only for queries executed.",simple:"Amazon Athena lets you run SQL queries directly on data stored in S3, without needing to load data into a separate database. You only pay for the queries you run.",avoid:"Never move data from S3 to a database just to run SQL queries. Use Athena to query directly on S3 without data movement."}}},
{en:"Which is an AWS managed NoSQL database?",pt:"Qual e um banco de dados NoSQL gerenciado pela AWS?",o:{en:["Amazon Redshift","Amazon DynamoDB","Amazon Aurora","Amazon RDS for MariaDB"],pt:["Amazon Redshift","Amazon DynamoDB","Amazon Aurora","Amazon RDS for MariaDB"]},a:[1],t:"RDS",exp:{pt:{tech:"Amazon DynamoDB e um banco de dados NoSQL key-value e de documentos totalmente gerenciado, com latencia em milissegundos e escalabilidade automatica. Redshift, Aurora e RDS for MariaDB sao todos relacionais.",simple:"O Amazon DynamoDB e o banco de dados NoSQL totalmente gerenciado da AWS. Ele armazena dados em formato de chave-valor e documentos, com performance de milissegundos em qualquer escala.",avoid:"Nunca use bancos relacionais para workloads que precisam de latencia de milissegundos em qualquer escala. Use DynamoDB para NoSQL de alta performance."},en:{tech:"Amazon DynamoDB is a fully managed NoSQL key-value and document database with single-digit millisecond latency and automatic scaling. Redshift, Aurora, and RDS for MariaDB are all relational.",simple:"Amazon DynamoDB is AWS fully managed NoSQL database. It stores data in key-value and document format, with millisecond performance at any scale.",avoid:"Never use relational databases for workloads needing millisecond latency at any scale. Use DynamoDB for high-performance NoSQL."}}},
{en:"What is the correct relationship between regions, Availability Zones, and edge locations?",pt:"Qual e a relacao correta entre regioes, Zonas de Disponibilidade e edge locations?",o:{en:["Data centers contain regions","Regions contain Availability Zones","Availability Zones contain edge locations","Edge locations contain regions"],pt:["Data centers contem regioes","Regioes contem Zonas de Disponibilidade","Zonas de Disponibilidade contem edge locations","Edge locations contem regioes"]},a:[1],t:"CloudFront",exp:{pt:{tech:"A hierarquia da AWS e: Regioes contem multiplas AZs (cada AZ tem um ou mais datacenters). Edge locations sao pontos de presenca separados usados por CloudFront e Route 53, nao contidos em AZs.",simple:"Uma regiao AWS contem multiplas Availability Zones, e cada AZ contem um ou mais datacenters. As regioes sao areas geograficas independentes, e as AZs sao locais isolados dentro de uma regiao.",avoid:"Nunca confunda regioes com AZs ou edge locations. Entenda a hierarquia: regioes contem AZs, edge locations sao pontos de cache separados."},en:{tech:"The AWS hierarchy is: Regions contain multiple AZs (each AZ has one or more datacenters). Edge locations are separate points of presence used by CloudFront and Route 53, not contained within AZs.",simple:"An AWS Region contains multiple Availability Zones, and each AZ contains one or more datacenters. Regions are independent geographic areas, and AZs are isolated locations within a region.",avoid:"Never confuse regions with AZs or edge locations. Understand the hierarchy: regions contain AZs, edge locations are separate cache points."}}},
{en:"Which security service classifies sensitive data automatically?",pt:"Qual servico de seguranca classifica dados sensiveis automaticamente?",o:{en:["Amazon GuardDuty","Amazon Macie","Amazon Inspector","AWS Shield"],pt:["Amazon GuardDuty","Amazon Macie","Amazon Inspector","AWS Shield"]},a:[1],t:"WAF & Shield",exp:{pt:{tech:"Amazon Macie usa machine learning e correspondencia de padroes para descobrir e classificar automaticamente dados sensiveis (PII, dados financeiros, credenciais) armazenados no Amazon S3.",simple:"O Amazon Macie usa machine learning para descobrir e classificar automaticamente dados sensiveis armazenados no S3, como informacoes pessoais e financeiras. Ele gera alertas quando encontra dados expostos.",avoid:"Nunca deixe dados sensiveis em S3 sem monitoramento. Use Macie para detectar e classificar automaticamente informacoes como PII e dados financeiros."},en:{tech:"Amazon Macie uses machine learning and pattern matching to automatically discover and classify sensitive data (PII, financial data, credentials) stored in Amazon S3.",simple:"Amazon Macie uses machine learning to automatically discover and classify sensitive data stored in S3, such as personal and financial information. It generates alerts when it finds exposed data.",avoid:"Never leave sensitive data in S3 unmonitored. Use Macie to automatically detect and classify information like PII and financial data."}}},
{en:"What are benefits of using On-Demand EC2 instances? (Choose TWO)",pt:"Quais sao beneficios de usar instancias EC2 On-Demand? (Escolha DOIS)",o:{en:["Free capacity available for testing","Cheaper than all other options","Remove the need for safety net capacity planning","Setup takes only 1-2 days","Increase or decrease capacity based on demand"],pt:["Capacidade gratuita disponivel para testes","Mais barato que todas as outras opcoes","Elimina a necessidade de planejamento de capacidade de reserva","Configuracao leva apenas 1-2 dias","Aumentar ou diminuir capacidade com base na demanda"]},a:[2,4],multi:true,t:"EC2 Pricing",exp:{pt:{tech:"Instancias On-Demand eliminam a necessidade de prever capacidade e comprar hardware antecipadamente. Voce pode aumentar ou diminuir recursos instantaneamente conforme a demanda, pagando apenas pelo uso.",simple:"Instancias On-Demand eliminam a necessidade de planejar capacidade antecipadamente e permitem aumentar ou diminuir recursos conforme a demanda. Voce paga por hora ou segundo sem compromisso de longo prazo.",avoid:"Nunca compre Reserved Instances sem entender seu padrao de uso. Use On-Demand para cargas imprevisiveis e Reserved para cargas estaveis."},en:{tech:"On-Demand instances eliminate the need to forecast capacity and purchase hardware upfront. You can instantly increase or decrease resources based on demand, paying only for usage.",simple:"On-Demand instances eliminate the need to plan capacity in advance and let you increase or decrease resources based on demand. You pay by the hour or second with no long-term commitment.",avoid:"Never buy Reserved Instances without understanding your usage pattern. Use On-Demand for unpredictable workloads and Reserved for stable ones."}}},
{en:"A company runs a video streaming platform where content is accessed heavily in the first 30 days after upload, then rarely accessed afterward. Which S3 storage class minimizes cost without manual intervention?",pt:"Uma empresa opera uma plataforma de streaming de video onde o conteudo e muito acessado nos primeiros 30 dias apos o upload e raramente acessado depois. Qual classe de armazenamento S3 minimiza o custo sem intervencao manual?",o:{en:["S3 Standard","S3 Intelligent-Tiering","S3 Glacier","S3 One Zone-IA"],pt:["S3 Standard","S3 Intelligent-Tiering","S3 Glacier","S3 One Zone-IA"]},a:[1],t:"S3 Storage Classes",exp:{pt:{tech:"S3 Intelligent-Tiering monitora padroes de acesso e move objetos automaticamente entre tiers (frequent, infrequent, archive) sem overhead operacional.",simple:"Intelligent-Tiering e o unico que muda sozinho de tier conforme o acesso real. Voce nao precisa saber antecipadamente quando o acesso vai cair.",avoid:"Nao use S3 Standard quando o acesso e previsivel que vai cair com o tempo — voce paga tier premium para dados frios."},en:{tech:"S3 Intelligent-Tiering automatically monitors access patterns and moves objects between tiers (frequent, infrequent, archive) with no operational overhead.",simple:"Intelligent-Tiering is the only class that automatically shifts tiers based on actual access. You do not need to predict when access will drop.",avoid:"Do not use S3 Standard when access is predictably going to drop — you pay premium tier pricing for cold data."}}},
{en:"A financial institution needs to archive compliance records that must be retained for 7 years. The records will almost never be accessed, and if retrieval is needed, a 12-hour wait is acceptable. Which S3 storage class is most cost-effective?",pt:"Uma instituicao financeira precisa arquivar registros de conformidade que devem ser retidos por 7 anos. Os registros quase nunca serao acessados e, se necessario, uma espera de 12 horas para recuperacao e aceitavel. Qual classe de armazenamento S3 e mais economica?",o:{en:["S3 Glacier Instant Retrieval","S3 Glacier Flexible Retrieval","S3 Glacier Deep Archive","S3 Intelligent-Tiering"],pt:["S3 Glacier Instant Retrieval","S3 Glacier Flexible Retrieval","S3 Glacier Deep Archive","S3 Intelligent-Tiering"]},a:[2],t:"S3 Storage Classes",exp:{pt:{tech:"S3 Glacier Deep Archive tem o menor custo de armazenamento da AWS (~$0.00099/GB/mes). Suporta recuperacao em 12 horas (Standard) ou 48 horas (Bulk). Ideal para dados acessados menos de uma vez por ano.",simple:"Deep Archive e o tier mais barato de todos. A troca e o tempo de espera longo para recuperar — se 12 horas sao aceitaveis, e sempre a escolha certa para retencao de longo prazo.",avoid:"Nao use Glacier Deep Archive se os dados precisam ser recuperados em minutos ou horas — para isso, use Glacier Instant Retrieval."},en:{tech:"S3 Glacier Deep Archive is the lowest-cost storage class (~$0.00099/GB/month). It supports 12-hour (Standard) or 48-hour (Bulk) retrieval. Ideal for data accessed fewer than once per year.",simple:"Deep Archive is the cheapest tier available. The tradeoff is long retrieval time — if 12 hours is acceptable, it is always the right choice for long-term retention.",avoid:"Do not use Glacier Deep Archive if data needs to be retrieved in minutes or hours — use Glacier Instant Retrieval for that."}}},
{en:"A startup runs a web application with highly variable traffic: quiet during nights and weekends, with unpredictable spikes during business hours. The application must always be available. Which EC2 pricing combination is most appropriate?",pt:"Uma startup opera uma aplicacao web com trafego altamente variavel: silencioso durante noites e fins de semana, com picos imprevisveis durante o horario comercial. A aplicacao deve estar sempre disponivel. Qual combinacao de precificacao EC2 e mais adequada?",o:{en:["All Spot Instances","All On-Demand Instances","Reserved Instances for baseline plus On-Demand for spikes","Reserved Instances for baseline plus Spot Instances for spikes"],pt:["Apenas Spot Instances","Apenas On-Demand Instances","Reserved Instances para baseline mais On-Demand para picos","Reserved Instances para baseline mais Spot Instances para picos"]},a:[3],t:"EC2 Pricing Models",exp:{pt:{tech:"Reserved Instances cobrem a capacidade base previsivel com desconto de ate 72%. Spot Instances cobrem picos com ate 90% de desconto — aceitavel para cargas que podem ser interrompidas e reiniciadas.",simple:"Use Reserved para o minimo garantido que voce sempre vai precisar. Use Spot para capacidade extra durante picos — mais barato que On-Demand, mas pode ser interrompida.",avoid:"Nao use apenas On-Demand para cargas estaveis — voce paga preco cheio onde Reserved daria grande desconto."},en:{tech:"Reserved Instances cover predictable baseline capacity with up to 72% discount. Spot Instances cover spikes at up to 90% discount — acceptable for workloads that can be interrupted and restarted.",simple:"Use Reserved for the guaranteed minimum you always need. Use Spot for extra capacity during spikes — cheaper than On-Demand but can be interrupted.",avoid:"Do not use only On-Demand for stable baseline loads — you pay full price where Reserved would give a large discount."}}},
{en:"A pharmaceutical company must run workloads on hardware that is not shared with any other AWS customer due to regulatory requirements. Which EC2 option meets this requirement?",pt:"Uma empresa farmaceutica deve executar cargas de trabalho em hardware que nao e compartilhado com nenhum outro cliente AWS devido a requisitos regulatorios. Qual opcao EC2 atende a esse requisito?",o:{en:["EC2 Reserved Instances","EC2 Dedicated Hosts","EC2 Spot Instances","EC2 On-Demand Instances"],pt:["EC2 Reserved Instances","EC2 Dedicated Hosts","EC2 Spot Instances","EC2 On-Demand Instances"]},a:[1],t:"EC2 Pricing Models",exp:{pt:{tech:"Dedicated Hosts sao servidores fisicos dedicados exclusivamente ao seu uso. Voce tem visibilidade do hardware subjacente e controle sobre o placement das instancias — necessario para licencas de software atreladas ao hardware e compliance regulatorio.",simple:"Dedicated Host e o unico que garante que o hardware fisico e 100% seu. Nenhum outro cliente AWS usa aquele servidor.",avoid:"Nao confunda Dedicated Host com Dedicated Instance — Dedicated Instance isola no nivel do hypervisor mas pode compartilhar hardware com suas proprias instancias de outras contas."},en:{tech:"Dedicated Hosts are physical servers dedicated exclusively to your use. You have visibility into the underlying hardware and control over instance placement — required for hardware-bound software licenses and regulatory compliance.",simple:"Dedicated Host is the only option that guarantees the physical hardware is 100% yours. No other AWS customer uses that server.",avoid:"Do not confuse Dedicated Host with Dedicated Instance — Dedicated Instance isolates at the hypervisor level but may share hardware with your own instances from other accounts."}}},
{en:"A company is running a long-running genomics analysis job that takes 8 hours to complete and cannot be interrupted once started. Cost minimization is a priority. Which EC2 pricing option should be used?",pt:"Uma empresa executa um job de analise genomica de longa duracao que leva 8 horas para ser concluido e nao pode ser interrompido uma vez iniciado. A minimizacao de custos e prioridade. Qual opcao de precificacao EC2 deve ser usada?",o:{en:["Spot Instances","On-Demand Instances","Reserved Instances (1-year, no upfront)","Dedicated Instances"],pt:["Spot Instances","On-Demand Instances","Reserved Instances (1 ano, sem pagamento adiantado)","Dedicated Instances"]},a:[2],t:"EC2 Pricing Models",exp:{pt:{tech:"Reserved Instances oferecem desconto de ate 72% vs On-Demand para compromissos de 1 ou 3 anos. Para jobs que nao podem ser interrompidos e rodam regularmente, RI e mais economico que On-Demand e mais seguro que Spot.",simple:"Spot seria mais barato mas pode ser interrompida com 2 minutos de aviso — proibido para esse job. Reserved da o melhor desconto para uso regular sem risco de interrupcao.",avoid:"Nao use Spot Instances para workloads que nao podem ser interrompidos — a instancia pode ser recuperada pela AWS a qualquer momento."},en:{tech:"Reserved Instances offer up to 72% discount vs On-Demand for 1 or 3-year commitments. For jobs that cannot be interrupted and run regularly, RI is cheaper than On-Demand and safer than Spot.",simple:"Spot would be cheaper but can be interrupted with 2-minute notice — forbidden for this job. Reserved gives the best discount for regular usage without interruption risk.",avoid:"Do not use Spot Instances for workloads that cannot be interrupted — the instance can be reclaimed by AWS at any time."}}},
{en:"A company needs to run stateless batch processing jobs that analyze log files. The jobs run for 2 hours every night and can be restarted if interrupted. Which pricing option minimizes cost?",pt:"Uma empresa precisa executar jobs de processamento em lote stateless que analisam arquivos de log. Os jobs rodam por 2 horas toda noite e podem ser reiniciados se interrompidos. Qual opcao de precificacao minimiza o custo?",o:{en:["On-Demand Instances","Reserved Instances","Spot Instances","Dedicated Hosts"],pt:["On-Demand Instances","Reserved Instances","Spot Instances","Dedicated Hosts"]},a:[2],t:"EC2 Pricing Models",exp:{pt:{tech:"Spot Instances oferecem desconto de ate 90% vs On-Demand. Sao ideais para workloads tolerantes a falhas, jobs em lote, analise de dados e rendering — qualquer carga que pode ser pausada e retomada.",simple:"Spot e o mais barato disponivel na AWS. A unica condicao e que o job precisa tolerar interrupcoes — e exatamente o caso aqui.",avoid:"Nao use Spot para bancos de dados, servidores web sem redundancia ou qualquer workload stateful que nao possa ser reiniciado facilmente."},en:{tech:"Spot Instances offer up to 90% discount vs On-Demand. They are ideal for fault-tolerant workloads, batch jobs, data analysis, and rendering — any load that can be paused and resumed.",simple:"Spot is the cheapest option available on AWS. The only condition is that the job must tolerate interruptions — which is exactly the case here.",avoid:"Do not use Spot for databases, web servers without redundancy, or any stateful workload that cannot be easily restarted."}}},
{en:"A company runs an RDS database with a primary instance. They are experiencing slow read performance because of a high volume of reporting queries hitting the database. Which RDS feature should they implement?",pt:"Uma empresa executa um banco de dados RDS com uma instancia primaria. Eles estao experimentando lentidao nas leituras devido a um alto volume de queries de relatorio atingindo o banco. Qual recurso RDS devem implementar?",o:{en:["Enable Multi-AZ deployment","Create Read Replicas","Enable automatic backups","Upgrade to a larger instance class"],pt:["Habilitar implantacao Multi-AZ","Criar Read Replicas","Habilitar backups automaticos","Atualizar para uma classe de instancia maior"]},a:[1],t:"RDS",exp:{pt:{tech:"Read Replicas sao copias asincronas do banco primario usadas para escalar leituras. Queries de relatorio podem ser redirecionadas para as replicas, descarregando o primario. Multi-AZ e para alta disponibilidade, nao para escalar leituras.",simple:"Read Replicas existem para escalar leituras. Multi-AZ existe para sobreviver falhas. Sao propositos completamente diferentes.",avoid:"Nao use Multi-AZ esperando melhora de performance de leitura — o standby Multi-AZ nao aceita conexoes de leitura."},en:{tech:"Read Replicas are asynchronous copies of the primary database used to scale reads. Reporting queries can be redirected to replicas, offloading the primary. Multi-AZ is for high availability, not read scaling.",simple:"Read Replicas exist to scale reads. Multi-AZ exists to survive failures. They serve completely different purposes.",avoid:"Do not use Multi-AZ expecting read performance improvement — the Multi-AZ standby does not accept read connections."}}},
{en:"A company has an RDS database in a single Availability Zone. A solutions architect is concerned about downtime if the AZ experiences an outage. What should they configure to minimize downtime during an AZ failure?",pt:"Uma empresa tem um banco de dados RDS em uma unica Zona de Disponibilidade. Um arquiteto de solucoes esta preocupado com o tempo de inatividade se a AZ sofrer uma interrupcao. O que deve ser configurado para minimizar o downtime durante uma falha de AZ?",o:{en:["Add a Read Replica in the same AZ","Enable Multi-AZ deployment","Take manual snapshots every hour","Deploy the database across multiple Regions"],pt:["Adicionar uma Read Replica na mesma AZ","Habilitar implantacao Multi-AZ","Tirar snapshots manuais a cada hora","Implantar o banco de dados em multiplas Regioes"]},a:[1],t:"RDS",exp:{pt:{tech:"RDS Multi-AZ mantem um standby sincronizado em outra AZ. Em caso de falha, o failover ocorre automaticamente em 1-2 minutos sem intervencao manual. A conexao DNS e atualizada automaticamente para apontar ao standby.",simple:"Multi-AZ e para sobreviver falhas — se a AZ principal cair, o banco automaticamente muda para a AZ de backup. Nao serve para melhorar performance.",avoid:"Nao use Read Replica como solucao de failover — ela usa replicacao assincrona e pode ter lag, causando perda de dados em um failover."},en:{tech:"RDS Multi-AZ maintains a synchronously replicated standby in another AZ. In case of failure, automatic failover occurs in 1-2 minutes with no manual intervention. The DNS endpoint is automatically updated to point to the standby.",simple:"Multi-AZ is for surviving failures — if the primary AZ goes down, the database automatically switches to the backup AZ. It does not improve performance.",avoid:"Do not use Read Replica as a failover solution — it uses asynchronous replication and may have lag, causing data loss during a failover."}}},
{en:"A web application is experiencing slow response times during peak hours. The team decides to add more EC2 instances behind a load balancer to handle the increased traffic. This is an example of which scaling approach?",pt:"Uma aplicacao web esta com tempos de resposta lentos durante os horarios de pico. A equipe decide adicionar mais instancias EC2 atras de um balanceador de carga para lidar com o aumento de trafego. Isso e um exemplo de qual abordagem de escalabilidade?",o:{en:["Vertical scaling","Horizontal scaling","Diagonal scaling","Elastic scaling"],pt:["Escalabilidade vertical","Escalabilidade horizontal","Escalabilidade diagonal","Escalabilidade elastica"]},a:[1],t:"Scalability",exp:{pt:{tech:"Escalabilidade horizontal (scale out) adiciona mais instancias ao pool. E a abordagem preferida na AWS pois permite alta disponibilidade, tolerancia a falhas e ajuste dinamico via Auto Scaling Groups.",simple:"Horizontal = mais maquinas. Vertical = maquina maior. Aqui estao adicionando instancias, entao e horizontal.",avoid:"Nao confunda escalabilidade horizontal com elasticidade — elasticidade e a capacidade de escalar automaticamente conforme a demanda, podendo ser horizontal ou vertical."},en:{tech:"Horizontal scaling (scale out) adds more instances to the pool. It is the preferred approach on AWS because it enables high availability, fault tolerance, and dynamic adjustment via Auto Scaling Groups.",simple:"Horizontal = more machines. Vertical = bigger machine. Here they are adding instances, so it is horizontal.",avoid:"Do not confuse horizontal scaling with elasticity — elasticity is the ability to scale automatically with demand, and can be either horizontal or vertical."}}},
{en:"A company is running a legacy monolithic database that cannot be easily distributed across multiple instances. They are experiencing performance issues and decide to migrate to a larger RDS instance type with more CPU and memory. This is an example of which scaling approach?",pt:"Uma empresa executa um banco de dados monolitico legado que nao pode ser facilmente distribuido em multiplas instancias. Eles estao com problemas de performance e decidem migrar para um tipo de instancia RDS maior com mais CPU e memoria. Isso e um exemplo de qual abordagem?",o:{en:["Horizontal scaling","Vertical scaling","Out scaling","Elastic scaling"],pt:["Escalabilidade horizontal","Escalabilidade vertical","Escalabilidade de saida","Escalabilidade elastica"]},a:[1],t:"Scalability",exp:{pt:{tech:"Escalabilidade vertical (scale up) aumenta os recursos da instancia existente — mais CPU, RAM ou armazenamento. E simples mas tem limites fisicos e requer downtime para mudanca de tipo de instancia.",simple:"Vertical = maquina maior. Horizontal = mais maquinas. Aqui estao aumentando o tamanho da instancia existente.",avoid:"Escalabilidade vertical tem teto fisico — eventualmente nao ha instancia maior disponivel. Projete para horizontal sempre que possivel."},en:{tech:"Vertical scaling (scale up) increases resources on the existing instance — more CPU, RAM, or storage. It is simple but has physical limits and requires downtime for instance type changes.",simple:"Vertical = bigger machine. Horizontal = more machines. Here they are increasing the size of the existing instance.",avoid:"Vertical scaling has a physical ceiling — eventually there is no larger instance available. Design for horizontal scaling whenever possible."}}},
{en:"A company needs to deliver static content (images, CSS, JavaScript) to global users with the lowest possible latency. Which AWS service should they use?",pt:"Uma empresa precisa entregar conteudo estatico (imagens, CSS, JavaScript) para usuarios globais com a menor latencia possivel. Qual servico AWS deve usar?",o:{en:["AWS Global Accelerator","Amazon CloudFront","Amazon Route 53","AWS Direct Connect"],pt:["AWS Global Accelerator","Amazon CloudFront","Amazon Route 53","AWS Direct Connect"]},a:[1],t:"CloudFront vs Global Accelerator",exp:{pt:{tech:"CloudFront e uma CDN que armazena conteudo em cache nos edge locations mais proximos dos usuarios. Ideal para conteudo estatico e dinamico HTTP/HTTPS, streaming de video e APIs que se beneficiam de cache.",simple:"CloudFront e para conteudo — ele guarda uma copia do arquivo perto do usuario. Global Accelerator e para rede — ele roteia o trafego mais rapidamente sem cache.",avoid:"Nao use Global Accelerator para conteudo estatico — ele nao faz cache de conteudo, apenas otimiza o roteamento de rede."},en:{tech:"CloudFront is a CDN that caches content at edge locations closest to users. Ideal for static and dynamic HTTP/HTTPS content, video streaming, and APIs that benefit from caching.",simple:"CloudFront is for content — it stores a copy of the file near the user. Global Accelerator is for networking — it routes traffic faster without caching.",avoid:"Do not use Global Accelerator for static content — it does not cache content, it only optimizes network routing."}}},
{en:"A company runs a multiplayer gaming application where players worldwide need low-latency access to game servers hosted in us-east-1. The traffic is dynamic and cannot be cached. Which service should they use to improve global performance?",pt:"Uma empresa executa uma aplicacao de jogos multiplayer onde jogadores do mundo todo precisam de acesso de baixa latencia a servidores de jogo hospedados em us-east-1. O trafego e dinamico e nao pode ser cacheado. Qual servico deve ser usado para melhorar a performance global?",o:{en:["Amazon CloudFront","AWS Global Accelerator","Amazon Route 53 with latency-based routing","Amazon ElastiCache"],pt:["Amazon CloudFront","AWS Global Accelerator","Amazon Route 53 com roteamento baseado em latencia","Amazon ElastiCache"]},a:[1],t:"CloudFront vs Global Accelerator",exp:{pt:{tech:"Global Accelerator usa a rede backbone da AWS para rotear trafego desde o ponto de entrada mais proximo do usuario ate a origem. Fornece IPs estaticos anycast e melhora a performance de aplicacoes TCP/UDP que nao se beneficiam de cache.",simple:"Global Accelerator e para quando o conteudo e dinamico e nao pode ser cacheado. Ele acelera a rota de rede, nao o conteudo.",avoid:"Nao use CloudFront para trafego completamente dinamico e stateful como TCP de jogos — CloudFront e HTTP e beneficia aplicacoes com possibilidade de cache."},en:{tech:"Global Accelerator uses the AWS backbone network to route traffic from the nearest entry point to the origin. It provides static anycast IPs and improves performance for TCP/UDP applications that do not benefit from caching.",simple:"Global Accelerator is for when content is dynamic and cannot be cached. It accelerates the network route, not the content.",avoid:"Do not use CloudFront for fully dynamic stateful traffic like gaming TCP — CloudFront is HTTP-focused and benefits applications with caching potential."}}},
{en:"A company wants to establish a private, dedicated network connection between their on-premises data center and AWS to ensure consistent bandwidth and avoid using the public internet. Which AWS service should they use?",pt:"Uma empresa quer estabelecer uma conexao de rede privada e dedicada entre seu datacenter local e a AWS para garantir largura de banda consistente e evitar o uso da internet publica. Qual servico AWS deve usar?",o:{en:["AWS Site-to-Site VPN","AWS Direct Connect","Amazon VPC Peering","AWS Transit Gateway"],pt:["AWS Site-to-Site VPN","AWS Direct Connect","Amazon VPC Peering","AWS Transit Gateway"]},a:[1],t:"Direct Connect vs VPN",exp:{pt:{tech:"AWS Direct Connect fornece uma conexao de rede dedicada e privada de 1 Gbps ou 10 Gbps entre as instalacoes do cliente e a AWS. Nao passa pela internet publica, oferecendo latencia consistente e previsivel.",simple:"Direct Connect e um cabo fisico dedicado entre voce e a AWS. VPN e um tunel criptografado sobre a internet — mais barato, mas sujeito a variacao da internet.",avoid:"Nao use VPN quando voce precisa de largura de banda garantida e latencia consistente — a internet publica tem variacao imprevisivel."},en:{tech:"AWS Direct Connect provides a dedicated, private 1 Gbps or 10 Gbps network connection between customer premises and AWS. It does not traverse the public internet, offering consistent and predictable latency.",simple:"Direct Connect is a dedicated physical cable between you and AWS. VPN is an encrypted tunnel over the internet — cheaper but subject to internet variability.",avoid:"Do not use VPN when you need guaranteed bandwidth and consistent latency — the public internet has unpredictable variation."}}},
{en:"A small company needs to quickly establish an encrypted connection between their office and their AWS VPC to allow employees to access resources. The connection needs to be set up in hours, not weeks. Which AWS service should they use?",pt:"Uma pequena empresa precisa estabelecer rapidamente uma conexao criptografada entre seu escritorio e sua VPC AWS para permitir que funcionarios acessem recursos. A conexao precisa ser configurada em horas, nao semanas. Qual servico AWS deve usar?",o:{en:["AWS Direct Connect","AWS Site-to-Site VPN","AWS PrivateLink","AWS VPC Peering"],pt:["AWS Direct Connect","AWS Site-to-Site VPN","AWS PrivateLink","AWS VPC Peering"]},a:[1],t:"Direct Connect vs VPN",exp:{pt:{tech:"AWS Site-to-Site VPN pode ser configurado em minutos usando o console AWS. Cria um tunel IPSec criptografado sobre a internet publica. Direct Connect requer semanas para provisionamento de circuito fisico com um parceiro de rede.",simple:"VPN e rapido de configurar e usa a internet — ideal para comecar logo. Direct Connect e lento para provisionar mas tem qualidade de rede superior.",avoid:"Nao use Direct Connect quando velocidade de setup e critica — o processo de provisionamento fisico pode levar semanas ou meses."},en:{tech:"AWS Site-to-Site VPN can be configured in minutes using the AWS console. It creates an IPSec encrypted tunnel over the public internet. Direct Connect requires weeks for physical circuit provisioning with a network partner.",simple:"VPN is quick to set up and uses the internet — ideal for getting started fast. Direct Connect is slow to provision but has superior network quality.",avoid:"Do not use Direct Connect when setup speed is critical — the physical provisioning process can take weeks or months."}}},
{en:"A company wants to decouple their order processing system so that if the processing service is temporarily unavailable, orders are not lost. The system processes orders one at a time in the order they were received. Which AWS service should they use?",pt:"Uma empresa quer desacoplar seu sistema de processamento de pedidos para que, se o servico de processamento estiver temporariamente indisponivel, os pedidos nao sejam perdidos. O sistema processa pedidos um de cada vez na ordem em que foram recebidos. Qual servico AWS deve usar?",o:{en:["Amazon SNS","Amazon SQS FIFO","Amazon EventBridge","Amazon Kinesis"],pt:["Amazon SNS","Amazon SQS FIFO","Amazon EventBridge","Amazon Kinesis"]},a:[1],t:"SQS vs SNS",exp:{pt:{tech:"SQS FIFO garante entrega exatamente uma vez e preserva a ordem dos mensagens. SQS Standard garante entrega pelo menos uma vez mas nao garante ordem. SNS e para fan-out (publicar para multiplos subscribers), nao para filas.",simple:"SQS e uma fila — guarda mensagens ate alguem processar. SNS e um topico — entrega para multiplos destinos ao mesmo tempo. Para pedidos em ordem, SQS FIFO.",avoid:"Nao use SNS como fila — SNS nao persiste mensagens se o subscriber nao estiver disponivel no momento da publicacao."},en:{tech:"SQS FIFO guarantees exactly-once delivery and preserves message order. SQS Standard guarantees at-least-once delivery but does not guarantee order. SNS is for fan-out (publish to multiple subscribers), not for queuing.",simple:"SQS is a queue — it stores messages until someone processes them. SNS is a topic — it delivers to multiple destinations simultaneously. For ordered processing, use SQS FIFO.",avoid:"Do not use SNS as a queue — SNS does not persist messages if the subscriber is unavailable at the time of publishing."}}},
{en:"A company has a new product launch event and needs to notify multiple systems simultaneously: email subscribers, a mobile push notification service, and an analytics platform. Which AWS service is most appropriate?",pt:"Uma empresa tem um evento de lancamento de produto e precisa notificar multiplos sistemas simultaneamente: assinantes de email, um servico de notificacao push para mobile e uma plataforma de analytics. Qual servico AWS e mais apropriado?",o:{en:["Amazon SQS","Amazon SNS","Amazon MQ","Amazon Kinesis"],pt:["Amazon SQS","Amazon SNS","Amazon MQ","Amazon Kinesis"]},a:[1],t:"SQS vs SNS",exp:{pt:{tech:"SNS (Simple Notification Service) e um servico de pub/sub que entrega mensagens para multiplos endpoints (SQS, Lambda, HTTP, email, SMS, push mobile) simultaneamente. Um unico publish alcanca todos os subscribers.",simple:"SNS e para fan-out — um evento, varios destinos ao mesmo tempo. SQS e para uma fila — um evento, um consumidor de cada vez.",avoid:"Nao use SQS quando voce precisa que multiplos sistemas recebam o mesmo evento — SQS entrega cada mensagem para um unico consumidor."},en:{tech:"SNS (Simple Notification Service) is a pub/sub service that delivers messages to multiple endpoints (SQS, Lambda, HTTP, email, SMS, mobile push) simultaneously. A single publish reaches all subscribers.",simple:"SNS is for fan-out — one event, multiple destinations at the same time. SQS is for a queue — one event, one consumer at a time.",avoid:"Do not use SQS when multiple systems need to receive the same event — SQS delivers each message to a single consumer."}}},
{en:"A global e-commerce company wants to route users to the AWS region with the lowest network latency based on their geographic location. Which Route 53 routing policy should they use?",pt:"Uma empresa global de e-commerce quer rotear usuarios para a regiao AWS com a menor latencia de rede com base em sua localizacao geografica. Qual politica de roteamento do Route 53 deve ser usada?",o:{en:["Geolocation routing","Latency-based routing","Failover routing","Weighted routing"],pt:["Roteamento por geolocalizacao","Roteamento baseado em latencia","Roteamento de failover","Roteamento ponderado"],},a:[1],t:"Route 53 Routing Policies",exp:{pt:{tech:"Latency-based routing rota para o recurso que oferece a menor latencia de rede para o usuario, independentemente da localizacao geografica. Geolocation routing roteia baseado no pais/continente do usuario, nao na latencia real.",simple:"Latency-based usa medicao real de velocidade de rede. Geolocation usa endereco IP para determinar o pais — um usuario na Europa pode ter menor latencia para uma regiao fora da Europa.",avoid:"Nao use Geolocation quando o objetivo e menor latencia — um usuario no leste da Europa pode ter melhor latencia para us-east-1 do que para eu-west-1."},en:{tech:"Latency-based routing routes to the resource that provides the lowest network latency for the user, regardless of geographic location. Geolocation routing routes based on the user country/continent, not actual latency.",simple:"Latency-based uses actual network speed measurement. Geolocation uses IP address to determine country — a user in Europe might have lower latency to a region outside Europe.",avoid:"Do not use Geolocation when the goal is lowest latency — a user in Eastern Europe might have better latency to us-east-1 than eu-west-1."}}},
{en:"A company operates a primary website in us-east-1 and a standby site in eu-west-1. If the primary site becomes unhealthy, traffic should automatically route to the standby. Which Route 53 routing policy implements this?",pt:"Uma empresa opera um site primario em us-east-1 e um site de standby em eu-west-1. Se o site primario ficar indisponivel, o trafego deve ser automaticamente roteado para o standby. Qual politica de roteamento do Route 53 implementa isso?",o:{en:["Latency-based routing","Weighted routing","Failover routing","Geolocation routing"],pt:["Roteamento baseado em latencia","Roteamento ponderado","Roteamento de failover","Roteamento por geolocalizacao"]},a:[2],t:"Route 53 Routing Policies",exp:{pt:{tech:"Failover routing usa health checks para monitorar o endpoint primario. Se o health check falhar, o Route 53 automaticamente roteia para o endpoint secundario. Requer configuracao de health checks no Route 53.",simple:"Failover routing e exatamente o que o nome diz — falhou o primario, vai para o backup. Os outros tipos nao tem esse comportamento automatico baseado em saude.",avoid:"Nao use Weighted routing para failover — Weighted distribui trafego por proporcao e nao detecta falhas automaticamente."},en:{tech:"Failover routing uses health checks to monitor the primary endpoint. If the health check fails, Route 53 automatically routes to the secondary endpoint. Requires health check configuration in Route 53.",simple:"Failover routing is exactly what the name says — if primary fails, go to backup. The other types do not have this automatic health-based behavior.",avoid:"Do not use Weighted routing for failover — Weighted distributes traffic by proportion and does not automatically detect failures."}}},
{en:"A company wants to serve different content to users based on their country of origin for legal and compliance reasons. For example, EU users must be served by EU servers. Which Route 53 routing policy should they use?",pt:"Uma empresa quer servir conteudo diferente para usuarios com base em seu pais de origem por razoes legais e de conformidade. Por exemplo, usuarios da UE devem ser atendidos por servidores da UE. Qual politica de roteamento do Route 53 deve ser usada?",o:{en:["Latency-based routing","Failover routing","Geolocation routing","Weighted routing"],pt:["Roteamento baseado em latencia","Roteamento de failover","Roteamento por geolocalizacao","Roteamento ponderado"]},a:[2],t:"Route 53 Routing Policies",exp:{pt:{tech:"Geolocation routing direciona usuarios para endpoints especificos com base no pais ou continente de origem determinado pelo IP. Permite compliance com regulacoes de soberania de dados como GDPR.",simple:"Geolocation e para regras baseadas em localizacao — voce quer controlar quem acessa qual servidor por lei. Latency-based e para performance — voce quer o mais rapido, seja onde for.",avoid:"Nao use Latency-based quando voce precisa de determinismo geografico por compliance — latency pode rotear um usuario da EU para fora da EU se tiver menor latencia."},en:{tech:"Geolocation routing directs users to specific endpoints based on their origin country or continent as determined by IP address. It enables compliance with data sovereignty regulations such as GDPR.",simple:"Geolocation is for location-based rules — you want to control who accesses which server by law. Latency-based is for performance — you want the fastest, wherever it is.",avoid:"Do not use Latency-based when you need geographic determinism for compliance — latency-based routing could route an EU user outside the EU if that has lower latency."}}},
{en:"A company wants to run containerized applications on AWS without having to manage the underlying EC2 instances or Kubernetes control plane. Which service best meets this requirement?",pt:"Uma empresa quer executar aplicacoes conteinerizadas na AWS sem precisar gerenciar as instancias EC2 subjacentes ou o plano de controle do Kubernetes. Qual servico atende melhor a esse requisito?",o:{en:["Amazon ECS on EC2","Amazon EKS on EC2","AWS Fargate","Amazon ECR"],pt:["Amazon ECS no EC2","Amazon EKS no EC2","AWS Fargate","Amazon ECR"]},a:[2],t:"ECS vs EKS vs Fargate",exp:{pt:{tech:"AWS Fargate e um mecanismo de computacao serverless para containers que elimina a necessidade de provisionar e gerenciar servidores. Funciona com tanto ECS quanto EKS. Voce define apenas CPU e memoria por container.",simple:"Fargate e serverless para containers — voce nao gerencia servidores, apenas diz quanta CPU e RAM cada container precisa.",avoid:"Nao confunda ECR com ECS/EKS/Fargate — ECR (Elastic Container Registry) e apenas o repositorio de imagens Docker, nao o servico de execucao."},en:{tech:"AWS Fargate is a serverless compute engine for containers that eliminates the need to provision and manage servers. It works with both ECS and EKS. You define only CPU and memory per container.",simple:"Fargate is serverless for containers — you do not manage servers, you just tell it how much CPU and RAM each container needs.",avoid:"Do not confuse ECR with ECS/EKS/Fargate — ECR (Elastic Container Registry) is only the Docker image repository, not the execution service."}}},
{en:"A company is migrating to containers and already has a team with deep Kubernetes expertise. They want to use Kubernetes on AWS while minimizing operational overhead of managing the control plane. Which service should they choose?",pt:"Uma empresa esta migrando para containers e ja tem uma equipe com profundo conhecimento em Kubernetes. Eles querem usar Kubernetes na AWS minimizando a sobrecarga operacional de gerenciar o plano de controle. Qual servico deve escolher?",o:{en:["Amazon ECS","AWS Fargate","Amazon EKS","AWS Lambda"],pt:["Amazon ECS","AWS Fargate","Amazon EKS","AWS Lambda"]},a:[2],t:"ECS vs EKS vs Fargate",exp:{pt:{tech:"Amazon EKS (Elastic Kubernetes Service) gerencia o control plane do Kubernetes (API server, etcd, scheduler). Voce ainda gerencia os worker nodes (ou usa Fargate para eliminar isso tambem), mas a complexidade do control plane e da AWS.",simple:"EKS e Kubernetes gerenciado pela AWS. Use quando a equipe ja sabe Kubernetes e quer continuar usando — a AWS cuida da parte dificil (control plane).",avoid:"Nao use ECS quando a equipe tem investimento em Kubernetes — ECS e o orquestrador proprietario da AWS, incompativel com workloads Kubernetes existentes."},en:{tech:"Amazon EKS (Elastic Kubernetes Service) manages the Kubernetes control plane (API server, etcd, scheduler). You still manage worker nodes (or use Fargate to eliminate that too), but control plane complexity is handled by AWS.",simple:"EKS is Kubernetes managed by AWS. Use it when the team already knows Kubernetes and wants to keep using it — AWS handles the hard part (control plane).",avoid:"Do not use ECS when the team has a Kubernetes investment — ECS is AWS proprietary orchestration, incompatible with existing Kubernetes workloads."}}},
{en:"A security team wants to know every API call made in their AWS account over the past 90 days, including who made the call, from which IP address, and at what time. Which AWS service provides this information?",pt:"Uma equipe de seguranca quer saber cada chamada de API feita em sua conta AWS nos ultimos 90 dias, incluindo quem fez a chamada, de qual endereco IP e em que horario. Qual servico AWS fornece essas informacoes?",o:{en:["Amazon CloudWatch","AWS Config","AWS CloudTrail","AWS Trusted Advisor"],pt:["Amazon CloudWatch","AWS Config","AWS CloudTrail","AWS Trusted Advisor"]},a:[2],t:"Config vs CloudTrail vs CloudWatch",exp:{pt:{tech:"AWS CloudTrail registra todas as chamadas de API feitas na conta AWS — quem chamou (usuario/role), qual acao, em que recurso, de qual IP e quando. E o servico de auditoria de atividade de usuarios e servicos.",simple:"CloudTrail = quem fez o que e quando. CloudWatch = metricas e performance. Config = estado de configuracao dos recursos ao longo do tempo.",avoid:"Nao use CloudWatch para auditoria de acoes de usuarios — CloudWatch monitora metricas operacionais, nao registro de chamadas de API."},en:{tech:"AWS CloudTrail records all API calls made in the AWS account — who called (user/role), what action, on which resource, from which IP, and when. It is the user and service activity audit service.",simple:"CloudTrail = who did what and when. CloudWatch = metrics and performance. Config = resource configuration state over time.",avoid:"Do not use CloudWatch for user action auditing — CloudWatch monitors operational metrics, not API call logs."}}},
{en:"A compliance team needs to demonstrate that all S3 buckets in the account have had public access blocked at all times during the past 12 months. Which AWS service provides this configuration history?",pt:"Uma equipe de conformidade precisa demonstrar que todos os buckets S3 na conta tiveram o acesso publico bloqueado em todos os momentos durante os ultimos 12 meses. Qual servico AWS fornece esse historico de configuracao?",o:{en:["AWS CloudTrail","Amazon CloudWatch","AWS Config","AWS Security Hub"],pt:["AWS CloudTrail","Amazon CloudWatch","AWS Config","AWS Security Hub"]},a:[2],t:"Config vs CloudTrail vs CloudWatch",exp:{pt:{tech:"AWS Config registra o estado de configuracao dos recursos AWS ao longo do tempo e detecta mudancas. Permite auditar se um recurso estava em conformidade em qualquer ponto no passado. Config Rules pode verificar automaticamente se buckets S3 tem public access bloqueado.",simple:"Config = historico de como os recursos estavam configurados. CloudTrail = historico de quem fez mudancas. Config responde 'o bucket estava publico semana passada?', CloudTrail responde 'quem tornou o bucket publico?'",avoid:"Nao use CloudTrail para verificar o estado de configuracao — CloudTrail registra a acao, nao o estado resultante do recurso ao longo do tempo."},en:{tech:"AWS Config records the configuration state of AWS resources over time and detects changes. It enables auditing whether a resource was compliant at any point in the past. Config Rules can automatically check whether S3 buckets have public access blocked.",simple:"Config = history of how resources were configured. CloudTrail = history of who made changes. Config answers 'was the bucket public last week?', CloudTrail answers 'who made the bucket public?'",avoid:"Do not use CloudTrail to check configuration state — CloudTrail records the action, not the resulting resource state over time."}}},
{en:"A DevOps team wants to receive an alert when CPU utilization on their EC2 instances exceeds 80% for more than 5 minutes. Which AWS service should they use?",pt:"Uma equipe de DevOps quer receber um alerta quando a utilizacao de CPU nas instancias EC2 exceder 80% por mais de 5 minutos. Qual servico AWS deve usar?",o:{en:["AWS CloudTrail","AWS Config","Amazon CloudWatch","AWS Trusted Advisor"],pt:["AWS CloudTrail","AWS Config","Amazon CloudWatch","AWS Trusted Advisor"]},a:[2],t:"Config vs CloudTrail vs CloudWatch",exp:{pt:{tech:"CloudWatch coleta e monitora metricas de servicos AWS (CPU, rede, disco) e logs de aplicacoes. CloudWatch Alarms disparam notificacoes (via SNS) ou acoes (via Auto Scaling) quando metricas cruzam thresholds definidos.",simple:"CloudWatch e para metricas e monitoramento em tempo real. E o servico que monitora saude operacional dos recursos.",avoid:"Nao use AWS Config para monitoramento operacional em tempo real — Config e para auditoria de configuracao e compliance, nao para metricas de performance."},en:{tech:"CloudWatch collects and monitors metrics from AWS services (CPU, network, disk) and application logs. CloudWatch Alarms trigger notifications (via SNS) or actions (via Auto Scaling) when metrics cross defined thresholds.",simple:"CloudWatch is for metrics and real-time monitoring. It is the service that monitors operational health of resources.",avoid:"Do not use AWS Config for real-time operational monitoring — Config is for configuration auditing and compliance, not performance metrics."}}},
{en:"A company is evaluating whether to migrate their on-premises infrastructure to AWS. They want to calculate the total cost comparison between keeping their current on-premises setup versus moving to AWS. Which AWS tool should they use?",pt:"Uma empresa esta avaliando se deve migrar sua infraestrutura local para a AWS. Eles querem calcular a comparacao de custo total entre manter sua configuracao local atual versus migrar para a AWS. Qual ferramenta AWS deve usar?",o:{en:["AWS Pricing Calculator","AWS TCO Calculator","AWS Cost Explorer","AWS Budgets"],pt:["AWS Pricing Calculator","AWS TCO Calculator","AWS Cost Explorer","AWS Budgets"]},a:[1],t:"TCO Calculator vs Pricing Calculator",exp:{pt:{tech:"O AWS TCO Calculator (Migration Evaluator) compara o custo total de propriedade do ambiente on-premises com o custo equivalente na AWS, incluindo hardware, software, instalacoes, manutencao e pessoal. O Pricing Calculator estima custos de servicos AWS especificos.",simple:"TCO Calculator = devo migrar? Compara on-premises vs AWS. Pricing Calculator = quanto vai custar na AWS? Estima servicos especificos antes de implantar.",avoid:"Nao use Pricing Calculator para justificar uma migracao — ele nao compara com custos on-premises, apenas estima o que voce pagara na AWS."},en:{tech:"The AWS TCO Calculator (Migration Evaluator) compares the total cost of ownership of on-premises environments with equivalent AWS costs, including hardware, software, facilities, maintenance, and staff. The Pricing Calculator estimates costs of specific AWS services.",simple:"TCO Calculator = should I migrate? Compares on-premises vs AWS. Pricing Calculator = how much will it cost on AWS? Estimates specific services before deploying.",avoid:"Do not use Pricing Calculator to justify a migration — it does not compare against on-premises costs, it only estimates what you will pay on AWS."}}},
{en:"A solutions architect needs to estimate the monthly cost of a new AWS architecture before deployment. The architecture includes EC2 instances, RDS databases, S3 storage, and data transfer costs. Which tool should they use?",pt:"Um arquiteto de solucoes precisa estimar o custo mensal de uma nova arquitetura AWS antes da implantacao. A arquitetura inclui instancias EC2, bancos de dados RDS, armazenamento S3 e custos de transferencia de dados. Qual ferramenta deve usar?",o:{en:["AWS TCO Calculator","AWS Cost Explorer","AWS Pricing Calculator","AWS Budgets"],pt:["AWS TCO Calculator","AWS Cost Explorer","AWS Pricing Calculator","AWS Budgets"]},a:[2],t:"TCO Calculator vs Pricing Calculator",exp:{pt:{tech:"AWS Pricing Calculator permite modelar arquiteturas AWS e calcular custos estimados por servico. Suporta configuracao detalhada de instancias EC2, RDS, S3, transferencia de dados e praticamente todos os servicos AWS.",simple:"Pricing Calculator = quanto vai custar uma arquitetura especifica na AWS. Use antes de implantar para prever custos.",avoid:"Nao use Cost Explorer para estimativas pre-implantacao — Cost Explorer analisa gastos historicos reais, nao projeta custos de arquiteturas ainda nao criadas."},en:{tech:"AWS Pricing Calculator allows modeling AWS architectures and calculating estimated costs per service. It supports detailed configuration of EC2 instances, RDS, S3, data transfer, and virtually all AWS services.",simple:"Pricing Calculator = how much will a specific AWS architecture cost. Use it before deploying to forecast costs.",avoid:"Do not use Cost Explorer for pre-deployment estimates — Cost Explorer analyzes actual historical spending, it does not project costs for architectures not yet created."}}},
{en:"A company wants to conduct a penetration test on their AWS environment. Which of the following statements about AWS penetration testing policy is correct?",pt:"Uma empresa quer realizar um teste de penetracao em seu ambiente AWS. Qual das seguintes afirmacoes sobre a politica de teste de penetracao da AWS e correta?",o:{en:["You must always obtain written approval from AWS before any penetration testing","You can perform penetration tests on your own AWS resources for most services without prior AWS approval","Penetration testing is prohibited on all AWS services","Only AWS-authorized third parties can perform penetration testing"],pt:["Voce deve sempre obter aprovacao por escrito da AWS antes de qualquer teste de penetracao","Voce pode realizar testes de penetracao em seus proprios recursos AWS para a maioria dos servicos sem aprovacao previa da AWS","Testes de penetracao sao proibidos em todos os servicos AWS","Apenas terceiros autorizados pela AWS podem realizar testes de penetracao"]},a:[1],t:"Penetration Testing",exp:{pt:{tech:"A politica atual da AWS (2024) permite testes de penetracao em seus proprios recursos para servicos como EC2, RDS, CloudFront, API Gateway, Lambda e Elastic Beanstalk sem aprovacao previa. Alguns servicos (Route 53, WAF) requerem aprovacao. DDoS simulado e sempre proibido.",simple:"Voce pode hackear seus proprios recursos AWS sem pedir permissao para a maioria dos servicos. Mas voce nao pode testar servicos compartilhados da AWS ou simular DDoS.",avoid:"Nao assuma que precisa de aprovacao para tudo — o processo mudou e a AWS liberou os principais servicos para teste sem aprovacao previa."},en:{tech:"The current AWS policy (2024) permits penetration testing on your own resources for services such as EC2, RDS, CloudFront, API Gateway, Lambda, and Elastic Beanstalk without prior approval. Some services (Route 53, WAF) require approval. Simulated DDoS is always prohibited.",simple:"You can test your own AWS resources without asking AWS permission for most services. But you cannot test shared AWS infrastructure or simulate DDoS.",avoid:"Do not assume you need approval for everything — the process has changed and AWS has released major services for testing without prior approval."}}},
{en:"A company wants to review their AWS architecture against the five pillars of the AWS Well-Architected Framework and receive guidance on improvement areas. Which AWS tool should they use?",pt:"Uma empresa quer revisar sua arquitetura AWS em relacao aos cinco pilares do AWS Well-Architected Framework e receber orientacao sobre areas de melhoria. Qual ferramenta AWS deve usar?",o:{en:["AWS Trusted Advisor","AWS Well-Architected Tool","AWS Config","AWS Inspector"],pt:["AWS Trusted Advisor","AWS Well-Architected Tool","AWS Config","AWS Inspector"]},a:[1],t:"Well-Architected Tool vs Trusted Advisor",exp:{pt:{tech:"O AWS Well-Architected Tool guia revisoes estruturadas baseadas nos 6 pilares (Operational Excellence, Security, Reliability, Performance Efficiency, Cost Optimization, Sustainability) atraves de questionarios. Gera relatorios de risco e recomendacoes.",simple:"Well-Architected Tool = revisao manual e estruturada da arquitetura com base nos pilares da AWS. Trusted Advisor = verificacoes automaticas de configuracoes especificas.",avoid:"Nao confunda Well-Architected Tool com Trusted Advisor — Trusted Advisor faz checks automaticos de configuracoes, nao uma revisao holistica de arquitetura."},en:{tech:"The AWS Well-Architected Tool guides structured reviews based on the 6 pillars (Operational Excellence, Security, Reliability, Performance Efficiency, Cost Optimization, Sustainability) through questionnaires. It generates risk reports and recommendations.",simple:"Well-Architected Tool = manual, structured architecture review based on AWS pillars. Trusted Advisor = automated checks of specific configurations.",avoid:"Do not confuse Well-Architected Tool with Trusted Advisor — Trusted Advisor does automated configuration checks, not a holistic architecture review."}}},
