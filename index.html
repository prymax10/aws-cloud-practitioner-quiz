<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado AWS Cloud Practitioner (CLF-C02)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0e17;color:#e0e0e0;min-height:100vh}
.container{max-width:860px;margin:0 auto;padding:20px}
header{text-align:center;padding:30px 0 20px;border-bottom:1px solid #1e293b;margin-bottom:30px}
header h1{font-size:1.6rem;color:#ff9900;margin-bottom:6px}
header p{color:#94a3b8;font-size:.9rem}
.lang-switch,.mode-switch{display:flex;justify-content:center;gap:0;margin-top:14px}
.lang-btn,.mode-btn{padding:6px 20px;border:1px solid #334155;background:0 0;color:#94a3b8;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}
.lang-btn:first-child,.mode-btn:first-child{border-radius:6px 0 0 6px}
.lang-btn:last-child,.mode-btn:last-child{border-radius:0 6px 6px 0}
.lang-btn.active,.mode-btn.active{background:#ff9900;color:#0a0e17;border-color:#ff9900}
.mode-btn.study.active{background:#3b82f6;border-color:#3b82f6}
.timer-bar{text-align:center;margin-bottom:16px;display:none}
.timer{font-size:1.4rem;font-weight:700;color:#ff9900;font-variant-numeric:tabular-nums}
.timer.warn{color:#ef4444;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.progress-bar{background:#1e293b;border-radius:8px;height:8px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ff9900,#ffb84d);border-radius:8px;transition:width .4s;width:0%}
.progress-text{text-align:right;font-size:.8rem;color:#94a3b8;margin-bottom:6px}
.question-card{background:#111827;border:1px solid #1e293b;border-radius:12px;padding:24px;margin-bottom:20px;transition:border-color .3s}
.question-card.answered{border-color:#334155}
.question-card.study-right{border-color:#22c55e}
.question-card.study-wrong{border-color:#ef4444}
.question-card .q-number{color:#ff9900;font-size:.8rem;font-weight:600;margin-bottom:8px}
.question-card .q-text{font-size:1rem;line-height:1.6;margin-bottom:16px}
.question-card .q-note{font-size:.8rem;color:#ff9900;font-style:italic;margin-bottom:12px}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:1px solid #1e293b;border-radius:8px;cursor:pointer;transition:all .2s}
.option:hover{background:#1a2332;border-color:#334155}
.option.selected{background:#1a2332;border-color:#ff9900}
.option.locked{pointer-events:none;opacity:.7}
.option.correct-reveal{border-color:#22c55e;background:#0a1f0a}
.option.wrong-reveal{border-color:#ef4444;background:#1f0a0a}
.option .check{width:20px;height:20px;min-width:20px;border:2px solid #475569;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s}
.option.multi .check{border-radius:4px}
.option.selected .check{border-color:#ff9900;background:#ff9900}
.option.selected .check::after{content:'';display:block;width:6px;height:6px;background:#0a0e17;border-radius:50%}
.option.multi.selected .check::after{border-radius:2px;background:0 0;border-bottom:2px solid #0a0e17;border-right:2px solid #0a0e17;transform:rotate(45deg);width:5px;height:9px;margin-bottom:2px}
.option .letter{color:#ff9900;font-weight:600;min-width:16px}
.option .text{color:#cbd5e1;font-size:.95rem;line-height:1.5}
.explanation{display:none;margin-top:16px;padding:16px;border-radius:8px;background:#0f172a;border:1px solid #1e293b}
.explanation.show{display:block}
.explanation .exp-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.explanation .exp-tech{color:#60a5fa;margin-bottom:12px;font-size:.9rem;line-height:1.5}
.explanation .exp-simple{color:#a78bfa;font-size:.9rem;line-height:1.5;padding-top:10px;border-top:1px solid #1e293b}
.explanation .exp-avoid{color:#f87171;font-size:.9rem;line-height:1.5;padding-top:10px;border-top:1px solid #1e293b}
.exp-icon{margin-right:4px}
.study-badge{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:4px;font-weight:600;margin-top:8px}
.study-badge.right{background:#052e16;color:#22c55e}
.study-badge.wrong{background:#2d0a0a;color:#ef4444}
.btn-submit{display:block;margin:40px auto;padding:14px 48px;font-size:1.1rem;font-weight:600;color:#0a0e17;background:#ff9900;border:none;border-radius:8px;cursor:pointer;transition:all .2s}
.btn-submit:hover{background:#ffb84d;transform:translateY(-1px)}
.btn-confirm{display:none;margin:10px auto;padding:10px 30px;font-size:.9rem;font-weight:600;color:#0a0e17;background:#22c55e;border:none;border-radius:6px;cursor:pointer}
.results{display:none}
.results-header{text-align:center;padding:30px;background:#111827;border-radius:12px;border:1px solid #1e293b;margin-bottom:24px}
.results-header .score{font-size:3.5rem;font-weight:700}
.results-header .score.pass{color:#22c55e}
.results-header .score.fail{color:#ef4444}
.results-header .label{font-size:1.1rem;color:#94a3b8;margin-top:4px}
.results-header .verdict{font-size:1.3rem;font-weight:600;margin-top:12px;padding:8px 20px;border-radius:6px;display:inline-block}
.verdict.pass{background:#052e16;color:#22c55e}
.verdict.fail{background:#2d0a0a;color:#ef4444}
.results-bar{display:flex;gap:20px;justify-content:center;margin-top:16px;font-size:.9rem}
.results-bar span{color:#94a3b8}
.results-bar .correct{color:#22c55e}
.results-bar .wrong{color:#ef4444}
.review-card{background:#111827;border-radius:12px;padding:20px;margin-bottom:14px;border-left:4px solid transparent}
.review-card.right{border-left-color:#22c55e}
.review-card.wrong{border-left-color:#ef4444}
.review-card .q-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.review-card .q-head .tag{font-size:.75rem;padding:3px 10px;border-radius:4px;font-weight:600}
.tag.right{background:#052e16;color:#22c55e}
.tag.wrong{background:#2d0a0a;color:#ef4444}
.review-card .q-text{font-size:.95rem;margin-bottom:10px;color:#cbd5e1}
.review-card .answer-line{font-size:.85rem;margin:3px 0}
.answer-line .label-ans{color:#94a3b8}
.answer-line .val-correct{color:#22c55e;font-weight:600}
.answer-line .val-wrong{color:#ef4444}
.btn-top{display:block;margin:30px auto;padding:10px 30px;background:0 0;border:1px solid #334155;color:#94a3b8;border-radius:6px;cursor:pointer;font-size:.9rem}
.btn-top:hover{border-color:#ff9900;color:#ff9900}
.start-screen{text-align:center;padding:60px 20px}
.start-screen h2{color:#ff9900;margin-bottom:10px;font-size:1.4rem}
.start-screen p{color:#94a3b8;margin-bottom:30px}
.btn-start{padding:14px 48px;font-size:1.1rem;font-weight:600;color:#0a0e17;background:#ff9900;border:none;border-radius:8px;cursor:pointer}
.btn-start:hover{background:#ffb84d}
.study-score{text-align:center;padding:16px;background:#111827;border-radius:12px;border:1px solid #1e293b;margin-bottom:20px;display:none}
.study-score .ss-text{color:#94a3b8;font-size:.9rem}
.study-score .ss-num{color:#ff9900;font-weight:700;font-size:1.1rem}

@media(max-width:600px){
  .container{padding:12px 10px}
  header{padding:20px 0 14px;margin-bottom:20px}
  header h1{font-size:1.15rem}
  header p{font-size:.78rem}
  .lang-btn,.mode-btn{padding:8px 14px;font-size:.78rem}
  .question-card{padding:16px 14px;margin-bottom:14px;border-radius:10px}
  .question-card .q-text{font-size:.93rem;line-height:1.55;margin-bottom:12px}
  .question-card .q-number{font-size:.75rem}
  .option{padding:14px 12px;gap:8px;border-radius:6px;-webkit-tap-highlight-color:transparent}
  .option:hover{background:inherit;border-color:#1e293b}
  .option.selected{background:#1a2332;border-color:#ff9900}
  .option .text{font-size:.88rem;line-height:1.45}
  .option .letter{font-size:.88rem}
  .option .check{width:22px;height:22px;min-width:22px}
  .explanation{padding:12px;margin-top:12px}
  .explanation .exp-tech,.explanation .exp-simple,.explanation .exp-avoid{font-size:.84rem;line-height:1.45}
  .btn-submit{padding:14px 30px;font-size:1rem;width:100%;margin:30px auto}
  .btn-start{padding:14px 30px;font-size:1rem;width:100%}
  .btn-confirm{padding:12px 24px;font-size:.85rem;width:100%}
  .btn-top{width:100%;padding:12px}
  .results-header{padding:20px 16px}
  .results-header .score{font-size:2.8rem}
  .results-header .label{font-size:.95rem}
  .results-header .verdict{font-size:1.1rem;padding:6px 16px}
  .results-bar{flex-wrap:wrap;gap:10px;font-size:.82rem}
  .review-card{padding:14px 12px;border-radius:10px}
  .review-card .q-text{font-size:.88rem}
  .review-card .answer-line{font-size:.8rem}
  .timer{font-size:1.6rem}
  .start-screen{padding:40px 10px}
  .start-screen h2{font-size:1.2rem}
  .start-screen p{font-size:.88rem}
  .progress-text{font-size:.75rem}
  .study-score{padding:12px}
  .study-score .ss-text{font-size:.85rem}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>AWS Certified Cloud Practitioner (CLF-C02)</h1>
    <p id="header-sub"></p>
    <div class="lang-switch">
      <button class="lang-btn active" id="btn-pt" onclick="setLang('pt')">Portugues</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
    </div>
    <div class="mode-switch">
      <button class="mode-btn study active" id="btn-study" onclick="setMode('study')">Modo Estudo</button>
      <button class="mode-btn" id="btn-exam" onclick="setMode('exam')">Modo Simulado</button>
    </div>
  </header>

  <div id="start-screen" class="start-screen">
    <h2 id="start-title"></h2>
    <p id="start-desc"></p>
    <button class="btn-start" id="btn-start" onclick="startQuiz()"></button>
  </div>

  <div id="quiz-section" style="display:none">
    <div class="timer-bar" id="timer-bar"><span class="timer" id="timer">60:00</span></div>
    <div class="study-score" id="study-score"><span class="ss-text" id="ss-text"></span></div>
    <div class="progress-text" id="progress-text"></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div id="questions-container"></div>
    <button class="btn-submit" id="btn-submit" onclick="submitQuiz()"></button>
  </div>

  <div class="results" id="results-section">
    <div class="results-header">
      <div class="score" id="score-pct"></div>
      <div class="label" id="score-label"></div>
      <div class="verdict" id="verdict"></div>
      <div class="results-bar">
        <span class="correct" id="res-correct"></span>
        <span class="wrong" id="res-wrong"></span>
        <span id="res-unanswered"></span>
      </div>
    </div>
    <h3 style="margin-bottom:16px;color:#94a3b8" id="review-title"></h3>
    <div id="review-container"></div>
    <button class="btn-top" id="btn-top" onclick="window.scrollTo({top:0,behavior:'smooth'})"></button>
    <button class="btn-submit" id="btn-new" onclick="newQuiz()" style="margin-top:20px"></button>
  </div>
</div>

<script>
let lang='pt', mode='study', timerInterval=null, timeLeft=3600, studyCorrect=0, studyAnswered=0;
let lockedQuestions = new Set();

const ui={
pt:{
  sub:()=>'65 questoes sorteadas de '+Q.length+' \u2022 Aprovacao: 70%',
  progress:n=>`${n} / 65 respondidas`,
  submit:'Finalizar Simulado',
  qOf:i=>`Questao ${i} de 65`,
  choose:n=>`Escolha ${n} alternativas`,
  confirmMsg:n=>`Voce respondeu ${n} de 65 questoes. Deseja finalizar mesmo assim?`,
  of65:n=>`${n} de 65 corretas`,
  pass:'APROVADO',fail:'REPROVADO',
  correct:n=>`${n} corretas`,wrong:n=>`${n} erradas`,unanswered:n=>`${n} sem resposta`,
  reviewTitle:'Revisao das questoes',
  yourAns:'Sua resposta: ',correctAns:'Resposta correta: ',
  tagRight:'Correta',tagWrong:'Errada',tagNone:'Nao respondida',
  backTop:'Voltar ao topo',
  startStudy:'Modo Estudo',startExam:'Modo Simulado',
  descStudy:'Responda no seu ritmo. A cada erro, a explicacao aparece na hora.',
  descExam:'Simulado real: 60 minutos, sem respostas ate o final.',
  btnStart:'Comecar',
  techLabel:'Explicacao tecnica:',simpleLabel:'Explicacao simples:',avoidLabel:'Evite na pratica:',
  studyScore:(c,t)=>`Acertos: ${c} / ${t}`,
  rightBadge:'Acertou!',wrongBadge:'Errou!',
  confirmMulti:'Confirmar',
  modeStudy:'Modo Estudo',modeExam:'Modo Simulado',
  expLabel:'Explicacao',
  newQuiz:'Novo Simulado (questoes diferentes)'
},
en:{
  sub:()=>'65 questions from a pool of '+Q.length+' \u2022 Passing: 70%',
  progress:n=>`${n} / 65 answered`,
  submit:'Finish Exam',
  qOf:i=>`Question ${i} of 65`,
  choose:n=>`Choose ${n} options`,
  confirmMsg:n=>`You answered ${n} of 65 questions. Finish anyway?`,
  of65:n=>`${n} of 65 correct`,
  pass:'PASSED',fail:'FAILED',
  correct:n=>`${n} correct`,wrong:n=>`${n} wrong`,unanswered:n=>`${n} unanswered`,
  reviewTitle:'Question review',
  yourAns:'Your answer: ',correctAns:'Correct answer: ',
  tagRight:'Correct',tagWrong:'Wrong',tagNone:'Unanswered',
  backTop:'Back to top',
  startStudy:'Study Mode',startExam:'Exam Mode',
  descStudy:'Answer at your pace. Wrong answers show explanations immediately.',
  descExam:'Real exam: 60 minutes, no answers until the end.',
  btnStart:'Start',
  techLabel:'Technical explanation:',simpleLabel:'Simple explanation:',avoidLabel:'Avoid in practice:',
  studyScore:(c,t)=>`Score: ${c} / ${t}`,
  rightBadge:'Correct!',wrongBadge:'Wrong!',
  confirmMulti:'Confirm',
  modeStudy:'Study Mode',modeExam:'Exam Mode',
  expLabel:'Explanation',
  newQuiz:'New Quiz (different questions)'
}};

const Q=[{en:"AWS allows users to manage their resources using a web based user interface. What is the name of this interface?",pt:"A AWS permite que os usuarios gerenciem seus recursos usando uma interface web. Qual e o nome dessa interface?",o:{en:["AWS CLI","AWS API","AWS SDK","AWS Management Console"],pt:["AWS CLI","AWS API","AWS SDK","AWS Management Console"]},a:[3],t:"General",exp:{pt:{tech:"O AWS Management Console e a interface grafica (GUI) baseada em navegador que permite gerenciar todos os servicos AWS visualmente, sem precisar de linha de comando.",simple:"O AWS Management Console e uma interface web onde voce cria, configura e monitora todos os seus recursos AWS usando o navegador. E o ponto de partida para quem esta comecando na AWS.",avoid:"Nunca dependa apenas do console web para gerenciar recursos. Automatize com IaC (Terraform, CloudFormation) para evitar erros manuais e garantir rastreabilidade."},en:{tech:"The AWS Management Console is the browser-based GUI that lets you manage all AWS services visually without needing the command line.",simple:"The AWS Management Console is a web interface where you create, configure, and monitor all your AWS resources using a browser. It is the starting point for anyone getting started with AWS.",avoid:"Never rely solely on the web console to manage resources. Automate with IaC (Terraform, CloudFormation) to avoid manual errors and ensure traceability."}}},
{en:"Which option exemplifies horizontal scaling in AWS Cloud?",pt:"Qual opcao exemplifica escalabilidade horizontal na AWS Cloud?",o:{en:["Replacing an existing EC2 instance with a larger, more powerful one","Increasing the compute capacity of a single EC2 instance","Adding more RAM capacity to an EC2 instance","Adding more EC2 instances of the same size to handle increased traffic"],pt:["Substituir uma instancia EC2 existente por uma maior e mais poderosa","Aumentar a capacidade de computacao de uma unica instancia EC2","Adicionar mais capacidade de RAM a uma instancia EC2","Adicionar mais instancias EC2 do mesmo tamanho para lidar com o aumento de trafego"]},a:[3],t:"EC2 General",exp:{pt:{tech:"Escalabilidade horizontal (scale out) significa adicionar mais instancias identicas para distribuir a carga. Escalabilidade vertical (scale up) e aumentar o poder de uma unica maquina.",simple:"Escalar horizontalmente significa adicionar mais instancias do mesmo tamanho para lidar com mais trafego. Cada instancia compartilha a carga de trabalho.",avoid:"Nunca escale verticalmente como unica estrategia. Projete aplicacoes stateless para suportar escalabilidade horizontal desde o inicio."},en:{tech:"Horizontal scaling (scale out) means adding more identical instances to distribute load. Vertical scaling (scale up) means increasing the power of a single machine.",simple:"Horizontal scaling means adding more instances of the same size to handle more traffic. Each instance shares the workload.",avoid:"Never use vertical scaling as your only strategy. Design stateless applications to support horizontal scaling from the start."}}},
{en:"An employee found that several EC2 instances were terminated. Which AWS service would help determine who took this action?",pt:"Um funcionario descobriu que varias instancias EC2 foram encerradas. Qual servico AWS ajudaria a determinar quem realizou essa acao?",o:{en:["Amazon Inspector","AWS CloudTrail","AWS Trusted Advisor","EC2 Instance Usage Report"],pt:["Amazon Inspector","AWS CloudTrail","AWS Trusted Advisor","EC2 Instance Usage Report"]},a:[1],t:"EC2 General",exp:{pt:{tech:"O AWS CloudTrail registra todas as chamadas de API feitas na sua conta AWS, incluindo quem fez, quando e de onde. E o servico de auditoria da AWS.",simple:"O AWS CloudTrail registra todas as chamadas de API feitas na sua conta AWS, incluindo quem fez a acao, quando e o que foi alterado. Ele serve para auditoria e investigacao de seguranca.",avoid:"Nunca desative o CloudTrail em nenhuma conta AWS. Sempre habilite em todas as regioes e proteja os logs contra exclusao com S3 Object Lock."},en:{tech:"AWS CloudTrail records all API calls made in your AWS account, including who made them, when, and from where. It's AWS's audit service.",simple:"AWS CloudTrail records all API calls made in your AWS account, including who performed the action, when, and what was changed. It is used for auditing and security investigation.",avoid:"Never disable CloudTrail in any AWS account. Always enable it in all regions and protect logs against deletion with S3 Object Lock."}}},
{en:"Which statement is true regarding the AWS Shared Responsibility Model?",pt:"Qual afirmacao e verdadeira sobre o Modelo de Responsabilidade Compartilhada da AWS?",o:{en:["Responsibilities vary depending on the services used","Security of the IaaS services is the responsibility of AWS","Patching the guest OS is always the responsibility of AWS","Security of the managed services is the responsibility of the customer"],pt:["As responsabilidades variam dependendo dos servicos utilizados","A seguranca dos servicos IaaS e responsabilidade da AWS","A atualizacao do SO convidado e sempre responsabilidade da AWS","A seguranca dos servicos gerenciados e responsabilidade do cliente"]},a:[0],t:"Shared Responsibility",exp:{pt:{tech:"No Modelo de Responsabilidade Compartilhada, a divisao de responsabilidades muda conforme o servico. Em IaaS (EC2), voce gerencia o SO. Em servicos gerenciados (RDS), a AWS cuida de mais coisas.",simple:"No Modelo de Responsabilidade Compartilhada, a AWS cuida da infraestrutura fisica e voce cuida dos seus dados e configuracoes. O nivel de responsabilidade muda dependendo do servico usado.",avoid:"Nunca assuma que a AWS cuida de tudo. Entenda claramente quais responsabilidades sao suas (dados, configs, patches de SO) e quais sao da AWS."},en:{tech:"In the Shared Responsibility Model, the division of responsibilities changes based on the service. In IaaS (EC2), you manage the OS. In managed services (RDS), AWS handles more.",simple:"In the Shared Responsibility Model, AWS handles the physical infrastructure and you handle your data and configurations. The level of responsibility changes depending on the service used.",avoid:"Never assume AWS handles everything. Clearly understand which responsibilities are yours (data, configs, OS patches) and which are AWS responsibilities."}}},
{en:"To ensure the highest availability for an eCommerce web application, where should you deploy it?",pt:"Para garantir a maior disponibilidade de uma aplicacao web de eCommerce, onde voce deve implanta-la?",o:{en:["Across multiple Availability Zones and Edge locations","Across multiple Availability Zones and subnets","Across multiple Regions and Availability Zones","Across multiple VPCs and subnets"],pt:["Em multiplas Zonas de Disponibilidade e Edge locations","Em multiplas Zonas de Disponibilidade e sub-redes","Em multiplas Regioes e Zonas de Disponibilidade","Em multiplas VPCs e sub-redes"]},a:[2],t:"CloudFront",exp:{pt:{tech:"Multiplas Regioes + Multiplas AZs oferece o maior nivel de disponibilidade. Regioes sao geograficamente isoladas, protegendo contra desastres regionais. AZs protegem contra falhas de datacenter.",simple:"Para maxima disponibilidade, voce deve implantar sua aplicacao em multiplas Regioes e Zonas de Disponibilidade. Isso protege contra falhas em um data center ou em uma regiao inteira.",avoid:"Nunca implante aplicacoes criticas em uma unica Availability Zone. Sempre distribua entre multiplas AZs e considere multi-Region para disaster recovery."},en:{tech:"Multiple Regions + Multiple AZs provides the highest availability. Regions are geographically isolated, protecting against regional disasters. AZs protect against datacenter failures.",simple:"For maximum availability, you should deploy your application across multiple Regions and Availability Zones. This protects against failures in a data center or an entire region.",avoid:"Never deploy critical applications in a single Availability Zone. Always distribute across multiple AZs and consider multi-Region for disaster recovery."}}},
{en:"What does AWS Snowball provide? (Choose TWO)",pt:"O que o AWS Snowball oferece? (Escolha DUAS)",o:{en:["Built-in computing capabilities for local data processing","A catalog of third-party software solutions","Hybrid cloud storage between on-premises and AWS Cloud","Exabyte-scale data transfer service","Secure transfer of large amounts of data into and out of AWS"],pt:["Capacidades de computacao integradas para processamento local de dados","Um catalogo de solucoes de software de terceiros","Armazenamento em nuvem hibrida entre on-premises e AWS Cloud","Servico de transferencia de dados em escala de exabytes","Transferencia segura de grandes quantidades de dados para dentro e fora da AWS"]},a:[0,4],multi:true,t:"Snow Family",exp:{pt:{tech:"O AWS Snowball e um dispositivo fisico que a AWS envia para voce transferir grandes volumes de dados (petabytes). Tambem tem capacidade de computacao local (Edge Computing). Snowmobile e para exabytes, nao Snowball.",simple:"O AWS Snowball e um dispositivo fisico que a AWS envia para voce transferir grandes volumes de dados de forma segura. Ele tambem possui capacidade de processamento local para trabalhar com dados antes de envia-los.",avoid:"Nunca transfira grandes volumes de dados pela internet quando Snowball for mais eficiente. Nunca deixe dispositivos Snowball sem criptografia ou sem rastreamento fisico."},en:{tech:"AWS Snowball is a physical device AWS ships to you for transferring large data volumes (petabytes). It also has local compute capability (Edge Computing). Snowmobile is for exabytes, not Snowball.",simple:"AWS Snowball is a physical device that AWS ships to you for secure large-scale data transfer. It also has built-in computing capabilities for processing data locally before sending it.",avoid:"Never transfer large data volumes over the internet when Snowball is more efficient. Never leave Snowball devices without encryption or physical tracking."}}},
{en:"A Japanese company in Tokyo has US users experiencing high latency. What is the most cost-effective solution?",pt:"Uma empresa japonesa em Toquio tem usuarios nos EUA com alta latencia. Qual e a solucao mais economica?",o:{en:["Applying the Amazon Connect latency-based routing policy","Registering a new US domain name","Building a new data center in the US","Deploying new Amazon EC2 instances in a US Region"],pt:["Aplicar a politica de roteamento baseada em latencia do Amazon Connect","Registrar um novo nome de dominio nos EUA","Construir um novo data center nos EUA","Implantar novas instancias Amazon EC2 em uma Regiao dos EUA"]},a:[3],t:"EC2 General",exp:{pt:{tech:"Implantar instancias EC2 em uma Regiao dos EUA coloca os servidores mais perto dos usuarios americanos, reduzindo a latencia. Construir um datacenter proprio seria muito mais caro.",simple:"Implantar instancias EC2 em uma Regiao dos EUA coloca os servidores mais perto dos usuarios americanos, reduzindo a latencia. Essa e a solucao mais direta e economica para esse cenario.",avoid:"Nunca force usuarios distantes a acessar recursos em regioes remotas sem avaliar a latencia. Sempre escolha a regiao mais proxima dos usuarios finais."},en:{tech:"Deploying EC2 instances in a US Region puts servers closer to American users, reducing latency. Building your own datacenter would be far more expensive.",simple:"Deploying EC2 instances in a US Region places servers closer to American users, reducing latency. This is the most direct and cost-effective solution for this scenario.",avoid:"Never force distant users to access resources in remote regions without evaluating latency. Always choose the region closest to end users."}}},
{en:"Which AWS service can be used to migrate an Oracle database to AWS?",pt:"Qual servico AWS pode ser usado para migrar um banco de dados Oracle para a AWS?",o:{en:["AWS OpsWorks","AWS Database Migration Service","AWS Server Migration Service","AWS Application Discovery Service"],pt:["AWS OpsWorks","AWS Database Migration Service","AWS Server Migration Service","AWS Application Discovery Service"]},a:[1],t:"Migration",exp:{pt:{tech:"O AWS DMS (Database Migration Service) permite migrar bancos de dados para a AWS com minimo downtime. Suporta migracoes homogeneas (Oracle para Oracle) e heterogeneas (Oracle para Aurora).",simple:"O AWS Database Migration Service (DMS) permite migrar bancos de dados para a AWS com minimo tempo de inatividade. Ele suporta migracoes entre bancos de dados diferentes, como Oracle para Aurora.",avoid:"Nunca faca migracoes de banco de dados sem um plano de rollback. Sempre teste a migracao em ambiente de staging antes de executar em producao."},en:{tech:"AWS DMS (Database Migration Service) lets you migrate databases to AWS with minimal downtime. It supports homogeneous (Oracle to Oracle) and heterogeneous (Oracle to Aurora) migrations.",simple:"AWS Database Migration Service (DMS) lets you migrate databases to AWS with minimal downtime. It supports migrations between different database engines, such as Oracle to Aurora.",avoid:"Never perform database migrations without a rollback plan. Always test the migration in a staging environment before running in production."}}},
{en:"Adjusting compute capacity dynamically to reduce cost implements which best practice?",pt:"Ajustar a capacidade de computacao dinamicamente para reduzir custos implementa qual melhor pratica?",o:{en:["Build security in every layer","Parallelize tasks","Implement elasticity","Adopt monolithic architecture"],pt:["Construir seguranca em todas as camadas","Paralelizar tarefas","Implementar elasticidade","Adotar arquitetura monolitica"]},a:[2],t:"Auto Scaling",exp:{pt:{tech:"Elasticidade e a capacidade de aumentar ou diminuir recursos automaticamente conforme a demanda. Isso evita pagar por recursos ociosos e garante performance em picos.",simple:"Elasticidade significa ajustar automaticamente a capacidade computacional conforme a demanda aumenta ou diminui. Isso evita pagar por recursos ociosos e garante performance nos picos.",avoid:"Nunca provisione recursos fixos para cargas variaveis. Use Auto Scaling para ajustar capacidade automaticamente e evitar desperdicio de recursos."},en:{tech:"Elasticity is the ability to automatically scale resources up or down based on demand. This avoids paying for idle resources and ensures performance during peaks.",simple:"Elasticity means automatically adjusting compute capacity as demand increases or decreases. This avoids paying for idle resources and ensures performance during peaks.",avoid:"Never provision fixed resources for variable workloads. Use Auto Scaling to adjust capacity automatically and avoid resource waste."}}},
{en:"Which helps view Amazon EC2 billing activity for the past month?",pt:"Qual servico ajuda a visualizar a atividade de cobranca do Amazon EC2 do ultimo mes?",o:{en:["AWS Budgets","AWS Pricing Calculator","AWS Systems Manager","AWS Cost & Usage Reports"],pt:["AWS Budgets","AWS Pricing Calculator","AWS Systems Manager","AWS Cost & Usage Reports"]},a:[3],t:"EC2 General",exp:{pt:{tech:"O AWS Cost & Usage Reports fornece os dados mais detalhados de cobranca e uso, incluindo por servico, por hora, e por recurso individual. AWS Budgets e para alertas, nao para relatorios detalhados.",simple:"O AWS Cost and Usage Reports fornece dados detalhados sobre todos os seus gastos na AWS. Voce pode ver custos por servico, regiao e periodo de tempo.",avoid:"Nunca ignore os relatorios de custos da AWS. Monitore gastos regularmente e configure alertas de billing para evitar surpresas na fatura."},en:{tech:"AWS Cost & Usage Reports provides the most detailed billing and usage data, including by service, by hour, and by individual resource. AWS Budgets is for alerts, not detailed reports.",simple:"AWS Cost and Usage Reports provides detailed data about all your AWS spending. You can view costs by service, region, and time period.",avoid:"Never ignore AWS cost reports. Monitor spending regularly and set up billing alerts to avoid invoice surprises."}}},
{en:"What does Amazon CloudFront use to distribute content to global users with low latency?",pt:"O que o Amazon CloudFront usa para distribuir conteudo para usuarios globais com baixa latencia?",o:{en:["AWS Global Accelerator","AWS Regions","AWS Edge Locations","AWS Availability Zones"],pt:["AWS Global Accelerator","AWS Regions","AWS Edge Locations","AWS Availability Zones"]},a:[2],t:"CloudFront",exp:{pt:{tech:"Edge Locations sao pontos de presenca (PoPs) espalhados pelo mundo onde o CloudFront armazena copias em cache do conteudo, reduzindo a distancia ate o usuario final.",simple:"Edge Locations sao pontos de presenca da AWS espalhados pelo mundo onde o CloudFront armazena copias do conteudo. Quando um usuario acessa o conteudo, ele e entregue a partir do ponto mais proximo.",avoid:"Nunca sirva conteudo estatico diretamente da origem sem CDN. Use CloudFront para reduzir latencia e custos de transferencia de dados."},en:{tech:"Edge Locations are Points of Presence (PoPs) spread worldwide where CloudFront caches content copies, reducing distance to the end user.",simple:"Edge Locations are AWS points of presence spread around the world where CloudFront caches copies of content. When a user accesses the content, it is delivered from the nearest point.",avoid:"Never serve static content directly from the origin without a CDN. Use CloudFront to reduce latency and data transfer costs."}}},
{en:"What does the 'Principle of Least Privilege' mean?",pt:"O que significa o 'Principio do Menor Privilegio'?",o:{en:["Grant users only the permissions they need, nothing more","All IAM users should have at least necessary permissions for core AWS services","All trusted IAM users should have access to any AWS service","IAM users should not be granted any permissions"],pt:["Conceder aos usuarios apenas as permissoes que precisam, nada mais","Todos os usuarios IAM devem ter pelo menos as permissoes necessarias para servicos principais da AWS","Todos os usuarios IAM confiaveis devem ter acesso a qualquer servico AWS","Usuarios IAM nao devem receber nenhuma permissao"]},a:[0],t:"IAM",exp:{pt:{tech:"O Principio do Menor Privilegio (Least Privilege) determina que cada usuario/servico deve ter apenas as permissoes minimas necessarias para realizar sua funcao. Reduz a superficie de ataque.",simple:"O Principio do Menor Privilegio significa dar a cada usuario apenas as permissoes minimas necessarias para realizar seu trabalho. Nenhuma permissao extra e concedida.",avoid:"Nunca conceda permissoes administrativas a todos os usuarios. Sempre aplique o principio do menor privilegio e revise permissoes regularmente."},en:{tech:"The Principle of Least Privilege dictates that each user/service should have only the minimum permissions needed to perform their function. It reduces the attack surface.",simple:"The Principle of Least Privilege means giving each user only the minimum permissions needed to do their job. No extra permissions are granted.",avoid:"Never grant administrative permissions to all users. Always apply the principle of least privilege and review permissions regularly."}}},
{en:"Which does NOT belong to AWS Cloud Computing models?",pt:"Qual NAO pertence aos modelos de computacao em nuvem da AWS?",o:{en:["Platform as a Service (PaaS)","Infrastructure as a Service (IaaS)","Software as a Service (SaaS)","Networking as a Service (NaaS)"],pt:["Plataforma como Servico (PaaS)","Infraestrutura como Servico (IaaS)","Software como Servico (SaaS)","Rede como Servico (NaaS)"]},a:[3],t:"General",exp:{pt:{tech:"Os tres modelos de cloud computing sao IaaS (EC2), PaaS (Elastic Beanstalk) e SaaS (Gmail). NaaS nao e um modelo padrao reconhecido de cloud computing.",simple:"Os tres modelos de computacao em nuvem reconhecidos sao IaaS, PaaS e SaaS. Networking as a Service (NaaS) nao faz parte dessa classificacao padrao.",avoid:"Nunca confunda os modelos de servico (IaaS, PaaS, SaaS). Escolha o modelo certo para cada caso de uso para otimizar custos e responsabilidades."},en:{tech:"The three cloud computing models are IaaS (EC2), PaaS (Elastic Beanstalk), and SaaS (Gmail). NaaS is not a standard recognized cloud computing model.",simple:"The three recognized cloud computing models are IaaS, PaaS, and SaaS. Networking as a Service (NaaS) is not part of this standard classification.",avoid:"Never confuse service models (IaaS, PaaS, SaaS). Choose the right model for each use case to optimize costs and responsibilities."}}},
{en:"What is the most cost-effective storage for recorded interview videos only needed for legal/compliance?",pt:"Qual e o armazenamento mais economico para videos de entrevistas gravados necessarios apenas para fins legais/compliance?",o:{en:["S3 Intelligent-Tiering","AWS Marketplace","Amazon S3 Glacier Deep Archive","Amazon EBS"],pt:["S3 Intelligent-Tiering","AWS Marketplace","Amazon S3 Glacier Deep Archive","Amazon EBS"]},a:[2],t:"S3 Storage Classes",exp:{pt:{tech:"S3 Glacier Deep Archive e a classe de armazenamento mais barata da AWS, ideal para dados raramente acessados que precisam ser retidos por longos periodos (compliance). Recuperacao leva ate 12h.",simple:"O Amazon S3 Glacier Deep Archive e a classe de armazenamento mais barata da AWS, projetada para dados que raramente sao acessados. A recuperacao dos dados pode levar ate 12 horas.",avoid:"Nunca armazene dados de acesso raro em classes de storage caras como S3 Standard. Use Glacier Deep Archive para dados de compliance e reduza custos drasticamente."},en:{tech:"S3 Glacier Deep Archive is AWS's cheapest storage class, ideal for rarely accessed data that needs long-term retention (compliance). Retrieval takes up to 12h.",simple:"Amazon S3 Glacier Deep Archive is the cheapest AWS storage class, designed for data that is rarely accessed. Data retrieval can take up to 12 hours.",avoid:"Never store rarely accessed data in expensive storage classes like S3 Standard. Use Glacier Deep Archive for compliance data and reduce costs drastically."}}},
{en:"Which service provides DNS in the AWS cloud?",pt:"Qual servico fornece DNS na nuvem AWS?",o:{en:["Route 53","AWS Config","Amazon CloudFront","Amazon EMR"],pt:["Route 53","AWS Config","Amazon CloudFront","Amazon EMR"]},a:[0],t:"CloudFront",exp:{pt:{tech:"O Amazon Route 53 e o servico de DNS (Domain Name System) da AWS. Ele traduz nomes de dominio em enderecos IP e oferece roteamento de trafego, health checks e registro de dominios.",simple:"O Amazon Route 53 e o servico de DNS da AWS que traduz nomes de dominio em enderecos IP. Ele tambem oferece registro de dominios e verificacao de saude dos endpoints.",avoid:"Nunca configure DNS sem TTLs apropriados. Sempre tenha health checks configurados no Route 53 para failover automatico."},en:{tech:"Amazon Route 53 is AWS's DNS (Domain Name System) service. It translates domain names to IP addresses and offers traffic routing, health checks, and domain registration.",simple:"Amazon Route 53 is the AWS DNS service that translates domain names into IP addresses. It also offers domain registration and endpoint health checking.",avoid:"Never configure DNS without appropriate TTLs. Always have health checks configured in Route 53 for automatic failover."}}},
{en:"Which AWS services protect customers from DDoS attacks? (Choose TWO)",pt:"Quais servicos AWS protegem os clientes contra ataques DDoS? (Escolha DOIS)",o:{en:["AWS Shield","AWS Config","Amazon Cognito","AWS WAF","AWS KMS"],pt:["AWS Shield","AWS Config","Amazon Cognito","AWS WAF","AWS KMS"]},a:[0,3],multi:true,t:"KMS & Encryption",exp:{pt:{tech:"AWS Shield protege contra ataques DDoS (camadas 3/4). AWS WAF (Web Application Firewall) filtra trafego HTTP/HTTPS malicioso (camada 7). Juntos, cobrem protecao de rede e aplicacao.",simple:"O AWS Shield protege contra ataques DDoS de grande escala automaticamente. O AWS WAF filtra requisicoes HTTP maliciosas com base em regras que voce define, bloqueando ataques como SQL injection.",avoid:"Nunca deixe aplicacoes web sem protecao contra DDoS. Sempre habilite AWS Shield Standard (gratuito) e considere WAF para proteger contra ataques na camada de aplicacao."},en:{tech:"AWS Shield protects against DDoS attacks (layers 3/4). AWS WAF (Web Application Firewall) filters malicious HTTP/HTTPS traffic (layer 7). Together, they cover network and application protection.",simple:"AWS Shield protects against large-scale DDoS attacks automatically. AWS WAF filters malicious HTTP requests based on rules you define, blocking attacks like SQL injection.",avoid:"Never leave web applications without DDoS protection. Always enable AWS Shield Standard (free) and consider WAF for application-layer attack protection."}}},
{en:"Which EC2 purchase option is best for a questionnaire app running one day without interruption?",pt:"Qual opcao de compra EC2 e melhor para um app de questionario rodando um dia sem interrupcao?",o:{en:["Reserved instances","Spot instances","Dedicated instances","On-demand instances"],pt:["Instancias reservadas","Instancias spot","Instancias dedicadas","Instancias sob demanda"]},a:[3],t:"EC2 Pricing",exp:{pt:{tech:"On-Demand e ideal para cargas de trabalho de curta duracao, irregulares e que nao podem ser interrompidas. Sem compromisso de longo prazo, paga so pelo uso.",simple:"Instancias On-Demand permitem usar capacidade computacional sem compromisso de longo prazo. Voce paga pelo tempo que usar e pode ligar ou desligar a qualquer momento.",avoid:"Nunca use instancias reservadas para cargas temporarias ou imprevisveis. On-Demand e ideal para workloads de curta duracao sem compromisso."},en:{tech:"On-Demand is ideal for short-duration, irregular workloads that cannot be interrupted. No long-term commitment, pay only for use.",simple:"On-Demand instances let you use compute capacity without long-term commitment. You pay for the time you use and can start or stop at any moment.",avoid:"Never use reserved instances for temporary or unpredictable workloads. On-Demand is ideal for short-duration workloads without commitment."}}},
{en:"Which is the most cost-effective EC2 option for creating image thumbnails where uptime is not critical?",pt:"Qual e a opcao EC2 mais economica para criar miniaturas de imagens onde o tempo de atividade nao e critico?",o:{en:["Reserved Instances","On-demand Instances","Dedicated Instances","Spot Instances"],pt:["Instancias Reservadas","Instancias Sob Demanda","Instancias Dedicadas","Instancias Spot"]},a:[3],t:"EC2 Pricing",exp:{pt:{tech:"Spot Instances oferecem desconto de ate 90% sobre On-Demand, mas a AWS pode interrompe-las a qualquer momento. Ideal para cargas tolerantes a falha como processamento de imagens em lote.",simple:"Spot Instances permitem usar capacidade computacional nao utilizada da AWS com descontos de ate 90%. A AWS pode interromper essas instancias quando precisar da capacidade de volta.",avoid:"Nunca use Spot Instances para cargas criticas que nao toleram interrupcao. Sempre implemente tratamento de interrupcao e use diversificacao de tipos de instancia."},en:{tech:"Spot Instances offer up to 90% discount over On-Demand, but AWS can interrupt them anytime. Ideal for fault-tolerant workloads like batch image processing.",simple:"Spot Instances let you use unused AWS compute capacity at discounts up to 90%. AWS can interrupt these instances when it needs the capacity back.",avoid:"Never use Spot Instances for critical workloads that cannot tolerate interruption. Always implement interruption handling and use instance type diversification."}}},
{en:"Which service is a global content delivery network (CDN)?",pt:"Qual servico e uma rede de distribuicao de conteudo (CDN) global?",o:{en:["AWS VPN","AWS Direct Connect","AWS Regions","Amazon CloudFront"],pt:["AWS VPN","AWS Direct Connect","AWS Regions","Amazon CloudFront"]},a:[3],t:"CloudFront",exp:{pt:{tech:"Amazon CloudFront e o servico de CDN da AWS que distribui conteudo (paginas, videos, APIs) globalmente usando Edge Locations para reduzir latencia.",simple:"O Amazon CloudFront e uma rede de distribuicao de conteudo (CDN) que entrega dados, videos e aplicacoes para usuarios no mundo todo com baixa latencia. Ele usa Edge Locations para armazenar cache do conteudo proximo aos usuarios.",avoid:"Nunca sirva conteudo global sem configurar CloudFront com origens protegidas. Sempre restrinja o acesso direto a origem usando OAC (Origin Access Control)."},en:{tech:"Amazon CloudFront is AWS's CDN service that distributes content (pages, videos, APIs) globally using Edge Locations to reduce latency.",simple:"Amazon CloudFront is a content delivery network (CDN) that delivers data, videos, and applications to users worldwide with low latency. It uses Edge Locations to cache content close to users.",avoid:"Never serve global content without configuring CloudFront with protected origins. Always restrict direct origin access using OAC (Origin Access Control)."}}},
{en:"Which service allows customers to manage compliance agreements with AWS?",pt:"Qual servico permite que os clientes gerenciem acordos de conformidade com a AWS?",o:{en:["AWS Artifact","AWS Certificate Manager","AWS Systems Manager","AWS Organizations"],pt:["AWS Artifact","AWS Certificate Manager","AWS Systems Manager","AWS Organizations"]},a:[0],t:"Systems Manager",exp:{pt:{tech:"O AWS Artifact e um portal self-service para acessar relatorios de conformidade da AWS (SOC, PCI, ISO) e gerenciar acordos como o BAA (HIPAA).",simple:"O AWS Artifact e um portal onde voce acessa relatorios de conformidade e contratos de seguranca da AWS. La voce encontra certificacoes como SOC, PCI e ISO.",avoid:"Nunca ignore os requisitos de compliance do seu setor. Use o AWS Artifact para acessar e gerenciar acordos de conformidade antes de auditorias."},en:{tech:"AWS Artifact is a self-service portal to access AWS compliance reports (SOC, PCI, ISO) and manage agreements like the BAA (HIPAA).",simple:"AWS Artifact is a portal where you access AWS compliance reports and security agreements. There you find certifications like SOC, PCI, and ISO.",avoid:"Never ignore your industry compliance requirements. Use AWS Artifact to access and manage compliance agreements before audits."}}},
{en:"Which AWS database offering provides NoSQL access?",pt:"Qual banco de dados AWS oferece acesso NoSQL?",o:{en:["Amazon Aurora","Amazon DynamoDB","Amazon Elastic Block Store","Amazon Redshift"],pt:["Amazon Aurora","Amazon DynamoDB","Amazon Elastic Block Store","Amazon Redshift"]},a:[1],t:"EBS",exp:{pt:{tech:"O Amazon DynamoDB e o banco de dados NoSQL totalmente gerenciado da AWS, com modelo chave-valor e documentos. Oferece latencia de milissegundos em qualquer escala.",simple:"O Amazon DynamoDB e um banco de dados NoSQL totalmente gerenciado pela AWS. Ele armazena dados em pares chave-valor e oferece latencia de milissegundos em qualquer escala.",avoid:"Nunca use DynamoDB sem configurar limites de capacidade ou auto-scaling. Sempre defina alarmes para throttling e monitore os custos de leitura/escrita."},en:{tech:"Amazon DynamoDB is AWS's fully managed NoSQL database with key-value and document model. It offers single-digit millisecond latency at any scale.",simple:"Amazon DynamoDB is a fully managed NoSQL database by AWS. It stores data in key-value pairs and offers millisecond latency at any scale.",avoid:"Never use DynamoDB without configuring capacity limits or auto-scaling. Always set alarms for throttling and monitor read/write costs."}}},
{en:"Who is the primary point of contact for ongoing support in the Enterprise support plan?",pt:"Quem e o principal ponto de contato para suporte continuo no plano Enterprise?",o:{en:["IAM user","Infrastructure Event Management engineer","AWS Consulting Partners","Technical Account Manager (TAM)"],pt:["Usuario IAM","Engenheiro de Infrastructure Event Management","AWS Consulting Partners","Technical Account Manager (TAM)"]},a:[3],t:"IAM",exp:{pt:{tech:"O TAM (Technical Account Manager) e um profissional designado pela AWS exclusivamente para clientes Enterprise. Ele atua como ponto de contato principal, oferecendo orientacao proativa e revisoes de arquitetura.",simple:"O Technical Account Manager (TAM) e um profissional dedicado da AWS que acompanha proativamente sua conta. Ele esta disponivel apenas no plano de suporte Enterprise.",avoid:"Nunca opere contas Enterprise sem envolver o TAM nas decisoes arquiteturais. Aproveite o TAM para revisoes proativas e orientacao sobre melhores praticas."},en:{tech:"The TAM (Technical Account Manager) is an AWS professional assigned exclusively to Enterprise customers. They serve as the primary contact, offering proactive guidance and architecture reviews.",simple:"The Technical Account Manager (TAM) is a dedicated AWS professional who proactively monitors your account. It is available only in the Enterprise support plan.",avoid:"Never operate Enterprise accounts without involving your TAM in architectural decisions. Leverage the TAM for proactive reviews and best practice guidance."}}},
{en:"How can you view the distribution of AWS spending in your account?",pt:"Como voce pode visualizar a distribuicao de gastos AWS na sua conta?",o:{en:["By using Amazon VPC console","By contacting the AWS Support team","By using AWS Cost Explorer","By contacting the AWS Finance team"],pt:["Usando o console do Amazon VPC","Contatando a equipe de suporte AWS","Usando o AWS Cost Explorer","Contatando a equipe financeira da AWS"]},a:[2],t:"VPC & Networking",exp:{pt:{tech:"O AWS Cost Explorer e uma ferramenta visual que permite analisar custos e uso da AWS ao longo do tempo, com filtros por servico, regiao, tag, etc. Disponivel gratuitamente no console.",simple:"O AWS Cost Explorer e uma ferramenta visual que permite analisar e entender seus gastos na AWS ao longo do tempo. Voce pode filtrar por servico, conta e periodo, e ver previsoes de custos futuros.",avoid:"Nunca deixe de analisar os custos por servico e por tag. Use Cost Explorer com tags de alocacao para identificar exatamente onde o dinheiro esta sendo gasto."},en:{tech:"AWS Cost Explorer is a visual tool that lets you analyze AWS costs and usage over time, with filters by service, region, tag, etc. Available free in the console.",simple:"AWS Cost Explorer is a visual tool that lets you analyze and understand your AWS spending over time. You can filter by service, account, and period, and see future cost forecasts.",avoid:"Never skip analyzing costs by service and by tag. Use Cost Explorer with allocation tags to identify exactly where money is being spent."}}},
{en:"What must an IAM user provide to interact with AWS services using the AWS CLI?",pt:"O que um usuario IAM deve fornecer para interagir com servicos AWS usando a AWS CLI?",o:{en:["Access keys","Secret token","UserID","User name and password"],pt:["Chaves de acesso","Token secreto","UserID","Nome de usuario e senha"]},a:[0],t:"IAM",exp:{pt:{tech:"Para usar a AWS CLI, o usuario IAM precisa de Access Keys (Access Key ID + Secret Access Key). Username/password sao para o Console web, nao para CLI.",simple:"Access Keys sao credenciais compostas por um Access Key ID e um Secret Access Key. Elas sao usadas para autenticar chamadas programaticas a AWS via CLI ou SDK.",avoid:"Nunca armazene access keys em codigo-fonte ou repositorios. Rotacione as chaves regularmente e prefira IAM Roles em vez de chaves estaticas."},en:{tech:"To use the AWS CLI, the IAM user needs Access Keys (Access Key ID + Secret Access Key). Username/password are for the web Console, not the CLI.",simple:"Access Keys are credentials composed of an Access Key ID and a Secret Access Key. They are used to authenticate programmatic calls to AWS via CLI or SDK.",avoid:"Never store access keys in source code or repositories. Rotate keys regularly and prefer IAM Roles over static keys."}}},
{en:"Which EC2 Reserved Instance type allows you to exchange it for higher computing power?",pt:"Qual tipo de Instancia Reservada EC2 permite troca-la por maior poder computacional?",o:{en:["Elastic RI","Premium RI","Standard RI","Convertible RI"],pt:["Elastic RI","Premium RI","Standard RI","Convertible RI"]},a:[3],t:"EC2 Pricing",exp:{pt:{tech:"Convertible RIs permitem trocar a familia de instancia, SO, tenancy e escopo de pagamento durante o termo. Standard RIs sao mais baratas mas nao podem ser convertidas.",simple:"Reserved Instances do tipo Convertible permitem trocar a instancia por outra de tipo, familia ou sistema operacional diferente durante o contrato. Voce ganha menos desconto que a Standard, mas com mais flexibilidade.",avoid:"Nunca compre Reserved Instances Standard se suas necessidades de computacao podem mudar. Use Convertible RIs para manter flexibilidade de troca."},en:{tech:"Convertible RIs allow changing instance family, OS, tenancy, and payment scope during the term. Standard RIs are cheaper but cannot be converted.",simple:"Convertible Reserved Instances allow you to exchange for a different instance type, family, or operating system during the contract. You get less discount than Standard, but with more flexibility.",avoid:"Never purchase Standard Reserved Instances if your compute needs may change. Use Convertible RIs to maintain exchange flexibility."}}},
{en:"A global company seeks to centrally manage billing and security policies across all AWS accounts. Which service should they use?",pt:"Uma empresa global busca gerenciar centralmente cobranca e politicas de seguranca em todas as contas AWS. Qual servico devem usar?",o:{en:["AWS Organizations","AWS Trusted Advisor","IAM User Groups","AWS Config"],pt:["AWS Organizations","AWS Trusted Advisor","IAM User Groups","AWS Config"]},a:[0],t:"IAM",exp:{pt:{tech:"O AWS Organizations permite criar uma estrutura hierarquica de contas, com faturamento consolidado e SCPs (Service Control Policies) para governanca centralizada.",simple:"O AWS Organizations permite gerenciar multiplas contas AWS de forma centralizada. Voce pode consolidar a cobranca, aplicar politicas de seguranca e organizar contas em unidades organizacionais.",avoid:"Nunca gerencie contas AWS isoladamente sem governanca centralizada. Use AWS Organizations com SCPs para aplicar politicas de seguranca em todas as contas."},en:{tech:"AWS Organizations lets you create a hierarchical account structure with consolidated billing and SCPs (Service Control Policies) for centralized governance.",simple:"AWS Organizations lets you manage multiple AWS accounts centrally. You can consolidate billing, apply security policies, and organize accounts into organizational units.",avoid:"Never manage AWS accounts in isolation without centralized governance. Use AWS Organizations with SCPs to enforce security policies across all accounts."}}},
{en:"Which service provides object-level storage in AWS?",pt:"Qual servico fornece armazenamento em nivel de objeto na AWS?",o:{en:["Amazon EBS","Amazon Instance Store","Amazon EFS","Amazon S3"],pt:["Amazon EBS","Amazon Instance Store","Amazon EFS","Amazon S3"]},a:[3],t:"S3 General",exp:{pt:{tech:"O Amazon S3 (Simple Storage Service) e o servico de armazenamento de objetos da AWS. Cada objeto e armazenado com uma chave unica, metadados e o dado em si. EBS e armazenamento em bloco, EFS e sistema de arquivos.",simple:"O Amazon S3 e um servico de armazenamento de objetos que permite guardar e recuperar qualquer quantidade de dados pela internet. Cada arquivo e armazenado como um objeto dentro de um bucket.",avoid:"Nunca deixe buckets S3 publicos sem necessidade. Sempre habilite criptografia, versionamento e bloqueie acesso publico por padrao."},en:{tech:"Amazon S3 (Simple Storage Service) is AWS's object storage service. Each object is stored with a unique key, metadata, and the data itself. EBS is block storage, EFS is a file system.",simple:"Amazon S3 is an object storage service that lets you store and retrieve any amount of data over the internet. Each file is stored as an object inside a bucket.",avoid:"Never leave S3 buckets public unnecessarily. Always enable encryption, versioning, and block public access by default."}}},
{en:"A company is spending money on underutilized compute resources. Which service helps address this?",pt:"Uma empresa esta gastando dinheiro em recursos computacionais subutilizados. Qual servico ajuda a resolver isso?",o:{en:["AWS Elastic Load Balancer","AWS Budgets","AWS Auto Scaling","AWS Cost Explorer"],pt:["AWS Elastic Load Balancer","AWS Budgets","AWS Auto Scaling","AWS Cost Explorer"]},a:[2],t:"Auto Scaling",exp:{pt:{tech:"O AWS Auto Scaling ajusta automaticamente o numero de instancias baseado na demanda real, evitando recursos ociosos (scale in) e falta de capacidade (scale out).",simple:"O AWS Auto Scaling ajusta automaticamente o numero de instancias com base na demanda atual. Quando o trafego aumenta, ele adiciona instancias; quando diminui, ele remove.",avoid:"Nunca deixe instancias EC2 rodando quando nao estao em uso. Configure Auto Scaling e use alertas para identificar recursos subutilizados."},en:{tech:"AWS Auto Scaling automatically adjusts the number of instances based on actual demand, avoiding idle resources (scale in) and capacity shortages (scale out).",simple:"AWS Auto Scaling automatically adjusts the number of instances based on current demand. When traffic increases, it adds instances; when it decreases, it removes them.",avoid:"Never leave EC2 instances running when not in use. Configure Auto Scaling and use alerts to identify underutilized resources."}}},
{en:"Which S3 storage class is best for data with unpredictable access patterns?",pt:"Qual classe de armazenamento S3 e melhor para dados com padroes de acesso imprevisiveis?",o:{en:["Amazon S3 Intelligent-Tiering","Amazon S3 Glacier Flexible Retrieval","Amazon S3 Standard","Amazon S3 Standard-Infrequent Access"],pt:["Amazon S3 Intelligent-Tiering","Amazon S3 Glacier Flexible Retrieval","Amazon S3 Standard","Amazon S3 Standard-Infrequent Access"]},a:[0],t:"S3 Storage Classes",exp:{pt:{tech:"O S3 Intelligent-Tiering move objetos automaticamente entre tiers de acesso frequente e infrequente com base nos padroes reais de acesso, sem taxas de recuperacao.",simple:"O S3 Intelligent-Tiering move automaticamente seus dados entre camadas de acesso frequente e infrequente com base nos padroes de uso. Voce nao precisa gerenciar as transicoes manualmente.",avoid:"Nunca escolha uma classe de storage S3 fixa se o padrao de acesso e imprevisivel. Use Intelligent-Tiering para otimizar custos automaticamente."},en:{tech:"S3 Intelligent-Tiering automatically moves objects between frequent and infrequent access tiers based on actual access patterns, with no retrieval fees.",simple:"S3 Intelligent-Tiering automatically moves your data between frequent and infrequent access tiers based on usage patterns. You do not need to manage transitions manually.",avoid:"Never choose a fixed S3 storage class if access patterns are unpredictable. Use Intelligent-Tiering to automatically optimize costs."}}},
{en:"What is the AWS feature providing additional security above usernames and passwords?",pt:"Qual recurso AWS fornece seguranca adicional alem de nomes de usuario e senhas?",o:{en:["Encrypted keys","Email verification","AWS KMS","AWS MFA"],pt:["Chaves criptografadas","Verificacao por email","AWS KMS","AWS MFA"]},a:[3],t:"IAM",exp:{pt:{tech:"O MFA (Multi-Factor Authentication) adiciona uma segunda camada de autenticacao alem da senha, como um codigo gerado por app ou dispositivo fisico. KMS e para criptografia de dados, nao autenticacao.",simple:"O MFA (Multi-Factor Authentication) adiciona uma camada extra de seguranca exigindo um segundo fator de autenticacao alem da senha. Pode ser um codigo de um aplicativo ou dispositivo fisico.",avoid:"Nunca use apenas senha para proteger contas AWS. Sempre ative MFA em todas as contas, especialmente na conta root e usuarios com acesso privilegiado."},en:{tech:"MFA (Multi-Factor Authentication) adds a second authentication layer beyond the password, like a code from an app or physical device. KMS is for data encryption, not authentication.",simple:"MFA (Multi-Factor Authentication) adds an extra layer of security by requiring a second authentication factor beyond the password. It can be a code from an app or physical device.",avoid:"Never use only passwords to protect AWS accounts. Always enable MFA on all accounts, especially the root account and privileged users."}}},
{en:"Which service ensures messages between software components are not lost if components fail?",pt:"Qual servico garante que mensagens entre componentes de software nao sejam perdidas se os componentes falharem?",o:{en:["Amazon SQS","Amazon SES","AWS Direct Connect","Amazon Connect"],pt:["Amazon SQS","Amazon SES","AWS Direct Connect","Amazon Connect"]},a:[0],t:"Direct Connect",exp:{pt:{tech:"O Amazon SQS (Simple Queue Service) e um servico de filas de mensagens totalmente gerenciado. As mensagens ficam na fila ate serem processadas, garantindo que nada se perca se um componente falhar.",simple:"O Amazon SQS e um servico de filas de mensagens que armazena mensagens ate que o sistema de destino esteja pronto para processa-las. Isso garante que nenhuma mensagem seja perdida se um componente falhar.",avoid:"Nunca processe mensagens sem idempotencia. Configure dead-letter queues no SQS para capturar mensagens que falharam repetidamente."},en:{tech:"Amazon SQS (Simple Queue Service) is a fully managed message queue service. Messages stay in the queue until processed, ensuring nothing is lost if a component fails.",simple:"Amazon SQS is a message queue service that stores messages until the destination system is ready to process them. This ensures no messages are lost if a component fails.",avoid:"Never process messages without idempotency. Configure dead-letter queues in SQS to capture messages that failed repeatedly."}}},
{en:"What is the AWS service providing a virtual network dedicated to your account?",pt:"Qual servico AWS fornece uma rede virtual dedicada a sua conta?",o:{en:["AWS VPN","AWS Subnets","AWS Dedicated Hosts","Amazon VPC"],pt:["AWS VPN","AWS Subnets","AWS Dedicated Hosts","Amazon VPC"]},a:[3],t:"EC2 Pricing",exp:{pt:{tech:"O Amazon VPC (Virtual Private Cloud) permite criar uma rede virtual isolada na AWS onde voce define sub-redes, tabelas de roteamento, gateways e regras de seguranca.",simple:"O Amazon VPC e uma rede virtual isolada dentro da AWS onde voce implanta seus recursos. Voce controla o intervalo de IPs, sub-redes, tabelas de rotas e gateways.",avoid:"Nunca use a VPC padrao para cargas de producao. Sempre crie VPCs customizadas com subnets publicas e privadas separadas e NACLs restritivas."},en:{tech:"Amazon VPC (Virtual Private Cloud) lets you create an isolated virtual network in AWS where you define subnets, route tables, gateways, and security rules.",simple:"Amazon VPC is an isolated virtual network within AWS where you deploy your resources. You control the IP range, subnets, route tables, and gateways.",avoid:"Never use the default VPC for production workloads. Always create custom VPCs with separate public and private subnets and restrictive NACLs."}}},
{en:"According to the Shared Responsibility Model, which are customer responsibilities? (Choose TWO)",pt:"De acordo com o Modelo de Responsabilidade Compartilhada, quais sao responsabilidades do cliente? (Escolha DUAS)",o:{en:["Managing environmental events of AWS data centers","Protecting the confidentiality of data in transit in Amazon S3","Controlling physical access to AWS Regions","Ensuring the underlying EC2 host is configured properly","Patching applications installed on Amazon EC2"],pt:["Gerenciar eventos ambientais dos data centers AWS","Proteger a confidencialidade dos dados em transito no Amazon S3","Controlar o acesso fisico as Regioes AWS","Garantir que o host EC2 subjacente esteja configurado corretamente","Atualizar aplicacoes instaladas no Amazon EC2"]},a:[1,4],multi:true,t:"S3 General",exp:{pt:{tech:"O cliente e responsavel pela seguranca 'na' nuvem: criptografia de dados em transito, patching de aplicacoes, configuracao de seguranca. A AWS cuida da seguranca 'da' nuvem: hardware, datacenter, infraestrutura fisica.",simple:"O cliente e responsavel por proteger dados em transito no S3 e por atualizar aplicacoes instaladas em instancias EC2. A AWS cuida da infraestrutura fisica, e o cliente cuida dos seus dados e softwares.",avoid:"Nunca deixe dados em transito sem criptografia. Sempre habilite TLS/SSL e gerencie patches de aplicacao como sua responsabilidade no modelo compartilhado."},en:{tech:"The customer is responsible for security 'in' the cloud: data encryption in transit, application patching, security configuration. AWS handles security 'of' the cloud: hardware, datacenter, physical infrastructure.",simple:"The customer is responsible for protecting data in transit in S3 and for patching applications installed on EC2 instances. AWS handles the physical infrastructure, and the customer handles their data and software.",avoid:"Never leave data in transit without encryption. Always enable TLS/SSL and manage application patches as your responsibility in the shared model."}}},
{en:"Which of the following can be used as a compute resource? (Choose TWO)",pt:"Quais dos seguintes podem ser usados como recurso de computacao? (Escolha DOIS)",o:{en:["Amazon VPC","Amazon CloudWatch","Amazon S3","Amazon EC2","AWS Lambda"],pt:["Amazon VPC","Amazon CloudWatch","Amazon S3","Amazon EC2","AWS Lambda"]},a:[3,4],multi:true,t:"S3 General",exp:{pt:{tech:"EC2 fornece servidores virtuais (computacao sob demanda). Lambda executa codigo sem servidor (serverless compute). VPC e rede, CloudWatch e monitoramento, S3 e armazenamento.",simple:"O Amazon EC2 fornece servidores virtuais que voce configura e gerencia. O AWS Lambda executa codigo em resposta a eventos sem precisar gerenciar servidores. Ambos sao recursos de computacao.",avoid:"Nunca use EC2 quando Lambda atende ao caso de uso. Avalie serverless primeiro para reduzir custos operacionais e de gerenciamento de infraestrutura."},en:{tech:"EC2 provides virtual servers (on-demand compute). Lambda runs code without servers (serverless compute). VPC is networking, CloudWatch is monitoring, S3 is storage.",simple:"Amazon EC2 provides virtual servers that you configure and manage. AWS Lambda runs code in response to events without needing to manage servers. Both are compute resources.",avoid:"Never use EC2 when Lambda meets the use case. Evaluate serverless first to reduce operational costs and infrastructure management."}}},
{en:"What does Amazon ElastiCache provide?",pt:"O que o Amazon ElastiCache fornece?",o:{en:["In-memory caching for read-heavy applications","An Ehcache compatible in-memory data store","An online software store for pre-configured software","A domain name system in the cloud"],pt:["Cache em memoria para aplicacoes com muitas leituras","Um armazenamento de dados em memoria compativel com Ehcache","Uma loja de software online para software pre-configurado","Um sistema de nomes de dominio na nuvem"]},a:[0],t:"ElastiCache",exp:{pt:{tech:"O ElastiCache e um servico de cache em memoria (Redis ou Memcached) que melhora a performance de aplicacoes ao armazenar dados frequentemente acessados na RAM, reduzindo consultas ao banco.",simple:"O Amazon ElastiCache fornece armazenamento em memoria para acelerar leituras de dados frequentes. Ele suporta Redis e Memcached, reduzindo a carga sobre o banco de dados principal.",avoid:"Nunca use ElastiCache sem configurar eviction policies e monitoramento de memoria. Sempre planeje a estrategia de invalidacao de cache."},en:{tech:"ElastiCache is an in-memory caching service (Redis or Memcached) that improves application performance by storing frequently accessed data in RAM, reducing database queries.",simple:"Amazon ElastiCache provides in-memory storage to speed up frequent data reads. It supports Redis and Memcached, reducing the load on the primary database.",avoid:"Never use ElastiCache without configuring eviction policies and memory monitoring. Always plan your cache invalidation strategy."}}},
{en:"Which EC2 purchasing option supports the Bring Your Own License (BYOL) model?",pt:"Qual opcao de compra EC2 suporta o modelo Bring Your Own License (BYOL)?",o:{en:["Dedicated Instances","Dedicated Hosts","On-demand Instances","Reserved Instances"],pt:["Instancias Dedicadas","Hosts Dedicados","Instancias Sob Demanda","Instancias Reservadas"]},a:[1],t:"EC2 Pricing",exp:{pt:{tech:"Dedicated Hosts fornecem um servidor fisico inteiro dedicado a voce, com visibilidade de sockets e cores. Isso permite usar licencas de software existentes (BYOL) que sao atreladas ao hardware.",simple:"Dedicated Hosts sao servidores fisicos dedicados exclusivamente para voce na AWS. Como voce tem visibilidade do hardware fisico, pode usar suas proprias licencas de software (BYOL).",avoid:"Nunca use Dedicated Hosts sem necessidade real de compliance ou licenciamento. Sao significativamente mais caros que outras opcoes de compra EC2."},en:{tech:"Dedicated Hosts provide an entire physical server dedicated to you, with visibility into sockets and cores. This enables using existing software licenses (BYOL) tied to hardware.",simple:"Dedicated Hosts are physical servers dedicated exclusively to you in AWS. Since you have visibility into the physical hardware, you can use your own software licenses (BYOL).",avoid:"Never use Dedicated Hosts without a real compliance or licensing need. They are significantly more expensive than other EC2 purchase options."}}},
{en:"Which is a benefit of moving infrastructure from on-premises to AWS?",pt:"Qual e um beneficio de migrar a infraestrutura de on-premises para a AWS?",o:{en:["Free support for all enterprise customers","Automatic data protection","Reduced Capital Expenditure (CapEx)","AWS manages customer applications"],pt:["Suporte gratuito para todos os clientes enterprise","Protecao automatica de dados","Reducao de Despesas de Capital (CapEx)","A AWS gerencia as aplicacoes do cliente"]},a:[2],t:"Pricing Models",exp:{pt:{tech:"Migrar para AWS converte CapEx (comprar servidores, datacenters) em OpEx (pagar pelo uso). Voce elimina o investimento inicial em hardware.",simple:"Migrar para a AWS reduz gastos de capital (CapEx) porque voce nao precisa comprar servidores e equipamentos antecipadamente. Em vez disso, voce paga pelo uso como despesa operacional (OpEx).",avoid:"Nunca migre para a nuvem sem um plano de migracao claro. Aproveite a reducao de CapEx mas planeje os custos operacionais (OpEx) corretamente."},en:{tech:"Migrating to AWS converts CapEx (buying servers, datacenters) into OpEx (pay per use). You eliminate upfront hardware investment.",simple:"Moving to AWS reduces Capital Expenditure (CapEx) because you do not need to buy servers and equipment upfront. Instead, you pay for usage as operational expenditure (OpEx).",avoid:"Never migrate to the cloud without a clear migration plan. Take advantage of CapEx reduction but plan operational costs (OpEx) correctly."}}},
{en:"Which AWS service establishes a dedicated, private network connection between AWS and your datacenter?",pt:"Qual servico AWS estabelece uma conexao de rede privada e dedicada entre a AWS e seu datacenter?",o:{en:["AWS Direct Connect","Amazon CloudFront","AWS Snowball","Amazon Route 53"],pt:["AWS Direct Connect","Amazon CloudFront","AWS Snowball","Amazon Route 53"]},a:[0],t:"Snow Family",exp:{pt:{tech:"O AWS Direct Connect estabelece uma conexao de rede dedicada e privada entre seu datacenter e a AWS, sem passar pela internet publica. Oferece maior largura de banda e latencia consistente.",simple:"O AWS Direct Connect estabelece uma conexao de rede privada e dedicada entre seu datacenter e a AWS. Isso oferece largura de banda consistente e menor latencia comparado com a internet publica.",avoid:"Nunca dependa apenas de VPN para conexoes criticas de alta largura de banda. Use Direct Connect para conexoes dedicadas e considere redundancia com uma segunda conexao."},en:{tech:"AWS Direct Connect establishes a dedicated, private network connection between your datacenter and AWS, bypassing the public internet. It offers higher bandwidth and consistent latency.",simple:"AWS Direct Connect establishes a dedicated, private network connection between your datacenter and AWS. This provides consistent bandwidth and lower latency compared to the public internet.",avoid:"Never rely solely on VPN for critical high-bandwidth connections. Use Direct Connect for dedicated connections and consider redundancy with a second connection."}}},
{en:"Which service protects web applications from SQL injection and other code vulnerabilities?",pt:"Qual servico protege aplicacoes web contra SQL injection e outras vulnerabilidades de codigo?",o:{en:["Amazon Cognito","AWS IAM","Amazon Aurora","AWS WAF"],pt:["Amazon Cognito","AWS IAM","Amazon Aurora","AWS WAF"]},a:[3],t:"Aurora",exp:{pt:{tech:"O AWS WAF (Web Application Firewall) filtra trafego HTTP/HTTPS com regras personalizaveis para bloquear SQL injection, XSS e outros ataques na camada 7 (aplicacao).",simple:"O AWS WAF filtra trafego HTTP e HTTPS com base em regras que voce configura. Ele bloqueia ataques como SQL injection e cross-site scripting antes que cheguem a sua aplicacao.",avoid:"Nunca deixe aplicacoes web sem regras WAF contra SQL injection e XSS. Revise e atualize as regras regularmente conforme novas ameacas surgem."},en:{tech:"AWS WAF (Web Application Firewall) filters HTTP/HTTPS traffic with customizable rules to block SQL injection, XSS, and other layer 7 (application) attacks.",simple:"AWS WAF filters HTTP and HTTPS traffic based on rules you configure. It blocks attacks like SQL injection and cross-site scripting before they reach your application.",avoid:"Never leave web applications without WAF rules against SQL injection and XSS. Review and update rules regularly as new threats emerge."}}},
{en:"Based on the Shared Responsibility Model, which are the sole responsibility of AWS? (Choose TWO)",pt:"Com base no Modelo de Responsabilidade Compartilhada, quais sao responsabilidade exclusiva da AWS? (Escolha DUAS)",o:{en:["Monitoring network performance","Installing software on EC2 instances","Creating hypervisors","Configuring Access Control Lists","Hardware maintenance"],pt:["Monitorar performance da rede","Instalar software em instancias EC2","Criar hypervisors","Configurar Listas de Controle de Acesso","Manutencao de hardware"]},a:[2,4],multi:true,t:"EC2 General",exp:{pt:{tech:"A AWS e responsavel pela infraestrutura fisica: hardware, hypervisors, rede fisica, datacenters. O cliente configura ACLs, instala software e monitora suas aplicacoes.",simple:"A AWS e responsavel exclusivamente pela criacao de hypervisors e manutencao do hardware fisico dos data centers. Esses componentes nao sao acessiveis nem gerenciados pelos clientes.",avoid:"Nunca tente acessar a infraestrutura fisica da AWS ou a camada de hypervisor. Entenda que essas sao responsabilidades exclusivas da AWS no modelo compartilhado."},en:{tech:"AWS is responsible for physical infrastructure: hardware, hypervisors, physical network, datacenters. The customer configures ACLs, installs software, and monitors their applications.",simple:"AWS is solely responsible for creating hypervisors and maintaining the physical hardware of data centers. These components are not accessible or managed by customers.",avoid:"Never attempt to access AWS physical infrastructure or the hypervisor layer. Understand these are sole AWS responsibilities in the shared model."}}},
{en:"What are the default credentials to access the AWS Management Console for an IAM user?",pt:"Quais sao as credenciais padrao para acessar o Console de Gerenciamento AWS para um usuario IAM?",o:{en:["MFA","Security tokens","A user name and password","Access keys"],pt:["MFA","Tokens de seguranca","Nome de usuario e senha","Chaves de acesso"]},a:[2],t:"IAM",exp:{pt:{tech:"O acesso ao Console AWS para usuarios IAM usa nome de usuario e senha por padrao. MFA e uma camada adicional opcional. Access keys sao para acesso programatico (CLI/SDK).",simple:"Para acessar o AWS Management Console, um usuario IAM usa um nome de usuario e senha. Essas sao as credenciais padrao para login pela interface web.",avoid:"Nunca compartilhe credenciais IAM entre usuarios. Crie usuarios individuais, aplique politicas de senha forte e sempre ative MFA."},en:{tech:"Console access for IAM users uses username and password by default. MFA is an optional additional layer. Access keys are for programmatic access (CLI/SDK).",simple:"To access the AWS Management Console, an IAM user uses a username and password. These are the default credentials for logging in through the web interface.",avoid:"Never share IAM credentials between users. Create individual users, enforce strong password policies, and always enable MFA."}}},
{en:"In on-premises you create virtual servers from a single template. What is the AWS equivalent?",pt:"No ambiente on-premises voce cria servidores virtuais a partir de um template. Qual e o equivalente na AWS?",o:{en:["IAM","An internet gateway","EBS Snapshot","AMI"],pt:["IAM","Um internet gateway","EBS Snapshot","AMI"]},a:[3],t:"EBS",exp:{pt:{tech:"Uma AMI (Amazon Machine Image) e um template que contem o SO, aplicacoes e configuracoes necessarias para lancar uma instancia EC2. EBS Snapshot e backup de volume, nao template de servidor.",simple:"Uma AMI (Amazon Machine Image) e um modelo pre-configurado que contem o sistema operacional e softwares necessarios para lancar uma instancia EC2. Voce pode criar AMIs personalizadas a partir de instancias configuradas.",avoid:"Nunca lance instancias EC2 a partir de AMIs nao verificadas ou publicas sem inspecao. Sempre mantenha AMIs atualizadas e escaneie por vulnerabilidades."},en:{tech:"An AMI (Amazon Machine Image) is a template containing the OS, applications, and configurations needed to launch an EC2 instance. EBS Snapshot is a volume backup, not a server template.",simple:"An AMI (Amazon Machine Image) is a pre-configured template containing the operating system and software needed to launch an EC2 instance. You can create custom AMIs from configured instances.",avoid:"Never launch EC2 instances from unverified or public AMIs without inspection. Always keep AMIs updated and scan for vulnerabilities."}}},
{en:"Which statement best describes the Operational Excellence pillar of the AWS Well-Architected Framework?",pt:"Qual afirmacao descreve melhor o pilar de Excelencia Operacional do AWS Well-Architected Framework?",o:{en:["The ability of a system to recover gracefully from failure","The efficient use of computing resources to meet requirements","The ability to monitor systems and improve supporting processes and procedures","The ability to manage datacenter operations more efficiently"],pt:["A capacidade de um sistema se recuperar de falhas","O uso eficiente de recursos computacionais para atender requisitos","A capacidade de monitorar sistemas e melhorar processos e procedimentos de suporte","A capacidade de gerenciar operacoes de datacenter com mais eficiencia"]},a:[2],t:"Well-Architected",exp:{pt:{tech:"Excelencia Operacional foca em executar e monitorar sistemas, e melhorar continuamente processos e procedimentos. Inclui automacao, resposta a eventos e aprendizado com falhas.",simple:"O pilar de Excelencia Operacional foca em monitorar sistemas e melhorar continuamente processos e procedimentos. Inclui automacao de mudancas, resposta a eventos e definicao de padroes operacionais.",avoid:"Nunca opere sem runbooks e procedimentos documentados. Automatize operacoes repetitivas e implemente observabilidade completa desde o inicio."},en:{tech:"Operational Excellence focuses on running and monitoring systems, and continually improving processes and procedures. It includes automation, event response, and learning from failures.",simple:"The Operational Excellence pillar focuses on monitoring systems and continuously improving processes and procedures. It includes automating changes, responding to events, and defining operational standards.",avoid:"Never operate without runbooks and documented procedures. Automate repetitive operations and implement complete observability from the start."}}},
{en:"Which is NOT a benefit of using Edge Locations?",pt:"Qual NAO e um beneficio do uso de Edge Locations?",o:{en:["Cache the most recent responses","Improve end users' experience when uploading files","Distribute traffic across multiple instances to reduce latency","Distribute content to global users with low latency"],pt:["Armazenar em cache as respostas mais recentes","Melhorar a experiencia dos usuarios ao fazer upload de arquivos","Distribuir trafego entre multiplas instancias para reduzir latencia","Distribuir conteudo para usuarios globais com baixa latencia"]},a:[2],t:"Load Balancing",exp:{pt:{tech:"Edge Locations fazem cache e distribuicao de conteudo (CDN), nao balanceamento de carga entre instancias EC2. Distribuir trafego entre instancias e funcao do Elastic Load Balancer.",simple:"Edge Locations servem para armazenar cache e distribuir conteudo proximo aos usuarios. Distribuir trafego entre instancias para reduzir latencia e funcao de um Load Balancer, nao de Edge Locations.",avoid:"Nunca confunda Edge Locations com Availability Zones. Edge Locations servem para cache e entrega de conteudo, nao para balanceamento de carga entre instancias."},en:{tech:"Edge Locations do caching and content distribution (CDN), not load balancing across EC2 instances. Distributing traffic across instances is the Elastic Load Balancer's job.",simple:"Edge Locations are for caching and distributing content close to users. Distributing traffic across instances to reduce latency is the function of a Load Balancer, not Edge Locations.",avoid:"Never confuse Edge Locations with Availability Zones. Edge Locations serve for caching and content delivery, not for load balancing between instances."}}},
