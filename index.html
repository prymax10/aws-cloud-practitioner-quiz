{en:"What is the main benefit of security groups on an RDS instance?",pt:"Qual e o principal beneficio dos security groups em uma instancia RDS?",o:{en:["Manages user access and encryption keys","Controls what IP ranges can connect to the database","Deploys SSL/TLS certificates for the database","Distributes incoming traffic across replicas"],pt:["Gerencia acesso de usuarios e chaves de criptografia","Controla quais faixas de IP podem se conectar ao banco de dados","Implanta certificados SSL/TLS para o banco de dados","Distribui trafego de entrada entre replicas"]},a:[1],exp:{pt:{tech:"Security Groups atuam como firewalls virtuais que controlam o trafego de entrada e saida com base em regras de IP, porta e protocolo. Em RDS, eles definem quais enderecos IP podem acessar o banco.",simple:"Os Security Groups controlam quais faixas de IP podem se conectar a uma instancia RDS. Eles funcionam como um firewall que permite ou bloqueia trafego de entrada com base em regras definidas pelo usuario.",avoid:"Nao deixe security groups com acesso irrestrito (0.0.0.0/0) em bancos de dados de producao. Tambem nao confunda security groups com Network ACLs, que operam no nivel da sub-rede."},en:{tech:"Security Groups act as virtual firewalls that control inbound and outbound traffic based on IP, port, and protocol rules. In RDS, they define which IP addresses can access the database.",simple:"Security Groups control which IP ranges can connect to an RDS instance. They work as a firewall that allows or blocks inbound traffic based on user-defined rules.",avoid:"Do not leave security groups with unrestricted access (0.0.0.0/0) on production databases. Also do not confuse security groups with Network ACLs, which operate at the subnet level."}}},
{en:"Which ECS launch type gives you visibility and control over the underlying servers?",pt:"Qual tipo de lancamento do ECS da visibilidade e controle sobre os servidores subjacentes?",o:{en:["EC2 launch type","Fargate launch type","Lightsail launch type","Lambda launch type"],pt:["Tipo de lancamento EC2","Tipo de lancamento Fargate","Tipo de lancamento Lightsail","Tipo de lancamento Lambda"]},a:[0],exp:{pt:{tech:"O tipo de lancamento EC2 no ECS permite gerenciar diretamente as instancias EC2 que hospedam seus containers, dando controle total sobre a infraestrutura. Fargate e a alternativa serverless sem gerenciamento de servidores.",simple:"O ECS com EC2 launch type permite que voce veja e gerencie as instancias EC2 subjacentes onde seus containers rodam. Voce tem controle sobre o tipo de instancia, sistema operacional e configuracoes de rede.",avoid:"Nao use EC2 launch type se voce nao precisa de controle sobre a infraestrutura subjacente. O Fargate e mais simples quando voce so quer executar containers sem gerenciar servidores."},en:{tech:"The EC2 launch type in ECS lets you directly manage the EC2 instances hosting your containers, giving full control over the infrastructure. Fargate is the serverless alternative without server management.",simple:"ECS with EC2 launch type lets you see and manage the underlying EC2 instances where your containers run. You have control over instance type, operating system, and networking configurations.",avoid:"Do not use EC2 launch type if you do not need control over the underlying infrastructure. Fargate is simpler when you just want to run containers without managing servers."}}},
{en:"Multiple standalone AWS accounts want to decrease their charges. What should they do?",pt:"Varias contas AWS independentes querem reduzir seus custos. O que devem fazer?",o:{en:["Remove all unnecessary accounts","Add accounts to an AWS Organization with Consolidated Billing","Track charges individually per member account","Enable tiered-pricing on each account"],pt:["Remover todas as contas desnecessarias","Adicionar contas a uma Organizacao AWS com Faturamento Consolidado","Rastrear cobrancos individualmente por conta membro","Habilitar precos por camada em cada conta"]},a:[1],exp:{pt:{tech:"AWS Organizations com Consolidated Billing unifica o faturamento de multiplas contas, permitindo descontos por volume combinado. Quanto maior o uso agregado, maiores os descontos em servicos como S3 e EC2.",simple:"Adicionar contas independentes a uma AWS Organization com Consolidated Billing unifica o faturamento e permite descontos por volume de uso agregado. Quanto maior o uso total, maiores os descontos aplicados.",avoid:"Nao assuma que consolidar billing automaticamente reduz custos de cada servico. Os descontos vem do volume agregado, mas cada conta ainda precisa otimizar seus proprios recursos individualmente."},en:{tech:"AWS Organizations with Consolidated Billing unifies billing across multiple accounts, enabling volume discounts on combined usage. The greater the aggregate usage, the larger the discounts on services like S3 and EC2.",simple:"Adding standalone accounts to an AWS Organization with Consolidated Billing unifies invoicing and enables volume discounts based on aggregated usage. The larger the total usage, the bigger the discounts applied.",avoid:"Do not assume that consolidating billing automatically reduces costs for each service. Discounts come from aggregated volume, but each account still needs to optimize its own resources individually."}}},
{en:"What two parts should you check for a VPC security audit on EC2?",pt:"Quais duas partes voce deve verificar em uma auditoria de seguranca de VPC em EC2?",o:{en:["Network ACLs and Traffic Manager","Network ACLs and Subnets","Security Groups and Internet Gateways","Security Groups and Network ACLs"],pt:["Network ACLs e Traffic Manager","Network ACLs e Sub-redes","Security Groups e Internet Gateways","Security Groups e Network ACLs"]},a:[3],exp:{pt:{tech:"Security Groups (nivel de instancia, stateful) e Network ACLs (nivel de sub-rede, stateless) sao as duas camadas de seguranca de rede na VPC. Auditar ambos garante cobertura completa do trafego.",simple:"Para auditoria de seguranca de VPC em instancias EC2, voce deve verificar os Security Groups (que protegem instancias individuais) e os Network ACLs (que protegem sub-redes inteiras). Juntos, eles formam duas camadas de protecao.",avoid:"Nao audite apenas um dos dois. Security Groups sozinhos nao mostram regras no nivel da sub-rede, e Network ACLs sozinhos nao mostram regras especificas de cada instancia."},en:{tech:"Security Groups (instance level, stateful) and Network ACLs (subnet level, stateless) are the two layers of network security in a VPC. Auditing both ensures complete traffic coverage.",simple:"For a VPC security audit on EC2 instances, you should check Security Groups (which protect individual instances) and Network ACLs (which protect entire subnets). Together, they form two layers of protection.",avoid:"Do not audit only one of the two. Security Groups alone do not show subnet-level rules, and Network ACLs alone do not show rules specific to each instance."}}},
{en:"What does the Business support plan provide? (Choose TWO)",pt:"O que o plano de suporte Business oferece? (Escolha DOIS)",o:{en:["Full set of Trusted Advisor checks","Support Concierge","Less than 15 minute response time for critical issues","AWS Support API access","Proactive Technical Account Manager"],pt:["Conjunto completo de verificacoes do Trusted Advisor","Support Concierge","Tempo de resposta inferior a 15 minutos para problemas criticos","Acesso a API do AWS Support","Technical Account Manager proativo"]},a:[0,3],multi:true,exp:{pt:{tech:"O plano Business inclui o conjunto completo de verificacoes do Trusted Advisor e acesso a AWS Support API para automacao. Concierge e TAM sao exclusivos do Enterprise. Resposta menor que 15 min e do Enterprise.",simple:"O plano Business inclui todas as verificacoes do Trusted Advisor e acesso a AWS Support API para automacao de tickets de suporte. Isso permite monitoramento completo e integracao programatica com o suporte.",avoid:"Nao confunda o plano Business com o Enterprise. O TAM (Technical Account Manager) e o Infrastructure Event Management gratuito so estao disponiveis no plano Enterprise."},en:{tech:"The Business plan includes the full set of Trusted Advisor checks and AWS Support API access for automation. Concierge and TAM are Enterprise-only. Sub-15 minute response is Enterprise-only.",simple:"The Business plan includes all Trusted Advisor checks and access to the AWS Support API for support ticket automation. This enables comprehensive monitoring and programmatic integration with support.",avoid:"Do not confuse the Business plan with Enterprise. The TAM (Technical Account Manager) and free Infrastructure Event Management are only available on the Enterprise plan."}}},
{en:"Which service automates deployment and scaling of web applications?",pt:"Qual servico automatiza a implantacao e o escalonamento de aplicacoes web?",o:{en:["Amazon S3","AWS Elastic Beanstalk","AWS CodeCommit","Amazon EFS"],pt:["Amazon S3","AWS Elastic Beanstalk","AWS CodeCommit","Amazon EFS"]},a:[1],exp:{pt:{tech:"AWS Elastic Beanstalk e um servico PaaS que automatiza implantacao, escalonamento, balanceamento de carga e monitoramento. Voce faz upload do codigo e ele provisiona a infraestrutura automaticamente.",simple:"O AWS Elastic Beanstalk automatiza o deploy, escalamento e gerenciamento de aplicacoes web. Voce sobe o codigo e ele configura servidores, balanceadores, auto scaling e monitoramento automaticamente.",avoid:"Nao use Elastic Beanstalk se voce precisa de controle total sobre cada componente da infraestrutura. Para workloads que exigem configuracao especifica de rede ou servidores, EC2 direto e mais apropriado."},en:{tech:"AWS Elastic Beanstalk is a PaaS service that automates deployment, scaling, load balancing, and monitoring. You upload your code and it provisions the infrastructure automatically.",simple:"AWS Elastic Beanstalk automates the deployment, scaling, and management of web applications. You upload your code and it configures servers, load balancers, auto scaling, and monitoring automatically.",avoid:"Do not use Elastic Beanstalk if you need full control over every infrastructure component. For workloads requiring specific network or server configuration, direct EC2 is more appropriate."}}},
{en:"What is true about AWS security responsibility?",pt:"O que e verdadeiro sobre a responsabilidade de seguranca da AWS?",o:{en:["AWS manages everything for EC2 operating systems","Customers are responsible for patching databases running on EC2","Server-side encryption is always AWS responsibility","AWS is responsible for application-level security"],pt:["A AWS gerencia tudo para sistemas operacionais EC2","Clientes sao responsaveis por atualizar bancos de dados rodando em EC2","Criptografia server-side e sempre responsabilidade da AWS","A AWS e responsavel pela seguranca em nivel de aplicacao"]},a:[1],exp:{pt:{tech:"Em EC2 (IaaS), o cliente e responsavel por gerenciar o SO, aplicativos e bancos de dados instalados, incluindo patches e atualizacoes. A AWS cuida apenas do hardware e da infraestrutura subjacente.",simple:"Quando voce instala um banco de dados em uma instancia EC2, voce e responsavel por aplicar patches e atualizacoes nesse banco. A AWS so cuida da infraestrutura fisica e do hipervisor.",avoid:"Nao confunda a responsabilidade em EC2 com RDS. No RDS, a AWS gerencia patches do banco de dados. No EC2, toda a manutencao do software instalado e do cliente."},en:{tech:"In EC2 (IaaS), the customer is responsible for managing the OS, applications, and databases installed, including patches and updates. AWS only takes care of the hardware and underlying infrastructure.",simple:"When you install a database on an EC2 instance, you are responsible for applying patches and updates to that database. AWS only takes care of the physical infrastructure and hypervisor.",avoid:"Do not confuse the responsibility on EC2 with RDS. On RDS, AWS manages database patches. On EC2, all installed software maintenance is the customer responsibility."}}},
{en:"Which service provides the EASIEST way to set up and manage multiple AWS accounts?",pt:"Qual servico oferece a maneira MAIS FACIL de configurar e gerenciar multiplas contas AWS?",o:{en:["AWS Control Tower","Amazon Macie","AWS Systems Manager Patch Manager","AWS Security Hub"],pt:["AWS Control Tower","Amazon Macie","AWS Systems Manager Patch Manager","AWS Security Hub"]},a:[0],exp:{pt:{tech:"AWS Control Tower automatiza a configuracao de um ambiente multi-account seguro seguindo as melhores praticas da AWS. Configura landing zones, guardrails e fornece um dashboard centralizado.",simple:"O AWS Control Tower configura e governa um ambiente multi-conta AWS seguindo boas praticas. Ele cria contas padronizadas, aplica guardrails de seguranca e fornece um dashboard centralizado.",avoid:"Nao confunda Control Tower com AWS Organizations. O Organizations agrupa contas e consolida billing, enquanto o Control Tower automatiza a criacao e governanca dessas contas com guardrails pre-configurados."},en:{tech:"AWS Control Tower automates the setup of a secure multi-account environment following AWS best practices. It sets up landing zones, guardrails, and provides a centralized dashboard.",simple:"AWS Control Tower sets up and governs a multi-account AWS environment following best practices. It creates standardized accounts, applies security guardrails, and provides a centralized dashboard.",avoid:"Do not confuse Control Tower with AWS Organizations. Organizations groups accounts and consolidates billing, while Control Tower automates account creation and governance with preconfigured guardrails."}}},
{en:"How can you track EC2 CPU usage above 60%?",pt:"Como voce pode monitorar o uso de CPU do EC2 acima de 60%?",o:{en:["Use Amazon CloudFront","Set a threshold in AWS Config","Use Amazon CloudWatch Alarms","Use Amazon SNS"],pt:["Usar o Amazon CloudFront","Definir um limite no AWS Config","Usar alarmes do Amazon CloudWatch","Usar o Amazon SNS"]},a:[2],exp:{pt:{tech:"Amazon CloudWatch Alarms monitoram metricas e disparam acoes quando um limite e ultrapassado. Voce pode configurar um alarme para CPU acima de 60% que envia notificacao via SNS ou executa acoes automaticas.",simple:"O Amazon CloudWatch Alarms permite definir limites para metricas como uso de CPU e disparar alertas quando esses limites sao ultrapassados. Voce pode configurar acoes automaticas ou notificacoes via SNS.",avoid:"Nao confunda CloudWatch Alarms com CloudWatch Logs. Logs armazena registros de eventos, enquanto Alarms monitora metricas numericas e dispara acoes. Tambem nao use SNS sozinho, pois ele so envia notificacoes mas nao monitora metricas."},en:{tech:"Amazon CloudWatch Alarms monitor metrics and trigger actions when a threshold is breached. You can set an alarm for CPU above 60% that sends notifications via SNS or executes automated actions.",simple:"Amazon CloudWatch Alarms lets you set thresholds for metrics like CPU usage and trigger alerts when those thresholds are exceeded. You can configure automatic actions or notifications via SNS.",avoid:"Do not confuse CloudWatch Alarms with CloudWatch Logs. Logs stores event records, while Alarms monitors numeric metrics and triggers actions. Also do not use SNS alone, as it only sends notifications but does not monitor metrics."}}},
{en:"What is the recommended storage for an often-changing database running on EC2?",pt:"Qual e o armazenamento recomendado para um banco de dados com alteracoes frequentes rodando em EC2?",o:{en:["Amazon EBS","Amazon RDS","Cannot run a database on EC2","Amazon DynamoDB"],pt:["Amazon EBS","Amazon RDS","Nao e possivel rodar banco de dados no EC2","Amazon DynamoDB"]},a:[0],exp:{pt:{tech:"Amazon EBS (Elastic Block Store) fornece armazenamento em bloco persistente de baixa latencia para EC2, ideal para bancos de dados com muitas operacoes de leitura/escrita. EBS persiste independentemente da instancia.",simple:"O Amazon EBS (Elastic Block Store) fornece armazenamento em bloco persistente para instancias EC2. Os dados permanecem salvos mesmo quando a instancia e parada, sendo ideal para bancos de dados com gravacoes frequentes.",avoid:"Nao use Instance Store para bancos de dados, pois os dados sao perdidos quando a instancia e encerrada. Tambem nao use S3 para dados que mudam frequentemente, pois S3 e otimizado para objetos estaticos."},en:{tech:"Amazon EBS (Elastic Block Store) provides persistent, low-latency block storage for EC2, ideal for databases with heavy read/write operations. EBS persists independently of the instance.",simple:"Amazon EBS (Elastic Block Store) provides persistent block storage for EC2 instances. Data remains saved even when the instance is stopped, making it ideal for databases with frequent writes.",avoid:"Do not use Instance Store for databases, as data is lost when the instance is terminated. Also do not use S3 for frequently changing data, as S3 is optimized for static objects."}}},
{en:"What factors determine AWS Lambda charges? (Choose TWO)",pt:"Quais fatores determinam os custos do AWS Lambda? (Escolha DOIS)",o:{en:["Storage consumed by Lambda","Number of requests","Number of attached volumes","Placement groups used","Compute time consumed"],pt:["Armazenamento consumido pelo Lambda","Numero de requisicoes","Numero de volumes anexados","Grupos de posicionamento utilizados","Tempo de computacao consumido"]},a:[1,4],multi:true,exp:{pt:{tech:"Lambda cobra com base no numero de requisicoes (invocacoes) e no tempo de computacao (medido em ms, multiplicado pela memoria alocada em GB). O free tier inclui 1 milhao de requisicoes e 400.000 GB-segundos por mes.",simple:"O AWS Lambda cobra com base no numero de requisicoes recebidas e no tempo de computacao consumido (em milissegundos). Se a funcao nao for invocada, nao ha cobranca.",avoid:"Nao assuma que Lambda cobra por memoria alocada separadamente da execucao. O custo de computacao ja leva em conta a memoria configurada multiplicada pelo tempo de execucao."},en:{tech:"Lambda charges based on the number of requests (invocations) and compute time (measured in ms, multiplied by allocated memory in GB). The free tier includes 1 million requests and 400,000 GB-seconds per month.",simple:"AWS Lambda charges based on the number of requests received and the compute time consumed (in milliseconds). If the function is not invoked, there is no charge.",avoid:"Do not assume Lambda charges for allocated memory separately from execution. The compute cost already factors in the configured memory multiplied by execution time."}}},
{en:"What does Amazon GuardDuty do?",pt:"O que o Amazon GuardDuty faz?",o:{en:["Notifies you about abuse events in your account","Continuously monitors and detects threats in your account","Identifies root cause of security issues","Checks security groups for unrestricted access"],pt:["Notifica sobre eventos de abuso na sua conta","Monitora continuamente e detecta ameacas na sua conta","Identifica a causa raiz de problemas de seguranca","Verifica security groups com acesso irrestrito"]},a:[1],exp:{pt:{tech:"Amazon GuardDuty e um servico de deteccao de ameacas que monitora continuamente atividades maliciosas usando machine learning, analise de anomalias e inteligencia de ameacas integrada em logs do CloudTrail, VPC Flow Logs e DNS.",simple:"O Amazon GuardDuty monitora continuamente sua conta AWS em busca de atividades maliciosas e comportamentos nao autorizados. Ele analisa logs de VPC Flow, CloudTrail e DNS para detectar ameacas automaticamente.",avoid:"Nao confunda GuardDuty com AWS Shield (protecao contra DDoS) ou WAF (filtragem de requisicoes web). GuardDuty detecta ameacas mas nao bloqueia trafego diretamente."},en:{tech:"Amazon GuardDuty is a threat detection service that continuously monitors for malicious activity using machine learning, anomaly analysis, and integrated threat intelligence across CloudTrail logs, VPC Flow Logs, and DNS.",simple:"Amazon GuardDuty continuously monitors your AWS account for malicious activity and unauthorized behavior. It analyzes VPC Flow Logs, CloudTrail, and DNS logs to detect threats automatically.",avoid:"Do not confuse GuardDuty with AWS Shield (DDoS protection) or WAF (web request filtering). GuardDuty detects threats but does not block traffic directly."}}},
{en:"Which database service is best for applications requiring joins and complex transactions?",pt:"Qual servico de banco de dados e melhor para aplicacoes que requerem joins e transacoes complexas?",o:{en:["Amazon RDS","AWS Outposts","Amazon DocumentDB","Amazon DynamoDB"],pt:["Amazon RDS","AWS Outposts","Amazon DocumentDB","Amazon DynamoDB"]},a:[0],exp:{pt:{tech:"Amazon RDS e um servico de banco de dados relacional que suporta SQL, joins, foreign keys e transacoes ACID. DynamoDB e NoSQL (key-value) e DocumentDB e NoSQL (documentos) — ambos nao suportam joins nativamente.",simple:"O Amazon RDS e um servico de banco de dados relacional gerenciado que suporta SQL, joins e transacoes complexas. Ele e ideal para aplicacoes que precisam de integridade referencial e consultas estruturadas.",avoid:"Nao use DynamoDB se sua aplicacao depende de joins e transacoes ACID complexas, pois DynamoDB e um banco NoSQL otimizado para acesso por chave. Use RDS para cargas relacionais."},en:{tech:"Amazon RDS is a relational database service that supports SQL, joins, foreign keys, and ACID transactions. DynamoDB is NoSQL (key-value) and DocumentDB is NoSQL (document) — both do not natively support joins.",simple:"Amazon RDS is a managed relational database service that supports SQL, joins, and complex transactions. It is ideal for applications that need referential integrity and structured queries.",avoid:"Do not use DynamoDB if your application depends on joins and complex ACID transactions, as DynamoDB is a NoSQL database optimized for key-based access. Use RDS for relational workloads."}}},
{en:"What makes categorizing AWS resources easier?",pt:"O que facilita a categorizacao de recursos AWS?",o:{en:["Amazon CloudWatch","AWS Service Catalog","AWS Directory Service","AWS Tagging"],pt:["Amazon CloudWatch","AWS Service Catalog","AWS Directory Service","AWS Tagging"]},a:[3],exp:{pt:{tech:"Tags AWS sao pares chave-valor que voce atribui a recursos para organizacao, controle de custos, seguranca e automacao. Permitem filtrar e agrupar recursos por ambiente, equipe, projeto, etc.",simple:"As AWS Tags sao pares de chave-valor que voce atribui aos recursos para organiza-los e categoriza-los. Elas facilitam o gerenciamento de custos, a aplicacao de politicas e a busca por recursos.",avoid:"Nao use tags inconsistentes ou sem padrao definido, pois isso dificulta a organizacao. Defina uma convencao de nomenclatura antes de comecar a aplicar tags em seus recursos."},en:{tech:"AWS Tags are key-value pairs you assign to resources for organization, cost control, security, and automation. They allow filtering and grouping resources by environment, team, project, etc.",simple:"AWS Tags are key-value pairs you assign to resources to organize and categorize them. They make cost management, policy enforcement, and resource searching easier.",avoid:"Do not use inconsistent tags or tags without a defined standard, as this makes organization difficult. Define a naming convention before you start applying tags to your resources."}}},
{en:"What should you consider about Amazon Glacier?",pt:"O que voce deve considerar sobre o Amazon Glacier?",o:{en:["It only accepts compressed format data","It is only for frequently accessed data","It does not provide immediate data retrieval","You can attach it to EC2 to store data"],pt:["So aceita dados em formato compactado","E apenas para dados acessados frequentemente","Nao oferece recuperacao imediata de dados","Voce pode anexa-lo ao EC2 para armazenar dados"]},a:[2],exp:{pt:{tech:"Amazon S3 Glacier e projetado para arquivamento de longo prazo com custo muito baixo. A recuperacao de dados pode levar de minutos a horas dependendo do tier (Expedited, Standard, Bulk). Nao oferece acesso instantaneo como o S3 Standard.",simple:"O Amazon Glacier (agora S3 Glacier) e um servico de armazenamento de baixo custo para dados acessados raramente. A recuperacao de dados pode levar de minutos a horas dependendo da opcao escolhida.",avoid:"Nao use Glacier para dados que precisam de acesso imediato ou frequente. Se sua aplicacao precisa de respostas rapidas, use S3 Standard ou S3 Standard-IA."},en:{tech:"Amazon S3 Glacier is designed for long-term archival with very low cost. Data retrieval can take minutes to hours depending on the tier (Expedited, Standard, Bulk). It does not offer instant access like S3 Standard.",simple:"Amazon Glacier (now S3 Glacier) is a low-cost storage service for rarely accessed data. Data retrieval can take from minutes to hours depending on the chosen option.",avoid:"Do not use Glacier for data that needs immediate or frequent access. If your application needs fast responses, use S3 Standard or S3 Standard-IA."}}},
{en:"Which service is best for running thousands of batch jobs?",pt:"Qual servico e melhor para executar milhares de jobs em lote?",o:{en:["Amazon EC2","AWS Batch","Lambda@Edge","AWS Fargate"],pt:["Amazon EC2","AWS Batch","Lambda@Edge","AWS Fargate"]},a:[1],exp:{pt:{tech:"AWS Batch planeja, agenda e executa workloads de computacao em lote de forma eficiente. Ele provisiona automaticamente a quantidade ideal de recursos computacionais com base no volume e nos requisitos dos jobs.",simple:"O AWS Batch planeja, agenda e executa cargas de trabalho em lote em escala. Ele provisiona automaticamente a quantidade ideal de recursos computacionais com base no volume e nos requisitos dos jobs enviados.",avoid:"Nao use AWS Batch para workloads que precisam de resposta em tempo real ou interacao com usuarios. Batch e projetado para processamento em lote, nao para servicos web ou APIs."},en:{tech:"AWS Batch plans, schedules, and runs batch computing workloads efficiently. It automatically provisions the optimal amount of compute resources based on the volume and requirements of the jobs.",simple:"AWS Batch plans, schedules, and runs batch workloads at scale. It automatically provisions the optimal amount of compute resources based on the volume and requirements of submitted jobs.",avoid:"Do not use AWS Batch for workloads that need real-time response or user interaction. Batch is designed for batch processing, not for web services or APIs."}}},
{en:"How can you increase fault tolerance in AWS?",pt:"Como voce pode aumentar a tolerancia a falhas na AWS?",o:{en:["Deploy across multiple EC2 instances","Deploy across multiple Availability Zones","Host everything on one powerful instance","Deploy across multiple subnets"],pt:["Implantar em multiplas instancias EC2","Implantar em multiplas Zonas de Disponibilidade","Hospedar tudo em uma instancia poderosa","Implantar em multiplas sub-redes"]},a:[1],exp:{pt:{tech:"Implantar em multiplas AZs garante que se um datacenter inteiro falhar, as AZs restantes continuam operando. Multiplas instancias na mesma AZ ou sub-redes diferentes na mesma AZ nao protegem contra falha de AZ.",simple:"Implantar instancias em multiplas Availability Zones garante que, se uma AZ ficar indisponivel, as instancias nas outras AZs continuem operando. Isso aumenta a tolerancia a falhas da aplicacao.",avoid:"Nao coloque todas as instancias na mesma AZ achando que mais instancias significam mais tolerancia a falhas. A redundancia vem da distribuicao geografica, nao da quantidade em um unico local."},en:{tech:"Deploying across multiple AZs ensures that if an entire datacenter fails, the remaining AZs continue operating. Multiple instances in the same AZ or different subnets in the same AZ do not protect against AZ failure.",simple:"Deploying instances across multiple Availability Zones ensures that if one AZ becomes unavailable, instances in other AZs continue operating. This increases the application fault tolerance.",avoid:"Do not put all instances in the same AZ thinking more instances mean more fault tolerance. Redundancy comes from geographic distribution, not from quantity in a single location."}}},
{en:"Which AWS support plans offer 24/7 phone access? (Choose TWO)",pt:"Quais planos de suporte AWS oferecem acesso telefonico 24/7? (Escolha DOIS)",o:{en:["Developer","Premium","Enterprise","Standard","Business"],pt:["Developer","Premium","Enterprise","Standard","Business"]},a:[2,4],multi:true,exp:{pt:{tech:"Os planos Business e Enterprise oferecem acesso 24/7 por telefone, chat e email para todas as questoes. O plano Developer oferece apenas email em horario comercial. Basic e Standard nao tem suporte tecnico direto.",simple:"Os planos Enterprise e Business oferecem acesso telefonico ao suporte AWS 24 horas por dia, 7 dias por semana. Os planos Developer e Basic nao incluem suporte por telefone.",avoid:"Nao escolha o plano Developer se voce precisa de suporte telefonico urgente. O Developer so oferece suporte por email durante horario comercial."},en:{tech:"Business and Enterprise plans offer 24/7 access via phone, chat, and email for all issues. Developer plan offers email only during business hours. Basic and Standard do not include direct technical support.",simple:"The Enterprise and Business plans offer 24/7 phone access to AWS support. The Developer and Basic plans do not include phone support.",avoid:"Do not choose the Developer plan if you need urgent phone support. Developer only offers email support during business hours."}}},
{en:"What is the benefit of Loose Coupling?",pt:"Qual e o beneficio do Acoplamento Fraco (Loose Coupling)?",o:{en:["Eliminates the need for change management","Allows Cross-Region Replication","Reduces Privileged Access","Individual components can be modified without affecting others"],pt:["Elimina a necessidade de gerenciamento de mudancas","Permite replicacao entre regioes","Reduz acesso privilegiado","Componentes individuais podem ser modificados sem afetar os outros"]},a:[3],exp:{pt:{tech:"Loose Coupling significa que componentes de um sistema sao independentes entre si, comunicando-se por interfaces bem definidas. Mudancas em um componente nao afetam os demais, aumentando resiliencia e facilidade de manutencao.",simple:"Acoplamento fraco permite que componentes individuais sejam modificados, atualizados ou substituidos sem afetar os outros componentes do sistema. Isso torna o sistema mais flexivel e facil de manter.",avoid:"Nao projete sistemas com dependencias diretas entre componentes, pois uma mudanca em um componente pode quebrar outros. Use interfaces e filas de mensagens para desacoplar servicos."},en:{tech:"Loose Coupling means system components are independent of each other, communicating through well-defined interfaces. Changes to one component do not affect others, increasing resilience and maintainability.",simple:"Loose coupling allows individual components to be modified, updated, or replaced without affecting other components in the system. This makes the system more flexible and easier to maintain.",avoid:"Do not design systems with direct dependencies between components, as a change in one component can break others. Use interfaces and message queues to decouple services."}}},
{en:"Which service provides high throughput to multiple compute nodes?",pt:"Qual servico fornece alta vazao para multiplos nos de computacao?",o:{en:["Amazon EBS","AWS Storage Gateway","Amazon EFS","Amazon S3"],pt:["Amazon EBS","AWS Storage Gateway","Amazon EFS","Amazon S3"]},a:[2],exp:{pt:{tech:"Amazon EFS (Elastic File System) e um sistema de arquivos NFS elastico que pode ser montado simultaneamente por milhares de instancias EC2, fornecendo acesso compartilhado com alta vazao e baixa latencia.",simple:"O Amazon EFS (Elastic File System) fornece um sistema de arquivos compartilhado que pode ser montado simultaneamente por multiplas instancias EC2. Ele oferece alto throughput e escala automaticamente conforme os dados crescem.",avoid:"Nao use EBS quando multiplas instancias precisam acessar os mesmos arquivos ao mesmo tempo, pois EBS so pode ser anexado a uma instancia por vez (exceto io1/io2 multi-attach). Use EFS para acesso compartilhado."},en:{tech:"Amazon EFS (Elastic File System) is an elastic NFS file system that can be mounted simultaneously by thousands of EC2 instances, providing shared access with high throughput and low latency.",simple:"Amazon EFS (Elastic File System) provides a shared file system that can be mounted simultaneously by multiple EC2 instances. It offers high throughput and scales automatically as data grows.",avoid:"Do not use EBS when multiple instances need to access the same files at the same time, as EBS can only be attached to one instance at a time (except io1/io2 multi-attach). Use EFS for shared access."}}},
{en:"EBS volumes being replicated within an AZ provides what?",pt:"A replicacao de volumes EBS dentro de uma AZ fornece o que?",o:{en:["Elasticity","Durability","Traceability","Accessibility"],pt:["Elasticidade","Durabilidade","Rastreabilidade","Acessibilidade"]},a:[1],exp:{pt:{tech:"EBS replica automaticamente dados dentro da mesma AZ para proteger contra falha de hardware individual, garantindo durabilidade dos dados. Isso significa que os dados persistem mesmo se um disco fisico falhar.",simple:"A replicacao de volumes EBS dentro de uma AZ garante durabilidade, ou seja, os dados sobrevivem a falhas de hardware de um unico disco. A AWS replica automaticamente o volume dentro da mesma AZ.",avoid:"Nao confunda durabilidade com disponibilidade entre AZs. A replicacao do EBS protege contra falha de disco dentro de uma AZ, mas nao protege contra a falha da AZ inteira. Para isso, use snapshots em outra AZ."},en:{tech:"EBS automatically replicates data within the same AZ to protect against individual hardware failure, ensuring data durability. This means data persists even if a physical disk fails.",simple:"EBS volume replication within an AZ provides durability, meaning data survives single disk hardware failures. AWS automatically replicates the volume within the same AZ.",avoid:"Do not confuse durability with cross-AZ availability. EBS replication protects against disk failure within an AZ, but does not protect against an entire AZ failure. For that, use snapshots in another AZ."}}},
{en:"Which service integrates with AWS Shield and WAF for DDoS protection?",pt:"Qual servico se integra com o AWS Shield e WAF para protecao contra DDoS?",o:{en:["Amazon EFS","AWS Secrets Manager","AWS Systems Manager","Amazon CloudFront"],pt:["Amazon EFS","AWS Secrets Manager","AWS Systems Manager","Amazon CloudFront"]},a:[3],exp:{pt:{tech:"Amazon CloudFront se integra nativamente com AWS Shield (protecao DDoS) e AWS WAF (firewall de aplicacao web). O trafego e filtrado nos edge locations antes de chegar a origem, mitigando ataques na borda da rede.",simple:"O Amazon CloudFront se integra nativamente com AWS Shield e AWS WAF para fornecer protecao contra ataques DDoS nos edge locations. O trafego malicioso e filtrado antes de chegar a sua origem.",avoid:"Nao dependa apenas do Shield ou WAF sem o CloudFront se voce quer protecao na borda da rede. Tambem nao confunda CloudFront com Route 53, que e um servico de DNS e nao de cache ou filtragem."},en:{tech:"Amazon CloudFront natively integrates with AWS Shield (DDoS protection) and AWS WAF (web application firewall). Traffic is filtered at edge locations before reaching the origin, mitigating attacks at the network edge.",simple:"Amazon CloudFront natively integrates with AWS Shield and AWS WAF to provide DDoS protection at edge locations. Malicious traffic is filtered before reaching your origin.",avoid:"Do not rely on Shield or WAF alone without CloudFront if you want protection at the network edge. Also do not confuse CloudFront with Route 53, which is a DNS service and not for caching or filtering."}}},
{en:"Which service is used for encrypting EBS volumes?",pt:"Qual servico e usado para criptografar volumes EBS?",o:{en:["AWS WAF","AWS KMS","Amazon Macie","Amazon GuardDuty"],pt:["AWS WAF","AWS KMS","Amazon Macie","Amazon GuardDuty"]},a:[1],exp:{pt:{tech:"AWS KMS (Key Management Service) gerencia as chaves de criptografia usadas pelo EBS. Ao habilitar a criptografia do EBS, o KMS cria e gerencia as chaves mestras que protegem os dados em repouso.",simple:"O AWS KMS (Key Management Service) e usado para criar e gerenciar chaves de criptografia que protegem volumes EBS. A integracao e nativa e voce pode ativar criptografia com poucos cliques.",avoid:"Nao confunda KMS com CloudHSM para criptografia de EBS. O KMS e o servico padrao e integrado para essa funcao. CloudHSM e para casos que exigem controle exclusivo sobre o hardware de chaves."},en:{tech:"AWS KMS (Key Management Service) manages the encryption keys used by EBS. When you enable EBS encryption, KMS creates and manages the master keys that protect data at rest.",simple:"AWS KMS (Key Management Service) is used to create and manage encryption keys that protect EBS volumes. The integration is native and you can enable encryption with a few clicks.",avoid:"Do not confuse KMS with CloudHSM for EBS encryption. KMS is the standard integrated service for this function. CloudHSM is for cases requiring exclusive control over key hardware."}}},
{en:"What is an advantage of Amazon RDS?",pt:"Qual e uma vantagem do Amazon RDS?",o:{en:["Simplifies relational database administration tasks","Provides 11 nines of reliability","Automatically scales databases without limits","Enables dynamic CPU and RAM adjustment without downtime"],pt:["Simplifica tarefas de administracao de banco de dados relacional","Fornece 11 noves de confiabilidade","Escala bancos de dados automaticamente sem limites","Permite ajuste dinamico de CPU e RAM sem tempo de inatividade"]},a:[0],exp:{pt:{tech:"Amazon RDS gerencia tarefas operacionais como provisionamento, patches, backups, recuperacao, deteccao de falhas e reparos. Isso reduz significativamente a carga administrativa sobre equipes de DBA.",simple:"O Amazon RDS simplifica tarefas de administracao de bancos de dados relacionais, incluindo backups automaticos, aplicacao de patches, recuperacao e replicacao. Voce foca nos dados e na aplicacao, nao na infraestrutura do banco.",avoid:"Nao use RDS se voce precisa de controle total sobre o sistema operacional ou configuracoes avancadas do banco que o RDS nao expoe. Nesses casos, instale o banco diretamente no EC2."},en:{tech:"Amazon RDS manages operational tasks like provisioning, patching, backups, recovery, failure detection, and repair. This significantly reduces the administrative burden on DBA teams.",simple:"Amazon RDS simplifies relational database administration tasks, including automated backups, patching, recovery, and replication. You focus on data and application, not on database infrastructure.",avoid:"Do not use RDS if you need full control over the operating system or advanced database configurations that RDS does not expose. In those cases, install the database directly on EC2."}}},
{en:"Which service can run a customer-managed relational database?",pt:"Qual servico pode executar um banco de dados relacional gerenciado pelo cliente?",o:{en:["Amazon EC2","Amazon Route 53","Amazon ElastiCache","Amazon DynamoDB"],pt:["Amazon EC2","Amazon Route 53","Amazon ElastiCache","Amazon DynamoDB"]},a:[0],exp:{pt:{tech:"Amazon EC2 permite instalar e gerenciar qualquer software de banco de dados relacional (MySQL, PostgreSQL, Oracle, etc.) com controle total sobre configuracao, tuning e versao.",simple:"O Amazon EC2 permite executar bancos de dados relacionais gerenciados inteiramente por voce. Voce escolhe o software, a versao, e cuida de toda a configuracao, manutencao e atualizacoes.",avoid:"Nao use EC2 para bancos de dados quando o RDS ja suporta seu motor, a menos que voce tenha necessidades especificas de personalizacao. O RDS reduz significativamente o trabalho operacional."},en:{tech:"Amazon EC2 allows you to install and manage any relational database software (MySQL, PostgreSQL, Oracle, etc.) with full control over configuration, tuning, and version.",simple:"Amazon EC2 lets you run relational databases fully managed by you. You choose the software, the version, and handle all configuration, maintenance, and updates.",avoid:"Do not use EC2 for databases when RDS already supports your engine, unless you have specific customization needs. RDS significantly reduces operational work."}}},
{en:"You need to launch two EC2 instances for high availability. What action should you take?",pt:"Voce precisa lancar duas instancias EC2 para alta disponibilidade. Que acao deve tomar?",o:{en:["Launch across multiple AZs in a single Region","Launch as Reserved Instances in the same AZ","Launch in multiple Regions in the same AZ","Launch as Spot Instances in different AZs"],pt:["Lancar em multiplas AZs em uma unica Regiao","Lancar como Reserved Instances na mesma AZ","Lancar em multiplas Regioes na mesma AZ","Lancar como Spot Instances em diferentes AZs"]},a:[0],exp:{pt:{tech:"Para alta disponibilidade, as instancias devem estar em AZs diferentes dentro da mesma Regiao. Isso protege contra falha de um datacenter inteiro. Spot Instances podem ser interrompidas e nao sao adequadas para HA.",simple:"Lance as duas instancias EC2 em Availability Zones diferentes dentro da mesma regiao. Se uma AZ tiver problemas, a instancia na outra AZ continua funcionando, garantindo alta disponibilidade.",avoid:"Nao coloque as duas instancias na mesma AZ, pois isso nao protege contra falhas da AZ. Tambem nao e necessario usar regioes diferentes para alta disponibilidade basica dentro de uma aplicacao regional."},en:{tech:"For high availability, instances should be in different AZs within the same Region. This protects against failure of an entire datacenter. Spot Instances can be interrupted and are not suitable for HA.",simple:"Launch both EC2 instances in different Availability Zones within the same region. If one AZ has issues, the instance in the other AZ continues running, ensuring high availability.",avoid:"Do not put both instances in the same AZ, as this does not protect against AZ failures. It is also not necessary to use different regions for basic high availability within a regional application."}}},
{en:"What limits S3 bucket access to specific users?",pt:"O que limita o acesso ao bucket S3 a usuarios especificos?",o:{en:["Public and private key-pair","Amazon Inspector","IAM policies","Security Groups"],pt:["Par de chaves publica e privada","Amazon Inspector","IAM policies","Security Groups"]},a:[2],exp:{pt:{tech:"IAM Policies definem quem pode acessar quais recursos S3 e quais acoes podem realizar (GetObject, PutObject, etc.). Bucket Policies tambem controlam acesso, mas IAM Policies sao especificas por usuario/grupo/role.",simple:"As IAM Policies definem permissoes que controlam quem pode acessar quais buckets S3 e quais acoes podem realizar (leitura, escrita, exclusao). Elas sao atribuidas a usuarios, grupos ou roles.",avoid:"Nao confunda IAM Policies com S3 Bucket Policies. IAM Policies sao centradas no usuario, enquanto Bucket Policies sao centradas no recurso. Para controlar acesso por usuario, use IAM Policies."},en:{tech:"IAM Policies define who can access which S3 resources and what actions they can perform (GetObject, PutObject, etc.). Bucket Policies also control access, but IAM Policies are specific per user/group/role.",simple:"IAM Policies define permissions that control who can access which S3 buckets and what actions they can perform (read, write, delete). They are assigned to users, groups, or roles.",avoid:"Do not confuse IAM Policies with S3 Bucket Policies. IAM Policies are user-centric, while Bucket Policies are resource-centric. To control access per user, use IAM Policies."}}},
{en:"What is an AWS responsibility in the shared model for security?",pt:"O que e uma responsabilidade da AWS no modelo compartilhado de seguranca?",o:{en:["Granting access to resources","Encrypting data in transit","Updating EC2 host firmware","Updating operating systems on EC2"],pt:["Conceder acesso aos recursos","Criptografar dados em transito","Atualizar o firmware do host EC2","Atualizar sistemas operacionais no EC2"]},a:[2],exp:{pt:{tech:"A AWS e responsavel pela seguranca DA nuvem, incluindo firmware do host fisico, hipervisor e infraestrutura de rede. O cliente e responsavel por atualizar o SO das instancias EC2 e criptografar seus dados.",simple:"A AWS e responsavel por atualizar o firmware dos hosts EC2, incluindo hardware, hipervisor e infraestrutura de rede. Isso faz parte da responsabilidade de seguranca da AWS no modelo compartilhado.",avoid:"Nao confunda firmware do host (responsabilidade AWS) com patches do sistema operacional dentro da instancia (responsabilidade do cliente). Se voce roda Linux ou Windows no EC2, atualizar o SO e sua tarefa."},en:{tech:"AWS is responsible for security OF the cloud, including physical host firmware, hypervisor, and network infrastructure. The customer is responsible for updating the OS on EC2 instances and encrypting their data.",simple:"AWS is responsible for updating EC2 host firmware, including hardware, hypervisor, and network infrastructure. This is part of AWS security responsibility in the shared model.",avoid:"Do not confuse host firmware (AWS responsibility) with operating system patches inside the instance (customer responsibility). If you run Linux or Windows on EC2, updating the OS is your task."}}},
{en:"What is the low-cost option for hosting static websites?",pt:"Qual e a opcao de baixo custo para hospedagem de sites estaticos?",o:{en:["Amazon Glacier","Amazon DynamoDB","Amazon EFS","Amazon S3"],pt:["Amazon Glacier","Amazon DynamoDB","Amazon EFS","Amazon S3"]},a:[3],exp:{pt:{tech:"Amazon S3 suporta hospedagem de sites estaticos (HTML, CSS, JS) diretamente do bucket, sem necessidade de servidor web. Com CloudFront na frente, oferece distribuicao global de baixo custo e alta performance.",simple:"O Amazon S3 pode hospedar sites estaticos (HTML, CSS, JavaScript) com baixo custo e alta disponibilidade. Nao e necessario provisionar ou gerenciar servidores para servir o conteudo.",avoid:"Nao use S3 para sites dinamicos que precisam de processamento no servidor (como PHP ou Node.js). S3 so serve arquivos estaticos. Para sites dinamicos, use EC2 ou Elastic Beanstalk."},en:{tech:"Amazon S3 supports static website hosting (HTML, CSS, JS) directly from the bucket, with no web server needed. With CloudFront in front, it offers low-cost global distribution with high performance.",simple:"Amazon S3 can host static websites (HTML, CSS, JavaScript) at low cost and high availability. No need to provision or manage servers to serve the content.",avoid:"Do not use S3 for dynamic websites that need server-side processing (like PHP or Node.js). S3 only serves static files. For dynamic sites, use EC2 or Elastic Beanstalk."}}},
{en:"Which are AWS Well-Architected Framework pillars? (Choose TWO)",pt:"Quais sao pilares do AWS Well-Architected Framework? (Escolha DOIS)",o:{en:["Multiple Availability Zones","Performance Efficiency","Security","Encryption usage","High Availability"],pt:["Multiplas Zonas de Disponibilidade","Eficiencia de Performance","Seguranca","Uso de criptografia","Alta Disponibilidade"]},a:[1,2],multi:true,exp:{pt:{tech:"Os 6 pilares do Well-Architected Framework sao: Excelencia Operacional, Seguranca, Confiabilidade, Eficiencia de Performance, Otimizacao de Custos e Sustentabilidade. Multi-AZ, criptografia e alta disponibilidade sao praticas, nao pilares.",simple:"Performance Efficiency e Security sao dois dos seis pilares do AWS Well-Architected Framework. Os pilares guiam decisoes de arquitetura para construir sistemas seguros, eficientes e confiaveis na AWS.",avoid:"Nao confunda pilares com praticas especificas. Multi-AZ e criptografia sao praticas recomendadas, mas nao sao pilares. Os seis pilares sao: Seguranca, Confiabilidade, Eficiencia de Performance, Excelencia Operacional, Otimizacao de Custos e Sustentabilidade."},en:{tech:"The 6 pillars of the Well-Architected Framework are: Operational Excellence, Security, Reliability, Performance Efficiency, Cost Optimization, and Sustainability. Multi-AZ, encryption, and high availability are practices, not pillars.",simple:"Performance Efficiency and Security are two of the six pillars of the AWS Well-Architected Framework. The pillars guide architecture decisions to build secure, efficient, and reliable systems on AWS.",avoid:"Do not confuse pillars with specific practices. Multi-AZ and encryption are recommended practices, but they are not pillars. The six pillars are: Security, Reliability, Performance Efficiency, Operational Excellence, Cost Optimization, and Sustainability."}}},
{en:"Which service identifies security groups with unrestricted access?",pt:"Qual servico identifica security groups com acesso irrestrito?",o:{en:["AWS Trusted Advisor","Amazon Inspector","Amazon CloudWatch","AWS CloudTrail"],pt:["AWS Trusted Advisor","Amazon Inspector","Amazon CloudWatch","AWS CloudTrail"]},a:[0],exp:{pt:{tech:"AWS Trusted Advisor verifica security groups para portas com acesso irrestrito (0.0.0.0/0) como parte das verificacoes de seguranca. Fornece recomendacoes para restringir acesso e melhorar a postura de seguranca.",simple:"O AWS Trusted Advisor analisa sua conta e identifica security groups com acesso irrestrito (portas abertas para qualquer IP). Ele fornece recomendacoes para corrigir essas vulnerabilidades.",avoid:"Nao confunda Trusted Advisor com GuardDuty. O Trusted Advisor verifica configuracoes e boas praticas, enquanto o GuardDuty monitora ameacas ativas em tempo real. Eles sao complementares."},en:{tech:"AWS Trusted Advisor checks security groups for ports with unrestricted access (0.0.0.0/0) as part of security checks. It provides recommendations to restrict access and improve security posture.",simple:"AWS Trusted Advisor scans your account and identifies security groups with unrestricted access (ports open to any IP). It provides recommendations to fix these vulnerabilities.",avoid:"Do not confuse Trusted Advisor with GuardDuty. Trusted Advisor checks configurations and best practices, while GuardDuty monitors active threats in real time. They are complementary."}}},
{en:"When re-architecting a monolith application, which design principles apply? (Choose TWO)",pt:"Ao rearquitetar uma aplicacao monolitica, quais principios de design se aplicam? (Escolha DOIS)",o:{en:["Use manual monitoring and testing","Implement fixed server architecture","Implement loose coupling","Rely on individual components to detect failures","Design for scalability"],pt:["Usar monitoramento e testes manuais","Implementar arquitetura de servidor fixo","Implementar acoplamento fraco","Confiar em componentes individuais para detectar falhas","Projetar para escalabilidade"]},a:[2,4],multi:true,exp:{pt:{tech:"Ao migrar de monolito para microsservicos, loose coupling garante que componentes sejam independentes e design for scalability garante que o sistema escale horizontalmente conforme a demanda.",simple:"Acoplamento fraco permite que cada componente funcione independentemente, facilitando manutencao e atualizacoes. Projetar para escalabilidade garante que o sistema possa crescer conforme a demanda aumenta.",avoid:"Nao mantenha um monolito com componentes fortemente acoplados se voce planeja escalar. Tambem nao projete microsservicos sem pensar em como cada um vai escalar independentemente."},en:{tech:"When migrating from monolith to microservices, loose coupling ensures components are independent, and design for scalability ensures the system scales horizontally based on demand.",simple:"Loose coupling allows each component to function independently, making maintenance and updates easier. Designing for scalability ensures the system can grow as demand increases.",avoid:"Do not keep a monolith with tightly coupled components if you plan to scale. Also do not design microservices without thinking about how each one will scale independently."}}},
{en:"Which service automatically adds or removes EC2 instances based on demand?",pt:"Qual servico adiciona ou remove instancias EC2 automaticamente com base na demanda?",o:{en:["Elastic Load Balancer","Amazon EC2 Auto Scaling","Amazon Route 53","Amazon CloudFront"],pt:["Elastic Load Balancer","Amazon EC2 Auto Scaling","Amazon Route 53","Amazon CloudFront"]},a:[1],exp:{pt:{tech:"Amazon EC2 Auto Scaling monitora a carga das instancias e automaticamente adiciona (scale out) ou remove (scale in) instancias EC2 de acordo com politicas definidas, mantendo performance e otimizando custos.",simple:"O Amazon EC2 Auto Scaling monitora a demanda e adiciona ou remove instancias EC2 automaticamente. Voce define politicas de escalamento baseadas em metricas como uso de CPU ou numero de requisicoes.",avoid:"Nao confunda Auto Scaling com Elastic Load Balancing. O Auto Scaling ajusta a quantidade de instancias, enquanto o ELB distribui o trafego entre elas. Os dois trabalham juntos mas tem funcoes diferentes."},en:{tech:"Amazon EC2 Auto Scaling monitors instance load and automatically adds (scale out) or removes (scale in) EC2 instances according to defined policies, maintaining performance and optimizing costs.",simple:"Amazon EC2 Auto Scaling monitors demand and automatically adds or removes EC2 instances. You define scaling policies based on metrics like CPU usage or number of requests.",avoid:"Do not confuse Auto Scaling with Elastic Load Balancing. Auto Scaling adjusts the number of instances, while ELB distributes traffic among them. They work together but have different functions."}}},
{en:"What is the minimum support plan that includes free Infrastructure Event Management?",pt:"Qual e o plano de suporte minimo que inclui Infrastructure Event Management gratuito?",o:{en:["Enterprise","Business","Developer","Basic"],pt:["Enterprise","Business","Developer","Basic"]},a:[0],exp:{pt:{tech:"Infrastructure Event Management (IEM) e incluido gratuitamente apenas no plano Enterprise. No plano Business, esta disponivel por um custo adicional. Developer e Basic nao oferecem esse recurso.",simple:"O plano Enterprise e o unico que inclui Infrastructure Event Management (IEM) gratuito. O IEM oferece suporte planejado da AWS durante eventos criticos como lancamentos de produtos ou picos de trafego.",avoid:"Nao espere ter IEM gratuito no plano Business. No Business, o IEM esta disponivel por um custo adicional. Nos planos Developer e Basic, o IEM nao esta disponivel."},en:{tech:"Infrastructure Event Management (IEM) is included for free only in the Enterprise plan. In the Business plan, it is available for an additional cost. Developer and Basic do not offer this feature.",simple:"The Enterprise plan is the only one that includes free Infrastructure Event Management (IEM). IEM provides planned AWS support during critical events like product launches or traffic spikes.",avoid:"Do not expect to have free IEM on the Business plan. On Business, IEM is available for an additional cost. On Developer and Basic plans, IEM is not available."}}},
{en:"Which service can query S3 data with standard SQL?",pt:"Qual servico pode consultar dados no S3 com SQL padrao?",o:{en:["AWS Glue","AWS Data Pipeline","Amazon CloudSearch","Amazon Athena"],pt:["AWS Glue","AWS Data Pipeline","Amazon CloudSearch","Amazon Athena"]},a:[3],exp:{pt:{tech:"Amazon Athena e um servico de consulta interativo e serverless que permite analisar dados diretamente no S3 usando SQL padrao. Nao requer infraestrutura — voce paga apenas pelas consultas executadas.",simple:"O Amazon Athena permite executar consultas SQL diretamente nos dados armazenados no S3, sem precisar carregar os dados em um banco de dados separado. Voce paga apenas pelas consultas executadas.",avoid:"Nao use Athena para consultas transacionais frequentes ou cargas de trabalho com baixa latencia. Athena e otimizado para analise ad-hoc de grandes conjuntos de dados, nao para operacoes em tempo real."},en:{tech:"Amazon Athena is an interactive, serverless query service that lets you analyze data directly in S3 using standard SQL. No infrastructure required — you pay only for queries executed.",simple:"Amazon Athena lets you run SQL queries directly on data stored in S3, without needing to load data into a separate database. You only pay for the queries you run.",avoid:"Do not use Athena for frequent transactional queries or low-latency workloads. Athena is optimized for ad-hoc analysis of large datasets, not for real-time operations."}}},
{en:"Which is an AWS managed NoSQL database?",pt:"Qual e um banco de dados NoSQL gerenciado pela AWS?",o:{en:["Amazon Redshift","Amazon DynamoDB","Amazon Aurora","Amazon RDS for MariaDB"],pt:["Amazon Redshift","Amazon DynamoDB","Amazon Aurora","Amazon RDS for MariaDB"]},a:[1],exp:{pt:{tech:"Amazon DynamoDB e um banco de dados NoSQL key-value e de documentos totalmente gerenciado, com latencia em milissegundos e escalabilidade automatica. Redshift, Aurora e RDS for MariaDB sao todos relacionais.",simple:"O Amazon DynamoDB e o banco de dados NoSQL totalmente gerenciado da AWS. Ele armazena dados em formato de chave-valor e documentos, com performance de milissegundos em qualquer escala.",avoid:"Nao use DynamoDB para consultas que exigem joins complexos ou transacoes relacionais. Para esses casos, use um banco relacional como RDS ou Aurora."},en:{tech:"Amazon DynamoDB is a fully managed NoSQL key-value and document database with single-digit millisecond latency and automatic scaling. Redshift, Aurora, and RDS for MariaDB are all relational.",simple:"Amazon DynamoDB is AWS fully managed NoSQL database. It stores data in key-value and document format, with millisecond performance at any scale.",avoid:"Do not use DynamoDB for queries requiring complex joins or relational transactions. For those cases, use a relational database like RDS or Aurora."}}},
{en:"What is the correct relationship between regions, Availability Zones, and edge locations?",pt:"Qual e a relacao correta entre regioes, Zonas de Disponibilidade e edge locations?",o:{en:["Data centers contain regions","Regions contain Availability Zones","Availability Zones contain edge locations","Edge locations contain regions"],pt:["Data centers contem regioes","Regioes contem Zonas de Disponibilidade","Zonas de Disponibilidade contem edge locations","Edge locations contem regioes"]},a:[1],exp:{pt:{tech:"A hierarquia da AWS e: Regioes contem multiplas AZs (cada AZ tem um ou mais datacenters). Edge locations sao pontos de presenca separados usados por CloudFront e Route 53, nao contidos em AZs.",simple:"Uma regiao AWS contem multiplas Availability Zones, e cada AZ contem um ou mais datacenters. As regioes sao areas geograficas independentes, e as AZs sao locais isolados dentro de uma regiao.",avoid:"Nao confunda edge locations com Availability Zones. Edge locations sao pontos de presenca para servicos como CloudFront e estao fora da hierarquia de regioes e AZs."},en:{tech:"The AWS hierarchy is: Regions contain multiple AZs (each AZ has one or more datacenters). Edge locations are separate points of presence used by CloudFront and Route 53, not contained within AZs.",simple:"An AWS Region contains multiple Availability Zones, and each AZ contains one or more datacenters. Regions are independent geographic areas, and AZs are isolated locations within a region.",avoid:"Do not confuse edge locations with Availability Zones. Edge locations are points of presence for services like CloudFront and are outside the hierarchy of regions and AZs."}}},
{en:"Which security service classifies sensitive data automatically?",pt:"Qual servico de seguranca classifica dados sensiveis automaticamente?",o:{en:["Amazon GuardDuty","Amazon Macie","Amazon Inspector","AWS Shield"],pt:["Amazon GuardDuty","Amazon Macie","Amazon Inspector","AWS Shield"]},a:[1],exp:{pt:{tech:"Amazon Macie usa machine learning e correspondencia de padroes para descobrir e classificar automaticamente dados sensiveis (PII, dados financeiros, credenciais) armazenados no Amazon S3.",simple:"O Amazon Macie usa machine learning para descobrir e classificar automaticamente dados sensiveis armazenados no S3, como informacoes pessoais e financeiras. Ele gera alertas quando encontra dados expostos.",avoid:"Nao use Macie para monitorar ameacas de rede ou atividades suspeitas na conta, pois isso e funcao do GuardDuty. Macie e especifico para classificacao e protecao de dados sensiveis no S3."},en:{tech:"Amazon Macie uses machine learning and pattern matching to automatically discover and classify sensitive data (PII, financial data, credentials) stored in Amazon S3.",simple:"Amazon Macie uses machine learning to automatically discover and classify sensitive data stored in S3, such as personal and financial information. It generates alerts when it finds exposed data.",avoid:"Do not use Macie to monitor network threats or suspicious account activity, as that is GuardDuty function. Macie is specific to classifying and protecting sensitive data in S3."}}},
{en:"What are benefits of using On-Demand EC2 instances? (Choose TWO)",pt:"Quais sao beneficios de usar instancias EC2 On-Demand? (Escolha DOIS)",o:{en:["Free capacity available for testing","Cheaper than all other options","Remove the need for safety net capacity planning","Setup takes only 1-2 days","Increase or decrease capacity based on demand"],pt:["Capacidade gratuita disponivel para testes","Mais barato que todas as outras opcoes","Elimina a necessidade de planejamento de capacidade de reserva","Configuracao leva apenas 1-2 dias","Aumentar ou diminuir capacidade com base na demanda"]},a:[2,4],multi:true,exp:{pt:{tech:"Instancias On-Demand eliminam a necessidade de prever capacidade e comprar hardware antecipadamente. Voce pode aumentar ou diminuir recursos instantaneamente conforme a demanda, pagando apenas pelo uso.",simple:"Instancias On-Demand eliminam a necessidade de planejar capacidade antecipadamente e permitem aumentar ou diminuir recursos conforme a demanda. Voce paga por hora ou segundo sem compromisso de longo prazo.",avoid:"Nao use On-Demand para cargas de trabalho estaveis e previsiveis de longo prazo, pois Reserved Instances ou Savings Plans oferecem descontos significativos. On-Demand e ideal para demandas variaveis ou temporarias."},en:{tech:"On-Demand instances eliminate the need to forecast capacity and purchase hardware upfront. You can instantly increase or decrease resources based on demand, paying only for usage.",simple:"On-Demand instances eliminate the need to plan capacity in advance and let you increase or decrease resources based on demand. You pay by the hour or second with no long-term commitment.",avoid:"Do not use On-Demand for stable and predictable long-term workloads, as Reserved Instances or Savings Plans offer significant discounts. On-Demand is ideal for variable or temporary demands."}}}];

let activeQ = [];
let userAnswers = [];

function shuffle(arr){
  const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;
}

function pickQuestions(){
  activeQ=shuffle(Q).slice(0,65);
  userAnswers=new Array(65).fill(null);
  lockedQuestions=new Set();
  studyCorrect=0;studyAnswered=0;
}

function setLang(l){
  lang=l;
  document.getElementById('btn-pt').classList.toggle('active',l==='pt');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  document.getElementById('btn-study').textContent=ui[l].modeStudy;
  document.getElementById('btn-exam').textContent=ui[l].modeExam;
  updateStartScreen();
  if(document.getElementById('quiz-section').style.display!=='none'){
    renderQuiz();updateProgress();
    document.getElementById('btn-submit').textContent=ui[lang].submit;
    if(mode==='study') updateStudyScore();
  }
}

function setMode(m){
  if(document.getElementById('quiz-section').style.display!=='none') return;
  mode=m;
  document.getElementById('btn-study').classList.toggle('active',m==='study');
  document.getElementById('btn-exam').classList.toggle('active',m==='exam');
  updateStartScreen();
}

function newQuiz(){
  document.getElementById('results-section').style.display='none';
  document.getElementById('quiz-section').style.display='none';
  document.getElementById('start-screen').style.display='block';
  updateStartScreen();
}

function updateStartScreen(){
  const t=ui[lang];
  document.getElementById('header-sub').textContent=t.sub();
  document.getElementById('start-title').textContent=mode==='study'?t.startStudy:t.startExam;
  document.getElementById('start-desc').textContent=mode==='study'?t.descStudy:t.descExam;
  document.getElementById('btn-start').textContent=t.btnStart;
}

function startQuiz(){
  document.getElementById('start-screen').style.display='none';
  document.getElementById('quiz-section').style.display='block';
  document.getElementById('results-section').style.display='none';
  pickQuestions();
  if(mode==='exam'){
    document.getElementById('timer-bar').style.display='block';
    document.getElementById('study-score').style.display='none';
    timeLeft=3600;updateTimerDisplay();
    timerInterval=setInterval(()=>{timeLeft--;updateTimerDisplay();if(timeLeft<=0){clearInterval(timerInterval);submitQuiz();}},1000);
  } else {
    document.getElementById('timer-bar').style.display='none';
    document.getElementById('study-score').style.display='block';
    updateStudyScore();
  }
  renderQuiz();updateProgress();
  document.getElementById('btn-submit').textContent=ui[lang].submit;
}

function updateTimerDisplay(){
  const m=Math.floor(timeLeft/60),s=timeLeft%60;
  const el=document.getElementById('timer');
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.classList.toggle('warn',timeLeft<=300);
}

function updateStudyScore(){
  document.getElementById('ss-text').innerHTML=ui[lang].studyScore(studyCorrect,studyAnswered);
}

function renderQuiz(){
  const c=document.getElementById('questions-container');c.innerHTML='';
  const L=['A','B','C','D','E'];
  activeQ.forEach((q,i)=>{
    const isMulti=q.multi||false;const needed=q.a.length;
    const qText=q[lang];const opts=q.o[lang];
    let note=isMulti?`<div class="q-note">${ui[lang].choose(needed)}</div>`:'';
    let optHtml='';
    opts.forEach((opt,j)=>{
      const sel=userAnswers[i]&&userAnswers[i].includes(j)?'selected':'';
      const locked=lockedQuestions.has(i)?'locked':'';
      let reveal='';
      if(mode==='study'&&lockedQuestions.has(i)){
        if(q.a.includes(j)) reveal='correct-reveal';
        else if(userAnswers[i]&&userAnswers[i].includes(j)) reveal='wrong-reveal';
      }
      optHtml+=`<div class="option ${isMulti?'multi':''} ${sel} ${locked} ${reveal}" onclick="selectOption(${i},${j},${isMulti})" id="opt-${i}-${j}">
        <div class="check"></div><span class="letter">${L[j]}.</span><span class="text">${opt}</span></div>`;
    });
    const answered=userAnswers[i]&&userAnswers[i].length>0?'answered':'';
    let studyClass='';
    if(mode==='study'&&lockedQuestions.has(i)){
      const ca=[...q.a].sort();const ua=[...(userAnswers[i]||[])].sort();
      const ok=ua.length===ca.length&&ua.every((v,j)=>v===ca[j]);
      studyClass=ok?'study-right':'study-wrong';
    }
    let confirmBtn='';
    if(mode==='study'&&isMulti&&!lockedQuestions.has(i)){
      confirmBtn=`<button class="btn-confirm" id="confirm-${i}" onclick="confirmMulti(${i})">${ui[lang].confirmMulti}</button>`;
    }
    let expHtml='';
    if(mode==='study'&&lockedQuestions.has(i)){
      const ca=[...q.a].sort();const ua=[...(userAnswers[i]||[])].sort();
      const ok=ua.length===ca.length&&ua.every((v,j)=>v===ca[j]);
      const badge=ok?`<div class="study-badge right">${ui[lang].rightBadge}</div>`:`<div class="study-badge wrong">${ui[lang].wrongBadge}</div>`;
      const exp=q.exp[lang];
      expHtml=`${badge}<div class="explanation show">
        <div class="exp-label" style="color:#60a5fa">&#128218; ${ui[lang].techLabel}</div>
        <div class="exp-tech">${exp.tech}</div>
        <div class="exp-label" style="color:#a78bfa">&#128161; ${ui[lang].simpleLabel}</div>
        <div class="exp-simple">${exp.simple}</div>
        ${exp.avoid?'<div class="exp-label" style="color:#f87171">&#9940; '+ui[lang].avoidLabel+'</div><div class="exp-avoid">'+exp.avoid+'</div>':''}</div>`;
    }
    c.innerHTML+=`<div class="question-card ${answered} ${studyClass}" id="card-${i}">
      <div class="q-number">${ui[lang].qOf(i+1)}</div>
      <div class="q-text">${qText}</div>${note}
      <div class="options">${optHtml}</div>${confirmBtn}${expHtml}</div>`;
  });
}

function selectOption(qi,oi,multi){
  if(lockedQuestions.has(qi)) return;
  if(multi){
    if(!Array.isArray(userAnswers[qi])) userAnswers[qi]=[];
    const idx=userAnswers[qi].indexOf(oi);
    if(idx>-1){userAnswers[qi].splice(idx,1);document.getElementById(`opt-${qi}-${oi}`).classList.remove('selected');}
    else{userAnswers[qi].push(oi);document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');}
    if(userAnswers[qi].length===0) userAnswers[qi]=null;
    const btn=document.getElementById(`confirm-${qi}`);
    if(btn) btn.style.display=userAnswers[qi]&&userAnswers[qi].length>0?'block':'none';
  } else {
    activeQ[qi].o[lang].forEach((_,j)=>{document.getElementById(`opt-${qi}-${j}`).classList.remove('selected');});
    userAnswers[qi]=[oi];
    document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
    if(mode==='study') checkStudyAnswer(qi);
  }
  const card=document.getElementById(`card-${qi}`);
  if(userAnswers[qi]&&userAnswers[qi].length>0) card.classList.add('answered');
  else card.classList.remove('answered');
  updateProgress();
}

function confirmMulti(qi){
  if(mode==='study') checkStudyAnswer(qi);
}

function checkStudyAnswer(qi){
  if(lockedQuestions.has(qi)) return;
  lockedQuestions.add(qi);studyAnswered++;
  const ca=[...activeQ[qi].a].sort();const ua=[...(userAnswers[qi]||[])].sort();
  const ok=ua.length===ca.length&&ua.every((v,j)=>v===ca[j]);
  if(ok) studyCorrect++;
  updateStudyScore();
  renderQuiz();updateProgress();
  const card=document.getElementById(`card-${qi}`);
  if(card) card.scrollIntoView({behavior:'smooth',block:'center'});
}

function updateProgress(){
  const answered=mode==='study'?studyAnswered:userAnswers.filter(a=>a!==null&&a.length>0).length;
  document.getElementById('progress-text').textContent=ui[lang].progress(answered);
  document.getElementById('progress-fill').style.width=`${(answered/65)*100}%`;
}

function submitQuiz(){
  if(timerInterval) clearInterval(timerInterval);
  const answered=userAnswers.filter(a=>a!==null&&a.length>0).length;
  if(mode==='exam'&&answered<65&&timeLeft>0){
    if(!confirm(ui[lang].confirmMsg(answered))) return;
  }
  let correct=0,wrong=0,unanswered=0;
  const L=['A','B','C','D','E'];
  const rc=document.getElementById('review-container');rc.innerHTML='';
  activeQ.forEach((q,i)=>{
    const ua=userAnswers[i];const ca=[...q.a].sort();let ok=false;
    if(ua&&ua.length>0){const s=[...ua].sort();ok=s.length===ca.length&&s.every((v,j)=>v===ca[j]);if(ok)correct++;else wrong++;}
    else unanswered++;
    const status=!ua||ua.length===0?'wrong':(ok?'right':'wrong');
    const t=ui[lang];
    const tag=!ua||ua.length===0?t.tagNone:(ok?t.tagRight:t.tagWrong);
    const yours=ua&&ua.length>0?ua.map(x=>L[x]).join(', '):'\u2014';
    const corr=ca.map(x=>L[x]).join(', ');
    const exp=q.exp[lang];
    const expBlock=ok?'':`<div class="explanation show" style="margin-top:12px">
      <div class="exp-label" style="color:#60a5fa">&#128218; ${t.techLabel}</div>
      <div class="exp-tech">${exp.tech}</div>
      <div class="exp-label" style="color:#a78bfa">&#128161; ${t.simpleLabel}</div>
      <div class="exp-simple">${exp.simple}</div>
      ${exp.avoid?'<div class="exp-label" style="color:#f87171">&#9940; '+t.avoidLabel+'</div><div class="exp-avoid">'+exp.avoid+'</div>':''}</div>`;
    rc.innerHTML+=`<div class="review-card ${status}">
      <div class="q-head"><span style="color:#94a3b8;font-size:.85rem">${t.qOf(i+1)}</span><span class="tag ${status}">${tag}</span></div>
      <div class="q-text">${q[lang]}</div>
      <div class="answer-line"><span class="label-ans">${t.yourAns}</span><span class="${ok?'val-correct':'val-wrong'}">${yours}</span></div>
      <div class="answer-line"><span class="label-ans">${t.correctAns}</span><span class="val-correct">${corr}</span></div>
      ${expBlock}</div>`;
  });
  const pct=Math.round((correct/65)*100);const passed=pct>=70;const t=ui[lang];
  document.getElementById('score-pct').textContent=`${pct}%`;
  document.getElementById('score-pct').className=`score ${passed?'pass':'fail'}`;
  document.getElementById('score-label').textContent=t.of65(correct);
  document.getElementById('verdict').textContent=passed?t.pass:t.fail;
  document.getElementById('verdict').className=`verdict ${passed?'pass':'fail'}`;
  document.getElementById('res-correct').textContent=t.correct(correct);
  document.getElementById('res-wrong').textContent=t.wrong(wrong);
  document.getElementById('res-unanswered').textContent=unanswered>0?t.unanswered(unanswered):'';
  document.getElementById('review-title').textContent=t.reviewTitle;
  document.getElementById('btn-top').textContent=t.backTop;
  document.getElementById('btn-new').textContent=t.newQuiz;
  document.getElementById('quiz-section').style.display='none';
  document.getElementById('results-section').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

updateStartScreen();
</script>
</body>
</html>
