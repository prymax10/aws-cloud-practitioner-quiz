{en:"Which statement best describes the Operational Excellence pillar of the AWS Well-Architected Framework?",pt:"Qual afirmacao descreve melhor o pilar de Excelencia Operacional do AWS Well-Architected Framework?",o:{en:["The ability of a system to recover gracefully from failure","The efficient use of computing resources to meet requirements","The ability to monitor systems and improve supporting processes and procedures","The ability to manage datacenter operations more efficiently"],pt:["A capacidade de um sistema se recuperar de falhas","O uso eficiente de recursos computacionais para atender requisitos","A capacidade de monitorar sistemas e melhorar processos e procedimentos de suporte","A capacidade de gerenciar operacoes de datacenter com mais eficiencia"]},a:[2],exp:{pt:{tech:"Excelencia Operacional foca em executar e monitorar sistemas, e melhorar continuamente processos e procedimentos. Inclui automacao, resposta a eventos e aprendizado com falhas.",simple:"O pilar de Excelencia Operacional foca em monitorar sistemas e melhorar continuamente processos e procedimentos. Inclui automacao de mudancas, resposta a eventos e definicao de padroes operacionais.",avoid:"Nao confunda Excelencia Operacional com os outros pilares. Seguranca foca em protecao, Confiabilidade em recuperacao de falhas, Performance em uso eficiente de recursos, e Custo em evitar gastos desnecessarios."},en:{tech:"Operational Excellence focuses on running and monitoring systems, and continually improving processes and procedures. It includes automation, event response, and learning from failures.",simple:"The Operational Excellence pillar focuses on monitoring systems and continuously improving processes and procedures. It includes automating changes, responding to events, and defining operational standards.",avoid:"Do not confuse Operational Excellence with the other pillars. Security focuses on protection, Reliability on failure recovery, Performance on efficient resource use, and Cost on avoiding unnecessary spending."}}},
{en:"Which is NOT a benefit of using Edge Locations?",pt:"Qual NAO e um beneficio do uso de Edge Locations?",o:{en:["Cache the most recent responses","Improve end users' experience when uploading files","Distribute traffic across multiple instances to reduce latency","Distribute content to global users with low latency"],pt:["Armazenar em cache as respostas mais recentes","Melhorar a experiencia dos usuarios ao fazer upload de arquivos","Distribuir trafego entre multiplas instancias para reduzir latencia","Distribuir conteudo para usuarios globais com baixa latencia"]},a:[2],exp:{pt:{tech:"Edge Locations fazem cache e distribuicao de conteudo (CDN), nao balanceamento de carga entre instancias EC2. Distribuir trafego entre instancias e funcao do Elastic Load Balancer.",simple:"Edge Locations servem para armazenar cache e distribuir conteudo proximo aos usuarios. Distribuir trafego entre instancias para reduzir latencia e funcao de um Load Balancer, nao de Edge Locations.",avoid:"Nao confunda Edge Locations com Load Balancers. Edge Locations fazem cache de conteudo em pontos globais. Load Balancers distribuem requisicoes entre instancias de backend. Sao funcoes diferentes."},en:{tech:"Edge Locations do caching and content distribution (CDN), not load balancing across EC2 instances. Distributing traffic across instances is the Elastic Load Balancer's job.",simple:"Edge Locations are for caching and distributing content close to users. Distributing traffic across instances to reduce latency is the function of a Load Balancer, not Edge Locations.",avoid:"Do not confuse Edge Locations with Load Balancers. Edge Locations cache content at global points. Load Balancers distribute requests among backend instances. These are different functions."}}},
{en:"Which services are change management tools for auditing resource changes? (Choose TWO)",pt:"Quais servicos sao ferramentas de gerenciamento de mudancas para auditar alteracoes de recursos? (Escolha DOIS)",o:{en:["AWS CloudTrail","Amazon Comprehend","AWS Transit Gateway","AWS X-Ray","AWS Config"],pt:["AWS CloudTrail","Amazon Comprehend","AWS Transit Gateway","AWS X-Ray","AWS Config"]},a:[0,4],multi:true,exp:{pt:{tech:"CloudTrail registra chamadas de API (quem fez o que). AWS Config registra o estado e mudancas de configuracao dos recursos ao longo do tempo. Juntos, oferecem auditoria completa.",simple:"O AWS CloudTrail registra acoes de usuarios e chamadas de API. O AWS Config registra o estado e as mudancas na configuracao dos recursos ao longo do tempo. Juntos, eles fornecem uma visao completa de auditoria.",avoid:"Nao use apenas um deles para auditoria completa. CloudTrail mostra quem fez o que, enquanto Config mostra como os recursos estavam antes e depois. Para auditorias, voce normalmente precisa de ambos."},en:{tech:"CloudTrail records API calls (who did what). AWS Config records resource configuration state and changes over time. Together, they provide complete auditing.",simple:"AWS CloudTrail records user actions and API calls. AWS Config records the state and configuration changes of resources over time. Together, they provide a complete audit view.",avoid:"Do not use only one of them for complete auditing. CloudTrail shows who did what, while Config shows how resources were before and after. For audits, you typically need both."}}},
{en:"Which service allows you to run containerized applications on a cluster of EC2 instances?",pt:"Qual servico permite executar aplicacoes em conteineres em um cluster de instancias EC2?",o:{en:["Amazon ECS","AWS Data Pipeline","AWS Cloud9","AWS Personal Health Dashboard"],pt:["Amazon ECS","AWS Data Pipeline","AWS Cloud9","AWS Personal Health Dashboard"]},a:[0],exp:{pt:{tech:"O Amazon ECS (Elastic Container Service) e o servico de orquestracao de conteineres da AWS que gerencia a execucao de conteineres Docker em clusters de instancias EC2 ou Fargate.",simple:"O Amazon ECS e um servico de orquestracao de conteineres que gerencia a execucao de conteineres Docker em um cluster de instancias EC2. Ele cuida do posicionamento, escala e monitoramento dos conteineres.",avoid:"Nao confunda ECS com ECR. O ECR e um registro de imagens de conteineres (onde voce guarda as imagens), enquanto o ECS e o servico que executa essas imagens. Tambem considere EKS se voce precisa de Kubernetes."},en:{tech:"Amazon ECS (Elastic Container Service) is AWS's container orchestration service that manages Docker container execution on clusters of EC2 instances or Fargate.",simple:"Amazon ECS is a container orchestration service that manages running Docker containers on a cluster of EC2 instances. It handles container placement, scaling, and monitoring.",avoid:"Do not confuse ECS with ECR. ECR is a container image registry (where you store images), while ECS is the service that runs those images. Also consider EKS if you need Kubernetes."}}},
{en:"Which AWS feature takes advantage of CloudFront's edge locations to transfer files to S3 faster?",pt:"Qual recurso AWS aproveita os edge locations do CloudFront para transferir arquivos para o S3 mais rapido?",o:{en:["S3 Transfer Acceleration","AWS WAF","AWS Snowmobile","AWS Snowball"],pt:["S3 Transfer Acceleration","AWS WAF","AWS Snowmobile","AWS Snowball"]},a:[0],exp:{pt:{tech:"O S3 Transfer Acceleration usa os Edge Locations do CloudFront como pontos de entrada otimizados, roteando dados pela rede interna da AWS (mais rapida) ate o bucket S3 de destino.",simple:"O S3 Transfer Acceleration usa as Edge Locations do CloudFront para acelerar uploads para o S3. Os dados sao enviados para a Edge Location mais proxima e depois transferidos pela rede interna otimizada da AWS.",avoid:"Nao ative Transfer Acceleration se seus usuarios ja estao proximos da regiao do bucket S3. O beneficio e maior para transferencias de longa distancia. Tambem nao confunda com CloudFront, que acelera downloads."},en:{tech:"S3 Transfer Acceleration uses CloudFront Edge Locations as optimized entry points, routing data through AWS's internal network (faster) to the destination S3 bucket.",simple:"S3 Transfer Acceleration uses CloudFront Edge Locations to speed up uploads to S3. Data is sent to the nearest Edge Location and then transferred over the optimized AWS internal network.",avoid:"Do not enable Transfer Acceleration if your users are already close to the S3 bucket region. The benefit is greater for long-distance transfers. Also do not confuse with CloudFront, which accelerates downloads."}}},
{en:"Which AWS security feature filters incoming traffic for an EC2 instance?",pt:"Qual recurso de seguranca AWS filtra o trafego de entrada para uma instancia EC2?",o:{en:["AWS X-Ray","Network ACL","Security Groups","VPC Flow logs"],pt:["AWS X-Ray","Network ACL","Security Groups","VPC Flow logs"]},a:[2],exp:{pt:{tech:"Security Groups atuam como firewalls virtuais no nivel da instancia EC2, controlando trafego de entrada e saida. Sao stateful (se permite entrada, a resposta sai automaticamente). Network ACL e no nivel da sub-rede.",simple:"Security Groups funcionam como um firewall virtual para instancias EC2, controlando o trafego de entrada e saida. Por padrao, todo trafego de entrada e bloqueado e todo trafego de saida e permitido.",avoid:"Nao confunda Security Groups com Network ACLs. Security Groups operam no nivel da instancia e sao stateful (respostas automaticas). Network ACLs operam no nivel da sub-rede e sao stateless."},en:{tech:"Security Groups act as virtual firewalls at the EC2 instance level, controlling inbound and outbound traffic. They're stateful (if inbound is allowed, the response goes out automatically). Network ACL is at the subnet level.",simple:"Security Groups act as a virtual firewall for EC2 instances, controlling inbound and outbound traffic. By default, all inbound traffic is blocked and all outbound traffic is allowed.",avoid:"Do not confuse Security Groups with Network ACLs. Security Groups operate at the instance level and are stateful (automatic responses). Network ACLs operate at the subnet level and are stateless."}}},
{en:"Where can you store files in AWS? (Choose TWO)",pt:"Onde voce pode armazenar arquivos na AWS? (Escolha DOIS)",o:{en:["Amazon EFS","Amazon SNS","Amazon EBS","Amazon ECS","Amazon EMR"],pt:["Amazon EFS","Amazon SNS","Amazon EBS","Amazon ECS","Amazon EMR"]},a:[0,2],multi:true,exp:{pt:{tech:"EFS (Elastic File System) e armazenamento de arquivos compartilhado. EBS (Elastic Block Store) e armazenamento em bloco para EC2. SNS e notificacoes, ECS e conteineres, EMR e processamento de big data.",simple:"O Amazon EFS e um sistema de arquivos compartilhado que pode ser montado por multiplas instancias EC2 simultaneamente. O Amazon EBS e um disco de armazenamento em bloco que se conecta a uma unica instancia EC2.",avoid:"Nao confunda EFS e EBS com S3. O S3 e armazenamento de objetos acessado via API, nao um sistema de arquivos que voce monta. Use EBS para disco dedicado e EFS para compartilhamento entre instancias."},en:{tech:"EFS (Elastic File System) is shared file storage. EBS (Elastic Block Store) is block storage for EC2. SNS is notifications, ECS is containers, EMR is big data processing.",simple:"Amazon EFS is a shared file system that can be mounted by multiple EC2 instances simultaneously. Amazon EBS is a block storage disk that attaches to a single EC2 instance.",avoid:"Do not confuse EFS and EBS with S3. S3 is object storage accessed via API, not a file system you mount. Use EBS for dedicated disk and EFS for sharing between instances."}}},
{en:"Which describes the payment model for committing to EC2 usage over 1 or 3-year terms?",pt:"Qual descreve o modelo de pagamento ao se comprometer com o uso de EC2 por 1 ou 3 anos?",o:{en:["Pay less as AWS grows","Pay as you go","Pay less by using more","Save when you reserve"],pt:["Pague menos conforme a AWS cresce","Pague conforme o uso","Pague menos usando mais","Economize ao reservar"]},a:[3],exp:{pt:{tech:"'Save when you reserve' e o principio de precificacao para Reserved Instances e Savings Plans. Ao se comprometer por 1 ou 3 anos, voce recebe descontos significativos sobre On-Demand.",simple:"Reservar capacidade por 1 ou 3 anos garante desconto significativo em troca do compromisso de uso. Quanto maior o pagamento antecipado e o prazo, maior o desconto.",avoid:"Nao reserve instancias se sua carga de trabalho e imprevisivel ou temporaria. Voce pagara pelo compromisso mesmo que nao use os recursos. Reserve apenas quando tiver certeza da demanda de longo prazo."},en:{tech:"'Save when you reserve' is the pricing principle for Reserved Instances and Savings Plans. By committing for 1 or 3 years, you get significant discounts over On-Demand.",simple:"Reserving capacity for 1 or 3 years gives significant discounts in exchange for a usage commitment. The higher the upfront payment and the longer the term, the bigger the discount.",avoid:"Do not reserve instances if your workload is unpredictable or temporary. You will pay for the commitment even if you do not use the resources. Reserve only when you are certain of long-term demand."}}},
{en:"What is the primary storage service used by Amazon RDS?",pt:"Qual e o servico de armazenamento principal usado pelo Amazon RDS?",o:{en:["Amazon Glacier","Amazon EBS","Amazon EFS","Amazon S3"],pt:["Amazon Glacier","Amazon EBS","Amazon EFS","Amazon S3"]},a:[1],exp:{pt:{tech:"O Amazon RDS usa volumes EBS (Elastic Block Store) como armazenamento primario para bancos de dados. EBS fornece armazenamento persistente em bloco otimizado para I/O de banco de dados.",simple:"O Amazon EBS e o armazenamento primario usado pelo Amazon RDS para guardar dados do banco. Ele fornece armazenamento em bloco persistente e de alta performance conectado as instancias de banco de dados.",avoid:"Nao confunda EBS com S3 para armazenamento de banco de dados. Bancos de dados relacionais precisam de armazenamento em bloco (EBS), nao de armazenamento de objetos (S3). S3 nao oferece o acesso de baixa latencia que bancos de dados exigem."},en:{tech:"Amazon RDS uses EBS (Elastic Block Store) volumes as primary storage for databases. EBS provides persistent block storage optimized for database I/O.",simple:"Amazon EBS is the primary storage used by Amazon RDS to store database data. It provides persistent, high-performance block storage attached to database instances.",avoid:"Do not confuse EBS with S3 for database storage. Relational databases need block storage (EBS), not object storage (S3). S3 does not provide the low-latency access that databases require."}}},
{en:"For troubleshooting performance in microservices, which AWS service should be used?",pt:"Para resolver problemas de performance em microsservicos, qual servico AWS deve ser usado?",o:{en:["AWS CodePipeline","AWS X-Ray","Amazon Inspector","AWS CloudTrail"],pt:["AWS CodePipeline","AWS X-Ray","Amazon Inspector","AWS CloudTrail"]},a:[1],exp:{pt:{tech:"O AWS X-Ray permite rastrear requisicoes atraves de microsservicos, identificando gargalos de performance e erros. Ele cria um 'mapa de servicos' visual mostrando como os componentes se comunicam.",simple:"O AWS X-Ray ajuda a rastrear requisicoes que passam por multiplos servicos em uma arquitetura de microsservicos. Ele mostra onde estao os gargalos de performance e erros em cada etapa.",avoid:"Nao use X-Ray para monitoramento basico de metricas como CPU ou memoria — para isso use CloudWatch. X-Ray e especifico para rastreamento distribuido e analise de latencia entre servicos."},en:{tech:"AWS X-Ray lets you trace requests across microservices, identifying performance bottlenecks and errors. It creates a visual 'service map' showing how components communicate.",simple:"AWS X-Ray helps trace requests that pass through multiple services in a microservices architecture. It shows where performance bottlenecks and errors are at each step.",avoid:"Do not use X-Ray for basic metrics monitoring like CPU or memory — for that use CloudWatch. X-Ray is specific to distributed tracing and latency analysis between services."}}},
{en:"Which AWS services have native Multi-AZ fault tolerance? (Choose TWO)",pt:"Quais servicos AWS tem tolerancia a falhas Multi-AZ nativa? (Escolha DOIS)",o:{en:["Amazon Redshift","AWS Snowball","Amazon S3","Amazon EBS","Amazon DynamoDB"],pt:["Amazon Redshift","AWS Snowball","Amazon S3","Amazon EBS","Amazon DynamoDB"]},a:[2,4],multi:true,exp:{pt:{tech:"S3 e DynamoDB sao projetados nativamente para armazenar dados em multiplas AZs automaticamente. EBS e limitado a uma unica AZ. Redshift precisa de configuracao manual para Multi-AZ.",simple:"O Amazon S3 e o Amazon DynamoDB replicam dados automaticamente em multiplas Zonas de Disponibilidade dentro de uma Regiao. Voce nao precisa configurar nada para ter essa redundancia.",avoid:"Nao assuma que todos os servicos AWS tem Multi-AZ nativo. O EBS, por exemplo, existe em uma unica AZ. Se a AZ falhar, voce precisa de snapshots ou replicas configuradas manualmente."},en:{tech:"S3 and DynamoDB are natively designed to store data across multiple AZs automatically. EBS is limited to a single AZ. Redshift needs manual Multi-AZ configuration.",simple:"Amazon S3 and Amazon DynamoDB automatically replicate data across multiple Availability Zones within a Region. You do not need to configure anything to have this redundancy.",avoid:"Do not assume all AWS services have native Multi-AZ. EBS, for example, exists in a single AZ. If the AZ fails, you need snapshots or manually configured replicas."}}},
{en:"Using Amazon EC2 falls under which cloud computing model?",pt:"Usar o Amazon EC2 se enquadra em qual modelo de computacao em nuvem?",o:{en:["IaaS & SaaS","IaaS","SaaS","PaaS"],pt:["IaaS e SaaS","IaaS","SaaS","PaaS"]},a:[1],exp:{pt:{tech:"O EC2 e Infrastructure as a Service (IaaS) — voce gerencia o SO, aplicacoes e dados. A AWS fornece a infraestrutura (servidores virtuais, rede, armazenamento).",simple:"O EC2 e um servico de Infrastructure as a Service (IaaS) porque a AWS fornece a maquina virtual e voce e responsavel por instalar e configurar o sistema operacional e aplicacoes. Voce tem controle total sobre a instancia.",avoid:"Nao confunda IaaS com PaaS ou SaaS. No IaaS voce gerencia quase tudo acima do hardware. Se voce quer que a AWS gerencie mais, use PaaS (Elastic Beanstalk) ou SaaS (servicos totalmente gerenciados)."},en:{tech:"EC2 is Infrastructure as a Service (IaaS) — you manage the OS, applications, and data. AWS provides the infrastructure (virtual servers, network, storage).",simple:"EC2 is an Infrastructure as a Service (IaaS) offering because AWS provides the virtual machine and you are responsible for installing and configuring the operating system and applications. You have full control over the instance.",avoid:"Do not confuse IaaS with PaaS or SaaS. In IaaS you manage almost everything above the hardware. If you want AWS to manage more, use PaaS (Elastic Beanstalk) or SaaS (fully managed services)."}}},
{en:"What does Amazon Elastic Beanstalk provide?",pt:"O que o Amazon Elastic Beanstalk fornece?",o:{en:["PaaS solution to automate application deployment","Compute engine for Amazon ECS","Scalable file storage","NoSQL database service"],pt:["Solucao PaaS para automatizar a implantacao de aplicacoes","Motor de computacao para Amazon ECS","Armazenamento de arquivos escalavel","Servico de banco de dados NoSQL"]},a:[0],exp:{pt:{tech:"O Elastic Beanstalk e um servico PaaS que automatiza a implantacao: voce sobe o codigo e ele cuida de provisionamento, balanceamento de carga, auto scaling e monitoramento.",simple:"O Amazon Elastic Beanstalk e um servico PaaS que implanta e gerencia aplicacoes automaticamente. Voce faz upload do codigo e ele provisiona servidores, balanceamento de carga, escala e monitoramento.",avoid:"Nao use Beanstalk se voce precisa de controle granular sobre a infraestrutura. Para configuracoes avancadas de rede ou servidores, use EC2 diretamente. Beanstalk prioriza simplicidade sobre controle total."},en:{tech:"Elastic Beanstalk is a PaaS service that automates deployment: you upload your code and it handles provisioning, load balancing, auto scaling, and monitoring.",simple:"Amazon Elastic Beanstalk is a PaaS service that deploys and manages applications automatically. You upload your code and it provisions servers, load balancing, scaling, and monitoring.",avoid:"Do not use Beanstalk if you need granular control over infrastructure. For advanced network or server configurations, use EC2 directly. Beanstalk prioritizes simplicity over full control."}}},
{en:"Which AWS service performs automated vulnerability assessments of EC2 instances?",pt:"Qual servico AWS realiza avaliacoes automatizadas de vulnerabilidades em instancias EC2?",o:{en:["Amazon Kinesis","Security groups","Amazon Inspector","AWS Network ACLs"],pt:["Amazon Kinesis","Security groups","Amazon Inspector","AWS Network ACLs"]},a:[2],exp:{pt:{tech:"O Amazon Inspector analisa automaticamente instancias EC2 e imagens de conteiner em busca de vulnerabilidades de software e exposicoes de rede nao intencionais.",simple:"O Amazon Inspector analisa automaticamente instancias EC2 em busca de vulnerabilidades de seguranca e desvios de boas praticas. Ele gera relatorios com as descobertas e nivel de severidade.",avoid:"Nao confunda Inspector com GuardDuty. Inspector verifica vulnerabilidades nas suas instancias (como software desatualizado). GuardDuty monitora atividades suspeitas na conta (como acessos incomuns)."},en:{tech:"Amazon Inspector automatically analyzes EC2 instances and container images for software vulnerabilities and unintended network exposures.",simple:"Amazon Inspector automatically scans EC2 instances for security vulnerabilities and deviations from best practices. It generates reports with findings and severity levels.",avoid:"Do not confuse Inspector with GuardDuty. Inspector checks for vulnerabilities in your instances (like outdated software). GuardDuty monitors suspicious account activity (like unusual access patterns)."}}},
{en:"Which Savings Plans compute services are available? (Choose TWO)",pt:"Quais servicos de computacao estao disponiveis nos Savings Plans? (Escolha DOIS)",o:{en:["AWS Batch","AWS Outposts","Amazon Lightsail","Amazon EC2","AWS Lambda"],pt:["AWS Batch","AWS Outposts","Amazon Lightsail","Amazon EC2","AWS Lambda"]},a:[3,4],multi:true,exp:{pt:{tech:"Compute Savings Plans aplicam-se a EC2, Lambda e Fargate. Batch usa EC2 por baixo mas nao e um servico coberto diretamente. Lightsail tem seu proprio modelo de precificacao.",simple:"Os Savings Plans cobrem servicos de computacao EC2 e Lambda. Ao se comprometer com um valor de uso por hora durante 1 ou 3 anos, voce recebe descontos significativos nesses servicos.",avoid:"Nao tente usar Savings Plans para servicos como AWS Batch ou Lightsail — eles nao sao cobertos. Tambem nao confunda Savings Plans com Reserved Instances — Savings Plans sao mais flexiveis quanto a tipo e regiao de instancia."},en:{tech:"Compute Savings Plans apply to EC2, Lambda, and Fargate. Batch uses EC2 underneath but isn't a directly covered service. Lightsail has its own pricing model.",simple:"Savings Plans cover EC2 and Lambda compute services. By committing to an hourly usage amount for 1 or 3 years, you receive significant discounts on these services.",avoid:"Do not try to use Savings Plans for services like AWS Batch or Lightsail — they are not covered. Also do not confuse Savings Plans with Reserved Instances — Savings Plans are more flexible regarding instance type and region."}}},
{en:"What is the recommended best practice for protecting workloads from natural disasters?",pt:"Qual e a melhor pratica recomendada para proteger cargas de trabalho contra desastres naturais?",o:{en:["Replicate across Edge Locations with CloudFront failover","Deploy across multiple AZs in same region","Create point-in-time backups in another subnet","Deploy to another AWS Region with Active-Active strategy"],pt:["Replicar entre Edge Locations com failover do CloudFront","Implantar em multiplas AZs na mesma regiao","Criar backups point-in-time em outra sub-rede","Implantar em outra Regiao AWS com estrategia Active-Active"]},a:[3],exp:{pt:{tech:"Desastres naturais podem afetar uma regiao inteira. Somente Multi-Region (outra regiao geografica) protege contra isso. Multi-AZ protege contra falha de datacenter, nao de regiao.",simple:"Para proteger contra desastres naturais, implante sua aplicacao em outra Regiao AWS com estrategia Active-Active. Isso garante que se uma regiao inteira ficar indisponivel, a outra continua atendendo.",avoid:"Nao confunda multiplas Availability Zones com multiplas Regioes. AZs protegem contra falhas de data center, mas uma catastrofe natural pode afetar todas as AZs de uma Regiao. Para desastres naturais, voce precisa de outra Regiao."},en:{tech:"Natural disasters can affect an entire region. Only Multi-Region (another geographic region) protects against that. Multi-AZ protects against datacenter failure, not regional failure.",simple:"To protect against natural disasters, deploy your application to another AWS Region with an Active-Active strategy. This ensures that if an entire region becomes unavailable, the other continues serving.",avoid:"Do not confuse multiple Availability Zones with multiple Regions. AZs protect against data center failures, but a natural disaster can affect all AZs in a Region. For natural disasters, you need another Region."}}},
{en:"Which AWS tool enables script-based management of all AWS services?",pt:"Qual ferramenta AWS permite o gerenciamento baseado em scripts de todos os servicos AWS?",o:{en:["AWS Console","AWS Service Catalog","AWS OpsWorks","AWS CLI"],pt:["AWS Console","AWS Service Catalog","AWS OpsWorks","AWS CLI"]},a:[3],exp:{pt:{tech:"A AWS CLI (Command Line Interface) permite interagir com todos os servicos AWS via terminal usando comandos e scripts. Ideal para automacao e operacoes em lote.",simple:"A AWS CLI e uma ferramenta de linha de comando que permite gerenciar todos os servicos AWS pelo terminal. Voce pode automatizar tarefas criando scripts que executam comandos da AWS.",avoid:"Nao use a CLI se voce ainda esta aprendendo e prefere uma interface visual — comece pelo Console. Tambem nunca armazene credenciais da CLI em scripts compartilhados ou repositorios publicos."},en:{tech:"The AWS CLI (Command Line Interface) lets you interact with all AWS services via terminal using commands and scripts. Ideal for automation and batch operations.",simple:"The AWS CLI is a command-line tool that lets you manage all AWS services through the terminal. You can automate tasks by creating scripts that execute AWS commands.",avoid:"Do not use the CLI if you are still learning and prefer a visual interface — start with the Console. Also never store CLI credentials in shared scripts or public repositories."}}},
{en:"Which connectivity options build hybrid cloud architectures? (Choose TWO)",pt:"Quais opcoes de conectividade constroem arquiteturas de nuvem hibrida? (Escolha DUAS)",o:{en:["AWS Artifact","AWS Cloud9","AWS Direct Connect","AWS CloudTrail","AWS VPN"],pt:["AWS Artifact","AWS Cloud9","AWS Direct Connect","AWS CloudTrail","AWS VPN"]},a:[2,4],multi:true,exp:{pt:{tech:"Direct Connect (conexao fisica dedicada) e VPN (tunel criptografado pela internet) sao as duas formas de conectar seu datacenter on-premises a AWS, criando uma arquitetura hibrida.",simple:"O AWS Direct Connect cria uma conexao fisica privada entre seu datacenter e a AWS. O AWS VPN cria um tunel criptografado pela internet publica. Ambos conectam sua infraestrutura local a nuvem (nuvem hibrida).",avoid:"Nao confunda os dois: Direct Connect oferece conexao dedicada de alta performance, mas demora para configurar. VPN e mais rapido de configurar, mas depende da internet publica. Escolha baseado em performance e urgencia."},en:{tech:"Direct Connect (dedicated physical connection) and VPN (encrypted tunnel over internet) are the two ways to connect your on-premises datacenter to AWS, creating a hybrid architecture.",simple:"AWS Direct Connect creates a private physical connection between your datacenter and AWS. AWS VPN creates an encrypted tunnel over the public internet. Both connect your on-premises infrastructure to the cloud (hybrid cloud).",avoid:"Do not confuse the two: Direct Connect offers a dedicated high-performance connection but takes time to set up. VPN is faster to configure but relies on the public internet. Choose based on performance and urgency."}}},
{en:"Which MySQL-compatible relational database has automatic capacity scaling?",pt:"Qual banco de dados relacional compativel com MySQL tem escalabilidade automatica de capacidade?",o:{en:["Amazon Neptune","Amazon Aurora","Amazon RDS for SQL Server","Amazon RDS for PostgreSQL"],pt:["Amazon Neptune","Amazon Aurora","Amazon RDS for SQL Server","Amazon RDS for PostgreSQL"]},a:[1],exp:{pt:{tech:"O Amazon Aurora e compativel com MySQL e PostgreSQL, com armazenamento que escala automaticamente de 10GB ate 128TB. Oferece ate 5x a performance do MySQL padrao.",simple:"O Amazon Aurora e um banco de dados relacional compativel com MySQL e PostgreSQL que escala a capacidade de armazenamento automaticamente. Ele oferece performance ate cinco vezes maior que o MySQL padrao.",avoid:"Nao use Aurora se voce precisa de compatibilidade com bancos que nao sejam MySQL ou PostgreSQL. Para Oracle ou SQL Server, use Amazon RDS. Tambem nao escolha Aurora se o custo for prioridade maxima — ele e mais caro que o RDS padrao."},en:{tech:"Amazon Aurora is compatible with MySQL and PostgreSQL, with storage that auto-scales from 10GB to 128TB. It offers up to 5x the performance of standard MySQL.",simple:"Amazon Aurora is a relational database compatible with MySQL and PostgreSQL that scales storage capacity automatically. It offers performance up to five times greater than standard MySQL.",avoid:"Do not use Aurora if you need compatibility with databases other than MySQL or PostgreSQL. For Oracle or SQL Server, use Amazon RDS. Also do not choose Aurora if cost is the top priority — it is more expensive than standard RDS."}}},
{en:"Which is the AWS data warehouse service for high-performance queries on large datasets?",pt:"Qual e o servico de data warehouse da AWS para consultas de alta performance em grandes conjuntos de dados?",o:{en:["Amazon Redshift","Amazon Kinesis","Amazon DynamoDB","Amazon RDS"],pt:["Amazon Redshift","Amazon Kinesis","Amazon DynamoDB","Amazon RDS"]},a:[0],exp:{pt:{tech:"O Amazon Redshift e o servico de data warehouse da AWS, otimizado para analise de dados em escala de petabytes com armazenamento colunar e processamento paralelo massivo (MPP).",simple:"O Amazon Redshift e um servico de data warehouse otimizado para consultas analiticas em grandes volumes de dados. Ele processa petabytes de dados para gerar relatorios e analises de negocio.",avoid:"Nao use Redshift para operacoes transacionais do dia-a-dia — para isso use RDS ou Aurora. Redshift e projetado para leituras analiticas complexas, nao para insercoes e atualizacoes frequentes de registros individuais."},en:{tech:"Amazon Redshift is AWS's data warehouse service, optimized for petabyte-scale data analysis with columnar storage and massively parallel processing (MPP).",simple:"Amazon Redshift is a data warehouse service optimized for analytical queries on large data volumes. It processes petabytes of data to generate business reports and analytics.",avoid:"Do not use Redshift for day-to-day transactional operations — for that use RDS or Aurora. Redshift is designed for complex analytical reads, not for frequent inserts and updates of individual records."}}},
{en:"How are Linux-based Amazon EC2 instances billed?",pt:"Como as instancias Amazon EC2 baseadas em Linux sao cobradas?",o:{en:["One-second increments, minimum one minute","One-hour increments, minimum one day","One-minute increments, minimum one hour","One-day increments, minimum one month"],pt:["Incrementos de um segundo, minimo de um minuto","Incrementos de uma hora, minimo de um dia","Incrementos de um minuto, minimo de uma hora","Incrementos de um dia, minimo de um mes"]},a:[0],exp:{pt:{tech:"Instancias EC2 Linux sao cobradas por segundo com minimo de 60 segundos. Instancias Windows sao cobradas por hora. Isso foi uma mudanca importante em 2017.",simple:"Instancias EC2 baseadas em Linux sao cobradas por segundo, com cobranca minima de um minuto. Isso significa que voce paga apenas pelo tempo exato de uso apos o primeiro minuto.",avoid:"Nao assuma que todas as instancias EC2 sao cobradas por segundo. Instancias Windows e algumas distribuicoes comerciais de Linux podem ter cobranca por hora. Verifique o modelo de cobranca do sistema operacional escolhido."},en:{tech:"EC2 Linux instances are billed per second with a 60-second minimum. Windows instances are billed per hour. This was an important change in 2017.",simple:"Linux-based EC2 instances are billed per second, with a minimum charge of one minute. This means you pay only for the exact time used after the first minute.",avoid:"Do not assume all EC2 instances are billed per second. Windows instances and some commercial Linux distributions may have hourly billing. Check the billing model of your chosen operating system."}}},
{en:"In AWS Organizations, what restricts services and actions allowed per account?",pt:"No AWS Organizations, o que restringe servicos e acoes permitidos por conta?",o:{en:["IAM Principals","AWS Service Control Policies","IAM policies","AWS Fargate"],pt:["IAM Principals","AWS Service Control Policies (SCPs)","IAM policies","AWS Fargate"]},a:[1],exp:{pt:{tech:"SCPs (Service Control Policies) definem o limite maximo de permissoes para contas em uma organizacao. Mesmo que uma IAM policy permita algo, o SCP pode bloquear. SCPs nao concedem permissoes, apenas restringem.",simple:"SCP (Service Control Policies) sao regras que definem o limite maximo de permissoes para todas as contas dentro de uma organizacao AWS. Mesmo que um usuario tenha permissoes via IAM, o SCP pode bloquear essa acao na conta inteira.",avoid:"Nao use SCPs para conceder permissoes — eles so restringem. Um erro comum e achar que criar um SCP ja da acesso; na verdade, voce ainda precisa de IAM policies para permitir acoes."},en:{tech:"SCPs (Service Control Policies) define the maximum permissions boundary for accounts in an organization. Even if an IAM policy allows something, the SCP can block it. SCPs don't grant permissions, only restrict.",simple:"SCP (Service Control Policies) set the maximum permission boundaries for all accounts in an AWS Organization. Even if a user has IAM permissions, the SCP can block that action across the entire account.",avoid:"Do not use SCPs to grant permissions — they only restrict. A common mistake is thinking that creating an SCP already grants access; you still need IAM policies to allow actions."}}},
{en:"What is the minimum AWS support level providing 24x7 access to technical engineers?",pt:"Qual e o nivel minimo de suporte AWS que fornece acesso 24x7 a engenheiros tecnicos?",o:{en:["Enterprise Support","Developer Support","Basic Support","Business Support"],pt:["Enterprise Support","Developer Support","Basic Support","Business Support"]},a:[3],exp:{pt:{tech:"Business Support e o nivel minimo com acesso 24x7 a engenheiros por telefone, chat e email. Developer oferece suporte so em horario comercial por email. Basic nao tem suporte tecnico.",simple:"Business Support e o nivel minimo de suporte AWS que oferece acesso 24 horas por dia, 7 dias por semana, a engenheiros tecnicos por telefone, chat e email.",avoid:"Nao confunda com Developer Support, que so oferece suporte por email em horario comercial. Se voce precisa de suporte tecnico a qualquer hora, Developer nao e suficiente."},en:{tech:"Business Support is the minimum level with 24x7 access to engineers via phone, chat, and email. Developer offers support only during business hours via email. Basic has no technical support.",simple:"Business Support is the minimum AWS support tier that provides 24/7 access to technical engineers via phone, chat, and email.",avoid:"Do not confuse it with Developer Support, which only offers email support during business hours. If you need technical support at any time, Developer is not enough."}}},
{en:"Which of the following is NOT correct regarding Amazon EC2 On-demand instances?",pt:"Qual das seguintes afirmacoes NAO esta correta sobre instancias EC2 On-Demand?",o:{en:["You have to pay a start-up fee when launching a new instance","The on-demand instances follow the AWS pay-as-you-go pricing model","No longer-term commitments or upfront payments are needed","You are charged per second based on an hourly rate"],pt:["Voce precisa pagar uma taxa inicial ao lancar uma nova instancia","As instancias on-demand seguem o modelo de precificacao pay-as-you-go","Nao sao necessarios compromissos de longo prazo ou pagamentos antecipados","Voce e cobrado por segundo com base em uma taxa por hora"]},a:[0],exp:{pt:{tech:"EC2 On-Demand nao tem taxa inicial (start-up fee). Voce paga apenas pelo tempo de uso, sem compromissos. Esse e justamente o diferencial do modelo pay-as-you-go.",simple:"Instancias EC2 On-Demand nao tem taxa de inicializacao ou compromisso minimo. Voce paga somente pelo tempo de uso, sem custos antecipados.",avoid:"Nao escolha On-Demand para cargas de trabalho previsíveis e constantes — nesse caso, Reserved Instances sao mais baratas. O erro comum e usar On-Demand para tudo e pagar mais do que o necessario."},en:{tech:"EC2 On-Demand has no start-up fee. You pay only for usage time, with no commitments. That's exactly the point of the pay-as-you-go model.",simple:"EC2 On-Demand instances have no start-up fee or minimum commitment. You only pay for the time you use them, with no upfront costs.",avoid:"Do not choose On-Demand for predictable, steady workloads — in that case, Reserved Instances are cheaper. The common mistake is using On-Demand for everything and overpaying."}}},
{en:"Which is a best-practice when designing solutions on AWS?",pt:"Qual e uma melhor pratica ao projetar solucoes na AWS?",o:{en:["Invest heavily in architecting your environment as it is hard to change later","Use reservations to reduce costs when testing your production environment","Automate wherever possible to make architectural experimentation easier","Provision large compute capacity to handle any spikes in load"],pt:["Investir pesado na arquitetura pois e dificil mudar depois","Usar reservas para reduzir custos ao testar seu ambiente de producao","Automatizar sempre que possivel para facilitar a experimentacao de arquitetura","Provisionar grande capacidade computacional para lidar com picos de carga"]},a:[2],exp:{pt:{tech:"A AWS incentiva automacao (IaC com CloudFormation/Terraform) para facilitar experimentacao, replicacao e iteracao rapida de arquiteturas. Diferente de on-premises, e facil mudar na nuvem.",simple:"Automatizar processos na AWS permite testar diferentes arquiteturas rapidamente e com baixo custo, facilitando a experimentacao e a melhoria continua.",avoid:"Nao automatize sem entender o processo primeiro. Um erro comum e automatizar algo mal planejado, o que apenas acelera os erros em vez de resolve-los."},en:{tech:"AWS encourages automation (IaC with CloudFormation/Terraform) to enable experimentation, replication, and fast architecture iteration. Unlike on-premises, changing in the cloud is easy.",simple:"Automating processes on AWS allows you to test different architectures quickly and at low cost, making experimentation and continuous improvement easier.",avoid:"Do not automate without understanding the process first. A common mistake is automating something poorly planned, which just accelerates errors instead of solving them."}}},
{en:"According to the AWS Acceptable Use Policy, which statement is true regarding penetration testing of EC2 instances?",pt:"De acordo com a Politica de Uso Aceitavel da AWS, qual afirmacao e verdadeira sobre testes de penetracao em instancias EC2?",o:{en:["Penetration testing is not allowed in AWS","Penetration testing is performed automatically by AWS","Penetration testing can be performed by the customer on their own instances without prior authorization","Customers are only allowed to test services managed by AWS"],pt:["Testes de penetracao nao sao permitidos na AWS","Testes de penetracao sao realizados automaticamente pela AWS","Testes de penetracao podem ser realizados pelo cliente em suas proprias instancias sem autorizacao previa","Clientes so podem testar servicos gerenciados pela AWS"]},a:[2],exp:{pt:{tech:"Desde 2019, a AWS permite testes de penetracao em 8 servicos (incluindo EC2) sem necessidade de aprovacao previa. Antes era necessario solicitar permissao.",simple:"A AWS permite que clientes realizem testes de penetracao em suas proprias instancias EC2 sem precisar de autorizacao previa.",avoid:"Nao faca testes de penetracao em recursos que nao sao seus ou em servicos gerenciados pela AWS que nao estao na lista permitida. O erro e achar que voce pode testar qualquer coisa na AWS sem restricoes."},en:{tech:"Since 2019, AWS allows penetration testing on 8 services (including EC2) without prior approval. Previously, permission was required.",simple:"AWS allows customers to perform penetration testing on their own EC2 instances without needing prior authorization.",avoid:"Do not perform penetration testing on resources you do not own or on AWS-managed services not on the permitted list. The mistake is thinking you can test anything on AWS without restrictions."}}},
{en:"Which of the following design principles helps achieve high availability?",pt:"Quais dos seguintes principios de design ajudam a alcancar alta disponibilidade? (Escolha DOIS)",o:{en:["Multi-factor authentication","Availability Zones","Elastic Load Balancing","Penetration testing","Vertical Scaling"],pt:["Autenticacao multi-fator","Zonas de Disponibilidade","Elastic Load Balancing","Testes de penetracao","Escalabilidade Vertical"]},a:[1,2],multi:true,exp:{pt:{tech:"AZs fornecem redundancia geografica dentro de uma regiao. ELB distribui trafego entre instancias saudaveis em multiplas AZs. Juntos, garantem que a falha de um componente nao derrube o sistema.",simple:"Usar multiplas Availability Zones com Elastic Load Balancing distribui o trafego entre zonas diferentes, garantindo que a aplicacao continue funcionando mesmo se uma zona falhar.",avoid:"Nao dependa de uma unica Availability Zone para alta disponibilidade. O erro mais comum e colocar todos os recursos em uma so AZ, o que cria um ponto unico de falha."},en:{tech:"AZs provide geographic redundancy within a region. ELB distributes traffic across healthy instances in multiple AZs. Together, they ensure a single component failure doesn't bring down the system.",simple:"Using multiple Availability Zones with Elastic Load Balancing distributes traffic across different zones, ensuring the application keeps running even if one zone fails.",avoid:"Do not rely on a single Availability Zone for high availability. The most common mistake is placing all resources in one AZ, which creates a single point of failure."}}},
{en:"A company has moved to AWS recently. Which services will help ensure proper security settings? (Choose TWO)",pt:"Uma empresa migrou recentemente para a AWS. Quais servicos ajudam a garantir configuracoes de seguranca adequadas? (Escolha DOIS)",o:{en:["AWS Trusted Advisor","Amazon Inspector","Amazon SNS","Amazon CloudWatch","Concierge Support Team"],pt:["AWS Trusted Advisor","Amazon Inspector","Amazon SNS","Amazon CloudWatch","Concierge Support Team"]},a:[0,1],multi:true,exp:{pt:{tech:"Trusted Advisor verifica boas praticas em seguranca, custo, performance e tolerancia a falhas. Inspector faz varreduras automatizadas de vulnerabilidades em EC2. Juntos cobrem recomendacoes e deteccao.",simple:"Trusted Advisor analisa sua conta AWS e faz recomendacoes de seguranca, custo e performance. Amazon Inspector avalia vulnerabilidades de seguranca em suas instancias EC2 e aplicacoes.",avoid:"Nao confunda Trusted Advisor com Inspector — Trusted Advisor da recomendacoes gerais sobre a conta, enquanto Inspector foca em vulnerabilidades especificas de instancias. Usar apenas um deles deixa lacunas na seguranca."},en:{tech:"Trusted Advisor checks best practices for security, cost, performance, and fault tolerance. Inspector runs automated vulnerability scans on EC2. Together they cover recommendations and detection.",simple:"Trusted Advisor analyzes your AWS account and makes recommendations on security, cost, and performance. Amazon Inspector assesses security vulnerabilities in your EC2 instances and applications.",avoid:"Do not confuse Trusted Advisor with Inspector — Trusted Advisor gives general account recommendations, while Inspector focuses on specific instance vulnerabilities. Using only one leaves security gaps."}}},
{en:"What is the AWS serverless service that allows you to run applications without administrative burden?",pt:"Qual e o servico serverless da AWS que permite executar aplicacoes sem carga administrativa?",o:{en:["Amazon LightSail","AWS Lambda","Amazon RDS","Amazon EC2"],pt:["Amazon LightSail","AWS Lambda","Amazon RDS","Amazon EC2"]},a:[1],exp:{pt:{tech:"O AWS Lambda e um servico de computacao serverless que executa codigo em resposta a eventos. Voce nao gerencia servidores — so sobe o codigo e define os gatilhos.",simple:"AWS Lambda executa codigo em resposta a eventos sem que voce precise provisionar ou gerenciar servidores. Voce paga apenas pelo tempo de execucao do codigo.",avoid:"Nao use Lambda para processos que rodam continuamente por horas — ele tem limite de 15 minutos por execucao. Para cargas de trabalho longas e constantes, EC2 ou ECS sao mais adequados."},en:{tech:"AWS Lambda is a serverless compute service that runs code in response to events. You don't manage servers — just upload code and define triggers.",simple:"AWS Lambda runs code in response to events without you needing to provision or manage servers. You pay only for the code execution time.",avoid:"Do not use Lambda for processes that run continuously for hours — it has a 15-minute execution limit. For long, steady workloads, EC2 or ECS are more suitable."}}},
{en:"Three EC2 instances crashed but no customers were affected. What did the architect build?",pt:"Tres instancias EC2 falharam mas nenhum cliente foi afetado. O que o arquiteto construiu?",o:{en:["An elastic system","A fault tolerant system","An encrypted system","A scalable system"],pt:["Um sistema elastico","Um sistema tolerante a falhas","Um sistema criptografado","Um sistema escalavel"]},a:[1],exp:{pt:{tech:"Tolerancia a falhas (fault tolerance) significa que o sistema continua operando normalmente mesmo quando componentes falham. Diferente de alta disponibilidade, que minimiza o tempo de inatividade.",simple:"Um sistema tolerante a falhas continua funcionando normalmente mesmo quando componentes falham, sem impacto para os usuarios finais.",avoid:"Nao confunda tolerancia a falhas com alta disponibilidade. Alta disponibilidade aceita uma breve interrupcao durante a recuperacao; tolerancia a falhas significa zero interrupcao perceptivel."},en:{tech:"Fault tolerance means the system continues operating normally even when components fail. Different from high availability, which minimizes downtime.",simple:"A fault-tolerant system continues operating normally even when components fail, with no impact on end users.",avoid:"Do not confuse fault tolerance with high availability. High availability accepts a brief disruption during recovery; fault tolerance means zero noticeable disruption."}}},
{en:"What is the benefit of consolidated billing in AWS Organizations?",pt:"Qual e o beneficio do faturamento consolidado no AWS Organizations?",o:{en:["AWS services cost half the original price","The feature is just for organizational purposes","Each account gets volume discounts","Each account gets five times the free-tier capacity"],pt:["Os servicos AWS custam metade do preco original","O recurso e apenas para fins organizacionais","Cada conta recebe descontos por volume","Cada conta recebe cinco vezes a capacidade do free tier"]},a:[2],exp:{pt:{tech:"O faturamento consolidado agrega o uso de todas as contas da organizacao, permitindo que atinjam os limites de desconto por volume mais rapidamente. O uso combinado beneficia todas as contas.",simple:"Com faturamento consolidado no AWS Organizations, o uso de todas as contas e somado, permitindo que cada conta se beneficie de descontos por volume.",avoid:"Nao assuma que faturamento consolidado significa que uma conta paga menos individualmente — o desconto vem do uso agregado. O erro e nao organizar as contas corretamente dentro da organizacao."},en:{tech:"Consolidated billing aggregates usage from all organization accounts, allowing them to reach volume discount tiers faster. Combined usage benefits all accounts.",simple:"With consolidated billing in AWS Organizations, usage from all accounts is combined, allowing each account to benefit from volume discounts.",avoid:"Do not assume consolidated billing means one account pays less individually — the discount comes from aggregated usage. The mistake is not organizing accounts properly within the organization."}}},
{en:"Which service can store and reliably deliver messages across distributed systems?",pt:"Qual servico pode armazenar e entregar mensagens de forma confiavel entre sistemas distribuidos?",o:{en:["Amazon Simple Queue Service","AWS Storage Gateway","Amazon Simple Email Service","Amazon Simple Storage Service"],pt:["Amazon Simple Queue Service","AWS Storage Gateway","Amazon Simple Email Service","Amazon Simple Storage Service"]},a:[0],exp:{pt:{tech:"O Amazon SQS (Simple Queue Service) permite desacoplar e escalar microsservicos atraves de filas de mensagens. As mensagens sao armazenadas redundantemente ate serem consumidas.",simple:"Amazon SQS e um servico de filas de mensagens que armazena mensagens de forma confiavel ate que o sistema destinatario esteja pronto para processa-las.",avoid:"Nao use SQS quando voce precisa de notificacao em tempo real para multiplos destinatarios — para isso, use SNS. O erro comum e usar SQS quando o padrao correto seria pub/sub."},en:{tech:"Amazon SQS (Simple Queue Service) lets you decouple and scale microservices through message queues. Messages are stored redundantly until consumed.",simple:"Amazon SQS is a message queuing service that reliably stores messages until the receiving system is ready to process them.",avoid:"Do not use SQS when you need real-time notification to multiple recipients — use SNS for that. The common mistake is using SQS when the correct pattern would be pub/sub."}}},
{en:"A company migrating a database to Amazon RDS should minimize costs by:",pt:"Uma empresa migrando um banco de dados para o Amazon RDS deve minimizar custos com:",o:{en:["Right-sizing before and after migration","Using Multi-Region Active-Passive architecture","Combining On-demand Capacity Reservations with Savings Plans","Using Multi-Region Active-Active architecture"],pt:["Dimensionamento correto antes e depois da migracao","Usar arquitetura Multi-Region Active-Passive","Combinar Reservas de Capacidade On-demand com Savings Plans","Usar arquitetura Multi-Region Active-Active"]},a:[0],exp:{pt:{tech:"Right-sizing significa escolher o tipo e tamanho de instancia adequados a carga real. Provisionar mais do que necessario gera desperdicio. Monitorar e ajustar apos a migracao e essencial.",simple:"Right-sizing significa escolher o tipo e tamanho de instancia adequados para a carga de trabalho real, tanto antes quanto depois da migracao, evitando pagar por recursos desnecessarios.",avoid:"Nao migre o banco de dados sem analisar o uso real de CPU, memoria e I/O primeiro. O erro comum e copiar a mesma configuracao do ambiente on-premises sem avaliar se ela e necessaria na nuvem."},en:{tech:"Right-sizing means choosing the instance type and size appropriate for actual workload. Over-provisioning wastes money. Monitoring and adjusting after migration is essential.",simple:"Right-sizing means choosing the appropriate instance type and size for the actual workload, both before and after migration, avoiding paying for unnecessary resources.",avoid:"Do not migrate the database without analyzing actual CPU, memory, and I/O usage first. The common mistake is copying the same on-premises configuration without evaluating whether it is needed in the cloud."}}},
{en:"Which Amazon RDS features improve database availability? (Choose TWO)",pt:"Quais recursos do Amazon RDS melhoram a disponibilidade do banco de dados? (Escolha DOIS)",o:{en:["AWS Regions","Multi-AZ Deployment","Automatic patching","Read Replicas","Edge Locations"],pt:["AWS Regions","Implantacao Multi-AZ","Patching automatico","Read Replicas","Edge Locations"]},a:[1,3],multi:true,exp:{pt:{tech:"Multi-AZ cria uma replica sincrona em outra AZ para failover automatico. Read Replicas criam copias assincrona para leitura, distribuindo carga e servindo como backup de disponibilidade.",simple:"Multi-AZ Deployment cria uma copia do banco em outra zona de disponibilidade para failover automatico. Read Replicas criam copias somente leitura para distribuir a carga de consultas.",avoid:"Nao use Read Replicas esperando failover automatico — elas servem apenas para leitura. O erro comum e confundir Read Replicas com Multi-AZ, que sao mecanismos diferentes com propositos diferentes."},en:{tech:"Multi-AZ creates a synchronous replica in another AZ for automatic failover. Read Replicas create asynchronous copies for reading, distributing load and serving as availability backup.",simple:"Multi-AZ Deployment creates a database copy in another availability zone for automatic failover. Read Replicas create read-only copies to distribute query load.",avoid:"Do not use Read Replicas expecting automatic failover — they serve only for reads. The common mistake is confusing Read Replicas with Multi-AZ, which are different mechanisms with different purposes."}}},
{en:"To reduce latency for Asian users of an application hosted in Northern California, what should you do?",pt:"Para reduzir a latencia de usuarios asiaticos de uma aplicacao hospedada no Norte da California, o que voce deve fazer?",o:{en:["Replicate resources across multiple AZs in same region","Migrate to an Asian hosting provider","Recreate website content","Create a CDN using CloudFront for edge caching"],pt:["Replicar recursos em multiplas AZs na mesma regiao","Migrar para um provedor de hospedagem asiatico","Recriar o conteudo do site","Criar um CDN usando CloudFront para cache de borda"]},a:[3],exp:{pt:{tech:"O CloudFront armazena conteudo em Edge Locations proximas aos usuarios asiaticos, reduzindo latencia sem precisar mover a aplicacao. E a solucao mais simples e eficiente.",simple:"CloudFront e uma CDN que armazena copias do conteudo em pontos de presenca ao redor do mundo, entregando dados a partir do local mais proximo ao usuario para reduzir a latencia.",avoid:"Nao use CloudFront para conteudo que muda a cada requisicao sem configurar TTLs adequados. O erro comum e cachear conteudo dinamico sem invalidacao, servindo dados desatualizados."},en:{tech:"CloudFront caches content at Edge Locations near Asian users, reducing latency without moving the application. It's the simplest and most efficient solution.",simple:"CloudFront is a CDN that caches copies of content at edge locations around the world, delivering data from the location closest to the user to reduce latency.",avoid:"Do not use CloudFront for content that changes on every request without configuring proper TTLs. The common mistake is caching dynamic content without invalidation, serving stale data."}}},
{en:"What should be considered during TCO analysis comparing AWS versus on-premises costs?",pt:"O que deve ser considerado na analise de TCO comparando custos AWS versus on-premises?",o:{en:["Application development","Market research","Business analysis","Physical hardware"],pt:["Desenvolvimento de aplicacoes","Pesquisa de mercado","Analise de negocios","Hardware fisico"]},a:[3],exp:{pt:{tech:"O TCO (Total Cost of Ownership) on-premises inclui custos de hardware fisico, energia, refrigeracao, espaco fisico, pessoal de manutencao — custos eliminados ou reduzidos na nuvem.",simple:"Na analise de TCO, voce deve incluir o custo de hardware fisico do ambiente on-premises, pois esse e um custo significativo que nao existe na nuvem.",avoid:"Nao compare apenas o custo mensal do servidor na nuvem com o custo do hardware. O erro e esquecer custos ocultos do on-premises como energia, refrigeracao, espaco fisico e equipe de manutencao."},en:{tech:"On-premises TCO (Total Cost of Ownership) includes physical hardware costs, power, cooling, physical space, maintenance staff — costs eliminated or reduced in the cloud.",simple:"In a TCO analysis, you must include the cost of physical hardware in the on-premises environment, as this is a significant cost that does not exist in the cloud.",avoid:"Do not compare only the monthly cloud server cost with the hardware cost. The mistake is forgetting hidden on-premises costs like power, cooling, physical space, and maintenance staff."}}},
{en:"Which connectivity option uses IPSec for encrypted on-premises to AWS connection?",pt:"Qual opcao de conectividade usa IPSec para conexao criptografada entre on-premises e AWS?",o:{en:["Internet Gateway","AWS IQ","AWS Direct Connect","AWS Site-to-Site VPN"],pt:["Internet Gateway","AWS IQ","AWS Direct Connect","AWS Site-to-Site VPN"]},a:[3],exp:{pt:{tech:"O AWS Site-to-Site VPN cria um tunel IPSec criptografado entre seu datacenter e a VPC da AWS pela internet publica. Direct Connect e uma conexao fisica dedicada (nao usa IPSec nativamente).",simple:"AWS Site-to-Site VPN cria uma conexao criptografada com IPSec entre sua rede local e a AWS usando a internet publica.",avoid:"Nao use VPN quando voce precisa de largura de banda consistente e baixa latencia — para isso, use Direct Connect. O erro comum e usar VPN para transferencias de dados massivas e sofrer com instabilidade da internet."},en:{tech:"AWS Site-to-Site VPN creates an IPSec encrypted tunnel between your datacenter and AWS VPC over the public internet. Direct Connect is a dedicated physical connection (doesn't natively use IPSec).",simple:"AWS Site-to-Site VPN creates an IPSec-encrypted connection between your on-premises network and AWS using the public internet.",avoid:"Do not use VPN when you need consistent bandwidth and low latency — use Direct Connect for that. The common mistake is using VPN for massive data transfers and suffering from internet instability."}}},
{en:"Which services can be used to control network traffic in AWS? (Choose TWO)",pt:"Quais servicos podem ser usados para controlar trafego de rede na AWS? (Escolha DOIS)",o:{en:["Network Access Control Lists","Key Pairs","Access Keys","IAM Policies","Security Groups"],pt:["Listas de Controle de Acesso de Rede","Key Pairs","Chaves de Acesso","Politicas IAM","Security Groups"]},a:[0,4],multi:true,exp:{pt:{tech:"Network ACLs operam no nivel da sub-rede (stateless). Security Groups operam no nivel da instancia (stateful). Ambos controlam trafego de rede de entrada e saida na VPC.",simple:"Security Groups controlam o trafego no nivel da instancia, enquanto Network ACLs controlam o trafego no nivel da sub-rede. Ambos filtram conexoes de entrada e saida na rede AWS.",avoid:"Nao dependa apenas de Security Groups sem configurar Network ACLs, ou vice-versa. O erro comum e nao entender que Security Groups sao stateful (rastreiam conexoes) e NACLs sao stateless (avaliam cada pacote)."},en:{tech:"Network ACLs operate at the subnet level (stateless). Security Groups operate at the instance level (stateful). Both control inbound and outbound network traffic in the VPC.",simple:"Security Groups control traffic at the instance level, while Network ACLs control traffic at the subnet level. Both filter inbound and outbound connections in the AWS network.",avoid:"Do not rely only on Security Groups without configuring Network ACLs, or vice versa. The common mistake is not understanding that Security Groups are stateful (track connections) and NACLs are stateless (evaluate each packet)."}}},
{en:"Which AWS service provides the current status of all AWS Services in all Regions?",pt:"Qual servico AWS mostra o status atual de todos os servicos AWS em todas as Regioes?",o:{en:["AWS Service Health Dashboard","AWS Management Console","Amazon CloudWatch","AWS Personal Health Dashboard"],pt:["AWS Service Health Dashboard","AWS Management Console","Amazon CloudWatch","AWS Personal Health Dashboard"]},a:[0],exp:{pt:{tech:"O AWS Service Health Dashboard mostra o status de todos os servicos em todas as regioes publicamente. O Personal Health Dashboard mostra eventos que afetam especificamente sua conta.",simple:"O AWS Service Health Dashboard mostra o status atual de todos os servicos AWS em todas as regioes, de forma publica e em tempo real.",avoid:"Nao confunda com o Personal Health Dashboard, que mostra eventos que afetam especificamente a sua conta. O Service Health Dashboard e geral e nao filtra por recursos que voce usa."},en:{tech:"The AWS Service Health Dashboard shows the status of all services across all regions publicly. The Personal Health Dashboard shows events specifically affecting your account.",simple:"The AWS Service Health Dashboard shows the current status of all AWS services across all regions, publicly and in real time.",avoid:"Do not confuse it with the Personal Health Dashboard, which shows events specifically affecting your account. The Service Health Dashboard is general and does not filter by resources you use."}}},
{en:"Which AWS service enables you to make calls to AWS services from different programming languages?",pt:"Qual servico AWS permite fazer chamadas a servicos AWS a partir de diferentes linguagens de programacao?",o:{en:["AWS Software Development Kit","AWS Command Line Interface","AWS CodeDeploy","AWS Management Console"],pt:["AWS Software Development Kit","AWS Command Line Interface","AWS CodeDeploy","AWS Management Console"]},a:[0],exp:{pt:{tech:"O AWS SDK (Software Development Kit) fornece bibliotecas para interagir com servicos AWS em diversas linguagens como Python (boto3), JavaScript, Java, Go, .NET, etc.",simple:"O AWS SDK fornece bibliotecas para diversas linguagens de programacao, permitindo que voce interaja com servicos AWS diretamente pelo codigo da sua aplicacao.",avoid:"Nao confunda SDK com CLI — a CLI e para comandos no terminal, o SDK e para integrar servicos AWS dentro do codigo da aplicacao. O erro e usar a CLI em scripts de producao quando o SDK seria mais robusto."},en:{tech:"The AWS SDK (Software Development Kit) provides libraries to interact with AWS services in various languages like Python (boto3), JavaScript, Java, Go, .NET, etc.",simple:"The AWS SDK provides libraries for multiple programming languages, allowing you to interact with AWS services directly from your application code.",avoid:"Do not confuse the SDK with the CLI — the CLI is for terminal commands, the SDK is for integrating AWS services within application code. The mistake is using the CLI in production scripts when the SDK would be more robust."}}},
{en:"Which AWS service can be used for registering new domain names?",pt:"Qual servico AWS pode ser usado para registrar novos nomes de dominio?",o:{en:["Amazon Personalize","Amazon Route 53","AWS KMS","AWS Config"],pt:["Amazon Personalize","Amazon Route 53","AWS KMS","AWS Config"]},a:[1],exp:{pt:{tech:"O Amazon Route 53 alem de ser um servico DNS, tambem permite registrar e gerenciar nomes de dominio diretamente pela AWS, sem precisar de um registrador externo.",simple:"Amazon Route 53 e o servico de DNS da AWS que tambem permite registrar e gerenciar nomes de dominio diretamente.",avoid:"Nao use Route 53 apenas como registrador de dominios sem explorar seus recursos de roteamento de trafego e health checks. O erro comum e registrar o dominio no Route 53 mas configurar o DNS em outro lugar, perdendo integracoes."},en:{tech:"Amazon Route 53 besides being a DNS service, also lets you register and manage domain names directly through AWS, without needing an external registrar.",simple:"Amazon Route 53 is the AWS DNS service that also allows you to register and manage domain names directly.",avoid:"Do not use Route 53 only as a domain registrar without exploring its traffic routing and health check features. The common mistake is registering the domain in Route 53 but configuring DNS elsewhere, losing integrations."}}},
{en:"Which AWS automation tools help deploy applications faster? (Choose TWO)",pt:"Quais ferramentas de automacao AWS ajudam a implantar aplicacoes mais rapido? (Escolha DOIS)",o:{en:["AWS CloudFormation","AWS Migration Hub","AWS IAM","AWS Elastic Beanstalk","Amazon Macie"],pt:["AWS CloudFormation","AWS Migration Hub","AWS IAM","AWS Elastic Beanstalk","Amazon Macie"]},a:[0,3],multi:true,exp:{pt:{tech:"CloudFormation permite definir infraestrutura como codigo (IaC) em templates YAML/JSON. Elastic Beanstalk automatiza deploy, scaling e monitoramento de aplicacoes. Ambos aceleram implantacoes.",simple:"CloudFormation define infraestrutura como codigo usando templates, criando recursos automaticamente. Elastic Beanstalk faz deploy de aplicacoes automaticamente, provisionando a infraestrutura necessaria.",avoid:"Nao use CloudFormation para deploys simples de aplicacoes quando Beanstalk resolve com menos esforco. O erro e usar Beanstalk quando voce precisa de controle total sobre a infraestrutura — nesse caso, CloudFormation e mais adequado."},en:{tech:"CloudFormation lets you define infrastructure as code (IaC) in YAML/JSON templates. Elastic Beanstalk automates deployment, scaling, and monitoring. Both speed up deployments.",simple:"CloudFormation defines infrastructure as code using templates, creating resources automatically. Elastic Beanstalk deploys applications automatically, provisioning the necessary infrastructure.",avoid:"Do not use CloudFormation for simple application deployments when Beanstalk solves it with less effort. The mistake is using Beanstalk when you need full infrastructure control — in that case, CloudFormation is more suitable."}}},
{en:"Which AWS service provides cost-optimization recommendations?",pt:"Qual servico AWS fornece recomendacoes de otimizacao de custos?",o:{en:["AWS Trusted Advisor","AWS Pricing Calculator","Amazon QuickSight","AWS X-Ray"],pt:["AWS Trusted Advisor","AWS Pricing Calculator","Amazon QuickSight","AWS X-Ray"]},a:[0],exp:{pt:{tech:"O AWS Trusted Advisor analisa seu ambiente e oferece recomendacoes em 5 categorias: custo, performance, seguranca, tolerancia a falhas e limites de servico.",simple:"AWS Trusted Advisor analisa sua conta e oferece recomendacoes para otimizar custos, melhorar performance, aumentar seguranca e melhorar tolerancia a falhas.",avoid:"Nao dependa apenas do Trusted Advisor para gestao completa de custos — ele da recomendacoes, mas voce precisa agir. O erro comum e ignorar as recomendacoes ou confundi-lo com o Cost Explorer, que serve para analise detalhada de gastos."},en:{tech:"AWS Trusted Advisor analyzes your environment and offers recommendations in 5 categories: cost, performance, security, fault tolerance, and service limits.",simple:"AWS Trusted Advisor analyzes your account and provides recommendations to optimize costs, improve performance, enhance security, and improve fault tolerance.",avoid:"Do not rely solely on Trusted Advisor for complete cost management — it gives recommendations, but you need to act on them. The common mistake is ignoring the recommendations or confusing it with Cost Explorer, which is for detailed spending analysis."}}},
{en:"Which service simplifies connection management among hundreds of VPCs across multiple regions?",pt:"Qual servico simplifica o gerenciamento de conexoes entre centenas de VPCs em multiplas regioes?",o:{en:["VPC Peering","AWS Transit Gateway","Amazon Connect","Security Groups"],pt:["VPC Peering","AWS Transit Gateway","Amazon Connect","Security Groups"]},a:[1],exp:{pt:{tech:"O AWS Transit Gateway atua como um hub central para conectar multiplas VPCs e redes on-premises. Sem ele, seria necessario criar conexoes ponto-a-ponto (peering) entre cada par de VPCs.",simple:"AWS Transit Gateway funciona como um ponto central de conexao que interliga centenas de VPCs e redes on-premises, simplificando a gestao de rede em larga escala.",avoid:"Nao use Transit Gateway para conectar apenas duas VPCs — VPC Peering e mais simples e barato nesse caso. O erro comum e adicionar complexidade desnecessaria quando a necessidade de conexao e pequena."},en:{tech:"AWS Transit Gateway acts as a central hub to connect multiple VPCs and on-premises networks. Without it, you'd need point-to-point connections (peering) between each VPC pair.",simple:"AWS Transit Gateway works as a central connection point that interconnects hundreds of VPCs and on-premises networks, simplifying network management at scale.",avoid:"Do not use Transit Gateway to connect just two VPCs — VPC Peering is simpler and cheaper in that case. The common mistake is adding unnecessary complexity when the connection need is small."}}},
{en:"Why does every AWS Region contain multiple Availability Zones?",pt:"Por que toda Regiao AWS contem multiplas Zonas de Disponibilidade?",o:{en:["Build resilient and highly available architectures","Results in lower total cost than a single AZ","Allows data replication and global reach","Increases storage capacity in the region"],pt:["Construir arquiteturas resilientes e altamente disponiveis","Resulta em custo total menor que uma unica AZ","Permite replicacao de dados e alcance global","Aumenta a capacidade de armazenamento na regiao"]},a:[0],exp:{pt:{tech:"Multiplas AZs dentro de uma Regiao permitem implantar recursos de forma redundante. Se uma AZ falhar, as outras continuam operando, garantindo alta disponibilidade sem sair da regiao.",simple:"Cada regiao AWS tem multiplas Availability Zones (datacenters fisicamente separados) para que voce possa construir aplicacoes resilientes que continuam funcionando mesmo se uma zona falhar.",avoid:"Nao assuma que usar uma regiao com multiplas AZs automaticamente protege sua aplicacao — voce precisa configurar seus recursos para usar mais de uma AZ. O erro e colocar tudo em uma unica AZ dentro da regiao."},en:{tech:"Multiple AZs within a Region allow deploying resources redundantly. If one AZ fails, others continue operating, ensuring high availability without leaving the region.",simple:"Each AWS Region has multiple Availability Zones (physically separated data centers) so you can build resilient applications that keep running even if one zone fails.",avoid:"Do not assume that using a region with multiple AZs automatically protects your application — you need to configure your resources to use more than one AZ. The mistake is placing everything in a single AZ within the region."}}},
{en:"Which of the following procedures will help reduce your Amazon S3 costs?",pt:"Qual dos seguintes procedimentos ajudara a reduzir seus custos do Amazon S3?",o:{en:["Use Import/Export to move old files to Glacier","Use the right combination of storage classes based on use cases","Pick the right Availability Zone for your S3 bucket","Move all S3 data to EBS"],pt:["Usar Import/Export para mover arquivos antigos para o Glacier","Usar a combinacao certa de classes de armazenamento baseado nos casos de uso","Escolher a Zona de Disponibilidade certa para seu bucket S3","Mover todos os dados do S3 para o EBS"]},a:[1],exp:{pt:{tech:"S3 tem varias classes (Standard, IA, Glacier, Deep Archive) com precos diferentes. Usar a classe certa para cada padrao de acesso otimiza custos. S3 Lifecycle policies podem automatizar a transicao.",simple:"Usar as classes de armazenamento corretas do S3 para cada tipo de dado reduz custos. Dados acessados raramente devem ficar em classes mais baratas, e dados frequentes em classes de acesso rapido.",avoid:"Nao mantenha todos os dados na classe Standard se a maioria e acessada raramente. O erro comum e nao configurar lifecycle policies para mover dados automaticamente para classes mais baratas com o tempo."},en:{tech:"S3 has multiple classes (Standard, IA, Glacier, Deep Archive) with different prices. Using the right class for each access pattern optimizes costs. S3 Lifecycle policies can automate transitions.",simple:"Using the right S3 storage classes for each type of data reduces costs. Rarely accessed data should be in cheaper classes, and frequently accessed data in fast-access classes.",avoid:"Do not keep all data in the Standard class if most of it is rarely accessed. The common mistake is not configuring lifecycle policies to automatically move data to cheaper classes over time."}}},
{en:"What does the AWS Well-Architected Framework's Reliability pillar focus on?",pt:"No que o pilar de Confiabilidade do AWS Well-Architected Framework se concentra?",o:{en:["Protecting data and systems from unauthorized access","Recovering from failures and meeting demand","Reducing costs through right-sizing","Monitoring and improving operational processes"],pt:["Proteger dados e sistemas contra acesso nao autorizado","Recuperar-se de falhas e atender a demanda","Reduzir custos atraves do dimensionamento correto","Monitorar e melhorar processos operacionais"]},a:[1],exp:{pt:{tech:"O pilar Reliability foca na capacidade do sistema de se recuperar de falhas, escalar dinamicamente e mitigar disruptcoes. Inclui design para falha, backups e testes de recuperacao.",simple:"O pilar de Confiabilidade do Well-Architected Framework foca na capacidade do sistema de se recuperar de falhas e atender a demanda de forma consistente.",avoid:"Nao confunda Confiabilidade com Performance — confiabilidade e sobre continuar funcionando e se recuperar de falhas, nao sobre velocidade. O erro e projetar para performance sem planejar recuperacao de desastres."},en:{tech:"The Reliability pillar focuses on the system's ability to recover from failures, dynamically scale, and mitigate disruptions. It includes design for failure, backups, and recovery testing.",simple:"The Reliability pillar of the Well-Architected Framework focuses on the system ability to recover from failures and meet demand consistently.",avoid:"Do not confuse Reliability with Performance — reliability is about keeping running and recovering from failures, not about speed. The mistake is designing for performance without planning for disaster recovery."}}},
{en:"Which of the following AWS services provides managed relational database with automated backups?",pt:"Qual dos seguintes servicos AWS fornece banco de dados relacional gerenciado com backups automatizados?",o:{en:["A MySQL database installed on an EC2 instance","Amazon Aurora","Amazon DynamoDB","Amazon Neptune"],pt:["Um banco MySQL instalado numa instancia EC2","Amazon Aurora","Amazon DynamoDB","Amazon Neptune"]},a:[1],exp:{pt:{tech:"O Amazon Aurora e um banco relacional gerenciado compativel com MySQL/PostgreSQL que inclui backups automatizados, replicacao Multi-AZ e recuperacao point-in-time. EC2 com MySQL e nao-gerenciado.",simple:"Amazon Aurora e um banco de dados relacional gerenciado pela AWS com backups automaticos, compativel com MySQL e PostgreSQL, oferecendo alta disponibilidade sem esforco manual.",avoid:"Nao use Aurora para cenarios que exigem bancos NoSQL ou quando o custo e prioridade absoluta para cargas pequenas — RDS MySQL/PostgreSQL padrao pode ser mais barato. O erro e usar Aurora sem necessidade de alta performance ou disponibilidade."},en:{tech:"Amazon Aurora is a managed relational database compatible with MySQL/PostgreSQL that includes automated backups, Multi-AZ replication, and point-in-time recovery. EC2 with MySQL is unmanaged.",simple:"Amazon Aurora is a managed relational database by AWS with automated backups, compatible with MySQL and PostgreSQL, offering high availability without manual effort.",avoid:"Do not use Aurora for scenarios requiring NoSQL databases or when cost is the absolute priority for small workloads — standard RDS MySQL/PostgreSQL may be cheaper. The mistake is using Aurora without needing high performance or availability."}}},
{en:"Which AWS service helps you manage infrastructure as code?",pt:"Qual servico AWS ajuda a gerenciar infraestrutura como codigo?",o:{en:["AWS CloudFormation","AWS Config","Amazon SES","Amazon EMR"],pt:["AWS CloudFormation","AWS Config","Amazon SES","Amazon EMR"]},a:[0],exp:{pt:{tech:"O AWS CloudFormation permite definir e provisionar toda a infraestrutura AWS usando templates JSON ou YAML. Voce versiona, replica e destrói ambientes inteiros com um comando.",simple:"AWS CloudFormation permite criar e gerenciar recursos AWS usando arquivos de template (YAML ou JSON), tratando infraestrutura como codigo versionavel e repetivel.",avoid:"Nao use CloudFormation para mudancas rapidas e unicas que voce faria no console — o esforco de criar o template nao compensa. O erro comum e nao versionar os templates, perdendo o principal beneficio de infraestrutura como codigo."},en:{tech:"AWS CloudFormation lets you define and provision all AWS infrastructure using JSON or YAML templates. You version, replicate, and destroy entire environments with one command.",simple:"AWS CloudFormation lets you create and manage AWS resources using template files (YAML or JSON), treating infrastructure as versionable and repeatable code.",avoid:"Do not use CloudFormation for quick, one-off changes you would make in the console — the effort of creating the template is not worth it. The common mistake is not versioning templates, losing the main benefit of infrastructure as code."}}},
{en:"Under the shared responsibility model, what is the responsibility of AWS?",pt:"No modelo de responsabilidade compartilhada, o que e responsabilidade da AWS?",o:{en:["Client-side encryption","Configuring infrastructure devices","Server-side encryption","Filtering traffic with Security Groups"],pt:["Criptografia do lado do cliente","Configurar dispositivos de infraestrutura","Criptografia do lado do servidor","Filtrar trafego com Security Groups"]},a:[1],exp:{pt:{tech:"A AWS e responsavel por configurar e manter os dispositivos de infraestrutura fisica (switches, roteadores, firewalls de rede). O cliente configura Security Groups, criptografia e seus dados.",simple:"A AWS e responsavel por configurar e manter os dispositivos de infraestrutura fisica, como servidores, rede e datacenters. O cliente nao precisa se preocupar com essa camada.",avoid:"Nao assuma que a AWS cuida de tudo — o modelo de responsabilidade compartilhada significa que voce ainda e responsavel pela seguranca dos seus dados, configuracoes de rede e gerenciamento de acesso."},en:{tech:"AWS is responsible for configuring and maintaining physical infrastructure devices (switches, routers, network firewalls). The customer configures Security Groups, encryption, and their data.",simple:"AWS is responsible for configuring and maintaining physical infrastructure devices such as servers, networking, and data centers. The customer does not need to worry about this layer.",avoid:"Do not assume AWS takes care of everything — the shared responsibility model means you are still responsible for your data security, network configurations, and access management."}}},
