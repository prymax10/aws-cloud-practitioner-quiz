{en:"A company wants to filter and block malicious web requests, including SQL injection and cross-site scripting attacks, targeting their web application. Which AWS service should they use?",pt:"Uma empresa quer filtrar e bloquear requisições web maliciosas, incluindo ataques de injeção SQL e cross-site scripting, direcionadas à sua aplicação web. Qual serviço AWS deve ser usado?",o:{en:["AWS Shield Standard","AWS Shield Advanced","AWS WAF","AWS GuardDuty"],pt:["AWS Shield Standard","AWS Shield Advanced","AWS WAF","AWS GuardDuty"]},a:[2],t:"WAF & Shield",exp:{pt:{tech:"AWS WAF é um Web Application Firewall que filtra requisições HTTP/HTTPS baseado em regras configuráveis (SQL injection, XSS, geo-bloqueio, etc.). Shield é específico para proteção contra ataques DDoS volumétricos, não para filtragem de conteúdo de aplicação.",simple:"WAF = filtra conteúdo malicioso HTTP/HTTPS. Shield = protege contra DDoS volumétrico.",avoid:"Regras WAF mal configuradas podem bloquear tráfego legítimo. Sempre teste novas regras em modo de contagem (Count) antes de mudar para bloquear (Block)."},en:{tech:"AWS WAF is a Web Application Firewall that filters HTTP/HTTPS requests based on configurable rules (SQL injection, XSS, geo-blocking, etc.). Shield is specifically for protection against volumetric DDoS attacks, not for application content filtering.",simple:"WAF = filters malicious HTTP/HTTPS content. Shield = protects against volumetric DDoS.",avoid:"Poorly configured WAF rules can block legitimate traffic. Always test new rules in Count mode before switching to Block mode."}}},
{en:"A company experienced a large-scale DDoS attack that overwhelmed their network infrastructure. They want automatic protection against such attacks without any configuration. Which service is automatically included for ALL AWS customers?",pt:"Uma empresa sofreu um ataque DDoS em larga escala que sobrecarregou sua infraestrutura de rede. Eles querem proteção automática contra esses ataques sem nenhuma configuração. Qual serviço é automaticamente incluído para TODOS os clientes AWS?",o:{en:["AWS WAF","AWS Shield Advanced","AWS Shield Standard","Amazon GuardDuty"],pt:["AWS WAF","AWS Shield Advanced","AWS Shield Standard","Amazon GuardDuty"]},a:[2],t:"WAF & Shield",exp:{pt:{tech:"Shield Standard é habilitado automaticamente e sem custo adicional para todos os clientes AWS. Fornece proteção contra os ataques DDoS mais comuns (Layer 3 e 4). Shield Advanced é pago e oferece proteção adicional, acesso ao DDoS Response Team e proteção de custo.",simple:"Shield Standard = gratuito e automático para todos. Shield Advanced = pago, com suporte especializado e proteção adicional.",avoid:"Shield Standard protege contra DDoS Layer 3/4, mas ataques mais sofisticados de Layer 7 requerem WAF. Defesa em profundidade é sempre a melhor prática."},en:{tech:"Shield Standard is automatically enabled at no additional cost for all AWS customers. It provides protection against the most common DDoS attacks (Layer 3 and 4). Shield Advanced is paid and offers additional protection, access to the DDoS Response Team, and cost protection.",simple:"Shield Standard = free and automatic for everyone. Shield Advanced = paid, with specialized support and additional protection.",avoid:"Shield Standard protects against Layer 3/4 DDoS, but more sophisticated Layer 7 attacks require WAF. Defense in depth is always the best practice."}}},
{en:"A compliance team needs to verify that all S3 buckets in their AWS account have server-side encryption enabled and automatically remediate any non-compliant buckets. Which service is BEST for this?",pt:"Uma equipe de conformidade precisa verificar se todos os buckets S3 na conta AWS têm criptografia server-side habilitada e remediar automaticamente buckets não conformes. Qual serviço é o MELHOR para isso?",o:{en:["AWS CloudTrail","Amazon Inspector","AWS Config","AWS Trusted Advisor"],pt:["AWS CloudTrail","Amazon Inspector","AWS Config","AWS Trusted Advisor"]},a:[2],t:"AWS Config",exp:{pt:{tech:"AWS Config avalia continuamente configurações de recursos AWS contra regras de conformidade e pode acionar remediações automáticas via Systems Manager Automation. CloudTrail registra chamadas de API mas não avalia conformidade de configuração nem aplica remediações.",simple:"Config = conformidade contínua de configuração com remediação. CloudTrail = histórico de quem fez o quê.",avoid:"AWS Config gera custos por número de itens de configuração gravados e por avaliações de regras. Monitore o uso para evitar cobranças inesperadas em contas com muitos recursos."},en:{tech:"AWS Config continuously evaluates AWS resource configurations against compliance rules and can trigger automatic remediations via Systems Manager Automation. CloudTrail records API calls but does not evaluate configuration compliance or apply remediations.",simple:"Config = continuous configuration compliance with remediation. CloudTrail = history of who did what.",avoid:"AWS Config generates costs per number of configuration items recorded and per rule evaluations. Monitor usage to avoid unexpected charges in accounts with many resources."}}},
{en:"A security auditor needs to see the complete history of changes made to an AWS Security Group over the past 6 months, including who made each change. Which combination of services provides this information?",pt:"Um auditor de segurança precisa ver o histórico completo de alterações feitas em um AWS Security Group nos últimos 6 meses, incluindo quem fez cada alteração. Qual combinação de serviços fornece essa informação?",o:{en:["AWS Config and Amazon Inspector","AWS CloudTrail and AWS Config","Amazon GuardDuty and AWS CloudTrail","AWS Trusted Advisor and AWS Config"],pt:["AWS Config e Amazon Inspector","AWS CloudTrail e AWS Config","Amazon GuardDuty e AWS CloudTrail","AWS Trusted Advisor e AWS Config"]},a:[1],t:"AWS Config",exp:{pt:{tech:"AWS Config rastreia o histórico de configurações do Security Group (o que mudou e quando). CloudTrail registra as chamadas de API que causaram as mudanças (quem fez e de onde). A combinação fornece auditoria completa de quem mudou o quê e quando.",simple:"Config = o que mudou na configuração. CloudTrail = quem fez a mudança via API.",avoid:"Habilite CloudTrail em todas as regiões e garanta que os logs sejam enviados para um bucket S3 protegido em uma conta separada de log-archive para evitar adulteração."},en:{tech:"AWS Config tracks the configuration history of the Security Group (what changed and when). CloudTrail records the API calls that caused the changes (who did it and from where). The combination provides complete audit of who changed what and when.",simple:"Config = what changed in the configuration. CloudTrail = who made the change via API.",avoid:"Enable CloudTrail in all regions and ensure logs are sent to a protected S3 bucket in a separate log-archive account to prevent tampering."}}},
{en:"Which AWS services are part of the Always Free tier and will NEVER incur charges regardless of usage within stated limits? (Select TWO)",pt:"Quais serviços AWS fazem parte do nível Always Free e NUNCA incorrerão em cobranças independentemente do uso dentro dos limites declarados? (Selecione DOIS)",o:{en:["Amazon EC2 t3.micro (750 hours/month)","AWS IAM","Amazon S3 (5GB storage)","AWS Lambda (1 million requests/month)","Amazon RDS (750 hours/month)"],pt:["Amazon EC2 t3.micro (750 horas/mês)","AWS IAM","Amazon S3 (5GB armazenamento)","AWS Lambda (1 milhão de requisições/mês)","Amazon RDS (750 horas/mês)"]},a:[1,3],multi:true,t:"Cost Management",exp:{pt:{tech:"IAM é sempre gratuito sem limites. Lambda oferece 1 milhão de requisições/mês permanentemente no Always Free. EC2 t3.micro e RDS são gratuitos apenas nos primeiros 12 meses (12-Month Free Tier). S3 5GB é também apenas 12 meses.",simple:"Always Free: IAM, Lambda 1M req, DynamoDB 25GB. 12-Month: EC2, RDS, S3 5GB.",avoid:"Não confunda Always Free com 12-Month Free Tier. Após 12 meses de conta, EC2 e RDS no Free Tier passam a cobrar. Configure alertas de Budget para evitar surpresas."},en:{tech:"IAM is always free with no limits. Lambda offers 1 million requests/month permanently under Always Free. EC2 t3.micro and RDS are free only in the first 12 months (12-Month Free Tier). S3 5GB is also only 12 months.",simple:"Always Free: IAM, Lambda 1M req, DynamoDB 25GB. 12-Month: EC2, RDS, S3 5GB.",avoid:"Do not confuse Always Free with 12-Month Free Tier. After 12 months of account age, EC2 and RDS in Free Tier start incurring charges. Set up Budget alerts to avoid surprises."}}},
{en:"A new AWS account was created 14 months ago. The team is surprised to see charges for EC2 t3.micro instances. Which explanation is MOST likely correct?",pt:"Uma nova conta AWS foi criada há 14 meses. A equipe está surpresa ao ver cobranças por instâncias EC2 t3.micro. Qual explicação é a MAIS provável?",o:{en:["EC2 t3.micro was never free and always charged","The 12-month Free Tier for EC2 has expired after 12 months","EC2 t3.micro is only free if you use it in us-east-1","The Free Tier is not available for accounts created outside the US"],pt:["EC2 t3.micro nunca foi gratuito e sempre cobrou","O Free Tier de 12 meses para EC2 expirou após 12 meses","EC2 t3.micro só é gratuito se usado em us-east-1","O Free Tier não está disponível para contas criadas fora dos EUA"]},a:[1],t:"Cost Management",exp:{pt:{tech:"O Free Tier do EC2 t3.micro (750 horas/mês) é um benefício de 12-Month Free Tier. Após 12 meses da criação da conta, o benefício expira e as instâncias passam a ser cobradas normalmente.",simple:"EC2 no Free Tier dura apenas 12 meses. Após isso, todas as instâncias são cobradas.",avoid:"Configure um AWS Budget de zero dólares especificamente para o Free Tier para receber alertas quando os limites estiverem próximos de expirar."},en:{tech:"The EC2 t3.micro Free Tier (750 hours/month) is a 12-Month Free Tier benefit. After 12 months from account creation, the benefit expires and instances start being charged normally.",simple:"EC2 on Free Tier lasts only 12 months. After that, all instances are billed.",avoid:"Set up a zero-dollar AWS Budget specifically for the Free Tier to receive alerts when limits are about to expire."}}},
{en:"A company needs storage that allows direct low-level block access, can take snapshots for backup, and must be in the same Availability Zone as the EC2 instance using it. Which service meets these requirements?",pt:"Uma empresa precisa de armazenamento que permita acesso de bloco de baixo nível, possa tirar snapshots para backup e deve estar na mesma Zona de Disponibilidade que a instância EC2 que o utiliza. Qual serviço atende a esses requisitos?",o:{en:["Amazon EFS","Amazon EBS","Amazon S3","Amazon FSx for Windows"],pt:["Amazon EFS","Amazon EBS","Amazon S3","Amazon FSx for Windows"]},a:[1],t:"EBS",exp:{pt:{tech:"EBS fornece volumes de bloco de alta performance que residem na mesma AZ que a instância EC2. Suporta snapshots para backup e restauração. EFS é um sistema de arquivos NFS multi-AZ, não de bloco. S3 é object storage sem acesso de bloco.",simple:"EBS = volume de bloco vinculado à AZ da instância EC2. EFS = sistema de arquivos multi-AZ.",avoid:"Snapshots EBS são armazenados no S3 (cross-AZ), mas o volume em si fica em uma única AZ. Para alta disponibilidade, configure snapshots regulares e políticas de retenção com Amazon DLM."},en:{tech:"EBS provides high-performance block volumes that reside in the same AZ as the EC2 instance. It supports snapshots for backup and restoration. EFS is a multi-AZ NFS file system, not block storage. S3 is object storage without block access.",simple:"EBS = block volume tied to the instance EC2 AZ. EFS = multi-AZ file system.",avoid:"EBS snapshots are stored in S3 (cross-AZ), but the volume itself stays in a single AZ. For high availability, configure regular snapshots and retention policies with Amazon DLM."}}},
{en:"A company processes financial transactions and needs a message queue that guarantees messages are processed EXACTLY ONCE and in the EXACT ORDER they were sent. Which SQS queue type should they use?",pt:"Uma empresa processa transações financeiras e precisa de uma fila de mensagens que garanta que as mensagens sejam processadas EXATAMENTE UMA VEZ e na ORDEM EXATA em que foram enviadas. Qual tipo de fila SQS deve ser usado?",o:{en:["Standard Queue","FIFO Queue","Dead Letter Queue","Priority Queue"],pt:["Fila Standard","Fila FIFO","Fila Dead Letter","Fila de Prioridade"]},a:[1],t:"SQS",exp:{pt:{tech:"SQS FIFO (First-In-First-Out) garante entrega exatamente uma vez e ordenação estrita das mensagens. Standard Queue oferece alta throughput mas com entrega at-least-once (possível duplicata) e sem garantia de ordem.",simple:"FIFO = ordem garantida + sem duplicatas. Standard = alta throughput + possível duplicata + sem ordem garantida.",avoid:"Filas FIFO têm throughput limitado (300 TPS sem batching, 3000 com). Para sistemas de alto volume que precisam de FIFO, avalie a necessidade real de ordenação vs. throughput."},en:{tech:"SQS FIFO (First-In-First-Out) guarantees exactly-once delivery and strict message ordering. Standard Queue offers high throughput but with at-least-once delivery (possible duplicates) and no order guarantee.",simple:"FIFO = guaranteed order + no duplicates. Standard = high throughput + possible duplicates + no guaranteed order.",avoid:"FIFO queues have limited throughput (300 TPS without batching, 3000 with). For high-volume systems that need FIFO, evaluate the real need for ordering vs. throughput."}}},
{en:"A company wants to host a static website with the MINIMUM operational overhead and the highest durability. Which service is MOST appropriate?",pt:"Uma empresa quer hospedar um site estático com o MÍNIMO de overhead operacional e a maior durabilidade. Qual serviço é o MAIS adequado?",o:{en:["Amazon EC2 with Apache web server","AWS Elastic Beanstalk","Amazon S3 static website hosting","Amazon Lightsail"],pt:["Amazon EC2 com servidor web Apache","AWS Elastic Beanstalk","Hospedagem de site estático no Amazon S3","Amazon Lightsail"]},a:[2],t:"S3 General",exp:{pt:{tech:"S3 static website hosting serve arquivos HTML/CSS/JS diretamente do S3 sem necessidade de servidor, com 99.999999999% (11 noves) de durabilidade e sem gerenciamento de infraestrutura. EC2 e Elastic Beanstalk requerem gerenciamento de servidores.",simple:"S3 static hosting = sem servidor, alta durabilidade, zero overhead operacional para sites estáticos.",avoid:"S3 static website hosting não suporta HTTPS por si só. Use CloudFront em frente ao S3 para servir conteúdo com HTTPS e reduzir latência globalmente."},en:{tech:"S3 static website hosting serves HTML/CSS/JS files directly from S3 without needing a server, with 99.999999999% (11 nines) durability and no infrastructure management. EC2 and Elastic Beanstalk require server management.",simple:"S3 static hosting = no server, high durability, zero operational overhead for static sites.",avoid:"S3 static website hosting does not support HTTPS on its own. Use CloudFront in front of S3 to serve content with HTTPS and reduce latency globally."}}},
{en:"A company must ensure that specific AWS actions can ONLY be performed from within their corporate network IP range. Which IAM feature allows them to enforce this?",pt:"Uma empresa deve garantir que ações AWS específicas só possam ser realizadas a partir do intervalo de IP de sua rede corporativa. Qual recurso do IAM permite aplicar isso?",o:{en:["IAM Groups","IAM Roles","IAM Policy Conditions","IAM Permission Boundaries"],pt:["Grupos IAM","Roles IAM","Condições de Política IAM","Limites de Permissão IAM"]},a:[2],t:"IAM",exp:{pt:{tech:"IAM Policy Conditions permitem restringir ações com base em contexto como aws:SourceIp, aws:RequestedRegion, aws:MultiFactorAuthPresent, entre outros. Isso permite criar políticas que só funcionam a partir de IPs específicos.",simple:"Conditions no IAM permitem adicionar restrições contextuais como IP de origem a qualquer permissão.",avoid:"Nunca confie apenas em restrições de IP para segurança. IPs podem ser falsificados ou usuários podem acessar de redes não corporativas. Combine com MFA para segurança em profundidade."},en:{tech:"IAM Policy Conditions allow restricting actions based on context such as aws:SourceIp, aws:RequestedRegion, aws:MultiFactorAuthPresent, among others. This enables creating policies that only work from specific IPs.",simple:"Conditions in IAM allow adding contextual restrictions such as source IP to any permission.",avoid:"Never rely solely on IP restrictions for security. IPs can be spoofed or users can access from non-corporate networks. Combine with MFA for defense in depth."}}},
{en:"A large enterprise needs multiple teams to work independently in AWS with separate billing, but a central team must be able to enforce security policies across all accounts. Which AWS service provides this capability?",pt:"Uma grande empresa precisa que múltiplas equipes trabalhem de forma independente na AWS com faturamento separado, mas uma equipe central deve poder aplicar políticas de segurança em todas as contas. Qual serviço AWS oferece essa capacidade?",o:{en:["AWS IAM with cross-account roles","AWS Organizations with Service Control Policies","AWS Control Tower","Multiple standalone AWS accounts"],pt:["AWS IAM com roles cross-account","AWS Organizations com Service Control Policies","AWS Control Tower","Múltiplas contas AWS independentes"]},a:[1],t:"IAM",exp:{pt:{tech:"AWS Organizations com SCPs (Service Control Policies) permite gerenciar múltiplas contas com faturamento consolidado e aplicar guardrails de segurança em nível de organização. SCPs limitam o que pode ser feito em contas membro, mesmo para usuários root.",simple:"Organizations + SCPs = gerenciamento centralizado com guardrails que limitam permissões em todas as contas filhas.",avoid:"SCPs não concedem permissões, apenas as restringem. O acesso efetivo é a interseção entre SCP e IAM policies. Teste SCPs em contas não produtivas antes de aplicar na organização."},en:{tech:"AWS Organizations with SCPs (Service Control Policies) enables managing multiple accounts with consolidated billing and applying organization-level security guardrails. SCPs limit what can be done in member accounts, even for root users.",simple:"Organizations + SCPs = centralized management with guardrails that limit permissions across all child accounts.",avoid:"SCPs do not grant permissions, they only restrict them. The effective access is the intersection of SCP and IAM policies. Test SCPs in non-production accounts before applying to the organization."}}},
{en:"A company is evaluating moving to AWS. They want to understand how AWS reduces costs for customers through economies of scale. Which pricing principle BEST describes this?",pt:"Uma empresa está avaliando a mudança para AWS. Eles querem entender como a AWS reduz custos para os clientes através de economias de escala. Qual princípio de preços MELHOR descreve isso?",o:{en:["Customers pay more as they use more services","AWS passes savings from aggregate usage to customers as lower prices","Customers receive fixed discounts based on their company size","AWS charges a flat rate regardless of usage volume"],pt:["Clientes pagam mais à medida que usam mais serviços","A AWS repassa economias do uso agregado para os clientes como preços mais baixos","Clientes recebem descontos fixos baseados no tamanho da empresa","A AWS cobra uma taxa fixa independente do volume de uso"]},a:[1],t:"Cost Management",exp:{pt:{tech:"Economias de escala na AWS significam que quanto mais clientes usam a AWS, maior o poder de compra agregado, o que permite à AWS reduzir preços. A AWS historicamente reduziu preços mais de 100 vezes desde 2006.",simple:"AWS usa o poder de compra coletivo de todos os clientes para negociar melhores preços e repassa parte dessas economias via cortes de preço.",avoid:"Volumes de uso individuais do cliente ativam descontos por volume (tiered pricing), enquanto economias de escala da AWS beneficiam todos os clientes coletivamente."},en:{tech:"Economies of scale at AWS mean that the more customers use AWS, the greater the aggregate purchasing power, which allows AWS to reduce prices. AWS has historically cut prices more than 100 times since 2006.",simple:"AWS uses the collective purchasing power of all customers to negotiate better prices and passes some of those savings on through price cuts.",avoid:"Individual customer usage volumes activate volume discounts (tiered pricing), while AWS economies of scale benefit all customers collectively."}}},
{en:"A company wants to migrate their on-premises workload to AWS with the LEAST amount of change to the application code. Which migration strategy does this represent?",pt:"Uma empresa quer migrar seu workload on-premises para AWS com a MENOR quantidade de mudanças no código da aplicação. Qual estratégia de migração isso representa?",o:{en:["Re-architect (Re-build)","Re-platform (Lift-Tinker-and-Shift)","Rehost (Lift-and-Shift)","Re-purchase (Drop-and-Shop)"],pt:["Re-arquitetar (Re-construir)","Re-plataformar (Lift-Tinker-and-Shift)","Re-hospedar (Lift-and-Shift)","Re-comprar (Drop-and-Shop)"]},a:[2],t:"CAF",exp:{pt:{tech:"Rehost (Lift-and-Shift) move a aplicação para AWS sem mudanças no código, geralmente usando EC2 para replicar o ambiente on-premises. Re-platform faz pequenas otimizações. Re-architect reconstrói a aplicação nativamente na nuvem.",simple:"Rehost = mover sem mudar. Re-platform = mover com pequenos ajustes. Re-architect = reescrever para cloud-native.",avoid:"Lift-and-Shift é o mais rápido mas não aproveita benefícios nativos da nuvem como auto-scaling e serverless. Planeje modernização iterativa após a migração inicial."},en:{tech:"Rehost (Lift-and-Shift) moves the application to AWS without code changes, typically using EC2 to replicate the on-premises environment. Re-platform makes small optimizations. Re-architect rebuilds the application natively in the cloud.",simple:"Rehost = move without changing. Re-platform = move with small adjustments. Re-architect = rewrite for cloud-native.",avoid:"Lift-and-Shift is the fastest but does not leverage cloud-native benefits like auto-scaling and serverless. Plan iterative modernization after the initial migration."}}},
{en:"A company needs to connect their on-premises data center to their Amazon VPC with a dedicated private network connection that does NOT traverse the public internet. Which service should they use?",pt:"Uma empresa precisa conectar seu data center on-premises ao Amazon VPC com uma conexão de rede privada dedicada que NÃO traverse a internet pública. Qual serviço deve ser usado?",o:{en:["AWS Site-to-Site VPN","AWS Direct Connect","Amazon VPC Peering","AWS Transit Gateway"],pt:["AWS Site-to-Site VPN","AWS Direct Connect","Amazon VPC Peering","AWS Transit Gateway"]},a:[1],t:"VPC & Networking",exp:{pt:{tech:"AWS Direct Connect estabelece uma conexão de rede dedicada e privada entre o data center on-premises e AWS, sem passar pela internet pública. VPN Site-to-Site usa a internet pública mas criptografada, e tem variações de latência.",simple:"Direct Connect = fibra dedicada privada. VPN = túnel criptografado sobre internet pública.",avoid:"Direct Connect tem lead time de semanas a meses para provisionamento. Para conectividade imediata, use VPN como backup. Considere usar ambos para redundância."},en:{tech:"AWS Direct Connect establishes a dedicated, private network connection between the on-premises data center and AWS, without traversing the public internet. Site-to-Site VPN uses the public internet but encrypted, with variable latency.",simple:"Direct Connect = dedicated private fiber. VPN = encrypted tunnel over public internet.",avoid:"Direct Connect has lead times of weeks to months for provisioning. For immediate connectivity, use VPN as a backup. Consider using both for redundancy."}}},
{en:"A company has multiple VPCs in different AWS regions and needs them to communicate privately. They also want to simplify their network architecture by avoiding a full mesh of VPC peering connections. Which AWS service should they use?",pt:"Uma empresa tem múltiplas VPCs em diferentes regiões AWS e precisa que elas se comuniquem de forma privada. Eles também querem simplificar a arquitetura de rede evitando uma malha completa de conexões VPC peering. Qual serviço AWS deve ser usado?",o:{en:["VPC Peering","AWS Transit Gateway","AWS Direct Connect","AWS PrivateLink"],pt:["VPC Peering","AWS Transit Gateway","AWS Direct Connect","AWS PrivateLink"]},a:[1],t:"VPC & Networking",exp:{pt:{tech:"Transit Gateway funciona como um hub de rede que conecta VPCs e redes on-premises através de uma única conexão central (hub-and-spoke). VPC Peering requer conexão ponto-a-ponto entre cada par de VPCs, criando complexidade exponencial.",simple:"Transit Gateway = hub central que conecta tudo. VPC Peering = conexão direta entre dois VPCs apenas.",avoid:"Transit Gateway tem custo por attachment e por dados processados. Em arquiteturas com poucos VPCs (2-3), VPC Peering pode ser mais econômico. Avalie antes de migrar."},en:{tech:"Transit Gateway acts as a network hub that connects VPCs and on-premises networks through a single central connection (hub-and-spoke). VPC Peering requires a point-to-point connection between each pair of VPCs, creating exponential complexity.",simple:"Transit Gateway = central hub that connects everything. VPC Peering = direct connection between only two VPCs.",avoid:"Transit Gateway has costs per attachment and per data processed. In architectures with few VPCs (2-3), VPC Peering may be more economical. Evaluate before migrating."}}},
{en:"A company wants to ensure their application can recover from a failure in one Availability Zone. Which design principle of the Well-Architected Framework does this address?",pt:"Uma empresa quer garantir que sua aplicação possa se recuperar de uma falha em uma Zona de Disponibilidade. Qual princípio de design do Well-Architected Framework isso aborda?",o:{en:["Cost Optimization","Performance Efficiency","Sustainability","Reliability"],pt:["Otimização de Custos","Eficiência de Performance","Sustentabilidade","Confiabilidade"]},a:[3],t:"Well-Architected",exp:{pt:{tech:"Reliability (Confiabilidade) é o pilar do Well-Architected Framework que aborda a capacidade do sistema de se recuperar de falhas de infraestrutura ou serviço, incluindo design multi-AZ, auto-healing e backups.",simple:"Reliability = capacidade de se recuperar de falhas e continuar funcionando.",avoid:"Projetar para uma única AZ é um anti-pattern de confiabilidade. Mesmo em ambientes de desenvolvimento, considere pelo menos 2 AZs para praticar resiliência."},en:{tech:"Reliability is the Well-Architected Framework pillar that addresses the system ability to recover from infrastructure or service failures, including multi-AZ design, auto-healing, and backups.",simple:"Reliability = ability to recover from failures and continue operating.",avoid:"Designing for a single AZ is a reliability anti-pattern. Even in development environments, consider at least 2 AZs to practice resilience."}}},
{en:"According to the AWS Shared Responsibility Model, which of the following is the customer responsible for when using Amazon S3?",pt:"De acordo com o Modelo de Responsabilidade Compartilhada da AWS, qual das seguintes responsabilidades é do cliente ao usar o Amazon S3?",o:{en:["Physical security of the data centers storing S3 data","Patching the S3 service infrastructure","Configuring S3 bucket policies and access controls","Maintaining the S3 service availability SLA"],pt:["Segurança física dos data centers que armazenam dados S3","Aplicação de patches na infraestrutura do serviço S3","Configuração de políticas de bucket S3 e controles de acesso","Manutenção do SLA de disponibilidade do serviço S3"]},a:[2],t:"Shared Responsibility",exp:{pt:{tech:"No modelo de responsabilidade compartilhada, a AWS é responsável pela segurança da nuvem (infraestrutura física, serviço S3 em si). O cliente é responsável pela segurança na nuvem: configuração de bucket policies, ACLs, criptografia e quem tem acesso.",simple:"S3: AWS cuida do serviço. Você cuida de quem pode acessar e como os dados estão protegidos.",avoid:"Buckets S3 com acesso público acidental são uma das causas mais comuns de vazamento de dados. Habilite o Block Public Access em nível de conta e de bucket por padrão."},en:{tech:"Under the shared responsibility model, AWS is responsible for security of the cloud (physical infrastructure, the S3 service itself). The customer is responsible for security in the cloud: configuring bucket policies, ACLs, encryption, and who has access.",simple:"S3: AWS manages the service. You manage who can access it and how the data is protected.",avoid:"S3 buckets with accidental public access are one of the most common causes of data breaches. Enable Block Public Access at both the account and bucket level by default."}}},
{en:"A company needs to cache frequently accessed database query results to reduce database load and improve application performance. Which AWS service is MOST appropriate?",pt:"Uma empresa precisa armazenar em cache resultados de consultas de banco de dados acessados frequentemente para reduzir a carga do banco e melhorar o desempenho da aplicação. Qual serviço AWS é o MAIS adequado?",o:{en:["Amazon EBS","Amazon RDS Read Replicas","Amazon ElastiCache","Amazon DynamoDB"],pt:["Amazon EBS","Amazon RDS Read Replicas","Amazon ElastiCache","Amazon DynamoDB"]},a:[2],t:"S3 General",exp:{pt:{tech:"ElastiCache (Redis ou Memcached) é um serviço de cache em memória gerenciado ideal para armazenar resultados de consultas, sessões e dados frequentemente acessados. Reduz latência de microsegundos e diminui carga no banco de dados.",simple:"ElastiCache = cache em memória super rápido para dados frequentemente acessados.",avoid:"ElastiCache Redis não é persistente por padrão. Configure backups e replicação se os dados em cache forem críticos e a reconstrução do cache for cara."},en:{tech:"ElastiCache (Redis or Memcached) is a managed in-memory caching service ideal for storing query results, sessions, and frequently accessed data. It reduces latency to microseconds and decreases database load.",simple:"ElastiCache = super-fast in-memory cache for frequently accessed data.",avoid:"ElastiCache Redis is not persistent by default. Configure backups and replication if cached data is critical and rebuilding the cache is expensive."}}},
{en:"A developer accidentally committed AWS access keys to a public GitHub repository. What should be done IMMEDIATELY as the FIRST step?",pt:"Um desenvolvedor acidentalmente confirmou chaves de acesso AWS em um repositório GitHub público. O que deve ser feito IMEDIATAMENTE como PRIMEIRO passo?",o:{en:["Delete the GitHub repository","Rotate the access keys by creating new ones","Deactivate and delete the compromised access keys","Review CloudTrail logs to assess the damage"],pt:["Deletar o repositório GitHub","Rotacionar as chaves de acesso criando novas","Desativar e deletar as chaves de acesso comprometidas","Revisar logs do CloudTrail para avaliar o dano"]},a:[2],t:"IAM",exp:{pt:{tech:"A primeira ação deve ser desativar imediatamente as chaves comprometidas para interromper qualquer uso não autorizado em andamento. Após isso, revogue-as permanentemente, analise os logs do CloudTrail para avaliar o impacto e crie novas chaves.",simple:"Primeiro: desative as chaves expostas imediatamente. Depois: investigue o dano.",avoid:"Nunca inclua credenciais AWS em código-fonte, variáveis de ambiente de CI/CD visíveis ou logs. Use IAM Roles para EC2/Lambda e Secrets Manager para outras aplicações."},en:{tech:"The first action must be to immediately deactivate the compromised keys to stop any ongoing unauthorized use. After that, permanently revoke them, analyze CloudTrail logs to assess the impact, and create new keys.",simple:"First: immediately deactivate the exposed keys. Then: investigate the damage.",avoid:"Never include AWS credentials in source code, visible CI/CD environment variables, or logs. Use IAM Roles for EC2/Lambda and Secrets Manager for other applications."}}},
{en:"A company wants to grant an EC2 instance permission to read objects from S3 WITHOUT using hard-coded credentials. Which IAM feature should they use?",pt:"Uma empresa quer conceder a uma instância EC2 permissão para ler objetos do S3 SEM usar credenciais hardcoded. Qual recurso IAM deve ser usado?",o:{en:["IAM User with access keys stored in user-data","IAM Group attached to the EC2 instance","IAM Role attached to the EC2 instance","IAM Policy with embedded credentials"],pt:["Usuário IAM com chaves de acesso armazenadas em user-data","Grupo IAM anexado à instância EC2","Role IAM anexado à instância EC2","Política IAM com credenciais incorporadas"]},a:[2],t:"IAM",exp:{pt:{tech:"IAM Roles para EC2 (instance profiles) fornecem credenciais temporárias rotacionadas automaticamente via o serviço de metadata da instância. Eliminam a necessidade de gerenciar access keys estáticas.",simple:"IAM Role em EC2 = credenciais temporárias automáticas, sem access keys hardcoded.",avoid:"Nunca armazene access keys em user-data, scripts de inicialização ou AMIs personalizadas. Esses dados podem ser expostos via o endpoint de metadata da instância se não houver proteção IMDSv2."},en:{tech:"IAM Roles for EC2 (instance profiles) provide temporary credentials automatically rotated via the instance metadata service. They eliminate the need to manage static access keys.",simple:"IAM Role on EC2 = automatic temporary credentials, no hardcoded access keys.",avoid:"Never store access keys in user-data, initialization scripts, or custom AMIs. This data can be exposed via the instance metadata endpoint if IMDSv2 protection is not in place."}}},
{en:"A company needs to store database passwords and API keys securely, with the ability to automatically rotate them and audit access. Which AWS service is BEST for this?",pt:"Uma empresa precisa armazenar senhas de banco de dados e chaves de API de forma segura, com a capacidade de rotacioná-las automaticamente e auditar o acesso. Qual serviço AWS é o MELHOR para isso?",o:{en:["AWS Systems Manager Parameter Store","AWS Secrets Manager","AWS KMS","AWS Certificate Manager"],pt:["AWS Systems Manager Parameter Store","AWS Secrets Manager","AWS KMS","AWS Certificate Manager"]},a:[1],t:"KMS & Encryption",exp:{pt:{tech:"AWS Secrets Manager foi projetado especificamente para segredos como senhas de banco de dados e chaves de API, com rotação automática nativa para RDS, Redshift e DocumentDB, versionamento e auditoria via CloudTrail.",simple:"Secrets Manager = armazenamento seguro de segredos com rotação automática. Parameter Store = configurações e parâmetros, com suporte limitado a segredos.",avoid:"Secrets Manager tem custo por segredo armazenado. Para parâmetros de configuração não sensíveis, use Parameter Store que é mais econômico. Reserve Secrets Manager para credenciais reais."},en:{tech:"AWS Secrets Manager was designed specifically for secrets like database passwords and API keys, with native automatic rotation for RDS, Redshift, and DocumentDB, versioning, and auditing via CloudTrail.",simple:"Secrets Manager = secure secret storage with automatic rotation. Parameter Store = configurations and parameters, with limited secret support.",avoid:"Secrets Manager has a cost per secret stored. For non-sensitive configuration parameters, use Parameter Store which is more cost-effective. Reserve Secrets Manager for actual credentials."}}},
{en:"A company wants to use a content delivery network to serve their web application with low latency to users globally. Which AWS service should they use?",pt:"Uma empresa quer usar uma rede de entrega de conteúdo para servir sua aplicação web com baixa latência para usuários globalmente. Qual serviço AWS deve ser usado?",o:{en:["Amazon Route 53","AWS Global Accelerator","Amazon CloudFront","AWS Direct Connect"],pt:["Amazon Route 53","AWS Global Accelerator","Amazon CloudFront","AWS Direct Connect"]},a:[2],t:"VPC & Networking",exp:{pt:{tech:"CloudFront é o CDN da AWS com mais de 400 pontos de presença (edge locations) globalmente. Cache conteúdo próximo aos usuários finais, reduzindo latência e carga na origem. Global Accelerator melhora disponibilidade e performance de aplicações via rede backbone AWS.",simple:"CloudFront = CDN para cache de conteúdo na borda. Global Accelerator = roteamento inteligente de tráfego na rede AWS.",avoid:"CloudFront cache objetos estáticos por padrão, mas APIs dinâmicas precisam de configuração específica de TTL. Cache incorreto pode servir dados desatualizados para usuários."},en:{tech:"CloudFront is the AWS CDN with more than 400 edge locations globally. It caches content close to end users, reducing latency and load on the origin. Global Accelerator improves application availability and performance via the AWS backbone network.",simple:"CloudFront = CDN for content caching at the edge. Global Accelerator = intelligent traffic routing on the AWS network.",avoid:"CloudFront caches static objects by default, but dynamic APIs need specific TTL configuration. Incorrect caching can serve stale data to users."}}},
{en:"A company is running a web application and wants to automatically distribute incoming traffic across multiple EC2 instances for high availability. Which service provides this capability?",pt:"Uma empresa está executando uma aplicação web e quer distribuir automaticamente o tráfego de entrada entre múltiplas instâncias EC2 para alta disponibilidade. Qual serviço oferece essa capacidade?",o:{en:["Amazon Route 53","AWS Auto Scaling","Elastic Load Balancing","Amazon CloudFront"],pt:["Amazon Route 53","AWS Auto Scaling","Elastic Load Balancing","Amazon CloudFront"]},a:[2],t:"VPC & Networking",exp:{pt:{tech:"Elastic Load Balancing distribui automaticamente tráfego de entrada entre múltiplos destinos (EC2, containers, Lambda) em uma ou mais AZs. Auto Scaling ajusta a quantidade de instâncias, mas não distribui tráfego. Route 53 faz DNS, não balanceamento a nível de conexão.",simple:"ELB = distribui tráfego entre instâncias. Auto Scaling = ajusta número de instâncias. Route 53 = resolução DNS.",avoid:"ELB e Auto Scaling são complementares, não substitutos. Use sempre os dois juntos para aplicações altamente disponíveis: ELB distribui o tráfego, Auto Scaling adapta a capacidade."},en:{tech:"Elastic Load Balancing automatically distributes incoming traffic across multiple targets (EC2, containers, Lambda) in one or more AZs. Auto Scaling adjusts the number of instances, but does not distribute traffic. Route 53 handles DNS, not connection-level balancing.",simple:"ELB = distributes traffic among instances. Auto Scaling = adjusts number of instances. Route 53 = DNS resolution.",avoid:"ELB and Auto Scaling are complementary, not substitutes. Always use both together for highly available applications: ELB distributes traffic, Auto Scaling adapts capacity."}}},
{en:"A startup wants to run backend code that executes in response to HTTP API requests WITHOUT managing any servers. They only want to pay for the compute time actually used. Which service is MOST appropriate?",pt:"Uma startup quer executar código backend que responde a requisições de API HTTP SEM gerenciar servidores. Eles só querem pagar pelo tempo de computação realmente utilizado. Qual serviço é o MAIS adequado?",o:{en:["Amazon EC2 with Auto Scaling","AWS Fargate","AWS Lambda","Amazon ECS with EC2 launch type"],pt:["Amazon EC2 com Auto Scaling","AWS Fargate","AWS Lambda","Amazon ECS com tipo de lançamento EC2"]},a:[2],t:"Cost Management",exp:{pt:{tech:"Lambda é uma plataforma serverless que executa código em resposta a eventos (incluindo HTTP via API Gateway) e cobra apenas pelo tempo de execução e número de invocações. Não há servidores para gerenciar. Fargate é serverless para containers, mas ainda requer definição de tasks.",simple:"Lambda = serverless, event-driven, pague só pelo tempo que executa. Fargate = serverless para containers.",avoid:"Lambda tem limites de tempo de execução (15 minutos) e memória (10GB). Para processos de longa duração ou uso intensivo de CPU, considere Fargate ou EC2."},en:{tech:"Lambda is a serverless platform that executes code in response to events (including HTTP via API Gateway) and charges only for execution time and number of invocations. There are no servers to manage. Fargate is serverless for containers, but still requires task definition.",simple:"Lambda = serverless, event-driven, pay only for the time it runs. Fargate = serverless for containers.",avoid:"Lambda has execution time limits (15 minutes) and memory limits (10GB). For long-running or CPU-intensive processes, consider Fargate or EC2."}}},
{en:"Which AWS service allows customers to create a logically isolated section of the AWS Cloud where they can launch resources in a virtual network they define?",pt:"Qual serviço AWS permite que os clientes criem uma seção logicamente isolada da nuvem AWS onde podem lançar recursos em uma rede virtual que eles definem?",o:{en:["AWS Direct Connect","Amazon Route 53","Amazon VPC","AWS PrivateLink"],pt:["AWS Direct Connect","Amazon Route 53","Amazon VPC","AWS PrivateLink"]},a:[2],t:"VPC & Networking",exp:{pt:{tech:"Amazon VPC (Virtual Private Cloud) permite criar uma rede virtual isolada dentro da AWS, com controle completo sobre endereçamento IP, sub-redes, tabelas de roteamento e gateways de rede.",simple:"VPC = sua rede privada virtual dentro da AWS, com controle total.",avoid:"Nunca coloque recursos sensíveis em sub-redes públicas sem necessidade. Use sub-redes privadas para databases e aplicações internas, reservando sub-redes públicas apenas para load balancers e bastion hosts."},en:{tech:"Amazon VPC (Virtual Private Cloud) allows creating an isolated virtual network within AWS, with complete control over IP addressing, subnets, route tables, and network gateways.",simple:"VPC = your private virtual network inside AWS, with full control.",avoid:"Never place sensitive resources in public subnets unnecessarily. Use private subnets for databases and internal applications, reserving public subnets only for load balancers and bastion hosts."}}},
{en:"A company needs to provide temporary AWS access to an external auditor for 24 hours. The auditor should be able to read CloudTrail logs but nothing else. What is the BEST approach?",pt:"Uma empresa precisa fornecer acesso temporário AWS a um auditor externo por 24 horas. O auditor deve poder ler logs do CloudTrail mas nada mais. Qual é a MELHOR abordagem?",o:{en:["Create an IAM user with permanent access keys and a read-only CloudTrail policy","Create an IAM Role with a read-only CloudTrail policy and use cross-account access or time-limited credentials","Share the root account credentials with read-only instructions","Create a new AWS account for the auditor"],pt:["Criar um usuário IAM com chaves de acesso permanentes e política somente-leitura para CloudTrail","Criar uma Role IAM com política somente-leitura para CloudTrail e usar acesso cross-account ou credenciais com tempo limitado","Compartilhar as credenciais da conta root com instruções de somente-leitura","Criar uma nova conta AWS para o auditor"]},a:[1],t:"IAM",exp:{pt:{tech:"IAM Roles com credenciais temporárias via STS (Security Token Service) são a prática recomendada para acesso temporário. Permitem acesso por tempo limitado sem criar usuários permanentes, seguindo o princípio de menor privilégio.",simple:"Para acesso temporário, use Roles com credenciais temporárias, nunca usuários IAM permanentes.",avoid:"Nunca compartilhe credenciais root ou crie usuários IAM apenas para auditorias temporárias. Credenciais permanentes criam risco de segurança desnecessário se não forem revogadas após o uso."},en:{tech:"IAM Roles with temporary credentials via STS (Security Token Service) are the recommended best practice for temporary access. They allow time-limited access without creating permanent users, following the principle of least privilege.",simple:"For temporary access, use Roles with temporary credentials, never permanent IAM users.",avoid:"Never share root credentials or create permanent IAM users just for temporary audits. Permanent credentials create unnecessary security risk if not revoked after use."}}},
{en:"A company wants to host their domain DNS in AWS and route traffic to their application based on user geographic location. Which service provides these capabilities?",pt:"Uma empresa quer hospedar o DNS do domínio na AWS e rotear tráfego para sua aplicação com base na localização geográfica do usuário. Qual serviço oferece essas capacidades?",o:{en:["Amazon CloudFront","AWS Global Accelerator","Amazon Route 53","Elastic Load Balancing"],pt:["Amazon CloudFront","AWS Global Accelerator","Amazon Route 53","Elastic Load Balancing"]},a:[2],t:"VPC & Networking",exp:{pt:{tech:"Route 53 é o serviço de DNS da AWS que suporta múltiplas políticas de roteamento incluindo geolocation (por país/continente), latency-based, weighted, failover e simple routing.",simple:"Route 53 = DNS gerenciado da AWS com roteamento inteligente por localização, latência e outros critérios.",avoid:"Route 53 geolocation routing requer registro de todas as regiões relevantes. Se uma localização nao tiver regra, o tráfego vai para a regra default. Sem default configurado, o Route 53 retorna NODATA."},en:{tech:"Route 53 is the AWS DNS service that supports multiple routing policies including geolocation (by country/continent), latency-based, weighted, failover, and simple routing.",simple:"Route 53 = managed AWS DNS with intelligent routing by location, latency, and other criteria.",avoid:"Route 53 geolocation routing requires registering all relevant regions. If a location has no rule, traffic goes to the default rule. Without a configured default, Route 53 returns NODATA."}}},
{en:"A company is evaluating AWS cloud benefits. Which statement BEST describes a benefit of cloud computing related to capital expenditure?",pt:"Uma empresa está avaliando os benefícios da nuvem AWS. Qual afirmação MELHOR descreve um benefício da computação em nuvem relacionado a despesas de capital?",o:{en:["Cloud computing increases capital expenditure by requiring hardware purchases","Cloud computing replaces capital expenditure (CapEx) with operational expenditure (OpEx)","Cloud computing requires the same capital expenditure as on-premises","Cloud computing eliminates all operational costs"],pt:["A computação em nuvem aumenta as despesas de capital exigindo compra de hardware","A computação em nuvem substitui despesas de capital (CapEx) por despesas operacionais (OpEx)","A computação em nuvem requer as mesmas despesas de capital que o on-premises","A computação em nuvem elimina todos os custos operacionais"]},a:[1],t:"Cost Management",exp:{pt:{tech:"Na nuvem, ao invés de comprar servidores (CapEx - despesa de capital com depreciação), você paga pelo uso (OpEx - despesa operacional). Isso melhora o fluxo de caixa, elimina ciclos de provisionamento e permite escalar sem investimento antecipado.",simple:"Nuvem troca compra de hardware (CapEx) por pagamento mensal de uso (OpEx).",avoid:"OpEx em nuvem pode superar o CapEx de on-premises em longo prazo sem otimização. Use Reserved Instances, Savings Plans e Right Sizing para controlar custos operacionais."},en:{tech:"In the cloud, instead of buying servers (CapEx - capital expenditure with depreciation), you pay for usage (OpEx - operational expenditure). This improves cash flow, eliminates provisioning cycles, and enables scaling without upfront investment.",simple:"Cloud swaps hardware purchases (CapEx) for monthly usage payments (OpEx).",avoid:"Cloud OpEx can exceed on-premises CapEx over the long term without optimization. Use Reserved Instances, Savings Plans, and Right Sizing to control operational costs."}}},
{en:"A company wants to automatically evaluate whether their newly created EC2 instances comply with their internal security standards. Which AWS service can continuously monitor and enforce these standards?",pt:"Uma empresa quer avaliar automaticamente se suas instâncias EC2 recém-criadas estão em conformidade com seus padrões internos de segurança. Qual serviço AWS pode monitorar e aplicar continuamente esses padrões?",o:{en:["Amazon GuardDuty","Amazon Inspector","AWS Config with Config Rules","AWS CloudTrail"],pt:["Amazon GuardDuty","Amazon Inspector","AWS Config com Config Rules","AWS CloudTrail"]},a:[2],t:"AWS Config",exp:{pt:{tech:"AWS Config com Config Rules avalia continuamente configurações de recursos contra regras definidas, incluindo regras gerenciadas da AWS e regras personalizadas via Lambda. Pode detectar e remediar automaticamente recursos não conformes.",simple:"Config Rules = regras de conformidade que avaliam recursos continuamente. Inspector = escaneia vulnerabilidades específicas.",avoid:"Config Rules geram custos por avaliação. Em contas com alta taxa de mudanças de recursos, o número de avaliações pode ser alto. Monitore e otimize quais regras são realmente necessárias."},en:{tech:"AWS Config with Config Rules continuously evaluates resource configurations against defined rules, including AWS managed rules and custom Lambda-based rules. It can automatically detect and remediate non-compliant resources.",simple:"Config Rules = compliance rules that continuously evaluate resources. Inspector = scans specific vulnerabilities.",avoid:"Config Rules generate costs per evaluation. In accounts with high resource change rates, the number of evaluations can be high. Monitor and optimize which rules are truly needed."}}},
{en:"A company is adopting AWS and wants to understand which category of the Cloud Adoption Framework (CAF) covers skills training, organizational change management, and career development in the cloud transition.",pt:"Uma empresa está adotando AWS e quer entender qual categoria do Cloud Adoption Framework (CAF) abrange treinamento de habilidades, gestão de mudanças organizacionais e desenvolvimento de carreira na transição para a nuvem.",o:{en:["Business","Platform","Governance","People"],pt:["Business","Platform","Governance","People"]},a:[3],t:"CAF",exp:{pt:{tech:"A perspectiva People do CAF abrange gestão de talentos, cultura organizacional, treinamento em nuvem, gestão de mudanças e desenvolvimento de carreira. Governance abrange conformidade e gerenciamento de riscos. Platform abrange arquitetura e automação técnica.",simple:"People = capacitação humana e mudança organizacional. Platform = infraestrutura e automação.",avoid:"Subestimar a perspectiva People é um dos principais motivos de falha em adoções de nuvem. Invista em treinamento antes e durante a migração, não apenas depois."},en:{tech:"The People perspective of the CAF covers talent management, organizational culture, cloud training, change management, and career development. Governance covers compliance and risk management. Platform covers technical architecture and automation.",simple:"People = human enablement and organizational change. Platform = infrastructure and automation.",avoid:"Underestimating the People perspective is one of the main reasons cloud adoptions fail. Invest in training before and during migration, not just after."}}},
{en:"A company wants to use machine learning to automatically detect and protect sensitive data such as PII stored in S3. Which AWS service should they use?",pt:"Uma empresa quer usar machine learning para detectar e proteger automaticamente dados sensíveis como PII armazenados no S3. Qual serviço AWS deve ser usado?",o:{en:["Amazon GuardDuty","Amazon Inspector","Amazon Macie","AWS Config"],pt:["Amazon GuardDuty","Amazon Inspector","Amazon Macie","AWS Config"]},a:[2],t:"S3 General",exp:{pt:{tech:"Amazon Macie usa machine learning para descobrir, classificar e proteger dados sensíveis no S3, identificando automaticamente PII (nomes, CPFs, cartões de crédito, etc.) e alertando sobre exposições e acessos suspeitos.",simple:"Macie = ML para encontrar e proteger dados sensíveis (PII) no S3.",avoid:"Macie gera custos baseados na quantidade de dados S3 escaneados. Em buckets com terabytes de dados, avalie a frequência de scan e priorize os buckets mais críticos."},en:{tech:"Amazon Macie uses machine learning to discover, classify, and protect sensitive data in S3, automatically identifying PII (names, SSNs, credit card numbers, etc.) and alerting on exposures and suspicious access.",simple:"Macie = ML to find and protect sensitive data (PII) in S3.",avoid:"Macie generates costs based on the amount of S3 data scanned. For buckets with terabytes of data, evaluate scan frequency and prioritize the most critical buckets."}}},
{en:"A company is growing rapidly and wants to stop spending time on undifferentiated heavy lifting tasks like hardware procurement and data center operations. Which cloud benefit does this represent?",pt:"Uma empresa está crescendo rapidamente e quer parar de gastar tempo em tarefas pesadas indiferenciadas como aquisição de hardware e operações de data center. Qual benefício da nuvem isso representa?",o:{en:["Economies of scale","Stop guessing about capacity","Trade capital expense for operational expense","Focus on business differentiators rather than infrastructure"],pt:["Economias de escala","Parar de adivinhar sobre capacidade","Trocar despesas de capital por despesas operacionais","Focar nos diferenciais de negócio em vez de infraestrutura"]},a:[3],t:"CAF",exp:{pt:{tech:"Um dos 6 benefícios da computação em nuvem da AWS é a capacidade de focar nos diferenciais do negócio em vez de gerenciar infraestrutura. A AWS gerencia as tarefas indiferenciadas, liberando equipes para inovar.",simple:"Nuvem = deixe a AWS gerenciar a infraestrutura para você focar no que diferencia seu negócio.",avoid:"Mesmo delegando infraestrutura para a AWS, você ainda precisa de skills de cloud. Invista em treinamento de equipe para não criar dependência excessiva de terceiros."},en:{tech:"One of AWS six cloud computing benefits is the ability to focus on business differentiators instead of managing infrastructure. AWS manages undifferentiated tasks, freeing teams to innovate.",simple:"Cloud = let AWS manage infrastructure so you can focus on what differentiates your business.",avoid:"Even when delegating infrastructure to AWS, you still need cloud skills. Invest in team training to avoid excessive dependence on third parties."}}},
{en:"A company needs to quickly estimate the cost of a new AWS architecture before building it. Which tool should they use?",pt:"Uma empresa precisa estimar rapidamente o custo de uma nova arquitetura AWS antes de construí-la. Qual ferramenta deve ser usada?",o:{en:["AWS Cost Explorer","AWS Budgets","AWS Pricing Calculator","AWS Trusted Advisor"],pt:["AWS Cost Explorer","AWS Budgets","AWS Calculadora de Preços AWS","AWS Trusted Advisor"]},a:[2],t:"Cost Management",exp:{pt:{tech:"AWS Pricing Calculator (calculator.aws) permite modelar arquiteturas AWS e estimar custos mensais antes de qualquer implantação. Cost Explorer analisa custos históricos reais. Budgets define alertas para gastos em andamento.",simple:"Pricing Calculator = estima custo de arquitetura futura. Cost Explorer = analisa custos históricos reais.",avoid:"Estimativas do Pricing Calculator são aproximadas. Custos reais variam baseados em padrões de uso, transferência de dados entre regiões e descontos aplicados. Use como ponto de partida, não como orçamento definitivo."},en:{tech:"AWS Pricing Calculator (calculator.aws) lets you model AWS architectures and estimate monthly costs before any deployment. Cost Explorer analyzes actual historical costs. Budgets sets alerts for ongoing spending.",simple:"Pricing Calculator = estimates future architecture cost. Cost Explorer = analyzes actual historical costs.",avoid:"Pricing Calculator estimates are approximate. Actual costs vary based on usage patterns, cross-region data transfer, and applied discounts. Use as a starting point, not a definitive budget."}}},
{en:"A company uses multiple AWS services and wants to centrally view all security findings including GuardDuty alerts, Inspector findings, and Macie discoveries in a single dashboard. Which AWS service provides this unified view?",pt:"Uma empresa usa múltiplos serviços AWS e quer ver centralmente todas as descobertas de segurança incluindo alertas do GuardDuty, descobertas do Inspector e descobertas do Macie em um único dashboard. Qual serviço AWS fornece essa visão unificada?",o:{en:["AWS CloudWatch","AWS Config","AWS Security Hub","AWS Trusted Advisor"],pt:["AWS CloudWatch","AWS Config","AWS Security Hub","AWS Trusted Advisor"]},a:[2],t:"GuardDuty",exp:{pt:{tech:"AWS Security Hub agrega e prioriza automaticamente descobertas de segurança de GuardDuty, Inspector, Macie, IAM Access Analyzer e outros serviços AWS em uma visão unificada, com pontuação de conformidade baseada em padrões como CIS AWS Foundations.",simple:"Security Hub = painel central que consolida alertas de segurança de múltiplos serviços AWS.",avoid:"Security Hub tem custo por encontrado e por verificação de segurança. Revise e descarte achados irrelevantes regularmente para evitar alertas de fadiga e custos desnecessários."},en:{tech:"AWS Security Hub automatically aggregates and prioritizes security findings from GuardDuty, Inspector, Macie, IAM Access Analyzer, and other AWS services into a unified view, with compliance scoring based on standards like CIS AWS Foundations.",simple:"Security Hub = central dashboard that consolidates security alerts from multiple AWS services.",avoid:"Security Hub has costs per finding and per security check. Regularly review and dismiss irrelevant findings to avoid alert fatigue and unnecessary costs."}}},
{en:"A company wants to ensure their development teams can only launch EC2 instances of specific types and sizes. Which IAM feature allows enforcing this restriction?",pt:"Uma empresa quer garantir que suas equipes de desenvolvimento só possam lançar instâncias EC2 de tipos e tamanhos específicos. Qual recurso IAM permite aplicar essa restrição?",o:{en:["IAM Permission Boundaries","IAM Policy with Condition on ec2:InstanceType","Service Control Policies (SCPs) in AWS Organizations","IAM Resource-Based Policies"],pt:["Limites de Permissão IAM","Política IAM com Condition em ec2:InstanceType","Service Control Policies (SCPs) no AWS Organizations","Políticas Baseadas em Recursos IAM"]},a:[1],t:"IAM",exp:{pt:{tech:"IAM Policy Conditions com chave ec2:InstanceType permitem restringir o lançamento de instâncias a tipos específicos. A condição StringLike ou StringEquals no campo ec2:InstanceType controla quais tipos são permitidos.",simple:"IAM Conditions = adiciona restrições específicas como tipo de instância às permissões existentes.",avoid:"SCPs podem fazer o mesmo em nível organizacional, mas IAM Conditions são mais granulares por usuário/role. Use ambos complementarmente: SCPs como guardrails org e IAM Conditions para granularidade."},en:{tech:"IAM Policy Conditions with the ec2:InstanceType key allow restricting instance launches to specific types. The StringLike or StringEquals condition on the ec2:InstanceType field controls which types are permitted.",simple:"IAM Conditions = adds specific restrictions like instance type to existing permissions.",avoid:"SCPs can do the same at the organizational level, but IAM Conditions are more granular per user/role. Use both complementarily: SCPs as org guardrails and IAM Conditions for granularity."}}},
{en:"A company needs to process a high volume of messages from IoT devices in real-time, analyzing and acting on data streams as they arrive. Which AWS service is MOST appropriate?",pt:"Uma empresa precisa processar um alto volume de mensagens de dispositivos IoT em tempo real, analisando e agindo em fluxos de dados conforme chegam. Qual serviço AWS é o MAIS adequado?",o:{en:["Amazon SQS Standard Queue","Amazon SNS","Amazon Kinesis Data Streams","Amazon DynamoDB"],pt:["Fila Amazon SQS Standard","Amazon SNS","Amazon Kinesis Data Streams","Amazon DynamoDB"]},a:[2],t:"SQS",exp:{pt:{tech:"Amazon Kinesis Data Streams é projetado para ingestão e processamento de dados de streaming em tempo real com alta throughput. SQS é para desacoplamento de workloads, não para análise de streaming em tempo real. SNS é para notificações pub/sub.",simple:"Kinesis = processamento de streaming em tempo real de alto volume. SQS = fila de desacoplamento de mensagens.",avoid:"Kinesis retém dados por até 365 dias por shard. Monitore o número de shards e o consumo para evitar ThrottlingException e custos excessivos em picos de tráfego."},en:{tech:"Amazon Kinesis Data Streams is designed for real-time, high-throughput data stream ingestion and processing. SQS is for workload decoupling, not real-time streaming analysis. SNS is for pub/sub notifications.",simple:"Kinesis = real-time high-volume streaming processing. SQS = message decoupling queue.",avoid:"Kinesis retains data for up to 365 days per shard. Monitor the number of shards and consumption to avoid ThrottlingException and excessive costs during traffic spikes."}}},
{en:"According to the Shared Responsibility Model, which of the following security tasks does AWS perform for Amazon RDS?",pt:"De acordo com o Modelo de Responsabilidade Compartilhada, qual das seguintes tarefas de segurança a AWS realiza para o Amazon RDS?",o:{en:["Encrypting the database using customer-managed keys","Configuring security groups for the RDS instance","Patching the underlying database engine software","Creating and managing database user accounts"],pt:["Criptografar o banco de dados usando chaves gerenciadas pelo cliente","Configurar security groups para a instância RDS","Aplicar patches no software do mecanismo de banco de dados subjacente","Criar e gerenciar contas de usuário do banco de dados"]},a:[2],t:"Shared Responsibility",exp:{pt:{tech:"Com RDS, a AWS gerencia o patching do sistema operacional e do mecanismo do banco de dados como parte do serviço gerenciado. O cliente gerencia criptografia (configuração), security groups, usuários do banco e backups (verificação/teste).",simple:"RDS: AWS faz patching do engine. Cliente configura segurança, usuários e backups.",avoid:"Mesmo com RDS gerenciado, você é responsável por configurar janelas de manutenção adequadas para aplicação de patches. Janelas mal configuradas podem causar indisponibilidade inesperada."},en:{tech:"With RDS, AWS manages patching the operating system and database engine software as part of the managed service. The customer manages encryption (configuration), security groups, database users, and backups (verification/testing).",simple:"RDS: AWS does engine patching. Customer configures security, users, and backups.",avoid:"Even with managed RDS, you are responsible for configuring appropriate maintenance windows for patch application. Poorly configured windows can cause unexpected downtime."}}},
{en:"A company is designing a new application and wants to follow the Well-Architected principle of using automation to make changes. This should eliminate manual processes that could introduce human error. Which pillar of the Well-Architected Framework does this principle belong to?",pt:"Uma empresa está projetando uma nova aplicação e quer seguir o princípio Well-Architected de usar automação para fazer mudanças. Isso deve eliminar processos manuais que podem introduzir erros humanos. Qual pilar do Well-Architected Framework esse princípio pertence?",o:{en:["Reliability","Performance Efficiency","Operational Excellence","Security"],pt:["Confiabilidade","Eficiência de Performance","Excelência Operacional","Segurança"]},a:[2],t:"Well-Architected",exp:{pt:{tech:"Operational Excellence inclui princípios de design como executar operações como código (IaC), fazer mudanças frequentes e pequenas e antecipar falhas. Automação de processos operacionais é um design principle central desse pilar.",simple:"Operational Excellence = operar sistemas eficientemente, incluindo automação para reduzir erro humano.",avoid:"Automatizar processos sem documentação e testes adequados pode amplificar erros em escala. Implemente rollback automatizado e monitore cada pipeline de automação."},en:{tech:"Operational Excellence includes design principles such as performing operations as code (IaC), making frequent and small changes, and anticipating failure. Automating operational processes is a central design principle of this pillar.",simple:"Operational Excellence = operating systems efficiently, including automation to reduce human error.",avoid:"Automating processes without proper documentation and testing can amplify errors at scale. Implement automated rollback and monitor every automation pipeline."}}},
{en:"A company wants to run containerized applications without managing the underlying EC2 instances or cluster infrastructure. Which AWS service is MOST appropriate?",pt:"Uma empresa quer executar aplicações em contêiner sem gerenciar as instâncias EC2 subjacentes ou a infraestrutura do cluster. Qual serviço AWS é o MAIS adequado?",o:{en:["Amazon ECS with EC2 launch type","Amazon EKS with self-managed nodes","AWS Fargate","Amazon EC2 with Docker installed"],pt:["Amazon ECS com tipo de lançamento EC2","Amazon EKS com nós autogerenciados","AWS Fargate","Amazon EC2 com Docker instalado"]},a:[2],t:"Cost Management",exp:{pt:{tech:"AWS Fargate é um mecanismo de computação serverless para containers que elimina a necessidade de provisionar, configurar e gerenciar clusters de EC2. Você define apenas os requisitos de CPU e memória do container.",simple:"Fargate = containers serverless sem gerenciar servidores. EC2 launch type = você gerencia os servidores do cluster.",avoid:"Fargate é mais caro por CPU/memória do que EC2 equivalente, mas elimina overhead operacional. Para workloads de alto volume e previsíveis, compare custos antes de escolher."},en:{tech:"AWS Fargate is a serverless compute engine for containers that eliminates the need to provision, configure, and manage EC2 clusters. You only define the CPU and memory requirements for the container.",simple:"Fargate = serverless containers without managing servers. EC2 launch type = you manage the cluster servers.",avoid:"Fargate is more expensive per CPU/memory than equivalent EC2, but eliminates operational overhead. For high-volume, predictable workloads, compare costs before choosing."}}},
{en:"A company wants to provide users with a single sign-on experience to access multiple AWS accounts without creating separate IAM users in each account. Which approach is MOST scalable?",pt:"Uma empresa quer fornecer aos usuários uma experiência de single sign-on para acessar múltiplas contas AWS sem criar usuários IAM separados em cada conta. Qual abordagem é a MAIS escalável?",o:{en:["Create duplicate IAM users in every AWS account","Use AWS IAM Identity Center (SSO) federated with the corporate identity provider","Share IAM user credentials across accounts","Create IAM cross-account roles manually for each user"],pt:["Criar usuários IAM duplicados em cada conta AWS","Usar AWS IAM Identity Center (SSO) federado com o provedor de identidade corporativo","Compartilhar credenciais de usuário IAM entre contas","Criar roles IAM cross-account manualmente para cada usuário"]},a:[1],t:"IAM",exp:{pt:{tech:"AWS IAM Identity Center (anteriormente AWS SSO) integra com provedores de identidade como Active Directory ou Okta via SAML 2.0, fornecendo acesso unificado a múltiplas contas AWS e aplicações com uma única autenticação corporativa.",simple:"IAM Identity Center = SSO centralizado integrado com o diretório corporativo para acesso a múltiplas contas.",avoid:"Nunca crie usuários IAM duplicados entre contas para 'simplificar' o gerenciamento. Isso multiplica a superfície de ataque e o overhead de gerenciamento. Use federação de identidade."},en:{tech:"AWS IAM Identity Center (formerly AWS SSO) integrates with identity providers like Active Directory or Okta via SAML 2.0, providing unified access to multiple AWS accounts and applications with a single corporate authentication.",simple:"IAM Identity Center = centralized SSO integrated with the corporate directory for access to multiple accounts.",avoid:"Never create duplicate IAM users across accounts to simplify management. This multiplies the attack surface and management overhead. Use identity federation."}}},
{en:"A company is reviewing their cloud strategy and needs to classify which perspective of the Cloud Adoption Framework (CAF) covers risk management, compliance, and cloud program governance.",pt:"Uma empresa está revisando sua estratégia de nuvem e precisa classificar qual perspectiva do Cloud Adoption Framework (CAF) abrange gestão de riscos, conformidade e governança do programa de nuvem.",o:{en:["Operations","People","Governance","Business"],pt:["Operations","People","Governance","Business"]},a:[2],t:"CAF",exp:{pt:{tech:"A perspectiva Governance do CAF cobre gerenciamento de riscos, conformidade regulatória, auditoria, gestão financeira e governança do programa de nuvem. Operations cobre monitoramento, gerenciamento de incidentes e operações de serviço.",simple:"Governance = compliance, riscos e governança do programa. Operations = monitoramento e operações do dia a dia.",avoid:"Governance no CAF é sobre processo e conformidade, não sobre ferramentas técnicas como AWS Config. Não confunda o pilar de framework organizacional com os serviços técnicos."},en:{tech:"The Governance perspective of the CAF covers risk management, regulatory compliance, auditing, financial management, and cloud program governance. Operations covers monitoring, incident management, and service operations.",simple:"Governance = compliance, risks, and program governance. Operations = day-to-day monitoring and operations.",avoid:"Governance in CAF is about process and compliance, not about technical tools like AWS Config. Do not confuse the organizational framework pillar with technical services."}}},
{en:"A company is moving to a multi-account AWS strategy. The security team wants a single place to manage security findings across all accounts without logging into each account individually. Which service provides this?",pt:"Uma empresa está adotando uma estratégia multi-conta AWS. A equipe de segurança quer um único lugar para gerenciar descobertas de segurança em todas as contas sem fazer login em cada conta individualmente. Qual serviço oferece isso?",o:{en:["AWS Organizations","AWS IAM Identity Center","AWS Security Hub with Organizations integration","AWS Trusted Advisor"],pt:["AWS Organizations","AWS IAM Identity Center","AWS Security Hub com integração Organizations","AWS Trusted Advisor"]},a:[2],t:"GuardDuty",exp:{pt:{tech:"AWS Security Hub integra com AWS Organizations para agregar automaticamente descobertas de todas as contas membro em uma conta de administrador delegado. GuardDuty também suporta o mesmo modelo delegado, enviando alertas centralizados.",simple:"Security Hub + Organizations = visibilidade central de segurança em todas as contas filhas.",avoid:"Designar uma conta dedicada de segurança (separada da conta de gerenciamento) como administrador delegado do Security Hub é a prática recomendada. Evite usar a conta root da organização para operações de segurança."},en:{tech:"AWS Security Hub integrates with AWS Organizations to automatically aggregate findings from all member accounts into a delegated administrator account. GuardDuty also supports the same delegated model, sending centralized alerts.",simple:"Security Hub + Organizations = centralized security visibility across all child accounts.",avoid:"Designating a dedicated security account (separate from the management account) as delegated administrator for Security Hub is the recommended best practice. Avoid using the organization root account for security operations."}}},
{en:"A company needs to automatically respond to a GuardDuty finding that detects an EC2 instance communicating with a known malicious IP address. They want this remediation to happen WITHOUT human intervention. Which approach requires the LEAST operational overhead?",pt:"Uma empresa precisa responder automaticamente a uma descoberta do GuardDuty que detecta uma instância EC2 se comunicando com um IP malicioso conhecido. Eles querem que essa remediação aconteça SEM intervenção humana. Qual abordagem requer o MENOR overhead operacional?",o:{en:["Create a Lambda function triggered manually when GuardDuty alerts appear","Configure GuardDuty findings to trigger Amazon EventBridge rules that invoke a Lambda function to isolate the instance","Export GuardDuty findings to S3 and have the security team review them weekly","Use AWS Config rules to detect the finding and email the team"],pt:["Criar uma função Lambda acionada manualmente quando alertas do GuardDuty aparecem","Configurar descobertas do GuardDuty para acionar regras do Amazon EventBridge que invocam uma função Lambda para isolar a instância","Exportar descobertas do GuardDuty para S3 e ter a equipe de segurança revisando-as semanalmente","Usar regras do AWS Config para detectar a descoberta e enviar email para a equipe"]},a:[1],t:"GuardDuty",exp:{pt:{tech:"GuardDuty publica findings no EventBridge (CloudWatch Events) automaticamente. EventBridge regras podem acionar Lambda para executar remediação automatizada como isolar a instância, modificar security groups ou criar snapshots forenses, sem intervenção humana.",simple:"GuardDuty → EventBridge → Lambda = pipeline de remediação automatizada sem intervenção humana.",avoid:"Automatize remediações com cuidado. Isolar automaticamente instâncias pode causar indisponibilidade de produção se a regra tiver falsos positivos. Teste exaustivamente em ambientes não produtivos primeiro."},en:{tech:"GuardDuty automatically publishes findings to EventBridge (CloudWatch Events). EventBridge rules can trigger Lambda to execute automated remediation such as isolating the instance, modifying security groups, or creating forensic snapshots, without human intervention.",simple:"GuardDuty → EventBridge → Lambda = automated remediation pipeline without human intervention.",avoid:"Automate remediations carefully. Automatically isolating instances can cause production downtime if the rule has false positives. Test exhaustively in non-production environments first."}}}];

let activeQ = [];
let userAnswers = [];

function shuffle(arr){
  const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;
}

function pickQuestions(){
  // Group by topic, shuffle within each group
  const groups={};
  for(const q of Q){
    const t=q.t||'General';
    if(!groups[t]) groups[t]=[];
    groups[t].push(q);
  }
  for(const t in groups) groups[t]=shuffle(groups[t]);

  // Round-robin: pick 1 from each topic until we have 65
  const topicKeys=shuffle(Object.keys(groups));
  const picked=[];
  const remaining=[];

  // First pass: 1 per topic
  for(const t of topicKeys){
    picked.push(groups[t][0]);
    if(groups[t].length>1) remaining.push(...groups[t].slice(1));
  }

  // Fill remaining slots from shuffled leftovers (spread across topics)
  const leftover=shuffle(remaining);
  for(const q of leftover){
    if(picked.length>=65) break;
    // Only add if this topic not already at 2
    const topicCount=picked.filter(p=>p.t===q.t).length;
    if(topicCount<2) picked.push(q);
  }

  // If still under 65, fill without topic restriction
  if(picked.length<65){
    for(const q of leftover){
      if(picked.length>=65) break;
      if(!picked.includes(q)) picked.push(q);
    }
  }

  activeQ=shuffle(picked.slice(0,65));
  userAnswers=new Array(65).fill(null);
  lockedQuestions=new Set();
  studyCorrect=0;studyAnswered=0;
}

function setLang(l){
  lang=l;
  document.getElementById('btn-pt').classList.toggle('active',l==='pt');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  document.getElementById('btn-study').textContent=ui[l].modeStudy;
  document.getElementById('btn-exam').textContent=ui[l].modeExam;
  updateStartScreen();
  if(document.getElementById('quiz-section').style.display!=='none'){
    renderQuiz();updateProgress();
    document.getElementById('btn-submit').textContent=ui[lang].submit;
    if(mode==='study') updateStudyScore();
  }
}

function setMode(m){
  if(document.getElementById('quiz-section').style.display!=='none') return;
  mode=m;
  document.getElementById('btn-study').classList.toggle('active',m==='study');
  document.getElementById('btn-exam').classList.toggle('active',m==='exam');
  updateStartScreen();
}

function newQuiz(){
  document.getElementById('results-section').style.display='none';
  document.getElementById('quiz-section').style.display='none';
  document.getElementById('start-screen').style.display='block';
  updateStartScreen();
}

function updateStartScreen(){
  const t=ui[lang];
  document.getElementById('header-sub').textContent=t.sub();
  document.getElementById('start-title').textContent=mode==='study'?t.startStudy:t.startExam;
  document.getElementById('start-desc').textContent=mode==='study'?t.descStudy:t.descExam;
  document.getElementById('btn-start').textContent=t.btnStart;
}

function startQuiz(){
  document.getElementById('start-screen').style.display='none';
  document.getElementById('quiz-section').style.display='block';
  document.getElementById('results-section').style.display='none';
  pickQuestions();
  if(mode==='exam'){
    document.getElementById('timer-bar').style.display='block';
    document.getElementById('study-score').style.display='none';
    timeLeft=3600;updateTimerDisplay();
    timerInterval=setInterval(()=>{timeLeft--;updateTimerDisplay();if(timeLeft<=0){clearInterval(timerInterval);submitQuiz();}},1000);
  } else {
    document.getElementById('timer-bar').style.display='none';
    document.getElementById('study-score').style.display='block';
    updateStudyScore();
  }
  renderQuiz();updateProgress();
  document.getElementById('btn-submit').textContent=ui[lang].submit;
}

function updateTimerDisplay(){
  const m=Math.floor(timeLeft/60),s=timeLeft%60;
  const el=document.getElementById('timer');
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.classList.toggle('warn',timeLeft<=300);
}

function updateStudyScore(){
  document.getElementById('ss-text').innerHTML=ui[lang].studyScore(studyCorrect,studyAnswered);
}

function renderQuiz(){
  const c=document.getElementById('questions-container');c.innerHTML='';
  const L=['A','B','C','D','E'];
  activeQ.forEach((q,i)=>{
    const isMulti=q.multi||false;const needed=q.a.length;
    const qText=q[lang];const opts=q.o[lang];
    let note=isMulti?`<div class="q-note">${ui[lang].choose(needed)}</div>`:'';
    let optHtml='';
    opts.forEach((opt,j)=>{
      const sel=userAnswers[i]&&userAnswers[i].includes(j)?'selected':'';
      const locked=lockedQuestions.has(i)?'locked':'';
      let reveal='';
      if(mode==='study'&&lockedQuestions.has(i)){
        if(q.a.includes(j)) reveal='correct-reveal';
        else if(userAnswers[i]&&userAnswers[i].includes(j)) reveal='wrong-reveal';
      }
      optHtml+=`<div class="option ${isMulti?'multi':''} ${sel} ${locked} ${reveal}" onclick="selectOption(${i},${j},${isMulti})" id="opt-${i}-${j}">
        <div class="check"></div><span class="letter">${L[j]}.</span><span class="text">${opt}</span></div>`;
    });
    const answered=userAnswers[i]&&userAnswers[i].length>0?'answered':'';
    let studyClass='';
    if(mode==='study'&&lockedQuestions.has(i)){
      const ca=[...q.a].sort();const ua=[...(userAnswers[i]||[])].sort();
