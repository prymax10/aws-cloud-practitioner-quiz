{en:"A company runs a web application that experiences 10x traffic spikes during holiday seasons. Which EC2 feature automatically adds or removes instances based on demand?",pt:"Uma empresa executa uma aplicação web que experimenta picos de tráfego 10x durante temporadas de férias. Qual recurso do EC2 adiciona ou remove instâncias automaticamente com base na demanda?",o:{en:["Auto Scaling","Elastic Load Balancing","Reserved Instances","Placement Groups"],pt:["Auto Scaling","Elastic Load Balancing","Instâncias Reservadas","Grupos de Posicionamento"]},a:[0],exp:{pt:{tech:"O Amazon EC2 Auto Scaling ajusta automaticamente o número de instâncias EC2 com base em condições definidas (métricas do CloudWatch, horários programados), mantendo performance e otimizando custos.",simple:"O Auto Scaling monitora a demanda da sua aplicacao e automaticamente adiciona mais instancias EC2 quando o trafego aumenta e remove quando diminui. Isso garante que voce tenha capacidade suficiente sem pagar por recursos ociosos.",avoid:"Nao use Auto Scaling sem definir metricas e limites adequados — sem configuracao correta, ele pode escalar demais (custando caro) ou de menos (causando lentidao). Sempre defina limites minimos e maximos de instancias."},en:{tech:"Amazon EC2 Auto Scaling automatically adjusts the number of EC2 instances based on defined conditions (CloudWatch metrics, scheduled times), maintaining performance and optimizing costs.",simple:"Auto Scaling monitors your application demand and automatically adds more EC2 instances when traffic increases and removes them when it decreases. This ensures you have enough capacity without paying for idle resources.",avoid:"Do not use Auto Scaling without defining proper metrics and limits — without correct configuration, it may scale too much (costing more) or too little (causing slowness). Always set minimum and maximum instance limits."}}},
{en:"Which AWS service provides a fully managed message queuing service that enables decoupling of microservices and distributed systems?",pt:"Qual serviço da AWS fornece um serviço de filas de mensagens totalmente gerenciado que permite o desacoplamento de microsserviços e sistemas distribuídos?",o:{en:["Amazon SQS","Amazon SNS","Amazon EventBridge","AWS Step Functions"],pt:["Amazon SQS","Amazon SNS","Amazon EventBridge","AWS Step Functions"]},a:[0],exp:{pt:{tech:"O Amazon SQS (Simple Queue Service) é um serviço de filas de mensagens totalmente gerenciado que permite desacoplar e escalar microsserviços, sistemas distribuídos e aplicações serverless.",simple:"O Amazon SQS e um servico de filas de mensagens que permite que componentes de um sistema se comuniquem de forma assincrona, sem um precisar esperar a resposta do outro. As mensagens ficam na fila ate serem processadas pelo componente receptor.",avoid:"Nao use SQS quando voce precisa enviar a mesma mensagem para varios receptores ao mesmo tempo — para isso use o Amazon SNS. O SQS entrega cada mensagem para um unico consumidor."},en:{tech:"Amazon SQS (Simple Queue Service) is a fully managed message queuing service that enables decoupling and scaling of microservices, distributed systems, and serverless applications.",simple:"Amazon SQS is a message queue service that allows system components to communicate asynchronously, without one needing to wait for the other to respond. Messages stay in the queue until processed by the receiving component.",avoid:"Do not use SQS when you need to send the same message to multiple receivers at once — for that use Amazon SNS. SQS delivers each message to a single consumer."}}},
{en:"Which TWO are valid use cases for Amazon CloudWatch? (Choose TWO)",pt:"Quais DOIS são casos de uso válidos para o Amazon CloudWatch? (Escolha DOIS)",o:{en:["Monitoring CPU utilization of EC2 instances and triggering alarms","Creating dashboards to visualize operational metrics in real time","Recording all API calls made to AWS services","Automatically remediating non-compliant resource configurations"],pt:["Monitorar utilização de CPU de instâncias EC2 e disparar alarmes","Criar painéis para visualizar métricas operacionais em tempo real","Registrar todas as chamadas de API feitas aos serviços AWS","Remediar automaticamente configurações de recursos não conformes"]},a:[0,1],multi:true,exp:{pt:{tech:"O Amazon CloudWatch coleta e monitora métricas, logs e eventos, permite criar alarmes com ações automáticas e dashboards personalizados para visualização em tempo real do estado operacional.",simple:"O Amazon CloudWatch coleta metricas de recursos AWS como uso de CPU de instancias EC2 e permite criar alarmes que disparam acoes quando limites sao ultrapassados. Voce tambem pode criar dashboards para visualizar essas metricas em tempo real.",avoid:"Nao confunda CloudWatch com CloudTrail — CloudWatch monitora metricas de performance, enquanto CloudTrail registra chamadas de API (quem fez o que). Sao servicos complementares, nao substitutos."},en:{tech:"Amazon CloudWatch collects and monitors metrics, logs, and events, allows creating alarms with automatic actions and custom dashboards for real-time visualization of operational state.",simple:"Amazon CloudWatch collects metrics from AWS resources like EC2 instance CPU usage and lets you create alarms that trigger actions when thresholds are exceeded. You can also create dashboards to visualize these metrics in real time.",avoid:"Do not confuse CloudWatch with CloudTrail — CloudWatch monitors performance metrics, while CloudTrail records API calls (who did what). They are complementary services, not substitutes."}}},
{en:"In the context of VPC networking, what is the purpose of a subnet?",pt:"No contexto de redes VPC, qual é o propósito de uma sub-rede?",o:{en:["To partition a VPC IP address range into smaller segments for organizing resources","To connect the VPC to the internet","To provide DNS resolution for VPC resources","To encrypt network traffic between instances"],pt:["Particionar o intervalo de endereços IP de uma VPC em segmentos menores para organizar recursos","Conectar a VPC à internet","Fornecer resolução de DNS para recursos da VPC","Criptografar o tráfego de rede entre instâncias"]},a:[0],exp:{pt:{tech:"Uma sub-rede é um segmento de faixa de endereços IP dentro de uma VPC, associada a uma única AZ. Sub-redes podem ser públicas (com rota para Internet Gateway) ou privadas.",simple:"Uma subnet divide o intervalo de enderecos IP de uma VPC em segmentos menores para organizar recursos. Voce pode ter subnets publicas (com acesso a internet) e privadas (sem acesso direto) para separar diferentes tipos de recursos.",avoid:"Nao crie todos os recursos em uma unica subnet — use subnets diferentes para separar recursos publicos e privados. Colocar bancos de dados em subnets publicas e um erro comum que expoe dados a riscos de seguranca."},en:{tech:"A subnet is a segment of IP address range within a VPC, associated with a single AZ. Subnets can be public (with route to Internet Gateway) or private.",simple:"A subnet divides a VPC IP address range into smaller segments to organize resources. You can have public subnets (with internet access) and private subnets (without direct access) to separate different types of resources.",avoid:"Do not create all resources in a single subnet — use different subnets to separate public and private resources. Placing databases in public subnets is a common mistake that exposes data to security risks."}}},
{en:"A retail company wants to analyze historical spending patterns and forecast future AWS costs for the next 12 months. Which tool should they use?",pt:"Uma empresa de varejo deseja analisar padrões de gastos históricos e prever custos futuros da AWS para os próximos 12 meses. Qual ferramenta deve ser utilizada?",o:{en:["AWS Cost Explorer","AWS Budgets","AWS Pricing Calculator","AWS Billing Dashboard"],pt:["AWS Cost Explorer","AWS Budgets","AWS Calculadora de Preços","AWS Painel de Faturamento"]},a:[0],exp:{pt:{tech:"O AWS Cost Explorer fornece visualização e análise de custos e uso ao longo do tempo, com recursos de filtragem, agrupamento e previsão de gastos futuros por até 12 meses.",simple:"O AWS Cost Explorer mostra graficos e relatorios dos seus gastos AWS ao longo do tempo e pode projetar custos futuros para os proximos 12 meses com base nos padroes historicos. Ele ajuda a identificar tendencias e encontrar oportunidades de economia.",avoid:"Nao confunda Cost Explorer com o Pricing Calculator — Cost Explorer analisa gastos reais que ja ocorreram, enquanto o Pricing Calculator estima custos antes do deploy. Tambem nao confunda com Budgets, que envia alertas de limites."},en:{tech:"AWS Cost Explorer provides cost and usage visualization and analysis over time, with filtering, grouping, and future spending forecasting capabilities for up to 12 months.",simple:"AWS Cost Explorer shows charts and reports of your AWS spending over time and can forecast future costs for the next 12 months based on historical patterns. It helps identify trends and find savings opportunities.",avoid:"Do not confuse Cost Explorer with the Pricing Calculator — Cost Explorer analyzes actual spending that already occurred, while the Pricing Calculator estimates costs before deployment. Also do not confuse it with Budgets, which sends threshold alerts."}}},
{en:"Which AWS service provides a set of physical devices that can transfer data into and out of AWS by shipping the device, useful when network transfer would take too long?",pt:"Qual serviço da AWS fornece um conjunto de dispositivos físicos que podem transferir dados para dentro e fora da AWS enviando o dispositivo, útil quando a transferência por rede demoraria muito?",o:{en:["AWS Snow Family","AWS DataSync","AWS Transfer Family","AWS Direct Connect"],pt:["AWS Snow Family","AWS DataSync","AWS Transfer Family","AWS Direct Connect"]},a:[0],exp:{pt:{tech:"A AWS Snow Family (Snowcone, Snowball Edge, Snowmobile) oferece dispositivos físicos para migração de dados offline em escala, desde 8 TB (Snowcone) até 100 PB (Snowmobile).",simple:"O AWS Snow Family e um conjunto de dispositivos fisicos que a AWS envia ate voce para transferir grandes volumes de dados. Voce copia os dados no dispositivo e o envia de volta para a AWS, util quando transferir pela rede seria muito lento ou inviavel.",avoid:"Nao use Snow Family para transferencias pequenas de dados que podem ser feitas pela rede normalmente — o processo de envio fisico leva dias. Para dados menores, use AWS DataSync ou transferencia direta pela internet."},en:{tech:"The AWS Snow Family (Snowcone, Snowball Edge, Snowmobile) provides physical devices for offline data migration at scale, from 8 TB (Snowcone) to 100 PB (Snowmobile).",simple:"The AWS Snow Family is a set of physical devices that AWS ships to you for transferring large volumes of data. You copy data onto the device and ship it back to AWS, useful when transferring over the network would be too slow or impractical.",avoid:"Do not use Snow Family for small data transfers that can be done over the network normally — the physical shipping process takes days. For smaller data, use AWS DataSync or direct internet transfer."}}},
{en:"Which feature of the AWS Free Tier allows new customers to run a t2.micro or t3.micro EC2 instance for free for 12 months?",pt:"Qual recurso do AWS Free Tier permite que novos clientes executem uma instância EC2 t2.micro ou t3.micro gratuitamente por 12 meses?",o:{en:["12-Month Free Tier","Always Free","Short-Term Trial","Free Usage Credits"],pt:["Free Tier de 12 Meses","Sempre Gratuito","Teste de Curto Prazo","Créditos de Uso Gratuito"]},a:[0],exp:{pt:{tech:"O AWS Free Tier oferece três tipos de ofertas: 12-Month Free (expira 12 meses após criação da conta), Always Free (não expira), e Short-Term Trials (período limitado por serviço). A instância t2/t3.micro é parte do 12-Month Free.",simple:"O 12-Month Free Tier da AWS permite que novos clientes usem certos recursos gratuitamente por 12 meses apos criar a conta, incluindo uma instancia t2.micro ou t3.micro EC2. Apos os 12 meses, o uso passa a ser cobrado normalmente.",avoid:"Nao confunda com o Free Tier Always Free, que nao expira — o 12-Month Free Tier tem prazo. Tambem fique atento para nao exceder os limites gratuitos (como tipo de instancia ou horas de uso), pois o excedente e cobrado."},en:{tech:"The AWS Free Tier offers three types of offers: 12-Month Free (expires 12 months after account creation), Always Free (does not expire), and Short-Term Trials (limited period per service). The t2/t3.micro instance is part of 12-Month Free.",simple:"The AWS 12-Month Free Tier allows new customers to use certain resources for free for 12 months after creating the account, including a t2.micro or t3.micro EC2 instance. After 12 months, usage is charged at standard rates.",avoid:"Do not confuse it with the Always Free Tier, which does not expire — the 12-Month Free Tier has a time limit. Also be careful not to exceed free limits (like instance type or usage hours), as overages are charged."}}},
{en:"Which AWS service acts as a managed Apache Kafka service for building real-time streaming data pipelines and applications?",pt:"Qual serviço da AWS atua como um serviço gerenciado do Apache Kafka para construir pipelines e aplicações de dados de streaming em tempo real?",o:{en:["Amazon MSK","Amazon Kinesis Data Streams","Amazon SQS","Amazon EventBridge"],pt:["Amazon MSK","Amazon Kinesis Data Streams","Amazon SQS","Amazon EventBridge"]},a:[0],exp:{pt:{tech:"O Amazon MSK (Managed Streaming for Apache Kafka) é um serviço totalmente gerenciado que facilita a construção e execução de aplicações que usam Apache Kafka para processar dados de streaming.",simple:"O Amazon MSK e um servico gerenciado que roda Apache Kafka na AWS sem voce precisar instalar, configurar ou manter a infraestrutura do Kafka. Voce cria o cluster e o MSK cuida de patches, monitoramento e escalabilidade.",avoid:"Nao use MSK se voce so precisa de uma fila de mensagens simples — o SQS e mais simples e barato para esse caso. MSK e indicado quando voce precisa de streaming de dados em tempo real com a arquitetura Kafka."},en:{tech:"Amazon MSK (Managed Streaming for Apache Kafka) is a fully managed service that makes it easy to build and run applications that use Apache Kafka to process streaming data.",simple:"Amazon MSK is a managed service that runs Apache Kafka on AWS without you needing to install, configure, or maintain the Kafka infrastructure. You create the cluster and MSK handles patches, monitoring, and scalability.",avoid:"Do not use MSK if you only need a simple message queue — SQS is simpler and cheaper for that case. MSK is recommended when you need real-time data streaming with the Kafka architecture."}}},
{en:"A company needs a VPC that can route traffic between itself and another VPC without going through the public internet. Which feature enables this direct private connection?",pt:"Uma empresa precisa de uma VPC que possa rotear tráfego entre ela mesma e outra VPC sem passar pela internet pública. Qual recurso permite essa conexão privada direta?",o:{en:["VPC Peering","Internet Gateway","NAT Gateway","AWS Transit Gateway"],pt:["VPC Peering","Internet Gateway","NAT Gateway","AWS Transit Gateway"]},a:[0],exp:{pt:{tech:"O VPC Peering cria uma conexão de rede privada entre duas VPCs usando endereços IP privados, como se estivessem na mesma rede. O tráfego permanece na rede da AWS e não atravessa a internet pública.",simple:"O VPC Peering cria uma conexao de rede privada entre duas VPCs, permitindo que recursos em ambas se comuniquem usando enderecos IP privados sem passar pela internet publica. O trafego permanece dentro da rede AWS.",avoid:"Nao use VPC Peering quando voce precisa conectar muitas VPCs entre si — o peering nao e transitivo, entao cada par de VPCs precisa de sua propria conexao. Para conectar muitas VPCs, use o AWS Transit Gateway."},en:{tech:"VPC Peering creates a private network connection between two VPCs using private IP addresses, as if they were on the same network. Traffic stays on the AWS network and does not cross the public internet.",simple:"VPC Peering creates a private network connection between two VPCs, allowing resources in both to communicate using private IP addresses without going through the public internet. Traffic stays within the AWS network.",avoid:"Do not use VPC Peering when you need to connect many VPCs to each other — peering is not transitive, so each pair of VPCs needs its own connection. To connect many VPCs, use AWS Transit Gateway."}}},
{en:"Which AWS service provides managed Memcached or Redis clusters for caching frequently accessed data to improve application performance?",pt:"Qual serviço da AWS fornece clusters gerenciados de Memcached ou Redis para armazenar em cache dados acessados frequentemente e melhorar a performance da aplicação?",o:{en:["Amazon ElastiCache","Amazon DynamoDB Accelerator","Amazon Redshift","Amazon RDS Proxy"],pt:["Amazon ElastiCache","Amazon DynamoDB Accelerator","Amazon Redshift","Amazon RDS Proxy"]},a:[0],exp:{pt:{tech:"O Amazon ElastiCache é um serviço totalmente gerenciado de cache em memória compatível com Redis e Memcached, oferecendo latência de sub-milissegundo para casos de uso como caching de sessão e consultas frequentes.",simple:"O Amazon ElastiCache fornece clusters gerenciados de Memcached ou Redis que armazenam dados em memoria para acesso ultra-rapido. Ele e usado para fazer cache de dados frequentemente acessados e reduzir a carga em bancos de dados.",avoid:"Nao use ElastiCache como banco de dados principal — dados em memoria sao volateis e podem ser perdidos. Ele e um complemento ao banco de dados, nao um substituto. Para persistencia, mantenha os dados no RDS ou DynamoDB."},en:{tech:"Amazon ElastiCache is a fully managed in-memory caching service compatible with Redis and Memcached, offering sub-millisecond latency for use cases like session caching and frequent queries.",simple:"Amazon ElastiCache provides managed Memcached or Redis clusters that store data in memory for ultra-fast access. It is used to cache frequently accessed data and reduce load on databases.",avoid:"Do not use ElastiCache as your primary database — in-memory data is volatile and can be lost. It is a complement to the database, not a replacement. For persistence, keep data in RDS or DynamoDB."}}},
{en:"What is the MAIN difference between a public subnet and a private subnet in a VPC?",pt:"Qual é a PRINCIPAL diferença entre uma sub-rede pública e uma sub-rede privada em uma VPC?",o:{en:["A public subnet has a route to an Internet Gateway while a private subnet does not","A public subnet allows more EC2 instances than a private subnet","A public subnet uses IPv4 while a private subnet uses IPv6","A public subnet is in one AZ while a private subnet spans multiple AZs"],pt:["Uma sub-rede pública tem uma rota para um Internet Gateway enquanto uma privada não tem","Uma sub-rede pública permite mais instâncias EC2 que uma privada","Uma sub-rede pública usa IPv4 enquanto uma privada usa IPv6","Uma sub-rede pública está em uma AZ enquanto uma privada abrange várias AZs"]},a:[0],exp:{pt:{tech:"A distinção entre sub-rede pública e privada é determinada pela tabela de rotas: sub-redes públicas possuem rota para um Internet Gateway, enquanto sub-redes privadas não possuem essa rota direta.",simple:"Uma subnet publica tem uma rota configurada para um Internet Gateway, permitindo que recursos nela recebam e enviem trafego da internet. Uma subnet privada nao tem essa rota, entao seus recursos nao sao acessiveis diretamente pela internet.",avoid:"Nao coloque recursos sensiveis como bancos de dados em subnets publicas — mesmo com security groups restritivos, e mais seguro manter dados em subnets privadas. Subnets publicas devem ser usadas apenas para recursos que precisam de acesso direto da internet."},en:{tech:"The distinction between public and private subnets is determined by the route table: public subnets have a route to an Internet Gateway, while private subnets do not have that direct route.",simple:"A public subnet has a route configured to an Internet Gateway, allowing resources in it to receive and send internet traffic. A private subnet does not have this route, so its resources are not directly accessible from the internet.",avoid:"Do not place sensitive resources like databases in public subnets — even with restrictive security groups, it is safer to keep data in private subnets. Public subnets should only be used for resources that need direct internet access."}}},
{en:"Which TWO statements about Amazon RDS are correct? (Choose TWO)",pt:"Quais DUAS afirmações sobre o Amazon RDS estão corretas? (Escolha DUAS)",o:{en:["RDS supports multiple database engines including MySQL, PostgreSQL, and Oracle","RDS handles routine database tasks like patching and backups automatically","RDS only supports the Amazon Aurora engine","RDS provides direct access to the underlying operating system of the database instance"],pt:["O RDS suporta vários mecanismos de banco de dados incluindo MySQL, PostgreSQL e Oracle","O RDS lida automaticamente com tarefas rotineiras do banco de dados como patches e backups","O RDS suporta apenas o mecanismo Amazon Aurora","O RDS fornece acesso direto ao sistema operacional subjacente da instância de banco de dados"]},a:[0,1],multi:true,exp:{pt:{tech:"O Amazon RDS é um serviço gerenciado que suporta seis engines (Aurora, MySQL, PostgreSQL, MariaDB, Oracle, SQL Server), automatizando provisionamento de hardware, patches, backups e recuperação.",simple:"O Amazon RDS suporta varios motores de banco de dados como MySQL, PostgreSQL e Oracle, e gerencia automaticamente tarefas rotineiras como aplicacao de patches, backups e recuperacao. Voce foca nos dados e na aplicacao, nao na administracao do banco.",avoid:"Nao use RDS se voce precisa de controle total sobre o sistema operacional do servidor de banco de dados — o RDS e gerenciado e limita acesso ao SO. Para controle total, instale o banco em uma instancia EC2."},en:{tech:"Amazon RDS is a managed service supporting six engines (Aurora, MySQL, PostgreSQL, MariaDB, Oracle, SQL Server), automating hardware provisioning, patching, backups, and recovery.",simple:"Amazon RDS supports multiple database engines like MySQL, PostgreSQL, and Oracle, and automatically manages routine tasks like patching, backups, and recovery. You focus on data and the application, not on database administration.",avoid:"Do not use RDS if you need full control over the database server operating system — RDS is managed and limits OS access. For full control, install the database on an EC2 instance."}}},
{en:"A company wants to enforce that all S3 buckets across their organization have encryption enabled. Which service allows them to create rules that automatically evaluate resource configurations?",pt:"Uma empresa deseja garantir que todos os buckets S3 em sua organização tenham criptografia habilitada. Qual serviço permite criar regras que avaliam automaticamente configurações de recursos?",o:{en:["AWS Config","AWS CloudTrail","Amazon CloudWatch","AWS Organizations"],pt:["AWS Config","AWS CloudTrail","Amazon CloudWatch","AWS Organizations"]},a:[0],exp:{pt:{tech:"O AWS Config permite criar regras gerenciadas e personalizadas que avaliam continuamente as configurações de recursos AWS. A regra s3-bucket-server-side-encryption-enabled verifica se a criptografia está habilitada em buckets S3.",simple:"O AWS Config permite criar regras que avaliam automaticamente se as configuracoes dos seus recursos AWS estao em conformidade com suas politicas, como verificar se todos os buckets S3 tem criptografia ativada. Ele monitora continuamente e sinaliza violacoes.",avoid:"Nao use Config para corrigir automaticamente as violacoes — ele detecta problemas, mas a correcao automatica precisa ser configurada separadamente com remediacao. Tambem nao confunda Config com GuardDuty, que detecta ameacas de seguranca, nao conformidade de configuracao."},en:{tech:"AWS Config allows creating managed and custom rules that continuously evaluate AWS resource configurations. The s3-bucket-server-side-encryption-enabled rule checks if encryption is enabled on S3 buckets.",simple:"AWS Config lets you create rules that automatically evaluate whether your AWS resource configurations comply with your policies, such as checking if all S3 buckets have encryption enabled. It continuously monitors and flags violations.",avoid:"Do not use Config to automatically fix violations — it detects issues, but automatic correction needs to be configured separately with remediation. Also do not confuse Config with GuardDuty, which detects security threats, not configuration compliance."}}},
{en:"Which type of Edge Location resource does Amazon CloudFront use to cache larger files closer to regional viewers when the edge location cache is full?",pt:"Qual tipo de recurso de Edge Location o Amazon CloudFront usa para armazenar em cache arquivos maiores mais perto dos visualizadores regionais quando o cache do edge location está cheio?",o:{en:["Regional Edge Cache","Local Zone","Availability Zone","Wavelength Zone"],pt:["Cache de Borda Regional","Zona Local","Zona de Disponibilidade","Zona Wavelength"]},a:[0],exp:{pt:{tech:"Regional Edge Caches ficam entre o servidor de origem e os Edge Locations globais do CloudFront. Possuem caches maiores e retêm conteúdo por mais tempo, reduzindo a necessidade de buscar no servidor de origem.",simple:"O Regional Edge Cache e uma camada intermediaria do CloudFront entre o servidor de origem e as edge locations. Quando uma edge location nao tem espaco para um arquivo em cache, o Regional Edge Cache ainda pode ter o arquivo armazenado, evitando buscar no servidor de origem.",avoid:"Nao confunda Regional Edge Caches com edge locations comuns — voce nao configura Regional Edge Caches diretamente, eles funcionam automaticamente. Tambem nao espere que eles resolvam problemas de conteudo que nunca foi cacheado."},en:{tech:"Regional Edge Caches sit between the origin server and the global CloudFront Edge Locations. They have larger caches and retain content longer, reducing the need to fetch from the origin server.",simple:"The Regional Edge Cache is an intermediate CloudFront layer between the origin server and edge locations. When an edge location does not have space for a cached file, the Regional Edge Cache may still have the file stored, avoiding a fetch from the origin server.",avoid:"Do not confuse Regional Edge Caches with regular edge locations — you do not configure Regional Edge Caches directly, they work automatically. Also do not expect them to solve problems with content that was never cached."}}},
{en:"Which TWO are characteristics of the AWS Basic Support plan that is available to ALL AWS customers? (Choose TWO)",pt:"Quais DUAS são características do plano AWS Basic Support disponível para TODOS os clientes AWS? (Escolha DUAS)",o:{en:["Access to AWS documentation, whitepapers, and support forums","Access to the 7 core Trusted Advisor checks","24/7 phone access to Cloud Support Engineers","Access to AWS Infrastructure Event Management"],pt:["Acesso a documentação AWS, whitepapers e fóruns de suporte","Acesso às 7 verificações principais do Trusted Advisor","Acesso telefônico 24/7 a Engenheiros de Suporte Cloud","Acesso ao AWS Infrastructure Event Management"]},a:[0,1],multi:true,exp:{pt:{tech:"O plano Basic Support, incluído gratuitamente para todas as contas AWS, oferece acesso a documentação, whitepapers, fóruns, Personal Health Dashboard e 7 verificações principais do Trusted Advisor.",simple:"O plano Basic Support e gratuito para todos os clientes AWS e inclui acesso a documentacao, whitepapers, foruns de suporte e 7 verificacoes basicas do Trusted Advisor. Nao inclui suporte tecnico por chat ou telefone.",avoid:"Nao dependa do plano Basic se voce tem aplicacoes em producao — sem suporte tecnico, voce fica por conta propria para resolver problemas. Para cargas de producao, considere ao menos o plano Developer ou Business."},en:{tech:"The Basic Support plan, included free for all AWS accounts, provides access to documentation, whitepapers, forums, Personal Health Dashboard, and 7 core Trusted Advisor checks.",simple:"The Basic Support plan is free for all AWS customers and includes access to documentation, whitepapers, support forums, and 7 core Trusted Advisor checks. It does not include technical support via chat or phone.",avoid:"Do not rely on the Basic plan if you have production applications — without technical support, you are on your own to resolve issues. For production workloads, consider at least the Developer or Business plan."}}},
{en:"A media company needs to store video files that will be accessed frequently for the first 30 days, then rarely after that. Which S3 feature can automatically transition objects to a cheaper storage class after 30 days?",pt:"Uma empresa de mídia precisa armazenar arquivos de vídeo que serão acessados frequentemente nos primeiros 30 dias e raramente depois disso. Qual recurso do S3 pode transicionar automaticamente objetos para uma classe de armazenamento mais barata após 30 dias?",o:{en:["S3 Lifecycle Policies","S3 Intelligent-Tiering","S3 Versioning","S3 Object Lock"],pt:["Políticas de Ciclo de Vida do S3","S3 Intelligent-Tiering","Versionamento do S3","S3 Object Lock"]},a:[0],exp:{pt:{tech:"As Políticas de Ciclo de Vida do S3 permitem definir regras para transicionar objetos automaticamente entre classes de armazenamento ou excluí-los após um período específico, baseado na idade do objeto.",simple:"O S3 Lifecycle Policies permite criar regras automaticas que movem objetos para classes de armazenamento mais baratas apos um periodo definido, ou os excluem automaticamente. Por exemplo, mover videos para Glacier apos 30 dias sem acesso.",avoid:"Nao aplique lifecycle policies sem entender as classes de destino — mover dados para Glacier economiza, mas o acesso fica lento e a recuperacao tem custo. Certifique-se de que os dados movidos realmente nao precisam de acesso frequente."},en:{tech:"S3 Lifecycle Policies let you define rules to automatically transition objects between storage classes or delete them after a specific period, based on the object age.",simple:"S3 Lifecycle Policies let you create automatic rules that move objects to cheaper storage classes after a defined period, or delete them automatically. For example, moving videos to Glacier after 30 days without access.",avoid:"Do not apply lifecycle policies without understanding the destination classes — moving data to Glacier saves money, but access becomes slow and retrieval has a cost. Make sure the moved data truly does not need frequent access."}}},
{en:"How can you secure sensitive data in Amazon S3? (Choose TWO)",pt:"Como voce pode proteger dados sensiveis no Amazon S3? (Escolha DOIS)",o:{en:["Delete encryption keys after encrypting","With AWS no need to worry about encryption","Enable S3 Encryption","Encrypt data prior to uploading","Delete all IAM users with S3 access"],pt:["Excluir chaves de criptografia apos criptografar","Com a AWS nao e preciso se preocupar com criptografia","Habilitar a criptografia do S3","Criptografar os dados antes de fazer upload","Excluir todos os usuarios IAM com acesso ao S3"]},a:[2,3],multi:true,exp:{pt:{tech:"A seguranca de dados no S3 pode ser alcancada com criptografia server-side (SSE) habilitada no bucket e criptografia client-side antes do upload. Ambas as abordagens protegem dados em repouso.",simple:"Voce pode proteger dados no S3 de duas formas: ativando a criptografia do S3 (que criptografa os dados quando sao armazenados) e criptografando os dados antes de enviar ao S3 (client-side encryption). Usar as duas formas juntas aumenta a protecao.",avoid:"Nao confie apenas na criptografia em repouso sem controlar quem tem acesso — criptografia protege dados no disco, mas se as permissoes do bucket estiverem abertas, usuarios autorizados ainda acessam os dados descriptografados."},en:{tech:"S3 data security can be achieved with server-side encryption (SSE) enabled on the bucket and client-side encryption before uploading. Both approaches protect data at rest.",simple:"You can protect data in S3 in two ways: enabling S3 encryption (which encrypts data when stored) and encrypting data before sending it to S3 (client-side encryption). Using both together increases protection.",avoid:"Do not rely only on encryption at rest without controlling who has access — encryption protects data on disk, but if bucket permissions are open, authorized users still access decrypted data."}}},
{en:"Which service helps developers compile and test code?",pt:"Qual servico ajuda desenvolvedores a compilar e testar codigo?",o:{en:["AWS CodeDeploy","AWS CodeCommit","CloudEndure","AWS CodeBuild"],pt:["AWS CodeDeploy","AWS CodeCommit","CloudEndure","AWS CodeBuild"]},a:[3],exp:{pt:{tech:"AWS CodeBuild e um servico totalmente gerenciado de integracao continua que compila codigo-fonte, executa testes e produz pacotes de software prontos para implantacao.",simple:"O AWS CodeBuild compila codigo-fonte, executa testes automatizados e gera artefatos de software prontos para deploy. E um servico totalmente gerenciado, entao voce nao precisa provisionar ou manter servidores de build.",avoid:"Nao use CodeBuild para gerenciar todo o pipeline de CI/CD — ele faz apenas build e teste. Para orquestrar multiplas etapas (build, teste, deploy), use o CodePipeline junto com o CodeBuild."},en:{tech:"AWS CodeBuild is a fully managed continuous integration service that compiles source code, runs tests, and produces software packages ready for deployment.",simple:"AWS CodeBuild compiles source code, runs automated tests, and produces deployment-ready software artifacts. It is a fully managed service, so you do not need to provision or maintain build servers.",avoid:"Do not use CodeBuild to manage the entire CI/CD pipeline — it only handles build and test. To orchestrate multiple stages (build, test, deploy), use CodePipeline together with CodeBuild."}}},
{en:"What affects S3 storage charges? (Choose TWO)",pt:"O que afeta os custos de armazenamento do S3? (Escolha DOIS)",o:{en:["Using default encryption","Number of EBS volumes","Storage class used","Creating and deleting buckets","Total size of objects stored"],pt:["Usar criptografia padrao","Numero de volumes EBS","Classe de armazenamento utilizada","Criar e excluir buckets","Tamanho total dos objetos armazenados"]},a:[2,4],multi:true,exp:{pt:{tech:"Os custos do S3 dependem principalmente da classe de armazenamento escolhida (Standard, IA, Glacier, etc.) e do volume total de dados armazenados. Criar buckets ou usar criptografia padrao nao gera custos adicionais.",simple:"O custo de armazenamento no S3 depende de dois fatores principais: o tamanho total dos objetos armazenados e a classe de armazenamento escolhida. Classes como S3 Standard custam mais por GB do que classes como S3 Glacier.",avoid:"Nao ignore a classe de armazenamento pensando que so o volume importa — armazenar 1 TB em Standard custa muito mais do que 1 TB em Glacier. Escolha a classe adequada para o padrao de acesso dos seus dados."},en:{tech:"S3 costs depend primarily on the storage class chosen (Standard, IA, Glacier, etc.) and the total volume of data stored. Creating buckets or using default encryption does not incur additional costs.",simple:"S3 storage costs depend on two main factors: the total size of stored objects and the storage class chosen. Classes like S3 Standard cost more per GB than classes like S3 Glacier.",avoid:"Do not ignore the storage class thinking only volume matters — storing 1 TB in Standard costs much more than 1 TB in Glacier. Choose the appropriate class for your data access pattern."}}},
{en:"What does CloudFront provide? (Choose TWO)",pt:"O que o CloudFront oferece? (Escolha DOIS)",o:{en:["Tracks user activity and API usage","Increases application availability by caching content at edge locations","Enables faster disaster recovery","Stores archived data at reduced cost","Delivers content to end users with low latency"],pt:["Rastreia atividades de usuarios e uso de APIs","Aumenta a disponibilidade do aplicativo armazenando conteudo em cache nos edge locations","Permite recuperacao de desastres mais rapida","Armazena dados arquivados com custo reduzido","Entrega conteudo aos usuarios finais com baixa latencia"]},a:[1,4],multi:true,exp:{pt:{tech:"Amazon CloudFront e uma CDN (Content Delivery Network) que distribui conteudo por edge locations ao redor do mundo, reduzindo latencia e aumentando disponibilidade atraves de cache geograficamente distribuido.",simple:"O Amazon CloudFront aumenta a disponibilidade da aplicacao ao manter copias do conteudo em edge locations espalhadas pelo mundo e entrega esse conteudo com baixa latencia a partir do ponto mais proximo do usuario. Isso reduz a carga no servidor de origem.",avoid:"Nao use CloudFront para conteudo que muda a cada requisicao sem configurar TTLs adequados — se o cache estiver desatualizado, usuarios verao versoes antigas. Configure invalidacoes ou TTLs curtos para conteudo dinamico."},en:{tech:"Amazon CloudFront is a CDN (Content Delivery Network) that distributes content through edge locations around the world, reducing latency and increasing availability through geographically distributed caching.",simple:"Amazon CloudFront increases application availability by caching content at edge locations spread worldwide and delivers that content with low latency from the point closest to the user. This reduces load on the origin server.",avoid:"Do not use CloudFront for content that changes every request without configuring proper TTLs — if the cache is stale, users will see old versions. Configure invalidations or short TTLs for dynamic content."}}},
{en:"Which service gives access to AWS auditor-issued reports and compliance certifications?",pt:"Qual servico da acesso a relatorios e certificacoes de conformidade emitidos por auditores da AWS?",o:{en:["AWS Artifact","AWS Config","Amazon CloudWatch","AWS CloudTrail"],pt:["AWS Artifact","AWS Config","Amazon CloudWatch","AWS CloudTrail"]},a:[0],exp:{pt:{tech:"AWS Artifact e um portal de autoatendimento para acessar relatorios de conformidade da AWS (SOC, PCI, ISO) e gerenciar acordos como o BAA (Business Associate Addendum).",simple:"O AWS Artifact e um portal onde voce baixa relatorios de auditoria e certificacoes de conformidade da AWS, como SOC e ISO. Esses documentos comprovam que a AWS atende padroes de seguranca e regulatorios exigidos por auditores.",avoid:"Nao confunda Artifact com Config — Artifact fornece documentos de conformidade da propria AWS, enquanto Config verifica se os seus recursos estao em conformidade com suas regras. Sao propositos diferentes."},en:{tech:"AWS Artifact is a self-service portal for accessing AWS compliance reports (SOC, PCI, ISO) and managing agreements like the BAA (Business Associate Addendum).",simple:"AWS Artifact is a portal where you download AWS audit reports and compliance certifications, such as SOC and ISO. These documents prove that AWS meets security and regulatory standards required by auditors.",avoid:"Do not confuse Artifact with Config — Artifact provides compliance documents from AWS itself, while Config checks if your resources comply with your rules. They serve different purposes."}}},
{en:"Which service collects metrics from running EC2 instances?",pt:"Qual servico coleta metricas de instancias EC2 em execucao?",o:{en:["Amazon Inspector","Amazon CloudWatch","AWS CloudFormation","AWS CloudTrail"],pt:["Amazon Inspector","Amazon CloudWatch","AWS CloudFormation","AWS CloudTrail"]},a:[1],exp:{pt:{tech:"Amazon CloudWatch coleta e monitora metricas como CPU, rede e disco de instancias EC2 e outros recursos AWS. Permite criar alarmes e dashboards para observabilidade.",simple:"O Amazon CloudWatch coleta metricas como uso de CPU, disco e rede de instancias EC2 e outros recursos AWS automaticamente. Voce pode visualizar essas metricas, criar alarmes e acionar acoes quando limites sao atingidos.",avoid:"Nao espere que o CloudWatch colete metricas de memoria RAM por padrao em instancias EC2 — para isso voce precisa instalar o CloudWatch Agent. Metricas de memoria e disco detalhadas exigem configuracao adicional."},en:{tech:"Amazon CloudWatch collects and monitors metrics such as CPU, network, and disk from EC2 instances and other AWS resources. It allows creating alarms and dashboards for observability.",simple:"Amazon CloudWatch collects metrics like CPU, disk, and network usage from EC2 instances and other AWS resources automatically. You can visualize these metrics, create alarms, and trigger actions when thresholds are reached.",avoid:"Do not expect CloudWatch to collect RAM memory metrics by default on EC2 instances — for that you need to install the CloudWatch Agent. Detailed memory and disk metrics require additional configuration."}}},
{en:"Which compute resources are serverless? (Choose TWO)",pt:"Quais recursos de computacao sao serverless? (Escolha DOIS)",o:{en:["Amazon EC2","AWS Fargate","AWS Lambda","Amazon ECS","Amazon EMR"],pt:["Amazon EC2","AWS Fargate","AWS Lambda","Amazon ECS","Amazon EMR"]},a:[1,2],multi:true,exp:{pt:{tech:"AWS Lambda e AWS Fargate sao servicos serverless. Lambda executa codigo em resposta a eventos sem gerenciar servidores. Fargate executa containers sem gerenciar a infraestrutura subjacente de EC2.",simple:"O AWS Lambda executa codigo sem voce provisionar servidores, cobrando apenas pelo tempo de execucao. O AWS Fargate executa containers sem gerenciar servidores, escalando automaticamente. Ambos sao serverless — voce nao gerencia a infraestrutura.",avoid:"Nao use Lambda para processos que rodam continuamente por horas — ele tem limite de 15 minutos por execucao. Para cargas de longa duracao, Fargate ou EC2 sao mais adequados."},en:{tech:"AWS Lambda and AWS Fargate are serverless services. Lambda runs code in response to events without managing servers. Fargate runs containers without managing the underlying EC2 infrastructure.",simple:"AWS Lambda runs code without you provisioning servers, charging only for execution time. AWS Fargate runs containers without managing servers, scaling automatically. Both are serverless — you do not manage the infrastructure.",avoid:"Do not use Lambda for processes that run continuously for hours — it has a 15-minute execution limit. For long-running workloads, Fargate or EC2 are more suitable."}}},
{en:"For compliance, a government agency needs hardware dedicated only to them. Which EC2 option should they use?",pt:"Para conformidade, uma agencia governamental precisa de hardware dedicado exclusivamente a ela. Qual opcao EC2 deve usar?",o:{en:["EC2 Dedicated Hosts","EC2 Reserved Instances","EC2 Spot Instances","EC2 On-Demand Instances"],pt:["EC2 Dedicated Hosts","EC2 Reserved Instances","EC2 Spot Instances","EC2 On-Demand Instances"]},a:[0],exp:{pt:{tech:"EC2 Dedicated Hosts fornecem servidores fisicos dedicados exclusivamente para seu uso, permitindo visibilidade de sockets e cores fisicos. Ideal para requisitos de conformidade e licenciamento por servidor.",simple:"O EC2 Dedicated Hosts fornece servidores fisicos inteiramente dedicados a sua conta, sem compartilhar hardware com outros clientes AWS. Isso atende requisitos de conformidade e licenciamento que exigem isolamento total de hardware.",avoid:"Nao use Dedicated Hosts se voce nao tem requisitos de conformidade ou licenciamento que exijam isso — eles sao significativamente mais caros que instancias compartilhadas. Para a maioria das cargas de trabalho, instancias EC2 normais sao suficientes."},en:{tech:"EC2 Dedicated Hosts provide physical servers exclusively dedicated to your use, giving visibility into physical sockets and cores. Ideal for compliance requirements and per-server licensing.",simple:"EC2 Dedicated Hosts provide physical servers entirely dedicated to your account, without sharing hardware with other AWS customers. This meets compliance and licensing requirements that demand total hardware isolation.",avoid:"Do not use Dedicated Hosts if you do not have compliance or licensing requirements that demand it — they are significantly more expensive than shared instances. For most workloads, regular EC2 instances are sufficient."}}},
{en:"Which service is needed for a financial application that requires ACID transactions?",pt:"Qual servico e necessario para uma aplicacao financeira que requer transacoes ACID?",o:{en:["Amazon Redshift","Amazon RDS","AWS CloudHSM","AWS DMS"],pt:["Amazon Redshift","Amazon RDS","AWS CloudHSM","AWS DMS"]},a:[1],exp:{pt:{tech:"Amazon RDS e um servico de banco de dados relacional gerenciado que suporta transacoes ACID (Atomicidade, Consistencia, Isolamento, Durabilidade), essenciais para aplicacoes financeiras.",simple:"O Amazon RDS oferece bancos de dados relacionais gerenciados que garantem transacoes ACID (Atomicidade, Consistencia, Isolamento, Durabilidade), essenciais para aplicacoes financeiras. Ele assegura que operacoes como transferencias de dinheiro sejam completas ou totalmente revertidas.",avoid:"Nao use DynamoDB para esse caso — bancos NoSQL nao foram projetados para transacoes ACID complexas entre multiplas tabelas. Para requisitos financeiros rigorosos, bancos relacionais como RDS ou Aurora sao a escolha correta."},en:{tech:"Amazon RDS is a managed relational database service that supports ACID transactions (Atomicity, Consistency, Isolation, Durability), essential for financial applications.",simple:"Amazon RDS offers managed relational databases that guarantee ACID transactions (Atomicity, Consistency, Isolation, Durability), essential for financial applications. It ensures operations like money transfers are either completed fully or rolled back entirely.",avoid:"Do not use DynamoDB for this case — NoSQL databases are not designed for complex ACID transactions across multiple tables. For strict financial requirements, relational databases like RDS or Aurora are the correct choice."}}},
{en:"What assigns permissions directly to an IAM user?",pt:"O que atribui permissoes diretamente a um usuario IAM?",o:{en:["IAM Identity","IAM Group","IAM Role","IAM Policy"],pt:["IAM Identity","IAM Group","IAM Role","IAM Policy"]},a:[3],exp:{pt:{tech:"IAM Policies sao documentos JSON que definem permissoes (allow/deny) para acoes em recursos AWS. Podem ser anexadas diretamente a usuarios, grupos ou roles.",simple:"Uma IAM Policy e um documento JSON que define permissoes especificas — quais acoes sao permitidas ou negadas em quais recursos AWS. Voce anexa a policy diretamente a um usuario, grupo ou role para conceder essas permissoes.",avoid:"Nao anexe policies com permissoes amplas demais diretamente a usuarios — siga o principio do menor privilegio. Tambem prefira anexar policies a grupos em vez de usuarios individuais para facilitar o gerenciamento."},en:{tech:"IAM Policies are JSON documents that define permissions (allow/deny) for actions on AWS resources. They can be attached directly to users, groups, or roles.",simple:"An IAM Policy is a JSON document that defines specific permissions — which actions are allowed or denied on which AWS resources. You attach the policy directly to a user, group, or role to grant those permissions.",avoid:"Do not attach policies with overly broad permissions directly to users — follow the principle of least privilege. Also prefer attaching policies to groups instead of individual users for easier management."}}},
{en:"What makes AWS most economical for variable compute demand?",pt:"O que torna a AWS mais economica para demanda de computacao variavel?",o:{en:["Launch powerful EC2 instances for spikes","Pay upfront for discounts","Launch and terminate EC2 instances based on demand","Choose cheaper EC2 instance types"],pt:["Lancar instancias EC2 poderosas para picos","Pagar antecipadamente por descontos","Lancar e encerrar instancias EC2 com base na demanda","Escolher tipos de instancia EC2 mais baratas"]},a:[2],exp:{pt:{tech:"O modelo pay-as-you-go da AWS permite lancar instancias quando a demanda aumenta e encerra-las quando diminui, pagando apenas pelo que usa. Isso elimina o custo de capacidade ociosa.",simple:"O AWS permite criar e encerrar instancias EC2 conforme a demanda aumenta ou diminui, assim voce so paga pelo que realmente usa. Isso e ideal para cargas de trabalho variaveis e imprevisiveis.",avoid:"Nao compre instancias grandes fixas nem Reserved Instances se sua demanda oscila muito. Superprovisionar desperica dinheiro e subprovisionar causa problemas de performance."},en:{tech:"AWS pay-as-you-go model allows launching instances when demand increases and terminating them when it decreases, paying only for what you use. This eliminates idle capacity costs.",simple:"AWS lets you launch and terminate EC2 instances as demand rises or falls, so you only pay for what you actually use. This is ideal for variable and unpredictable workloads.",avoid:"Do not buy fixed large instances or Reserved Instances if your demand fluctuates heavily. Over-provisioning wastes money and under-provisioning causes performance issues."}}},
{en:"Which database engine is NOT supported by Amazon RDS?",pt:"Qual engine de banco de dados NAO e suportada pelo Amazon RDS?",o:{en:["PostgreSQL","Oracle","Microsoft SQL Server","Teradata"],pt:["PostgreSQL","Oracle","Microsoft SQL Server","Teradata"]},a:[3],exp:{pt:{tech:"Amazon RDS suporta seis engines: Amazon Aurora, PostgreSQL, MySQL, MariaDB, Oracle e Microsoft SQL Server. Teradata nao e uma opcao disponivel no RDS.",simple:"O Amazon RDS suporta MySQL, PostgreSQL, MariaDB, Oracle, SQL Server e Amazon Aurora. O Teradata nao e um dos motores suportados pelo RDS.",avoid:"Nao tente usar RDS para qualquer banco relacional sem verificar se o motor e suportado. Se precisar de Teradata, voce deve usar EC2 ou outro servico compativel."},en:{tech:"Amazon RDS supports six engines: Amazon Aurora, PostgreSQL, MySQL, MariaDB, Oracle, and Microsoft SQL Server. Teradata is not an available option in RDS.",simple:"Amazon RDS supports MySQL, PostgreSQL, MariaDB, Oracle, SQL Server, and Amazon Aurora. Teradata is not one of the engines supported by RDS.",avoid:"Do not try to use RDS for any relational database without checking if the engine is supported. If you need Teradata, you must use EC2 or another compatible service."}}},
{en:"Which service can migrate on-premise databases to AWS?",pt:"Qual servico pode migrar bancos de dados on-premise para a AWS?",o:{en:["AWS DMS","S3 Transfer Acceleration","AWS Directory Service","AWS Transit Gateway"],pt:["AWS DMS","S3 Transfer Acceleration","AWS Directory Service","AWS Transit Gateway"]},a:[0],exp:{pt:{tech:"AWS Database Migration Service (DMS) facilita a migracao de bancos de dados para a AWS com tempo minimo de inatividade. Suporta migracoes homogeneas e heterogeneas entre diferentes engines.",simple:"O AWS DMS (Database Migration Service) permite migrar bancos de dados de ambientes on-premise para a AWS. Ele suporta migracoes homogeneas e heterogeneas com minimo tempo de inatividade.",avoid:"Nao use DMS para migrar arquivos ou dados nao estruturados que nao estejam em bancos de dados. Tambem nao confunda DMS com AWS SCT, que converte schemas entre motores diferentes."},en:{tech:"AWS Database Migration Service (DMS) facilitates database migration to AWS with minimal downtime. It supports homogeneous and heterogeneous migrations between different engines.",simple:"AWS DMS (Database Migration Service) lets you migrate databases from on-premise environments to AWS. It supports homogeneous and heterogeneous migrations with minimal downtime.",avoid:"Do not use DMS to migrate files or unstructured data that are not in databases. Also do not confuse DMS with AWS SCT, which converts schemas between different engines."}}},
{en:"What is the easiest way to launch a WordPress website on AWS?",pt:"Qual e a maneira mais facil de lancar um site WordPress na AWS?",o:{en:["Run on Amazon Lightsail","Install on EC2 manually","Use S3 static web hosting","Host on AWS CDK"],pt:["Executar no Amazon Lightsail","Instalar manualmente no EC2","Usar hospedagem estatica do S3","Hospedar no AWS CDK"]},a:[0],exp:{pt:{tech:"Amazon Lightsail oferece servidores virtuais, armazenamento e rede com preco fixo e previsivel. Possui blueprints prontos para WordPress, tornando o lancamento extremamente simples.",simple:"O Amazon Lightsail oferece um ambiente simplificado para lancar sites WordPress com configuracao minima. Ele inclui servidor, armazenamento, rede e IP fixo por um preco mensal previsivel.",avoid:"Nao use Lightsail se voce precisa de controle granular sobre a infraestrutura ou integracao avancada com outros servicos AWS. Para workloads complexas, EC2 e mais adequado."},en:{tech:"Amazon Lightsail offers virtual servers, storage, and networking at a fixed, predictable price. It has ready-made blueprints for WordPress, making deployment extremely simple.",simple:"Amazon Lightsail offers a simplified environment to launch WordPress sites with minimal configuration. It includes server, storage, networking, and a fixed IP for a predictable monthly price.",avoid:"Do not use Lightsail if you need granular control over infrastructure or advanced integration with other AWS services. For complex workloads, EC2 is more suitable."}}},
{en:"Which services can manage encryption keys? (Choose TWO)",pt:"Quais servicos podem gerenciar chaves de criptografia? (Escolha DOIS)",o:{en:["AWS KMS","AWS Certificate Manager","AWS CodeDeploy","AWS CodeCommit","AWS CloudHSM"],pt:["AWS KMS","AWS Certificate Manager","AWS CodeDeploy","AWS CodeCommit","AWS CloudHSM"]},a:[0,4],multi:true,exp:{pt:{tech:"AWS KMS (Key Management Service) gerencia chaves de criptografia via software com integracao nativa aos servicos AWS. CloudHSM fornece modulos de seguranca de hardware (HSM) dedicados para controle total das chaves.",simple:"O AWS KMS gerencia chaves de criptografia de forma integrada com outros servicos AWS. O AWS CloudHSM fornece modulos de hardware dedicados onde voce tem controle exclusivo sobre as chaves.",avoid:"Nao use CloudHSM se voce so precisa de criptografia padrao integrada aos servicos AWS, pois KMS e mais simples e barato. Nao confunda servicos de seguranca como GuardDuty ou Shield com gerenciamento de chaves."},en:{tech:"AWS KMS (Key Management Service) manages encryption keys via software with native integration to AWS services. CloudHSM provides dedicated hardware security modules (HSM) for full key control.",simple:"AWS KMS manages encryption keys integrated with other AWS services. AWS CloudHSM provides dedicated hardware modules where you have exclusive control over the keys.",avoid:"Do not use CloudHSM if you only need standard encryption integrated with AWS services, since KMS is simpler and cheaper. Do not confuse security services like GuardDuty or Shield with key management."}}},
{en:"Which service allows you to install custom relational database software?",pt:"Qual servico permite instalar software de banco de dados relacional personalizado?",o:{en:["Amazon EC2","Amazon Cognito","Amazon RDS","Amazon Inspector"],pt:["Amazon EC2","Amazon Cognito","Amazon RDS","Amazon Inspector"]},a:[0],exp:{pt:{tech:"Amazon EC2 fornece controle total sobre o sistema operacional, permitindo instalar e configurar qualquer software de banco de dados. RDS e gerenciado e nao permite instalacao de software customizado.",simple:"O Amazon EC2 fornece maquinas virtuais onde voce tem controle total do sistema operacional. Isso permite instalar qualquer software de banco de dados relacional, incluindo opcoes nao suportadas pelo RDS.",avoid:"Nao use EC2 para bancos de dados se o RDS ja suporta o motor que voce precisa, pois voce tera que gerenciar backups, patches e alta disponibilidade manualmente. EC2 exige mais trabalho operacional."},en:{tech:"Amazon EC2 provides full control over the operating system, allowing you to install and configure any database software. RDS is managed and does not allow custom software installation.",simple:"Amazon EC2 provides virtual machines where you have full control of the operating system. This lets you install any relational database software, including options not supported by RDS.",avoid:"Do not use EC2 for databases if RDS already supports the engine you need, as you will have to manage backups, patches, and high availability manually. EC2 requires more operational work."}}},
{en:"Which service dynamically adjusts resources based on unpredictable load?",pt:"Qual servico ajusta dinamicamente os recursos com base em carga imprevisivel?",o:{en:["Auto Scaling","Elastic Load Balancing","Amazon Route 53","Amazon ECS"],pt:["Auto Scaling","Elastic Load Balancing","Amazon Route 53","Amazon ECS"]},a:[0],exp:{pt:{tech:"AWS Auto Scaling monitora aplicacoes e ajusta automaticamente a capacidade para manter desempenho estavel e previsivel ao menor custo possivel. Funciona com EC2, ECS, DynamoDB e Aurora.",simple:"O Auto Scaling monitora a carga das instancias e adiciona ou remove instancias automaticamente conforme a demanda muda. Isso garante performance durante picos e economia quando a demanda cai.",avoid:"Nao confunda Auto Scaling com Elastic Load Balancing, que distribui trafego mas nao cria ou remove instancias. Auto Scaling tambem nao e indicado para cargas que precisam de intervencao manual em cada servidor."},en:{tech:"AWS Auto Scaling monitors applications and automatically adjusts capacity to maintain steady, predictable performance at the lowest possible cost. Works with EC2, ECS, DynamoDB, and Aurora.",simple:"Auto Scaling monitors instance load and automatically adds or removes instances as demand changes. This ensures performance during peaks and savings when demand drops.",avoid:"Do not confuse Auto Scaling with Elastic Load Balancing, which distributes traffic but does not create or remove instances. Auto Scaling is also not suited for workloads requiring manual intervention on each server."}}},
{en:"What are key design principles for the public cloud? (Choose TWO)",pt:"Quais sao principios-chave de design para a nuvem publica? (Escolha DOIS)",o:{en:["Always reserve capacity","Loose coupling instead of tight coupling","Prefer servers over managed services","Disposable resources instead of fixed servers","Always use multi-AZ instead of multi-region"],pt:["Sempre reservar capacidade","Acoplamento fraco em vez de acoplamento forte","Preferir servidores a servicos gerenciados","Recursos descartaveis em vez de servidores fixos","Sempre usar multi-AZ em vez de multi-region"]},a:[1,3],multi:true,exp:{pt:{tech:"Loose coupling reduz dependencias entre componentes, permitindo que falhas sejam isoladas. Recursos descartaveis (disposable resources) significam tratar servidores como temporarios, facilmente substituiveis via automacao.",simple:"Acoplamento fraco significa que os componentes se comunicam por interfaces bem definidas e podem ser alterados independentemente. Recursos descartaveis significa tratar servidores como temporarios, substituindo-os em vez de consertar.",avoid:"Nao projete sistemas onde um componente depende diretamente da implementacao interna de outro. Nao trate servidores como permanentes que precisam ser mantidos e atualizados manualmente."},en:{tech:"Loose coupling reduces dependencies between components, allowing failures to be isolated. Disposable resources means treating servers as temporary, easily replaceable through automation.",simple:"Loose coupling means components communicate through well-defined interfaces and can be changed independently. Disposable resources means treating servers as temporary, replacing them instead of repairing.",avoid:"Do not design systems where one component depends directly on another internal implementation. Do not treat servers as permanent assets that need to be maintained and manually updated."}}},
{en:"Where can you get a list of all IAM users with their credential status?",pt:"Onde voce pode obter uma lista de todos os usuarios IAM com o status de suas credenciais?",o:{en:["AWS CloudTrail Trails","IAM Credential Report","AWS Artifact reports","AWS Cost and Usage Report"],pt:["AWS CloudTrail Trails","IAM Credential Report","AWS Artifact reports","AWS Cost and Usage Report"]},a:[1],exp:{pt:{tech:"O IAM Credential Report e um relatorio que lista todos os usuarios IAM da conta e o status de suas credenciais, incluindo senhas, chaves de acesso e MFA. Pode ser gerado pelo console ou CLI.",simple:"O IAM Credential Report gera um arquivo CSV listando todos os usuarios IAM da conta e o status de suas credenciais, incluindo senhas, access keys e MFA. E gerado diretamente no console IAM.",avoid:"Nao confunda o Credential Report com o IAM Access Analyzer, que analisa permissoes de recursos. O Credential Report mostra quem tem credenciais, nao o que cada usuario pode acessar."},en:{tech:"The IAM Credential Report lists all IAM users in the account and their credential status, including passwords, access keys, and MFA. It can be generated via the console or CLI.",simple:"The IAM Credential Report generates a CSV file listing all IAM users in the account and the status of their credentials, including passwords, access keys, and MFA. It is generated directly in the IAM console.",avoid:"Do not confuse the Credential Report with IAM Access Analyzer, which analyzes resource permissions. The Credential Report shows who has credentials, not what each user can access."}}},
{en:"Which service lets you generate and use your own encryption keys in AWS?",pt:"Qual servico permite gerar e usar suas proprias chaves de criptografia na AWS?",o:{en:["AWS Shield","AWS Certificate Manager","AWS CloudHSM","AWS WAF"],pt:["AWS Shield","AWS Certificate Manager","AWS CloudHSM","AWS WAF"]},a:[2],exp:{pt:{tech:"AWS CloudHSM fornece modulos de seguranca de hardware (HSM) dedicados dentro da nuvem AWS, permitindo gerar, armazenar e gerenciar suas proprias chaves criptograficas com controle exclusivo.",simple:"O AWS CloudHSM fornece modulos de seguranca de hardware dedicados na nuvem AWS onde voce gera, armazena e gerencia suas proprias chaves de criptografia. A AWS nao tem acesso as suas chaves no CloudHSM.",avoid:"Nao use CloudHSM se voce nao tem requisitos regulatorios ou de conformidade que exijam controle exclusivo das chaves. Para a maioria dos casos, o KMS e suficiente e mais facil de gerenciar."},en:{tech:"AWS CloudHSM provides dedicated hardware security modules (HSM) within the AWS cloud, allowing you to generate, store, and manage your own cryptographic keys with exclusive control.",simple:"AWS CloudHSM provides dedicated hardware security modules in the AWS cloud where you generate, store, and manage your own encryption keys. AWS does not have access to your keys in CloudHSM.",avoid:"Do not use CloudHSM if you do not have regulatory or compliance requirements demanding exclusive key control. For most cases, KMS is sufficient and easier to manage."}}},
{en:"What provides the highest redundancy and fault tolerance for a global application?",pt:"O que proporciona a maior redundancia e tolerancia a falhas para uma aplicacao global?",o:{en:["No need to architect for these in AWS","Deploy in a single Availability Zone","Deploy in multiple AZs in a single region","Deploy in multiple AZs across multiple regions"],pt:["Nao e necessario arquitetar para isso na AWS","Implantar em uma unica Zona de Disponibilidade","Implantar em multiplas AZs em uma unica regiao","Implantar em multiplas AZs em multiplas regioes"]},a:[3],exp:{pt:{tech:"Implantar em multiplas AZs em multiplas Regioes oferece o maior nivel de redundancia e tolerancia a falhas, protegendo contra falhas de datacenter (AZs) e desastres regionais (Regioes).",simple:"Implantar em multiplas AZs dentro de multiplas regioes oferece o maior nivel de redundancia. Se uma regiao inteira ficar indisponivel, a aplicacao continua funcionando em outra regiao.",avoid:"Nao implante tudo em uma unica AZ ou uma unica regiao se sua aplicacao e global e precisa de alta disponibilidade. Usar apenas multiplas AZs em uma regiao nao protege contra falhas regionais completas."},en:{tech:"Deploying across multiple AZs in multiple Regions provides the highest level of redundancy and fault tolerance, protecting against datacenter failures (AZs) and regional disasters (Regions).",simple:"Deploying across multiple AZs within multiple regions provides the highest level of redundancy. If an entire region becomes unavailable, the application continues running in another region.",avoid:"Do not deploy everything in a single AZ or single region if your application is global and needs high availability. Using only multiple AZs in one region does not protect against complete regional failures."}}},
{en:"Which AWS services automatically replicate data across Availability Zones? (Choose TWO)",pt:"Quais servicos AWS replicam dados automaticamente entre Zonas de Disponibilidade? (Escolha DOIS)",o:{en:["Instance Store","Amazon S3","Amazon DynamoDB","Amazon Route 53","AWS VPN"],pt:["Instance Store","Amazon S3","Amazon DynamoDB","Amazon Route 53","AWS VPN"]},a:[1,2],multi:true,exp:{pt:{tech:"Amazon S3 armazena objetos automaticamente em no minimo 3 AZs (exceto One Zone-IA). DynamoDB replica dados automaticamente em 3 AZs dentro de uma regiao para alta disponibilidade e durabilidade.",simple:"O Amazon S3 e o Amazon DynamoDB replicam dados automaticamente em pelo menos tres Availability Zones dentro de uma regiao. Isso garante alta durabilidade e disponibilidade sem configuracao adicional.",avoid:"Nao confunda com Instance Store ou EBS single-AZ, que nao replicam automaticamente entre AZs. Se voce precisa de replicacao automatica entre AZs, nao dependa de volumes EBS padrao."},en:{tech:"Amazon S3 stores objects automatically across at least 3 AZs (except One Zone-IA). DynamoDB automatically replicates data across 3 AZs within a region for high availability and durability.",simple:"Amazon S3 and Amazon DynamoDB automatically replicate data across at least three Availability Zones within a region. This ensures high durability and availability without additional configuration.",avoid:"Do not confuse with Instance Store or single-AZ EBS, which do not automatically replicate across AZs. If you need automatic cross-AZ replication, do not rely on standard EBS volumes."}}},
{en:"How can you protect S3 data from accidental deletion?",pt:"Como voce pode proteger dados no S3 contra exclusao acidental?",o:{en:["Enable S3 Versioning","Configure Bucket Policies","Configure Lifecycle Policies","Disable Cross-Region Replication"],pt:["Habilitar o versionamento do S3","Configurar Bucket Policies","Configurar Lifecycle Policies","Desabilitar a replicacao entre regioes"]},a:[0],exp:{pt:{tech:"S3 Versioning mantem multiplas versoes de um objeto no mesmo bucket. Se um objeto for excluido ou sobrescrito acidentalmente, versoes anteriores podem ser restauradas.",simple:"O S3 Versioning mantem multiplas versoes de cada objeto no bucket. Se um arquivo for apagado ou sobrescrito acidentalmente, voce pode recuperar a versao anterior.",avoid:"Nao confunda versionamento com backups. O versionamento protege contra exclusao e sobrescrita acidentais, mas nao substitui uma estrategia de backup em outra regiao para recuperacao de desastres."},en:{tech:"S3 Versioning keeps multiple versions of an object in the same bucket. If an object is accidentally deleted or overwritten, previous versions can be restored.",simple:"S3 Versioning keeps multiple versions of each object in the bucket. If a file is accidentally deleted or overwritten, you can recover the previous version.",avoid:"Do not confuse versioning with backups. Versioning protects against accidental deletion and overwriting, but it does not replace a backup strategy in another region for disaster recovery."}}},
{en:"What is AWS responsible for in the shared responsibility model?",pt:"Pelo que a AWS e responsavel no modelo de responsabilidade compartilhada?",o:{en:["Securing regions and edge locations","Performing client-side auditing tasks","Monitoring AWS resources usage by the customer","Securing customer access to AWS resources"],pt:["Proteger regioes e edge locations","Realizar tarefas de auditoria do lado do cliente","Monitorar o uso de recursos AWS pelo cliente","Proteger o acesso do cliente aos recursos AWS"]},a:[0],exp:{pt:{tech:"No modelo de responsabilidade compartilhada, a AWS e responsavel pela seguranca DA nuvem: infraestrutura fisica, hardware, rede, datacenters, regioes e edge locations. O cliente e responsavel pela seguranca NA nuvem.",simple:"A AWS e responsavel por proteger a infraestrutura fisica, incluindo regioes, Availability Zones e edge locations. Isso inclui hardware, rede, energia e seguranca fisica dos datacenters.",avoid:"Nao assuma que a AWS cuida de tudo. Configuracoes de seguranca dos seus dados, permissoes de acesso, criptografia e monitoramento de uso sao responsabilidades do cliente."},en:{tech:"In the shared responsibility model, AWS is responsible for security OF the cloud: physical infrastructure, hardware, networking, datacenters, regions, and edge locations. The customer is responsible for security IN the cloud.",simple:"AWS is responsible for protecting the physical infrastructure, including regions, Availability Zones, and edge locations. This includes hardware, networking, power, and physical security of datacenters.",avoid:"Do not assume AWS takes care of everything. Security configurations for your data, access permissions, encryption, and usage monitoring are customer responsibilities."}}},
{en:"Who is responsible for scaling DynamoDB?",pt:"Quem e responsavel por escalar o DynamoDB?",o:{en:["Your security team","Your development team","AWS","Your DevOps team"],pt:["Sua equipe de seguranca","Sua equipe de desenvolvimento","AWS","Sua equipe de DevOps"]},a:[2],exp:{pt:{tech:"DynamoDB e um servico totalmente gerenciado. A AWS cuida da escalabilidade, disponibilidade, patches e manutencao da infraestrutura. O cliente configura a capacidade desejada, mas a AWS executa o escalonamento.",simple:"O DynamoDB e um servico totalmente gerenciado, e a AWS e responsavel por escalar a capacidade automaticamente. O cliente nao precisa provisionar ou gerenciar servidores para o DynamoDB.",avoid:"Nao confunda a responsabilidade de escalar com a responsabilidade de configurar. O cliente ainda precisa definir tabelas, indices e configurar o modo de capacidade (on-demand ou provisionado)."},en:{tech:"DynamoDB is a fully managed service. AWS handles scalability, availability, patching, and infrastructure maintenance. The customer configures desired capacity, but AWS executes the scaling.",simple:"DynamoDB is a fully managed service, and AWS is responsible for scaling capacity automatically. The customer does not need to provision or manage servers for DynamoDB.",avoid:"Do not confuse the responsibility to scale with the responsibility to configure. The customer still needs to define tables, indexes, and configure the capacity mode (on-demand or provisioned)."}}},
{en:"What are benefits of AWS Organizations? (Choose TWO)",pt:"Quais sao beneficios do AWS Organizations? (Escolha DOIS)",o:{en:["Control access to AWS services","Help design a cloud adoption path","Manage payment methods for each account","Help customers achieve desired business outcomes","Consolidate billing across multiple accounts"],pt:["Controlar acesso a servicos AWS","Ajudar a projetar um caminho de adocao da nuvem","Gerenciar metodos de pagamento para cada conta","Ajudar clientes a alcancar resultados de negocios desejados","Consolidar faturamento entre multiplas contas"]},a:[0,4],multi:true,exp:{pt:{tech:"AWS Organizations permite gerenciamento centralizado de multiplas contas AWS. SCPs (Service Control Policies) controlam acesso a servicos. Consolidated Billing unifica o faturamento e pode gerar descontos por volume.",simple:"O AWS Organizations permite controlar o acesso a servicos AWS usando politicas (SCPs) em multiplas contas. Tambem oferece faturamento consolidado, unificando os custos de todas as contas em uma unica fatura.",avoid:"Nao confunda Organizations com IAM. O IAM controla permissoes dentro de uma conta, enquanto Organizations gerencia politicas entre multiplas contas. Organizations nao substitui as configuracoes de seguranca individuais de cada conta."},en:{tech:"AWS Organizations enables centralized management of multiple AWS accounts. SCPs (Service Control Policies) control access to services. Consolidated Billing unifies billing and can generate volume discounts.",simple:"AWS Organizations lets you control access to AWS services using policies (SCPs) across multiple accounts. It also offers consolidated billing, unifying costs from all accounts into a single invoice.",avoid:"Do not confuse Organizations with IAM. IAM controls permissions within an account, while Organizations manages policies across multiple accounts. Organizations does not replace individual account security configurations."}}},
{en:"Which service can you use to build a data warehouse in the cloud?",pt:"Qual servico voce pode usar para construir um data warehouse na nuvem?",o:{en:["AWS Shield","Amazon Redshift","Amazon RDS","Amazon Comprehend"],pt:["AWS Shield","Amazon Redshift","Amazon RDS","Amazon Comprehend"]},a:[1],exp:{pt:{tech:"Amazon Redshift e o servico de data warehouse da AWS, otimizado para analise de dados em escala de petabytes com armazenamento colunar e processamento massivamente paralelo (MPP).",simple:"O Amazon Redshift e um servico de data warehouse projetado para consultas analiticas em grandes volumes de dados. Ele usa armazenamento colunar e processamento paralelo para executar consultas complexas rapidamente.",avoid:"Nao use Redshift para operacoes transacionais do dia a dia, pois ele e otimizado para leitura analitica e nao para escritas frequentes. Para bancos transacionais, use RDS ou DynamoDB."},en:{tech:"Amazon Redshift is AWS data warehouse service, optimized for petabyte-scale data analysis with columnar storage and massively parallel processing (MPP).",simple:"Amazon Redshift is a data warehouse service designed for analytical queries on large volumes of data. It uses columnar storage and parallel processing to run complex queries quickly.",avoid:"Do not use Redshift for day-to-day transactional operations, as it is optimized for analytical reads and not for frequent writes. For transactional databases, use RDS or DynamoDB."}}},
{en:"Which AWS service allows you to buy third-party software?",pt:"Qual servico AWS permite comprar software de terceiros?",o:{en:["AWS Application Discovery Service","Amazon DevPay","AWS Marketplace","Resource Groups"],pt:["AWS Application Discovery Service","Amazon DevPay","AWS Marketplace","Resource Groups"]},a:[2],exp:{pt:{tech:"AWS Marketplace e uma loja digital que permite encontrar, comprar, implantar e gerenciar software de terceiros e servicos que rodam na AWS, com faturamento integrado a conta AWS.",simple:"O AWS Marketplace e uma loja digital onde voce pode encontrar, comprar e implantar software de terceiros diretamente na sua conta AWS. A cobranca e integrada a fatura da AWS.",avoid:"Nao confunda o Marketplace com servicos nativos da AWS. O software no Marketplace e de terceiros e pode ter custos adicionais alem da infraestrutura AWS. Sempre verifique os termos de licenciamento."},en:{tech:"AWS Marketplace is a digital store that lets you find, buy, deploy, and manage third-party software and services that run on AWS, with billing integrated into your AWS account.",simple:"AWS Marketplace is a digital store where you can find, buy, and deploy third-party software directly in your AWS account. Billing is integrated into your AWS invoice.",avoid:"Do not confuse Marketplace with native AWS services. Software on Marketplace is from third parties and may have additional costs beyond AWS infrastructure. Always check licensing terms."}}},
{en:"Which service can route end users to the nearest AWS Region for low latency?",pt:"Qual servico pode direcionar usuarios finais para a Regiao AWS mais proxima para baixa latencia?",o:{en:["Amazon Cognito","AWS Systems Manager","AWS Cloud9","Amazon Route 53"],pt:["Amazon Cognito","AWS Systems Manager","AWS Cloud9","Amazon Route 53"]},a:[3],exp:{pt:{tech:"Amazon Route 53 e um servico de DNS que suporta roteamento baseado em latencia, direcionando usuarios para a Regiao AWS com menor tempo de resposta. Tambem suporta roteamento geolocalizado e failover.",simple:"O Amazon Route 53 e um servico de DNS que pode rotear usuarios para a regiao AWS mais proxima usando politicas de roteamento baseadas em latencia ou geolocalizacao. Isso reduz o tempo de resposta para usuarios globais.",avoid:"Nao confunda Route 53 com CloudFront. O Route 53 resolve nomes de dominio e direciona trafego, enquanto CloudFront armazena conteudo em cache nos edge locations. Eles sao complementares, nao substitutos."},en:{tech:"Amazon Route 53 is a DNS service that supports latency-based routing, directing users to the AWS Region with the lowest response time. It also supports geolocation routing and failover.",simple:"Amazon Route 53 is a DNS service that can route users to the nearest AWS Region using latency-based or geolocation routing policies. This reduces response time for global users.",avoid:"Do not confuse Route 53 with CloudFront. Route 53 resolves domain names and directs traffic, while CloudFront caches content at edge locations. They are complementary, not substitutes."}}},
{en:"Which feature allows users to sign in with existing corporate credentials?",pt:"Qual recurso permite que usuarios facam login com credenciais corporativas existentes?",o:{en:["Federation","Access keys","IAM Permissions","WAF rules"],pt:["Federacao","Chaves de acesso","Permissoes IAM","Regras do WAF"]},a:[0],exp:{pt:{tech:"A Federacao (Federation) permite que usuarios se autentiquem na AWS usando credenciais de um provedor de identidade externo (como Active Directory corporativo), sem criar usuarios IAM separados.",simple:"A federacao permite que usuarios facam login na AWS usando credenciais corporativas existentes de um provedor de identidade externo (como Active Directory). Isso elimina a necessidade de criar usuarios IAM separados para cada pessoa.",avoid:"Nao crie usuarios IAM individuais para cada funcionario se sua empresa ja tem um provedor de identidade. Tambem nao confunda federacao com IAM roles, que sao usadas para delegar permissoes temporarias."},en:{tech:"Federation allows users to authenticate to AWS using credentials from an external identity provider (like corporate Active Directory), without creating separate IAM users.",simple:"Federation allows users to sign in to AWS using existing corporate credentials from an external identity provider (such as Active Directory). This eliminates the need to create separate IAM users for each person.",avoid:"Do not create individual IAM users for each employee if your company already has an identity provider. Also do not confuse federation with IAM roles, which are used to delegate temporary permissions."}}},
