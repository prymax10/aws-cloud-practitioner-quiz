{en:"To transfer 60 petabytes of data to Amazon S3, which service should you use?",pt:"Para transferir 60 petabytes de dados para o Amazon S3, qual servico voce deve usar?",o:{en:["AWS Snowball","S3 Transfer Acceleration","AWS Snowmobile","Amazon VPC"],pt:["AWS Snowball","S3 Transfer Acceleration","AWS Snowmobile","Amazon VPC"]},a:[2],t:"Snow Family",exp:{pt:{tech:"AWS Snowmobile e um caminhao com container de dados para transferencias em escala de exabytes. Snowball suporta ate petabytes.",simple:"AWS Snowmobile e um caminhao com container de armazenamento que transporta ate 100 petabytes de dados fisicamente ate a AWS, ideal para migracoes em escala massiva.",avoid:"Nunca tente transferir dezenas de petabytes pela internet. Use Snowmobile para migracoes massivas de dados e evite meses de transferencia pela rede."},en:{tech:"AWS Snowmobile is a 45-foot shipping container truck for exabyte-scale transfers. Snowball handles up to petabytes.",simple:"AWS Snowmobile is a truck with a storage container that physically transports up to 100 petabytes of data to AWS, ideal for massive-scale migrations.",avoid:"Never try to transfer tens of petabytes over the internet. Use Snowmobile for massive data migrations and avoid months of network transfer."}}},
{en:"Which AWS support plan includes a Concierge Support Team?",pt:"Qual plano de suporte da AWS inclui o time de Concierge?",o:{en:["Premium Support","Business Support","Enterprise Support","Standard Support"],pt:["Premium Support","Business Support","Enterprise Support","Standard Support"]},a:[2],t:"Support Plans",exp:{pt:{tech:"O Concierge Support Team e exclusivo do plano Enterprise e ajuda com questoes de faturamento e conta.",simple:"O plano Enterprise Support e o unico que inclui o Concierge Support Team, uma equipe dedicada que ajuda com questoes de conta e faturamento.",avoid:"Nunca opere cargas criticas de grande escala sem Enterprise Support. O Concierge Team e o TAM ajudam a otimizar custos e arquitetura proativamente."},en:{tech:"The Concierge Support Team is exclusive to the Enterprise plan and assists with billing and account inquiries.",simple:"The Enterprise Support plan is the only one that includes the Concierge Support Team, a dedicated team that helps with account and billing questions.",avoid:"Never run large-scale critical workloads without Enterprise Support. The Concierge Team and TAM help optimize costs and architecture proactively."}}},
{en:"Which AWS service tracks API call history for resource changes?",pt:"Qual servico da AWS rastreia o historico de chamadas de API para alteracoes em recursos?",o:{en:["AWS Config","Amazon CloudWatch","AWS CloudTrail","AWS CloudFormation"],pt:["AWS Config","Amazon CloudWatch","AWS CloudTrail","AWS CloudFormation"]},a:[2],t:"CloudTrail",exp:{pt:{tech:"AWS CloudTrail registra todas as chamadas de API feitas na conta, incluindo quem fez, quando e de onde.",simple:"AWS CloudTrail registra todas as chamadas de API feitas na sua conta AWS, incluindo quem fez a acao, quando e quais recursos foram afetados.",avoid:"Nunca desabilite o CloudTrail em nenhuma conta ou regiao. Mantenha logs de API ativos em todas as regioes para ter rastreabilidade completa de mudancas."},en:{tech:"AWS CloudTrail records all API calls made in your account, including who made them, when, and from where.",simple:"AWS CloudTrail records all API calls made in your AWS account, including who performed the action, when, and which resources were affected.",avoid:"Never disable CloudTrail in any account or region. Keep API logs active in all regions for complete change traceability."}}},
{en:"What are the benefits of AWS-managed services? (Choose TWO)",pt:"Quais sao os beneficios dos servicos gerenciados pela AWS? (Escolha DUAS)",o:{en:["Complete control over virtual infrastructure","Deliver new solutions faster","Lower operational complexity","Eliminate encryption needs","Control all patching activities"],pt:["Controle total sobre a infraestrutura virtual","Entregar novas solucoes mais rapido","Menor complexidade operacional","Eliminar a necessidade de criptografia","Controlar todas as atividades de patching"]},a:[1,2],multi:true,t:"KMS & Encryption",exp:{pt:{tech:"Servicos gerenciados reduzem a complexidade operacional e aceleram a entrega, pois a AWS cuida da infraestrutura subjacente.",simple:"Servicos gerenciados pela AWS eliminam a necessidade de manter infraestrutura, permitindo entregar solucoes mais rapido e com menor complexidade operacional.",avoid:"Nunca recrie funcionalidades que servicos gerenciados AWS ja oferecem. Use servicos gerenciados para reduzir overhead operacional e entregar mais rapido."},en:{tech:"Managed services reduce operational complexity and speed up delivery since AWS handles the underlying infrastructure.",simple:"AWS managed services eliminate the need to maintain infrastructure, allowing you to deliver solutions faster and with lower operational complexity.",avoid:"Never recreate functionality that AWS managed services already offer. Use managed services to reduce operational overhead and deliver faster."}}},
{en:"Which of the following are valid Amazon S3 use cases? (Choose TWO)",pt:"Quais dos seguintes sao casos de uso validos do Amazon S3? (Escolha DUAS)",o:{en:["Hosting static websites","Hosting sites requiring sustained high CPU utilization","Cost-effective database and log storage","Media store for Amazon CloudFront","Processing data streams at any scale"],pt:["Hospedagem de sites estaticos","Hospedagem de sites que exigem alta utilizacao continua de CPU","Armazenamento economico de banco de dados e logs","Armazenamento de midia para o Amazon CloudFront","Processamento de fluxos de dados em qualquer escala"]},a:[0,3],multi:true,t:"S3 General",exp:{pt:{tech:"S3 e ideal para hospedagem de sites estaticos e como origem de conteudo para o CloudFront (CDN da AWS).",simple:"O Amazon S3 pode hospedar sites estaticos (HTML, CSS, JS) e servir como armazenamento de midia para distribuicao via CloudFront.",avoid:"Nunca hospede sites estaticos em EC2 quando S3 com CloudFront e suficiente. Use S3 para hosting estatico e economize com custos de servidores."},en:{tech:"S3 is ideal for static website hosting and as a content origin for CloudFront (AWS CDN).",simple:"Amazon S3 can host static websites (HTML, CSS, JS) and serve as media storage for distribution via CloudFront.",avoid:"Never host static sites on EC2 when S3 with CloudFront is sufficient. Use S3 for static hosting and save on server costs."}}},
{en:"What is the best practice for managing AWS access keys?",pt:"Qual e a melhor pratica para gerenciar chaves de acesso da AWS?",o:{en:["Delete all access keys and use only passwords","Share keys only with trusted people","Rotate access keys regularly","Save access keys in application code"],pt:["Deletar todas as chaves de acesso e usar apenas senhas","Compartilhar chaves apenas com pessoas confiaveis","Rotacionar as chaves de acesso regularmente","Salvar as chaves de acesso no codigo da aplicacao"]},a:[2],t:"IAM",exp:{pt:{tech:"A AWS recomenda rotacionar chaves de acesso regularmente para minimizar o risco de comprometimento.",simple:"Rotacionar access keys regularmente garante que chaves antigas ou possivelmente comprometidas sejam substituidas, reduzindo o risco de acesso nao autorizado.",avoid:"Nunca compartilhe access keys entre usuarios ou as insira em codigo-fonte. Rotacione regularmente e prefira IAM Roles sempre que possivel."},en:{tech:"AWS recommends rotating access keys regularly to minimize the risk of compromised credentials.",simple:"Rotating access keys regularly ensures that old or potentially compromised keys are replaced, reducing the risk of unauthorized access.",avoid:"Never share access keys between users or embed them in source code. Rotate regularly and prefer IAM Roles whenever possible."}}},
{en:"What benefit does programmatic API access to AWS provide?",pt:"Qual beneficio o acesso programatico via API oferece na AWS?",o:{en:["Improves resource performance","Reduces provisioning time","Reduces developer count needed","Enables programmatic management of resources"],pt:["Melhora a performance dos recursos","Reduz o tempo de provisionamento","Reduz o numero de desenvolvedores necessarios","Permite o gerenciamento programatico dos recursos"]},a:[3],t:"General",exp:{pt:{tech:"O acesso via API permite automatizar e gerenciar recursos AWS por meio de codigo, CLI ou SDKs.",simple:"O acesso programatico via API permite criar, modificar e excluir recursos AWS usando codigo, possibilitando automacao completa da gestao de infraestrutura.",avoid:"Nunca gerencie recursos AWS exclusivamente pelo console manual. Use acesso programatico via CLI ou SDK para automacao e reprodutibilidade."},en:{tech:"API access allows you to automate and manage AWS resources through code, CLI, or SDKs.",simple:"Programmatic API access allows you to create, modify, and delete AWS resources using code, enabling full automation of infrastructure management.",avoid:"Never manage AWS resources exclusively through the manual console. Use programmatic access via CLI or SDK for automation and reproducibility."}}},
{en:"Which AWS service is best suited for a database with high read/write activity?",pt:"Qual servico da AWS e mais adequado para um banco de dados com alta atividade de leitura/escrita?",o:{en:["AWS Storage Gateway","Amazon S3","Amazon EBS","Amazon Glacier"],pt:["AWS Storage Gateway","Amazon S3","Amazon EBS","Amazon Glacier"]},a:[2],t:"S3 Storage Classes",exp:{pt:{tech:"Amazon EBS fornece armazenamento em bloco de alta performance para instancias EC2, ideal para bancos de dados com alto I/O.",simple:"Amazon EBS fornece volumes de armazenamento em bloco persistentes e de alta performance para instancias EC2, sendo ideal para bancos de dados com alta atividade de leitura e escrita.",avoid:"Nunca use volumes EBS sem configurar snapshots automaticos. Perda de dados em volumes sem backup pode ser irrecuperavel."},en:{tech:"Amazon EBS provides high-performance block storage for EC2 instances, ideal for databases with high I/O demands.",simple:"Amazon EBS provides persistent, high-performance block storage volumes for EC2 instances, making it ideal for databases with high read/write activity.",avoid:"Never use EBS volumes without configuring automated snapshots. Data loss on volumes without backup can be unrecoverable."}}},
{en:"After migrating from EC2 to Lambda, which responsibilities does AWS assume? (Choose TWO)",pt:"Ao migrar do EC2 para o Lambda, quais responsabilidades passam para a AWS? (Escolha DUAS)",o:{en:["Application management","Capacity management","Access control","Operating system maintenance","Data management"],pt:["Gerenciamento da aplicacao","Gerenciamento de capacidade","Controle de acesso","Manutencao do sistema operacional","Gerenciamento de dados"]},a:[1,3],multi:true,t:"EC2 General",exp:{pt:{tech:"Com Lambda (serverless), a AWS gerencia capacidade e sistema operacional. O cliente cuida da aplicacao, acesso e dados.",simple:"Ao migrar de EC2 para Lambda, a AWS assume o gerenciamento de capacidade (escalar recursos) e a manutencao do sistema operacional, liberando o cliente dessas tarefas.",avoid:"Nunca mantenha responsabilidades de infraestrutura que o Lambda assume por voce. Ao migrar para serverless, elimine processos manuais de OS e capacidade."},en:{tech:"With Lambda (serverless), AWS manages capacity and OS maintenance. The customer handles application, access, and data.",simple:"When migrating from EC2 to Lambda, AWS takes over capacity management (scaling resources) and operating system maintenance, freeing the customer from those tasks.",avoid:"Never retain infrastructure responsibilities that Lambda assumes for you. When migrating to serverless, eliminate manual OS and capacity processes."}}},
{en:"What does the Elastic Load Balancer do to improve application reliability?",pt:"O que o Elastic Load Balancer faz para melhorar a confiabilidade da aplicacao?",o:{en:["Distributing traffic across S3 buckets","Replicating data to multiple Availability Zones","Creating database Read Replicas","Ensuring only healthy targets receive traffic"],pt:["Distribuir trafego entre buckets do S3","Replicar dados para multiplas Zonas de Disponibilidade","Criar Replicas de Leitura do banco de dados","Garantir que apenas alvos saudaveis recebam trafego"]},a:[3],t:"S3 General",exp:{pt:{tech:"O ELB faz health checks nos alvos e roteia trafego apenas para instancias saudaveis, melhorando a disponibilidade.",simple:"O Elastic Load Balancer verifica constantemente a saude das instancias e direciona o trafego apenas para instancias saudaveis, melhorando a confiabilidade da aplicacao.",avoid:"Nunca direcione trafego para instancias sem health checks no load balancer. Configure verificacoes de saude adequadas para evitar enviar requisicoes a alvos com falha."},en:{tech:"ELB performs health checks on targets and routes traffic only to healthy instances, improving availability.",simple:"The Elastic Load Balancer constantly checks instance health and routes traffic only to healthy instances, improving application reliability.",avoid:"Never direct traffic to instances without health checks on the load balancer. Configure proper health checks to avoid sending requests to failed targets."}}},
{en:"Which EC2 pricing option ensures hardware is not shared with other customers?",pt:"Qual opcao de precificacao do EC2 garante que o hardware nao seja compartilhado com outros clientes?",o:{en:["On-demand instances","Spot instances","Dedicated instances","Reserved instances"],pt:["Instancias On-Demand","Instancias Spot","Instancias Dedicadas","Instancias Reservadas"]},a:[2],t:"EC2 Pricing",exp:{pt:{tech:"Dedicated Instances rodam em hardware fisicamente isolado, dedicado a um unico cliente AWS.",simple:"Dedicated Instances garantem que o hardware fisico do servidor seja usado exclusivamente pela sua conta, sem compartilhamento com outros clientes AWS.",avoid:"Nunca use Dedicated Instances sem necessidade real de compliance ou licenciamento. O custo e significativamente maior que instancias compartilhadas."},en:{tech:"Dedicated Instances run on physically isolated hardware dedicated to a single AWS customer.",simple:"Dedicated Instances ensure that the physical server hardware is used exclusively by your account, with no sharing with other AWS customers.",avoid:"Never use Dedicated Instances without a real compliance or licensing need. The cost is significantly higher than shared instances."}}},
{en:"Which is the most cost-effective storage option for archiving data for 5 years?",pt:"Qual e a opcao de armazenamento mais economica para arquivar dados por 5 anos?",o:{en:["Amazon S3 Glacier","Amazon EFS","Amazon S3 Standard","Amazon EBS"],pt:["Amazon S3 Glacier","Amazon EFS","Amazon S3 Standard","Amazon EBS"]},a:[0],t:"S3 Storage Classes",exp:{pt:{tech:"S3 Glacier oferece armazenamento de custo muito baixo para dados de arquivo com acesso raro, ideal para retencao de longo prazo.",simple:"Amazon S3 Glacier oferece o armazenamento mais barato da AWS para dados que precisam ser guardados por longos periodos e sao acessados raramente.",avoid:"Nunca armazene dados de arquivo de longo prazo em S3 Standard. Use Glacier ou Glacier Deep Archive para reduzir drasticamente custos de armazenamento."},en:{tech:"S3 Glacier provides very low-cost storage for archival data with infrequent access, ideal for long-term retention.",simple:"Amazon S3 Glacier offers the cheapest AWS storage for data that needs to be kept for long periods and is rarely accessed.",avoid:"Never store long-term archive data in S3 Standard. Use Glacier or Glacier Deep Archive to drastically reduce storage costs."}}},
{en:"Which AWS service is used for managing user permissions?",pt:"Qual servico da AWS e usado para gerenciar permissoes de usuarios?",o:{en:["Security Groups","Amazon ECS","AWS IAM","AWS Support"],pt:["Security Groups","Amazon ECS","AWS IAM","AWS Support"]},a:[2],t:"ECS",exp:{pt:{tech:"AWS IAM (Identity and Access Management) permite criar e gerenciar usuarios, grupos e permissoes de acesso aos recursos.",simple:"AWS IAM e o servico que gerencia usuarios, grupos e permissoes, controlando quem pode acessar quais recursos na sua conta AWS.",avoid:"Nunca crie usuarios IAM com permissoes administrativas completas. Aplique o principio de menor privilegio e use policies especificas para cada funcao."},en:{tech:"AWS IAM (Identity and Access Management) lets you create and manage users, groups, and access permissions to resources.",simple:"AWS IAM is the service that manages users, groups, and permissions, controlling who can access which resources in your AWS account.",avoid:"Never create IAM users with full administrative permissions. Apply the principle of least privilege and use specific policies for each role."}}},
{en:"Which design principle helps minimize the impact of outages?",pt:"Qual principio de design ajuda a minimizar o impacto de interrupcoes?",o:{en:["Least Privilege","Pilot Light","Fault Tolerance","Multi-threading"],pt:["Menor Privilegio","Pilot Light","Tolerancia a Falhas","Multi-threading"]},a:[2],t:"IAM",exp:{pt:{tech:"Fault Tolerance garante que o sistema continue operando mesmo quando componentes falham, usando redundancia.",simple:"Tolerancia a falhas e a capacidade de um sistema continuar operando sem interrupcao quando um ou mais componentes falham.",avoid:"Nunca projete sistemas sem considerar falhas como cenario normal. Implemente retry, circuit breakers e failover automatico para minimizar impacto de falhas."},en:{tech:"Fault Tolerance ensures the system continues operating even when components fail, through redundancy.",simple:"Fault Tolerance is the ability of a system to continue operating without interruption when one or more components fail.",avoid:"Never design systems without considering failures as a normal scenario. Implement retry, circuit breakers, and automatic failover to minimize failure impact."}}},
{en:"Which Reserved Instance payment option provides the largest discount?",pt:"Qual opcao de pagamento de Instancia Reservada oferece o maior desconto?",o:{en:["All up-front","All options provide the same discount","Partial up-front","No up-front"],pt:["Tudo antecipado","Todas as opcoes oferecem o mesmo desconto","Parcialmente antecipado","Sem pagamento antecipado"]},a:[0],t:"EC2 Pricing",exp:{pt:{tech:"O pagamento All Upfront de Reserved Instances oferece o maior desconto (ate 72%) comparado a Partial ou No Upfront.",simple:"Pagar a Reserved Instance integralmente antecipado (All Upfront) oferece o maior desconto porque voce assume o compromisso financeiro total no inicio do contrato.",avoid:"Nunca compre Reserved Instances sem analisar seu historico de uso. RIs All Upfront dao maior desconto mas exigem compromisso financeiro antecipado."},en:{tech:"All Upfront payment for Reserved Instances offers the highest discount (up to 72%) compared to Partial or No Upfront.",simple:"Paying the Reserved Instance entirely upfront (All Upfront) offers the largest discount because you commit the full financial amount at the start of the contract.",avoid:"Never purchase Reserved Instances without analyzing your usage history. All Upfront RIs give the largest discount but require upfront financial commitment."}}},
{en:"Which of the following are AWS data protection features? (Choose TWO)",pt:"Quais das alternativas a seguir sao recursos de protecao de dados da AWS? (Escolha DUAS)",o:{en:["Access control","Physical MFA devices","Data encryption","Unlimited storage","Load balancing"],pt:["Controle de acesso","Dispositivos MFA fisicos","Criptografia de dados","Armazenamento ilimitado","Balanceamento de carga"]},a:[0,2],multi:true,t:"IAM",exp:{pt:{tech:"Controle de acesso (IAM) e criptografia (em repouso e em transito) sao os principais mecanismos de protecao de dados na AWS.",simple:"Controle de acesso define quem pode ver e modificar os dados, e criptografia transforma os dados em formato ilegivel para quem nao tem a chave de decriptacao.",avoid:"Nunca armazene dados sensiveis sem criptografia em repouso e em transito. Use KMS para gerenciar chaves e configure policies de acesso granulares."},en:{tech:"Access control (IAM) and encryption (at rest and in transit) are the primary data protection mechanisms in AWS.",simple:"Access control defines who can view and modify data, and encryption transforms data into an unreadable format for anyone without the decryption key.",avoid:"Never store sensitive data without encryption at rest and in transit. Use KMS to manage keys and configure granular access policies."}}},
{en:"Which IAM entity should be used to grant temporary access to AWS resources?",pt:"Qual entidade do IAM deve ser usada para conceder acesso temporario aos recursos da AWS?",o:{en:["IAM Users","Key Pair","IAM Roles","IAM Groups"],pt:["Usuarios IAM","Par de Chaves","Funcoes IAM (Roles)","Grupos IAM"]},a:[2],t:"IAM",exp:{pt:{tech:"IAM Roles fornecem credenciais temporarias que sao rotacionadas automaticamente, ideais para acesso temporario.",simple:"IAM Roles fornecem credenciais temporarias e sao usadas para conceder acesso a servicos AWS ou usuarios federados sem precisar de senhas ou access keys permanentes.",avoid:"Nunca crie usuarios IAM com credenciais de longo prazo para servicos ou automacoes. Use IAM Roles para conceder acesso temporario com rotacao automatica."},en:{tech:"IAM Roles provide temporary credentials that are automatically rotated, ideal for granting temporary access.",simple:"IAM Roles provide temporary credentials and are used to grant access to AWS services or federated users without needing permanent passwords or access keys.",avoid:"Never create IAM users with long-term credentials for services or automations. Use IAM Roles to grant temporary access with automatic rotation."}}},
{en:"Which AWS service distributes incoming traffic across multiple EC2 instances?",pt:"Qual servico da AWS distribui o trafego de entrada entre varias instancias EC2?",o:{en:["AWS Global Accelerator","AWS Application Load Balancer","Amazon CloudFront","Transit VPC"],pt:["AWS Global Accelerator","AWS Application Load Balancer","Amazon CloudFront","Transit VPC"]},a:[1],t:"EC2 General",exp:{pt:{tech:"O Application Load Balancer (ALB) opera na camada 7 e distribui trafego HTTP/HTTPS entre instancias EC2.",simple:"O Application Load Balancer distribui o trafego de entrada entre multiplas instancias EC2, garantindo que nenhuma fique sobrecarregada e que a aplicacao tenha alta disponibilidade.",avoid:"Nunca exponha instancias EC2 diretamente sem um load balancer na frente. Use ALB para distribuir trafego, terminar SSL e proteger as instancias."},en:{tech:"The Application Load Balancer (ALB) operates at layer 7 and distributes HTTP/HTTPS traffic across EC2 instances.",simple:"The Application Load Balancer distributes incoming traffic across multiple EC2 instances, ensuring none gets overloaded and the application has high availability.",avoid:"Never expose EC2 instances directly without a load balancer in front. Use ALB to distribute traffic, terminate SSL, and protect instances."}}},
{en:"Which option helps secure an AWS account from unauthorized access?",pt:"Qual opcao ajuda a proteger uma conta AWS contra acesso nao autorizado?",o:{en:["Restrict all SDK and CLI API calls","Share IAM accounts organized by department","Require MFA for all IAM User access","Set up two different login passwords"],pt:["Restringir todas as chamadas de API do SDK e CLI","Compartilhar contas IAM organizadas por departamento","Exigir MFA para todo acesso de usuarios IAM","Configurar duas senhas de login diferentes"]},a:[2],t:"IAM",exp:{pt:{tech:"MFA adiciona uma camada extra de seguranca exigindo um segundo fator alem da senha para autenticacao.",simple:"Exigir MFA para todos os usuarios IAM adiciona uma segunda camada de verificacao alem da senha, bloqueando acesso mesmo que a senha seja comprometida.",avoid:"Nunca permita acesso a conta AWS sem MFA habilitado. Exija MFA para todos os usuarios IAM, especialmente para operacoes sensiveis e destrutivas."},en:{tech:"MFA adds an extra security layer by requiring a second factor beyond the password for authentication.",simple:"Requiring MFA for all IAM users adds a second verification layer beyond the password, blocking access even if the password is compromised.",avoid:"Never allow AWS account access without MFA enabled. Require MFA for all IAM users, especially for sensitive and destructive operations."}}},
{en:"Which AWS service offers volume-based discounts as usage increases?",pt:"Qual servico da AWS oferece descontos baseados em volume conforme o uso aumenta?",o:{en:["Amazon VPC","Amazon S3","Amazon Lightsail","AWS Cost Explorer"],pt:["Amazon VPC","Amazon S3","Amazon Lightsail","AWS Cost Explorer"]},a:[1],t:"S3 General",exp:{pt:{tech:"O Amazon S3 usa precificacao em camadas — quanto mais dados voce armazena, menor o custo por GB.",simple:"O Amazon S3 oferece precos que diminuem conforme o volume de armazenamento aumenta — quanto mais dados voce armazena, menor o custo por gigabyte.",avoid:"Nunca ignore descontos por volume que servicos como S3 oferecem automaticamente. Consolide contas no Organizations para maximizar economia com uso agregado."},en:{tech:"Amazon S3 uses tiered pricing — the more data you store, the lower the cost per GB.",simple:"Amazon S3 offers pricing that decreases as storage volume increases — the more data you store, the lower the cost per gigabyte.",avoid:"Never ignore volume discounts that services like S3 offer automatically. Consolidate accounts in Organizations to maximize savings with aggregated usage."}}},
{en:"Which factors should be considered when choosing an AWS Region for deployment? (Choose TWO)",pt:"Quais fatores devem ser considerados ao escolher uma Regiao AWS para implantacao? (Escolha DUAS)",o:{en:["The security level of the region","Data sovereignty and compliance requirements","Cost of services in the region","Number of available VPCs","Geographic proximity to users"],pt:["O nivel de seguranca da regiao","Requisitos de soberania de dados e conformidade","Custo dos servicos na regiao","Numero de VPCs disponiveis","Proximidade geografica dos usuarios"]},a:[1,2],multi:true,t:"Global Infrastructure",exp:{pt:{tech:"A escolha de regiao deve considerar conformidade com leis de dados locais e custo, que varia entre regioes.",simple:"Ao escolher uma regiao AWS, considere as leis de soberania de dados do pais (onde os dados devem ficar) e o custo dos servicos, que varia entre regioes.",avoid:"Nunca escolha uma regiao AWS sem considerar compliance de dados e custos. Verifique requisitos de soberania de dados e compare precos entre regioes."},en:{tech:"Region selection should consider compliance with local data laws and cost, which varies between regions.",simple:"When choosing an AWS Region, consider the data sovereignty laws of the country (where data must reside) and the cost of services, which varies between regions.",avoid:"Never choose an AWS region without considering data compliance and costs. Check data sovereignty requirements and compare prices between regions."}}},
{en:"Which AWS service provides in-memory caching to improve MySQL database performance?",pt:"Qual servico da AWS fornece cache em memoria para melhorar a performance de bancos MySQL?",o:{en:["Amazon EFS","Amazon Neptune","Amazon ElastiCache","Amazon DAX"],pt:["Amazon EFS","Amazon Neptune","Amazon ElastiCache","Amazon DAX"]},a:[2],t:"EFS",exp:{pt:{tech:"Amazon ElastiCache suporta Redis e Memcached para cache em memoria, reduzindo a carga em bancos relacionais como MySQL.",simple:"Amazon ElastiCache armazena dados acessados com frequencia na memoria RAM, reduzindo o numero de consultas ao banco de dados MySQL e melhorando significativamente a performance.",avoid:"Nunca adicione cache sem entender o padrao de invalidacao. Configure TTLs adequados no ElastiCache e tenha estrategia clara para dados desatualizados."},en:{tech:"Amazon ElastiCache supports Redis and Memcached for in-memory caching, reducing load on relational databases like MySQL.",simple:"Amazon ElastiCache stores frequently accessed data in RAM, reducing the number of queries to the MySQL database and significantly improving performance.",avoid:"Never add caching without understanding the invalidation pattern. Configure adequate TTLs in ElastiCache and have a clear strategy for stale data."}}},
{en:"Which are the customer responsibilities for security IN the cloud? (Choose TWO)",pt:"Quais sao as responsabilidades do cliente pela seguranca NA nuvem? (Escolha DUAS)",o:{en:["Building the application schema","Replacing faulty physical hardware","Creating the hypervisor","Patch management of underlying infrastructure","File system encryption"],pt:["Construir o esquema da aplicacao","Substituir hardware fisico com defeito","Criar o hypervisor","Gerenciamento de patches da infraestrutura subjacente","Criptografia do sistema de arquivos"]},a:[0,4],multi:true,t:"KMS & Encryption",exp:{pt:{tech:"No modelo de responsabilidade compartilhada, o cliente cuida dos dados, aplicacao, criptografia e configuracao de acesso.",simple:"O cliente e responsavel por definir o esquema da aplicacao (estrutura dos dados) e configurar a criptografia dos sistemas de arquivos nos servicos AWS.",avoid:"Nunca negligencie suas responsabilidades de seguranca na nuvem. Criptografia de dados, controle de acesso e configuracao de aplicacoes sao sua responsabilidade."},en:{tech:"In the shared responsibility model, the customer handles data, application, encryption, and access configuration.",simple:"The customer is responsible for defining the application schema (data structure) and configuring file system encryption on AWS services.",avoid:"Never neglect your security responsibilities in the cloud. Data encryption, access control, and application configuration are your responsibility."}}},
{en:"Which AWS service enables quick deployment of .NET applications?",pt:"Qual servico da AWS permite implantar aplicacoes .NET rapidamente?",o:{en:["Amazon SNS","AWS Elastic Beanstalk","AWS Systems Manager","AWS Trusted Advisor"],pt:["Amazon SNS","AWS Elastic Beanstalk","AWS Systems Manager","AWS Trusted Advisor"]},a:[1],t:"Elastic Beanstalk",exp:{pt:{tech:"Elastic Beanstalk faz deploy automatico de aplicacoes .NET, Java, Node.js e outras, gerenciando a infraestrutura.",simple:"AWS Elastic Beanstalk permite fazer deploy de aplicacoes .NET (e outras linguagens) rapidamente, cuidando automaticamente do provisionamento de servidores, balanceamento de carga e escalabilidade.",avoid:"Nunca faca deploy manual de aplicacoes .NET quando Elastic Beanstalk automatiza o processo. Use EB para simplificar deploys e gerenciar infraestrutura subjacente."},en:{tech:"Elastic Beanstalk automatically deploys .NET, Java, Node.js and other applications, managing the underlying infrastructure.",simple:"AWS Elastic Beanstalk enables quick deployment of .NET applications (and other languages), automatically handling server provisioning, load balancing, and scaling.",avoid:"Never manually deploy .NET applications when Elastic Beanstalk automates the process. Use EB to simplify deployments and manage underlying infrastructure."}}},
{en:"Which AWS service extends on-premises storage to the AWS Cloud?",pt:"Qual servico da AWS estende o armazenamento local para a nuvem AWS?",o:{en:["AWS Data Pipeline","AWS Storage Gateway","Amazon Aurora","Amazon EFS"],pt:["AWS Data Pipeline","AWS Storage Gateway","Amazon Aurora","Amazon EFS"]},a:[1],t:"EFS",exp:{pt:{tech:"AWS Storage Gateway conecta ambientes on-premises ao armazenamento em nuvem da AWS de forma transparente.",simple:"AWS Storage Gateway conecta seu ambiente on-premises ao armazenamento na nuvem AWS, permitindo que aplicacoes locais usem o armazenamento da nuvem de forma transparente.",avoid:"Nunca copie dados manualmente entre on-premises e AWS. Use Storage Gateway para integrar armazenamento local com a nuvem de forma transparente."},en:{tech:"AWS Storage Gateway seamlessly connects on-premises environments to AWS cloud storage.",simple:"AWS Storage Gateway connects your on-premises environment to AWS cloud storage, allowing local applications to use cloud storage transparently.",avoid:"Never copy data manually between on-premises and AWS. Use Storage Gateway to integrate local storage with the cloud transparently."}}},
{en:"Which AWS service provides access logs and records for auditing purposes?",pt:"Qual servico da AWS fornece logs de acesso e registros para fins de auditoria?",o:{en:["AWS CloudTrail","Amazon CloudFront","AWS CloudFormation","Amazon CloudWatch"],pt:["AWS CloudTrail","Amazon CloudFront","AWS CloudFormation","Amazon CloudWatch"]},a:[0],t:"CloudFront",exp:{pt:{tech:"AWS CloudTrail registra todas as acoes realizadas na conta AWS, essencial para auditorias e investigacoes de seguranca.",simple:"AWS CloudTrail fornece logs detalhados de todas as acoes realizadas na conta AWS, servindo como registro de auditoria para seguranca e conformidade.",avoid:"Nunca opere sem CloudTrail habilitado em todas as regioes. Sem logs de auditoria, voce nao consegue investigar incidentes de seguranca ou mudancas nao autorizadas."},en:{tech:"AWS CloudTrail records all actions performed in the AWS account, essential for audits and security investigations.",simple:"AWS CloudTrail provides detailed logs of all actions performed on the AWS account, serving as an audit trail for security and compliance.",avoid:"Never operate without CloudTrail enabled in all regions. Without audit logs, you cannot investigate security incidents or unauthorized changes."}}},
{en:"What is the best practice for building highly available applications on AWS?",pt:"Qual e a melhor pratica para construir aplicacoes de alta disponibilidade na AWS?",o:{en:["Deploy to at least two Availability Zones","Use Elastic Load Balancing across multiple Regions","Deploy code on two servers in the same Availability Zone","Rewrite the application code to handle all requests"],pt:["Implantar em pelo menos duas Zonas de Disponibilidade","Usar Elastic Load Balancing entre multiplas Regioes","Implantar codigo em dois servidores na mesma Zona de Disponibilidade","Reescrever o codigo da aplicacao para lidar com todas as requisicoes"]},a:[0],t:"Global Infrastructure",exp:{pt:{tech:"Implantar em pelo menos duas AZs garante que a aplicacao continue disponivel mesmo se uma AZ falhar.",simple:"Distribuir recursos em pelo menos duas Availability Zones garante que a aplicacao continue funcionando mesmo se uma zona inteira ficar indisponivel.",avoid:"Nunca implante aplicacoes criticas em uma unica AZ. Use pelo menos duas Availability Zones com failover automatico para garantir alta disponibilidade."},en:{tech:"Deploying to at least two AZs ensures the application remains available even if one AZ fails.",simple:"Deploying resources across at least two Availability Zones ensures the application keeps running even if an entire zone becomes unavailable.",avoid:"Never deploy critical applications in a single AZ. Use at least two Availability Zones with automatic failover to ensure high availability."}}},
{en:"Which factors should be considered in a Total Cost of Ownership (TCO) analysis? (Choose TWO)",pt:"Quais fatores devem ser considerados em uma analise de Custo Total de Propriedade (TCO)? (Escolha DUAS)",o:{en:["Labor costs and IT overhead","Cooling and power consumption","Amazon EBS computing power","Software architecture design","Software compatibility testing"],pt:["Custos de mao de obra e overhead de TI","Custos de refrigeracao e consumo de energia","Poder computacional do Amazon EBS","Design de arquitetura de software","Testes de compatibilidade de software"]},a:[0,1],multi:true,t:"EBS",exp:{pt:{tech:"TCO inclui custos de mao de obra, energia, refrigeracao, espaco fisico e hardware — custos que a nuvem elimina ou reduz.",simple:"Na analise de TCO, inclua custos de mao de obra da equipe de TI e custos de energia e refrigeracao do datacenter, que sao significativos no ambiente on-premises.",avoid:"Nunca ignore custos de pessoal e infraestrutura fisica na analise TCO. Incluir apenas custos de servidores resulta em comparacoes incorretas com a nuvem."},en:{tech:"TCO includes labor, power, cooling, physical space, and hardware costs — costs that the cloud eliminates or reduces.",simple:"In a TCO analysis, include IT staff labor costs and data center power and cooling costs, which are significant in the on-premises environment.",avoid:"Never ignore staffing and physical infrastructure costs in TCO analysis. Including only server costs results in incorrect comparisons with the cloud."}}},
{en:"Which support plan is required for a response time of less than 15 minutes for critical issues?",pt:"Qual plano de suporte e necessario para um tempo de resposta inferior a 15 minutos em problemas criticos?",o:{en:["AWS Basic Support","AWS Developer Support","AWS Business Support","AWS Enterprise Support"],pt:["AWS Basic Support","AWS Developer Support","AWS Business Support","AWS Enterprise Support"]},a:[3],t:"Support Plans",exp:{pt:{tech:"O plano Enterprise oferece tempo de resposta inferior a 15 minutos para casos criticos de negocio.",simple:"O plano Enterprise Support garante tempo de resposta inferior a 15 minutos para problemas criticos que afetam a producao. E o plano com o nivel mais alto de suporte tecnico da AWS.",avoid:"Nunca opere cargas criticas sem Enterprise Support se voce precisa de resposta em menos de 15 minutos. Sem ele, tempos de resposta podem ser de horas."},en:{tech:"The Enterprise plan offers a response time of less than 15 minutes for business-critical cases.",simple:"Enterprise Support guarantees a response time of less than 15 minutes for critical production issues. It is the highest level of technical support AWS offers.",avoid:"Never run critical workloads without Enterprise Support if you need response times under 15 minutes. Without it, response times can be hours."}}},
{en:"Which of the following are serverless AWS offerings? (Choose TWO)",pt:"Quais das alternativas a seguir sao ofertas serverless da AWS? (Escolha DUAS)",o:{en:["Amazon EC2","AWS Lambda","Amazon DynamoDB","Amazon EMR","Amazon RDS"],pt:["Amazon EC2","AWS Lambda","Amazon DynamoDB","Amazon EMR","Amazon RDS"]},a:[1,2],multi:true,t:"EC2 General",exp:{pt:{tech:"Lambda e DynamoDB sao serverless — nao exigem gerenciamento de servidores. EC2, EMR e RDS exigem.",simple:"AWS Lambda executa codigo sem voce precisar gerenciar servidores, e Amazon DynamoDB e um banco de dados que tambem nao exige gerenciamento de infraestrutura. Ambos sao serverless porque a AWS cuida de toda a infraestrutura por voce.",avoid:"Nunca deixe funcoes Lambda sem limites de timeout ou memoria configurados. Monitore invocacoes com CloudWatch para evitar custos inesperados."},en:{tech:"Lambda and DynamoDB are serverless — they require no server management. EC2, EMR, and RDS require it.",simple:"AWS Lambda runs code without you managing servers, and Amazon DynamoDB is a database that also requires no infrastructure management. Both are serverless because AWS handles all the infrastructure for you.",avoid:"Never leave Lambda functions without configured timeout or memory limits. Monitor invocations with CloudWatch to avoid unexpected costs."}}},
{en:"Which of the following is NOT correct regarding Amazon EC2 On-demand instances?",pt:"Qual das alternativas a seguir NAO esta correta sobre instancias EC2 On-Demand?",o:{en:["You have to pay a start-up fee when launching a new instance","The on-demand instances follow the AWS pay-as-you-go pricing model","No longer-term commitments or upfront payments are needed","You are charged per second based on an hourly rate"],pt:["Voce precisa pagar uma taxa inicial ao lancar uma nova instancia","As instancias on-demand seguem o modelo de precificacao pay-as-you-go da AWS","Nao sao necessarios compromissos de longo prazo ou pagamentos antecipados","Voce e cobrado por segundo com base em uma taxa por hora"]},a:[0],t:"EC2 Pricing",exp:{pt:{tech:"EC2 On-Demand nao cobra taxa inicial. Voce paga apenas pelo uso sem compromissos.",simple:"Instancias EC2 On-Demand nao cobram taxa inicial para comecar a usar. Voce paga apenas pelo tempo de computacao consumido, sem compromisso de longo prazo.",avoid:"Nunca deixe instancias On-Demand rodando sem uso. Use tags e alarmes de billing para identificar recursos ociosos e desligue-os."},en:{tech:"EC2 On-Demand instances have no start-up fees. You pay only for compute time with no long-term commitments.",simple:"EC2 On-Demand instances do not charge a startup fee to begin using them. You pay only for the compute time consumed, with no long-term commitment.",avoid:"Never leave On-Demand instances running idle. Use tags and billing alarms to identify unused resources and shut them down."}}},
{en:"Which AWS service provides up to 5x the performance of standard MySQL?",pt:"Qual servico da AWS oferece ate 5x a performance do MySQL padrao?",o:{en:["Amazon Aurora","Amazon Redshift","Amazon DynamoDB","Amazon Neptune"],pt:["Amazon Aurora","Amazon Redshift","Amazon DynamoDB","Amazon Neptune"]},a:[0],t:"Aurora",exp:{pt:{tech:"Amazon Aurora oferece ate 5x a performance do MySQL padrao e 3x do PostgreSQL, com armazenamento auto-escalavel.",simple:"Amazon Aurora e um banco de dados relacional gerenciado pela AWS, compativel com MySQL e PostgreSQL, que oferece desempenho ate 5 vezes superior ao MySQL padrao. Ele tambem escala automaticamente o armazenamento conforme necessario.",avoid:"Nunca use Aurora sem configurar backups automaticos e replicas de leitura. Habilite encryption at rest desde a criacao do cluster."},en:{tech:"Amazon Aurora delivers up to 5x the throughput of standard MySQL and 3x of PostgreSQL with auto-scaling storage.",simple:"Amazon Aurora is an AWS-managed relational database compatible with MySQL and PostgreSQL that delivers up to 5x the performance of standard MySQL. It also automatically scales storage as needed.",avoid:"Never use Aurora without configuring automatic backups and read replicas. Enable encryption at rest from cluster creation."}}},
{en:"To transfer 60 petabytes of data to Amazon S3, which service should you use?",pt:"Para transferir 60 petabytes de dados para o Amazon S3, qual servico voce deve usar?",o:{en:["AWS Snowball","S3 Transfer Acceleration","AWS Snowmobile","Amazon VPC"],pt:["AWS Snowball","S3 Transfer Acceleration","AWS Snowmobile","Amazon VPC"]},a:[2],t:"Snow Family",exp:{pt:{tech:"AWS Snowmobile e um caminhao com container de dados para transferencias em escala de exabytes. Snowball suporta ate petabytes.",simple:"AWS Snowmobile e um servico de transferencia de dados em escala de exabytes que usa um caminhao com container para mover volumes massivos de dados para a AWS. Para 60 petabytes, o Snowmobile e a opcao indicada porque o Snowball suporta volumes menores.",avoid:"Nunca tente transferir volumes massivos de dados apenas pela internet. Avalie tempo e custo de transferencia antes de escolher entre Snowball, Snowmobile ou transferencia online."},en:{tech:"AWS Snowmobile is a 45-foot shipping container truck for exabyte-scale transfers. Snowball handles up to petabytes.",simple:"AWS Snowmobile is an exabyte-scale data transfer service that uses a truck with a shipping container to move massive data volumes to AWS. For 60 petabytes, Snowmobile is the recommended option because Snowball handles smaller volumes.",avoid:"Never try to transfer massive data volumes over the internet alone. Evaluate transfer time and cost before choosing between Snowball, Snowmobile, or online transfer."}}},
{en:"Which AWS support plan includes a Concierge Support Team?",pt:"Qual plano de suporte da AWS inclui o time de Concierge?",o:{en:["Premium Support","Business Support","Enterprise Support","Standard Support"],pt:["Premium Support","Business Support","Enterprise Support","Standard Support"]},a:[2],t:"Support Plans",exp:{pt:{tech:"O Concierge Support Team e exclusivo do plano Enterprise e ajuda com questoes de faturamento e conta.",simple:"O Concierge Support Team e uma equipe dedicada que ajuda com questoes de conta e faturamento da AWS. Esse time esta disponivel exclusivamente no plano Enterprise Support.",avoid:"Nunca opere workloads criticas sem um plano de suporte adequado. Sem Enterprise Support, voce nao tera acesso a TAM nem resposta em menos de 15 minutos para incidentes criticos."},en:{tech:"The Concierge Support Team is exclusive to the Enterprise plan and assists with billing and account inquiries.",simple:"The Concierge Support Team is a dedicated team that helps with AWS account and billing questions. This team is available exclusively on the Enterprise Support plan.",avoid:"Never run critical workloads without an adequate support plan. Without Enterprise Support, you will not have access to a TAM or sub-15-minute response for critical incidents."}}},
{en:"Which AWS service tracks API call history for resource changes?",pt:"Qual servico da AWS rastreia o historico de chamadas de API para alteracoes em recursos?",o:{en:["AWS Config","Amazon CloudWatch","AWS CloudTrail","AWS CloudFormation"],pt:["AWS Config","Amazon CloudWatch","AWS CloudTrail","AWS CloudFormation"]},a:[2],t:"CloudTrail",exp:{pt:{tech:"AWS CloudTrail registra todas as chamadas de API feitas na conta, incluindo quem fez, quando e de onde.",simple:"AWS CloudTrail registra todas as chamadas de API feitas na sua conta AWS, incluindo quem fez a acao, quando e o que foi alterado. E essencial para auditoria e rastreamento de mudancas.",avoid:"Nunca desabilite o CloudTrail em nenhuma conta ou regiao. Habilite-o em todas as regioes e envie logs para um bucket S3 com protecao contra exclusao."},en:{tech:"AWS CloudTrail records all API calls made in your account, including who made them, when, and from where.",simple:"AWS CloudTrail records all API calls made in your AWS account, including who performed the action, when, and what was changed. It is essential for auditing and tracking changes.",avoid:"Never disable CloudTrail in any account or region. Enable it across all regions and send logs to an S3 bucket with deletion protection."}}},
{en:"What are the benefits of AWS-managed services? (Choose TWO)",pt:"Quais sao os beneficios dos servicos gerenciados pela AWS? (Escolha DUAS)",o:{en:["Complete control over virtual infrastructure","Deliver new solutions faster","Lower operational complexity","Eliminate encryption needs","Control all patching activities"],pt:["Controle total sobre a infraestrutura virtual","Entregar novas solucoes mais rapido","Menor complexidade operacional","Eliminar a necessidade de criptografia","Controlar todas as atividades de patching"]},a:[1,2],multi:true,t:"KMS & Encryption",exp:{pt:{tech:"Servicos gerenciados reduzem a complexidade operacional e aceleram a entrega, pois a AWS cuida da infraestrutura subjacente.",simple:"Servicos gerenciados pela AWS reduzem a complexidade operacional porque a AWS cuida de tarefas como atualizacoes, backups e patches. Isso permite que sua equipe entregue novas solucoes mais rapidamente.",avoid:"Nunca tente gerenciar patches, backups e escalabilidade manualmente quando existir um servico gerenciado equivalente. Use servicos gerenciados sempre que possivel para reduzir carga operacional."},en:{tech:"Managed services reduce operational complexity and speed up delivery since AWS handles the underlying infrastructure.",simple:"AWS-managed services reduce operational complexity because AWS handles tasks like updates, backups, and patches. This allows your team to deliver new solutions faster.",avoid:"Never try to manage patches, backups, and scaling manually when a managed service equivalent exists. Use managed services whenever possible to reduce operational overhead."}}},
{en:"Which of the following are valid Amazon S3 use cases? (Choose TWO)",pt:"Quais dos seguintes sao casos de uso validos do Amazon S3? (Escolha DUAS)",o:{en:["Hosting static websites","Hosting sites requiring sustained high CPU utilization","Cost-effective database and log storage","Media store for Amazon CloudFront","Processing data streams at any scale"],pt:["Hospedagem de sites estaticos","Hospedagem de sites que exigem alta utilizacao continua de CPU","Armazenamento economico de banco de dados e logs","Armazenamento de midia para o Amazon CloudFront","Processamento de fluxos de dados em qualquer escala"]},a:[0,3],multi:true,t:"S3 General",exp:{pt:{tech:"S3 e ideal para hospedagem de sites estaticos e como origem de conteudo para o CloudFront (CDN da AWS).",simple:"Amazon S3 pode hospedar sites estaticos (HTML, CSS, JS) e servir como armazenamento de midia para distribuicao via Amazon CloudFront. Ele armazena e entrega arquivos, mas nao executa codigo no servidor.",avoid:"Nunca hospede conteudo dinamico ou bancos de dados no S3. Use S3 apenas para objetos estaticos e configure politicas de acesso restritivas."},en:{tech:"S3 is ideal for static website hosting and as a content origin for CloudFront (AWS CDN).",simple:"Amazon S3 can host static websites (HTML, CSS, JS) and serve as media storage for distribution via Amazon CloudFront. It stores and delivers files but does not execute server-side code.",avoid:"Never host dynamic content or databases on S3. Use S3 only for static objects and configure restrictive access policies."}}},
{en:"What is the best practice for managing AWS access keys?",pt:"Qual e a melhor pratica para gerenciar chaves de acesso da AWS?",o:{en:["Delete all access keys and use only passwords","Share keys only with trusted people","Rotate access keys regularly","Save access keys in application code"],pt:["Deletar todas as chaves de acesso e usar apenas senhas","Compartilhar chaves apenas com pessoas confiaveis","Rotacionar as chaves de acesso regularmente","Salvar as chaves de acesso no codigo da aplicacao"]},a:[2],t:"IAM",exp:{pt:{tech:"A AWS recomenda rotacionar chaves de acesso regularmente para minimizar o risco de comprometimento.",simple:"A pratica recomendada e trocar (rotacionar) as chaves de acesso AWS regularmente para reduzir o risco de acesso nao autorizado. Se uma chave vazar, o impacto e limitado porque ela sera substituida em breve.",avoid:"Nunca armazene access keys em codigo-fonte ou repositorios. Rotacione as chaves regularmente e prefira IAM Roles em vez de chaves de longo prazo."},en:{tech:"AWS recommends rotating access keys regularly to minimize the risk of compromised credentials.",simple:"The best practice is to rotate AWS access keys regularly to reduce the risk of unauthorized access. If a key leaks, the impact is limited because it will be replaced soon.",avoid:"Never store access keys in source code or repositories. Rotate keys regularly and prefer IAM Roles over long-term keys."}}},
{en:"What benefit does programmatic API access to AWS provide?",pt:"Qual beneficio o acesso programatico via API oferece na AWS?",o:{en:["Improves resource performance","Reduces provisioning time","Reduces developer count needed","Enables programmatic management of resources"],pt:["Melhora a performance dos recursos","Reduz o tempo de provisionamento","Reduz o numero de desenvolvedores necessarios","Permite o gerenciamento programatico dos recursos"]},a:[3],t:"General",exp:{pt:{tech:"O acesso via API permite automatizar e gerenciar recursos AWS por meio de codigo, CLI ou SDKs.",simple:"O acesso programatico via API permite que voce gerencie recursos AWS usando codigo, scripts ou ferramentas de automacao em vez do console web. Isso possibilita automatizar tarefas repetitivas e integrar a AWS com outros sistemas.",avoid:"Nunca dependa exclusivamente de acesso manual pelo console. Automatize operacoes com CLI ou SDKs para garantir reprodutibilidade e reduzir erros humanos."},en:{tech:"API access allows you to automate and manage AWS resources through code, CLI, or SDKs.",simple:"Programmatic API access lets you manage AWS resources using code, scripts, or automation tools instead of the web console. This enables automating repetitive tasks and integrating AWS with other systems.",avoid:"Never rely exclusively on manual console access. Automate operations with CLI or SDKs to ensure reproducibility and reduce human error."}}},
{en:"Which AWS service is best suited for a database with high read/write activity?",pt:"Qual servico da AWS e mais adequado para um banco de dados com alta atividade de leitura/escrita?",o:{en:["AWS Storage Gateway","Amazon S3","Amazon EBS","Amazon Glacier"],pt:["AWS Storage Gateway","Amazon S3","Amazon EBS","Amazon Glacier"]},a:[2],t:"S3 Storage Classes",exp:{pt:{tech:"Amazon EBS fornece armazenamento em bloco de alta performance para instancias EC2, ideal para bancos de dados com alto I/O.",simple:"Amazon EBS (Elastic Block Store) fornece armazenamento em bloco persistente e de alta performance para instancias EC2. E ideal para bancos de dados com muita leitura e escrita porque oferece baixa latencia e IOPS consistente.",avoid:"Nunca use volumes EBS sem snapshots regulares. Configure backups automaticos e monitore IOPS para evitar gargalos de performance."},en:{tech:"Amazon EBS provides high-performance block storage for EC2 instances, ideal for databases with high I/O demands.",simple:"Amazon EBS (Elastic Block Store) provides persistent, high-performance block storage for EC2 instances. It is ideal for databases with heavy read and write activity because it offers low latency and consistent IOPS.",avoid:"Never use EBS volumes without regular snapshots. Configure automatic backups and monitor IOPS to avoid performance bottlenecks."}}},
{en:"After migrating from EC2 to Lambda, which responsibilities does AWS assume? (Choose TWO)",pt:"Ao migrar do EC2 para o Lambda, quais responsabilidades passam para a AWS? (Escolha DUAS)",o:{en:["Application management","Capacity management","Access control","Operating system maintenance","Data management"],pt:["Gerenciamento da aplicacao","Gerenciamento de capacidade","Controle de acesso","Manutencao do sistema operacional","Gerenciamento de dados"]},a:[1,3],multi:true,t:"EC2 General",exp:{pt:{tech:"Com Lambda (serverless), a AWS gerencia capacidade e sistema operacional. O cliente cuida da aplicacao, acesso e dados.",simple:"Ao migrar de EC2 para Lambda, a AWS assume a responsabilidade pelo gerenciamento de capacidade (escalar recursos) e pela manutencao do sistema operacional. Voce nao precisa mais se preocupar com dimensionamento de servidores ou aplicar patches no SO.",avoid:"Nunca assuma que a migracao para serverless elimina todas as responsabilidades. Voce ainda e responsavel pelo codigo, dados e permissoes da funcao."},en:{tech:"With Lambda (serverless), AWS manages capacity and OS maintenance. The customer handles application, access, and data.",simple:"When migrating from EC2 to Lambda, AWS assumes responsibility for capacity management (scaling resources) and operating system maintenance. You no longer need to worry about server sizing or applying OS patches.",avoid:"Never assume migrating to serverless eliminates all responsibilities. You are still responsible for function code, data, and permissions."}}},
{en:"What does the Elastic Load Balancer do to improve application reliability?",pt:"O que o Elastic Load Balancer faz para melhorar a confiabilidade da aplicacao?",o:{en:["Distributing traffic across S3 buckets","Replicating data to multiple Availability Zones","Creating database Read Replicas","Ensuring only healthy targets receive traffic"],pt:["Distribuir trafego entre buckets do S3","Replicar dados para multiplas Zonas de Disponibilidade","Criar Replicas de Leitura do banco de dados","Garantir que apenas alvos saudaveis recebam trafego"]},a:[3],t:"S3 General",exp:{pt:{tech:"O ELB faz health checks nos alvos e roteia trafego apenas para instancias saudaveis, melhorando a disponibilidade.",simple:"O Elastic Load Balancer verifica continuamente a saude das instancias de destino e envia trafego apenas para as que estao funcionando corretamente. Isso melhora a confiabilidade porque usuarios nunca sao direcionados a instancias com falha.",avoid:"Nunca exponha instancias diretamente sem um load balancer em producao. Configure health checks adequados para remover automaticamente instancias com falha."},en:{tech:"ELB performs health checks on targets and routes traffic only to healthy instances, improving availability.",simple:"The Elastic Load Balancer continuously checks the health of target instances and sends traffic only to those that are working correctly. This improves reliability because users are never directed to failing instances.",avoid:"Never expose instances directly without a load balancer in production. Configure proper health checks to automatically remove failed instances."}}},
{en:"Which EC2 pricing option ensures hardware is not shared with other customers?",pt:"Qual opcao de precificacao do EC2 garante que o hardware nao seja compartilhado com outros clientes?",o:{en:["On-demand instances","Spot instances","Dedicated instances","Reserved instances"],pt:["Instancias On-Demand","Instancias Spot","Instancias Dedicadas","Instancias Reservadas"]},a:[2],t:"EC2 Pricing",exp:{pt:{tech:"Dedicated Instances rodam em hardware fisicamente isolado, dedicado a um unico cliente AWS.",simple:"Dedicated Instances rodam em hardware fisico que nao e compartilhado com outros clientes AWS. Isso garante isolamento a nivel de hardware para atender requisitos de conformidade ou licenciamento.",avoid:"Nunca use instancias dedicadas sem necessidade comprovada de compliance. O custo e significativamente maior que instancias compartilhadas."},en:{tech:"Dedicated Instances run on physically isolated hardware dedicated to a single AWS customer.",simple:"Dedicated Instances run on physical hardware that is not shared with other AWS customers. This ensures hardware-level isolation to meet compliance or licensing requirements.",avoid:"Never use dedicated instances without a proven compliance need. The cost is significantly higher than shared instances."}}},
{en:"Which is the most cost-effective storage option for archiving data for 5 years?",pt:"Qual e a opcao de armazenamento mais economica para arquivar dados por 5 anos?",o:{en:["Amazon S3 Glacier","Amazon EFS","Amazon S3 Standard","Amazon EBS"],pt:["Amazon S3 Glacier","Amazon EFS","Amazon S3 Standard","Amazon EBS"]},a:[0],t:"S3 Storage Classes",exp:{pt:{tech:"S3 Glacier oferece armazenamento de custo muito baixo para dados de arquivo com acesso raro, ideal para retencao de longo prazo.",simple:"Amazon S3 Glacier e uma classe de armazenamento de custo muito baixo projetada para dados que raramente sao acessados e podem ser arquivados por longos periodos. E ideal para retencao de dados por anos a um custo minimo.",avoid:"Nunca armazene dados de arquivo em S3 Standard quando nao serao acessados frequentemente. Use Glacier para reduzir custos de armazenamento de longo prazo."},en:{tech:"S3 Glacier provides very low-cost storage for archival data with infrequent access, ideal for long-term retention.",simple:"Amazon S3 Glacier is a very low-cost storage class designed for data that is rarely accessed and can be archived for long periods. It is ideal for data retention over years at minimal cost.",avoid:"Never store archive data in S3 Standard when it will not be frequently accessed. Use Glacier to reduce long-term storage costs."}}},
{en:"Which AWS service is used for managing user permissions?",pt:"Qual servico da AWS e usado para gerenciar permissoes de usuarios?",o:{en:["Security Groups","Amazon ECS","AWS IAM","AWS Support"],pt:["Security Groups","Amazon ECS","AWS IAM","AWS Support"]},a:[2],t:"ECS",exp:{pt:{tech:"AWS IAM (Identity and Access Management) permite criar e gerenciar usuarios, grupos e permissoes de acesso aos recursos.",simple:"AWS IAM (Identity and Access Management) e o servico que controla quem pode acessar sua conta AWS e o que cada usuario ou servico pode fazer. Voce cria usuarios, grupos e politicas de permissao pelo IAM.",avoid:"Nunca conceda permissoes administrativas amplas a todos os usuarios IAM. Aplique o principio de menor privilegio e revise permissoes periodicamente."},en:{tech:"AWS IAM (Identity and Access Management) lets you create and manage users, groups, and access permissions to resources.",simple:"AWS IAM (Identity and Access Management) is the service that controls who can access your AWS account and what each user or service can do. You create users, groups, and permission policies through IAM.",avoid:"Never grant broad administrative permissions to all IAM users. Apply the principle of least privilege and review permissions periodically."}}},
{en:"Which design principle helps minimize the impact of outages?",pt:"Qual principio de design ajuda a minimizar o impacto de interrupcoes?",o:{en:["Least Privilege","Pilot Light","Fault Tolerance","Multi-threading"],pt:["Menor Privilegio","Pilot Light","Tolerancia a Falhas","Multi-threading"]},a:[2],t:"IAM",exp:{pt:{tech:"Fault Tolerance garante que o sistema continue operando mesmo quando componentes falham, usando redundancia.",simple:"Tolerancia a falhas e a capacidade de um sistema continuar funcionando mesmo quando um componente falha. Na AWS, isso e alcancado usando redundancia em multiplas Availability Zones e recursos de failover automatico.",avoid:"Nunca confie em uma unica zona de disponibilidade ou regiao para workloads criticos. Projete para falhas usando multiplas AZs e replicacao."},en:{tech:"Fault Tolerance ensures the system continues operating even when components fail, through redundancy.",simple:"Fault tolerance is the ability of a system to continue operating even when a component fails. On AWS, this is achieved using redundancy across multiple Availability Zones and automatic failover features.",avoid:"Never rely on a single availability zone or region for critical workloads. Design for failure using multiple AZs and replication."}}},
{en:"Which Reserved Instance payment option provides the largest discount?",pt:"Qual opcao de pagamento de Instancia Reservada oferece o maior desconto?",o:{en:["All up-front","All options provide the same discount","Partial up-front","No up-front"],pt:["Tudo antecipado","Todas as opcoes oferecem o mesmo desconto","Parcialmente antecipado","Sem pagamento antecipado"]},a:[0],t:"EC2 Pricing",exp:{pt:{tech:"O pagamento All Upfront de Reserved Instances oferece o maior desconto (ate 72%) comparado a Partial ou No Upfront.",simple:"A opcao de pagamento total antecipado (All Upfront) para Reserved Instances oferece o maior desconto porque voce paga o valor total no inicio do periodo. Quanto mais voce paga adiantado, maior a reducao no custo.",avoid:"Nunca compre Reserved Instances sem analisar o uso historico. Use Cost Explorer para validar que a carga de trabalho e estavel antes de se comprometer."},en:{tech:"All Upfront payment for Reserved Instances offers the highest discount (up to 72%) compared to Partial or No Upfront.",simple:"The All Upfront payment option for Reserved Instances offers the largest discount because you pay the full amount at the start of the term. The more you pay in advance, the greater the cost reduction.",avoid:"Never purchase Reserved Instances without analyzing historical usage. Use Cost Explorer to validate the workload is stable before committing."}}},
{en:"Which of the following are AWS data protection features? (Choose TWO)",pt:"Quais das alternativas a seguir sao recursos de protecao de dados da AWS? (Escolha DUAS)",o:{en:["Access control","Physical MFA devices","Data encryption","Unlimited storage","Load balancing"],pt:["Controle de acesso","Dispositivos MFA fisicos","Criptografia de dados","Armazenamento ilimitado","Balanceamento de carga"]},a:[0,2],multi:true,t:"IAM",exp:{pt:{tech:"Controle de acesso (IAM) e criptografia (em repouso e em transito) sao os principais mecanismos de protecao de dados na AWS.",simple:"Controle de acesso restringe quem pode ver ou modificar seus dados, e criptografia transforma os dados em formato ilegivel para quem nao tem a chave de decodificacao. Juntos, esses recursos protegem dados em repouso e em transito na AWS.",avoid:"Nunca armazene dados sensiveis sem criptografia em transito e em repouso. Use KMS para gerenciar chaves e habilite SSL/TLS em todas as conexoes."},en:{tech:"Access control (IAM) and encryption (at rest and in transit) are the primary data protection mechanisms in AWS.",simple:"Access control restricts who can view or modify your data, and encryption transforms data into an unreadable format for anyone without the decryption key. Together, these features protect data at rest and in transit on AWS.",avoid:"Never store sensitive data without encryption in transit and at rest. Use KMS to manage keys and enable SSL/TLS on all connections."}}},
{en:"Which IAM entity should be used to grant temporary access to AWS resources?",pt:"Qual entidade do IAM deve ser usada para conceder acesso temporario aos recursos da AWS?",o:{en:["IAM Users","Key Pair","IAM Roles","IAM Groups"],pt:["Usuarios IAM","Par de Chaves","Funcoes IAM (Roles)","Grupos IAM"]},a:[2],t:"IAM",exp:{pt:{tech:"IAM Roles fornecem credenciais temporarias que sao rotacionadas automaticamente, ideais para acesso temporario.",simple:"IAM Roles fornecem credenciais temporarias que expiram automaticamente, sem necessidade de armazenar senhas ou chaves de acesso. Sao ideais para conceder acesso a servicos AWS, aplicacoes ou usuarios federados.",avoid:"Nunca crie usuarios IAM com credenciais de longo prazo para aplicacoes. Use IAM Roles com credenciais temporarias para qualquer servico ou aplicacao."},en:{tech:"IAM Roles provide temporary credentials that are automatically rotated, ideal for granting temporary access.",simple:"IAM Roles provide temporary credentials that expire automatically, without needing to store passwords or access keys. They are ideal for granting access to AWS services, applications, or federated users.",avoid:"Never create IAM users with long-term credentials for applications. Use IAM Roles with temporary credentials for any service or application."}}},
{en:"Which AWS service distributes incoming traffic across multiple EC2 instances?",pt:"Qual servico da AWS distribui o trafego de entrada entre varias instancias EC2?",o:{en:["AWS Global Accelerator","AWS Application Load Balancer","Amazon CloudFront","Transit VPC"],pt:["AWS Global Accelerator","AWS Application Load Balancer","Amazon CloudFront","Transit VPC"]},a:[1],t:"EC2 General",exp:{pt:{tech:"O Application Load Balancer (ALB) opera na camada 7 e distribui trafego HTTP/HTTPS entre instancias EC2.",simple:"O AWS Application Load Balancer (ALB) distribui o trafego de entrada entre varias instancias EC2 com base em regras definidas na camada de aplicacao (HTTP/HTTPS). Isso evita que uma unica instancia fique sobrecarregada.",avoid:"Nunca direcione todo o trafego para uma unica instancia sem balanceamento de carga. Configure ALB com multiplos targets e health checks para alta disponibilidade."},en:{tech:"The Application Load Balancer (ALB) operates at layer 7 and distributes HTTP/HTTPS traffic across EC2 instances.",simple:"The AWS Application Load Balancer (ALB) distributes incoming traffic across multiple EC2 instances based on rules defined at the application layer (HTTP/HTTPS). This prevents any single instance from becoming overloaded.",avoid:"Never direct all traffic to a single instance without load balancing. Configure ALB with multiple targets and health checks for high availability."}}},
{en:"Which option helps secure an AWS account from unauthorized access?",pt:"Qual opcao ajuda a proteger uma conta AWS contra acesso nao autorizado?",o:{en:["Restrict all SDK and CLI API calls","Share IAM accounts organized by department","Require MFA for all IAM User access","Set up two different login passwords"],pt:["Restringir todas as chamadas de API do SDK e CLI","Compartilhar contas IAM organizadas por departamento","Exigir MFA para todo acesso de usuarios IAM","Configurar duas senhas de login diferentes"]},a:[2],t:"IAM",exp:{pt:{tech:"MFA adiciona uma camada extra de seguranca exigindo um segundo fator alem da senha para autenticacao.",simple:"Exigir MFA (autenticacao multifator) para todos os usuarios IAM adiciona uma camada extra de seguranca alem da senha. Mesmo que a senha seja comprometida, o invasor ainda precisa do segundo fator para acessar a conta.",avoid:"Nunca deixe contas AWS sem MFA habilitado. Exija MFA para todos os usuarios IAM, especialmente para acesso ao console e operacoes destrutivas."},en:{tech:"MFA adds an extra security layer by requiring a second factor beyond the password for authentication.",simple:"Requiring MFA (multi-factor authentication) for all IAM users adds an extra security layer beyond the password. Even if the password is compromised, the attacker still needs the second factor to access the account.",avoid:"Never leave AWS accounts without MFA enabled. Require MFA for all IAM users, especially for console access and destructive operations."}}},
{en:"Which AWS service offers volume-based discounts as usage increases?",pt:"Qual servico da AWS oferece descontos baseados em volume conforme o uso aumenta?",o:{en:["Amazon VPC","Amazon S3","Amazon Lightsail","AWS Cost Explorer"],pt:["Amazon VPC","Amazon S3","Amazon Lightsail","AWS Cost Explorer"]},a:[1],t:"S3 General",exp:{pt:{tech:"O Amazon S3 usa precificacao em camadas — quanto mais dados voce armazena, menor o custo por GB.",simple:"Amazon S3 oferece descontos automaticos baseados em volume — quanto mais dados voce armazena, menor o custo por GB. Os precos diminuem em faixas conforme o uso total aumenta.",avoid:"Nunca ignore a estrutura de precos por volume da AWS. Consolide workloads e organize dados em tiers de armazenamento para maximizar descontos automaticos."},en:{tech:"Amazon S3 uses tiered pricing — the more data you store, the lower the cost per GB.",simple:"Amazon S3 offers automatic volume-based discounts — the more data you store, the lower the cost per GB. Prices decrease in tiers as total usage increases.",avoid:"Never ignore AWS volume-based pricing structure. Consolidate workloads and organize data into storage tiers to maximize automatic discounts."}}},
{en:"Which factors should be considered when choosing an AWS Region for deployment? (Choose TWO)",pt:"Quais fatores devem ser considerados ao escolher uma Regiao AWS para implantacao? (Escolha DUAS)",o:{en:["The security level of the region","Data sovereignty and compliance requirements","Cost of services in the region","Number of available VPCs","Geographic proximity to users"],pt:["O nivel de seguranca da regiao","Requisitos de soberania de dados e conformidade","Custo dos servicos na regiao","Numero de VPCs disponiveis","Proximidade geografica dos usuarios"]},a:[1,2],multi:true,t:"Global Infrastructure",exp:{pt:{tech:"A escolha de regiao deve considerar conformidade com leis de dados locais e custo, que varia entre regioes.",simple:"Ao escolher uma Regiao AWS, considere os requisitos de soberania e conformidade de dados (leis que exigem que dados fiquem em determinado pais) e o custo dos servicos, que varia entre regioes. Esses dois fatores impactam diretamente conformidade legal e orcamento.",avoid:"Nunca escolha uma regiao apenas pelo preco sem considerar requisitos de soberania de dados e latencia. Verifique regulamentacoes locais antes de implantar."},en:{tech:"Region selection should consider compliance with local data laws and cost, which varies between regions.",simple:"When choosing an AWS Region, consider data sovereignty and compliance requirements (laws that require data to stay in a specific country) and the cost of services, which varies between regions. These two factors directly impact legal compliance and budget.",avoid:"Never choose a region based on price alone without considering data sovereignty requirements and latency. Check local regulations before deploying."}}},
{en:"Which AWS service provides in-memory caching to improve MySQL database performance?",pt:"Qual servico da AWS fornece cache em memoria para melhorar a performance de bancos MySQL?",o:{en:["Amazon EFS","Amazon Neptune","Amazon ElastiCache","Amazon DAX"],pt:["Amazon EFS","Amazon Neptune","Amazon ElastiCache","Amazon DAX"]},a:[2],t:"EFS",exp:{pt:{tech:"Amazon ElastiCache suporta Redis e Memcached para cache em memoria, reduzindo a carga em bancos relacionais como MySQL.",simple:"Amazon ElastiCache e um servico de cache em memoria que armazena dados frequentemente acessados na memoria RAM para entrega-los muito mais rapido que um banco de dados em disco. Ele reduz a carga no banco MySQL ao evitar consultas repetidas.",avoid:"Nunca use ElastiCache sem configurar replicas e failover automatico. Monitore hit rates para garantir que o cache esta realmente melhorando a performance."},en:{tech:"Amazon ElastiCache supports Redis and Memcached for in-memory caching, reducing load on relational databases like MySQL.",simple:"Amazon ElastiCache is an in-memory caching service that stores frequently accessed data in RAM to deliver it much faster than a disk-based database. It reduces the load on MySQL by avoiding repeated queries.",avoid:"Never use ElastiCache without configuring replicas and automatic failover. Monitor hit rates to ensure the cache is actually improving performance."}}},
{en:"Which are the customer responsibilities for security IN the cloud? (Choose TWO)",pt:"Quais sao as responsabilidades do cliente pela seguranca NA nuvem? (Escolha DUAS)",o:{en:["Building the application schema","Replacing faulty physical hardware","Creating the hypervisor","Patch management of underlying infrastructure","File system encryption"],pt:["Construir o esquema da aplicacao","Substituir hardware fisico com defeito","Criar o hypervisor","Gerenciamento de patches da infraestrutura subjacente","Criptografia do sistema de arquivos"]},a:[0,4],multi:true,t:"KMS & Encryption",exp:{pt:{tech:"No modelo de responsabilidade compartilhada, o cliente cuida dos dados, aplicacao, criptografia e configuracao de acesso.",simple:"O cliente e responsavel por construir o esquema da aplicacao (estrutura do banco de dados, logica de negocio) e por configurar a criptografia do sistema de arquivos. Essas sao responsabilidades de seguranca dentro da nuvem.",avoid:"Nunca assuma que a AWS gerencia a seguranca dos seus dados e aplicacoes. Voce e responsavel por criptografia de dados, controle de acesso e seguranca da aplicacao."},en:{tech:"In the shared responsibility model, the customer handles data, application, encryption, and access configuration.",simple:"The customer is responsible for building the application schema (database structure, business logic) and for configuring file system encryption. These are security responsibilities within the cloud.",avoid:"Never assume AWS manages the security of your data and applications. You are responsible for data encryption, access control, and application security."}}},
{en:"Which AWS service enables quick deployment of .NET applications?",pt:"Qual servico da AWS permite implantar aplicacoes .NET rapidamente?",o:{en:["Amazon SNS","AWS Elastic Beanstalk","AWS Systems Manager","AWS Trusted Advisor"],pt:["Amazon SNS","AWS Elastic Beanstalk","AWS Systems Manager","AWS Trusted Advisor"]},a:[1],t:"Elastic Beanstalk",exp:{pt:{tech:"Elastic Beanstalk faz deploy automatico de aplicacoes .NET, Java, Node.js e outras, gerenciando a infraestrutura.",simple:"AWS Elastic Beanstalk permite implantar aplicacoes .NET (e outras linguagens) rapidamente, cuidando automaticamente da infraestrutura como servidores, balanceamento de carga e escalabilidade. Voce envia o codigo e o Beanstalk configura o ambiente.",avoid:"Nunca faca deploy de aplicacoes diretamente em producao sem ambientes de staging. Use Elastic Beanstalk com swap de ambientes para deploys seguros."},en:{tech:"Elastic Beanstalk automatically deploys .NET, Java, Node.js and other applications, managing the underlying infrastructure.",simple:"AWS Elastic Beanstalk lets you deploy .NET (and other language) applications quickly, automatically handling infrastructure like servers, load balancing, and scaling. You upload the code and Beanstalk configures the environment.",avoid:"Never deploy applications directly to production without staging environments. Use Elastic Beanstalk with environment swaps for safe deployments."}}},
{en:"Which AWS service extends on-premises storage to the AWS Cloud?",pt:"Qual servico da AWS estende o armazenamento local para a nuvem AWS?",o:{en:["AWS Data Pipeline","AWS Storage Gateway","Amazon Aurora","Amazon EFS"],pt:["AWS Data Pipeline","AWS Storage Gateway","Amazon Aurora","Amazon EFS"]},a:[1],t:"EFS",exp:{pt:{tech:"AWS Storage Gateway conecta ambientes on-premises ao armazenamento em nuvem da AWS de forma transparente.",simple:"AWS Storage Gateway conecta seu ambiente local (on-premises) ao armazenamento na nuvem AWS, permitindo que aplicacoes locais usem armazenamento na nuvem de forma transparente. Ele funciona como uma extensao do seu armazenamento local para a AWS.",avoid:"Nunca use Storage Gateway sem monitorar a conectividade e largura de banda entre on-premises e a nuvem. Configure alertas para detectar falhas de sincronizacao."},en:{tech:"AWS Storage Gateway seamlessly connects on-premises environments to AWS cloud storage.",simple:"AWS Storage Gateway connects your on-premises environment to AWS cloud storage, allowing local applications to use cloud storage seamlessly. It acts as an extension of your local storage into AWS.",avoid:"Never use Storage Gateway without monitoring connectivity and bandwidth between on-premises and cloud. Configure alerts to detect sync failures."}}},
{en:"Which AWS service provides access logs and records for auditing purposes?",pt:"Qual servico da AWS fornece logs de acesso e registros para fins de auditoria?",o:{en:["AWS CloudTrail","Amazon CloudFront","AWS CloudFormation","Amazon CloudWatch"],pt:["AWS CloudTrail","Amazon CloudFront","AWS CloudFormation","Amazon CloudWatch"]},a:[0],t:"CloudFront",exp:{pt:{tech:"AWS CloudTrail registra todas as acoes realizadas na conta AWS, essencial para auditorias e investigacoes de seguranca.",simple:"AWS CloudTrail fornece logs de acesso que registram todas as atividades e chamadas de API na sua conta AWS. Esses registros sao essenciais para auditorias de seguranca e investigacao de incidentes.",avoid:"Nunca desative logs de auditoria em ambientes de producao. Mantenha CloudTrail ativo com logs protegidos contra alteracao em um bucket separado."},en:{tech:"AWS CloudTrail records all actions performed in the AWS account, essential for audits and security investigations.",simple:"AWS CloudTrail provides access logs that record all activities and API calls in your AWS account. These records are essential for security audits and incident investigation.",avoid:"Never disable audit logs in production environments. Keep CloudTrail active with tamper-protected logs in a separate bucket."}}},
