<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado AWS Cloud Practitioner (CLF-C02)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0e17;color:#e0e0e0;min-height:100vh}
.container{max-width:860px;margin:0 auto;padding:20px}
header{text-align:center;padding:30px 0 20px;border-bottom:1px solid #1e293b;margin-bottom:30px}
header h1{font-size:1.6rem;color:#ff9900;margin-bottom:6px}
header p{color:#94a3b8;font-size:.9rem}
.lang-switch,.mode-switch{display:flex;justify-content:center;gap:0;margin-top:14px}
.lang-btn,.mode-btn{padding:6px 20px;border:1px solid #334155;background:0 0;color:#94a3b8;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}
.lang-btn:first-child,.mode-btn:first-child{border-radius:6px 0 0 6px}
.lang-btn:last-child,.mode-btn:last-child{border-radius:0 6px 6px 0}
.lang-btn.active,.mode-btn.active{background:#ff9900;color:#0a0e17;border-color:#ff9900}
.mode-btn.study.active{background:#3b82f6;border-color:#3b82f6}
.timer-bar{text-align:center;margin-bottom:16px;display:none}
.timer{font-size:1.4rem;font-weight:700;color:#ff9900;font-variant-numeric:tabular-nums}
.timer.warn{color:#ef4444;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.progress-bar{background:#1e293b;border-radius:8px;height:8px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ff9900,#ffb84d);border-radius:8px;transition:width .4s;width:0%}
.progress-text{text-align:right;font-size:.8rem;color:#94a3b8;margin-bottom:6px}
.question-card{background:#111827;border:1px solid #1e293b;border-radius:12px;padding:24px;margin-bottom:20px;transition:border-color .3s}
.question-card.answered{border-color:#334155}
.question-card.study-right{border-color:#22c55e}
.question-card.study-wrong{border-color:#ef4444}
.question-card .q-number{color:#ff9900;font-size:.8rem;font-weight:600;margin-bottom:8px}
.question-card .q-text{font-size:1rem;line-height:1.6;margin-bottom:16px}
.question-card .q-note{font-size:.8rem;color:#ff9900;font-style:italic;margin-bottom:12px}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:1px solid #1e293b;border-radius:8px;cursor:pointer;transition:all .2s}
.option:hover{background:#1a2332;border-color:#334155}
.option.selected{background:#1a2332;border-color:#ff9900}
.option.locked{pointer-events:none;opacity:.7}
.option.correct-reveal{border-color:#22c55e;background:#0a1f0a}
.option.wrong-reveal{border-color:#ef4444;background:#1f0a0a}
.option .check{width:20px;height:20px;min-width:20px;border:2px solid #475569;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s}
.option.multi .check{border-radius:4px}
.option.selected .check{border-color:#ff9900;background:#ff9900}
.option.selected .check::after{content:'';display:block;width:6px;height:6px;background:#0a0e17;border-radius:50%}
.option.multi.selected .check::after{border-radius:2px;background:0 0;border-bottom:2px solid #0a0e17;border-right:2px solid #0a0e17;transform:rotate(45deg);width:5px;height:9px;margin-bottom:2px}
.option .letter{color:#ff9900;font-weight:600;min-width:16px}
.option .text{color:#cbd5e1;font-size:.95rem;line-height:1.5}
.explanation{display:none;margin-top:16px;padding:16px;border-radius:8px;background:#0f172a;border:1px solid #1e293b}
.explanation.show{display:block}
.explanation .exp-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.explanation .exp-tech{color:#60a5fa;margin-bottom:12px;font-size:.9rem;line-height:1.5}
.explanation .exp-simple{color:#a78bfa;font-size:.9rem;line-height:1.5;padding-top:10px;border-top:1px solid #1e293b}
.exp-icon{margin-right:4px}
.study-badge{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:4px;font-weight:600;margin-top:8px}
.study-badge.right{background:#052e16;color:#22c55e}
.study-badge.wrong{background:#2d0a0a;color:#ef4444}
.btn-submit{display:block;margin:40px auto;padding:14px 48px;font-size:1.1rem;font-weight:600;color:#0a0e17;background:#ff9900;border:none;border-radius:8px;cursor:pointer;transition:all .2s}
.btn-submit:hover{background:#ffb84d;transform:translateY(-1px)}
.btn-confirm{display:none;margin:10px auto;padding:10px 30px;font-size:.9rem;font-weight:600;color:#0a0e17;background:#22c55e;border:none;border-radius:6px;cursor:pointer}
.results{display:none}
.results-header{text-align:center;padding:30px;background:#111827;border-radius:12px;border:1px solid #1e293b;margin-bottom:24px}
.results-header .score{font-size:3.5rem;font-weight:700}
.results-header .score.pass{color:#22c55e}
.results-header .score.fail{color:#ef4444}
.results-header .label{font-size:1.1rem;color:#94a3b8;margin-top:4px}
.results-header .verdict{font-size:1.3rem;font-weight:600;margin-top:12px;padding:8px 20px;border-radius:6px;display:inline-block}
.verdict.pass{background:#052e16;color:#22c55e}
.verdict.fail{background:#2d0a0a;color:#ef4444}
.results-bar{display:flex;gap:20px;justify-content:center;margin-top:16px;font-size:.9rem}
.results-bar span{color:#94a3b8}
.results-bar .correct{color:#22c55e}
.results-bar .wrong{color:#ef4444}
.review-card{background:#111827;border-radius:12px;padding:20px;margin-bottom:14px;border-left:4px solid transparent}
.review-card.right{border-left-color:#22c55e}
.review-card.wrong{border-left-color:#ef4444}
.review-card .q-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.review-card .q-head .tag{font-size:.75rem;padding:3px 10px;border-radius:4px;font-weight:600}
.tag.right{background:#052e16;color:#22c55e}
.tag.wrong{background:#2d0a0a;color:#ef4444}
.review-card .q-text{font-size:.95rem;margin-bottom:10px;color:#cbd5e1}
.review-card .answer-line{font-size:.85rem;margin:3px 0}
.answer-line .label-ans{color:#94a3b8}
.answer-line .val-correct{color:#22c55e;font-weight:600}
.answer-line .val-wrong{color:#ef4444}
.btn-top{display:block;margin:30px auto;padding:10px 30px;background:0 0;border:1px solid #334155;color:#94a3b8;border-radius:6px;cursor:pointer;font-size:.9rem}
.btn-top:hover{border-color:#ff9900;color:#ff9900}
.start-screen{text-align:center;padding:60px 20px}
.start-screen h2{color:#ff9900;margin-bottom:10px;font-size:1.4rem}
.start-screen p{color:#94a3b8;margin-bottom:30px}
.btn-start{padding:14px 48px;font-size:1.1rem;font-weight:600;color:#0a0e17;background:#ff9900;border:none;border-radius:8px;cursor:pointer}
.btn-start:hover{background:#ffb84d}
.study-score{text-align:center;padding:16px;background:#111827;border-radius:12px;border:1px solid #1e293b;margin-bottom:20px;display:none}
.study-score .ss-text{color:#94a3b8;font-size:.9rem}
.study-score .ss-num{color:#ff9900;font-weight:700;font-size:1.1rem}

@media(max-width:600px){
  .container{padding:12px 10px}
  header{padding:20px 0 14px;margin-bottom:20px}
  header h1{font-size:1.15rem}
  header p{font-size:.78rem}
  .lang-btn,.mode-btn{padding:8px 14px;font-size:.78rem}
  .question-card{padding:16px 14px;margin-bottom:14px;border-radius:10px}
  .question-card .q-text{font-size:.93rem;line-height:1.55;margin-bottom:12px}
  .question-card .q-number{font-size:.75rem}
  .option{padding:14px 12px;gap:8px;border-radius:6px;-webkit-tap-highlight-color:transparent}
  .option:hover{background:inherit;border-color:#1e293b}
  .option.selected{background:#1a2332;border-color:#ff9900}
  .option .text{font-size:.88rem;line-height:1.45}
  .option .letter{font-size:.88rem}
  .option .check{width:22px;height:22px;min-width:22px}
  .explanation{padding:12px;margin-top:12px}
  .explanation .exp-tech,.explanation .exp-simple{font-size:.84rem;line-height:1.45}
  .btn-submit{padding:14px 30px;font-size:1rem;width:100%;margin:30px auto}
  .btn-start{padding:14px 30px;font-size:1rem;width:100%}
  .btn-confirm{padding:12px 24px;font-size:.85rem;width:100%}
  .btn-top{width:100%;padding:12px}
  .results-header{padding:20px 16px}
  .results-header .score{font-size:2.8rem}
  .results-header .label{font-size:.95rem}
  .results-header .verdict{font-size:1.1rem;padding:6px 16px}
  .results-bar{flex-wrap:wrap;gap:10px;font-size:.82rem}
  .review-card{padding:14px 12px;border-radius:10px}
  .review-card .q-text{font-size:.88rem}
  .review-card .answer-line{font-size:.8rem}
  .timer{font-size:1.6rem}
  .start-screen{padding:40px 10px}
  .start-screen h2{font-size:1.2rem}
  .start-screen p{font-size:.88rem}
  .progress-text{font-size:.75rem}
  .study-score{padding:12px}
  .study-score .ss-text{font-size:.85rem}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>AWS Certified Cloud Practitioner (CLF-C02)</h1>
    <p id="header-sub"></p>
    <div class="lang-switch">
      <button class="lang-btn active" id="btn-pt" onclick="setLang('pt')">Portugues</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
    </div>
    <div class="mode-switch">
      <button class="mode-btn study active" id="btn-study" onclick="setMode('study')">Modo Estudo</button>
      <button class="mode-btn" id="btn-exam" onclick="setMode('exam')">Modo Simulado</button>
    </div>
  </header>

  <div id="start-screen" class="start-screen">
    <h2 id="start-title"></h2>
    <p id="start-desc"></p>
    <button class="btn-start" id="btn-start" onclick="startQuiz()"></button>
  </div>

  <div id="quiz-section" style="display:none">
    <div class="timer-bar" id="timer-bar"><span class="timer" id="timer">60:00</span></div>
    <div class="study-score" id="study-score"><span class="ss-text" id="ss-text"></span></div>
    <div class="progress-text" id="progress-text"></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div id="questions-container"></div>
    <button class="btn-submit" id="btn-submit" onclick="submitQuiz()"></button>
  </div>

  <div class="results" id="results-section">
    <div class="results-header">
      <div class="score" id="score-pct"></div>
      <div class="label" id="score-label"></div>
      <div class="verdict" id="verdict"></div>
      <div class="results-bar">
        <span class="correct" id="res-correct"></span>
        <span class="wrong" id="res-wrong"></span>
        <span id="res-unanswered"></span>
      </div>
    </div>
    <h3 style="margin-bottom:16px;color:#94a3b8" id="review-title"></h3>
    <div id="review-container"></div>
    <button class="btn-top" id="btn-top" onclick="window.scrollTo({top:0,behavior:'smooth'})"></button>
    <button class="btn-submit" id="btn-new" onclick="newQuiz()" style="margin-top:20px"></button>
  </div>
</div>

<script>
let lang='pt', mode='study', timerInterval=null, timeLeft=3600, studyCorrect=0, studyAnswered=0;
let lockedQuestions = new Set();

const ui={
pt:{
  sub:()=>'65 questoes sorteadas de '+Q.length+' \u2022 Aprovacao: 70%',
  progress:n=>`${n} / 65 respondidas`,
  submit:'Finalizar Simulado',
  qOf:i=>`Questao ${i} de 65`,
  choose:n=>`Escolha ${n} alternativas`,
  confirmMsg:n=>`Voce respondeu ${n} de 65 questoes. Deseja finalizar mesmo assim?`,
  of65:n=>`${n} de 65 corretas`,
  pass:'APROVADO',fail:'REPROVADO',
  correct:n=>`${n} corretas`,wrong:n=>`${n} erradas`,unanswered:n=>`${n} sem resposta`,
  reviewTitle:'Revisao das questoes',
  yourAns:'Sua resposta: ',correctAns:'Resposta correta: ',
  tagRight:'Correta',tagWrong:'Errada',tagNone:'Nao respondida',
  backTop:'Voltar ao topo',
  startStudy:'Modo Estudo',startExam:'Modo Simulado',
  descStudy:'Responda no seu ritmo. A cada erro, a explicacao aparece na hora.',
  descExam:'Simulado real: 60 minutos, sem respostas ate o final.',
  btnStart:'Comecar',
  techLabel:'Explicacao tecnica:',simpleLabel:'De forma simples:',
  studyScore:(c,t)=>`Acertos: ${c} / ${t}`,
  rightBadge:'Acertou!',wrongBadge:'Errou!',
  confirmMulti:'Confirmar',
  modeStudy:'Modo Estudo',modeExam:'Modo Simulado',
  expLabel:'Explicacao',
  newQuiz:'Novo Simulado (questoes diferentes)'
},
en:{
  sub:()=>'65 questions from a pool of '+Q.length+' \u2022 Passing: 70%',
  progress:n=>`${n} / 65 answered`,
  submit:'Finish Exam',
  qOf:i=>`Question ${i} of 65`,
  choose:n=>`Choose ${n} options`,
  confirmMsg:n=>`You answered ${n} of 65 questions. Finish anyway?`,
  of65:n=>`${n} of 65 correct`,
  pass:'PASSED',fail:'FAILED',
  correct:n=>`${n} correct`,wrong:n=>`${n} wrong`,unanswered:n=>`${n} unanswered`,
  reviewTitle:'Question review',
  yourAns:'Your answer: ',correctAns:'Correct answer: ',
  tagRight:'Correct',tagWrong:'Wrong',tagNone:'Unanswered',
  backTop:'Back to top',
  startStudy:'Study Mode',startExam:'Exam Mode',
  descStudy:'Answer at your pace. Wrong answers show explanations immediately.',
  descExam:'Real exam: 60 minutes, no answers until the end.',
  btnStart:'Start',
  techLabel:'Technical explanation:',simpleLabel:'In simple terms:',
  studyScore:(c,t)=>`Score: ${c} / ${t}`,
  rightBadge:'Correct!',wrongBadge:'Wrong!',
  confirmMulti:'Confirm',
  modeStudy:'Study Mode',modeExam:'Exam Mode',
  expLabel:'Explanation',
  newQuiz:'New Quiz (different questions)'
}};

const Q=[
{en:"AWS allows users to manage their resources using a web based user interface. What is the name of this interface?",
 pt:"A AWS permite que os usuarios gerenciem seus recursos usando uma interface web. Qual e o nome dessa interface?",
 o:{en:["AWS CLI","AWS API","AWS SDK","AWS Management Console"],pt:["AWS CLI","AWS API","AWS SDK","AWS Management Console"]},a:[3],
 exp:{pt:{tech:"O AWS Management Console e a interface grafica (GUI) baseada em navegador que permite gerenciar todos os servicos AWS visualmente, sem precisar de linha de comando.",simple:"Pense no Console como o 'painel de controle' da AWS — igual o painel do seu carro, onde voce ve e controla tudo num so lugar, so que pelo navegador."},
      en:{tech:"The AWS Management Console is the browser-based GUI that lets you manage all AWS services visually without needing the command line.",simple:"Think of the Console as AWS's 'dashboard' — like your car's dashboard where you see and control everything in one place, but through your browser."}}},
{en:"Which option exemplifies horizontal scaling in AWS Cloud?",
 pt:"Qual opcao exemplifica escalabilidade horizontal na AWS Cloud?",
 o:{en:["Replacing an existing EC2 instance with a larger, more powerful one","Increasing the compute capacity of a single EC2 instance","Adding more RAM capacity to an EC2 instance","Adding more EC2 instances of the same size to handle increased traffic"],
    pt:["Substituir uma instancia EC2 existente por uma maior e mais poderosa","Aumentar a capacidade de computacao de uma unica instancia EC2","Adicionar mais capacidade de RAM a uma instancia EC2","Adicionar mais instancias EC2 do mesmo tamanho para lidar com o aumento de trafego"]},a:[3],
 exp:{pt:{tech:"Escalabilidade horizontal (scale out) significa adicionar mais instancias identicas para distribuir a carga. Escalabilidade vertical (scale up) e aumentar o poder de uma unica maquina.",simple:"Horizontal = contratar mais garcons para atender mais mesas. Vertical = trocar o garcom por um super-heroi que atende mais rapido sozinho."},
      en:{tech:"Horizontal scaling (scale out) means adding more identical instances to distribute load. Vertical scaling (scale up) means increasing the power of a single machine.",simple:"Horizontal = hiring more waiters to serve more tables. Vertical = replacing the waiter with a superhero who serves faster alone."}}},
{en:"An employee found that several EC2 instances were terminated. Which AWS service would help determine who took this action?",
 pt:"Um funcionario descobriu que varias instancias EC2 foram encerradas. Qual servico AWS ajudaria a determinar quem realizou essa acao?",
 o:{en:["Amazon Inspector","AWS CloudTrail","AWS Trusted Advisor","EC2 Instance Usage Report"],pt:["Amazon Inspector","AWS CloudTrail","AWS Trusted Advisor","EC2 Instance Usage Report"]},a:[1],
 exp:{pt:{tech:"O AWS CloudTrail registra todas as chamadas de API feitas na sua conta AWS, incluindo quem fez, quando e de onde. E o servico de auditoria da AWS.",simple:"CloudTrail e como uma camera de seguranca que grava tudo que acontece na sua conta — quem entrou, o que mexeu, quando fez."},
      en:{tech:"AWS CloudTrail records all API calls made in your AWS account, including who made them, when, and from where. It's AWS's audit service.",simple:"CloudTrail is like a security camera that records everything happening in your account — who entered, what they changed, when they did it."}}},
{en:"Which statement is true regarding the AWS Shared Responsibility Model?",
 pt:"Qual afirmacao e verdadeira sobre o Modelo de Responsabilidade Compartilhada da AWS?",
 o:{en:["Responsibilities vary depending on the services used","Security of the IaaS services is the responsibility of AWS","Patching the guest OS is always the responsibility of AWS","Security of the managed services is the responsibility of the customer"],
    pt:["As responsabilidades variam dependendo dos servicos utilizados","A seguranca dos servicos IaaS e responsabilidade da AWS","A atualizacao do SO convidado e sempre responsabilidade da AWS","A seguranca dos servicos gerenciados e responsabilidade do cliente"]},a:[0],
 exp:{pt:{tech:"No Modelo de Responsabilidade Compartilhada, a divisao de responsabilidades muda conforme o servico. Em IaaS (EC2), voce gerencia o SO. Em servicos gerenciados (RDS), a AWS cuida de mais coisas.",simple:"E como alugar um apartamento vs hotel. No apartamento (IaaS) voce limpa e arruma. No hotel (servico gerenciado) a equipe faz quase tudo por voce."},
      en:{tech:"In the Shared Responsibility Model, the division of responsibilities changes based on the service. In IaaS (EC2), you manage the OS. In managed services (RDS), AWS handles more.",simple:"It's like renting an apartment vs a hotel. In an apartment (IaaS) you clean and maintain it. In a hotel (managed service) the staff does almost everything for you."}}},
{en:"To ensure the highest availability for an eCommerce web application, where should you deploy it?",
 pt:"Para garantir a maior disponibilidade de uma aplicacao web de eCommerce, onde voce deve implanta-la?",
 o:{en:["Across multiple Availability Zones and Edge locations","Across multiple Availability Zones and subnets","Across multiple Regions and Availability Zones","Across multiple VPCs and subnets"],
    pt:["Em multiplas Zonas de Disponibilidade e Edge locations","Em multiplas Zonas de Disponibilidade e sub-redes","Em multiplas Regioes e Zonas de Disponibilidade","Em multiplas VPCs e sub-redes"]},a:[2],
 exp:{pt:{tech:"Multiplas Regioes + Multiplas AZs oferece o maior nivel de disponibilidade. Regioes sao geograficamente isoladas, protegendo contra desastres regionais. AZs protegem contra falhas de datacenter.",simple:"Imagine guardar copias dos seus documentos em cidades diferentes E em cofres diferentes dentro de cada cidade. Se uma cidade inteira tiver problema, a outra continua funcionando."},
      en:{tech:"Multiple Regions + Multiple AZs provides the highest availability. Regions are geographically isolated, protecting against regional disasters. AZs protect against datacenter failures.",simple:"Imagine keeping copies of your documents in different cities AND in different safes within each city. If an entire city has a problem, the other keeps working."}}},
{en:"What does AWS Snowball provide? (Choose TWO)",
 pt:"O que o AWS Snowball oferece? (Escolha DUAS)",
 o:{en:["Built-in computing capabilities for local data processing","A catalog of third-party software solutions","Hybrid cloud storage between on-premises and AWS Cloud","Exabyte-scale data transfer service","Secure transfer of large amounts of data into and out of AWS"],
    pt:["Capacidades de computacao integradas para processamento local de dados","Um catalogo de solucoes de software de terceiros","Armazenamento em nuvem hibrida entre on-premises e AWS Cloud","Servico de transferencia de dados em escala de exabytes","Transferencia segura de grandes quantidades de dados para dentro e fora da AWS"]},a:[0,4],multi:true,
 exp:{pt:{tech:"O AWS Snowball e um dispositivo fisico que a AWS envia para voce transferir grandes volumes de dados (petabytes). Tambem tem capacidade de computacao local (Edge Computing). Snowmobile e para exabytes, nao Snowball.",simple:"Snowball e como um 'HD gigante blindado' que a AWS manda pelos correios. Voce copia seus dados nele e devolve. Muito mais rapido que enviar tudo pela internet quando o volume e enorme."},
      en:{tech:"AWS Snowball is a physical device AWS ships to you for transferring large data volumes (petabytes). It also has local compute capability (Edge Computing). Snowmobile is for exabytes, not Snowball.",simple:"Snowball is like a 'giant armored hard drive' that AWS mails to you. You copy your data onto it and send it back. Much faster than uploading everything over the internet when the volume is huge."}}},
{en:"A Japanese company in Tokyo has US users experiencing high latency. What is the most cost-effective solution?",
 pt:"Uma empresa japonesa em Toquio tem usuarios nos EUA com alta latencia. Qual e a solucao mais economica?",
 o:{en:["Applying the Amazon Connect latency-based routing policy","Registering a new US domain name","Building a new data center in the US","Deploying new Amazon EC2 instances in a US Region"],
    pt:["Aplicar a politica de roteamento baseada em latencia do Amazon Connect","Registrar um novo nome de dominio nos EUA","Construir um novo data center nos EUA","Implantar novas instancias Amazon EC2 em uma Regiao dos EUA"]},a:[3],
 exp:{pt:{tech:"Implantar instancias EC2 em uma Regiao dos EUA coloca os servidores mais perto dos usuarios americanos, reduzindo a latencia. Construir um datacenter proprio seria muito mais caro.",simple:"E como abrir uma filial perto dos seus clientes em vez de atende-los de longe. A AWS ja tem o 'predio' pronto, voce so aluga uma sala (EC2) la."},
      en:{tech:"Deploying EC2 instances in a US Region puts servers closer to American users, reducing latency. Building your own datacenter would be far more expensive.",simple:"It's like opening a branch near your customers instead of serving them from far away. AWS already has the 'building' ready, you just rent a room (EC2) there."}}},
{en:"Which AWS service can be used to migrate an Oracle database to AWS?",
 pt:"Qual servico AWS pode ser usado para migrar um banco de dados Oracle para a AWS?",
 o:{en:["AWS OpsWorks","AWS Database Migration Service","AWS Server Migration Service","AWS Application Discovery Service"],pt:["AWS OpsWorks","AWS Database Migration Service","AWS Server Migration Service","AWS Application Discovery Service"]},a:[1],
 exp:{pt:{tech:"O AWS DMS (Database Migration Service) permite migrar bancos de dados para a AWS com minimo downtime. Suporta migracoes homogeneas (Oracle para Oracle) e heterogeneas (Oracle para Aurora).",simple:"O DMS e como uma empresa de mudanca especializada em bancos de dados — empacota tudo no banco antigo e desempacota no novo, enquanto o sistema continua funcionando."},
      en:{tech:"AWS DMS (Database Migration Service) lets you migrate databases to AWS with minimal downtime. It supports homogeneous (Oracle to Oracle) and heterogeneous (Oracle to Aurora) migrations.",simple:"DMS is like a moving company specialized in databases — it packs everything from the old database and unpacks it in the new one, while the system keeps running."}}},
{en:"Adjusting compute capacity dynamically to reduce cost implements which best practice?",
 pt:"Ajustar a capacidade de computacao dinamicamente para reduzir custos implementa qual melhor pratica?",
 o:{en:["Build security in every layer","Parallelize tasks","Implement elasticity","Adopt monolithic architecture"],
    pt:["Construir seguranca em todas as camadas","Paralelizar tarefas","Implementar elasticidade","Adotar arquitetura monolitica"]},a:[2],
 exp:{pt:{tech:"Elasticidade e a capacidade de aumentar ou diminuir recursos automaticamente conforme a demanda. Isso evita pagar por recursos ociosos e garante performance em picos.",simple:"Elasticidade e como um restaurante que contrata garcons extras no fim de semana e dispensa na segunda. Voce so paga pelo que precisa, quando precisa."},
      en:{tech:"Elasticity is the ability to automatically scale resources up or down based on demand. This avoids paying for idle resources and ensures performance during peaks.",simple:"Elasticity is like a restaurant that hires extra waiters on weekends and lets them go on Monday. You only pay for what you need, when you need it."}}},
{en:"Which helps view Amazon EC2 billing activity for the past month?",
 pt:"Qual servico ajuda a visualizar a atividade de cobranca do Amazon EC2 do ultimo mes?",
 o:{en:["AWS Budgets","AWS Pricing Calculator","AWS Systems Manager","AWS Cost & Usage Reports"],pt:["AWS Budgets","AWS Pricing Calculator","AWS Systems Manager","AWS Cost & Usage Reports"]},a:[3],
 exp:{pt:{tech:"O AWS Cost & Usage Reports fornece os dados mais detalhados de cobranca e uso, incluindo por servico, por hora, e por recurso individual. AWS Budgets e para alertas, nao para relatorios detalhados.",simple:"Cost & Usage Reports e o extrato bancario detalhado da sua conta AWS — mostra exatamente quanto gastou, com o que e quando."},
      en:{tech:"AWS Cost & Usage Reports provides the most detailed billing and usage data, including by service, by hour, and by individual resource. AWS Budgets is for alerts, not detailed reports.",simple:"Cost & Usage Reports is the detailed bank statement for your AWS account — shows exactly how much you spent, on what, and when."}}},
{en:"What does Amazon CloudFront use to distribute content to global users with low latency?",
 pt:"O que o Amazon CloudFront usa para distribuir conteudo para usuarios globais com baixa latencia?",
 o:{en:["AWS Global Accelerator","AWS Regions","AWS Edge Locations","AWS Availability Zones"],pt:["AWS Global Accelerator","AWS Regions","AWS Edge Locations","AWS Availability Zones"]},a:[2],
 exp:{pt:{tech:"Edge Locations sao pontos de presenca (PoPs) espalhados pelo mundo onde o CloudFront armazena copias em cache do conteudo, reduzindo a distancia ate o usuario final.",simple:"Edge Locations sao como quiosques de uma loja espalhados pela cidade. Em vez de todo mundo ir ate a matriz, cada um compra no quiosque mais perto."},
      en:{tech:"Edge Locations are Points of Presence (PoPs) spread worldwide where CloudFront caches content copies, reducing distance to the end user.",simple:"Edge Locations are like kiosks of a store spread across the city. Instead of everyone going to the main store, each person buys at the nearest kiosk."}}},
{en:"What does the 'Principle of Least Privilege' mean?",
 pt:"O que significa o 'Principio do Menor Privilegio'?",
 o:{en:["Grant users only the permissions they need, nothing more","All IAM users should have at least necessary permissions for core AWS services","All trusted IAM users should have access to any AWS service","IAM users should not be granted any permissions"],
    pt:["Conceder aos usuarios apenas as permissoes que precisam, nada mais","Todos os usuarios IAM devem ter pelo menos as permissoes necessarias para servicos principais da AWS","Todos os usuarios IAM confiaveis devem ter acesso a qualquer servico AWS","Usuarios IAM nao devem receber nenhuma permissao"]},a:[0],
 exp:{pt:{tech:"O Principio do Menor Privilegio (Least Privilege) determina que cada usuario/servico deve ter apenas as permissoes minimas necessarias para realizar sua funcao. Reduz a superficie de ataque.",simple:"E como dar a chave so do escritorio pro funcionario, nao do predio inteiro. Se ele so precisa entrar no escritorio, nao faz sentido dar acesso ao cofre."},
      en:{tech:"The Principle of Least Privilege dictates that each user/service should have only the minimum permissions needed to perform their function. It reduces the attack surface.",simple:"It's like giving an employee the key only to their office, not the entire building. If they only need office access, there's no reason to give them the vault key."}}},
{en:"Which does NOT belong to AWS Cloud Computing models?",
 pt:"Qual NAO pertence aos modelos de computacao em nuvem da AWS?",
 o:{en:["Platform as a Service (PaaS)","Infrastructure as a Service (IaaS)","Software as a Service (SaaS)","Networking as a Service (NaaS)"],
    pt:["Plataforma como Servico (PaaS)","Infraestrutura como Servico (IaaS)","Software como Servico (SaaS)","Rede como Servico (NaaS)"]},a:[3],
 exp:{pt:{tech:"Os tres modelos de cloud computing sao IaaS (EC2), PaaS (Elastic Beanstalk) e SaaS (Gmail). NaaS nao e um modelo padrao reconhecido de cloud computing.",simple:"Os tres modelos sao como: alugar um terreno e construir (IaaS), alugar uma casa pronta pra mobiliar (PaaS), ou alugar um hotel pronto (SaaS). 'Alugar so a rua' (NaaS) nao existe nessa classificacao."},
      en:{tech:"The three cloud computing models are IaaS (EC2), PaaS (Elastic Beanstalk), and SaaS (Gmail). NaaS is not a standard recognized cloud computing model.",simple:"The three models are like: renting land to build on (IaaS), renting an unfurnished house (PaaS), or staying at a hotel (SaaS). 'Renting just the road' (NaaS) doesn't exist in this classification."}}},
{en:"What is the most cost-effective storage for recorded interview videos only needed for legal/compliance?",
 pt:"Qual e o armazenamento mais economico para videos de entrevistas gravados necessarios apenas para fins legais/compliance?",
 o:{en:["S3 Intelligent-Tiering","AWS Marketplace","Amazon S3 Glacier Deep Archive","Amazon EBS"],pt:["S3 Intelligent-Tiering","AWS Marketplace","Amazon S3 Glacier Deep Archive","Amazon EBS"]},a:[2],
 exp:{pt:{tech:"S3 Glacier Deep Archive e a classe de armazenamento mais barata da AWS, ideal para dados raramente acessados que precisam ser retidos por longos periodos (compliance). Recuperacao leva ate 12h.",simple:"Glacier Deep Archive e como um deposito no subsolo — super barato pra guardar, mas se precisar pegar algo, demora horas. Perfeito pra coisas que voce guarda 'so por via das duvidas'."},
      en:{tech:"S3 Glacier Deep Archive is AWS's cheapest storage class, ideal for rarely accessed data that needs long-term retention (compliance). Retrieval takes up to 12h.",simple:"Glacier Deep Archive is like a basement warehouse — super cheap to store, but if you need something, it takes hours. Perfect for things you keep 'just in case'."}}},
{en:"Which service provides DNS in the AWS cloud?",
 pt:"Qual servico fornece DNS na nuvem AWS?",
 o:{en:["Route 53","AWS Config","Amazon CloudFront","Amazon EMR"],pt:["Route 53","AWS Config","Amazon CloudFront","Amazon EMR"]},a:[0],
 exp:{pt:{tech:"O Amazon Route 53 e o servico de DNS (Domain Name System) da AWS. Ele traduz nomes de dominio em enderecos IP e oferece roteamento de trafego, health checks e registro de dominios.",simple:"Route 53 e a 'lista telefonica' da internet na AWS — voce digita o nome do site e ele encontra o endereco certo do servidor. O nome vem da porta 53, usada pelo DNS."},
      en:{tech:"Amazon Route 53 is AWS's DNS (Domain Name System) service. It translates domain names to IP addresses and offers traffic routing, health checks, and domain registration.",simple:"Route 53 is the internet's 'phone book' on AWS — you type a website name and it finds the correct server address. The name comes from port 53, used by DNS."}}},
{en:"Which AWS services protect customers from DDoS attacks? (Choose TWO)",
 pt:"Quais servicos AWS protegem os clientes contra ataques DDoS? (Escolha DOIS)",
 o:{en:["AWS Shield","AWS Config","Amazon Cognito","AWS WAF","AWS KMS"],pt:["AWS Shield","AWS Config","Amazon Cognito","AWS WAF","AWS KMS"]},a:[0,3],multi:true,
 exp:{pt:{tech:"AWS Shield protege contra ataques DDoS (camadas 3/4). AWS WAF (Web Application Firewall) filtra trafego HTTP/HTTPS malicioso (camada 7). Juntos, cobrem protecao de rede e aplicacao.",simple:"Shield e o seguranca na porta que barra multidoes tentando invadir. WAF e o detector de mentiras que filtra quem entra pela porta — barra os mal-intencionados um por um."},
      en:{tech:"AWS Shield protects against DDoS attacks (layers 3/4). AWS WAF (Web Application Firewall) filters malicious HTTP/HTTPS traffic (layer 7). Together, they cover network and application protection.",simple:"Shield is the bouncer at the door blocking mobs trying to rush in. WAF is the lie detector filtering who enters — blocking bad actors one by one."}}},
{en:"Which EC2 purchase option is best for a questionnaire app running one day without interruption?",
 pt:"Qual opcao de compra EC2 e melhor para um app de questionario rodando um dia sem interrupcao?",
 o:{en:["Reserved instances","Spot instances","Dedicated instances","On-demand instances"],pt:["Instancias reservadas","Instancias spot","Instancias dedicadas","Instancias sob demanda"]},a:[3],
 exp:{pt:{tech:"On-Demand e ideal para cargas de trabalho de curta duracao, irregulares e que nao podem ser interrompidas. Sem compromisso de longo prazo, paga so pelo uso.",simple:"On-Demand e como pegar um taxi — voce usa quando precisa, paga a corrida e pronto. Nao precisa assinar contrato nem correr risco de perder o carro (como no Spot)."},
      en:{tech:"On-Demand is ideal for short-duration, irregular workloads that cannot be interrupted. No long-term commitment, pay only for use.",simple:"On-Demand is like taking a taxi — you use it when you need it, pay the fare, and done. No contract needed and no risk of losing the car (like with Spot)."}}},
{en:"Which is the most cost-effective EC2 option for creating image thumbnails where uptime is not critical?",
 pt:"Qual e a opcao EC2 mais economica para criar miniaturas de imagens onde o tempo de atividade nao e critico?",
 o:{en:["Reserved Instances","On-demand Instances","Dedicated Instances","Spot Instances"],pt:["Instancias Reservadas","Instancias Sob Demanda","Instancias Dedicadas","Instancias Spot"]},a:[3],
 exp:{pt:{tech:"Spot Instances oferecem desconto de ate 90% sobre On-Demand, mas a AWS pode interrompe-las a qualquer momento. Ideal para cargas tolerantes a falha como processamento de imagens em lote.",simple:"Spot e como comprar passagem de ultima hora com super desconto — se o voo cancelar, voce tenta de novo depois. Otimo quando nao tem pressa."},
      en:{tech:"Spot Instances offer up to 90% discount over On-Demand, but AWS can interrupt them anytime. Ideal for fault-tolerant workloads like batch image processing.",simple:"Spot is like buying a last-minute flight ticket at a huge discount — if the flight gets cancelled, you try again later. Great when you're not in a rush."}}},
{en:"Which service is a global content delivery network (CDN)?",
 pt:"Qual servico e uma rede de distribuicao de conteudo (CDN) global?",
 o:{en:["AWS VPN","AWS Direct Connect","AWS Regions","Amazon CloudFront"],pt:["AWS VPN","AWS Direct Connect","AWS Regions","Amazon CloudFront"]},a:[3],
 exp:{pt:{tech:"Amazon CloudFront e o servico de CDN da AWS que distribui conteudo (paginas, videos, APIs) globalmente usando Edge Locations para reduzir latencia.",simple:"CloudFront e como ter copias do seu cardapio em todos os bairros da cidade — o cliente pega o mais perto em vez de ir ate o restaurante central."},
      en:{tech:"Amazon CloudFront is AWS's CDN service that distributes content (pages, videos, APIs) globally using Edge Locations to reduce latency.",simple:"CloudFront is like having copies of your menu in every neighborhood — customers grab the nearest one instead of going to the central restaurant."}}},
{en:"Which service allows customers to manage compliance agreements with AWS?",
 pt:"Qual servico permite que os clientes gerenciem acordos de conformidade com a AWS?",
 o:{en:["AWS Artifact","AWS Certificate Manager","AWS Systems Manager","AWS Organizations"],pt:["AWS Artifact","AWS Certificate Manager","AWS Systems Manager","AWS Organizations"]},a:[0],
 exp:{pt:{tech:"O AWS Artifact e um portal self-service para acessar relatorios de conformidade da AWS (SOC, PCI, ISO) e gerenciar acordos como o BAA (HIPAA).",simple:"Artifact e como o arquivo de documentos legais da AWS — la voce encontra todos os certificados e contratos de conformidade, como se fosse o cartorio da nuvem."},
      en:{tech:"AWS Artifact is a self-service portal to access AWS compliance reports (SOC, PCI, ISO) and manage agreements like the BAA (HIPAA).",simple:"Artifact is like AWS's legal document archive — there you find all compliance certificates and contracts, like a notary office for the cloud."}}},
{en:"Which AWS database offering provides NoSQL access?",
 pt:"Qual banco de dados AWS oferece acesso NoSQL?",
 o:{en:["Amazon Aurora","Amazon DynamoDB","Amazon Elastic Block Store","Amazon Redshift"],pt:["Amazon Aurora","Amazon DynamoDB","Amazon Elastic Block Store","Amazon Redshift"]},a:[1],
 exp:{pt:{tech:"O Amazon DynamoDB e o banco de dados NoSQL totalmente gerenciado da AWS, com modelo chave-valor e documentos. Oferece latencia de milissegundos em qualquer escala.",simple:"DynamoDB e como um fichario super rapido — voce procura pela etiqueta (chave) e pega o documento instantaneamente, sem precisar de tabelas organizadas como num banco SQL."},
      en:{tech:"Amazon DynamoDB is AWS's fully managed NoSQL database with key-value and document model. It offers single-digit millisecond latency at any scale.",simple:"DynamoDB is like a super-fast filing cabinet — you search by the label (key) and grab the document instantly, without needing organized tables like a SQL database."}}},
{en:"Who is the primary point of contact for ongoing support in the Enterprise support plan?",
 pt:"Quem e o principal ponto de contato para suporte continuo no plano Enterprise?",
 o:{en:["IAM user","Infrastructure Event Management engineer","AWS Consulting Partners","Technical Account Manager (TAM)"],
    pt:["Usuario IAM","Engenheiro de Infrastructure Event Management","AWS Consulting Partners","Technical Account Manager (TAM)"]},a:[3],
 exp:{pt:{tech:"O TAM (Technical Account Manager) e um profissional designado pela AWS exclusivamente para clientes Enterprise. Ele atua como ponto de contato principal, oferecendo orientacao proativa e revisoes de arquitetura.",simple:"O TAM e como ter um gerente de conta dedicado no banco — alguem que conhece sua situacao e te ajuda proativamente, nao so quando voce liga reclamando."},
      en:{tech:"The TAM (Technical Account Manager) is an AWS professional assigned exclusively to Enterprise customers. They serve as the primary contact, offering proactive guidance and architecture reviews.",simple:"The TAM is like having a dedicated bank account manager — someone who knows your situation and helps you proactively, not just when you call to complain."}}},
{en:"How can you view the distribution of AWS spending in your account?",
 pt:"Como voce pode visualizar a distribuicao de gastos AWS na sua conta?",
 o:{en:["By using Amazon VPC console","By contacting the AWS Support team","By using AWS Cost Explorer","By contacting the AWS Finance team"],
    pt:["Usando o console do Amazon VPC","Contatando a equipe de suporte AWS","Usando o AWS Cost Explorer","Contatando a equipe financeira da AWS"]},a:[2],
 exp:{pt:{tech:"O AWS Cost Explorer e uma ferramenta visual que permite analisar custos e uso da AWS ao longo do tempo, com filtros por servico, regiao, tag, etc. Disponivel gratuitamente no console.",simple:"Cost Explorer e como o app do banco que mostra graficos de onde voce gastou seu dinheiro — por categoria, por mes, com tendencias."},
      en:{tech:"AWS Cost Explorer is a visual tool that lets you analyze AWS costs and usage over time, with filters by service, region, tag, etc. Available free in the console.",simple:"Cost Explorer is like a banking app that shows charts of where you spent your money — by category, by month, with trends."}}},
{en:"What must an IAM user provide to interact with AWS services using the AWS CLI?",
 pt:"O que um usuario IAM deve fornecer para interagir com servicos AWS usando a AWS CLI?",
 o:{en:["Access keys","Secret token","UserID","User name and password"],pt:["Chaves de acesso","Token secreto","UserID","Nome de usuario e senha"]},a:[0],
 exp:{pt:{tech:"Para usar a AWS CLI, o usuario IAM precisa de Access Keys (Access Key ID + Secret Access Key). Username/password sao para o Console web, nao para CLI.",simple:"Access Keys sao como o login e senha, mas para o terminal. O Console usa usuario+senha (como entrar pelo site do banco), a CLI usa chaves (como o token do banco)."},
      en:{tech:"To use the AWS CLI, the IAM user needs Access Keys (Access Key ID + Secret Access Key). Username/password are for the web Console, not the CLI.",simple:"Access Keys are like login and password, but for the terminal. The Console uses username+password (like logging into the bank's website), the CLI uses keys (like a bank token)."}}},
{en:"Which EC2 Reserved Instance type allows you to exchange it for higher computing power?",
 pt:"Qual tipo de Instancia Reservada EC2 permite troca-la por maior poder computacional?",
 o:{en:["Elastic RI","Premium RI","Standard RI","Convertible RI"],pt:["Elastic RI","Premium RI","Standard RI","Convertible RI"]},a:[3],
 exp:{pt:{tech:"Convertible RIs permitem trocar a familia de instancia, SO, tenancy e escopo de pagamento durante o termo. Standard RIs sao mais baratas mas nao podem ser convertidas.",simple:"Convertible RI e como um plano de celular que permite trocar de aparelho durante o contrato. Standard RI e o plano mais barato, mas voce fica preso ao mesmo aparelho."},
      en:{tech:"Convertible RIs allow changing instance family, OS, tenancy, and payment scope during the term. Standard RIs are cheaper but cannot be converted.",simple:"Convertible RI is like a phone plan that lets you swap devices during the contract. Standard RI is the cheaper plan, but you're stuck with the same device."}}},
{en:"A global company seeks to centrally manage billing and security policies across all AWS accounts. Which service should they use?",
 pt:"Uma empresa global busca gerenciar centralmente cobranca e politicas de seguranca em todas as contas AWS. Qual servico devem usar?",
 o:{en:["AWS Organizations","AWS Trusted Advisor","IAM User Groups","AWS Config"],pt:["AWS Organizations","AWS Trusted Advisor","IAM User Groups","AWS Config"]},a:[0],
 exp:{pt:{tech:"O AWS Organizations permite criar uma estrutura hierarquica de contas, com faturamento consolidado e SCPs (Service Control Policies) para governanca centralizada.",simple:"AWS Organizations e como a matriz de uma empresa que controla todas as filiais — centraliza o financeiro e define as regras que todas devem seguir."},
      en:{tech:"AWS Organizations lets you create a hierarchical account structure with consolidated billing and SCPs (Service Control Policies) for centralized governance.",simple:"AWS Organizations is like a company's headquarters controlling all branches — it centralizes finances and sets the rules everyone must follow."}}},
{en:"Which service provides object-level storage in AWS?",
 pt:"Qual servico fornece armazenamento em nivel de objeto na AWS?",
 o:{en:["Amazon EBS","Amazon Instance Store","Amazon EFS","Amazon S3"],pt:["Amazon EBS","Amazon Instance Store","Amazon EFS","Amazon S3"]},a:[3],
 exp:{pt:{tech:"O Amazon S3 (Simple Storage Service) e o servico de armazenamento de objetos da AWS. Cada objeto e armazenado com uma chave unica, metadados e o dado em si. EBS e armazenamento em bloco, EFS e sistema de arquivos.",simple:"S3 e como um deposito infinito onde voce guarda caixas (objetos) com etiquetas. EBS e como um HD conectado no computador. EFS e como uma pasta compartilhada na rede."},
      en:{tech:"Amazon S3 (Simple Storage Service) is AWS's object storage service. Each object is stored with a unique key, metadata, and the data itself. EBS is block storage, EFS is a file system.",simple:"S3 is like an infinite warehouse where you store labeled boxes (objects). EBS is like a hard drive attached to your computer. EFS is like a shared network folder."}}},
{en:"A company is spending money on underutilized compute resources. Which service helps address this?",
 pt:"Uma empresa esta gastando dinheiro em recursos computacionais subutilizados. Qual servico ajuda a resolver isso?",
 o:{en:["AWS Elastic Load Balancer","AWS Budgets","AWS Auto Scaling","AWS Cost Explorer"],pt:["AWS Elastic Load Balancer","AWS Budgets","AWS Auto Scaling","AWS Cost Explorer"]},a:[2],
 exp:{pt:{tech:"O AWS Auto Scaling ajusta automaticamente o numero de instancias baseado na demanda real, evitando recursos ociosos (scale in) e falta de capacidade (scale out).",simple:"Auto Scaling e como um restaurante que abre e fecha mesas automaticamente. Pouca gente? Fecha mesas. Lotou? Abre mais. Voce nunca paga por mesas vazias."},
      en:{tech:"AWS Auto Scaling automatically adjusts the number of instances based on actual demand, avoiding idle resources (scale in) and capacity shortages (scale out).",simple:"Auto Scaling is like a restaurant that opens and closes tables automatically. Few people? Close tables. Packed? Open more. You never pay for empty tables."}}},
{en:"Which S3 storage class is best for data with unpredictable access patterns?",
 pt:"Qual classe de armazenamento S3 e melhor para dados com padroes de acesso imprevisiveis?",
 o:{en:["Amazon S3 Intelligent-Tiering","Amazon S3 Glacier Flexible Retrieval","Amazon S3 Standard","Amazon S3 Standard-Infrequent Access"],pt:["Amazon S3 Intelligent-Tiering","Amazon S3 Glacier Flexible Retrieval","Amazon S3 Standard","Amazon S3 Standard-Infrequent Access"]},a:[0],
 exp:{pt:{tech:"O S3 Intelligent-Tiering move objetos automaticamente entre tiers de acesso frequente e infrequente com base nos padroes reais de acesso, sem taxas de recuperacao.",simple:"Intelligent-Tiering e como uma biblioteca inteligente que coloca os livros mais lidos na prateleira da frente e os menos lidos no deposito — tudo automatico, sem voce precisar decidir."},
      en:{tech:"S3 Intelligent-Tiering automatically moves objects between frequent and infrequent access tiers based on actual access patterns, with no retrieval fees.",simple:"Intelligent-Tiering is like a smart library that puts frequently read books on the front shelf and rarely read ones in storage — all automatic, no decisions needed."}}},
{en:"What is the AWS feature providing additional security above usernames and passwords?",
 pt:"Qual recurso AWS fornece seguranca adicional alem de nomes de usuario e senhas?",
 o:{en:["Encrypted keys","Email verification","AWS KMS","AWS MFA"],pt:["Chaves criptografadas","Verificacao por email","AWS KMS","AWS MFA"]},a:[3],
 exp:{pt:{tech:"O MFA (Multi-Factor Authentication) adiciona uma segunda camada de autenticacao alem da senha, como um codigo gerado por app ou dispositivo fisico. KMS e para criptografia de dados, nao autenticacao.",simple:"MFA e como a porta do banco que precisa da senha E da digital. Mesmo que alguem descubra sua senha, sem o segundo fator nao entra."},
      en:{tech:"MFA (Multi-Factor Authentication) adds a second authentication layer beyond the password, like a code from an app or physical device. KMS is for data encryption, not authentication.",simple:"MFA is like a bank door that needs both a password AND a fingerprint. Even if someone discovers your password, without the second factor they can't get in."}}},
{en:"Which service ensures messages between software components are not lost if components fail?",
 pt:"Qual servico garante que mensagens entre componentes de software nao sejam perdidas se os componentes falharem?",
 o:{en:["Amazon SQS","Amazon SES","AWS Direct Connect","Amazon Connect"],pt:["Amazon SQS","Amazon SES","AWS Direct Connect","Amazon Connect"]},a:[0],
 exp:{pt:{tech:"O Amazon SQS (Simple Queue Service) e um servico de filas de mensagens totalmente gerenciado. As mensagens ficam na fila ate serem processadas, garantindo que nada se perca se um componente falhar.",simple:"SQS e como uma caixa de correio entre departamentos. Mesmo que o destinatario esteja de ferias, a carta fica la esperando ate ele voltar e ler."},
      en:{tech:"Amazon SQS (Simple Queue Service) is a fully managed message queue service. Messages stay in the queue until processed, ensuring nothing is lost if a component fails.",simple:"SQS is like a mailbox between departments. Even if the recipient is on vacation, the letter waits there until they return and read it."}}},
{en:"What is the AWS service providing a virtual network dedicated to your account?",
 pt:"Qual servico AWS fornece uma rede virtual dedicada a sua conta?",
 o:{en:["AWS VPN","AWS Subnets","AWS Dedicated Hosts","Amazon VPC"],pt:["AWS VPN","AWS Subnets","AWS Dedicated Hosts","Amazon VPC"]},a:[3],
 exp:{pt:{tech:"O Amazon VPC (Virtual Private Cloud) permite criar uma rede virtual isolada na AWS onde voce define sub-redes, tabelas de roteamento, gateways e regras de seguranca.",simple:"VPC e como ter seu proprio terreno cercado dentro da AWS. Voce decide onde ficam as casas (sub-redes), as estradas (rotas) e os portoes (gateways)."},
      en:{tech:"Amazon VPC (Virtual Private Cloud) lets you create an isolated virtual network in AWS where you define subnets, route tables, gateways, and security rules.",simple:"VPC is like having your own fenced land within AWS. You decide where the houses (subnets), roads (routes), and gates (gateways) go."}}},
{en:"According to the Shared Responsibility Model, which are customer responsibilities? (Choose TWO)",
 pt:"De acordo com o Modelo de Responsabilidade Compartilhada, quais sao responsabilidades do cliente? (Escolha DUAS)",
 o:{en:["Managing environmental events of AWS data centers","Protecting the confidentiality of data in transit in Amazon S3","Controlling physical access to AWS Regions","Ensuring the underlying EC2 host is configured properly","Patching applications installed on Amazon EC2"],
    pt:["Gerenciar eventos ambientais dos data centers AWS","Proteger a confidencialidade dos dados em transito no Amazon S3","Controlar o acesso fisico as Regioes AWS","Garantir que o host EC2 subjacente esteja configurado corretamente","Atualizar aplicacoes instaladas no Amazon EC2"]},a:[1,4],multi:true,
 exp:{pt:{tech:"O cliente e responsavel pela seguranca 'na' nuvem: criptografia de dados em transito, patching de aplicacoes, configuracao de seguranca. A AWS cuida da seguranca 'da' nuvem: hardware, datacenter, infraestrutura fisica.",simple:"Voce cuida do que esta dentro do apartamento (seus dados, seus apps). O predio (AWS) cuida da estrutura, portaria e manutencao do edificio."},
      en:{tech:"The customer is responsible for security 'in' the cloud: data encryption in transit, application patching, security configuration. AWS handles security 'of' the cloud: hardware, datacenter, physical infrastructure.",simple:"You take care of what's inside the apartment (your data, your apps). The building (AWS) handles the structure, doorman, and building maintenance."}}},
{en:"Which of the following can be used as a compute resource? (Choose TWO)",
 pt:"Quais dos seguintes podem ser usados como recurso de computacao? (Escolha DOIS)",
 o:{en:["Amazon VPC","Amazon CloudWatch","Amazon S3","Amazon EC2","AWS Lambda"],pt:["Amazon VPC","Amazon CloudWatch","Amazon S3","Amazon EC2","AWS Lambda"]},a:[3,4],multi:true,
 exp:{pt:{tech:"EC2 fornece servidores virtuais (computacao sob demanda). Lambda executa codigo sem servidor (serverless compute). VPC e rede, CloudWatch e monitoramento, S3 e armazenamento.",simple:"EC2 e Lambda sao os 'trabalhadores' da AWS. EC2 e um funcionario contratado (servidor dedicado). Lambda e um freelancer que so aparece quando tem tarefa e cobra por minuto."},
      en:{tech:"EC2 provides virtual servers (on-demand compute). Lambda runs code without servers (serverless compute). VPC is networking, CloudWatch is monitoring, S3 is storage.",simple:"EC2 and Lambda are AWS's 'workers'. EC2 is a hired employee (dedicated server). Lambda is a freelancer who only shows up when there's a task and charges by the minute."}}},
{en:"What does Amazon ElastiCache provide?",
 pt:"O que o Amazon ElastiCache fornece?",
 o:{en:["In-memory caching for read-heavy applications","An Ehcache compatible in-memory data store","An online software store for pre-configured software","A domain name system in the cloud"],
    pt:["Cache em memoria para aplicacoes com muitas leituras","Um armazenamento de dados em memoria compativel com Ehcache","Uma loja de software online para software pre-configurado","Um sistema de nomes de dominio na nuvem"]},a:[0],
 exp:{pt:{tech:"O ElastiCache e um servico de cache em memoria (Redis ou Memcached) que melhora a performance de aplicacoes ao armazenar dados frequentemente acessados na RAM, reduzindo consultas ao banco.",simple:"ElastiCache e como um post-it na sua mesa com as informacoes que voce mais consulta. Em vez de abrir o arquivo toda vez (banco de dados), voce so olha o post-it (cache)."},
      en:{tech:"ElastiCache is an in-memory caching service (Redis or Memcached) that improves application performance by storing frequently accessed data in RAM, reducing database queries.",simple:"ElastiCache is like a sticky note on your desk with your most-used info. Instead of opening the file cabinet every time (database), you just glance at the note (cache)."}}},
{en:"Which EC2 purchasing option supports the Bring Your Own License (BYOL) model?",
 pt:"Qual opcao de compra EC2 suporta o modelo Bring Your Own License (BYOL)?",
 o:{en:["Dedicated Instances","Dedicated Hosts","On-demand Instances","Reserved Instances"],pt:["Instancias Dedicadas","Hosts Dedicados","Instancias Sob Demanda","Instancias Reservadas"]},a:[1],
 exp:{pt:{tech:"Dedicated Hosts fornecem um servidor fisico inteiro dedicado a voce, com visibilidade de sockets e cores. Isso permite usar licencas de software existentes (BYOL) que sao atreladas ao hardware.",simple:"Dedicated Host e como alugar uma casa inteira (servidor fisico) so pra voce. Como voce sabe exatamente qual e a casa, pode usar sua propria fechadura (licenca de software)."},
      en:{tech:"Dedicated Hosts provide an entire physical server dedicated to you, with visibility into sockets and cores. This enables using existing software licenses (BYOL) tied to hardware.",simple:"Dedicated Host is like renting an entire house (physical server) just for you. Since you know exactly which house it is, you can use your own lock (software license)."}}},
{en:"Which is a benefit of moving infrastructure from on-premises to AWS?",
 pt:"Qual e um beneficio de migrar a infraestrutura de on-premises para a AWS?",
 o:{en:["Free support for all enterprise customers","Automatic data protection","Reduced Capital Expenditure (CapEx)","AWS manages customer applications"],
    pt:["Suporte gratuito para todos os clientes enterprise","Protecao automatica de dados","Reducao de Despesas de Capital (CapEx)","A AWS gerencia as aplicacoes do cliente"]},a:[2],
 exp:{pt:{tech:"Migrar para AWS converte CapEx (comprar servidores, datacenters) em OpEx (pagar pelo uso). Voce elimina o investimento inicial em hardware.",simple:"E como trocar de comprar um carro (CapEx - investimento alto de uma vez) por usar Uber (OpEx - paga so quando usa). Menos dinheiro preso, mais flexibilidade."},
      en:{tech:"Migrating to AWS converts CapEx (buying servers, datacenters) into OpEx (pay per use). You eliminate upfront hardware investment.",simple:"It's like switching from buying a car (CapEx - big upfront investment) to using Uber (OpEx - pay only when you ride). Less money locked up, more flexibility."}}},
{en:"Which AWS service establishes a dedicated, private network connection between AWS and your datacenter?",
 pt:"Qual servico AWS estabelece uma conexao de rede privada e dedicada entre a AWS e seu datacenter?",
 o:{en:["AWS Direct Connect","Amazon CloudFront","AWS Snowball","Amazon Route 53"],pt:["AWS Direct Connect","Amazon CloudFront","AWS Snowball","Amazon Route 53"]},a:[0],
 exp:{pt:{tech:"O AWS Direct Connect estabelece uma conexao de rede dedicada e privada entre seu datacenter e a AWS, sem passar pela internet publica. Oferece maior largura de banda e latencia consistente.",simple:"Direct Connect e como ter uma estrada privada entre sua empresa e a AWS. Sem transito (internet publica), sem pedagio, direto e rapido."},
      en:{tech:"AWS Direct Connect establishes a dedicated, private network connection between your datacenter and AWS, bypassing the public internet. It offers higher bandwidth and consistent latency.",simple:"Direct Connect is like having a private road between your company and AWS. No traffic (public internet), no tolls, direct and fast."}}},
{en:"Which service protects web applications from SQL injection and other code vulnerabilities?",
 pt:"Qual servico protege aplicacoes web contra SQL injection e outras vulnerabilidades de codigo?",
 o:{en:["Amazon Cognito","AWS IAM","Amazon Aurora","AWS WAF"],pt:["Amazon Cognito","AWS IAM","Amazon Aurora","AWS WAF"]},a:[3],
 exp:{pt:{tech:"O AWS WAF (Web Application Firewall) filtra trafego HTTP/HTTPS com regras personalizaveis para bloquear SQL injection, XSS e outros ataques na camada 7 (aplicacao).",simple:"WAF e como um porteiro treinado que inspeciona cada visitante (requisicao). Se alguem tenta entrar com ferramentas suspeitas (SQL injection), e barrado na porta."},
      en:{tech:"AWS WAF (Web Application Firewall) filters HTTP/HTTPS traffic with customizable rules to block SQL injection, XSS, and other layer 7 (application) attacks.",simple:"WAF is like a trained doorman who inspects every visitor (request). If someone tries to enter with suspicious tools (SQL injection), they're blocked at the door."}}},
{en:"Based on the Shared Responsibility Model, which are the sole responsibility of AWS? (Choose TWO)",
 pt:"Com base no Modelo de Responsabilidade Compartilhada, quais sao responsabilidade exclusiva da AWS? (Escolha DUAS)",
 o:{en:["Monitoring network performance","Installing software on EC2 instances","Creating hypervisors","Configuring Access Control Lists","Hardware maintenance"],
    pt:["Monitorar performance da rede","Instalar software em instancias EC2","Criar hypervisors","Configurar Listas de Controle de Acesso","Manutencao de hardware"]},a:[2,4],multi:true,
 exp:{pt:{tech:"A AWS e responsavel pela infraestrutura fisica: hardware, hypervisors, rede fisica, datacenters. O cliente configura ACLs, instala software e monitora suas aplicacoes.",simple:"A AWS cuida do 'predio' (hardware, hypervisors). Voce cuida do que faz dentro do seu apartamento (instalar programas, configurar acessos)."},
      en:{tech:"AWS is responsible for physical infrastructure: hardware, hypervisors, physical network, datacenters. The customer configures ACLs, installs software, and monitors their applications.",simple:"AWS takes care of the 'building' (hardware, hypervisors). You take care of what you do inside your apartment (install programs, configure access)."}}},
{en:"What are the default credentials to access the AWS Management Console for an IAM user?",
 pt:"Quais sao as credenciais padrao para acessar o Console de Gerenciamento AWS para um usuario IAM?",
 o:{en:["MFA","Security tokens","A user name and password","Access keys"],pt:["MFA","Tokens de seguranca","Nome de usuario e senha","Chaves de acesso"]},a:[2],
 exp:{pt:{tech:"O acesso ao Console AWS para usuarios IAM usa nome de usuario e senha por padrao. MFA e uma camada adicional opcional. Access keys sao para acesso programatico (CLI/SDK).",simple:"Para entrar no site (Console) voce usa usuario e senha, igual qualquer site. Access keys sao para o terminal. MFA e o cadeado extra."},
      en:{tech:"Console access for IAM users uses username and password by default. MFA is an optional additional layer. Access keys are for programmatic access (CLI/SDK).",simple:"To log into the website (Console) you use username and password, like any website. Access keys are for the terminal. MFA is the extra lock."}}},
{en:"In on-premises you create virtual servers from a single template. What is the AWS equivalent?",
 pt:"No ambiente on-premises voce cria servidores virtuais a partir de um template. Qual e o equivalente na AWS?",
 o:{en:["IAM","An internet gateway","EBS Snapshot","AMI"],pt:["IAM","Um internet gateway","EBS Snapshot","AMI"]},a:[3],
 exp:{pt:{tech:"Uma AMI (Amazon Machine Image) e um template que contem o SO, aplicacoes e configuracoes necessarias para lancar uma instancia EC2. EBS Snapshot e backup de volume, nao template de servidor.",simple:"AMI e como uma foto do seu computador configurado. Quando precisa de outro igual, em vez de instalar tudo de novo, voce clona a foto e pronto."},
      en:{tech:"An AMI (Amazon Machine Image) is a template containing the OS, applications, and configurations needed to launch an EC2 instance. EBS Snapshot is a volume backup, not a server template.",simple:"AMI is like a photo of your configured computer. When you need another identical one, instead of installing everything again, you clone the photo and you're done."}}},
{en:"Which statement best describes the Operational Excellence pillar of the AWS Well-Architected Framework?",
 pt:"Qual afirmacao descreve melhor o pilar de Excelencia Operacional do AWS Well-Architected Framework?",
 o:{en:["The ability of a system to recover gracefully from failure","The efficient use of computing resources to meet requirements","The ability to monitor systems and improve supporting processes and procedures","The ability to manage datacenter operations more efficiently"],
    pt:["A capacidade de um sistema se recuperar de falhas","O uso eficiente de recursos computacionais para atender requisitos","A capacidade de monitorar sistemas e melhorar processos e procedimentos de suporte","A capacidade de gerenciar operacoes de datacenter com mais eficiencia"]},a:[2],
 exp:{pt:{tech:"Excelencia Operacional foca em executar e monitorar sistemas, e melhorar continuamente processos e procedimentos. Inclui automacao, resposta a eventos e aprendizado com falhas.",simple:"E como um restaurante que nao so cozinha bem, mas tambem monitora pedidos, melhora processos e aprende com erros. Nao basta funcionar — tem que funcionar cada vez melhor."},
      en:{tech:"Operational Excellence focuses on running and monitoring systems, and continually improving processes and procedures. It includes automation, event response, and learning from failures.",simple:"It's like a restaurant that doesn't just cook well, but also monitors orders, improves processes, and learns from mistakes. It's not enough to work — it must work better each time."}}},
{en:"Which is NOT a benefit of using Edge Locations?",
 pt:"Qual NAO e um beneficio do uso de Edge Locations?",
 o:{en:["Cache the most recent responses","Improve end users' experience when uploading files","Distribute traffic across multiple instances to reduce latency","Distribute content to global users with low latency"],
    pt:["Armazenar em cache as respostas mais recentes","Melhorar a experiencia dos usuarios ao fazer upload de arquivos","Distribuir trafego entre multiplas instancias para reduzir latencia","Distribuir conteudo para usuarios globais com baixa latencia"]},a:[2],
 exp:{pt:{tech:"Edge Locations fazem cache e distribuicao de conteudo (CDN), nao balanceamento de carga entre instancias EC2. Distribuir trafego entre instancias e funcao do Elastic Load Balancer.",simple:"Edge Locations sao quiosques de entrega rapida, nao gerentes que dividem tarefas entre funcionarios. Quem divide trabalho entre instancias e o Load Balancer."},
      en:{tech:"Edge Locations do caching and content distribution (CDN), not load balancing across EC2 instances. Distributing traffic across instances is the Elastic Load Balancer's job.",simple:"Edge Locations are quick delivery kiosks, not managers dividing tasks among employees. The one dividing work among instances is the Load Balancer."}}},
{en:"Which services are change management tools for auditing resource changes? (Choose TWO)",
 pt:"Quais servicos sao ferramentas de gerenciamento de mudancas para auditar alteracoes de recursos? (Escolha DOIS)",
 o:{en:["AWS CloudTrail","Amazon Comprehend","AWS Transit Gateway","AWS X-Ray","AWS Config"],pt:["AWS CloudTrail","Amazon Comprehend","AWS Transit Gateway","AWS X-Ray","AWS Config"]},a:[0,4],multi:true,
 exp:{pt:{tech:"CloudTrail registra chamadas de API (quem fez o que). AWS Config registra o estado e mudancas de configuracao dos recursos ao longo do tempo. Juntos, oferecem auditoria completa.",simple:"CloudTrail e a camera de seguranca (registra acoes). AWS Config e o inventario com historico (registra como os recursos estavam e como mudaram)."},
      en:{tech:"CloudTrail records API calls (who did what). AWS Config records resource configuration state and changes over time. Together, they provide complete auditing.",simple:"CloudTrail is the security camera (records actions). AWS Config is the inventory with history (records how resources were and how they changed)."}}},
{en:"Which service allows you to run containerized applications on a cluster of EC2 instances?",
 pt:"Qual servico permite executar aplicacoes em conteineres em um cluster de instancias EC2?",
 o:{en:["Amazon ECS","AWS Data Pipeline","AWS Cloud9","AWS Personal Health Dashboard"],pt:["Amazon ECS","AWS Data Pipeline","AWS Cloud9","AWS Personal Health Dashboard"]},a:[0],
 exp:{pt:{tech:"O Amazon ECS (Elastic Container Service) e o servico de orquestracao de conteineres da AWS que gerencia a execucao de conteineres Docker em clusters de instancias EC2 ou Fargate.",simple:"ECS e como um maestro de orquestra para conteineres — ele decide em qual musico (instancia) cada instrumento (conteiner) toca, e garante que todos toquem em harmonia."},
      en:{tech:"Amazon ECS (Elastic Container Service) is AWS's container orchestration service that manages Docker container execution on clusters of EC2 instances or Fargate.",simple:"ECS is like an orchestra conductor for containers — it decides which musician (instance) plays each instrument (container) and ensures they all play in harmony."}}},
{en:"Which AWS feature takes advantage of CloudFront's edge locations to transfer files to S3 faster?",
 pt:"Qual recurso AWS aproveita os edge locations do CloudFront para transferir arquivos para o S3 mais rapido?",
 o:{en:["S3 Transfer Acceleration","AWS WAF","AWS Snowmobile","AWS Snowball"],pt:["S3 Transfer Acceleration","AWS WAF","AWS Snowmobile","AWS Snowball"]},a:[0],
 exp:{pt:{tech:"O S3 Transfer Acceleration usa os Edge Locations do CloudFront como pontos de entrada otimizados, roteando dados pela rede interna da AWS (mais rapida) ate o bucket S3 de destino.",simple:"E como enviar uma encomenda para um ponto de coleta proximo (Edge Location) em vez de mandar direto para o deposito central. De la, a AWS usa suas 'estradas expressas' internas."},
      en:{tech:"S3 Transfer Acceleration uses CloudFront Edge Locations as optimized entry points, routing data through AWS's internal network (faster) to the destination S3 bucket.",simple:"It's like shipping a package to a nearby collection point (Edge Location) instead of directly to the central warehouse. From there, AWS uses its internal 'expressways'."}}},
{en:"Which AWS security feature filters incoming traffic for an EC2 instance?",
 pt:"Qual recurso de seguranca AWS filtra o trafego de entrada para uma instancia EC2?",
 o:{en:["AWS X-Ray","Network ACL","Security Groups","VPC Flow logs"],pt:["AWS X-Ray","Network ACL","Security Groups","VPC Flow logs"]},a:[2],
 exp:{pt:{tech:"Security Groups atuam como firewalls virtuais no nivel da instancia EC2, controlando trafego de entrada e saida. Sao stateful (se permite entrada, a resposta sai automaticamente). Network ACL e no nivel da sub-rede.",simple:"Security Group e como o porteiro do seu apartamento (instancia). Network ACL e o porteiro do condominio (sub-rede). A pergunta e sobre a instancia, entao e o Security Group."},
      en:{tech:"Security Groups act as virtual firewalls at the EC2 instance level, controlling inbound and outbound traffic. They're stateful (if inbound is allowed, the response goes out automatically). Network ACL is at the subnet level.",simple:"Security Group is like your apartment's doorman (instance). Network ACL is the building's doorman (subnet). The question is about the instance, so it's Security Group."}}},
{en:"Where can you store files in AWS? (Choose TWO)",
 pt:"Onde voce pode armazenar arquivos na AWS? (Escolha DOIS)",
 o:{en:["Amazon EFS","Amazon SNS","Amazon EBS","Amazon ECS","Amazon EMR"],pt:["Amazon EFS","Amazon SNS","Amazon EBS","Amazon ECS","Amazon EMR"]},a:[0,2],multi:true,
 exp:{pt:{tech:"EFS (Elastic File System) e armazenamento de arquivos compartilhado. EBS (Elastic Block Store) e armazenamento em bloco para EC2. SNS e notificacoes, ECS e conteineres, EMR e processamento de big data.",simple:"EFS e como um Google Drive compartilhado. EBS e como o HD do seu computador. Os outros nao sao para guardar arquivos — SNS manda mensagens, ECS roda programas, EMR processa dados."},
      en:{tech:"EFS (Elastic File System) is shared file storage. EBS (Elastic Block Store) is block storage for EC2. SNS is notifications, ECS is containers, EMR is big data processing.",simple:"EFS is like a shared Google Drive. EBS is like your computer's hard drive. The others aren't for storing files — SNS sends messages, ECS runs programs, EMR processes data."}}},
{en:"Which describes the payment model for committing to EC2 usage over 1 or 3-year terms?",
 pt:"Qual descreve o modelo de pagamento ao se comprometer com o uso de EC2 por 1 ou 3 anos?",
 o:{en:["Pay less as AWS grows","Pay as you go","Pay less by using more","Save when you reserve"],
    pt:["Pague menos conforme a AWS cresce","Pague conforme o uso","Pague menos usando mais","Economize ao reservar"]},a:[3],
 exp:{pt:{tech:"'Save when you reserve' e o principio de precificacao para Reserved Instances e Savings Plans. Ao se comprometer por 1 ou 3 anos, voce recebe descontos significativos sobre On-Demand.",simple:"E como assinar um plano anual de academia — sai mais barato por mes do que pagar avulso. Voce se compromete com o tempo e ganha desconto."},
      en:{tech:"'Save when you reserve' is the pricing principle for Reserved Instances and Savings Plans. By committing for 1 or 3 years, you get significant discounts over On-Demand.",simple:"It's like signing an annual gym membership — it's cheaper per month than paying per visit. You commit to the time and get a discount."}}},
{en:"What is the primary storage service used by Amazon RDS?",
 pt:"Qual e o servico de armazenamento principal usado pelo Amazon RDS?",
 o:{en:["Amazon Glacier","Amazon EBS","Amazon EFS","Amazon S3"],pt:["Amazon Glacier","Amazon EBS","Amazon EFS","Amazon S3"]},a:[1],
 exp:{pt:{tech:"O Amazon RDS usa volumes EBS (Elastic Block Store) como armazenamento primario para bancos de dados. EBS fornece armazenamento persistente em bloco otimizado para I/O de banco de dados.",simple:"EBS e como o HD interno do servidor de banco de dados. O RDS precisa de armazenamento rapido e confiavel 'plugado' na maquina, e e exatamente isso que o EBS faz."},
      en:{tech:"Amazon RDS uses EBS (Elastic Block Store) volumes as primary storage for databases. EBS provides persistent block storage optimized for database I/O.",simple:"EBS is like the internal hard drive of the database server. RDS needs fast, reliable storage 'plugged into' the machine, and that's exactly what EBS does."}}},
{en:"For troubleshooting performance in microservices, which AWS service should be used?",
 pt:"Para resolver problemas de performance em microsservicos, qual servico AWS deve ser usado?",
 o:{en:["AWS CodePipeline","AWS X-Ray","Amazon Inspector","AWS CloudTrail"],pt:["AWS CodePipeline","AWS X-Ray","Amazon Inspector","AWS CloudTrail"]},a:[1],
 exp:{pt:{tech:"O AWS X-Ray permite rastrear requisicoes atraves de microsservicos, identificando gargalos de performance e erros. Ele cria um 'mapa de servicos' visual mostrando como os componentes se comunicam.",simple:"X-Ray e como uma radiografia da sua aplicacao — mostra exatamente onde esta o problema de performance, qual servico esta lento e por que, como um medico encontrando a dor."},
      en:{tech:"AWS X-Ray lets you trace requests across microservices, identifying performance bottlenecks and errors. It creates a visual 'service map' showing how components communicate.",simple:"X-Ray is like an X-ray of your application — shows exactly where the performance problem is, which service is slow and why, like a doctor finding the pain."}}},
{en:"Which AWS services have native Multi-AZ fault tolerance? (Choose TWO)",
 pt:"Quais servicos AWS tem tolerancia a falhas Multi-AZ nativa? (Escolha DOIS)",
 o:{en:["Amazon Redshift","AWS Snowball","Amazon S3","Amazon EBS","Amazon DynamoDB"],pt:["Amazon Redshift","AWS Snowball","Amazon S3","Amazon EBS","Amazon DynamoDB"]},a:[2,4],multi:true,
 exp:{pt:{tech:"S3 e DynamoDB sao projetados nativamente para armazenar dados em multiplas AZs automaticamente. EBS e limitado a uma unica AZ. Redshift precisa de configuracao manual para Multi-AZ.",simple:"S3 e DynamoDB ja nascem 'a prova de falha' — guardam copias em varios lugares automaticamente. EBS e como um HD que so existe em um predio. Se o predio cair, perdeu."},
      en:{tech:"S3 and DynamoDB are natively designed to store data across multiple AZs automatically. EBS is limited to a single AZ. Redshift needs manual Multi-AZ configuration.",simple:"S3 and DynamoDB are born 'failure-proof' — they keep copies in multiple places automatically. EBS is like a hard drive in only one building. If the building goes down, it's gone."}}},
{en:"Using Amazon EC2 falls under which cloud computing model?",
 pt:"Usar o Amazon EC2 se enquadra em qual modelo de computacao em nuvem?",
 o:{en:["IaaS & SaaS","IaaS","SaaS","PaaS"],pt:["IaaS e SaaS","IaaS","SaaS","PaaS"]},a:[1],
 exp:{pt:{tech:"O EC2 e Infrastructure as a Service (IaaS) — voce gerencia o SO, aplicacoes e dados. A AWS fornece a infraestrutura (servidores virtuais, rede, armazenamento).",simple:"IaaS e alugar um terreno com fundacao pronta. Voce constroi o que quiser em cima. No EC2, a AWS da a maquina virtual, voce instala e configura tudo o resto."},
      en:{tech:"EC2 is Infrastructure as a Service (IaaS) — you manage the OS, applications, and data. AWS provides the infrastructure (virtual servers, network, storage).",simple:"IaaS is renting land with a ready foundation. You build whatever you want on top. With EC2, AWS gives you the virtual machine, you install and configure everything else."}}},
{en:"What does Amazon Elastic Beanstalk provide?",
 pt:"O que o Amazon Elastic Beanstalk fornece?",
 o:{en:["PaaS solution to automate application deployment","Compute engine for Amazon ECS","Scalable file storage","NoSQL database service"],
    pt:["Solucao PaaS para automatizar a implantacao de aplicacoes","Motor de computacao para Amazon ECS","Armazenamento de arquivos escalavel","Servico de banco de dados NoSQL"]},a:[0],
 exp:{pt:{tech:"O Elastic Beanstalk e um servico PaaS que automatiza a implantacao: voce sobe o codigo e ele cuida de provisionamento, balanceamento de carga, auto scaling e monitoramento.",simple:"Beanstalk e como um servico de 'publica pra mim' — voce entrega o codigo e ele cuida de todo o resto: servidor, escala, monitoramento. Voce so foca no codigo."},
      en:{tech:"Elastic Beanstalk is a PaaS service that automates deployment: you upload your code and it handles provisioning, load balancing, auto scaling, and monitoring.",simple:"Beanstalk is like a 'publish it for me' service — you hand over the code and it handles everything else: server, scaling, monitoring. You just focus on the code."}}},
{en:"Which AWS service performs automated vulnerability assessments of EC2 instances?",
 pt:"Qual servico AWS realiza avaliacoes automatizadas de vulnerabilidades em instancias EC2?",
 o:{en:["Amazon Kinesis","Security groups","Amazon Inspector","AWS Network ACLs"],pt:["Amazon Kinesis","Security groups","Amazon Inspector","AWS Network ACLs"]},a:[2],
 exp:{pt:{tech:"O Amazon Inspector analisa automaticamente instancias EC2 e imagens de conteiner em busca de vulnerabilidades de software e exposicoes de rede nao intencionais.",simple:"Inspector e como um detetive que varre sua casa (instancia) procurando portas abertas, trancas quebradas e coisas fora do lugar — tudo automaticamente."},
      en:{tech:"Amazon Inspector automatically analyzes EC2 instances and container images for software vulnerabilities and unintended network exposures.",simple:"Inspector is like a detective who sweeps your house (instance) looking for open doors, broken locks, and things out of place — all automatically."}}},
{en:"Which Savings Plans compute services are available? (Choose TWO)",
 pt:"Quais servicos de computacao estao disponiveis nos Savings Plans? (Escolha DOIS)",
 o:{en:["AWS Batch","AWS Outposts","Amazon Lightsail","Amazon EC2","AWS Lambda"],pt:["AWS Batch","AWS Outposts","Amazon Lightsail","Amazon EC2","AWS Lambda"]},a:[3,4],multi:true,
 exp:{pt:{tech:"Compute Savings Plans aplicam-se a EC2, Lambda e Fargate. Batch usa EC2 por baixo mas nao e um servico coberto diretamente. Lightsail tem seu proprio modelo de precificacao.",simple:"Savings Plans e como um cartao de desconto que funciona em lojas especificas — EC2 e Lambda sao as lojas participantes. Batch e Lightsail nao aceitam esse cartao."},
      en:{tech:"Compute Savings Plans apply to EC2, Lambda, and Fargate. Batch uses EC2 underneath but isn't a directly covered service. Lightsail has its own pricing model.",simple:"Savings Plans is like a discount card that works at specific stores — EC2 and Lambda are the participating stores. Batch and Lightsail don't accept that card."}}},
{en:"What is the recommended best practice for protecting workloads from natural disasters?",
 pt:"Qual e a melhor pratica recomendada para proteger cargas de trabalho contra desastres naturais?",
 o:{en:["Replicate across Edge Locations with CloudFront failover","Deploy across multiple AZs in same region","Create point-in-time backups in another subnet","Deploy to another AWS Region with Active-Active strategy"],
    pt:["Replicar entre Edge Locations com failover do CloudFront","Implantar em multiplas AZs na mesma regiao","Criar backups point-in-time em outra sub-rede","Implantar em outra Regiao AWS com estrategia Active-Active"]},a:[3],
 exp:{pt:{tech:"Desastres naturais podem afetar uma regiao inteira. Somente Multi-Region (outra regiao geografica) protege contra isso. Multi-AZ protege contra falha de datacenter, nao de regiao.",simple:"Se um terremoto destruir uma cidade inteira, nao adianta ter backups em bairros diferentes da mesma cidade. Voce precisa de copias em OUTRA cidade (outra Regiao)."},
      en:{tech:"Natural disasters can affect an entire region. Only Multi-Region (another geographic region) protects against that. Multi-AZ protects against datacenter failure, not regional failure.",simple:"If an earthquake destroys an entire city, having backups in different neighborhoods of the same city won't help. You need copies in ANOTHER city (another Region)."}}},
{en:"Which AWS tool enables script-based management of all AWS services?",
 pt:"Qual ferramenta AWS permite o gerenciamento baseado em scripts de todos os servicos AWS?",
 o:{en:["AWS Console","AWS Service Catalog","AWS OpsWorks","AWS CLI"],pt:["AWS Console","AWS Service Catalog","AWS OpsWorks","AWS CLI"]},a:[3],
