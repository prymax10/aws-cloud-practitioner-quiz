{en:"Which AWS service distributes incoming traffic across multiple EC2 instances?",pt:"Qual servico da AWS distribui o trafego de entrada entre varias instancias EC2?",o:{en:["AWS Global Accelerator","AWS Application Load Balancer","Amazon CloudFront","Transit VPC"],pt:["AWS Global Accelerator","AWS Application Load Balancer","Amazon CloudFront","Transit VPC"]},a:[1],exp:{pt:{tech:"O Application Load Balancer (ALB) opera na camada 7 e distribui trafego HTTP/HTTPS entre instancias EC2.",simple:"O AWS Application Load Balancer (ALB) distribui o trafego de entrada entre varias instancias EC2 com base em regras definidas na camada de aplicacao (HTTP/HTTPS). Isso evita que uma unica instancia fique sobrecarregada.",avoid:"Nao use ALB para trafego que nao e HTTP/HTTPS — para trafego TCP ou UDP, use o Network Load Balancer (NLB). Tambem nao confunda ALB com Auto Scaling; o ALB distribui trafego, mas nao cria novas instancias."},en:{tech:"The Application Load Balancer (ALB) operates at layer 7 and distributes HTTP/HTTPS traffic across EC2 instances.",simple:"The AWS Application Load Balancer (ALB) distributes incoming traffic across multiple EC2 instances based on rules defined at the application layer (HTTP/HTTPS). This prevents any single instance from becoming overloaded.",avoid:"Do not use ALB for non-HTTP/HTTPS traffic — for TCP or UDP traffic, use the Network Load Balancer (NLB). Also do not confuse ALB with Auto Scaling; ALB distributes traffic but does not create new instances."}}},
{en:"Which option helps secure an AWS account from unauthorized access?",pt:"Qual opcao ajuda a proteger uma conta AWS contra acesso nao autorizado?",o:{en:["Restrict all SDK and CLI API calls","Share IAM accounts organized by department","Require MFA for all IAM User access","Set up two different login passwords"],pt:["Restringir todas as chamadas de API do SDK e CLI","Compartilhar contas IAM organizadas por departamento","Exigir MFA para todo acesso de usuarios IAM","Configurar duas senhas de login diferentes"]},a:[2],exp:{pt:{tech:"MFA adiciona uma camada extra de seguranca exigindo um segundo fator alem da senha para autenticacao.",simple:"Exigir MFA (autenticacao multifator) para todos os usuarios IAM adiciona uma camada extra de seguranca alem da senha. Mesmo que a senha seja comprometida, o invasor ainda precisa do segundo fator para acessar a conta.",avoid:"Nao ative MFA apenas para o usuario root — todos os usuarios IAM com acesso ao console devem ter MFA habilitado. Tambem nao dependa apenas de MFA; combine com politicas de senha forte e rotacao de credenciais."},en:{tech:"MFA adds an extra security layer by requiring a second factor beyond the password for authentication.",simple:"Requiring MFA (multi-factor authentication) for all IAM users adds an extra security layer beyond the password. Even if the password is compromised, the attacker still needs the second factor to access the account.",avoid:"Do not enable MFA only for the root user — all IAM users with console access should have MFA enabled. Also do not rely solely on MFA; combine it with strong password policies and credential rotation."}}},
{en:"Which AWS service offers volume-based discounts as usage increases?",pt:"Qual servico da AWS oferece descontos baseados em volume conforme o uso aumenta?",o:{en:["Amazon VPC","Amazon S3","Amazon Lightsail","AWS Cost Explorer"],pt:["Amazon VPC","Amazon S3","Amazon Lightsail","AWS Cost Explorer"]},a:[1],exp:{pt:{tech:"O Amazon S3 usa precificacao em camadas — quanto mais dados voce armazena, menor o custo por GB.",simple:"Amazon S3 oferece descontos automaticos baseados em volume — quanto mais dados voce armazena, menor o custo por GB. Os precos diminuem em faixas conforme o uso total aumenta.",avoid:"Nao assuma que S3 e sempre a opcao mais barata para todo tipo de armazenamento — para dados acessados raramente, Glacier e mais economico. Tambem nao ignore as cobranças de transferencia de dados e requisicoes, que podem aumentar o custo."},en:{tech:"Amazon S3 uses tiered pricing — the more data you store, the lower the cost per GB.",simple:"Amazon S3 offers automatic volume-based discounts — the more data you store, the lower the cost per GB. Prices decrease in tiers as total usage increases.",avoid:"Do not assume S3 is always the cheapest option for all storage types — for rarely accessed data, Glacier is more economical. Also do not ignore data transfer and request charges, which can increase costs."}}},
{en:"Which factors should be considered when choosing an AWS Region for deployment? (Choose TWO)",pt:"Quais fatores devem ser considerados ao escolher uma Regiao AWS para implantacao? (Escolha DUAS)",o:{en:["The security level of the region","Data sovereignty and compliance requirements","Cost of services in the region","Number of available VPCs","Geographic proximity to users"],pt:["O nivel de seguranca da regiao","Requisitos de soberania de dados e conformidade","Custo dos servicos na regiao","Numero de VPCs disponiveis","Proximidade geografica dos usuarios"]},a:[1,2],multi:true,exp:{pt:{tech:"A escolha de regiao deve considerar conformidade com leis de dados locais e custo, que varia entre regioes.",simple:"Ao escolher uma Regiao AWS, considere os requisitos de soberania e conformidade de dados (leis que exigem que dados fiquem em determinado pais) e o custo dos servicos, que varia entre regioes. Esses dois fatores impactam diretamente conformidade legal e orcamento.",avoid:"Nao escolha uma Regiao apenas pela proximidade geografica sem verificar se ela atende seus requisitos regulatorios. Tambem nao assuma que todas as regioes tem os mesmos precos ou os mesmos servicos disponiveis."},en:{tech:"Region selection should consider compliance with local data laws and cost, which varies between regions.",simple:"When choosing an AWS Region, consider data sovereignty and compliance requirements (laws that require data to stay in a specific country) and the cost of services, which varies between regions. These two factors directly impact legal compliance and budget.",avoid:"Do not choose a Region based only on geographic proximity without verifying it meets your regulatory requirements. Also do not assume all regions have the same prices or the same services available."}}},
{en:"Which AWS service provides in-memory caching to improve MySQL database performance?",pt:"Qual servico da AWS fornece cache em memoria para melhorar a performance de bancos MySQL?",o:{en:["Amazon EFS","Amazon Neptune","Amazon ElastiCache","Amazon DAX"],pt:["Amazon EFS","Amazon Neptune","Amazon ElastiCache","Amazon DAX"]},a:[2],exp:{pt:{tech:"Amazon ElastiCache suporta Redis e Memcached para cache em memoria, reduzindo a carga em bancos relacionais como MySQL.",simple:"Amazon ElastiCache e um servico de cache em memoria que armazena dados frequentemente acessados na memoria RAM para entrega-los muito mais rapido que um banco de dados em disco. Ele reduz a carga no banco MySQL ao evitar consultas repetidas.",avoid:"Nao use ElastiCache para armazenar dados que mudam constantemente e precisam estar sempre atualizados — o cache pode servir dados desatualizados. Tambem nao substitua o banco de dados por ElastiCache; ele complementa, nao substitui."},en:{tech:"Amazon ElastiCache supports Redis and Memcached for in-memory caching, reducing load on relational databases like MySQL.",simple:"Amazon ElastiCache is an in-memory caching service that stores frequently accessed data in RAM to deliver it much faster than a disk-based database. It reduces the load on MySQL by avoiding repeated queries.",avoid:"Do not use ElastiCache to store data that changes constantly and must always be current — the cache may serve stale data. Also do not replace the database with ElastiCache; it complements, not replaces."}}},
{en:"Which are the customer responsibilities for security IN the cloud? (Choose TWO)",pt:"Quais sao as responsabilidades do cliente pela seguranca NA nuvem? (Escolha DUAS)",o:{en:["Building the application schema","Replacing faulty physical hardware","Creating the hypervisor","Patch management of underlying infrastructure","File system encryption"],pt:["Construir o esquema da aplicacao","Substituir hardware fisico com defeito","Criar o hypervisor","Gerenciamento de patches da infraestrutura subjacente","Criptografia do sistema de arquivos"]},a:[0,4],multi:true,exp:{pt:{tech:"No modelo de responsabilidade compartilhada, o cliente cuida dos dados, aplicacao, criptografia e configuracao de acesso.",simple:"O cliente e responsavel por construir o esquema da aplicacao (estrutura do banco de dados, logica de negocio) e por configurar a criptografia do sistema de arquivos. Essas sao responsabilidades de seguranca dentro da nuvem.",avoid:"Nao confunda responsabilidades do cliente com as da AWS — a AWS cuida da infraestrutura fisica e do hardware, mas proteger seus dados e suas aplicacoes e sua responsabilidade. Nao deixe a criptografia desativada assumindo que a AWS faz isso por padrao."},en:{tech:"In the shared responsibility model, the customer handles data, application, encryption, and access configuration.",simple:"The customer is responsible for building the application schema (database structure, business logic) and for configuring file system encryption. These are security responsibilities within the cloud.",avoid:"Do not confuse customer responsibilities with AWS responsibilities — AWS handles physical infrastructure and hardware, but protecting your data and applications is your responsibility. Do not leave encryption disabled assuming AWS does it by default."}}},
{en:"Which AWS service enables quick deployment of .NET applications?",pt:"Qual servico da AWS permite implantar aplicacoes .NET rapidamente?",o:{en:["Amazon SNS","AWS Elastic Beanstalk","AWS Systems Manager","AWS Trusted Advisor"],pt:["Amazon SNS","AWS Elastic Beanstalk","AWS Systems Manager","AWS Trusted Advisor"]},a:[1],exp:{pt:{tech:"Elastic Beanstalk faz deploy automatico de aplicacoes .NET, Java, Node.js e outras, gerenciando a infraestrutura.",simple:"AWS Elastic Beanstalk permite implantar aplicacoes .NET (e outras linguagens) rapidamente, cuidando automaticamente da infraestrutura como servidores, balanceamento de carga e escalabilidade. Voce envia o codigo e o Beanstalk configura o ambiente.",avoid:"Nao use Beanstalk se voce precisa de controle granular sobre cada componente da infraestrutura — nesse caso, configure EC2 e outros servicos manualmente. Tambem nao confunda Beanstalk com Lambda; Beanstalk gerencia servidores por voce, enquanto Lambda e serverless."},en:{tech:"Elastic Beanstalk automatically deploys .NET, Java, Node.js and other applications, managing the underlying infrastructure.",simple:"AWS Elastic Beanstalk lets you deploy .NET (and other language) applications quickly, automatically handling infrastructure like servers, load balancing, and scaling. You upload the code and Beanstalk configures the environment.",avoid:"Do not use Beanstalk if you need granular control over every infrastructure component — in that case, configure EC2 and other services manually. Also do not confuse Beanstalk with Lambda; Beanstalk manages servers for you, while Lambda is serverless."}}},
{en:"Which AWS service extends on-premises storage to the AWS Cloud?",pt:"Qual servico da AWS estende o armazenamento local para a nuvem AWS?",o:{en:["AWS Data Pipeline","AWS Storage Gateway","Amazon Aurora","Amazon EFS"],pt:["AWS Data Pipeline","AWS Storage Gateway","Amazon Aurora","Amazon EFS"]},a:[1],exp:{pt:{tech:"AWS Storage Gateway conecta ambientes on-premises ao armazenamento em nuvem da AWS de forma transparente.",simple:"AWS Storage Gateway conecta seu ambiente local (on-premises) ao armazenamento na nuvem AWS, permitindo que aplicacoes locais usem armazenamento na nuvem de forma transparente. Ele funciona como uma extensao do seu armazenamento local para a AWS.",avoid:"Nao use Storage Gateway se todos os seus dados ja estao na nuvem e nao ha ambiente on-premises — use S3 ou EBS diretamente. Tambem nao confunda com o servico de migracao (AWS DMS ou SMS); o Gateway e para uso hibrido continuo, nao para migracao unica."},en:{tech:"AWS Storage Gateway seamlessly connects on-premises environments to AWS cloud storage.",simple:"AWS Storage Gateway connects your on-premises environment to AWS cloud storage, allowing local applications to use cloud storage seamlessly. It acts as an extension of your local storage into AWS.",avoid:"Do not use Storage Gateway if all your data is already in the cloud with no on-premises environment — use S3 or EBS directly. Also do not confuse it with migration services (AWS DMS or SMS); the Gateway is for ongoing hybrid use, not one-time migration."}}},
{en:"Which AWS service provides access logs and records for auditing purposes?",pt:"Qual servico da AWS fornece logs de acesso e registros para fins de auditoria?",o:{en:["AWS CloudTrail","Amazon CloudFront","AWS CloudFormation","Amazon CloudWatch"],pt:["AWS CloudTrail","Amazon CloudFront","AWS CloudFormation","Amazon CloudWatch"]},a:[0],exp:{pt:{tech:"AWS CloudTrail registra todas as acoes realizadas na conta AWS, essencial para auditorias e investigacoes de seguranca.",simple:"AWS CloudTrail fornece logs de acesso que registram todas as atividades e chamadas de API na sua conta AWS. Esses registros sao essenciais para auditorias de seguranca e investigacao de incidentes.",avoid:"Nao desative o CloudTrail pensando em economizar — os logs sao fundamentais para seguranca e conformidade. Tambem nao confunda CloudTrail com VPC Flow Logs; CloudTrail registra acoes de API, enquanto Flow Logs registram trafego de rede."},en:{tech:"AWS CloudTrail records all actions performed in the AWS account, essential for audits and security investigations.",simple:"AWS CloudTrail provides access logs that record all activities and API calls in your AWS account. These records are essential for security audits and incident investigation.",avoid:"Do not disable CloudTrail to save costs — the logs are fundamental for security and compliance. Also do not confuse CloudTrail with VPC Flow Logs; CloudTrail records API actions, while Flow Logs record network traffic."}}},
{en:"What is the best practice for building highly available applications on AWS?",pt:"Qual e a melhor pratica para construir aplicacoes de alta disponibilidade na AWS?",o:{en:["Deploy to at least two Availability Zones","Use Elastic Load Balancing across multiple Regions","Deploy code on two servers in the same Availability Zone","Rewrite the application code to handle all requests"],pt:["Implantar em pelo menos duas Zonas de Disponibilidade","Usar Elastic Load Balancing entre multiplas Regioes","Implantar codigo em dois servidores na mesma Zona de Disponibilidade","Reescrever o codigo da aplicacao para lidar com todas as requisicoes"]},a:[0],exp:{pt:{tech:"Implantar em pelo menos duas AZs garante que a aplicacao continue disponivel mesmo se uma AZ falhar.",simple:"A pratica recomendada e implantar sua aplicacao em pelo menos duas Availability Zones para garantir alta disponibilidade. Se uma AZ ficar indisponivel, a outra continua atendendo os usuarios sem interrupcao.",avoid:"Nao implante tudo em uma unica AZ achando que e suficiente — qualquer falha nessa AZ derruba toda a aplicacao. Tambem nao confunda Availability Zones com Regions; AZs sao datacenters isolados dentro da mesma Region."},en:{tech:"Deploying to at least two AZs ensures the application remains available even if one AZ fails.",simple:"The best practice is to deploy your application in at least two Availability Zones to ensure high availability. If one AZ becomes unavailable, the other continues serving users without interruption.",avoid:"Do not deploy everything in a single AZ thinking it is enough — any failure in that AZ brings down the entire application. Also do not confuse Availability Zones with Regions; AZs are isolated data centers within the same Region."}}},
{en:"Which factors should be considered in a Total Cost of Ownership (TCO) analysis? (Choose TWO)",pt:"Quais fatores devem ser considerados em uma analise de Custo Total de Propriedade (TCO)? (Escolha DUAS)",o:{en:["Labor costs and IT overhead","Cooling and power consumption","Amazon EBS computing power","Software architecture design","Software compatibility testing"],pt:["Custos de mao de obra e overhead de TI","Custos de refrigeracao e consumo de energia","Poder computacional do Amazon EBS","Design de arquitetura de software","Testes de compatibilidade de software"]},a:[0,1],multi:true,exp:{pt:{tech:"TCO inclui custos de mao de obra, energia, refrigeracao, espaco fisico e hardware — custos que a nuvem elimina ou reduz.",simple:"Uma analise de TCO deve incluir custos de mao de obra e overhead de TI (equipe, treinamento, gerenciamento) e custos de refrigeracao e consumo de energia dos servidores. Esses custos ocultos muitas vezes sao esquecidos ao comparar nuvem com on-premises.",avoid:"Nao considere apenas o custo de hardware na analise de TCO — custos operacionais como pessoal, energia e espaco fisico sao significativos. Tambem nao compare precos da nuvem apenas com o preco de compra de servidores, sem incluir a manutencao ao longo dos anos."},en:{tech:"TCO includes labor, power, cooling, physical space, and hardware costs — costs that the cloud eliminates or reduces.",simple:"A TCO analysis should include labor costs and IT overhead (staff, training, management) and cooling and power consumption costs for servers. These hidden costs are often overlooked when comparing cloud versus on-premises.",avoid:"Do not consider only hardware costs in a TCO analysis — operational costs like staff, power, and physical space are significant. Also do not compare cloud prices only against server purchase price without including maintenance over the years."}}},
{en:"Which support plan is required for a response time of less than 15 minutes for critical issues?",pt:"Qual plano de suporte e necessario para um tempo de resposta inferior a 15 minutos em problemas criticos?",o:{en:["AWS Basic Support","AWS Developer Support","AWS Business Support","AWS Enterprise Support"],pt:["AWS Basic Support","AWS Developer Support","AWS Business Support","AWS Enterprise Support"]},a:[3],exp:{pt:{tech:"O plano Enterprise oferece tempo de resposta inferior a 15 minutos para casos criticos de negocio.",simple:"O plano Enterprise Support garante tempo de resposta inferior a 15 minutos para problemas criticos que afetam a producao. E o unico plano que oferece esse nivel de urgencia no atendimento.",avoid:"Nao escolha Enterprise Support se sua empresa nao tem aplicacoes criticas que justifiquem o custo. Os planos Business ou Developer podem ser suficientes para necessidades menos urgentes."},en:{tech:"The Enterprise plan offers a response time of less than 15 minutes for business-critical cases.",simple:"Enterprise Support guarantees a response time of less than 15 minutes for critical production issues. It is the only plan that offers this level of urgency in support.",avoid:"Do not choose Enterprise Support if your company does not have critical applications that justify the cost. Business or Developer plans may be sufficient for less urgent needs."}}},
{en:"Which of the following are serverless AWS offerings? (Choose TWO)",pt:"Quais das alternativas a seguir sao ofertas serverless da AWS? (Escolha DUAS)",o:{en:["Amazon EC2","AWS Lambda","Amazon DynamoDB","Amazon EMR","Amazon RDS"],pt:["Amazon EC2","AWS Lambda","Amazon DynamoDB","Amazon EMR","Amazon RDS"]},a:[1,2],multi:true,exp:{pt:{tech:"Lambda e DynamoDB sao serverless — nao exigem gerenciamento de servidores. EC2, EMR e RDS exigem.",simple:"AWS Lambda executa funcoes de codigo sob demanda sem provisionar servidores, e Amazon DynamoDB e um banco de dados NoSQL totalmente gerenciado. Ambos eliminam a necessidade de gerenciar infraestrutura de servidor.",avoid:"Nao tente usar Lambda para aplicacoes que precisam rodar por mais de 15 minutos continuamente. Tambem nao escolha DynamoDB quando sua aplicacao exige consultas SQL complexas com joins — um banco relacional seria mais adequado."},en:{tech:"Lambda and DynamoDB are serverless — they require no server management. EC2, EMR, and RDS require it.",simple:"AWS Lambda executes code functions on demand without provisioning servers, and Amazon DynamoDB is a fully managed NoSQL database. Both eliminate the need to manage server infrastructure.",avoid:"Do not try to use Lambda for applications that need to run continuously for more than 15 minutes. Also do not choose DynamoDB when your application requires complex SQL queries with joins — a relational database would be more suitable."}}},
{en:"Which AWS service is used to deploy SSL/TLS certificates?",pt:"Qual servico da AWS e usado para implantar certificados SSL/TLS?",o:{en:["Amazon GuardDuty","AWS Certificate Manager (ACM)","Amazon Detective","AWS WAF"],pt:["Amazon GuardDuty","AWS Certificate Manager (ACM)","Amazon Detective","AWS WAF"]},a:[1],exp:{pt:{tech:"O AWS ACM provisiona, gerencia e implanta certificados SSL/TLS publicos e privados gratuitamente para servicos AWS.",simple:"AWS Certificate Manager (ACM) permite provisionar, gerenciar e implantar certificados SSL/TLS de forma gratuita para servicos integrados da AWS. Ele tambem renova automaticamente os certificados antes que expirem.",avoid:"Nao use ACM para certificados que precisam ser instalados fora da AWS (em servidores on-premises) — ACM funciona apenas com servicos AWS integrados. Tambem nao confunda ACM com IAM; ACM gerencia certificados de criptografia, nao permissoes de acesso."},en:{tech:"AWS ACM provisions, manages, and deploys public and private SSL/TLS certificates for free on AWS services.",simple:"AWS Certificate Manager (ACM) lets you provision, manage, and deploy SSL/TLS certificates for free on integrated AWS services. It also automatically renews certificates before they expire.",avoid:"Do not use ACM for certificates that need to be installed outside of AWS (on on-premises servers) — ACM only works with integrated AWS services. Also do not confuse ACM with IAM; ACM manages encryption certificates, not access permissions."}}},
{en:"Which EC2 pricing option is most cost-effective for continuous and predictable compute capacity?",pt:"Qual opcao de precificacao do EC2 e mais economica para capacidade computacional continua e previsivel?",o:{en:["On-demand Instances","Dedicated Hosts","Spot Instances","Reserved Instances"],pt:["Instancias On-Demand","Dedicated Hosts","Instancias Spot","Instancias Reservadas"]},a:[3],exp:{pt:{tech:"Reserved Instances oferecem ate 72% de desconto em troca de compromisso de 1 ou 3 anos, ideal para cargas previsiveis.",simple:"Reserved Instances oferecem descontos significativos (ate 72%) em troca de um compromisso de 1 ou 3 anos de uso continuo. Sao ideais para cargas de trabalho estaveis e previsiveis que rodam 24/7.",avoid:"Nao use Reserved Instances para cargas de trabalho temporarias ou imprevisiveis — voce paga pelo periodo inteiro independentemente do uso. Tambem nao compre Reserved Instances sem analisar seu historico de uso para garantir que a economia se justifica."},en:{tech:"Reserved Instances offer up to 72% discount in exchange for a 1 or 3-year commitment, ideal for predictable workloads.",simple:"Reserved Instances offer significant discounts (up to 72%) in exchange for a 1 or 3-year commitment of continuous use. They are ideal for stable, predictable workloads that run 24/7.",avoid:"Do not use Reserved Instances for temporary or unpredictable workloads — you pay for the entire term regardless of usage. Also do not purchase Reserved Instances without analyzing your usage history to ensure the savings are justified."}}},
{en:"What is the best practice for granting permissions to applications running on EC2?",pt:"Qual e a melhor pratica para conceder permissoes a aplicacoes rodando no EC2?",o:{en:["Generate new key pairs for each delegation","Store AWS credentials directly in application code","Use temporary security credentials through IAM Roles","Applications running on EC2 do not need permissions"],pt:["Gerar novos pares de chaves para cada delegacao","Armazenar credenciais AWS diretamente no codigo da aplicacao","Usar credenciais temporarias atraves de IAM Roles","Aplicacoes no EC2 nao precisam de permissoes"]},a:[2],exp:{pt:{tech:"IAM Roles fornecem credenciais temporarias rotacionadas automaticamente, eliminando a necessidade de chaves fixas no codigo.",simple:"A pratica recomendada e usar IAM Roles para conceder credenciais temporarias a aplicacoes rodando em EC2, em vez de armazenar chaves de acesso no codigo ou no servidor. As credenciais sao rotacionadas automaticamente pela AWS.",avoid:"Nao armazene chaves de acesso diretamente no codigo ou em arquivos de configuracao na instancia EC2. Tambem nao crie usuarios IAM individuais para aplicacoes — Roles sao mais seguros porque as credenciais expiram automaticamente."},en:{tech:"IAM Roles provide temporary credentials that are automatically rotated, eliminating the need for hardcoded keys.",simple:"The best practice is to use IAM Roles to grant temporary credentials to applications running on EC2, instead of storing access keys in the code or on the server. The credentials are automatically rotated by AWS.",avoid:"Do not store access keys directly in code or in configuration files on the EC2 instance. Also do not create individual IAM users for applications — Roles are more secure because credentials expire automatically."}}},
{en:"Which AWS service is used for decoupling monolithic applications?",pt:"Qual servico da AWS e usado para desacoplar aplicacoes monoliticas?",o:{en:["Amazon SQS","Virtual Private Gateway","AWS Artifact","Amazon CloudFront"],pt:["Amazon SQS","Virtual Private Gateway","AWS Artifact","Amazon CloudFront"]},a:[0],exp:{pt:{tech:"Amazon SQS e um servico de filas que permite desacoplar componentes de aplicacoes, processando mensagens de forma assincrona.",simple:"Amazon SQS (Simple Queue Service) e um servico de filas de mensagens que permite que componentes de uma aplicacao se comuniquem de forma assincrona. Ele desacopla os componentes para que cada um funcione independentemente no seu proprio ritmo.",avoid:"Nao use SQS quando voce precisa de comunicacao em tempo real entre componentes — SQS e assincrono e pode ter pequenos atrasos. Tambem nao confunda SQS com SNS; SQS e uma fila (um consumidor processa), enquanto SNS e para notificacoes (multiplos assinantes recebem)."},en:{tech:"Amazon SQS is a queue service that decouples application components, processing messages asynchronously.",simple:"Amazon SQS (Simple Queue Service) is a message queue service that allows application components to communicate asynchronously. It decouples components so each one operates independently at its own pace.",avoid:"Do not use SQS when you need real-time communication between components — SQS is asynchronous and may have slight delays. Also do not confuse SQS with SNS; SQS is a queue (one consumer processes), while SNS is for notifications (multiple subscribers receive)."}}},
{en:"Which AWS service offers an NFS-compatible file system?",pt:"Qual servico da AWS oferece um sistema de arquivos compativel com NFS?",o:{en:["Amazon EFS","Amazon S3","Amazon EBS","AWS Storage Gateway"],pt:["Amazon EFS","Amazon S3","Amazon EBS","AWS Storage Gateway"]},a:[0],exp:{pt:{tech:"Amazon EFS (Elastic File System) fornece um sistema de arquivos NFS elastico e escalavel para uso com EC2.",simple:"Amazon EFS (Elastic File System) e um sistema de arquivos compativel com NFS que pode ser montado simultaneamente em varias instancias EC2. O armazenamento cresce e diminui automaticamente conforme voce adiciona ou remove arquivos.",avoid:"Nao use EFS quando apenas uma instancia precisa de armazenamento — EBS e mais simples e mais barato para esse caso. Tambem nao use EFS para dados que precisam de altissima performance de IOPS; EBS com io2 pode ser mais adequado."},en:{tech:"Amazon EFS (Elastic File System) provides an elastic, scalable NFS file system for use with EC2 instances.",simple:"Amazon EFS (Elastic File System) is an NFS-compatible file system that can be mounted simultaneously on multiple EC2 instances. Storage grows and shrinks automatically as you add or remove files.",avoid:"Do not use EFS when only one instance needs storage — EBS is simpler and cheaper for that case. Also do not use EFS for data that needs very high IOPS performance; EBS with io2 may be more suitable."}}},
{en:"What is the benefit of low-latency connections between Availability Zones?",pt:"Qual e o beneficio de conexoes de baixa latencia entre Zonas de Disponibilidade?",o:{en:["Create a private connection to a data center","Achieve high availability globally","Automate the provisioning of new resources","Enable synchronous data replication across AZs"],pt:["Criar uma conexao privada com um data center","Obter alta disponibilidade global","Automatizar o provisionamento de novos recursos","Permitir replicacao sincrona de dados entre AZs"]},a:[3],exp:{pt:{tech:"Conexoes de baixa latencia entre AZs permitem replicacao sincrona, garantindo consistencia de dados em tempo real.",simple:"Conexoes de baixa latencia entre Availability Zones permitem que os dados sejam replicados de forma sincrona entre AZs, mantendo copias identicas e atualizadas em tempo real. Isso garante que, se uma AZ falhar, a outra ja tem todos os dados.",avoid:"Nao confunda replicacao sincrona entre AZs com backup — backup e uma copia pontual, enquanto replicacao sincrona mantem os dados identicos continuamente. Tambem nao assuma que replicacao entre Regions funciona da mesma forma; a latencia maior entre Regions geralmente exige replicacao assincrona."},en:{tech:"Low-latency connections between AZs enable synchronous replication, ensuring real-time data consistency.",simple:"Low-latency connections between Availability Zones enable synchronous data replication across AZs, keeping identical and up-to-date copies in real time. This ensures that if one AZ fails, the other already has all the data.",avoid:"Do not confuse synchronous replication between AZs with backup — backup is a point-in-time copy, while synchronous replication keeps data identical continuously. Also do not assume replication between Regions works the same way; higher latency between Regions usually requires asynchronous replication."}}},
{en:"Which tool should you use to estimate the costs of Amazon S3 and CloudFront?",pt:"Qual ferramenta voce deve usar para estimar os custos do Amazon S3 e CloudFront?",o:{en:["AWS Cost Explorer","AWS Pricing Calculator","AWS Budgets","AWS Cost and Usage Report"],pt:["AWS Cost Explorer","AWS Pricing Calculator","AWS Budgets","AWS Cost and Usage Report"]},a:[1],exp:{pt:{tech:"O AWS Pricing Calculator permite estimar custos antes de usar os servicos, com base em configuracoes e uso previsto.",simple:"AWS Pricing Calculator e uma ferramenta gratuita que permite estimar o custo mensal de servicos AWS como S3 e CloudFront antes de comecar a usa-los. Voce configura os parametros de uso e recebe uma estimativa detalhada.",avoid:"Nao confunda o Pricing Calculator com o Cost Explorer — o Calculator estima custos futuros, enquanto o Cost Explorer analisa gastos passados. Tambem nao tome as estimativas como valores exatos; o uso real pode variar."},en:{tech:"AWS Pricing Calculator lets you estimate costs before using services, based on configurations and expected usage.",simple:"AWS Pricing Calculator is a free tool that lets you estimate the monthly cost of AWS services like S3 and CloudFront before you start using them. You configure usage parameters and receive a detailed estimate.",avoid:"Do not confuse the Pricing Calculator with Cost Explorer — the Calculator estimates future costs, while Cost Explorer analyzes past spending. Also do not take estimates as exact values; actual usage may vary."}}},
{en:"What is the practice of minimizing dependencies between application components called?",pt:"Qual e a pratica de minimizar dependencias entre componentes de uma aplicacao?",o:{en:["Elastic coupling","Loosely coupling","Scalable coupling","Tightly coupling"],pt:["Acoplamento elastico","Acoplamento fraco","Acoplamento escalavel","Acoplamento forte"]},a:[1],exp:{pt:{tech:"Loosely coupling reduz dependencias entre componentes, permitindo que cada um funcione, escale e falhe independentemente.",simple:"Acoplamento fraco (loosely coupling) e a pratica de minimizar as dependencias entre componentes de uma aplicacao, para que cada parte funcione e possa ser atualizada independentemente. Isso torna o sistema mais resiliente e facil de manter.",avoid:"Nao confunda acoplamento fraco com falta de comunicacao entre componentes — eles ainda se comunicam, mas por interfaces bem definidas. Tambem nao aplique acoplamento fraco em excesso para componentes que naturalmente precisam trabalhar juntos de forma sincrona."},en:{tech:"Loose coupling reduces dependencies between components, allowing each to function, scale, and fail independently.",simple:"Loosely coupling is the practice of minimizing dependencies between application components so that each part operates and can be updated independently. This makes the system more resilient and easier to maintain.",avoid:"Do not confuse loose coupling with lack of communication between components — they still communicate, but through well-defined interfaces. Also do not apply loose coupling excessively to components that naturally need to work together synchronously."}}},
{en:"Which statement is true about Availability Zones and Edge Locations?",pt:"Qual afirmacao e verdadeira sobre Zonas de Disponibilidade e Edge Locations?",o:{en:["Edge locations are located in separate Availability Zones worldwide","An Availability Zone exists within an edge location","An Availability Zone is a geographic location with multiple edge locations","An AZ is an isolated location within a Region and edge locations deliver content in multiple cities worldwide"],pt:["Edge locations ficam em Zonas de Disponibilidade separadas pelo mundo","Uma Zona de Disponibilidade existe dentro de uma edge location","Uma Zona de Disponibilidade e uma localizacao geografica com multiplas edge locations","Uma AZ e um local isolado dentro de uma Regiao e edge locations entregam conteudo em multiplas cidades no mundo"]},a:[3],exp:{pt:{tech:"AZs sao data centers isolados dentro de Regioes. Edge Locations sao pontos de presenca do CloudFront espalhados globalmente.",simple:"Availability Zones sao locais fisicos isolados dentro de uma Regiao AWS, cada um com energia e rede independentes. Edge Locations sao pontos de presenca espalhados por cidades ao redor do mundo que entregam conteudo com baixa latencia via CloudFront.",avoid:"Nao confunda AZs com Edge Locations — AZs hospedam seus servidores e bancos de dados, enquanto Edge Locations servem conteudo em cache para usuarios finais. Tambem nao implante aplicacoes em Edge Locations achando que sao servidores completos."},en:{tech:"AZs are isolated data centers within Regions. Edge Locations are CloudFront points of presence spread globally.",simple:"Availability Zones are isolated physical locations within an AWS Region, each with independent power and networking. Edge Locations are points of presence spread across cities worldwide that deliver content with low latency via CloudFront.",avoid:"Do not confuse AZs with Edge Locations — AZs host your servers and databases, while Edge Locations serve cached content to end users. Also do not deploy applications on Edge Locations thinking they are full servers."}}},
{en:"Which features are included in the AWS Business Support Plan? (Choose TWO)",pt:"Quais recursos estao incluidos no plano AWS Business Support? (Escolha DUAS)",o:{en:["24x7 access to customer service","Access to Cloud Support Engineers via email only during business hours","Infrastructure Event Management for an additional fee","24x7 access to a Technical Account Manager","Only partial Trusted Advisor checks"],pt:["Acesso 24x7 ao servico ao cliente","Acesso a engenheiros de suporte por e-mail apenas em horario comercial","Infrastructure Event Management por uma taxa adicional","Acesso 24x7 a um Technical Account Manager","Apenas verificacoes parciais do Trusted Advisor"]},a:[0,2],multi:true,exp:{pt:{tech:"O plano Business inclui suporte 24x7 e Infrastructure Event Management (por taxa extra). TAM e exclusivo do Enterprise.",simple:"O plano Business Support inclui acesso ao suporte ao cliente 24 horas por dia, 7 dias por semana, e oferece Infrastructure Event Management por uma taxa adicional para eventos importantes. E um nivel intermediario entre Developer e Enterprise.",avoid:"Nao espere ter um Technical Account Manager (TAM) no plano Business — isso e exclusivo do Enterprise. Tambem nao confunda o suporte 24/7 do Business com o tempo de resposta de 15 minutos, que so existe no Enterprise."},en:{tech:"The Business plan includes 24x7 support and Infrastructure Event Management (for an extra fee). TAM is Enterprise-only.",simple:"The Business Support plan includes 24x7 access to customer service and offers Infrastructure Event Management for an additional fee for major events. It is an intermediate tier between Developer and Enterprise.",avoid:"Do not expect a Technical Account Manager (TAM) on the Business plan — that is exclusive to Enterprise. Also do not confuse Business 24/7 support with the 15-minute response time, which only exists on Enterprise."}}},
{en:"Which AWS service authenticates users using Amazon, Apple, Facebook, or Google identities?",pt:"Qual servico da AWS autentica usuarios usando identidades da Amazon, Apple, Facebook ou Google?",o:{en:["Amazon GuardDuty","Amazon Personalize","Amazon Cognito","AWS IAM"],pt:["Amazon GuardDuty","Amazon Personalize","Amazon Cognito","AWS IAM"]},a:[2],exp:{pt:{tech:"Amazon Cognito fornece autenticacao, autorizacao e gerenciamento de usuarios com suporte a login social (federation).",simple:"Amazon Cognito permite que usuarios facam login na sua aplicacao usando identidades de provedores externos como Google, Facebook, Apple ou Amazon. Ele gerencia autenticacao, autorizacao e sincronizacao de dados de usuario.",avoid:"Nao confunda Cognito com IAM — Cognito e para usuarios finais da sua aplicacao, enquanto IAM e para controlar acesso de administradores e servicos na conta AWS. Tambem nao use Cognito se sua aplicacao e interna e nao precisa de login social."},en:{tech:"Amazon Cognito provides authentication, authorization, and user management with social login support (federation).",simple:"Amazon Cognito allows users to sign in to your application using identities from external providers like Google, Facebook, Apple, or Amazon. It manages authentication, authorization, and user data synchronization.",avoid:"Do not confuse Cognito with IAM — Cognito is for end users of your application, while IAM controls access for administrators and services in the AWS account. Also do not use Cognito if your application is internal and does not need social login."}}},
{en:"What are the advantages of AWS cloud computing? (Choose TWO)",pt:"Quais sao as vantagens da computacao em nuvem da AWS? (Escolha DUAS)",o:{en:["Eliminates the need to monitor applications","AWS manages all compliance requirements","Provides custom hardware for specific applications","Eliminates the need to guess infrastructure capacity","Trade capital expenses for variable operational expenses"],pt:["Elimina a necessidade de monitorar aplicacoes","A AWS gerencia todos os requisitos de conformidade","Fornece hardware personalizado para aplicacoes especificas","Elimina a necessidade de adivinhar a capacidade da infraestrutura","Trocar despesas de capital por despesas operacionais variaveis"]},a:[3,4],multi:true,exp:{pt:{tech:"A nuvem elimina adivinhacao de capacidade e permite trocar CAPEX por OPEX, pagando conforme o uso.",simple:"A computacao em nuvem elimina a necessidade de adivinhar a capacidade de infraestrutura, permitindo escalar para cima ou para baixo conforme a demanda. Tambem substitui grandes investimentos de capital iniciais por pagamentos variaveis baseados no uso.",avoid:"Nao assuma que a nuvem e sempre mais barata — para cargas de trabalho estaveis e previsiveis a longo prazo, on-premises pode ter custos menores. Tambem nao migre para a nuvem sem planejar; migracoes mal planejadas podem resultar em custos inesperados."},en:{tech:"The cloud eliminates capacity guessing and lets you trade CAPEX for OPEX, paying as you go.",simple:"Cloud computing eliminates the need to guess infrastructure capacity, allowing you to scale up or down based on demand. It also replaces large upfront capital investments with variable payments based on usage.",avoid:"Do not assume the cloud is always cheaper — for stable, predictable long-term workloads, on-premises may have lower costs. Also do not migrate to the cloud without planning; poorly planned migrations can result in unexpected costs."}}},
{en:"Which AWS service performs health checks on Amazon EC2 instances?",pt:"Qual servico da AWS realiza verificacoes de integridade em instancias Amazon EC2?",o:{en:["AWS CloudFormation","Amazon Route 53","Amazon Chime","Amazon Aurora"],pt:["AWS CloudFormation","Amazon Route 53","Amazon Chime","Amazon Aurora"]},a:[1],exp:{pt:{tech:"Amazon Route 53 realiza health checks em endpoints e roteia trafego apenas para recursos saudaveis.",simple:"Amazon Route 53 pode realizar verificacoes de saude (health checks) em instancias EC2 e outros endpoints, monitorando se estao respondendo corretamente. Se um endpoint falhar, o Route 53 redireciona o trafego DNS para recursos saudaveis.",avoid:"Nao confunda Route 53 com um load balancer — Route 53 e um servico de DNS que roteia trafego no nivel de dominio, enquanto o ELB distribui trafego entre instancias. Tambem nao ignore os health checks; sem eles, o Route 53 pode direcionar usuarios para servidores com falha."},en:{tech:"Amazon Route 53 performs health checks on endpoints and routes traffic only to healthy resources.",simple:"Amazon Route 53 can perform health checks on EC2 instances and other endpoints, monitoring whether they are responding correctly. If an endpoint fails, Route 53 redirects DNS traffic to healthy resources.",avoid:"Do not confuse Route 53 with a load balancer — Route 53 is a DNS service that routes traffic at the domain level, while ELB distributes traffic among instances. Also do not ignore health checks; without them, Route 53 may direct users to failing servers."}}},
{en:"Which AWS service provides facial recognition capabilities to automate photo tagging?",pt:"Qual servico da AWS oferece reconhecimento facial para automatizar a marcacao de fotos?",o:{en:["Amazon Comprehend","AWS IAM","Amazon Polly","Amazon Rekognition"],pt:["Amazon Comprehend","AWS IAM","Amazon Polly","Amazon Rekognition"]},a:[3],exp:{pt:{tech:"Amazon Rekognition usa deep learning para analise de imagens e videos, incluindo deteccao e reconhecimento facial.",simple:"Amazon Rekognition e um servico de inteligencia artificial que analisa imagens e videos para identificar rostos, objetos, textos e cenas. Ele pode ser usado para automatizar a marcacao de fotos com reconhecimento facial.",avoid:"Nao use Rekognition sem considerar questoes de privacidade e conformidade com leis de protecao de dados. Tambem nao espere 100% de precisao; revise os resultados para casos criticos como seguranca ou verificacao de identidade."},en:{tech:"Amazon Rekognition uses deep learning for image and video analysis, including facial detection and recognition.",simple:"Amazon Rekognition is an artificial intelligence service that analyzes images and videos to identify faces, objects, text, and scenes. It can be used to automate photo tagging with facial recognition.",avoid:"Do not use Rekognition without considering privacy concerns and compliance with data protection laws. Also do not expect 100% accuracy; review results for critical cases like security or identity verification."}}},
{en:"Which of the following are examples of AWS-managed databases? (Choose TWO)",pt:"Quais das alternativas a seguir sao exemplos de bancos de dados gerenciados pela AWS? (Escolha DUAS)",o:{en:["Amazon Neptune","Amazon CloudSearch","Microsoft SQL Server on Amazon EC2","MySQL on Amazon EC2","Amazon RDS for MySQL"],pt:["Amazon Neptune","Amazon CloudSearch","Microsoft SQL Server no Amazon EC2","MySQL no Amazon EC2","Amazon RDS para MySQL"]},a:[0,4],multi:true,exp:{pt:{tech:"Neptune e RDS for MySQL sao gerenciados pela AWS. Bancos instalados manualmente no EC2 sao responsabilidade do cliente.",simple:"Amazon Neptune e um banco de dados de grafos gerenciado, e Amazon RDS for MySQL e um banco de dados relacional gerenciado. Ambos sao exemplos de bancos de dados onde a AWS cuida de patches, backups e manutencao automaticamente.",avoid:"Nao escolha um banco gerenciado se voce precisa de configuracoes muito especificas do sistema operacional ou do motor de banco de dados que o servico gerenciado nao permite. Tambem nao confunda Neptune (grafos) com DynamoDB (NoSQL chave-valor/documentos) — sao para casos de uso diferentes."},en:{tech:"Neptune and RDS for MySQL are AWS-managed. Databases manually installed on EC2 are the customer responsibility.",simple:"Amazon Neptune is a managed graph database, and Amazon RDS for MySQL is a managed relational database. Both are examples of databases where AWS handles patches, backups, and maintenance automatically.",avoid:"Do not choose a managed database if you need very specific OS or database engine configurations that the managed service does not allow. Also do not confuse Neptune (graph) with DynamoDB (NoSQL key-value/document) — they serve different use cases."}}},
{en:"Which EC2 option is best for periodic large-scale image and video processing at minimal cost?",pt:"Qual opcao do EC2 e melhor para processamento periodico de imagens e videos em larga escala com custo minimo?",o:{en:["EC2 On-Demand Instances","EC2 Reserved Instances with No Upfront payment","EC2 Spot Instances","EC2 Reserved Instances with All Upfront payment"],pt:["Instancias EC2 On-Demand","Instancias EC2 Reservadas sem pagamento antecipado","Instancias EC2 Spot","Instancias EC2 Reservadas com pagamento total antecipado"]},a:[2],exp:{pt:{tech:"Spot Instances oferecem ate 90% de desconto e sao ideais para cargas tolerantes a interrupcao, como processamento em lote.",simple:"EC2 Spot Instances permitem usar capacidade de computacao nao utilizada da AWS com descontos de ate 90%. Sao ideais para processamento de imagens e videos em larga escala que pode ser interrompido e retomado, pois a AWS pode recuperar a instancia a qualquer momento.",avoid:"Nao use Spot Instances para aplicacoes que nao podem ser interrompidas, como bancos de dados em producao ou servidores web principais. Tambem nao dependa de uma unica Spot Instance — use diversas para aumentar a chance de disponibilidade."},en:{tech:"Spot Instances offer up to 90% discount and are ideal for fault-tolerant workloads like batch processing.",simple:"EC2 Spot Instances let you use unused AWS compute capacity at discounts of up to 90%. They are ideal for large-scale image and video processing that can be interrupted and resumed, as AWS can reclaim the instance at any time.",avoid:"Do not use Spot Instances for applications that cannot be interrupted, such as production databases or primary web servers. Also do not depend on a single Spot Instance — use multiple ones to increase availability."}}},
{en:"Who has the authority to grant full administrative access to all AWS resources in an account?",pt:"Quem tem autoridade para conceder acesso administrativo total a todos os recursos AWS em uma conta?",o:{en:["The AWS account owner (root user)","The AWS Technical Account Manager","The AWS security team","AWS cloud support engineers"],pt:["O proprietario da conta AWS (usuario root)","O Technical Account Manager da AWS","A equipe de seguranca da AWS","Os engenheiros de suporte em nuvem da AWS"]},a:[0],exp:{pt:{tech:"O usuario root tem acesso irrestrito a todos os recursos e configuracoes da conta AWS.",simple:"O usuario root (dono da conta AWS) e a unica entidade com autoridade total para conceder acesso administrativo completo a todos os recursos da conta. Ele tem permissoes que nao podem ser restringidas por politicas IAM.",avoid:"Nao use o usuario root para tarefas cotidianas — crie usuarios IAM com permissoes apropriadas para o dia a dia. Tambem nao deixe de ativar MFA no root e armazenar as credenciais de forma segura."},en:{tech:"The root user has unrestricted access to all resources and settings in the AWS account.",simple:"The root user (AWS account owner) is the only entity with full authority to grant complete administrative access to all resources in the account. It has permissions that cannot be restricted by IAM policies.",avoid:"Do not use the root user for everyday tasks — create IAM users with appropriate permissions for daily operations. Also do not fail to enable MFA on root and store credentials securely."}}},
{en:"Which AWS service is used to migrate on-premises workloads to AWS?",pt:"Qual servico da AWS e usado para migrar cargas de trabalho on-premises para a AWS?",o:{en:["AWS File Transfer Acceleration","AWS Server Migration Service","AWS Database Migration Service","AWS Application Discovery Service"],pt:["AWS File Transfer Acceleration","AWS Server Migration Service","AWS Database Migration Service","AWS Application Discovery Service"]},a:[1],exp:{pt:{tech:"AWS SMS automatiza a migracao de servidores on-premises para a AWS, criando AMIs replicadas incrementalmente.",simple:"AWS Server Migration Service (SMS) facilita a migracao de servidores on-premises para a AWS, automatizando a replicacao de volumes de servidores para a nuvem. Ele permite migrar cargas de trabalho com minimo tempo de inatividade.",avoid:"Nao use SMS para migrar bancos de dados — use o AWS Database Migration Service (DMS) para isso. Tambem nao confunda SMS com Snowball; SMS replica servidores pela rede, enquanto Snowball transfere grandes volumes de dados fisicamente."},en:{tech:"AWS SMS automates the migration of on-premises servers to AWS, creating incrementally replicated AMIs.",simple:"AWS Server Migration Service (SMS) facilitates the migration of on-premises servers to AWS by automating the replication of server volumes to the cloud. It allows migrating workloads with minimal downtime.",avoid:"Do not use SMS to migrate databases — use AWS Database Migration Service (DMS) for that. Also do not confuse SMS with Snowball; SMS replicates servers over the network, while Snowball transfers large data volumes physically."}}},
{en:"What does AWS Cost Explorer provide?",pt:"O que o AWS Cost Explorer fornece?",o:{en:["Cost comparisons between on-premises and cloud","Cost estimates based on expected usage","Consolidated billing across multiple accounts","Cost forecasts for up to 12 months"],pt:["Comparacoes de custo entre on-premises e nuvem","Estimativas de custo baseadas no uso esperado","Faturamento consolidado entre multiplas contas","Previsoes de custo para ate 12 meses"]},a:[3],exp:{pt:{tech:"O Cost Explorer fornece visualizacoes de custos e uso, alem de previsoes de gastos para ate 12 meses.",simple:"AWS Cost Explorer fornece previsoes de custo para ate 12 meses com base no seu historico de uso. Ele permite visualizar e analisar seus gastos ao longo do tempo e identificar tendencias para planejar o orcamento.",avoid:"Nao confunda Cost Explorer com o Pricing Calculator — o Explorer analisa gastos passados e projeta futuros, enquanto o Calculator estima custos de novos servicos. Tambem nao ignore os alertas de orcamento; configure AWS Budgets junto com o Cost Explorer."},en:{tech:"Cost Explorer provides cost and usage visualizations, plus spending forecasts for up to 12 months.",simple:"AWS Cost Explorer provides cost forecasts for up to 12 months based on your usage history. It lets you visualize and analyze your spending over time and identify trends for budget planning.",avoid:"Do not confuse Cost Explorer with the Pricing Calculator — Explorer analyzes past spending and projects future costs, while the Calculator estimates costs for new services. Also do not ignore budget alerts; configure AWS Budgets alongside Cost Explorer."}}},
{en:"Which Amazon RDS feature provides automatic failover for database availability?",pt:"Qual recurso do Amazon RDS oferece failover automatico para disponibilidade do banco de dados?",o:{en:["RDS Single-AZ deployment","RDS Write Replica","RDS Snapshots","RDS Multi-AZ deployment"],pt:["Implantacao RDS Single-AZ","RDS Write Replica","RDS Snapshots","Implantacao RDS Multi-AZ"]},a:[3],exp:{pt:{tech:"RDS Multi-AZ mantem uma replica sincrona em outra AZ e faz failover automatico em caso de falha.",simple:"O Multi-AZ deployment do Amazon RDS cria automaticamente uma replica do banco de dados em outra Availability Zone. Se o banco principal falhar, o failover para a replica acontece automaticamente sem intervencao manual.",avoid:"Nao confunda Multi-AZ com Read Replicas — Multi-AZ e para alta disponibilidade e failover automatico, enquanto Read Replicas sao para melhorar performance de leitura. Tambem nao use Multi-AZ esperando que ele melhore a performance; a replica fica em standby e nao atende leituras."},en:{tech:"RDS Multi-AZ maintains a synchronous replica in another AZ and performs automatic failover in case of failure.",simple:"Amazon RDS Multi-AZ deployment automatically creates a database replica in another Availability Zone. If the primary database fails, failover to the replica happens automatically without manual intervention.",avoid:"Do not confuse Multi-AZ with Read Replicas — Multi-AZ is for high availability and automatic failover, while Read Replicas improve read performance. Also do not use Multi-AZ expecting it to improve performance; the replica is on standby and does not serve reads."}}},
{en:"What is the best way to reduce charges for EC2 On-Demand instances that are not currently in use?",pt:"Qual e a melhor maneira de reduzir cobrancas de instancias EC2 On-Demand que nao estao em uso?",o:{en:["Delete all associated EBS volumes","You cannot minimize On-Demand charges","Terminate the instances completely","Stop the instances and restart when needed"],pt:["Deletar todos os volumes EBS associados","Nao e possivel minimizar cobrancas On-Demand","Encerrar as instancias completamente","Parar as instancias e reiniciar quando necessario"]},a:[3],exp:{pt:{tech:"Instancias EC2 paradas nao geram cobranca de computacao (apenas EBS). Terminar exclui a instancia permanentemente.",simple:"A melhor forma de reduzir custos de instancias EC2 On-Demand que nao estao em uso e para-las (stop) e reinicia-las quando necessario. Instancias paradas nao cobram por computacao, apenas pelo armazenamento EBS associado.",avoid:"Nao confunda parar (stop) com terminar (terminate) — parar preserva os dados e a instancia, enquanto terminar apaga tudo permanentemente. Tambem nao esqueca que instancias paradas ainda geram custos de armazenamento EBS."},en:{tech:"Stopped EC2 instances do not incur compute charges (only EBS storage). Terminating permanently deletes the instance.",simple:"The best way to reduce charges for unused EC2 On-Demand instances is to stop them and restart when needed. Stopped instances do not charge for compute, only for the associated EBS storage.",avoid:"Do not confuse stopping with terminating — stopping preserves data and the instance, while terminating deletes everything permanently. Also do not forget that stopped instances still incur EBS storage costs."}}},
{en:"Which strategy best protects the AWS root account?",pt:"Qual estrategia melhor protege a conta root da AWS?",o:{en:["Delete root user access keys if they are not needed","Apply MFA to the root account and use it for all daily tasks","Access the root account only from a mobile phone","Share the root password only with trusted persons"],pt:["Deletar as chaves de acesso do usuario root se nao forem necessarias","Aplicar MFA na conta root e usa-la para todas as tarefas diarias","Acessar a conta root apenas pelo celular","Compartilhar a senha root apenas com pessoas confiaveis"]},a:[0],exp:{pt:{tech:"A AWS recomenda deletar chaves de acesso do root e usar IAM users para tarefas diarias, minimizando riscos.",simple:"A melhor pratica para proteger a conta root e deletar as chaves de acesso do root se elas nao sao necessarias, eliminando a possibilidade de acesso programatico com privilegios totais. Isso reduz drasticamente o risco de comprometimento da conta.",avoid:"Nao delete as chaves do root se voce atualmente depende delas para alguma automacao — primeiro migre para IAM Roles ou usuarios IAM. Tambem nao pense que deletar chaves e suficiente; ative MFA no root e use politicas de SCPs na organizacao."},en:{tech:"AWS recommends deleting root access keys and using IAM users for daily tasks, minimizing security risks.",simple:"The best practice for protecting the root account is to delete root access keys if they are not needed, eliminating the possibility of programmatic access with full privileges. This drastically reduces the risk of account compromise.",avoid:"Do not delete root keys if you currently depend on them for automation — first migrate to IAM Roles or IAM users. Also do not think deleting keys is enough; enable MFA on root and use SCP policies in the organization."}}},
{en:"Which AWS service provides a cloud-based contact center?",pt:"Qual servico da AWS fornece um contact center baseado na nuvem?",o:{en:["Amazon Lightsail","Amazon Connect","AWS Direct Connect","AWS Elastic Beanstalk"],pt:["Amazon Lightsail","Amazon Connect","AWS Direct Connect","AWS Elastic Beanstalk"]},a:[1],exp:{pt:{tech:"Amazon Connect e um servico de contact center em nuvem que permite configurar atendimento ao cliente de forma facil e escalavel.",simple:"Amazon Connect e um servico de central de atendimento (contact center) baseado na nuvem que permite criar e gerenciar operacoes de suporte ao cliente sem hardware fisico. Ele suporta voz e chat e pode ser configurado rapidamente.",avoid:"Nao use Amazon Connect se voce ja tem uma solucao de call center robusta e nao planeja migrar para a nuvem. Tambem nao confunda Connect com SNS ou SES — Connect e para atendimento interativo ao cliente, nao para envio de notificacoes ou emails em massa."},en:{tech:"Amazon Connect is a cloud contact center service that lets you set up customer service easily and at scale.",simple:"Amazon Connect is a cloud-based contact center service that lets you create and manage customer support operations without physical hardware. It supports voice and chat and can be set up quickly.",avoid:"Do not use Amazon Connect if you already have a robust call center solution and do not plan to migrate to the cloud. Also do not confuse Connect with SNS or SES — Connect is for interactive customer service, not for sending notifications or bulk emails."}}},
{en:"What does Economies of Scale mean in the context of AWS?",pt:"O que significa Economia de Escala no contexto da AWS?",o:{en:["You save more money when you consume more resources","As more time passes you pay more for resources","AWS will continuously lower costs as it grows and gains efficiencies","The ability to pay as you go for resources"],pt:["Voce economiza mais dinheiro quando consome mais recursos","Conforme mais tempo passa voce paga mais pelos recursos","A AWS reduzira continuamente os custos conforme cresce e ganha eficiencia","A capacidade de pagar conforme o uso pelos recursos"]},a:[2],exp:{pt:{tech:"Economia de escala permite que a AWS reduza precos continuamente conforme sua infraestrutura cresce e se torna mais eficiente.",simple:"Economia de escala significa que a AWS, por operar em escala massiva, consegue custos menores e repassa essas reducoes continuamente para os clientes. Conforme a AWS cresce, os precos dos servicos tendem a diminuir.",avoid:"Nao assuma que economia de escala se aplica automaticamente a sua conta individual — os descontos sao no preco geral dos servicos, nao baseados no seu uso pessoal. Tambem nao confunda economia de escala com descontos por volume como os do S3."},en:{tech:"Economies of scale allow AWS to continuously reduce prices as its infrastructure grows and becomes more efficient.",simple:"Economies of scale means that AWS, by operating at massive scale, achieves lower costs and continuously passes those savings on to customers. As AWS grows, service prices tend to decrease.",avoid:"Do not assume economies of scale apply automatically to your individual account — discounts are on overall service pricing, not based on your personal usage. Also do not confuse economies of scale with volume discounts like those on S3."}}},
{en:"What does the AWS Pay-As-You-Go pricing model do?",pt:"O que o modelo de precificacao Pay-As-You-Go da AWS faz?",o:{en:["Replace low upfront expenses with large variable payments","Replace low upfront expenses with large fixed payments","Replace large upfront expenses with low fixed payments","Replace large capital expenses with low variable payments"],pt:["Substituir despesas iniciais baixas por grandes pagamentos variaveis","Substituir despesas iniciais baixas por grandes pagamentos fixos","Substituir grandes despesas iniciais por baixos pagamentos fixos","Substituir grandes despesas de capital por baixos pagamentos variaveis"]},a:[3],exp:{pt:{tech:"O modelo Pay-As-You-Go converte CAPEX (investimento inicial alto) em OPEX (pagamentos variaveis conforme o uso).",simple:"O modelo Pay-As-You-Go permite que voce substitua grandes investimentos iniciais em infraestrutura por pagamentos variaveis e menores baseados no uso real. Voce paga apenas pelos recursos que consome, sem compromisso de longo prazo.",avoid:"Nao assuma que Pay-As-You-Go e sempre a opcao mais economica — para uso continuo e previsivel, Reserved Instances ou Savings Plans podem ser mais baratos. Tambem nao deixe recursos ligados sem monitorar; sem controle, a conta pode crescer rapidamente."},en:{tech:"The Pay-As-You-Go model converts CAPEX (high upfront investment) into OPEX (variable payments based on usage).",simple:"The Pay-As-You-Go model lets you replace large upfront infrastructure investments with smaller, variable payments based on actual usage. You pay only for the resources you consume, with no long-term commitment.",avoid:"Do not assume Pay-As-You-Go is always the most economical option — for continuous, predictable usage, Reserved Instances or Savings Plans may be cheaper. Also do not leave resources running without monitoring; without oversight, costs can grow quickly."}}},
{en:"Which S3 storage class is best for popular e-commerce static assets with stable access patterns?",pt:"Qual classe de armazenamento do S3 e melhor para ativos estaticos populares de e-commerce com padrao de acesso estavel?",o:{en:["S3 Standard-Infrequent Access","S3 Intelligent-Tiering","S3 Glacier Deep Archive","S3 Standard"],pt:["S3 Standard-Infrequent Access","S3 Intelligent-Tiering","S3 Glacier Deep Archive","S3 Standard"]},a:[3],exp:{pt:{tech:"S3 Standard oferece alta durabilidade, disponibilidade e baixa latencia para dados acessados com frequencia.",simple:"S3 Standard e a classe de armazenamento padrao projetada para dados acessados com frequencia e que precisam de alta disponibilidade e baixa latencia. E ideal para ativos estaticos de e-commerce que sao acessados constantemente pelos usuarios.",avoid:"Nao use S3 Standard para dados acessados raramente — classes como S3 Infrequent Access ou Glacier sao mais economicas nesses casos. Tambem nao ignore as opcoes de lifecycle policies para mover dados antigos automaticamente para classes mais baratas."},en:{tech:"S3 Standard offers high durability, availability, and low latency for frequently accessed data.",simple:"S3 Standard is the default storage class designed for frequently accessed data that needs high availability and low latency. It is ideal for e-commerce static assets that are constantly accessed by users.",avoid:"Do not use S3 Standard for rarely accessed data — classes like S3 Infrequent Access or Glacier are more economical in those cases. Also do not ignore lifecycle policies to automatically move old data to cheaper storage classes."}}},
{en:"Where should you create a backup for geographical disaster protection?",pt:"Onde voce deve criar um backup para protecao contra desastres geograficos?",o:{en:["In another Edge Location","In another Region","In another VPC","In another Availability Zone"],pt:["Em outra Edge Location","Em outra Regiao","Em outra VPC","Em outra Zona de Disponibilidade"]},a:[1],exp:{pt:{tech:"Backups em outra Regiao protegem contra desastres que afetem uma regiao inteira, como terremotos ou furacoes.",simple:"Para protecao contra desastres geograficos, o backup deve ser criado em outra Regiao AWS, que e uma area geografica fisicamente separada. Isso garante que, mesmo se uma regiao inteira ficar indisponivel, seus dados estejam seguros em outro local.",avoid:"Nao confunda Availability Zones com Regions para protecao contra desastres — AZs ficam na mesma area geografica e podem ser afetadas pelo mesmo desastre regional. Tambem nao esqueca de testar regularmente a restauracao dos backups em outra regiao."},en:{tech:"Backups in another Region protect against disasters that affect an entire region, like earthquakes or hurricanes.",simple:"For geographical disaster protection, backups should be created in another AWS Region, which is a physically separate geographic area. This ensures that even if an entire region becomes unavailable, your data is safe in another location.",avoid:"Do not confuse Availability Zones with Regions for disaster protection — AZs are in the same geographic area and can be affected by the same regional disaster. Also do not forget to regularly test backup restoration in another region."}}},
{en:"What are the key benefits of AWS CloudFormation? (Choose TWO)",pt:"Quais sao os principais beneficios do AWS CloudFormation? (Escolha DUAS)",o:{en:["Deploy applications without worrying about infrastructure","Automatically applies advanced IAM features","Automates infrastructure provisioning and updating in a safe manner","Model your entire infrastructure in a text file","Compiles and builds application code"],pt:["Implantar aplicacoes sem se preocupar com infraestrutura","Aplicar automaticamente recursos avancados do IAM","Automatizar o provisionamento e atualizacao de infraestrutura de forma segura","Modelar toda a infraestrutura em um arquivo de texto","Compilar e construir codigo de aplicacao"]},a:[2,3],multi:true,exp:{pt:{tech:"CloudFormation permite modelar infraestrutura como codigo (IaC) em templates e automatizar provisionamento com rollback seguro.",simple:"AWS CloudFormation permite automatizar a criacao e atualizacao de infraestrutura de forma segura e repetivel, e permite modelar toda a infraestrutura em um arquivo de texto (template). Isso garante que ambientes sejam identicos toda vez que sao criados.",avoid:"Nao edite recursos criados pelo CloudFormation diretamente no console — isso causa divergencia (drift) entre o template e a infraestrutura real. Tambem nao ignore a revisao de changesets antes de aplicar atualizacoes, pois mudancas podem causar substituicao de recursos."},en:{tech:"CloudFormation lets you model infrastructure as code (IaC) in templates and automate provisioning with safe rollback.",simple:"AWS CloudFormation lets you automate infrastructure provisioning and updating in a safe, repeatable way, and allows you to model your entire infrastructure in a text file (template). This ensures environments are identical every time they are created.",avoid:"Do not edit resources created by CloudFormation directly in the console — this causes drift between the template and actual infrastructure. Also do not skip reviewing changesets before applying updates, as changes can cause resource replacement."}}},
{en:"Which deployment model connects cloud and non-cloud (on-premises) resources?",pt:"Qual modelo de implantacao conecta recursos na nuvem e fora da nuvem (on-premises)?",o:{en:["On-premises deployment","Mixed deployment","Hybrid deployment","Cloud deployment"],pt:["Implantacao on-premises","Implantacao mista","Implantacao hibrida","Implantacao na nuvem"]},a:[2],exp:{pt:{tech:"O modelo hibrido combina infraestrutura on-premises com recursos na nuvem, conectados por VPN ou Direct Connect.",simple:"O modelo de implantacao hibrido conecta recursos na nuvem AWS com recursos on-premises (fora da nuvem), permitindo que ambos trabalhem juntos como uma unica infraestrutura. E util para empresas que nao podem ou nao querem migrar tudo de uma vez.",avoid:"Nao use implantacao hibrida se voce pode migrar completamente para a nuvem — manter dois ambientes aumenta a complexidade operacional. Tambem nao ignore a latencia de rede entre on-premises e a nuvem, que pode afetar aplicacoes sensiveis a tempo de resposta."},en:{tech:"The hybrid model combines on-premises infrastructure with cloud resources, connected via VPN or Direct Connect.",simple:"The hybrid deployment model connects AWS cloud resources with on-premises (non-cloud) resources, allowing both to work together as a single infrastructure. It is useful for companies that cannot or do not want to migrate everything at once.",avoid:"Do not use hybrid deployment if you can fully migrate to the cloud — maintaining two environments increases operational complexity. Also do not ignore network latency between on-premises and the cloud, which can affect latency-sensitive applications."}}},
{en:"What are the benefits of a tagging strategy in AWS? (Choose TWO)",pt:"Quais sao os beneficios de uma estrategia de tagging na AWS? (Escolha DUAS)",o:{en:["Identify resources created by specific projects","Identify software solutions on resources","Track API calls in the account","Identify and recover deleted resources","Track and manage spending across tagged resources"],pt:["Identificar recursos criados por projetos especificos","Identificar solucoes de software nos recursos","Rastrear chamadas de API na conta","Identificar e recuperar recursos deletados","Rastrear e gerenciar gastos entre recursos com tags"]},a:[0,4],multi:true,exp:{pt:{tech:"Tags permitem categorizar recursos por projeto, equipe ou ambiente, facilitando o rastreamento de custos e organizacao.",simple:"Tags sao rotulos que voce coloca nos recursos da AWS para identificar a qual projeto pertencem e acompanhar quanto cada grupo esta gastando.",avoid:"Nao use tags apenas por usar sem um padrao definido. Sem uma estrategia consistente de nomeacao, as tags viram uma bagunca e perdem a utilidade para controle de custos."},en:{tech:"Tags let you categorize resources by project, team, or environment, making cost tracking and organization easier.",simple:"Tags are labels you attach to AWS resources to identify which project they belong to and track how much each group is spending.",avoid:"Do not use tags randomly without a defined naming standard. Without a consistent tagging strategy, tags become messy and lose their usefulness for cost tracking."}}},
{en:"Which AWS service is used for encryption key management?",pt:"Qual servico da AWS e usado para gerenciamento de chaves de criptografia?",o:{en:["AWS KMS","AWS Service Control Policies","Multi-Factor Authentication","Amazon Macie"],pt:["AWS KMS","AWS Service Control Policies","Autenticacao Multi-Fator","Amazon Macie"]},a:[0],exp:{pt:{tech:"AWS KMS (Key Management Service) permite criar, gerenciar e controlar chaves de criptografia usadas para proteger dados.",simple:"O KMS e um servico que cria, armazena e controla chaves de criptografia usadas para proteger seus dados na AWS.",avoid:"Nao use o KMS para armazenar senhas ou segredos de aplicacao — para isso existe o Secrets Manager. O KMS e exclusivamente para gerenciamento de chaves de criptografia."},en:{tech:"AWS KMS (Key Management Service) lets you create, manage, and control encryption keys used to protect data.",simple:"KMS is a service that creates, stores, and controls encryption keys used to protect your data in AWS.",avoid:"Do not use KMS to store passwords or application secrets — use Secrets Manager for that. KMS is exclusively for encryption key management."}}},
{en:"Which AWS service provides SOC and PCI compliance reports?",pt:"Qual servico da AWS fornece relatorios de conformidade SOC e PCI?",o:{en:["AWS Well-Architected Tool","AWS Artifact","AWS Glue","Amazon Chime"],pt:["AWS Well-Architected Tool","AWS Artifact","AWS Glue","Amazon Chime"]},a:[1],exp:{pt:{tech:"AWS Artifact fornece acesso sob demanda a relatorios de conformidade e seguranca da AWS, como SOC e PCI DSS.",simple:"O Artifact e um portal onde voce baixa relatorios de conformidade da AWS, como SOC e PCI, para auditorias e requisitos regulatorios.",avoid:"Nao confunda o Artifact com uma ferramenta de auditoria ativa — ele apenas fornece documentos prontos da AWS. Para verificar se sua conta segue boas praticas, use o Trusted Advisor."},en:{tech:"AWS Artifact provides on-demand access to AWS compliance and security reports such as SOC and PCI DSS.",simple:"Artifact is a portal where you download AWS compliance reports, such as SOC and PCI, for audits and regulatory requirements.",avoid:"Do not confuse Artifact with an active auditing tool — it only provides ready-made AWS documents. To check if your account follows best practices, use Trusted Advisor."}}},
{en:"Which of the following is NOT a customer responsibility in the AWS Shared Responsibility Model? (Choose TWO)",pt:"Quais das alternativas a seguir NAO sao responsabilidade do cliente no Modelo de Responsabilidade Compartilhada? (Escolha DUAS)",o:{en:["Running penetration tests on their applications","Reserving capacity for their workloads","Data center physical operations","Auditing and compliance of their applications","Physical infrastructure security"],pt:["Executar testes de penetracao em suas aplicacoes","Reservar capacidade para suas cargas de trabalho","Operacoes fisicas do data center","Auditoria e conformidade de suas aplicacoes","Seguranca da infraestrutura fisica"]},a:[2,4],multi:true,exp:{pt:{tech:"Operacoes fisicas de data center e seguranca da infraestrutura fisica sao responsabilidades da AWS, nao do cliente.",simple:"Operacoes fisicas do data center e seguranca da infraestrutura fisica sao responsabilidades da AWS, nao do cliente. A AWS cuida de todo o hardware e das instalacoes.",avoid:"Nao assuma que voce precisa se preocupar com seguranca fisica ou manutencao de servidores — isso e da AWS. Seu foco e proteger seus dados, configurar acessos e manter seus sistemas seguros."},en:{tech:"Physical data center operations and infrastructure security are AWS responsibilities, not the customer.",simple:"Physical data center operations and physical infrastructure security are AWS responsibilities, not the customer. AWS manages all hardware and facilities.",avoid:"Do not assume you need to worry about physical security or server maintenance — that is on AWS. Your focus is protecting your data, configuring access, and keeping your systems secure."}}},
{en:"Which AWS service can send SMS promotions to users in over 200 countries?",pt:"Qual servico da AWS pode enviar promocoes por SMS para usuarios em mais de 200 paises?",o:{en:["Amazon SES","Amazon S3","Amazon SNS","Amazon SQS"],pt:["Amazon SES","Amazon S3","Amazon SNS","Amazon SQS"]},a:[2],exp:{pt:{tech:"Amazon SNS (Simple Notification Service) suporta envio de SMS para mais de 200 paises, alem de push e e-mail.",simple:"O SNS e um servico de mensagens que pode enviar SMS para usuarios em mais de 200 paises, alem de e-mails e notificacoes push.",avoid:"Nao use o SNS para filas de processamento — para isso existe o SQS. O SNS e para notificacoes e nao garante que a mensagem sera processada em ordem ou reprocessada em caso de falha."},en:{tech:"Amazon SNS (Simple Notification Service) supports SMS delivery to over 200 countries, plus push and email notifications.",simple:"SNS is a messaging service that can send SMS to users in over 200 countries, as well as emails and push notifications.",avoid:"Do not use SNS for processing queues — use SQS for that. SNS is for notifications and does not guarantee message ordering or reprocessing on failure."}}},
{en:"Which of the following is a benefit of Amazon EC2 that helps reduce compute costs?",pt:"Qual das alternativas a seguir e um beneficio do Amazon EC2 que ajuda a reduzir custos de computacao?",o:{en:["Low monthly maintenance fees","Low-cost resource tagging","Per-second billing for On-Demand instances","Low start-up fees for all instance types"],pt:["Baixas taxas mensais de manutencao","Tagging de recursos de baixo custo","Cobranca por segundo para instancias On-Demand","Baixas taxas iniciais para todos os tipos de instancia"]},a:[2],exp:{pt:{tech:"A cobranca por segundo do EC2 On-Demand garante que voce pague apenas pelo tempo real de uso, sem desperdicio.",simple:"A cobranca por segundo significa que voce paga apenas pelo tempo exato que usa uma instancia EC2 On-Demand, sem precisar pagar por uma hora inteira.",avoid:"Nao confunda cobranca por segundo com a opcao mais barata — ela reduz custos de uso irregular, mas para cargas estaveis, Reserved Instances ou Savings Plans sao mais economicos."},en:{tech:"EC2 On-Demand per-second billing ensures you pay only for actual usage time, eliminating waste.",simple:"Per-second billing means you pay only for the exact time you use an On-Demand EC2 instance, without needing to pay for a full hour.",avoid:"Do not confuse per-second billing with the cheapest option — it reduces costs for irregular usage, but for steady workloads, Reserved Instances or Savings Plans are more cost-effective."}}},
{en:"Which AWS group helps customers achieve desired business outcomes through AWS adoption?",pt:"Qual grupo da AWS ajuda clientes a alcancar resultados de negocios desejados por meio da adocao da AWS?",o:{en:["AWS Security Team","AWS Professional Services","AWS Trusted Advisor","AWS Concierge Support"],pt:["Equipe de Seguranca da AWS","AWS Professional Services","AWS Trusted Advisor","AWS Concierge Support"]},a:[1],exp:{pt:{tech:"AWS Professional Services e uma equipe global de especialistas que ajuda empresas a migrar e adotar a AWS com sucesso.",simple:"O AWS Professional Services e uma equipe de especialistas da AWS que ajuda empresas a planejar e executar a adocao da nuvem para alcancar resultados de negocio.",avoid:"Nao confunda Professional Services com suporte tecnico — o suporte resolve problemas pontuais, enquanto o Professional Services ajuda em projetos estrategicos de adocao da nuvem."},en:{tech:"AWS Professional Services is a global team of experts that helps organizations migrate to and adopt AWS successfully.",simple:"AWS Professional Services is a team of AWS experts that helps companies plan and execute cloud adoption to achieve business outcomes.",avoid:"Do not confuse Professional Services with technical support — support resolves specific issues, while Professional Services helps with strategic cloud adoption projects."}}},
